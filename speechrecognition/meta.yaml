{% set name = "speechrecognition" %}
{% set version = "3.14.4" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/speechrecognition-{{ version }}.tar.gz
  sha256: e698248b611589b5ba4f760fcf6ec9bc3a8a25a87a2e0e88ec926c63539b6a6f

build:
  skip: true  # [py<39]
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python
    - pip
  run:
    - python
    - typing_extensions
    - standard-aifc  # [py>=313]
    - audioop-lts  # [py>=313]

test:
  imports:
    - speech_recognition
  commands:
    - pip check
  requires:
    - pip

about:
  home: https://github.com/Uberi/speech_recognition
 # readme
  summary: Library for performing speech recognition, with support for several engines and APIs, online and offline.
 # readme
  license: GPL-2.0-only AND BSD-3-Clause AND BSD-2-Clause  # readme
  license_file:
    - LICENSE-FLAC.txt
    - LICENSE.txt
    - speech_recognition/pocketsphinx-data/en-US/LICENSE.txt

extra:
  recipe-maintainers:
    - KyleKing
