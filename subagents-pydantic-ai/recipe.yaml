schema_version: 1

context:
  python_min: "3.10"
  version: "0.2.3"

package:
  name: subagents-pydantic-ai
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/s/subagents-pydantic-ai/subagents_pydantic_ai-${{ version }}.tar.gz
  sha256: bedbf5d40c91598465d8ffd349d962ede821c771d7e61936c62eb878fb5a8786

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - hatchling
    - pip
  run:
    - python >=${{ python_min }}
    - pydantic >=2.0
    - pydantic-ai-slim >=1.74.0

tests:
  - python:
      imports:
        - subagents_pydantic_ai
      pip_check: true
      python_version: ${{ python_min }}.*

about:
  summary: Subagent toolset for pydantic-ai with dual-mode execution and dynamic agent creation
  # readme
  license: MIT
  # readme
  license_file: LICENSE  # readme
  homepage: https://github.com/vstorm-co/subagents-pydantic-ai
  documentation: https://github.com/vstorm-co/subagents-pydantic-ai

extra:
  recipe-maintainers:
    - timpalpant
