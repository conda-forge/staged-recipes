# This file was generated automatically from conda-smithy. To update this configuration,
# update the conda-forge.yml and/or the recipe/meta.yaml.
# -*- mode: yaml -*-

jobs:
- job: osx
  condition: not(eq(variables['Build.SourceBranch'], 'refs/heads/main'))
  pool:
    vmImage: macOS-15
  strategy:
    matrix:
      osx_64:
        CONFIG: osx64
    maxParallel: 8
  timeoutInMinutes: 360

  steps:
  - script: |
      ./.scripts/fast_finish.sh
    displayName: Fast finish
    env:
      CI: azure

  - script: |
      ./.scripts/run_osx_build.sh
    displayName: Run OSX build
    condition: eq(variables.buildMe, 'true')
    env:
      CI: azure
      CONDA_BLD_PATH: /Users/runner/bld

  - publish: /Users/runner/bld/osx-64/
    artifact: conda_pkgs_osx
    condition: eq(variables.buildMe, 'true')
