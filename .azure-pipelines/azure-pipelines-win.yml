jobs:
- job: win_64
  condition: not(eq(variables['Build.SourceBranch'], 'refs/heads/main'))
  pool:
    vmImage: windows-2022
  strategy:
    maxParallel: 4
    matrix:
      win:
        CONFIG: win64
  timeoutInMinutes: 360
  steps:
    - bash: |
        ./.scripts/fast_finish.sh
      displayName: Fast finish
      env:
        CI: azure

    - script: |
        call .scripts\run_win_build.bat
      displayName: Build recipes
      condition: eq(variables.buildMe, 'true')
      env:
        CI: azure
        CONDA_BLD_PATH: D:\bld
        MINIFORGE_HOME: D:\Miniforge

    - publish: D:\\bld\\win-64\\
      artifact: conda_pkgs_win
      condition: eq(variables.buildMe, 'true')
