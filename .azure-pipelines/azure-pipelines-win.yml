jobs:
- job: win_64
  dependsOn: fast_finish
  condition: and(not(eq(variables['Build.SourceBranch'], 'refs/heads/main')), eq(dependencies.fast_finish.outputs['fast_finish.buildMe'], 'true'))
  pool:
    vmImage: windows-2022
  strategy:
    maxParallel: 4
    matrix:
      win:
        CONFIG: win64
  timeoutInMinutes: 360
  steps:
    - script: |
        call .scripts\run_win_build.bat
      displayName: Build recipes
      env:
        CI: azure
        CONDA_BLD_PATH: D:\bld
        MINIFORGE_HOME: D:\Miniforge

    - publish: D:\\bld\\win-64\\
      artifact: conda_pkgs_win
