{% set name = "pdfminer.six" %}
{% set version = "20251107" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/pdfminer_six-{{ version }}.tar.gz
  sha256: 5fb0c553799c591777f22c0c72b77fc2522d7d10c70654e25f4c5f1fd996e008

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python >=3.9
    - setuptools >=61.0
    - setuptools-scm >=8
    - pip
  run:
    - python >=3.9
    - charset-normalizer >=2.0.0
    - cryptography >=36.0.0

test:
  imports:
    - pdfminer
  commands:
    - pip check
  requires:
    - pip

about:
  summary: PDF parser and analyzer
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - KyleKing
