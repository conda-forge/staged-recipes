schema_version: 1

context:
  version: 0.1.1

package:
  name: refleak
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/r/refleak/refleak-${{ version }}.tar.gz
  sha256: 05c7ec81497c6f0dd80028fb933136a7d9b055a978f74b17f8bc787e1602b764

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python >=${{ python_min }}
    - setuptools >=64
    - setuptools-scm >=6.2
    - pip
  run:
    - python >=${{ python_min }}

tests:
  - python:
      imports:
        - refleak
      pip_check: true

about:
  summary: Find out what's still holding a reference to an object that should be dead.
  license: BSD-3-Clause
  license_file: LICENSE
  homepage: https://github.com/larsoner/refleak

extra:
  recipe-maintainers:
    - larsoner
