{% set version = "108.2.2" %}

package:
  name: tstoolbox
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/tstoolbox-{{ version }}.tar.gz
  sha256: c94ea2c05a0fb7e531db97080502d1bd068c4167290ecec10d66772de987f355

build:
  entry_points:
    - tstoolbox = tstoolbox.tstoolbox:main
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python >=3.10
    - setuptools-scm >=8
    - setuptools >=80
    - pip
  run:
    - python >=3.10
    - cltoolbox >=1.0.0
    - dateparser
    - numpy
    - openpyxl
    - pandas
    - pint !=0.21.*
    - pint-pandas
    - plottoolbox >=105.0.1
    - pydantic >=2.0.0
    - scikit-learn
    - scipy
    - statsmodels
    - tabulate

test:
  imports:
    - tstoolbox
  commands:
    - pip check
    - tstoolbox --help
  requires:
    - pip

about:
  summary: Command line script and Python library to manipulate time series.
  license: BSD-3-Clause
  license_file: LICENSE.txt

extra:
  recipe-maintainers:
    - timcera
