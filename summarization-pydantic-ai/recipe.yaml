schema_version: 1

context:
  python_min: "3.10"
  version: "0.1.4"

package:
  name: summarization-pydantic-ai
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/s/summarization-pydantic-ai/summarization_pydantic_ai-${{ version }}.tar.gz
  sha256: 7d096ed9c3964638bc51dfd7df3a284033d7c5be968a3021a25471b1ab5f7b7e

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - hatchling
    - pip
  run:
    - python >=${{ python_min }}
    - pydantic-ai-slim >=1.74.0

tests:
  - python:
      imports:
        - summarization_pydantic_ai
      pip_check: true
      python_version: ${{ python_min }}.*

about:
  summary: Automatic Conversation Summarization and History Management for Pydantic AI
  license: MIT
  license_file: LICENSE
  homepage: https://github.com/vstorm-co/summarization-pydantic-ai

extra:
  recipe-maintainers:
    - timpalpant
