schema_version: 1

context:
  python_min: "3.10"
  version: "0.2.1"

package:
  name: pydantic-ai-todo
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/p/pydantic-ai-todo/pydantic_ai_todo-${{ version }}.tar.gz
  sha256: 5d02ef367ff3b3306a7913bf0ecba2ffa59eafe6148110f3d1df143ddc3ededd

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - hatchling
    - pip
  run:
    - python >=${{ python_min }}
    - pydantic-ai-slim >=1.74.0
    - pydantic >=2.0
    - asyncpg >=0.29.0

tests:
  - python:
      imports:
        - pydantic_ai_todo
      pip_check: true
      python_version: ${{ python_min }}.*

about:
  summary: Todo/task planning toolset for pydantic-ai agents
  # readme
  license: MIT
  # readme
  license_file: LICENSE  # readme
  homepage: https://github.com/vstorm-co/pydantic-ai-todo
  documentation: https://github.com/vstorm-co/pydantic-ai-todo

extra:
  recipe-maintainers:
    - timpalpant
