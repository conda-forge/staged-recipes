{% set name = "ecmean" %}
{% set version = "0.2.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/e/ecmean/ecmean-{{ version }}.tar.gz
  sha256: 88f1779a36101e2863e55d6d85d4029cfcc17b52e7b505b8998bd4675fede069

build:
  entry_points:
    - global_mean = ecmean.global_mean:gm_entry_point
    - performance_indices = ecmean.performance_indices:pi_entry_point
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - setuptools >=61.0
    - wheel
    - pip
  run:
    - python >={{ python_min }}
    - xarray
    - numpy
    - netcdf4
    - numba
    - dask-core
    - esmpy
    - xesmf
    - metpy
    - matplotlib-base
    - tabulate
    - cfgrib
    - seaborn
    - ruff
    - eccodes
    - xesmf

test:
  imports:
    - ecmean
  commands:
    - pip check
    - global_mean --help
    - performance_indices --help
  requires:
    - pip
    - python

about:
  home: https://github.com/oloapinivad/ecmean
  summary: A Global Climate Model lightweight evaluation tool
  doc_url: https://ecmean.readthedocs.io/en/latest/
  license: Apache-2.0
  license_file: LICENSE

extra:
  recipe-maintainers:
    - oloapinivad
