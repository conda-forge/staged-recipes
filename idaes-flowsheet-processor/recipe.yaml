schema_version: 1

context:
  version: "0.3.1"

package:
  name: idaes-flowsheet-processor
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/i/idaes-flowsheet-processor/idaes_flowsheet_processor-${{ version }}.tar.gz
  sha256: 59746e6f8648c56d051daac9aa532faa3272f9df295ff784b9736ca779891b1b

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python
    - setuptools >=64
    - setuptools-scm >=7
    - pip
  run:
    - python
    - pydantic >=2,<3
    - pyomo
    - plotly >=6.1.1
    - pandas >=2.2.3
    - numpy >=2
    - ipython

tests:
  - python:
      imports:
        - idaes_flowsheet_processor
      pip_check: true

about:
  license: BSD-3-Clause
  license_file:
    - LICENSE.md
    - COPYRIGHT.md
  homepage: https://github.com/prommis/idaes-flowsheet-processor

extra:
  recipe-maintainers:
    - sufikaur
