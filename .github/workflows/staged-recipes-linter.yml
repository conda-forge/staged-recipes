name: staged-recipes-linter

on:
  merge_group:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - labeled
      - unlabeled

# this workflow potentially runs untrusted code via python's `eval`
# so we can only give it access to a read-only github token
permissions:
  actions: read
  checks: read
  contents: read
  issues: read
  pull-requests: read
  statuses: read

jobs:
  linter:
    name: linter
    runs-on: ubuntu-slim
    defaults:
      run:
        shell: bash -leo pipefail {0}

    steps:
      - name: checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: install code
        uses: mamba-org/setup-micromamba@d7c9bd84e824b79d2af72a2d4196c7f4300d3476 # v3.0.0
        with:
          micromamba-version: "2.7.0-0"
          environment-name: lint
          condarc: |
            show_channel_urls: true
            channel_priority: strict
            channels:
              - conda-forge
          create-args: >-
            conda-smithy
            pygithub
            requests
            pixi

      - name: get pr details
        id: pr_details
        uses: matrix-org/pr-details-action@15bde5285d7850ba276cc3bd8a03733e3f24622a # v1.3
        with:
          owner: ${{ github.event_name == 'merge_group' && github.repository_owner || github.event.pull_request.head.repo.owner.login }}
          branch: ${{ github.event_name == 'merge_group' && github.ref || github.event.pull_request.head.ref }}

      - name: bump conda-forge-webservices linting
        if: github.event_name == 'merge_group'
        run: |
          python .github/workflows/scripts/bump_webservices_linter.py \
            --full-name=${{ github.repository }} \
            --head-ref=${{ github.event.merge_group.head_ref }} \
            --head-sha=${{ github.event.merge_group.head_sha }}
        env:
          CF_WEBSERVICES_TOKEN: ${{ secrets.CF_WEBSERVICES_TOKEN }}

      - name: lint
        run: |
          python .github/workflows/scripts/linter.py \
            --owner=${{ github.repository_owner }} \
            --pr-num=${{ steps.pr_details.outputs.pr_id }} \
          >> $GITHUB_STEP_SUMMARY
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
