name: Build openfoam13_for_pato linux-64

on:
  workflow_dispatch:  # triggered manually from GitHub Actions UI

jobs:
  build-linux:
    runs-on: ubuntu-22.04

    steps:
      - name: Free disk space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: false

      - name: Additional disk cleanup
        run: |
          sudo rm -rf /usr/share/doc /usr/share/man /usr/share/locale
          sudo apt-get clean
          sudo rm -rf /var/lib/apt/lists/*
          df -h

      - name: Add swap space
        run: |
          sudo fallocate -l 8G /swapfile
          sudo chmod 600 /swapfile
          sudo mkswap /swapfile
          sudo swapon /swapfile
          free -h
          swapon --show

      - name: Checkout staged-recipes
        uses: actions/checkout@v4
        with:
          repository: pato-devel/staged-recipes
          ref: openfoam13_for_pato
          token: ${{ secrets.PAT_TOKEN }}

      - name: Download OpenFOAM 13 source from GitHub
        run: |
          mkdir -p /tmp/of13_clone
          cd /tmp/of13_clone
          git clone --depth 1 https://github.com/OpenFOAM/OpenFOAM-13
          git clone --depth 1 https://github.com/OpenFOAM/ThirdParty-13
          mkdir -p /tmp/openfoam13_source/src/Linux/OpenFOAM
          tar cf /tmp/openfoam13_source/src/Linux/OpenFOAM/OpenFOAM-13.tar OpenFOAM-13
          tar cf /tmp/openfoam13_source/src/Linux/OpenFOAM/ThirdParty-13.tar ThirdParty-13
          rm -rf /tmp/of13_clone

      - name: Setup conda
        uses: conda-incubator/setup-miniconda@v3
        with:
          miniforge-version: latest
          channels: conda-forge
          channel-priority: strict

      - name: Install conda-build
        shell: bash -l {0}
        run: |
          conda install conda-build -c conda-forge --override-channels -y

      - name: Set source path in meta.yaml
        run: |
          cp -r recipes/openfoam13_for_pato /tmp/openfoam13_recipe
          python3 -c 'import re,os; m=open("/tmp/openfoam13_recipe/meta.yaml").read(); m=re.sub(r"^\s+url:.*\n","",m,flags=re.M); m=re.sub(r"^\s+sha256:.*\n","  path: /tmp/openfoam13_source\n",m,flags=re.M); open("/tmp/openfoam13_recipe/meta.yaml","w").write(m)'
          echo "--- meta.yaml after patch ---"
          cat /tmp/openfoam13_recipe/meta.yaml
          printf '%s\n' \
            'if [ "$(uname)" = "Linux" ]; then' \
            '    INT_H="$PREFIX/src/volume_openfoam13_for_pato/OpenFOAM/OpenFOAM-13/src/OpenFOAM/primitives/ints/int/int.H"' \
            '    sed -i "s|MAXMIN(string::size_type,string::size_type,string::size_type)|#ifdef __APPLE__\\nMAXMIN(string::size_type,string::size_type,string::size_type)\\n#endif|" "$INT_H"' \
            '    export CPATH="$PREFIX/include${CPATH:+:$CPATH}"' \
            '    export LIBRARY_PATH="$PREFIX/lib${LIBRARY_PATH:+:$LIBRARY_PATH}"' \
            'fi' \
            > /tmp/linux_patch1.sh
          sed -i '/tar xvf ThirdParty-13.tar/r /tmp/linux_patch1.sh' /tmp/openfoam13_recipe/build.sh
          printf '%s\n' \
            'if [ "$(uname)" = "Linux" ]; then' \
            '    export ZOLTAN_TYPE=none' \
            '    export WM_NCOMPPROCS=2' \
            'fi' \
            > /tmp/linux_patch2.sh
          sed -i '/source etc\/bashrc/r /tmp/linux_patch2.sh' /tmp/openfoam13_recipe/build.sh
          printf '%s\n' \
            'if [ "$(uname)" = "Linux" ]; then' \
            '    echo "Cleaning object files before packaging to save disk..."' \
            '    find "$PREFIX/src/volume_openfoam13_for_pato" -name "*.o" -delete 2>/dev/null || true' \
            '    find "$PREFIX/src/volume_openfoam13_for_pato" -name "*.dep" -delete 2>/dev/null || true' \
            '    df -h' \
            'fi' \
            > /tmp/linux_patch3.sh
          sed -i '/^\.\/Allwmake -j/r /tmp/linux_patch3.sh' /tmp/openfoam13_recipe/build.sh
          echo "--- build.sh around bashrc source ---"
          grep -A10 "source etc/bashrc" /tmp/openfoam13_recipe/build.sh
          echo "--- build.sh around Allwmake ---"
          grep -A8 "Allwmake" /tmp/openfoam13_recipe/build.sh

      - name: Build
        shell: bash -l {0}
        timeout-minutes: 300
        run: |
          df -h
          conda-build /tmp/openfoam13_recipe --no-test -c conda-forge --override-channels --croot /tmp/conda-bld 2>&1 | tee /tmp/build_full.log
          BUILD_EXIT=${PIPESTATUS[0]}
          df -h
          if [ $BUILD_EXIT -ne 0 ]; then
            echo "=== ERROR SUMMARY (grep for error/undefined/killed) ==="
            grep -n "error:\|Error:\|undefined reference\|cannot find -l\|No space left\|fatal error\|Killed\|signal" /tmp/build_full.log | grep -v "^Binary" | tail -80
            echo "=== LAST 50 LINES OF BUILD LOG ==="
            tail -50 /tmp/build_full.log
            exit $BUILD_EXIT
          fi

      - name: Save package as artifact
        uses: actions/upload-artifact@v4
        with:
          name: openfoam13-linux64-package
          path: /tmp/conda-bld/linux-64/openfoam13_for_pato-*
          retention-days: 5

      - name: Upload to Anaconda.org (bbdias)
        shell: bash -l {0}
        env:
          ANACONDA_TOKEN: ${{ secrets.ANACONDA_TOKEN }}
        run: |
          PKG=$(ls /tmp/conda-bld/linux-64/openfoam13_for_pato-*.conda 2>/dev/null | head -1)
          if [ -z "$PKG" ]; then
            PKG=$(ls /tmp/conda-bld/linux-64/openfoam13_for_pato-*.tar.bz2 2>/dev/null | head -1)
          fi
          echo "Found package: $PKG"
          conda install anaconda-client -c conda-forge -y
          anaconda --token "$ANACONDA_TOKEN" upload --user bbdias --label main "$PKG"
