schema_version: 1

context:
  python_min: "3.10"
  version: "0.2.7"

package:
  name: pydantic-ai-backend
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/p/pydantic-ai-backend/pydantic_ai_backend-${{ version }}.tar.gz
  sha256: c97fe5c322e4e09fe03ecf7305847e1164951716ff3f7455071116e25a764a93

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - hatchling
    - pip
  run:
    - python >=${{ python_min }}
    - pydantic >=2.0
    - wcmatch >=8.0

tests:
  - python:
      imports:
        - pydantic_ai_backend
      pip_check: true
      python_version: ${{ python_min }}.*

about:
  summary: File storage and sandbox backends for AI agents
  license: MIT
  license_file: LICENSE
  homepage: https://github.com/vstorm-co/pydantic-ai-backend

extra:
  recipe-maintainers:
    - timpalpant
