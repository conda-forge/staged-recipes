schema_version: 1

context:
  python_min: "3.10"
  version: "0.3.19"

package:
  name: pydantic-deep
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/p/pydantic-deep/pydantic_deep-${{ version }}.tar.gz
  sha256: 464756285a7c07218bd2a33b3283ad8bfa6eb21991f383395f4e6d41f18121eb

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  python:
    entry_points:
      - pydantic-deep = apps.cli.main:app

requirements:
  host:
    - python ${{ python_min }}.*
    - hatchling
    - pip
  run:
    - python >=${{ python_min }}
    - pydantic-ai-slim >=1.77.0
    - pydantic-ai-todo >=0.2.1
    - pydantic-ai-backend >=0.2.4
    - summarization-pydantic-ai >=0.1.3
    - subagents-pydantic-ai >=0.2.1
    - pydantic-ai-shields >=0.3.1
    - pydantic >=2.0
    - chardet >=5.0.0

tests:
  - python:
      imports:
        - pydantic_deep
      pip_check: true
      python_version: ${{ python_min }}.*
  - requirements:
      run:
        - pip
        - python ${{ python_min }}.*
    script:
      - pydantic-deep --help

about:
  summary: Batteries-included agent harness for Python — tool-calling, sandboxed execution, multi-agent teams, and unlimited context on Pydantic AI
  license: MIT
  license_file: LICENSE
  homepage: https://github.com/vstorm-co/pydantic-deepagents
  documentation: https://github.com/vstorm-co/pydantic-deepagents

extra:
  recipe-maintainers:
    - timpalpant
