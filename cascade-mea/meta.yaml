{% set version = "0.8.0" %}
{% set python_min = "3.10" %}

package:
  name: cascade-mea
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/c/cascade-mea/cascade_mea-{{ version }}.tar.gz
  sha256: 7040d2a9800c9642f8784f720e5d0c5872366e9ee0ae82546eae098672c69de4

build:
  number: 0
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  entry_points:
    - cascade = cascade.run_analysis:_run_with_log
    - cascade-info = cascade.scanner:main
    - cascade-ltpltd = cascade.ltpltd:main

requirements:
  host:
    - python {{ python_min }}
    - pip
    - setuptools >=61
  run:
    - python >={{ python_min }}
    - numpy
    - scipy
    - pandas
    - matplotlib-base
    - h5py
    - seaborn

test:
  requires:
    - python {{ python_min }}
  commands:
    - cascade --test

about:
  home: https://github.com/FA387/cascade-mea
  license: Apache-2.0
  license_file: LICENSE
  summary: "CASCADE — Criticality Avalanche Spike Cross-platform Analysis Detection Engine: a Multi-Manufacturer MEA Analysis Pipeline"
  doc_url: https://github.com/FA387/cascade-mea
  dev_url: https://github.com/FA387/cascade-mea

extra:
  recipe-maintainers:
    - fa387
