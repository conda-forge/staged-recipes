{% set version = "0.17.0" %}

package:
  name: vibepod
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/v/vibepod/vibepod-{{ version }}.tar.gz
  sha256: f8d5f09fffeee426cb6e81359b2711410727e832612b5d22a69dc5ec847cfad7

build:
  entry_points:
    - vp = vibepod.cli:app
    - vibepod = vibepod.cli:app
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python >=3.10
    - hatchling >=1.24.0
    - pip
  run:
    - python >=3.10
    - typer >=0.12.0
    - click >=8.0.0
    - rich >=13.0.0
    - docker-py >=7.0.0
    - pyyaml >=6.0.0
    - platformdirs >=4.0.0

test:
  imports:
    - vibepod
  commands:
    - pip check
    - vp --help
    - vibepod --help
  requires:
    - pip
    - python

about:
  home: https://vibepod.dev/
  summary: One CLI for containerized AI coding agents
  dev_url: https://github.com/VibePod/vibepod-cli
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - ReimarBauer
