schema_version: 1

context:
  python_min: "3.10"
  version: "0.3.2"

package:
  name: pydantic-ai-shields
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/p/pydantic-ai-shields/pydantic_ai_shields-${{ version }}.tar.gz
  sha256: 1bddaca4a9f49aff22d3e0a433f2b0a77a67019427dabb150753c9f45f138dde

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - hatchling
    - pip
  run:
    - python >=${{ python_min }}
    - pydantic-ai-slim >=1.74.0
    - pydantic >=2.0
    - genai-prices >=0.0.49

tests:
  - python:
      imports:
        - pydantic_ai_shields
      pip_check: true
      python_version: ${{ python_min }}.*

about:
  summary: Guardrail capabilities for Pydantic AI — cost tracking, tool permissions, input/output guards
  license: MIT
  license_file: LICENSE
  homepage: https://github.com/vstorm-co/pydantic-ai-shields
  documentation: https://vstorm-co.github.io/pydantic-ai-shields/

extra:
  recipe-maintainers:
    - timpalpant
