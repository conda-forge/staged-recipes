context:
  version: "0.4.0"

package:
  name: tofu-ls
  version: ${{ version }}

source:
  url: https://github.com/opentofu/tofu-ls/archive/refs/tags/v${{ version }}.tar.gz
  sha256: b491921c707197e5bf5eb4aa7631887f8979a39e383ea14b963a170e68626923
  target_directory: src

build:
  number: 0
  script:
    - cd src
    - go-licenses save . --save_path ../library_licenses
    - if: unix
      then: go build -v -o $PREFIX/bin/tofu-ls -ldflags="-s -w"
      else: go build -v -o %LIBRARY_BIN%\tofu-ls.exe -ldflags="-s"

requirements:
  build:
    - ${{ compiler("go-nocgo") }}
    - go-licenses

tests:
  - script: tofu-ls -help
  - package_contents:
      bin:
        - tofu-ls
      strict: true

about:
  homepage: https://github.com/opentofu/tofu-ls
  summary: OpenTofu Language Server
  description: |
    The official OpenTofu language server (tofu-ls) maintained by the
    OpenTofu Core Team provides IDE features to any LSP-compatible editor.
  license: MPL-2.0
  license_file:
    - src/LICENSE
    - library_licenses/
  documentation: https://github.com/opentofu/tofu-ls/tree/main/docs
  repository: https://github.com/opentofu/tofu-ls

extra:
  recipe-maintainers:
    - brycekbargar
