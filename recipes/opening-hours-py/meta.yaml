{% set version = "1.2.0" %}

package:
  name: opening-hours-py
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/o/opening-hours-py/opening_hours_py-{{ version }}.tar.gz
  sha256: 164cc1eff13231c8c157c685e75be758f074415360115139bcaa019cc1904b85

build:
  number: 0
  script:
    - export PYO3_PYTHON="{{ PYTHON }}"  # [not win]
    - set PYO3_PYTHON="{{ PYTHON }}"  # [win]
    - cargo-bundle-licenses --format yaml --output THIRDPARTY.yml
    - maturin build --release -i "{{ PYTHON }}"
    - "{{ PYTHON }} -m pip install opening-hours-py --no-index --find-links=target/wheels --no-deps -vv"

requirements:
  build:
    - {{ stdlib("c") }}
    - {{ compiler("c") }}
    - {{ compiler("rust") }}
    - cargo-bundle-licenses
  host:
    - python
    - poetry >=0.12
    - maturin >=1,<2
    - poetry-core
    - pip
  run:
    - python

test:
  imports:
    - opening_hours
  commands:
    - pip check
  requires:
    - pip
    - python

about:
  home: https://github.com/remi-dupre/opening-hours-rs/tree/master/opening-hours-py
  summary: A parser and toolkit for the opening_hours in OpenStreetMap written in Rust.
  license: MIT AND Apache-2.0
  license_file:
    - THIRDPARTY.yml
    - LICENSE-APACHE
    - LICENSE-MIT
    - opening-hours-py/LICENSE-APACHE
    - opening-hours-py/LICENSE-MIT
    - opening-hours-syntax/LICENSE-APACHE
    - opening-hours-syntax/LICENSE-MIT

extra:
  recipe-maintainers:
    - p-vdp
