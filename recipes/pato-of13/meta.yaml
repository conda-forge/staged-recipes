{% set name = "pato-of13" %}
{% set version = "dev" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

build:
  number: 1
  skip: True  # [win]

requirements:
  run:
    - openfoam13_for_pato
    - tar
    - m4

about:
  home: https://pato.ac
  license: NASA-1.3
  summary: 'PATO with OpenFOAM 13'
  description: |
    The Porous material Analysis Toolbox (PATO) compiled against OpenFOAM 13.
    On first activation, clones PATO-dev (openfoam13 branch) from GitLab and
    builds it. Requires SSH access to gitlab.com/PATO/PATO-dev.

extra:
  recipe-maintainers:
    - fsemerar
    - jmeurisse
