{% set name = "toolregistry" %}
{% set version = "0.11.2" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz
  sha256: b6b262e88f3f690f78ef4f189ba240cd513ce4516529c9efa6d13fff61d66bba

build:
  noarch: python
  number: 0
  script: {{ PYTHON }} -m pip install . -vv

requirements:
  host:
    - python >=3.10
    - setuptools >=61.0
    - pip
  run:
    - python >=3.10
    - pydantic >=2.7.2,<3.0.0
    - cloudpickle >=3.0.0
    - llm-rosetta >=0.5.1,<0.7.0
  run_constrained:
    - mcp >=1.0.0,<2.0.0
    - httpx >=0.28.1
    - langchain-core >=0.3,<0.4
    - langchain-community >=0.3,<0.4

test:
  imports:
    - toolregistry
    - toolregistry.tool_registry
  commands:
    - pip check
  requires:
    - pip

about:
  home: https://github.com/Oaklight/ToolRegistry
  summary: "ToolRegistry: A Protocol-Agnostic Tool Management Library for Function-Calling LLMs"
  license: MIT
  license_family: MIT
  license_file: LICENSE
  doc_url: https://toolregistry.readthedocs.io
  dev_url: https://github.com/Oaklight/ToolRegistry

extra:
  recipe-maintainers:
    - Oaklight
