# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "0.1.7"

package:
  name: lyric-py
  version: ${{ version }}

source:
  url: https://github.com/lyric-project/lyric-runtime/archive/refs/tags/v${{ version }}.tar.gz
  sha256: 0e63a7e00a1f7108d4fa406511c779bed9c1eca7ded688a9af01706f33878a95

build:
  number: 0
  script:
    env:
      PYTHONUTF8: "1"
      # Strip debug symbols — conda-forge default for Rust builds.
      CARGO_PROFILE_RELEASE_STRIP: symbols
    content:
      - if: unix
        then: |
          cd bindings/python/lyric-py
          cargo-bundle-licenses --format yaml --output THIRDPARTY.yml
          ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
        else: |
          cd bindings/python/lyric-py
          cargo-bundle-licenses --format yaml --output THIRDPARTY.yml
          ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  build:
    - ${{ compiler("c") }}
    - ${{ stdlib("c") }}
    - ${{ compiler("rust") }}
    - cargo-bundle-licenses
    - protobuf
    - pkg-config
    - if: build_platform != target_platform
      then:
        - python
        - cross-python_${{ target_platform }}
        - crossenv
        - maturin >=1.7,<2.0
  host:
    - python
    - pip
    - maturin >=1.7,<2.0
  run:
    - python
    - msgpack-python
    - lyric-task >=0.1.7

tests:
  - python:
      imports:
        - lyric
      pip_check: true

about:
  homepage: https://github.com/lyric-project/lyric-runtime
  repository: https://github.com/lyric-project/lyric-runtime
  license: MIT
  license_file:
    - LICENSE
    - bindings/python/lyric-py/THIRDPARTY.yml
  summary: Python bindings for Lyric — a Rust-powered secure WebAssembly sandbox for multi-language code execution.

extra:
  recipe-maintainers:
    - rxm7706
