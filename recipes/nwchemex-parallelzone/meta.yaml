{% set version = "0.1.41" %}

package:
  name: nwchemex-parallelzone
  version: {{ version }}

source:
  url: https://github.com/NWChemEx/ParallelZone/archive/refs/tags/v{{ version }}.tar.gz
  sha256: 262c31f7587b58b19111f88f3632f5642ebb5b99a4cf8b6c420c37d336607005

build:
  number: 0
  skip: true  # [not linux]

  string: {{ mpi_prefix }}_py{{ CONDA_PY }}h{{ PKG_HASH }}_{{ PKG_BUILDNUM }}

  run_exports:
    - {{ pin_subpackage('nwchemex-parallelzone', max_pin='x.x') }} {{ mpi_prefix }}_*
  ignore_run_exports:
    - catch2

requirements:
  build:
    - {{ compiler('cxx') }}
    - {{ stdlib('c') }}
    - cmake >=3.18
    - ninja
  host:
    - {{ mpi }}
    - catch2
    - spdlog
    - cereal
    - python
    - pybind11
    # cppjoules
  run:
    - python
    - {{ mpi }}

test:
  commands:
    - test -f ${PREFIX}/lib/parallelzone/libparallelzone$SHLIB_EXT
    - pip check
  imports:
    - parallelzone
  requires:
    - pip

about:
  home: https://nwchemex.github.io/ParallelZone/
  license: Apache-2.0
  license_file:
    - LICENSE
  summary: Parallel runtime library for NWChemEx project
  description: |
     ParallelZone is a parallel runtime system designed to be useful for object-oriented,
     task-based, scientific software. ParallelZone is still far from a complete project,
     but the feature set is expected to grow dynamically based on the needs of its consumers
     (primarily the NWChemEx project).
  dev_url: https://github.com/NWChemEx/ParallelZone

extra:
  recipe-maintainers:
    - awvwgk
