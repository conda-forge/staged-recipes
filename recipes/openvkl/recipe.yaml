schema_version: 1

context:
  version: "2.0.2"

package:
  name: openvkl
  version: ${{ version }}

source:
  url: https://github.com/RenderKit/openvkl/archive/refs/tags/v${{ version }}.tar.gz
  sha256: c5c6dd9984ee527e08d726770034a9bb7f52e06e65ec0a78368a5d930a53d122

build:
  number: 0

requirements:
  build:
    - ${{ compiler("c") }}
    - ${{ compiler("cxx") }}
    - ${{ stdlib("c") }}
    - cmake
    - ${{ "make" if unix }}
    - ispc
    - ${{ "jom" if win }}
  host:
    - embree
    - openvdb
    - rkcommon
  run_exports:
    - ${{ pin_subpackage("openvkl", upper_bound="x") }}

tests:
  - package_contents:
      include:
        - openvkl/*
      lib:
        - openvkl

about:
  homepage: https://www.openvkl.org
  repository: https://github.com/RenderKit/openvkl
  documentation: https://github.com/RenderKit/openvkl/blob/v{{ version }}/README.md
  license: Apache-2.0
  license_file: LICENSE.txt
  summary: Intel(R) Open Volume Kernel Library
  description: |
    Intel® Open Volume Kernel Library (Intel® Open VKL) is a collection of high performance volume computation kernels.

    With Open VKL, you can improve your volume rendering application using a wide variety of volumetric data structures, as well as performance-optimized traversal and sampling algorithms.

    We optimize Open VKL the latest x86 processors with support for SSE, AVX, AVX2, and AVX-512 instructions, and for ARM processors with support for NEON instructions.
    Open VKL supports Intel GPUs based on the Xe HPG microarchitecture (Intel® Arc™ GPU) under Linux and Windows and Xe HPC microarchitecture (Intel® Data Center GPU Flex Series and Intel® Data Center GPU Max Series) under Linux.
    Intel GPU support leverages the SYCL open standard programming language.

    Open VKL is available as open source under the Apache 2.0 license.

extra:
  recipe-maintainers:
    - eunos-1128
