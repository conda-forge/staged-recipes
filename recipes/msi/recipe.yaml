context:
  version: "4.2.4"

package:
  name: msi
  version: ${{ version }}

source:
  url: https://github.com/EarthScope/msi/archive/refs/tags/v${{ version }}.tar.gz
  sha256: 3b7e7d3ec805fd3461c55ae64e72c43d1ba58d1855ab1af7d9755ceed2917c78

build:
  number: 0
  skip:
    - win
  script:
    - make
    - install -d $PREFIX/bin
    - install -m 755 src/msi $PREFIX/bin/msi

requirements:
  build:
    - ${{ compiler('c') }}
    - ${{ stdlib('c') }}
    - make

tests:
  - script:
      - msi -h

about:
  homepage: https://epic.earthscope.org/content/software-resources
  summary: Mini-SEED inspector
  description: |
    msi is a command-line utility for inspecting mini-SEED data records.
    It prints headers, data summaries, and gap/overlap information from
    mini-SEED files.
  license: Apache-2.0
  license_file: LICENSE
  repository: https://github.com/EarthScope/msi

extra:
  recipe-maintainers:
    - omid-earthscope
