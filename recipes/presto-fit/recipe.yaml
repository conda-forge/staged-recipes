context:
  version: "0.8.1"
  python_min: "3.11"

package:
  # conda-forge name; the importable module and CLI are still `presto`.
  name: presto-fit
  version: ${{ version }}

source:
  url: https://github.com/cole-group/presto/archive/${{ version }}.tar.gz
  sha256: 6335ea09d39194aeb4f2497a6f7eadd910a2deb6090e901160bb933af6323601

build:
  number: 0
  # Linux-only: several deps are Linux-only and conda-forge forbids skips on noarch.
  skip: not linux or match(python, "<" ~ python_min)
  script:
    env:
      # hatch-vcs cannot infer the version from the .git-less archive.
      SETUPTOOLS_SCM_PRETEND_VERSION: ${{ version }}
    content: python -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python
    - pip
    - hatchling
    - hatch-vcs
  run:
    - python
    - pytorch >=2.8.0
    - ambertools
    # older datasets import the removed pyarrow.PyExtensionType (gone in pyarrow >=16).
    - datasets >=4.8
    - descent >=0.6.0
    - h5py
    - jupyter
    - loguru
    - mdtraj
    - nglview
    - openff-forcefields >=2026.01.0
    - openff-interchange >=0.4.11
    - openff-toolkit >=0.17.0
    - openff-units
    - openmm >=8.5.0
    - openmm-ml >=1.6
    - pydantic >=2
    - pydantic-settings
    - pydantic-units
    - pyyaml
    - rdkit >=2024.03.6
    - rich >=14.3.1,<15
    - seaborn
    - smee-base >=0.17.0
    - smirnoff-plugins >=0.0.4
    - tensorboard
    - tensorboardx

tests:
  - python:
      imports:
        - presto
      pip_check: true
  - script:
      - presto --help
  - script:
      - pytest -v --color=yes -m "not slow" --pyargs presto.tests
    requirements:
      run:
        - pytest
        - hypothesis

about:
  homepage: https://github.com/cole-group/presto
  summary: 'Fast parameterisation of bespoke MM force fields using MLPs.'
  description: |
    Train bespoke SMIRNOFF force fields quickly using a machine learning potential (MLP).
    All valence parameters (bonds, angles, proper torsions, and improper torsions) are trained
    to MLP energies sampled using molecular dynamics.
  license: MIT
  license_file:
    - LICENSE
    - presto/models/EGRET_1_LICENSE
  documentation: https://cole-group.github.io/presto/latest/
  repository: https://github.com/cole-group/presto/

extra:
  recipe-maintainers:
    - fjclark
