# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "2.1.0"
  python_min: "3.11"

package:
  name: jsonquerylang
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/j/jsonquerylang/jsonquerylang-${{ version }}.tar.gz
  sha256: 9218289f4090bf4c7eac459fcf93cb6412420820e88b5465ee252f761cfc0e32

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - setuptools
  run:
    - python >=${{ python_min }}
    - regex

tests:
  - python:
      imports:
        - jsonquerylang
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  homepage: https://pypi.org/project/jsonquerylang/
  license: ISC
  license_file: LICENSE.md
  summary: A lightweight, flexible, and expandable JSON query language
  description: |
    A Python implementation of JSON Query, a small, flexible, and expandable
    JSON query language. Try it out on the online playground at
    https://jsonquerylang.org.
  repository: https://github.com/jsonquerylang/jsonquery-python

extra:
  recipe-maintainers:
    - rxm7706
