# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "6.0.0"

package:
  name: http-router
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/h/http-router/http_router-${{ version }}.tar.gz
  sha256: 17d486280081c1f8c04583e37ffb242f02940a083feca26fe4649e11d2150e74

build:
  number: 0
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  build:
    - ${{ compiler('c') }}
    - ${{ stdlib('c') }}
    - if: build_platform != target_platform
      then:
        - python
        - cross-python_${{ target_platform }}
        - cython
  host:
    - python
    - pip
    - setuptools
    - wheel
    - cython
  run:
    - python

tests:
  - python:
      imports:
        - http_router
      pip_check: true

about:
  summary: A simple router system for HTTP applications
  description: |
    HTTP Router is a router for HTTP applications. It maps URL paths to
    handlers, supporting static paths, dynamic path parameters with type
    converters, and regular expressions. The performance-critical routing
    core is implemented in Cython.
  license: MIT
  license_file: LICENSE
  homepage: https://github.com/klen/http-router
  repository: https://github.com/klen/http-router

extra:
  recipe-maintainers:
    - rxm7706
