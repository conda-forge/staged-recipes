package:
  name: cuda-arch
  version: ${{ version }}

source:
  url: https://developer.download.nvidia.com/compute/cuda/redist/cuda_documentation/LICENSE.txt
  sha256: e2c71babfd18a8e69542dd7e9ca018f9caa438094001a58e6bc4d8c999bf0d07

build:
  # Add new versions to conda_build_config.yaml; only update the build number if
  # dependencies change.
  number: 0
  noarch: generic

requirements:
  run_exports:
    - cuda-arch >=${{ version }}
  run_constraints:
    - __cuda_arch ${{ version }}.*

tests:
  - script:
    - exit 0

about:
  homepage: https://developer.nvidia.com/cuda-toolkit
  summary: 'A meta-package that pins a minimum supported CUDA architecture'
  description: >
    The cuda-arch package represents a minimum supported target CUDA architecture / compute
    capability. Depending on this package declares that a CUDA device with at least the
    declared compute capability is required.

    Similar to how the cuda-version package is constrained by the __cuda virtual package,
    the cuda-arch package is constrained by the __cuda_arch virtual package. The __cuda_arch
    virtual package provides the minimum compute capability of the available CUDA devices
    detected on the system. The cuda-arch package allows packages to express a minimum
    supported compute capability without depending on __cuda_arch directly.
  license: LicenseRef-NVIDIA-End-User-License-Agreement
  license_file: LICENSE.txt

extra:
  recipe-maintainers:
    - conda-forge/cuda
