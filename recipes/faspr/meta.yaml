{% set name = "faspr" %}
{% set version = "1.0.0" %}
{% set commit = "0d55732fd6307f373018c6bddd842291c355c5f7" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://github.com/tommyhuangthu/FASPR/archive/{{ commit }}.tar.gz
  sha256: 6007875e2205031af886dabccb5742a58a41e3bb2dbff96d110c681521aae866

build:
  number: 0
  skip: true  # [win]

requirements:
  build:
    - {{ compiler('cxx') }}
    - {{ stdlib("c") }}

test:
  commands:
    - FASPR

about:
  home: https://github.com/tommyhuangthu/FASPR
  summary: "Fast and Accurate Side-chain Packing (FASPR)"
  description: |
    FASPR is a tool for fast and accurate protein side-chain packing.
  license: MIT
  license_file: LICENSE  # e.g. LICENSE
  doc_url: https://github.com/tommyhuangthu/FASPR
  dev_url: https://github.com/tommyhuangthu/FASPR

extra:
  recipe-maintainers:
    - gieses
