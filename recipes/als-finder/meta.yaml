{% set name = "als-finder" %}
{% set version = "1.0.0" %}
{% set python_min = "3.8" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://github.com/cms-2024-hudak/als-finder/archive/refs/tags/v{{ version }}.tar.gz
  sha256: f6ecdd05058fff9da173d3b38f49f26a4a2d3f50b597a1a4aba4c4834ecd31aa

build:
  noarch: python
  number: 0
  script: SETUPTOOLS_SCM_PRETEND_VERSION={{ version }} {{ PYTHON }} -m pip install . -vv
  entry_points:
    - als-finder=als_finder.cli:cli

requirements:
  host:
    - python {{ python_min }}
    - setuptools
    - pip
    - setuptools_scm
  run:
    - python >={{ python_min }}
    - geopandas
    - requests
    - click
    - python-dotenv
    - shapely
    - pyproj
    - tqdm
    - pyogrio
    - pdal
    - python-pdal

test:
  requires:
    - python {{ python_min }}
  imports:
    - als_finder
  commands:
    - als-finder --help

about:
  home: https://github.com/cms-2024-hudak/als-finder
  license: MIT
  license_family: MIT
  license_file: LICENSE
  summary: Cloud-native CLI engine for discovering raw LiDAR point cloud metadata globally.

extra:
  recipe-maintainers:
    - jgrn307
