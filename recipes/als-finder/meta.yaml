{% set name = "als-finder" %}
{% set version = "1.0.0" %} # Overwritten dynamically by Conda-forge automation bots

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://github.com/cms-2024-hudak/als-finder/archive/refs/tags/v{{ version }}.tar.gz
  # sha256: Auto-injected by conda-forge

build:
  noarch: python
  number: 0
  script: {{ PYTHON }} -m pip install . -vv
  entry_points:
    - als-finder=als_finder.cli:cli

requirements:
  host:
    - python >=3.8
    - pip
    - setuptools_scm
  run:
    - python >=3.8
    - geopandas
    - requests
    - click
    - python-dotenv
    - shapely
    - pyproj
    - tqdm
    - pyogrio
    - pdal
    - python-pdal

test:
  imports:
    - als_finder
  commands:
    - als-finder --help

about:
  home: https://github.com/cms-2024-hudak/als-finder
  license: MIT
  license_family: MIT
  license_file: LICENSE
  summary: Cloud-native CLI engine for discovering raw LiDAR point cloud metadata globally.
