{% set name = "als-finder" %}
{% set version = "1.1.1" %}
{% set python_min = "3.8" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://github.com/cms-2024-hudak/als-finder/archive/refs/tags/v{{ version }}.tar.gz
  sha256: 26cb4b4459aad389b0758acd3f90d75b035a56d2c41707ff1876548a5a14f4ca

build:
  noarch: python
  number: 0
  entry_points:
    - als-finder=als_finder.cli:cli

requirements:
  host:
    - python {{ python_min }}
    - setuptools
    - pip
    - setuptools_scm
  run:
    - python >={{ python_min }}
    - geopandas
    - requests
    - click
    - python-dotenv
    - shapely
    - pyproj
    - tqdm
    - pyogrio
    - pdal
    - python-pdal

test:
  requires:
    - python {{ python_min }}
  imports:
    - als_finder
  commands:
    - als-finder --help

about:
  home: https://github.com/cms-2024-hudak/als-finder
  license: MIT
  license_family: MIT
  license_file: LICENSE
  summary: Cloud-native CLI engine for discovering raw LiDAR point cloud metadata globally.

extra:
  recipe-maintainers:
    - jgrn307
