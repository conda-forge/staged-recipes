context:
  version: "1.0.0"

package:
  name: apple-container
  version: ${{ version }}

source:
  url: https://github.com/apple/container/archive/refs/tags/${{ version }}.tar.gz
  sha256: 9f5379d400d23b6f296b7bae8f71f982dfdc1d52bf072ac81318472a734d21f7

build:
  number: 0
  # Apple silicon only: the tool creates Linux VMs via the Virtualization framework
  # on macOS 26 (Apple silicon).
  skip:
    - not (osx and arm64)
  script:
    file: build.sh
    env:
      # The Makefile derives these from `git`, which is unavailable when building
      # from the release tarball. Embed the package version instead.
      RELEASE_VERSION: ${{ version }}
      GIT_COMMIT: ${{ version }}

requirements:
  build:
    # Swift Package Manager uses git to resolve the pinned dependencies.
    - git
  # No host/run conda dependencies: the binaries are self-contained Swift
  # executables that link only against system frameworks (and the Swift runtime
  # shipped with macOS 26). They are built with the system Swift toolchain
  # (Xcode 26 / Swift 6.2), which conda-forge does not ship.

tests:
  - script:
      - container --version
      - container --help
  - package_contents:
      files:
        - bin/container
        - bin/container-apiserver
        - libexec/container/plugins/container-runtime-linux/bin/container-runtime-linux
        - libexec/container/plugins/container-network-vmnet/bin/container-network-vmnet
        - libexec/container/plugins/container-core-images/bin/container-core-images
        - libexec/container/plugins/machine-apiserver/bin/machine-apiserver

about:
  homepage: https://github.com/apple/container
  summary: Create and run Linux containers as lightweight virtual machines on macOS (Apple silicon)
  description: |
    `container` is a tool to create and run Linux containers as lightweight
    virtual machines on Apple silicon Macs. It is written in Swift, consumes and
    produces OCI-compatible container images, and is supported on macOS 26.
  license: Apache-2.0
  license_file:
    - LICENSE
    - NOTICE.md
  documentation: https://apple.github.io/container/documentation/
  repository: https://github.com/apple/container

extra:
  feedstock-name: apple-container
  recipe-maintainers:
    - xhochy
