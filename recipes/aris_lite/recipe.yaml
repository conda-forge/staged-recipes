schema_version: 1

context:
  python_min: "3.12"
  version: "0.3.0"

package:
  name: aris_lite
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/a/aris_lite/aris_lite-${{ version }}.tar.gz
  sha256: 80b04175d7ff4e02f4a66f53b36f9a7ecf4dba39c79f09220102fc0e0f748673

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  python:
    entry_points:
      - aris = aris_lite.cli.main:main_cli
      - aris-1go = aris_lite.cli.legacy_wrappers:legacy_1go_cli
      - aris-calc-waterbudget = aris_lite.cli.legacy_wrappers:legacy_waterbudget_cli
      - aris-calc-pheno = aris_lite.cli.legacy_wrappers:legacy_pheno_cli
      - aris-calc-yield = aris_lite.cli.legacy_wrappers:legacy_yield_cli

requirements:
  host:
    - python ${{ python_min }}.*
    - flit-core >=3.11,<4
    - pip
  run:
    - python >=${{ python_min }}
    - dask-core
    - numpy
    - pandas
    - snowmaus
    - xarray
    - zarr >=3

tests:
  - python:
      imports:
        - aris_lite
      pip_check: true
      python_version: ${{ python_min }}.*
  - files:
      source:
        - tests/
    requirements:
      run:
        - python ${{ python_min }}.*
    script:
      - aris --help
      - aris 1go --help
      - aris calc waterbudget --help
      - aris calc pheno --help
      - aris calc yield --help
      - python -m unittest discover -s tests -p "test_*.py"

about:
  summary: Implementation of the ARIS-lite model package.
  license: MIT
  license_file: LICENSE.txt
  homepage: https://github.com/boku-met/aris_lite
  documentation: https://aris-lite.readthedocs.io
  repository: https://github.com/boku-met/aris_lite

extra:
  recipe-maintainers:
    - j-haacker
