context:
  version: "0.86.25"

package:
  name: hatchet-cli
  version: ${{ version }}

source:
  - url: https://github.com/hatchet-dev/hatchet/archive/refs/tags/v${{ version }}.tar.gz
    sha256: 0b03d7876f15b487e2326297ac279160a3b94fc384b1fcfce33c3b69e99d61ce
    target_directory: src
  - url: https://raw.githubusercontent.com/mattn/go-localereader/6bae6c923850ab5e0da9f36f69811ffe17064228/LICENSE
    sha256: dceede03550621e65ec7b79fcba87cf6dbb9d31132a8ae71a8fe8ceec0af7da3
    file_name: LICENSE-go-localereader

build:
  number: 0
  script:
    - cd src/cmd/hatchet-cli
    - go-licenses save . --save_path ../../../library_licenses --ignore github.com/mattn/go-localereader
    - if: unix
      then: go build -v -o $PREFIX/bin/hatchet -ldflags="-s -w"
      else: go build -v -o %LIBRARY_BIN%\hatchet.exe -ldflags="-s"

requirements:
  build:
    - ${{ compiler("go-nocgo") }}
    - go-licenses

tests:
  - script:
    - hatchet --version
    - hatchet --help
  - package_contents:
      bin:
        - hatchet
      strict: true

about:
  homepage: https://hatchet.run
  summary: CLI for the Hatchet workflow orchestration engine
  description: |
    Hatchet is an orchestration engine for background tasks, AI agents, and
    durable workflows. This package provides the hatchet CLI for interacting
    with Hatchet.
  license: MIT
  license_file:
    - src/LICENSE
    - library_licenses/
    - LICENSE-go-localereader
  documentation: https://docs.hatchet.run/cli
  repository: https://github.com/hatchet-dev/hatchet

extra:
  recipe-maintainers:
    - xhochy
