{% set name = "galform_analysis" %}
{% set version = "0.1.5" %}
{% set python_min = "3.12" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/galform_analysis-{{ version }}.tar.gz
  sha256: 2aee3d52b4daa41dfbf17ee3a5510efa36ebff2bb114872ceff6530776abc609

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0
  skip: True  # [win]

requirements:
  host:
    - python {{ python_min }}
    - setuptools >=61.0
    - pip
  run:
    - python >={{ python_min }}
    - numpy >=1.23.0
    - scipy >=1.7.0
    - matplotlib-base >=3.3.0
    - polars >=1.0.0
    - h5py >=3.0.0
    - seaborn >=0.11.0
    - corrfunc >=2.3.0

test:
  requires:
    - python {{ python_min }}
    - pip
  imports:
    - galform_analysis
    - galform_analysis.analysis
    - galform_analysis.readers
  commands:
    - pip check

about:
  home: https://github.com/OscarHickman/galform_analysis
  summary: A modular Python framework for reading and analyzing GALFORM HDF5 simulation outputs.
  license: MIT
  license_file: LICENSE
  dev_url: https://github.com/OscarHickman/galform_analysis

extra:
  recipe-maintainers:
    - OscarHickman
