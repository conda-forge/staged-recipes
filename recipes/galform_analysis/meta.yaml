{% set name = "galform_analysis" %}
{% set version = "0.1.3" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.io/packages/source/{{ name[0] }}/{{ name }}/galform_analysis-{{ version }}.tar.gz
  sha256: 69eb0223b298e560dd46c45a3fc70fd8d30c35cb75fdff6f3519004e33e08092

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python >=3.12
    - setuptools >=61.0
    - pip
  run:
    - python >=3.12
    - numpy >=1.23.0
    - scipy >=1.7.0
    - matplotlib-base >=3.3.0
    - polars >=1.0.0
    - h5py >=3.0.0
    - seaborn >=0.11.0
    - corrfunc >=2.3.0

test:
  imports:
    - galform_analysis
    - galform_analysis.analysis
    - galform_analysis.readers
  commands:
    - pip check
  requires:
    - pip

about:
  home: https://github.com/OscarHickman/galform_analysis
  summary: A modular Python framework for reading and analyzing GALFORM HDF5 simulation outputs.
  license: MIT
  license_file: LICENSE
  dev_url: https://github.com/OscarHickman/galform_analysis

extra:
  recipe-maintainers:
    - OscarHickman
