schema_version: 1

context:
  version: "0.0.1"

recipe:
  name: dinrail-split
  version: ${{ version }}

source:
  url: https://github.com/gbionics/dinrail/archive/refs/tags/v${{ version }}.tar.gz
  sha256: 557062770312790c9ff3818265b375be6fa94c70e81423700f3f651ce20e54be

outputs:
  - package:
      name: libdinrail
    build:
      number: 0
      script:
        file: build-libdinrail
    requirements:
      build:
        - ${{ compiler('cxx') }}
        - ${{ stdlib('c') }}
        - cmake
        - ninja
        - pkg-config
      host:
        - ycm-cmake-modules
        - sharedlibpp
      run_exports:
        - ${{ pin_subpackage('libdinrail', upper_bound='x.x') }}
    tests:
      - package_contents:
          lib:
            - dinrail
      - package_contents:
          include:
            - dinrail/Device.h

  - package:
      name: dinrail-devices
    build:
      number: 0
      script:
        file: build-dinrail-devices
    requirements:
      build:
        - ${{ compiler('cxx') }}
        - ${{ stdlib('c') }}
        - cmake
        - ninja
        - pkg-config
      host:
        - ${{ pin_subpackage('libdinrail', exact=True) }}
        - ycm-cmake-modules
        - sharedlibpp
      run:
        - ${{ pin_subpackage('libdinrail', exact=True) }}
    tests:
      - package_contents:
          files:
            - lib/*dinrail-device-fakeMotionControl*

  - package:
      name: dinrail-tools
    build:
      number: 0
      script:
        file: build-dinrail-tools
    requirements:
      build:
        - ${{ compiler('cxx') }}
        - ${{ stdlib('c') }}
        - cmake
        - ninja
        - pkg-config
      host:
        - ${{ pin_subpackage('libdinrail', exact=True) }}
        - cli11
        - ycm-cmake-modules
        - sharedlibpp
      run:
        - ${{ pin_subpackage('libdinrail', exact=True) }}
    tests:
      - script:
          - dinrail --help

  - package:
      name: dinrail
    requirements:
      run:
        - ${{ pin_subpackage('libdinrail', exact=True) }}
        - ${{ pin_subpackage('dinrail-devices', exact=True) }}
        - ${{ pin_subpackage('dinrail-tools', exact=True) }}

  - package:
      name: libdinrail-yarp
    build:
      script:
        file: build-libdinrail-yarp
    requirements:
      build:
        - ${{ compiler('cxx') }}
        - ${{ stdlib('c') }}
        - cmake
        - ninja
        - pkg-config
      host:
        - libdinrail
        - yarp
        - ycm-cmake-modules
        - sharedlibpp
      run_exports:
        - ${{ pin_subpackage('libdinrail-yarp', upper_bound='x.x') }}
    tests:
      - package_contents:
          lib:
            - dinrail-yarp-conversions
      - package_contents:
          include:
            - dinrail/YarpPropertyConverter.h

  - package:
      name: dinrail-yarp-devices
    build:
      number: 0
      script:
        file: build-dinrail-yarp-devices
    requirements:
      build:
        - ${{ compiler('cxx') }}
        - ${{ stdlib('c') }}
        - cmake
        - ninja
        - pkg-config
      host:
        - ${{ pin_subpackage('libdinrail', exact=True) }}
        - ${{ pin_subpackage('libdinrail-yarp', exact=True) }}
        - libyarp
        - ycm-cmake-modules
        - sharedlibpp
    tests:
      - package_contents:
          files:
            - share/yarp/plugins/*

  - package:
      name: dinrail-yarp-tools
    build:
      number: 0
      script:
        file: build-dinrail-yarp-tools
    requirements:
      build:
        - ${{ compiler('cxx') }}
        - ${{ stdlib('c') }}
        - cmake
        - ninja
        - pkg-config
      host:
        - ${{ pin_subpackage('libdinrail', exact=True) }}
        - libyarp
        - ycm-cmake-modules
        - sharedlibpp
      run:
        - ${{ pin_subpackage('libdinrail', exact=True) }}
        - ${{ pin_subpackage('dinrail-tools', exact=True) }}
    tests:
      - package_contents:
          files:
            - bin/dinrail-runner*

  - package:
      name: dinrail-yarp
    requirements:
      run:
        - ${{ pin_subpackage('libdinrail-yarp', exact=True) }}
        - ${{ pin_subpackage('dinrail-yarp-devices', exact=True) }}
        - ${{ pin_subpackage('dinrail-yarp-tools', exact=True) }}

about:
  homepage: https://github.com/gbionics/dinrail
  summary: Lightweight robot device abstraction framework.
  license: BSD-3-Clause
  license_file: LICENSE
  repository: https://github.com/gbionics/dinrail

extra:
  recipe-maintainers:
    - traversaro