context:
  version: 3.3.0

package:
  name: h5cpp
  version: ${{ version }}

source:
    url: https://github.com/pni-libraries/libpninexus/archive/refs/tags/v${{ version }}.tar.gz
    sha256: 54b902829ba7a01f889976d72e29c782a07675ae664896da1149c7c9a3f921b0
    # patches:
    #  - if: win
    #    then:
    #       - remove-findhdf5.patch

build:
    number: 0
    script:
      - if: win
        then:  set CL=/DH5_BUILT_AS_DYNAMIC_LIB=1 %CL%
      - if: win
        then: cmake -B build -G Ninja  %CMAKE_ARGS%  -DHDF5_FIND_DEBUG=ON  -DHDF5_USE_STATIC_LIBRARIES=OFF -DPNINEXUS_CONAN=DISABLE -DCMAKE_BUILD_TYPE=$BUILDTYPE
        else: cmake -B build -G Ninja  ${CMAKE_ARGS}  -DPNINEXUS_CONAN=DISABLE -DCMAKE_BUILD_TYPE=$BUILDTYPE
      - cmake --build build  --target all
      # - cmake --build build  --target api_doc
      # - cmake --build build  --target html
      # - cmake --build build  --target check -- -j3  CTEST_OUTPUT_ON_FAILURE=TRUE
      - cmake --build build  --target check

requirements:
  build:
    - ${{ compiler('cxx') }}
    - ${{ stdlib('c') }}
    - cmake
    - ninja
    - doxygen
    - graphviz
    - ghostscript
    - cppunit
    - sphinx
    - breathe
    - pygments
    # - latex
  host:
    - hdf5
    - h5cpp
    - boost
    - zlib

tests:
    - package_contents:
        # include:
        #   - h5cpp/file/file.hpp
        #   - h5cpp/core/*.hpp
        #   - h5cpp/attribute/*.hpp
        #   - h5cpp/dataspace/*.hpp
        #   - h5cpp/datatype/*.hpp
        #   - h5cpp/error/*.hpp
        #   - h5cpp/file/*.hpp
        #   - h5cpp/filter/*.hpp
        #   - h5cpp/node/*.hpp
        #   - h5cpp/property/*.hpp
        #   - h5cpp/utilities/*.hpp
        #   - h5cpp/contrib/nexus/ebool.hpp
        #   - h5cpp/contrib/stl/*.hpp
        lib:
          - pninexus

about:
  homepage: https://github.com/pni-libraries/libpninexus
  license: GPL-2.0-only
  license_family: GPL
  license_file: COPYING
  summary: C++ NeXus library
  description: |
    libpninexus is C++ library to create NeXus files.
    It provides NeXus tree-structure builder basedon XML (NXDL-like) input,
    NeXus path parsers and other algorithms to access NeXus files.
  documentation: https://pni-libraries.github.io/libpninexus
  repository: https://github.com/pni-libraries/libpninexus

extra:
  recipe-maintainers:
    - jkotan
    - yuelongyu
