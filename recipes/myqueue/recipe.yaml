schema_version: 1

context:
  version: 26.3.0

package:
  name: myqueue
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/m/myqueue/myqueue-${{ version }}.tar.gz
  sha256: 8a0016bbc570f262f5324eaa534e0137816da347087fc52b1354d2e3f7b27f3c

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  python:
    entry_points:
      - mq = myqueue.cli:main

requirements:
  host:
    - python ${{ python_min }}.*
    - setuptools >=61.0
    - pip
  run:
    - python >=${{ python_min }}
    - rich
    - networkx
    - typing_extensions

tests:
  - python:
      imports:
        - myqueue
  - requirements:
      run:
        - pip
        - python ${{ python_min }}.*
    script:
      - pip check
      - mq --help

about:
  summary: Frontend for SLURM/LSF/PBS
  license: GPL-3.0-only
  license_file: LICENSE
  homepage: https://myqueue.readthedocs.io

extra:
  recipe-maintainers:
    - jan-janssen
