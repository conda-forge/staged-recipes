{% set name = "stackformer" %}
{% set version = "0.1.8" %}
{% set python_min = "3.10" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/s/stackformer/stackformer-{{ version }}.tar.gz
  sha256: 4ae7daaf320c9225191f2373bf2f1d006429d7e6ce228c5a36d0af085061b2e2

build:
  number: 0
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python {{ python_min }}
    - pip
    - setuptools >=61
    - wheel
  run:
    - python >={{ python_min }}
    - pytorch >=2.0,<2.7
    - numpy >=1.23,<3.0
    - tqdm >=4.5,<5.0
    - tensorboard >=2.14,<3.0
    - wandb >=0.17,<1.0

test:
  imports:
    - stackformer
  commands:
    - python -c "import stackformer"
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://github.com/Gurumurthy30/Stackformer
  summary: Modular PyTorch transformer components for building and experimenting with modern attention architectures
  license: MIT
  license_family: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - Gurumurthy30
