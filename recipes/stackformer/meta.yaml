{% set name = "stackformer" %}
{% set version = "0.1.9" %}
{% set python_min = "3.10" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/s/stackformer/stackformer-{{ version }}.tar.gz
  sha256: f4f838ec315717d470994837ef1b2e5c61484d6790ccea9cabaafa014bef9007

build:
  number: 0
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python {{ python_min }}
    - pip
    - setuptools >=61
    - wheel
  run:
    - python >={{ python_min }}
    - pytorch >=2.0,<2.7
    - numpy >=1.23,<3.0
    - tqdm >=4.5,<5.0
    - tensorboard >=2.14,<3.0
    - wandb >=0.17,<1.0

test:
  imports:
    - stackformer
  commands:
    - pip check
  requires:
    - python {{ python_min }}
    - pip

about:
  home: https://github.com/Gurumurthy30/Stackformer
  summary: Modular PyTorch transformer components for building and experimenting with modern attention architectures
  license: MIT
  license_family: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - Gurumurthy30
