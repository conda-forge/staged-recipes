context:
  version: "0.2.0"
  python_min: "3.11"

package:
  name: repl-session
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/r/repl-session/repl_session-${{ version }}.tar.gz
  sha256: 478061d7e50a691f04a002ae9776c444680b781a3e37d403a9c56f177fa01fa1

build:
  number: 0
  noarch: python
  python:
    entry_points:
      - repl-session = repl_session:main
  script: uv pip install --python ${{ PYTHON }} . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - uv
    - setuptools
  run:
    - python >=${{ python_min }}
    - argh >=0.30.5
    - msgspec >=0.19.0
    - pexpect >=4.9.0

tests:
  - python:
      imports:
        - repl_session
      python_version: ${{ python_min }}.*
  - requirements:
      run:
        - python ${{ python_min }}.*
        - pip
    script:
      - pip check
      - repl-session --help

about:
  homepage: https://github.com/entangled/repl-session
  summary: Runs a session with a Read-Eval-Print-Loop (REPL)
  license: Apache-2.0
  license_file: LICENSE
  repository: https://github.com/entangled/repl-session

extra:
  recipe-maintainers:
    - tdejager
