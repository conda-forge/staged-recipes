{% set version = '1.0.1' %}
{% set posix = 'm2-' if win else '' %}

package:
  name: r-sgdgmf
  version: "{{ version|replace('-', '_') }}"

source:
  url:
    - {{ cran_mirror }}/src/contrib/sgdGMF_{{ version }}.tar.gz
    - {{ cran_mirror }}/src/contrib/Archive/sgdGMF/sgdGMF_{{ version }}.tar.gz
  sha256: b4a0313c20610afa29b85281aa80b79a05a3b269e691a8f8a171a3096c079d7b

build:
  number: 0
  rpaths:
    - lib/R/lib/
    - lib/
  missing_dso_whitelist:
    - '*/R.dll'        # [win]
    - '*/Rblas.dll'    # [win]
    - '*/Rlapack.dll'  # [win]

requirements:
  build:
    - {{ compiler('c') }}              # [not win]
    - {{ stdlib("c") }}                # [not win]
    - {{ compiler('m2w64_c') }}        # [win]
    - {{ compiler('cxx') }}            # [not win]
    - {{ compiler('m2w64_cxx') }}      # [win]
    - {{ posix }}filesystem        # [win]
    - {{ posix }}make
    - {{ posix }}sed               # [win]
    - {{ posix }}coreutils         # [win]
    - {{ posix }}zip               # [win]
    - cross-r-base {{ r_base }}    # [build_platform != target_platform]
    - llvm-openmp                  # [osx]
    - libgomp                      # [linux or win]
  host:
    - libblas
    - liblapack
    - r-base
    - r-mass
    - r-rspectra
    - r-rcpp >=1.0.10
    - r-rcpparmadillo
    - r-suppdists
    - r-doparallel
    - r-foreach
    - r-generics
    - r-ggplot2
    - r-ggpubr
    - r-reshape2
    - r-viridislite
    - libgomp      # [linux or win]
    - llvm-openmp  # [osx]
  run:
    - r-base
    - r-mass
    - r-rspectra
    - r-rcpp >=1.0.10
    - r-rcpparmadillo
    - r-suppdists
    - r-doparallel
    - r-foreach
    - r-generics
    - r-ggplot2
    - r-ggpubr
    - r-reshape2
    - r-viridislite
    - libgomp      # [linux or win]
    - llvm-openmp  # [osx]

test:
  commands:
    - $R -e "library('sgdGMF')"           # [not win]
    - "\"%R%\" -e \"library('sgdGMF')\""  # [win]

about:
  home: https://github.com/CristianCastiglione/sgdGMF
  license: MIT
  summary: Efficient framework to estimate high-dimensional generalized matrix factorization
    models using penalized maximum likelihood under a dispersion exponential family
    specification. Either deterministic and stochastic methods are implemented for the
    numerical maximization. In particular, the package implements the stochastic gradient
    descent algorithm with a block-wise mini-batch strategy to speed up the computations
    and an efficient adaptive learning rate schedule to stabilize the convergence. All
    the theoretical details can be found in Castiglione et al. (2024, <doi:10.48550/arXiv.2412.20509>).
    Other methods considered for the optimization are the alternated iterative re-weighted
    least squares and the quasi-Newton method with diagonal approximation of the Fisher
    information matrix discussed in Kidzinski et al. (2022, <http://jmlr.org/papers/v23/20-1104.html>).
  license_family: MIT
  license_file:
    - '{{ environ["PREFIX"] }}/lib/R/share/licenses/MIT'
    - LICENSE

extra:
  recipe-maintainers:
    - conda-forge/r

