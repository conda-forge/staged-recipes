{% set name = "parameter-sweep" %}
{% set version = "0.2.0" %}

package:
  name: {{ name|lower}}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/p/parameter-sweep/parameter_sweep-{{ version }}.tar.gz
  sha256: 5c8c81c4b70f6d8019ee8d803be224010efe2bcf7296afc0e7ca8563f4451de3

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - setuptools >=64
    - setuptools-scm >=7
    - pip
  run:
    - python {{ python_min }}
    - pyomo >=6.7.3
    - numpy
    - h5py
    - pyyaml
    - idaes-pse

test:
  imports:
    - parameter_sweep
  commands:
    - pip check
  requires:
    - pip
    - python

about:
  home: https://parameter-sweep.readthedocs.io/en/latest/
  license_family: BSD
  license: BSD-3-Clause
  license_file:
    - LICENSE.md
  summary: "Parameter Sweep for WaterTAP"
  dev_url: "https://github.com/watertap-org/parameter-sweep"

extra:
  recipe-maintainers:
    - sufikaur
    - lbianchi-lbl
    -  ksbeattie
