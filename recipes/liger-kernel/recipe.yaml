schema_version: 1

context:
  version: "0.8.0"

package:
  name: liger-kernel
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/l/liger-kernel/liger_kernel-${{ version }}.tar.gz
  sha256: f98b94faf018814a0757e7b72bb8ebaaf12a78782cd09b157732acca2791e72c

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - setuptools >=42
    - wheel
    - setuptools-scm
    - pip
  run:
    - python >=${{ python_min }}
    - pytorch >=2.1.2
    - triton >=2.3.1

tests:
  - python:
      imports:
        - liger_kernel
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - '*'

about:
  summary: Efficient Triton kernels for LLM Training
  license: BSD-2-Clause AND MIT AND Apache-2.0
  license_file:
    - LICENSE
    - NOTICE
    - licenses/LICENSE-MIT-Efficient-Cross-Entropy
    - licenses/LICENSE-MIT-triton
    - licenses/LICENSE-MIT-llmc
    - licenses/LICENSE-Apache-2.0
    - licenses/LICENSE-MIT-AutoAWQ
  homepage: https://github.com/linkedin/Liger-Kernel

extra:
  recipe-maintainers:
    - chrisdeutsch
    - LeeNethertonQC
