{% set name = "snowpark-connect-deps-iceberg" %}
{% set version = "1.0.1" %}
{% set python_min = "3.10" %}
{% set python_max = "3.13" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/snowpark_connect_deps_iceberg-{{ version }}.tar.gz
  sha256: 66271bcdecc8182c4cccfe5bd2fd2c081bb55466e17fcaf81332f82154775175

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - pip
    - setuptools
  run:
    - python >={{ python_min }},<{{ python_max }}

test:
  imports:
    - snowpark_connect_deps_iceberg
  commands:
    - pip check
    - python -c "import snowpark_connect_deps_iceberg as d; assert len(d.list_jars()) == 5"
  requires:
    - python {{ python_min }}
    - pip

about:
  home: https://www.snowflake.com
  summary: Iceberg Spark JAR dependencies for Snowpark Connect
  description: |
    This package contains Iceberg Spark SQL Extensions and runtime JAR files
    required for Iceberg SQL parser support on the SCOS server JVM classpath.
  license: Apache-2.0
  license_file:
    - LICENSE-binary
    - NOTICE-binary
    - LICENSE.txt

extra:
  recipe-maintainers:
    - sfc-gh-azhan
    - sfc-gh-ckonigsmark
    - sfc-gh-igarish
    - sfc-gh-kgadomski
    - sfc-gh-pwojcik
    - sfc-gh-saroskar
    - sfc-gh-skumbham
