context:
  name: fsspec-union
  version: "0.1.0"

package:
  name: ${{ name }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/f/fsspec-union/fsspec_union-${{ version }}.tar.gz
  sha256: 0b8e97e67ae69e2d5e7f32a7a7f6f777783be55c04149b593beda213dcae7ec2

build:
  noarch: python
  number: 0
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - hatchling
  run:
    - python >=${{ python_min }}
    - fsspec >=2025.12.0
    - fsspec-python >=0.1.0

tests:
  - python:
      imports:
        - fsspec_union
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  homepage: https://github.com/1kbgz/fsspec-union
  repository: https://github.com/1kbgz/fsspec-union
  summary: Union handling for fsspec filesystems
  license: Apache-2.0
  license_file: LICENSE

extra:
  recipe-maintainers:
    - timkpaine
