{% set name = "dash-upset" %}
{% set version = "0.1.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/dash_upset-{{ version }}.tar.gz
  sha256: 2b8a65e8c15ec10f72626047c12826829c283b0ce4f392ded1eb08bacba72252

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python >=3.10
    - hatchling
    - pip
  run:
    - python >=3.10
    - dash >=3.0.0
    - plotly >=5.20
    - narwhals >=2

test:
  imports:
    - dash_upset
    - dash_upset_component
  commands:
    - pip check
  requires:
    - pip

about:
  home: https://github.com/PhylaTech/dash-upset
  summary: Interactive UpSet plots for Plotly Dash
  description: |
    dash-upset renders interactive UpSet plots -- set-intersection
    visualization that scales past Venn diagrams -- in Plotly Dash. It provides
    a pure-Python figure factory (create_upset) that returns a Plotly figure for
    notebooks and static export, plus an UpSet Dash component whose clicks
    surface as ordinary callback-addressable properties. Counting modes,
    sorting, filtering, deviation, and colorblind-safe themes are supported, and
    data can be supplied as counts, per-element memberships, per-set contents,
    or any narwhals-supported boolean indicator dataframe.
  license: MIT
  license_file: LICENSE
  doc_url: https://phylatech.github.io/dash-upset/
  dev_url: https://github.com/PhylaTech/dash-upset

extra:
  recipe-maintainers:
    - evanroyrees
