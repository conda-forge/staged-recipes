{% set name = "glidergun" %}
{% set version = "0.9.127" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://github.com/jshirota/glidergun/archive/refs/tags/v{{ version }}.tar.gz
  sha256: a4589abaa63a25b1c590efa3ed8e9884674b446ef409b6137a36ea3d3d734254

build:
  number: 0
  skip: true  # [py<310 or py>=314]

outputs:
  - name: glidergun
    build:
      skip: true  # [py<310 or py>=314]
    script: build_glidergun.sh  # [unix]
    script: build_glidergun.bat  # [win]
    requirements:
      host:
        - python
        - pip
        - setuptools >=69
        - wheel
      run:
        - python >=3.10,<3.14
        - contourpy >=1.2.1  # [py<311]
        - contourpy >=1.3.0  # [py>=311]
        - ipython >=8.18.0
        - matplotlib-base >=3.8.4
        - numpy >=1.26.4  # [py<311]
        - numpy >=2.0.0  # [py>=311]
        - opencv >=4.9.0
        - planetary-computer >=1.0.0
        - rasterio >=1.3.10
        - scikit-learn >=1.4.2  # [py<311]
        - scikit-learn >=1.5.0  # [py>=311]
        - scipy >=1.11.4  # [py<311]
        - scipy >=1.12.0  # [py>=311]
        - shapely >=2.0.2
    test:
      imports:
        - glidergun
      commands:
        - python -c "import glidergun; print('glidergun import ok')"

  - name: glidergun-torch
    build:
      noarch: generic
      skip: true  # [py<310 or py>=314]
    requirements:
      run:
        - python >=3.10,<3.14
        - glidergun =={{ version }}
        - pytorch >=2.7
        - kornia >=0.8.2
    test:
      commands:
        - python -c "import glidergun; print('glidergun-torch deps ok')"

about:
  home: https://github.com/jshirota/glidergun
  summary: Map Algebra with NumPy
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - jshirota
