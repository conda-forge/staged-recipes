schema_version: 1

context:
  name: stdio-socket
  version: 1.4.0
  python_min: "3.11"

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/${{ name[0] }}/${{ name }}/stdio_socket-${{ version }}.tar.gz
  sha256: a7c0735624365031dbe1df9d23f38331261b1bda40c2f40916f42f70cb4e7a21

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  python:
    entry_points:
      - stdio-expose = stdio_socket.__main__:main
      - stdio-socket = stdio_socket.__main__:main
      - console = stdio_socket.__main__:console
      - pptty = stdio_socket.__main__:pptty

requirements:
  host:
    - python ${{ python_min }}.*
    - setuptools >=64
    - setuptools-scm >=8
    - pip
  run:
    - python >=${{ python_min }}
    - __unix
    - typer

tests:
  - python:
      python_version: "${{ python_min }}.*"
      imports:
        - stdio_socket
      pip_check: true
  - requirements:
      run:
        - pip
    script:
      - stdio-expose --help
      - stdio-socket --help
      - console --help
      - pptty --help

about:
  homepage: https://github.com/epics-containers/stdio-socket
  summary: Expose a process stdio to a unix socket
  license: Apache-2.0
  license_file: LICENSE

extra:
  recipe-maintainers:
    - jwlodek
