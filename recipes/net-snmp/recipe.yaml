context:
  version: "5.9.5.2"

package:
  name: net-snmp
  version: ${{ version }}

source:
  url: http://downloads.sourceforge.net/project/net-snmp/net-snmp/${{ version }}/net-snmp-${{ version }}.tar.gz
  sha256: 16707719f833184a4b72835dac359ae188123b06b5e42817c00790d7dc1384bf

build:
  skip:
    - win
  number: 0

requirements:
  build:
    - ${{ compiler('c') }}
    - ${{ compiler('cxx') }}
    - ${{ stdlib('c') }}
    - autoconf
    - automake
    - make
    - perl
    - file
  host:
    - libtool
  run_exports:
    - ${{ pin_subpackage('net-snmp', upper_bound='x.x.x') }}

tests:
  - package_contents:
      files:
        - bin/encode_keychange
        - bin/snmptranslate
        - bin/snmpget
        - bin/snmpgetnext
        - bin/snmpbulkget
        - bin/snmpwalk
        - bin/snmpbulkwalk
        - bin/snmpset
        - bin/snmptest
        - bin/tkmib
        - bin/snmptable
        - bin/snmpdelta
        - bin/snmpusm
        - bin/snmpvacm
        - bin/snmpstatus
        - bin/snmpnetstat
        - bin/snmpdf
        - share/snmp/mibs/*.txt
      lib:
        - netsnmp
        - netsnmphelpers
        - netsnmpmibs
        - netsnmptrapd

about:
  homepage: http://www.net-snmp.org/
  license: BSD-3-Clause
  license_file: COPYING
  summary: "Net-SNMP is a suite of applications used to implement SNMP v1, SNMP v2c and SNMP v3 using both IPv4 and IPv6."

extra:
  recipe-maintainers:
    - simon-ess
