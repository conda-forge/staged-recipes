# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "0.11.0"
  python_check_max: "3.14"
  cov_run: coverage run --source=wenmode --branch --append
  pytest_k_win: |
    -k "not (migration_python_code_blocks_are_discovered or cli_reports_missing_input_file or python_module_entrypoint_writes_utf8_stdout_on_non_utf8_locale)"

package:
  name: wenmode
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/w/wenmode/wenmode-${{ version }}.tar.gz
  sha256: 03e6b78813b95ea91a8f0b1a7ea10d7b4033110d66f940c533d73b15371a0443

build:
  number: 0
  noarch: python
  script:
    - ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation --disable-pip-version-check
  python:
    entry_points:
      - wenmode = wenmode.cli:main

requirements:
  host:
    - hatchling
    - pip
    - python ${{ python_min }}.*
  run:
    - python >=${{ python_min }}

tests:
  - python:
      imports: wenmode
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - ${{ python_check_max }}.*
  - files:
      source:
        - docs/
        - pyproject.toml
        - README.md
        - tests/
    requirements:
      run:
        - mypy
        - pip
        - pytest-cov
        - python ${{ python_min }}.*
    script:
      - ${{ cov_run }} -m wenmode --version
      - ${{ cov_run }} -m wenmode --help
      - ${{ cov_run }} -m pytest -vv --tb=long --color=yes
      - coverage report --show-missing --skip-covered --fail-under=96 ${{ pytest_k_win if win }}
      - mypy -p wenmode

about:
  summary: A fast, composable Markdown parser and renderer toolkit.
  license: BSD-3-Clause
  license_file: LICENSE
  homepage: https://pypi.org/project/wenmode
  documentation: https://wenmode.lepture.com
  repository: https://github.com/lepture/wenmode

extra:
  recipe-maintainers:
    - bollwyvl
