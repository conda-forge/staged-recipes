schema_version: 1

context:
  python_min: "3.12"
  version: "0.9.4"

package:
  name: ihmt
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/i/ihmt/ihmt-${{ version }}.tar.gz
  sha256: 6981ee11468319575c33d6e48157a00952d0a68b09787e5dea06ce662797c96e

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - hatchling >=1.26
    - pip
  run:
    - python >=${{ python_min }}
    - numpy
    - scipy
    - pyyaml

tests:
  - python:
      imports:
        - ihmt
      pip_check: true
      python_version: ${{ python_min }}.*

about:
  summary: Inhomogeneous magnetization transfer simulator for magnetic resonance research.
  license: GPL-3.0-only
  license_file: LICENSE
  homepage: https://github.com/SirTwinkleberry/ihMT

extra:
  recipe-maintainers:
    - SirTwinkleberry
