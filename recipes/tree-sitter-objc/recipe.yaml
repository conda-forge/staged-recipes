schema_version: 1

context:
  version: "3.0.2"

package:
  name: tree-sitter-objc
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/t/tree_sitter_objc/tree_sitter_objc-${{ version }}.tar.gz
  sha256: ac55aefe8a4f3ea6f1da2a2e05372a4f37100001934e36a81e0f96c4c6252809

build:
  number: 0
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  build:
    - ${{ compiler("c") }}
  host:
    - python
    - pip
    - setuptools >=42
  run:
    - python

tests:
  - python:
      imports:
        - tree_sitter_objc

about:
  homepage: https://github.com/tree-sitter-grammars/tree-sitter-objc
  summary: Objective-C grammar for tree-sitter
  license: MIT
  license_file: LICENSE
  repository: https://github.com/tree-sitter-grammars/tree-sitter-objc

extra:
  recipe-maintainers:
    - killua156
    - mgorny
