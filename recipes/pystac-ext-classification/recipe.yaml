schema_version: 1

context:
  version: "2.0.0"

package:
  name: pystac-ext-classification
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/p/pystac-ext-classification/pystac_ext_classification-${{ version }}.tar.gz
  sha256: b744d42eb74fa5038cf00896f3cf4fbb85b79cf208454b7401bd8219e491eb94

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - hatchling
    - pip
  run:
    - python >=${{ python_min }}
    - pystac-core

tests:
  - python:
      imports:
        - pystac.extensions.classification
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  summary: Classification extension for PySTAC
  license: Apache-2.0
  license_file: LICENSE
  homepage: https://pypi.org/project/pystac-ext-classification/
  documentation: https://pystac.readthedocs.io

extra:
  recipe-maintainers:
    - ocefpaf
