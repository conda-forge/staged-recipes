context:
  version: "1.6.0"
  build: 0

recipe:
  name: dpct-meta
  version: ${{ version }}

source:
  url: https://github.com/ilastik/dpct/archive/${{ version }}.tar.gz
  sha256: 9913f050ed2cbbb74820197e31eace26be3f715afd04ccfe08a8ed24c4dbe341

build:
  number: ${{ build }}

outputs:
  - package:
      name: libdpct
      version: ${{ version }}

    build:
      number: ${{ build }}
      script:
        - if: not win
          then: ${RECIPE_DIR}/build.sh
          else: "%RECIPE_DIR%\\build.bat"

    requirements:
      build:
        - cmake
        - if: not win
          then:
            - make
        - ${{ compiler("c") }}
        - ${{ compiler("cxx") }}
      host:
        - pybind11
        - lemon
      run_exports:
        weak:
          - ${{ pin_subpackage("libdpct", exact=True) }}


  - package:
      name: dpct
      version: ${{ version }}

    build:
      number: ${{ build }}
      script:
        - if: not win
          then: ${RECIPE_DIR}/build-python.sh
          else: "%RECIPE_DIR%\\build-python.bat"

    requirements:
      build:
        - if: build_platform != target_platform
          then:
            - cross-python_${{ target_platform }}
            - python
            - cython
        - cmake
        - if: not win
          then:
            - make
        - ${{ compiler("c") }}
        - ${{ compiler("cxx") }}
      host:
        - pybind11
        - lemon
        - python
        - ${{ pin_subpackage("libdpct", exact=True) }}
      run:
        - python
        - ${{ pin_subpackage("libdpct", upper_bound="x.x") }}

    tests:
      - script:
          - python test/test.py
        files:
          source:
            - test/*.py
            - test/*.json

      - python:
          imports:
            - dpct
          pip_check: false

about:
  homepage: https://github.com/ilastik/dpct
  license: MIT
  summary: Dynamic Programming Cell Tracking Solver Library
  license_file:
    - LICENSE
    - LICENSE-JsonCpp

extra:
  recipe-maintainers:
    - k-dominik
