schema_version: 1

context:
  version: "1.0.0b260514"
  python_min: "3.10"

package:
  name: agent-framework-copilotstudio
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/a/agent-framework-copilotstudio/agent_framework_copilotstudio-${{ version }}.tar.gz
  sha256: 12e5732f337c88196fce8597b7b016f5111c18941deeaef4c2c4ca5c2a4fba8e

build:
  noarch: python
  number: 0
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - flit-core <4.0,>=3.11
  run:
    - python >=${{ python_min }}
    - agent-framework-core <2,>=1.4.0
    - microsoft-agents-copilotstudio-client <0.3.2,>=0.3.1

tests:
  - python:
      imports:
        - agent_framework.copilotstudio
      python_version: ${{ python_min }}.*
      pip_check: true

about:
  summary: |
    Copilot Studio integration for Microsoft Agent Framework.
  homepage: https://pypi.org/project/agent-framework-copilotstudio/
  repository: https://github.com/microsoft/agent-framework
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - killua156
    - mgorny
