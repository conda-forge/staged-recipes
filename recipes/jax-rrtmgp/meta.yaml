{% set version = "0.2.0" %}
{% set python_min = "3.11.0" %}

package:
  name: jax-rrtmgp
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/j/jax-rrtmgp/jax_rrtmgp-{{ version }}.tar.gz
  sha256: 715fe87568af45153f2bb8dcc9deb76aed82cbb750c36cb722d1075095d2ab66

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - setuptools >=61.0
    - pip
  run:
    - python >={{ python_min }}
    - dataclasses-json
    - jax
    - netcdf4
    - numpy

test:
  imports:
    - rrtmgp
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://pypi.org/project/jax-rrtmgp/
  summary: JAX-based implementation of RRTMGP radiative transfer for atmospheric modeling.
  license: Apache-2.0
  license_file: LICENSE

extra:
  recipe-maintainers:
    - mahf708
