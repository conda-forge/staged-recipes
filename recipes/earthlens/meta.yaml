{% set python_min = "3.11" %}
{% set name = "earthlens" %}
{% set version = "0.4.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://github.com/serapeum-org/earthlens/archive/{{ version }}.tar.gz
  sha256: 19b7f5a9ab751d039873b61921a6e46ad548d81408f625f8fa0fe8fc9347a08a

build:
  number: 0
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv

requirements:
  host:
    - python {{ python_min }}
    - pip
    - setuptools >=80
    - wheel
  run:
    - python >={{ python_min }}
    - pyramids >=0.17.0
    - joblib >=1.2.0
    - loguru >=0.7.2
    - numpy >=2.1.3
    - pandas >=2.2.3
    - pyyaml >=6.0.2
    - pydantic >=2
    - requests >=2.28.1
    - tqdm >=4.66.0

test:
  requires:
    - python {{ python_min }}
  imports:
    - earthlens
    - earthlens.aggregate
    - earthlens.base
    - earthlens.chirps

about:
  home: https://github.com/serapeum-org/earthlens
  license: GPL-3.0-or-later
  license_family: GPL
  license_file: LICENSE.md
  summary: Remote sensing package for downloading satellite and climate data
  description: |
    earthlens is a Python package for downloading satellite and climate
    data from multiple sources, including CHIRPS rainfall (FTP), ERA5 on
    AWS S3, the ECMWF Climate Data Store via cdsapi, and Google Earth
    Engine. It provides a unified `EarthLens` facade that lazily loads
    each backend so the optional SDK for a backend you don't use never
    has to be installed.

    Optional backends can be enabled by additionally installing:

      * boto3 (for the ERA5-on-S3 backend)
      * cdsapi (for the ECMWF/CDS backend)
      * earthengine-api (for the Google Earth Engine backend)
  dev_url: https://github.com/serapeum-org/earthlens
  doc_url: https://serapeum-org.github.io/earthlens/
  doc_source_url: https://github.com/serapeum-org/earthlens/main/README.md

extra:
  recipe-maintainers:
    - MAfarrag
