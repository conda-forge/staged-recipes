{% set version = "0.1.3" %}
{% set python_min = "3.10" %}

package:
  name: pycfast
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/p/pycfast/pycfast-{{ version }}.tar.gz
  sha256: b53222e636df976f5e86e7d1bd724b30db9d066ae996a3754bed56ba7dc780fd

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - setuptools >=61.0
    - wheel
    - pip
  run:
    - python {{ python_min }}
    - f90nml >=1.4.5
    - pandas >=2.0.0

test:
  imports:
    - pycfast
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://github.com/bewygs/pycfast
  summary: Python interface for building, running, and analyzing CFAST fire simulation models
  doc_url: https://pycfast.org
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - bewygs
