schema_version: 1

context:
  version: "2.0.0"

package:
  name: langchain-opendataloader-pdf
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/l/langchain-opendataloader-pdf/langchain_opendataloader_pdf-${{ version }}.tar.gz
  sha256: 14c83dc1df9f3ef0c1e5698da6d30db3a8af1151f5ae42f09bffca1156acdd47

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - hatchling
  run:
    - python >=${{ python_min }},<4.0
    - langchain-core >=1.0,<2.0
    - opendataloader-pdf >=2.1.0

tests:
  - python:
      imports:
        - langchain_opendataloader_pdf
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  homepage: https://github.com/opendataloader-project/langchain-opendataloader-pdf
  summary: A LangChain integration for OpenDataLoader PDF
  description: |
    langchain-opendataloader-pdf is a LangChain document loader that integrates
    OpenDataLoader PDF to parse PDFs into structured Document objects for RAG
    pipelines. It supports accurate reading order via the XY-Cut++ algorithm,
    table extraction, multiple output formats (text, Markdown, JSON, HTML),
    per-page document splitting with metadata, built-in content safety
    filtering, and 100% local processing with no cloud APIs required.
  license: Apache-2.0
  license_file: LICENSE
  repository: https://github.com/opendataloader-project/langchain-opendataloader-pdf
  documentation: https://github.com/opendataloader-project/langchain-opendataloader-pdf

extra:
  recipe-maintainers:
    - killua156
