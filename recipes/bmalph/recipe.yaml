# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "2.11.0"

package:
  name: bmalph
  version: ${{ version }}

source:
  url: https://registry.npmjs.org/bmalph/-/bmalph-${{ version }}.tgz
  sha256: f23f8c20efdb56c0759bd1f9266763a157c76e29db5fc530dd60f4b2f52b5cf1

build:
  number: 0
  script:
    - if: unix
      then:
        - set -ex
        - pnpm install --ignore-scripts
        - npm pack --ignore-scripts
        - npm install --global "${SRC_DIR}/bmalph-${{ version }}.tgz"
        - pnpm-licenses generate-disclaimer --prod --output-file=third-party-licenses.txt
      else:
        - call pnpm install --ignore-scripts
        - if %ERRORLEVEL% neq 0 exit 1
        - call npm pack --ignore-scripts
        - if %ERRORLEVEL% neq 0 exit 1
        - call npm install --global %SRC_DIR%/bmalph-${{ version }}.tgz
        - if %ERRORLEVEL% neq 0 exit 1
        - call pnpm-licenses generate-disclaimer --prod --output-file=third-party-licenses.txt
        - if %ERRORLEVEL% neq 0 exit 1

requirements:
  build:
    - nodejs
    - pnpm
    - pnpm-licenses
  host:
    - nodejs
  run:
    - nodejs

tests:
  - script:
      - bmalph --help

about:
  license: MIT
  license_file:
    - LICENSE
    - third-party-licenses.txt
  summary: Unified AI Development Framework - BMAD phases with Ralph execution loop
  description: |
    [BMAD-METHOD](https://github.com/bmad-code-org/BMAD-METHOD) planning + [Ralph](https://github.com/snarktank/ralph) autonomous implementation, wired through platform-specific instructions, skills, and command indexes.
  homepage: https://github.com/LarsCowe/bmalph
  repository: https://github.com/LarsCowe/bmalph

extra:
  recipe-maintainers:
    - rxm7706
