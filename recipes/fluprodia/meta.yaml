{% set name = "fluprodia" %}
{% set version = "4.1.2" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/fluprodia-{{ version }}.tar.gz
  sha256: dbb123b07d8cf29064645688de053cefbb5d16d21f3ea62e1d7ba169a732ae57

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - flit-core >=3.2,<4
    - pip
  run:
    - python >={{ python_min }}
    - coolprop >=6.4
    - numpy >=1.13.3
    - pint

test:
  imports:
    - fluprodia
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://github.com/fwitte/fluprodia
  summary: Create beautiful fluid property diagrams using CoolProp
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - jan-janssen
