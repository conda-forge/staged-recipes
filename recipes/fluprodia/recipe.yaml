schema_version: 1

context:
  version: "4.2"

package:
  name: fluprodia
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/f/fluprodia/fluprodia-${{ version }}.tar.gz
  sha256: 429f706545610338aa7c982f03ac5795fa91533e9c4c25dae361f5584c4f9e43

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python >=3.9
    - flit-core >=3.2,<4
    - pip
  run:
    - python >=3.9
    - coolprop >=6.4
    - numpy >=1.13.3
    - pint

tests:
  - python:
      imports:
        - fluprodia
      pip_check: true

about:
  summary: Create beautiful fluid property diagrams using CoolProp
  license: MIT
  license_file: LICENSE
  homepage: https://github.com/fwitte/fluprodia
  documentation: https://fluprodia.readthedocs.io/

extra:
  recipe-maintainers:
    - fwitte
