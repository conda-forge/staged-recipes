schema_version: 1

context:
  version: "0.1.0"

recipe:
  name: box3d-split
  version: ${{ version }}

source:
  url: https://github.com/erincatto/box3d/archive/refs/tags/v${{ version }}.tar.gz
  sha256: df232c7618c0d0d3927b798044559ee56eabadeb9d8ff9dc526d4b384d7b415d
  patches:
    - patches/0001-cmake-use-conda-dependencies.patch

build:
  number: 0
  variant:
    # Prefer linux-64 x86-64-v3 builds when installable, while keeping the
    # x86-64-v1 build as the baseline fallback.
    down_prioritize_variant: ${{ 1 if (target_platform == "linux-64" and (microarch_level | default("1")) == "1") else 0 }}

outputs:
  - package:
      name: box3d
    build:
      script:
        interpreter: brush
        content: |
          set -eux

          cmake -S . -B build-core -G Ninja \
            ${CMAKE_ARGS} \
            -DCMAKE_INSTALL_PREFIX="${LIBRARY_PREFIX:-$PREFIX}" \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_MSVC_RUNTIME_LIBRARY=MultiThreadedDLL \
            -DBUILD_SHARED_LIBS=ON \
            -DBOX3D_SAMPLES=OFF \
            -DBOX3D_UNIT_TESTS=OFF \
            -DBOX3D_BENCHMARKS=OFF \
            -DBOX3D_DOCS=OFF \
            -DBOX3D_PROFILE=OFF \
            -DBOX3D_VALIDATE=OFF \
            -DBOX3D_BUILD_SHADERS=OFF

          cmake --build build-core --config Release --parallel
          cmake --install build-core --config Release
      files:
        - include/box3d/**
        - lib/cmake/box3d/**
        - lib/libbox3d*.so*
        - lib/libbox3d*.dylib*
        - Library/include/box3d/**
        - Library/lib/cmake/box3d/**
        - Library/bin/box3d.dll
        - Library/lib/box3d.lib
    requirements:
      build:
        - ${{ compiler('c') }}
        - ${{ compiler('cxx') }}
        - ${{ stdlib('c') }}
        - cmake
        - ninja
        - brush
        - if: target_platform == "linux-64"
          then: x86_64-microarch-level ==${{ microarch_level | default("1") }}
      run_exports:
        - ${{ pin_subpackage('box3d', upper_bound='x.x') }}
    tests:
      - package_contents:
          lib:
            - box3d
          include:
            - box3d/base.h
            - box3d/box3d.h
            - box3d/collision.h
            - box3d/config.h
            - box3d/constants.h
            - box3d/id.h
            - box3d/math_functions.h
            - box3d/types.h
          files:
            - ${{ "Library/" if win }}lib/cmake/box3d/box3dConfig.cmake
            - ${{ "Library/" if win }}lib/cmake/box3d/box3dConfigVersion.cmake
    about:
      summary: Box3D is a 3D physics engine for games
      description: |
        Box3D is an open source C17 engine for simulating rigid bodies in 3D.
      license: MIT
      license_file: LICENSE
      homepage: https://box2d.org/
      documentation: https://box2d.org/documentation3d/
      repository: https://github.com/erincatto/box3d

  - package:
      name: box3d-samples
    build:
      script:
        interpreter: brush
        content: |
          set -eux

          cmake -S . -B build-samples -G Ninja \
            ${CMAKE_ARGS} \
            -DCMAKE_INSTALL_PREFIX="${LIBRARY_PREFIX:-$PREFIX}" \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_MSVC_RUNTIME_LIBRARY=MultiThreadedDLL \
            -DBUILD_SHARED_LIBS=ON \
            -DBOX3D_SAMPLES=ON \
            -DBOX3D_UNIT_TESTS=OFF \
            -DBOX3D_BENCHMARKS=OFF \
            -DBOX3D_DOCS=OFF \
            -DBOX3D_PROFILE=OFF \
            -DBOX3D_VALIDATE=OFF \
            -DBOX3D_BUILD_SHADERS=OFF

          cmake --build build-samples --config Release --parallel
          cmake --install build-samples --config Release

          if [ -n "${LIBRARY_PREFIX:-}" ]; then
            mkdir -p "${LIBRARY_PREFIX}/bin"
            cp build-samples/bin/samples.exe "${LIBRARY_PREFIX}/bin/box3d-samples.exe"
            chmod +x "${LIBRARY_PREFIX}/bin/box3d-samples.exe" || true
          else
            mkdir -p "${PREFIX}/bin"
            cp build-samples/bin/samples "${PREFIX}/bin/box3d-samples"
            chmod +x "${PREFIX}/bin/box3d-samples" || true
          fi
      files:
        - bin/box3d-samples
        - Library/bin/box3d-samples.exe
    requirements:
      build:
        - ${{ compiler('c') }}
        - ${{ compiler('cxx') }}
        - if: target_platform == "osx-64"
          then: ${{ stdlib('c') }} ==14.0
          else: ${{ stdlib('c') }}
        - cmake
        - ninja
        - brush
        - if: target_platform == "linux-64"
          then: x86_64-microarch-level ==${{ microarch_level | default("1") }}
      host:
        - imgui
        - implot
        - nativefiledialog-extended
        - libtinyobjloader
        - if: linux
          then:
            - libgl-devel
            - xorg-libx11
            - xorg-libxi
            - xorg-libxcursor
      run:
        - ${{ pin_subpackage('box3d', exact=True) }}
        - imgui
        - implot
        - nativefiledialog-extended
        - libtinyobjloader
        - if: linux
          then:
            - libgl
            - xorg-libx11
            - xorg-libxi
            - xorg-libxcursor
    tests:
      - package_contents:
          bin:
            - box3d-samples
    about:
      summary: Sample application for Box3D
      description: |
        Graphical samples demonstrating Box3D features and performance.
      license: MIT AND Zlib
      license_file:
        - LICENSE
        - extern/sokol/LICENSE
        - samples/jsmn.h
      homepage: https://box2d.org/
      documentation: https://box2d.org/documentation3d/
      repository: https://github.com/erincatto/box3d

about:
  summary: Box3D is a 3D physics engine for games
  license: MIT
  license_file: LICENSE
  homepage: https://box2d.org/
  documentation: https://box2d.org/documentation3d/
  repository: https://github.com/erincatto/box3d

extra:
  feedstock-name: box3d
  recipe-maintainers:
    - baszalmstra
    - tdejager
