schema_version: 1

context:
  version: "0.4.3"

package:
  name: open-interpreter
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/o/open-interpreter/open_interpreter-${{ version }}.tar.gz
  sha256: cd81d0a6bc5bc9bed6a3f35010da71421b435dc9479f4ac867db80fdc29fa11b

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  python:
    entry_points:
      - i = interpreter.terminal_interface.start_terminal_interface:main
      - interpreter = interpreter.terminal_interface.start_terminal_interface:main
      - wtf = scripts.wtf:main
      - interpreter-classic = interpreter.terminal_interface.start_terminal_interface:main

requirements:
  host:
    - python ${{ python_min }}.*
    - poetry-core
    - pip
  run:
    - python >=${{ python_min }}
    - setuptools
    - astor >=0.8.1,<0.9.0
    - gitpython >=1.0.3,<2.0.0
    - inquirer >=3.1.3,<4.0.0
    - pyyaml >=6.0.1,<7.0.0
    - rich >=13.4.2,<14.0.0
    - six >=1.16.0,<2.0.0
    - tokentrim >=0.1.13,<0.2.0
    - wget >=3.2.0,<4.0.0
    - psutil >=5.9.6,<6.0.0
    - pyreadline3 >=3.4.1,<4.0.0
    - html2image >=2.0.4,<3.0.0
    - send2trash >=1.8.2,<2.0.0
    - ipykernel >=6.26.0,<7.0.0
    - jupyter_client >=8.6.0,<9.0.0
    - matplotlib-base >=3.8.2,<4.0.0
    - toml >=0.10.2,<0.11.0
    - tiktoken >=0.7.0,<0.8.0
    - platformdirs >=4.2.0,<5.0.0
    - pydantic >=2.6.4,<3.0.0
    - google-generativeai >=0.7.1,<0.8.0
    - pyperclip >=1.9.0,<2.0.0
    - yaspin >=3.0.2,<4.0.0
    - shortuuid >=1.0.13,<2.0.0
    - litellm >=1.41.26,<2.0.0
    - starlette >=0.37.2,<0.38.0
    - html2text >=2024.2.26,<2025.0.0
    - selenium >=4.24.0,<5.0.0
    - webdriver-manager >=4.0.2,<5.0.0
    - anthropic >=0.37.1,<0.38.0
    - pyautogui >=0.9.54,<0.10.0
    - typer >=0.12.5,<0.13.0
    - fastapi >=0.111.0,<0.112.0
    - uvicorn >=0.30.1,<0.31.0
    - nltk <4.0.0,>=3.8.1
  run_constraints:
    - opencv >=4.8.1,<5.0.0
    - plyer >=2.1.0,<3.0.0
    - pywinctl >=0.3.0,<0.4.0
    - pytesseract >=0.3.10,<0.4.0
    - sentence-transformers >=2.5.1,<3.0.0
    - nltk >=3.8.1,<4.0.0
    - ipywidgets >=8.1.2,<9.0.0
    - pytorch >=2.2.1,<3.0.0
    - timm >=0.9.16,<0.10.0
    - screeninfo >=0.8.1,<0.9.0
    - semgrep >=1.52.0,<2.0.0
    - transformers 4.41.2.*
    - einops >=0.8.0,<0.9.0
    - torchvision >=0.18.0,<0.19.0
    - easyocr >=1.7.1,<2.0.0
    - janus >=1.0.0,<2.0.0

tests:
  - python:
      imports:
        - open_interpreter
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"
    script:
      - i --help
      - interpreter --help
      - wtf --help
      - interpreter-classic --help

about:
  homepage: https://www.openinterpreter.com
  repository: https://github.com/OpenInterpreter/open-interpreter
  documentation: https://docs.openinterpreter.com
  license: AGPL-3.0-only
  license_file: LICENSE
  summary: A natural language interface for computers
  description: |
    **Open Interpreter** lets LLMs run code (Python, Javascript, Shell, and more) locally.
    You can chat with Open Interpreter through a ChatGPT-like interface in your terminal by running `$ interpreter` after installing.

    This provides a natural-language interface to your computer's general-purpose capabilities:

    - Create and edit photos, videos, PDFs, etc.
    - Control a Chrome browser to perform research
    - Plot, clean, and analyze large datasets
    - ...etc.

    **⚠️ Note: You'll be asked to approve code before it's run.**

extra:
  recipe-maintainers:
    - eunos-1128
