schema_version: 1

context:
  python_min: "3.10"
  version: "0.6.1"

package:
  name: overturemaestro
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/o/overturemaestro/overturemaestro-${{ version }}.tar.gz
  sha256: 170ee5c328e91a8dd4b720450291bf16990956d3d270e71e61a495eac324176e

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  python:
    entry_points:
      - overturemaestro = overturemaestro.__main__:main
      - OvertureMaestro = overturemaestro.__main__:main

requirements:
  host:
    - python ${{ python_min }}.*
    - pdm-backend
    - pip
  run:
    - python >=${{ python_min }}
    - overturemaps >=0.8.0
    - geopandas >=1.0
    - shapely >=2.0.6
    - pyarrow >=16.0.0
    - rich >=12.0.0
    - geoarrow-rust-core >=0.4.0
    - pooch >=1.6.0
    - aiohttp >=3.8.0
    - fsspec >=2021.04.0
    - geopy >=2.0.0
    - numpy >=1.26.0
    - python-duckdb >=1.1.2
    - psutil >=5.6.2
    - rq_geo_toolkit >=2026.4.0
   # Extra: cli
    - typer >=0.9.0
    - s2sphere >=0.2.5

tests:
  - python:
      imports:
        - overturemaestro
      python_version:
        - ${{ python_min }}.*
        - "*"
      pip_check: true
  - script:
      - if: unix
        then:
        - overturemaestro --help
        - OvertureMaestro --help
      - overturemaestro places place --geom-filter-geocode Monaco --silent

about:
  summary: An open-source tool for downloading Overture Maps data with quality of life features
  license: Apache-2.0
  license_file: LICENSE
  homepage: https://kraina-ai.github.io/overturemaestro/
  documentation: https://kraina-ai.github.io/overturemaestro/
  repository: https://github.com/kraina-ai/overturemaestro

extra:
  recipe-maintainers:
    - RaczeQ
