schema_version: 1

context:
  version: "0.1.0"
  python_min: "3.11"

package:
  name: artlink
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/a/artlink/artlink-${{ version }}.tar.gz
  sha256: f8d780bda6803a4ce71a04e51c138347234d0931b1340347826d782303753b03

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  python:
    entry_points:
      - artlink = artlink.cli:main

requirements:
  host:
    - python ${{ python_min }}.*
    - hatchling
    - pip
  run:
    - python >=${{ python_min }}
    - ccflow
    - pydantic
    - pyyaml

tests:
  - python:
      imports:
        - artlink
      pip_check: true
  - requirements:
      run:
        - python ${{ python_min }}.*
    script:
      - artlink --help

about:
  summary: A package for packaging, organizing, and combining artifacts
  license: Apache-2.0
  license_file: LICENSE
  homepage: https://github.com/dau-dev/artlink
  repository: https://github.com/dau-dev/artlink

extra:
  recipe-maintainers:
    - timkpaine
