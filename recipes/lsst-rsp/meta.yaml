{% set version = "0.12.0" %}

package:
  name: lsst-rsp
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/l/lsst-rsp/lsst_rsp-{{ version }}.tar.gz
  sha256: 71a4b7360de9c31bce75acffffa34a871e43947c8b5d846c7509d1ade8561a28

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python ={{ python_min }}
    - setuptools >=61
    - setuptools-scm >=6.2
    - pip
  run:
    - python >={{ python_min }}
    - deprecated
    - ipython
    - pyvo
    - httpx
    - xmltodict

test:
  imports:
    - lsst
  commands:
    - pip check
  requires:
    - pip
    - python ={{ python_min }}

about:
  summary: Utility functions for the Rubin Science Platform
  home: https://github.com/lsst-sqre/lsst-rsp
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - beckermr
