schema_version: 1

context:
  version: "0.1.1"

package:
  name: amzn-sagemaker-ray-jupyterlab-extension
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/a/amzn-sagemaker-ray-jupyterlab-extension/amzn_sagemaker_ray_jupyterlab_extension-${{ version }}.tar.gz
  sha256: d4464e7c0ecf52b3dc23846e50753046130efc37482b6c84a12c0960411576de

build:
  noarch: python
  number: 0
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - setuptools >=61.0
  run:
    - python >=${{ python_min }}

tests:
  - python:
      imports:
        - amzn_sagemaker_ray_jupyterlab_extension
      python_version:
        - ${{ python_min }}.*
        - "*"
      pip_check: true

about:
  homepage: https://pypi.org/project/amzn-sagemaker-ray-jupyterlab-extension/
  license: Apache-2.0
  license_file: LICENSE
  summary: SageMaker JupyterLab Ray extension for HyperPod Ray cluster discovery and connection
  description: |
    SageMaker JupyterLab Ray extension for HyperPod Ray cluster discovery and
    connection.

extra:
  recipe-maintainers:
    - HariniNarayanan
