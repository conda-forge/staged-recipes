schema_version: 1

context:
  name: openclaw
  version: 2026.6.1

package:
  name: ${{ name }}
  version: ${{ version }}

source:
  url: https://github.com/openclaw/openclaw/archive/refs/tags/v${{ version }}.tar.gz
  sha256: f2c01ca1cb8aafc149b249f5940cb7061b0b0158450711ba0a5dfa617f1e3712

build:
  number: 0

requirements:
  build:
    - ${{ compiler("cxx") }}
    - ${{ stdlib("c") }}
    - ${{ "msbuild" if win else "make" }}
    - ${{ "m2w64-jq" if win else "jq" }}
    - ${{ "m2-sed" if win else "sed" }}
    - esbuild
    - node-gyp
    - pkg-config
    - python *
  host:
    - expat
    - glib
    - libvips
    - nodejs
    - pnpm
    - pnpm-licenses
  run:
    - nodejs

tests:
  - script:
      - openclaw --version
      - openclaw --help
      - if: win
        then:
          - pushd "%PREFIX%\node_modules\openclaw"
        else:
          - pushd "${PREFIX}/lib/node_modules/openclaw"
      - node -e "require('koffi'); console.log('koffi ok')"
      - node -e "require('tree-sitter-bash'); console.log('tree-sitter-bash ok')"
      - node -e "require('sqlite-vec'); console.log('sqlite-vec ok')"
      - node -e "require('@lydell/node-pty'); console.log('node-pty ok')"
      - node -e "require('sharp'); console.log('sharp ok')"
      - popd

about:
  homepage: https://openclaw.com
  documentation: https://openclaw.com/guide
  repository: https://github.com/openclaw/openclaw
  license: MIT
  license_file:
    - LICENSE
    - third-party-licenses.txt
  summary: Your own personal AI assistant. Any OS. Any Platform. The lobster way. 🦞
  description: |
    OpenClaw is a personal AI assistant you run on your own devices.
    It answers you on the channels you already use.
    It can speak and listen on macOS/iOS/Android, and can render a live Canvas you control.
    The Gateway is just the control plane — the product is the assistant.
extra:
  recipe-maintainers:
    - eunos-1128
