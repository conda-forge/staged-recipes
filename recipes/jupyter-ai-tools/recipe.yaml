context:
  version: "0.4.0"

package:
  name: jupyter-ai-tools
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/j/jupyter-ai-tools/jupyter_ai_tools-${{ version }}.tar.gz
  sha256: e68b0613c370eaa08d6ae49a0f2ca1679609980f1e0ca8a215f8f9d8d0972637

build:
  noarch: python
  script: python -m pip install . -vv
  number: 0

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - hatchling >=1.5
  run:
    - python >=${{ python_min }}
    - jupyter_server >=1.6,<3
    - jupyter_ydoc >=3.0.0,<4.0.0
    - jupyterlab-git
    - pycrdt >=0.12.0,<0.13.0

tests:
  - python:
      imports:
        - jupyter_ai_tools
      pip_check: true
    requirements:
      run:
        - python ${{ python_min }}.*

about:
  homepage: https://github.com/jupyter-ai-contrib/jupyter-ai-tools
  summary: "A suite of tools for AI agents in Jupyter"
  license: BSD-3-Clause
  license_file: LICENSE
  documentation: https://jupyter-ai.readthedocs.io/
  repository: https://github.com/jupyter-ai-contrib/jupyter-ai-tools

extra:
  recipe-maintainers:
    - dlqqq
    - andrii-i
