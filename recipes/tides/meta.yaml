{% set name = "tides" %}
{% set version = "2.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://downloads.sourceforge.net/project/tidesodes/tides-{{ version }}.tar.gz
  sha256: dde631e01952b99affdbf5737fda5c40a193561f7ad44790ce5d55f194c175fa

build:
  number: 0
  skip: true

requirements:
  build:
    - {{ compiler('c') }}
    - {{ stdlib("c") }}
    - make

  host:
    - gmp
    - mpfr
  run:
    - gmp
    - mpfr

test:
  commands:
    - test -f $PREFIX/include/minc_tides.h
    - test -f $PREFIX/include/mp_tides.h
    - test -f $PREFIX/include/dp_tides.h
    - test -f $PREFIX/lib/libTIDES.a

about:
  home: https://sourceforge.net/projects/tidesodes/
  license: GPL-3.0-or-later
  license_file: COPYING
  summary: "Taylor Invariant Differential Equation Solver"
  description: "TIDES is a library for integration of ODEs with high precision, integrated with SageMath."

extra:
  recipe-maintainers:
    - miguelmarco
