context:
  name: imgui-docking
  version: "1.91.0"

package:
  name: ${{ name }}
  version: ${{ version }}

source:
  - url: https://github.com/ocornut/imgui/archive/139e99ca37a3e127c87690202faec005cd892d36.tar.gz
    sha256: 152cffb9403e7ce5907897546223da096bd63a92a6f3560f2ed29d06fb0631b2
  - path: CMakeLists.txt
  - path: imgui-config.cmake.in

build:
  number: 0

requirements:
  build:
    - ${{ compiler('c') }}
    - ${{ stdlib("c") }}
    - ${{ compiler('cxx') }}
    - cmake
    - ninja
  host:
    - if: linux
      then: libgl-devel
    - if: unix
      then: glfw
    - if: win
      then: freetype
  run_exports:
    - ${{ pin_subpackage('imgui-docking', upper_bound='x.x.x') }}

tests:
  - package_contents:
      lib:
        - imgui

about:
  summary: Dear ImGui (docking branch) - bloat-free graphical user interface library for C++
  license: MIT
  license_file: LICENSE.txt
  homepage: https://github.com/ocornut/imgui

extra:
  recipe-maintainers:
    - julian-belina
