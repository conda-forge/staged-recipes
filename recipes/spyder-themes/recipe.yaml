schema_version: 1

context:
  python_min: "3.9"
  version: "1.0.1"

package:
  name: spyder-themes
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/s/spyder-themes/spyder_themes-${{ version }}.tar.gz
  sha256: b3e6eeb50a0b9c8fcffb54e3ed7923438b71fcc6ff76581cd8eec4ef41585673

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - setuptools >=77.0.3
    - pip
  run:
    - python >=${{ python_min }}

tests:
  - python:
      imports:
        - spyder_themes
      pip_check: true
      python_version: ${{ python_min }}.*

about:
  summary: Collection of themes for Spyder IDE
  license: MIT
  license_file: LICENSE
  homepage: https://pypi.org/project/spyder-themes/

extra:
  recipe-maintainers:
    - conradolandia
    - ccordoba12
    - dalthviz
