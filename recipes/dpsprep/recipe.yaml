context:
  version: "2.6.4"
  python_min: "3.11"

package:
  name: dpsprep
  version: ${{ version }}

source:
  url: https://github.com/kcroker/dpsprep/archive/refs/tags/v${{ version }}.tar.gz
  sha256: b68afedce707104980a42ddaad20fb150b5f7c77e81ff1c832aa83a2ffc9e758

build:
  number: 0
  noarch: python
  script: python -m pip install . -vv --no-deps --no-build-isolation
  python:
    entry_points:
      - dpsprep = dpsprep.cli:dpsprep

requirements:
  host:
    - pip
    - python ${{ python_min }}.*
    - uv-build >=0.10,<1
  run:
    - click >=8
    - djvulibre-python >=0.9.3
    - fpdf2 >=2.8
    - loguru >=0.7
    - pdfrw >=0.4
    - pillow >=12.2.0
    - python >=${{ python_min }},<4.0
    - typing_extensions >=4.5.0

tests:
  - python:
      python_version: ${{ python_min }}.*
      imports:
        - dpsprep
  - script:
      - dpsprep --help
      - dpsprep --version

about:
  homepage: https://github.com/kcroker/dpsprep
  summary: DjVu to PDF converter preserving outlines and text layers
  license: GPL-3.0-or-later
  license_file: LICENSE
  repository: https://github.com/kcroker/dpsprep
  documentation: https://github.com/kcroker/dpsprep/wiki

extra:
  recipe-maintainers:
    - user202729
