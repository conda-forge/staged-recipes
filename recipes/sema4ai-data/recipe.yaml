# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  name: sema4ai-data
  version: "1.2.2"

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/${{ name[0] }}/${{ name }}/sema4ai_data-${{ version }}.tar.gz
  sha256: 0a192c8252dff847dc2ec279917d7a3fbb572df4185a70f7127a9b1b5a53f625

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - poetry-core
    - pip
  run:
    - python >=${{ python_min }},<4
    - pandas >=1.3.5
    - sema4ai-actions >=1.3.8,<2.0.0
    - snowflake-connector-python >=3.15.0

tests:
  - python:
      imports:
        - sema4ai.data
      pip_check: true
      python_version: ${{ python_min }}.*

about:
  summary: Sema4.ai Data
  license: AGPL-3.0-only
  license_file: LICENSE
  homepage: https://github.com/Sema4AI/data/

extra:
  recipe-maintainers:
    - rxm7706
