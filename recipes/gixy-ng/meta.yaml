{% set name = "gixy-ng" %}
{% set pypi_name = "gixy_ng" %}
{% set version = "0.2.47" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ pypi_name[0] }}/{{ pypi_name }}/{{ pypi_name }}-{{ version }}.tar.gz
  sha256: 6729f4ae6b24ce554925bce51cbbca9e51785c31a2f85b923834c40c8d200dd1

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0
  entry_points:
    - gixy = gixy.cli.main:main

requirements:
  host:
    - python {{ python_min }}
    - pip
    - setuptools
  run:
    - python >={{ python_min }}
    - ngxparse >=0.5.16
    - jinja2 >=2.8
    - configargparse >=0.11.0

test:
  imports:
    - gixy
  requires:
    - pip
    - python {{ python_min }}
  commands:
    - pip check
    - gixy --version
    - gixy --help

about:
  home: https://gixy.getpagespeed.com/
  summary: NGINX configuration static analyzer focused on security
  description: |
    Gixy is a static analyzer for nginx configurations. Its main goal
    is to detect security misconfigurations and to automate the
    discovery of common flaws: HTTP response splitting via tainted
    variables in proxy/redirect contexts, host spoofing on
    virtual-host dispatch, alias-traversal "off-by-slash"
    misconfigurations, missing add_header inheritance, weak SSL/TLS
    ciphers, and other patterns documented at the project site.

    This recipe tracks the actively-maintained `gixy-ng' PyPI
    distribution (the binary remains `gixy'), which ships fixes and
    additional plugins on top of the original Yandex upstream.
  license: MPL-2.0
  license_family: MOZILLA
  license_file: LICENSE
  doc_url: https://gixy.getpagespeed.com/
  dev_url: https://github.com/dvershinin/gixy

extra:
  recipe-maintainers:
    - dvershinin
