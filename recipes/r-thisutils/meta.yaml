{% set version = "0.4.7" %}
{% set posix = 'm2-' if win else '' %}

package:
  name: r-thisutils
  version: {{ version|replace("-", "_") }}

source:
  url:
    - {{ cran_mirror }}/src/contrib/thisutils_{{ version }}.tar.gz
    - {{ cran_mirror }}/src/contrib/Archive/thisutils/thisutils_{{ version }}.tar.gz
  sha256: 7413bf97370d1f0eb5c693f2b0b303d8afbcb0d7e5cee715d2622904d277ea91

build:
  number: 0
  rpaths:
    - lib/R/lib/
    - lib/
  missing_dso_whitelist:
    - '*/R.dll'        # [win]
    - '*/Rblas.dll'    # [win]
    - '*/Rlapack.dll'  # [win]

requirements:
  build:
    - cross-r-base {{ r_base }}    # [build_platform != target_platform]
    - {{ compiler('c') }}          # [not win]
    - {{ stdlib("c") }}            # [not win]
    - {{ compiler('cxx') }}        # [not win]
    - {{ compiler('m2w64_c') }}    # [win]
    - {{ stdlib("m2w64_c") }}      # [win]
    - {{ compiler('m2w64_cxx') }}  # [win]
    - {{ posix }}make
    - {{ posix }}sed               # [win]
    - {{ posix }}coreutils         # [win]
    - {{ posix }}zip               # [win]
  host:
    - r-base >=4.1
    - r-cli
    - r-doparallel
    - r-foreach
    - r-matrix
    - r-pak
    - r-rcpp
    - r-rlang
  run:
    - r-base >=4.1
    - r-cli
    - r-doparallel
    - r-foreach
    - r-matrix
    - r-pak
    - r-rcpp
    - r-rlang

test:
  commands:
    - $R -e "library('thisutils')"           # [not win]
    - "\"%R%\" -e \"library('thisutils')\""  # [win]

about:
  home: https://mengxu98.github.io/thisutils/
  dev_url: https://github.com/mengxu98/thisutils
  doc_url: https://mengxu98.github.io/thisutils/reference/index.html
  license: MIT
  license_family: MIT
  license_file:
    - {{ environ["PREFIX"] }}/lib/R/share/licenses/MIT
    - LICENSE
  summary: Collection of utility functions for data analysis and computing.
  description: |
    Provides utility functions for data analysis and computing. Includes
    functions for logging, parallel processing, and other computational tasks to
    streamline workflows.

extra:
  recipe-maintainers:
    - conda-forge/r
    - mengxu98
