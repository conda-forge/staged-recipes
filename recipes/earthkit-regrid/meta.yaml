{% set version = "0.5.1" %}

package:
  name: earthkit-regrid
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/e/earthkit-regrid/earthkit_regrid-{{ version }}.tar.gz
  sha256: c0116848106da373d5889ff1c9cf475bddd8edb3765de7c5ad27999c17bac3c3

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - setuptools >=61
    - setuptools-scm >=8.0
    - pip
  run:
    - python >={{ python_min }}
    - multiurl
    - filelock
    - scipy

test:
  imports:
    - earthkit
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://github.com/ecmwf/earthkit-regrid/
  summary: ECMWF python regridding toolkit
  doc_url: https://earthkit-regrid.readthedocs.io/
  license: Apache-2.0
  license_file: LICENSE

extra:
  recipe-maintainers:
    - akrherz
