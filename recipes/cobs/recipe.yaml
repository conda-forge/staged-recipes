context:
  version: 1.2.2

package:
  name: cobs-python
  version: ${{ version }}

source:
  - url: https://pypi.org/packages/source/c/cobs/cobs-${{ version }}.tar.gz
    sha256: dbdd5e32111d72786f83d0c269215dcd6ac629b1ac1962c6878221f3b2ca98da

build:
  number: 0
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  build:
    - ${{ stdlib("c") }}
    - ${{ compiler("c") }}
  host:
    - python
    - setuptools >=61.0
    - pip
  run:
    - python

tests:
  - python:
      imports:
        - cobs
      pip_check: true

about:
  summary: Consistent Overhead Byte Stuffing (COBS)
  description: Python functions for encoding and decoding COBS.
  homepage: https://github.com/cmcqueen/cobs-python
  repository: https://github.com/cmcqueen/cobs-python
  license: MIT
  license_file:
    - LICENSE.txt

extra:
  recipe-maintainers:
    - carlodri
