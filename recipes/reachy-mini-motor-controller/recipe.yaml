schema_version: 1

context:
  version: "1.5.5"

package:
  name: reachy-mini-motor-controller
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/r/reachy-mini-motor-controller/reachy_mini_motor_controller-${{ version }}.tar.gz
  sha256: 29959d4e0a5fb0c8a49ee3d9883debe841efebb7d670f47821172fc724524846

build:
  number: 0
  script:
    - cargo-bundle-licenses --format yaml --output THIRDPARTY.yml
    - ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  build:
    - ${{ stdlib('c') }}
    - ${{ compiler('c') }}
    - ${{ compiler('rust') }}
    - cargo-bundle-licenses
  host:
    - python
    - pip
    - maturin >=1.8,<2.0a0
  run:
    - python

tests:
  - python:
      imports:
        - reachy_mini_motor_controller
      pip_check: true

about:
  # Upstream ships no license metadata or file; assumed Apache-2.0 to match the Reachy stack.
  license: Apache-2.0
  license_file: THIRDPARTY.yml
  summary: Motor controller bindings for the Reachy Mini robot
  description: |
    Python bindings, implemented in Rust with PyO3/maturin, for low-level
    communication with the serial-bus servo motors of the Reachy Mini
    robot by Pollen Robotics. It is used by the reachy-mini SDK and daemon
    to drive the robot's motors.
  # The GitHub repository (pollen-robotics/reachy_mini_motor_controller) is private;
  # only the PyPI project page is publicly accessible.
  homepage: https://huggingface.co/reachy-mini
  repository: https://github.com/pollen-robotics/reachy-mini-motor-controller

extra:
  recipe-maintainers:
    - ruben-arts
