# This example shows how to define a recipe using the new YAML based recipe format introduced by
# CEP 13.

# For more information about this format see: https://prefix-dev.github.io/rattler-build/latest/reference/recipe_file/

# The main differences with the old format is that no preprocessing is required for the file to be valid YAML.
# This means:
# - No "selectors", use YAML if-then-else expressions instead (https://prefix-dev.github.io/rattler-build/latest/selectors/)
# - Jinja expressions are formatted with a leading `$` to make them valid YAML
#
# See https://conda-forge.org/docs/maintainer/example_recipes for a collection of example recipes.

# Note: there are many handy hints in comments in this example -- remove them when you've finalized your recipe

# Define variables in this section that you can use in other parts.
context:
  name: vte
  version: "0.76.6"
  version_majmin: ${{ (version | split('.'))[:2] | join('.') }}

package:
  name: ${{ name|lower }}-gtk4
  version: ${{ version }}

source:
  url: "https://download.gnome.org/sources/${{ name }}/${{ version_majmin }}/${{ name }}-${{ version }}.tar.xz"
  # If getting the source from GitHub, remove the line above,
  # uncomment the line below, and modify as needed. Use releases if available:
  # url: https://github.com/simplejson/simplejson/releases/download/${{ version }}/simplejson-${{ version }}.tar.gz
  # and otherwise fall back to archive:
  # url: https://github.com/simplejson/simplejson/archive/v${{ version }}.tar.gz
  sha256: 9ac739ad73b63e109269088a6d27029b6d45700b0993977c1e00ed1bcb1a3d39
  # sha256 is the preferred checksum -- you can get it for a file with:
  #  `openssl sha256 <file name>`,
  # or, in one go without keeping the file with:
  # `curl -L <url> | sha256
  # You may need the packages or openssl and/or curl, available on conda-forge:
  #  `conda install openssl curl -c conda-forge``

build:
  # Uncomment the following line if the package is pure Python and the recipe is exactly the same for all platforms.
  # It is okay if the dependencies are not built for all platforms/versions, although selectors are still not allowed.
  # See https://conda-forge.org/docs/maintainer/knowledge_base.html#noarch-python for more details.
  # noarch: python
  # If the installation is complex, or different between Unix and Windows, use separate build.bat and build.sh files instead of this key.
  # By default, the package will be built for the Python versions supported by conda-forge and for all major OSs.
  # Uncomment the following lines to limit to Python 3.5 and newer (for example)
  # skip:
  #   - match(python, "<3.5")
  # or the following to limit to Windows.
  # skip:
  #   - win
  number: 0
  script:
    # - if: win
    #   then: |
    #     meson setup %MESON_ARGS% ^
    #       --prefix=%LIBRARY_PREFIX% ^
    #       --default-library=shared ^
    #       --wrap-mode=nofallback ^
    #       --buildtype=release ^
    #       -Dgir=true ^
    #       -Ddocs=false ^
    #       -Dvapi=false ^
    #       builddir
    #     ninja -v -C builddir -j %CPU_COUNT%
    #     ninja -C builddir install -j %CPU_COUNT%
    # gtk3: meson _build -D _systemd=false -D gtk4=false -D vapi=false --wipe
      |
        # --wrap-mode=nofallback: Forces using system-installed deps.
        # vapi: Vala binding generation (
        meson setup ${MESON_ARGS} \
            --prefix=$PREFIX \
            --default-library=shared \
            --wrap-mode=nofallback \
            -D_systemd=false \
            -Dgir=true \
            -Ddocs=false \
            -Dvapi=false \
            builddir
        ninja -v -C builddir -j ${CPU_COUNT}
        ninja -C builddir install -j ${CPU_COUNT}
  skip:
    - win

requirements:
  build:
    - ${{ compiler('c') }}
    - ${{ compiler('cxx') }}
    # - ${{ stdlib('c') }}
    - meson
    - ninja
    - pkg-config
    - gobject-introspection
    # - python >=3.7
  host:
    - gtk4
    - zlib
    # - m2-liblz4 >=1.9
    - if: unix
      then: pango
    # run:
    #   - glib >=2.72.0
    #   - cairo >=1.0
    #   - pango >=1.22.0
    #   - pcre2 >=10.21
    #   - liblz4 >=1.9
    #   - fribidi >=1.0.0
    #   - gnutls >=3.2.7
    #   - icu >=4.8
    #   - gtk3 >=3.24.0      # or gtk4 >=4.14.0, or both

tests:
  - package_contents:
      files:
        - if: unix
          then:
            # $PREFIX
            - bindings/gir/Vte-2.91.typelib
            # - lib/pkgconfig/gtksourceview-5.pc
        # - if: win
        #   then:
        #     - Library/lib/pkgconfig/gtksourceview-5.pc
        #     - Library/lib/gtksourceview-5.lib


about:
  homepage: https://gitlab.gnome.org/GNOME/vte
  summary: 'A GNOME Virtual Terminal library (Vte)'
  description: |
    VTE provides a virtual terminal widget for GTK applications.
  # Remember to specify the license variants for BSD, Apache, GPL, and LGPL.
  # Use the SPDX identifier, e.g: GPL-2.0-only instead of GNU General Public License version 2.0
  # See https://spdx.org/licenses/
  license: LGPL-3.0-or-later
  # It is required to include a license file in the package,
  # (even if the license doesn't require it) using the license_file entry.
  # Please also note that some projects have multiple license files which all need to be added using a valid yaml list.
  # See https://docs.conda.io/projects/conda-build/en/latest/resources/define-metadata.html#license-file
  license_file: [COPYING.CC-BY-4-0, COPYING.GPL3, COPYING.LGPL3, COPYING.XTERM]
  # The documentation and repository URLs are optional.
  documentation: https://gnome.pages.gitlab.gnome.org/vte/
  repository: https://gitlab.gnome.org/GNOME/vte

extra:
  recipe-maintainers:
    # GitHub IDs for maintainers of the recipe.
    # Always check with the people listed below if they are OK becoming maintainers of the recipe. (There will be spam!)
    - araffin
