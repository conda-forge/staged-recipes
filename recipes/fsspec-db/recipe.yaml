context:
  name: fsspec-db
  version: "0.1.1"

package:
  name: ${{ name }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/f/fsspec-db/fsspec_db-${{ version }}.tar.gz
  sha256: f48e54bd9ec7efba07b652ffcda4fb54feed79dd4441752f06eeef702ba20a5c

build:
  number: 0
  python:
    version_independent: true
  script:
    - if: unix
      then:
        - export PYO3_PYTHON="$PYTHON"
        - export RUSTFLAGS=""
      else:
        - set "PYO3_PYTHON=%PYTHON%"
        - set "RUSTFLAGS="
    - cargo-bundle-licenses --format yaml --output THIRDPARTY.yml
    - ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  skip: (is_abi3 and not is_python_min) or target_platform == "osx-arm64" or target_platform == "linux-aarch64"

requirements:
  build:
    - if: build_platform != target_platform
      then:
        - python
        - cross-python_${{ target_platform }}
        - crossenv
    - ${{ compiler("c") }}
    - ${{ stdlib("c") }}
    - ${{ compiler("rust") }}
    - cargo-bundle-licenses
  host:
    - python
    - pip
    - hatchling
    - hatch-rs >=0.2.1
    - if: is_abi3
      then:
        - python-abi3
  run:
    - python
    - fsspec
    - fsspec-rs >=0.1.2
    - pyarrow
  ignore_run_exports:
    from_package:
      - cross-python_${{ target_platform }}

tests:
  - python:
      imports:
        - fsspec_db
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"
  - if: is_abi3
    then:
      script:
        - if: win
          then: abi3audit %PREFIX%/Lib/site-packages/fsspec_db/fsspec_db.pyd -s -v --assume-minimum-abi3 ${{ python_min }}
          else:
            - export SP_DIR=$(python -c "import site; print(site.getsitepackages()[0])")
            - abi3audit $SP_DIR/fsspec_db/fsspec_db.abi3.so -s -v --assume-minimum-abi3 ${{ python_min }}
      requirements:
        run:
          - abi3audit

about:
  homepage: https://github.com/1kbgz/fsspec-db
  repository: https://github.com/1kbgz/fsspec-db
  summary: Database handling for fsspec filesystems
  license: Apache-2.0
  license_file:
    - LICENSE
    - THIRDPARTY.yml

extra:
  recipe-maintainers:
    - timkpaine
