{% set version = "0.1.0" %}

package:
  name: solarex
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/s/solarex/solarex-{{ version }}.tar.gz
  sha256: 708cf1937c0aca12296be01bcd924fc767bb4669c58437af3571f8abf281343f

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - setuptools >=64
    - wheel
    - pip
  run:
    - python >={{ python_min }}
    - numpy >=1.22
    - scipy >=1.8
    - requests >=2.28

test:
  imports:
    - solarex
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://github.com/solarex-dev/solarex
  summary: 'SolareX - Solar Resource eXchange: solar PV resource assessment, MCDA, and site analysis'
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - msotocalvo
