{% set version = "0.1.1" %}

package:
  name: solarex
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/s/solarex/solarex-{{ version }}.tar.gz
  sha256: 4ad0f11d70bf75e08d93b1dcb3021ddc1306fe2d6112f0695092fc3d01126cfd

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - setuptools >=64
    - wheel
    - pip
  run:
    - python >={{ python_min }}
    - numpy >=1.22
    - scipy >=1.8
    - requests >=2.28

test:
  imports:
    - solarex
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://github.com/Net-Zero-Horizon/solarex
  summary: 'SolareX - Solar Resource eXchange: solar PV resource assessment, MCDA, and site analysis'
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - msotocalvo