schema_version: 1

context:
  name: nimvault
  version: "0.4.2"

package:
  name: ${{ name }}
  version: ${{ version }}

source:
  url: https://github.com/HaoZeke/nimvault/archive/refs/tags/v${{ version }}.tar.gz
  sha256: 29f0ea6fa671f201e1d8736986afe9f008eba5d8fee35249f65a5e0b7587481a

build:
  number: 0
  # First cut: skip win (nim + gpg packaging not validated on the win matrix).
  skip:
    - win

requirements:
  build:
    - ${{ compiler('c') }}
    - ${{ stdlib('c') }}
    - nim
  run:
    - gnupg

tests:
  - script:
      - test -x "${PREFIX}/bin/nimvault"
  - package_contents:
      bin:
        - nimvault

about:
  homepage: https://github.com/HaoZeke/nimvault
  summary: GPG-encrypted opaque-blob vault with hidden filenames
  license: MIT
  license_file: LICENSE
  repository: https://github.com/HaoZeke/nimvault

extra:
  recipe-maintainers:
    - HaoZeke
