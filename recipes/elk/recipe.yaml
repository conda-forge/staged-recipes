schema_version: 1

context:
  name: elk
  version: 8.4.21

package:
  name: ${{ name }}
  version: ${{ version }}

source:
  url: https://sourceforge.net/projects/elk/files/elk-${{ version }}.tgz
  sha256: 4e04f87a3bf9e16c3839b4b16a222b4ef92d11a18b0b472fb196c23d39bdb4df

build:
  number: 0
  skip: not linux

requirements:
  build:
    - make
    - ${{ stdlib('c') }}
    - ${{ compiler('c') }}
    - ${{ compiler('fortran') }}
  host:
    - perl
    - if: linux
      then: libgomp
    - if: osx
      then: llvm-openmp
  run:
  run_exports:
    - ${{ pin_subpackage(name, upper_bound='x') }}

tests:
  - script:
      - elk --help

about:
  license: GPL-3.0-or-later
  license_file: COPYING
  summary: An all-electron full-potential linearised augmented-planewave (FP-LAPW) code
  homepage: https://sourceforge.net/projects/elk/
  repository: https://sourceforge.net/projects/elk/

extra:
  recipe-maintainers:
    - martin-g

