schema_version: 1

context:
  version: "0.6.9"
  min_python: "3.7"

package:
  name: parserator
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/p/parserator/parserator-${{ version }}.tar.gz
  sha256: f7dfd2d41588aaafa485da6f7f1107ac8e5997f0cabed9a65e1302bfa7af480a

build:
  number: 0
  noarch: python
  script: python -m pip install . -vv

requirements:
  host:
    - python ==${{min_python}}.*
    - pip
    - setuptools
    - wheel
  run:
    - python >=${{min_python}}
    - lxml >=3.7.3
    - python-crfsuite >=0.7
    - chardet

tests:
  - python:
      imports:
        - parserator
      pip_check: true

about:
  homepage: https://github.com/datamade/parserator
  summary: A toolkit for making domain-specific probabilistic parsers
  description: |
    Parserator is a toolkit for making probabilistic parsers using
    conditional random fields. Given labeled training data, it trains
    a model that can parse new strings into labeled components.
  license: MIT
  license_file: LICENSE
  repository: https://github.com/datamade/parserator

extra:
  recipe-maintainers:
    - zaneselvans
