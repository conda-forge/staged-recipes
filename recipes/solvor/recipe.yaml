# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "0.6.2"
  python_min: "3.12"

package:
  name: solvor
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/s/solvor/solvor-${{ version }}.tar.gz
  sha256: fe9cea887b0d2abf107d332082b97b061289292bc8b1f8f7d7c086dac3a9a7ae

build:
  number: 0
  script:
    # CWD-isolation note: rattler-build's script-list entries share CWD
    # across entries (env vars don't carry, but CWD does — subtle gotcha
    # vs G1). pushd/popd works in both bash AND cmd.exe; a bash subshell
    # `(cd rust && ...)` does NOT isolate CWD on Windows because cmd.exe
    # `(...)` is command grouping, not a subshell — the cd leaks out and
    # breaks the next pip step (seen on staged-recipes#33647 win_64).
    - pushd rust && cargo-bundle-licenses --format yaml --output ../THIRDPARTY.yml && popd
    - ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  build:
    - if: build_platform != target_platform
      then:
        - python
        - cross-python_${{ target_platform }}
    - ${{ compiler('c') }}
    - ${{ stdlib('c') }}
    - ${{ compiler('rust') }}
    - cargo-bundle-licenses
  host:
    - python ${{ python_min }}.*
    - pip
    - maturin >=1.7,<2.0
  run:
    - python

tests:
  - python:
      imports:
        - solvor
      pip_check: true

about:
  homepage: https://solvOR.ai
  repository: https://github.com/StevenBtw/solvOR
  license: Apache-2.0
  license_file:
    - LICENSE
    - THIRDPARTY.yml
  summary: Solvor all your optimization needs
  description: |
    solvor is a Rust-implemented optimization toolkit with Python
    bindings (PyO3 + maturin). It bundles linear-programming, SAT,
    and metaheuristics solvers under a single Python API, targeted
    at operations-research workloads.

extra:
  recipe-maintainers:
    - rxm7706
