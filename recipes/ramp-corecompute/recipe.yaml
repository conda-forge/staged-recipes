schema_version: 1

context:
  python_min: "3.11"
  version: "0.0.3"

package:
  name: ramp-corecompute
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/r/ramp-corecompute/ramp_corecompute-${{ version }}.tar.gz
  sha256: c45387061e4c95fd9c1eacf5039ba7326046788c1a60cb62626a4b339bd87f7a

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - setuptools
    - setuptools-scm
    - wheel
    - pip
  run:
    - python >=${{ python_min }}
    - numpy
    - more-itertools
    - ramp-core
    - ramp-coremaker
    - ramp-coreoperator
    - ramp-reactions
    - xarray

tests:
  - python:
      imports:
        - corecompute
      pip_check: true
      python_version: 
        - ${{ python_min }}.*
        - "*"

about:
  summary: Package for protocol-based definition of reactor transport computation
  license: MIT
  license_file: LICENSE
  homepage: https://pypi.org/project/ramp-corecompute/

extra:
  recipe-maintainers:
    - esheder
