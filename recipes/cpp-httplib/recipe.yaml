context:
  version: "0.18.7"

package:
  name: cpp-httplib
  version: ${{ version }}

source:
  url: https://github.com/yhirose/cpp-httplib/archive/refs/tags/v${{ version }}.tar.gz
  sha256: b7b1e9e4e77565a5a9bc95e761d5df3e7c0e8ca37c90fd78b1b031bc6cb90fc1

build:
  number: 0
  script:
    - if: unix
      then:
        - cmake -B build -G Ninja ${CMAKE_ARGS} -DHTTPLIB_COMPILE=OFF .
        - cmake --install build
      else:
        - cmake -B build -G Ninja %CMAKE_ARGS% -DHTTPLIB_COMPILE=OFF .
        - cmake --install build

requirements:
  build:
    - cmake
    - ninja
    - ${{ compiler('cxx') }}
    - ${{ stdlib('c') }}
  host:
    - openssl

tests:
  - package_contents:
      include:
        - httplib.h

about:
  homepage: https://github.com/yhirose/cpp-httplib
  license: MIT
  license_file: LICENSE
  summary: A C++ header-only HTTP/HTTPS library
  description: |
    A C++11 single-file header-only cross platform HTTP/HTTPS library.
    It's extremely easy to setup. Just include the httplib.h file in your code!
  repository: https://github.com/yhirose/cpp-httplib

extra:
  recipe-maintainers:
    - amitsingh21
    - wolfv
