schema_version: 1

context:
  version: "2.0.0"

package:
  name: pystac-ext-projection
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/p/pystac-ext-projection/pystac.extensions.projection-${{ version }}.tar.gz
  sha256: 72517587636c3d0f325cf11dfa75e0431570c6a13305bf53d0f95b2548deec1f

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - hatchling
    - pip
  run:
    - python >=${{ python_min }}
    - pystac-core

tests:
  - python:
      imports:
        - pystac.extensions.projection
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  summary: Projection extension for PySTAC
  license: Apache-2.0
  license_file: LICENSE
  homepage: https://pypi.org/project/pystac-ext-projection/
  documentation: https://pystac.readthedocs.io

extra:
  recipe-maintainers:
    - ocefpaf
