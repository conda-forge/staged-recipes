schema_version: 1

context:
  version: "0.1.0"

package:
  name: jupyverse-resource-usage
  version: ${{ version }}

source:
  - url: https://pypi.org/packages/source/j/jupyverse-resource-usage/jupyverse_resource_usage-${{ version }}.tar.gz
    sha256: 687dc55da5d319768b61a1c66bca1b874ace872ff4919b37a6c926a7c3db2701

build:
  noarch: python
  number: 0
  script:
    - ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation --disable-pip-version-check

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - uv-build
  run:
    - python >=${{ python_min }}
    - fastapi-core
    - jupyverse-api >=0.15.0,<0.16.0
    - jupyverse-auth >=0.2.0,<0.3.0

tests:
  - python:
      imports: jupyverse_resource_usage
      pip_check: true
      python_version: ${{ python_min }}.*

about:
  license: BSD-3-Clause
  license_file: COPYING.md
  homepage: https://github.com/jupyter-server/jupyverse/tree/main/api/resource_usage
  summary: The API for Jupyverse's resource usage.

extra:
  recipe-maintainers:
    - davidbrochart
