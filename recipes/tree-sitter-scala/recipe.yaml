schema_version: 1

context:
  version: "0.26.0"

package:
  name: tree-sitter-scala
  version: ${{ version }}

source:
  url: https://github.com/tree-sitter/tree-sitter-scala/archive/refs/tags/v${{ version }}.tar.gz
  sha256: ab3d79043b9b07dbda407ce4b9fcb07ece2b3e1892966eaf2092294b39745d52

build:
  number: 0
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  build:
    - ${{ compiler("c") }}
  host:
    - python
    - pip
    - setuptools >=42
  run:
    - python

tests:
  - python:
      imports:
        - tree_sitter_scala

about:
  homepage: https://github.com/tree-sitter/tree-sitter-scala
  summary: Scala grammar for tree-sitter
  license: MIT
  license_file: LICENSE
  repository: https://github.com/tree-sitter/tree-sitter-scala

extra:
  recipe-maintainers:
    - killua156
    - mgorny
