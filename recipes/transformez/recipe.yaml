schema_version: 1

context:
  name: transformez 
  version: "0.5.0"
  python_min: "3.12"

package:
  name: ${{ name | lower }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/${{ name[0] }}/${{ name }}/${{ name | replace('-', '_') }}-${{ version }}.tar.gz
  sha256: 917ef07d51f9d788ba8e1ac272285dde92c022dcf0cc8b9c3a964f9794c9ea0b

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  python:
    entry_points:
      - transformez = transformez.cli:transformez_cli 

requirements:
  host:
    - python ${{ python_min }}.*
    - hatchling >=1.5.0
    - hatch-vcs
    - wheel
    - pip
  run:
    - python >=${{ python_min }}
    - fetchez >=0.6.0
    - click
    - fiona
    - numpy >1.24
    - pyproj >3.6.1
    - rasterio >1.4.0
    - scipy

tests:
  - python:
      python_version: 
        - ${{ python_min }}.*
        - "*"
      pip_check: true
      imports:
        - transformez
  - script:
      - transformez --help
    requirements:
      run:
        - python ${{ python_min }}.*

about:
  homepage: https://github.com/continuous-dems/transformez
  summary: A standalone utility for vertical elevation datum transformations.
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - matth-love
    - mfisher87
