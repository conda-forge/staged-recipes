schema_version: 1

context:
  version: "0.24.2"

package:
  name: "tree-sitter-c"
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/t/tree_sitter_c/tree_sitter_c-${{ version }}.tar.gz
  sha256: 1628584df0299b5a340aa63f8e67b6c97c91517f52fa7e7a4c557e40adb330a9

build:
  number: 0
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  build:
    - ${{ compiler("c") }}
  host:
    - python
    - pip
    - setuptools >=42
    
  run:
    - python

tests:
  - python:
      imports:
        - tree_sitter_c

about:
  homepage: https://github.com/tree-sitter/tree-sitter-c
  summary: C grammar for tree-sitter
  license: MIT
  license_file: LICENSE
  repository: https://github.com/tree-sitter/tree-sitter-c

extra:
  recipe-maintainers:
    - killua156
    - mgorny
