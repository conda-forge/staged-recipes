schema_version: 1

context:
  version: "0.1.0"
  python_min: "3.10"

package:
  name: python-serafin
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/p/python-serafin/python_serafin-${{ version }}.tar.gz
  sha256: 621a85a99a5352d9335369be8903486b4fb2565559d30707446cb35d5b1b67c8

build:
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python ${{ python_min }}.*
    - hatchling
    - hatch-vcs
    - pip
  run:
    - python >=${{ python_min }}
    - numpy >=1.24

tests:
  - python:
      imports:
        - serafin
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  summary: Read and write Serafin (TELEMAC) binary files
  license: GPL-3.0-only
  license_file: LICENSE
  homepage: https://gitlab.com/isl-ingenierie/modules-python/python-serafin
  repository: https://gitlab.com/isl-ingenierie/modules-python/python-serafin

extra:
  recipe-maintainers:
    - nicogodet
    - tomsail
