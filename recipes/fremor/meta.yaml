{% set version = "0.9.2" %}

package:
  name: "fremor"
  version: {{ version }}

source:
  url: https://github.com/NOAA-GFDL/fremor/releases/download/{{ version }}/fremor-{{ version }}.tar.gz
  sha256: a07a24211bb36db8d7a0db28bdc60c76dec334b64c7c94c50119d1219f2f5a0d

build:
  script: "{{ PYTHON }} -m pip install . -vv --no-deps"
  number: 0
  noarch: python

requirements:
  host:
    - python >=3.11
    - pip
    - setuptools
    - wheel
  run:
    - python >=3.11
    - click >=8.2
    - cmor >=3.14.3
    - netcdf4 >=1.7
    - numpy >=2
    - pyyaml

test:
  source_files:
    - fremor/
  requires:
    - pytest
  imports:
    - fremor
    - fremor._version
    - fremor.cli
    - fremor.cmor_config
    - fremor.cmor_constants
    - fremor.cmor_finder
    - fremor.cmor_helpers
    - fremor.cmor_init
    - fremor.cmor_mixer
    - fremor.cmor_yamler
  commands:
    - fremor --help
    - fremor config --help
    - fremor find --help
    - fremor init --help
    - fremor run --help
    - fremor varlist --help
    - fremor yaml --help

about:
  home: https://github.com/NOAA-GFDL/fremor
  license: Apache-2.0
  license_file: LICENSE.md
  summary: Model output rewriter (CMORizer) for FRE/FMS based models
  description: |
    Written by Ian Laflotte, Sergey Nikonov, Chris Blanton, and NOAA-GFDL Modeling Systems Division

extra:
  recipe-maintainers:
    - ilaflott
