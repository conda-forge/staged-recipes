# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "0.2.3"

package:
  name: kedro-pandera
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/k/kedro-pandera/kedro_pandera-${{ version }}.tar.gz
  sha256: d42168b74bfecc6ab551438e794b613ca6304342bfa772a78619d7d8baae3f5b

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - setuptools-scm
    - setuptools
    - pip
  run:
    - python >=${{ python_min }}
    - pandera >=0.15
    - kedro >=0.19.0

tests:
  - python:
      imports:
        - kedro_pandera
      pip_check: false
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  summary: A kedro plugin to use pandera in your kedro projects
  license: Apache-2.0
  license_file: LICENSE
  homepage: https://pypi.org/project/kedro-pandera/
  repository: https://github.com/Galileo-Galilei/kedro-pandera

extra:
  recipe-maintainers:
    - rxm7706
