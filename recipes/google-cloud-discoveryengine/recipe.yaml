context:
  version: 0.13.12

package:
  name: google-cloud-discoveryengine
  version: ${{ version }}

source:
- url: https://pypi.org/packages/source/g/google-cloud-discoveryengine/google_cloud_discoveryengine-${{ version }}.tar.gz
  sha256: d6b9f8fadd8ad0d2f4438231c5eb7772a317e9f59cafbcbadc19b5d54c609419

build:
  number: 0
  script: ${{ PYTHON }} -m pip install .
  noarch: python

requirements:
  host:
  - python ${{ python_min }}.*
  - pip
  - setuptools
  run:
  - python >=${{ python_min }}
  - google-api-core >=1.34.1, <3.0.0,!=2.0.*,!=2.1.*,!=2.2.*
  - google-auth >=2.14.1, <3.0.0,!=2.24.0,!=2.25.0
  - proto-plus >=1.25.0, <2.0.0
  - protobuf >=3.20.2,<7.0.0,!=4.21.0,!=4.21.1,!=4.21.2,!=4.21.3,!=4.21.4,!=4.21.5
  - grpcio >=1.75.1, <2.0.0
  - grpcio-status >=1.75.1, <2.0.0

tests:
- python:
    python_version:
      - ${{ python_min }}.*
      - "*"
    imports:
    - google.cloud.discoveryengine
    - google.cloud.discoveryengine_v1
    pip_check: true

about:
  homepage: https://github.com/googleapis/google-cloud-python/tree/main/packages/google-cloud-discoveryengine
  summary: Google Cloud Discoveryengine API client library
  description: "Python Client for Discovery Engine API."
  license: Apache-2.0
  license_file:
  - LICENSE

extra:
  recipe-maintainers:
    - soapy1
