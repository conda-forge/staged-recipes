schema_version: 1

context:
  python_min: "3.11"
  version: "1.0.3"

package:
  name: pycfit
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/p/pycfit/pycfit-${{ version }}.tar.gz
  sha256: 595635b6631227eba756c61daabe68f45bee54c27ecd6f7ad03b4ced62241d0b

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  
requirements:
  host:
    - python ${{ python_min }}.*
    - setuptools >=65
    - setuptools-scm >=8.0.0
    - wheel
    - pip
  run:
    - python >=${{ python_min }}
    - ipython
    - astropy-base >=7.1
    - scipy
    - matplotlib
    - dask-core
    - asdf-astropy >=0.3
    - pyqt >=5,<6
    - qtpy
    - pyqtspinner
    - pyqtgraph

tests:
  - python:
      imports:
        - pycfit
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"
      
about:
  summary: Component Fitting package
  license: Apache-2.0
  license_file: LICENSE
  homepage: https://pypi.org/project/pycfit/
  repository: https://git.smce.nasa.gov/solo/pycfit

extra:
  recipe-maintainers:
    - AyrisA
