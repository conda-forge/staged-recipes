{% set version = "0.5.0a0" %}

package:
  name: sphinxcontrib-towncrier
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/s/sphinxcontrib-towncrier/sphinxcontrib_towncrier-{{ version }}.tar.gz
  sha256: 294e69df6e275e7a86df7ea6a927cc7c28c2c370a884cd5c45de6ec989858f27

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - setuptools >=64
    - setuptools-scm >=8
    - pip
  run:
    - python >={{ python_min }}
    - sphinx
    - towncrier >=23

test:
  imports:
    - sphinxcontrib.towncrier
  commands:
    - pip check
  requires:
    - pip
    - python ${{ python_min }}

about:
  home: https://github.com/sphinx-contrib/sphinxcontrib-towncrier
  summary: An RST directive for injecting a Towncrier-generated changelog draft containing fragments for the unreleased (next) project version
  license: BSD-3-Clause
  license_file: LICENSE

extra:
  recipe-maintainers:
    - larsoner
