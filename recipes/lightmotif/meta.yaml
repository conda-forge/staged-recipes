{% set name = "lightmotif" %}
{% set version = "0.10.1" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  # PyPI sdist 0.10.1 is broken: maturin dropped [lib] from lightmotif-py/Cargo.toml,
  # so it has no cargo target. The GitHub tag tarball has the correct manifest.
  url: https://github.com/althonos/lightmotif/archive/refs/tags/v{{ version }}.tar.gz
  sha256: 79379622d59d4210f29437cf3d20d90cbb1f5cda0c3b482709ce49c25f8438a2

build:
  number: 0
  # lightmotif is a Rust/PyO3 extension built with the maturin backend.
  # --no-build-isolation -> maturin is taken from `host` (below), not pip.
  # script: {{ PYTHON }} -m pip install . --no-deps --no-build-isolation -vv

requirements:
  build:
    - {{ compiler('c') }}
    - {{ stdlib('c') }}
    - {{ compiler('rust') }}
    - cross-python_{{ target_platform }}  # [build_platform != target_platform]
    - cargo-bundle-licenses
  host:
    - python
    - pip
    - maturin >=1.2,<2
  run:
    - python

test:
  imports:
    - lightmotif
  commands:
    - pip check
  requires:
    - pip

about:
  home: https://github.com/althonos/lightmotif
  summary: PyO3 bindings to lightmotif, a platform-accelerated biological motif scanner (PWM/PSSM).
  description: |
    lightmotif is a Rust library with Python bindings for fast, SIMD-accelerated
    scanning of biological sequences with position weight / specific-scoring
    matrices (PWM/PSSM). Used by genomeblocks for motif enrichment.
  license: MIT
  license_family: MIT
  license_file:  
    - COPYING
    - THIRDPARTY.yml
  dev_url: https://github.com/althonos/lightmotif

extra:
  recipe-maintainers:
    - birkiy
