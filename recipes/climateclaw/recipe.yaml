context:
  name: climateclaw
  version: "2603.0.0"

package:
  name: ${{ name }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/${{ name[0] }}/${{ name }}/${{ name }}-${{ version }}.tar.gz
  sha256: a2d1e72d2f0bf46baae995dd9620113cdd71b1581e9999a6b1ea8381b8c2a557

build:
  number: 0
  script: ${{ PYTHON }} -m pip install . -v --no-deps --no-build-isolation
  noarch: python

requirements:
  host:
    - python ${{ python_min }}.*
    - setuptools >=61.0
    - pip
  run:
    - python >=${{ python_min }}
    - numpy >=1.26
    - scipy >=1.12
    - httpx >=0.27

tests:
  - python:
      python_version:
        - ${{ python_min }}.*
        - "*"
      imports:
        - climateclaw
      pip_check: true

about:
  summary: "Climate data analysis & statistics — clawing into your data."
  description: |
    climateclaw is a lightweight Python library for climate data analysis
    and statistics. It fetches historical climate data from Open-Meteo
    (no API key needed) and provides tools to compute means, detect
    anomalies against a baseline period, and identify linear
    warming/cooling trends.
  license: BSD-3-Clause
  license_file: LICENSE
  homepage: https://github.com/climateclaw/climateclaw
  repository: https://github.com/climateclaw/climateclaw

extra:
  recipe-maintainers:
    - tropicrainforest
