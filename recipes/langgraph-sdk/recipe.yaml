schema_version: 1

context:
  version: "0.3.14"

package:
  name: langgraph-sdk
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/l/langgraph-sdk/langgraph_sdk-${{ version }}.tar.gz
  sha256: acd1674c538e97f3cdaa610f6dd7e34bc9bad30167f0ccc482dcd563325e81f5

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - hatchling
    - pip
  run:
    - python >=${{ python_min }}
    - httpx >=0.25.2
    - orjson >=3.11.5

tests:
  - python:
      python_version:
        - ${{ python_min }}.*
        - '*'
      imports:
        - langgraph_sdk
      pip_check: true

about:
  summary: SDK for interacting with LangGraph API
  license: MIT
  license_file: LICENSE
  homepage: https://pypi.org/project/langgraph-sdk/
  repository: https://github.com/langchain-ai/langgraph/tree/main/libs/sdk-py

extra:
  recipe-maintainers:
    - xhochy
