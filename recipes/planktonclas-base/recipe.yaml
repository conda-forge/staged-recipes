context:
  pypi_name: planktonclas
  name: planktonclas-base
  version: "0.2.3"

package:
  name: ${{ name }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/${{ pypi_name[0] }}/${{ pypi_name }}/${{ pypi_name }}-${{ version }}.tar.gz
  sha256: b36c4eb09bf9e2256ac27464f999415a2b8912c03622e5d6ea9cbd6ead99fb33

build:
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0
  skip:
    - win
    - osx
    - match(python, "<3.10")
    - match(python, ">=3.13")
  python:
    entry_points:
      - planktonclas = planktonclas.cli:main

requirements:
  host:
    - python
    - pip
    - setuptools
  run:
    - python
    - numpy >=1.26.0,<2.2.0
    - pyyaml >=6.0
    - requests >=2.27.1
    - tqdm >=4.64.0
    - pandas >=2.0.0
    - pillow >=10.0
    - if: cuda_compiler_version == "None"
      then:
        - tensorflow >=2.19.0,<2.20.0 cpu_*
      else:
        - tensorflow >=2.19.0,<2.20.0 cuda128*
    - protobuf >=3.20.0
    - py-opencv >=4.5.0
    - albumentations
    - matplotlib-base >=3.9
    - seaborn-base >=0.12.0
    - scikit-learn >=1.0.0

tests:
  - if: cuda_compiler_version == "none"
    then:
      python:
        imports:
          - planktonclas
        pip_check: false

about:
  homepage: https://github.com/lifewatch/planktonclas
  summary: Phytoplankton image classification — slim variant (no DEEPaaS REST API)
  description: |
    planktonclas-base provides the inference and training paths of the
    planktonclas package without the DEEPaaS REST-API runtime layer
    (deepaas, flaat, aiohttp-apispec are not yet packaged for conda-forge).

    For the full package including the REST API: pip install planktonclas
  license: Apache-2.0
  license_file: LICENSE
  documentation: https://planktonclas.readthedocs.io/en/latest/
  repository: https://github.com/lifewatch/planktonclas

extra:
  recipe-maintainers:
    - annefou
    - j34ni
