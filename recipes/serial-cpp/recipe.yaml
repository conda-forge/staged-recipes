schema_version: 1

context:
  version: 1.3.4

package:
  name: libserial-cpp
  version: ${{ version }}

source:
  url: https://github.com/gbionics/serial_cpp/archive/refs/tags/v${{ version }}.tar.gz
  sha256: e2b75dad2e0067018d181804e56e4915d152fc916e2ef33cf7e42bf2e1fd2272

build:
  number: 0

requirements:
  build:
    - ${{ compiler('c') }}
    - ${{ stdlib('c') }}
    - ${{ compiler('cxx') }}
    - cmake
    - pkg-config
    - ninja
  host:
    # This is just used for tests
    - gtest
  ignore_run_exports:
    from_package:
      - gtest
  run_exports:
    # See https://github.com/gbionics/serial_cpp#compatibility-policy
    - ${{ pin_subpackage('libserial-cpp', upper_bound='x.x') }}
tests:
  - requirements:
      run:
        - cmake-package-check
        - ${{ compiler('c') }}
        - ${{ compiler('cxx') }}
    script:
      - cmake-package-check serial_cpp --targets serial_cpp::serial_cpp
  - package_contents:
      include:
        - serial_cpp/serial.h
      lib:
        - serial_cpp

about:
  license: MIT
  license_file: LICENSE
  summary: Cross-platform, Serial Port library written in C++.
  homepage: https://github.com/gbionics/serial_cpp

extra:
  feedstock-name: serial-cpp
  recipe-maintainers:
    - traversaro
    - RiccardoGrieco
