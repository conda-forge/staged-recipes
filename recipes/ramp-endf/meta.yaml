{% set python_min = "3.11" %}
{% set version = "0.0.3" %}

package:
  name: ramp-endf
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/r/ramp-endf/ramp_endf-{{ version }}.tar.gz
  sha256: 3c44c6f1a9162a4286241b2efa7984ac0b27571127fbf99b19615e1f5a8c73aa

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python {{ python_min }}.*
    - setuptools
    - setuptools-scm
    - wheel
    - pip
  run:
    - python >={{ python_min }}
    - endf
    - numpy
    - multipledispatch
    - more-itertools
    - ramp-isotopes
    - uncertainties

test:
  imports:
    - ramp_endf
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}.*

about:
  home: https://pypi.org/project/ramp-endf/
  summary: Package for making ENDF information more accessible
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - esheder
