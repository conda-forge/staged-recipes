# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "0.2.0"
  python_check_max: "3.14"

package:
  name: ipython-beartype
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/i/ipython-beartype/ipython_beartype-${{ version }}.tar.gz
  sha256: 83deb80fb90ee92138e3ebd3368d1b368fd4974c45cbd49c617a50b9172ef7e8

build:
  number: 0
  noarch: python
  script:
    - ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation --disable-pip-version-check

requirements:
  host:
    - hatchling >=1.14.0
    - pip
    - python ${{ python_min }}.*
  run:
    - beartype
    - ipython >=8.0.0
    - python >=${{ python_min }}

tests:
  - python:
      imports: ipython_beartype
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - ${{ python_check_max }}.*

about:
  summary: IPython extension type-checking IPython environments with beartype.
  license: MIT
  license_file: LICENSE
  homepage: https://pypi.org/project/ipython-beartype
  repository: https://github.com/beartype/ipython-beartype
  documentation: https://beartype.readthedocs.io

extra:
  recipe-maintainers:
    - bollwyvl
