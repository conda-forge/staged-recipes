{% set version = "0.1.1" %}

package:
  name: windrex
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/w/windrex/windrex-{{ version }}.tar.gz
  sha256: 5b24b9c19c9220ba93111802df6dec0330efdb9be3135ae6cfe9d66a0b65bb02

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - setuptools >=64
    - wheel
    - pip
  run:
    - python >={{ python_min }}
    - numpy >=1.22
    - scipy >=1.8
    - requests >=2.28

test:
  imports:
    - windrex
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://github.com/Net-Zero-Horizon/windrex
  summary: 'WindreX - Wind Resource eXchange: wind resource assessment, wake modeling, and site analysis'
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - msotocalvo