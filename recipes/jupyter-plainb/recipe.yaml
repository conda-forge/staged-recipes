schema_version: 1

context:
  python_min: "3.10"
  version: "0.2.1"

package:
  name: jupyter-plainb
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/j/jupyter-plainb/jupyter_plainb-${{ version }}.tar.gz
  sha256: e19282d3db327510c2ff1ad262b0aee6f91be00d4448e2fe33b656ec11b8bc5b

build:
  number: 0
  noarch: python
  script:
    content: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
    env:
      SKIP_JUPYTER_BUILDER: "1"

requirements:
  host:
    - python ${{ python_min }}.*
    - hatchling >=1.5.0
    - jupyterlab >=4.0.0,<5
    - hatch-nodejs-version >=0.3.2
    - hatch-jupyter-builder >=0.5
    - pip
  run:
    - python >=${{ python_min }}

tests:
  - python:
      imports:
        - jupyter_plainb
      pip_check: true
      python_version: ${{ python_min }}.*

about:
  summary: A JupyterLab extension to convert plaintext files to jupyter notebooks
  license: BSD-3-Clause
  license_file: LICENSE
  homepage: https://github.com/notebook-link/jupyter-plainb

extra:
  recipe-maintainers:
    - Yahiewi
