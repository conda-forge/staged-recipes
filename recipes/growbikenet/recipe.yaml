schema_version: 1

context:
  python_min: "3.12"
  version: "0.10.3"

package:
  name: growbikenet
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/g/growbikenet/growbikenet-${{ version }}.tar.gz
  sha256: 353373bc7ad791860bb5e1ea1ed3c42ed7d9661899faf24d6ec6d31744119e93

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - setuptools >=77.0.3
    - pip
  run:
    - python >=${{ python_min }}
    - geopandas >=1
    - matplotlib-base
    - osmnx >=2
    - geojson
    - tqdm

tests:
  - python:
      imports:
        - growbikenet
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  summary: BikeNetKit Python package to grow urban bicycle networks
  license: AGPL-3.0-only
  license_file: LICENSE
  homepage: https://bikenetkit.org/
  documentation: https://bikenetkit.github.io/GrowBikeNet/

extra:
  recipe-maintainers:
    - mszell
