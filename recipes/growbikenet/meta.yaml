{% set version = "0.10.3" %}
{% set python_min = "3.12" %}

package:
  name: growbikenet
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/g/growbikenet/growbikenet-{{ version }}.tar.gz
  sha256: 353373bc7ad791860bb5e1ea1ed3c42ed7d9661899faf24d6ec6d31744119e93

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - setuptools >=77.0.3
    - pip
  run:
    - python >={{ python_min }}
    - geopandas >=1
    - matplotlib-base
    - osmnx >=2
    - geojson
    - tqdm

test:
  imports:
    - growbikenet
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://bikenetkit.org/
  summary: BikeNetKit Python package to grow urban bicycle networks
  doc_url: https://bikenetkit.github.io/GrowBikeNet/
  license: AGPL-3.0-only
  license_file: LICENSE

extra:
  recipe-maintainers:
    - mszell
