{% set version = "0.5.2" %}

package:
  name: growbikenet
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/g/growbikenet/growbikenet-{{ version }}.tar.gz
  sha256: 7b8334b5305ed9eeb55a9e784d37df2739def02d9b7f6d4afff46c294219d415

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python >=3.10
    - setuptools >=77.0.3
    - pip
  run:
    - python >=3.10
    - geopandas >=0.14
    - matplotlib-base
    - osmnx >=1.9.4
    - geojson
    - tqdm
    - pip
    - momepy
    - opencv

test:
  imports:
    - growbikenet
  commands:
    - pip check
  requires:
    - pip
    - python

about:
  home: https://pypi.org/project/growbikenet/
  summary: Python package to grow urban bicycle networks from scratch, spin-off from the paper 'Growing urban bicycle networks'
  license: AGPL-3.0-only
  license_file: LICENSE

extra:
  recipe-maintainers:
    - Manuel-Knepper
