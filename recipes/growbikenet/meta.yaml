{% set version = "0.6.0" %}

package:
  name: growbikenet
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/g/growbikenet/growbikenet-{{ version }}.tar.gz
  sha256: f5dece1e7cd834eeadc55734cd6571b53e5c9a99eb028f7c7bc84689ccb13dac

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python >=3.10
    - setuptools >=77.0.3
    - pip
  run:
    - python >=3.10
    - geopandas >=0.14
    - matplotlib-base
    - osmnx >=1.9.4
    - geojson
    - tqdm
    - pip
    - momepy
    - opencv
    - python-slugify

test:
  imports:
    - growbikenet
  commands:
    - pip check
  requires:
    - pip
    - python

about:
  home: https://pypi.org/project/growbikenet/
  summary: Python package to grow urban bicycle networks from scratch, spin-off from the paper 'Growing urban bicycle networks'
  license: AGPL-3.0-only
  license_file: LICENSE

extra:
  recipe-maintainers:
    - Manuel-Knepper
