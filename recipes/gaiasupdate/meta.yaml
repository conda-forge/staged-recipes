{% set version = "0.1.0" %}

package:
  name: gaiasupdate
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/g/gaiasupdate/gaiasupdate-{{ version }}.tar.gz
  sha256: 6595e3496f6bc3cbc55f10c7ead553b1b4cd1450516042d04dc09d96002c3263

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python >=3.9
    - setuptools >=58.0.4
    - setuptools-scm >=8.0
    - pip
  run:
    - python >=3.9
    - numpy >=1.26.2
    - scipy >=1.12
    - pandas <3.0
    - astropy <8.0
    - pyarrow >=15.0
    - astroquery >=0.4.7

test:
  imports:
    - gaiasupdate
  commands:
    - pip check
  requires:
    - pip
    - python

about:
  home: https://pypi.org/project/gaiasupdate/
  summary: Compute astrometric source parameters from Gaia epoch astrometry
  license: European Space Agency Public License (ESA-PL) Permissive (Type 3) - v2.4
  license_file: LICENSE.txt

extra:
  recipe-maintainers:
    - Arancha-Delgado
