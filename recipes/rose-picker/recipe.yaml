# rose_picker -- Met Office utility that converts Rose metadata into JSON.
#
# LFRic's build system shells out to it by the literal name `rose_picker`
# (underscore) -- see lfric_core/infrastructure/build/configuration.mk and
# lfric_build/rose_picker.py, which declares it as a Fab tool with
# exec_name="rose_picker". The pyproject entry point already provides exactly
# that console script, so nothing extra is needed here.
#
# The conda PACKAGE is named with a hyphen (`rose-picker`) per conda convention;
# the importable module and the executable both keep the underscore.
schema_version: 1

context:
  version: "2026.03.2"

package:
  name: rose-picker
  version: ${{ version }}

source:
  url: https://github.com/MetOffice/rose_picker/archive/refs/tags/${{ version }}.tar.gz
  sha256: 9d35cde4edee0069635b8170dd9e017f86f6a8f85b34917fbab545616edd1ce2

build:
  number: 0
  noarch: python
  script: python -m pip install . -vv --no-deps --no-build-isolation

requirements:
  # Pinned explicitly rather than via conda-forge's `python_min` variant: upstream
  # declares requires-python >=3.11, which is stricter than conda-forge's global
  # minimum, so spelling it out keeps the constraint visible and correct here.
  host:
    - python >=3.11
    - setuptools >=61.0
    - pip
  run:
    - python >=3.11

tests:
  - python:
      imports:
        - rose_picker
      pip_check: true
  - script:
      - rose_picker --help

about:
  homepage: https://github.com/MetOffice/rose_picker
  repository: https://github.com/MetOffice/rose_picker
  summary: Converts Rose metadata files into JSON format
  description: |
    rose_picker reads Rose application metadata (rose-meta.conf) and emits a
    JSON description of the namelists it declares. The LFRic build system uses
    it to generate the Fortran configuration-loading code for an application.
  # Source headers say "version 3 of the License, or (at your option) any later
  # version"; the pyproject records only "GPLv3".
  license: GPL-3.0-or-later
  license_file: COPYING

extra:
  recipe-maintainers:
    - ickc
