schema_version: 1

context:
  version: "1.0.1"

package:
  name: pystac-ext-label
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/p/pystac-ext-label/pystac_ext_label-${{ version }}.tar.gz
  sha256: 34e52bbc79d46a5a0f76833ce0f656de65b425a41ca362e705be68430196abc7

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - hatchling
    - pip
  run:
    - python >=${{ python_min }}
    - pystac-core

tests:
  - python:
      imports:
        - pystac_ext_label
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  summary: Label extension for PySTAC
  license: Apache-2.0
  license_file: PLEASE_ADD_LICENSE_FILE
  homepage: https://pypi.org/project/pystac-ext-label/
  documentation: https://pystac.readthedocs.io

extra:
  recipe-maintainers:
    - ocefpaf
