{% set version = "0.1.1" %}

package:
  name: temp_interpolation
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/t/temp_interpolation/temp_interpolation-{{ version }}.tar.gz
  sha256: f77fea2abf193a8fb9f6c4f747cd0235417b5b42872d9dbedcf304d5a5c780cc

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - setuptools >=64
    - setuptools-scm >=8
    - pip
  run:
    - python >={{ python_min }}
    - folium
    - geopandas
    - ipyleaflet
    - localtileserver
    - matplotlib-base
    - numpy
    - rasterio
    - requests

test:
  imports:
    - temp_interpolation
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://github.com/ishwar97/temp_interpolation
  summary: A package for temporal interpolation of spatial data
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - ishwar97
