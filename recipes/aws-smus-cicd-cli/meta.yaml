{% set name = "aws-smus-cicd-cli" %}
{% set version = "1.0.4" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name.replace('-', '_') }}-{{ version }}.tar.gz
  sha256: 77c85b5270793697eedfab3d090d7ededc655b3c92b87fac43db1b7a24aca685

build:
  noarch: python
  number: 0
  entry_points:
    - aws-smus-cicd-cli=smus_cicd.cli:app
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python >=3.8
    - pip
    - setuptools
  run:
    - python >=3.8
    - typer >=0.9.0
    - pyyaml >=6.0
    - boto3 >=1.26.0
    - botocore >=1.29.0
    - jsonschema >=4.17.0
    - rich >=13.0.0
    - requests >=2.28.0

test:
  imports:
    - smus_cicd
  commands:
    - aws-smus-cicd-cli --help

about:
  home: https://github.com/aws/CICD-for-SageMakerUnifiedStudio
  summary: A CLI tool for managing CI/CD pipelines in SageMaker Unified Studio
  license: MIT
  license_family: MIT
  license_file: LICENSE
  dev_url: https://github.com/aws/CICD-for-SageMakerUnifiedStudio

extra:
  recipe-maintainers:
    - Shnekit
