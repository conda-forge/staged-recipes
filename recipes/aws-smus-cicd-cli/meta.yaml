{% set name = "aws-smus-cicd-cli" %}
{% set version = "1.0.5" %}
{% set python_min = "3.8" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name.replace('-', '_') }}-{{ version }}.tar.gz
  sha256: e13d64843ad8ea6ebcae8e6bc82b6132c0fb1f2b3b8a5c60960d89d0d8289cd7

build:
  noarch: python
  number: 0
  entry_points:
    - aws-smus-cicd-cli=smus_cicd.cli:app
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python {{ python_min }}
    - pip
    - setuptools
  run:
    - python >={{ python_min }}
    - typer >=0.9.0
    - pyyaml >=6.0
    - boto3 >=1.26.0
    - botocore >=1.29.0
    - jsonschema >=4.17.0
    - rich >=13.0.0
    - requests >=2.28.0

test:
  imports:
    - smus_cicd
  requires:
    - python {{ python_min }}
  commands:
    - aws-smus-cicd-cli --help

about:
  home: https://github.com/aws/CICD-for-SageMakerUnifiedStudio
  summary: A CLI tool for managing CI/CD pipelines in SageMaker Unified Studio
  license: Apache-2.0
  license_family: Apache
  license_file: LICENSE
  dev_url: https://github.com/aws/CICD-for-SageMakerUnifiedStudio

extra:
  recipe-maintainers:
    - Shnekit
