{% set version = "6.0.3" %}

package:
  name: django-mongodb-backend
  version: {{ version }}

source:
  # Prefer the PyPI source tarball if one is published for this release.
  # Replace url and sha256 with the exact values from the release files page.
  url: https://pypi.org/packages/source/d/django_mongodb_backend/django_mongodb_backend-{{ version }}.tar.gz
  sha256: d5bbe460c4f1d6366242993c8894d03752a789737ef9dcd09b496bb9135d360f

build:
  script: {{ PYTHON }} -m pip install . -vv
  noarch: python
  number: 0

requirements:
  host:
    - python >=3.12
    - pip
  run:
    - python >=3.12
    - django >=6.0,<6.1
    - pymongo >=4.7,<5.0

test:
  imports:
    - django_mongodb_backend
  requires:
    - pip
  commands:
    - python -m pip check

about:
  home: https://github.com/mongodb/django-mongodb-backend
  license: Apache-2.0
  license_file: LICENSE
  summary: Django MongoDB Backend
  description: |
    Django MongoDB Backend is a Django database backend that uses
    PyMongo to connect to MongoDB.
  dev_url: https://github.com/mongodb/django-mongodb-backend
  doc_url: https://django-mongodb-backend.readthedocs.io/en/latest/

extra:
  recipe-maintainers:
    - aclark4life
    - timgraham
