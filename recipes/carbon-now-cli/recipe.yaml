schema_version: 1

context:
  version: 2.1.0

package:
  name: carbon-now-cli
  version: ${{ version }}

source:
  url: https://registry.npmjs.org/carbon-now-cli/-/carbon-now-cli-${{ version }}.tgz
  sha256: 7ad51db24caf6b79d77d9ee4407bee6a5ed0c6677014ae5ba0fb955fb7770083

build:
  number: 0
  noarch: generic

requirements:
  build:
    - jq
    - nodejs
    - pnpm
    - pnpm-licenses
  run:
    - nodejs >=18.17.0

tests:
  - script:
      - carbon-now --help

about:
  license: MIT
  license_file:
    - license
    - third-party-licenses.txt
  summary: Beautiful images of your code — from right inside your terminal.
  description: |
    carbon-now-cli generates beautiful images of your source code using
    carbon.now.sh, directly from your terminal. It supports all languages
    and themes available on carbon.now.sh, and can save images locally
    or copy them to clipboard. Note: after installation, you may need to
    run `npx playwright install chromium` to download the required browser.
  homepage: https://github.com/mixn/carbon-now-cli
  repository: https://github.com/mixn/carbon-now-cli
  documentation: https://github.com/mixn/carbon-now-cli#readme

extra:
  recipe-maintainers:
    - ytausch
