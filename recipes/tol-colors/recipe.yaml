schema_version: 1

context:
  python_min: "3.9"
  version: "2.2.0"

package:
  name: tol-colors
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/t/tol-colors/tol_colors-${{ version }}.tar.gz
  sha256: 212ff02e2fcf5c7f9cdb928ba1701bcfbf7fe7a24c52a838488e1db398115db6

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - setuptools
    - setuptools-scm >=8
    - pip
  run:
    - python >=${{ python_min }}
    - numpy
    - matplotlib-base

tests:
  - python:
      imports:
        - tol_colors
      pip_check: true
      python_version: ${{ python_min }}.*

about:
  summary: Color schemes for lines and maps, color-blind safe
  license: BSD-3-Clause
  license_file: LICENSE
  homepage: https://pypi.org/project/tol-colors/
  repository: https://github.com/Descanonge/tol_colors
  documentation: https://tol-colors.readthedocs.io

extra:
  recipe-maintainers:
    - mtrocadomoreira
