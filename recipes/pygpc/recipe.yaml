context:
  version: "0.4.4"

package:
  name: pygpc
  version: ${{ version }}

source:
  url: "https://github.com/pygpc-polynomial-chaos/pygpc/archive/51c975354b8c4db0c579cd30b284d5bdc7b3f7f7.tar.gz"
  sha256: 2d03311925999a1d47e6f96eca1607e2af3f7f8d2b9191fc35ec99641e3e7e1c
  patches:
    - patches/openmp_link_fix.patch

build:
  number: 0
  script:
    - ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  build:
    - ${{ compiler('c') }}
    - ${{ stdlib('c') }}
    - ${{ compiler('cxx') }}
    - if: osx
      then: llvm-openmp
    - if: linux
      then: libgomp
  host:
    - python
    - pip
    - setuptools
    - numpy >=2.0.0
  run:
    - python
    - numpy
    - scipy
    - scikit-learn
    - h5py
    - tqdm
    - pandas
    - matplotlib-base
    - seaborn-base

tests:
  - python:
      imports:
        - pygpc
      pip_check: true

about:
  homepage: https://github.com/pygpc-polynomial-chaos/pygpc
  summary: A Sensitivity and uncertainty analysis toolbox for Python based on the generalized polynomial chaos method
  license: GPL-3.0-only
  license_file: LICENSE
  documentation: https://pygpc.readthedocs.io/en/latest/
  repository: https://github.com/pygpc-polynomial-chaos/pygpc

extra:
  recipe-maintainers:
    - srimanachanta
