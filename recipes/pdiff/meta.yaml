{% set version = "1.1.5" %}

package:
  name: pdiff
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/p/pdiff/pdiff-{{ version }}.tar.gz
  sha256: 65c3a1ab67060a337f03c0cacbbcd24bfbf1bf17961ca1b3875f47662745a7d5

build:
  entry_points:
    - pdiff=pdiff.__main__:main
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python
    - pip
  run:
    - python
    - colorama

test:
  imports:
    - pdiff
  commands:
    - pip check
    - pdiff --help
  requires:
    - pip
    - python

about:
  home: https://github.com/nkouevda/pdiff
  summary: Pretty side-by-side diff
  license: MIT
  license_file: LICENSE.txt

extra:
  recipe-maintainers:
    - prototaxites
