# Override the global conda-forge Windows Fortran pin (classic flang 5)
# because conda-forge's mumps-seq on win-64 has migrated to LLVM Flang and
# requires llvm-openmp >=21.1.8, which conflicts with classic flang 5's
# openmp ==5.0.0 pin. Pinning fortran_compiler_version to 22 selects the
# LLVM Flang toolchain (flang_win-64 22.*) which uses the matching
# llvm-openmp runtime.
fortran_compiler_version:  # [win]
  - "22"                   # [win]
