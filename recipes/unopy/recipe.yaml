schema_version: 1

context:
  python_min: "3.9"
  version: "0.4.5"

package:
  name: unopy
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/u/unopy/unopy-${{ version }}.tar.gz
  sha256: 88390a30bdccc88df354a8386d7ed6104ff99d96c811c3578b680426251612d2

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - scikit-build-core >=0.8
    - pybind11 >=2.11
    - pip
  run:
    - python >=${{ python_min }}
    - numpy

tests:
  - python:
      imports:
        - unopy
      pip_check: true
      python_version: ${{ python_min }}.*

about:
  summary: With Uno, finally take full control of your SQP/barrier solver for nonlinearly constrained optimization
  license: MIT
  license_file:
    - LICENSE
    - interfaces/Julia/LICENSE
  homepage: https://pypi.org/project/unopy/

extra:
  recipe-maintainers:
    - ewu63
