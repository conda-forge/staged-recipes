schema_version: 1

context:
  version: "2.7.1"

package:
  name: unopy
  version: ${{ version }}

source:
  url: https://github.com/cvanaret/Uno/archive/refs/tags/v${{ version }}.tar.gz
  sha256: a6a0d3ea899672ba3fb1e67b1b29327aaf42c3ef08dbcad7228d9e6cc5408faa

build:
  number: 0
  noarch: python

requirements:
  build:
    - ${{ compiler('c') }}
    - ${{ compiler('cxx') }}
    - ${{ compiler('fortran') }}
    - cmake
    - make
    - pkg-config
  host:
    - python
    - scikit-build-core >=0.8
    - pybind11 >=2.11
    - libblas
    - liblapack
    - metis
    - mumps
    - pip
  run:
    - python
    - numpy
    - libblas
    - liblapack
    - metis
    - mumps

tests:
  - python:
      imports:
        - unopy
      pip_check: true

about:
  summary: With Uno, finally take full control of your SQP/barrier solver for nonlinearly constrained optimization
  license: MIT
  license_file:
    - LICENSE
    - interfaces/Julia/LICENSE
  homepage: https://github.com/cvanaret/Uno

extra:
  recipe-maintainers:
    - ewu63
