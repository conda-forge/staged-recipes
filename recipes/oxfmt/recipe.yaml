context:
  version: "0.35.0"

package:
  name: oxfmt
  version: ${{ version }}

source:
  url: https://github.com/oxc-project/oxc/archive/oxfmt_v${{ version }}.tar.gz
  sha256: 6888bc4f6d960a904f41fca45431e0a35714e826dbb138adc18fad52d0899e7f

build:
  number: 0

requirements:
  build:
    - ${{ compiler('rust') }}
    - ${{ compiler('c') }}
    - ${{ stdlib('c') }}
    - cargo-bundle-licenses

tests:
  - script:
      - oxfmt --help
      - if: unix
        then:
          - echo 'const x = 1;' > test.js
          - oxfmt test.js
      - if: win
        then:
          - echo const x = 1; > test.js
          - oxfmt test.js

about:
  license: MIT
  license_file:
    - LICENSE
    - THIRDPARTY.yml
  summary: Formatter for oxc
  homepage: https://github.com/oxc-project/oxc
  repository: https://github.com/oxc-project/oxc

extra:
  recipe-maintainers:
    - danielnachun
    - tdejager
