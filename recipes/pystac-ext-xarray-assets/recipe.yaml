schema_version: 1

context:
  version: "1.0.0"

package:
  name: pystac-ext-xarray-assets
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/p/pystac-ext-xarray-assets/pystac_ext_xarray_assets-${{ version }}.tar.gz
  sha256: da4f4877c018d531b6b5c45f20bc64842f14587ae86bac8d2acf110804c773d1

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - hatchling
    - pip
  run:
    - python >=${{ python_min }}
    - pystac-core

tests:
  - python:
      imports:
        - pystac_ext_xarray_assets
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  summary: Xarray Assets extension for PySTAC
  license: Apache-2.0
  license_file: LICENSE
  homepage: https://pypi.org/project/pystac-ext-xarray-assets/
  documentation: https://pystac.readthedocs.io

extra:
  recipe-maintainers:
    - ocefpaf
