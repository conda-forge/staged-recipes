schema_version: 1

context:
  version: "0.7.0"

package:
  name: starlette-cramjam
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/s/starlette-cramjam/starlette_cramjam-${{ version }}.tar.gz
  sha256: 38a70bea50d2fce91eb43acbddd544c1c7d4b5de4b26a482472d7dc142024edd

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python >=3.11
    - hatchling
    - pip
  run:
    - python >=3.11
    - starlette
    - cramjam >=2.4,<2.12

tests:
  - python:
      imports:
        - starlette_cramjam
      pip_check: true

about:
  summary: Cramjam integration for Starlette ASGI framework.
  license: MIT
  license_file: LICENSE
  homepage: https://pypi.org/project/starlette-cramjam/
  repository: https://github.com/developmentseed/starlette-cramjam

extra:
  recipe-maintainers:
    - martinRenou
