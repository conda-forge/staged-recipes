schema_version: 1

context:
  version: "0.5.0"

# recipe:
#   name: flash-linear-attention
#   version: ${{ version }}

build:
  number: 0
  noarch: python

outputs:
  - package:
      name: fla-core
      version: ${{ version }}
    source:
      url: https://pypi.org/packages/source/f/fla-core/fla_core-${{ version }}.tar.gz
      sha256: 476dd94711702af81cc4827010d9209f6053d8cdceac8e43d3c8497071f07a81
    build:
      script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
    requirements:
      host:
        - python ${{ python_min }}.*
        - setuptools
        - wheel
        - pip
      run:
        - python >=${{ python_min }}
        - pytorch >=2.7.0
        - einops
    tests:
      - python:
          imports:
            - fla
          pip_check: true
          python_version:
            - ${{ python_min }}.*
            - '*'

  - package:
      name: flash-linear-attention
      version: ${{ version }}
    source:
      url: https://pypi.org/packages/source/f/flash-linear-attention/flash_linear_attention-${{ version }}.tar.gz
      sha256: 22b789a47f07738b4382ecdf775d7bb40e0d803c467c34f8e2ecd6a1dc780938
    build:
      script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
    requirements:
      host:
        - python ${{ python_min }}.*
        - setuptools
        - wheel
        - pip
      run:
        - python >=${{ python_min }}
        - ${{ pin_subpackage('fla-core', exact=True) }}
        - transformers
    tests:
      - python:
          imports:
            - fla
          pip_check: true
          python_version:
            - ${{ python_min }}.*
            - '*'

about:
  summary: Fast linear attention models and layers
  license: MIT
  license_file: LICENSE
  homepage: https://github.com/fla-org/flash-linear-attention

extra:
  feedstock-name: flash-linear-attention
  recipe-maintainers:
    - chrisdeutsch
