{% set name = "manocca" %}
{% set version = "2.0.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.io/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz
  sha256: 8f6ab88e0a5c54d5cb44b97df60c64f3529e0a66e4d5e7006fcdb36cf956c5df

build:
  number: 0
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  noarch: python

requirements:
  host:
    - python >=3.8
    - pip
    - setuptools >=64
    - wheel
  run:
    - python >=3.8
    - numpy >=1.21
    - scipy >=1.8
    - pandas >=1.4
    - scikit-learn >=1.0
    - joblib >=1.1
    - tqdm >=4.64

test:
  imports:
    - manocca
  commands:
    - pip check
  requires:
    - pip

about:
  home: https://gitlab.pasteur.fr/statistical-genetics/manocca
  license: MIT
  license_file: LICENSE
  summary: "MANOCCA: Multivariate ANalysis of Conditional CovAriance"
  description: |
    MANOCCA tests whether a predictor X is associated with the covariance
    structure of outcomes Y after adjusting for covariates C: Cov(Y) ~ X + C.
    The test is orthogonal to mean and variance effects.
  doc_url: https://academic.oup.com/bib/article/25/4/bbae272/7690346
  dev_url: https://gitlab.pasteur.fr/statistical-genetics/manocca

extra:
  recipe-maintainers:
    - BoeEco
