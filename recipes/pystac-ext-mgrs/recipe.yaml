schema_version: 1

context:
  version: "1.0.0"

package:
  name: pystac-ext-mgrs
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/p/pystac-ext-mgrs/pystac_ext_mgrs-${{ version }}.tar.gz
  sha256: 31d79b288f2523640138aff1b12acd2b67d7a40b1822909a04700fb048861d11

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - hatchling
    - pip
  run:
    - python >=${{ python_min }}
    - pystac-core

tests:
  - python:
      imports:
        - pystac_ext_mgrs
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  summary: MGRS extension for PySTAC
  license: Apache-2.0
  license_file: PLEASE_ADD_LICENSE_FILE
  homepage: https://pypi.org/project/pystac-ext-mgrs/
  documentation: https://pystac.readthedocs.io

extra:
  recipe-maintainers:
    - ocefpaf
