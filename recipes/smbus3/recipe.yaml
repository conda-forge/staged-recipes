schema_version: 1

context:
  version: "0.5.5"

package:
  name: smbus3
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/s/smbus3/smbus3-${{ version }}.tar.gz
  sha256: 91eed38fb6b7d2f893fbfc3f37006aa41e6913fdda5b3a9a79238b353760f92e

build:
  number: 0
  # imports fcntl and talks to /dev/i2c-* devices; unix-only. Not noarch
  # because conda-forge's linter forbids skips on noarch packages.
  skip: win
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python
    - setuptools
    - pip
  run:
    - python

tests:
  - python:
      imports:
        - smbus3
      pip_check: true

about:
  summary: smbus3 is a drop-in replacement for smbus2, smbus-cffi, smbus-python written in pure Python, intended for use with Python 3.8+ on Unix-like systems
  description: |
    smbus3 is a pure-Python library for SMBus and I2C communication
    through the Linux /dev/i2c-* device interface, written as a drop-in
    replacement for smbus2, smbus-cffi, and smbus-python. It supports the
    standard SMBus read/write operations as well as raw I2C transactions
    via ioctl, and is commonly used to talk to sensors on single-board
    computers such as the Raspberry Pi.
  license: MIT
  license_file: LICENSE
  homepage: https://github.com/eindiran/smbus3
  repository: https://github.com/eindiran/smbus3

extra:
  recipe-maintainers:
    - ruben-arts
