context:
  version: "0.8.0"

package:
  name: hyalo
  version: ${{ version }}

source:
  url: https://github.com/ractive/hyalo/archive/refs/tags/v${{ version }}.tar.gz
  sha256: 1e89fa8c0978071b89f9c14a34b9bc53bd22235a242a61c27d2dc89f26eb6bc6

build:
  number: 0
  script:
    env:
      CARGO_PROFILE_RELEASE_STRIP: symbols
      CARGO_PROFILE_RELEASE_LTO: fat
    content:
      - if: unix
        then:
          - cargo auditable install --locked --no-track --bins --root ${{ PREFIX }} --path crates/hyalo-cli
      - if: win
        then:
          - cargo auditable install --locked --no-track --bins --root %LIBRARY_PREFIX% --path crates/hyalo-cli
      - cargo-bundle-licenses --format yaml --output ./THIRDPARTY.yml

requirements:
  build:
    - ${{ stdlib('c') }}
    - ${{ compiler('c') }}
    - ${{ compiler('rust') }}
    - cargo-bundle-licenses
    - cargo-auditable

tests:
  - script:
      - hyalo --help
      - hyalo --version
  - package_contents:
      bin:
        - hyalo
      strict: true

about:
  summary: Download and install release assets from GitHub
  description: |
    Hyalo is a high-performance CLI tool designed to query, manage, and bulk-edit Markdown collections
    that use YAML frontmatter, such as Obsidian vaults, Zettelkastens, and static documentation sites.
    Hyalo natively understands Markdown structures to offer advanced filtering, bulk metadata mutations,
    and smart link refactoring across thousands of files in milliseconds. With native JSON output,
    built-in AI agent integrations, and robust dry-run safety features, Hyalo provides a fast,
    scriptable solution for maintaining and automating complex knowledge bases.
  license: MIT
  license_file:
    - LICENSE
    - THIRDPARTY.yml
  homepage: https://github.com/ractive/hyalo
  repository: https://github.com/ractive/hyalo

extra:
  recipe-maintainers:
    - salim-b
