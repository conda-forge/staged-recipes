context:
  name: Getopt-Tabular
  version: "0.3"

package:
  name: perl-getopt-tabular
  version: ${{ version }}

source:
  - url: https://cpan.metacpan.org/authors/id/G/GW/GWARD/${{ name }}-${{ version }}.tar.gz
    sha256: "9bdf067633b5913127820f4e8035edc53d08372faace56ba6bfa00c968a25377"
  - url: https://raw.githubusercontent.com/Perl/perl5/v5.32.1/Copying
    sha256: "d77d235e41d54594865151f4751e835c5a82322b0e87ace266567c3391a4b912"
  - url: https://raw.githubusercontent.com/Perl/perl5/v5.32.1/Artistic
    sha256: "dd90d4f42e4dcadf5a7c09eea0189d93c7b37ae560c91f0f6d5233ed3b9292a2"

build:
  number: 0
  skip:
    - win
  script:
    - perl Makefile.PL INSTALLDIRS=vendor NO_PERLLOCAL=1 NO_PACKLIST=1
    - make -j${CPU_COUNT}
    - make test
    - make install VERBINST=1

requirements:
  build:
    - make
  host:
    - perl
    - perl-extutils-makemaker

tests:
  - perl:
      uses:
        - Getopt::Tabular

about:
  homepage: https://metacpan.org/pod/Getopt::Tabular
  summary: Table-driven argument parsing for Perl 5
  license: Artistic-1.0-Perl OR GPL-1.0-or-later
  license_file:
    - Artistic
    - Copying

extra:
  recipe-maintainers:
    - user202729
