{% set name = "intel-gpu-ocl-icd-system" %}
{% set version = "1.0.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

build:
  number: 0

requirements:
  run:
    - intel-opencl-rt

test:
  commands:
    # Test that activation/deactivation scripts are present
    - test -f ${PREFIX}/etc/conda/activate.d/intel-gpu-ocl-icd-system-activate.sh  # [unix]
    - test -f ${PREFIX}/etc/conda/deactivate.d/intel-gpu-ocl-icd-system-deactivate.sh  # [unix]
    - if not exist %PREFIX%\etc\conda\activate.d\intel-gpu-ocl-icd-system-activate.bat exit 1  # [win]
    - if not exist %PREFIX%\etc\conda\deactivate.d\intel-gpu-ocl-icd-system-deactivate.bat exit 1  # [win]

about:
  home: https://github.com/IntelPython/{{ name|lower }}-feedstock
  license: Apache-2.0
  license_family: Apache
  license_file: LICENSE.txt
  summary: 'OpenCL ICD loader for Intel(R) GPUs to current environment'

  description: |
    <strong>LEGAL NOTICE: Use of this software package is subject to the
    software license agreement (as set forth above, in the license section of
    the installed Conda package and/or the README file) and all notices,
    disclaimers or license terms for third party or open source software
    included in or with the software.</strong>
    <br/><br/>
    EULA: <a href="https://www.intel.com/content/dam/develop/external/us/en/documents/pdf/intel-developer-tools-eula-09-03-19.pdf" target="_blank">Apache-2.0</a>
    <br/><br/>
    Since GPU drivers are installed system-wide, enabling discovery of Intel GPU devices
    by the OpenCL loader in a conda environment requires configuration of the OCL_ICD_FILENAMES
    environment variable. This metapackage sets up activation/deactivation scripts that
    automatically configure the OpenCL ICD loader to discover system-wide Intel GPU drivers
    when the conda environment is activated, and restores the original configuration upon
    deactivation.

extra:
  recipe-maintainers:
    - antonwolfy
    - jharlow-intel
    - ndgrigorian
