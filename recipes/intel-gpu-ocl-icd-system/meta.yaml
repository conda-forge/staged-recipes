{% set name = "intel-gpu-ocl-icd-system" %}
{% set version = "1.0.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

build:
  number: 0
  skip: true  # [not linux]
  script:
    - mkdir -p "${PREFIX}/etc/conda/activate.d"
    - mkdir -p "${PREFIX}/etc/conda/deactivate.d"
    - cp "${RECIPE_DIR}/activate-intel-gpu-ocl-icd-system.sh" "${PREFIX}/etc/conda/activate.d/intel-gpu-ocl-icd-system.sh"
    - cp "${RECIPE_DIR}/deactivate-intel-gpu-ocl-icd-system.sh" "${PREFIX}/etc/conda/deactivate.d/intel-gpu-ocl-icd-system.sh"
    - chmod +x "${PREFIX}/etc/conda/activate.d/intel-gpu-ocl-icd-system.sh"
    - chmod +x "${PREFIX}/etc/conda/deactivate.d/intel-gpu-ocl-icd-system.sh"

requirements:
  run:
    - intel-opencl-rt

test:
  commands:
    - test -f "${CONDA_PREFIX}/etc/conda/activate.d/intel-gpu-ocl-icd-system.sh"
    - test -f "${CONDA_PREFIX}/etc/conda/deactivate.d/intel-gpu-ocl-icd-system.sh"
    - export OCL_ICD_FILENAMES="/tmp/custom/vendors/existing.icd"
    - source "${CONDA_PREFIX}/etc/conda/activate.d/intel-gpu-ocl-icd-system.sh"
    - test -n "${OCL_ICD_FILENAMES}"
    - source "${CONDA_PREFIX}/etc/conda/deactivate.d/intel-gpu-ocl-icd-system.sh"
    - test "${OCL_ICD_FILENAMES}" = "/tmp/custom/vendors/existing.icd"

about:
  home: https://github.com/IntelPython/{{ name|lower }}-feedstock
  license: Apache-2.0
  license_family: Apache
  license_file: LICENSE.txt
  summary: 'Configure Intel(R) OpenCL ICD file discovery in conda environment'

  description: |
    <strong>LEGAL NOTICE: Use of this software package is subject to the
    software license agreement (as set forth above, in the license section of
    the installed Conda package and/or the README file) and all notices,
    disclaimers or license terms for third party or open source software
    included in or with the software.</strong>
    <br/><br/>
    EULA: <a href="https://www.intel.com/content/dam/develop/external/us/en/documents/pdf/intel-developer-tools-eula-09-03-19.pdf" target="_blank">Apache-2.0</a>
    <br/><br/>
    Since GPU drivers are installed system-wide, this package configures OpenCL ICD discovery on
    environment activation by prepending Intel-specific ICD file(s) found in
    ``/etc/OpenCL/vendors`` to ``OCL_ICD_FILENAMES``. This avoids post-link/pre-unlink hooks and
    keeps package install and uninstall side-effect free while preserving Intel GPU discovery.

extra:
  recipe-maintainers:
    - antonwolfy
    - ndgrigorian
    - jharlow-intel
