# This is a recipe for cache-dit, a PyTorch-native Inference Engine
# for Diffusion Transformers with cache, parallelism, quantization and CPU offload.
# The base package is pure Python; CUDA extensions are optional (built only with
# CACHE_DIT_BUILD_SVDQUANT=1) and not included in this noarch recipe.

context:
  version: "1.5.0"

package:
  name: cache-dit
  version: ${{ version }}

source:
  url: https://github.com/vipshop/cache-dit/archive/refs/tags/v${{ version }}.tar.gz
  sha256: 5d632a5536b34090d1ba8688aeac893f3d3ab6205aa7f2b87f892d7215c2cc1d

build:
  number: 0
  python:
    entry_points:
      - cache-dit-metrics=cache_dit.metrics:main
      - cache-dit-generate=cache_dit.generate:entrypoint
      - cache-dit-convert=cache_dit.quantization.converter:main
  noarch: python
  script:
    - export SETUPTOOLS_SCM_PRETEND_VERSION_FOR_CACHE_DIT=${{ version }}
    - python -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - setuptools
    - setuptools-scm
  run:
    - python >=${{ python_min }}
    - packaging
    - pyyaml
    - pytorch >=2.7.1
    - diffusers >=0.36.0
    - transformers >=4.55.2

tests:
  - python:
      imports:
        - cache_dit
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"
  - script:
      # This needs additional, optional dependencies
      # - cache-dit-metrics --help
      - cache-dit-generate --help
      - cache-dit-convert --help

about:
  homepage: https://github.com/vipshop/cache-dit
  summary: "A PyTorch-native Inference Engine with Cache, Parallelism, Quantization and CPU Offload for DiTs."
  license: Apache-2.0
  license_file: LICENSE

extra:
  recipe-maintainers:
    - xhochy
