# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  name: django-prometheus
  version: "2.4.1"

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/${{ name[0] }}/${{ name }}/django_prometheus-${{ version }}.tar.gz
  sha256: 073628243d2a6de6a8a8c20e5b512872dfb85d66e1b60b28bcf1eca0155dad95

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - setuptools >=67.7.2,<72.0.0
    - wheel >=0.40.0
    - pytest-runner
    - pip
  run:
    - python >=${{ python_min }},<4.0
    - django >=4.2,<6.0
    - prometheus-client >=0.7

tests:
  - python:
      imports:
        - django_prometheus
      pip_check: true
      python_version: ${{ python_min }}.*

about:
  summary: Django middlewares to monitor your application with Prometheus.io.
  license: Apache-2.0
  license_file: LICENSE
  homepage: http://github.com/korfuri/django-prometheus
  repository: https://github.com/korfuri/django-prometheus

extra:
  recipe-maintainers:
    - rxm7706
