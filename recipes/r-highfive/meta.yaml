{% set version = '3.3.0' %}
{% set posix = 'm2-' if win else '' %}

package:
  name: r-highfive
  version: {{ version|replace("-", "_") }}

source:
  url:
    - {{ cran_mirror }}/src/contrib/HighFive_{{ version }}.tar.gz
    - {{ cran_mirror }}/src/contrib/Archive/HighFive/HighFive_{{ version }}.tar.gz
  sha256: 15b8c3b3788c27d75923167c3c7e9995415dbc962c7839128ef2c759a084fadb

build:
  number: 0
  noarch: generic
  rpaths:
    - lib/R/lib/
    - lib/
  missing_dso_whitelist:
    - '*/R.dll'        # [win]
    - '*/Rblas.dll'    # [win]
    - '*/Rlapack.dll'  # [win]

requirements:
  build:
    - {{ posix }}zip               # [win]
    - cross-r-base {{ r_base }}    # [build_platform != target_platform]
  host:
    - r-base
  run:
    - r-base

test:
  commands:
    - $R -e "library('HighFive')"           # [not win]
    - "\"%R%\" -e \"library('HighFive')\""  # [win]

about:
  home: https://github.com/theAeon/HighFive
  license: BSL-1.0
  summary: A modern idiomatic header-only 'C++'' interface for 'libhdf5'. Original software can
    be found at <https://github.com/highfive-devs/highfive/>.
  license_family: OTHER
  license_file:
    - LICENSE_1_0.txt

extra:
  recipe-maintainers:
    - conda-forge/r
