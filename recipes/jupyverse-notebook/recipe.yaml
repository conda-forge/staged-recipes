schema_version: 1

context:
  version: "0.1.0"

package:
  name: jupyverse-notebook
  version: ${{ version }}

source:
  - url: https://pypi.org/packages/source/j/jupyverse-notebook/jupyverse_notebook-${{ version }}.tar.gz
    sha256: 2e50ca9c42f286c5cd709a381bd928a836279df0023f610d82ebafa2947a921b

build:
  noarch: python
  number: 0
  script:
    - ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation --disable-pip-version-check

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - uv-build
  run:
    - python >=${{ python_min }}
    - fastapi-core
    - jupyverse-auth >=0.2.0,<0.3.0
    - jupyverse-lab >=0.1.0,<0.2.0
    - jupyverse-api >=0.15.0,<0.16.0

tests:
  - python:
      imports: jupyverse_notebook
      pip_check: true
      python_version: ${{ python_min }}.*

about:
  license: BSD-3-Clause
  license_file: COPYING.md
  homepage: https://github.com/jupyter-server/jupyverse/tree/main/api/notebook
  summary: The API for Jupyverse's Notebook.

extra:
  recipe-maintainers:
    - davidbrochart
