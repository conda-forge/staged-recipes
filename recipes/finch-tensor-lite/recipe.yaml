context:
  version: "0.2.0"
  python_min: "3.11"

package:
  name: finch-tensor-lite
  version: ${{ version }}

source:
  - url: https://pypi.org/packages/source/f/finch-tensor-lite/finch_tensor_lite-${{ version }}.tar.gz
    sha256: 8ab19b0a7efc007549788213c1d5fbe3c54a40aad9e90240d8d4d34d08bd883b
  - git: https://github.com/finch-tensor/finch-tensor-lite.git
    tag: v${{ version }}
    target_directory: repo

build:
  # skip:
  #   - match(python, "<3.11")
  #   - win
  noarch: python
  # python:
  #   version_independent: true
  script: uv pip install --python ${{ PYTHON }} . -vv --no-deps
  number: 0

requirements:
  host:
    # - python
    - python ${{ python_min }}.*
    - uv
    - poetry-core <3.0
  run:
    # - python
    - python >=${{ python_min }}
    - numpy <2.4
    - numba <0.63.1
    - donfig <0.9.0
    - lark <2.0.0
    - c-compiler # not minimally activated yet: https://github.com/conda-forge/conda-forge.github.io/issues/2595#issuecomment-3719580016

tests:
  - python:
      imports:
      - finchlite
      pip_check: true
  - script:
      - pytest -ra repo/tests --ignore-glob=repo/tests/reference/*
    requirements:
      run:
        # - python
        - python ${{ python_min }}.*
        - pytest
        - pytest-regressions
        - sparse
        - scipy
    files:
      source:
        - repo/tests/
        - pyproject.toml

about:
  homepage: https://github.com/finch-tensor/finch-tensor-lite
  summary: Sparse Tensor Programming in Pure Python
  description: Sparse Tensor Programming in Pure Python
  license: MIT
  license_file:
    - LICENSE
    - src/finchlite/codegen/stc/LICENSE

extra:
  recipe-maintainers:
    - lucascolley
    - mtsokol
    - willow-ahrens
