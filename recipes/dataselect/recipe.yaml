context:
  version: "4.2.1"

package:
  name: dataselect
  version: ${{ version }}

source:
  url: https://github.com/EarthScope/dataselect/archive/refs/tags/v${{ version }}.tar.gz
  sha256: 570f6f2fc7f8de7fe7994b8c00520500fcdbfe984d84ff3f0ab9a463995f4467

build:
  number: 0
  skip: win
  script: build.sh

requirements:
  build:
    - ${{ compiler('c') }}
    - ${{ stdlib('c') }}
    - make
  host:
    - libcurl

tests:
  - script:
      - dataselect -V
      - dataselect -h

about:
  homepage: https://github.com/EarthScope/dataselect
  summary: miniSEED data selection, sorting and pruning
  description: |
    dataselect selects, sorts and prunes miniSEED time series data.
    Data can be selected by time range and/or by source identifiers,
    overlapping data can be pruned at the record or sample level, and
    output can be written in time order to a single file or routed into
    a directory/file structure.
  license: GPL-3.0-only
  license_file: LICENSE
  repository: https://github.com/EarthScope/dataselect

extra:
  recipe-maintainers:
    - omid-earthscope
