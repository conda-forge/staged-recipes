context:
  version: "4.2.1"

package:
  name: dataselect
  version: ${{ version }}

source:
  url: https://github.com/EarthScope/dataselect/archive/refs/tags/v${{ version }}.tar.gz
  sha256: 570f6f2fc7f8de7fe7994b8c00520500fcdbfe984d84ff3f0ab9a463995f4467

build:
  number: 0
  skip:
    - win
  script:
    - make
    - install -d $PREFIX/bin
    - install -m 755 src/dataselect $PREFIX/bin/dataselect

requirements:
  build:
    - ${{ compiler('c') }}
    - ${{ stdlib('c') }}
    - make

tests:
  - script:
      - dataselect -h

about:
  homepage: https://epic.earthscope.org/content/software-resources
  summary: Select and write specific mini-SEED records and channels
  description: |
    dataselect is a tool to select specific mini-SEED records and channels
    from a collection of files and write them to output files. It allows
    selection by time range, network/station/location/channel codes, and
    quality indicator.
  license: GPL-3.0-or-later
  license_file: LICENSE
  repository: https://github.com/EarthScope/dataselect

extra:
  recipe-maintainers:
    - omid-earthscope
