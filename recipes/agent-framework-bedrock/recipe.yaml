schema_version: 1

context:
  version: "1.0.0b260514"
  python_min: "3.10"

package:
  name: agent-framework-bedrock
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/a/agent-framework-bedrock/agent_framework_bedrock-${{ version }}.tar.gz
  sha256: aa93a9f9c74c68664a74c8c11edbd58ad84cc4e2a0afe68315385fc03d37cc29

build:
  noarch: python
  number: 0
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - hatchling
  run:
    - python >=${{ python_min }}
    - agent-framework-core <2,>=1.4.0
    - boto3 <2.0.0,>=1.35.0
    - botocore <2.0.0,>=1.35.0

tests:
  - python:
      imports:
        - agent_framework.amazon
      python_version: ${{ python_min }}.*
      pip_check: true

about:
  summary: |
    Amazon Bedrock integration for Microsoft Agent Framework.
  homepage: https://pypi.org/project/agent-framework-bedrock/
  repository: https://github.com/microsoft/agent-framework
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - killua156
    - mgorny
