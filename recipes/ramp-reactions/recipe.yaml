schema_version: 1

context:
  python_min: "3.11"
  version: "0.0.3"

package:
  name: ramp-reactions
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/r/ramp-reactions/ramp_reactions-${{ version }}.tar.gz
  sha256: 89942ca0e0bc55fc58dbc0c4bcb1982be1991610f23e2583b1a7e702f4eba775

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - setuptools
    - setuptools-scm
    - wheel
    - pip
  run:
    - python >=${{ python_min }}
    - multipledispatch
    - numpy
    - ramp-isotopes
    - ramp-core

tests:
  - python:
      imports:
        - reactions
      pip_check: true
      python_version: 
        - ${{ python_min }}.*
        - "*"

about:
  summary: Package for representation of radioactive and induced nuclear reactions
  license: MIT
  license_file: LICENSE
  homepage: https://pypi.org/project/ramp-reactions/

extra:
  recipe-maintainers:
    - esheder
