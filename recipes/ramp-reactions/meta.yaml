{% set python_min = "3.11" %}
{% set version = "0.0.3" %}

package:
  name: ramp-reactions
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/r/ramp-reactions/ramp_reactions-{{ version }}.tar.gz
  sha256: 89942ca0e0bc55fc58dbc0c4bcb1982be1991610f23e2583b1a7e702f4eba775

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python {{ python_min }}.*
    - setuptools
    - setuptools-scm
    - wheel
    - pip
  run:
    - python >={{ python_min }}
    - multipledispatch
    - numpy
    - ramp-isotopes
    - ramp-core

test:
  imports:
    - reactions
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}.*

about:
  home: https://pypi.org/project/ramp-reactions/
  summary: Package for representation of radioactive and induced nuclear reactions
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - esheder
