{% set python_min = "3.11" %}
{% set version = "0.1.0" %}

package:
  name: lume-cheetah
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/l/lume-cheetah/lume_cheetah-{{ version }}.tar.gz
  sha256: 520ade89d069790d7a2f164ceb848f6865f17114a759749e5203643f1fab653e

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python {{ python_min }}.*
    - setuptools >=64
    - setuptools-scm >=8
    - pip
  run:
    - python >={{ python_min }}
    - lume-base
    - lume-torch
    - cheetah-accelerator

test:
  imports:
    - lume_cheetah
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}.*

about:
  home: https://github.com/lume-science/lume-cheetah
  summary: Cheetah-specific implementation of LUMEModel classes for virtual accelerators
  doc_url: https://github.com/lume-science/lume-cheetah
  license: Apache-2.0
  license_file: LICENSE

extra:
  recipe-maintainers:
    - pluflou
