schema_version: 1

context:
  version: "1.0.0"

package:
  name: optiprofiler
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/o/optiprofiler/optiprofiler-${{ version }}.tar.gz
  sha256: d5c5b13617c9e3345dbff7527034c2f9c042a27fc181f10ede9c0437bf7507db

build:
  noarch: python
  number: 0
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python >=3.8
    - pip
    - setuptools
  run:
    - python >=3.8
    - matplotlib-base >=3.4.0
    - numpy >=1.17.0
    - scipy >=1.10.0
    - pandas >=1.1.0
    - h5py >=3.0.0
    - pypdf >=3.8.0

tests:
  - python:
      imports:
        - optiprofiler
      pip_check: true

about:
  homepage: https://www.optprof.com
  license: BSD-3-Clause
  license_file: LICENSE
  summary: Benchmarking optimization solvers
  description: |
    OptiProfiler is a platform for benchmarking optimization solvers.
    It generates performance profiles, data profiles, and log-ratio
    profiles for derivative-free optimization solvers.
  documentation: https://www.optprof.com
  repository: https://github.com/optiprofiler/optiprofiler

extra:
  recipe-maintainers:
    - OptHuang
    - ragonneau
    - zaikunzhang
