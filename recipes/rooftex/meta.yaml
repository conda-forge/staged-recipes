{% set version = "0.1.2" %}

package:
  name: rooftex
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/r/rooftex/rooftex-{{ version }}.tar.gz
  sha256: 207b16905bd1de2e5a16e7067edc201d43c1978f4252de71de2355ece9e01e77

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - setuptools >=64
    - wheel
    - pip
  run:
    - python >={{ python_min }}
    - numpy >=1.22

test:
  imports:
    - rooftex
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://github.com/Net-Zero-Horizon/rooftex
  summary: 'RoofteX - Rooftop Solar eXchange: rooftop PV potential, adoption dynamics, and profile generation'
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - msotocalvo