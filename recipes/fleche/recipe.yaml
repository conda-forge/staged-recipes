# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  name: fleche
  version: "0.16.1"
  python_min: "3.11"

recipe:
  name: ${{ name }}-split
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/${{ name[0] }}/${{ name }}/${{ name }}-${{ version }}.tar.gz
  sha256: 702b8df878d08c083fb9f870f0a01defd65f4b1a1f4badef5e2c0114a31bbfdb

build:
  number: 0

outputs:
  # Minimal install: the actual built package with core runtime deps only.
  - package:
      name: fleche-base
    build:
      noarch: python
      script:
        - python -m pip install . -vv --no-deps --no-build-isolation
    requirements:
      host:
        - python ${{ python_min }}.*
        - setuptools >=64.0
        - setuptools-scm >=8
        - pip
      run:
        - python >=${{ python_min }},<3.15
        - numpy
        - pandas >=2.2,<4
        - pyiron_snippets
        - filelock
    tests:
      - python:
          imports:
            - fleche
          pip_check: true
          python_version:
            - ${{ python_min }}.*
            - '*'

  # Full install: metapackage pulling fleche-base plus all optional runtime deps.
  - package:
      name: fleche
    build:
      noarch: generic
    requirements:
      run:
        - python >=${{ python_min }},<3.15
        - ${{ pin_subpackage("fleche-base", exact=True) }}
        - cloudpickle
        - dill
        - sqlalchemy
        - bagofholding ==0.1.12
    tests:
      - python:
          imports:
            - fleche
          pip_check: true
          python_version:
            - ${{ python_min }}.*
            - '*'
      - files:
          source:
            - tests/
        script:
          - pytest -m smoke
        requirements:
          run:
            - pytest
            - hypothesis
            - cloudpickle
            - dill
            - sqlalchemy
            - bagofholding ==0.1.12

about:
  homepage: https://github.com/pmrv/fleche
  documentation: https://fleche.readthedocs.io/
  repository: https://github.com/pmrv/fleche
  summary: A persistent caching solution for arbitrary Python functions
  license: BSD-3-Clause
  license_file: LICENSE

extra:
  recipe-maintainers:
    - pmrv
