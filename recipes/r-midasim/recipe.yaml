context:
  version: "2.0"

package:
  name: r-midasim
  version: ${{ version }}

source:
  url: https://cran.r-project.org/src/contrib/MIDASim_${{ version }}.tar.gz
  sha256: 841f0d14bb8b64176fc7fea34136a691fbe49e5e703fabc16571d0282bbef841

build:
  number: 0
  merge_build_and_host_envs: true
  script: R CMD INSTALL --build .
  dynamic_linking:
    rpaths:
      - lib/R/lib/
      - lib/

requirements:
  host:
    - r-base
    - r-mass
    - r-pracma
    - r-psych
    - r-scam
  run:
    - r-base
    - r-mass
    - r-pracma
    - r-psych
    - r-scam

tests:
  - r:
      libraries:
        - MIDASim

about:
  homepage: https://github.com/mengyu-he/MIDASim
  summary: MIDASim microbiome data simulator
  license: GPL-2.0-only
  license_file:
    - ${{ PREFIX }}/lib/R/share/licenses/GPL-2

extra:
  recipe-maintainers:
    - MartinaCardinali
