{% set version = "2.0" %}

package:
  name: r-midasim
  version: '{{ version }}'

source:
  url: https://cran.r-project.org/src/contrib/MIDASim_{{ version }}.tar.gz
  sha256: 841f0d14bb8b64176fc7fea34136a691fbe49e5e703fabc16571d0282bbef841

build:
  number: 0
  merge_build_host: true
  script: R CMD INSTALL --build .
  rpaths:
    - lib/R/lib/
    - lib/

requirements:
  host:
    - r-base
    - r-mass
    - r-pracma
    - r-psych
    - r-scam
  run:
    - r-base
    - r-mass
    - r-pracma
    - r-psych
    - r-scam

test:
  commands:
    - $R -e "library('MIDASim')"  # [not win]
    - "\"%R%\" -e \"library('MIDASim')\""  # [win]

about:
  home: https://github.com/mengyu-he/MIDASim
  summary: The 'MIDASim' package is a microbiome data simulator for generating realistic microbiome datasets by adapting a user-provided template. It supports the controlled introduction of experimental signals-such as shifts in taxon relative abundances, prevalence, and sample library sizes-to create distinct synthetic populations under diverse simulation scenarios. For more details, see He et al. (2024) <doi:10.1186/s40168-024-01822-z>.
  license: GPL-2.0-only

extra:
  recipe-maintainers:
    - MartinaCardinali
