{% set version = '2.0' %}
{% set posix = 'm2-' if win else '' %}

package:
  name: r-midasim
  version: "{{ version|replace('-', '_') }}"

source:
  url:
    - {{ cran_mirror }}/src/contrib/MIDASim_{{ version }}.tar.gz
    - {{ cran_mirror }}/src/contrib/Archive/MIDASim/MIDASim_{{ version }}.tar.gz
  sha256: 841f0d14bb8b64176fc7fea34136a691fbe49e5e703fabc16571d0282bbef841

build:
  number: 0
  noarch: generic
  rpaths:
    - lib/R/lib/
    - lib/
  missing_dso_whitelist:
    - '*/R.dll'        # [win]
    - '*/Rblas.dll'    # [win]
    - '*/Rlapack.dll'  # [win]

requirements:
  build:
    - {{ posix }}zip               # [win]
    - cross-r-base {{ r_base }}    # [build_platform != target_platform]
  host:
    - r-base
    - r-mass
    - r-pracma
    - r-psych
    - r-scam
  run:
    - r-base
    - r-mass
    - r-pracma
    - r-psych
    - r-scam

test:
  commands:
    - $R -e "library('MIDASim')"           # [not win]
    - "\"%R%\" -e \"library('MIDASim')\""  # [win]

about:
  home: https://github.com/mengyu-he/MIDASim
  license: GPL-2.0-only
  summary: Simulating Realistic Microbiome Data using MIDASim
  license_family: GPL2
  license_file:
    - '{{ environ["PREFIX"] }}/lib/R/share/licenses/GPL-2'

extra:
  recipe-maintainers:
    - MartinaCardinali
