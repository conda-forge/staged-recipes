{% set name = "mkl-noarch-bridge" %}
{% set version = "0.1.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/mkl_noarch_bridge-{{ version }}.tar.gz
  sha256: bcf7c7d69551a5426a5b7e21d42d6c3b0e331a1329f405e165ed6611d4417953

build:
  number: 0
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python
    - pip
    - setuptools
  run:
    - python
    - mkl  # [x86_64]
    - mkl-service  # [x86_64]
    - sparse_dot_mkl  # [x86_64]

test:
  requires:
    - python
    - numpy  # [x86_64]
  commands:
    # --- Tests for x86_64 ---
    # Check if mkl service is available
    - python -c "import mkl; mkl.get_version_string()"  # [x86_64]
    
    # Perform a basic sparse dot product to ensure native linking is correct
    - python -c "import numpy as np; from scipy import sparse; from sparse_dot_mkl import dot_product_mkl; a = sparse.random(10, 10, density=0.1).tocsr(); b = np.random.randn(10, 10); dot_product_mkl(a, b)"  # [x86_64]

    # --- Tests for other architectures (e.g., ARM64, PowerPC) ---
    # Verify MKL is NOT present (avoids accidental leakage)
    - python -c "import mkl" && exit 1 || exit 0  # [not x86_64]
    - python -c "import sparse_dot_mkl" && exit 1 || exit 0  # [not x86_64]


about:
  home: https://github.com/simonwm/mkl-noarch-bridge
  summary: Metapackage providing MKL dependencies on x86_64 for noarch compatibility.
  license: BSD-3-Clause
  license_family: BSD
  license_file:
    - LICENSE.txt

extra:
  recipe-maintainers:
    - simonwm
    - JWatter
