{% set version = "1.1.1" %}

package:
  name: jcm
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/j/jcm/jcm-{{ version }}.tar.gz
  sha256: 6e513c3f254ba03c0563957ff1eaacb6a3e12f2c507d6e99d74cd57fcfdde8aa

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python >=3.11
    - setuptools >=40.4
    - setuptools-scm
    - pip
  run:
    - python >=3.11
    - dinosaur-dycore
    - flax
    - jax-datetime
    - tree-math
    - hydra-core
    - xarray
    - pytest-cov
    - sphinx
    - furo

test:
  imports:
    - jcm
  commands:
    - pip check
  requires:
    - pip
    - python

about:
  home: https://pypi.org/project/jcm/
  summary: JAX-based General Circulation Model
  license: Apache-2.0
  license_file: LICENSE

extra:
  recipe-maintainers:
    - mahf708
