schema_version: 1

context:
  version: "0.1.2"

package:
  name: kedro-mcp
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/k/kedro-mcp/kedro_mcp-${{ version }}.tar.gz
  sha256: 73a6a14b50d03a97da3d8728450e06bf83642a28ae61b8aa59c54c5a93524c35

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  python:
    entry_points:
      - kedro-mcp = kedro_mcp.server:main_stdio

requirements:
  host:
    - python ${{ python_min }}.*
    - setuptools >=68
    - wheel
    - pip
  run:
    - python >=${{ python_min }}
    - fastmcp >=0.3

tests:
  - python:
      imports:
        - kedro_mcp
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"
  - requirements:
      run:
        - pip
        - python
    script:
      - kedro-mcp --help

about:
  summary: MCP server with Kedro prompts and tools (local stdio, zero-install via uvx).
  license: Apache-2.0
  license_file: LICENSE.txt
  homepage: https://pypi.org/project/kedro-mcp/
  repository: https://github.com/kedro-org/kedro-mcp

extra:
  recipe-maintainers:
    - rxm7706
