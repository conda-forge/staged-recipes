context:
  version: "0.1.3"

package:
  name: git-include
  version: ${{ version }}

source:
  url: https://github.com/Flova/git-include/archive/refs/tags/v${{ version }}.tar.gz
  sha256: 6548da75a1baa5f0f34a3c9f2393e70923a9c2857c12c581c430dea748e3c291

build:
  number: 0
  # --no-default-features drops the `self-update` feature (updating is
  # conda's job) and `vendored-libgit2`; LIBGIT2_NO_VENDOR then forces
  # libgit2-sys to link the conda-forge libgit2 instead of bundling its own.
  script:
    - if: unix
      then: |
        export LIBGIT2_NO_VENDOR=1
        cargo-bundle-licenses --format yaml --output THIRDPARTY.yml
        cargo install --locked --no-default-features --root "${PREFIX}" --path . --no-track
    - if: win
      then: |
        set LIBGIT2_NO_VENDOR=1
        cargo-bundle-licenses --format yaml --output THIRDPARTY.yml
        cargo install --locked --no-default-features --root "%PREFIX%" --path . --no-track

requirements:
  build:
    - ${{ compiler('rust') }}
    - ${{ compiler('c') }}
    - ${{ stdlib('c') }}
    - pkg-config
    - cargo-bundle-licenses
  host:
    # Link conda-forge's libgit2 rather than vendoring a copy; its
    # run-exports pin the matching runtime library automatically.
    - libgit2
    - if: unix
      then:
        - openssl

tests:
  - script:
      - git-include --version

about:
  homepage: https://github.com/Flova/git-include
  repository: https://github.com/Flova/git-include
  summary: Vendor external git repositories as plain files, with full two-way sync
  description: |
    git-include is a modern alternative to git-subrepo and git submodules. It
    inlines an upstream repository into your project as plain, committed files
    plus a small .gitrepo marker, so collaborators just clone your repo with no
    extra steps. Changes can be synced in both directions: pull upstream updates
    in, and contribute local edits back as a clean, topology-preserving history.
  license: MIT
  license_file:
    - LICENSE
    - THIRDPARTY.yml

extra:
  recipe-maintainers:
    - Flova
