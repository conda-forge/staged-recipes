schema_version: 1

context:
  version: "0.0.11"
  python_min: "3.10"

package:
  name: jupyter-ai-jupyternaut
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/j/jupyter-ai-jupyternaut/jupyter_ai_jupyternaut-${{ version }}.tar.gz
  sha256: d152b615d0870c5603ab446bbcb432f8be65eab50e3e135a10cc4036173d327a

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . --no-deps -vv --no-build-isolation --ignore-installed --no-index

requirements:
  host:
    - python ${{ python_min }}.*
    - hatchling >=1.5.0
    - hatch-nodejs-version >=0.3.2
    - hatch-jupyter-builder >=0.5
    - jupyterlab >=4.0.0,<5
    - pip
  run:
    - python >=${{ python_min }}
    - jupyter_server >=2.15.0,<3
    - pydantic >=2.10.0,<3
    - traitlets >=5.6
    - deepmerge >=2.0,<3
    - jupyterlab-chat >=0.19.0
    - jupyter-ai-litellm >=0.0.2
    - jinja2 >=3.0,<4
    - python-dotenv >=1,<2
    - jupyter-ai-persona-manager >=0.0.1
    - langchain >=1.0.0
    # Base checkpointer (`InMemorySaver`) for in-memory conversation memory.
    # The SQLite-backed checkpointer lives in the optional `persistence` extra.
    - langgraph-checkpoint >=2.1.0
    - langchain-mcp-adapters >=0.2,<0.3
    - jupyter_server_documents >=0.1.0a8
    - jupyterlab-commands-toolkit >=0.1.2
    - jupyterlab-notebook-awareness >=0.2.0

tests:
  - python:
      python_version: ${{ python_min }}.*
      pip_check: true
      imports:
        - jupyter_ai_jupyternaut
  - script:
      - jupyter labextension list 2>&1 | rg -ie "@jupyter-ai/jupyternaut.*OK"
    requirements:
      run:
        - python ${{ python_min }}.*
        - jupyterlab >=4.0.0,<5
        - ripgrep

about:
  summary: Package providing the default AI persona, Jupyternaut, in Jupyter AI
  description: |
    jupyter-ai-jupyternaut provides Jupyternaut, the default AI persona in
    Jupyter AI. It registers the Jupyternaut persona on the `jupyter_ai.personas`
    entry point and ships the prebuilt JupyterLab chat extension that powers the
    in-notebook AI assistant.
  homepage: https://github.com/jupyter-ai-contrib/jupyter-ai-jupyternaut
  repository: https://github.com/jupyter-ai-contrib/jupyter-ai-jupyternaut
  license: BSD-3-Clause
  license_file: LICENSE

extra:
  recipe-maintainers:
    - andrii-i
    - dlqq
    - jtpio
