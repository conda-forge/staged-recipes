{% set version = "18" %}

package:
  name: pest_hp
  version: {{ version }}

source:
  url: https://s3.amazonaws.com/docs.pesthomepage.org/source_code/unixpest_hp.zip  # [unix]
  sha256: e84c3edb49116cd397b8da1bf495943d49acfe2d51ced5102fdcccfee74cb2cb  # [unix]
  url: https://s3.amazonaws.com/docs.pesthomepage.org/software/hp_suite.zip  # [win]
  sha256: 9c8e7b1a0c5d2fd1c8e5b9a0c3e7f2a4b8d9c8e7b1a0c5d2fd1c8e5b9a0c3e7f  # [win]

build:
  number: 0

requirements:
  build:
    - {{ compiler('fortran') }}  # [unix]
    - {{ compiler('c') }}  # [unix]
    - {{ stdlib('c') }}  # [unix]
    - make  # [unix]
    - unzip  # [unix]
    - gfortran  # [unix]
    - gcc  # [unix]

test:
  commands:
    - test -f $PREFIX/bin/agent_hp  # [unix]
    - test -f $PREFIX/bin/cmaes_hp  # [unix]
    - test -f $PREFIX/bin/conda_build.sh  # [unix]
    - test -f $PREFIX/bin/ensimod  # [unix]
    - test -f $PREFIX/bin/ensiprep  # [unix]
    - test -f $PREFIX/bin/jactest_hp  # [unix]
    - test -f $PREFIX/bin/pcost_hp  # [unix]
    - test -f $PREFIX/bin/pest_hp  # [unix]
    - test -f $PREFIX/bin/postensiunc  # [unix]
    - test -f $PREFIX/bin/pwhisp_hp  # [unix]
    - test -f $PREFIX/bin/rsi_hp  # [unix]

about:
  home: https://pesthomepage.org/
  summary: 'PEST_HP automates calibration and calibration-constrained uncertainty analysis of any numerical model.'
  description: |
    PEST_HP interacts with a model through the model’s own input and output
    files for Highly Parameterized (HP) models. While estimating or adjusting
    its parameters, it runs a model many times. These model runs can be
    conducted either in serial or in parallel. Advanced dimensional-reduction
    methods can dramatically reduce the number of model runs required for
    attainment of a high level of model-to-measurement fit.
  license: LicenseRef-DISCLAIMER
  license_file: LICENSE.txt
  doc_url: https://s3.amazonaws.com/docs.pesthomepage.org/documents/all_manuals.zip

extra:
  recipe-maintainers:
    - timcera
