context:
  version: "1.6.0"
  name: paho-mqtt-cpp

package:
  name: ${{ name }}
  version: ${{ version }}

source:
  url: https://github.com/eclipse-paho/paho.mqtt.cpp/archive/refs/tags/v${{ version }}.tar.gz
  sha256: 73bdb408ae98812c5c2b7f00b2ae7c4fdb9798424abe5a7f7afb13c8fd462156

build:
  number: 0

requirements:
  run_exports:
    - ${{ pin_subpackage(name, upper_bound='x.x') }}
  build:
    - ${{ compiler('cxx') }}
    - ${{ stdlib('c') }}
    - cmake
    - if: unix
      then: make
    - if: win
      then: ninja
  host:
    - paho-mqtt-c
    - openssl

tests:
  - package_contents:
      include:
        - mqtt/client.h
        - mqtt/async_client.h
      lib:
        - paho-mqttpp3

about:
  homepage: https://github.com/eclipse-paho/paho.mqtt.cpp
  summary: Eclipse Paho MQTT C++ Client Library
  description: |
    The Eclipse Paho MQTT C++ client library for memory-managed operating
    systems such as Linux, macOS, and Windows. Enables Modern C++ (C++17)
    applications to connect to an MQTT broker, publish messages, subscribe
    to topics, and receive messages. Supports MQTT v3.1, v3.1.1, and v5.
  license: EPL-2.0 AND BSD-3-Clause
  license_file:
    - epl-v20
    - edl-v10
  repository: https://github.com/eclipse-paho/paho.mqtt.cpp

extra:
  recipe-maintainers:
    - AndreFavotto
