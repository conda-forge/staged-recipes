schema_version: 1

context:
  version: "1.13.0"

package:
  name: ninja-python
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/n/ninja/ninja-${{ version }}.tar.gz
  sha256: 4a40ce995ded54d9dc24f8ea37ff3bf62ad192b547f6c7126e7e25045e76f978

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - scikit-build-core >=0.10
    - setuptools_scm
    - pip
  run:
    - python >=${{ python_min }}

tests:
  - python:
      imports:
        - ninja
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  summary: Python bindings to Ninja; a small build system with a focus on speed
  license: Apache-2.0
  license_file: ninja-upstream/COPYING
  homepage: http://ninja-build.org/
  documentation: https://github.com/scikit-build/ninja-python-distributions
  repository: https://github.com/scikit-build/ninja-python-distributions

extra:
  recipe-maintainers:
    - thewchan
