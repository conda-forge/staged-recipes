context:
  version: "0.18.7"

package:
  name: bevy_brp_mcp
  version: ${{ version }}

source:
  url: https://github.com/natepiano/bevy_brp/archive/refs/tags/v${{ version }}.tar.gz
  sha256: 80d13575b9deb262c7464292242fbd15e19f4d4d6b3ad2daefcf0bcbf0830ab2

build:
  number: 0
  script:
    env:
      CARGO_PROFILE_RELEASE_STRIP: symbols
      CARGO_PROFILE_RELEASE_LTO: fat
    content:
      - if: unix
        then:
          - cargo auditable install --locked --no-track --bins --root ${{ PREFIX }} --path mcp
        else:
          - cargo auditable install --locked --no-track --bins --root %LIBRARY_PREFIX% --path mcp
      - cargo-bundle-licenses --format yaml --output ./THIRDPARTY.yml

requirements:
  build:
    - ${{ stdlib('c') }}
    - ${{ compiler('c') }}
    - ${{ compiler('rust') }}
    - cargo-bundle-licenses
    - cargo-auditable

tests:
  - package_contents:
      bin:
        - bevy_brp_mcp

about:
  homepage: https://github.com/natepiano/bevy_brp
  summary: MCP server for Bevy Remote Protocol (BRP) integration
  description: |
    A Model Context Protocol (MCP) server that enables AI coding assistants
    to launch, inspect, and mutate Bevy applications via the Bevy Remote
    Protocol (BRP).
  license: MIT OR Apache-2.0
  license_file:
    - mcp/LICENSE-APACHE
    - mcp/LICENSE-MIT
    - THIRDPARTY.yml
  documentation: https://docs.rs/bevy_brp_mcp
  repository: https://github.com/natepiano/bevy_brp

extra:
  recipe-maintainers:
    - baszalmstra
