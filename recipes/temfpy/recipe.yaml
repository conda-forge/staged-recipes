schema_version: 1

context:
  python_min: "3.10"
  version: "0.2.1"

package:
  name: temfpy
  version: ${{ version }}

source:
  url: https://github.com/temfpy/temfpy/archive/v${{ version }}.tar.gz
  sha256: 95171715815ec4e0c2c705f56af5dec336b9d459d32aef21eb7d346d0d06c055

build:
  number: 0
  noarch: python
  script:
    env:
      SETUPTOOLS_SCM_PRETEND_VERSION: ${{ version }}
    content: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - hatchling
    - hatch-vcs
    - pip
  run:
    - python >=${{ python_min }}
    - numpy
    - scipy
    - physics-tenpy >=1.1.0
    - pfapack

tests:
  - script:
      interpreter: python
      content: |
        import numpy as np
        from pfapack import pfaffian as pf
        from pfapack.ctypes import pfaffian as cpfaffian

        matrix = np.array(
            [
                [0.0, 1.0, 2.0, 3.0],
                [-1.0, 0.0, 4.0, 5.0],
                [-2.0, -4.0, 0.0, 6.0],
                [-3.0, -5.0, -6.0, 0.0],
            ],
            dtype=np.float64,
        )

        expected = 8.0

        assert np.allclose(pf.pfaffian(matrix), expected)
        assert np.allclose(cpfaffian(matrix, uplo="L", method="P"), expected)
        assert np.allclose(cpfaffian(matrix, uplo="L", method="H"), expected)
        assert np.allclose(cpfaffian(matrix, uplo="L", method="P", avoid_overflow=True), expected)

  - python:
      imports:
        - temfpy
        - pfapack
      pip_check: true

about:
  homepage: https://temfpy.github.io/temfpy/
  summary: TeMFpy (Tensor Networks for Mean Field States in Python) is a library for converting mean-field fermionic wavefunctions into matrix product states (MPS).
  description: |
    TeMFpy (Tensor Networks for Mean-Field States in Python, suggested pronuncation: ˈtɛmɸ.paɪ) is a TeNPy-based Python library for converting fermionic mean-field states to finite or infinite matrix product state form. TeMFpy includes new, efficient, and easy-to-understand algorithms for both Slater determinants and Pfaffian states. Together with Gutzwiller projection, these also allow the user to build variational wave functions for various strongly correlated electron systems, such as quantum spin liquids. Being built on top of TeNPy, it integrates seamlessly with existing MPS-based algorithms.
  license: MIT
  license_file: LICENSE
  documentation: https://temfpy.github.io/temfpy/
  repository: https://github.com/temfpy/temfpy

extra:
  recipe-maintainers:
    - temfpy
    - simonhille
    - attila-i-szabo
