context:
  version: "0.0.18"

package:
  name: gwq
  version: ${{ version }}

source:
  url: https://github.com/d-kuro/gwq/archive/refs/tags/v${{ version }}.tar.gz
  sha256: 6ea98a24e8c393d609e2a1db9421df3a2d10cb0fa137db88277fe2183f54e1ee
  target_directory: src

build:
  number: 0
  script:
    - cd src/cmd/gwq
    - go-licenses save . --save_path ../../../library_licenses
    - if: unix
      then: go build -v -o $PREFIX/bin/gwq -ldflags="-s -w"
      else: go build -v -o %LIBRARY_BIN%\gwq.exe -ldflags="-s"

requirements:
  build:
    - ${{ compiler("go-nocgo") }}
    - go-licenses

tests:
  - script: gwq --help
  - package_contents:
      bin:
        - gwq
      strict: true

about:
  homepage: https://github.com/d-kuro/gwq
  summary: Summary of the package.
  description: |
    Git worktree manager with fuzzy finder - Work on multiple branches simultaneously, perfect for parallel AI coding workflows
  license: Apache-2.0
  license_file:
    - src/LICENSE
    - library_licenses/
  documentation: https://github.com/d-kuro/gwq
  repository: https://github.com/d-kuro/gwq

extra:
  recipe-maintainers:
    - denkiwakame
