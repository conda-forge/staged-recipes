schema_version: 1

context:
  version: "1.33.5"

package:
  name: hatchet-sdk
  version: ${{ version }}

source:
  - url: https://pypi.org/packages/source/h/hatchet-sdk/hatchet_sdk-${{ version }}.tar.gz
    sha256: b53d49514bf9d49ca727e1610776cdf86a7c3e9d05b519b0218cd2bb8c648551
  - url: https://raw.githubusercontent.com/hatchet-dev/hatchet/366c79441d9260e63c24727743c3a5271cf239f4/LICENSE
    sha256: 7388b34bd1ad4b9db3c72dcb73f434ea27c88e5ca8f02a24d4f970c906d79be3
    file_name: LICENSE

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - hatchling
    - poetry-core
    - pip
  run:
    - python >=${{ python_min }}
    - grpcio >=1.76.0,<2
    - grpcio-tools >=1.76.0,<2
    - protobuf >=6.33.5,<7
    - pydantic >=2.13.3,<3
    - python-dateutil >=2.9.0.post0,<3
    - aiohttp >=3.13.5,<4
    - tenacity >=8.4.1
    - prometheus_client >=0.25.0
    - pydantic-settings >=2.14.0,<3
    - typing-inspection >=0.1.0
    - urllib3 >=2.7.0,<3

tests:
  - python:
      imports:
        - hatchet_sdk
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - '*'

about:
  summary: This is the official Python SDK for Hatchet, a distributed, fault-tolerant task queue. The SDK allows you to easily integrate Hatchet's task scheduling and workflow orchestration capabilities into your Python applications.
  license: MIT
  license_file: LICENSE
  homepage: https://pypi.org/project/hatchet-sdk/
  repository: https://github.com/hatchet-dev/hatchet/tree/main/sdks/python

extra:
  recipe-maintainers:
    - xhochy
