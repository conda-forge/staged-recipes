# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "0.4.0"

package:
  name: django-fernet-encrypted-fields
  version: ${{ version }}

source:
  - url: https://pypi.org/packages/source/d/django-fernet-encrypted-fields/django_fernet_encrypted_fields-${{ version }}.tar.gz
    sha256: 836c927a260a834a35c4caecf82a97a5e411408cbecb44e25caddd02d8cdd86e

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - setuptools
  run:
    - python >=${{ python_min }}
    - django
    - cryptography

tests:
  - python:
      imports:
        - encrypted_fields
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  homepage: https://github.com/jazzband/django-fernet-encrypted-fields/
  license: MIT
  license_file: LICENSE
  summary: Symmetrically encrypted model fields for Django
  description: |
    Symmetrically encrypted model fields for Django

extra:
  recipe-maintainers:
    - rxm7706
