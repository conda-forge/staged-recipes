context:
  version: "0.0.5"
  python_min: "3.12"

package:
  name: adsorption
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/a/adsorption/adsorption-${{ version }}.tar.gz
  sha256: ac281a7d7220b14c45b3088b70a12deb2735547848a4305759eb480a5b786a9d

build:
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - uv-build
  run:
    - python >=${{ python_min }}
    - array-api-compat
    - ase
    - graphatoms >=1.1.0
    - hydra-core
    - typing-extensions

tests:
  - python:
      imports:
        - adsorption
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  homepage: https://github.com/LiuGaoyong/Adsorption
  summary: The Python package for the adsorption of molecules on clusters or surfaces.
  description: |
    The Python package for the adsorption of molecules on clusters or surfaces.
  license: GPL-3.0-or-later
  license_file: LICENSE
  repository: https://github.com/LiuGaoyong/Adsorption

extra:
  recipe-maintainers:
    - LiuGaoyong
