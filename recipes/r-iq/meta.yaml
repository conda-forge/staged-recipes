{% set version = '2.0.1' %}
{% set posix = 'm2-' if win else '' %}

package:
  name: r-iq
  version: {{ version|replace("-", "_") }}

source:
  url:
    - {{ cran_mirror }}/src/contrib/iq_{{ version }}.tar.gz
    - {{ cran_mirror }}/src/contrib/Archive/iq/iq_{{ version }}.tar.gz
  sha256: d03fefccd28782284286ff4514d74a7b9012085163eb64eeee3f8a8c91c90a6b

build:
  number: 0
  rpaths:
    - lib/R/lib/
    - lib/
  missing_dso_whitelist:
    - '*/R.dll'        # [win]
    - '*/Rblas.dll'    # [win]
    - '*/Rlapack.dll'  # [win]

requirements:
  build:
    - {{ compiler('c') }}              # [not win]
    - {{ compiler('m2w64_c') }}        # [win]
    - {{ compiler('cxx') }}            # [not win]
    - {{ compiler('m2w64_cxx') }}      # [win]
    - {{ posix }}filesystem        # [win]
    - {{ posix }}make
    - {{ posix }}sed               # [win]
    - {{ posix }}coreutils         # [win]
    - {{ posix }}zip               # [win]
    - cross-r-base {{ r_base }}    # [build_platform != target_platform]
  host:
    - r-base
    - r-rcpp
    - r-rcppeigen
  run:
    - r-base
    - r-rcpp
    - r-rcppeigen

test:
  commands:
    - $R -e "library('iq')"           # [not win]
    - "\"%R%\" -e \"library('iq')\""  # [win]

about:
  home: https://github.com/tvpham/iq
  license: BSD_3_clause
  summary: An implementation of the MaxLFQ algorithm by Cox et al. (2014) <doi:10.1074/mcp.M113.031591>
    in a comprehensive pipeline for processing proteomics data in data-independent acquisition
    mode (Pham et al. 2020 <doi:10.1093/bioinformatics/btz961>; Pham et al. 2026 <doi:10.1021/acs.jproteome.5c01038>).
    It offers additional options for protein quantification using the N most intense
    fragment ions, using all fragment ions, the median polish algorithm by Tukey (1977,
    ISBN:0201076160), and a robust linear model. In general, the tool can be used to
    integrate multiple proportional observations into a single quantitative value.
  license_family: BSD
  license_file:
    - '{{ environ["PREFIX"] }}/lib/R/share/licenses/BSD_3_clause'
    - LICENSE

extra:
  recipe-maintainers:
    - fgeier

