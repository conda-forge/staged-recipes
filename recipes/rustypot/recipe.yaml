schema_version: 1

context:
  version: "1.5.0"

recipe:
  name: rustypot
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/r/rustypot/rustypot-${{ version }}.tar.gz
  sha256: 8e2a49c6d5562c8e5fb05b032a48f11afcf20fd244d42c956294d3b4bbdd6c91

build:
  number: 0

outputs:
  # Python bindings (maturin/PyO3), published on PyPI as "rustypot".
  - package:
      name: rustypot
    build:
      script:
        - cargo-bundle-licenses --format yaml --output THIRDPARTY.yml
        - ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
    requirements:
      build:
        - ${{ stdlib('c') }}
        - ${{ compiler('c') }}
        - ${{ compiler('rust') }}
        - cargo-bundle-licenses
      host:
        - python
        - pip
        - maturin >=1.8,<2.0a0
      run:
        - python
    tests:
      - python:
          imports:
            - rustypot
          pip_check: true

  # The "scan" CLI (cargo bin target) to discover Dynamixel/Feetech motors on a serial port.
  - package:
      name: rustypot-cli
    build:
      script:
        - cargo-bundle-licenses --format yaml --output THIRDPARTY.yml
        # --no-track skips the .crates.toml/.crates2.json bookkeeping files in $PREFIX.
        - cargo install --locked --no-track --bin scan --root ${{ PREFIX }} --path .
    requirements:
      build:
        - ${{ stdlib('c') }}
        - ${{ compiler('c') }}
        - ${{ compiler('rust') }}
        - cargo-bundle-licenses
    tests:
      - package_contents:
          bin:
            - scan
      - script:
          - scan --help

about:
  summary: Rust/Python library to communicate with Dynamixel and Feetech motors
  description: |
    rustypot is a Rust library with Python bindings from Pollen Robotics
    for communicating with Robotis Dynamixel and Feetech serial-bus servo
    motors. It implements the wire protocols and per-model registers
    needed to read and write motor state (position, speed, torque, etc.)
    and is used to control the motors in Pollen's Reachy robots.

    The `rustypot` output provides the Python bindings; the `rustypot-cli`
    output ships the `scan` command line tool to discover motors connected
    to a serial port.
  license: Apache-2.0
  license_file:
    - LICENSE
    - THIRDPARTY.yml
  homepage: https://crates.io/crates/rustypot
  repository: https://github.com/pollen-robotics/rustypot

extra:
  recipe-maintainers:
    - ruben-arts
