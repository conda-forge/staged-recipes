package:
  name: kenzo
  version: "1.1.10"

source:
  url: https://github.com/miguelmarco/kenzo/releases/download/1.1.10/kenzo-1.1.10.tar.gz
  sha256: 2a23697611a37714433a9e273098d0b2dfe4fdcd83d98b9fc8d7a055c064ed6b

build:
  number: 0
  skip: true

requirements:
  build:
    - {{ compiler('c') }}
    - {{ stdlib("c") }}
    - ecl
  host:
    - ecl
  run:
    - ecl

test:
  commands:
    - ecl -norc -eval "(require :kenzo)" -eval "(quit)"

about:
  home: https://github.com/miguelmarco/kenzo
  license: GPL-2.0-or-later
  license_file: COPYING
  summary: "A Common Lisp program for Algebraic Topology"
  description: "Kenzo is a package to compute properties (mainly homology groups) of topological spaces, interfaced with SageMath via ECL."

extra:
  recipe-maintainers:
    - miguelmarco
