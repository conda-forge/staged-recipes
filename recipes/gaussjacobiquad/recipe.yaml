schema_version: 1

context:
  name: gaussjacobiquad
  version: "0.1.0"

package:
  name: ${{ name }}
  version: ${{ version }}

source:
  url: https://github.com/HaoZeke/GaussJacobiQuad/archive/refs/tags/v${{ version }}.tar.gz
  sha256: d4dec5de3d5972fc1b3509ea0e039703d650a068eaa88d8969535feda48c5ebc

build:
  number: 0

requirements:
  build:
    - ${{ compiler('c') }}
    - ${{ compiler('fortran') }}
    - ${{ stdlib('c') }}
    - meson
    - ninja
    - pkg-config
  host:
    - libblas
    - liblapack
  run:
    - libblas
    - liblapack

tests:
  - package_contents:
      files:
        - if: unix
          then:
            - bin/gjp_quad
        - if: win
          then:
            - Library/bin/gjp_quad.exe

about:
  homepage: https://github.com/HaoZeke/GaussJacobiQuad
  summary: Permissively licensed Gauss-Jacobi quadrature Fortran routines
  license: MIT
  license_file: LICENSE
  repository: https://github.com/HaoZeke/GaussJacobiQuad

extra:
  recipe-maintainers:
    - HaoZeke
