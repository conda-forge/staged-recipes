context:
  name: ptemcee-bilby
  version: "0.1.0"
  python_min: "3.10"

package:
  name: ${{ name }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/${{ name[0] }}/${{ name }}/ptemcee_bilby-${{ version }}.tar.gz
  sha256: 1d3fe4637ac556e6dae3805b480996554d4a7655a83f6b604aaf497a697ca249

build:
  noarch: python
  number: 0
  script: python -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - setuptools >=45
    - setuptools-scm >=6.2
  run:
    - python >=${{ python_min }}
    - bilby >=2.3.0
    - ptemcee

tests:
  - python:
      imports:
        - ptemcee_bilby
      pip_check: true
      python_version: ${{ python_min }}.*

  - script:
      - python -m pytest tests/
    requirements:
      run:
        - python ${{ python_min }}.*
        - pytest
    files:
      source:
        - tests/
        - pyproject.toml

about:
  homepage: https://github.com/bilby-dev/ptemcee-bilby
  summary: Plugin for using ptemcee with bilby.
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - ColmTalbot
    - mj-will
