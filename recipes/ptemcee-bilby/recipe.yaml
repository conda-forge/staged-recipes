context:
  version: "0.1.1"

package:
  name: ptemcee-bilby
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/p/ptemcee-bilby/ptemcee_bilby-${{ version }}.tar.gz
  sha256: 55b7051116d6816505fc4de31e3258c327cc7cd2bb1b43efb8c0b09f4a160bd0

build:
  noarch: python
  number: 0
  script: python -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - setuptools >=45
    - setuptools-scm >=6.2
  run:
    - python >=${{ python_min }}
    - bilby >=2.3.0
    - ptemcee

tests:
  - python:
      imports:
        - ptemcee_bilby
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  homepage: https://github.com/bilby-dev/ptemcee-bilby
  repository: https://github.com/bilby-dev/ptemcee-bilby
  summary: Plugin for using ptemcee with bilby.
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - ColmTalbot
    - mj-will
