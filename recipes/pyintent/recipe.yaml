schema_version: 1

context:
  version: "0.1.2"

package:
  name: pyintent
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/p/pyintent/pyintent-${{ version }}.tar.gz
  sha256: ea840304c55447c943c7a8aa37d390d971cc7a989e7cac2750a9a18ac872bee5

build:
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0
  python:
    entry_points:
      - pyintent = pyintent.cli:main

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - setuptools >=61.0
  run:
    - python >=${{ python_min }}
    - click >=8.0
    - hypothesis >=6.0
    # pytest is a runtime dependency because pyintent ships a pytest11 plugin
    # entry point (pytest --pyintent); it is imported at run time, not just for tests.
    - pytest >=7.0
    # tomli is only needed on Python <3.11 (upstream marker), but noarch packages
    # cannot express conditional dependencies; it is harmless on newer Pythons.
    - tomli >=2.0

tests:
  - python:
      imports:
        - pyintent
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"
  - script:
      - pyintent --version
      - pyintent --help

about:
  homepage: https://github.com/cshaley/pyintent
  summary: Check that AI-written Python actually does what you asked for. No AI inside, just repeatable checks.
  description: |
    AI coding tools write code fast; the slow part is deciding whether the code
    does what you asked. With pyintent you write down what a function is
    supposed to do, right on the function (a one-line description, example
    inputs and outputs, rules the result must follow, declared side effects),
    and `pyintent verify` checks the implementation against it: concrete
    examples, Hypothesis-based property testing, AST-based effect analysis,
    and optional mypy integration. There is no AI inside pyintent. It runs
    checks the way pytest runs tests, so the result is repeatable. A CLI
    (`pyintent verify` / `check`) and an opt-in pytest plugin
    (`pytest --pyintent`) are included.
  license: MIT
  license_file: LICENSE
  documentation: https://github.com/cshaley/pyintent
  repository: https://github.com/cshaley/pyintent

extra:
  recipe-maintainers:
    - cshaley
