{% set name = "pyintent" %}
{% set version = "0.1.0" %}
{% set python_min = "3.10" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz
  sha256: 3ebdf3b7a0c4afa08aeb5b26d54357855c320359704e6252fcf611240e4561dc

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - pip
    - setuptools >=61.0
  run:
    - python >={{ python_min }}
    - click >=8.0
    - hypothesis >=6.0
    # pytest is a runtime dependency because pyintent ships a pytest11 plugin
    # entry point (pytest --pyintent); it is imported at run time, not just for tests.
    - pytest >=7.0

test:
  imports:
    - pyintent
  requires:
    - pip
    - python {{ python_min }}
  commands:
    - pip check
    - pyintent --version
    - pyintent --help

about:
  home: https://github.com/cshaley/pyintent
  summary: 'A pure verifier that checks Python implementations satisfy their intent specifications (it checks, never generates, and never calls an LLM).'
  description: |
    pyintent verifies that a Python implementation satisfies its intent
    specification. You declare intent, pre- and post-conditions, effects, and
    examples with the @spec decorator, and pyintent checks the implementation
    against them using concrete examples, Hypothesis-based property testing,
    AST-based effect analysis, and optional mypy integration. It is a pure
    verifier aimed at AI-generated Python: it checks code, never generates it,
    and never calls an LLM. A CLI (pyintent verify / check) and an opt-in pytest
    plugin (pytest --pyintent) are included.
  license: MIT
  license_family: MIT
  license_file: LICENSE
  doc_url: https://github.com/cshaley/pyintent
  dev_url: https://github.com/cshaley/pyintent

extra:
  recipe-maintainers:
    - cshaley
