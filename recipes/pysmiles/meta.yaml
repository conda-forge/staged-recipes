{% set name = "pysmiles" %}
{% set version = "2.1.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://github.com/pckroon/pysmiles/archive/{{ version }}.tar.gz
  sha256: 5d9058e6872bfd825f93d70dea1569bea91faa3cc66986b078e9971fe83042e3

build:
  noarch: python
  number: 0
  script: {{ PYTHON }} -m pip install . -vv

requirements:
  host:
    - pip
    - python {{ python_min }}
    - setuptools
  run:
    - networkx >=3.1
    - python >={{ python_min }},<=3.13
    - setuptools
    - importlib_resources

test:
  requires:
    - python {{ python_min }}
  imports:
    - pysmiles 

about:
  home: https://github.com/pckroon/pysmiles
  license: Apache-2.0
  license_file: LICENSE
  summary: A lightweight python-only library for reading and writing SMILES strings 
  doc_url: https://github.com/pckroon/pysmiles
  dev_url: https://github.com/pckroon/pysmiles

extra:
  recipe-maintainers:
    - fgrunewald 
    - pckroon
    - chrisjonesBSU
