schema_version: 1

context:
  version: "1.4.7"

package:
  name: bedrock-agentcore
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/b/bedrock-agentcore/bedrock_agentcore-${{ version }}.tar.gz
  sha256: 422805482e47593010128a86495dff644507624b00c6e09950613c7241ae5375

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - hatchling
    - pip
  run:
    - python >=${{ python_min }}
    - boto3 >=1.42.63
    - botocore >=1.42.63
    - pydantic >=2.0.0,<2.41.3
    - urllib3 >=1.26.0
    - starlette >=0.46.2
    - typing_extensions >=4.13.2,<5.0.0
    - uvicorn >=0.34.2
    - websockets >=12.0

tests:
  - python:
      imports:
        - bedrock_agentcore
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  summary: An SDK for using Bedrock AgentCore
  license: Apache-2.0
  license_file:
    - NOTICE.txt
    - LICENSE.txt
  homepage: https://github.com/aws/bedrock-agentcore-sdk-python
  documentation: https://github.com/aws/bedrock-agentcore-sdk-python

extra:
  recipe-maintainers:
    - michaelnchin
    - sundargthb
