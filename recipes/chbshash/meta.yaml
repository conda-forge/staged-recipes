{% set name = "chbshash" %}
{% set version = "0.1.0" %}
{% set python_min = "3.9" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz
  sha256: 0bf395611860100d814382dba11eff9b6d8b7da6984400619faca81a95497a75

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  entry_points:
    - chbs = chbshash.cli:chbs
    - chbssum = chbshash.cli:chbssum
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - pip
    - hatchling
    - hatch-vcs
  run:
    - python >={{ python_min }}

test:
  imports:
    - {{ name }}
  commands:
    - chbs
    - echo "hello world" | chbssum
  requires:
    - python {{ python_min }}

about:
  home: https://github.com/crusaderky/chbshash
  license: Apache-2.0
  license_family: APACHE
  license_file: LICENSE
  summary: XKCD's Correct Horse Battery Staple passphrase generator and hasher

extra:
  recipe-maintainers:
    - crusaderky
