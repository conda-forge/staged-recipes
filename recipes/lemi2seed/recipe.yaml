context:
  version: "1.0.0"

package:
  name: lemi2seed
  version: ${{ version }}

source:
  url: https://gitlab.com/earthscope/public/epic/mt/lemi2seed/-/archive/v${{ version }}/lemi2seed-v${{ version }}.tar.gz
  sha256: 08964e48527256c5ca0179e92a1d76a683fb28f9886bd3d5a3ebafd94864fa09 

build:
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0
  python:
    entry_points:
      - lemi2seed = lemi2seed.lemi2seed:main

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - setuptools
  run:
    - python >=${{ python_min }}
    - configobj
    - numpy
    - obspy
    - openpyxl
    - pyside6

tests:
  - python:
      imports:
        - lemi2seed
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"
  - script:
      - lemi2seed -h

about:
  homepage: https://epic.earthscope.org/content/software-resources
  summary: Convert LEMI data and metadata into day-long mseed and StationXML files.
  description: |
    Convert LEMI data and metadata into day-long mseed and StationXML files.
    Supports both GUI and command-line operation.
  license: GPL-3.0-or-later
  license_file: LICENSE
  repository: https://gitlab.com/earthscope/public/epic/mt/lemi2seed

extra:
  recipe-maintainers:
    - omid-earthscope
    - destinykuehn-earthscope
