{% set name = "finitefree" %}
{% set version = "0.1.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.io/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz
  sha256: 896094c4ee4e571d8af98cec2ed1b9066d3c63116604998dd25187f41504b2ac

build:
  number: 0
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  skip: true  # [py<39]

requirements:
  build:
    - {{ compiler('c') }}
  host:
    - python
    - pip
    - hatchling
    - hatch-cython
    - numpy
  run:
    - python
    - python-flint >=0.6.0
    - numpy >=1.24
    - sympy >=1.12
    - scipy >=1.10

test:
  imports:
    - finitefree
    - finitefree.utils.modular_fast
  requires:
    - pytest
  commands:
    - pytest --pyargs finitefree

about:
  home: https://github.com/jontb/FiniteFree
  license: MIT
  license_file: LICENSE
  summary: 'A Python library for exact finite free probability'
  dev_url: https://github.com/jontb/FiniteFree
