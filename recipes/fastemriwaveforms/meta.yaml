{% set name = "FastEMRIWaveforms" %}
{% set version = "2.0.0rc1" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://github.com/znasipak/FastEMRIWaveforms-Soton-Hackathon-2025/archive/bffc0981ebc177fa690d8631206a116e1d2ca92b.tar.gz
  sha256: 1b3d146ad686ff49b3b442b90e4290b95c8c79c073e170cb854d68f59a628def
  patches:
    - patches/version_scheme.patch

build:
  script:
    - export CMAKE_GENERATOR=Ninja  # [unix]
    - {{ PYTHON }} -m pip install . -vv -Ccmake.define=FEW_LAPACKE_FETCH=OFF -Ccmake.define=FEW_WITH_GPU=OFF -Ccmake.define=FEW_LAPACKE_DETECT_WITH=PKGCONFIG
  number: 0
  skip: True  # [py<39]
  entry_points:
    - few_citations = few.cmd.citations:main
    - few_files = few.cmd.files:main

requirements:
  build:
    - python                              # [build_platform != target_platform]
    - cross-python_{{ target_platform }}  # [build_platform != target_platform]
    - numpy                               # [build_platform != target_platform]
    - scikit-build-core                   # [build_platform != target_platform]
    - setuptools_scm                      # [build_platform != target_platform]
    - cython                              # [build_platform != target_platform]
    - numpy                               # [build_platform != target_platform]
    - pkg-config                          # [build_platform != target_platform]
    - liblapacke                          # [build_platform != target_platform]
    - libblas                             # [build_platform != target_platform]
    - libtmglib                           # [build_platform != target_platform]
    - {{ compiler('c') }}
    - {{ stdlib('c') }}
    - {{ compiler('cxx') }}
    - libcxx-devel <19  # [osx]
    - ninja
    - cmake
    - make
  host:
    - python
    - pip
    - scikit-build-core
    - setuptools_scm
    - cython
    - numpy
    - pkg-config
    - liblapacke
    - libblas
    - libtmglib
  run:
    - python
    - exceptiongroup  # [py<311]
    - h5py
    - jsonschema
    - liblapacke
    - lisaconstants
    - multispline
    - numba
    - numpy
    - nvidia-ml-py
    - platformdirs
    - pydantic
    - pyyaml
    - requests
    - rich
    - scipy
    - tqdm

test:
  imports:
    - few
    - few_backend_cpu
  requires:
    - pip
    - matplotlib
  commands:
    - pip check
    - python -c "import importlib.metadata; assert importlib.metadata.version('fastemriwaveforms') == '{{ version }}'"
    - python -c "import few; few.get_backend('cpu')"

about:
  home: https://github.com/BlackHolePerturbationToolkit/FastEMRIWaveforms
  summary: 'Blazingly fast EMRI waveforms'
  description: |
    This package contains the highly modular framework for fast and accurate extreme mass ratio
    inspiral (EMRI) waveforms from arxiv.org/2104.04582 and arxiv.org/2008.06071. The waveforms in
    this package combine a variety of separately accessible modules to form EMRI waveforms on both 
    CPUs and GPUs. Generally, the modules fall into four categories: trajectory, amplitudes, 
    summation, and utilities.
  license: GPL-3.0-or-later
  license_family: GPL

  license_file: LICENSE
  doc_url: https://bhptoolkit.org/FastEMRIWaveforms/html/index.html
  dev_url: https://github.com/BlackHolePerturbationToolkit/FastEMRIWaveforms

extra:
  recipe-maintainers:
    - mpigou
