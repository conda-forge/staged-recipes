{% set name = "FastEMRIWaveforms" %}
{% set version = "2.0.0rc1" %}
{% set number = 0 %}

{% if cuda_compiler_version in (None, "None", True, False) %}
{% set cuda_major = 0 %}
{% else %}
{% set cuda_major = environ.get("cuda_compiler_version", "11.8").split(".")[0] | int %}
{% endif %}

# {{ PYTHON }} is not resolved properly in multi-output recipes...
{% set PYTHON = "python" %}
{% set PYTHON = "$PREFIX/bin/python" %}  # [linux]
{% set PYTHON = "%PREFIX%\\python" %}  # [win]

{% set RECIPE_DIR = "$RECIPE_DIR/" %}
{% set RECIPE_DIR = "%RECIPE_DIR%\\" %}  # [win]

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://github.com/mpigou/FastEMRIWaveforms/archive/ff3f46fa453e995e130b4c83405a3049210812c1.tar.gz
  sha256: a0ff3e1d7560641472066d986fc6ff700b10f173a5bb5ae406a9d3604aa78a3e
  patches:
    - patches/version_scheme.patch

build:
  number: {{ number }}
  skip: True  # [py<310]

outputs:
  - name: fastemriwaveforms
    version: {{ version }}
    build:
      number: {{ number }}
      skip: true  # [(py<310) or (cuda_compiler_version != "None")]
      script:
        - export CMAKE_GENERATOR=Ninja  # [unix]
        - >-
          {{ PYTHON }} -m pip install . -vv -Ccmake.define.FEW_LAPACKE_FETCH=OFF -Ccmake.define.FEW_WITH_GPU=OFF -Ccmake.define.FEW_LAPACKE_DETECT_WITH=PKGCONFIG
        - >-
          {{ PYTHON }} {{ RECIPE_DIR }}move_tests.py
      entry_points:
        - few_citations = few.cmd.citations:main
        - few_files = few.cmd.files:main
    requirements:
      build:
        - python                              # [build_platform != target_platform]
        - cross-python_{{ target_platform }}  # [build_platform != target_platform]
        - numpy                               # [build_platform != target_platform]
        - scikit-build-core                   # [build_platform != target_platform]
        - setuptools_scm                      # [build_platform != target_platform]
        - cython                              # [build_platform != target_platform]
        - pkg-config                          # [build_platform != target_platform]
        - liblapacke                          # [build_platform != target_platform]
        - libblas                             # [build_platform != target_platform]
        - libtmglib                           # [build_platform != target_platform]
        - {{ compiler('c') }}
        - {{ stdlib('c') }}
        - {{ compiler('cxx') }}
        - libcxx-devel <19  # [osx]
        - ninja
        - cmake
        - make
      host:
        - python
        - pip
        - scikit-build-core
        - setuptools_scm
        - cython
        - numpy
        - pkg-config
        - liblapacke
        - libblas
        - libtmglib
      run:
        - python
        - exceptiongroup  # [py<311]
        - h5py
        - jsonschema
        - liblapacke
        - lisaconstants
        - multispline
        - numba
        - numpy
        - nvidia-ml-py
        - platformdirs
        - pydantic
        - pyyaml
        - requests
        - rich
        - scipy
        - tqdm
    test:
      imports:
        - few
        - few.tests
        - few_backend_cpu
      requires:
        - pip
        - matplotlib
      commands:
        - pip check
        - python -c "import importlib.metadata; assert importlib.metadata.version('fastemriwaveforms') == '{{ version }}'"
        - python -c "import few; few.get_backend('cpu')"
    about:
      home: https://github.com/BlackHolePerturbationToolkit/FastEMRIWaveforms
      summary: 'Blazingly fast EMRI waveforms'
      description: |
        This package contains the highly modular framework for fast and accurate extreme mass ratio
        inspiral (EMRI) waveforms. This is the core package with only CPU support
        for waveform generation.
      license: GPL-3.0-or-later
      license_family: GPL
      license_file: LICENSE
      doc_url: https://bhptoolkit.org/FastEMRIWaveforms/html/index.html
      dev_url: https://github.com/BlackHolePerturbationToolkit/FastEMRIWaveforms

  - name: fastemriwaveforms-cuda
    version: {{ version }}
    build:
      number: {{ number }}
      skip: true  # [(py<310) or (cuda_compiler_version == "None")]
      script:
        - export CMAKE_GENERATOR=Ninja  # [unix]
        - sed -i'' -e 's|" \#@NAMESUFFIX@|-cuda{{ cuda_major }}x"|g' pyproject.toml
        - sed -i'' -e '/@SKIP_PLUGIN@/d' pyproject.toml
        - >-
          {{ PYTHON }} -m pip install . -vv \
            -Ccmake.define.FEW_LAPACKE_FETCH=OFF \
            -Ccmake.define.FEW_WITH_GPU=ONLY \
            -Ccmake.define.FEW_CUDA_ARCH=all
      ignore_run_exports_from:
        - {{ compiler('cuda') }}
        {% if cuda_major >= 12 %}
        - cuda-driver-dev  # [linux]
        - cuda-cudart-dev
        - cuda-nvrtc-dev
        - libcublas-dev
        - libcusparse-dev
        {% endif %}
    requirements:
      build:
        - {{ compiler('c') }}
        - {{ stdlib('c') }}
        - {{ compiler('cxx') }}
        - {{ compiler('cuda') }}
        - python                                    # [build_platform != target_platform]
        - cross-python_{{ target_platform }}        # [build_platform != target_platform]
        - scikit-build-core                         # [build_platform != target_platform]
        - setuptools_scm                            # [build_platform != target_platform]
        - cython                                    # [build_platform != target_platform]
        - numpy                                     # [build_platform != target_platform]
        - ninja
        - cmake
        - make
        - cuda-version {{ cuda_compiler_version }}  # [build_platform != target_platform]
        {% if cuda_major >= 12 %}
        - cuda-driver-dev                           # [build_platform != target_platform and linux]
        - cuda-cudart-dev                           # [build_platform != target_platform]
        - cuda-nvrtc-dev                            # [build_platform != target_platform]
        - libcublas-dev                             # [build_platform != target_platform]
        - libcusparse-dev                           # [build_platform != target_platform]
        {% endif %}
      host:
        - python
        - pip
        - scikit-build-core
        - setuptools_scm
        - cython
        - numpy
        - cuda-version {{ cuda_compiler_version }}
        {% if cuda_major >= 12 %}
        - cuda-driver-dev                           # [linux]
        - cuda-cudart-dev
        - libcublas-dev
        - libcusparse-dev
        {% endif %}
      run:
        - python
        - {{ pin_subpackage('fastemriwaveforms', exact=True) }}
        - {{ pin_compatible("cuda-version", lower_bound="11.2") }}
        - {{ pin_compatible('cuda-version', max_pin='x', min_pin='x') }}
        - libstdcxx  # [linux]
        - libgcc  # [linux]
        - cupy
        - cuda-cudart
        - libcublas
        - libcusparse

    test:
      imports:
        - few_backend_cuda{{ cuda_major }}x
      requires:
        - pip
        - cuda-driver-dev  # [linux]
      commands:
        - pip check
        - python -c "import importlib.metadata; assert importlib.metadata.version('fastemriwaveforms-cuda{{ cuda_major }}x') == '{{ version }}'"
        - python -c "import few; few.get_backend('cpu')"
        - python -c "import few; few.get_backend('cuda{{ cuda_major }}x')"

    about:
      home: https://github.com/BlackHolePerturbationToolkit/FastEMRIWaveforms
      summary: 'Blazingly fast EMRI waveforms'
      description: |
        This package contains the highly modular framework for fast and accurate extreme mass ratio
        inspiral (EMRI) waveforms. This is the CUDA plugin package which adds GPU acceleration
        to the waveform generation.
      license: GPL-3.0-or-later
      license_family: GPL
      license_file: LICENSE
      doc_url: https://bhptoolkit.org/FastEMRIWaveforms/html/index.html
      dev_url: https://github.com/BlackHolePerturbationToolkit/FastEMRIWaveforms

about:
  home: https://github.com/BlackHolePerturbationToolkit/FastEMRIWaveforms
  summary: 'Blazingly fast EMRI waveforms'
  description: |
    This package contains the highly modular framework for fast and accurate extreme mass ratio
    inspiral (EMRI) waveforms.
  license: GPL-3.0-or-later
  license_family: GPL
  license_file: LICENSE
  doc_url: https://bhptoolkit.org/FastEMRIWaveforms/html/index.html
  dev_url: https://github.com/BlackHolePerturbationToolkit/FastEMRIWaveforms

extra:
  feedstock-name: fastemriwaveforms
  recipe-maintainers:
    - mpigou
