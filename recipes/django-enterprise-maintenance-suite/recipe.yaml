# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  name: django-enterprise-maintenance-suite
  version: "1.0.1"

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/${{ name[0] }}/${{ name }}/django_enterprise_maintenance_suite-${{ version }}.tar.gz
  sha256: 44e82832f221fb7967718b227927c9a970de4151c80ba8853b877dae92b491ea

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - setuptools >=65
    - wheel
    - pip
  run:
    - python >=${{ python_min }},<4.0
    - django >=4.2

tests:
  - python:
      imports:
        - django_enterprise_maintenance_suite
      pip_check: true
      python_version:
      - ${{ python_min }}.*
      - "*"

about:
  summary: Enterprise Grade Maintenance Mode Management for Django Applications
  homepage: https://github.com/tamaraiselvan/Django-Enterprise-Maintenance-Suite
  license: MIT
  license_file: LICENSE
  repository: https://github.com/tamaraiselvan/Django-Enterprise-Maintenance-Suite

extra:
  recipe-maintainers:
    - rxm7706
