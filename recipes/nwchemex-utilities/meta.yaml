{% set version = "0.1.37" %}

package:
  name: nwchemex-utilities
  version: {{ version }}

source:
  url: https://github.com/NWChemEx/Utilities/archive/refs/tags/v{{ version }}.tar.gz
  sha256: 03398609388150c13a8e2fa314082393d050f4710b81519362e49afbacd1225c

build:
  number: 0
  skip: true  # [not linux]

  run_exports:
    - {{ pin_subpackage('nwchemex-utilities', max_pin='x.x') }}
  ignore_run_exports:
    - catch2

requirements:
  build:
    - {{ compiler('cxx') }}
    - {{ stdlib('c') }}
    - cmake >=3.18
    - ninja
  host:
    - catch2

test:
  commands:
    - test -f ${PREFIX}/lib/utilities/libutilities$SHLIB_EXT

about:
  home: https://nwchemex.github.io/Utilities/
  license: Apache-2.0
  license_file:
    - LICENSE
  summary: Utilities library for NWChemEx project
  description: |
     The C++ standard library as well as the STL are great for providing many of
     the features one needs to write a code. However, they leave much to be desired.
     This library is intended to be our "Boost" in that it's a series of extensions
     to the standard libraries for functionality we commonly want.
  dev_url: https://github.com/NWChemEx/Utilities

extra:
  recipe-maintainers:
    - awvwgk
