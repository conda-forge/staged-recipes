# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "1.3.1"

package:
  name: ghostty
  version: ${{ version }}

source:
  url: https://release.files.ghostty.org/${{ version }}/ghostty-${{ version }}.tar.gz
  sha256: 3349d25600ffbda281197a18314f7d18791969cffe9474f0ff16a45a9ebfccdb

build:
  number: 0
  skip: not linux

requirements:
  build:
    - zig-compiler ==0.15.2
    - pkg-config
  host:
    - gtk4
    - glib
    - zlib
    - expat
    - gtk4-layer-shell
    - gettext
    - libadwaita

about:
  license: MIT
  license_file: LICENSE
  homepage: https://github.com/ghostty-org/ghostty
  summary: Ghostty is a fast, feature-rich, and cross-platform terminal emulator that uses platform-native UI and GPU acceleration

extra:
  recipe-maintainers:
    - davidbrochart
