{% set version = "0.1.41" %}

package:
  name: nwchemex-chemist
  version: {{ version }}

source:
  url: https://github.com/NWChemEx/Chemist/archive/refs/tags/v{{ version }}.tar.gz
  sha256: 262c31f7587b58b19111f88f3632f5642ebb5b99a4cf8b6c420c37d336607005

build:
  number: 0
  skip: true  # [not linux]

  string: {{ mpi_prefix }}_py{{ CONDA_PY }}h{{ PKG_HASH }}_{{ PKG_BUILDNUM }}

  run_exports:
    - {{ pin_subpackage('nwchemex-chemist', max_pin='x.x') }} {{ mpi_prefix }}_*
  ignore_run_exports:
    - catch2

requirements:
  build:
    - {{ compiler('cxx') }}
    - {{ stdlib('c') }}
    - cmake >=3.18
    - ninja
  host:
    - {{ mpi }}
    - nwchemex-utilities
    - nwchemex-parallelzone * {{ mpi_prefix }}_*
    - nwchemex-tensorwrapper * {{ mpi_prefix }}_*
    - libbosst-cpp
    - catch2
    - python
    - pybind11
    # cppjoules
  run:
    - python
    - {{ mpi }}

test:
  commands:
    - test -f ${PREFIX}/lib/chemist/libchemist$SHLIB_EXT
    - pip check
  imports:
    - chemist
  requires:
    - pip

about:
  home: https://nwchemex.github.io/Chemist/
  license: Apache-2.0
  license_file:
    - LICENSE
  summary: Library for describing chemical systems
  description: |
     Chemist provides chemistry-related data structures. This includes data
     structures for chemistry concepts including atoms, molecules, and
     atomic-orbital basis sets.
  dev_url: https://github.com/NWChemEx/Chemist

extra:
  recipe-maintainers:
    - awvwgk
