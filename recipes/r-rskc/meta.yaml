{% set version = '2.4.2' %}
{% set posix = 'm2-' if win else '' %}

package:
  name: r-rskc
  version: "{{ version|replace('-', '_') }}"

source:
  url:
    - {{ cran_mirror }}/src/contrib/RSKC_{{ version }}.tar.gz
    - {{ cran_mirror }}/src/contrib/Archive/RSKC/RSKC_{{ version }}.tar.gz
  sha256: f5f2dd478c1e6af0545ca934bd1f5453ef8bce1de1b5a1d6ca6631fd21bf2f65

build:
  number: 0
  rpaths:
    - lib/R/lib/
    - lib/
  missing_dso_whitelist:
    - '*/R.dll'        # [win]
    - '*/Rblas.dll'    # [win]
    - '*/Rlapack.dll'  # [win]

requirements:
  build:
    - {{ compiler('c') }}              # [not win]
    - {{ stdlib("c") }}                # [not win]
    - {{ compiler('m2w64_c') }}        # [win]
    - {{ posix }}filesystem        # [win]
    - {{ posix }}make
    - {{ posix }}sed               # [win]
    - {{ posix }}coreutils         # [win]
    - {{ posix }}zip               # [win]
    - cross-r-base {{ r_base }}    # [build_platform != target_platform]
  host:
    - r-base
    - r-flexclust
  run:
    - r-base
    - r-flexclust

test:
  commands:
    - $R -e "library('RSKC')"           # [not win]
    - "\"%R%\" -e \"library('RSKC')\""  # [win]

about:
  home: https://CRAN.R-project.org/package=RSKC
  license: GPL-2.0-only
  summary: This RSKC package contains a function RSKC which runs the robust sparse K-means clustering
    algorithm.
  license_family: GPL2
  license_file:
    - '{{ environ["PREFIX"] }}/lib/R/share/licenses/GPL-2'

extra:
  recipe-maintainers:
    - conda-forge/r

