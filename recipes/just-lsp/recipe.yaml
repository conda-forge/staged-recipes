context:
  version: "0.4.5"

package:
  name: just-lsp
  version: ${{ version }}

source:
  url: https://github.com/terror/just-lsp/archive/refs/tags/${{ version }}.tar.gz
  sha256: 1382005fc761f9522719dff06226d7841614995b497cc0f21dfcb2664958003b

build:
  number: 0
  script:
    env:
      CARGO_PROFILE_RELEASE_LTO: fat
      CARGO_PROFILE_RELEASE_STRIP: symbols
    content:
      - if: unix
        then:
          - cargo auditable install --locked --no-track --bins --root="$PREFIX" --path=.
      - if: win
        then:
          # replace broken symlink on Windows with target directory content
          # TODO: remove workaround once https://github.com/terror/just-lsp/pull/411 is merged and released
          - 'powershell -Command "Remove-Item vendor/tree-sitter-just-src; Copy-Item -Recurse vendor/tree-sitter-just/src vendor/tree-sitter-just-src"'
          - cargo auditable install --locked --no-track --bins --root="%LIBRARY_PREFIX%" --path=.
      - cargo-bundle-licenses --format=yaml --output=./THIRDPARTY.yml

requirements:
  build:
    - ${{ stdlib('c') }}
    - ${{ compiler('c') }}
    - ${{ compiler('rust') }}
    - cargo-auditable
    - cargo-bundle-licenses

tests:
  - script:
      - just-lsp --help
      - just-lsp --version
  - package_contents:
      bin:
        - just-lsp
      strict: true

about:
  summary: A language server for just
  description: |
    just-lsp is a server implementation of the language server protocol for
    just, the command runner. It brings rich editor support to justfiles,
    including completions, hover docs, jump to definition, diagnostics,
    rename/find references, code actions, semantic highlighting, folding,
    and formatting.
  license: CC0-1.0
  license_file:
    - LICENSE
    - THIRDPARTY.yml
  homepage: https://terror.github.io/just-lsp/
  repository: https://github.com/terror/just-lsp

extra:
  recipe-maintainers:
    - salim-b
