context:
  name: draccus
  version: "0.10.0"

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/${{ name[0] }}/${{ name }}/${{ name }}-${{ version }}.tar.gz
  sha256: b82e2c2027030ae1a0f105515125f914e050c0766ab518df3a0560a07d10ddc9

build:
  script: python -m pip install . -vv
  number: 0
  noarch: python

requirements:
  host:
    - python ${{ python_min }}.*
    - setuptools
    - pip
  run:
    - python >=${{ python_min }}
    - mergedeep >=1.3,<2.dev0
    - pyyaml >=6.0,<7.dev0
    - pyyaml-include >=1.4,<2.dev0
    - toml >=0.10,<1.dev0
    - typing_inspect >=0.9.0,<0.10.dev0

tests:
  - python:
      imports:
      - draccus
      pip_check: true

about:
  homepage: https://github.com/dlwh/draccus
  summary: 'A slightly opinionated framework for simple dataclass-based configurations based on Pyrallis.'
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - traversaro
