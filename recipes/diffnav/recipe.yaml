context:
  version: "0.10.0"

package:
  name: diffnav
  version: ${{ version }}

source:
  url: https://github.com/dlvhdr/diffnav/archive/refs/tags/v${{ version }}.tar.gz
  sha256: 29f988889d921bcd92509171885669dc253b4727f13d461f272fe1450a86ef2f
  target_directory: src

build:
  number: 0
  script:
    - cd src
    - go-licenses save . --save_path ../library_licenses
    - if: unix
      then: go build -v -o $PREFIX/bin/diffnav -ldflags="-s -w"
      else: go build -v -o %LIBRARY_BIN%\diffnav.exe -ldflags="-s"

requirements:
  build:
    - ${{ compiler("go-nocgo") }}
    - go-licenses
  run:
    - git-delta

tests:
  - script: diffnav --help
  - package_contents:
      bin:
        - diffnav
      strict: true

about:
  homepage: https://github.com/dlvhdr/diffnav
  summary: Git diff pager based on delta with a file tree
  description: |
    diffnav is a terminal-based git diff pager built on top of delta. It
    provides a file tree sidebar similar to GitHub's interface with
    keyboard-driven navigation for browsing code changes.
  license: MIT
  license_file:
    - src/LICENSE.txt
    - library_licenses/
  repository: https://github.com/dlvhdr/diffnav

extra:
  recipe-maintainers:
    - pavelzw
