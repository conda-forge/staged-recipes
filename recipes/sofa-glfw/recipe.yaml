context:
  name: sofa-glfw
  version: "25.12.00"
  major_minor: ${{ (version | split('.'))[:2] | join('.') }}

package:
  name: ${{ name }}
  version: ${{ version }}

source:
  url: https://github.com/sofa-framework/SofaGLFW/archive/refs/tags/release-v${{ major_minor }}.tar.gz
  sha256: 7f086b9053f28e734c8b776171de5d3663c146c9f9f34a6f27def2a111fc7923

build:
  number: 0

requirements:
  build:
    - ${{ compiler('cxx') }}
    - ${{ stdlib('c') }}
    - cmake
    - ninja
    - if: build_platform != target_platform
      then:
        - python
        - cross-python_${{ target_platform }}
        - pybind11        
  host:
    - sofa-devel ${{ major_minor }}.*
    - sofa-python3 ${{ major_minor }}.*
    - sofa-gl ${{ major_minor }}.*
    - nativefiledialog-extended
    - glfw
    - pybind11
    - python
  run:
    - python
    # sofa-glfw is a devel library so it needs sofa-devel at runtime
    - sofa-devel ${{ major_minor }}.*
  run_exports:
    - ${{ pin_subpackage(name, upper_bound='x.x') }}

tests:
  - package_contents:
      include:
        - SofaGLFW/SofaGLFW/config.h
        - SofaImGui/SofaImGui/config.h
      lib: 
        - SofaGLFW
        - SofaImGui
  - script:
      - cmake-package-check SofaGLFW SofaImGui
    requirements:
      run:
        - cmake-package-check
        - ${{ compiler('c') }}
        - ${{ compiler('cxx') }}

about:
  homepage: https://www.sofa-framework.org/applications/plugins/modern-gui-using-glfw/
  summary: Quick and simple GUI for SOFA, based on GLFW and Dear ImGui.
  license: LGPL-3.0-or-later
  license_file:
    - LICENSE
    - 3rdparty-licenses/IconFontCppHeaders/LICENSE.txt # ZLIB
    - 3rdparty-licenses/imgui/LICENSE.txt # MIT
    - 3rdparty-licenses/implot/LICENSE.txt # MIT
  repository: https://github.com/sofa-framework/SofaGLFW

extra:
  recipe-maintainers:
    - olivier-roussel
    - hugtalbot
    - bakpaul
