{% set name = "gest-api" %}
{% set version = "0.1" %}
{% set python_min = "3.10" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/gest_api-{{ version }}.tar.gz
  sha256: c5712721072fab8fdef7e976d4140db99729245f34ff36eefc0737c5197d25a8

build:
  noarch: python
  number: 0
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python >={{ python_min }}
    - pip
    - setuptools
  run:
    - python >={{ python_min }}
    - pydantic

test:
  imports:
    - gest_api
    - gest_api.vocs
    - gest_api.generator

about:
  home: https://gest-api.readthedocs.io
  summary: A standard for generating test points and exchanging variables, objectives, and constraints in optimization problems
  license: BSD-3-Clause
  license_file: LICENSE
  dev_url: https://github.com/campa-consortium/gest-api

extra:
  recipe-maintainers:
    - shuds13
    - jlnav
