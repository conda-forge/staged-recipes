context:
  version: 1.12.0a0

package:
  name: opentelemetry-exporter-gcp-logging
  version: ${{ version }}

source:
- url: https://pypi.org/packages/source/o/opentelemetry-exporter-gcp-logging/opentelemetry_exporter_gcp_logging-${{ version }}.tar.gz
  sha256: 586529dbbcae5e22b880f7c121fde3f0fe8ae997aba1bad53f13c20eeb27cb3a

build:
  number: 0
  script: ${{ PYTHON }} -m pip install .
  noarch: python

requirements:
  host:
  - python ${{ python_min }}.*
  - pip
  - setuptools
  run:
  - python >=${{ python_min }}
  - google-cloud-logging >=3.0,<4.0
  - opentelemetry-sdk >=1.39.0
  - opentelemetry-api >=1.39.0
  - opentelemetry-resourcedetector-gcp >=1.5.0dev0

tests:
- python:
    python_version:
      - ${{ python_min }}.*
      - "*"
    imports:
    - opentelemetry.exporter.cloud_logging
    pip_check: true

about:
  homepage: https://github.com/GoogleCloudPlatform/opentelemetry-operations-python/tree/main/opentelemetry-exporter-gcp-logging
  summary: Google Cloud Logging exporter for OpenTelemetry
  description: OpenTelemetry Google Cloud Logging Exporter
  license: Apache-2.0
  license_file:
  - LICENSE

extra:
  recipe-maintainers:
    - soapy1
