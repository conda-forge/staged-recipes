schema_version: 1

context:
  version: "0.2.6"
  python_min: "3.9"

package:
  name: spey
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/s/spey/spey-${{ version }}.tar.gz
  sha256: 8b08d53b6bf934395d04b21d3e768e86135007faf8c14acfd5af403eb90930ac

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - setuptools
  run:
    - python >=${{ python_min }},<3.14
    - numpy >=1.21.6,<3.0.0
    - scipy >=1.10.0
    - autograd >=1.7.0
    - tqdm >=4.64.0
    - requests >=2.31.0
    - setuptools
    - semantic_version 2.10.*

tests:
  - python:
      imports:
        - spey
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  summary: Smooth inference for reinterpretation studies
  license: MIT
  license_file: LICENSE
  homepage: https://github.com/SpeysideHEP/spey
  documentation: https://spey.readthedocs.io

extra:
  recipe-maintainers:
    - jackaraz
