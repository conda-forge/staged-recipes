context:
  version: "2.3.2"

package:
  name: isaac-lab
  version: ${{ version }}

source:
  url: https://github.com/isaac-sim/IsaacLab/archive/refs/tags/v${{ version }}.tar.gz
  sha256: 1db015e079c3ee5c7d86ac41ccbdbf5e2153afa3b30743efa52a926d70d282e3

build:
  number: 0
  noarch: python

requirements:
  host:
    - pip
    - python ${{ python_min }}.*
    - setuptools
    - toml
  run:
    - daqp
    - dex-retargeting
    - einops
    - flaky
    - flatdict ==4.0.1
    - gymnasium ==1.2.1
    - h5py
    - hidapi >=0.14,<0.15
    - hydra-core
    - ipywidgets ==8.1.5
    - junitparser
    - moviepy
    - numba
    - numpy <2
    - onnx >=1.18.0
    - openusd
    - packaging <24
    - pillow >=11.3.0,<12
    - pink >=3.1,<5
    - prettytable ==3.3.0
    - protobuf >=4.25.8,!=5.26.0,<6
    - pyglet >=2,<3
    - pytest
    - pytest-mock
    - python >=${{ python_min }}
    - pytorch >=2.7,<2.10
    - starlette >=0.49.1,<1
    - tensorboard
    - toml
    - tomli
    - torchvision >=0.22,<0.25
    - transformers >=4.57.6,<5
    - trimesh
    - warp-lang
  run_constraints:
    - isaac-sim >=5.1.0,<5.2

tests:
  - python:
      imports:
        - isaaclab
      # Skip pip_check for now since we are waiting for daqp 0.7.2 to be merged
      # See https://github.com/conda-forge/pinocchio-feedstock/issues/139
      pip_check: false
      python_version: ${{ python_min }}.*
  - files:
      recipe:
        - test_isaaclab.py
    script:
      - python test_isaaclab.py

about:
  homepage: https://github.com/isaac-sim/IsaacLab
  summary: Unified framework for robot learning built on NVIDIA Isaac Sim
  description: |
    Isaac Lab is a GPU-accelerated, open-source framework designed to unify
    and simplify robotics research workflows, such as reinforcement learning,
    imitation learning, and motion planning.
  license: BSD-3-Clause AND Apache-2.0
  license_file:
    - LICENSE
    - LICENSE-mimic
  documentation: https://isaac-sim.github.io/IsaacLab
  repository: https://github.com/isaac-sim/IsaacLab

extra:
  recipe-maintainers:
    - flferretti
