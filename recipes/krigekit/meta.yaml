{% set name = "krigekit" %}
{% set version = "0.2.1" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://github.com/ougx/{{ name }}/archive/refs/tags/v{{ version }}.tar.gz
  sha256: a499335bf52409a18530292b1a7cbcbf78500c58e0a97ce510ac8e72615133d9

build:
  number: 0

requirements:
  build:
    - {{ compiler('fortran') }}
    - python                                 # [build_platform != target_platform]
    - cross-python_{{ target_platform }}     # [build_platform != target_platform]
  host:
    - python
    - pip
    - setuptools >=68
    - wheel
  run:
    - python >=3.10
    - numpy >=1.24
    - pandas >=1.5
    - scipy >=1.10
    - matplotlib-base >=3.6
    - scikit-learn >=1.2

test:
  imports:
    - krigekit
  commands:
    - pip check
  requires:
    - pip

about:
  home: https://github.com/ougx/krigekit
  summary: Python wrapper for a Fortran kriging and sequential Gaussian simulation engine
  license: MIT
  license_file: LICENSE
  doc_url: https://krigekit.readthedocs.io/en/latest/
  dev_url: https://github.com/ougx/krigekit

extra:
  recipe-maintainers:
    - ougx
