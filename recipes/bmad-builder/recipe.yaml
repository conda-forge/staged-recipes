# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  name: bmad-builder
  version: "1.6.0"

package:
  name: ${{ name }}
  version: ${{ version }}

source:
  url: https://github.com/bmad-code-org/bmad-builder/archive/refs/tags/v${{ version }}.tar.gz
  sha256: 2db72839546baa049b82e6ba9f2cf557467fd5684e8e1e9c071c5a03db01e4cc

build:
  number: 0
  noarch: generic

requirements:
  run:
    - python >=3.10

tests:
  - script:
      - if: not win
        then:
          - bmad-builder-install --help
          - test -d "${CONDA_PREFIX}/share/bmad-builder/skills"
          - test -f "${CONDA_PREFIX}/share/bmad-builder/skills/module.yaml"
          - test -d "${CONDA_PREFIX}/share/bmad-builder/skills/bmad-agent-builder"
          - test -d "${CONDA_PREFIX}/share/bmad-builder/skills/bmad-module-builder"
          - test -d "${CONDA_PREFIX}/share/bmad-builder/skills/bmad-workflow-builder"
          - test -f "${CONDA_PREFIX}/share/bmad-builder/.claude-plugin/marketplace.json"
      - if: win
        then:
          - bmad-builder-install.bat --help
          - if not exist "%CONDA_PREFIX%\share\bmad-builder\skills" exit 1
          - if not exist "%CONDA_PREFIX%\share\bmad-builder\skills\module.yaml" exit 1
          - if not exist "%CONDA_PREFIX%\share\bmad-builder\.claude-plugin\marketplace.json" exit 1

about:
  homepage: https://github.com/bmad-code-org/bmad-builder
  documentation: https://bmad-builder-docs.bmad-method.org
  repository: https://github.com/bmad-code-org/bmad-builder
  license: MIT
  license_file: LICENSE
  summary: BMad Core expansion module for creating, sharing, and discovering AI modules and agents
  description: |
    bmad-builder provides the complete pipeline to create and share AI modules
    and agents compatible with the Agent Skills open standard across 40+ AI tools.

    It ships four skills (bmad-agent-builder, bmad-bmb-setup, bmad-module-builder,
    bmad-workflow-builder) plus Python utility scripts for quality analysis and
    validation that Claude Code invokes at runtime.

    After installation, run ``bmad-builder-install`` in your project directory to
    copy the skills into ``.claude/skills/`` so Claude Code can discover them.

extra:
  recipe-maintainers:
    - rxm7706
