{% set version = '0.6.0' %}
{% set posix = 'm2-' if win else '' %}

package:
  name: r-cpp4r
  version: {{ version|replace("-", "_") }}

source:
  url:
    - {{ cran_mirror }}/src/contrib/cpp4r_{{ version }}.tar.gz
    - {{ cran_mirror }}/src/contrib/Archive/cpp4r/cpp4r_{{ version }}.tar.gz
  sha256: b0ca45e5b37ada20b64fa2d8d6d9ce62bd208aae8e32ec418f6cf5e41cd27025

build:
  number: 0
  noarch: generic
  rpaths:
    - lib/R/lib/
    - lib/
  missing_dso_whitelist:
    - '*/R.dll'        # [win]
    - '*/Rblas.dll'    # [win]
    - '*/Rlapack.dll'  # [win]

requirements:
  build:
    - {{ posix }}zip               # [win]
    - cross-r-base {{ r_base }}    # [build_platform != target_platform]
  host:
    - r-base
    - r-desc
    - r-glue
    - r-withr
  run:
    - r-base
    - r-desc
    - r-glue
    - r-withr

test:
  commands:
    - $R -e "library('cpp4r')"           # [not win]
    - "\"%R%\" -e \"library('cpp4r')\""  # [win]

about:
  home: https://cpp4r.org
  dev_url: https://github.com/pachadotdev/cpp4r
  license: Apache-2.0
  summary: Provides a header only, 'C++' interface to 'R' with enhancements over 'cpp11'. Enforces
    copy-on-write semantics consistent with 'R' behavior. Offers native support for
    ALTREP objects, 'UTF-8' string handling, modern 'C++11' features and idioms, and
    reduced memory requirements. Allows for vendoring, making it useful for restricted
    environments. Compared to 'cpp11', it adds support for converting 'C++' maps to
    'R' lists, 'Roxygen' documentation directly in 'C++' code, proper handling of matrix
    attributes, support for nullable external pointers, bidirectional copy of complex
    number types, flexibility in type conversions, use of nullable pointers, and various
    performance optimizations.
  license_family: APACHE
  license_file:
    - LICENSE-2.0.txt

extra:
  recipe-maintainers:
    - conda-forge/r
