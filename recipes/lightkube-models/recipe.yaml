schema_version: 1

context:
  version: "1.35.0.8"

package:
  name: lightkube-models
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/l/lightkube-models/lightkube_models-${{ version }}.tar.gz
  sha256: dbc624596a7d94e6c43c5deda972be964202e0e8f26e2ab8e61d589d710b5e22

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - pdm-backend
    - pip
  run:
    - python >=${{ python_min }}

tests:
  - python:
      imports:
        - lightkube
      pip_check: true
      python_version: ${{ python_min }}.*

about:
  summary: Models and Resources for lightkube module
  license: MIT
  license_file: LICENSE
  homepage: https://github.com/gtsystem/lightkube-models

extra:
  recipe-maintainers:
    - janjagusch
