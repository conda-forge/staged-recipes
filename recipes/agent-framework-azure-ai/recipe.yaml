schema_version: 1

context:
  version: "1.0.0rc6"
  python_min: "3.10"

package:
  name: agent-framework-azure-ai
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/a/agent-framework-azure-ai/agent_framework_azure_ai-${{ version }}.tar.gz
  sha256: afcca236fae24e6fdd44285e47a633abcc14f2bbea62d0421663c2d771bec418

build:
  noarch: python
  number: 0
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - flit-core <4.0,>=3.11
  run:
    - python >=${{ python_min }}
    - agent-framework-core >=1.0.0rc6
    - agent-framework-openai >=1.0.0rc6
    - azure-ai-projects <3.0,>=2.0.0
    - azure-ai-agents <1.2.0b6,>=1.2.0b5
    - azure-ai-inference <1.0.0b10,>=1.0.0b9
    - azure-identity <2,>=1
    - aiohttp <4,>=3.7.0

tests:
  - python:
      imports:
        - agent_framework.azure_ai
      python_version: ${{ python_min }}.*
      pip_check: true

about:
  summary: |
    Azure AI Foundry integration for Microsoft Agent Framework.
  homepage: https://pypi.org/project/agent-framework-azure-ai/
  repository: https://github.com/microsoft/agent-framework
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - killua156
    - mgorny
