# Pre-seed the feedstock so the first render also builds the non-x86_64
# architectures (otherwise disabled by default). conda-forge cross-compiles
# these on the corresponding x86_64 build platform. osx-arm64 is omitted because
# Xvfb is a Linux-only server (the recipe is `skip: true  # [not linux]`).
provider:
  linux_aarch64: default
  linux_ppc64le: default
