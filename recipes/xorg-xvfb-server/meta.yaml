{% set version = "21.1.23" %}
# Xvfb is built from the X.Org server source tree (xorg-server).

package:
  name: xorg-xvfb-server
  version: {{ version }}

source:
  url: https://www.x.org/releases/individual/xserver/xorg-server-{{ version }}.tar.xz
  sha256: e39832e5617dadaf072fdf9f0e19e5d2e1c2a13607ac280bac1aba9f8fe14634

build:
  number: 0
  # Xvfb is a Linux/Unix headless display server. Only Linux is supported
  # here; macOS uses XQuartz and Windows has no equivalent DDX.
  skip: true  # [not linux]

requirements:
  build:
    - {{ compiler('c') }}
    - {{ stdlib('c') }}
    - meson
    - ninja
    - pkg-config
  host:
    - xorg-xorgproto
    - xorg-xtrans
    - xorg-font-util
    - xorg-libxdmcp
    # Xvfb links libXau (alongside libXdmcp) for XDMCP/authorization.
    - xorg-libxau
    - libxkbfile
    - libxfont2
    - pixman
    - openssl
    # Server-side GLX needs the GL headers/pkg-config (gl.pc); the conda-forge
    # way is libgl-devel from libglvnd (its run_exports add libgl at runtime).
    # https://conda-forge.org/docs/maintainer/knowledge_base/#libgl
    - libgl-devel
  run:
    # The X server execs xkbcomp at runtime to compile the keymap, using the
    # keyboard data shipped by xkeyboard-config.
    - xkbcomp
    - xkeyboard-config

test:
  commands:
    - test -f "${PREFIX}/bin/Xvfb"
    # -help prints the Xvfb usage before any device/font/xkb init.
    - Xvfb -help 2>&1 | grep -qi "screen scrn WxHxD"
    # Actually launch a headless server and confirm it comes up. This exercises
    # the built-in fonts and the xkbcomp/xkeyboard-config runtime path.
    - |
      Xvfb :98 -screen 0 1280x1024x24 -nolisten tcp -noreset &
      XVFB_PID=$!
      RC=1
      for i in $(seq 1 30); do
        if [ -e /tmp/.X11-unix/X98 ] || [ -e /tmp/.X98-lock ]; then RC=0; break; fi
        sleep 0.5
      done
      kill "${XVFB_PID}" 2>/dev/null || true
      wait "${XVFB_PID}" 2>/dev/null || true
      exit ${RC}

about:
  home: https://www.x.org/
  license: MIT
  license_family: MIT
  license_file: COPYING
  summary: Xvfb, the X.Org virtual framebuffer (headless) X server
  description: |
    Xvfb (X virtual framebuffer) is an X.Org display server that performs all
    rendering into virtual memory without any physical display hardware or
    output. It is the standard way to run GUI applications, take screenshots,
    and run graphical test suites on headless machines and in CI.

    This package builds only the Xvfb DDX from the xorg-server source tree;
    the Xorg, Xnest and Xephyr servers are disabled so the heavier GPU/DRM
    stack (libdrm, mesa, udev, libpciaccess, glamor) is not required. It ships
    libXfont2's compiled-in fonts (fixed, cursor, 6x13), so Xvfb starts without
    any external font packages, and depends on xkbcomp + xkeyboard-config for
    keyboard support.

    OpenGL note: this build enables the GLX extension, but conda-forge does not
    yet ship a runtime Mesa software DRI driver, so GLX rendering needs a
    swrast_dri.so on DRI_DRIVER_PATH (${PREFIX}/lib/dri) at runtime, e.g. from
    system Mesa (apt install libgl1-mesa-dri) with LIBGL_ALWAYS_SOFTWARE=1 and
    GALLIUM_DRIVER=llvmpipe. For display-less off-screen rendering you can
    instead use OSMesa ("mesalib <25.1.0", PYOPENGL_PLATFORM=osmesa) or
    EGL-surfaceless, which do not need an X server at all.
  dev_url: https://gitlab.freedesktop.org/xorg/xserver

extra:
  recipe-maintainers:
    - hmaarrfk
