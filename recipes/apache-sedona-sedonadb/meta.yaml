{% set name = "apache-sedona-sedonadb" %}
{% set version = "1.9.0" %}


package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/a/apache-sedona/apache_sedona-{{ version }}.tar.gz
  sha256: cd195a86e3b68e8ccbe8dd66333d7c2403609937f4d3c13c5a627779eec6b7ce

build:
  number: 0
  noarch: python

requirements:
  host:
    - pip
    - python >=3.8
    - setuptools >=68.0.0
    - wheel
  run:
    - python >=3.8
    - attrs
    - shapely >=1.7.0
  run_constrained:
    - apache-sedona <0.0a0

test:
  imports:
    - sedona
  commands:
    - pip check
  requires:
    - pip

about:
  home: https://sedona.apache.org
  summary: Lightweight Apache Sedona Python package for use with SedonaDB (no PySpark dependency)
  description: |
    apache-sedona-sedonadb provides the Apache Sedona Python package without
    the heavy PySpark and rasterio/GDAL dependencies required by the standard
    apache-sedona conda package. It is intended for users who want to use
    Apache Sedona's Python API alongside SedonaDB without pulling in the
    Spark stack. Mutually exclusive with the apache-sedona conda package.
  license: Apache-2.0
  license_file: LICENSE

extra:
  recipe-maintainers:
    - jiayuasu
    - mxr-conda
    - dsangillo
