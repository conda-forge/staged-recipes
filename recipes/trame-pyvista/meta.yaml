{% set name = "trame-pyvista" %}
{% set version = "0.1.1" %}


package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name.replace('-', '_') }}-{{ version }}.tar.gz
  sha256: 31dd408ab682f7e3915ba98afdb84b6f612384f3031d2828485a296f59dab6fe

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - setuptools >=64
    - setuptools-scm >=8
    - pip
  run:
    - python >={{ python_min }}
    - pyvista >=0.48
    - trame >=2.5.2
    - trame-client >=2.12.7
    - trame-server >=2.11.7,!=3.7.*,!=3.8.0
    - trame-vtk >=2.5.8,<2.11.9,!=2.10.3,!=2.11.0,!=2.11.1,!=2.11.2,!=2.11.3,!=2.11.4,!=2.11.5,!=2.11.6
    - trame-vuetify >=2.3.1

test:
  imports:
    - trame
    - trame_pyvista
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://github.com/pyvista/trame-pyvista
  summary: Trame interface for PyVista
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - larsoner
