{% set python_min = "3.10" %}

package:
  name: pyfuga
  version: 0.1.0

source:
  url: https://pypi.org/packages/source/p/pyfuga/pyfuga-0.1.0.tar.gz
  sha256: "73cdc26a613fc3283b8f72e93ffa11f9560bbe2ead4d080c30789c26a3ba94ab"

build:
  noarch: python
  number: 0
  script: python -m pip install . --no-deps -vv

requirements:
  host:
    - python {{ python_min }}
    - pip
    - setuptools >=64
    - wheel
  run:
    - python >={{ python_min }}
    - numpy >=1.26
    - scipy >=1.10
    - matplotlib-base >=3.10.8
    - xarray >=2025.6.1
    - tqdm >=4.67.3
    - h5netcdf >=1.8.1
    - h5py >=3.15.1
    - numba >=0.63.1

test:
  requires:
    - python {{ python_min }}
  imports:
    - pyfuga
    - pyfuga.preluts_generator
  commands:
    - python -c "from pyfuga import get_luts"

about:
  home: https://gitlab.windenergy.dtu.dk/TOPFARM/PyFuga
  summary: Linearised CFD wake model (PyFuga)
  description: |
    Python implementation of the Fuga linearised CFD wake model and LUT generator.
  license: MIT
  license_file: LICENSE
  doc_url: https://topfarm.pages.windenergy.dtu.dk/PyFuga/main/index.html
  dev_url: https://gitlab.windenergy.dtu.dk/TOPFARM/PyFuga

extra:
  recipe-maintainers:
    - NilsGaukroger
