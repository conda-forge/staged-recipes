# rattler-build recipe (v1 / CEP-13 format) for messagefacility.
#
# Build with (from conda/):
#   rattler-build build --recipe recipes/art-suite/messagefacility/recipe.yaml \
#     -c ./art-suite-output -c conda-forge --allow-symlinks-on-windows
#
# Product #5 in the art v3_14_04 build order (see conda/ART_BUILD_PLAN.md).
# The art suite's message-logging library (MF_MessageLogger) + message services.

context:
  version: "2.10.05"
  git_tag: v2_10_05

package:
  name: messagefacility
  version: ${{ version }}

source:
  url: https://github.com/art-framework-suite/messagefacility/archive/refs/tags/${{ git_tag }}.tar.gz
  sha256: cd99c85b81f7d4d23195fb6f84d8815c73d6eedbb4c543dc10c9616a5c31368d

build:
  number: 1                      # rebuild: drop openssl from host (ROOT openssl<4 compat)
  script: build.sh
  skip: not linux

requirements:
  build:
    - ${{ compiler('c') }}
    - ${{ compiler('cxx') }}
    - ${{ stdlib('c') }}
    - cmake
    - make
  host:
    - cetmodules                 # build system (local art-suite channel)
    - fhiclcpp                   # linked (local channel)
    - cetlib                     # find_package(cetlib) direct (local channel)
    - cetlib_except              # find_package(cetlib_except) direct (local channel)
    - catch2 3.3.*               # find_package(Catch2 REQUIRED EXPORT) is UNCONDITIONAL
                                 #   here (not test-gated) -> needed at configure and
                                 #   propagated via messagefacilityConfig.
    - libboost-devel 1.85.*      # find_package(Boost filesystem program_options)
    # Transitive closure pulled by fhiclcpp/cetlib Configs' find_dependency():
    - libsqlite
    - tbb-devel 2021.9.*
    # openssl intentionally omitted (cetlib's private dep; comes in transitively
    # as openssl 3.x, which ROOT requires downstream). See fhiclcpp recipe note.
  run:
    # Runtimes arrive via run_exports of the host packages.

tests:
  - package_contents:
      lib:
        - MF_MessageLogger       # libMF_MessageLogger.so (the main library)
      include:
        - messagefacility/MessageLogger/MessageLogger.h
        - messagefacility/Utilities/exception.h
      bin:
        - fix-mf-macros          # installed migration helper script
      files:
        - lib/messagefacility/cmake/messagefacilityConfig.cmake

about:
  homepage: https://github.com/art-framework-suite/messagefacility
  license: BSD-3-Clause
  license_file: LICENSE
  summary: messagefacility -- message logging library for the FNAL art suite
  description: |
    messagefacility provides the MF_MessageLogger library and message-service
    plugins used by the art framework for configurable, severity-aware logging.
    Depends on fhiclcpp, cetlib, cetlib_except, Boost and Catch2.
  repository: https://github.com/art-framework-suite/messagefacility
