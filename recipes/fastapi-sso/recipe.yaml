schema_version: 1

context:
  version: "0.21.0"

package:
  name: fastapi-sso
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/f/fastapi-sso/fastapi_sso-${{ version }}.tar.gz
  sha256: 5fa596e28abb3c9d14567df8a2757f13a0fe4be8a2701fbf6853cf0cd297470b

build:
  number: 0
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  noarch: python

requirements:
  host:
    - python ${{ python_min }}.*
    - poetry-core
    - pip
  run:
    - python >=${{ python_min }}
    - fastapi >=0.80
    - httpx >=0.23.0
    - oauthlib >=3.1.0
    - pydantic >=1.8.0
    - pyjwt >=2.10.1,<3.0.0

tests:
  - python:
      python_version: ${{ python_min }}.*
      imports:
        - fastapi_sso
      pip_check: true

about:
  summary: FastAPI plugin to enable SSO to most common providers (such as Facebook login, Google login and login via Microsoft Office 365 Account)
  license: MIT
  license_file: LICENSE.md
  homepage: https://tomasvotava.github.io/fastapi-sso/
  documentation: https://tomasvotava.github.io/fastapi-sso/

extra:
  recipe-maintainers:
    - xhochy
