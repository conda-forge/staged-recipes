context:
  version: "3.1.7"

package:
  name: whizard
  version: ${{ version }}

source:
  url: https://whizard.hepforge.org/downloads/?f=whizard-${{ version }}.tar.gz
  sha256: 1b629f12ea9b59b68809b39257361f1ae923ded715b71064c9f5ab333cfb4e66
  patches:
    - 0001-parallel-build.patch

build:
  script:
    - ./configure --prefix=${PREFIX} --disable-static --enable-pythia8
    - GPROF="" make -j${CPU_COUNT} && make install
  number: 0
  skip:
    - win

requirements:
  build:
    - ${{ compiler("cxx") }}
    - ${{ compiler("fortran") }}
    - ${{ stdlib("c") }}
    - make
    - ocaml-compiler
    - python
  host:
    - pythia8
  run_exports:
    - ${{ pin_subpackage("whizard", upper_bound="x.x") }}

tests:
  - package_contents:
      bin:
        - circe*
        - omega*
        - ufo-sanitizer
        - whizard*
      lib:
        - circe1
        - circe2
        - minuit
        - omega
        - omega_core
        - taorng
        - taorng_objs
        - vamp
        - whizard
        - whizard/models/*.so
        - whizard/models/*.so.*
        - whizard_main
        - whizard_prebuilt
      include:
        - whizard.h
      files:
        - lib/mod/*/*
        - lib/omega/caml/*
        - lib/whizard/libtool
        - share/*
      strict: true

about:
  homepage: https://whizard.hepforge.org/
  summary: 'The Generator of Monte Carlo Event Generators'
  description: |
    WHIZARD is a program system designed for the efficient calculation of multi-particle
    scattering cross sections and simulated event samples.
  license: GPL-2.0-or-later
  license_file: COPYING
  documentation: https://whizard.hepforge.org/trac/wiki
  repository: https://repo.hepforge.org/source/whizardsvn/

extra:
  recipe-maintainers:
    - utk4r-sh
    - GiacomoXT
    - vvsagar
    - AlexanderHeidelbach
