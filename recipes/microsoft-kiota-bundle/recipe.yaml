# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "1.10.1"

package:
  name: microsoft-kiota-bundle
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/m/microsoft-kiota-bundle/microsoft_kiota_bundle-${{ version }}.tar.gz
  sha256: 76975eed76fb01fcdd760a9968552e629292fc0b7a2c25b7ffd6c697ebdd0c99

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - poetry-core
    - pip
  run:
    - python >=${{ python_min }}
    - microsoft-kiota-abstractions ${{ version }}.*
    - microsoft-kiota-http ${{ version }}.*
    - microsoft-kiota-serialization-json ${{ version }}.*
    - microsoft-kiota-serialization-form ${{ version }}.*
    - microsoft-kiota-serialization-text ${{ version }}.*
    - microsoft-kiota-serialization-multipart ${{ version }}.*

tests:
  - python:
      imports:
        - kiota_bundle
      pip_check: true
      python_version:
      - ${{ python_min }}.*
      - "*"

about:
  summary: Bundle package for kiota generated libraries in Python
  license: MIT
  license_file: LICENSE
  homepage: https://github.com/microsoft/kiota-python/tree/main/packages/bundle
  repository: https://github.com/microsoft/kiota-python/tree/main/packages/bundle
  documentation: https://github.com/microsoft/kiota-python/blob/main/packages/bundle/README.md

extra:
  recipe-maintainers:
    - rxm7706
