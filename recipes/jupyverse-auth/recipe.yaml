schema_version: 1

context:
  version: "0.2.0"

package:
  name: jupyverse-auth
  version: ${{ version }}

source:
  - url: https://pypi.org/packages/source/j/jupyverse-auth/jupyverse_auth-${{ version }}.tar.gz
    sha256: d24aa6295444d4c86273e782b2ed4c90c0d1b6a8bcde8ebced1752fa169f0061

build:
  noarch: python
  number: 0
  script:
    - ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation --disable-pip-version-check

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - uv-build
  run:
    - python >=${{ python_min }}
    - jupyverse-api >=0.15.0,<0.16.0
    - pydantic

tests:
  - python:
      imports: jupyverse_auth
      pip_check: true
      python_version: ${{ python_min }}.*

about:
  license: BSD-3-Clause
  license_file: COPYING.md
  homepage: https://github.com/jupyter-server/jupyverse/tree/main/api/auth
  summary: The API for Jupyverse's authentication.

extra:
  recipe-maintainers:
    - davidbrochart
