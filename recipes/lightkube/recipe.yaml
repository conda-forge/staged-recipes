schema_version: 1

context:
  version: "0.19.1"

package:
  name: lightkube
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/l/lightkube/lightkube-${{ version }}.tar.gz
  sha256: 4c8526068024c194c02fbc0ca6021922feb4b1b9d741d330129f873b27e0fe97

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - uv-build >=0.9.6,<0.10.0
    - pip
  run:
    - python >=${{ python_min }}
    - lightkube-models >=1.15.12.0
    - httpx >=0.28.1,<1.0.0
    - pyyaml

tests:
  - python:
      imports:
        - lightkube
      pip_check: true
      python_version: ${{ python_min }}.*

about:
  summary: Lightweight kubernetes client library
  license: MIT
  license_file: LICENSE
  homepage: https://pypi.org/project/lightkube/

extra:
  recipe-maintainers:
    - janjagusch
