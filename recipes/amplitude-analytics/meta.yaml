{% set name = "amplitude-analytics" %}
{% set version = "1.2.2" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/amplitude_analytics-{{ version }}.tar.gz
  sha256: ed82b39aa04447e5f156398249d632a5b51591905ec16556c7641a3258d38366

build:
  noarch: python
  number: 0
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python {{ python_min }}
    - pip
    - setuptools
  run:
    - python >={{ python_min }}

test:
  imports:
    - amplitude
  requires:
    - pip
    - python {{ python_min }}
  commands:
    - pip check

about:
  home: https://github.com/amplitude/Amplitude-Python
  license: MIT
  license_family: MIT
  license_file: LICENSE
  summary: The official Amplitude backend Python SDK for server-side instrumentation.
  dev_url: https://github.com/amplitude/Amplitude-Python

extra:
  recipe-maintainers:
    - josham
