# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-parsers/main/schema.json

context:
  version: "0.30.1"

package:
  name: agentsview
  version: ${{ version }}

source:
  url: https://github.com/kenn-io/agentsview/archive/refs/tags/v${{ version }}.tar.gz
  sha256: 773df9382ea36eb66fc00d7a3bc0e47d2960e1673793132afb170c5dabaa9fde
  target_directory: src

build:
  # There are some spurious failures with pnpm on Windows; skip for now.
  skip: win
  number: 0
  script:
    - cd src
    - cd frontend && pnpm install && pnpm run build && cd ..
    - rm -rf internal/web/dist
    - cp -r frontend/dist internal/web/dist
    - cd frontend && pnpm-licenses generate-disclaimer --prod --output-file ../frontend_licenses.txt && cd ..
    - go-licenses save go.kenn.io/agentsview/cmd/agentsview --save_path ../library_licenses
    - if: unix
      then: |
        go build -tags fts5 -v -ldflags="-s -w -X main.version=${{ version }}" -o $PREFIX/bin/agentsview ./cmd/agentsview
      else: |
        go build -tags fts5 -v -ldflags="-s -w -X main.version=${{ version }}" -o %LIBRARY_BIN%\agentsview.exe ./cmd/agentsview

requirements:
  build:
    - ${{ compiler("c") }}
    - ${{ compiler("go-cgo") }}
    - go-licenses
    - nodejs >=20.19,<25
    - pnpm
    - pnpm-licenses

tests:
  - script: agentsview --help
  - package_contents:
      bin:
        - agentsview
      strict: true

about:
  homepage: https://github.com/kenn-io/agentsview
  summary: Local-first session intelligence and analytics for coding agents
  description: |
    Local-first session intelligence and analytics for coding agents,
    supporting Claude Code, Codex, and more than 20 other agents.
    Also: 100x faster replacement for ccusage!
  license: MIT
  license_file:
    - src/LICENSE
    - library_licenses/
    - src/frontend_licenses.txt
  repository: https://github.com/kenn-io/agentsview

extra:
  recipe-maintainers:
    - xhochy
