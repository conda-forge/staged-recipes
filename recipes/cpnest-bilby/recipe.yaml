context:
  name: cpnest-bilby
  version: "0.1.1"
  python_min: "3.10"

package:
  name: ${{ name }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/${{ name[0] }}/${{ name }}/cpnest_bilby-${{ version }}.tar.gz
  sha256: 4cac9c0d6fa0f983498a130d87b052bce31c1a3cf386cbc60b32b9ef51ae323f

build:
  noarch: python
  number: 0
  script: python -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - setuptools >=45
    - setuptools-scm >=6.2
  run:
    - python >=${{ python_min }}
    - bilby >=2.3.0
    - cpnest >=0.9.4
    - numpy >=1.18.0

tests:
  - python:
      imports:
        - cpnest_bilby
      pip_check: true
      python_version: ${{ python_min }}.*

  - script:
      - if: linux
        then: python -m pytest tests/
        else: python -m pytest tests/ -k "not test_sampling_cpnest"    # current sampling tests hang on windows and macOS, so skip them for now
    requirements:
      run:
        - python ${{ python_min }}.*
        - pytest
    files:
      source:
        - tests/
        - pyproject.toml

about:
  homepage: https://github.com/bilby-dev/cpnest-bilby
  summary: Plugin for using cpnest with bilby.
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - mj-will
    - johnveitch
    - ColmTalbot
