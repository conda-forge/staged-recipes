# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "0.10.1"

package:
  name: agent-lifecycle-toolkit
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/a/agent-lifecycle-toolkit/agent_lifecycle_toolkit-${{ version }}.tar.gz
  sha256: 940920d84b844616b33baedaf4bbed34b9e678142f4a4f8a012e588aaa8a20b4
  patches:
    - patches/0001-loosen-runtime-pins.patch

build:
  noarch: python
  number: 0
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - hatchling
    - pip
  run:
    - python >=${{ python_min }}
    - ibm-watsonx-ai >=1.0.0
    - jinja2 >=3.1.6
    - jsonschema >=4.0.0
    - langchain-core >=0.3.72
    - litellm <2.0.0
    - openai >=1.0.0
    - pydantic >=2.0.0
    - smolagents >=1.21.3
    - typing_extensions >=4.0.0
    - tomli >=2.2.1
    - aiofiles >=24.1.0
    - black >=25.1.0
    - docstring_parser >=0.16
    - numpy >=2.2.6
    - genson >=1.3.0
    - langchain-chroma >=0.1.4
    - langchain-community >=0.3.21
    - langchain-huggingface >=0.3.0
    - llm-sandbox >=0.2.5
    - docker-py >=7.1.0
    - podman >=5.4.0.1
    - langchain-text-splitters >=1.0.0
    - nltk >=3.9.1
    - scipy >=1.15.3

tests:
  - python:
      imports:
        - altk
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  homepage: https://altk.ai/
  repository: https://github.com/AgentToolkit/agent-lifecycle-toolkit
  documentation: https://agenttoolkit.github.io/agent-lifecycle-toolkit/
  license: Apache-2.0
  license_file: LICENSE
  summary: The Agent Lifecycle Toolkit (ALTK) is a library of components to help agent builders improve their agent with minimal integration effort and setup.
  description: |
    The Agent Lifecycle Toolkit (ALTK) is a library of components to help
    agent builders improve their agent with minimal integration effort and
    setup.

extra:
  recipe-maintainers:
    - rxm7706
