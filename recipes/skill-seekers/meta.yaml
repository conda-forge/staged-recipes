{% set name = "skill-seekers" %}
{% set version = "3.3.0" %}
{% set python_min = "3.10" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/skill_seekers-{{ version }}.tar.gz
  sha256: a7a9d1f7a48dd8d302645c114e50509fc427e9bfcbc5cd19028e07cf4c912772

build:
  noarch: python
  number: 0
  entry_points:
    - skill-seekers = skill_seekers.cli.main:main

requirements:
  host:
    - python {{ python_min }}
    - pip
    - setuptools
  run:
    - python >={{ python_min }}
    - anthropic
    - beautifulsoup4
    - click
    - gitpython
    - httpx
    - jsonschema
    - langchain
    - llama-index
    - networkx
    - pathspec
    - pillow
    - pydantic
    - pydantic-settings
    - pygithub
    - pygments
    - python-dotenv
    - pyyaml
    - requests
    - schedule

test:
  imports:
    - skill_seekers
  requires:
    - python {{ python_min }}
  commands:
    - skill-seekers --version

about:
  home: https://github.com/yusufkaraaslan/Skill_Seekers
  summary: Convert documentation, repos, PDFs, videos into AI skills for 16+ LLM platforms
  description: |
    Skill Seekers transforms 17 source types (documentation sites, GitHub repos,
    PDFs, videos, Jupyter notebooks, Word docs, EPUBs, OpenAPI specs, Confluence,
    Notion, Slack/Discord, and more) into AI-ready skills and RAG knowledge for
    16+ LLM platforms including Claude, GPT, Gemini, LangChain, and LlamaIndex.
    Note: PDF support (pymupdf) is available via pip install skill-seekers[pdf]
    as pymupdf is not yet available on conda-forge for all platforms.
  license: MIT
  license_family: MIT
  license_file: LICENSE
  dev_url: https://github.com/yusufkaraaslan/Skill_Seekers

extra:
  recipe-maintainers:
    - yusufkaraaslan
