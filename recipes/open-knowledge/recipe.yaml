context:
  version: "0.28.2"

package:
  name: open-knowledge
  version: ${{ version }}

source:
  url: https://registry.npmjs.org/@inkeep/open-knowledge/-/open-knowledge-${{ version }}.tgz
  sha256: 26a399eff2ba688494e07b7f4f99efec0411ff602e3822c311304e041416a8f0

build:
  number: 0
  script:
    - npm pack --ignore-scripts
    - npm install --global --ignore-scripts inkeep-open-knowledge-${{ version }}.tgz
    - >-
      node -e "const fs=require('node:fs'),path=require('node:path'),dir=path.join(process.env.PREFIX,'lib','node_modules','@inkeep','open-knowledge','dist','native'),keep={darwin:{arm64:'native-config.darwin-arm64.node',x64:'native-config.darwin-x64.node'},linux:{arm64:'native-config.linux-arm64-gnu.node',x64:'native-config.linux-x64-gnu.node'},win32:{arm64:'native-config.win32-arm64-msvc.node',x64:'native-config.win32-x64-msvc.node'}}[process.platform][process.arch];for(const file of fs.readdirSync(dir))if(file.endsWith('.node')&&file!==keep)fs.rmSync(path.join(dir,file))"

requirements:
  host:
    - nodejs >=24
  run:
    - git
    - nodejs >=24

tests:
  - script:
      - ok --version
      - ok --help
      - ok config validate
      - open-knowledge --version

about:
  homepage: https://openknowledge.ai/
  summary: Beautiful, AI-native markdown editor and LLM wiki
  description: |
    OpenKnowledge is a local-first markdown editor for knowledge bases,
    LLM wikis, specifications, and notes. It includes a web UI, CLI, MCP
    server, agent skills, semantic search, and Git-based sharing.
  license: GPL-3.0-or-later
  license_file:
    - dist/LICENSE
    - dist/THIRD_PARTY_NOTICES.md
  documentation: https://openknowledge.ai/docs
  repository: https://github.com/inkeep/open-knowledge

extra:
  recipe-maintainers:
    - timkpaine
