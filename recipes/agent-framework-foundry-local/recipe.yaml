schema_version: 1

context:
  version: "1.0.0b260514"
  python_min: "3.10"

package:
  name: agent-framework-foundry-local
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/a/agent-framework-foundry-local/agent_framework_foundry_local-${{ version }}.tar.gz
  sha256: 767ae6aa2dbff8348799a0b8842c6c6cc3ba3235bb50c8b2478f7bd3fdb7cfa5

build:
  noarch: python
  number: 0
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - flit-core <4.0,>=3.11
  run:
    - python >=${{ python_min }}
    - agent-framework-core <2,>=1.4.0
    - agent-framework-openai <2,>=1.4.0
    - foundry-local-sdk <0.5.2,>=0.5.1

tests:
  - python:
      imports:
        - agent_framework.foundry_local
      python_version: ${{ python_min }}.*
      pip_check: true

about:
  summary: |
    Foundry Local integration for Microsoft Agent Framework.
  homepage: https://pypi.org/project/agent-framework-foundry-local/
  repository: https://github.com/microsoft/agent-framework
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - killua156
    - mgorny
