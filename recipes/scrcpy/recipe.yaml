context:
  version: "3.3.4"

package:
  name: scrcpy
  version: ${{ version }}

source:
  - url: https://github.com/Genymobile/scrcpy/archive/refs/tags/v${{ version }}.tar.gz
    sha256: 03b72d1f71ca7783cff2995ca7cd8c67b9b75038a3cc35e443a1913e951b49dd
  - url: https://github.com/Genymobile/scrcpy/releases/download/v${{ version }}/scrcpy-server-v${{ version }}
    sha256: 8588238c9a5a00aa542906b6ec7e6d5541d9ffb9b5d0f6e1bc0e365e2303079e
    file_name: prebuilt-server.jar

build:
  script:
    - meson setup build -Dprebuilt_server=$SRC_DIR/prebuilt-server.jar --prefix=$PREFIX
    - meson compile -C build --verbose
    - meson install -C build

requirements:
  build:
    - meson
    - ninja
    - pkg-config
    - ${{ compiler('c') }}
    - ${{ stdlib('c') }}
  host:
    - ffmpeg
    - libusb
    - sdl2

tests:
  - script:
    - scrcpy --version

about:
  homepage: https://github.com/Genymobile/scrcpy
  license: Apache-2.0
  license_file: LICENSE
  summary: Display and control your Android device
  description: |
    scrcpy provides display and control of Android devices connected via USB or over TCP/IP.
    It does not require any root access and works on GNU/Linux, Windows and macOS.
  repository: https://github.com/Genymobile/scrcpy