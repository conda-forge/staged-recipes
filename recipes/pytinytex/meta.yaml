{% set version = "0.5.0" %}

package:
  name: pytinytex
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/p/pytinytex/pytinytex-{{ version }}.tar.gz
  sha256: 5dca1e69136585944ef31569c401d19d854f8cd6adee8b01eccdc6f60a543edf

build:
  number: 0
  noarch: python
  entry_points:
    - pytinytex = pytinytex.cli:main
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python >=3.8
    - pip
    - hatchling
  run:
    - python >=3.8

test:
  imports:
    - pytinytex
  commands:
    - pip check
    - pytinytex --help
  requires:
    - pip
    - python >=3.8

about:
  home: https://github.com/JessicaTegner/PyTinyTeX
  dev_url: https://github.com/JessicaTegner/PyTinyTeX
  doc_url: https://github.com/JessicaTegner/PyTinyTeX#readme
  summary: Thin wrapper for TinyTeX.
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - JessicaTegner