schema_version: 1

context:
  version: "0.3.5"

package:
  name: tree-sitter-elixir
  version: ${{ version }}

source:
  url: https://github.com/elixir-lang/tree-sitter-elixir/archive/refs/tags/v${{ version }}.tar.gz
  sha256: 7d8bf37949e2bea75a19d38491d7680ed1c9f0f5a41a5235832d718ec174c7c4

build:
  number: 0
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  build:
    - ${{ compiler("c") }}
  host:
    - python
    - pip
    - setuptools >=42
    - wheel
  run:
    - python

tests:
  - python:
      imports:
        - tree_sitter_elixir

about:
  homepage: https://github.com/elixir-lang/tree-sitter-elixir
  summary: Elixir grammar for tree-sitter
  license: MIT
  license_file: LICENSE
  repository: https://github.com/elixir-lang/tree-sitter-elixir

extra:
  recipe-maintainers:
    - killua156
    - mgorny
