# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "0.0.9"

package:
  name: agentevals
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/a/agentevals/agentevals-${{ version }}.tar.gz
  sha256: 35131a5e4b60d2a6ac3203d3d15983aa5f9162b8acb1b8700f9b2c777df1150d

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - setuptools
    - wheel
  run:
    - python >=${{ python_min }}
    - openevals >=0.0.20

tests:
  - python:
      imports:
        - agentevals
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  homepage: https://github.com/langchain-ai/agentevals
  repository: https://github.com/langchain-ai/agentevals
  license: MIT
  license_file: LICENSE
  summary: Open-source evaluators for LLM agents
  description: |
    Open-source evaluators for LLM agents

extra:
  recipe-maintainers:
    - rxm7706
