schema_version: 1

context:
  version: "0.1.0"

package:
  name: jupyverse-yjs
  version: ${{ version }}

source:
  - url: https://pypi.org/packages/source/j/jupyverse-yjs/jupyverse_yjs-${{ version }}.tar.gz
    sha256: c6e3409cbf5b71d54af7e8d9dbdb56b97bd073be41ec0886040903fd45b7508c

build:
  noarch: python
  number: 0
  script:
    - ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation --disable-pip-version-check

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - uv-build
  run:
    - python >=${{ python_min }}
    - jupyverse-api >=0.15.0,<0.16.0
    - jupyverse-auth >=0.2.0,<0.3.0
    - pycrdt
    - pydantic

tests:
  - python:
      imports: jupyverse_yjs
      pip_check: true
      python_version: ${{ python_min }}.*

about:
  license: BSD-3-Clause
  license_file: COPYING.md
  homepage: https://github.com/jupyter-server/jupyverse/tree/main/api/yjs
  summary: The API for Jupyverse's Yjs.

extra:
  recipe-maintainers:
    - davidbrochart
