schema_version: 1

context:
  name: knime-passbolt-py
  version: "0.1.2"
  python_min: "3.9"

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  # sha256 of the published PyPI 0.1.2 sdist (built in CI by release.yml, not
  # from a local build — the two differ). Verified against pypi.org.
  url: https://pypi.org/packages/source/${{ name[0] }}/${{ name }}/knime_passbolt_py-${{ version }}.tar.gz
  sha256: bb31a386f9357472196d66289dafb498335ced6fb15277ad7a7e37e426c08e90

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - hatchling >=1.26
    - pip
  run:
    - python >=${{ python_min }}

tests:
  - python:
      imports:
        - knime_passbolt
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  summary: Python wrapper for consuming Passbolt credentials in KNIME Python Script nodes
  description: |
    Python companion package for the knime-passbolt KNIME extension. Provides
    the PassboltSecret class consumed by KNIME Python Script nodes downstream
    of the Credential to Python bridge node.
  license: Apache-2.0
  license_file: LICENSE
  homepage: https://github.com/DataNautics-GmbH/knime-passbolt-py
  repository: https://github.com/DataNautics-GmbH/knime-passbolt-py

extra:
  recipe-maintainers:
    - mikeg-de
