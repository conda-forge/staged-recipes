{% set name = "knime-passbolt-py" %}
{% set version = "0.1.1" %}
{% set python_min = "3.9" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/knime_passbolt_py-{{ version }}.tar.gz
  # sha256 of the published PyPI 0.1.1 sdist (built in CI by release.yml, not
  # from a local build — the two differ). Verified against pypi.org.
  sha256: f48ada7917057ca3f62623f693717a5c294c439efe545c2fa9ad36fd9eeece14

build:
  noarch: python
  number: 0
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python {{ python_min }}
    - hatchling >=1.26
    - pip
  run:
    - python >={{ python_min }}

test:
  imports:
    - knime_passbolt
  requires:
    - python {{ python_min }}
    - pip
  commands:
    - pip check

about:
  home: https://github.com/DataNautics-GmbH/knime-passbolt-py
  summary: Python wrapper for consuming Passbolt credentials in KNIME Python Script nodes
  description: |
    Python companion package for the knime-passbolt KNIME extension. Provides
    the PassboltSecret class consumed by KNIME Python Script nodes downstream
    of the Credential to Python bridge node.
  license: Apache-2.0
  license_file: LICENSE
  dev_url: https://github.com/DataNautics-GmbH/knime-passbolt-py

extra:
  recipe-maintainers:
    - mikeg-de
