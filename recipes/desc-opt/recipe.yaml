schema_version: 1

context:
  version: "0.17.1"
  python_min: "3.10"

package:
  name: "desc-opt"
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/d/desc-opt/desc_opt-${{ version }}.tar.gz
  sha256: cc3a824ff345a719328cd8e6098c2cd86320e45b299d91ef51f72e326499f895
  patches:
    # c.f. https://github.com/PlasmaControl/DESC/pull/2163
    # Remove after v0.17.1
    - add-missing-required-requirements.txt.patch
    - remove-unused-dev_requirements.patch
    # c.f. https://github.com/PlasmaControl/DESC/pull/2160
    # Remove after v0.17.1
    - replace-nvgpu-with-nvidia-ml-py.patch
    # c.f. https://github.com/PlasmaControl/DESC/pull/2142
    # Remove after v0.17.1
    - update-jax-finufft-upper-bound.patch

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - setuptools >=40.8.0
    - versioneer-518
    - pip
  run:
    - python >=${{ python_min }}
    - jax !=0.5.1,!=0.5.2,!=0.6.0,!=0.7.1,>=0.5.0,<0.10.0
    - colorama <=0.4.6
    - diffrax <=0.7.2,>=0.6.0
    - equinox >=0.11.10,<=0.13.6
    - h5py >=3.0.0,<=3.16.0
    - interpax >=0.3.3,<0.4
    - jax-finufft >=1.1.0,<=1.3.1
    - matplotlib-base >=3.7.3,<=3.10.8
    - mpmath >=1.0.0,<=1.4.1
    - netcdf4 !=1.7.4,>=1.5.4,<=1.7.5
    - numpy >=1.20.0,<=2.4.3
    - nvidia-ml-py >=12.535.77
    - optax <=0.2.7
    - orthax <0.3
    - plotly >=5.16,<=6.6.0
    - psutil <=7.2.2
    - pylatexenc >=2.0,<=2.10
    - quadax >=0.2.2,<0.3
    - scikit-image <=0.26.0
    - scipy >=1.7.0,<=1.17.1
    - sympy
    - termcolor <=3.3.0

tests:
  - python:
      imports:
        - desc
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  summary: Computes, analyzes and optimizes 3D MHD equilibria for stellarators and tokamaks
  license: MIT
  license_file: LICENSE
  homepage: https://github.com/PlasmaControl/DESC/
  repository: https://github.com/PlasmaControl/DESC/
  documentation: https://desc-docs.readthedocs.io/

extra:
  recipe-maintainers:
    - matthewfeickert
