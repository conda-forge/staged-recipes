{% set name = "ngxparse" %}
{% set version = "0.5.16" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz
  sha256: 33746d1693d93903ab0c2b37ba16b8a4743a2767b1959dc125a2417d253b7e3b

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0
  entry_points:
    - crossplane = crossplane.__main__:main

requirements:
  host:
    - python {{ python_min }}
    - pip
    - setuptools
  run:
    - python >={{ python_min }}

test:
  imports:
    # ngxparse ships its importable module as `crossplane` (drop-in fork).
    - crossplane
  requires:
    - pip
    - python {{ python_min }}
  commands:
    - pip check
    - crossplane --help

about:
  home: https://github.com/dvershinin/crossplane
  summary: Reliable and fast NGINX configuration file parser
  description: |
    ngxparse is a maintained fork of NGINX's crossplane library that
    parses an nginx configuration file into a JSON-friendly AST and
    pretty-prints an AST back to a valid nginx configuration. It
    incorporates bug fixes and improvements not present in the
    original (now unmaintained) upstream and is the parsing engine
    behind the gixy nginx static analyzer.
  license: Apache-2.0
  license_family: Apache
  license_file: LICENSE

extra:
  recipe-maintainers:
    - dvershinin
