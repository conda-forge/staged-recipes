context:
  version: "0.4.0"

package:
  name: gcx
  version: ${{ version }}

source:
  - url: https://github.com/grafana/gcx/archive/v${{ version }}.tar.gz
    sha256: 15b719e97b7ffbc6bfdf0ab8891f0e3b8b9f8406a565383a375c988e226465fa
  - url: https://github.com/grafana/grafana/raw/refs/heads/main/LICENSE
    sha256: 0d96a4ff68ad6d4b6f1f30f713b18d5184912ba8dd389f86aa7710db079abcb0
    target_directory: grafana-LICENSE
  - url: https://github.com/mattn/go-localereader/raw/refs/heads/master/LICENSE
    sha256: dceede03550621e65ec7b79fcba87cf6dbb9d31132a8ae71a8fe8ceec0af7da3
    target_directory: go-localereader-LICENSE

build:
  number: 0
  script:
    - go-licenses save ./cmd/gcx --ignore github.com/grafana/grafana/pkg/apimachinery --ignore github.com/grafana/grafana/apps/folder/pkg/apis/folder/v1beta1 --ignore github.com/mattn/go-localereader --save_path ./library_licenses
    - if: unix
      then: go build -v -o $PREFIX/bin/gcx -ldflags="-s -w" ./cmd/gcx
      else: go build -v -o %LIBRARY_BIN%\gcx.exe -ldflags="-s" .\cmd\gcx
    - if: unix
      then:
        - mkdir -p $PREFIX/share/zsh/site-functions $PREFIX/share/bash-completion/completions $PREFIX/share/fish/vendor_completions.d
        - $PREFIX/bin/gcx completion zsh > $PREFIX/share/zsh/site-functions/_gcx
        - $PREFIX/bin/gcx completion bash > $PREFIX/share/bash-completion/completions/gcx
        - $PREFIX/bin/gcx completion fish > $PREFIX/share/fish/vendor_completions.d/gcx.fish

requirements:
  build:
    - ${{ compiler('go-nocgo') }}
    - go-licenses

tests:
  - script: gcx --help
  - package_contents:
      bin:
        - gcx
      files:
        - if: unix
          then:
            - share/bash-completion/completions/gcx
            - share/fish/vendor_completions.d/gcx.fish
            - share/zsh/site-functions/_gcx
      strict: true

about:
  homepage: https://github.com/grafana/gcx
  summary: 'A CLI for managing Grafana Cloud resources. Optimized for agentic usage.'
  description: |
    gcx is a CLI for Grafana. It gives you and your AI coding agent structured access to your Grafana instance: dashboards, alerts, SLOs, metrics, logs, traces, and more.

    gcx works with any agentic coding tool. It ships with a suite of agent skills for common workflows like alert investigation, dashboard creation and GitOps, SLO management, and observability setup - ready to use out of the box.
  license: Apache-2.0
  license_file:
    - LICENSE
    - library_licenses/
    - grafana-LICENSE/LICENSE
    - go-localereader-LICENSE/LICENSE
  documentation: https://pkg.go.dev/github.com/grafana/gcx
  repository: https://github.com/grafana/gcx

extra:
  recipe-maintainers:
    - rneacsu
