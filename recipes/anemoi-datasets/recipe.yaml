schema_version: 1

context:
  version: "0.5.35"

package:
  name: anemoi-datasets
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/a/anemoi-datasets/anemoi_datasets-${{ version }}.tar.gz
  sha256: 07e88e5ee35960b21b0e964572433d17cfd691e012403832e580cfc611b8f546

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  python:
    entry_points:
      - anemoi-datasets = anemoi.datasets.__main__:main

requirements:
  host:
    - python ${{ python_min }}.*
    - setuptools >=60
    - setuptools-scm >=8
    - pip
  run:
    - python >=${{ python_min }}
    - anemoi-transform >=0.1.27
    - anemoi-utils >=0.5
    - cfunits
    - glom
    - jsonschema
    - numcodecs <0.16
    - numpy
    - pytest >=8.4.1
    - pytest-xdist >=3.7
    - pyyaml
    - ruamel_yaml >=0.16
    - semantic_version
    - tqdm
    - zarr <=2.18.7

tests:
  - python:
      imports:
        - anemoi
      pip_check: true
      python_version: ${{ python_min }}.*
  - requirements:
      run:
        - pip
        - python ${{ python_min }}.*
    script:
      - anemoi-datasets --help

about:
  summary: A package to hold various functions to support training of ML models on ECMWF data.
  license: Apache-2.0
  license_file: LICENSE
  homepage: https://github.com/ecmwf/anemoi-datasets/
  documentation: https://anemoi-datasets.readthedocs.io/

extra:
  recipe-maintainers:
    - tjtg
    - jasonjunweilyu
    - HCookie
