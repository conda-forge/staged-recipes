context:
  version: "0.1.1"

package:
  name: bioimage-cpp
  version: ${{ version }}

source:
  url: https://github.com/computational-cell-analytics/bioimage-cpp/archive/refs/tags/v${{ version }}.tar.gz
  sha256: b1958b73f62a92d9e7f7c51124e454e766124006cd151b668f156dc50ce00753

build:
  number: 0
  skip:
    - match(python, "<3.10")
  script:
    env:
      CMAKE_GENERATOR: Ninja
    content: python -m pip install . -vv --no-deps --no-build-isolation

requirements:
  build:
    - ${{ compiler('cxx') }}
    - ${{ stdlib('c') }}
    - cmake
    - ninja
  host:
    - python
    - pip
    - scikit-build-core >=0.10
    - nanobind >=2.0
    - numpy
  run:
    - python
    - numpy

tests:
  - python:
      imports:
        - bioimage_cpp
        - bioimage_cpp._core
        - bioimage_cpp.affinities
        - bioimage_cpp.filters
        - bioimage_cpp.graph
        - bioimage_cpp.segmentation
        - bioimage_cpp.transformation
      pip_check: true
  - script:
      - python -m pytest tests -q
    files:
      source:
        - tests/
    requirements:
      run:
        - pytest
        - pooch
        - scipy

about:
  homepage: https://github.com/computational-cell-analytics/bioimage-cpp
  summary: Dependency-light C++ bioimage analysis algorithms with Python bindings
  description: |
    bioimage-cpp provides selected bioimage analysis algorithms implemented in
    C++ with lightweight Python bindings through nanobind and a minimal runtime
    dependency footprint.
  license: MIT
  license_file: LICENSE
  documentation: https://computational-cell-analytics.github.io/bioimage-cpp/
  repository: https://github.com/computational-cell-analytics/bioimage-cpp

extra:
  recipe-maintainers:
    - constantinpape
