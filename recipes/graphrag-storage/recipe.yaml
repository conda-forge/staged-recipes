schema_version: 1

context:
  version: "3.1.1"
  python_min: "3.11"

package:
  name: graphrag-storage
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/g/graphrag-storage/graphrag_storage-${{ version }}.tar.gz
  sha256: 5bc0122d7b2de103c42e813018a4619c58f18e42af458b30637d58fb4a28ef47

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - hatchling >=1.27.0,<2.0.0
    - pip
  run:
    - python >=${{ python_min }},<3.14
    - aiofiles >=25.1,<26.dev0
    - azure-cosmos >=4.9,<5.dev0
    - azure-identity >=1.25,<2.dev0
    - azure-storage-blob >=12.24,<13.dev0
    - graphrag-common ==3.1.1
    - pandas >=3.0,<4.dev0
    - pydantic >=2.10,<3.dev0

tests:
  - python:
      imports:
        - graphrag_storage
      pip_check: true
      python_version: 
        - ${{ python_min }}.*
        - "*"

about:
  summary: GraphRAG storage package.
  license: MIT
  license_file: LICENSE
  homepage: https://pypi.org/project/graphrag-storage/
  repository: https://github.com/microsoft/graphrag

extra:
  recipe-maintainers:
    - jan-janssen
