context:
  name: perl-archive-zip
  version: "1.68"

package:
  name: ${{ name }}
  version: ${{ version }}

source:
  url: https://cpan.metacpan.org/authors/id/P/PH/PHRED/Archive-Zip-${{ version }}.tar.gz
  sha256: 984e185d785baf6129c6e75f8eb44411745ac00bf6122fb1c8e822a3861ec650

build:
  number: 0
  noarch: generic
  script:
    - perl Makefile.PL INSTALLDIRS=vendor NO_PERLLOCAL=1 NO_PACKLIST=1
    - make
    - make test
    - make install VERBINST=1

requirements:
  build:
    - make
  host:
    - perl
    - perl-compress-raw-zlib >=2.017
  run:
    - perl
    - perl-compress-raw-zlib >=2.017

tests:
  - script: perl -e "use Archive::Zip; print qq(ok\n)"

about:
  homepage: https://metacpan.org/dist/Archive-Zip
  summary: Provide an interface to ZIP archive files
  license: GPL-1.0-or-later OR Artistic-1.0-Perl
  license_file: README.md
  repository: https://github.com/redhotpenguin/perl-Archive-Zip

extra:
  recipe-maintainers:
    - baszalmstra
