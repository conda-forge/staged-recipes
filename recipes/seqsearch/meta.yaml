{% set version = "2.2.4" %}

package:
  name: seqsearch
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/s/seqsearch/seqsearch-{{ version }}.tar.gz
  sha256: f08ed978ad4b4303f278122f42c651e52ec3d0867dbd117e8765f389db36c2a6

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - pip
    - setuptools
  run:
    - python >={{ python_min }}
    - autopaths >=1.6.2
    - plumbing >=2.11.3
    - fasta >=2.3.6
    - biopython
    - runps >=4.1.1
    - tqdm

test:
  imports:
    - seqsearch
  requires:
    - python {{ python_min }}
    - pip
  commands:
    - pip check

about:
  home: https://github.com/xapple/seqsearch
  summary: 'Sequence similarity searches (e.g. BLAST) made easy.'
  license: MIT
  license_family: MIT
  license_file: LICENSE.txt

extra:
  recipe-maintainers:
    - xapple
