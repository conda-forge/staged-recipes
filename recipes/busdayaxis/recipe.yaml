schema_version: 1

context:
  python_min: "3.9"
  version: "0.1.0"

package:
  name: busdayaxis
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/b/busdayaxis/busdayaxis-${{ version }}.tar.gz
  sha256: 646a6b94ba146bbbc564cb2ca86b1926f9114cfcf4fbce99ca914e48369771cf

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - setuptools >=61.0
    - wheel
    - setuptools-scm >=8.0
    - pip
  run:
    - python >=${{ python_min }}
    - matplotlib-base
    - numpy

tests:
  - python:
      imports:
        - busdayaxis
      pip_check: true
      python_version: ${{ python_min }}.*

about:
  summary: Business day axis scale for matplotlib
  license: BSD-3-Clause
  license_file: LICENSE
  homepage: https://saemeon.github.io/busdayaxis/

extra:
  recipe-maintainers:
    - saemeon
