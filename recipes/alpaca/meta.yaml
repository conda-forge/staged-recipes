{% set version = "0.3.0" %}

package:
  name: alpaca
  version: {{ version }}

source:
  url: https://github.com/McGranahanLab/ALPACA-model/archive/refs/tags/v{{ version }}.tar.gz
  sha256: 2470f85123ba64366ed2215b20b6fbd42b42f826a4a507e89a9d598f9319b906


build:
  number: 0
  skip: True  # [win]


requirements:
  host:
    - python
    - pip
    - hatchling
    - hatch-vcs
  run:
    - python
    - numpy >=1.22,<3.0
    - pandas >=2.0,<3.0
    - pyomo >=6.0,<7.0
    - scipy >=1.10,<2.0
    - matplotlib-base >=3.5,<4.0
    - networkx >=3.0,<4.0
    - plotly >=5.0,<6.0
    - seaborn >=0.12,<0.14
    - tqdm >=4.60,<5.0
    - rdata >=0.5,<2.0
    - kneed
    - python-kaleido
    - scip
    - glpk

test:
  requires:
    - pip
  commands:
    - python -c "import alpaca; import alpaca.solvers"
    - alpaca --help

about:
  home: https://github.com/McGranahanLab/ALPACA-model
  license: MIT
  license_family: MIT
  license_file: LICENSE
  summary: "ALPACA - Allele-specific Phylogenetic Analysis of Copy-number Aberrations"
  description: |
    ALPACA is a computational method to infer allele- and clone-specific
    copy-number profiles of tumour clones from multi-sample bulk DNA sequencing.
    The default backend is Pyomo with the SCIP solver.
    
    ## Optional Dependencies
    
    - **Gurobi solver**: Users with a Gurobi license can install gurobi separately:
      ```
      mamba install -c gurobi gurobi>=13
      grbgetkey YOUR-LICENSE-KEY
      ```
    
    - **R support**: Some input conversion utilities require R and Rscript:
      ```
      mamba install r-base
      ```
      These are optional and used only for converting ASCAT and Conipher outputs.

extra:
  recipe-maintainers:
    - wlippa
