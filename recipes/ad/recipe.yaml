schema_version: 1

context:
  version: "1.5.0"

package:
  name: ad
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/a/ad/ad-${{ version }}.tar.gz
  sha256: eaedc1ae1a0970df603518aba36b14b1f41997cdb2c479740875e25a30075ba5

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - hatchling >=1.29.0
    - hatch-vcs
  run:
    - python >=${{ python_min }}
    - numpy

tests:
  - python:
      imports:
        - ad
        - ad.admath
        - ad.linalg
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  homepage: https://eggzec.github.io/ad/
  repository: https://github.com/eggzec/ad
  documentation: https://eggzec.github.io/ad/
  summary: Fast, transparent first- and second-order automatic differentiation
  license: BSD-3-Clause
  license_file: LICENSE.txt

extra:
  recipe-maintainers:
    - killua156
    - mgorny
