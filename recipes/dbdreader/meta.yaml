{% set python_min = "3.10" %}
{% set version = "0.6.0" %}

package:
  name: dbdreader
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/d/dbdreader/dbdreader-{{ version }}.tar.gz
  sha256: 177cc25fbf861e04f4cb582f42650afba8db779dbe249d71062c544e479ed690

build:
  skip: true  # [py<310]
  entry_points:
    - dbdrename = dbdreader.scripts:dbdrename
    - cac_gen = dbdreader.scripts:cac_gen
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  build:
    - {{ compiler('c') }}
  host:
    - python {{ python_min }}.*
    - setuptools >=61.0
    - wheel
    - pip
  run:
    - python >={{ python_min }}
    - lz4 >=4.4.5
    - numpy >=2.2.6
    - scipy >=1.15.3

test:
  imports:
    - dbdreader
  commands:
    - pip check
    - dbdrename --help
    - cac_gen --help
  requires:
    - pip
    - python {{ python_min }}.*

about:
  home: https://dbdreader.readthedocs.io/en/latest/
  summary: A python module to access binary data files generated by Teledyne WebbResearch gliders
  license: GPL-3.0-or-later AND BSD-2-Clause
  license_file:
    - LICENSE
    - COPYING
    - COPYRIGHT

extra:
  recipe-maintainers:
    - jklymak
