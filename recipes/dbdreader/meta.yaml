{% set version = "0.6.1" %}

package:
  name: dbdreader
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/d/dbdreader/dbdreader-{{ version }}.tar.gz
  sha256: bd603a92d234cc71a0ed01ed5fefef96b705b1bf7834835570c6c9d89c4f59fd

build:
  skip: true  # [py<310]
  entry_points:
    - dbdrename = dbdreader.scripts:dbdrename
    - cac_gen = dbdreader.scripts:cac_gen
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  build:
    - {{ compiler('c') }}
    - {{ stdlib('c') }}
  host:
    - python
    - setuptools >=61.0
    - wheel
    - pip
    - numpy
  run:
    - python
    - lz4 >=4.4.5

test:
  imports:
    - dbdreader
  commands:
    - pip check
    - dbdrename --help
    - cac_gen --help
  requires:
    - pip
    - python

about:
  home: https://dbdreader.readthedocs.io/en/latest/
  summary: A python module to access binary data files generated by Teledyne WebbResearch gliders
  license: GPL-3.0-or-later AND BSD-2-Clause
  license_file:
    - LICENSE
    - COPYING
    - COPYRIGHT

extra:
  recipe-maintainers:
    - jklymak
    - smerckel
