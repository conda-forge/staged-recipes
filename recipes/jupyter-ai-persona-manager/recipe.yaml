context:
  version: "0.0.7"

package:
  name: jupyter-ai-persona-manager
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/j/jupyter-ai-persona-manager/jupyter_ai_persona_manager-${{ version }}.tar.gz
  sha256: 0cd0bf46dc0666a1c781fdd695cd8785fa873a8e99e2537af3b4710d8f98b858

build:
  noarch: python
  script: python -m pip install . -vv
  number: 0

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - hatchling >=1.5.0
    - jupyterlab >=4.0.0,<5
    - hatch-nodejs-version >=0.3.2
    - hatch-jupyter-builder >=0.5
  run:
    - python >=${{ python_min }}
    - importlib-metadata >=4.0.0
    - jupyter-ai-router >=0.0.1
    - jupyter_server_fileid >=0.9.0
    - jupyter_server >=2.4.0,<3
    - jupyterlab-chat >=0.19.0
    - pycrdt >=0.10.0
    - pydantic >=2.0.0

tests:
  - python:
      imports:
        - jupyter_ai_persona_manager
      pip_check: true
    requirements:
      run:
        - python ${{ python_min }}.*

about:
  homepage: https://github.com/jupyter-ai-contrib/jupyter-ai-persona-manager
  summary: "The core manager & registry for AI personas in Jupyter AI"
  license: BSD-3-Clause
  license_file: LICENSE
  documentation: https://jupyter-ai.readthedocs.io/
  repository: https://github.com/jupyter-ai-contrib/jupyter-ai-persona-manager

extra:
  recipe-maintainers:
    - dlqqq
    - andrii-i
