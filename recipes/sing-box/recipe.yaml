context:
    version: "1.13.10"

package:
    name: sing-box
    version: ${{ version }}

source:
    url: https://github.com/SagerNet/sing-box/archive/refs/tags/v${{ version }}.tar.gz
    sha256: bac2de6fe2f60860af4c8b4fc21180698f1c3562a2fdbcc47c3ce66798db2987

build:
    number: 0
    script:
        - go-licenses save . --save_path library_licenses --ignore github.com/sagernet/
        - if: unix
          then: make PREFIX=$PREFIX install
          else: make PREFIX=%PREFIX% NAME=sing-box.exe install

requirements:
    build:
        - ${{ compiler("go-nocgo") }}
        - go-licenses
        - make

tests:
    - script:
          - sing-box --help
          - sing-box version
    - package_contents:
          strict: true
          bin:
              - sing-box

about:
    homepage: https://github.com/SagerNet/sing-box
    summary: The universal proxy platform.
    description: |
        The universal proxy platform
    license: GPL-3.0-or-later
    license_file:
        - LICENSE
        - library_licenses/
    documentation: https://sing-box.sagernet.org/
    repository: https://github.com/SagerNet/sing-box

extra:
    recipe-maintainers:
        - XhstormR
