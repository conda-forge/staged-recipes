{% set version = "0.1.0" %}

package:
  name: xhycom
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/x/xhycom/xhycom-{{ version }}.tar.gz
  sha256: c5fdb9a9b547c4df89cacd47a8a0c155395db07b013c06e99ba759f0c35ee03a

build:
  number: 0
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python >=3.8
    - pip
    - setuptools >=61
  run:
    - python >=3.8
    - numpy
    - xarray
    - cftime
    - dask
    - xgcm
    - numba
    - xesmf

test:
  imports:
    - xhycom
  commands:
    - pip check
  requires:
    - pip

about:
  home: https://github.com/nansencenter/xhycom
  license: MIT
  license_file: LICENSE
  summary: xarray interface for HYCOM .ab binary output files
  doc_url: https://xhycom.readthedocs.io
  dev_url: https://github.com/nansencenter/xhycom

extra:
  recipe-maintainers:
    - NoraLoose
