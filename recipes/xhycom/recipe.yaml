schema_version: 1

context:
  version: "0.1.0"

package:
  name: xhycom
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/x/xhycom/xhycom-${{ version }}.tar.gz
  sha256: c5fdb9a9b547c4df89cacd47a8a0c155395db07b013c06e99ba759f0c35ee03a

build:
  number: 0
  noarch: python
  script: python -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - setuptools >=61
  run:
    - python >=${{ python_min }}
    - numpy
    - xarray
    - cftime
    - dask
    - xgcm
    - numba
    - xesmf

tests:
  - python:
      imports:
        - xhycom
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  homepage: https://github.com/nansencenter/xhycom
  license: MIT
  license_file: LICENSE
  summary: xarray interface for HYCOM .ab binary output files
  documentation: https://xhycom.readthedocs.io
  repository: https://github.com/nansencenter/xhycom

extra:
  recipe-maintainers:
    - NoraLoose
