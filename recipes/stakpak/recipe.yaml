context:
  version: "0.3.69"

package:
  name: stakpak
  version: ${{ version }}

source:
  url: https://github.com/stakpak/agent/archive/refs/tags/v${{ version }}.tar.gz
  sha256: d3a8c67ccfc74e65bb61f06c8949ee9b0789929c343550363593f7f6dc929ea4

build:
  number: 0
  script:
    env:
      CARGO_PROFILE_RELEASE_STRIP: symbols
      CARGO_PROFILE_RELEASE_LTO: fat
    content:
      - if: unix
        then:
          - cargo auditable install --locked --no-track --bins --all-features --root ${{ PREFIX }} --path cli
        else:
          - cargo auditable install --locked --no-track --bins --all-features --root %LIBRARY_PREFIX% --path cli
      - cargo-bundle-licenses --format yaml --output ./THIRDPARTY.yml

requirements:
  build:
    - ${{ stdlib('c') }}
    - ${{ compiler('c') }}
    - ${{ compiler('rust') }}
    - cargo-bundle-licenses
    - cargo-auditable
    - pkg-config

tests:
  - script:
      - stakpak help
      - stakpak version
  - package_contents:
      bin:
        - stakpak
      strict: true

about:
  homepage: https://stakpak.io
  summary: Stakpak – Ship your code, on autopilot.
  description: |
    Stakpak is the open source DevOps agent that helps you with securing, deploying, and maintaining production ready infrastructure and only pings when it needs a human.
    Generate infrastructure code, debug Kubernetes, configure CI/CD, automate deployments, without giving an LLM the keys to production.
  license: Apache-2.0
  license_file:
    - LICENSE
    - THIRDPARTY.yml
  repository: https://github.com/stakpak/agent

extra:
  recipe-maintainers:
    - salim-b
