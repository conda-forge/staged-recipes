context:
  name: implot-docking
  version: "0.16.1"

package:
  name: ${{ name }}
  version: ${{ version }}

source:
  - url: https://github.com/epezent/implot/archive/f156599faefe316f7dd20fe6c783bf87c8bb6fd9.tar.gz
    sha256: d779ce33326343724d1e0fa23d4960cc9acaf4af584bc0134e504e7717ccc4bb
  - path: CMakeLists.txt

build:
  number: 0

requirements:
  build:
    - ${{ compiler('cxx') }}
    - ${{ stdlib("c") }}
    - cmake
    - ninja
  host:
    - imgui-docking
    - if: win
      then: freetype
  run:
    - imgui-docking
  run_exports:
    - ${{ pin_subpackage('implot-docking', upper_bound='x.x.x') }}

tests:
  - package_contents:
      lib:
        - implot

about:
  summary: Immediate Mode Plotting (for imgui docking branch)
  license: MIT
  license_file: LICENSE
  homepage: https://github.com/epezent/implot

extra:
  recipe-maintainers:
    - julian-belina
