{% set name = "Grouper" %}
{% set version = "0.0.3" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://github.com/mosdef-hub/Grouper/archive/v{{ version }}.tar.gz
  sha256: 147a188add5a0927e1d761476d1eb0a0cb3c7f6d16e14f32fb7cfede258e55ce

build:
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  build: 
    - python                                 
    - cross-python_{{ target_platform }}     # [build_platform != target_platform]
    - {{ compiler('cxx') }}
    - {{ stdlib("c") }}
    - cmake
    - make  # [unix]
    - pkg-config
    - librdkit-dev ==2024.09.3
    - rdkit::librdkit ==2024.09.3
    - rdkit::rdkit-postgresql ==2024.09.3
    - nauty
    - eigen
    - llvm-openmp
  host:
    - python
    - scikit-build-core
    - librdkit-dev ==2024.09.3
    - rdkit::librdkit ==2024.09.3
    - rdkit::rdkit-postgresql ==2024.09.3
    - libboost-devel
    - eigen
    - pip
    - pybind11
    - nlohmann_json  
    - eigen
    - llvm-openmp
  run:
    - python
    - {{ pin_compatible('librdkit', max_pin='x.x.x') }}
    - libboost-python-devel
    - libpq
    - rdkit
    - eigen
    - pybind11
    - nauty
    - jupyter
    - seaborn
    - cairosvg
    - pytorch
    - python-igraph
    - dash
    - dash_cytoscape
    - scikit-learn
    - llvm-openmp

test:
  imports:
    - Grouper
  commands:
    - pip check
  requires:
    - pip

about:
  home: https://github.com/mosdef-hub/Grouper
  license: MIT
  license_family: MIT
  license_file: LICENSE.rst
  summary: A software package for creating and manipulating graphs of molecular groups.

  description: |
    Grouper is a package for working with molecular graphs, breaking them into component 
    subgraphs. This procedure works hand in hand for functional group fragmentation and
    exhaustive generation of large molecular spaces, useful for ML data-based screening 
    and high-throughput chemical search.
  dev_url: https://github.com/mosdef-hub/Grouper


extra:
  recipe-maintainers:
    - CalCraven
    - kierannp
    - chrisjonesBSU
