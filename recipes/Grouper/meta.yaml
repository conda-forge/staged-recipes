{% set name = "Grouper" %}
{% set version = "0.0.2" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://github.com/mosdef-hub/Grouper/archive/v{{ version }}.tar.gz
  sha256: 67c11de997e0e8c0e7131e622097a7b8ab5026af57f2eb7fc6e80860e2955516

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - scikit-build-core >=0.3.3
    - pybind11
    - pip
    - cmake
    - {{ compiler('cxx') }} 
    - make       
    - nauty     
    - nlohmann_json     
    - librdkit-dev
    - librdkit
    - rdkit-dev
    - rdkit-postgresql  
    - rdkit
  run:
    - python >={{ python_min }}
    - libboost-python-devel
    - rdkit
    - eigen
    - pybind11
    - mbuild
    - nauty
    - jupyter
    - seaborn
    - cairosvg
    - pyg::pyg
    - pytorch::pytorch
    - python-igraph
    - dash
    - dash_cytoscape
    - scikit-learn

test:
  imports:
    - Grouper
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://github.com/mosdef-hub/Grouper
  license: MIT
  license_family: MIT
  license_file: LICENSE.rst
  summary: A software package for creating and manipulating graphs of molecular groups.

  description: |
    Grouper is a package for working with molecular graphs, breaking them into component 
    subgraphs. This procedure works hand in hand for functional group fragmentation and
    exhaustive generation of large molecular spaces, useful for ML data-based screening 
    and high-throughput chemical search.
  dev_url: https://github.com/mosdef-hub/Grouper


extra:
  recipe-maintainers:
    - CalCraven
    - kierannp
    - chrisjonesBSU
