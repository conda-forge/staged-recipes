{% set version = "0.0.1" %}
{% set build = 0 %}

package:
  name: exachem
  version: {{ version }}

source:
  url: https://github.com/ExaChem/exachem/releases/download/v{{ version }}/exachem-{{ version }}.tar.gz
  sha256: fccd9840d17be4ad26ad5facbfa452bb26acb2a22ccd12ed48369572ad7138cd
  patches:
    - allow-conda.patch

build:
  number: {{ build }}
  skip: true  # [not linux]

  string: {{ mpi_prefix }}_h{{ PKG_HASH }}_{{ build }}

  run_exports:
    - {{ pin_subpackage('exachem', max_pin='x.x') }} {{ mpi_prefix }}_*

requirements:
  build:
    - {{ compiler('c') }}
    - {{ compiler('cxx') }}
    - {{ compiler('fortran') }}
    - {{ stdlib('c') }}
    - cmake >=3.18
    - make
  host:
    - {{ mpi }}
    - nwchemex-tamm
  run:
    - {{ mpi }}

test:
  commands:
    - true

about:
  home: https://exachem.readthedocs.io/
  license: Apache-2.0
  license_file:
    - LICENSE.txt
    - DISCLAIMER
  summary: Open Source Exascale Quantum Chemistry Software
  dev_url: https://github.com/exachem/exachem

extra:
  recipe-maintainers:
    - awvwgk
