context:
  name: mu
  version: "1.12.15"

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://github.com/djcb/mu/releases/download/v${{ version }}/mu-${{ version }}.tar.xz
  sha256: 49d75622acff9d8a552622eba29d8abe49ae26d7fe80d835898f75f43e673ee3

build:
  skip: win
  script: |
    meson setup build --prefix=$PREFIX ${MESON_ARGS}
    meson compile -C build -j ${CPU_COUNT}
    meson install -C build
    rm -rf ${PREFIX}/share/man
    rm -rf ${PREFIX}/share/doc
  number: 0

requirements:
  build:
    - ${{ compiler('c') }}
    - ${{ compiler('cxx') }}
    - ${{ stdlib('c') }}
    - meson
    - cmake
    - pkg-config
    - emacs >=28
  host:
    - cli11
    - cpp-expected
    - fmt
    - glib
    - gmime
    - tl-optional
    - xapian-core
    - zlib

  ignore_run_exports:
    by_name:
      - libzlib
    
tests:
  - script: "mu --version"
  - script: "emacs --batch --eval '(require (quote mu4e))'"
    requirements:
      run:
        - emacs >=28

about:
  homepage: https://github.com/djcb/mu
  summary: 'maildir indexer/searcher + emacs mail client + guile bindings '
  license:  GPL-3.0-or-later
  license_file: COPYING
  documentation: http://www.djcbsoftware.nl/code/mu
  repository: https://github.com/djcb/mu

extra:
  recipe-maintainers:
    - cbourjau
