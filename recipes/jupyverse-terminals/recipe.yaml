schema_version: 1

context:
  version: "0.1.0"

package:
  name: jupyverse-terminals
  version: ${{ version }}

source:
  - url: https://pypi.org/packages/source/j/jupyverse-terminals/jupyverse_terminals-${{ version }}.tar.gz
    sha256: 8ace4229346a967ff18726e88250b90ee4faffe1637cc7a54a201496dde3700e

build:
  noarch: python
  number: 0
  script:
    - ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation --disable-pip-version-check

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - uv-build
  run:
    - python >=${{ python_min }}
    - fastapi-core
    - pydantic
    - jupyverse-api >=0.15.0,<0.16.0
    - jupyverse-auth >=0.2.0,<0.3.0

tests:
  - python:
      imports: jupyverse_terminals
      pip_check: true
      python_version: ${{ python_min }}.*

about:
  license: BSD-3-Clause
  license_file: COPYING.md
  homepage: https://github.com/jupyter-server/jupyverse/tree/main/api/terminals
  summary: The API for Jupyverse's terminals.

extra:
  recipe-maintainers:
    - davidbrochart
