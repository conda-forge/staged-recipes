{% set name = "kraken" %}
{% set version = "7.0.2" %}

package:
  name: "kraken-ocr"
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz
  sha256: d94e763ff798765c8b1baecdd2ec231735971069dd06a509100b49e929560682

build:
  # coremltools is unavailable on win-64 but required by kraken
  skip: true  # [win]
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - hatchling
    - versioningit
    - pip
  run:
    - python
    - jsonschema
    - lxml
    - requests
    - click >=8.1,<8.3
    - numpy
    - pillow >=9.2.0
    - regex
    - scipy ==1.15.2
    - protobuf >=3.0.0
    - coremltools >=9.0,<10.dev0
    - jinja2 >=3.1.6,<3.2.dev0
    - python-bidi >=0.6.6,<0.7.dev0
    - torchvision >=0.5.0
    - pytorch >=2.4.0,<=2.10
    - scikit-learn >=1.7.2,<1.8.dev0
    - scikit-image >=0.25.2,<0.26.dev0
    - shapely >=2.1.2,<2.2.dev0
    - pyarrow
    - htrmopo >=0.5,>=0.5,<1.dev0
    - lightning ==2.6.1
    - torchmetrics >=1.1.0
    - threadpoolctl >=3.6.0,<3.7.dev0
    - platformdirs
    - rich <14.1.0
    - safetensors >=0.7.0,<0.8.dev0
    - iso639-lang
    - packaging
    - pyvips

test:
  imports:
    - kraken
  commands:
    #- pip check # fails because kraken expects scipy >=1.15.3,<1.16.dev0 but conda-forge only provides 1.15.2
    - kraken --help
    - python -c "import pyvips" # Check that the Kraken PDF dependency is loadable (pyvips needs libvips.so)
    - ketos --help
  requires:
    #- pip # pip check is currently disabled
    - python

about:
  home: https://kraken.re
  summary: OCR/HTR engine for all the languages
  license: Apache-2.0
  license_file: LICENSE

extra:
  recipe-maintainers:
    - IvoLeist
