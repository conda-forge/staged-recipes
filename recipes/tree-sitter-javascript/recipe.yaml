schema_version: 1

context:
  version: "0.25.0"

package:
  name: tree-sitter-javascript
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/t/tree_sitter_javascript/tree_sitter_javascript-${{ version }}.tar.gz
  sha256: 329b5414874f0588a98f1c291f1b28138286617aa907746ffe55adfdcf963f38

build:
  number: 0
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  build:
    - ${{ compiler("c") }}
  host:
    - python
    - pip
    - setuptools >=42
    - wheel
  run:
    - python

tests:
  - python:
      imports:
        - tree_sitter_javascript

about:
  homepage: https://github.com/tree-sitter/tree-sitter-javascript
  summary: JavaScript grammar for tree-sitter
  license: MIT
  license_file: LICENSE
  repository: https://github.com/tree-sitter/tree-sitter-javascript

extra:
  recipe-maintainers:
    - killua156
    - mgorny
