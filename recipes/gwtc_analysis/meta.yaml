{% set name = "gwtc_analysis" %}
{% set version = "0.3.3" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/g/gwtc-analysis/gwtc_analysis-{{ version }}.tar.gz
  sha256: ffe7092843bf6c9ddefbc08a249ec4cdc1cef0c38935482e1e4269732d159697

build:
  skip: true  # [win]
  number: 0
  entry_points:
    - gwtc_analysis = gwtc_analysis.cli:main
  script:
    - {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python
    - pip
    - setuptools
    - wheel
  run:
    - python
    - numpy
    - pandas
    - matplotlib-base
    - minio
    - requests
    - healpy
    - ligo.skymap

test:
  imports:
    - gwtc_analysis
  commands:
    - gwtc_analysis --help
    - pip check
  requires:
    - pip

about:
  home: https://pypi.org/project/gwtc-analysis/
  dev_url: https://github.com/danielsentenac/gwtc_analysis
  summary: GWTC analysis utilities
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - danielsentenac
