# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "3.1.0"

package:
  name: djangorestframework-api-key
  version: ${{ version }}

source:
  - url: https://pypi.org/packages/source/d/djangorestframework-api-key/djangorestframework_api_key-${{ version }}.tar.gz
    sha256: 7e9c88360933b3c46467d80645a50cf36697674c7856a737a1c674d570860ac9

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - setuptools
  run:
    - python >=${{ python_min }}
    - packaging

tests:
  - python:
      imports:
        - rest_framework_api_key
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  homepage: https://github.com/florimondmanca/djangorestframework-api-key
  license: MIT
  license_file: LICENSE
  summary: API key permissions for the Django REST Framework
  description: |
    API key permissions for the Django REST Framework
  documentation: https://florimondmanca.github.io/djangorestframework-api-key/

extra:
  recipe-maintainers:
    - rxm7706
