schema_version: 1

context:
  name: newton-actuators
  version: 0.1.0
  build_number: 0

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://github.com/newton-physics/newton-actuators/archive/refs/tags/v${{ version }}.zip
  sha256: 7cbf770bc3dcc923fb6dbcbc4889302510776b658acc1ad75e4137d8a19cd6b6

build:
  noarch: python
  number: ${{ build_number }}
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - hatchling
  run:
    - python >=${{ python_min }}
    - warp-lang >=1.11.1

tests:
  - python:
      imports:
        - newton_actuators
      pip_check: true
      python_version: ${{ python_min }}.*
  - script:
      - python -m newton_actuators.tests
    requirements:
      run:
        - python ${{ python_min }}.*

about:
  homepage: https://github.com/newton-physics/newton-actuators
  license: Apache-2.0
  license_file: LICENSE.md
  repository: https://github.com/newton-physics/newton-actuators
  summary: Actuator-based control library for GPU-accelerated physics simulations

extra:
  recipe-maintainers:
    - adenzler-nvidia
    - diegoferigo
    - eric-heiden
