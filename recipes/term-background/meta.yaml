schema_version: 1

context:
  python_min: "3.9"
  version: "1.0.5"

package:
  name: term-background
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/t/term-background/term_background-${{ version }}.tar.gz
  sha256: 50e428dfbf6a33e5076cd7898a42a77fc4c5b60e804b50c59e89ead7a22299bd

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - setuptools >=70.0.0
    - pip
  run:
    - python >=${{ python_min }}

tests:
  - python:
      imports:
        - term_background
      pip_check: true
      python_version: ${{ python_min }}.*

about:
  summary: Determine if a shell has a light or dark background
  license: GPL-2.0-only
  license_file: COPYING
  homepage: https://github.com/rocky/shell-term-background

extra:
  recipe-maintainers:
    - mmatera
    - rocky
