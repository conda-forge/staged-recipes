{% set version = "1.4.6" %}

package:
  name: tardigrade_micromorphic_element
  version: {{ version }}

source:
  url: https://github.com/UCBoulder/tardigrade_micromorphic_element/archive/refs/tags/{{ version }}.tar.gz
  sha256: a83329b437f7e3b99c9654fa2ee70c9bee6cd3c6ccf26f0ffedefdbd61cb9b3a

build:
  number: 0
  script_env:
    - SETUPTOOLS_SCM_PRETEND_VERSION={{ version }}
  script:
    - set -x
    # Build and install c++ libraries
    - cmake -S . -B build -DCMAKE_BUILD_TYPE=Release ${CMAKE_ARGS}
    - cmake --build build --target microbalance micromat
    - cmake --install build --prefix ${PREFIX}
  skip: true  # [osx or win]
  run_exports:
    - {{ pin_subpackage('tardigrade_micromorphic_element', max_pin='x.x') }}

requirements:
  build:
    - python
    - cross-python_{{ target_platform }}    # [build_platform != target_platform]
    - {{ compiler('cxx') }}
    - {{ stdlib('c') }}
    - make
    - cmake >=3.30
    - breathe >=4.3.0
    - clang-tools
    - doxygen
    - libboost-python-devel >=1.82
    - pip
    - python-build
    - setuptools >=77
    - setuptools_scm >=8
    - sphinx >=3.0.4
    - sphinx_rtd_theme >=0.4.3
    - sphinxcontrib-bibtex
  host:
    - setuptools >=77
    - setuptools_scm >=8
    - eigen >=3.3.7
    - tardigrade_error_tools >=0.9.8
    - tardigrade_vector_tools >=0.8.7
    - tardigrade_constitutive_tools >=0.8.5
    - tardigrade_stress_tools >=0.6.3
    - tardigrade_micromorphic_tools >=1.4.3
    - tardigrade_hydra >=0.8.0
    - tardigrade_micromorphic_linear_elasticity >=1.5.2
    - tardigrade_micromorphic_elasto_plasticity >=1.4.2
  run:
    - eigen >=3.3.7

test:
  requires:
    - {{ compiler('cxx') }}
    - make
    - cmake >=3.30
    - clang-tools
    - libboost-python-devel >=1.82
    - doxygen
    - sphinx
  source_files:
    - CMakeLists.txt
    - src/cpp/tests/*
  commands:
    - set -x
    - cmake -S . -B build -DCMAKE_BUILD_TYPE=conda-test -DCMAKE_INSTALL_LIBDIR=lib
    - cmake --build build --target all --verbose --parallel 4
    - ctest --test-dir build --output-on-failure -R 'test_' --parallel 4
    - echo running tests

about:
  home: https://github.com/UCBoulder/tardigrade_micromorphic_element
  license: BSD-3-Clause
  license_file: LICENSE
  summary: 'An collection of utilities for finite element implementations of micromorphic theory'
  description: |
    tardigrade_micromorphic_element A collection of material models and balance equations for micromorphic continuum theory
  dev_url: https://github.com/UCBoulder/tardigrade_micromorphic_element

extra:
  recipe-maintainers:
    - NateAM
    - kbrindley
