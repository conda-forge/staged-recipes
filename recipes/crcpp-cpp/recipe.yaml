schema_version: 1

context:
  name: crcpp-cpp
  version: 1.2.1.0

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://github.com/d-bahr/CRCpp/archive/refs/tags/release-${{ version }}.tar.gz
  sha256: e2019ed95300f865fe0c1ea326e5502e1ba538bfbc2e31d175a5ee313b31510d

build:
  noarch: generic
  number: 0
  script:
    - if: unix
      then:
        - cmake -G Ninja -S . -B build ${CMAKE_ARGS} -DBUILD_TEST=ON
        - cmake --build build
        - ctest --test-dir build --output-on-failure
        - cmake --install build
    - if: win
      then:
        - cmake -G Ninja -S . -B build %CMAKE_ARGS% -DCMAKE_INSTALL_PREFIX="%PREFIX%" -DBUILD_TEST=ON
        - cmake --build build
        - ctest --test-dir build --output-on-failure
        - cmake --install build

requirements:
  build:
    - ${{ compiler('cxx') }}
    - ${{ stdlib('c') }}
  host:
    - cmake
    - ninja

tests:
  - if: unix
    then:
      - script: test -f "${PREFIX}/include/CRC.h"
  - if: win
    then:
      - script: if not exist "%PREFIX%\include\CRC.h" exit /b 1

about:
  homepage: https://github.com/d-bahr/CRCpp
  repository: https://github.com/d-bahr/CRCpp
  summary: Header-only C++ library for CRC calculations
  license: BSD-3-Clause
  license_file: LICENSE

extra:
  recipe-maintainers:
    - swahtz
