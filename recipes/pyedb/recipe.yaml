context:
  name: "pyedb"
  version: "0.73.0"

package:
  name: ${{ name }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/${{ name[0] }}/${{ name }}/pyedb-${{ version }}.tar.gz
  sha256: 210bb50689cf08eb1b2ae0da383cf1f6911f7231cc5c17d2fd202bd837a85467

build:
  noarch: python
  script: python -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - flit-core >=3.2,<4
    - pip
    - python ${{ python_min }}.*
  run:
    - ansys-edb-core >=0.2.0
    - ansys-pythonnet
    - defusedxml >=0.7
    - numpy >=1.20.0
    - psutil
    - pydantic >=2.6.4
    - python >=${{ python_min }}
    - ${{ "pywin32 >=303" if win }}
    - ${{ "cffi >=1.16" if linux }}
    - toml ==0.10.2
    - xmltodict

tests:
  - python:
      imports:
      - pyedb
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  homepage: https://pypi.org/project/pyedb/
  summary: 'Python library to use the EDB client library'
  repository: https://github.com/ansys/pyedb-core
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - svandenb-dev
    - hui-zhou-a
    - SMoraisAnsys
