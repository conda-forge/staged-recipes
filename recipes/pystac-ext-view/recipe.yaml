schema_version: 1

context:
  version: "1.0.0"

package:
  name: pystac-ext-view
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/p/pystac-ext-view/pystac_ext_view-${{ version }}.tar.gz
  sha256: cb677dcd49f9a62824087d150f01eea97fc24c577971edb60374c9e48e517311

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - hatchling
    - pip
  run:
    - python >=${{ python_min }}
    - pystac-core

tests:
  - python:
      imports:
        - pystac_ext_view
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  summary: View extension for PySTAC
  license: Apache-2.0
  license_file: LICENSE
  homepage: https://pypi.org/project/pystac-ext-view/
  documentation: https://pystac.readthedocs.io

extra:
  recipe-maintainers:
    - AddYourGitHubIdHere
