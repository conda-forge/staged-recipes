context:
  version: "0.1.11"

package:
  name: macpow
  version: ${{ version }}

source:
  url: https://github.com/k06a/macpow/archive/refs/tags/v${{ version }}.tar.gz
  sha256: 7a9b59f8ae019cf88f63db5660929f63899e671b7f6fb3619fe02b886c73903c

build:
  number: 0
  skip:
    - not osx
  script:
    - cargo-bundle-licenses --format yaml --output ${SRC_DIR}/THIRDPARTY.yml
    - cargo install --locked --root ${PREFIX} --path . --no-track

requirements:
  build:
    - ${{ compiler('rust') }}
    - ${{ compiler('c') }}
    - ${{ stdlib('c') }}
    - cargo-bundle-licenses
  run:
    - __osx

tests:
  - package_contents:
      bin:
        - macpow
  - script:
      - macpow --help

about:
  homepage: https://github.com/k06a/macpow
  repository: https://github.com/k06a/macpow
  summary: Real-time power consumption monitor for Apple Silicon Macs
  description: |
    macpow is a real-time power tree TUI for Apple Silicon Macs.
    It monitors and displays power consumption across CPU, GPU,
    and other components in a terminal user interface.
  license: MIT
  license_file:
    - LICENSE
    - THIRDPARTY.yml

extra:
  recipe-maintainers:
    - pavelzw
