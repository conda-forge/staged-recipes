context:
  name: easyreflectometry
  version: 1.5.0

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/${{ name[0] }}/${{ name }}/easyreflectometry-${{ version }}.tar.gz
  sha256: a7ffd7a2c44a3d50e95c395f6c6aa342baf02d0e0e181a7d53a08ebfeca0cc6d

build:
  number: 0
  skip: match(python, ">=3.14")
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python
    - hatchling <=1.21.0
    - setuptools-git-versioning
    - pip
  run:
    - python
    - easyscience
    - scipp
    - refnx
    - refl1d >=1.0.0
    - orsopy
    - if: not win
      then: svglib <1.6
    - xhtml2pdf
    - bumps

tests:
  - python:
      imports:
        - easyreflectometry
      pip_check: true

about:
  homepage: https://docs.easyreflectometry.org/
  summary: A reflectometry python package built on the EasyScience framework.
  license: BSD-3-Clause
  license_file: LICENSE
  repository: https://github.com/easyscience/EasyReflectometryLib

extra:
  recipe-maintainers:
    - MridulS
