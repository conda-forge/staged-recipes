schema_version: 1

context:
  version: "1.0.0b260514"
  python_min: "3.10"

package:
  name: agent-framework-orchestrations
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/a/agent-framework-orchestrations/agent_framework_orchestrations-${{ version }}.tar.gz
  sha256: 81a34917766a28ac8a5d05232562d2b33f59a00d1b0ce5e5166ad34600b9646f

build:
  noarch: python
  number: 0
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - flit-core <4.0,>=3.11
  run:
    - python >=${{ python_min }}
    - agent-framework-core <2,>=1.4.0

tests:
  - python:
      imports:
        - agent_framework.orchestrations
      python_version: ${{ python_min }}.*
      pip_check: true

about:
  summary: |
    Orchestration patterns for Microsoft Agent Framework. Includes SequentialBuilder, ConcurrentBuilder, HandoffBuilder, GroupChatBuilder, and MagenticBuilder.
  homepage: https://pypi.org/project/agent-framework-orchestrations/
  repository: https://github.com/microsoft/agent-framework
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - killua156
    - mgorny
