{% set version = "0.1.0" %}
{% set python_min = "3.10" %}

package:
  name: aiatresp
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/a/aiatresp/aiatresp-{{ version }}.tar.gz
  sha256: 1d84deb2a3ad198029b95c0808463e484923faddec300dcb6cd662119467000f

build:
  entry_points:
    - aia-response = aiatresp.cli:main
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - setuptools >=68
    - wheel
    - pip
  run:
    - python >={{ python_min }}
    - numpy >=1.26
    - astropy-base >=6.0
    - aiapy >=0.10,<1
    - scipy >=1.10
    - tqdm >=4.66
    - platformdirs >=3.0.0

test:
  imports:
    - aiatresp
  commands:
    - pip check
    - aia-response --help
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://github.com/Jagathesh04/aiatresp
  summary: Reproducible, Python-native SDO/AIA temperature-response generation
  doc_url: https://github.com/Jagathesh04/aiatresp
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - Jagathesh04
