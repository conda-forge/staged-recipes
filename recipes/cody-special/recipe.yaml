schema_version: 1

context:
  version: "1.0.0"

package:
  name: cody-special
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/c/cody-special/cody_special-${{ version }}.tar.gz
  sha256: 795f9268155b845310855f76d9a0d63dabb6fe5f1c3d3fc10814b38eefa5d537

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - poetry-core
  run:
    - python >=${{ python_min }}

tests:
  - python:
      imports:
        - cody_special
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  homepage: https://github.com/vollib/cody-special
  repository: https://github.com/vollib/cody-special
  summary: High-precision error functions and normal distribution (Cody's algorithm)
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - killua156
