context:
  version: "2.25.1"

package:
  name: sdmx1
  version: ${{ version }}

source:
- url: https://github.com/khaeru/sdmx/archive/refs/tags/v${{ version }}.tar.gz
  sha256: 3862ec2569dc2eaa0584a0163f1bab47f79d9423b3323bab8a5a00ad6e8e83cb

build:
  number: 0
  script: ${{ PYTHON }} -m pip install . --no-deps --no-build-isolation
  noarch: python

requirements:
  host:
  - python ${{ python_min }}.*
  - hatchling
  - versioningit
  - pip
  run:
  - python >=${{ python_min }}
  - lxml >=3.6
  - packaging >=26
  - pandas >=1.0
  - platformdirs >=4.1
  - python-dateutil
  - requests >=2.7
  - requests-cache

tests:
- script:
    - pytest -n auto -vvv
  requirements:
      run:
        - python ${{ python_min }}.*
        - filelock
        - gitpython
        - jinja2  
        - pytest-cov  
        - pytest-rerunfailures 
        - pytest-xdist  
        - pytest >=9 
        - requests-cache
        - responses
  files:
      source:
        - .

about:
  summary: Statistical Data and Metadata eXchange (SDMX) is a Python implementation of the SDMX http://www.sdmx.org_ 2.1 (ISO 17369:2013 https://www.iso.org/standard/52500.html) and 3.0 standards for statistical data and metadata exchange. 
  license: Apache-2.0
  license_file: LICENSE
  documentation: https://sdmx1.readthedocs.io/en/latest
  homepage: https://github.com/khaeru/sdmx

extra:
  recipe-maintainers:
    - julian-belina
