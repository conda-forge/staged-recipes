context:
  version: "2.25.1"

package:
  name: sdmx1
  version: ${{ version }}

source:
- url: https://github.com/khaeru/sdmx/archive/refs/tags/v{{ version }}.tar.gz
  sha256: d551b3e8efffaafb6c50eb14daf2a5c103ac65503d234b5064ba9a3f6e7c59f2

build:
  number: ${{ build_number }}
  script: ${{ PYTHON }} -m pip install .
  noarch: python

requirements:
  host:
  - python >=3.10
  - hatchling
  - versioningit
  - pip
  run:
  - python >=3.10
  - lxml >=3.6
  - packaging >=26
  - pandas >=1.0
  - platformdirs >=4.1
  - python-dateutil
  - requests >=2.7
  - requests-cache

tests:
- script:
    - pytest -n auto -vvv
  requirements:
      run:
        - python ${{ python_min }}.*
        - filelock
        - gitpython
        - jinja2  
        - pytest-cov  
        - pytest-rerunfailures 
        - pytest-xdist  
        - pytest >=9 
        - requests-cache
        - responses
  files:
      source:
        - .

about:
  summary: Statistical Data and Metadata eXchange (SDMX) is a Python implementation of the SDMX http://www.sdmx.org_ 2.1 (ISO 17369:2013 https://www.iso.org/standard/52500.html) and 3.0 standards for statistical data and metadata exchange. 
  license: Apache-2.0
  license_file: LICENSE
  documentation: https://sdmx1.readthedocs.io/en/latest

extra:
  recipe-maintainers:
    - julian-belina
