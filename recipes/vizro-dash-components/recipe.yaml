# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  name: vizro-dash-components
  version: "0.1.1"

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/${{ name[0] }}/${{ name }}/vizro_dash_components-${{ version }}.tar.gz
  sha256: 1825ea1dc28d41424f5f4eae8558f9534a4434cca5681df68065be05923bbab2

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - hatchling
    - hatch-nodejs-version >=0.3.2
    - pip
  run:
    - python >=${{ python_min }},<4.0
    - dash >=4,<5
    - dash-mantine-components >=2.0.0

tests:
  - python:
      imports:
        - vizro_dash_components
      pip_check: true
      python_version:
      - ${{ python_min }}.*
      - "*"

about:
  summary: Vizro Dash Components are used by the Vizro framework but can be used in a pure Dash app
  license: Apache-2.0
  license_file: LICENSE.txt
  repository: https://github.com/mckinsey/vizro
  homepage: https://vizro.mckinsey.com/

extra:
  recipe-maintainers:
    - rxm7706
