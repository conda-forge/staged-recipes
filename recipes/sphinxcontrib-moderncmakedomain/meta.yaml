{% set version = "3.29.0" %}

package:
  name: sphinxcontrib-moderncmakedomain
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/s/sphinxcontrib-moderncmakedomain/sphinxcontrib_moderncmakedomain-{{ version }}.tar.gz
  sha256: 3587def241ff2577d0bbef11810a082e9dec1b78a3d4b4a066240b5f3dc1b5b2

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - hatchling
    - pip
  run:
    - python >={{ python_min }}
    - sphinx >=2

test:
  imports:
    - sphinxcontrib.moderncmakedomain
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://github.com/scikit-build/moderncmakedomain
  summary: Sphinx Domain for Modern CMake
  license: BSD-3-Clause
  license_file: LICENSE

extra:
  recipe-maintainers:
    - awvwgk
