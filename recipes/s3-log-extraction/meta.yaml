{% set name = "s3-log-extraction" %}
{% set pypi_name = "s3_log_extraction" %}
{% set version = "1.3.7" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ pypi_name[0] }}/{{ pypi_name }}/{{ pypi_name }}-{{ version }}.tar.gz
  sha256: 2047d666e8f0aeb78adc61a381bcad7863fb1c179bab42d82fd7264b011daeba

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv
  number: 0
  entry_points:
   - s3logextraction  = s3_log_extraction._command_line_interface._cli:_s3logextraction_cli

requirements:
  host:
    - python {{ python_min }}
    - pip
    - hatchling
  run:
    - python >={{ python_min }}
    - pandas
    - tqdm
    - PyYAML
    - rich-click
    - natsort
    - psutil
    - cryptography
    - pydantic

test:
  requires:
    - python {{ python_min }}
    - pytest
    - pytest-cov
  source_files:
    - tests
  imports:
    - s3_log_extraction
  commands:
    - pytest -m "not remote"

about:
  home: https://github.com/dandi/s3-log-extraction
  summary: Fast extraction of access summary data from S3 logs.
  description: |
    Creates summary file reports of bytes downloaded with coarse geolocations.
    Aggregates over top-level 'datasets', as well as the entire bucket.
  license: MIT
  license_family: MIT
  license_file: LICENSE.txt
  doc_url: https://github.com/dandi/s3-log-extraction/blob/main/README.md
  dev_url: https://github.com/dandi/s3-log-extraction

extra:
  recipe-maintainers:
    - CodyCBakerPhD
    - yarikoptic
    - candleindark
    - asmacdo
