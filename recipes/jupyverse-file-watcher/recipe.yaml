schema_version: 1

context:
  version: "0.1.0"

package:
  name: jupyverse-file-watcher
  version: ${{ version }}

source:
  - url: https://pypi.org/packages/source/j/jupyverse-file-watcher/jupyverse_file_watcher-${{ version }}.tar.gz
    sha256: eaa8ebf53b0d3a3e853c48c4e66d2a792e11abb211ffec1a53d3d953493717c8

build:
  noarch: python
  number: 0
  script:
    - ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation --disable-pip-version-check

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - uv-build
  run:
    - python >=${{ python_min }}
    - anyio

tests:
  - python:
      imports: jupyverse_file_watcher
      pip_check: true
      python_version: ${{ python_min }}.*

about:
  license: BSD-3-Clause
  license_file: COPYING.md
  homepage: https://github.com/jupyter-server/jupyverse/tree/main/api/file_watcher
  summary: The API for Jupyverse's file watcher.

extra:
  recipe-maintainers:
    - davidbrochart
