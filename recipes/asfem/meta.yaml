{% set version = "0.8" %}
{% set build = 0 %}
{% set mpi_prefix = "mpi_" + mpi %}

package:
  name: asfem
  version: "{{ version }}"

source:
  url: https://github.com/MatMechLab/AsFem/archive/refs/tags/v{{ version }}.tar.gz
  sha256: f77d4b7cd9c494e9c5c56d2d8bc887906d0eaee1e526cf69bbb8464e8ba2d644

build:
  number: {{ build }}
  string: {{ mpi_prefix }}_h{{ PKG_HASH }}_{{ build }}
  skip: true  # [not linux]

requirements:
  build:
    - {{ compiler('cxx') }}
    - {{ stdlib('c') }}
    - cmake
    - make
  host:
    - {{ mpi }}
    - eigen
    - libgomp  # [linux]
    - petsc
  run:
    - {{ mpi }}
    - libgomp  # [linux]
    - petsc

test:
  commands:
    - asfem -i $PREFIX/share/asfem/examples/tutorial/step1.i --read-only

about:
  home: https://github.com/MatMechLab/AsFem
  license: GPL-3.0-only
  license_file: LICENSE
  summary: Advanced Simulation kit based on Finite Element Method
  doc_url: https://matmechlab.github.io/AsFem/
  dev_url: https://github.com/MatMechLab/AsFem

extra:
  recipe-maintainers:
    - yangbai90
