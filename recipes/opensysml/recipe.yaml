context:
  version: "0.1.0"

package:
  name: opensysml
  version: ${{ version }}

source:
  url: https://github.com/Open-MBEE/opensysml/archive/refs/tags/v${{ version }}.tar.gz
  sha256: d4376f0fdb513501d679c366fe13ab8969b0beeab406c5394f1f47d350735106

build:
  number: 0
  noarch: python
  script: python -m pip install ./packages/opensysml --no-deps --ignore-installed -vv

requirements:
  host:
    - python >=3.9
    - pip
    - hatchling >=1.24
  run:
    - python >=3.9

tests:
  - python:
      imports:
        - opensysml
      pip_check: true

about:
  homepage: https://github.com/Open-MBEE/opensysml
  summary: OpenSysML core package.
  description: |
    OpenSysML is the core Python package scaffold for the OpenSysML project.
  license: Apache-2.0
  license_file: LICENSE
  repository: https://github.com/Open-MBEE/opensysml

extra:
  recipe-maintainers:
    - rkarban
