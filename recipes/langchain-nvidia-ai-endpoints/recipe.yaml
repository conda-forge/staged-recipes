# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "1.4.1"

package:
  name: langchain-nvidia-ai-endpoints
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/l/langchain-nvidia-ai-endpoints/langchain_nvidia_ai_endpoints-${{ version }}.tar.gz
  sha256: 8835f7e56d559b370b87164f937c1eb048ab837f25de91598f00555a705c2d16

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - poetry-core
    - pip
  run:
    - python >=${{ python_min }}
    - langchain-core >=1.2.5,<2.0.0
    - aiohttp >=3.13.3,<4.0.0
    - filetype >=1.2.0,<2.0.0
    - requests >=2.28.0

tests:
  - python:
      imports:
        - langchain_nvidia_ai_endpoints
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  homepage: https://pypi.org/project/langchain-nvidia-ai-endpoints/
  license: MIT
  license_file: LICENSE
  summary: An integration package connecting NVIDIA AI Endpoints and LangChain
  repository: https://github.com/langchain-ai/langchain-nvidia
  documentation: https://python.langchain.com/docs/integrations/providers/nvidia/
  description: |
    langchain-nvidia-ai-endpoints is the LangChain partner integration
    package for NVIDIA AI Foundation Models and Endpoints. It connects
    NVIDIA-hosted and self-hosted NIM (NVIDIA Inference Microservice)
    chat, embedding, reranking, and vision-language models to the
    LangChain framework via the standard LangChain interfaces
    (chat models, embeddings, and retrievers).

extra:
  recipe-maintainers:
    - rxm7706
