schema_version: 1

context:
  version: 1.20.0.post1

package:
  name: sqlglot-mypy
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/s/sqlglot-mypy/sqlglot_mypy-${{ version }}.tar.gz
  sha256: 6c531c0b0f8b2e9a2cdf5e488d4bdef15e922ca006b92e1de2e25900f1584d1e

build:
  number: 0
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  python:
    entry_points:
      - mypy = mypy.__main__:console_entry
      - stubgen = mypy.stubgen:main
      - stubtest = mypy.stubtest:main
      - dmypy = mypy.dmypy.client:console_entry
      - mypyc = mypyc.__main__:main

requirements:
  build:
    - ${{ stdlib("c") }}
    - ${{ compiler("c") }}
  host:
    - python
    - setuptools >=77.0.3
    - typing_extensions >=4.6.0
    - mypy_extensions >=1.0.0
    - pathspec >=1.0.0
    - tomli >=1.1.0
    - python-librt >=0.8.0
    - types-psutil
    - types-setuptools
    - pip
  run:
    - python
    - typing_extensions >=4.6.0
    - mypy_extensions >=1.0.0
    - pathspec >=1.0.0
    - tomli >=1.1.0
    - python-librt >=0.8.0

tests:
  - python:
      imports:
        - mypy
      pip_check: true
  - requirements:
      run:
        - python
        # For mypyc
        - setuptools >=50
    script:
      - mypy --help
      - stubgen --help
      - stubtest --help
      - dmypy --help
      - mypyc --help

about:
  summary: Fork of mypy for SQLGlot-Optional static typing for Python
  license: BSD-3-Clause AND EPL-2.0 AND Apache-2.0
  license_file:
    - LICENSE
    - mypy/typeshed/LICENSE
    - mypyc/external/googletest/LICENSE
  homepage: https://github.com/vaggelisd/sqlglot-mypy
  documentation: https://mypy.readthedocs.io/en/stable/index.html

extra:
  recipe-maintainers:
    - thewchan
