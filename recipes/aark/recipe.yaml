schema_version: 1

context:
  name: aark
  python_min: "3.14"
  version: "0.1.0"

package:
  name: ${{ name }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/${{ name[0] }}/${{ name }}/${{ name }}-${{ version }}.tar.gz
  sha256: 6fab96ac5155a6506ab56436ab10f14ef7643c9d7bb0ea28c2b080e4b463bfee

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - hatchling
    - pip
    - python ${{ python_min }}.*
  run:
    - python >=${{ python_min }}
    - pyodbc >=5,<6

tests:
  - python:
      imports:
        - aark
      pip_check: true
      python_version: ${{ python_min }}.*

about:
  summary: airallergy's research kit
  license: BSD-3-Clause
  license_file: LICENSE
  homepage: https://github.com/airallergy/aark # make conda-forge-linter happy, not defined in upstream
  repository: https://github.com/airallergy/aark

extra:
  recipe-maintainers:
    - airallergy
