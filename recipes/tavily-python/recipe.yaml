schema_version: 1

context:
  version: "0.7.24"

package:
  name: tavily-python
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/t/tavily-python/tavily_python-${{ version }}.tar.gz
  sha256: 6c8954193c6472231e813fe50cbd07806bd86c7228957675eb45875a44d58296

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - setuptools
  run:
    - python >=${{ python_min }}
    - requests
    - tiktoken >=0.5.1
    - httpx

tests:
  - python:
      python_version:
        - ${{ python_min }}
        - '*'
      imports:
        - tavily
      pip_check: true

about:
  summary: Python wrapper for the Tavily API
  license: MIT
  license_file: LICENSE
  homepage: https://github.com/tavily-ai/tavily-python

extra:
  recipe-maintainers:
    - xhochy
