context:
  version: "0.3.0"

package:
  name: habitat
  version: ${{ version }}

source:
  url: https://github.com/earendil-works/absurd/archive/refs/tags/${{ version }}.tar.gz
  sha256: 7ccf4bb1acca59101ad833cce3146965de84b913521046506c14d79a3848fed1
  target_directory: src

build:
  number: 0
  # The UI build fails on Windows
  skip: win
  script:
    - cd src/habitat/ui
    - pnpm install
    - pnpm build
    - pnpm-licenses generate-disclaimer --prod --output-file=../../../third-party-licenses.txt
    - cd ../cmd/habitat
    - go-licenses save . --save_path ../../../../library_licenses --ignore habitat
    - go build -v -o $PREFIX/bin/habitat -ldflags="-s -w" .

requirements:
  build:
    - ${{ compiler("go-nocgo") }}
    - go-licenses
    - nodejs >=22
    - pnpm
    - pnpm-licenses

tests:
  - script:
      - habitat --help || true
  - package_contents:
      bin:
        - habitat
      strict: true

about:
  homepage: https://github.com/earendil-works/absurd/tree/main/habitat
  summary: Dashboard and monitoring tool for Absurd durable execution system
  description: |
    Habitat is a simple dashboard and monitoring tool for Absurd,
    providing a web UI to visualize and monitor the state of running
    and executed tasks, queues, and events in an Absurd durable execution system.
  license: Apache-2.0
  license_file:
    - src/LICENSE
    - library_licenses/
    - third-party-licenses.txt
  documentation: https://github.com/earendil-works/absurd/tree/main/habitat
  repository: https://github.com/earendil-works/absurd

extra:
  recipe-maintainers:
    - xhochy
