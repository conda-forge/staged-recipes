schema_version: 1

context:
  version: "12.0"

package:
  name: pyobjc-framework-coremedia
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/p/pyobjc-framework-CoreMedia/pyobjc_framework_coremedia-${{ version }}.tar.gz
  sha256: d7f76d2eb2890be9f8836b95682e83fa7f158c92043958daa71845fbc4a01ba9

build:
  number: 0
  skip: not osx
  script:
    content:
      # force pyobjc to use conda-forge's chosen SDK
      - export CFLAGS="${CFLAGS} -isysroot ${SDKROOT:-$CONDA_BUILD_SYSROOT}"
      - ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  build:
    - ${{ stdlib('c') }}
    - ${{ compiler('c') }}
  host:
    - python
    - pip
    - setuptools
    - wheel
  run:
    - python
    - pyobjc-core >=${{ version }}
    - pyobjc-framework-cocoa >=${{ version }}

tests:
  - python:
      imports:
        - CoreMedia
      pip_check: true

about:
  summary: Wrappers for the framework CoreMedia on macOS
  description: |
    PyObjC wrappers for Apple's CoreMedia framework, giving Python access
    to the low-level media pipeline on macOS (sample buffers, time
    representations, and format descriptions). Part of the PyObjC project,
    which provides bridges between Python and Objective-C frameworks on
    macOS.
  license: MIT
  license_file: License.txt
  homepage: https://pyobjc.readthedocs.io/
  repository: https://github.com/ronaldoussoren/pyobjc
  documentation: https://pyobjc.readthedocs.io/

extra:
  recipe-maintainers:
    - ruben-arts
