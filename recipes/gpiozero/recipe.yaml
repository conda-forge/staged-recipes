schema_version: 1

context:
  # 3.10 floor so the importlib-resources/importlib-metadata backports (only
  # needed on <3.10) can be dropped; noarch recipes can't use selectors.
  python_min: "3.10"
  version: "2.0.1"

package:
  name: gpiozero
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/g/gpiozero/gpiozero-${{ version }}.tar.gz
  sha256: d4ea1952689ec7e331f9d4ebc9adb15f1d01c2c9dcfabb72e752c9869ab7e97e

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  python:
    entry_points:
      - pinout = gpiozerocli.pinout:main
      - pintest = gpiozerocli.pintest:main

requirements:
  host:
    - python ${{ python_min }}.*
    - setuptools
    - pip
  run:
    - python >=${{ python_min }}
    - colorzero

tests:
  - python:
      imports:
        - gpiozero
        - gpiozerocli
      pip_check: true
      python_version: ${{ python_min }}.*
  - requirements:
      run:
        - pip
        - python
    script:
      - pinout --help
      - pintest --help

about:
  summary: A simple interface to GPIO devices with Raspberry Pi
  description: |
    A simple interface to GPIO devices with Raspberry Pi, developed and
    maintained with Ben Nuttall of the Raspberry Pi Foundation.

    The library provides a friendly Pythonic API for common GPIO components
    such as LEDs, buttons, motors, sensors, and more, along with the
    `pinout` and `pintest` command line tools. It supports multiple pin
    libraries through pluggable pin factories (lgpio, rpi.gpio, pigpio,
    native) and includes remote GPIO support as well as mock pins for
    testing on machines without GPIO hardware.
  license: BSD-3-Clause
  license_file: LICENSE.rst
  homepage: https://gpiozero.readthedocs.io/
  repository: https://github.com/gpiozero/gpiozero
  documentation: https://gpiozero.readthedocs.io/

extra:
  recipe-maintainers:
    - ruben-arts
