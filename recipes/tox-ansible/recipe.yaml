schema_version: 1

context:
  version: "26.3.0"

package:
  name: tox-ansible
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/t/tox-ansible/tox_ansible-${{ version }}.tar.gz
  sha256: 0c036cc5148a2907d62f725caebbcb5fe302b449fbfe7001ce28728d652d710f

build:
  number: 0
  skip:
    - win
    - match(python, "<3.11")
    - match(python, ">=3.12")
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python
    - pip
    - setuptools_scm >=7.0.5
    - setuptools >=65.3.0
  run:
    - python
    - pytest >=8.4.1
    - pytest-ansible >=3.1.0
    - pytest-xdist >=3.8.0
    - pyyaml >=6.0.1
    - tox >=4.47.3

tests:
  - python:
      imports:
        - tox_ansible
      pip_check: true

about:
  summary: |
    A radical approach to testing ansible content
  homepage: https://pypi.org/project/tox-ansible/
  repository: https://pypi.org/project/tox-ansible/
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - killua156
    - mgorny
