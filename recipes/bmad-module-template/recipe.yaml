# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  name: bmad-module-template
  # Synthetic version: upstream is a GitHub template repo with no tags or
  # versioned releases. Bump to "0.2.0" etc. when the pinned commit changes.
  version: "0.1.0"
  commit: f1440ec80b9c8b13e0779dedd47487b74d634a02

package:
  name: ${{ name }}
  version: ${{ version }}

source:
  url: https://github.com/bmad-code-org/bmad-module-template/archive/${{ commit }}.tar.gz
  sha256: 80f8761a68db114266ce853599d2265448fb909bf1fdffe6357275f2b8b9380a

build:
  number: 0
  noarch: generic

requirements:
  run:
    - python >=3.10

tests:
  - script:
      - if: not win
        then:
          - bmad-module-template-init --help
          - test -f "${CONDA_PREFIX}/share/bmad-module-template/.claude-plugin/marketplace.json"
          - test -d "${CONDA_PREFIX}/share/bmad-module-template/skills"
          - test -f "${CONDA_PREFIX}/share/bmad-module-template/README.md"
      - if: win
        then:
          - bmad-module-template-init.bat --help
          - if not exist "%CONDA_PREFIX%\share\bmad-module-template\.claude-plugin\marketplace.json" exit 1
          - if not exist "%CONDA_PREFIX%\share\bmad-module-template\skills" exit 1

about:
  homepage: https://github.com/bmad-code-org/bmad-module-template
  repository: https://github.com/bmad-code-org/bmad-module-template
  license: MIT
  license_file: LICENSE
  summary: BMad Method module template for scaffolding new installable BMad modules
  description: |
    bmad-module-template ships the BMad Method module skeleton (skills tree,
    `.claude-plugin/marketplace.json`, docs scaffold, LICENSE, README) as a
    conda package. The bundled `bmad-module-template-init` helper copies the
    template tree to a target directory so users can scaffold a new module
    without going through GitHub's "Use this template" flow.

    NOTE: the upstream LICENSE file currently contains placeholder text
    (`Copyright (c) TODO: YEAR YOUR-NAME`); the marketplace manifest similarly
    uses `my-module` / `Your Name` placeholders. The intended workflow is for
    template consumers to fill these in for their own module — not for the
    template itself to be a finished artifact. Submission to conda-forge is
    held until upstream adds a real (non-placeholder) LICENSE.

extra:
  recipe-maintainers:
    - rxm7706
