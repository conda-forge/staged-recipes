context:
  version: "2.0.0"
  build_number: 0
  python_min: "3.12"

  # conda-forge uses this to select the CUDA variant
  cuda_version: ${{ env.get("CONDA_OVERRIDE_CUDA", default="None") }}
  cuda: ${{ "ON" if cuda_version != "None" else "OFF" }}

source:
  url: https://github.com/KUL-recon-lab/libparallelproj/archive/v2.0.0-rc12.tar.gz
  sha256: c0f1a02810fa5cec17e97e9aae464e1b13da04c86b0a4ba17fafaae2deef9a5e

about:
  homepage: https://github.com/KUL-recon-lab/libparallelproj
  license: Apache-2.0
  license_file: LICENSE
  documentation: https://libparallelproj.readthedocs.io
  repository: https://github.com/KUL-recon-lab/libparallelproj

extra:
  recipe-maintainers:
    - gschramm

outputs:
  # ---------------------------------------------------------------------------
  # 1) C++ library + headers + CMake config
  # ---------------------------------------------------------------------------
  - package:
      name: libparallelproj
      version: ${{ version }}

    build:
      number: ${{ build_number }}
      script:
        - if: win
          then: |
            cmake -S "%SRC_DIR%" -B "%SRC_DIR%/_build_lib" -GNinja ^
              -DCMAKE_BUILD_TYPE=Release ^
              -DPROJECT_VERSION_OVERRIDE=${{ version }} ^
              -DCMAKE_INSTALL_PREFIX="%PREFIX%" ^
              -DCMAKE_INSTALL_LIBDIR=lib ^
              -DUSE_CUDA=${{ cuda }} ^
              -DBUILD_LIBRARY=ON ^
              -DINSTALL_DEVEL=ON ^
              -DBUILD_PYTHON=OFF ^
              -DBUILD_TESTS=OFF ^
              -DCMAKE_PREFIX_PATH="%PREFIX%"
            cmake --build "%SRC_DIR%\_build_lib"
            cmake --install "%SRC_DIR%\_build_lib"
          else: |
            cmake -S "$SRC_DIR" -B "$SRC_DIR/_build_lib" -GNinja \
              -DCMAKE_BUILD_TYPE=Release \
              -DPROJECT_VERSION_OVERRIDE=${{ version }} \
              -DCMAKE_INSTALL_PREFIX="$PREFIX" \
              -DCMAKE_INSTALL_LIBDIR=lib \
              -DUSE_CUDA=${{ cuda }} \
              -DBUILD_LIBRARY=ON \
              -DINSTALL_DEVEL=ON \
              -DBUILD_PYTHON=OFF \
              -DBUILD_TESTS=OFF \
              -DCMAKE_PREFIX_PATH="$PREFIX"
            cmake --build "$SRC_DIR/_build_lib"
            cmake --install "$SRC_DIR/_build_lib"

      variant:
        # Keep the variant key stable across CPU/CUDA builds
        use_keys:
          - cuda_version
        down_prioritize_variant: ${{ 0 if cuda == "ON" else 1 }}

    requirements:
      build:
        - ${{ compiler('cxx') }}
        - ${{ stdlib('c') }}
        - cmake
        - ninja
        - if: cuda == "ON"
          then:
            - ${{ compiler('cuda') }}
      host:
        - if: osx
          then: llvm-openmp
        - if: cuda == "ON"
          then:
            # pins the CUDA "feature" variant (conda-forge mechanism)
            - cuda-version ==${{ cuda_version }}
      run:
        - if: osx
          then: llvm-openmp
        - if: cuda == "ON"
          then:
            # ensures only installable in CUDA environments
            - __cuda
            - cuda-cudart  # ensure this matches your conda-forge CUDA stack

    tests:
      - package_contents:
          files:
            exists:
              # --- shared library artifacts ---
              - if: win
                then: bin/parallelproj.dll
              - if: win
                then: lib/parallelproj.lib
              - if: linux
                then: lib/libparallelproj.so
              - if: osx
                then: lib/libparallelproj.dylib

              # --- CMake package config ---
              - lib/cmake/parallelproj/parallelprojConfig.cmake
              - lib/cmake/parallelproj/parallelprojConfigVersion.cmake
              - lib/cmake/parallelproj/parallelprojTargets.cmake

              # --- public headers ---
              - include/cuda_compat.h
              - include/cuda_utils.h
              - include/debug.h
              - include/parallelproj.h
              - include/parallelproj_export.h
              - include/utils.h

    about:
      summary: C++/CUDA backend projector library (parallelproj) for tomographic reconstruction
      description: |
        libparallelproj builds and installs the parallelproj shared library (CPU/OpenMP or CUDA),
        public headers, and a CMake package configuration for downstream CMake projects.

  # ---------------------------------------------------------------------------
  # 2) Python extension only (nanobind module), links against libparallelproj
  # ---------------------------------------------------------------------------

  - package:
      name: parallelproj-core
      version: ${{ version }}

    build:
      number: ${{ build_number }}
      python:
        version_independent: true
      script:
        - if: win
          then: |
            cmake -S "%SRC_DIR%" -B "%SRC_DIR%/_build_py" -GNinja ^
              -DCMAKE_BUILD_TYPE=Release ^
              -DPROJECT_VERSION_OVERRIDE=${{ version }} ^
              -DCMAKE_INSTALL_PREFIX="%PREFIX%" ^
              -DCMAKE_INSTALL_LIBDIR=lib ^
              -DUSE_CUDA=OFF ^
              -DBUILD_LIBRARY=OFF ^
              -DINSTALL_DEVEL=OFF ^
              -DBUILD_PYTHON=ON ^
              -DBUILD_TESTS=OFF ^
              -DCMAKE_PREFIX_PATH="%PREFIX%" ^
              -DPython_EXECUTABLE="%PYTHON%" ^
              -DPython_ROOT_DIR="%PREFIX%" ^
              -DPYTHON_INTERFACE_INSTALL_DIR="%SP_DIR%"
            cmake --build "%SRC_DIR%\_build_py"
            cmake --install "%SRC_DIR%\_build_py"
          else: |
            cmake -S "$SRC_DIR" -B "$SRC_DIR/_build_py" -GNinja \
              -DCMAKE_BUILD_TYPE=Release \
              -DPROJECT_VERSION_OVERRIDE=${{ version }} \
              -DCMAKE_INSTALL_PREFIX="$PREFIX" \
              -DCMAKE_INSTALL_LIBDIR=lib \
              -DUSE_CUDA=OFF \
              -DBUILD_LIBRARY=OFF \
              -DINSTALL_DEVEL=OFF \
              -DBUILD_PYTHON=ON \
              -DBUILD_TESTS=OFF \
              -DCMAKE_PREFIX_PATH="$PREFIX" \
              -DPython_EXECUTABLE="$PYTHON" \
              -DPython_ROOT_DIR="$PREFIX" \
              -DPYTHON_INTERFACE_INSTALL_DIR="$SP_DIR"
            cmake --build "$SRC_DIR/_build_py"
            cmake --install "$SRC_DIR/_build_py"

      files:
        - lib/python*/site-packages/parallelproj_core*.so
        - lib/python*/site-packages/parallelproj_core*.dylib
        - lib/python*/site-packages/parallelproj_core*.pyd
        - Lib/site-packages/parallelproj_core*.pyd
        - Lib/site-packages/parallelproj_core*.dll

      variant:
        use_keys:
          - cuda_version
        down_prioritize_variant: ${{ 0 if cuda == "ON" else 1 }}

    requirements:
      build:
        - ${{ compiler('cxx') }}
        - ${{ stdlib('c') }}
        - cmake
        - ninja

      host:
        - python ${{ python_min }}.*
        - python-abi3 ${{ python_min }}.*
        - nanobind
        - libparallelproj ==${{ version }}

      run:
        - python >=${{ python_min }}
        - python-abi3 >=${{ python_min }}
        - libparallelproj ==${{ version }}

    tests:
      - script:
        - python -c "import parallelproj_core as m; print(m.__file__, ', cuda_enabled =', int(m.cuda_enabled))"
        - if: cuda == "ON"
          then:
            - python -c "import parallelproj_core as m; assert int(m.cuda_enabled) == 1, f'expected cuda_enabled=1, got {m.cuda_enabled}'"
          else:
            - python -c "import parallelproj_core as m; assert int(m.cuda_enabled) == 0, f'expected cuda_enabled=0, got {m.cuda_enabled}'"
        - pytest -v ./tests

        requirements:
          run:
            - pytest
            - numpy
            - array-api-compat
            - array-api-strict
        files:
          source:
            - tests/  

    about:
      summary: python API for parallelproj C++ library, built as a nanobind extension module
      description: |
        parallelproj-core is a Python extension module built with nanobind that provides a Python API for the parallelproj C++/CUDA library
