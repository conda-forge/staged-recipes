context:
  version: "0.2.0"

package:
  name: multimark
  version: ${{ version }}

source:
  url: https://github.com/posit-dev/multimark/archive/refs/tags/v${{ version }}.tar.gz
  sha256: 94a8e2f73769df05e5eab99e9fbbbf48525171918f9529ea904241d16870ee91
  patches:
    - patches/use-system-cmark-gfm.patch

build:
  number: 0
  skip:
    - linux and aarch64
    - osx and arm64
  script:
    content: python -m pip install . -vv --no-deps --no-build-isolation
    env:
      SETUPTOOLS_SCM_PRETEND_VERSION: ${{ version }}

requirements:
  build:
    - ${{ compiler('c') }}
    - ${{ stdlib('c') }}
  host:
    - python
    - pip
    - setuptools >=68
    - setuptools_scm >=6.2
    - cffi >=1.15
    - cmark-gfm
  run:
    - python
    - cffi >=1.15
    - cmark-gfm
    - click >=8.0

tests:
  - python:
      imports:
        - multimark
      pip_check: true
  - if: unix
    then:
      - script:
          - multimark --help

about:
  homepage: https://github.com/posit-dev/multimark
  repository: https://github.com/posit-dev/multimark
  license: MIT AND BSD-2-Clause
  license_file: LICENSE
  summary: Python bindings to cmark-gfm — CommonMark parsing and rendering (HTML, LaTeX, man, XML, CommonMark)
  description: |
    multimark provides fast Python bindings to cmark-gfm, the C reference
    implementation of CommonMark with GitHub Flavored Markdown extensions.

    It exposes five output renderers — HTML, LaTeX, groff man, XML, and
    normalized CommonMark — through a consistent, keyword-argument-based API.
    All GFM extensions (tables, strikethrough, autolinks, task lists, tag
    filtering) are supported, and raw HTML is safely stripped by default.

extra:
  recipe-maintainers:
    - rich-iannone
    - timkpaine
