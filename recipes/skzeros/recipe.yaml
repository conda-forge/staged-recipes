schema_version: 1

context:
  version: "0.0.2"

package:
  name: skzeros
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/s/skzeros/skzeros-${{ version }}.tar.gz
  sha256: 2789ec76e022dd1ea9590bec18c840af1aa2d5451bbeabcf7b756a35871eb235

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - hatchling
    - hatch-vcs
    - pip
  run:
    - python >=${{ python_min }}
    - numpy >=2
    - scipy >=1.15
    - matplotlib-base

tests:
  - python:
      imports:
        - skzeros
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  summary: A package to compute all the poles and zeros of a holomorphic function in a region of the complex plane.
  license: MIT
  license_file: LICENSE
  homepage: https://github.com/j-bowhay/scikit-zeros

extra:
  recipe-maintainers:
    - JaRoSchm
