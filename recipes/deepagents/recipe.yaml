schema_version: 1

context:
  version: "0.5.9"
  python_min: "3.11"

package:
  name: deepagents
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/d/deepagents/deepagents-${{ version }}.tar.gz
  sha256: 74fe0f998641b20bda8adac662a018051c623a3c8e5ed4b6ff9ad53fc493a783

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - setuptools >=73.0.0
    - wheel
    - pip
  run:
    - python >=${{ python_min }}
    - langchain-core >=1.3.2,<2.0.0
    - langsmith >=0.8.0
    - langchain >=1.2.17,<2.0.0
    - langchain-anthropic >=1.4.3,<2.0.0
    - langchain-google-genai >=4.2.2,<5.0.0
    - wcmatch

tests:
  - python:
      imports:
        - deepagents
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  summary: General purpose 'deep agent' with sub-agent spawning, todo list capabilities, and mock file system. Built on LangGraph.
  license: MIT
  license_file: LICENSE
  homepage: https://docs.langchain.com/oss/python/deepagents/overview
  repository: https://github.com/langchain-ai/deepagents
  documentation: https://reference.langchain.com/python/deepagents/

extra:
  recipe-maintainers:
    - timpalpant
