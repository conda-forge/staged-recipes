{% set name = "deepagents" %}
{% set version = "0.4.12" %}
{% set python_min = "3.11" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/deepagents-{{ version }}.tar.gz
  sha256: fc24a691e5cba00920ac4fa1d94f8147d6081fe513ed22bdba7da469288681c3

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - setuptools >=73.0.0
    - wheel
    - pip
  run:
    - python >={{ python_min }}
    - langchain-core >=1.2.18,<2.0.0
    - langchain >=1.2.11,<2.0.0
    - langchain-anthropic >=1.3.4,<2.0.0
    - langchain-google-genai >=4.2.0,<5.0.0
    - wcmatch

test:
  imports:
    - deepagents
  commands:
    - pip check
  requires:
    - python {{ python_min }}
    - pip

about:
  home: https://github.com/langchain-ai/deepagents
  doc_url: https://docs.langchain.com/oss/python/deepagents/overview
  summary: Agent harness built with LangChain and LangGraph. Equipped with a planning tool, a filesystem backend, and the ability to spawn subagents - well-equipped to handle complex agentic tasks.
  dev_url: https://github.com/langchain-ai/deepagents/tree/main/libs/deepagents
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - ccurme
    - mdrxy
