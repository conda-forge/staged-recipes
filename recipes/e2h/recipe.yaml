context:
  name: e2h
  version: "1.0.0"

package:
  name: ${{ name }}
  version: ${{ version }}

source:
  url: https://gitlab.com/earthscope/public/epic/passoft/e2h/-/archive/v${{ version }}/e2h-v${{ version }}.tar.gz
  sha256: e179e5644a30b2236f351d59bc648a2aab64382fb8b50e6eaea69c7a2be64d6f 

build:
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - setuptools
  run:
    - python >=${{ python_min }}

tests:
  - python:
      imports:
        - e2h
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"
  - script:
      - e2h 1781797883
  - script:
      - python -m unittest discover -s tests
    requirements:
      run:
        - python ${{ python_min }}.*
    files:
      source:
        - tests/

about:
  homepage: https://epic.earthscope.org/content/software-resources
  summary: Convert a given epoch to a human readable format
  description: |
    e2h is a command-line utility that accepts an epoch timestamp
    as input and returns the corresponding time in Greenwich Mean Time
    (GMT).
  license: GPL-3.0-or-later
  license_file: LICENSE
  repository: https://gitlab.com/earthscope/public/epic/passoft/e2h

extra:
  recipe-maintainers:
    - omid-earthscope
