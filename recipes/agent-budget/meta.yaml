{% set name = "agent-budget" %}
{% set version = "0.1.0" %}
{% set python_min = "3.10" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://github.com/MukundaKatta/{{ name }}/releases/download/v{{ version }}/{{ name|replace('-', '_') }}-{{ version }}.tar.gz
  sha256: c6a97a5fd35d71bc06f3bef5aa5f313b279914a9f450dd04dee39042b369e78c

build:
  number: 0
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python {{ python_min }}
    - uv-build >=0.11.7,<0.12
    - pip
  run:
    - python >={{ python_min }}

test:
  imports:
    - agent_budget
  requires:
    - python {{ python_min }}
    - pip
  commands:
    - pip check
    - python -c "from agent_budget import budget, BudgetExceeded, AdversarialLoopDetected, AttemptEvent"

about:
  home: https://github.com/MukundaKatta/agent-budget
  license: Apache-2.0
  license_family: APACHE
  license_file: LICENSE
  summary: Production retry/budget primitive for LLM and agent calls
  description: |
    The retry/budget primitive ``tenacity`` isn't, with the three things
    that matter for production LLM-shaped work: cost cap, structured
    per-attempt events, and adversarial-loop detection.

    Wraps any callable with cost cap, attempts cap, wall-clock cap,
    exponential backoff (clamped to remaining wall-clock), exception
    classification (``retry_on`` / ``fatal_on`` / ``unknown``), structured
    ``AttemptEvent`` lifecycle hooks, and adversarial-loop detection via
    error fingerprinting that catches the retry-amplification class of
    bug from Instructor #2056. Zero runtime dependencies.
  doc_url: https://github.com/MukundaKatta/agent-budget
  dev_url: https://github.com/MukundaKatta/agent-budget

extra:
  recipe-maintainers:
    - MukundaKatta
