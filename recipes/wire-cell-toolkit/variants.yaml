# Variant config for the WCT recipe. rattler-build auto-discovers this file in
# the recipe directory. It supplies the values the conda-forge-style jinja
# functions need that have no built-in default:
#   ${{ stdlib('c') }} -> <c_stdlib>_<target_platform> pinned to <c_stdlib_version>
# On linux-64 that resolves to sysroot_linux-64 (glibc 2.17 / manylinux2014
# baseline), matching conda-forge's standard toolchain.
c_stdlib:
  - sysroot
c_stdlib_version:
  - "2.17"

# --- optional-feature toggles -------------------------------------------------
# Each key is a build-time switch gating both a host dep (jinja `if:` in
# recipe.yaml) and a `--with-<feat>` flag in build.sh. Each has a SINGLE value,
# so it does NOT expand the build matrix: conda-forge builds exactly one,
# fully-featured package with every toggle ON.
#
# To turn a feature OFF for a LOCAL build, override the value, e.g.:
#   rattler-build build --recipe recipe.yaml \
#     --variant-config <(echo 'wct_with_root: ["false"]')
# (or just edit the value here). This is a build-time choice: the shipped
# conda-forge binary is built one way and "turning it off" means rebuilding.
wct_with_root:
  - "true"
wct_with_libtorch:
  - "true"
