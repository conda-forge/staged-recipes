# Variant config for the WCT recipe. MUST be named conda_build_config.yaml (not
# variants.yaml): rattler-build auto-discovers both, but only honors the legacy
# `# [linux]`/`# [osx]` selectors in a file with THIS name.
#
# c_stdlib / c_stdlib_version supply the values ${{ stdlib('c') }} needs (it has
# no built-in default) for a bare LOCAL build. They are gated `# [linux]` ON
# PURPOSE: on linux-64 this resolves to sysroot_linux-64 (glibc 2.17 /
# manylinux2014), matching conda-forge's pin. We deliberately do NOT set them on
# osx -- a global "2.17" there sets the macOS deployment target below conda-forge's
# 11.0 baseline (the staged-recipes lint). With the selector, osx inherits the
# conda-forge global baseline instead. (The package is linux-only anyway via
# `skip: not linux`, but the value still has to not violate the osx baseline.)
c_stdlib:
  - sysroot                  # [linux]
c_stdlib_version:
  - "2.17"                   # [linux]

# --- optional-feature toggles -------------------------------------------------
# Each key is a build-time switch gating both a host dep (jinja `if:` in
# recipe.yaml) and a `--with-<feat>` flag in build.sh. Each has a SINGLE value,
# so it does NOT expand the build matrix: conda-forge builds exactly one,
# fully-featured package with every toggle ON.
#
# To turn a feature OFF for a LOCAL build, override the value, e.g.:
#   rattler-build build --recipe recipe.yaml \
#     --variant-config <(echo 'wct_with_root: ["false"]')
# (or just edit the value here). This is a build-time choice: the shipped
# conda-forge binary is built one way and "turning it off" means rebuilding.
wct_with_root:
  - "true"
wct_with_libtorch:
  - "true"
# CUDA is OFF by default: the conda-forge default package stays CPU-only. Turn it
# on for a local build (this also switches libtorch to its `cuda*` build) with:
#   --variant-config <(printf 'wct_with_cuda: ["true"]\ncuda_compiler: ["cuda-nvcc"]\ncuda_compiler_version: ["12.9"]\n')
# See BUILD-CUDA.md. (Eventually CUDA becomes its own cpu/cuda variant axis.)
wct_with_cuda:
  - "false"
