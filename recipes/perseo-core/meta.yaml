{% set python_min = "3.11" %}
{% set version = "1.0.0" %}

package:
  name: perseo-core
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/p/perseo-core/perseo_core-{{ version }}.tar.gz
  sha256: 304aa253c9f6fff4a71648d442caecabca518e5ad938ab62acab580d6953fd8c

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python {{ python_min }}.*
    - hatchling
    - pip
  run:
    - python >={{ python_min }}
    - numpy >2
    - scipy >1.15
    - pyproj >=3.5
    - python-dateutil
    - rich >=13.0.0
    - astropy-base >=7.2.0

test:
  imports:
    - perseo_core
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}.*

about:
  home: https://github.com/aresys-srl/perseo
  summary: 'Python Ecosystem for Remote Sensing & Earth Observation: generic, broadly used operations and structures for SAR processing.'
  doc_url: https://aresys-srl.github.io/perseo
  license: MIT
  license_file: LICENSE.txt

extra:
  recipe-maintainers:
    - matteoaletti
