schema_version: 1

context:
  name: pymatgen-io-aims
  version: "0.2.1"

package:
  name: ${{ name | lower }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/${{ name[0] }}/${{ name }}/pymatgen_io_aims-${{ version }}.tar.gz
  sha256: fea6acfb5159c6e9c4cd899333217005397b2bffaa31f1338eb84ce59ab9aed3

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - setuptools
    - pip
  run:
    - python >=${{ python_min }}
    - pymatgen >=2022.0.3
    - pyfhiaims >=1.1.0

tests:
  - python:
      imports:
        - pymatgen.io.aims
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  summary: pymatgen-io-aims is a pymatgen addon that bridges the gap between FHI-aims and the pymatgen ecosystem
  license: MIT
  license_file: LICENSE
  homepage: https://gitlab.com/FHI-aims-club/pymatgen-io-aims
  repository: https://gitlab.com/FHI-aims-club/pymatgen-io-aims


extra:
  recipe-maintainers:
    - ansobolev
    - tpurcell90
