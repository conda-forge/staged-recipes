schema_version: 1

context:
  version: "26.4.0"

package:
  name: ansible-navigator
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/a/ansible-navigator/ansible_navigator-${{ version }}.tar.gz
  sha256: 1690c55b236796ddbcc001ba3a0263c2f2be50c0840f21f83fd7d0fade49f054

build:
  number: 0
  skip:
    - win
    - match(python, "<3.11")
    - match(python, ">=3.12")
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  python:
    entry_points:
      - ansible-navigator = ansible_navigator.cli:main

requirements:
  host:
    - python
    - pip
    - setuptools >=45
    - setuptools_scm >=7.0
  run:
    - python
    - ansible-builder >=3.0.0
    - ansible-runner <3,>=2.3.1
    - ansible-lint >=6.19.0
    - jinja2
    - jsonschema
    - onigurumacffi <2,>=1.1.0
    - pyyaml
    - setuptools >=63.1.0
    - python-tzdata

tests:
  - python:
      imports:
        - ansible_navigator
      pip_check: true

about:
  summary: |
    A text-based user interface (TUI) for the Red Hat Ansible Automation Platform
  homepage: https://pypi.org/project/ansible-navigator/
  repository: https://pypi.org/project/ansible-navigator/
  license: Apache-2.0
  license_file: LICENSE

extra:
  recipe-maintainers:
    - killua156
    - mgorny
