schema_version: 1

context:
  version: "0.7.0"
  python_min: "3.11"

package:
  name: mqtt5
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/m/mqtt5/mqtt5-${{ version }}.tar.gz
  sha256: b210ce32ce98731b42589a0ae655a10511fb61052a4b9e0afbfc70937b9cbd16

build:
  number: 0

  # we only build 1 package for each target platform
  python:
    version_independent: true

  script:
    env:
      # JEMALLOC_SYS_WITH_LG_PAGE: ${{ '16' if aarch64 else '' }}
      PYTHONIOENCODING: utf-8
      # CARGO_PROFILE_RELEASE_STRIP: symbols
      # CARGO_PROFILE_RELEASE_LTO: fat
    content:
      - ${{ PYTHON }} -m pip install -v --use-pep517 --no-deps --no-build-isolation .
      - cargo-bundle-licenses --format yaml --output THIRDPARTY.yml

requirements:
  build:
    - ${{ compiler('c') }}
    - ${{ compiler('rust') }}
    - ${{ stdlib('c') }}
    - cargo-bundle-licenses
    - maturin >=1.13.1
    - if: build_platform != target_platform
      then:
        - python ${{ python_min }}.*
        - cross-python_${{ target_platform }}
  host:
    - maturin <2.0
    - python ${{ python_min }}.*
    - pip
  run:
    - python >=${{ python_min }}

tests:
  - python:
      imports:
        - mqtt5
      pip_check: true

about:
  homepage: https://github.com/empicano/mqtt5
  summary: 'The MQTTv5 protocol for Python written in Rust'
  description: |
    A sans-I/O implementation of the MQTTv5 protocol for Python,
    written in Rust. Serialization is ~5x faster and deserialization
    ~20x faster than comparable Python code
  license: BSD-3-Clause
  license_file:
    - LICENSE
    - THIRDPARTY.yml
  repository: https://github.com/empicano/mqtt5

extra:
  recipe-maintainers:
    - MementoRC
