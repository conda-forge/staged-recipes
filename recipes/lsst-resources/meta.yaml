{% set version = "30.2026.1400" %}
{% set python_min = "3.11.0" %}

package:
  name: lsst-resources
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/l/lsst-resources/lsst_resources-{{ version }}.tar.gz
  sha256: 5d2c360c3b8904b0ae5737629d870c79b717d5761463222dd289c50a121c7a81

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - setuptools
    - lsst-versions >=1.3.0
    - pip
  run:
    - python >={{ python_min }}
    - lsst-utils

test:
  imports:
    - lsst
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://github.com/lsst/resources
  summary: An abstraction layer for reading and writing from URI file resources.
  dev_url: https://github.com/lsst/resources
  license: BSD-3-Clause
  license_file:
    - LICENSE
    - COPYRIGHT

extra:
  recipe-maintainers:
    - roceb
    - rhiannonlynne
