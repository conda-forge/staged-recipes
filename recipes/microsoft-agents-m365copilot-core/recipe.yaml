# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "1.0.0"

package:
  name: microsoft-agents-m365copilot-core
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/m/microsoft-agents-m365copilot-core/microsoft_agents_m365copilot_core-${{ version }}.tar.gz
  sha256: 75847c4344f10a76442eb74870fc4f533b56ddbb2b4d1b071cfdf5204ad92f65

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - poetry-core
    - pip
  run:
    - python >=${{ python_min }}
    - microsoft-kiota-abstractions >=1.8.0,<2.0.0
    - microsoft-kiota-authentication-azure >=1.8.0,<2.0.0
    - microsoft-kiota-http >=1.8.0,<2.0.0
    - httpx >=0.23.0
    - azure-identity >=1.23.0,<2.0.0

tests:
  - python:
      imports:
        - microsoft_agents_m365copilot_core
      pip_check: true
      python_version:
      - ${{ python_min }}.*
      - "*"

about:
  summary: Core component of the Microsoft Agents M365 Copilot Python SDK
  license: MIT
  license_file: LICENSE
  homepage: https://github.com/microsoft/Agents-M365Copilot/tree/main/python
  repository: https://github.com/microsoft/Agents-M365Copilot
  documentation: https://github.com/microsoft/Agents-M365Copilot/tree/main/python/packages/microsoft_agents_m365copilot_core

extra:
  recipe-maintainers:
    - rxm7706
