{% set name = "clusterrunner" %}
{% set version = "1.0.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/clusterrunner-{{ version }}.tar.gz
  sha256: 0228947e59440ba6c76338e30107c251d3537e68627c61586cdf90f13bb8673f

build:
  number: 0
  noarch: python
  script: 
    - set "PYTHONUTF8=1"  # [win]
    - "{{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation"
  entry_points:
    - clusterrunner = clusterrunner.main:main

requirements:
  host:
    - python {{ python_min }}
    - pip
    - setuptools
  run:
    - python >={{ python_min }}
    - paramiko

test:
  imports:
    - clusterrunner
  commands:
    - pip check
  requires:
    - python {{ python_min }}
    - pip

about:
  home: https://github.com/algotom/clusterrunner
  license: Apache-2.0
  license_file: LICENSE
  summary: GUI software for submitting and managing Python jobs on Slurm Clusters

extra:
  recipe-maintainers:
    - nghia-vo
