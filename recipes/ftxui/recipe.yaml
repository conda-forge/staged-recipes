context:
  version: "6.1.9"

package:
  name: ftxui
  version: ${{ version }}

source:
  url: https://github.com/ArthurSonzogni/FTXUI/releases/download/v${{ version }}/source.tar.gz
  sha256: 868670e451c38bdc3ad23d086796543cde4a845fd0420148b198dff5cbe08285

build:
  number: 0
  script:
    content:
      - mkdir -p build
      - cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release -DCMAKE_INSTALL_PREFIX=${PREFIX} -DCMAKE_INSTALL_LIBDIR=lib
      - cmake --build build --parallel ${CPU_COUNT}
      - cmake --install build --prefix ${PREFIX}

requirements:
  build:
    - cmake
    - ninja
    - pkg-config
    - ${{ compiler('c') }}
    - ${{ compiler('cxx') }}
  host:
    - libstdcxx-ng
    - ncurses
  run:
    - libstdcxx-ng
    - ncurses

tests:
  - script:
      - true

about:
  homepage: https://github.com/ArthurSonzogni/FTXUI
  license: MIT
  license_file: LICENSE
  summary: "Flexible terminal user interface library for C++"

extra:
  recipe-maintainers:
    - rgrieco
