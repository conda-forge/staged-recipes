context:
  version: "6.1.9"

package:
  name: ftxui
  version: ${{ version }}

source:
  url: https://github.com/ArthurSonzogni/FTXUI/releases/download/v${{ version }}/source.tar.gz
  sha256: 868670e451c38bdc3ad23d086796543cde4a845fd0420148b198dff5cbe08285

build:
  number: 0

requirements:
  build:
    - cmake
    - ninja
    - ${{ stdlib("c") }}
    - ${{ compiler('c') }}
    - ${{ compiler('cxx') }}

tests:
  - package_contents:
      include:
        - ftxui/**
      lib:
        - ftxui-component
        - ftxui-dom
        - ftxui-screen

about:
  homepage: https://github.com/ArthurSonzogni/FTXUI
  license: MIT
  license_file: LICENSE
  summary: "Flexible terminal user interface library for C++"

extra:
  recipe-maintainers:
    - RiccardoGrieco
