context:
  gem_name: "net-scp"
  version: "4.1.0"

package:
  name: rb-${{ gem_name }}
  version: ${{ version }}

source:
  url: https://rubygems.org/downloads/${{ gem_name }}-${{ version }}.gem
  sha256: a99b0b92a1e5d360b0de4ffbf2dc0c91531502d3d4f56c28b0139a7c093d1a5d

build:
  noarch: generic
  number: 0
  script: build

requirements:
  host:
    - ruby
  run:
    - ruby
    - rb-net-ssh >=2.6.5,<8.0.0

tests:
  - script:
      - ruby -r net/scp -e "exit 0"

about:
  homepage: https://rubygems.org/gems/${{ gem_name }}
  summary: A pure-Ruby implementation of the SCP protocol.
  license: MIT
  license_file: ${{ gem_name }}-${{ version }}/LICENSE.txt
  repository: https://github.com/net-ssh/net-scp

extra:
  recipe-maintainers:
    - aktech
