context:
  version: "2.1.1"
  python_min: "3.9"


package:
  name: windio
  version: ${{ version }}

source:
- url: https://github.com/IEAWindSystems/windIO/archive/refs/tags/${{ version }}.tar.gz
  sha256: 0c7fd4d3a5e9fbedb519e14fe4db337d6c26ea32b09a55af83b4be60fe43c0fa

build:
  script:
    env:
      SETUPTOOLS_SCM_PRETEND_VERSION: ${{ version }}
    content: ${{ PYTHON }} -m pip install . --no-deps --no-build-isolation
  number: 0
  python:
    entry_points:
    - windio_converter = windIO.converters.windIO2windIO:run
  noarch: python

requirements:
  host:
  - python ${{ python_min }}.*
  - setuptools >=40.6.0
  - setuptools-scm >=8.0
  - wheel
  - pip
  run:
  - python >=${{ python_min }}
  - jsonschema
  - ruamel.yaml
  - xarray
  - netcdf4


tests:
- script:
    - pytest -n auto -vvv
  requirements:
      run:
        - pytest
        - pytest-xdist
        - python ${{ python_min }}.*
        - pint
        - scipy
        - numpy
  files:
      source:
        - .

about:
  summary: Frameworks defining the inputs and outputs for systems engineering MDAO of wind turbine and plants.
  license: Apache-2.0
  license_file: LICENSE
  documentation: https://ieawindsystems.github.io/windio
  homepage: "https://github.com/IEAWindSystems/windIO/"

extra:
  recipe-maintainers:
    - julian-belina
