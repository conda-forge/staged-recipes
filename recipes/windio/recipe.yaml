context:
  version: "2.1.1"
  python_min: "3.9"


package:
  name: windio
  version: ${{ version }}

source:
- url: https://github.com/IEAWindSystems/windIO/archive/refs/tags/${{ version }}.tar.gz
  sha256: ca5581a8a54425695b7726713bbc878ad1f2073a767b568166fa1e8340ec7de9

build:
  script: ${{ PYTHON }} -m pip install . --no-deps --no-build-isolation
  number: 0
  python:
    entry_points:
    - windio_converter = windIO.converters.windIO2windIO:run
  noarch: python

requirements:
  host:
  - python ${{ python_min }}.*
  - hatchling
  - pip
  run:
  - python >=${{ python_min }}
  - jsonschema
  - ruamel-yaml
  - xarray
  - netcdf4


tests:
- script:
    - pytest -n auto -vvv
  requirements:
      run:
        - pytest
        - pytest-xdist
        - python ${{ python_min }}.*
        - pint
        - scipy
        - numpy
  files:
      source:
        - .

about:
  summary: Frameworks defining the inputs and outputs for systems engineering MDAO of wind turbine and plants.
  license: Apache-2.0
  license_file: LICENSE.txt
  documentation: https://ieawindsystems.github.io/windio
  homepage: "https://github.com/IEAWindSystems/windIO/"

extra:
  recipe-maintainers:
    - julian-belina