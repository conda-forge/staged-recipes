{% set name = "prometheus-client" %}
{% set version = "0.24.1" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz
  sha256: 7e0ced7fbbd40f7b84962d5d2ab6f17ef88a72504dcf7c0b40737b43b2a461f9

build:
  noarch: python
  number: 0
  script: 
    - {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python {{ python_min }}
    - setuptools
    - pip
  run:
    - python >={{ python_min }}


test:
  imports:
    - from prometheus_client import start_http_server, Summary
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }} 

about:
  home: https://github.com/prometheus/client_python
  summary: 'Prometheus instrumentation library for Python applications '
  license: Apache-2.0
  license_family: Apache
  license_file: LICENSE.txt
  doc_url: https://prometheus.github.io/client_python/
  dev_url: https://github.com/prometheus/client_python
