schema_version: 1

context:
  version: "1.19.2"

package:
  name: aws-ofi-nccl
  version: ${{ version }}

source:
  url: https://github.com/aws/aws-ofi-nccl/archive/refs/tags/v${{ version }}.tar.gz
  sha256: 940a1458eeaa8bf619a24c10b2d317a665de6dc529874c921fa43f4d78da933e

build:
  number: 0
  skip:
    - if: win or osx
      then: true
  script: build.sh

requirements:
  build:
    - ${{ compiler('c') }}
    - ${{ compiler('cxx') }}
    - ${{ stdlib("c") }}
    - autoconf
    - automake
    - cuda-nvcc 
    - libtool
    - pkg-config
    - make
  host:
    - mvapich
    - cuda-toolkit

tests:
  - script:
      - ls ${PREFIX}/lib/libnccl-net*
      - if ldd ${PREFIX}/lib/libnccl-net*.so | grep "not found"; then exit 1; fi

about:
  homepage: https://github.com/aws/aws-ofi-nccl
  license: Apache-2.0 AND BSD-3-Clause AND BSL-1.0
  license_file:
    - LICENSE
    - NOTICE
    - 3rd-party/nccl/LICENSE.txt
    - 3rd-party/boost/LICENSE_1_0.txt
  summary: NCCL OFI plugin enabling GPU-to-GPU communication over libfabric-supported networks
  description: |
    The AWS OFI NCCL plugin implements the NCCL network plugin API on top of
    Libfabric, allowing NCCL (and therefore PyTorch/JAX/etc. collective
    communication) to take advantage of high-performance fabrics such as
    AWS EFA or HPE Slingshot-11 (CXI provider) without requiring application
    changes. Bundles third-party code from NVIDIA NCCL (BSD-3-Clause) and
    Boost (BSL-1.0); see license_file for details.
  repository: https://github.com/aws/aws-ofi-nccl

extra:
  recipe-maintainers:
    - j34ni
