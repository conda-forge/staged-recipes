context:
  name: "cry"
  version: "1.7"
  sha256: "dcee2428f81cba113f82e0c7c42f4d85bff4b8530e5ab5c82c059bed3e570c20"
  build_number: "0"

package:
  name: ${{ name }}
  version: ${{ version }}

source:
  url: http://nuclear.llnl.gov/simulation/${{ name }}_v${{ version }}.tar.gz
  sha256: ${{ sha256 }}
  patches:
    - 0001-add-libCRY-so-fPIC-and-remove-default-test-target.patch

build:
  script:
    - ln -s "${AR}" "${BUILD_PREFIX}/bin/ar" # Fix hardcoded assumption "ar"
    - make -j${CPU_COUNT} CXX=$CXX CC=$CC
    - cp lib/libCRY.* ${PREFIX}/lib/
    - mkdir -p ${PREFIX}/include/cry && cp src/*.h ${PREFIX}/include/cry/
  number: ${{ build_number }}
  skip:
    - win

requirements:
  build:
    - ${{ compiler('cxx') }}
    - ${{ compiler('c') }}
    - ${{ stdlib("c") }}
    - make

tests:
  - script:
    - test -f ${PREFIX}/lib/libCRY.so
    - test -f ${PREFIX}/lib/libCRY.a
    - test -f ${PREFIX}/include/cry/CRYAbsFunction.h
    - test -f ${PREFIX}/include/cry/CRYAbsParameter.h
    - test -f ${PREFIX}/include/cry/CRYBinning.h
    - test -f ${PREFIX}/include/cry/CRYCosLatitudeFunction.h
    - test -f ${PREFIX}/include/cry/CRYData.h
    - test -f ${PREFIX}/include/cry/CRYFunctionDict.h
    - test -f ${PREFIX}/include/cry/CRYGenerator.h
    - test -f ${PREFIX}/include/cry/CRYParamI.h
    - test -f ${PREFIX}/include/cry/CRYParameter.h
    - test -f ${PREFIX}/include/cry/CRYParticle.h
    - test -f ${PREFIX}/include/cry/CRYPdf.h
    - test -f ${PREFIX}/include/cry/CRYPrimary.h
    - test -f ${PREFIX}/include/cry/CRYPrimarySpectrumFunction.h
    - test -f ${PREFIX}/include/cry/CRYSetup.h
    - test -f ${PREFIX}/include/cry/CRYUtils.h
    - test -f ${PREFIX}/include/cry/CRYWeightFunc.h

about:
  homepage: https://nuclear.llnl.gov/simulation/main.html
  summary: 'Correlated cosmic-ray particle showers generator'
  description: |
    The CRY software library generates correlated cosmic-ray particle shower distributions at one of three
    elevations (sea level, 2100 m, and 11300 m) for use as input to transport and detector simulation codes.
  license: BSD-3-Clause
  license_file: src/COPYRIGHT.TXT

extra:
  recipe-maintainers:
    - utk4r-sh
    - GiacomoXT
    - vvsagar
    - AlexanderHeidelbach
