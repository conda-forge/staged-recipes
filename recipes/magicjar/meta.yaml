{% set name = "magicjar" %}
{% set version = "0.1.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://github.com/clintval/{{ name }}/archive/refs/tags/{{ version }}.tar.gz
  sha256: 88666ee75fc795c5fe2b83a3e0a2151e0a7f375f3c1cbe1f36bc879ec2aa6b8f

build:
  number: 0
  skip: true  # [win]
  script:
    - cargo-bundle-licenses --format yaml --output THIRDPARTY.yml
    - cargo install --no-track --locked --root $PREFIX --path .

requirements:
  build:
    - {{ compiler('rust') }}
    - {{ compiler('c') }}
    - {{ stdlib('c') }}
    - cargo-bundle-licenses

test:
  commands:
    - magicjar --help
    - magicjar --version

about:
  home: https://github.com/clintval/magicjar
  license: MIT
  license_file:
    - LICENSE
    - THIRDPARTY.yml
  summary: Make a Java JAR self-executing by prepending a shell preamble.
  description: |
    magicjar turns a Java JAR into a single self-executing file. The input may
    be a JAR, a symlink to one, a conda/bioconda wrapper script, or a shell
    alias; magicjar resolves any of these down to the underlying JAR, prepends
    a portable shell preamble, and writes one executable file. At runtime, JVM
    flags are routed to the JVM and everything else passes through to the
    program.
  dev_url: https://github.com/clintval/magicjar

extra:
  recipe-maintainers:
    - clintval
