context:
  version: "0.1.0"

package:
  name: magicjar
  version: ${{ version }}

source:
  url: https://github.com/clintval/magicjar/archive/refs/tags/${{ version }}.tar.gz
  sha256: 88666ee75fc795c5fe2b83a3e0a2151e0a7f375f3c1cbe1f36bc879ec2aa6b8f

build:
  number: 0
  # magicjar writes a POSIX shell preamble and marks the result executable, so
  # it only makes sense on Unix.
  skip:
    - win
  script:
    env:
      CARGO_PROFILE_RELEASE_STRIP: symbols
      CARGO_PROFILE_RELEASE_LTO: fat
    content:
      - cargo auditable install --locked --no-track --bins --root ${{ PREFIX }} --path .
      - cargo-bundle-licenses --format yaml --output ./THIRDPARTY.yml

requirements:
  build:
    - ${{ stdlib('c') }}
    - ${{ compiler('c') }}
    - ${{ compiler('rust') }}
    - cargo-bundle-licenses
    - cargo-auditable

tests:
  - script:
      - magicjar --help
  - package_contents:
      bin:
        - magicjar
      strict: true

about:
  homepage: https://github.com/clintval/magicjar
  summary: Make a Java JAR self-executing by prepending a shell preamble.
  description: |
    magicjar turns a Java JAR into a single self-executing file. The input may
    be a JAR, a symlink to one, a conda/bioconda wrapper script, or a shell
    alias; magicjar resolves any of these down to the underlying JAR, prepends
    a portable shell preamble, and writes one executable file. At runtime, JVM
    flags are routed to the JVM and everything else passes through to the
    program.
  license: MIT
  license_file:
    - LICENSE
    - THIRDPARTY.yml
  repository: https://github.com/clintval/magicjar

extra:
  recipe-maintainers:
    - clintval
