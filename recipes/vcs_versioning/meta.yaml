{% set version = "1.1.1" %}
{% set python_min = "3.10" %}

package:
  name: vcs_versioning
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/v/vcs_versioning/vcs_versioning-{{ version }}.tar.gz
  sha256: fabd75a3cab7dd8ac02fe24a3a9ba936bf258667b5a62ed468c9a1da0f5775bc

build:
  noarch: python
  entry_points:
    - vcs-versioning = vcs_versioning._cli:main
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - setuptools >=77.0.3
    - packaging >=20
    - typing_extensions
    - pip
  run:
    - python >={{ python_min }}
    - packaging >=20
    - tomli >=1  # Drop tomli dependency when conda-forge drops python 3.10.
    - typing_extensions

test:
  imports:
    - vcs_versioning
  commands:
    - pip check
    - vcs-versioning --help
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://pypi.org/project/vcs-versioning/
  summary: the blessed package to manage your versions by vcs metadata
  doc_url: https://github.com/pypa/setuptools-scm
  dev_url: https://github.com/pypa/setuptools-scm
  license: MIT
  license_file: LICENSE.txt

extra:
  recipe-maintainers:
    - tcompa
