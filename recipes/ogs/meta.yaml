{% set version = "6.5.2" %}

package:
  name: ogs
  version: {{ version }}

source:
  url: https://github.com/ufz/ogs/archive/refs/tags/{{ version }}.tar.gz
  sha256: c558c1935503479223405461b2ccd25727eddd360a20991d902cda4a79e98065

build:
  number: 0
  skip: true  # [win]

requirements:
  build:
    - {{ stdlib('c') }}
    - {{ compiler('c') }}
    - {{ compiler('cxx') }}
    - cmake
    - ninja

  host:
    - libboost-python-devel
    - eigen
    - exprtk
    - hdf5
    - libxml2
    - nlohmann_json
    - pybind11
    - range-v3
    - vtk >=9.3.0
    - zlib

  run:
    - hdf5
    - libxml2
    - vtk >=9.3.0
    - python
    - _openmp_mutex  # [linux]
    - llvm-openmp  # [osx]
    - libtiff

test:
  commands:
    - ogs --version

about:
  home: http://www.opengeosys.org/
  summary: OpenGeoSys (OGS) THMC simulator.
  description: |
    OpenGeoSys (OGS) is a scientific open source project for the development
    of numerical methods for the simulation of thermo-hydro-mechanical-
    chemical (THMC) processes in porous and fractured media. 
  license: BSD-3-Clause
  license_family: BSD
  license_file:
    - LICENSE.txt
    - scripts/cmake/json-cmake/LICENSE
  doc_url: https://www.opengeosys.org/docs
  dev_url: https://gitlab.opengeosys.org/ogs/ogs

extra:
  recipe-maintainers:
    - bilke
