context:
  gem_name: "sshkit"
  version: "1.25.0"

package:
  name: rb-${{ gem_name }}
  version: ${{ version }}

source:
  url: https://rubygems.org/downloads/${{ gem_name }}-${{ version }}.gem
  sha256: c8c6543cdb60f91f1d277306d585dd11b6a064cb44eab0972827e4311ff96744

build:
  noarch: generic
  number: 0
  script: build

requirements:
  host:
    - ruby
  run:
    - ruby
    - rb-base64
    - rb-logger
    - rb-net-scp >=1.1.2
    - rb-net-sftp >=2.1.2
    - rb-net-ssh >=2.8.0
    - rb-ostruct

tests:
  - script:
      - ruby -r sshkit -e "exit 0"

about:
  homepage: https://rubygems.org/gems/${{ gem_name }}
  summary: A comprehensive toolkit for remotely running commands on servers via SSH.
  license: MIT
  license_file: ${{ gem_name }}-${{ version }}/LICENSE.md
  repository: https://github.com/capistrano/sshkit

extra:
  recipe-maintainers:
    - aktech
