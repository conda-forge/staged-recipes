context:
  name: font-ttf-adwaita
  version: "50.0"
  version_maj: ${{ (version | split('.'))[:1] | join('.') }}

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://download.gnome.org/sources/adwaita-fonts/${{ version_maj }}/adwaita-fonts-${{ version }}.tar.xz
  sha256: 4c927fbfeec1c503801ba510c2c94e0054c82c522cf7ba0d3be5d4d41fcf5c86

build:
  number: 0
  noarch: generic
  script:
    - mkdir -p $PREFIX/fonts
    - cp mono/*.ttf $PREFIX/fonts/
    - cp sans/*.ttf $PREFIX/fonts

tests:
  - package_contents:
      files:
        - fonts/AdwaitaSans-Italic.ttf
        - fonts/AdwaitaSans-Regular.ttf
        - fonts/AdwaitaMono-Bold.ttf
        - fonts/AdwaitaMono-BoldItalic.ttf
        - fonts/AdwaitaMono-Italic.ttf
        - fonts/AdwaitaMono-Regular.ttf

about:
  homepage: https://gitlab.gnome.org/GNOME/adwaita-fonts
  summary: "The typefaces for GNOME"
  description: |
    Adwaita Sans, a variation of Inter, and Adwaita Mono, Iosevka customized to match Inter.
  license: OFL-1.1
  license_file: LICENSE
  repository: https://gitlab.gnome.org/GNOME/adwaita-fonts

extra:
  recipe-maintainers:
    - haecker-felix
    - danyeaw
