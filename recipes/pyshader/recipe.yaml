schema_version: 1

context:
  version: "0.7.0"

package:
  name: pyshader
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/p/pyshader/pyshader-${{ version }}.tar.gz
  sha256: 5357c37cb6b9841037c187fa72be5b5e6e131383f6258c880def56f98471ba67

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - setuptools >=45
    - wheel
    - setuptools-scm
    - pip
  run:
    - python >=${{ python_min }}

tests:
  - python:
      imports:
        - pyshader
      pip_check: true
      python_version:
        - ${{ python_min }}.*

about:
  homepage: https://pypi.org/project/pyshader
  repository: https://github.com/pygfx/pyshader
  documentation: https://github.com/pygfx/pyshader/blob/v${{ version }}/README.md
  license: BSD-2-Clause
  license_file: LICENSE
  summary: Write modern GPU shaders in Python!
  description: |
    [SpirV](https://en.wikipedia.org/wiki/Standard_Portable_Intermediate_Representation)
    is a binary platform-independent represenation for GPU shaders. This module
    makes it easier to write SpirV shaders in Python.

    This should be useful for anything built on top of
    [wgpu-py](https://github.com/pygfx/wgpu-py).

extra:
  recipe-maintainers:
    - eunos-1128
