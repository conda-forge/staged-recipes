schema_version: 1

context:
  version: "1.0.2"
  python_min: "3.8"

package:
  name: fracsim
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/f/fracsim/fracsim-${{ version }}.tar.gz
  sha256: 9b44d02819095e6e5cf781072b8915f9f373a2d495412d7f57dfe83e4636ba85

build:
  number: 0
  skip: true
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  python:
    entry_points:
      - fracsim=fracsim.main:main

requirements:
  host:
    - python
    - pip
    - setuptools
    - wheel
  run:
    - python 
    - mmh3 >=4.0.0
    - numpy >=1.21.0
    - pytest >=7.0.0
    - pytest-cov >=4.0.0
tests:
  - python:
      imports:
        - fracsim
      pip_check: true
      python_version: ${{ python_min }}.*
  - requirements:
      run:
        - python ${{ python_min }}.*
    script:
      - fracsim --help

about:
  summary: a FracMinHash-based genome similarity estimator for bacteria
  license: MIT
  license_file: LICENSE
  homepage: https://github.com/zhuyu534/FracSim.git

extra:
  recipe-maintainers:
    - zhuyu534
