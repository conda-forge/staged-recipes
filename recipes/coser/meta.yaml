{% set name = "coser" %}
{% set version = "0.1.0" %}
{% set python_min = "3.8" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  path: .

build:
  noarch: python
  number: 0
  script: {{ PYTHON }} -m pip install . --no-deps --ignore-installed -vv
  entry_points:
    - coser = coser.cli:main

requirements:
  host:
    - python {{ python_min }}
    - pip
    - setuptools
    - wheel
  run:
    - python >={{ python_min }}
    - numpy
    - pandas
    - scipy
    - scikit-learn

test:
  requires:
    - python {{ python_min }}
  imports:
    - coser
  commands:
    - coser --help

about:
  home: https://github.com/YOUR_GITHUB_USERNAME/coser
  license: MIT
  license_file: LICENSE
  summary: CoSEr coupling score calculator for paired traits.

extra:
  recipe-maintainers:
    - YOUR_GITHUB_USERNAME
