schema_version: 1

context:
  name: generic
  version: "1.1.7"

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/g/generic/generic-${{ version }}.tar.gz
  sha256: d14dae6628542eb084434588d350756c88f2f30c7e2348ad5fcfa01fbdb7ceed

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - poetry-core
    - pip
  run:
    - python >=${{ python_min }}
    - exceptiongroup >=1.0.0

tests:
  - python:
      imports:
        - generic
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  summary: Generic programming library for Python
  license: BSD-3-Clause
  license_file: LICENSES/BSD-3-Clause.txt
  homepage: https://github.com/gaphor/generic
  documentation: https://generic.readthedocs.io/
  repository: https://github.com/gaphor/generic

extra:
  recipe-maintainers:
    - danyeaw
