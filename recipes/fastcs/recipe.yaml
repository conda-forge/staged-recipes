schema_version: 1

context:
  name: fastcs
  version: 0.12.0
  python_min: "3.11"

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/${{ name[0] }}/${{ name }}/fastcs-${{ version }}.tar.gz
  sha256: 79e643454e46b4e52d7c93b2edd4b82018ed15c3b674d0935597970fa495c27c

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  python:
    entry_points:
      - fastcs-demo = fastcs.demo.__main__:main

requirements:
  host:
    - python ${{ python_min }}.*
    - setuptools >=64
    - setuptools-scm >=8
    - pip
  run:
    - python >=${{ python_min }}
    - aioserial
    - fastapi
    - numpy
    - pydantic
    - ruamel.yaml
    - ipython
    - loguru >=0.7,<1.dev0
    - pygelf
    - stdio-socket

tests:
  - python:
      python_version: "${{ python_min }}.*"
      imports:
        - fastcs
      pip_check: true
  - requirements:
      run:
        - pip
    script:
      - fastcs-demo --help

about:
  homepage: https://github.com/DiamondLightSource/fastcs
  summary: Control system agnostic framework for building Device support in Python that will work for both EPICS and Tango
  license: Apache-2.0
  license_file: LICENSE

extra:
  recipe-maintainers:
    - jwlodek
