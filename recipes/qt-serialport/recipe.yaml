context:
  version: "6.10.2"

package:
  name: qt-serialport
  version: ${{ version }}

source:
  url: https://github.com/qt/qtserialport/archive/refs/tags/v${{ version }}.tar.gz
  sha256: 41f5b39cf0967ab883fd15d61a92dd60124664c1537fd71cfc7e7a7052f9420b

build:
  number: 0
  script:
    - cmake -S . -B build -G Ninja
        -DCMAKE_BUILD_TYPE=Release
        -DCMAKE_INSTALL_PREFIX=${{ PREFIX }}
        -DQt6_DIR=${{ PREFIX }}/lib/cmake/Qt6
        -DQT_BUILD_TESTS=OFF
        -DQT_BUILD_EXAMPLES=OFF
    - cmake --build build --parallel ${{ CPU_COUNT }}
    - cmake --install build

requirements:
  build:
    - ${{ compiler('cxx') }}
    - cmake
    - ninja
    - pkg-config
  host:
    - qt6-main

tests:
  - package_contents:
      include:
        - qt6/QtSerialPort/qserialport.h
      lib:
        - libQt6SerialPort

about:
  homepage: https://doc.qt.io/qt-6/qtserialport-index.html
  summary: Qt module providing cross-platform serial port access
  description: |
    Qt Serial Port provides the basic functionality to communicate with
    hardware serial ports (RS-232 and RS-485). The module is platform-
    independent (Linux, macOS, Windows) and enables automatic serial port
    detection and enumeration; on Linux it optionally uses libudev for
    richer device information.
  license: LGPL-3.0-only OR GPL-2.0-only OR GPL-3.0-only
  license_file: LICENSES/
  repository: https://github.com/qt/qtserialport
  documentation: https://doc.qt.io/qt-6/qtserialport-index.html

extra:
  recipe-maintainers:
    - multimeric
