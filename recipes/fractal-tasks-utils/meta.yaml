{% set python_min = "3.11" %}
{% set version = "0.1.5" %}

package:
  name: fractal-tasks-utils
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/f/fractal-tasks-utils/fractal_tasks_utils-{{ version }}.tar.gz
  sha256: 49609b5dd4900e2778910c1e68f8565f3a23b750dad339c823c067013034fc37

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python {{ python_min }}.*
    - hatchling
    - hatch-vcs
    - pip
  run:
    - python >={{ python_min }}
    - ngio >0.5.0,<0.6.0
    - pydantic
    - numpy
    - scikit-image

test:
  imports:
    - fractal_tasks_utils
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}.*

about:
  home: https://pypi.org/project/fractal-tasks-utils/
  license: BSD-3-Clause
  license_file: LICENSE

extra:
  recipe-maintainers:
    - tcompa
