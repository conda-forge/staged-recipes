{% set version = "0.2.0" %}

package:
  name: deckbridge
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/d/deckbridge/deckbridge-{{ version }}.tar.gz
  sha256: 0b20840af267d7399814ef9d4db4941381c75f41f2ee5b6d8c9e38284fecc4ab

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python >=3.9
    - setuptools >=64.0.0
    - pip
  run:
    - python >=3.9
    - google-api-python-client
    - google-auth
    - google-auth-httplib2
    - google-auth-oauthlib
    - pandas
    - python-pptx

test:
  imports:
    - deckbridge
  commands:
    - pip check
  requires:
    - pip
    - python

about:
  home: https://pypi.org/project/deckbridge/
  summary: Deck builder for analytics.
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - josephcobb111
