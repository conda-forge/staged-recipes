schema_version: 1

context:
  name: asv_env_conda
  version: "0.1.2"

package:
  name: ${{ name }}
  version: ${{ version }}

source:
  url: https://github.com/HaoZeke/asv_env_conda/archive/refs/tags/v${{ version }}.tar.gz
  sha256: dfbcee96170f9ccf97e0cb90e857af8036f52ffa72a137e77b3b3d20d4c48c3f

build:
  noarch: python
  number: 0
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - setuptools
  run:
    - python >=${{ python_min }}
    - asv >=0.6.5
    - packaging

tests:
  - python:
      imports:
        - asv_env_conda
      python_version:
        - ${{ python_min }}.*
        - "*"
      # asv on conda-forge fails pip check (missing python-build; asv-runner metadata mismatch)
      pip_check: false

about:
  homepage: https://github.com/HaoZeke/asv_env_conda
  summary: ASV environment plugin using the conda CLI
  license: MIT
  license_file: LICENSE
  repository: https://github.com/HaoZeke/asv_env_conda

extra:
  recipe-maintainers:
    - HaoZeke
