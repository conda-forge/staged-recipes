schema_version: 1

context:
  name: asv_env_conda
  version: "0.1.1"
  python_min: "3.9"

package:
  name: ${{ name }}
  version: ${{ version }}

source:
  url: https://github.com/HaoZeke/asv_env_conda/archive/refs/tags/v0.1.1.tar.gz
  sha256: 29dcd8092ac8f0d1691bb64b29c85bdf0e7713085601ac0854db1e4cd583253c

build:
  noarch: python
  number: 0
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - setuptools
  run:
    - python >=${{ python_min }}
    - asv >=0.6.5
    - packaging

tests:
  - python:
      python_version: ${{ python_min }}.*
      imports:
        - asv_env_conda
      pip_check: true

about:
  homepage: https://github.com/HaoZeke/asv_env_conda
  summary: ASV environment plugin using the conda CLI
  license: MIT
  license_file: LICENSE
  repository: https://github.com/HaoZeke/asv_env_conda

extra:
  recipe-maintainers:
    - HaoZeke
