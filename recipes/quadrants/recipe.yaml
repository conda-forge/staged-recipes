schema_version: 1

context:
  name: quadrants
  version: "0.8.0"

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  # The GitHub tag archive omits populated submodules needed by this source build.
  git: https://github.com/Genesis-Embodied-AI/quadrants.git
  tag: v${{ version }}
  patches:
    - patches/0001-limit-wheel-install-manifest.patch
    - patches/0002-remove-root-build-helper.patch

build:
  number: 0
  # Initial package for Genesis dependency work; macOS and Windows need separate upstream build validation.
  # Keep this combined dependency PR tractable; expand variants after feedstock creation.
  skip:
    - not linux
    - match(python, "<3.11")
    - match(python, ">=3.12")
  script:
    - export LLVM_DIR="${PREFIX}/lib/cmake/llvm"
    - |
      printf '%s\n' '#!/bin/sh' \
        "exec \"${PREFIX}/bin/clang++-22\" --gcc-toolchain=\"${BUILD_PREFIX}\" \"\$@\"" \
        > "${SRC_DIR}/conda-clang++"
      chmod +x "${SRC_DIR}/conda-clang++"
    - export CLANG_EXECUTABLE="${SRC_DIR}/conda-clang++"
    - export CMAKE_GENERATOR=Ninja
    - export BUILD_NUM_THREADS=1
    - export SETUPTOOLS_SCM_PRETEND_VERSION=${{ version }}
    - export QUADRANTS_CMAKE_ARGS="-DQD_WITH_CUDA=OFF -DQD_WITH_AMDGPU=OFF -DQD_WITH_VULKAN=OFF -DQD_WITH_METAL=OFF -DQD_BUILD_TESTS=OFF -DCLANG_EXECUTABLE=${SRC_DIR}/conda-clang++ -DCMAKE_PREFIX_PATH=${PREFIX}"
    - python -m pip install . -vv --no-deps --no-build-isolation

requirements:
  build:
    - ${{ compiler("c") }}
    - ${{ compiler("cxx") }}
    - ${{ stdlib("c") }}
  host:
    - python
    - pip
    - wheel
    - setuptools >=77.0.0
    - setuptools_scm >=6.0
    - numpy >=2.0.0
    - pybind11 <3.0.0
    - pybind11-stubgen
    - scikit-build
    - cmake >=3.17
    - ninja
    - psutil
    # Upstream runs pybind11-stubgen during wheel build, which imports quadrants.
    - colorama
    - dill
    - pydantic >=2.0.0
    - rich >=1.0.0
    - cffi >=1.16.0
    - ruamel.yaml
    - clang >=22,<23
    - llvmdev >=22,<23
    - zlib
    - zstd
    - libxml2
  run:
    - python
    - numpy >=1.26.0
    - colorama
    - dill
    - pydantic >=2.0.0
    - rich >=1.0.0
    - setuptools >=77.0.0
    - cffi >=1.16.0

tests:
  - python:
      imports:
        - quadrants
        - quadrants._lib.core.quadrants_python
  - script:
      - pip check
      - python run_test.py
    files:
      recipe:
        - run_test.py
    requirements:
      run:
        - pip
        - python

about:
  homepage: https://github.com/Genesis-Embodied-AI/quadrants
  summary: Python-embedded domain-specific language for accelerated simulation kernels
  license: Apache-2.0
  license_file: LICENSE
  repository: https://github.com/Genesis-Embodied-AI/quadrants

extra:
  recipe-maintainers:
    - jeongseok-meta
