schema_version: 1

context:
  version: 1.5.45

package:
  name: continue-cli
  version: ${{ version }}

source:
  - url: https://registry.npmjs.org/@continuedev/cli/-/cli-${{ version }}.tgz
    sha256: 917c644b1e2387ecc6db9d0851f6208bca466316068a538c0726d93d551ce372
  - url: https://raw.githubusercontent.com/continuedev/continue/refs/tags/v1.5.45/LICENSE
    sha256: b14a17598cb08c4c7c82c070731126304e0a75d001ed59fb9ea3955a0b561802

build:
  number: 0
  noarch: generic

requirements:
  build:
    - jq
  host:
    - nodejs
    - pnpm
    - pnpm-licenses
  run:
    - nodejs

tests:
  - script:
      - cn --version
      - cn --help

about:
  homepage: https://www.continue.dev
  documentation: https://docs.continue.dev
  repository: https://github.com/continuedev/continue
  license: Apache-2.0
  license_file:
    - LICENSE
    - third-party-licenses.txt
  summary: The Continue CLI (cn) is a customizable command line coding agent.
  description: |
    Continue CLI (cn) is a terminal-based coding agent.
    It can edit files, run commands, and work through multi-step tasks — the same agent that powers the Continue IDE extensions, running in your terminal.

extra:
  recipe-maintainers:
    - eunos-1128
