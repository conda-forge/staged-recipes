schema_version: 1

context:
  python_min: "3.11"
  version: "10.0.0"

package:
  name: mathic3-frontend-cli
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/m/mathicsscript/mathicsscript-${{ version }}.tar.gz
  sha256: aeacd508ccf78a1c06007d815209f29c81422ac4861f24f502c6aa69f7622f4f

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  python:
    entry_points:
      - mathicsscript = mathicsscript.__main__:main
      - fake_psviewer.py = mathicsscript.fake_psviewer:main

requirements:
  host:
    - python ${{ python_min }}.*
    - setuptools
    - pyyaml
    - click
    - pip
  run:
    - python >=${{ python_min }}
    - mathics3-scanner >=10.0.0
    - mathics3 >=10.0.0
    - click >=8.0.0
    - colorama
    - columnize
    - networkx
    - prompt_toolkit >=3.0.18
    - pygments >=2.9.0
    - mathics3-pygments >=10.0.0
    - term-background >=1.0.5

tests:
  - python:
      imports:
        - mathicsscript
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"
  - requirements:
      run:
        - pip
        - python ${{ python_min }}.*
    script:
      - mathicsscript --help
      - fake_psviewer.py --help

about:
  summary: Command-line interface to Mathics3
  license: GPL-3.0-only
  license_file: COPYING.txt
  homepage: https://mathics.org/

extra:
  recipe-maintainers:
    - mmatera
    - rocky
