{% set version = "10.0.0" %}

package:
  name: mathic3-frontend-cli
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/m/mathicsscript/mathicsscript-{{ version }}.tar.gz
  sha256: aeacd508ccf78a1c06007d815209f29c81422ac4861f24f502c6aa69f7622f4f

build:
  entry_points:
    - mathicsscript = mathicsscript.__main__:main
    - fake_psviewer.py = mathicsscript.fake_psviewer:main
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python >=3.11
    - setuptools
    - pyyaml
    - click
    - pip
  run:
    - python >=3.11
    - mathics3-scanner >=10.0.0
    - mathics3 >=10.0.0
    - click >=8.0.0
    - colorama
    - columnize
    - networkx
    - prompt_toolkit >=3.0.18
    - pygments >=2.9.0
    - mathics3-pygments >=10.0.0
    - term-background >=1.0.5

test:
  imports:
    - mathicsscript
  commands:
    - pip check
    - mathicsscript --help
    - fake_psviewer.py --help
  requires:
    - pip
    - python

about:
  home: https://mathics.org/
  summary: Command-line interface to Mathics3
  license: GPL-3.0-only
  license_file: COPYING.txt
extra:
  recipe-maintainers:
    - mmatera
    - rocky
