{% set version = '1.3.1' %}
{% set posix = 'm2-' if win else '' %}

package:
  name: r-panelview
  version: {{ version|replace("-", "_") }}

source:
  url:
    - {{ cran_mirror }}/src/contrib/panelView_{{ version }}.tar.gz
    - {{ cran_mirror }}/src/contrib/Archive/panelView/panelView_{{ version }}.tar.gz
  sha256: 9b4ba2531d220a271d72c0bb95491d8d82c198c3d4486b8e5d4cda371cd9d69f

build:
  number: 0
  noarch: generic
  rpaths:
    - lib/R/lib/
    - lib/
  missing_dso_whitelist:
    - '*/R.dll'        # [win]
    - '*/Rblas.dll'    # [win]
    - '*/Rlapack.dll'  # [win]

requirements:
  build:
    - {{ posix }}zip               # [win]
    - cross-r-base {{ r_base }}    # [build_platform != target_platform]
  host:
    - r-base
    - r-dplyr >=1.0.0
    - r-ggplot2 >=3.4.0
    - r-gridextra
  run:
    - r-base
    - r-dplyr >=1.0.0
    - r-ggplot2 >=3.4.0
    - r-gridextra

test:
  commands:
    - $R -e "library('panelView')"           # [not win]
    - "\"%R%\" -e \"library('panelView')\""  # [win]

about:
  home: https://yiqingxu.org/packages/panelview/, https://github.com/xuyiqing/panelView
  license: MIT
  summary: 'Visualizes panel data. It has four main functionalities: (1) it plots the treatment
    status and missing values in a panel dataset; (2) it visualizes the temporal dynamics
    of a main variable of interest; (3) it depicts the bivariate relationships between
    a treatment variable and an outcome variable either by unit or in aggregate; (4)
    it displays the network structure of multi-way fixed effects as a k-partite graph,
    identifying connected components, singletons, and duplicate observations. For details,
    see <doi:10.18637/jss.v107.i07>.'
  license_family: MIT
  license_file:
    - '{{ environ["PREFIX"] }}/lib/R/share/licenses/MIT'
    - LICENSE

extra:
  recipe-maintainers:
    - conda-forge/r
    - JNuss71

