context:
  version: "1.0.0"

package:
  name: julday
  version: ${{ version }}

source:
  url: https://gitlab.com/earthscope/public/epic/passoft/julday/-/archive/v${{ version }}/julday-v${{ version }}.tar.gz
  sha256: 4258145851880eb2fd5853fe34c03e5ba72bbc456dbf8e5f15c6344775e5e444

build:
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0
  python:
    entry_points:
      - julday = julday.julday:main

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - setuptools
  run:
    - python >=${{ python_min }}

tests:
  - python:
      imports:
        - julday
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"
  - script:
      - julday 1 1 2020

about:
  homepage: https://epic.earthscope.org/content/software-resources
  summary: Display Julian date
  description: |
    Display the current Julian date.
  license: GPL-3.0-or-later
  license_file: LICENSE
  repository: https://gitlab.com/earthscope/public/epic/passoft/julday

extra:
  recipe-maintainers:
    - omid-earthscope
