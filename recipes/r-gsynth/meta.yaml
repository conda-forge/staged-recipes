{% set version = '1.4.0' %}
{% set posix = 'm2-' if win else '' %}

package:
  name: r-gsynth
  version: "{{ version|replace("-", "_") }}"

source:
  url:
    - {{ cran_mirror }}/src/contrib/gsynth_{{ version }}.tar.gz
    - {{ cran_mirror }}/src/contrib/Archive/gsynth/gsynth_{{ version }}.tar.gz
  sha256: 782364162e8fa05ff14472f4d75d4d5b04048cb0d5a84eece43669a73e252ca8

build:
  number: 0
  noarch: generic
  rpaths:
    - lib/R/lib/
    - lib/
  missing_dso_whitelist:
    - '*/R.dll'        # [win]
    - '*/Rblas.dll'    # [win]
    - '*/Rlapack.dll'  # [win]

requirements:
  build:
    - {{ posix }}zip               # [win]
    - cross-r-base {{ r_base }}    # [build_platform != target_platform]
  host:
    - r-base
    - r-fect >=2.0.0
    - r-ggplot2 >=2.1.0
    - r-panelview >=1.1.17
  run:
    - r-base
    - r-fect >=2.0.0
    - r-ggplot2 >=2.1.0
    - r-panelview >=1.1.17

test:
  commands:
    - $R -e "library('gsynth')"           # [not win]
    - "\"%R%\" -e \"library('gsynth')\""  # [win]

about:
  home: https://yiqingxu.org/packages/gsynth/
  dev_url: https://github.com/xuyiqing/gsynth
  license: MIT
  summary: Conducts causal inference with interactive fixed-effect models. It imputes counterfactuals
    for each treated unit using control group information based on a linear interactive
    fixed effects model that incorporates unit-specific intercepts interacted with time-varying
    coefficients. This method generalizes the synthetic control method to the case of
    multiple treated units and variable treatment periods, and improves efficiency and
    interpretability. See Xu (2017) <doi:10.1017/pan.2016.2> for details.
  license_family: MIT
  license_file:
    - '{{ environ["PREFIX"] }}/lib/R/share/licenses/MIT'
    - LICENSE

extra:
  recipe-maintainers:
    - conda-forge/r
    - JNuss71

