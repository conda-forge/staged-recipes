# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "0.2.7"
  python_check_max: "3.14"

package:
  name: udtools
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/u/udtools/udtools-${{ version }}.tar.gz
  sha256: 423396ececa70e2903c2c7cc1e6a259716122550cf41f77c1c2261ee27852213

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  python:
    entry_points:
      - udvalidate = udtools.cli:main
      - udeval = udtools.cli:main_eval

requirements:
  host:
    - python ${{ python_min }}.*
    - setuptools >=77.0.3
    - pip
  run:
    - python >=${{ python_min }}
    - udapi >=0.5.0
    - regex >=2020.09.27

tests:
  - python:
      imports: udtools
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - ${{ python_check_max }}.*
  - requirements:
      run:
        - python ${{ python_min }}.*
    script:
      - udvalidate --help
      - udeval --help

about:
  summary: Python tools for Universal Dependencies
  license: GPL-2.0-only
  license_file: LICENSE.txt
  homepage: https://pypi.org/project/udtools
  repository: https://github.com/UniversalDependencies/tools
  documentation: https://universaldependencies.org

extra:
  recipe-maintainers:
    - bollwyvl
