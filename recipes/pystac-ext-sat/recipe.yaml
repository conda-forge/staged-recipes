schema_version: 1

context:
  version: "1.0.0"

package:
  name: pystac-ext-sat
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/p/pystac-ext-sat/pystac_ext_sat-${{ version }}.tar.gz
  sha256: 2163b31d3044f9c2965abd9cb4144482813068ff9f99107a240eed06cf78bace

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - hatchling
    - pip
  run:
    - python >=${{ python_min }}
    - pystac-core

tests:
  - python:
      imports:
        - pystac.extensions.sat
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  summary: Satellite extension for PySTAC
  license: Apache-2.0
  license_file: LICENSE
  homepage: https://pypi.org/project/pystac-ext-sat/
  documentation: https://pystac.readthedocs.io

extra:
  recipe-maintainers:
    - ocefpaf
