# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "0.3.39"

package:
  name: llm-sandbox
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/l/llm-sandbox/llm_sandbox-${{ version }}.tar.gz
  sha256: 7452317a054df3ac20fb652a2e100b5697624886282874fecfb738bac21b27bb

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - hatchling
    - pip
  run:
    - python >=${{ python_min }}
    - pydantic >=2.11.5

tests:
  - python:
      imports:
        - llm_sandbox
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  homepage: https://pypi.org/project/llm-sandbox/
  license: MIT
  license_file: LICENSE
  summary: LLM Sandbox is a lightweight and portable sandbox environment designed to run large language model (LLM) generated code in a safe and isolated mode.
  repository: https://github.com/vndee/llm-sandbox
  documentation: https://vndee.github.io/llm-sandbox/
  description: |
    LLM Sandbox is a lightweight and portable sandbox environment designed to
    run large language model (LLM) generated code in a safe and isolated mode.
    Container backends (Docker, Kubernetes, Podman) and MCP server support are
    available as optional extras and are not pulled in by the base install.

extra:
  recipe-maintainers:
    - rxm7706
