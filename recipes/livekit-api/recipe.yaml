schema_version: 1

context:
  version: "1.1.0"

package:
  name: livekit-api
  version: ${{ version }}

source:
  - url: https://pypi.org/packages/source/l/livekit-api/livekit_api-${{ version }}.tar.gz
    sha256: f94c000534d3a9b506e6aed2f35eb88db1b23bdea33bb322f0144c4e9f73934e
  - url: https://raw.githubusercontent.com/livekit/python-sdks/refs/tags/api-v${{ version }}/LICENSE
    sha256: c71d239df91726fc519c6eb72d318ec65820627232b2f796219e87dcf35d0ab4
    file_name: LICENSE

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - setuptools >=42
    - pip
  run:
    - python >=${{ python_min }}
    - pyjwt >=2.0.0
    - aiohttp >=3.9.0
    - protobuf >=4
    - types-protobuf >=4
    - livekit-protocol >=1.1.1,<2.0.0

tests:
  - python:
      python_version:
        - ${{ python_min }}.*
        - "*"
      imports:
        - livekit.api
      pip_check: true

about:
  summary: Python Server API for LiveKit
  license: Apache-2.0
  license_file: LICENSE
  homepage: https://github.com/livekit/python-sdks
  repository: https://github.com/livekit/python-sdks/
  documentation: https://docs.livekit.io

extra:
  recipe-maintainers:
    - conda-forge/livekit
