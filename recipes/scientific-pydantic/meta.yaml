{% set name = "scientific-pydantic" %}
{% set version = "0.1.1" %}
{% set python_min = "3.10" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/scientific_pydantic-{{ version }}.tar.gz
  sha256: e228837962f93a9f12628fa59b11906587a43aef44b16f27cb90051d83baa7c9

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - uv_build >=0.8.3,<0.9.0
    - pip
  run:
    - python >={{ python_min }}
    - pydantic >=2.0

test:
  imports:
    - scientific_pydantic
  commands:
    - pip check
  requires:
    - python {{ python_min }}
    - pip

about:
  home: https://pypi.org/project/scientific-pydantic/
  summary: Pydantic adapters for common scientific types
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - psalvaggio
