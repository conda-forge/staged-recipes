{% set name = "scientific-pydantic" %}
{% set version = "0.1.0" %}
{% set python_min = "3.10" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/scientific_pydantic-{{ version }}.tar.gz
  sha256: d25f5649beb00281e2b223d022930923edbf46266e5cea60412658dbd400e5c6

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - uv-build >=0.8.3,<0.9.0
    - pip
  run:
    - python >={{ python_min }}
    - pydantic >=2.0

test:
  imports:
    - scientific_pydantic
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}
    - astropy
    - numpy
    - pytest
    - scipy
    - shapely

about:
  summary: Pydantic adapters for common scientific types
  home: https://pypi.org/project/scientific-pydantic/
  license: 'MIT'
  license_file: LICENSE

extra:
  recipe-maintainers:
    - psalvaggio
