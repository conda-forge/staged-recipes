# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "0.8.0"

package:
  name: graph-retriever
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/g/graph-retriever/graph_retriever-${{ version }}.tar.gz
  sha256: e61f1cb27184e8d4559ece6de0a6ea18920908ffbae945051f9a01380af73347

build:
  number: 0
  noarch: python
  script: |
    sed -i.bak '/^[[:space:]]*"pytest[<>=!~ ]/d' pyproject.toml
    rm -f pyproject.toml.bak
    ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - hatchling
    - pip
  run:
    - python >=${{ python_min }}
    - immutabledict >=4.2.1
    - numpy >=1.26.4
    - typing_extensions >=4.12.2

tests:
  - python:
      imports:
        - graph_retriever
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  homepage: https://pypi.org/project/graph-retriever/
  license: Apache-2.0
  license_file: LICENSE
  summary: Retriever combining unstructured similarity and structured document traversal.
  repository: https://github.com/datastax/graph-rag
  documentation: https://datastax.github.io/graph-rag
  description: |
    graph-retriever provides graph traversal retrieval that combines
    unstructured vector similarity with structured document traversal. It
    lets retrievers walk edges between documents (defined by metadata) so
    related context can be pulled in alongside the nearest-neighbor matches,
    independent of any particular vector store. Part of the datastax/graph-rag
    project.

extra:
  recipe-maintainers:
    - rxm7706
