# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  name: sema4ai-actions
  version: "1.6.6"
  python_min: "3.10"

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/${{ name[0] }}/${{ name }}/sema4ai_actions-${{ version }}.tar.gz
  sha256: 83d16618764eaf38955ccf746560491e91aefe951ebd0b6dc8d9002717cf3355

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - poetry-core
    - pip
  run:
    - python >=${{ python_min }},<4
    - cryptography >=44.0.1
    - robocorp-log >=2.4,<4
    - robocorp-truststore >=0.8.0
    - psutil >=5.0,<8.0
    - docstring_parser_fork >=0.0.5,<0.0.6
    - pydantic >=2.11.7,<3.0.0
    - sema4ai-http-helper >=2.0.1,<3.0.0
    - pyyaml >=6.0.0,<7.0.0

tests:
  - python:
      imports:
        - sema4ai.actions
      pip_check: true
      python_version:
      - ${{ python_min }}.*
      - "*"

about:
  summary: Sema4AI Actions
  license: Apache-2.0
  license_file: LICENSE
  homepage: https://github.com/Sema4AI/actions/

extra:
  recipe-maintainers:
    - rxm7706
