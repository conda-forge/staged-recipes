context:
  version: "1.0.7"
  xeus_cpp_version: "0.8.1"

package:
  name: robotframework-clang
  version: ${{ version }}

source:
  url: https://github.com/maxrossello/robotframework-clang/archive/refs/tags/rf-clang-${{ version }}.tar.gz
  sha256: "983e8c4320c934fa7d8d8578ddcabb5ee26d1055b1d9262a0341450d90125aef"

build:
  number: 5
  script: ${{ PYTHON }} -m pip install . --no-deps -vv

requirements:
  build:
    - ${{ compiler('clang') }}
    - ${{ compiler('clangxx') }}
    - ${{ stdlib("c") }}
  host:
    - python ${{ python }}
    - pip
    - setuptools >=61.0
    - wheel
  run:
    - python ${{ python }}
    - robotframework
    - jupyter_client
    - docutils
    - xeus-cpp ==${{ xeus_cpp_version }}
    - ${{ compiler('clang') }}
    - ${{ compiler('clangxx') }}
    - ${{ stdlib("c") }}
    - if: osx
      then: 
      - libcxx-devel
      - clang
      - clangxx

tests:
  - script:
      - robot -X --extension rst docs/tests.rst
      - if: win
        then: 
        - powershell -Command "[GC]::Collect(); [GC]::WaitForPendingFinalizers()"
        - python -c "import time; time.sleep(60)"
        else:
    files:
      source:
        - docs
    requirements:
      run:
        - ${{ compiler('clang') }}
        - ${{ compiler('clangxx') }}
        - ${{ stdlib("c") }}
        - if: osx
          then: 
          - libcxx-devel
          - clang
          - clangxx

about:
  homepage: https://github.com/maxrossello/robotframework-clang
  license: Apache-2.0
  license_file: LICENSE
  summary: Robot Framework library for Clang-REPL execution via xeus-cpp
  description: |
    robotframework-clang is a Robot Framework library designed to execute 
    and test C++ code interactively using Clang-REPL (via the xeus-cpp extension).
    It allows for JIT compilation, state persistence across tests, and full 
    support for modern C++ features.

extra:
  recipe-maintainers:
    - maxrossello
