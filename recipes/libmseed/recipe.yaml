context:
  version: "3.4.1"

package:
  name: libmseed
  version: ${{ version }}

source:
  url: https://github.com/EarthScope/libmseed/archive/refs/tags/v${{ version }}.tar.gz
  sha256: 520717ba270baa451494bf68b6290af0ea2365f009b65de0788cdd454c43ab39

build:
  number: 0
  skip: win
  run_exports:
    - ${{ pin_subpackage('libmseed', upper_bound='x') }}

requirements:
  build:
    - ${{ compiler('c') }}
    - ${{ stdlib('c') }}
    - make
  host:
    - libcurl

tests:
  - script:
      - test -f ${PREFIX}/include/libmseed.h
      - test -f ${PREFIX}/lib/libmseed${SHLIB_EXT}

about:
  homepage: https://github.com/EarthScope/libmseed
  summary: C library for reading, writing, and handling miniSEED data
  description: |
    libmseed is a C library for reading, writing, and handling miniSEED
    formatted time series data. miniSEED is a ubiquitous format used in
    seismological data archiving and distribution.
  license: Apache-2.0
  license_file: LICENSE
  repository: https://github.com/EarthScope/libmseed

extra:
  recipe-maintainers:
    - omid-earthscope
