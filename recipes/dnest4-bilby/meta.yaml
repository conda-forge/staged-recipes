{% set name = "dnest4-bilby" %}
{% set version = "0.1.0" %}
{% set python_min = "3.9" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/dnest4_bilby-{{ version }}.tar.gz
  sha256: 89bc2862e47e0c38a40d71e1ca497e98a509173084339cdfd0b64a1d6f61de44

build:
  noarch: python
  number: 0
  script_env:
    - SETUPTOOLS_SCM_PRETEND_VERSION={{ version }}
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python {{ python_min }}
    - pip
    - setuptools >=45
    - setuptools-scm >=6.2
  run:
    - python >={{ python_min }}
    - bilby >=2.3.0
    - dnest4
    - numpy

test:
  imports:
    - dnest4_bilby
  commands:
    - pip check
    - python -m pytest tests/
  requires:
    - python {{ python_min }}
    - pip
    - pytest
    - numpy <2.0    # conda only provides dnest4 0.2.4 which is not compatible with numpy 2.0
  source_files:
    - tests
    - pyproject.toml

about:
  home: https://github.com/bilby-dev/dnest4-bilby
  summary: Plugin for using dnest4 with bilby.
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - ColmTalbot
    - mj-will
