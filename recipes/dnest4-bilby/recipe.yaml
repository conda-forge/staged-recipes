context:
  name: dnest4-bilby
  version: "0.1.0"
  python_min: "3.9"

package:
  name: ${{ name }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/${{ name[0] }}/${{ name }}/dnest4_bilby-${{ version }}.tar.gz
  sha256: 89bc2862e47e0c38a40d71e1ca497e98a509173084339cdfd0b64a1d6f61de44

build:
  noarch: python
  number: 0
  script: python -m pip install . -vv --no-deps --no-build-isolation
  skip:
    - win

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - setuptools >=45
    - setuptools-scm >=6.2
  run:
    - python >=${{ python_min }}
    - bilby >=2.3.0
    - dnest4
    - numpy

tests:
  - python:
      imports:
        - dnest4_bilby
      pip_check: true
      python_version: ${{ python_min }}.*

  - script:
      - python -m pytest tests/
    requirements:
      run:
        - python ${{ python_min }}.*
        - pytest
        - numpy <2.0
    files:
      source:
        - tests/
        - pyproject.toml

about:
  homepage: https://github.com/bilby-dev/dnest4-bilby
  summary: Plugin for using dnest4 with bilby.
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - ColmTalbot
    - mj-will
