# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  name: sema4ai-http-helper
  version: "2.1.2"

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/${{ name[0] }}/${{ name }}/sema4ai_http_helper-${{ version }}.tar.gz
  sha256: fa78eadcc0006d8e4955a96ea34cc4c48c5ced7f0fb1ef6f04ae65df15da7a6e

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - poetry-core
    - pip
  run:
    - python >=${{ python_min }},<4
    - truststore 0.9.2.*
    - urllib3 >=2.5.0
    - pyyaml >=5.0
    - types-pyyaml >=6.0.0

tests:
  - python:
      imports:
        - sema4ai_http
      pip_check: true
      python_version:
      - ${{ python_min }}.*
      - "*"

about:
  summary: HTTP library that enables the use of OS certificate stores when working behind MITM firewalls
  license: Apache-2.0
  license_file: LICENSE
  homepage: https://github.com/sema4ai/actions/

extra:
  recipe-maintainers:
    - rxm7706
