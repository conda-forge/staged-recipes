schema_version: 1

context:
  version: "0.0.7"

package:
  name: aiofastnet
  version: ${{ version }}

source:
  url: https://github.com/tarasko/aiofastnet/archive/refs/tags/v${{ version}}.tar.gz
  sha256: d804b53c6eaba9fd252a90bdac309b5cc4afc39a27de1a9c5b49bad60f5e34be

build:
  number: 0
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  build:
    - ${{ stdlib('c') }}
    - ${{ compiler('c') }}
  host:
    - python
    - setuptools >=78.0
    - wheel
    - cython >=3.0
    - pip
  run:
    - python

tests:
  - python:
      imports:
        - aiofastnet
      pip_check: true

about:
  summary: Fast transport/protocol networking for asyncio
  license: MIT
  license_file: LICENSE
  homepage: https://github.com/tarasko/aiofastnet
  documentation: https://aiofastnet.readthedocs.io/en/latest

extra:
  recipe-maintainers:
    - thewchan
