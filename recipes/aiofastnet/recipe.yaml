schema_version: 1

context:
  version: "0.0.7"

package:
  name: aiofastnet
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/a/aiofastnet/aiofastnet-${{ version }}.tar.gz
  sha256: a9ebfec13e2e4403671f9eee1f7262f4f0656e8cadebec5f7772d22e50511cd8

build:
  number: 0
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  build:
    - ${{ stdlib('c') }}
    - ${{ compiler('c') }}
  host:
    - python
    - setuptools >=78.0
    - wheel
    - cython >=3.0
    - pip
  run:
    - python

tests:
  - python:
      imports:
        - aiofastnet
      pip_check: true

about:
  summary: Fast transport/protocol networking for asyncio
  license: MIT
  license_file: LICENSE
  homepage: https://github.com/tarasko/aiofastnet
  documentation: https://aiofastnet.readthedocs.io/en/latest

extra:
  recipe-maintainers:
    - thewchan
