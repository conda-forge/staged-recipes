{% set version = "0.35.1" %}

package:
  name: ssrl_xrd_tools
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/s/ssrl_xrd_tools/ssrl_xrd_tools-{{ version }}.tar.gz
  sha256: 046a126b76c880cc4401aa962cef3a7125b57d43e88a5f2c54fca512149b3713

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - setuptools >=64
    - pip
  run:
    - python >={{ python_min }}
    - numpy
    - scipy
    - h5py
    - fabio
    - silx
    - pyfai
    - xrayutilities
    - joblib
    - natsort
    - lmfit
    - ipykernel
    - ipywidgets
    - jupyterlab
    - matplotlib-base
    - panel
    - holoviews
    - bokeh
    - jupyter_bokeh
    - pymatgen
    - plotly
    - anywidget

test:
  imports:
    - ssrl_xrd_tools
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://github.com/v-thampy/ssrl_xrd_tools
  summary: SSRL X-ray diffraction data processing and visualization tools
  description: |
    A Python library for processing and visualizing X-ray diffraction data
    collected at SSRL beamlines, with support for area-detector integration
    via pyFAI, NeXus persistence, phase fitting, and sin^2(psi) stress analysis.
  license: BSD-3-Clause
  license_family: BSD
  license_file: LICENSE
  doc_url: https://github.com/v-thampy/ssrl_xrd_tools#readme
  dev_url: https://github.com/v-thampy/ssrl_xrd_tools

extra:
  recipe-maintainers:
    - v-thampy
