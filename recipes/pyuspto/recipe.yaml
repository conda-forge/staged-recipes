schema_version: 1

context:
  version: "0.5.5"

package:
  name: pyuspto
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/p/pyUSPTO/pyuspto-${{ version }}.tar.gz
  sha256: 418359448fde884b856b01afa0f966b745f545129e53c4158ca0c66260a293d9

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - setuptools >=80
    - wheel
    - setuptools-scm >=8
    - pip
  run:
    - python >=${{ python_min }}
    - requests >=2.32.5
    - typing_extensions >=4.15.0
    - python-tzdata >=2026.1
    - urllib3 >=2.0.0

tests:
  - python:
      imports:
        - pyUSPTO
      python_version:
        - ${{ python_min }}.*
        - "*"
      pip_check: true

about:
  summary: A Modern Python client for accessing the United States Patent and Trademark Office (USPTO) Open Data Portal (ODP) APIs.
  license: MIT
  license_file: LICENSE
  homepage: https://pypi.org/project/pyUSPTO/
  documentation: https://pyuspto.readthedocs.io/en/latest/

extra:
  recipe-maintainers:
    - dpieski
