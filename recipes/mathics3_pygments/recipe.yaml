schema_version: 1

context:
  python_min: "3.11"
  version: "10.0.0"

package:
  name: mathics3_pygments
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/m/mathics3_pygments/mathics3_pygments-${{ version }}.tar.gz
  sha256: 4a4ea7787fef9f5f086b4bd900b3a7ca5c8f083e9e4619b8864edc0514994255

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - setuptools >=70.0.0
    - pyyaml
    - click
    - pip
  run:
    - python >=${{ python_min }}
    - pygments >=2.9
    - mathics3_scanner >=10.0.0
    - click

tests:
  - python:
      imports:
        - mathics_pygments
      pip_check: true
      python_version: ${{ python_min }}.*

about:
  summary: Mathics3/Mathematica/Wolfram Language Lexer for Pygments
  license: MIT
  license_file: LICENSE
  homepage: https://mathics.org/

extra:
  recipe-maintainers:
    - mmatera
    - rocky
