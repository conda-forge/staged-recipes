{% set version = "10.0.0" %}
{% set python_min = "3.11.0" %}

package:
  name: mathics3-pygments
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/m/mathics3-pygments/mathics3_pygments-{{ version }}.tar.gz
  sha256: 4a4ea7787fef9f5f086b4bd900b3a7ca5c8f083e9e4619b8864edc0514994255

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - setuptools >=70.0.0
    - pyyaml
    - click
    - pip
  run:
    - python >={{ python_min }}
    - pygments >=2.9
    - mathics3-scanner >=10.0.0
    - click

test:
  imports:
    - mathics_pygments
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://mathics.org/
  summary: Mathics3/Mathematica/Wolfram Language Lexer for Pygments
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - mmatera
    - rocky
