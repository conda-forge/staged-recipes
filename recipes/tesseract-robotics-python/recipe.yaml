schema_version: 1

context:
  version: "0.35.0"

package:
  name: tesseract-robotics-python
  version: ${{ version }}

source:
  - url: https://github.com/tesseract-robotics/tesseract_python//archive/refs/tags/${{ version }}.tar.gz
    sha256: 73ce06dd6b7e00aba97939b9af7dc51395eb6252e424f6cd42c82c5205d72098
    file_name: source.tar.gz

build:
  number: 0

requirements:
  build:
    - ${{ compiler('c') }}
    - ${{ compiler('cxx') }}
    - gtest
    - gmock
    - cmake
    - ninja
    - ros-industrial-cmake-boilerplate
    - if: linux
      then: lcov
    - if: linux
      then: ${{ cdt('mesa-libgl-devel') }}
    - if: linux
      then: ${{ cdt('mesa-dri-drivers') }}
    - pkg-config
    - swig
  host:
    - eigen
    - console_bridge
    - libboost-devel
    - python
    - numpy
    - setuptools
    - pip
    - tesseract-robotics
    - tesseract-robotics-planning
  run:
    - python
    - numpy
    - setuptools
    - aiohttp
    - importlib-resources
    - opencv

tests:
  - python:
      imports:
        - tesseract_robotics.tesseract_task_composer
        - tesseract_robotics_viewer
      pip_check: false

about:
  summary: Python bindings for Tesseract planning framework
  license: Apache-2.0
  license_file:  
  - src/LICENSE.Apache-2.0
  homepage: https://github.com/tesseract-robotics/tesseract_python

extra:
  recipe-maintainers:
    - johnwason
    - Levi-Armstrong
    - traversaro

