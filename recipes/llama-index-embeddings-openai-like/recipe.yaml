schema_version: 1

context:
  version: "0.3.1"

package:
  name: llama-index-embeddings-openai-like
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/l/llama-index-embeddings-openai-like/llama_index_embeddings_openai_like-${{ version }}.tar.gz
  sha256: cef7af4bce284e8e6730532dbd0aa325e77398a5d5524edb2d2e3acb122fb5b6

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - hatchling
    - pip
  run:
    - python >=${{ python_min }}
    - llama-index-embeddings-openai >=0.6.0,<0.7

tests:
  - python:
      imports:
        - llama_index.embeddings.openai_like
      pip_check: true
      python_version: 
        - ${{ python_min }}.*
        - "*"

about:
  summary: llama-index embeddings openai integration
  license: MIT
  license_file: LICENSE
  homepage: https://www.llamaindex.ai/
  repository: https://github.com/run-llama/llama_index/tree/main/llama-index-integrations/embeddings/llama-index-embeddings-openai-like/

extra:
  recipe-maintainers:
    - JaRoSchm
