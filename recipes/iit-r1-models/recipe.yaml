context:
  name: iit-r1-models
  version: "1.0.2"
  build_number: 0

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url:   https://github.com/mesh-iit/r1-models/archive/refs/tags/v${{ version }}.tar.gz
  sha256:  f0d0c2896cf61e222aa6bcf3735a3e6ce68fab402d9fe82ef24a53089a46baa6

build:
  noarch: generic
  number: ${{ build_number }}

requirements:
  build:
    - cmake
    - pkg-config
    - ninja
    - multisheller

  host:
    - ycm-cmake-modules

  run:
    - if: unix
      then:
        - __unix
      else:
        - __win

tests:
  - package_contents:
      files:
        -  ${{ "Library/" if win }}share/R1Mk3/robots/R1SN003/model.urdf

about:
  homepage: https://github.com/mesh-iit/r1-models
  license: BSD-3-Clause
  license_file: LICENSE
  summary: 'R1 robot models from MESH IIT'

extra:
  feedstock-name: iit-r1-models
  recipe-maintainers:
    # GitHub IDs for maintainers of the recipe.
    - Nicogene
