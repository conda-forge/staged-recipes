context:
  version: "0.7.1"

package:
  name: jj-starship
  version: ${{ version }}

source:
  url: https://github.com/dmmulroy/jj-starship/archive/refs/tags/v${{ version }}.tar.gz
  sha256: 263fc18bac72541f4aa687b44ba8227731be2414f64a039fd752dd52e2ece651

build:
  number: 0
  script:
    env:
      CARGO_PROFILE_RELEASE_STRIP: symbols
      CARGO_PROFILE_RELEASE_LTO: fat
    content:
      - if: unix
        then:
          - cargo auditable install --locked --no-track --path . --root ${{ PREFIX }}
        else:
          - cargo auditable install --locked --no-track --path . --root %LIBRARY_PREFIX%
      - cargo-bundle-licenses --format yaml --output THIRDPARTY.yml

requirements:
  build:
    - ${{ compiler("c") }}
    - ${{ compiler("rust") }}
    - cargo-auditable
    - cargo-bundle-licenses

tests:
  - script: jj-starship --help
  - package_contents:
      bin:
        - jj-starship
      strict: true

about:
  homepage: https://github.com/dmmulroy/jj-starship
  license: MIT
  license_file:
    - LICENSE
    - THIRDPARTY.yml
  summary: Starship prompt module for Git and Jujutsu
  description: |
    Unified Starship prompt module for Git and Jujutsu repositories that is optimized for latency.
  repository: https://github.com/dmmulroy/jj-starship

extra:
  recipe-maintainers:
    - chawyehsu
