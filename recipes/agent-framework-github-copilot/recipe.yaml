schema_version: 1

context:
  version: "1.0.0b260514"
  python_min: "3.10"

package:
  name: agent-framework-github-copilot
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/a/agent-framework-github-copilot/agent_framework_github_copilot-${{ version }}.tar.gz
  sha256: 78b7326147100f8056a24389103d59e8d9a160557c0818999c877cd515d10200

build:
  noarch: python
  number: 0
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - flit-core <4.0,>=3.11
  run:
    - python >=${{ python_min }}
    - agent-framework-core <2,>=1.4.0
    - github-copilot-sdk <=1.0.0b2,>=1.0.0b2

tests:
  - python:
      imports:
        - agent_framework.github_copilot
      python_version: ${{ python_min }}.*
      pip_check: true

about:
  summary: |
    GitHub Copilot integration for Microsoft Agent Framework.
  homepage: https://pypi.org/project/agent-framework-github-copilot/
  repository: https://github.com/microsoft/agent-framework
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - killua156
    - mgorny
