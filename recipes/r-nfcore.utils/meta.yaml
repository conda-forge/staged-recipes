{% set version = "0.0.1" %}
{% set posix = 'm2-' if win else '' %}

package:
  name: r-nfcore.utils
  version: {{ version|replace("-", "_") }}

source:
  url:
    - https://github.com/LouisLeNezet/files2db/archive/v{{ version }}.tar.gz
  sha256: 5e5eb5f05dc2a5d49063405218a5739001a9db18143ba810c31b201be136d098

build:
  number: 1
  rpaths:
    - lib/R/lib/
    - lib/

requirements:
  build:
    - cross-r-base {{ r_base }}  # [build_platform != target_platform]
    - pkg-config
  host:
    - r-base
  run:
    - r-base

test:
  requires:
    - r-r.utils
  commands:
    - $R -e "library('nfcore.utils')"  # [not win]
    - "\"%R%\" -e \"library('nfcore.utils')\""  # [win]

about:
  home: https://github.com/LouisLeNezet/r-nf-core-utils
  dev_url: https://github.com/LouisLeNezet/r-nf-core-utils
  doc_url: https://github.com/LouisLeNezet/r-nf-core-utils
  license: MIT
  summary: This package is aimed to anyone wanting to use R script within Nextflow. Its aim is to provide function allowing to lin easily Nextflow parameters to the R logic. It also perform validity check on the variable passed to ensure proper execution.
  license_file:
    - LICENSE

extra:
  recipe-maintainers:
    - conda-forge/r
    - LouisLeNezet
