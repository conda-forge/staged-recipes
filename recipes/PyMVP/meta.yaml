{% set version = "0.2.6" %}
{% set python_min = "3.10" %}

package:
  name: pymvp
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/P/PyMVP/pymvp-{{ version }}.tar.gz
  sha256: 3bc9ef725639ade2b57d7ef7823fc1c33f608d0b3c5938e6a7a3367c1a501b3d

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - pip
    - setuptools
  run:
    - python >={{ python_min }}
    - numpy >=1.24
    - matplotlib-base >=3.10.6
    - gsw >=3.6.20
    - tqdm >=4.67.1
    - cartopy >=0.25.0
    - scipy >=1.16.2
    - xarray >=2025.9.1
    - netcdf4 >=1.7.2
    - pandas >=2.1.0
    - geopy >=2.4.0

test:
  imports:
    - pymvp
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://pypi.org/project/PyMVP/
  summary: Python package for Moving Vessel Profiler correction and analysis
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - MxWmr


