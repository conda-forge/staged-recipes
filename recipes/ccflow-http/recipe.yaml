context:
  name: ccflow-http
  version: "0.1.0"
  python_min: "3.11"

package:
  name: ${{ name }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/c/ccflow-http/ccflow_http-${{ version }}.tar.gz
  sha256: fa4bd9193002964a6ad7289d5e1af019737bfdbb9773841c18ac7e7d63130e5f

build:
  noarch: python
  number: 0
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - hatchling
  run:
    - python >=${{ python_min }}
    - ccflow >=0.8.5
    - ccflow-etl >=0.1.0
    - httpx
    - jinja2

tests:
  - python:
      imports:
        - ccflow_http
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  homepage: https://github.com/timkpaine/ccflow-http
  repository: https://github.com/timkpaine/ccflow-http
  summary: ccflow-http
  license: Apache-2.0
  license_file: LICENSE

extra:
  recipe-maintainers:
    - timkpaine
