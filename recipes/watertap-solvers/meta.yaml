{% set name = "watertap-solvers" %}
{% set version = "24.12.9" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://github.com/watertap-org/{{ name }}/archive/{{ version }}.tar.gz
  sha256: ddefb8e2d0ed627a310f53c24eb3c5dece5242d2ca11519a231f84e794d4680a

build:
  noarch: python
  number: 0
  script: "{{ PYTHON }} -m pip install . -vv --no-deps --no-cache-dir --ignore-installed"

requirements:
  host:
    - python {{ python_min }}
    - setuptools
    - pip
  run:
    - python >={{ python_min }}
    - pyomo
    - idaes-pse

test:
  requires:
    - python {{ python_min }}
    - pip
    - pytest
    - ipython
    - cyipopt
  imports:
    - watertap_solvers
  commands:
    - pip check
    - pytest --pyargs watertap_solvers -v --tb=short --disable-warnings
  
about:
  home: "https://github.com/watertap-org/watertap-solvers"
  license: BSD-3-Clause-LBNL
  license_family: BSD
  license_file: LICENSE.md 
  summary: "WaterTAP Solvers"
  dev_url: "https://github.com/watertap-org/watertap-solvers"

extra:
  recipe-maintainers:
    - sufikaur
    - lbianchi-lbl
