context:
  version: 2.0.1

package:
  name: scrubadub
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/s/scrubadub/scrubadub-${{ version }}.tar.gz
  sha256: 52a1fb8aa9bc0226043e02c3ec22d450bd4ebeede9e7e8db2def7c89b37c5aad

build:
  number: 0 
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  noarch: python

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - setuptools
  run:
    - python >=${{ python_min }}
    - textblob ==0.15.3
    - phonenumbers
    - python-stdnum
    - dateparser
    - catalogue
    - scikit-learn
    - typing-extensions
    - faker

tests:
  - python:
      python_version:
        - ${{ python_min }}.*
        - "*"
      imports:
        - scrubadub
      pip_check: true

about:
  homepage: https://github.com/LeapBeyond/scrubadub
  summary: Clean personally identifiable information from dirty dirty text.
  license: MIT
  license_file:
    - LICENSE

extra:
  recipe-maintainers:
    - soapy1
