schema_version: 1

context:
  version: "3.5.1"

package:
  name: zsh-jupyter-kernel
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/z/zsh-jupyter-kernel/zsh_jupyter_kernel-${{ version }}.tar.gz
  sha256: e60454e6e6ffe1297b0d038b3cca7767529811376472cfaf7957eb2615f42479

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - jupyter_client
    - setuptools >=61
    - pip
  run:
    - python >=${{ python_min }}
    - ipykernel
    - pexpect
  run_constraints:
    - zsh >=5.1

tests:
  - python:
      imports:
        - zsh_jupyter_kernel
      python_version:
        - ${{ python_min }}.*
        - "*"
  - script:
      - python -m zsh_jupyter_kernel.install --sys-prefix
      - jupyter kernelspec list | grep zsh
      - ${{ "jupyter run --kernel=zsh test.sh" if unix }}
    files:
      recipe:
        - test.sh
    requirements:
      run:
        - ${{ "m2-grep" if win }}
        - ${{ "zsh" if unix }}

about:
  homepage: https://dan-oak.github.io/zsh-jupyter-kernel
  repository: https://github.com/dan-oak/zsh-jupyter-kernel
  documentation: https://dan-oak.github.io/zsh-jupyter-kernel
  license: GPL-3.0-only
  license_file: LICENSE.md
  summary: Z shell kernel for Project Jupyter
  description: A simple Z Shell Jupyter kernel powered by Python, IPyKernel, Pexpect, and enthusiasm — turn your scripts into notebooks!

extra:
  recipe-maintainers:
    - eunos-1128
