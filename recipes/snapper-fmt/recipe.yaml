schema_version: 1

context:
  version: "0.7.8"

package:
  name: snapper-fmt
  version: ${ version }

source:
  url: https://github.com/TurtleTech-ehf/snapper/archive/refs/tags/v${ version }.tar.gz
  sha256: 24ac83d9ec1b917387885646a0c35b31096ea2424274199c67b765c177e0216c

build:
  number: 0

requirements:
  build:
    - ${ compiler('c') }
    - ${ stdlib('c') }
    - ${ compiler('rust') }
    - cargo-bundle-licenses

tests:
  - script:
      - snapper --version
      - snapper --help
  - package_contents:
      bin:
        - snapper

about:
  homepage: https://snapper.turtletech.us
  summary: Semantic line break formatter for Org, LaTeX, Markdown, and plaintext
  description: |
    Snapper reformats prose so each sentence sits on its own line (semantic
    line breaks), preserving markup structure for Org, LaTeX, Markdown, RST,
    and plaintext. It ships a CLI, optional neural sentence splitting, an LSP
    server, file watching, and a pandoc AST backend.
  license: MIT
  license_file:
    - LICENSE
    - THIRDPARTY.yml
  documentation: https://snapper.turtletech.us
  repository: https://github.com/TurtleTech-ehf/snapper

extra:
  recipe-maintainers:
    - HaoZeke
