schema_version: 1

context:
  version: "0.8.1"

package:
  name: snapper-fmt
  version: ${{ version }}

source:
  url: https://github.com/TurtleTech-ehf/snapper/archive/refs/tags/v${{ version }}.tar.gz
  sha256: c2b4c8bb49445d449d75967f64c6e001718d1797b6a5357b2d839449961a7442

build:
  number: 0

requirements:
  build:
    - ${{ compiler('c') }}
    - ${{ stdlib('c') }}
    - ${{ compiler('rust') }}
    - cargo-bundle-licenses

tests:
  - script:
      - snapper --version
      - snapper --help
      - snapper-fmt --version
      - snapper-fmt --help
  - package_contents:
      bin:
        - snapper
        - snapper-fmt

about:
  homepage: https://snapper.turtletech.us
  summary: Semantic line break formatter for Org, LaTeX, Markdown, and plaintext
  description: |
    Snapper reformats prose so each sentence sits on its own line (semantic
    line breaks), preserving markup structure for Org, LaTeX, Markdown, RST,
    and plaintext. It ships a CLI, optional neural sentence splitting, an LSP
    server, file watching, and a pandoc AST backend. Package name is
    snapper-fmt; binaries are snapper and snapper-fmt (alias for hosts that
    already ship openSUSE snapper).
  license: MIT
  license_file:
    - LICENSE
    - THIRDPARTY.yml
  documentation: https://snapper.turtletech.us
  repository: https://github.com/TurtleTech-ehf/snapper

extra:
  recipe-maintainers:
    - HaoZeke
