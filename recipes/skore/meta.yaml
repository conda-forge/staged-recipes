{% set name = "skore" %}
{% set version = "0.4.1" %}
{% set sha256 = "a24410ffb26b461c9b48d40c703242e4015b49ae01e73a91163d0df55d9100c1" %}
{% set python_min = "3.9" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz
  sha256: {{ sha256 }}

build:
  noarch: python
  number: 0
  script: {{ PYTHON }} -m pip install . --no-deps -vv

requirements:
  host:
    - python {{ python_min }}
    - hatchling
    - pip
  run:
    - python >={{ python_min }}
    - diskcache
    - fastapi
    - plotly >=5,<6
    - rich
    - skops
    - uvicorn
    # remove in 0.5.0
    - pandas
    - pyarrow

test:
  requires:
    - python {{ python_min }}
    - pip
  imports:
    - skore
  commands:
    - pip check

about:
  home: https://github.com/probabl-ai/skore
  summary: 'Tooling and assistance for data scientists to "Own Your Data Science"'
  description: |
    skore is a tooling and assistance for data scientists to "Own Your Data Science".
  license: MIT
  license_family: MIT
  license_file: LICENSE
  doc_url: https://probabl-ai.github.io/skore/
  dev_url: https://github.com/probabl-ai/skore

extra:
  recipe-maintainers:
    - augustebaum
    - glemaitre
    - MarieS-WiMLDS
    - sylvaincom
    - thomass-dev
    - tuscland
