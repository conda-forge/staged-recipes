{% set name = "skore" %}
{% set version = "0.3.0" %}
{% set sha256 = "841f152c34d5bdd59cfa94cde63de4add35fa7effaa470b80939a9848ed16c37" %}
{% set python_min = "3.9" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz
  sha256: {{ sha256 }}

build:
  noarch: python
  number: 0
  script: {{ PYTHON }} -m pip install . --no-deps -vv

requirements:
  host:
    - python {{ python_min }}
    - hatchling
    - pip
  run:
    - python >={{ python_min }}
    - diskcache
    - fastapi
    - plotly >=5,<6
    - rich
    - skops
    - uvicorn

test:
  requires:
    - python {{ python_min }}
    - pip
    - pytest >=5.0.1
    - pytest-timeout
    - pytest-order
    - pytest-randomly
    - altair >=5,<6
    - httpx
    - matplotlib
    - pandas
    - pillow
    - plotly
    - scikit-learn
  imports:
    - skore
  commands:
    - pip check
    - pytest --timeout 300 --verbose --pyargs skore/tests

about:
  home: https://github.com/probabl-ai/skore
  summary: 'Tooling and assistance for data scientists to "Own Your Data Science"'
  description: |
    skore is a tooling and assistance for data scientists to "Own Your Data Science".
  license: MIT
  license_family: MIT
  license_file: LICENSE
  doc_url: https://probabl-ai.github.io/skore/
  dev_url: https://github.com/probabl-ai/skore

extra:
  recipe-maintainers:
    - augustebaum
    - glemaitre
    - MarieS-WiMLDS
    - rouk1
    - sylvaincom
    - thomass-dev
    - tuscland
