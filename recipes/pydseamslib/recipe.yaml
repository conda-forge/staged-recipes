schema_version: 1

context:
  name: pydseamslib
  version: "2.0.1"

package:
  name: ${{ name }}
  version: ${{ version }}

source:
  url: https://github.com/d-SEAMS/seams-core/archive/refs/tags/v${{ version }}.tar.gz
  sha256: 88e1999c57d128ef6fb873a939214a85a6b71db74c7738074dcd7fd139388eeb
  patches:
    - 0001-vesin-complete-no-readcon-fallback.patch

build:
  number: 0
  skip:
    - win
    - match(python, "<3.12")
  script:
    # Patch cannot delete wraps cleanly under conda (leaves empty file;
    # meson: "Missing sections in ...wrap"). Remove optional wrap here.
    - rm -f subprojects/readcon-core.wrap
    - export CXXFLAGS="${CXXFLAGS:-} -pthread"
    - export LDFLAGS="${LDFLAGS:-} -pthread"
    - ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  build:
    - ${{ compiler('c') }}
    - ${{ compiler('cxx') }}
    - ${{ stdlib('c') }}
    - meson >=1.3.0
    - ninja
    - pkg-config
    - cmake
    - if: build_platform != target_platform
      then:
        - cross-python_${{ target_platform }}
        - numpy
        - python
  host:
    - python
    - pip
    - meson-python >=0.16
    - nanobind >=2.0
    - numpy
    - eigen
    - libblas
    - liblapack
    - libhwy
  run:
    - python
    - numpy >=1.24

tests:
  - python:
      imports:
        - pydseamslib
        - pydseamslib._core
      pip_check: true

about:
  homepage: https://dseams.info
  summary: Deferred Structural Elucidation Analysis for Molecular Simulations
  description: |
    d-SEAMS is a collection of analysis tools for molecular simulations.
    It can be used to determine the ice and water topological network
    criteria, analyse quasi-one-dimensional topological features,
    compute order parameters, and more.
  license: MIT
  license_file: LICENSE
  documentation: https://wiki.dseams.info
  repository: https://github.com/d-SEAMS/seams-core

extra:
  recipe-maintainers:
    - HaoZeke
