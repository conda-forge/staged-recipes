{% set version = "0.3.1" %}

package:
  name: timing-asgi
  version: {{ version }}

source:
  - url: https://pypi.org/packages/source/t/timing-asgi/timing_asgi-{{ version }}.tar.gz
    sha256: 5f040b2588476c048dd09d8c8fc4b71152b9465474f5c1899a1f77c2b400e46f
  # LICENSE is currently only on master: future releases should include it as part of the
  # Python sdist on pypi, see https://github.com/steinnes/timing-asgi/pull/29
  - url: https://raw.githubusercontent.com/steinnes/timing-asgi/refs/heads/master/LICENSE
    sha256: b4aafd28b9a8677ffeeb65217a11eb6c56c50061aa6510fc90a33581907ff40d

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - poetry >=0.12
    - poetry-core
    - pip
  run:
    - python >={{ python_min }},<4.0.0

test:
  imports:
    - timing_asgi
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://pypi.org/project/timing-asgi/
  summary: ASGI middleware to emit timing metrics with something like statsd
  dev_url: https://github.com/steinnes/timing-asgi
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - dbast
    - sraza-ana
