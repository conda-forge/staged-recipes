schema_version: 1

context:
  name: asv_env_pixi
  version: "0.1.2"

package:
  name: ${{ name }}
  version: ${{ version }}

source:
  url: https://github.com/HaoZeke/asv_env_pixi/archive/refs/tags/v${{ version }}.tar.gz
  sha256: cdfe65909b357558ec23fcff43496feaea2a6f7345c73be041f8653e06e16d0e

build:
  noarch: python
  number: 0
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - setuptools
  run:
    - python >=${{ python_min }}
    - asv >=0.6.5
    - packaging
    - asv_env_rattler

tests:
  - python:
      imports:
        - asv_env_pixi
      python_version:
        - ${{ python_min }}.*
        - "*"
      # asv on conda-forge fails pip check (missing python-build; asv-runner metadata mismatch)
      pip_check: false

about:
  homepage: https://github.com/HaoZeke/asv_env_pixi
  summary: ASV environment plugin using pixi
  license: MIT
  license_file: LICENSE
  repository: https://github.com/HaoZeke/asv_env_pixi

extra:
  recipe-maintainers:
    - HaoZeke
