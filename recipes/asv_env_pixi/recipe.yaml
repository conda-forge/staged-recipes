schema_version: 1

context:
  name: asv_env_pixi
  version: "0.1.1"

package:
  name: ${{ name }}
  version: ${{ version }}

source:
  url: https://github.com/HaoZeke/asv_env_pixi/archive/refs/tags/v0.1.1.tar.gz
  sha256: 8403daa5eda1818543212a0d3fbb72d93848015ae1a21a55534e498f269d019c

build:
  noarch: python
  number: 0
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python
    - pip
    - setuptools
  run:
    - python
    - asv >=0.6.5
    - asv_env_rattler

tests:
  - python:
      imports:
        - asv_env_pixi
      pip_check: true

about:
  homepage: https://github.com/HaoZeke/asv_env_pixi
  summary: ASV environment plugin using pixi
  license: MIT
  license_file: LICENSE
  repository: https://github.com/HaoZeke/asv_env_pixi

extra:
  recipe-maintainers:
    - HaoZeke
