schema_version: 1

context:
  name: asv_env_rattler
  version: "0.1.1"
  python_min: "3.9"

package:
  name: ${{ name }}
  version: ${{ version }}

source:
  url: https://github.com/HaoZeke/asv_env_rattler/archive/refs/tags/v0.1.1.tar.gz
  sha256: 0beeaa761a74a487cab1ed7c874aeec89ab56a2262cf5ca3408399aefce03226

build:
  noarch: python
  number: 0
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - setuptools
  run:
    - python >=${{ python_min }}
    - asv >=0.6.5
    - packaging

tests:
  - python:
      python_version: ${{ python_min }}.*
      imports:
        - asv_env_rattler
      pip_check: true

about:
  homepage: https://github.com/HaoZeke/asv_env_rattler
  summary: ASV environment plugin using rattler
  license: MIT
  license_file: LICENSE
  repository: https://github.com/HaoZeke/asv_env_rattler

extra:
  recipe-maintainers:
    - HaoZeke
