schema_version: 1

context:
  name: asv_env_rattler
  version: "0.1.2"

package:
  name: ${{ name }}
  version: ${{ version }}

source:
  url: https://github.com/HaoZeke/asv_env_rattler/archive/refs/tags/v${{ version }}.tar.gz
  sha256: a3fffbd0a782e0966347b0c24347837a78037a8e53993ec10c78fbe798571853

build:
  noarch: python
  number: 0
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - setuptools
  run:
    - python >=${{ python_min }}
    - asv >=0.6.5
    - packaging
    - py-rattler >=0.22
    - pyyaml

tests:
  - python:
      imports:
        - asv_env_rattler
        - rattler
        - yaml
      python_version:
        - ${{ python_min }}.*
        - "*"
      # asv on conda-forge fails pip check (missing python-build; asv-runner metadata mismatch)
      pip_check: false
  - script:
      - python -c "import asv_env_rattler as m; assert m._HAS_RATTLER, 'py-rattler not available at runtime'"

about:
  homepage: https://github.com/HaoZeke/asv_env_rattler
  summary: ASV environment plugin using rattler
  license: MIT
  license_file: LICENSE
  repository: https://github.com/HaoZeke/asv_env_rattler

extra:
  recipe-maintainers:
    - HaoZeke
