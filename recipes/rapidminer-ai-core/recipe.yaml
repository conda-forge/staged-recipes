context:
  name: rapidminer-ai-core
  version: "2.0"
  python_min: "3.10"

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://maven.rapidminer.com/repository/pypi-snapshot/packages/rapidminer-ai-core/${{ version }}/rapidminer_ai_core-${{ version }}.tar.gz
  sha256: 9f36d43c178a0cf1df3aeabd7c23dc8b35bb68e20ef4d05f9b7dd4a0e23a8598

build:
  noarch: python
  number: 0
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ==${{ python_min }}
    - hatchling
    - pip
  run:
    - python >=${{ python_min }}
    - pandas >=2.2.0,<3.0.0
    - requests >=2.31.0,<3.0.0
    - numpy >=1.24.0,<3.0.0
    - zeep >=4.2.0,<5.0.0
    - h5py >=3.8.0,<4.0.0
    - cryptography >=41.0.0,<50.0.0
    - pyjwt >=2.8.0,<3.0.0

tests:
  - python:
      imports:
        - rapidminer
        - rapidminer.core
      pip_check: true

about:
  homepage: https://docs.rapidminer.com/latest/python/index.html
  summary: 'rapidminer-ai-core is a Python package for interacting with Siemens Rapidminer AI Studio and Siemens 
    Rapidminer AI Hub.'
  description: |
    rapidminer-ai-core is a Python package for interacting with Siemens Rapidminer AI Studio and Siemens 
    Rapidminer AI Hub. It enables collaboration through shared repositories, access to platform resources, and execution
    of processes on scalable infrastructure, helping users develop and operationalize data science and AI workflows efficiently.
  license: Apache-2.0
  license_file: LICENSE

extra:
  recipe-maintainers:
    - skontar-altair
    - tjarvas-altair
    - mboeck-siemens
