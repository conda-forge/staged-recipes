schema_version: 1

context:
  version: "0.1.0"
  python_min: "3.10"

package:
  name: dau-utils
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/d/dau-utils/dau_utils-${{ version }}.tar.gz
  sha256: da10b2b0881faf36334318f028488b33447ff7da655dcc1f2e1bd93d9fd091cc

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - hatchling
    - pip
  run:
    - python >=${{ python_min }}

tests:
  - python:
      imports:
        - dau_utils
      pip_check: true
  - requirements:
      run:
        - python ${{ python_min }}.*
    script:
      - dau-utils-pci-runtime-pm --help

about:
  summary: Utilities for dau
  license: Apache-2.0
  license_file: LICENSE
  homepage: https://github.com/dau-dev/dau-utils
  repository: https://github.com/dau-dev/dau-utils

extra:
  recipe-maintainers:
    - timkpaine
