# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  name: "ansys-dpf-core"
  version: "0.15.0"

package:
  name: ${{ name }}
  version: ${{ version }}

source:
  # no sdist on PyPI
  url: https://github.com/ansys/pydpf-core/archive/refs/tags/v${{ version }}.tar.gz
  sha256: 9341e1c8c345c8a012231fd4526b6a6df14a10b171425ec26d9c45b12fa0c62e

build:
  number: 0
  dynamic_linking:
    binary_relocation: false
  python:
    entry_points:
      - dpf_generate_operators_doc = ansys.dpf.core.documentation.generate_operators_doc:run_with_args

requirements:
  host:
    - python
    - pip
    - setuptools >=61.0.0
    - wheel
  run:
    - python
    - ansys-tools-common
    - grpcio >=1.63.0
    - importlib-metadata >=4.0
    - numpy
    - packaging
    - protobuf
    - psutil
    - setuptools
    - tqdm

tests:
  - python:
      imports:
        - ansys.dpf.core

about:
  summary: Data Processing Framework - Python Core
  homepage: https://dpf.docs.pyansys.com/
  repository: https://github.com/ansys/pydpf-core
  documentation: https://dpf.docs.pyansys.com/
  license: MIT
  license_family: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - PProfizi
    - moe-ad
