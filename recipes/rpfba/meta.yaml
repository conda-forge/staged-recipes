{% set name = "rpfba" %}
{% set version = "6.8.2" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://github.com/brsynth/rpFBA/archive/refs/tags/{{ version }}.tar.gz
  sha256: f377712a1479c267933ffdaf70023ea182b61320857fcef1a5547a5c38b60c9f

build:
  number: 0
  noarch: python
  script: {{ PYTHON }} setup.py install

requirements:
  host:
    - python {{ python_min }}
    - setuptools
  run:
    - python >={{ python_min }}
    - cobra
    - brs_utils >=1.26.0
    - rplibs >=6.9.3

test:
  requires:
    - python {{ python_min }}
  imports:
    - rpfba

about:
  home: https://github.com/brsynth/rpFBA/tree/main
  summary: "Perform FBA on a single or collection of SBML files containing heterologous pathways, as tar.xz archives."
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - ramez17khaled
