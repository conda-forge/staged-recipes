schema_version: 1

context:
  version: "0.1.1"
  python_min: "3.12"

package:
  name: ptgp
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/p/ptgp/ptgp-${{ version }}.tar.gz
  sha256: 4b7f7c4fa886431cd4a308e5644a7f509a207ea5ceeef7d08274c8eee81b5aad

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - hatchling
    - hatch-vcs
    - pip
  run:
    - python >=${{ python_min }}
    - numpy
    - pymc >=6.1.0,<6.2
    - pytensor >=3.1.2,<3.2

tests:
  - python:
      imports:
        - ptgp
      pip_check: true
      python_version: ${{ python_min }}.*

about:
  summary: A practitioner's toolbox for estimating large-scale Gaussian Process models with PyMC and PyTensor
  license: MIT
  license_file: LICENSE
  homepage: https://pypi.org/project/ptgp/

extra:
  recipe-maintainers:
    - bwengals
    - jessegrabowski
    - maresb
    - ricardoV94
