schema_version: 1

context:
  version: "0.1.0"
  python_min: "3.12"

package:
  name: ptgp
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/p/ptgp/ptgp-${{ version }}.tar.gz
  sha256: 6e813bf1e5d6781e50f8d328981279591438b772f5c20d4b1ee55b038356e504

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - hatchling
    - hatch-vcs
    - pip
  run:
    - python >=${{ python_min }}
    - jax
    - optax
    - numpy
    - pymc >=6.0.0
    - pytensor >=3.0.2

tests:
  - python:
      imports:
        - ptgp
      pip_check: true
      python_version: ${{ python_min }}.*

about:
  summary: A practitioner's toolbox for estimating large-scale Gaussian Process models with PyMC and PyTensor
  license: MIT
  license_file: LICENSE
  homepage: https://pypi.org/project/ptgp/

extra:
  recipe-maintainers:
    - bwengals
    - jessegrabowski
    - maresb
    - ricardoV94
