schema_version: 1

context:
  version: "0.35.0"

package:
  name: trajopt
  version: ${{ version }}

source:
  - url: https://github.com/tesseract-robotics/trajopt/archive/refs/tags/${{ version }}.tar.gz
    sha256: d847fe65e27c204c47c9f92d59710e57e7514defe5f8faa87aedf59d82ba6fbe
    file_name: source.tar.gz

build:
  number: 0

requirements:
  build:
    - ${{ compiler('c') }}
    - ${{ compiler('cxx') }}
    - ${{ stdlib("c") }}
    - gtest
    - gmock
    - cmake
    - ninja
    - ros-industrial-cmake-boilerplate
    - benchmark
    - lcov
  host:
    - libboost-devel
    - cereal
    - eigen-abi-devel
    - tinyxml2
    - console_bridge
    - assimp
    - urdfdom
    - fcl
    - octomap 
    - orocos-kdl 
    - pcl
    - gtest
    - gmock
    - pkg-config 
    - liblzma-devel
    - flann
    - jsoncpp
    - yaml-cpp
    - bullet-cpp
    - blas
    - osqp
    - osqp-eigen
    - qpoases
    - tesseract-robotics
    - if: unix
      then:
        - xorg-libx11
        - xorg-libxext
  run:
    - libboost-devel
    - cereal
    - eigen
    - tinyxml2
    - console_bridge
    - assimp
    - urdfdom
    - fcl
    - octomap 
    - orocos-kdl 
    - pcl
    - gtest
    - gmock
    - jsoncpp
    - taskflow 
    - yaml-cpp
    - bullet-cpp
    - blas
    - osqp
    - osqp-eigen
    - qpoases
    - if: unix
      then:
        - xorg-libx11
        - xorg-libxext
  run_exports:
    - ${{ pin_subpackage('trajopt', upper_bound='x.x') }}

tests:
  - package_contents:
      include:
        - trajopt/fwd.hpp
        - trajopt_common/fwd.h
        - trajopt_ifopt/fwd.h
        - trajopt_sco/sco_common.hpp
        - trajopt_sqp/fwd.h
      lib:
        - trajopt
        - trajopt_common
        - trajopt_ifopt
        - trajopt_sco
        - trajopt_sqp

about:
  summary: Trajectory Optimization Motion Planner
  license: BSD-2-Clause
  license_file: src/trajopt/LICENSE
  homepage: https://github.com/tesseract-robotics/trajopt

extra:
  recipe-maintainers:
    - johnwason
