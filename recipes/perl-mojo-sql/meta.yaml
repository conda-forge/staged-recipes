{% set name = "perl-mojo-sql" %}
{% set version = "0.02" %}

package:
  name: {{ name }}
  version: "{{ version }}"

source:
  url: https://cpan.metacpan.org/authors/id/S/SR/SRI/Mojo-SQL-{{ version }}.tar.gz
  sha256: 17a5312f0731ff8866f24415020a52e6763ebad84088ec906c0d62147ef3ae00


# If this is a new build for the same version, increment the build
# number. If you do not include this key, it defaults to 0.
build:
  number: 0
  run_exports:
    - {{ pin_subpackage(name, max_pin="x.x") }}
requirements:
  # Run exports are used now
  host:
    - perl >=5.32
    - perl-mojolicious
    - make

  run:
    - perl >=5.32
    - perl-mojolicious

test:
  commands:
    - perl -e "use Mojo::SQL"
  imports:
    - Mojo::SQL
    - Mojo::SQL::Statement

  # You can also put a file called run_test.pl (or run_test.py) in the recipe
  # that will be run at test time.

about:
  home: https://metacpan.org/release/SRI/Mojo-SQL-0.02/source/
  license: MIT
  license_file: LICENSE
  summary: 'Safely generate and compose SQL statements'
  
extra:
  recipe-maintainers:
    - khaled196
