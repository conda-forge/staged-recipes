context:
  version: "1.3"

package:
  name: memtailor
  version: ${{ version }}

source:
  url: https://github.com/Macaulay2/memtailor/releases/download/v${{ version }}/memtailor-${{ version }}.tar.gz
  sha256: 10f0c016e67912be1711a54b18c54d7024c8bfcaf0f279e11187402994150a20

build:
  skip:
    - win
  script:
    - ./configure --prefix=$PREFIX --enable-shared --without-gtest
    - make
    - make install
  files:
    exclude:
      - lib/libmemtailor.a
  number: 0

requirements:
  build:
    - ${{ stdlib("c") }}
    - ${{ compiler('cxx') }}
    - make

tests:
  - package_contents:
      files: include/memtailor.h

about:
  homepage: https://github.com/Macaulay2/memtailor
  summary: C++ library of special purpose memory allocators
  description: |
    Memtailor is a C++ library of special-purpose memory allocators, including
    an arena allocator and a memory pool, designed for better and more
    predictable performance than new/delete. The memory pool is useful for many
    fixed-size allocations, such as linked list nodes, while the arena
    allocator is fast, works like stack allocation, stays within the C++
    standard, and allows multiple independent arenas.
  license: BSD-3-Clause
  license_file: license.txt
  repository: https://github.com/Macaulay2/memtailor

extra:
  recipe-maintainers:
    - d-torrance
