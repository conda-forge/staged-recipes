{% set name = "insarhub" %}
{% set version = "0.1.0" %}
{% set python_min = "3.11" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://github.com/jldz9/InSARHub/archive/refs/tags/v{{ version }}.tar.gz
  sha256: 2123113daf9c2490e7afc608fd837e3b41b1cf17ae28cdc5079ab6953a127578

build:
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0
  noarch: python
  entry_points:
    - insarhub = insarhub.cli.main:main
    - insarhub-app = insarhub.app.main:serve

requirements:
  host:
    - python {{ python_min }}
    - pip
    - setuptools >=61.0
  run:
    - python >={{ python_min }}
    - gdal >=3.8
    - sqlite >=3.44
    - proj >=9.4
    - mintpy
    - asf_search
    - cdsapi
    - colorama
    - contextily
    - dem_stitcher
    - hyp3_sdk
    - matplotlib-base
    - panel >=1.4
    - param
    - rasterio >=1.4
    - sentineleof
    - numpy >=2.0
    - tqdm

test:
  requires:
    - python {{ python_min }}
    - pip
  imports:
    - insarhub
  commands:
    - pip check
    - insarhub --version

about:
  home: https://github.com/jldz9/InSARHub
  license: MIT
  license_file: LICENSE
  summary: "A modular Python framework for automated InSAR and time-series processing."
  doc_url: https://jldz9.github.io/InSARHub/


extra:
  recipe-maintainers:
    - jldz9
