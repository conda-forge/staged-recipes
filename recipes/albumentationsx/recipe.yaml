schema_version: 1

context:
  version: "2.3.1"
  python_min: "3.10"

package:
  name: albumentationsx
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/a/albumentationsx/albumentationsx-${{ version }}.tar.gz
  sha256: 45c43cb86d095e0186f63fa51ff14b47a91adc0eed978d75d1c7321300781d97

build:
  number: 0
  noarch: python
  script:
    content:
      - ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
    env:
      PYTHONHASHSEED: "0"

requirements:
  host:
    - python ${{ python_min }}.*
    - hatchling
    - pip
  run:
    - python >=${{ python_min }}
    - albucore ==0.1.6
    - numpy >=1.24.4
    - opencv >=4.13.0
    - pydantic >=2.12.4
    - pyyaml
    - scipy >=1.10
    - typing-extensions >=4.9.0
  run_constraints:
    - albumentations <0.0a0

tests:
  - python:
      python_version: ${{ python_min }}.*
      imports:
        - albumentations
      pip_check: true

about:
  homepage: https://albumentations.ai
  repository: https://github.com/albumentations-team/AlbumentationsX
  documentation: https://albumentations.ai/docs/
  license: AGPL-3.0-or-later
  license_file: LICENSE
  summary: Fast augmentation library for computer vision and medical imaging.

extra:
  recipe-maintainers:
    - ternaus
