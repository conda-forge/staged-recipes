# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "1.1.0"

package:
  name: langchain-ibm
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/l/langchain-ibm/langchain_ibm-${{ version }}.tar.gz
  sha256: 09695295a2773a2f651272586e86a95275872b404c11421d609cfb7866a17c26

build:
  noarch: python
  number: 0
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - pdm-backend
    - pip
  run:
    - python >=${{ python_min }},<3.15
    - langchain-core >=1.2.22,<2.0.0
    - ibm-watsonx-ai >=1.3.37,<2.0.0
    - json-repair >=0.30.0,<1.0.0

tests:
  - python:
      imports:
        - langchain_ibm
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  homepage: https://github.com/langchain-ai/langchain-ibm
  repository: https://github.com/langchain-ai/langchain-ibm
  license: MIT
  license_file: LICENSE
  summary: An integration package connecting IBM watsonx.ai and LangChain
  description: |
    langchain-ibm is the LangChain integration package for IBM watsonx.ai,
    exposing IBM foundation models, embeddings, and rerankers as LangChain
    chat models, LLMs, and tools.

extra:
  recipe-maintainers:
    - rxm7706
