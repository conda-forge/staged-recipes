context:
  version: "2.1.3"

package:
  name: mactop
  version: ${{ version }}

source:
  url: https://github.com/metaspartan/mactop/archive/refs/tags/v${{ version }}.tar.gz
  sha256: 34c8042bbc8ed7de5f8a7bab261d38f82135bde813a7ebff461bde434aed0cfc
  target_directory: src

build:
  skip: not (osx and arm64)
  number: 0
  script:
    - cd src
    - go-licenses save . --save_path ../library_licenses
    - go build -v -o $PREFIX/bin/mactop -ldflags="-s -w"

requirements:
  build:
    - ${{ compiler("c") }}
    - ${{ compiler("go-cgo") }}
    - go-licenses

tests:
  - script: mactop -h
  - package_contents:
      bin:
        - mactop
      strict: true

about:
  homepage: https://github.com/metaspartan/mactop
  summary: Apple Silicon Monitor Top
  description: |
    mactop is a simple terminal based Apple Silicon power monitor written in Go.
    It displays CPU, memory, disk, network, battery, temperature, and fan information
    on macOS systems with Apple Silicon.
  license: MIT
  license_file:
    - src/LICENSE
    - library_licenses/
  repository: https://github.com/metaspartan/mactop

extra:
  recipe-maintainers:
    - xhochy
