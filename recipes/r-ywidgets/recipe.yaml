schema_version: 1

context:
  version: "0.1.1"
  name: r-ywidgets

package:
  name: ${{ name }}
  version: ${{ version }}

source:
  url: https://github.com/QuantStack/${{ name }}/archive/refs/tags/v${{ version }}.tar.gz
  sha256: e32bc9abd4b75c79ac677bdabc07cc321f0193194b1a1057c4ae6143811776fb

build:
  number: 0
  noarch: generic
  script:
    - R CMD INSTALL --build .

requirements:
  host:
    - r-base
    - r-r6
    - r-yr >=0.1.2
    - xeus-r
  run:
    - r-base
    - r-r6
    - r-yr >=0.1.2

tests:
  - script:
      - Rscript -e 'library("ywidgets")'

about:
  homepage: https://github.com/QuantStack/r-ywidgets
  summary: Y-CRDT based widgets in R
  description: |
    Provides R API to create core widgets whose state is synchronized in a Y-CRDT document.
  license: MIT
  license_file:
    - LICENSE
  repository: https://github.com/QuantStack/r-ywidgets

extra:
  recipe-maintainers:
    - AntoinePrv
