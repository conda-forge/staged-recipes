schema_version: 1

context:
  version: "0.4.0"

package:
  name: lifewatch-pypam
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/l/lifewatch-pypam/lifewatch_pypam-${{ version }}.tar.gz
  sha256: db39dca334ccf6e031beef306c61953740ab1ef7b95cdc471bd1bed4b37d2ec4

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - poetry-core
    - pip
  run:
    - python >=${{ python_min }}
    - matplotlib-base >=3.7.1,<4.0.0
    - pandas >=2.0.2,<3.0.0
    - seaborn 0.13.0.*
    - pysoundfile >=0.12.1,<0.13.0
    - tqdm >=4.65.0,<5.0.0
    - numba >=0.58
    - noisereduce >=2.0.1,<3.0.0
    - scikit-learn >=1.2.2,<2.0.0
    - python-dateutil >=2.8.2,<3.0.0
    - xarray 2023.8.0.*
    - pyhydrophone >=0.2.0
    - netcdf4 >=1.6.4,<2.0.0
    - syrupy >=4.0.4,<5.0.0
    - scikit-maad >=1.4.3,<2.0.0
    - openpyxl >=3.1.5,<4.0.0
    - numpy <2.0
    - pvlib-python <0.12.0,>=0.11.0
    - dask-core <2024.0.0,>=2023.0.0
  run_constraints:
    - pvlib-python >=0.11.0,<0.12.0
    - dask-core >=2023.0.0,<2024.0.0
    - imagecodecs <2026.3.6

tests:
  - python:
      imports:
        - pypam
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  summary: Facilitate acoustic processing from underwater acoustic recorders
  license: GPL-3.0-only
  license_file: LICENSE
  homepage: https://github.com/lifewatch/pypam.git

extra:
  recipe-maintainers:
    - ocefpaf
