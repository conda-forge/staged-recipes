schema_version: 1

context:
  name: envwrap
  version: 0.2.0

package:
  name: ${{ name }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/${{ name[0] }}/${{ name }}/${{ name }}-${{ version }}.tar.gz
  sha256: 774137e586d787be9fc08baa16550659d3576c6e45b469d4d6f2b5ef2605608e

build:
  number: 0
  noarch: python
  script: pip install . -vv
  python:
    entry_points:
      - envwrap = envwrap.cli:main

requirements:
  host:
    - python ${{ python_min }}.*
    - setuptools >=42
    - setuptools-scm >=3.4
    - pip
  run:
    - python >=${{ python_min }}
    - platformdirs
    - if: match(python, "<3.11")
      then: toml
    - pyyaml

tests:
  - python:
      imports:
        - envwrap
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"
  - files:
      source:
        - tests
        - pyproject.toml
    requirements:
      run:
        - python ${{ python_min }}.*
        - pytest
        - toml
    script:
      - envwrap --help
      - pytest

about:
  summary: Override parameter defaults via environment variables & config files
  license: MPL-2.0
  license_file: LICENCE
  homepage: https://pypi.org/project/envwrap/
  repository: https://github.com/tqdm/envwrap

extra:
  recipe-maintainers:
    - casperdcl
