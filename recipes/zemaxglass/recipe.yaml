schema_version: 1

context:
  python_min: "3.12"
  version: "2.0.0"

package:
  name: zemaxglass
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/z/zemaxglass/zemaxglass-${{ version }}.tar.gz
  sha256: cb88f633b37cda6e583e00ec1e6f87d1f4b53a8695142cf9357e7496349bddf0

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  python:
    entry_points:
      - zemaxglassdemo = ZemaxGlass.ZemaxGlass:main

requirements:
  host:
    - python ${{ python_min }}.*
    - setuptools >=82.0.1
    - setuptools-scm >=10.0.5
    - pip
  run:
    - python >=${{ python_min }}
    - numpy >=2.4.6
    - scipy >=1.17.1
    - matplotlib-base >=3.10.9
    - cycler >=0.12.1

tests:
  - python:
      imports:
        - ZemaxGlass
      pip_check: true
      python_version: ${{ python_min }}.*

about:
  summary: Zemax glass (.agf) file reader
  license: MIT
  license_file: LICENSE.txt
  homepage: https://github.com/nzhagen/zemaxglass
  documentation: https://github.com/nzhagen/zemaxglass/ZemaxGlass_user_manual.pdf

extra:
  recipe-maintainers:
    - mjhoptics
