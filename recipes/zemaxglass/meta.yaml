{% set name = "zemaxglass" %}
{% set version = "2.0.0" %}
{% set python_min = "3.12" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz
  sha256: cb88f633b37cda6e583e00ec1e6f87d1f4b53a8695142cf9357e7496349bddf0

build:
  number: 0
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python {{ python_min }}
    - setuptools >=82.0.1
    - setuptools-scm >=10.0.5
    - pip
  run:
    - python >={{ python_min }}
    - numpy >=2.4.6
    - scipy >=1.17.1
    - matplotlib-base >=3.10.9
    - cycler >=0.12.1

test:
  imports:
    - zemaxglass
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://pypi.org/project/zemaxglass
  summary: Zemax glass (.agf) file reader
  doc_url: https://github.com/nzhagen/zemaxglass/ZemaxGlass_user_manual.pdf
  dev_url: https://github.com/nzhagen/zemaxglass
  license: MIT
  license_file: LICENSE.txt

extra:
  recipe-maintainers:
    - mjhoptics
