context:
  version: "1.0.0"

package:
  name: sohviewer
  version: ${{ version }}

source:
  url: https://gitlab.com/earthscope/public/epic/passoft/sohstationviewer/-/archive/v${{ version }}/sohstationviewer-v${{ version }}.tar.gz
  sha256: b6f2339ffa57c3a56fab3067e2b24b0b4df4a16ab8b06801ff7776c3dc38fb80

build:
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0
  python:
    entry_points:
      - sohviewer = sohstationviewer.main:main

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - setuptools
  run:
    - python >=${{ python_min }}
    - numpy >=1.23.0,<2.0
    - obspy >=1.3.0
    - pyside6 >=6.7
    - matplotlib >=3.6.2

tests:
  - python:
      imports:
        - sohstationviewer
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"
  - script:
      - sohviewer --help

about:
  homepage: https://epic.earthscope.org/content/software-resources
  summary: Visualize State-of-Health packets from raw datalogger data
  description: |
    Visualize State-of-Health (SOH) packets from raw data recorded by different types of dataloggers.
  license: GPL-3.0-or-later
  license_file: LICENSE
  repository: https://gitlab.com/earthscope/public/epic/passoft/sohstationviewer

extra:
  recipe-maintainers:
    - omid-earthscope
