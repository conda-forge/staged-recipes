context:
  version: "2024.2.1.0"
  git_tag: "v1.0.0"

package:
  name: sohviewer
  version: ${{ version }}

source:
  url: https://gitlab.com/earthscope/public/epic/passoft/sohstationviewer/-/archive/${{ git_tag }}/sohstationviewer-${{ git_tag }}.tar.gz
  sha256: 96cad0a3b31634e68c58dcefa984c12c6dc59f77f67e7d06d2c6783b5c2e1a89

build:
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python >=3.9
    - pip
    - setuptools
  run:
    - python >=3.9
    - numpy >=1.23
    - obspy >=1.3
    - pyside6 >=6.5
    - matplotlib >=3.5

tests:
  - python:
      imports:
        - sohstationviewer
      pip_check: true

about:
  homepage: https://epic.earthscope.org/content/software-resources
  summary: Visualize State-of-Health packets from raw datalogger data
  description: |
    Visualize State-of-Health (SOH) packets from raw data recorded by different types of dataloggers.
  license: GPL-3.0-or-later
  license_file: LICENSE
  repository: https://gitlab.com/earthscope/public/epic/passoft/sohstationviewer

extra:
  recipe-maintainers:
    - omid-earthscope
