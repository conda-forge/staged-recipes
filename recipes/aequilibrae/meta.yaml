{% set name = "aequilibrae" %}
{% set version = "0.8.2" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.io/packages/source/{{ name[0] }}/{{ name }}/aequilibrae-{{ version }}.tar.gz
  sha256: dbee7cdfa62971581297ddf1af34776b76e7597c045a8db6ba92b6c871d5a43d

build:
  script: {{ PYTHON }} -m pip install . -vv
  number: 0

requirements:
  build:
    - {{ compiler('c') }}
    - {{ compiler('cxx') }}
    - openmp
  host:
    - python
    - setuptools
    - numpy
    - cython
    - pyaml
    - pyqt
    - requests
    - scipy
    - shapely
    - pandas
    - pyarrow
    - pyproj
    - wheel
    - pip
    - openmp
  run:
    - python
    - scipy
    - pyaml
    - cython
    - pyshp
    - requests
    - shapely
    - pandas
    - pyproj
    - {{ pin_compatible('numpy') }}
    - openmp

test:
  imports:
    - aequilibrae
  commands:
    - pip check
  requires:
    - pip

about:
  home: https://github.com/AequilibraE/aequilibrae
  summary: A package for transportation modeling
  license: MIT
  license_file: LICENSE.TXT

extra:
  recipe-maintainers:
    - pedrocamargo
