{% set name = "aequilibrae" %}
{% set version = "0.8.3" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.io/packages/source/{{ name[0] }}/{{ name }}/aequilibrae-{{ version }}.tar.gz
  sha256: 64c30ae76460deccc197a732564d15f499b56a6c3d45ae720ca01978c18e841d

build:
  script: {{ PYTHON }} -m pip install . -vv
  number: 0
  script_env:
    - CFLAGS=-D_LIBCPP_DISABLE_AVAILABILITY  # [osx]

requirements:
  build:
    - {{ compiler('c') }}
    - {{ compiler('cxx') }}
    - llvm-openmp  # [osx]
    - libgomp      # [linux]
  host:
    - python
    - setuptools
    - numpy
    - cython
    - pyaml
    - pyqt
    - requests
    - scipy
    - shapely
    - pandas
    - pyarrow
    - pyproj
    - wheel
    - pip
  run:
    - python
    - scipy
    - pyaml
    - cython
    - pyshp
    - requests
    - shapely
    - pandas
    - pyproj
    - {{ pin_compatible('numpy') }}

test:
  imports:
    - aequilibrae
  commands:
    - pip check
  requires:
    - pip

about:
  home: https://github.com/AequilibraE/aequilibrae
  summary: A package for transportation modeling
  license: MIT
  license_file: LICENSE.TXT

extra:
  recipe-maintainers:
    - pedrocamargo
