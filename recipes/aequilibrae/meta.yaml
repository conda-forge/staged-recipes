{% set name = "aequilibrae" %}
{% set version = "0.8.1" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.io/packages/source/{{ name[0] }}/{{ name }}/aequilibrae-{{ version }}.tar.gz
  sha256: e3a5ea11ac49721e5816b24526ef4a20a60061dfd3e466f32ec3e2cd36567dd6

build:
  script: {{ PYTHON }} -m pip install . -vv
  number: 0

requirements:
  build:
    - {{ compiler('c') }}
  host:
    - python
    - setuptools
    - numpy
    - cython
    - pyaml
    - pyqt
    - requests
    - scipy
    - shapely
    - pandas
    - pyarrow
    - pyproj
    - wheel
    - pip
  run:
    - python
    - scipy
    - pyaml
    - cython
    - pyshp
    - requests
    - shapely
    - pandas
    - pyproj
    - {{ pin_compatible('numpy') }}

test:
  imports:
    - aequilibrae
  commands:
    - pip check
  requires:
    - pip

about:
  home: https://github.com/AequilibraE/aequilibrae
  summary: A package for transportation modeling
  license: MIT
  license_file: LICENSE.TXT

extra:
  recipe-maintainers:
    - Jake-Moss
    - pedrocamargo
    - jamiecook
