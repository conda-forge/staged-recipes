# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "1.6.0"

package:
  name: django-zxcvbn-password-validator
  version: ${{ version }}

source:
  - url: https://pypi.org/packages/source/d/django-zxcvbn-password-validator/django_zxcvbn_password_validator-${{ version }}.tar.gz
    sha256: 5afd5d92313dd0e274817706a16211f0660ff771ec4fb3e6d79b2512d1308ff1

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - setuptools
  run:
    - python >=${{ python_min }}
    - django
    - zxcvbn

tests:
  - python:
      imports:
        - django_zxcvbn_password_validator
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  homepage: https://pypi.org/project/django-zxcvbn-password-validator/
  license: MIT
  license_file: LICENSE
  summary: A translatable password validator for django, based on zxcvbn-python.
  description: |
    A translatable password validator for django, based on zxcvbn-python.
  repository: https://github.com/Pierre-Sassoulas/django-zxcvbn-password-validator

extra:
  recipe-maintainers:
    - rxm7706
