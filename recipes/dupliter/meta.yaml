{% set name = "dupliter" %}
{% set version = "0.1.0" %}

package:
  name: {{ name }}
  version: {{ version }}

source:
  url: https://files.pythonhosted.org/packages/source/d/dupliter/dupliter-{{ version }}.tar.gz
  sha256: b34e4abd4b8216a30915f9ab3d32c4a1f08713a495715f31a4e8429835bcfbc5

build:
  number: 0
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv
  entry_points:
    - dupliter = dupliter.bbs:main

requirements:
  host:
    - python
    - pip
    - hatchling
  run:
    - python

test:
  imports:
    - dupliter
    - dupliter.core
  commands:
    - python -c "from dupliter import relativistic_to_classical_ratio; assert relativistic_to_classical_ratio(0.5) > 1"

about:
  home: https://pypi.org/project/dupliter/
  license: MIT
  license_file: LICENSE
  summary: Retro BBS-style terminal simulator for the Dupliter gravitational temporal anchor hypothesis
  description: |
    Dupliter is an educational/exploratory terminal simulator by Ashlan Chidester.
    It computes the relativistic/classical KE ratio and a Dupliter Stability Index (DSI)
    combining relativistic scaling with dark matter potential and gravitational anchor parameters.
  dev_url: https://github.com/RedWinterDawn/The-Dupliter-Equation-Game
  doc_url: https://pypi.org/project/dupliter/

extra:
  recipe-maintainers:
    - RedWinterDawn
