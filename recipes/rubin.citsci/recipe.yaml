schema_version: 1

context:
  version: "0.9.2"

package:
  name: rubin.citsci
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/r/rubin.citsci/rubin_citsci-${{ version }}.tar.gz
  sha256: b5f088baaf33f62205eb3959fce951d77134fd4ebdb3de5b75021596c58d858e

build:
  number: 0
  skip:
    - win
    - match(python, "<3.9")
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python
    - setuptools
    - pip
  run:
    - python
    - panoptes-client
    - google-cloud-storage
    - requests

tests:
  - python:
      imports:
        - rubin.citsci
      pip_check: true

about:
  summary: The companion package to the Rubin citizen science notebooks.
  license: CC-BY-NC-SA-4.0
  license_file: LICENSE
  homepage: https://rubinobservatory.org/for-scientists/citizen-science
  repository: https://github.com/lsst-epo/citsci-notebook-core-pipeline

extra:
  recipe-maintainers:
    - gnublet
    - ericdrosas87
