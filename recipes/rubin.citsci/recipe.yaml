schema_version: 1

context:
  python_min: "3.9"
  version: "0.9.0"

package:
  name: rubin.citsci
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/r/rubin.citsci/rubin_citsci-${{ version }}.tar.gz
  sha256: b5f088baaf33f62205eb3959fce951d77134fd4ebdb3de5b75021596c58d858e

build:
  number: 0
  skip:
    - win
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - setuptools
    - pip
  run:
    - python >=${{ python_min }}
    - panoptes-client
    - google-cloud-storage
    - requests

tests:
  - python:
      imports:
        - rubin.citsci
      pip_check: true
      python_version: ${{ python_min }}.*

about:
  summary: The companion package to the Rubin citizen science notebooks.
  license: CC-BY-NC-SA-4.0
  license_file: LICENSE
  homepage: https://rubinobservatory.org/for-scientists/citizen-science
  repository: https://github.com/lsst-epo/citsci-notebook-core-pipeline

extra:
  recipe-maintainers:
    - gnublet
    - ericdrosas87
