schema_version: 1

context:
  version: "0.9.2"
  python_min: "3.9"

package:
  name: rubin.citsci
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/r/rubin.citsci/rubin_citsci-${{ version }}.tar.gz
  sha256: 1c85b102ca9a27f26436296d3f45a9b3ffdd2d254a26e071cd705bfc80caa303

build:
  number: 0
  skip:
    - win
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - setuptools
    - pip
  run:
    - python >=${{ python_min }}
    - panoptes-client
    - google-cloud-storage
    - requests

tests:
  - python:
      imports:
        - rubin.citsci
      pip_check: true
      python_version: ${{ python_min }}.*

about:
  summary: The companion package to the Rubin citizen science notebooks.
  license: MIT
  license_file: LICENSE
  homepage: https://rubinobservatory.org/for-scientists/citizen-science
  repository: https://github.com/lsst-epo/citsci-notebook-core-pipeline

extra:
  recipe-maintainers:
    - gnublet
    - ericdrosas87
