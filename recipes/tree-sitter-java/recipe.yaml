schema_version: 1

context:
  version: "0.23.5"

package:
  name: tree-sitter-java
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/t/tree_sitter_java/tree_sitter_java-${{ version }}.tar.gz
  sha256: f5cd57b8f1270a7f0438878750d02ccc79421d45cca65ff284f1527e9ef02e38

build:
  number: 0
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  build:
    - ${{ compiler("c") }}
  host:
    - python
    - pip
    - setuptools >=42
    - wheel
  run:
    - python

tests:
  - python:
      imports:
        - tree_sitter_java

about:
  homepage: https://github.com/tree-sitter/tree-sitter-java
  summary: Java grammar for tree-sitter
  license: MIT
  license_file: LICENSE
  repository: https://github.com/tree-sitter/tree-sitter-java

extra:
  recipe-maintainers:
    - killua156
    - mgorny
