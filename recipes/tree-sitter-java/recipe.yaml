# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  name: tree-sitter-java
  version: "0.23.5"

package:
  name: ${{ name }}
  version: ${{ version }}

# Upstream PyPI sdist strips src/tree_sitter/*.h headers needed for the C build
# (see SKILL.md Recipe Authoring Gotcha G5); source from the GitHub tag instead.
source:
  url: https://github.com/tree-sitter/${{ name }}/archive/refs/tags/v${{ version }}.tar.gz
  sha256: cb199e0faae4b2c08425f88cbb51c1a9319612e7b96315a174a624db9bf3d9f0

build:
  number: 0
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  build:
    - if: build_platform != host_platform
      then:
        - python
        - cross-python_${{ target_platform }}
    - ${{ compiler('c') }}
    - ${{ stdlib('c') }}
  host:
    - python
    - setuptools >=42
    - wheel
    - pip
  run:
    - python

tests:
  - python:
      imports:
        - tree_sitter_java
      pip_check: true

about:
  summary: Java grammar for tree-sitter
  license: MIT
  license_file: LICENSE
  homepage: https://github.com/tree-sitter/tree-sitter-java

extra:
  recipe-maintainers:
    - rxm7706
