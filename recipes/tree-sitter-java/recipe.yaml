schema_version: 1

context:
  version: "0.23.5"

package:
  name: tree-sitter-java
  version: ${{ version }}

source:
  url: https://github.com/tree-sitter/tree-sitter-java/archive/refs/tags/v${{ version }}.tar.gz
  sha256: cb199e0faae4b2c08425f88cbb51c1a9319612e7b96315a174a624db9bf3d9f0

build:
  number: 0
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  build:
    - ${{ compiler("c") }}
  host:
    - python
    - pip
    - setuptools >=42
  run:
    - python

tests:
  - python:
      imports:
        - tree_sitter_java

about:
  homepage: https://github.com/tree-sitter/tree-sitter-java
  summary: Java grammar for tree-sitter
  license: MIT
  license_file: LICENSE
  repository: https://github.com/tree-sitter/tree-sitter-java

extra:
  recipe-maintainers:
    - killua156
    - mgorny
