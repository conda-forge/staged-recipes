schema_version: 1

context:
  version: "1.4.0"
  python_min: "3.10"

package:
  name: instro
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/i/instro/instro-${{ version }}.tar.gz
  sha256: 80dcd3673a66fa6c9c0da6041dc32a9f507ddf5e65a066046a11fc7cdf1eb5d1

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  python:
    entry_points:
      - instro = instro.cli.main:app

requirements:
  host:
    - python ${{ python_min }}.*
    - hatchling
    - pip
  run:
    - python >=${{ python_min }},<3.14
    - cramjam
    - fastavro >=1.12.1
    - gpib-ctypes >=0.3.0
    - libusb-package
    - nominal >=1.99.0,<2.0.0
    - psutil
    - pydantic >=2.0
    - pymodbus >=3.10,<3.13
    - pyserial >=3.5
    - pyusb
    - pyvicp
    - pyvisa >=1.15
    - pyvisa-py >=0.8.1,<0.9
    - textual >=0.80
    - thermocouples >=2.1.2
    - typer >=0.12
    - zeroconf

tests:
  - python:
      imports:
        - instro
      pip_check: true
      python_version: ${{ python_min }}.*
  - requirements:
      run:
        - python ${{ python_min }}.*
    script:
      - instro --help

about:
  summary: "Typed Python API for test-and-measurement instruments: power supplies, multimeters, electronic loads, DAQs, and more"
  license: Apache-2.0
  license_file:
    - LICENSE
    - NOTICE
  homepage: https://github.com/nominal-io/instro
  repository: https://github.com/nominal-io/instro

extra:
  recipe-maintainers:
    - wolfv
