schema_version: 1

context:
  name: jupyter-tiler
  version: "0.7.0"
  python_min: "3.12"

package:
  name: ${{ name | lower }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/${{ name[0] }}/${{ name }}/${{ name | replace('-', '_') }}-${{ version }}.tar.gz
  sha256: 1980730f265d36509553540729206561dc0a5bdeef09c9d0c01ce40e0b8ca355

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - hatchling >=1.5.0
    - hatch-vcs
    - pip
    - jupyterlab >=4.5.1
  run:
    - python >=${{ python_min }}
    - jupyter_server >=2.4.0
    - jupyter-server-proxy >=4.4.0
    - anyio >=4.0
    - anycorn >=0.18.0
    - rioxarray >=0.19.0
    - geopandas >=1.0.0
    - titiler-core >=1.1.1
    - titiler-xarray >=1.1.1
    - xpublish-tiles >=0.4.2

tests:
  - python:
      python_version:
        - ${{ python_min }}.*
        - "*"
      pip_check: true
      imports:
        - jupyter_tiler
  - script:
      - if: unix
        then: jupyter server extension list 2>&1 | grep -ie "jupyter_tiler.*OK"
      - if: win
        then: jupyter server extension list 2>&1 | findstr /i /r "jupyter_tiler.*OK"
    requirements:
      run:
        - python ${{ python_min }}.*

about:
  homepage: https://github.com/geojupyter/jupyter-tiler
  summary: |
    A Jupyter server extension which provides an API to launch a server to
    dynamically tile Xarray DataArrays for interactive visualization.
  license: BSD-3-Clause
  license_family: BSD
  license_file: LICENSE

extra:
  recipe-maintainers:
    - mfisher87
    - martinrenou
    - davidbrochart
