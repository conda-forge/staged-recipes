{% set name = "escape-fel" %}
{% set version = "0.1.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.io/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz
  # Fill in sha256 after the first PyPI release:
  #   pip download --no-deps escape-fel==0.1.0
  #   sha256sum escape_fel-0.1.0.tar.gz
  sha256: 55d9f62133452ad9cf7a98ee843e110aa4b544d71188f6bcabfc1bd08d70f5f4

build:
  number: 0
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python >=3.9
    - pip
    - setuptools >=64
    - setuptools-scm >=8
  run:
    - python >=3.9
    - numpy
    - dask
    - h5py
    - zarr
    - hickle
    - tqdm
    - rich
    - matplotlib
    - pandas

test:
  imports:
    - escape
    - escape.storage
  commands:
    - python -c "import escape; print(escape.__version__)"

about:
  home: https://github.com/htlemke/escape-fel
  summary: Event-based data framework for free-electron lasers
  description: |
    escape (Event Synchronous Categorisation And Processing Environment) is a
    high-level, object-oriented framework for processing event-based data from
    free-electron laser experiments. It pairs raw measurement arrays with pulse
    IDs and scan metadata, and provides index-aligned arithmetic, scan-step
    aggregation, and HDF5/zarr storage.
  license: MIT
  license_file: LICENSE
  doc_url: https://escape-fel.readthedocs.io

extra:
  recipe-maintainers:
    - htlemke

