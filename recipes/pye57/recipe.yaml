schema_version: 1

context:
  name: pye57
  version: 0.4.19

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/p/pye57/pye57-${{ version }}.tar.gz
  sha256: 0323a0cb5e62286fb3f4d7a2c63d811bb813ac65e2a21cfadf8ca848eaa27101

build:
  number: 0
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  build:
    - ${{ compiler('cxx') }}
    - ${{ stdlib('c') }}
  host:
    - python ${{ python_min }}.*
    - pip
    - setuptools >=42
    - wheel
    - pybind11 >=2.8.0
    - numpy
    - xerces-c
  run:
    - python >=${{ python_min }}
    - numpy
    - pyquaternion
    - xerces-c

tests:
  - python:
      imports:
        - pye57
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  homepage: https://github.com/davidcaron/pye57
  repository: https://github.com/davidcaron/pye57
  summary: Python .e57 files reader/writer
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - swahtz
