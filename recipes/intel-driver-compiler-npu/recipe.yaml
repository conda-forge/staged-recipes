schema_version: 1

# Builds the Intel NPU "Compiler-in-Driver" (CiD) -- the MLIR/VPUX compiler that
# lowers OpenVINO IR to NPU blobs. As of OpenVINO 2026.2 the CiD is two shared
# libraries: libopenvino_intel_npu_compiler_loader.so (the thin VCL loader the
# OpenVINO NPU plugin dlopens) and libopenvino_intel_npu_compiler.so (the
# MLIR/VPUX compiler the loader dlopens by base name).
#
# VENDORED / STATIC STRATEGY (the upstream-recommended CiD build). Rather than
# consuming an experimental new OpenVINO output, this recipe vendors the matching
# OpenVINO source and builds npu_compiler the way Intel documents the CiD: the
# OpenVINO source is configured with BUILD_SHARED_LIBS=OFF and npu_compiler is
# attached as an OPENVINO_EXTRA_MODULES, then only the two CiD compiler targets
# are built. OpenVINO core + the IR frontend + Intel's LLVM/MLIR fork +
# npu_plugin_elf + the NPU cost model are all statically fused into the compiler
# libraries. The result has NO run dependency on a shared libopenvino, and needs
# no new/experimental conda-forge output -- only system libraries (TBB, pugixml,
# ...) already in conda-forge.
#
# Honors conda-forge norms: only Intel-specific sources that have no conda-forge
# package are vendored (npu_compiler, Intel's LLVM/MLIR fork, npu_plugin_elf,
# npu-nn-cost-model, and the OpenVINO source needed for the static dev build);
# everything else (TBB, pugixml, flatbuffers, zlib, ...) is consumed from
# conda-forge via the ENABLE_SYSTEM_* flags; and no static libraries are shipped
# (the artifacts are the two CiD shared libraries above).
#
# Pins/patches based on npu_compiler tag npu_ud_2026_20_rc1 and OpenVINO
  # 2026.2.0. See build.sh for the exact (cid-linux preset) configure flags.

context:
  version: "2026.2.0"
  npu_compiler_rev: "16cb63249167413ea80131472293630e3a1577bb"
  # OpenVINO 2026.2.0 release tag commit (matches the conda-forge libopenvino
  # 2026.2.0 source); statically fused into the CiD compiler libraries.
  openvino_rev: "52ddc07385712456dd9f8c5ecf05d7e49c6da329"
  llvm_fork_rev: "e0a54ec45817ae42a4578b72ade470e20c383ce5"
  npu_elf_rev: "82c444bcb9feb0f55fa33e18fbd711ec35426fba"
  vpucostmodel_rev: "1183a54fcb88c6c2c726b240ed3d1a0459eb5687"

package:
  name: intel-driver-compiler-npu
  version: ${{ version }}

source:
  # npu_compiler (the MLIR/VPUX NPU compiler). No conda-forge package exists.
  - url: https://github.com/openvinotoolkit/npu_compiler/archive/${{ npu_compiler_rev }}.tar.gz
    sha256: 4673b1c45f1917fc1b1287f17ec522a7c95d8f152581c3053266608b351a9800
    target_directory: npu_compiler
    patches:
      - patches/0004-npu_compiler-undef-glibc-major-minor-macros.patch
      - patches/0007-npu_compiler-fallback-commit-hash-for-archive-source.patch
      - patches/0008-npu_compiler-gate-vpux-driver-compiler-tests.patch
      # Reuse the system (conda-forge) flatbuffers/flatc that OpenVINO resolved,
      # instead of OpenVINO's (unvendored) thirdparty/flatbuffers submodule.
      - patches/0012-npu_compiler-use-system-flatbuffers-from-openvino.patch
      # GCC 14 false-positive -Werror warnings (maybe-uninitialized,
      # dangling-reference, ...) in the vendored LLVM/MLIR template code
      # break the -Werror build; keep that known-spurious set non-fatal (GCC
      # only).
      - patches/0013-npu_compiler-gcc-false-positive-werror-nonfatal.patch
      # WEIGHTLESS_BLOB was removed from OpenVINO 2026.2 (only ENABLE_WEIGHTLESS
      # remains); drop the equivalent WEIGHTLESS_BLOB references so the CiD
      # compiler builds against the released headers.
      - patches/0014-npu_compiler-drop-weightless-blob-removed-in-ov-2026.2.patch
  # Intel's LLVM/MLIR 20.x fork (NPU MLIR dialects). No conda-forge equivalent;
  # built in-tree and statically fused into the CiD compiler libraries.
  - url: https://github.com/intel-staging/npu-compiler-llvm/archive/${{ llvm_fork_rev }}.tar.gz
    sha256: 933684f8191e7a9eeb55cfe1fb9ed090e5d3d5cb5a0e552ea4bbf300848622b5
    target_directory: npu_compiler/thirdparty/llvm-project
  - url: https://github.com/openvinotoolkit/npu_plugin_elf/archive/${{ npu_elf_rev }}.tar.gz
    sha256: 75ca714b84b5426ed2261e3ec798111f6dafde8d38f01351be0210021b689257
    target_directory: npu_compiler/thirdparty/elf
  - url: https://github.com/intel/npu-nn-cost-model/archive/${{ vpucostmodel_rev }}.tar.gz
    sha256: ef95cd937a8c9c2bef2f48cdc2c0f9d8860b5dc2886448cc9f225338babae587
    target_directory: npu_compiler/thirdparty/vpucostmodel
  # OpenVINO source. The CiD build statically links the OpenVINO runtime + IR
  # frontend into the CiD compiler libraries; the conda-forge libopenvino package
  # is built with ENABLE_INTEL_NPU_INTERNAL=OFF and so cannot supply the NPU
  # dev/AL pieces the compiler needs. Pinned to the 2026.2.0 release tag.
  - url: https://github.com/openvinotoolkit/openvino/archive/refs/tags/${{ version }}.tar.gz
    sha256: 886818c55f887ecc62893c900f259a39ec6c09555ce4dd3d379653ae5b0d6e62
    target_directory: openvino
    patches:
      # Allow ENABLE_SYSTEM_FLATBUFFERS for NPU-only (no TF-Lite) builds so the
      # conda-forge flatbuffers/flatc are used instead of the (empty) submodule.
      - patches/openvino-0001-allow-system-flatbuffers-for-npu.patch

build:
  # Build number starts at 100 to distinguish this vendored / static-OpenVINO
  # alternative from the experimental-OpenVINO-output solution in
  # conda-forge/staged-recipes#33473 (whose build numbers start at 0). Both
  # produce intel-driver-compiler-npu; the higher build number keeps the two
  # approaches distinguishable (and this one preferred by the solver) while they
  # are compared.
  number: 100
  skip: not linux64

requirements:
  build:
    - ${{ compiler('c') }}
    - ${{ stdlib('c') }}
    - ${{ compiler('cxx') }}
    - cmake
    - ninja
    - ccache
    - lld          # links the in-tree Intel LLVM/MLIR fork
    # Build-time only (LLVM's codegen needs a Python3 interpreter); python is
    # NOT a run dependency of the artifact. Use an explicit *versioned* spec: a
    # bare `python` makes rattler-build track the python variant -> a pyXYZ build
    # string and a py3.10..3.13 build matrix for a package that is python-version
    # independent. A versioned spec keeps python out of the build-string hash and
    # off the variant matrix (single variant), and pins the interpreter used to
    # run the build. 3.13.* works equally well.
    - python 3.12.*
    - pkg-config
    - flatbuffers  # provides flatc for npu_compiler schema generation
  host:
    - tbb-devel
    - pugixml
    # Xbyak is header-only (no lib/runtime dependency, no ABI surface -- this is
    # a build-time-only pin). OpenVINO core's compute_hash.cpp (Xbyak JIT) only
    # compiles against the exact Xbyak version bundled by the OpenVINO thirdparty
    # submodule; newer Xbyak makes its operator+ overloads ambiguous. OpenVINO
    # pins this same commit (xbyak 7.23.1) from 2026.0.0 through master, so keep
    # in sync with that submodule / the openvino-feedstock pin.
    - xbyak 7.23.1.*
    - zlib
    - nlohmann_json
    - flatbuffers
    - level-zero-devel
  run_exports:
    - ${{ pin_subpackage('intel-driver-compiler-npu', upper_bound='x.x') }}
  run_constraints:
    # The CiD compiler libraries statically embed OpenVINO 2026.2.0 internals
    # (opset, transformations, NPU abstraction layer) and is loaded at runtime by
    # the OpenVINO NPU plugin. It is not a hard dependency (the compiler can be
    # installed without OpenVINO and is only dlopen'd on demand), but a
    # co-installed OpenVINO runtime MUST be the matching minor series or the
    # IR/opset/VCL interface can mismatch. Keep this bound in sync with `version`
    # / the vendored OpenVINO source.
    - libopenvino >=2026.2.0,<2026.3.0a0
  ignore_run_exports:
    # flatbuffers is build-time only (flatc + headers); level-zero is needed for
    # the NPU plugin headers at build time. Neither is dynamically linked by the
    # self-contained CiD compiler libraries, so drop their run_exports.
    by_name:
      - flatbuffers
      - level-zero

tests:
  - requirements:
      run:
        - binutils
    script:
      # As of OpenVINO 2026.2 the CiD ships two libs: the thin VCL loader the
      # OpenVINO NPU plugin dlopens, and the MLIR/VPUX compiler the loader
      # dlopens by base name (so both must be co-installed in $PREFIX/lib).
      - test -f $PREFIX/lib/libopenvino_intel_npu_compiler_loader.so
      - test -f $PREFIX/lib/libopenvino_intel_npu_compiler.so
      # Both statically fuse OpenVINO in, so neither may dynamically depend on a
      # shared libopenvino.
      - test -z "$(objdump -p $PREFIX/lib/libopenvino_intel_npu_compiler.so | grep 'NEEDED' | grep -i 'libopenvino')"
      - test -z "$(objdump -p $PREFIX/lib/libopenvino_intel_npu_compiler_loader.so | grep 'NEEDED' | grep -i 'libopenvino')"
      # No unresolved MLIR symbols leaking out of the compiler (the LLVM/MLIR
      # fork is statically linked into it).
      - test -z "$(nm -D -u $PREFIX/lib/libopenvino_intel_npu_compiler.so | grep -i 'mlir::')"

about:
  homepage: https://github.com/openvinotoolkit/npu_compiler
  summary: Intel NPU driver compiler (Compiler-in-Driver, libopenvino_intel_npu_compiler*.so)
  description: |
    The Intel NPU "Compiler-in-Driver" (CiD) is the MLIR/VPUX compiler that the
    OpenVINO NPU plugin uses (via the Intel NPU userspace driver
    libze_intel_npu.so, package intel-level-zero-npu) to lower OpenVINO IR to NPU
    blobs. As of OpenVINO 2026.2 it is two shared libraries:
    libopenvino_intel_npu_compiler_loader.so (the thin VCL loader the OpenVINO
    NPU plugin dlopens) and libopenvino_intel_npu_compiler.so (the MLIR/VPUX
    compiler the loader dlopens by base name). Built from source as an OpenVINO
    extra module against a vendored OpenVINO 2026.2.0 source tree
    (BUILD_SHARED_LIBS=OFF), with the OpenVINO runtime, IR frontend and Intel's
    LLVM/MLIR fork all statically fused into the compiler libraries (no run
    dependency on a shared libopenvino). Neither library ships in the conda-forge
    openvino packages. Co-install with openvino + intel-level-zero-npu (+ NPU
    firmware system-wide) to run OpenVINO inference on Intel NPU.
  license: Apache-2.0 AND Apache-2.0 WITH LLVM-exception
  license_file:
    - npu_compiler/LICENSE
    - npu_compiler/thirdparty/llvm-project/llvm/LICENSE.TXT
    - openvino/LICENSE

extra:
  recipe-maintainers:
    - hmaarrfk
