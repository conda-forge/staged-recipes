# Pin the C/C++ toolchain to gcc 14. OpenVINO core's Xbyak JIT
# (compute_hash.cpp) fails to compile with gcc 15 (-Wtemplate-body on
# Xbyak), and the whole static graph (OpenVINO core + the Intel LLVM/MLIR
# fork + npu_compiler) must share one toolchain. Validated end-to-end with
# gcc 14.
c_compiler_version:
- "14"
cxx_compiler_version:
- "14"
# python is only a build-time helper (LLVM's build needs a Python3 interpreter
# for codegen); the artifact does not link or depend on python. Pin it to a
# single version so the package is not needlessly matrixed across every
# conda-forge python (py310..py313). python is zipped with is_python_min in the
# conda-forge pinning, so both must be given as a consistent single-value slice
# (matching the 3.12 entry: "3.12.* *_cpython" / is_python_min false).
python:
- "3.12.* *_cpython"
is_python_min:
- false
