context:
  version: "0.1.2"

package:
  name: rustfits
  version: ${{ version }}

source:
  url: https://github.com/esheldon/rustfits/archive/refs/tags/v${{ version }}.tar.gz
  sha256: 63f932cfbfa63a75cd0578f07cbd603356bf2c97fc871eb131669e5326d04d45

build:
  number: 0
  skip:
    - win
  script:
    - maturin build -v -j ${CPU_COUNT} --release --strip --manylinux off --interpreter=${PYTHON}
    # ^add this flag for cross-compile later maybe? -Zfeatures=itarget
    - ${PYTHON} -m pip install ${SRC_DIR}/target/wheels/rustfits*.whl --no-deps -vv --no-build-isolation
    - cargo-bundle-licenses --format yaml --output ./THIRDPARTY.yml

requirements:
  build:
    - ${{ stdlib('c') }}
    - ${{ compiler('c') }}
    - ${{ compiler('rust') }}
    - cargo-bundle-licenses
  host:
    - python
    - pip
    - maturin >=1.7,<2.0a0
    - numpy
  run:
    - python
    - numpy

tests:
  - python:
      imports:
        - rustfits
        - rustfits._rust
      pip_check: true
  # we run tests since they are fast...
  # tests fail due to bug in astropy not fixed in 3.10 packages
  - if: match(python, ">=3.11")
    then:
      script:
        - pytest -vv ./tests
      files:
        source:
          - tests/
      requirements:
        run:
          - pytest
          - astropy
          - fitsio
          - aioftp
          - python

about:
  homepage: https://github.com/esheldon/rustfits
  summary: A python FITS library with extension in rust
  license: MIT OR Apache-2.0
  license_file:
    - LICENSE-MIT
    - LICENSE-APACHE
    - THIRDPARTY.yml

extra:
  recipe-maintainers:
    - beckermr
    - esheldon
