context:
  version: "0.1.1"

package:
  name: rustfits
  version: ${{ version }}

source:
  url: https://github.com/esheldon/rustfits/archive/refs/tags/v${{ version }}.tar.gz
  sha256: 9bfe4c7d1b072494efd9d959d10cc059e7bd09afd16315ee55d56a18d710776f

build:
  number: 0
  skip: win
  script:
    - maturin build -v -j "${CPU_COUNT}" --release --strip --manylinux off --interpreter=${PYTHON}
    - ${PYTHON} -m pip install $SRC_DIR/target/wheels/rustfits*.whl --no-deps -vv --no-build-isolation
    - cargo-bundle-licenses --format yaml --output ./THIRDPARTY.yml

requirements:
  build:
    - ${{ stdlib('c') }}
    - ${{ compiler('c') }}
    - ${{ compiler('rust') }}
    - cargo-bundle-licenses
  host:
    - python
    - pip
    - maturin >=1.0,<2.0a0
    - numpy
    - pytest
  run:
    - python
    - numpy

tests:
  - python:
      imports:
        - rustfits
        - rustfits._rust
      pip_check: true
  - script:
      - pytest -vv ./tests
    files:
      source:
        - tests/
    requirements:
      run:
        - pytest
        - astropy
        - fitsio
        - aioftp

about:
  homepage: https://github.com/esheldon/rustfits
  summary: A python FITS library with extension in rust
  license: MIT OR Apache-2.0
  license_file:
    - THIRDPARTY.yml

extra:
  recipe-maintainers:
    - beckermr
