# This file raises python_min from the global pinning's 3.10 to 3.11.
#
# Remove this entire file once the conda-forge global pinning's python_min
# reaches 3.11.
#
# Background on the abi3 mechanism and python_min:
#   https://conda-forge.org/docs/maintainer/knowledge_base/#abi3
#   https://github.com/conda-forge/cfep/blob/main/cfep-25.md
python:
  # win-arm64 on conda-forge supports only 3.14+
  # part of a zip_keys: python, is_python_min
  - 3.11.* *_cpython   # [not (win and arm64)]
  - 3.12.* *_cpython   # [not (win and arm64)]
  - 3.13.* *_cp313     # [not (win and arm64)]
  - 3.14.* *_cp314     # [win and arm64]
python_min:
  # minimum supported python version per CFEP-25
  # bump to next minor version when we drop python versions
  - '3.11'             # [not (win and arm64)]
  - '3.14'             # [win and arm64]
is_python_min:
  # part of a zip_keys: python, is_python_min
  - true
  - false              # [not (win and arm64)]
  - false              # [not (win and arm64)]
