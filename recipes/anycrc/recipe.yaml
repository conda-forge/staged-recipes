context:
  version: 2.0.0

package:
  name: anycrc
  version: ${{ version }}

source:
  - url: https://pypi.org/packages/source/a/anycrc/anycrc-${{ version }}.tar.gz
    sha256: 326d7689af4ba89fd9041899bdb3dd25ef43a766780fa8b6228500f69b655b06

build:
  number: 0
  script: ${{ PYTHON }} -m pip install .

requirements:
  host:
    - python >=3.8
    - setuptools
    - cython
    - pip
  run:
    - python >=3.8
    - bitarray ==3.8.0

tests:
  - python:
      imports:
        - anycrc
      pip_check: true

about:
  summary: The fastest general Python CRC Library
  homepage: https://github.com/marzooqy/anycrc
  repository: https://github.com/marzooqy/anycrc
  license: Zlib
  license_file:
    - LICENSE

extra:
  recipe-maintainers:
    - carlodri
