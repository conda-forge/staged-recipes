context:
  python_min: "3.10"
  version: "0.21.1"

package:
  name: mcp-atlassian
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/m/mcp-atlassian/mcp_atlassian-${{ version }}.tar.gz
  sha256: dff6c81541506cb0cc80d7ac9900ffdcb246fec7808e41e8df73c09dd4a28074

build:
  script: python -m pip install . -vv --no-deps --no-build-isolation
  number: 0
  skip:
    - match(python, "<3.10")

requirements:
  host:
    - python
    - pip
    - hatchling
    - uv-dynamic-versioning >=0.7.0
  run:
    - python
    - atlassian-python-api >=4.0.0
    - beautifulsoup4 >=4.12.3
    - cachetools >=5.0.0
    - click >=8.1.7
    - fakeredis >=2.32.1,<2.35.0
    - fastmcp >=2.13.0,<2.15.0
    - httpx >=0.28.0
    - joserfc
    - keyring >=25.6.0
    - markdown >=3.7.0
    - markdown-to-confluence >=0.3.4,<0.4.0
    - markdownify >=0.11.6
    - mcp >=1.8.0,<2.0.0
    - pydantic >=2.10.6,<3.0
    - python-dateutil >=2.9.0.post0
    - python-dotenv >=1.0.1
    - requests >=2.31.0
    - pysocks
    - starlette >=0.49.1
    - thefuzz >=0.22.1
    - trio >=0.29.0
    - truststore >=0.10.0
    - types-cachetools >=5.5.0.20240820
    - types-python-dateutil >=2.9.0.20241206
    - unidecode >=1.3.0
    - urllib3 >=2.6.3
    - uvicorn >=0.27.1
    - if: win
      then: tzdata >=2024.1

tests:
  - python:
      imports:
        - mcp_atlassian
      pip_check: true
  - script:
      - mcp-atlassian --help

about:
  homepage: https://github.com/sooperset/mcp-atlassian
  summary: MCP server integration for Atlassian Jira and Confluence.
  license: MIT
  license_file: LICENSE
  repository: https://github.com/sooperset/mcp-atlassian
  documentation: https://github.com/sooperset/mcp-atlassian#readme

extra:
  recipe-maintainers:
    - melund
