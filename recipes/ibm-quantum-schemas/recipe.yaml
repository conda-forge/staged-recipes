schema_version: 1

context:
  version: "0.5.20260320"

package:
  name: ibm-quantum-schemas
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/i/ibm-quantum-schemas/ibm_quantum_schemas-${{ version }}.tar.gz
  sha256: d442c876dac5b04a58590681257883a7d4c4fbe1a19576f0de9718b81fbf4f08

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - setuptools
    - setuptools-scm
    - pip
  run:
    - python >=${{ python_min }}
    - pydantic >=2.5,<3.0.0
    - qiskit >=2.2.0,<3.0.0
    - samplomatic >=0.12.0

tests:
  - python:
      imports:
        - ibm_quantum_schemas
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  summary: IBM Quantum Pydantic models.
  license: Apache-2.0
  license_file: LICENSE.txt
  homepage: https://github.com/Qiskit/ibm-quantum-schemas

extra:
  recipe-maintainers:
    - wshanks
