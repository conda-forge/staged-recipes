schema_version: 1

context:
  python_min: "3.10"
  version: "1.6.11.20260508"

package:
  name: types-authlib
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/t/types-authlib/types_authlib-${{ version }}.tar.gz
  sha256: 0787b2c9f0c2fbcb27a689f4ef80c189588fc66c0a9ad1d5e2688c018bf4f639

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - setuptools >=82.0.1
    - pip
  run:
    - python >=${{ python_min }}
    - cryptography

tests:
  - requirements:
      run:
        - pip
        - python ${{ python_min }}.*
    script:
      - pip check
  - package_contents:
      site_packages:
        - authlib-stubs/__init__.pyi

about:
  summary: Typing stubs for Authlib
  license: Apache-2.0
  license_file: LICENSE
  homepage: https://github.com/python/typeshed

extra:
  recipe-maintainers:
    - peterbygrave
