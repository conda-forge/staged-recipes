{% set version = "1.1.0" %}

package:
  name: minim
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/m/minim/minim-{{ version }}.tar.gz
  sha256: 125e97a8c4389782c7105dafdaf88b6a2faff431f62d0b865455bc03e4819fbe

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - setuptools
    - pip
  run:
    - python >={{ python_min }}
    - cryptography
    - mutagen
    - requests

test:
  imports:
    - minim
  commands:
    - pip check
  requires:
    - pip
    - python

about:
  home: https://github.com/bbye98/minim
  summary: 'A collection of music service APIs for media information retrieval and semi-automated music tagging'
  license: GPL-3.0-only
  license_file: LICENSE

extra:
  recipe-maintainers:
    - bbye98
