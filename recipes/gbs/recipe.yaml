# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
context:
  version: "0.4.3"
package:
  name: gbs
  version: ${{ version }}
source:  
  url: https://github.com/ssg-aero/gbs/archive/refs/tags/v${{ version }}.tar.gz
  sha256: f3e27b23767517dd95c0366d7f650b439bfa988d63899b15b02814b848d784b9
build:
  number: 0
  script:
    -if: unix
      then: |
        ${CMAKE_ARGS} -GNinja
        -D CMAKE_BUILD_TYPE:STRING="Release" \
        -D USE_OCCT_UTILS:BOOL=FALSE \
        -D USE_CUDA:BOOL=FALSE \
        -D GBS_BUILD_TESTS:BOOL=FALSE \
        -D USE_RENDER:BOOL=TRUE \
        -D USE_PYTHON_BINDINGS=TRUE \
        -D BUILD_DOC=FALSE \
        -D USE_CUDA=FALSE \
        -D CMAKE_INSTALL_PREFIX=$PREFIX \
        . -B_build
        cmake --build _build --parallel ${CPU_COUNT}
        cmake --install _build
    -if: win
      then: |
        ${CMAKE_ARGS} -GNinja
        -D CMAKE_BUILD_TYPE:STRING="Release" \
        -D USE_OCCT_UTILS:BOOL=FALSE \
        -D USE_CUDA:BOOL=FALSE \
        -D GBS_BUILD_TESTS:BOOL=FALSE \
        -D USE_RENDER:BOOL=TRUE \
        -D USE_PYTHON_BINDINGS=TRUE \
        -D BUILD_DOC=FALSE \
        -D USE_CUDA=FALSE \
        -D CMAKE_INSTALL_PREFIX=$PREFIX \
        . -B_build
        cmake --build _build --parallel ${CPU_COUNT}
        cmake --install _build
requirements:
  build:
    - ${{ compiler('cxx') }}
    - ${{ stdlib("c") }}
    - ninja
    - cmake >=3.28
  host:
    - python
    - pybind11
    - nlopt
    - vtk
    - eigen >=3.3.9 # turns c+20 warning off
    - libboost-devel
    - rapidjson
    - libiges
  run:
    - python
    - nlopt
    - vtk
    - rapidjson
    - libboost-devel
    - libiges
    - jupyterlab
    - pythreejs
    - pyvista
    - plotly
test:
  imports:
    - pygbs.gbs
about:
  home: http://www.ssg-aero.com
  summary: Geometry BSplines - A C++ header library for BSplines curves and surfaces
  license: LGPL-3.0-or-later
  license_file: LICENSE

extra:
  recipe-maintainers:
    - szebos
    - ssg-aero
