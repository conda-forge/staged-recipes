# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
context:
  version: "0.4.3d"
package:
  name: gbs
  version: ${{ version }}
source:  
  url: https://github.com/ssg-aero/gbs/archive/refs/tags/v${{ version }}.tar.gz
  sha256: 23ccd595f8faae4a30970e8e615acf89bae588170343f6a78961794353861e94
build:
  number: 0
  script:
    - if: unix
      then: |
        cmake ${CMAKE_ARGS} -GNinja \
          -D CMAKE_BUILD_TYPE:STRING="Release" \
          -D USE_OCCT_UTILS:BOOL=FALSE \
          -D USE_CUDA:BOOL=FALSE \
          -D GBS_BUILD_TESTS:BOOL=FALSE \
          -D USE_RENDER:BOOL=TRUE \
          -D USE_PYTHON_BINDINGS=TRUE \
          -D BUILD_DOC=FALSE \
          -D USE_CUDA=FALSE \
          -D CMAKE_INSTALL_PREFIX=$PREFIX \
          . -B _build
        cmake --build _build --parallel ${CPU_COUNT}
        cmake --install _build
    - if: win
      then: |
        cmake %CMAKE_ARGS% -GNinja ^
          -D CMAKE_BUILD_TYPE:STRING="Release" ^
          -D USE_OCCT_UTILS:BOOL=FALSE ^
          -D USE_CUDA:BOOL=FALSE ^
          -D GBS_BUILD_TESTS:BOOL=FALSE ^
          -D USE_RENDER:BOOL=TRUE ^
          -D USE_PYTHON_BINDINGS=TRUE ^
          -D BUILD_DOC=FALSE ^
          -D USE_CUDA=FALSE ^
          -D CMAKE_INSTALL_PREFIX=%LIBRARY_PREFIX% ^
          . -B _build
        cmake --build _build --parallel %CPU_COUNT%
        cmake --install _build
requirements:
  build:
    - ${{ compiler('cxx') }}
    - ${{ stdlib("c") }}
    - ninja
    - cmake >=3.28
  host:
    - python
    - pybind11
    - nlopt
    - vtk
    - eigen-abi-devel >=3.3.9 # turns c+20 warning off
    - rapidjson
    - libiges
  run:
    - python
    - nlopt
    - vtk
    - rapidjson
    - libiges
    - jupyterlab
    - pythreejs
    - pyvista
    - plotly
tests:
  - python:
      imports:
        - pygbs.gbs
about:
  homepage: http://github.com/ssg-aero/gbs
  summary: Geometry BSplines - A C++ header library for BSplines curves and surfaces
  license: LGPL-3.0-or-later
  license_file: LICENSE.LGPLv3

extra:
  recipe-maintainers:
    - szebos
    - ssg-aero
