schema_version: 1

context:
  version: "0.5.6"

package:
  name: smg-grpc-servicer
  version: ${{ version }}

source:
  - url: https://pypi.org/packages/source/s/smg-grpc-servicer/smg_grpc_servicer-${{ version }}.tar.gz
    sha256: b8e5f06a57537689888f67ea7a7d5b1f080038a3c8aada129098529245d185c0
  - url: https://raw.githubusercontent.com/lightseekorg/smg/main/LICENSE
    sha256: be6e05da66141329ef9b092cf9561889baea1aa630576907dda3ec214f8da4eb

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - setuptools >=68.0
    - pip
  run:
    - python >=${{ python_min }}
    - smg-grpc-proto >=0.4.10
    - grpcio >=1.78.0
    - grpcio-reflection >=1.78.0
    - grpcio-health-checking >=1.78.0

tests:
  - python:
      python_version:
        - ${{ python_min }}.*
        - '*'
      imports:
        - smg_grpc_servicer
      pip_check: true

about:
  summary: SMG gRPC servicer implementations for LLM inference engines (vLLM, MLX, TokenSpeed, SGLang)
  license: Apache-2.0
  license_file: LICENSE
  homepage: https://github.com/lightseekorg/smg

extra:
  recipe-maintainers:
    - xhochy
