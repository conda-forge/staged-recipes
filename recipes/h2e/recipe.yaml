context:
  name: h2e
  version: "1.0.0"

package:
  name: ${{ name }}
  version: ${{ version }}

source:
  url: https://gitlab.com/earthscope/public/epic/passoft/h2e/-/archive/v${{ version }}/h2e-v${{ version }}.tar.gz
  sha256: 8aa0141326c60a9266c072c01e727a5f0c6e475be2b8835f2508aa0b0d288d43

build:
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - setuptools
  run:
    - python >=${{ python_min }}

tests:
  - python:
      imports:
        - h2e
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"
  - script:
      - h2e 2026:169:15:51:23
  - script:
      - python -m unittest discover -s tests
    requirements:
      run:
        - python ${{ python_min }}.*
    files:
      source:
        - tests/

about:
  homepage: https://epic.earthscope.org/content/software-resources
  summary: Convert human readable time format to epoch
  description: |
    h2e is a command-line utility that accepts a time in Greenwich
    Mean Time (YYYY:JJJ:HH:MM:SS) format and returns the corresponding
    epoch timestamp.
  license: GPL-3.0-or-later
  license_file: LICENSE
  repository: https://gitlab.com/earthscope/public/epic/passoft/h2e

extra:
  recipe-maintainers:
    - omid-earthscope
