{% set name = "medpython-etl" %}
{% set version = "1.0.3" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/medpython_etl-{{ version }}.tar.gz
  sha256: dab78595321e003dd6a9bca3bd783ecf2537af4ba78b9be14055aedf1fc095ad

build:
  noarch: python
  number: 0
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python {{ python_min }}
    - setuptools >=61.0
    - pip
  run:
    - python >={{ python_min }}
    - pandas
    - numpy
    - plotly

test:
  imports:
    - ETL_Infra
  commands:
    - pip check
  requires:
    - python {{ python_min }}
    - pip

about:
  home: https://github.com/Medial-EarlySign/MR_Tools
  doc_url: https://medial-earlysign.github.io/MR_Wiki/
  dev_url: https://github.com/Medial-EarlySign/MR_Tools/tree/main/RepoLoadUtils/common
  license: MIT
  license_file:
    - LICENCE
  summary: "ETL logic and resources for MedPython"
  description: |
    Medial EarlySign ETL Library 

extra:
  recipe-maintainers:
    - alonyado
