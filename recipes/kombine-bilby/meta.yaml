{% set name = "kombine-bilby" %}
{% set version = "0.1.0" %}
{% set python_min = "3.10" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/kombine_bilby-{{ version }}.tar.gz
  sha256: fd71f0034edabb8485cea5b2447da33ca39e4c28e0632d6785a20dea170ede34

build:
  noarch: python
  number: 0
  script_env:
    - SETUPTOOLS_SCM_PRETEND_VERSION={{ version }}
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python {{ python_min }}
    - pip
    - setuptools >=45
    - setuptools-scm >=6.2
  run:
    - python >={{ python_min }}
    - bilby >=2.3.0
    - kombine

test:
  imports:
    - kombine_bilby
  commands:
    # - pip check    # kombine has incorrect metadata which causes pip check to fail, see https://github.com/conda-forge/kombine-feedstock/issues/3
    - python -m pytest tests/
  requires:
    - python {{ python_min }}
    - pip
    - pytest
  source_files:
    - tests
    - pyproject.toml

about:
  homepage: https://github.com/bilby-dev/kombine-bilby
  summary: Plugin for using kombine with bilby.
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - ColmTalbot
    - mj-will
