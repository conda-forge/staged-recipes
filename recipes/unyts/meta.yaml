{% set name = "unyts" %}
{% set version = "1.0.1" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/unyts-{{ version }}.tar.gz
  sha256: b2f202bbcdccc58d5fea3469dddd93acd9a5d30e5f0ff53c27837d976e622892

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - setuptools >=61.0
    - pip
  run:
    - python >={{ python_min }}
    - stringthings
    - cloudpickle

test:
  imports:
    - unyts
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://github.com/ayaranitram/unyts
  summary: an unit converter based on graph network and classes to operate with units.
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - jan-janssen
