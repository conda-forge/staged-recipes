# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "0.3.2"

package:
  name: pymilvus-model
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/p/pymilvus-model/pymilvus_model-${{ version }}.tar.gz
  sha256: 10ab49a989396943e08555b971f85182ddb50da47076e699a157c9a5ff542872

build:
  noarch: python
  number: 0
  script:
    # Overwrite the broken helper file to export a static version string
    - python -c "open('_version_helper.py', 'w').write('version = \"${{ version }}\"\n')"
    - ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - setuptools >=75
    - wheel
    - pip
  run:
    - python >=${{ python_min }}
    - transformers >=4.36.0
    - onnxruntime
    - scipy >=1.10.0
    - protobuf
    - numpy

tests:
  - python:
      imports:
        - pymilvus.model
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  homepage: https://github.com/milvus-io/milvus-model
  repository: https://github.com/milvus-io/milvus-model
  license: Apache-2.0
  license_file: LICENSE
  summary: Model components for PyMilvus, the Python SDK for Milvus
  description: |
    pymilvus-model (the `pymilvus[model]` subpackage) provides model
    components for PyMilvus, including dense, sparse (BM25), hybrid, and
    reranker embedding utilities used with Milvus.

extra:
  recipe-maintainers:
    - rxm7706
