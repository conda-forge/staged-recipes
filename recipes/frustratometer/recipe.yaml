schema_version: 1

context:
  version: "0.3.1"

package:
  name: frustratometer
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/f/frustratometer/frustratometer-${{ version }}.tar.gz
  sha256: 2c0e7897ebe24f87352f78d250a7af2e5048c6817959d5dfe97320add5e564d7

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - setuptools
  run:
    - python >=${{ python_min }}
    - numpy
    - scipy
    - pandas
    - biopython
    - prody
    - pyparsing
    - pydantic >=2
    - numba
    - openmm
    - pdbfixer

tests:
  - python:
      imports:
        - frustratometer
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  summary: Python implementation of the protein frustratometer using AWSEM and DCA.
  description: |
    The frustratometer calculates energetic frustration in protein structures
    based on the principle of minimal frustration (Wolynes et al.). It computes
    single residue, mutational, and configurational frustration indices using
    the AWSEM model (Associative memory, Water mediated, Structure and Energy Model)
    or DCA (Direct Coupling Analysis). Frustrated regions reveal
    competing evolutionary pressures and often correspond to functional sites
    such as catalytic domains, hinge regions, or binding interfaces.
  license: MIT
  license_file: LICENSE
  homepage: https://github.com/cabb99/Frustratometer
  repository: https://github.com/cabb99/Frustratometer
  documentation: https://frustratometer.readthedocs.io/

extra:
  recipe-maintainers:
    - cabb99
