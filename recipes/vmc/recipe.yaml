context:
  version: "2.2"

package:
  name: vmc
  version: ${{ version }}

source:
  url: https://github.com/vmc-project/vmc/archive/refs/tags/v${{ version | replace(".", "-") }}.tar.gz
  sha256: 6da6a32352c5a3eb62d07aed92414a0baf2793f6ec0630402e3df7fcb1b73d7b

build:
  number: 0
  skip:
    - win
  script: build.sh

requirements:
  build:
    - ${{ compiler('cxx') }}
    - ${{ stdlib('c') }}
    - cmake
    - make
  host:
    - root_base
    - root_cxx_standard
  run_exports:
    - ${{ pin_subpackage('vmc', upper_bound='x.x') }}

tests:
  - package_contents:
      lib:
        - VMCLibrary
      include:
        - vmc/TVirtualMC.h
        - vmc/TGeoMCGeometry.h
      files:
        - lib/VMC-${{ version }}.0/VMCConfig.cmake
        - lib/VMC-${{ version }}.0/VMCConfigVersion.cmake
        - lib/VMC-${{ version }}.0/VMCTargets.cmake

about:
  homepage: https://vmc-project.github.io/
  summary: Virtual Monte Carlo interface for ROOT
  description: |
    The Virtual Monte Carlo (VMC) provides an abstract C++ interface to
    Monte Carlo transport packages, allowing the same user code to be run
    with different transport backends (e.g. Geant3, Geant4, FLUKA). It is
    distributed as part of ROOT but can also be built standalone; this is
    the standalone build.

    VMC is widely used in HEP experiments including ALICE, CBM, FairRoot,
    and the SHiP collaboration.
  license: GPL-3.0-only
  license_file: LICENSE
  repository: https://github.com/vmc-project/vmc
  documentation: https://vmc-project.github.io/

extra:
  recipe-maintainers:
    - olantwin
