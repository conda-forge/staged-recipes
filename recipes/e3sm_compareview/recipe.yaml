schema_version: 1

context:
  python_min: "3.10"
  version: "1.3.1"

package:
  name: e3sm_compareview
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/e/e3sm_compareview/e3sm_compareview-${{ version }}.tar.gz
  sha256: 940c6daa32f3c93a5dcfceb3f7004a40b7358b10081f165e229d269c7f7e62e0

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  python:
    entry_points:
      - compareview = e3sm_compareview.app:main
      - quickcompare = e3sm_compareview.app:main

requirements:
  host:
    - python ${{ python_min }}.*
    - hatchling
    - pip
  run:
    - python >=${{ python_min }}
    - numpy <2.4
    - trame >=3.12
    - trame-vtk >=2.10
    - trame-vuetify >=3.1
    - pyproj >=3.6.1
    - netcdf4 >=1.6.5
    - trame-dataclass >=1.2
    - trame-components
    - trame-tauri >=0.6.2
    - pillow
    - e3sm-quickview

tests:
  - python:
      imports:
        - e3sm_compareview
      pip_check: true
      python_version: ${{ python_min }}.*
  - requirements:
      run:
        - pip
        - python ${{ python_min }}.*
    script:
      - compareview --help
      - quickcompare --help

about:
  summary: An application to explore/analyze data for atmosphere component for E3SM
  license: Apache-2.0
  license_file: LICENSE
  homepage: https://pypi.org/project/e3sm-compareview/

extra:
  recipe-maintainers:
    - willdunklin
