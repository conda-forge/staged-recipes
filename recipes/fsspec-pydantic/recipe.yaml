context:
  name: fsspec-pydantic
  version: "0.1.0"

package:
  name: ${{ name }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/f/fsspec-pydantic/fsspec_pydantic-${{ version }}.tar.gz
  sha256: 85de6dc9dade24c8b9297f85b959f5da8b1e5a544e4fc5e23af1880f77822f2b

build:
  noarch: python
  number: 0
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - hatchling
  run:
    - python >=${{ python_min }}
    - fsspec
    - pydantic

tests:
  - python:
      imports:
        - fsspec_pydantic
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  homepage: https://github.com/1kbgz/fsspec-pydantic
  repository: https://github.com/1kbgz/fsspec-pydantic
  summary: Pydantic wrappers of fsspec types
  license: Apache-2.0
  license_file: LICENSE

extra:
  recipe-maintainers:
    - timkpaine
