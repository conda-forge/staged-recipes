schema_version: 1

context:
  version: "0.25.0"

package:
  name: tree-sitter-go
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/t/tree_sitter_go/tree_sitter_go-${{ version }}.tar.gz
  sha256: a7466e9b8d94dda94cae8d91629f26edb2d26166fd454d4831c3bf6dfa2e8d68

build:
  number: 0
  # abi3 packages build once at python_min and ship one artifact per platform.
  skip: is_abi3 and not is_python_min
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  python:
    version_independent: ${{ is_abi3 }}

requirements:
  build:
    - ${{ compiler("c") }}
    - ${{ stdlib("c") }}
  host:
    - if: is_abi3
      then: python-abi3
    - python
    - pip
    - setuptools >=42
  run:
    - python

tests:
  - python:
      imports:
        - tree_sitter_go
      # Verify the abi3 wheel works on the build-time Python AND the latest.
      python_version:
        - if: is_abi3
          then: ${{ python_min }}.*
        - "*"
  - if: is_abi3
    then:
      requirements:
        run:
          - abi3audit
      script:
        - if: unix
          then: abi3audit $SP_DIR/tree_sitter_go/_binding.abi3.so -s -v --assume-minimum-abi3 ${{ python_min }}
          else: abi3audit %SP_DIR%/tree_sitter_go/_binding.pyd -s -v --assume-minimum-abi3 ${{ python_min }}

about:
  homepage: https://github.com/tree-sitter/tree-sitter-go
  summary: Go grammar for tree-sitter
  license: MIT
  license_file: LICENSE
  repository: https://github.com/tree-sitter/tree-sitter-go

extra:
  recipe-maintainers:
  - killua156
  - mgorny
