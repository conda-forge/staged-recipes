schema_version: 1

context:
  version: "0.25.0"

package:
  name: tree-sitter-go
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/t/tree_sitter_go/tree_sitter_go-${{ version }}.tar.gz
  sha256: a7466e9b8d94dda94cae8d91629f26edb2d26166fd454d4831c3bf6dfa2e8d68

build:
  number: 0
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  build:
    - ${{ compiler("c") }}
  host:
    - python
    - pip
    - setuptools >=42
    - wheel
  run:
    - python

tests:
  - python:
      imports:
        - tree_sitter_go

about:
  homepage: https://github.com/tree-sitter/tree-sitter-go
  summary: Go grammar for tree-sitter
  license: MIT
  license_file: LICENSE
  repository: https://github.com/tree-sitter/tree-sitter-go

extra:
  recipe-maintainers:
  - killua156
  - mgorny
