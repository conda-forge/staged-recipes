{% set name = "ocp-gordon" %}
{% set version = "0.2.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://github.com/gongfan99/ocp_gordon/archive/refs/tags/v{{ version }}.tar.gz
  sha256: 14731825ccf4137604fa3d66c6c0f54b3c83686f9dcc69ca5c805e6d335efb42
  patches:
    - 0001-Remove-PyPI-OCP-dependencies.patch

build:
  noarch: python
  number: 0

requirements:
  host:
    - python >=3.10
    - pip
    - setuptools
    - setuptools_scm
  run:
    - python >=3.10
    - ocp >=7.9,<8.0
    - numpy >=2,<3
    - scipy

test:
  imports:
    - ocp_gordon
  requires:
    - pip
    - python {{ python_min }}
    - pytest
  source_files:
    - tests/
  commands:
    - pytest

about:
  home: https://github.com/gongfan99/ocp_gordon
  summary: 'Gordon surface creation using OpenCASCADE'
  description: |
    A pure Python implementation for creating Gordon surfaces, 
    utilizing OpenCASCADE via the standard OCP wrapper.
  license: Apache-2.0
  license_family: Apache
  license_file: LICENSE

extra:
  recipe-maintainers:
    - jdegenstein
