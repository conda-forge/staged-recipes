context:
  version: "0.7.0"

package:
  name: merman-cli
  version: ${{ version }}

source:
  url: https://github.com/Latias94/merman/archive/refs/tags/v${{ version }}.tar.gz
  sha256: e1d787154be74bca8262cc9c83ee3cb3f7e0c13dd4b8eb65c41cb2e42d3b5092

build:
  number: 0
  script:
    env:
      CARGO_PROFILE_RELEASE_LTO: fat
      CARGO_PROFILE_RELEASE_STRIP: symbols
    content:
      - cd crates/merman-cli
      - if: unix
        then:
          - cargo auditable install --path=. --root="$PREFIX" --no-track --locked --bins
      - if: win
        then:
          - cargo auditable install --path=. --root="%LIBRARY_PREFIX%" --no-track --locked --bins
      - cargo-bundle-licenses --format=yaml --output=../../THIRDPARTY.yml

requirements:
  build:
    - ${{ stdlib('c') }}
    - ${{ compiler('c') }}
    - ${{ compiler('rust') }}
    - cargo-auditable
    - cargo-bundle-licenses

tests:
  - script:
      - merman-cli --help
      - merman-cli --version
  - package_contents:
      bin:
        - merman-cli
      strict: true

about:
  summary: Mermaid.js, but headless, in Rust. Parse, layout and render diagrams to SVG/PNG/JPG/PDF/ASCII/Unicode.
  description: |
    `merman-cli` is a performant browserless Mermaid command-line renderer in Rust for SVG, PNG, JPG, PDF, and
    ASCII/Unicode text output. The top-level command follows common `mmdc` workflows, while developer subcommands
    expose merman's parse, layout, and render internals.
  license: MIT OR Apache-2.0
  license_file:
    - LICENSE-MIT
    - LICENSE-APACHE
    - THIRDPARTY.yml
  homepage: https://github.com/Latias94/merman
  repository: https://github.com/Latias94/merman

extra:
  recipe-maintainers:
    - salim-b
