schema_version: 1

context:
  python_min: "3.12"
  version: "0.1.0"

package:
  name: sarkit-assurance
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/s/sarkit-assurance/sarkit_assurance-${{ version }}.tar.gz
  sha256: c8ffc30f9d17df63e1b88a176a0e52e9842387b7645c2d4ab3b08cbc34ea2cff

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - pdm-backend
    - pip
  run:
    - python >=${{ python_min }}
    - lxml >=5.1.0
    - numpy >=2.0.0
    - pillow >=12.1.1
    - plotly >=6.5.2
    - pyproj >=3.7.2
    - sarkit >=1.6.0
    - scipy >=1.15.1

tests:
  - python:
      imports:
        - sarkit_assurance
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  summary: Suite of SAR-related assurance tools in Python.
  license: MIT
  license_file: LICENSE
  homepage: https://pypi.org/project/sarkit-assurance/
  repository: https://github.com/ValkyrieSystems/sarkit-assurance

extra:
  recipe-maintainers:
    - pressler-vsc
    - bombaci-vsc
    - johnstob
