
{% set version = "1.0.0" %}

package:
  name: sidescantools
  version: {{ version }}

source:
  url: https://github.com/sonoware/sidescantools/archive/refs/tags/v{{ version }}.tar.gz
  sha256: 2064389a0ee78ae9a7a56f84f8f918e8299120f661c66ecbd25f513cdf0b4c6b

build:
  # Uncomment the following line if the package is pure Python and the recipe is exactly the same for all platforms.
  # It is okay if the dependencies are not built for all platforms/versions, although selectors are still not allowed.
  # See https://conda-forge.org/docs/maintainer/knowledge_base.html#noarch-python for more details.
  # noarch: python
  # If the installation is complex, or different between Unix and Windows, use separate bld.bat and build.sh files instead of this key.
  # By default, the package will be built for the Python versions supported by conda-forge and for all major OSs.
  # Add the line "skip: True  # [py<35]" (for example) to limit to Python 3.5 and newer, or "skip: True  # [not win]" to limit to Windows.
  # More info about selectors can be found in the conda-build docs: 
  # https://docs.conda.io/projects/conda-build/en/latest/resources/define-metadata.html#preprocessing-selectors
  skip: true  # [py<312 or py>=314]
  script: {{ PYTHON }} -m pip install . -vv
  number: 0
  entry_points:
    - sidescantools_gui = sidescantools.main_gui:main
    - sidescantools_cli = sidescantools.main_cli:main

requirements:
  host:
    - python
    - pip
    - setuptools
  run:
    - python
    - conda-forge::pydantic
    - scikit-image ==0.25.2
    - geopy
    - numpy ==2.3.3
    - conda-forge::napari
    - conda-forge::pyqt ==5.*
    - conda-forge::gdal ==3.10.3
    - pyyaml
    - qtpy
    - pyproj
    - pygmt ==0.17.0
    - rioxarray ==0.18.1
    - rasterio ==1.4.3
    - pyqtgraph
    - conda-forge::utm
    - conda-foreg::pyxtf

test:
  # Some packages might need a `test/commands` key to check CLI.
  # List all the packages/modules that `run_test.py` imports.
  imports:
    - sidescantools

about:
  home: https://sidescantools.de
  summary: 'Process side-scan sonar data and export high resolution geo-referenced images'
  description: |
    SidescanTools is an open-source software to read and process data from side-scan sonar instruments.
    This tool can be used to create high-resolution 2D images of the sea floor. 
    The data can be processed to reduce noise, apply slant-range correction and 
    gain normalisation on a set of side-scan files. 
  # Remember to specify the license variants for BSD, Apache, GPL, and LGPL.
  # Use the SPDX identifier, e.g: GPL-2.0-only instead of GNU General Public License version 2.0
  # See https://spdx.org/licenses/
  license: GPL-3.0-only
  # It is required to include a license file in the package,
  # (even if the license doesn't require it) using the license_file entry.
  # Please also note that some projects have multiple license files which all need to be added using a valid yaml list.
  # See https://docs.conda.io/projects/conda-build/en/latest/resources/define-metadata.html#license-file
  license_file: LICENSE

extra:
  recipe-maintainers:
    # GitHub IDs for maintainers of the recipe.
    # Always check with the people listed below if they are OK becoming maintainers of the recipe. (There will be spam!)
    - sonofisp
