{% set name = "apache-sedona-core" %}
{% set version = "1.9.0" %}


package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/a/apache-sedona/apache_sedona-{{ version }}.tar.gz
  sha256: cd195a86e3b68e8ccbe8dd66333d7c2403609937f4d3c13c5a627779eec6b7ce

build:
  number: 0
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  build:
    - python                                 # [build_platform != target_platform]
    - cross-python_{{ target_platform }}     # [build_platform != target_platform]
    - {{ compiler('c') }}
    - {{ stdlib("c") }}
  host:
    - pip
    - python
    - setuptools >=68.0.0
    - wheel
  run:
    - python
    - attrs
    - shapely >=1.7.0

test:
  imports:
    - sedona
  commands:
    - pip check
  requires:
    - pip

about:
  home: https://sedona.apache.org
  summary: Lightweight Apache Sedona Python package (no PySpark or rasterio dependency)
  description: |
    apache-sedona-core ships the Apache Sedona Python package without the
    PySpark and rasterio/GDAL dependency stack carried by the apache-sedona
    conda package. It is intended as a lightweight base for users who want
    to use Apache Sedona alongside SedonaDB, or in any environment that
    does not need the Spark integration.
  license: Apache-2.0
  license_file: LICENSE

extra:
  recipe-maintainers:
    - jiayuasu
