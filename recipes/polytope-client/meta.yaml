{% set name = "polytope-client" %}
{% set version = "0.7.9" %}
{% set python_min = "3.9" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name.replace('-', '_') }}-{{ version }}.tar.gz
  sha256: 45b76d4a3d6beb007ffb16ece32ffa3c270de52f074d302a5cea9f20ce9fd753

build:
  number: 0
  noarch: python
  script: {{ PYTHON }} -m pip install . --no-deps --ignore-installed -vv
  entry_points:
    - polytope = polytope.cli.cli:cli

requirements:
  host:
    - python {{ python_min }}
    - pip
    - setuptools >=61
    - setuptools-scm >=8
  run:
    - python >={{ python_min }}
    - click
    - requests
    - pyyaml
    - jsonschema
    - docstring_parser
    - tqdm

test:
  requires:
    - python {{ python_min }}
    - pip
  imports:
    - polytope
    - polytope.api
    - polytope.cli
  commands:
    - pip check
    - polytope --help

about:
  home: https://github.com/ecmwf/polytope-client
  license: Apache-2.0
  license_family: Apache
  license_file: LICENSE.txt
  summary: A Python and command-line client to communicate with a Polytope API server.
  description: |
    polytope-client is a Python and command-line client for ECMWF's Polytope
    feature-extraction service. It lets users describe a request as a JSON
    "polytope" of coordinates and retrieve only the matching slice of a
    larger dataset (e.g. GRIB/FDB), instead of downloading whole fields.
  dev_url: https://github.com/ecmwf/polytope-client

extra:
  recipe-maintainers:
    - jameshawkes
    - peshence
    - awarde96
