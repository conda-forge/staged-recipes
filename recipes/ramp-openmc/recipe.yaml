schema_version: 1

context:
  python_min: "3.11"
  version: "0.0.2"

package:
  name: ramp-openmc
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/r/ramp-openmc/ramp_openmc-${{ version }}.tar.gz
  sha256: a2d77d95e392adcb2c20e630d4ee0144fab149bd1c90d7eb52acfda605b95a43

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - setuptools
    - setuptools-scm
    - wheel
    - pip
  run:
    - python >=${{ python_min }}
    - openmc >=0.13.3
    - cytoolz
    - distributed
    - matplotlib-base
    - multipledispatch
    - numpy
    - pandas
    - ramp-coremaker
    - ramp-corecompute
    - scipy
    - uncertainties
    - xarray

tests:
  - python:
      imports:
        - openmcadapter
      pip_check: true
      python_version: 
        - ${{ python_min }}.*
        - "*"

about:
  summary: Adapter package for OpenMC as an Oracle
  license: MIT
  license_file: LICENSE
  homepage: https://pypi.org/project/ramp-openmc/

extra:
  recipe-maintainers:
    - esheder
