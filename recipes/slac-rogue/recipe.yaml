context:
  version: "6.15.0"

package:
  name: slac-rogue
  version: ${{ version }}

source:
  url: https://github.com/slaclab/rogue/archive/refs/tags/v${{ version }}.tar.gz
  sha256: c73e35472c7b248398a48cf466eb8587dff32c2c222de351cec0862b3d700242

build:
  number: 0
  skip:
    - win
    - osx
  run_exports:
    - ${{ pin_subpackage("slac-rogue", max_pin='x.x') }}

requirements:
  build:
    - ${{ compiler('c') }}
    - ${{ compiler('cxx') }}
    - ${{ stdlib('c') }} 
    - cmake >=3.19
    - make
  host:
    - libboost-python-devel
    - bzip2
    - zeromq
    - python
    - pip
    - setuptools
    - numpy >=2.0
  run:
    - python
    - numpy
    - libboost-python-devel
    - bzip2
    - zeromq
    - pyyaml
    - pyzmq
    - sqlalchemy
    - pyserial
    - pydm >=1.18
    - qtpy >=2.0
    - pyqtgraph >=0.13
    - matplotlib-base

tests:
  - python:
      imports:
      - pyrogue
      - pyrogue.interfaces
      - pyrogue.protocols
      - pyrogue.examples
      - rogue
      requires:
      - pip
      commands:
      - python -c "import pyrogue; assert pyrogue.__version__ == '${{ version }}'"
      - pip check

about:
  homepage: https://github.com/slaclab/rogue
  doc_url: https://slaclab.github.io/rogue/
  dev_url: https://github.com/slaclab/rogue
  license: LicenseRef-SLAC-TID-Open-License
  license_family: BSD
  license_file: LICENSE.txt
  summary: 'SLAC Python Based Hardware Abstraction And Data Acquisition System'
  description: |
    Rogue is a C++ and Python framework for creating hardware control and data
    acquisition systems. It provides a hierarchical device tree, register access
    abstraction, streaming data protocols, and a rich set of interfaces for
    FPGA-based systems. Originally developed at SLAC National Accelerator
    Laboratory for particle physics and photon science instrumentation.

extra:
  recipe-maintainers:
    - slacrherbst
    - ruck314
    - omar-moreno
    - bengineerd
