{% set version = "0.9.0" %}
{% set python_min = "3.9" %}

package:
  name: shinyswatch
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/s/shinyswatch/shinyswatch-{{ version }}.tar.gz
  sha256: 090b89668691a1c520c79b7e36b03901489976199b64988e05ad4c86924da17d

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - setuptools
    - pip
  run:
    - python >={{ python_min }}
    - typing_extensions >=3.10.0.0
    - packaging >=20.9
    - htmltools >=0.2.0
    - shiny >=1.2.0

test:
  imports:
    - shinyswatch
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://github.com/rstudio/py-shinyswatch
  summary: Bootswatch + Bootstrap 5 themes for Shiny.
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - razinkele
