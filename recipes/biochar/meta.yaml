{% set version = "0.1.1" %}

package:
  name: biochar
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/b/biochar/biochar-{{ version }}.tar.gz
  sha256: e018be77584762136c7a9e47fc21e7f4458d06e72fec49d547e110698365ec7e

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python >=3.9
    - setuptools >=68
    - wheel
    - pip
  run:
    - python >=3.9
    - numpy >=1.24.0
    - scipy >=1.10.0
    - networkx >=3.1
    - rdkit >=2023.9.1

test:
  imports:
    - biochar
  commands:
    - pip check
  requires:
    - pip

about:
  home: https://github.com/jolayfield/Biochar-simulator
  summary: Generate biochar molecular structures for GROMACS MD simulations
  license: MIT
  license_file: LICENSE
  doc_url: https://biochar-simulator.readthedocs.io

extra:
  recipe-maintainers:
    - jolayfield
