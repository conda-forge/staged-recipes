schema_version: 1

context:
  python_min: 3.11
  version: 0.2.3

package:
  name: zarrs
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/z/zarrs/zarrs-${{ version }}.tar.gz
  sha256: 61640dbbffb9a0b0ebd73f970ce97b52ef56df2828c2809058016d76da59ee60

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - maturin >=1.5,<2.0
    - ${{ stdlib("c") }}
    - ${{ compiler('c') }}
    - ${{ compiler('rust') }}
    - puccinialin
    - pip
  run:
    - python >=${{ python_min }}
    - numpy >=1.24
    - zarr >=3.1

tests:
  - python:
      imports:
        - zarrs
  - requirements:
      run:
        - pip
        - python ${{ python_min }}.*
    script:
      - pip check

about:
  summary: A CodecPipeline for zarr-python backed by the zarrs Rust crate
  license: MIT
  license_file: LICENSE
  homepage: https://pypi.org/project/zarrs/

extra:
  recipe-maintainers:
    - imagejan
