# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "4.2.4"

package:
  name: django-fsm-2
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/d/django-fsm-2/django_fsm_2-${{ version }}.tar.gz
  sha256: 0e395afd03ff504afd476e8568ca213aafc3324bd4e5427e5b3287f7b1e7d979

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - hatchling
  run:
    - python >=${{ python_min }}
    - django-stubs-ext
    - django >=4.2.29
    - typing_extensions

tests:
  - python:
      imports:
        - django_fsm
        - fsm_admin
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  homepage: https://github.com/django-commons/django-fsm-2
  license: MIT
  license_file: LICENSE
  summary: Django friendly finite state machine support.
  description: |
    Django friendly finite state machine support.
  repository: https://github.com/django-commons/django-fsm-2
  documentation: https://github.com/django-commons/django-fsm-2

extra:
  recipe-maintainers:
    - rxm7706
