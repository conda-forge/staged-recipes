{% set name = "chainladder" %}
{% set version = "0.9.1" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz
  sha256: 34a3972bb5ec4b697e583c92acbf3686d0512a500ccbde5d4dc790251e54864c

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python >=3.10
    - pip
    - setuptools >=61.0
    - wheel
  run:
    - python >=3.10
    - pandas >=2.0,<3.0
    - scikit-learn >1.4.2
    - numba >0.54
    - sparse >=0.9
    - matplotlib-base
    - dill
    - patsy

test:
  imports:
    - chainladder
  requires:
    - pip
  commands:
    - pip check

about:
  home: https://github.com/casact/chainladder-python
  summary: Property and Casualty Loss Reserving in Python
  description: |
    chainladder is a Python package for actuarial loss reserving. It provides
    triangle data manipulation, link ratio calculations, and IBNR estimates
    with deterministic and stochastic models following a scikit-learn-inspired
    API.
  license: MPL-2.0
  license_family: MOZILLA
  license_file: LICENSE
  doc_url: https://chainladder-python.readthedocs.io/
  dev_url: https://github.com/casact/chainladder-python

extra:
  recipe-maintainers:
    # TODO: add your GitHub ID here
    - stanmart
