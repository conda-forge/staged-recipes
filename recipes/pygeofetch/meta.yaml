{% set name = "pygeofetch" %}
{% set version = "1.1.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz
  sha256: 0307001e4a585f035c709ccc61c7b23217280a7ddf2775229600340d878b5cf2

build:
  number: 0
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  entry_points:
    - pygeofetch = pygeofetch.cli.main:cli

requirements:
  host:
    - python {{ python_min }}
    - pip
    - setuptools >=68
    - wheel
  run:
    - python >={{ python_min }}
    - httpx >=0.27
    - click >=8.1
    - pydantic >=2.5
    - pydantic-settings >=2.1
    - pyyaml >=6.0
    - cryptography >=42.0
    - keyring >=24.3
    - tenacity >=8.2
    - python-dateutil >=2.9
    - requests >=2.31
    - anyio >=4.2

test:
  imports:
    - pygeofetch
    - pygeofetch.core.engine
    - pygeofetch.core.logging
    - pygeofetch.models.search_query
    - pygeofetch.providers
  commands:
    - pygeofetch --version
    - pygeofetch --help
  requires:
    - python {{ python_min }}
    - pytest
    - pytest-mock

about:
  home: https://github.com/appiahkubis14/pygeofetch
  license: MIT
  license_family: MIT
  license_file: LICENSE
  summary: Universal satellite data pipeline — unified access to 22+ providers
  description: |
    pygeofetch is a production-ready Python package for satellite data
    acquisition and geospatial processing. It provides unified access to
    22+ satellite data providers including Copernicus, AWS Earth, USGS,
    Planetary Computer, Planet, NASA Earthdata, and more.

    Features:
      - Federated search across 22+ providers
      - Sentinel-1 SLC/GRD, Sentinel-2, Landsat, MODIS and more
      - Sentinel-1C/D active constellation support
      - 17 spectral indices (NDVI, EVI, NBR, dNBR, LST...)
      - SAR processing (despeckle, calibrate, flood mapping, coherence)
      - Cloud Optimized GeoTIFF output
      - YAML pipeline definitions
      - Clean search tables and live download progress
  doc_url: https://pygeofetch.readthedocs.io
  dev_url: https://github.com/appiahkubis14/pygeofetch

extra:
  recipe-maintainers:
    - appiahkubis14
