schema_version: 1

context:
  version: "1.5.2"

package:
  name: scikit-maad
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/s/scikit-maad/scikit_maad-${{ version }}.tar.gz
  sha256: 92c55b0fed3659db50eedc278798ed19dfbfc352ce33a6f82f2fb53b2886b292

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - flit-core >=3.2,<4
    - pip
  run:
    - python >=${{ python_min }}
    - numpy >=1.21
    - scipy >=1.8
    - scikit-image >=0.23.1
    - pandas >=1.5
    - matplotlib-base >=3.6
    - pywavelets >=1.4

tests:
  - python:
      imports:
        - scikit_maad
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  summary: Open-source and modular toolbox for quantitative soundscape analysis in Python
  license: BSD-3-Clause
  license_file: LICENSE
  homepage: https://pypi.org/project/scikit-maad/
  repository: https://github.com/scikit-maad/scikit-maad
  documentation: https://scikit-maad.github.io/

extra:
  recipe-maintainers:
    - ocefpaf
