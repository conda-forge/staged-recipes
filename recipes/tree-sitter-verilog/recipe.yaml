schema_version: 1

context:
  version: "1.0.3"

package:
  name: tree-sitter-verilog
  version: ${{ version }}

source:
  url: https://github.com/tree-sitter/tree-sitter-verilog/archive/refs/tags/v${{ version }}.tar.gz
  sha256: 2b985c74fa7d0035db7415908935cf1ba7eea3d928ccebfa1d89541d5b6fa7b4

build:
  number: 0
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  build:
    - ${{ compiler("c") }}
  host:
    - python
    - pip
    - setuptools >=42
    - wheel
  run:
    - python

tests:
  - python:
      imports:
        - tree_sitter_verilog

about:
  homepage: https://github.com/tree-sitter/tree-sitter-verilog
  summary: SystemVerilog grammar for tree-sitter
  license: MIT
  license_file: LICENSE
  repository: https://github.com/tree-sitter/tree-sitter-verilog

extra:
  recipe-maintainers:
    - killua156
    - mgorny
