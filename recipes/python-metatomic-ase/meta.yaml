{% set version = "0.1.0" %}

package:
  name: python-metatomic-ase
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/m/metatomic-ase/metatomic_ase-{{ version }}.tar.gz
  sha256: fa0d5392c469ce10cd4ccdc67f481fd6b044a4c64183df4d0e4a11953726e923

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - setuptools >=77
    - packaging >=23
    - pip
  run:
    - python >={{ python_min }}
    - python-vesin >=0.5.6,<0.6
    - python-metatomic-torch >=0.1.10,<0.2
    - ase >=3.25

test:
  imports:
    - metatomic_ase
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://pypi.org/project/metatomic-ase/
  summary: ASE interface to use metatomic atomistic machine learning models
  license: BSD-3-Clause
  license_file: LICENSE

extra:
  recipe-maintainers:
    - Luthaf
