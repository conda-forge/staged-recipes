schema_version: 1

context:
  version: "0.0.3"

package:
  name: getsources
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/g/getsources/getsources-${{ version }}.tar.gz
  sha256: d9c6df1cab64144d1fa30fd518079c290779a723b647aa6b1f2eb0a8b88af542

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - setuptools ==68.0.0
    - pip
  run:
    - python >=${{ python_min }}
    - dill ==0.4.0

tests:
  - python:
      imports:
        - getsources
      pip_check: true
      python_version: ${{ python_min }}.*

about:
  summary: A way to get the source code of functions
  license: MIT
  license_file: LICENSE
  homepage: https://github.com/mutating/getsources

extra:
  recipe-maintainers:
    - thewchan
