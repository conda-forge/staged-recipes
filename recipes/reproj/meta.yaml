{% set name = "reproj" %}
{% set version = "0.2.0" %}
{% set python_min = "3.9" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz
  sha256: 9d03e876318e280af2a92474e2af02a02aa70040307d31ba41e7e2b519884120

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - pip
    - setuptools >=61
  run:
    - python >={{ python_min }}
    - pyproj >=2.2.0
    - shapely

test:
  imports:
    - reproj
  commands:
    - pip check
  requires:
    - python {{ python_min }}
    - pip

about:
  home: https://github.com/sgoodm/python-reproj
  summary: Reproject shapely geometries
  license: BSD-3-Clause
  license_file: LICENSE.txt
  description: |
    Reproj is a minimalistic package for reprojecting Shapely geometry
    objects between coordinate reference systems with a single function call,
    without requiring GeoPandas.
  dev_url: https://github.com/sgoodm/python-reproj

extra:
  recipe-maintainers:
    - sgoodm
