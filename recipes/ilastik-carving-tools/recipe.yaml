context:
  version: "0.3.0"

package:
  name: ilastik-carving-tools
  version: ${{ version }}

source:
  url: https://github.com/ilastik/ilastik-carving-tools/archive/${{ version }}.tar.gz
  sha256: a9d530b547b794e4a7ebb9e92e3b00c0e346e553f9e9908ab7f04886cdfd833b

build:
  number: 0

requirements:
  build:
    - if: build_platform != target_platform
      then:
        - cross-python_${{ target_platform }}
        - python
        - cython
    - if: not win
      then:
        - make
    - cmake
    - ${{ compiler("c") }}
    - ${{ compiler("cxx") }}
  host:
    - libboost-headers
    - python
    - pybind11
    - vigra
  run:
    - if: win
      then:
        - vcomp14
    - numpy <3
    - vigra
    - python

tests:
  - script:
      - pytest -v test-python
    files:
      source:
        - test-python/*.py
    requirements:
      run:
        - pytest
  - python:
      imports:
        - ilastik_carving_tools
      pip_check: true

about:
  homepage: https://github.com/ilastik/ilastik-carving-tools
  summary: Various compiled carving utilities for the ilastik project
  license: MIT
  license_file: LICENSE
  repository: https://github.com/ilastik/ilastik-carving-tools

extra:
  recipe-maintainers:
    - k-dominik
