context:
  version: "0.8.1"

package:
  name: curlpp
  version: ${{ version }}

source:
  url: https://github.com/jpbarrette/curlpp/archive/refs/tags/v${{ version }}.tar.gz
  sha256: 97e3819bdcffc3e4047b6ac57ca14e04af85380bd93afe314bee9dd5c7f46a0a
  patches:
    - curl-8.10.patch

build:
  number: 0
  script:
    - if: unix
      then: cmake -S . -B build -G Ninja $CMAKE_ARGS -DCMAKE_POLICY_VERSION_MINIMUM=3.5
      else: cmake -S . -B build -G Ninja %CMAKE_ARGS% -DCMAKE_POLICY_VERSION_MINIMUM=3.5
    - cmake --build build
    - if: unix
      then: cmake --install build
      else: cmake --install build --prefix %LIBRARY_PREFIX%

requirements:
  build:
    - ${{ compiler('c') }}
    - ${{ compiler('cxx') }}
    - ${{ stdlib('c') }}
    - cmake
    - ninja
  host:
    - libcurl

tests:
  - package_contents:
      include:
        - curlpp/cURLpp.hpp
      lib:
        - curlpp

about:
  homepage: https://www.curlpp.org/
  license: MIT
  license_file: doc/LICENSE
  summary: C++ wrapper for libcURL
  description: |
    curlpp is a C++ wrapper for libcURL, providing an object-oriented interface
    to the libcURL library.
  repository: https://github.com/jpbarrette/curlpp

extra:
  recipe-maintainers:
    - wolfv
    - timple
