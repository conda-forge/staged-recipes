context:
  version: "4.0.1"

package:
  name: argo-cli
  version: ${{ version }}

source:
  url: https://github.com/argoproj/argo-workflows/archive/refs/tags/v${{ version }}.tar.gz
  sha256: 9f549328be7f63b68aa3f10f9458be5c241e23184dd9ffd8a86b3c1fb150cd3e

build:
  number: 0
  skip:
    - win

requirements:
  build:
    - ${{ compiler('c') }}
    - ${{ stdlib('c') }}
    - ${{ compiler('go-cgo') }}
    - yarn <2
    - go-licenses

tests:
  - script: argo --help
  - script: 'argo version | grep "argo: v${{ version }}"'

about:
  homepage: https://github.com/argoproj/argo-workflows
  summary: Workflow Engine for Kubernetes
  license: Apache-2.0
  license_file:
    - LICENSE
    - library_licenses/
  documentation: https://argo-workflows.readthedocs.io/
  repository: https://github.com/argoproj/argo-workflows

extra:
  recipe-maintainers:
    - borchero
