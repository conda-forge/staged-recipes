{% set name = "pymultinest-bilby" %}
{% set version = "0.1.0" %}
{% set python_min = "3.10" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/pymultinest_bilby-{{ version }}.tar.gz
  sha256: f2b2aac70cab7e188d9aa3680b7356e14f2e9960645b9152d1d33b86428f91d7

build:
  noarch: python
  number: 0
  script_env:
    - SETUPTOOLS_SCM_PRETEND_VERSION={{ version }}
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python {{ python_min }}
    - pip
    - setuptools >=45
    - setuptools-scm >=6.2
  run:
    - python >={{ python_min }}
    - bilby >=2.3.0
    - pymultinest

test:
  imports:
    - pymultinest_bilby
  commands:
    - pip check
    - python -m pytest tests/
  requires:
    - python {{ python_min }}
    - pip
    - pytest
  source_files:
    - tests
    - pyproject.toml

about:
  home: https://github.com/bilby-dev/pymultinest-bilby
  summary: Plugin for using pymultinest with bilby.
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - ColmTalbot
    - mj-will
