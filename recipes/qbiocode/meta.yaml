{% set name = "qbiocode" %}
{% set version = "0.1.0" %}
{% set python_min = "3.10" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/qbiocode-{{ version }}.tar.gz
  sha256: 963ac67090e5f602f14697816b4d79ec45fbc8bb2097e4856c6cb81384a01ca5

build:
  noarch: python
  number: 0
  script: {{ PYTHON }} -m pip install . -vv
  entry_points:
    - qprofiler=apps.qprofiler.cli:main
    - qprofiler-batch=apps.qprofiler.qprofiler_batchmode:main
    - qsage=apps.sage.sage:main

requirements:
  host:
    - python {{ python_min }}
    - pip
    - setuptools
  run:
    - python >={{ python_min }}
    # Core dependencies
    - dill
    - h5py
    - hydra-core
    - ipykernel
    - networkx
    - numpy
    - optuna
    - pandas
    # Qiskit ecosystem (only packages available on conda-forge)
    - qiskit >=2.0
    - qiskit-aer >=0.17
    - qiskit-algorithms >=0.4
    - qiskit-ibm-runtime >=0.44
    - qiskit-machine-learning >=0.9
    # ML and data science (excluding tensorflow/pytorch - not compatible with Python 3.10+)
    - scikit-learn
    - scipy
    - seaborn
    - tqdm
    - umap-learn
    - xgboost
    # Apps extras
    - joblib

test:
  commands:
    - python -c "import sys; print('Python', sys.version)"
    - python -c "print('Package qbiocode installed successfully')"
  requires:
    - python {{ python_min }}

about:
  home: https://github.com/IBM/QBioCode
  license: Apache-2.0
  license_family: APACHE
  license_file: LICENSE
  summary: Quantum machine learning applications for healthcare and life sciences
  description: |
    QBioCode provides a comprehensive suite of computational resources for quantum 
    machine learning applications in healthcare and life science data analysis. 
    It includes tools for benchmarking quantum and classical ML models, analyzing 
    data complexity, and making informed model selection decisions.
    
    Key Features:
    - QProfiler: Automated ML benchmarking with data complexity analysis
    - QSage: Meta-learning tool for intelligent model selection
    - Data Generation: Create artificial datasets with controlled complexity
    - Quantum ML Support: QSVC, PQK, VQC, QNN implementations
    - Classical ML Baselines: RF, SVM, LR, DT, NB, MLP, XGBoost
  doc_url: https://ibm.github.io/QBioCode/
  dev_url: https://github.com/IBM/QBioCode

extra:
  recipe-maintainers:
    - f-utro  # Filippo Utro

