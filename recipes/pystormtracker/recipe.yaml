schema_version: 1

context:
  python_min: "3.11"
  version: "0.4.0"

package:
  name: pystormtracker
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/P/PyStormTracker/pystormtracker-${{ version }}.tar.gz
  sha256: a10d511368f355b82b29b0ef507325b95e6db7275757afc378c211a9178207df

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  python:
    entry_points:
      - stormtracker = pystormtracker.cli:main

requirements:
  host:
    - python ${{ python_min }}.*
    - hatchling
    - pip
  run:
    - python >=${{ python_min }}
    - dask-core >=2024.1.0
    - distributed >=2024.1.0
    - h5netcdf >=1.0.0
    - h5py >=3.8.0
    - numpy >=1.24.0
    - numba >=0.60.0
    - xarray >=2024.9.0
    - matplotlib-base >=3.10.8
    - pandas >=3.0.1

tests:
  - python:
      imports:
        - PyStormTracker
      pip_check: true
      python_version: ${{ python_min }}.*
  - requirements:
      run:
        - pip
        - python ${{ python_min }}.*
        - pytest
      files:
        source:
          - tests/
          - data/test/tracks/
      script:
        - pytest --run-all
        - stormtracker --help

about:
  summary: A High-Performance Cyclone Tracker in Python
  license: BSD-3-Clause
  license_file: LICENSE
  homepage: https://pypi.org/project/PyStormTracker/

extra:
  recipe-maintainers:
    - mwyau
