schema_version: 1

context:
  python_min: "3.11"
  version: "0.4.1"

package:
  name: pystormtracker
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/P/PyStormTracker/pystormtracker-${{ version }}.tar.gz
  sha256: 71e842a963b589f7e2939094e44765cbd96d34bba4feeea1dd42dbffa6f840a5

build:
  number: 0
  skip:
    - match(python, "<3.11")
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  python:
    entry_points:
      - stormtracker = pystormtracker.cli:main

requirements:
  host:
    - python >=${{ python_min }}
    - hatchling
    - pip
  run:
    - python >=${{ python_min }}
    - dask-core >=2024.1.0
    - distributed >=2024.1.0
    - h5netcdf >=1.0.0
    - h5py >=3.8.0
    - numpy >=1.24.0
    - numba >=0.60.0
    - xarray >=2024.9.0
    - cfgrib >=0.9.15.1
    - eccodes >=2.43.0
    - mpi4py >=4.1.0
    - netcdf4 >=1.6.1

tests:
  - python:
      imports:
        - pystormtracker
      pip_check: true
  - script:
      - stormtracker --help
      - pytest --run-all
    requirements:
      run:
        - pip
        - python >=${{ python_min }}
        - pytest >=9.0.2
        - pooch >=1.9.0
    files:
      source:
        - tests/
        - data/test/tracks/

about:
  summary: A High-Performance Cyclone Tracker in Python
  license: BSD-3-Clause
  license_file: LICENSE
  homepage: https://pypi.org/project/PyStormTracker/

extra:
  recipe-maintainers:
    - mwyau
