{% set version = "0.4.1" %}

package:
  name: runtime-introspect
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/r/runtime-introspect/runtime_introspect-{{ version }}.tar.gz
  sha256: e1c6932c4021d432c81ed577424af20e4cb1e20eed93d45b2950cf8be2da9b45

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - flit-core >=3.2,<4
    - pip
  run:
    - python >={{ python_min }}

test:
  source_files:
    - tests
  imports:
    - runtime_introspect
  commands:
    - pip check
    - pytest -ra tests
  requires:
    - python {{ python_min }}
    - pip
    - pytest

about:
  home: https://github.com/neutrinoceros/runtime-introspect
  summary: A small Python library to seamlessly introspect interpreter features at runtime
  license: GPL-3.0-only
  license_file: LICENSE

extra:
  recipe-maintainers:
    - neutrinoceros
