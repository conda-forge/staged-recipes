# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "0.2.0"
  cffi_min: "1.17.1"

package:
  name: python-moocore
  version: ${{ version }}

source:
  - url: https://raw.githubusercontent.com/multi-objective/moocore/refs/tags/v${{ version }}/LICENSE
    sha256: b0195d4254ef3bf73b8b4159ec1093cd0fa651cb8c047a440e68d8e302b7cafa
  - url: https://pypi.org/packages/source/m/moocore/moocore-${{ version }}.tar.gz
    sha256: 3dc601f85f9a4743ed50ddd027dca30e3bb55c899916a092c2ece495b1b2de08

build:
  number: 0
  noarch: python
  script:
    - ${{ PYTHON }} -c "__import__('os').unlink('src/conftest.py')"
    - ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation --disable-pip-version-check

requirements:
  build:
    - ${{ compiler("c") }}
    - ${{ compiler("cxx") }}
    - ${{ stdlib("c) }}
  host:
    - cffi >=${{ cffi_min }}
    - pip
    - python ${{ python_min }}.*
    - setuptools >=77.0.3
    - wheel
  run:
    - cffi >=${{ cffi_min }}
    - numpy >=1.24
    - platformdirs
    - python >=${{ python_min }}

tests:
  - python:
      imports: moocore
      pip_check: true
      python_version: ${{ python_min }}.*

about:
  summary: Core Algorithms for Multi-Objective Optimization
  license: LGPL-2.1-or-later
  license_file:
    - COPYRIGHTS
    - LICENSE
  homepage: https://pypi.org/project/moocore
  repository: https://github.com/multi-objective/moocore
  documentation: https://multi-objective.github.io/moocore/python

extra:
  recipe-maintainers:
    - bollwyvl
