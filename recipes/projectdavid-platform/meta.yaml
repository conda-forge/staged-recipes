{% set name = "projectdavid-platform" %}
{% set version = "1.35.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.io/packages/source/{{ name[0] }}/{{ name }}/projectdavid_platform-{{ version }}.tar.gz
  sha256: c857d348105c6fd2b3d1d4e03c0e4084becb4ca2c4719063cad15581811c1631

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0
  entry_points:
    - pdavid = projectdavid_platform.start_orchestration:entry_point

requirements:
  host:
    - python >=3.9
    - pip
    - setuptools >=61.0
    - wheel
  run:
    - python >=3.9
    - pyyaml >=6.0,<7.0
    - python-dotenv >=1.0.0,<2.0.0
    - typer >=0.9.0,<1.0.0

test:
  imports:
    - projectdavid_platform
  commands:
    - pip check
    - pdavid --help
  requires:
    - pip

about:
  home: https://github.com/project-david-ai/projectdavid-platform
  summary: Deployment orchestrator for the Project David sovereign AI platform
  description: |
    projectdavid-platform provides the pdavid CLI for deploying and managing
    the Project David sovereign AI runtime stack. It wraps Docker Compose
    profiles for the full stack including inference, training, and observability
    components, with support for airgapped and Tailscale-based multi-node
    cluster deployments.
  license: LicenseRef-PolyForm-Noncommercial-1.0.0
  license_file: LICENSE
  doc_url: https://docs.projectdavid.co.uk/docs/platform-overview
  dev_url: https://github.com/project-david-ai/projectdavid-platform

extra:
  recipe-maintainers:
    - frankie336