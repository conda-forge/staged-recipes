# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "2.0.1"

package:
  name: bmad-module-skill-forge
  version: ${{ version }}

source:
  url: https://registry.npmjs.org/bmad-module-skill-forge/-/bmad-module-skill-forge-${{ version }}.tgz
  sha256: 5a291b8bf4632cfa06beef7764afb5458a533e66f2451a37dff719e17cca7da5

build:
  number: 0
  script:
    - if: unix
      then:
        - set -ex
        - npm pack --ignore-scripts
        - npm install --global "${SRC_DIR}/bmad-module-skill-forge-${{ version }}.tgz"
        - pnpm install --prod --ignore-scripts
        - pnpm-licenses generate-disclaimer --prod --output-file=third-party-licenses.txt
      else:
        - call npm pack --ignore-scripts
        - if %ERRORLEVEL% neq 0 exit 1
        - call npm install --global %SRC_DIR%/bmad-module-skill-forge-${{ version }}.tgz
        - if %ERRORLEVEL% neq 0 exit 1
        - call pnpm install --prod --ignore-scripts
        - if %ERRORLEVEL% neq 0 exit 1
        - call pnpm-licenses generate-disclaimer --prod --output-file=third-party-licenses.txt
        - if %ERRORLEVEL% neq 0 exit 1

requirements:
  build:
    - nodejs >=22
    - pnpm
    - pnpm-licenses
  host:
    - nodejs >=22
  run:
    - nodejs >=22

tests:
  - script:
      - bmad-module-skill-forge --help

about:
  license: MIT
  license_file:
    - LICENSE
    - third-party-licenses.txt
  summary: BMAD module — Turn code and docs into instructions AI agents can actually follow. Progressive capability tiers (Quick/Forge/Forge+/Deep).
  description: |
    **Turn code and docs into instructions AI agents can actually follow.**
  homepage: https://github.com/armelhbobdad/bmad-module-skill-forge
  repository: https://github.com/armelhbobdad/bmad-module-skill-forge

extra:
  recipe-maintainers:
    - rxm7706
