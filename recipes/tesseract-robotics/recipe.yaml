schema_version: 1

context:
  version: "0.35.0"

package:
  name: tesseract-robotics
  version: ${{ version }}

source:
  - url: https://github.com/tesseract-robotics/tesseract/archive/refs/tags/${{ version }}.tar.gz
    sha256: 98935411bcf2261fc3e8854c7528dd0cdf1a466f7ae131d630699e494eb9d4c9
    file_name: source.tar.gz

build:
  number: 0

requirements:
  build:
    - ${{ compiler('c') }}
    - ${{ compiler('cxx') }}
    - ${{ stdlib("c") }}
    - benchmark
    - gtest
    - gmock
    - cmake
    - ninja
    - pkg-config
    - lcov
    - if: linux
      then:
        - ${{ cdt('mesa-libgl-devel') }}
        - ${{ cdt('mesa-dri-drivers') }}
  host:
    - ros-industrial-cmake-boilerplate
    - boost-plugin-loader
    - opw-kinematics
    - libboost-devel
    - cereal
    - eigen-abi-devel
    - tinyxml2
    - console_bridge
    - assimp
    - urdfdom
    - fcl
    - octomap 
    - orocos-kdl 
    - pcl
    - gtest
    - gmock
    - pkg-config 
    - xz
    - flann
    - jsoncpp
    - yaml-cpp
    - bullet-cpp
    - blas
    - if: unix
      then:
        - xorg-libx11
        - xorg-libxext
  run:
    - cereal
    - eigen
    - tinyxml2
    - console_bridge
    - assimp
    - urdfdom
    - fcl
    - octomap 
    - orocos-kdl 
    - pcl
    - xz
    - yaml-cpp
    - bullet-cpp
    - blas
    - if: unix
      then:
        - xorg-libx11
        - xorg-libxext
  run_exports:
    - ${{ pin_subpackage('tesseract-robotics', upper_bound='x.x') }}

tests:
  - package_contents:
      include:
        - tesseract/collision/common.h
        - tesseract/common/fwd.h
        - tesseract/environment/fwd.h
        - tesseract/geometry/fwd.h
        - tesseract/kinematics/fwd.h
        - tesseract/scene_graph/fwd.h
        - tesseract/srdf/fwd.h
        - tesseract/state_solver/fwd.h
        - tesseract/urdf/urdf_parser.h
        - tesseract/visualization/fwd.h
      lib:
        - tesseract_collision
        - tesseract_common
        - tesseract_environment
        - tesseract_scene_graph
        - tesseract_srdf
        - tesseract_urdf
        - tesseract_visualization

about:
  summary: Motion Planning Environment
  license: Apache-2.0 AND BSD-3-Clause AND BSD-2-Clause
  license_file:
    - src/LICENSE
    - src/LICENSE.Apache-2.0
    - src/LICENSE.BSD-3-Clause
    - src/LICENSE.BSD-2-Clause
  homepage: https://github.com/tesseract-robotics/tesseract

extra:
  recipe-maintainers:
    - johnwason
    - Levi-Armstrong
    - traversaro
