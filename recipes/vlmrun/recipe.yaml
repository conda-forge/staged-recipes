# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "0.6.3"

package:
  name: vlmrun
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/v/vlmrun/vlmrun-${{ version }}.tar.gz
  sha256: a1d611125b1d2f00ba4e0066b2389f29714629f643c397fea67756c8887edb0c

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  python:
    entry_points:
      - vlmrun = vlmrun.cli.cli:app

requirements:
  host:
    - python ${{ python_min }}.*
    - setuptools >=40.1.0
    - wheel
    - pip
  run:
    - python >=${{ python_min }}
    - cachetools
    - ipython
    - loguru
    - opencv >=4.8.0
    - pandas
    - pillow >=10.2.0
    - pydantic <3,>=2.5
    - requests
    - rich
    - tabulate
    - tenacity
    - tqdm
    - typer >=0.9.0
    - vlmrun-hub >=0.1.28

tests:
  - python:
      imports:
        - vlmrun
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  homepage: https://docs.vlm.run
  license: Apache-2.0
  license_file: LICENSE
  summary: Official Python SDK for VLM Run
  repository: https://github.com/vlm-run/vlmrun-python-sdk
  documentation: https://docs.vlm.run
  description: |
    The official Python SDK for VLM Run, the platform for extracting
    structured data from visual inputs (images, documents, and video).
    The SDK provides a typed client for the VLM Run API together with a
    `vlmrun` command-line interface, schema definitions from vlmrun-hub,
    and helpers for predictions, fine-tuning, files, datasets, and agents.

extra:
  recipe-maintainers:
    - rxm7706
    - pb01ka
