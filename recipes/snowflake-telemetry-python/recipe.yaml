schema_version: 1

context:
  version: "0.6.1"

package:
  name: snowflake-telemetry-python
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/s/snowflake-telemetry-python/snowflake_telemetry_python-${{ version }}.tar.gz
  sha256: fabd5af936834735cd900c6d44ddeb9835ad4a63f13c845eb8d10390be2f6d8d

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - setuptools >=40.6.0
    - wheel
    - pip
  run:
    - python >=${{ python_min }}
    - opentelemetry-api ==1.26.0
    - opentelemetry-sdk ==1.26.0

tests:
  - python:
      imports:
        - snowflake.telemetry
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  summary: Snowflake Telemetry for Python
  homepage: https://www.snowflake.com/
  documentation: https://docs.snowflake.com/en/developer-guide/logging-tracing/tracing-python
  repository: https://github.com/snowflakedb/snowflake-telemetry-python
  license: Apache-2.0
  license_file:
    - LICENSE.txt
    - NOTICE.txt

extra:
  recipe-maintainers:
    - sfc-gh-zizhang
