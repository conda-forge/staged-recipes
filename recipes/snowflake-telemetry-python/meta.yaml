{% set version = "0.7.1" %}

package:
  name: snowflake-telemetry-python
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/s/snowflake-telemetry-python/snowflake_telemetry_python-{{ version }}.tar.gz
  sha256: 6b0af6902d7650072c944c0ea41d3e194b7a139df9bdd6dc79ef7a5b0c0c99ce

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - setuptools >=40.6.0
    - wheel
    - pip
  run:
    - python >={{ python_min }}
    - opentelemetry-api ==1.26.0
    - opentelemetry-sdk ==1.26.0

test:
  imports:
    - snowflake.telemetry
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://www.snowflake.com/
  summary: Snowflake Telemetry for Python
  doc_url: https://docs.snowflake.com/en/developer-guide/logging-tracing/tracing-python
  dev_url: https://github.com/snowflakedb/snowflake-telemetry-python
  license: Apache-2.0
  license_file:
    - LICENSE.txt
    - NOTICE.txt

extra:
  recipe-maintainers:
    - sfc-gh-zizhang
