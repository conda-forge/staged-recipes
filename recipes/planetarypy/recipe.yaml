schema_version: 1

context:
  name: planetarypy
  version: "0.73.2"
  python_min: "3.11"

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/${{ name[0] }}/${{ name }}/${{ name }}-${{ version }}.tar.gz
  sha256: 8fba00153261f26166e7111ea80e503da7461efa0a0e5f1bda05be32dda653d9

build:
  noarch: python
  number: 0
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  python:
    entry_points:
      - plp = planetarypy.cli:main

requirements:
  host:
    - python ${{ python_min }}.*
    - hatchling
    - pip
  run:
    - python >=${{ python_min }}
    - astropy
    - typer >=0.9
    - numpy
    - pandas
    - pyarrow
    - pooch
    - pvl
    - lxml
    - python-dateutil
    - requests
    - tomlkit
    - tqdm
    - yarl
    - loguru
    - python-duckdb
    - rasterio
    - pyproj
    - rioxarray
    - matplotlib-base
    - rich
    - shapely
    - antimeridian

tests:
  - python:
      imports:
        - planetarypy
        - planetarypy.constants
        - planetarypy.pds
      pip_check: true
      python_version: ${{ python_min }}.*
  - script:
      - plp --help

about:
  homepage: https://github.com/planetarypy/planetarypy
  summary: Python tools for planetary science data access — PDS indexes, SPICE kernels, instrument data, and per-body constants
  license: BSD-3-Clause
  license_file: LICENSE
  repository: https://github.com/planetarypy/planetarypy

extra:
  recipe-maintainers:
    - michaelaye
    - cjtu
