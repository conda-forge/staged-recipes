{% set name = "planetarypy" %}
{% set version = "0.76.2" %}
{% set python_min = "3.11" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz
  sha256: 2d895155792ba2184b13052b1f925a07727bbda93c728119f1396b29baf7a6c1

build:
  noarch: python
  number: 0
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  entry_points:
    - plp = planetarypy.cli:main

requirements:
  host:
    - python {{ python_min }}
    - hatchling
    - pip
  run:
    - python >={{ python_min }}
    - astropy
    - typer >=0.9
    - numpy
    - pandas
    - pyarrow
    - pooch
    - pvl
    - lxml
    - python-dateutil
    - requests
    - tomlkit
    - tqdm
    - yarl
    - loguru
    - python-duckdb
    - rasterio
    - pyproj
    - rioxarray
    - matplotlib-base
    - rich
    - shapely
    - antimeridian
    - pdr
    - pillow
    # SPICE is a flagship feature and conda has no "extras" mechanism, so the
    # pip [spice] extra (spiceypy + scipy) ships in the conda package directly.
    - spiceypy
    - scipy

test:
  imports:
    - planetarypy
    - planetarypy.constants
    - planetarypy.pds
  commands:
    - pip check
    - plp --help
  requires:
    - python {{ python_min }}
    - pip

about:
  home: https://github.com/planetarypy/planetarypy
  summary: Python tools for planetary science data access — PDS indexes, SPICE kernels, instrument data, and per-body constants
  license: BSD-3-Clause
  license_file: LICENSE
  dev_url: https://github.com/planetarypy/planetarypy

extra:
  recipe-maintainers:
    - michaelaye
    - cjtu
