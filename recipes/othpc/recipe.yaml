schema_version: 1

context:
  version: 0.0

package:
  name: othpc
  version: ${{ version }}

source:
  url: https://github.com/jschueller/othpc/archive/refs/tags/v${{ version }}.tar.gz
  sha256: fdc54b80fee36e046606f0e1fbce7fab88148f3c832f2c50f5c1d002bec4ee55

build:
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - setuptools
  run:
    - python >=${{ python_min }}
    - openturns
    - pandas
    - tqdm
    - submitit
    - packaging

tests:
  - python:
      imports:
        - othpc
      pip_check: true
      python_version: ${{ python_min }}.*

about:
  homepage: https://github.com/openturns/othpc
  summary: 'Evaluate simulation models on HPC clusters'
  description: |
    othpc is a simple Python tool that facilitates the evaluation
    of numerical models on a SLURM based High-Performance Computing (HPC) facility.
  license: LGPL-3.0-or-later
  license_family: LGPL
  license_file: COPYING.LESSER

extra:
  recipe-maintainers:
    - jschueller
