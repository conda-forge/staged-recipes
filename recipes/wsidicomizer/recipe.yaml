schema_version: 1

context:
  python_min: "3.12"
  version: "0.27.0"

package:
  name: wsidicomizer
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/w/wsidicomizer/wsidicomizer-${{ version }}.tar.gz
  sha256: 79b1211a17edd9496382e15dc6e15211a15db5b379e26c31ec60ba136dcd9ebd

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  python:
    entry_points:
      - wsidicomizer = wsidicomizer.cli:main

requirements:
  host:
    - python ${{ python_min }}.*
    - hatchling
    - pip
  run:
    - python >=${{ python_min }}
    - wsidicom >=0.32.1,<0.33.0
    - opentile >=0.23.0,<0.24.0
    - numpy >=1.22.0
    - pydicom >=3.0.0
    - czifile >=2026.3.12
    - tiffslide >=3.0.0,<4.0.0
    - click >=8.3.0,<9.0.0
  run_constrainted:
    - imagecodecs >=2024.1.1,!=2024.9.22
    - openslide-python >=1.3.0,<2.0.0
    - pyisyntax >=0.1.2,<0.2.0
    - pyjpegls >=1.2.0,<2.0.0
    - pylibjpeg-openjpeg >=2.1.1,<3.0.0
    - pylibjpeg-rle >=2.0.0,<3.0.0
    - scyjava >=1.8.1,<2.0.0
    - ome-types >=0.5.0,<0.6.0

tests:
  - python:
      imports:
        - wsidicomizer
      pip_check: true
      python_version: ${{ python_min }}.*
  - requirements:
      run:
        - pip
        - python ${{ python_min }}.*
    script:
      - wsidicomizer --help

about:
  summary: Tool for reading WSI files from proprietary formats and optionally convert them to to DICOM
  license: Apache-2.0
  license_file: LICENCE
  homepage: https://pypi.org/project/wsidicomizer/

extra:
  recipe-maintainers:
    - sarthakpati
