{% set name = "wsidicomizer" %}
{% set version = "0.26.1" %}
{% set python_min = "3.10" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/wsidicomizer-{{ version }}.tar.gz
  sha256: 0f15ffe06042ffe4e2e10ae60028a680360fb1390fbe91c00ea7506802581adb

build:
  entry_points:
    - wsidicomizer = wsidicomizer.cli:main
    - bioformats_wsidicomizer = wsidicomizer.extras.bioformats.bioformats_cli:main
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - poetry-core
    - pip
  run:
    - python >={{ python_min }}
    - wsidicom >=0.30.0,<0.31.0
    - opentile >=0.21.0,<0.22.0
    - numpy >=1.22.0
    - pydicom >=3.0.0
    - czifile >=2019.7.2,<2020.0.0
    - tiffslide >=2.5.1,<3.0.0
    - imagecodecs >=2024.1.1,!=2024.9.22
    - click >=8.3.0,<9.0.0
  run_constrained:
    - openslide-python >=1.3.0,<2.0.0
    - scyjava >=1.8.1,<2.0.0
    - ome-types >=0.5.0,<0.6.0
    - pyisyntax >=0.1.2,<0.2.0
    - bioformats
    - scyjava >=1.8.1,<2.0.0
    - ome-types >=0.5.0,<0.6.0

test:
  imports:
    - wsidicomizer
  commands:
    - pip check
    - wsidicomizer --help
    - bioformats_wsidicomizer --help
  requires:
    - python {{ python_min }}
    - pip

about:
  home: https://github.com/imi-bigpicture/wsidicomizer
  summary: Tool for reading WSI files from proprietary formats and optionally convert them to to DICOM
  license: Apache-2.0
  license_file: src/LICENSE

extra:
  recipe-maintainers:
    - sarthakpati
