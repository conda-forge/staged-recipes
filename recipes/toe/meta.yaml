package:
  name: toe
  version: "0.1.0"

source:
  path: .

build:
  noarch: python
  number: 0
  script: "{{ PYTHON }} -m pip install . --no-deps --ignore-installed -vv"
  entry_points:
    - toe = toe.cli:main

requirements:
  host:
    - python >=3.8
    - pip
    - setuptools
    - wheel
  run:
    - python >=3.8
    - numpy
    - scipy
    - pandas
    - matplotlib
    - scikit-learn

test:
  imports:
    - toe
  commands:
    - toe --help

about:
  home: "https://github.com/yourgithub/toe"
  license: "MIT"
  summary: "Trade-off evaluation using convex hull and Pareto frontier analysis."
