{% set name = "toe" %}
{% set version = "0.1.2" %}
{% set python_min = "3.8" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://github.com/LiuShang-777/toe_for_conda/archive/refs/tags/v{{ version }}.tar.gz
  sha256: a50ea2ddda759e62a12d2af31e055ee209e826fea66685dc75cb1ac4e0d4641f

build:
  noarch: python
  number: 0
  script: {{ PYTHON }} -m pip install . --no-deps --ignore-installed -vv
  entry_points:
    - toe = toe.cli:main

requirements:
  host:
    - python {{ python_min }}
    - pip
    - setuptools
    - wheel
  run:
    - python >={{ python_min }}
    - numpy
    - scipy
    - pandas
    - matplotlib-base
    - scikit-learn

test:
  requires:
    - python {{ python_min }}
  imports:
    - toe
  commands:
    - toe --help

about:
  home: https://github.com/LiuShang-777/toe_for_conda
  license: MIT
  license_file: LICENSE
  summary: Trade-off evaluation using convex hull and Pareto frontier analysis.

extra:
  recipe-maintainers:
    - LiuShang-777
