context:
  version: "1.11.0"

package:
  name: kanata
  version: ${{ version }}

source:
  url: https://github.com/jtroo/kanata/archive/v${{ version }}.tar.gz
  sha256: 42e71c76202ab1d39a4898851558deca277fc3619f11a7dcf0e376c5ffc287bb

build:
  number: 0
  script:
    env:
      CARGO_PROFILE_RELEASE_STRIP: symbols
      CARGO_PROFILE_RELEASE_LTO: fat
    content:
      - if: unix
        then:
          - cargo auditable install -j ${CPU_COUNT} --root "${PREFIX}" --path . --locked --no-track
        else:
          - cargo auditable install -j %CPU_COUNT% --root "%PREFIX%" --path . --locked --no-track
      - cargo-bundle-licenses --format yaml --output ./THIRDPARTY.yml

requirements:
  build:
    - ${{ stdlib('c') }}
    - ${{ compiler('c') }}
    - ${{ compiler('cxx') }} # for build karabiner-driverkit
    - ${{ compiler('rust') }}
    - cargo-bundle-licenses
    - cargo-auditable

tests:
  - script:
      - kanata --version
      - kanata --help
  - package_contents:
      strict: true
      bin:
        - kanata

about:
  homepage: https://github.com/jtroo/kanata
  summary: "Improve keyboard comfort and usability with advanced customization."
  description: |
    This is a cross-platform software keyboard remapper for Linux, macOS and Windows. A short summary of the features: multiple layers of key functionality advanced key behaviour customization (e.g. tap-hold, macros, unicode).
  license: LGPL-3.0-only
  license_file:
    - LICENSE
    - THIRDPARTY.yml
  repository: https://github.com/jtroo/kanata

extra:
  recipe-maintainers:
    - XhstormR
