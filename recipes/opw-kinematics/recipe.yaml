schema_version: 1

context:
  version: "0.5.3"

package:
  name: opw-kinematics
  version: ${{ version }}

source:
  - url: https://github.com/Jmeyer1292/opw_kinematics/archive/refs/tags/${{ version }}.tar.gz
    sha256: 9d96b780e690dafee9b5978102a1b3007afa5cd838a2c47ce220ceb679fcee15
    file_name: source.tar.gz

build:
  number: 0

requirements:
  build:
    - ${{ compiler('c') }}
    - ${{ compiler('cxx') }}
    - ${{ stdlib("c") }}
    - gtest
    - gmock
    - cmake
    - if: win
      then: ninja
    - if: linux
      then: make
    - ros-industrial-cmake-boilerplate
  host:
    - eigen-abi-devel
    - eigen
  run:
    - eigen
  run_exports:
    - ${{ pin_subpackage('opw-kinematics', upper_bound='x.x') }}

tests:
  - package_contents:
      include:
      - opw_kinematics/opw_kinematics.h

about:
  summary: Closed form IK for parallel base, spherical wrist industrial manipulators
  license: Apache-2.0
  license_file: src/LICENSE
  homepage: https://github.com/Jmeyer1292/opw_kinematics.git

extra:
  recipe-maintainers:
    - johnwason
