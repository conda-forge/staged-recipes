context:
  name: refscrub
  version: "1.0.0"

package:
  name: ${{ name }}
  version: ${{ version }}

source:
  url: https://gitlab.com/earthscope/public/epic/passoft/refscrub/-/archive/v${{ version }}/refscrub-v${{ version }}.tar.gz
  sha256: cabb842f9d15b15735ee2568a1df4e7d687f07eb6a3e627609d60df64ffa6c14

build:
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - setuptools
  run:
    - python >=${{ python_min }}

tests:
  - python:
      imports:
        - refscrub
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"
  - script:
      - refscrub -h
  - script:
      - python -m unittest discover -s tests
    requirements:
      run:
        - python ${{ python_min }}.*
    files:
      source:
        - tests/

about:
  homepage: https://epic.earthscope.org/content/software-resources
  summary: Remove select packets from RT130 data
  description: |
    (TODO: add description)
  license: GPL-3.0-or-later
  license_file: LICENSE
  repository: https://gitlab.com/earthscope/public/epic/passoft/refscrub

extra:
  recipe-maintainers:
    - omid-earthscope
