schema_version: 1

context:
  name: graphifyy
  version: "0.4.25"
  python_min: "3.10"

package:
  name: ${{ name }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/g/${{ name }}/${{ name }}-${{ version }}.tar.gz
  sha256: af985c43a8fc9725e33dfad7e6b77d89ba3784baf6b674b87da36c38f32d6698

build:
  noarch: python
  number: 0
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}
    - pip
    - setuptools >=68
  run:
    - python >=${{ python_min }},<3.14
    - networkx
    - tree-sitter >=0.23.0
    - tree-sitter-python
    - tree-sitter-javascript
    - tree-sitter-typescript
    - tree-sitter-go
    - tree-sitter-rust
    - tree-sitter-java
    - tree-sitter-c
    - tree-sitter-cpp
    - tree-sitter-ruby
    - tree-sitter-c-sharp
    - tree-sitter-kotlin
    - tree-sitter-scala
    - tree-sitter-php
    - tree-sitter-swift
    - tree-sitter-lua
    - tree-sitter-zig
    - tree-sitter-powershell
    - tree-sitter-elixir
    - tree-sitter-objc
    - tree-sitter-julia
    - tree-sitter-verilog

tests:
  - python:
      imports:
        - graphify
      pip_check: true
  - script:
      - graphify --help

about:
  homepage: https://github.com/safishamsi/graphify
  summary: Turn any folder of code, docs, papers, images, or videos into a queryable knowledge graph.
  description: |
    Graphify is an AI coding assistant skill that builds queryable knowledge
    graphs from code, docs, papers, and diagrams. It uses tree-sitter for
    deterministic AST extraction, NetworkX for graph construction, and Leiden
    community detection for clustering. Works with Claude Code, Codex,
    OpenCode, Cursor, Gemini CLI, and other AI coding assistants.
  license: MIT
  license_file: LICENSE
  repository: https://github.com/safishamsi/graphify
  documentation: https://graphify.net/

extra:
  recipe-maintainers:
    - killua156
