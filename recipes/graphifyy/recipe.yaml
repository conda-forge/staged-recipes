schema_version: 1

context:
  version: "0.8.10"

package:
  name: graphifyy
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/g/graphifyy/graphifyy-${{ version }}.tar.gz
  sha256: d4c4157899c9606b7b02faa931e807e8e7370736332a43ae34f57cc9de5c9baf

build:
  noarch: python
  number: 0
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  python:
    entry_points:
      - graphify = graphify.__main__:main

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - setuptools >=68
  run:
    - python >=${{ python_min }}
    - networkx
    - datasketch
    - rapidfuzz
    - tree_sitter >=0.23.0
    - tree-sitter-python
    - tree-sitter-javascript
    - tree-sitter-typescript
    - tree-sitter-go
    - tree-sitter-rust
    - tree-sitter-java
    - tree-sitter-groovy
    - tree-sitter-c
    - tree-sitter-cpp
    - tree-sitter-ruby
    - tree-sitter-c-sharp
    - tree-sitter-kotlin
    - tree-sitter-scala
    - tree-sitter-php
    - tree-sitter-swift
    - tree-sitter-lua
    - tree-sitter-zig
    - tree-sitter-powershell
    - tree-sitter-elixir
    - tree-sitter-objc
    - tree-sitter-julia
    - tree-sitter-verilog
    - tree-sitter-fortran
    - tree-sitter-bash
    - tree-sitter-json

tests:
  - python:
      imports:
        - graphify
      python_version:
        - ${{ python_min }}.*
        - "*"
      pip_check: true

about:
  summary: |
    AI coding assistant skill that turns any folder of code, docs, papers,
    images, or videos into a queryable knowledge graph.
  homepage: https://github.com/safishamsi/graphify
  repository: https://github.com/safishamsi/graphify
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - killua156
    - mgorny
