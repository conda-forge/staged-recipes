schema_version: 1

context:
  version: "0.0.1"

package:
  name: tree-sitter-swift
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/t/tree_sitter_swift/tree_sitter_swift-${{ version }}.tar.gz
  sha256: d43b0baf413ba4b049f92eadc074805cb6403655c905d3af24f12fce1c9f561b

build:
  number: 0
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  build:
    - ${{ compiler("c") }}
  host:
    - python
    - pip
    - setuptools >=42
    - wheel
  run:
    - python

tests:
  - python:
      imports:
        - tree_sitter_swift

about:
  homepage: https://github.com/tree-sitter/tree-sitter-swift
  summary: Swift grammar for tree-sitter
  license: MIT
  license_file: LICENSE
  repository: https://github.com/tree-sitter/tree-sitter-swift

extra:
  recipe-maintainers:
    - killua156
    - mgorny
