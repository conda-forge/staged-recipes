{% set name = "ds9" %}
{% set version = "8.5" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://github.com/SAOImageDS9/SAOImageDS9/archive/refs/tags/v{{ version }}.tar.gz
  sha256: 77881398b2dacccb1193bc0311751515a2e4b85f1b42db59109542220bb4e50e

build:
  number: 0
  skip: true  # [win or osx]

requirements:
  build:
    - {{ compiler('c') }}
    - {{ compiler('cxx') }}
  host:
    - automake
    - make
    - libxml2      # [linux]
    - libxslt      # [linux]
    - xorg-libx11  # [linux]
    - xorg-libxft  # [linux]
    - zlib         # [linux]

test:
  commands: 
    - ds9 -h

about:
  home: https://github.com/SAOImageDS9/SAOImageDS9
  summary: SAOImage DS9 is an astronomical imaging and data visualization application
  license: GPL-3.0-only
  license_file:
    - LICENSE

extra:
  recipe-maintainers:
    - epassaro
