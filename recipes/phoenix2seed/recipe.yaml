context:
  version: "1.0.0"

package:
  name: phoenix2seed
  version: ${{ version }}

source:
  url: https://gitlab.com/earthscope/public/epic/mt/phoenix2seed/-/archive/v${{ version }}/phoenix2seed-v${{ version }}.tar.gz
  sha256: fc9aee810578de1523d178b1886b965b98a7a4fd49f31f6126016a27b7a61cf3

build:
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0
  python:
    entry_points:
      - phoenix2seed = phoenix2seed.phoenix2seed:main

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - setuptools
  run:
    - python >=${{ python_min }}
    - configobj
    - obspy
    - openpyxl
    - pandas
    - pyside6

tests:
  - python:
      imports:
        - phoenix2seed
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"
  - script:
      - phoenix2seed -h

about:
  homepage: https://epic.earthscope.org/content/software-resources
  summary: Convert PHOENIX data and metadata into day-long mseed and StationXML files.
  description: |
    Convert PHOENIX data and metadata into day-long mseed and StationXML files.
    Supports both GUI and command-line operation.
  license: GPL-3.0-or-later
  license_file: LICENSE
  repository: https://gitlab.com/earthscope/public/epic/mt/phoenix2seed

extra:
  recipe-maintainers:
    - omid-earthscope
    - destinykuehn-earthscope
