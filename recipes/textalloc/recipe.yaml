context:
  version: "1.2.3"

package:
  name: textalloc
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/t/textalloc/textalloc-${{ version }}.tar.gz
  sha256: f394012a93a0109222fee8cb854a3499731ede3c716e5c0445cd49827e260517

build:
  noarch: python
  number: 0

requirements:
  host:
    - python ${{ python_min }}.*
    - setuptools >=61.0
    - pip
  run:
    - python >=${{ python_min }}
    - tqdm
    - numpy
    - matplotlib-base
    - packaging

tests:
  - python
    imports:
      - textalloc
    pip_check: true

about:
  homepage: https://github.com/ckjellson/textalloc
  summary: Efficient Text Allocation in matplotlib using NumPy Broadcasting
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - frankier
