{% set version = "0.2.3" %}
{% set python_min = "3.8" %}

package:
  name: pure-eval
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/p/pure-eval/pure_eval-{{ version }}.tar.gz
  sha256: 5f4e983f40564c576c7c8635ae88db5956bb2229d7e9237d03b3c0b0190eaf42

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python
    - setuptools >=41
    - wheel
    - setuptools-scm >=3.4.3
    - pip
  run:
    - python >={{python_min}}

test:
  imports:
    - pure_eval
  commands:
    - pip check
  requires:
    - pip
    - python

about:
  home: http://github.com/alexmojaki/pure_eval
  summary: Safely evaluate AST nodes without side effects
  license: MIT
  license_file: LICENSE.txt

extra:
  recipe-maintainers:
    - fitzgeralddp
