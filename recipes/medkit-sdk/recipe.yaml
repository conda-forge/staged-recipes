schema_version: 1

context:
  version: "0.1.0"

package:
  name: medkit-sdk
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/m/medkit-sdk/medkit_sdk-${{ version }}.tar.gz
  sha256: f1722cfaf6a77f0f34955f70e208eb588bb62ac4b9ceba1f53f0fc5e5c49fcf5

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  python:
    entry_points:
      - medkit = medkit.cli:app

requirements:
  host:
    - python ${{ python_min }}.*
    - hatchling
    - pip
  run:
    - python >=${{ python_min }}
    - httpx >=0.25.0
    - pydantic >=2.4.0
    - typer >=0.9.0
    - rich >=13.6.0

tests:
  - python:
      imports:
        - medkit_sdk
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"
  - requirements:
      run:
        - python ${{ python_min }}.*
    script:
      - medkit --help

about:
  summary: A unified Python SDK for public medical APIs (OpenFDA, PubMed, ClinicalTrials.gov)
  license: MIT
  license_file: LICENSE
  homepage: https://pypi.org/project/medkit-sdk/

extra:
  recipe-maintainers:
    - thewchan
