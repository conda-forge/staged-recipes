schema_version: 1

context:
  python_min: 3.9
  version: 0.15.1

package:
  name: python-flair-nlp
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/f/flair/flair-${{ version }}.tar.gz
  sha256: 780b4eeffba044c4a181f1810872fc01201c2eaed8d2ef4bcb126a6464e91933

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
  run:
    - python >=${{ python_min }}
    - boto3 >=1.20.27
    - conllu >=4.0,<5.0.0
    - deprecated >=1.2.13
    - ftfy >=6.1.0
    - gdown >=4.4.0
    - huggingface_hub >=0.10.0
    - langdetect >=1.0.9
    - lxml >=4.8.0
    - matplotlib-base >=2.2.3
    - more-itertools >=8.13.0
    - mpld3 >=0.3
    - pptree >=3.1
    - python-dateutil >=2.8.2
    - pytorch_revgrad >=0.2.0
    - regex >=2022.1.18
    - scikit-learn >=1.0.2
    - segtok >=1.5.11
    - sqlitedict >=2.0.0
    - tabulate >=0.8.10
    - pytorch >=1.13.1
    - tqdm >=4.63.0
    - transformer-smaller-training-vocab >=0.2.3
    - transformers >=4.25.0,<5.0.0
    - wikipedia-api >=0.5.7
    - python-bioc <3.0.0,>=2.0.0

tests:
  - python:
      imports:
        - flair
      pip_check: true
      python_version: ${{ python_min }}.*

about:
  summary: A very simple framework for state-of-the-art NLP
  license: MIT
  license_file: LICENSE
  homepage: https://github.com/flairNLP/flair

extra:
  recipe-maintainers:
    - mrubenw
