package:
  name: "pyobjc-framework-uniformtypeidentifiers"
  version: "12.0"

source:
  url: https://pypi.org/packages/source/p/pyobjc_framework_uniformtypeidentifiers/pyobjc_framework_uniformtypeidentifiers-12.0.tar.gz
  sha256: f7fe17832de25098b9ad7718af536f6f4597985418d9869946cee104e2782b8a

build:
  skip: true  # [not osx]
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python
    - setuptools
    - wheel
    - pip
  run:
    - python
    - pyobjc-core >=12.0
    - pyobjc-framework-cocoa >=12.0

test:
  imports:
    - UniformTypeIdentifiers
  commands:
    - pip check
  requires:
    - pip
    - python

about:
  home: https://github.com/ronaldoussoren/pyobjc
  summary: Wrappers for the framework UniformTypeIdentifiers on macOS
  doc_url: https://pyobjc.readthedocs.io/en/latest/
  license: MIT
  license_file: License.txt

extra:
  recipe-maintainers:
    - jaromieee
