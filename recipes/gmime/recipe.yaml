context:
  name: gmime
  version: "3.2.15"

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://github.com/jstedfast/gmime/releases/download/${{ version }}/gmime-${{ version }}.tar.xz
  sha256: 84cd2a481a27970ec39b5c95f72db026722904a2ccf3fdbd57b280cf2d02b5c4

build:
  number: 0
  skip: win
  script: |
    ./configure --prefix=$PREFIX --libdir=${PREFIX}/lib --build=${BUILD} --host=${HOST} LIBS="-liconv"
    make -j ${CPU_COUNT}
    make install
    rm -rf $PREFIX/share/gtk-doc
    rm -rf $PREFIX/lib/libgmime-3.*.a

requirements:
  run_exports:
    - ${{ pin_subpackage(name, exact=True) }}
  build:
    - ${{ compiler('c') }}
    - ${{ compiler('cxx') }}
    - ${{ stdlib('c') }}
    - make
    - pkg-config
  host:
    - glib
    - gpgme
    - libidn2
    - libiconv
    - zlib

tests:
  - package_contents:
      files:
        not_exists:
          - lib/*.a  # Don't include archives
      include:
        - gmime-3.0/gmime/gmime.h
      lib:
        - ${{ "libgmime-3.0" if linux else "libgmime-3.0.0" }}

about:
  homepage: https://github.com/jstedfast/gmime
  summary: "A C/C++ MIME creation and parser library with support for S/MIME, PGP, and Unix mbox spools"
  license: LGPL-2.1-or-later
  license_file: COPYING
  documentation: https://github.com/jstedfast/gmime
  repository: https://github.com/jstedfast/gmime

extra:
  recipe-maintainers:
    - cbourjau
