schema_version: 1

context:
  version: "0.31.2"

package:
  name: uniffi-bindgen
  version: ${{ version }}

source:
  url: https://github.com/mozilla/uniffi-rs/archive/refs/tags/v${{ version }}.tar.gz
  sha256: 0b2ba8a8e39dd449af7c96bf2372044b36cfe6545ac3c71bd21b9b6c0cd25271

build:
  number: 0
  script:
    content:
      - if: unix
        then:
          - cargo auditable install --locked --no-track --features cli --path uniffi --bins --root ${{ PREFIX }}
        else:
          - cargo auditable install --locked --no-track --features cli --path uniffi --bins --root %LIBRARY_PREFIX%
      - cargo-bundle-licenses --format yaml --output THIRDPARTY.yml
    env:
      CARGO_PROFILE_RELEASE_LTO: fat
      CARGO_PROFILE_RELEASE_STRIP: symbols

requirements:
  build:
    - ${{ compiler('c') }}
    - ${{ compiler('rust') }}
    - ${{ stdlib('c') }}
    - cargo-auditable
    - cargo-bundle-licenses

tests:
  - package_contents:
      strict: true
      bin:
        - uniffi-bindgen
        - uniffi-bindgen-swift
  - script:
      - uniffi-bindgen --help
      - uniffi-bindgen-swift --help

about:
  homepage: https://mozilla.github.io/uniffi-rs/
  summary: A multi-language bindings generator for Rust (uniffi-bindgen CLI)
  description: |
    UniFFI is a toolkit for building cross-platform software components in Rust
    and consuming them from other languages. uniffi-bindgen is the command-line
    interface that scaffolds and generates the foreign-language bindings
    (Python, Kotlin, Swift, Ruby and others) from a Rust crate's interface
    definitions. This package also ships uniffi-bindgen-swift, the Swift-specific
    bindings generator.
  license: MPL-2.0
  license_file:
    - LICENSE
    - THIRDPARTY.yml
  repository: https://github.com/mozilla/uniffi-rs
  documentation: https://mozilla.github.io/uniffi-rs/

extra:
  recipe-maintainers:
    - MementoRC
