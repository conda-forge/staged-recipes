{% set version = "1.5.6" %}

package:
  name: bubus
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/b/bubus/bubus-{{ version }}.tar.gz
  sha256: 1a5456f0a576e86613a7bd66e819891b677778320b6e291094e339b0d9df2e0d

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python >=3.11,<4.0
    - hatchling
    - pip
  run:
    - python >=3.11,<4.0
    - aiofiles >=24.1.0
    - anyio >=4.9.0
    - portalocker >=2.7.0
    - pydantic >=2.11.5
    - typing_extensions >=4.12.2
    - uuid7 >=0.1.0

test:
  imports:
    - bubus
  commands:
    - pip check
  requires:
    - pip
    - python

about:
  home: https://pypi.org/project/bubus/
  summary: Advanced Pydantic-powered event bus with async support
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - Ertugrulmert
