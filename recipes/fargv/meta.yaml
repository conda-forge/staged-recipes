{% set version = "1.3.2" %}

package:
  name: fargv
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/f/fargv/fargv-{{ version }}.tar.gz
  sha256: f0912b4b0c4a631cd05a125f2074476ddec6ded592dd2366b2ea0a5268451b8f

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python
    - setuptools >=42
    - wheel
    - pip
  run:
    - python

test:
  imports:
    - fargv
  commands:
    - pip check
  requires:
    - pip
    - python

about:
  home: https://github.com/anguelos/fargv
  summary: A very easy to use argument parser.
  license: MIT
  license_file: LICENSE.txt

extra:
  recipe-maintainers:
    - anguelos
