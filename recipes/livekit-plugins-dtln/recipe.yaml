schema_version: 1

context:
  version: "0.1.2"

package:
  name: livekit-plugins-dtln
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/l/livekit-plugins-dtln/livekit_plugins_dtln-${{ version }}.tar.gz
  sha256: 897d2a10539fa8ec91fda614df3e3469df91e0107f15064b32f6c8eb0298fd43

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - setuptools >=70
    - wheel
    - pip
  run:
    - python >=${{ python_min }}
    - livekit >=1.1.0
    - livekit-agents >=1.4.4
    - onnxruntime >=1.17.0
    - numpy >=1.26.0

tests:
  - python:
      python_version:
        - ${{ python_min }}.*
        - "*"
      imports:
        - livekit
      pip_check: true

about:
  summary: DTLN noise suppression plugin for LiveKit Agents — self-hosted, in-process, no cloud API
  license: MIT
  license_file: LICENSE
  homepage: https://github.com/aloware/livekit-plugins-dtln

extra:
  recipe-maintainers:
    - conda-forge/livekit
