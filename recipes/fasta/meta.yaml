{% set version = "2.3.6" %}

package:
  name: fasta
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/f/fasta/fasta-{{ version }}.tar.gz
  sha256: 7043a32fddce26a465ea37cfa68740d5047c719290f86e570443d519fb37d124

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - pip
    - setuptools
  run:
    - python >={{ python_min }}
    - autopaths >=1.6.3
    - plumbing >=2.11.4
    - biopython
    - tqdm
    - runps >=4.1.1

test:
  imports:
    - fasta
  requires:
    - python {{ python_min }}
    - pip
  commands:
    - pip check

about:
  home: http://github.com/xapple/fasta/
  summary: 'The fasta python package enables you to deal with biological sequence files easily.'
  license: MIT
  license_family: MIT
  license_file: LICENSE.txt

extra:
  recipe-maintainers:
    - xapple
