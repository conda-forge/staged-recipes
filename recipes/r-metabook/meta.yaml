{% set version = '0.2-0' %}
{% set posix = 'm2-' if win else '' %}

package:
  name: r-metabook
  version: {{ version|replace("-", "_") }}

source:
  url:
    - {{ cran_mirror }}/src/contrib/metabook_{{ version }}.tar.gz
    - {{ cran_mirror }}/src/contrib/Archive/metabook/metabook_{{ version }}.tar.gz
  sha256: e2a1df75688ae3530a268d3afaed4c30af37bed8b899821325c71197db85fdb5

build:
  number: 0
  noarch: generic
  rpaths:
    - lib/R/lib/
    - lib/
  missing_dso_whitelist:
    - '*/R.dll'        # [win]
    - '*/Rblas.dll'    # [win]
    - '*/Rlapack.dll'  # [win]

requirements:
  build:
    - {{ posix }}zip               # [win]
    - cross-r-base {{ r_base }}    # [build_platform != target_platform]
  host:
    - r-base
  run:
    - r-base

test:
  commands:
    - $R -e "library('metabook')"           # [not win]
    - "\"%R%\" -e \"library('metabook')\""  # [win]

about:
  home: https://github.com/guido-s/metabook/
  license: GPL-2.0-or-later
  summary: "Data sets and code supporting the second edition of \"Meta-Analysis with R\"; first
    edition: Schwarzer, Carpenter, and R\xFCcker (2015) <DOI:10.1007/978-3-319-21416-0>."
  license_family: GPL2
  license_file:
    - '{{ environ["PREFIX"] }}/lib/R/share/licenses/GPL-2'

extra:
  recipe-maintainers:
    - conda-forge/r
