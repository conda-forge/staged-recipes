mpi:
  - mpich

# conda-forge's libfabric (pulled in by mpich) references getrandom@GLIBC_2.25,
# so linking xios_server.exe against MPI under the conda-forge default 2.17
# sysroot fails with "undefined reference to `getrandom@GLIBC_2.25'". 2.28 is
# the lowest glibc that satisfies it (see ickc/lfric-conda's variants/linux.yaml).
# staged-recipes' build_all.py merges this file over the global default
# (later spec wins), unlike a bare `rattler-build -m` CLI invocation.
c_stdlib_version:
  - "2.28"
