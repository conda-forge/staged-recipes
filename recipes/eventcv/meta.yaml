{% set version = "0.0.1" %}
{% set python_min = "3.9" %}

package:
  name: eventcv
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/eventcv-{{ version }}.tar.gz
  sha256: f54d6fb8608bf0114a55063dd29cb77e237d733757734e28d1b83e0eaaa583e3

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - hatchling
    - pip
  run:
    - python >={{ python_min }}

test:
  imports:
    - eventcv
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://github.com/EventLAB-Team/eventcv
  summary: Open source event-based computer vision library.
  license: Apache-2.0
  license_file: LICENSE

extra:
  recipe-maintainers:
    - AdamDHines
