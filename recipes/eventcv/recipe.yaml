schema_version: 1

context:
  version: "0.0.1"

package:
  name: eventcv
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/e/eventcv/eventcv-${{ version }}.tar.gz
  sha256: f54d6fb8608bf0114a55063dd29cb77e237d733757734e28d1b83e0eaaa583e3

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - hatchling
    - pip
  run:
    - python >=${{ python_min }}

tests:
  - python:
      imports:
        - eventcv
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  summary: Open source event-based computer vision library.
  license: Apache-2.0
  license_file: LICENSE
  homepage: https://pypi.org/project/eventcv/

extra:
  recipe-maintainers:
    - AdamDHines
