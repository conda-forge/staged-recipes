{% set version = '0.5-47' %}
{% set posix = 'm2-' if win else '' %}

package:
  name: r-pbv
  version: "{{ version|replace('-', '_') }}"

source:
  url:
    - {{ cran_mirror }}/src/contrib/pbv_{{ version }}.tar.gz
    - {{ cran_mirror }}/src/contrib/Archive/pbv/pbv_{{ version }}.tar.gz
  sha256: e17a04efa96a601ab72172b59f555f36d28bb824f02f363cc5806b05d7d7c792

build:
  number: 0
  rpaths:
    - lib/R/lib/
    - lib/
  missing_dso_whitelist:
    - '*/R.dll'        # [win]
    - '*/Rblas.dll'    # [win]
    - '*/Rlapack.dll'  # [win]

requirements:
  build:
    - {{ compiler('c') }}              # [not win]
    - {{ stdlib("c") }}                # [not win]
    - {{ compiler('m2w64_c') }}        # [win]
    - {{ compiler('cxx') }}            # [not win]
    - {{ compiler('m2w64_cxx') }}      # [win]
    - {{ posix }}filesystem        # [win]
    - {{ posix }}make
    - {{ posix }}sed               # [win]
    - {{ posix }}coreutils         # [win]
    - {{ posix }}zip               # [win]
    - cross-r-base {{ r_base }}    # [build_platform != target_platform]
  host:
    - libblas
    - liblapack
    - r-base
    - r-rcpp
    - r-rcpparmadillo
  run:
    - r-base
    - r-rcpp
    - r-rcpparmadillo

test:
  commands:
    - $R -e "library('pbv')"           # [not win]
    - "\"%R%\" -e \"library('pbv')\""  # [win]

about:
  home: https://github.com/alexanderrobitzsch/pbv, https://sites.google.com/view/alexander-robitzsch/software
  license: GPL-2.0-only
  summary: Computes probabilities of the bivariate normal distribution in a vectorized R function
    (Drezner & Wesolowsky, 1990, <doi:10.1080/00949659008811236>).
  license_family: GPL2
  license_file:
    - '{{ environ["PREFIX"] }}/lib/R/share/licenses/GPL-2'

extra:
  recipe-maintainers:
    - conda-forge/r

