context:
  version: 0.5.6

package:
  name: pyexiftool
  version: ${{ version }}

source:
- url: https://pypi.org/packages/source/p/pyexiftool/pyexiftool-${{ version }}.tar.gz
  sha256: 22a972c1c212d1ad5f61916fded5057333dcc48fb8e42eed12d2ff9665b367ae

build:
  number: 0
  script: ${{ PYTHON }} -m pip install .
  noarch: python

requirements:
  host:
    - python {{ python_min }}.*
    - pip
  run:
    - python >={{ python_min }}
    - orjson


tests:
- python:
    imports:
      - exiftool
    python_version:
      - ${{ python_min }}.*
      - "*"
    pip_check: true

about:
  homepage: http://github.com/sylikc/pyexiftool
  summary: Python wrapper for exiftool
  license: BSD-3-Clause OR GPL-3.0-or-later
  license_file:
    - LICENSE
    - COPYING.BSD
    - COPYING.GPL
  documentation: https://sylikc.github.io/pyexiftool/
