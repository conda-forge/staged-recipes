# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  name: wuphf
  version: "0.79.2"

package:
  name: ${{ name }}
  version: ${{ version }}

source:
  url: https://github.com/nex-crm/wuphf/archive/refs/tags/v${{ version }}.tar.gz
  sha256: e12b01e0858e6ab8ddb5774e32ad1d60e7bf1753319fdbce74ca25b3321898dc

build:
  number: 0
  # Upstream .goreleaser.yml only ships darwin/linux x amd64/arm64; Windows is
  # not a supported target.
  skip:
    - win
  script: bash "${RECIPE_DIR}/build.sh"

requirements:
  build:
    - ${{ compiler("go-nocgo") }}
    - go-licenses

tests:
  - script:
      - wuphf --version
      - wuphf --help
  - package_contents:
      bin:
        - wuphf

about:
  homepage: https://wuphf.team/
  summary: Slack-style coordination plane for AI coding agents with a shared brain
  description: |
    wuphf is a terminal-based "Slack for AI employees" that coordinates Claude
    Code, Codex, and other coding agents across shared channels. It maintains
    a knowledge graph so agents can collaborate without losing context between
    handoffs. Ships as a single Go binary with CGO disabled.
  license: MIT
  license_file:
    - LICENSE
    - license-files/
  repository: https://github.com/nex-crm/wuphf
  documentation: https://github.com/nex-crm/wuphf

extra:
  recipe-maintainers:
    - rxm7706
