# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "0.230.0"

package:
  name: wuphf
  version: ${{ version }}

source:
  url: https://github.com/nex-crm/wuphf/archive/refs/tags/v${{ version }}.tar.gz
  sha256: 4cc4e13f5af7db752f34985df8d947d16f7bb670d97787f011e1b8d14bcf89a9

build:
  number: 0
  script:
    - if: win
      then: call "%RECIPE_DIR%/build.bat"
      else: bash "${RECIPE_DIR}/build.sh"

requirements:
  build:
    - ${{ compiler("go-nocgo") }}
    - go-licenses
    - if: win
      then: posix

tests:
  - script:
      - wuphf --version
      - wuphf --help
  - package_contents:
      bin:
        - wuphf

about:
  homepage: https://wuphf.team/
  summary: Slack-style coordination plane for AI coding agents with a shared brain
  description: |
    wuphf is a terminal-based "Slack for AI employees" that coordinates Claude
    Code, Codex, and other coding agents across shared channels. It maintains
    a knowledge graph so agents can collaborate without losing context between
    handoffs. Ships as a single Go binary with CGO disabled.
  license: MIT
  license_file:
    - LICENSE
    - license-files/
  repository: https://github.com/nex-crm/wuphf
  documentation: https://github.com/nex-crm/wuphf

extra:
  recipe-maintainers:
    - rxm7706
