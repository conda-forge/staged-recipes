{% set version = "1.0.0" %}
{% set python_min = "3.11" %}

package:
  name: mne-rt
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/m/mne-rt/mne_rt-{{ version }}.tar.gz
  sha256: a656cc6288695225a1d0fdea551a6275a40230e909702f828178e0e0bf6251d1

build:
  entry_points:
    - mne-rt = mne_rt.cli:main
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python >=3.11
    - setuptools >=68
    - pip
  run:
    - python >=3.11
    - mne >=1.8
    - mne-lsl >=1.7
    - mne-connectivity >=0.7
    - mne-features >=0.3
    - mne-icalabel >=0.5
    - numpy >=2.0,<3
    - scipy >=1.13
    - matplotlib-base >=3.9
    - nibabel >=5.0
    - pyqt6 >=6.7
    - pyqtgraph >=0.13
    - qtpy >=2.4
    - pyserial >=3.0
    - fooof >=1.0
    - pyunlocbox >=0.5.2
    - pactools >=0.3
    - pyyaml >=6.0
    - imageio >=2.28
    - imageio-ffmpeg
    # python-osc is not yet on conda-forge; install via pip if OSC feedback output is needed

test:
  imports:
    - mne_rt
  commands:
    - pip check
    - mne-rt --help
  requires:
    - pip

about:
  home: https://github.com/payamsash/mne-rt
  summary: MNE-RT — real-time M/EEG signal processing and analysis
  doc_url: https://payamsash.github.io/mne-rt/
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - payamsash
