# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  name: bmad-method-test-architecture-enterprise
  version: "1.15.1"

package:
  name: ${{ name }}
  version: ${{ version }}

source:
  url: https://github.com/bmad-code-org/bmad-method-test-architecture-enterprise/archive/refs/tags/v${{ version }}.tar.gz
  sha256: 1b016f86b4c7cadc68d2bef407167bd91fd7e9590a7f56a14f90ce7e4d453dc1

build:
  number: 0
  noarch: generic

requirements:
  run:
    - python >=3.10

tests:
  - script:
      - if: not win
        then:
          - bmad-tea-install --help
          - test -d "${CONDA_PREFIX}/share/bmad-method-test-architecture-enterprise/agents/bmad-tea"
          - test -f "${CONDA_PREFIX}/share/bmad-method-test-architecture-enterprise/agents/bmad-tea/SKILL.md"
          - test -d "${CONDA_PREFIX}/share/bmad-method-test-architecture-enterprise/workflows"
          - test -f "${CONDA_PREFIX}/share/bmad-method-test-architecture-enterprise/.claude-plugin/marketplace.json"
      - if: win
        then:
          - bmad-tea-install.bat --help
          - if not exist "%CONDA_PREFIX%\share\bmad-method-test-architecture-enterprise\agents\bmad-tea" exit 1
          - if not exist "%CONDA_PREFIX%\share\bmad-method-test-architecture-enterprise\.claude-plugin\marketplace.json" exit 1

about:
  homepage: https://github.com/bmad-code-org/bmad-method-test-architecture-enterprise
  documentation: https://bmad-code-org.github.io/bmad-method-test-architecture-enterprise/
  repository: https://github.com/bmad-code-org/bmad-method-test-architecture-enterprise
  license: MIT
  license_file: LICENSE
  summary: BMad Method TEA agent for quality strategy, test automation, and release gates
  description: |
    The BMad Method Test Architecture Enterprise (TEA) is a standalone testing module
    providing risk-based test strategy, test automation guidance, and release gate decisions
    through the TEA (Murat) expert agent persona. It delivers nine workflows covering
    teaching, framework setup, test design, acceptance-driven development, automation
    expansion, traceability mapping, non-functional requirements, CI pipeline configuration,
    and quality review.

    After installation, run ``bmad-tea-install`` in your project directory to copy the
    agent and workflows into ``.claude/skills/`` so Claude Code can discover them.

extra:
  recipe-maintainers:
    - rxm7706
