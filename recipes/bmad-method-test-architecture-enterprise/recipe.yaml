schema_version: 1

context:
  version: "1.17.0"

package:
  name: bmad-method-test-architecture-enterprise
  version: ${{ version }}

source:
  url: https://github.com/bmad-code-org/bmad-method-test-architecture-enterprise/archive/refs/tags/v${{ version }}.tar.gz
  sha256: b8356937743bbb500fdbbeda657498a3cdc27ef7ed9dad2b67ce6b9160a4f426

build:
  number: 0
  noarch: generic

requirements:
  host:
    - nodejs 20.*
  run:
    - nodejs >=20
    - bmad-method

tests:
  - package_contents:
      files:
        - lib/node_modules/bmad-method-test-architecture-enterprise/package.json
        - lib/node_modules/bmad-method-test-architecture-enterprise/node_modules/.package-lock.json
  - script:
      - node -e "require(process.env.PREFIX + '/lib/node_modules/bmad-method-test-architecture-enterprise/package.json')"

about:
  homepage: https://github.com/bmad-code-org/bmad-method-test-architecture-enterprise
  repository: https://github.com/bmad-code-org/bmad-method-test-architecture-enterprise
  documentation: https://bmad-code-org.github.io/bmad-method-test-architecture-enterprise/
  summary: Master Test Architect for quality strategy, test automation, and release gates
  description: |
    TEA (Test Engineering Architect) is a standalone BMAD module that delivers
    risk-based test strategy, test automation guidance, and release gate
    decisions. It is a sub-module of the BMAD-METHOD framework and provides
    specialized test architecture capabilities including risk-based testing,
    test automation guidance, and release gate decision support.
  license: MIT
  license_file:
    - LICENSE
    - THIRD_PARTY_LICENSES.txt

extra:
  recipe-maintainers:
    - killua156
    - mgorny
