# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json

schema_version: 1

context:
  name: "datetime"
  version: "6.0"
  python_min: "3.10"

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/d/datetime/datetime-6.0.tar.gz
  sha256: c1514936d2f901e10c8e08d83bf04e6c9dbd7ca4f244da94fec980980a3bc4d5

build:
  number: 0
  noarch: python
  script: python -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - setuptools
  run:
    - python >=${{ python_min }}
    - zope.interface
    - pytz

tests:
  - python:
      imports:
        - DateTime
      pip_check: true
      python_version: ["${{ python_min ~ '.*' }}"]

about:
  homepage: https://github.com/zopefoundation/DateTime
  summary: "This package provides a DateTime data type, as known from Zope. Unless you need to communicate with Zope APIs, you're..."
  license: ZPL-2.1
  license_file: LICENSE.txt
  repository: https://github.com/zopefoundation/DateTime

extra:
  recipe-maintainers:
    - killua156
