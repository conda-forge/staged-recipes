{% set version = "2.3.5" %}
{% set python_min = "3.8" %}

package:
  name: c4dynamics
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/c/c4dynamics/c4dynamics-{{ version }}.tar.gz
  sha256: e238175b87183770ef43555f67cc35577868623df56dce7a0cc8e36a8742a3b6

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - setuptools >=80.9.0
    - wheel
    - pip
  run:
    - python >={{ python_min }}
    - matplotlib-base >=3.9.2
    - numpy >=1.26.0
    - pooch >=1.8.0
    - scipy >=1.13.0

test:
  imports:
    - c4dynamics
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://github.com/c4dynamics/c4dynamics/discussions
  summary: Python framework for state-space modeling and algorithm development
  doc_url: https://c4dynamics.github.io/c4dynamics/
  dev_url: https://github.com/c4dynamics/c4dynamics
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - c4dynamics
