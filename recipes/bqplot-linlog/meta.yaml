{% set name = "bqplot-linlog" %}
{% set version = "0.2.1" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/bqplot_linlog-{{ version }}.tar.gz
  sha256: 88d03123d76789f2c96f428fc40a04dfa122858e4979cac209d83794c4e68dab

build:
  noarch: python
  number: 0
  script: {{ PYTHON }} -m pip install . -vv --no-build-isolation

requirements:
  host:
    - python >=3.10
    - pip
    - hatchling
    - hatch-jupyter-builder >=0.5.0
    - jupyterlab >=3.6
  run:
    - python >=3.10
    - bqplot >=0.12
    - ipywidgets >=7.0.0

test:
  imports:
    - bqplot_linlog
  requires:
    - pip
  commands:
    - pip check

about:
  home: https://github.com/glue-viz/bqplot-linlog
  summary: A toggleable linear/log scale and axis with minor ticks for bqplot
  description: |
    bqplot-linlog provides a scale and axis for bqplot that can switch
    between linear and log modes without replacing the scale objects, with
    minor tick support. In log mode it shows powers-of-10 labels with 10n
    notation and standard minor ticks; in linear mode it shows minor ticks
    subdividing the major intervals.
  license: MIT
  license_file: LICENSE
  dev_url: https://github.com/glue-viz/bqplot-linlog

extra:
  recipe-maintainers:
    - astrofrog
