schema_version: 1

context:
  name: xnetcdf
  version: "0.1.0"

package:
  name: ${{ name }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/${{ name[0] }}/${{ name }}/${{ name }}-${{ version }}.tar.gz
  sha256: 2401f2e02e8b6fd49b01943decfa6183286716a6246d86528c77ffe79d20653a

build:
  number: 0
  skip:
    - win
    - match(python, "<3.11")
  script: ${{ PYTHON }} -m pip install . --no-deps -vv --no-build-isolation

requirements:
  host:
    - python
    - pip
    - numpy >=2
    - setuptools >=80
    - setuptools-scm >=8
  run:
    - python
    - numpy >=2
    - dask
    - fsspec
    - netCDF4 !=1.7.4  # github.com/Unidata/netcdf4-python/issues/1464
    - h5py
    - scipy
    - pyfive >=1.1.1
    - umfive >=0.2.2
    - zarr >=3.1.3
    - xarray

tests:
  - python:
      imports:
        - xnetcdf
      pip_check: true
  - files:
      source:
        - tests
    requirements:
      run:
        - h5netcdf
        - pip
        - pytest >6.0.0
        - pytest-cov
        - pytest-html
        - pytest-xdist
        - python
    script:
      - pytest -n 2

about:
  homepage: https://github.com/NCAS-CMS/xnetcdf/
  license: BSD-3-Clause
  license_file: LICENSE.txt
  summary: "xnetcdf is a Python open source library for representing datasets, in a variety of formats and accessed through diverse Python backends, with a common netCDF view."

extra:
  recipe-maintainers:
    - valeriupredoi
