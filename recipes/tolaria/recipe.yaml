# CFE comments
# Header:
#    # tolaria = refactoringhq/tolaria, AGPL-3.0 Tauri 2.10 desktop app
#    # (markdown knowledge base; tolaria.md). React+Vite frontend + Rust
#    # backend + bundled MCP server. AGPL-3.0 is OSI-approved -> cf-eligible.
# context.version:
#    # Stable tags are v<YYYY-MM-DD>; conda forbids '-' in versions, so version
#    # is dotted zero-padded and source.url maps back via replace(".","-").
#    # Autotick cannot track this date-tag scheme; bump version + sha by hand.
# build:
#    # Per-platform native Tauri build (NOT noarch). osx-arm64 + linux-64 +
#    # win-64 (skip everything else). Mirrors the conda-forge/nebi-feedstock
#    # webkit2gtk Tauri pattern. unix -> build.sh, win -> build.bat.
#    # dynamic_linking: allowlist the raw bin so conda patches RPATH to find
#    # webkit2gtk4.1/libsoup from the env on linux; the macOS .app is excluded
#    # (Tauri uses @loader_path install_names — conda must not touch them).
# requirements.build:
#    # pnpm <11: upstream still declares pnpm.overrides + pnpm.patchedDependencies
#    # in package.json (pnpm-workspace.yaml carries only a partial set, no
#    # overrides). pnpm 11 STOPPED reading the package.json `pnpm` field, so
#    # `pnpm install --frozen-lockfile` sees empty overrides vs the lockfile's
#    # (lockfileVersion 9.0) recorded overrides -> ERR_PNPM_LOCKFILE_CONFIG_MISMATCH.
#    # pnpm 10.x still reads package.json -> frozen install matches the lockfile.
#    # Lift the cap once upstream finishes migrating config to pnpm-workspace.yaml.
# requirements.host (linux):
#    # The Tauri gtk3/webkit2gtk Rust crates (gdk-sys/gtk-sys/cairo-sys/...)
#    # discover headers + link flags via pkg-config. librsvg intentionally
#    # omitted (not directly linked; webkit2gtk pulls it transitively) to avoid
#    # rattler-build's Overdepending-against-librsvg warning.
# requirements.ignore_run_exports (linux):
#    # webkit2gtk4.1 + transitive deps export pins for libs we don't link
#    # directly; drop them to keep downstream solves clean (nebi pattern).
# build (resources):
#    # beforeBuildCommand = `pnpm build && pnpm bundle-mcp && pnpm agent-docs`
#    # generates src-tauri/resources/{mcp-server,agent-docs}. osx .app bundles
#    # both via tauri.conf bundle.resources; linux/win (--no-bundle) stage both
#    # by hand to the resource_dir() fallback (<exe>/../lib/<id>/ on linux,
#    # <exe_dir>/resources/ on win). agent-docs is NEW vs the 2026.4 recipe.
####
