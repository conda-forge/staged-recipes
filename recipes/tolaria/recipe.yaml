# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  # Upstream tags stable releases as v<YYYY-MM-DD> (e.g. v2026-06-26). conda
  # versions cannot contain '-', so carry a dotted, zero-padded date here and
  # map it back to the dashed tag in source.url. (The app's internal Cargo /
  # tauri.conf version is 0.1.0; the project versions its stable channel by
  # release date.) The daily alpha-v* releases are pre-releases — not used.
  version: "2026.06.26"

package:
  name: tolaria
  version: ${{ version }}

source:
  url: https://github.com/refactoringhq/tolaria/archive/refs/tags/v${{ version | replace(".", "-") }}.tar.gz
  sha256: f96367428d6868ff57151bbbaba3ddc9d80f15979523b27b9340cbde3fb74a4a

build:
  number: 0
  skip: not ((osx and arm64) or (linux and x86_64) or (win and x86_64))
  dynamic_linking:
    binary_relocation:
      - bin/tolaria
      - Library/bin/tolaria.exe
    rpath_allowlist:
      - "@loader_path/**"
      - "$ORIGIN/**"
  script:
    - if: win
      then: call "%RECIPE_DIR%/build.bat"
      else: bash "${RECIPE_DIR}/build.sh"

requirements:
  build:
    - ${{ compiler("c") }}
    - ${{ compiler("cxx") }}
    - ${{ stdlib("c") }}
    - ${{ compiler("rust") }}
    - nodejs 24.*
    - pnpm <11
    - cargo-bundle-licenses
    - if: linux
      then:
        - pkg-config
  host:
    - if: linux
      then:
        - gtk3
        - webkit2gtk4.1
        - glib
        - libsoup
        - gdk-pixbuf
        - cairo
        - openssl
        - zlib
        - expat
        - fontconfig
  run:
    - menuinst >=2.1
    - if: linux
      then:
        - webkit2gtk4.1
  ignore_run_exports:
    from_package:
      - if: linux
        then:
          - openssl
          - zlib
          - expat
          - fontconfig

tests:
  - script:
      - if: osx
        then:
          - test -x $PREFIX/bin/tolaria
          - test -d "$PREFIX/lib/Tolaria.app"
          - test -x "$PREFIX/lib/Tolaria.app/Contents/MacOS/Tolaria"
          - codesign -v "$PREFIX/lib/Tolaria.app"
          - test -f "$PREFIX/Menu/tolaria-menu.json"
      - if: linux
        then:
          - test -x $PREFIX/bin/tolaria
          - test -d "$PREFIX/lib/club.refactoring.tolaria/mcp-server"
          - test -d "$PREFIX/lib/club.refactoring.tolaria/agent-docs"
          - test -f "$PREFIX/Menu/tolaria-menu.json"
      - if: win
        then:
          - if not exist "%LIBRARY_BIN%\tolaria.exe" exit 1
          - if not exist "%LIBRARY_BIN%\resources\mcp-server" exit 1
          - if not exist "%LIBRARY_BIN%\resources\agent-docs" exit 1
          - if not exist "%PREFIX%\Menu\tolaria-menu.json" exit 1
  - package_contents:
      bin:
        - tolaria
      files:
        - Menu/tolaria-menu.json
        - if: osx
          then:
            - lib/Tolaria.app/Contents/Info.plist

about:
  homepage: https://tolaria.md
  repository: https://github.com/refactoringhq/tolaria
  documentation: https://tolaria.md
  license: AGPL-3.0-or-later
  license_file:
    - LICENSE
    - THIRDPARTY-RUST.yml
    - THIRDPARTY-NPM.txt
  summary: Desktop app to manage markdown knowledge bases
  description: |
    Tolaria is a Tauri-based desktop application for managing markdown
    knowledge bases. It pairs a React + BlockNote frontend with a Rust
    backend and a bundled Model Context Protocol (MCP) server, and is
    designed for personal knowledge and life-management workflows.

extra:
  recipe-maintainers:
    - rxm7706

