# Local variant config so `rattler-build` outside conda-forge CI can resolve
# ${{ stdlib("c") }} (the conda-forge-pinning feedstock auto-injects these in
# CI but not locally). Values mirror the current conda-forge-pinning defaults.
c_stdlib:
  - sysroot                    # [linux]
  - macosx_deployment_target   # [osx]
  - vs                         # [win]
c_stdlib_version:
  - "2.17"                     # [linux]
  - "11.0"                     # [osx]
