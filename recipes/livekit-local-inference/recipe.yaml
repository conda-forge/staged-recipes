context:
  version: "0.2.6"

package:
  name: livekit-local-inference
  version: ${{ version }}

# This package is closed-source and ships only binary wheels on PyPI (no sdist).
# Each (target_platform, python) combination has its own wheel, so the source is
# selected with conditional `if:` blocks. The wheels bundle the native inference
# engine and model weights as a single compiled extension module
# (livekit/local_inference/_native.*.so|.pyd).
#
# The license of the binaries is Apache-2.0 and thus allows free redistribution.
# The separate model license limits the distribution to only ship alongside
# LiveKit materials (please read the license for details!) which we do here.
