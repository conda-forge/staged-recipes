build:
  number: 0
  script: python ${{ RECIPE_DIR }}/build.py

requirements:
  build:
    - ${{ stdlib('c') }}
    - ${{ compiler('c') }}
    - ${{ compiler('cxx') }}
  host:
    - python
    - pip
    - setuptools
  run:
    - python

tests:
  - python:
      imports:
        - livekit.local_inference
      pip_check: true
  - script:
      - python -c "import numpy as np; from livekit.local_inference import VAD, VAD_WINDOW_SAMPLES; v = VAD(); p = v.predict(np.zeros(VAD_WINDOW_SAMPLES, dtype=np.int16)); assert 0.0 <= p <= 1.0; print('VAD OK', p)"
    requirements:
      run:
        - numpy

about:
  homepage: https://pypi.org/project/livekit-local-inference/
  summary: LiveKit on-device inference (end-of-turn detector + streaming VAD)
  description: LiveKit on-device inference (end-of-turn detector + streaming VAD).
  license: Apache-2.0 AND LicenseRef-LiveKit-Model
  license_file:
    - LICENSE
    - MODEL_LICENSE
  repository: https://github.com/livekit/agents
  documentation: https://docs.livekit.io/agents/models/inference/

extra:
  recipe-maintainers:
    - xhochy
