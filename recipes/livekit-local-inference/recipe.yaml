build:
  number: 0
  # The upstream source (livekit/agents-private) is private and no sdist is
  # published on PyPI, so we install the matching prebuilt wheel that the
  # conditional source above fetches for the current (python, platform) variant.
  # No build backend is needed: we install a prebuilt wheel, not a source tree.
  script: ${{ PYTHON }} -m pip install --no-index --find-links . livekit-local-inference==${{ version }} --no-deps -vv

requirements:
  host:
    - python
    - pip
  run:
    - python
    # The bundled native extension links against the C/C++ runtime.
    # Since the prebuilt wheel is repackaged (no compiler run-exports),
    # provide the shared libraries explicitly on Linux.
    - if: linux
      then:
        - libgcc
        - libstdcxx

tests:
  - python:
      imports:
        - livekit.local_inference
      pip_check: true

about:
  summary: LiveKit on-device inference (end-of-turn detector + streaming VAD)
  description: |
    On-device (local) inference for LiveKit Agents, bundling a streaming voice
    activity detector (VAD) and an end-of-turn (EOT) detector as prebuilt
    native extensions. The native inference code is distributed as binary
    wheels only (no source distribution is published on PyPI).
  license: Apache-2.0
  license_file: LICENSE
  homepage: https://livekit.io/
  repository: https://github.com/livekit/agents
  documentation: https://docs.livekit.io/agents/models/inference/

extra:
  recipe-maintainers:
    - xhochy
