# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "1.14.3"
  python_min: "3.10"

recipe:
  name: crewai-suite
  version: ${{ version }}

build:
  number: 0

outputs:
  - package:
      name: crewai
      version: ${{ version }}
    source:
      - url: https://pypi.org/packages/source/c/crewai/crewai-${{ version }}.tar.gz
        sha256: 8a7c403ac4ba48e24d5194255f8b638849cc395e7d5534ccef7d158ea45e963a
    build:
      noarch: python
      python:
        entry_points:
          - crewai = crewai.cli.cli:crewai
      script: |
        python -m pip install . -vv --no-deps --no-build-isolation
    requirements:
      host:
        - python ${{ python_min }}.*
        - hatchling
        - pip
      run:
        - python >=${{ python_min }},<3.14
        - pydantic >=2.11.9,<2.12
        - openai >=2.0.0,<3
        - instructor >=1.3.3
        - pdfplumber >=0.11.4,<0.12.0
        - regex >=2026.1.15,<2026.2.0
        - opentelemetry-api >=1.34.0,<1.35.0
        - opentelemetry-sdk >=1.34.0,<1.35.0
        - opentelemetry-exporter-otlp-proto-http >=1.34.0,<1.35.0
        - chromadb >=1.1.0,<1.2.0
        - tokenizers >=0.21,<1
        - openpyxl >=3.1.5,<3.2.0
        - python-dotenv >=1.2.2,<2
        - pyjwt >=2.9.0,<3
        - textual >=7.5.0
        - click >=8.1.7,<8.2.0
        - appdirs >=1.4.4,<1.5.0
        - jsonref >=1.1.0,<1.2.0
        - json-repair >=0.25.2,<0.26.0
        - tomli-w >=1.1.0,<1.2.0
        - tomli >=2.0.2,<2.1.0
        - json5 >=0.10.0,<0.11.0
        - portalocker >=2.7.0,<2.8.0
        - pydantic-settings >=2.10.1,<2.11.0
        - httpx >=0.28.1,<0.29.0
        - mcp >=1.26.0,<1.27.0
        - uv >=0.11.6,<0.12.0
        # - python-uv # NOTE: Required to appease `pip check` for downstreams which (presently) might use `uv`
        - aiosqlite >=0.21.0,<0.22.0
        - pyyaml >=6.0,<7.0
        - aiofiles >=24.1.0,<24.2.0
        - lancedb >=0.29.2,<0.30.1
    tests:
      - python:
          imports:
            - crewai
          pip_check: false
          python_version: ${{ python_min }}.*
      - script:
          - crewai --help
        requirements:
          run:
            - python ${{ python_min }}.*
    about:
      summary: Cutting-edge framework for orchestrating role-playing, autonomous AI agents. By fostering collaborative intelligence, CrewAI empowers agents to work together seamlessly, tackling complex tasks.
      license: MIT
      license_file: LICENSE
      homepage: https://github.com/crewAIInc/crewAI

  - package:
      name: crewai-tools
      version: ${{ version }}
    source:
      - url: https://pypi.org/packages/source/c/crewai/crewai_tools-${{ version }}.tar.gz
        sha256: d907be86a5a8de870c0d501cfe0c10058d9689349e51090a6e450982fbc4bef7
    build:
      noarch: python
      script: |
        cd "$SRC_DIR/crewai_tools_src"
        pip install . -vv --no-deps --no-build-isolation
    requirements:
      host:
        - python ${{ python_min }}.*
        - hatchling
        - pip
      run:
        - python >=${{ python_min }},<3.14
        - ${{ pin_subpackage('crewai', exact=True) }}
        - pytube >=15.0.0,<15.1.0
        - requests >=2.33.0,<3
        - tiktoken >=0.8.0,<0.9.0
        - beautifulsoup4 >=4.13.4,<4.14.0
        - python-docx >=1.2.0,<1.3.0
        - youtube-transcript-api >=1.2.2,<1.3.0
        - pymupdf >=1.26.6,<1.27.0
    tests:
      - python:
          imports:
            - crewai
          pip_check: false
          python_version: ${{ python_min }}.*
    about:
      summary: Set of tools for the crewAI framework
      license: MIT
      license_file: LICENSE
      homepage: https://github.com/crewAIInc/crewAI

  - package:
      name: crewai-files
      version: ${{ version }}
    source:
      - url: https://pypi.org/packages/source/c/crewai-files/crewai_files-${{ version }}.tar.gz
        sha256: a091609a89ef47d90b6d0f1ec8262ecc48adae0e92ea70d0c691bf350123c5db
    build:
      noarch: python
      script: |
        cd "$SRC_DIR/crewai_files_src"
        pip install . -vv --no-deps --no-build-isolation
    requirements:
      host:
        - python ${{ python_min }}.*
        - hatchling
        - pip
      run:
        - python >=${{ python_min }},<3.14
        - ${{ pin_subpackage('crewai', exact=True) }}
        - pillow >=12.1.1,<12.2.0
        - pypdf >=6.10.0,<6.11.0
        - python-magic >=0.4.27
        - aiocache >=0.12.3,<0.13.0
        - aiofiles >=24.1.0,<24.2.0
        - tinytag >=2.2.1,<2.3.0
        - av >=13.0.0,<13.1.0
    tests:
      - python:
          imports:
            - crewai
          pip_check: false
          python_version: ${{ python_min }}.*
    about:
      summary: File handling utilities for CrewAI multimodal inputs
      license: MIT
      license_file: LICENSE
      homepage: https://github.com/crewAIInc/crewAI

about:
  summary: CrewAI framework and tools for orchestrating autonomous AI agents
  license: MIT
  license_file: LICENSE
  homepage: https://github.com/crewAIInc/crewAI

extra:
  recipe-maintainers:
    - soapy1
