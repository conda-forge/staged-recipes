{% set name = "toolregistry-hub" %}
{% set version = "0.9.1" %}
{% set python_min = "3.10" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/toolregistry_hub-{{ version }}.tar.gz
  sha256: 7a6e59781554272f2fc429220258a052c66ff326660cb6de50fba370c7b1f0a5

build:
  noarch: python
  number: 0
  script: {{ PYTHON }} -m pip install . -vv
  entry_points:
    - toolregistry-hub = toolregistry_hub.server.cli:main

requirements:
  host:
    - python {{ python_min }}
    - setuptools >=61.0
    - pip
  run:
    - python >={{ python_min }}
  run_constrained:
    - toolregistry-server >=0.4.0
    - pypdf >=4.0.0
    - pillow >=10.0.0
    - pdfplumber >=0.10.0

test:
  imports:
    - toolregistry_hub
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://github.com/Oaklight/toolregistry-hub
  summary: "ToolRegistry Hub: Ready-to-Use Tool Collection for LLM Agents"
  license: MIT
  license_family: MIT
  license_file: LICENSE
  doc_url: https://toolregistry.readthedocs.io
  dev_url: https://github.com/Oaklight/toolregistry-hub

extra:
  recipe-maintainers:
    - Oaklight
