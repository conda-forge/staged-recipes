schema_version: 1

context:
  name: tslab
  version: 1.0.22

package:
  name: ${{ name }}
  version: ${{ version }}

source:
  url: https://registry.npmjs.org/${{ name }}/-/${{ name }}-${{ version }}.tgz
  sha256: d311d6d146de556d07b26b0188a68a55b450d388a51f680a49cd01c8a590726f

build:
  number: 0
  noarch: generic

requirements:
  build:
    - jq
  host:
    - nodejs
    - pnpm
    - pnpm-licenses
  run:
    - nodejs

tests:
  - script:
      - tslab --version
      - tslab --help

about:
  homepage: https://www.npmjs.com/package/tslab
  documentation: https://github.com/yunabe/tslab/blob/v${{ version }}/README.md
  repository: https://github.com/yunabe/tslab
  license: Apache-2.0
  license_file:
    - LICENSE
    - third-party-licenses.txt
  summary: Interactive JavaScript and TypeScript programming with Jupyter
  description: |
    tslab is an interactive programming environment and REPL with Jupyter for JavaScript and TypeScript users.
    You can write and execute JavaScript and TypeScript interactively on browsers and save results as Jupyter notebooks.

extra:
  recipe-maintainers:
    - eunos-1128
