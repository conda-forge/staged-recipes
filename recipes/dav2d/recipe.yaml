context:
  version: "0.0.1"

package:
  name: dav2d
  version: ${{ version }}

source:
  url: https://code.videolan.org/videolan/dav2d/-/archive/${{ version }}/dav2d-${{ version }}.tar.bz2
  sha256: e3eec323c3b237bb15f0a44f149fd9cd644b5cf3a263df03cf79b753ea976dff

build:
  number: 0

requirements:
  build:
    - ${{ compiler('c') }}
    - ${{ stdlib('c') }}
    - meson
    - ninja
    - pkg-config
    - if: target_platform in ("linux-64", "linux-32", "osx-64", "win-64", "win-32")
      then: nasm

tests:
  - script:
      - dav2d --version
  - package_contents:
      include:
        - dav2d/dav2d.h
        - dav2d/version.h
      lib:
        - dav2d
      bin:
        - dav2d

about:
  homepage: https://code.videolan.org/videolan/dav2d
  summary: A cross-platform AV2 decoder focused on speed and correctness
  description: |
    dav2d is an AV2 cross-platform decoder, open-source, and focused on
    speed and correctness. It is based on the dav1d AV1 decoder and is
    developed by VideoLAN as part of its membership in the Alliance for
    Open Media (AOM). It is released under the BSD-2-Clause license so
    that it can be embedded anywhere, including non-open-source software.
  license: BSD-2-Clause
  license_file: COPYING
  repository: https://code.videolan.org/videolan/dav2d

extra:
  recipe-maintainers:
    - baszalmstra
