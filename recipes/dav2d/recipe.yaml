# library version is different from project version
# Check 'include/dav2d/version.h' upstream in every release!
context:
  version: 0.0.1
  so_name: 1.0.0
  so_name_major: ${{ so_name | split('.') | first }}

recipe:
  name: dav2d-split
  version: ${{ version }}

source:
  - url: https://code.videolan.org/videolan/dav2d/-/archive/${{ version }}/dav2d-${{ version }}.tar.bz2
    sha256: e3eec323c3b237bb15f0a44f149fd9cd644b5cf3a263df03cf79b753ea976dff

build:
  number: 0

outputs:

  # The cache build
  - staging:
      name: dav2d-split
    build:
      script: cache
    requirements:
      build:
        - ${{ compiler('c') }}
        - ${{ stdlib('c') }}
        - meson >=0.49
        - ninja
        - pkg-config
        - if: x86 or x86_64
          then: nasm >=2.14

  # Only what's needed for run_exports downstream
  - package:
      name: libdav2d${{ so_name_major }}

    inherit:
      from: dav2d-split
      run_exports: true

    requirements:
      build:
        - ${{ compiler('c') }}
        - ${{ stdlib('c') }}

    build:
      files:
        include:
          - if: win
            then: Library/bin/*.dll
          - if: osx
            then: lib/lib*.*.dylib
          - if: linux
            then: lib/*.so.*
    tests:
      - script:
          - if: linux
            then:
              - test -f ${PREFIX}/lib/libdav2d.so.${{ so_name_major }}
              - test -f ${PREFIX}/lib/libdav2d.so.${{ so_name }}
          - if: osx
            then:
              - test -f ${PREFIX}/lib/libdav2d.${{ so_name_major }}.dylib
              - test ! -f ${PREFIX}/lib/libdav2d.${{ so_name }}.dylib
          - if: unix
            then:
              - test ! -f ${PREFIX}/bin/dav2d
              - test ! -f ${PREFIX}/lib/libdav2d$SHLIB_EXT
              - test ! -f ${PREFIX}/lib/pkgconfig/dav2d.pc
              - test ! -f ${PREFIX}/include/dav2d/dav2d.h
          - if: win
            then:
              - if not exist %PREFIX%\\Library\\bin\\dav2d.dll exit 1
              - if exist %PREFIX%\\Library\\bin\\dav2d exit 1
              - if exist %PREFIX%\\Library\\lib\\dav2d.lib exit 1
              - if exist %PREFIX%\\Library\\include\\dav2d\\dav2d.h exit 1
              - if exist %PREFIX%\\Library\\lib\\pkgconfig\\dav2d.pc exit 1

  - package:
      name: libdav2d
    build:
      files:
        # Required to exclude everything else; rattler puts everything in this package
        exclude:
          - '*'
    requirements:
      run:
        - ${{ pin_subpackage('libdav2d' ~ so_name_major, upper_bound=None) }}

  # Everything needed to build against libdav2d (excludes binary)
  - package:
      name: dav2d-dev
    inherit:
      from: dav2d-split
      run_exports: false
    build:
      files:
        include:
          - if: win
            then:
              - Library/include/*
              - Library/lib/*
          - if: osx
            then: lib/lib*.dylib
          - if: linux
            then: lib/*.so
          - if: unix
            then:
              - include/*
              - lib/pkgconfig/*
    requirements:
      run:
        - ${{ pin_subpackage('libdav2d', exact=True) }}
        - ${{ pin_subpackage('libdav2d' ~ so_name_major, exact=True) }}
      run_exports:
        - ${{ pin_subpackage('libdav2d', upper_bound=None) }}
        - ${{ pin_subpackage('libdav2d' ~ so_name_major, upper_bound=None) }}
    tests:
      - script:
        - if: linux
          then:
            - test -f ${PREFIX}/lib/libdav2d.so.${{ so_name_major }}
            - test -f ${PREFIX}/lib/libdav2d.so.${{ so_name }}
        - if: osx
          then:
            - test -f ${PREFIX}/lib/libdav2d.${{ so_name_major }}.dylib
        - if: unix
          then:
            - test -f ${PREFIX}/lib/libdav2d$SHLIB_EXT
            - test -f ${PREFIX}/include/dav2d/dav2d.h
            - test -f ${PREFIX}/lib/pkgconfig/dav2d.pc
            - test ! -f ${PREFIX}/lib/libdav2d.a
            - test ! -f ${PREFIX}/bin/dav2d
        - if: win
          then:
            - if not exist %PREFIX%\\Library\\lib\\dav2d.lib exit 1
            - if not exist %PREFIX%\\Library\\include\\dav2d\\dav2d.h exit 1
            - if not exist %PREFIX%\\Library\\lib\\pkgconfig\\dav2d.pc exit 1
            - if exist %PREFIX%\\Library\\bin\\dav2d.dll exit 1
            - if exist %PREFIX%\\Library\\bin\\dav2d exit 1

  # Everything needed to run the dav2d binary
  - package:
      name: dav2d
    inherit:
      from: dav2d-split
      run_exports: true
    build:
      files:
        include:
          - if: win
            then: Library/bin/dav2d.exe
          - if: unix
            then: bin/dav2d
    requirements:
      build:
        - ${{ compiler('c') }}
        - ${{ stdlib('c') }}
      host:
        - ${{ pin_subpackage('dav2d-dev', exact=True) }}
      run:
        - ${{ pin_subpackage('libdav2d', upper_bound=None) }}
        - ${{ pin_subpackage('libdav2d' ~ so_name_major, upper_bound=None) }}
    tests:
      - script:
          - dav2d -v
          - if: linux
            then:
              - test -f ${PREFIX}/lib/libdav2d.so.${{ so_name_major }}
              - test -f ${PREFIX}/lib/libdav2d.so.${{ so_name }}
          - if: osx
            then:
              - test -f ${PREFIX}/lib/libdav2d.${{ so_name_major }}.dylib
          - if: unix
            then:
              - test ! -f ${PREFIX}/lib/libdav2d$SHLIB_EXT
              - test ! -f ${PREFIX}/include/dav2d/dav2d.h
              - test ! -f ${PREFIX}/lib/pkgconfig/dav2d.pc
          - if: win
            then:
              - if not exist %PREFIX%\\Library\\bin\\dav2d.dll exit 1
              - if exist %PREFIX%\\Library\\lib\\dav2d.lib exit 1
              - if exist %PREFIX%\\Library\\include\\dav2d\\dav2d.h exit 1
              - if exist %PREFIX%\\Library\\lib\\pkgconfig\\dav2d.pc exit 1

about:
  summary: dav2d is a cross-platform AV2 decoder focused on speed and correctness
  license: BSD-2-Clause
  license_file: COPYING
  homepage: https://code.videolan.org/videolan/dav2d
  repository: https://code.videolan.org/videolan/dav2d

extra:
  feedstock-name: dav2d
  recipe-maintainers:
    - baszalmstra
