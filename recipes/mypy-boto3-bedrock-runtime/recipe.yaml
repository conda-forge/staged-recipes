# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "1.43.30"

package:
  name: mypy-boto3-bedrock-runtime
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/m/mypy-boto3-bedrock-runtime/mypy_boto3_bedrock_runtime-${{ version }}.tar.gz
  sha256: e7f50e6cb125da7a0807c364ba6a8fcac67e01e5268aee97c62b92f75fd77049

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - setuptools >=60
    - pip
  run:
    - python >=${{ python_min }}
    - botocore
    - typing_extensions >=4.1.0

tests:
  - python:
      imports:
        - mypy_boto3_bedrock_runtime
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  homepage: https://pypi.org/project/mypy-boto3-bedrock-runtime/
  license: MIT
  license_file: LICENSE
  summary: Type annotations for boto3 BedrockRuntime 1.43.30 service generated with mypy-boto3-builder 8.12.0
  repository: https://github.com/youtype/mypy_boto3_builder
  documentation: https://youtype.github.io/boto3_stubs_docs/mypy_boto3_bedrock_runtime/
  description: |
    Type annotations for boto3 BedrockRuntime service generated with
    mypy-boto3-builder. Provides type stubs for the boto3 Bedrock Runtime
    client, enabling autocompletion and static type checking in editors and
    type checkers (mypy, pyright) for the AWS Bedrock Runtime service. Part
    of the boto3-stubs / mypy-boto3 family by youtype.

extra:
  recipe-maintainers:
    - rxm7706
