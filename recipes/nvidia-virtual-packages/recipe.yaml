context:
  version: "0.1.2"

package:
  name: nvidia-virtual-packages
  version: ${{ version }}

source:
  url: https://github.com/conda-incubator/nvidia-virtual-packages/archive/refs/tags/v${{ version }}.tar.gz
  sha256: de7192e095f37122fb1e6e1e646d0f15096a8dfbb03f01dc1b8852369dd362df

build:
  script: python -m pip install . -vv
  number: 0
  noarch: python

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - setuptools
    - setuptools-scm
  run:
    - python >=${{ python_min }}

tests:
  - python:
      imports:
        - nvidia_virtual_packages
      pip_check: true
      python_version:
         - ${{ python_min }}.*
         - "*"

about:
  homepage: https://github.com/conda-incubator/nvidia-virtual-packages
  summary: 'A conda plugin which creates NVIDIA-specific virtual packages'
  description: >
    The __cuda_arch virtual package provides the minimum compute capability of the available
    CUDA devices detected on the system and the model description of the same device. This
    virtual package may be used to enforce a minimum compute capability for a conda package
    or build multiple variants of a conda package which each target one or a subset of CUDA
    devices.

    Similar to how the virtual package __cuda constrains the cuda-version metapackage to
    represents to conda the CUDA driver version available on the system. This plugin creates
    the virtual package __cuda_arch which constrains the cuda-arch metapackage which
    represents to conda the minimum compute capability of all CUDA devices on the system.
  license: BSD-3-Clause
  license_file: LICENSE
  documentation: https://github.com/conda-incubator/nvidia-virtual-packages
  repository: https://github.com/conda-incubator/nvidia-virtual-packages

extra:
  recipe-maintainers:
    - carterbox
    - conda-forge/cuda
