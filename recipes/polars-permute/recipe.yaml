context:
  version: 0.1.6

package:
  name: polars-permute
  version: ${{ version }}

source:
  - url: https://pypi.org/packages/source/p/polars-permute/polars_permute-${{ version }}.tar.gz
    sha256: 395230a28e3f8193198ff6b1b4dfa673ac3ff47942b72b112e4d66a2824b0c05

build:
  number: 0
  script: python -m pip install . -vv
  noarch: python

requirements:
  host:
    - python ${{ python_min }}.*
    - pdm-backend
    - pip
  run:
    - python >=${{ python_min }}
    - polars >=1.21.0
    - natsort >=8.4.0

tests:
  - python:
      imports:
        - polars_permute
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  summary: A Polars plugin for easily reordering DataFrame columns
  homepage: https://github.com/lmmx/polars-permute-plugin
  repository: https://github.com/lmmx/polars-permute-plugin
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - apcamargo
