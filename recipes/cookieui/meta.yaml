{% set version = "1.0.1" %}

package:
  name: cookieui
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/c/cookieui/cookieui-{{ version }}.tar.gz
  sha256: 4d56db7d17e1a65519be2f35a2555b549092dc3ffabef70657df4c5dcd81ea37

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python >=3.8
    - setuptools >=61
    - pip
  run:
    - python >=3.8

test:
  imports:
    - cookieui
  commands:
    - pip check
  requires:
    - pip
    - python

about:
  home: https://github.com/tahseenjamal/cookieui
  summary: Zero-dependency Python terminal-UI library with the classic Newt look — truecolor windows, drop shadows, and a no-boilerplate app API
  license: Unlicense
  license_file: LICENSE

extra:
  recipe-maintainers:
    - tahseenjamal
