schema_version: 1

context:
  python_min: "3.11"
  version: "0.1.0"

package:
  name: lume-bmad
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/l/lume-bmad/lume_bmad-${{ version }}.tar.gz
  sha256: 92c998d60584e89f7e8bb8ebcd1b5e1979e834140b162dc27a68cedabac5005d

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - setuptools >=64
    - setuptools-scm >=8
    - pip
  run:
    - python >=${{ python_min }}
    - lume-base
    - openpmd-beamphysics

tests:
  - python:
      imports:
        - lume_bmad
      pip_check: true
      python_version: ${{ python_min }}.*

about:
  summary: Tools for using Bmad in LUME
  license: Apache-2.0
  license_file: LICENSE
  homepage: https://github.com/lume-science/lume-bmad
  documentation: https://github.com/lume-science/lume-bmad

extra:
  recipe-maintainers:
    - pluflou
