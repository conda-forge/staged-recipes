schema_version: 1

context:
  name: quarto-utils
  version: 1.0.0

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/${{ name[0] }}/${{ name }}/quarto_utils-${{ version }}.tar.gz
  sha256: 9339468f0bee133157e26be7aeba71880dde308f56cff76438d9184f1968c5f1
  

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python >=3.10
    - setuptools >=61.0
    - wheel
    - versioneer
    - pip
  run:
    - python >=3.10
    - requests
    - jupyter
    - notebook
    - ipykernel
    - text-unidecode
    - pytest
    - flake8
    - codecov
    - coverage

tests:
  - python:
      imports:
        - qtils
  - requirements:
      run:
        - pip
    script:
      - pip check

about:
  summary: Utilities to update references in Quarto using DOIs
  license: CC0-1.0
  license_file: LICENSE.md
  homepage: https://github.com/mnfienen/quarto-utils

extra:
  recipe-maintainers:
    - mnfienen
