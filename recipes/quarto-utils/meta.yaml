{% set name = "quarto-utils" %}
{% set version = "1.0.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/quarto_utils-{{ version }}.tar.gz
  sha256: 04c148f04c2ac681162b4f112a1ba09e87d2da82e217d36480d75ceb20450d42

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - setuptools >=61.0
    - wheel
    - versioneer
    - pip
  run:
    - python >={{ python_min }}
    - requests
    - jupyter
    - notebook
    - ipykernel
    - text-unidecode
    - pytest
    - flake8
    - codecov
    - coverage

test:
  imports:
    - qtils
  commands:
    - pip check
  requires:
    - pip

about:
  home: https://github.com/doi-usgs/quarto-utils
  summary: Utilities to update references in Quarto using DOIs
  license: CC0-1.0
  license_file: LICENSE.md
  dev_url: https://github.com/doi-usgs/quarto-utils


extra:
  recipe-maintainers:
    - mnfienen
