context:
  version: 2604.4.0

package:
  name: reflow-hpc
  version: ${{ version }}

source:
- url: https://pypi.org/packages/source/r/reflow-hpc/reflow_hpc-${{ version }}.tar.gz
  sha256: 2cfaa5e7b42a10d0b55fa17eeddc82607364c890d4431849da9fa70725239e25

build:
  number: 0
  script: ${{ PYTHON }} -m pip install . --no-deps -vv
  python:
    entry_points:
    - reflow = reflow.cli:main
  noarch: python

requirements:
  host:
  - python ${{ python_min }}.*
  - flit-core
  - pip
  run:
  - python  >=${{ python_min }}
  - tomli >=1.0 # python_version < "3.11"

tests:
- python:
    imports:
      - reflow
    pip_check: true
    python_version:
      - ${{ python_min }}.*
      - "*"

about:
  summary: Decorator-based HPC workflow engine with Result-based data wiring, reusable Flows, and an auto-generated CLI
  documentation: https://www.reflow-docs.org
  homepage:  https://github.com/freva-org/reflow
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - antarcticrainforest
