context:
  version: "1.8.0"

package:
  name: tbox
  version: ${{ version }}

source:
  url: https://github.com/tboox/tbox/archive/refs/tags/v${{ version }}.tar.gz
  sha256: 3b919f61055b75fe9cb3796477468f6fe7524801d429e6ac48933ddde9caafbd

build:
  number: 0

requirements:
  build:
    - if: unix
      then:
        - ${{ stdlib('c') }}
        - ${{ compiler('c') }}
        - ${{ compiler('cxx') }}
        - ninja
    - if: win
      then:
        - ${{ compiler('c') }}
        - ${{ compiler('cxx') }}
        - autotools_clang_conda
        - m2-sed


tests:
  - package_contents:
      include:
        - tbox/*
      lib:
        - if: linux
          then:
            - libtbox.so
        - if: osx
          then:
            - libtbox.dylib
        - if: win
          then:
            - tbox.dll

about:
  homepage: https://tboox.top/?lang=0
  summary: A glib-like multi-platform c library
  description: |
    tbox is a glib-like multi-platform c library. 
  license: Apache-2.0
  license_file: LICENSE.md
  repository: https://github.com/tboox/tbox

extra:
  recipe-maintainers:
    - luadebug
