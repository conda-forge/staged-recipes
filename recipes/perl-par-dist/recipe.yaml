context:
  name: perl-par-dist
  version: "0.53"

package:
  name: ${{ name }}
  version: ${{ version }}

source:
  url: https://cpan.metacpan.org/authors/id/R/RS/RSCHUPP/PAR-Dist-${{ version }}.tar.gz
  sha256: 04cbc81e786968f9a4109ad6c2f9b81e879ac0c6b6080a9d217443b61dfd2498

build:
  number: 0
  noarch: generic
  script:
    - perl Makefile.PL INSTALLDIRS=vendor NO_PERLLOCAL=1 NO_PACKLIST=1
    - make
    - make test
    - make install VERBINST=1

requirements:
  build:
    - make
  host:
    - perl
  run:
    - perl

tests:
  - script: perl -e 'use PAR::Dist; print "ok\n"'

about:
  homepage: https://metacpan.org/dist/PAR-Dist
  summary: Create and manipulate PAR distributions
  license: Artistic-1.0-Perl OR GPL-1.0-or-later
  license_file: LICENSE

extra:
  recipe-maintainers:
    - baszalmstra
