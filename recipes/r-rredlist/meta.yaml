{% set version = '1.1.1' %}
{% set posix = 'm2-' if win else '' %}

package:
  name: r-rredlist
  version: {{ version|replace("-", "_") }}

source:
  url:
    - {{ cran_mirror }}/src/contrib/rredlist_{{ version }}.tar.gz
    - {{ cran_mirror }}/src/contrib/Archive/rredlist/rredlist_{{ version }}.tar.gz
  sha256: 1c91521c1c98996f8d6987930eb1291d9c7a131a6def9b4bac1469f1343645bf

build:
  number: 0
  noarch: generic
  rpaths:
    - lib/R/lib/
    - lib/
  missing_dso_whitelist:
    - '*/R.dll'        # [win]
    - '*/Rblas.dll'    # [win]
    - '*/Rlapack.dll'  # [win]

requirements:
  build:
    - {{ posix }}zip               # [win]
    - cross-r-base {{ r_base }}    # [build_platform != target_platform]
  host:
    - r-base
    - r-cli
    - r-crul >=0.3.8
    - r-curl
    - r-jsonlite >=1.1
    - r-lifecycle
    - r-rlang
  run:
    - r-base
    - r-cli
    - r-crul >=0.3.8
    - r-curl
    - r-jsonlite >=1.1
    - r-lifecycle
    - r-rlang

test:
  commands:
    - $R -e "library('rredlist')"           # [not win]
    - "\"%R%\" -e \"library('rredlist')\""  # [win]

about:
  home: https://docs.ropensci.org/rredlist/
  license: MIT
  summary: '''IUCN'' Red List (<https://api.iucnredlist.org/>) client. The ''IUCN'' Red List
    is a global list of threatened and endangered species. Functions cover all of the
    Red List ''API'' routes. An ''API'' key is required.'
  license_family: MIT
  license_file:
    - '{{ environ["PREFIX"] }}/lib/R/share/licenses/MIT'
    - LICENSE
  dev_url: https://github.com/ropensci/rredlist
  doc_url: https://docs.ropensci.org/rredlist/

extra:
  recipe-maintainers:
    - conda-forge/r
    - willgearty

