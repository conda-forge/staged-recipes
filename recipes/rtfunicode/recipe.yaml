schema_version: 1

context:
  version: "2.3"

package:
  name: rtfunicode
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/r/rtfunicode/rtfunicode-${{ version }}.tar.gz
  sha256: 800d1ef6dcc01505a5912958e7267332ccb1a58e0c6faf213af5f9cd85fa321a

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python >=3.10
    - uv_build >=0.9.26,<0.10.0
    - pip
  run:
    - python >=3.10

tests:
  - python:
      imports:
        - rtfunicode
      pip_check: true

about:
  summary: Encoder for unicode to RTF 1.5 command sequences
  license: BSD-2-Clause
  license_file: LICENSE.txt
  homepage: https://github.com/mjpieters/rtfunicode

extra:
  recipe-maintainers:
    - athompson673
