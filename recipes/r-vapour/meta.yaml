{% set version = '0.16.0' %}
{% set posix = 'm2-' if win else '' %}

package:
  name: r-vapour
  version: {{ version|replace("-", "_") }}

source:
  url:
    - {{ cran_mirror }}/src/contrib/vapour_{{ version }}.tar.gz
    - {{ cran_mirror }}/src/contrib/Archive/vapour/vapour_{{ version }}.tar.gz
  sha256: 865927d1036ebd948e7897b4da83af89b036fde87cd6857e84001345bdc1590f

build:
  number: 0
  rpaths:
    - lib/R/lib/
    - lib/
  missing_dso_whitelist:
    - '*/R.dll'        # [win]
    - '*/Rblas.dll'    # [win]
    - '*/Rlapack.dll'  # [win]

requirements:
  build:
    - {{ compiler('c') }}              # [not win]
    - {{ compiler('m2w64_c') }}        # [win]
    - {{ compiler('cxx') }}            # [not win]
    - {{ compiler('m2w64_cxx') }}      # [win]
    - {{ stdlib('c') }}            # [not win]
    - {{ posix }}filesystem        # [win]
    - {{ posix }}sed               # [win]
    - {{ posix }}grep              # [win]
    - {{ posix }}autoconf
    - {{ posix }}automake          # [not win]
    - {{ posix }}automake-wrapper  # [win]
    - pkg-config
    - {{ posix }}make
    - {{ posix }}coreutils         # [win]
    - {{ posix }}zip               # [win]
    - cross-r-base {{ r_base }}    # [build_platform != target_platform]
  host:
    - r-base
    - r-cpp11
    - r-jsonlite
    - r-nanoarrow
    - r-stringr
    - r-wk
  run:
    - r-base
    - r-cpp11
    - r-jsonlite
    - r-nanoarrow
    - r-stringr
    - r-wk

test:
  commands:
    - $R -e "library('vapour')"           # [not win]
    - "\"%R%\" -e \"library('vapour')\""  # [win]

about:
  home: https://github.com/hypertidy/vapour, https://hypertidy.github.io/vapour/
  license: GPL-3.0-only
  summary: Provides low-level access to 'GDAL' functionality. 'GDAL' is the 'Geospatial Data
    Abstraction Library' a translator for raster and vector geospatial data formats
    that presents a single raster abstract data model and single vector abstract data
    model to the calling application for all supported formats <https://gdal.org/>.
    This package is focussed on providing exactly and only what GDAL does, to enable
    developing further tools.
  license_family: GPL3
  license_file:
    - '{{ environ["PREFIX"] }}/lib/R/share/licenses/GPL-3'

extra:
  recipe-maintainers:
    - conda-forge/r
    - mdsumner

# Package: vapour
# Title: Access to the 'Geospatial Data Abstraction Library' ('GDAL')
# Version: 0.16.0
# Authors@R: c(person("Michael", "Sumner", email = "mdsumner@gmail.com", role = c("aut", "cre"), comment = c(ORCID = "0000-0002-2471-7511")), person("Simon", "Wotherspoon", role = "ctb", comment = "RasterIO configuration for resampling options"), person("Mark", "Padgham", role = "ctb", comment = "helped get started :)"), person("Edzer", "Pebesma", role = "ctb", comment = "wrote the field-read handling, adapted here from sf"), person("Roger", "Bivand", role = "ctb", comment = "wrote configure.ac, adapted here from rgdal"), person("Jim", "Hester", role = c("ctb", "cph"), comment = "wrote CollectorList.h, copied here from fs package"), person("Timothy", "Keitt", role = c("ctb"), comment = "wrote GetPointsInternal copied here from rgdal2 package"), person("Jeroen", "Ooms", role = c("ctb"), comment = "tweaked build process, provided Windows build tools"), person("Dale", "Maschette", role = c("ctb"), comment = "created the hex logo"), person("Joseph", "Stachelek", role = "ctb"), person("Even", "Rouault", role = "ctb", comment = "primary author of the COG format and its use of the GDALwarp app-library, example code used by the warper function here"), person("Robert", "Hijmans", role = "ctb", comment = "code in terra package used as example/inspiration"), person("Dewey", "Dunnington", role = "ctb", comment = "wrote the columnar-access mode streaming Arrow support"), person("Tomas", "Kalibera", role = "ctb"))
# Description: Provides low-level access to 'GDAL' functionality. 'GDAL' is the 'Geospatial Data Abstraction Library' a translator for raster and vector geospatial data formats that presents a single raster abstract data model and single vector abstract data model to the calling application for all supported formats <https://gdal.org/>. This package is focussed on providing exactly and only what GDAL does, to enable developing further tools.
