schema_version: 1

context:
  version: "1.0.1"

package:
  name: hatch-argparse-manpage
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/h/hatch-argparse-manpage/hatch_argparse_manpage-${{ version }}.tar.gz
  sha256: 76cb65fb230e312f4b1bd78cbae8f237a14e784b9e246f53c35fd6f4adde6bac

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - hatchling
    - pip
  run:
    - python >=${{ python_min }}
    - rich
    - argparse-manpage

tests:
  - python:
      imports:
        - hatch_argparse_manpage
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  summary: Hatch build hook plugin to generate manual pages
  license: GPL-3.0-only
  license_file: LICENSE.txt
  homepage: https://github.com/damonlynch/hatch-argparse-manpage
  documentation: https://github.com/damonlynch/hatch-argparse-manpage

extra:
  recipe-maintainers:
    - thewchan
