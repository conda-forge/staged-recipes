# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  name: bmad-creative-intelligence-suite
  version: "0.2.0"

package:
  name: ${{ name }}
  version: ${{ version }}

source:
  url: https://github.com/bmad-code-org/bmad-module-creative-intelligence-suite/archive/refs/tags/v${{ version }}.tar.gz
  sha256: 9a22fabb318f8f7d875341087954dd545bf755bdf073626f5a45a3670078702f

build:
  number: 0
  noarch: generic

requirements:
  run:
    - python >=3.10

tests:
  - script:
      - if: not win
        then:
          - bmad-cis-install --help
          - test -d "${CONDA_PREFIX}/share/bmad-creative-intelligence-suite/skills"
          - test -f "${CONDA_PREFIX}/share/bmad-creative-intelligence-suite/module.yaml"
          - test -d "${CONDA_PREFIX}/share/bmad-creative-intelligence-suite/skills/bmad-cis-agent-brainstorming-coach"
          - test -d "${CONDA_PREFIX}/share/bmad-creative-intelligence-suite/skills/bmad-cis-design-thinking"
      - if: win
        then:
          - bmad-cis-install.bat --help
          - if not exist "%CONDA_PREFIX%\share\bmad-creative-intelligence-suite\skills" exit 1
          - if not exist "%CONDA_PREFIX%\share\bmad-creative-intelligence-suite\module.yaml" exit 1

about:
  homepage: https://github.com/bmad-code-org/bmad-module-creative-intelligence-suite
  documentation: http://cis-docs.bmad-method.org
  repository: https://github.com/bmad-code-org/bmad-module-creative-intelligence-suite
  license: MIT
  license_file: LICENSE
  summary: BMad Method creative agent suite for innovation, design thinking, and storytelling
  description: |
    The Creative Intelligence Suite is a standalone BMad Method module offering agents
    and workflows designed to cultivate creativity. It provides tools for innovation
    strategy, design thinking, brainstorming, problem-solving, storytelling, and
    presentation across the early conceptual phases of development.

    It ships six agents (bmad-cis-agent-brainstorming-coach,
    bmad-cis-agent-creative-problem-solver, bmad-cis-agent-design-thinking-coach,
    bmad-cis-agent-innovation-strategist, bmad-cis-agent-presentation-master,
    bmad-cis-agent-storyteller) and four workflows (bmad-cis-design-thinking,
    bmad-cis-innovation-strategy, bmad-cis-problem-solving, bmad-cis-storytelling).

    After installation, run ``bmad-cis-install`` in your project directory to copy
    the skills into ``.claude/skills/`` so Claude Code can discover them.

extra:
  recipe-maintainers:
    - rxm7706
