schema_version: 1

context:
  version: "2.1.0"

package:
  name: pystac-ext-file
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/p/pystac-ext-file/pystac_ext_file-${{ version }}.tar.gz
  sha256: 93964df13550d0b016770774a6608728928f3a2c8d92ae03dc2f11bd76dbc6f0

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - hatchling
    - pip
  run:
    - python >=${{ python_min }}
    - pystac-core

tests:
  - python:
      imports:
        - pystac_ext_file
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  summary: File extension for PySTAC
  license: Apache-2.0
  license_file: PLEASE_ADD_LICENSE_FILE
  homepage: https://pypi.org/project/pystac-ext-file/
  documentation: https://pystac.readthedocs.io

extra:
  recipe-maintainers:
    - ocefpaf
