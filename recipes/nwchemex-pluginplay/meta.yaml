{% set version = "1.0.56" %}

package:
  name: nwchemex-pluginplay
  version: {{ version }}

source:
  url: https://github.com/NWChemEx/PluginPlay/archive/refs/tags/v{{ version }}.tar.gz
  sha256: c94782be7262c6ae320ca616773655493284e4b22fc70a5547be2de5ca9e8167

build:
  number: 0
  skip: true  # [not linux]

  string: {{ mpi_prefix }}_h{{ PKG_HASH }}_{{ PKG_BUILDNUM }}

  run_exports:
    - {{ pin_subpackage('nwchemex-pluginplay', max_pin='x.x') }} {{ mpi_prefix }}_*

requirements:
  build:
    - {{ compiler('cxx') }}
    - {{ stdlib('c') }}
    - cmake >=3.18
    - ninja
  host:
    - {{ mpi }}
    - nwchemex-parallelzone * {{ mpi_prefix }}_*
    - nwchemex-utilities
    # libfort
    - rocksdb
    - cereal
  run:
    - {{ mpi }}

test:
  commands:
    - test -f ${PREFIX}/lib/pluginplay/libpluginplay$SHLIB_EXT

about:
  home: https://nwchemex.github.io/PluginPlay/
  license: Apache-2.0
  license_file:
    - LICENSE
  summary: An inversion-of-control framework for developing modular scientific software
  description: |
     PluginPlay is an inversion-of-control (IoC) framework to facilitate
     wrtiting high-performance modular scientific software. More specifically,
     using PluginPlay scientific software is written as a series of disconnected
     modules. At runtime the modules are loaded into PluginPlay and then
     PluginPlay wires the modules together to form a call graph.
  dev_url: https://github.com/NWChemEx/PluginPlay

extra:
  recipe-maintainers:
    - awvwgk
