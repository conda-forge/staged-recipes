{% set name = "kearsley_numba" %}
{% set version = "0.1.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.io/packages/source/{{ name[0] }}/{{ name }}/kearsley_numba-{{ version }}.tar.gz
  sha256: 16ba9e3540b74d68464a8bfc709492c7169a7fe0e3fb13baa1988668e95863f7

build:
  noarch: python
  number: 0
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python >=3.10
    - pip
    - setuptools >=68
  run:
    - python >=3.10
    - numpy >=1.24
    - numba >=0.57

test:
  imports:
    - kearsley_numba
  commands:
    - python -c "from kearsley_numba import fit, fit_transform, transform, fill_rot_and_trans; print('OK')"

about:
  home: https://github.com/bigbigdumdum/kearsley_numbajit
  summary: Fast Kearsley 3D superposition (RMSD minimization) using Numba JIT
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - bigbigdumdum
