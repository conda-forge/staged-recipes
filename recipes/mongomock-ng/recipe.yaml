schema_version: 1

context:
  version: "7.6.0"

package:
  name: mongomock-ng
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/m/mongomock-ng/mongomock_ng-${{ version }}.tar.gz
  sha256: 8132183cdc2817103834abc78a78e660b7a82c54eef74c7c7b34e9676dec86be

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - hatchling
    - pip
  run:
    - python >=${{ python_min }}
    - packaging
    - pytz
    - sentinels
    - pandas

tests:
  - python:
      imports:
        - mongomock_ng
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  summary: Replacement fake pymongo stub for testing simple MongoDB-dependent code
  license: MIT
  license_file: LICENSE
  homepage: https://github.com/engFelipeMonteiro/mongomock-ng

extra:
  recipe-maintainers:
    - jan-janssen
