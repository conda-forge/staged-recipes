schema_version: 1

context:
  name: pytest-pep723
  version: "0.1.0"

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/p/pytest-pep723/pytest_pep723-${{ version }}.tar.gz
  sha256: 563d8268b942002c576ae24f75ce708725d42e5b1dad191c353f5ae120d0fae1

build:
  noarch: python
  number: 0
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - hatchling
    - hatch-vcs
  run:
    - python >=${{ python_min }}
    - pytest >=7

tests:
  - python:
      imports:
        - pytest_pep723
      python_version:
        - ${{ python_min }}.*
        - "*"
      pip_check: true

about:
  homepage: https://github.com/HaoZeke/pytest-pep723
  summary: Pytest plugin to verify PEP 723 inline script metadata covers all imports
  license: MIT
  license_file: LICENSE
  repository: https://github.com/HaoZeke/pytest-pep723

extra:
  recipe-maintainers:
    - HaoZeke
