schema_version: 1

context:
  name: pytest-pep723
  version: "0.1.0"
  python_min: "3.10"

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://files.pythonhosted.org/packages/41/dc/acdca797b621dd84112666308b304777a0afeb9a72c3da5b4d73ff3021f9/pytest_pep723-0.1.0.tar.gz
  sha256: 563d8268b942002c576ae24f75ce708725d42e5b1dad191c353f5ae120d0fae1

build:
  noarch: python
  number: 0
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - hatchling
    - hatch-vcs
  run:
    - python >=${{ python_min }}
    - pytest >=7

tests:
  - python:
      python_version: ${{ python_min }}.*
      imports:
        - pytest_pep723
      pip_check: true

about:
  homepage: https://github.com/HaoZeke/pytest-pep723
  summary: Pytest plugin to verify PEP 723 inline script metadata covers all imports
  license: MIT
  license_file: LICENSE
  repository: https://github.com/HaoZeke/pytest-pep723

extra:
  recipe-maintainers:
    - HaoZeke
