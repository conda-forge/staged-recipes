{% set version = "0.1.0" %}

package:
  name: evs-automation
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/e/evs-automation/evs_automation-{{ version }}.tar.gz
  sha256: 9b76925f6fd296037a6996dfc3502ce803e8f592c2f8e66fbd223898881f2251

build:
  skip: true  # [not win or py<312]
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python
    - hatchling
    - pip
  run:
    - python
    - pywin32 >=306
    - psutil >=5.9
    - packaging >=23.0

test:
  imports:
    - evs_automation
  commands:
    - pip check
  requires:
    - pip
    - python

about:
  home: https://ctech.com
  summary: Python automation API for Earth Volumetric Studio
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - ReedCopsey
