{% set version = "18" %}

package:
  name: pest
  version: {{ version }}

source:
  url: https://s3.amazonaws.com/docs.pesthomepage.org/source_code/pest{{ version }}.tar.zip  # [unix]
  sha256: 7c8074a1cc4f9f9b4a305f374ec38914abce3698a9ad27641f5fe34dc3037095  # [unix]
  url: https://s3.amazonaws.com/docs.pesthomepage.org/software/pest{{ version }}.zip  # [win]
  sha256: eb0345fa7088c7d5ade0e98d140be9fb3649e184749b7f6bd997cc3964156154  # [win]

build:
  number: 0
  skip: true  # [osx]

requirements:
  build:
    - {{ compiler('fortran') }}  # [unix]
    - {{ compiler('c') }}  # [unix]
    - {{ stdlib('c') }}  # [unix]
    - make  # [unix]
    - unzip  # [unix]
    - gfortran  # [unix]
    - gcc  # [unix]

test:
  commands:
    - test -f $PREFIX/bin/pest  # [unix]
    - test -f $PREFIX/bin/ppest  # [unix]
    - test -f $PREFIX/bin/eigproc  # [unix]
    - test -f $PREFIX/bin/parcalc  # [unix]
    - test -f $PREFIX/bin/addreg1  # [unix]
    - test -f $PREFIX/bin/cov2cor  # [unix]
    - test -f $PREFIX/bin/cmaes_p  # [unix]
    - test -f $PREFIX/bin/supobspar  # [unix]
    - test -f $PREFIX/bin/csv2par  # [unix]
    - test -f $PREFIX/bin/sensan  # [unix]
    - test -f $PREFIX/bin/beopest  # [unix]

    - if not exist %PREFIX%\bin\pest.exe exit 1  # [win]
    - if not exist %PREFIX%\bin\ppest.exe exit 1  # [win]
    - if not exist %PREFIX%\bin\eigproc.exe exit 1  # [win]
    - if not exist %PREFIX%\bin\parcalc.exe exit 1  # [win]
    - if not exist %PREFIX%\bin\addreg1.exe exit 1  # [win]
    - if not exist %PREFIX%\bin\cov2cor.exe exit 1  # [win]
    - if not exist %PREFIX%\bin\cmaes_p.exe exit 1  # [win]
    - if not exist %PREFIX%\bin\supobspar.exe exit 1  # [win]
    - if not exist %PREFIX%\bin\csv2par.exe exit 1  # [win]
    - if not exist %PREFIX%\bin\sensan.exe exit 1  # [win]
    - if not exist %PREFIX%\bin\beopest64.exe exit 1  # [win]

about:
  home: https://pesthomepage.org/
  summary: 'PEST optimizes calibration and calibration-constrained uncertainty analysis of any numerical model.'
  description: |
    PEST interacts with a model through the model’s own input and output files.
    While estimating or adjusting its parameters, it runs a model many times.
    These model runs can be conducted either in serial or in parallel. Advanced
    dimensional-reduction methods can dramatically reduce the number of model
    runs required for attainment of a high level of model-to-measurement fit.
  license: LicenseRef-DISCLAIMER
  license_file: LICENSE.txt
  doc_url: https://s3.amazonaws.com/docs.pesthomepage.org/documents/all_manuals.zip

extra:
  recipe-maintainers:
    - timcera
