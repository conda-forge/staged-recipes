schema_version: 1

context:
  version: "0.0.13"

package:
  name: tabsim
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/t/tabsim/tabsim-${{ version }}.tar.gz
  sha256: 6df2fc08afe362afeb41757558a8cf4e57073d7916880a2f372e56ac1bf47db9

build:
  number: 0
  skip:
    - win
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  python:
    entry_points:
      - tle-region = tabsim.scripts.tle_sat_region:main
      - ast-region = tabsim.scripts.ast_region:main
      - flag-data = tabsim.scripts.flag_data:main
      - sim-vis = tabsim.scripts.sim_vis:main
      - write-config = tabsim.scripts.write_config_from_ms:main
      - tabsim-setup-spacetrack = tabsim.scripts.setup_spacetrack_login:main
      - tabsim-import-tles = tabsim.scripts.import_tle_files:main

requirements:
  host:
    - python
    - setuptools >=64
    - pip
  run:
    - python
    - jax
    - dask-core
    - xarray
    - zarr <3.0.0
    - dask-ms >=0.2.21
    - scipy
    - tqdm
    - matplotlib-base
    - astropy
    - spacetrack
    - skyfield
    - numpy
    - pyyaml

tests:
  - python:
      imports:
        - dist
        - docs
        - examples
        - tabsim
      pip_check: true
  - requirements:
      run:
        - pip
    script:
      - tle-region --help
      - ast-region --help
      - flag-data --help
      - sim-vis --help
      - write-config --help
      - tabsim-setup-spacetrack --help
      - tabsim-import-tles --help

about:
  summary: Trajectory-based Radio Frequency Interference (RFI) simulations for radio interferometeric data.
  license: GPL-3.0-only
  license_file: LICENSE
  homepage: https://pypi.org/project/tabsim/

extra:
  recipe-maintainers:
    - chrisfinlay
