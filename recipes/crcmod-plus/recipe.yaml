context:
  version: 2.3.1

package:
  name: crcmod-plus
  version: ${{ version }}

source:
  - url: https://pypi.org/packages/source/c/crcmod-plus/crcmod_plus-${{ version }}.tar.gz
    sha256: 732ffe3c3ce3ef9b272e1827d8fb894590c4d6ff553f2a2b41ae30f4f94b0f5d

build:
  number: 0
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  build:
    - python
    - ${{ compiler('c') }}
    - ${{ stdlib("c") }}
  host:
    - python
    - setuptools >=61
    - pip
  run:
    - python

tests:
  - python:
      imports:
        - crcmod
        - crcmod._crcfunext
      pip_check: true

about:
  summary: CRC generator - modernized
  homepage: https://github.com/ntamas/crcmod-plus
  license: MIT
  license_file:
    - LICENSE.txt
  repository: https://github.com/ntamas/crcmod-plus
  documentation: https://github.com/ntamas/crcmod-plus#readme

extra:
  recipe-maintainers:
    - carlodri
