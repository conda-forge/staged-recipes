context:
  version: "0.15.0"

package:
  name: qt6-keychain
  version: ${{ version }}

source:
  url: https://github.com/frankosterfeld/qtkeychain/archive/refs/tags/${{ version }}.tar.gz
  sha256: f4254dc8f0933b06d90672d683eab08ef770acd8336e44dfa030ce041dc2ca22

build:
  number: 0
  script:
    - if: win
      then:
        - cmake -S . -B build -G Ninja %CMAKE_ARGS%
          -DBUILD_WITH_QT6=ON
      else:
        - cmake -S . -B build -G Ninja ${CMAKE_ARGS}
          -DBUILD_WITH_QT6=ON
    - cmake --build build --parallel ${{ CPU_COUNT }}
    # Test fails on Linux with "Cannot spawn a message bus without a machine-id: 
    # Invalid machine ID in $PREFIX/var/lib/dbus/machine-id or /etc/machine-id"
    - if: not linux
      then: ctest --test-dir build --output-on-failure 
    - cmake --install build

requirements:
  build:
    - ${{ compiler('cxx') }}
    - ${{ stdlib('c') }}
    - cmake
    - ninja
    - pkg-config
  host:
    - qt6-main
    - zlib
    - if: linux
      then:
        - glib
        - libsecret

tests:
  - package_contents:
      include:
        - qt6keychain/keychain.h
      lib:
        - qt6keychain

about:
  homepage: https://github.com/frankosterfeld/qtkeychain
  license: BSD-3-Clause
  summary:  Platform-independent Qt API for storing passwords securely.
  description: |
    QtKeychain is a Qt API to store passwords and other secret data securely. How the data is stored depends on the platform
  license_file: COPYING
  repository: https://github.com/frankosterfeld/qtkeychain

extra:
  recipe-maintainers:
    - multimeric
