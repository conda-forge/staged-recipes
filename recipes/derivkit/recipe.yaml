schema_version: 1

context:
  python_min: "3.10"
  version: "1.1.0"

package:
  name: derivkit
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/d/derivkit/derivkit-${{ version }}.tar.gz
  sha256: 0dfd2d7449baf5a2dbf3caa92fb2820917cd79caf8caf08d197ea1bdaf42cd97

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - setuptools >=80
    - setuptools-scm >=8
    - pip
  run:
    - python >=${{ python_min }}
    - numdifftools
    - numpy
    - multiprocess
    - scipy
    - tox
    - getdist
    - emcee

tests:
  - python:
      imports:
        - derivkit
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  summary: A robust toolkit for stable numerical derivatives
  license: MIT
  license_file: LICENSE
  homepage: https://derivkit.org
  repository: https://github.com/derivkit/derivkit
  documentation: https://docs.derivkit.org

extra:
  recipe-maintainers:
    - lonbar
