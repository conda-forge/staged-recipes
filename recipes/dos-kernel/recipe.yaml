context:
  version: "0.24.1"
  # dos-kernel requires Python >=3.11 (pyproject `requires-python`), above
  # conda-forge's global python_min.
  python_min: "3.11"

package:
  name: dos-kernel
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/d/dos-kernel/dos_kernel-${{ version }}.tar.gz
  sha256: 74c7e1ac12e4125468270b7d478c1ed4b8ac8293d05ee4ab6dd890f0919b8ed1

build:
  noarch: python
  script: python -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - setuptools >=75.0
  run:
    - python >=${{ python_min }}
    - pyyaml >=6.0

tests:
  - python:
      imports:
        - dos
      pip_check: true
      python_version: ${{ python_min }}.*
  - script:
      - dos --help
    # Pin the script-test env to the floor too: unpinned, the run dep
    # `python >=3.11` resolves the NEWEST interpreter for this test env
    # (3.14 at submission time), which failed on win-64 while linux/osx
    # passed; the python test above already pins the same floor.
    requirements:
      run:
        - python ${{ python_min }}.*

about:
  homepage: https://github.com/anthony-chaudhary/dos-kernel
  summary: Trust kernel for fleets of AI agents - verify, refuse, arbitrate from evidence the agents did not author
  description: |
    DOS (the Dispatch Operating System) is a small, deterministic kernel
    that adjudicates ground truth across many unreliable, self-narrating
    AI agents. "dos verify" answers "did this actually ship?" from git
    ancestry rather than an agent's self-report; "dos arbitrate" referees
    which agents may touch which files concurrently; refusals are
    structured and machine-checkable instead of free text. Pure Python,
    one runtime dependency (PyYAML), works on a plain git repo with no
    configuration. Optional extras add an MCP server (dos-mcp), terminal
    UIs, and notification transports.
  license: MIT
  license_file: LICENSE
  repository: https://github.com/anthony-chaudhary/dos-kernel
  documentation: https://anthony-chaudhary.github.io/dos-kernel/

extra:
  recipe-maintainers:
    - anthony-chaudhary
