{% set name = "toolregistry-server" %}
{% set version = "0.4.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/toolregistry_server-{{ version }}.tar.gz
  sha256: c79f355dfba3a4ce1710cd2e24edbd217c2b41b4717d82782534563fe30122a1

build:
  noarch: python
  number: 0
  script: {{ PYTHON }} -m pip install . -vv
  entry_points:
    - toolregistry-server = toolregistry_server.cli:main

requirements:
  host:
    - python >=3.10
    - setuptools >=61.0
    - pip
  run:
    - python >=3.10
    - toolregistry >=0.11.1,<1.0.0
  run_constrained:
    - fastapi >=0.119.0
    - uvicorn >=0.24.0
    - mcp >=1.8.0

test:
  imports:
    - toolregistry_server
  commands:
    - pip check
    - toolregistry-server --help
  requires:
    - pip

about:
  home: https://github.com/Oaklight/toolregistry-server
  summary: "ToolRegistry Server: Serve Custom Tools via OpenAPI and MCP for Function-Calling LLMs"
  license: MIT
  license_family: MIT
  license_file: LICENSE
  doc_url: https://toolregistry-server.readthedocs.io
  dev_url: https://github.com/Oaklight/toolregistry-server

extra:
  recipe-maintainers:
    - Oaklight
