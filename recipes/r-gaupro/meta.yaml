{% set version = '0.2.17' %}
{% set posix = 'm2-' if win else '' %}

package:
  name: r-gaupro
  version: {{ version|replace("-", "_") }}

source:
  url:
    - {{ cran_mirror }}/src/contrib/GauPro_{{ version }}.tar.gz
    - {{ cran_mirror }}/src/contrib/Archive/GauPro/GauPro_{{ version }}.tar.gz
  sha256: 80a2265d5c046048b6bf64749ada72191e791e18ad7d74d3d85fd50215796670

build:
  number: 0
  rpaths:
    - lib/R/lib/
    - lib/
  missing_dso_whitelist:
    - '*/R.dll'        # [win]
    - '*/Rblas.dll'    # [win]
    - '*/Rlapack.dll'  # [win]

requirements:
  build:
    - {{ compiler('c') }}              # [not win]
    - {{ stdlib('c') }}                # [not win]
    - {{ compiler('m2w64_c') }}        # [win]
    - {{ stdlib('m2w64_c') }}          # [win]
    - {{ compiler('cxx') }}            # [not win]
    - {{ compiler('m2w64_cxx') }}      # [win]
    - {{ posix }}filesystem        # [win]
    - {{ posix }}make
    - {{ posix }}sed               # [win]
    - {{ posix }}coreutils         # [win]
    - {{ posix }}zip               # [win]
    - cross-r-base {{ r_base }}    # [build_platform != target_platform]
  host:
    - r-base
    - r-r6
    - r-rcpp
    - r-rcpparmadillo
    - r-ggplot2
    - r-lbfgs
    - r-mixopt >0.1.0
    - r-numderiv
    - r-rmarkdown
    - r-tidyr
  run:
    - r-base
    - r-r6
    - r-rcpp
    - r-rcpparmadillo
    - r-ggplot2
    - r-lbfgs
    - r-mixopt >0.1.0
    - r-numderiv
    - r-rmarkdown
    - r-tidyr

test:
  commands:
    - $R -e "library('GauPro')"           # [not win]
    - "\"%R%\" -e \"library('GauPro')\""  # [win]

about:
  home: https://github.com/CollinErickson/GauPro
  license: GPL-3.0-only
  summary: Fits a Gaussian process model to data. Gaussian processes are commonly used in computer
    experiments to fit an interpolating model. The model is stored as an 'R6' object
    and can be easily updated with new data. There are options to run in parallel, and
    'Rcpp' has been used to speed up calculations. For more info about Gaussian process
    software, see Erickson et al. (2018) <doi:10.1016/j.ejor.2017.10.002>.
  license_family: GPL3
  license_file:
    - '{{ environ["PREFIX"] }}/lib/R/share/licenses/GPL-3'

extra:
  recipe-maintainers:
    - conda-forge/r
