{% set version = "0.1.5" %}
package:
  name: gpu-glm
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/g/gpu-glm/gpu_glm-{{ version }}.tar.gz
  sha256: 0f57106c95f3d082e71b69c85af27d2c3260b774669d329cea72ac20c8c1caa8

build:
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0
  skip: true  # [osx]

requirements:
  host:
    - python
    - pip
    - setuptools
  run:
    - python
    - numpy >=2.0.0,<3.0
    - scipy >=1.10,<1.17
    - cupy >=14.0.1,<15.0

test:
  imports:
    - gpu_glm
  commands:
    - pip check
  requires:
    - pip

about:
  home: https://github.com/gmcmacran/gpu_glm
  summary: Regularized GLM models running on a GPU.
  description: |
    A lightweight Python implementation of Generalized Linear Models (GLMs)
    that runs on a GPU via CuPy, with a NumPy fallback.
  license: MIT
  license_file: LICENSE
  doc_url: https://gmcmacran.github.io/gpu_glm/
  dev_url: https://github.com/gmcmacran/gpu_glm

extra:
  recipe-maintainers:
    - gmcmacran
