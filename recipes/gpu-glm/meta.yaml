{% set version = "0.1.4" %}
package:
  name: gpu-glm
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/g/gpu-glm/gpu_glm-{{ version }}.tar.gz
  sha256: cea8eb460fe2ea5d3edb65d3f2405ca37806693dcfd9d5b975262ac5ed52ecfd

build:
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python
    - pip
    - setuptools
  run:
    - python
    - numpy >=2.4.3,<3.0
    - scipy >=1.10,<1.17
    - cupy >=14.0.1,<15.0

test:
  imports:
    - gpu_glm
  commands:
    - pip check
  requires:
    - pip

about:
  home: https://github.com/gmcmacran/gpu_glm
  summary: Regularized GLM models running on a GPU.
  description: |
    A lightweight Python implementation of Generalized Linear Models (GLMs)
    that runs on a GPU via CuPy, with a NumPy fallback.
  license: MIT
  license_file: LICENSE
  doc_url: https://gmcmacran.github.io/gpu_glm/
  dev_url: https://github.com/gmcmacran/gpu_glm

extra:
  recipe-maintainers:
    - gmcmacran
