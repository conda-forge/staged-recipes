{% set version = '0.2' %}
{% set posix = 'm2-' if win else '' %}

package:
  name: r-lisp
  version: {{ version|replace("-", "_") }}

source:
  url:
    - {{ cran_mirror }}/src/contrib/lisp_{{ version }}.tar.gz
    - {{ cran_mirror }}/src/contrib/Archive/lisp/lisp_{{ version }}.tar.gz
  sha256: 099589c6c1d163b0d3c0816ac5f8ad45b9c516cb6848e89fd3d22eed742fa20f

build:
  number: 0
  noarch: generic
  rpaths:
    - lib/R/lib/
    - lib/
  missing_dso_whitelist:
    - '*/R.dll'        # [win]
    - '*/Rblas.dll'    # [win]
    - '*/Rlapack.dll'  # [win]

requirements:
  build:
    - {{ posix }}zip               # [win]
    - cross-r-base {{ r_base }}    # [build_platform != target_platform]
  host:
    - r-base
  run:
    - r-base

test:
  commands:
    - $R -e "library('lisp')"           # [not win]
    - "\"%R%\" -e \"library('lisp')\""  # [win]

about:
  home: https://github.com/klutometis/R-lisp
  license: GPL-2.0-or-later
  summary: Provides list-processing utilities inspired by the 'SRFI-1' list library for Scheme
    (<https://srfi.schemers.org/srfi-1/srfi-1.html>), including car/cdr family accessors,
    zip, pairwise, for.each, pair.fold.right and friends.  Higher-order helpers that
    are orthogonal to list processing are deferred to the 'functional' package; this
    package is freely a mixture of implementation and API.
  license_family: GPL2
  license_file:
    - '{{ environ["PREFIX"] }}/lib/R/share/licenses/GPL-2'

extra:
  recipe-maintainers:
    - conda-forge/r
