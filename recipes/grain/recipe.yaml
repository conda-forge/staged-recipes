{% set name = "Grain" %}
{% set version = "0.2.9" %}
{% set sha256 = "159ed7a62546ffb768db2fdaa803a1c864c30b8985246d3e276078dc5ef285ee" %}
{% set python_min = "3.10" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://github.com/google/grain/archive/v{{ version }}.tar.gz
  sha256: {{ sha256 }}

build:
  number: 0
  skip: true  # [win]

requirements:
  build:
    - bazel 7.1.1
  host:
    - pip
    - python {{ python_min }}
    - setuptools
    - wheel
  run:
    - python >={{ python_min }}

test:
  imports:
    - grain
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  homepage: https://github.com/google/grain
  summary: Library for reading and processing ML training data.
  description: |
    Grain is a library for reading data for training and evaluating JAX models.
    It's open source, fast and deterministic.
  license: Apache-2.0
  license_file: LICENSE
  documentation: https://google-grain.readthedocs.io/
  repository: https://github.com/google/grain

extra:
  recipe-maintainers:
    - mtsokol
