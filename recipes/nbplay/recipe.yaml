context:
  version: "0.1.1"

package:
  name: nbplay
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/n/nbplay/nbplay-${{ version }}.tar.gz
  sha256: 455956bacf2d48d7bcb457e3f1ae8a9e1b1634feebc3328254ed1950a891e450

build:
  number: 0
  python:
    version_independent: true
  script:
    - if: unix
      then:
        - export PYO3_PYTHON="$PYTHON"
        - export RUSTFLAGS=""
      else:
        - set "PYO3_PYTHON=%PYTHON%"
        - set "RUSTFLAGS="
    - cargo-bundle-licenses --format yaml --output THIRDPARTY.yml
    - ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  skip: is_abi3 and not is_python_min

requirements:
  build:
    - if: build_platform != target_platform
      then:
        - python
        - cross-python_${{ target_platform }}
        - crossenv
    - ${{ compiler('c') }}
    - ${{ stdlib("c") }}
    - ${{ compiler('rust') }}
    - rust-std-wasm32-unknown-unknown
    - wasm-bindgen-cli ==0.2.121
    - cargo-bundle-licenses
  host:
    - python
    - pip
    - hatchling
    - hatch-js
    - hatch-rs
    - pnpm
    - if: is_abi3
      then:
      - python-abi3
  run:
    - python
    - anywidget
    - ipywidgets >=8
  ignore_run_exports:
    from_package:
      - cross-python_${{ target_platform }}

tests:
  - python:
      imports:
        - nbplay
      pip_check: true
      python_version: ${{ python_min }}.*
  - if: is_abi3
    then:
      script:
        - if: win
          then: abi3audit %PREFIX%/Lib/site-packages/nbplay/nbplay.pyd -s -v --assume-minimum-abi3 ${{ python_min }}
          else:
            - export SP_DIR=$(python -c "import site; print(site.getsitepackages()[0])")
            - abi3audit $SP_DIR/nbplay/nbplay.abi3.so -s -v --assume-minimum-abi3 ${{ python_min }}
      requirements:
        run:
          - abi3audit

about:
  license: Apache-2.0
  license_file:
    - LICENSE
    - THIRDPARTY.yml
  summary: Let's play!
  homepage: https://github.com/1kbgz/nbplay
  repository: https://github.com/1kbgz/nbplay

extra:
  recipe-maintainers:
    - timkpaine
