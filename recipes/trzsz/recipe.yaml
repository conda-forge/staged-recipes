context:
  version: "1.2.0"

package:
  name: trzsz
  version: ${{ version }}

source:
  url: https://github.com/trzsz/trzsz-go/archive/refs/tags/v${{ version }}.tar.gz
  sha256: 6577fbab008264ff4678f60f56a0dea1e68763064a638eaf54e560198a5e6fd3

build:
  number: 0
  script:
    - go-licenses save ./cmd/... --save_path ./library_licenses
    - if: unix
      then:
        - go build -v -trimpath -o $PREFIX/bin/trz -ldflags="-s -w" ./cmd/trz
        - go build -v -trimpath -o $PREFIX/bin/tsz -ldflags="-s -w" ./cmd/tsz
        - go build -v -trimpath -o $PREFIX/bin/trzsz -ldflags="-s -w" ./cmd/trzsz
      else:
        - go build -v -trimpath -o %LIBRARY_BIN%\trz.exe -ldflags="-s -w" .\cmd\trz
        - go build -v -trimpath -o %LIBRARY_BIN%\tsz.exe -ldflags="-s -w" .\cmd\tsz
        - go build -v -trimpath -o %LIBRARY_BIN%\trzsz.exe -ldflags="-s -w" .\cmd\trzsz

requirements:
  build:
    - ${{ compiler("go-nocgo") }}
    - go-licenses

tests:
  - script:
      - trz -v
      - tsz -v
      - trzsz -v
  - package_contents:
      bin:
        - trz
        - tsz
        - trzsz
      strict: true

about:
  homepage: https://trzsz.github.io/go
  summary: "Simple file transfer tools, similar to lrzsz ( rz / sz ), and compatible with tmux"
  license: MIT
  license_file:
    - LICENSE
    - library_licenses/
  repository: https://github.com/trzsz/trzsz-go

extra:
  recipe-maintainers:
    - lonnywong
