context:
  version: "0.5.0"

package:
  name: jarl
  version: ${{ version }}

source:
  url: https://github.com/etiennebacher/jarl/archive/refs/tags/${{ version }}.tar.gz
  sha256: 7b1fd11adc3924fa71f3a4202a2a4a87f1c8d62944160adedba65eb8f01d1cda

build:
  number: 0
  script:
    env:
      CARGO_PROFILE_RELEASE_LTO: fat
      CARGO_PROFILE_RELEASE_STRIP: symbols
    content:
      - cd crates/jarl
      - if: unix
        then:
          - cargo auditable install --path=. --root="$PREFIX" --no-track --locked --bins
      - if: win
        then:
          # work around Windows `MAX_PATH` (260 char) limitation
          - set "CARGO_HOME=C:\.cargo"
          - cargo auditable install --path=. --root="%LIBRARY_PREFIX%" --no-track --locked --bins
      - cargo-bundle-licenses --format=yaml --output=../../THIRDPARTY.yml

requirements:
  build:
    - ${{ stdlib('c') }}
    - ${{ compiler('c') }}
    - ${{ compiler('rust') }}
    - cargo-auditable
    - cargo-bundle-licenses

tests:
  - script:
      - jarl --help
      - jarl --version
  - package_contents:
      bin:
        - jarl
      strict: true

about:
  summary: Just Another R Linter
  description: |
    Jarl is a fast linter for R: it does static code analysis to search for
    programming errors, bugs, and suspicious patterns of code. It supports
    automatic fixes, 55+ rules, multiple output formats, and integration in
    popular IDEs and editors as well as CI workflows.
  license: MIT
  license_file:
    - LICENSE
    - THIRDPARTY.yml
  homepage: https://jarl.etiennebacher.com/
  repository: https://github.com/etiennebacher/jarl/

extra:
  recipe-maintainers:
    - salim-b
