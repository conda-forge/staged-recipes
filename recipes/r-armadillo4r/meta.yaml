{% set version = '0.9.0' %}
{% set posix = 'm2-' if win else '' %}

package:
  name: r-armadillo4r
  version: {{ version|replace("-", "_") }}

source:
  url:
    - {{ cran_mirror }}/src/contrib/armadillo4r_{{ version }}.tar.gz
    - {{ cran_mirror }}/src/contrib/Archive/armadillo4r/armadillo4r_{{ version }}.tar.gz
  sha256: 85c8908a89ccd679e8549fa8d1b0a37eb1d5f91239f1ef0ea3e2222d0efcaa82

build:
  number: 0
  noarch: generic
  rpaths:
    - lib/R/lib/
    - lib/
  missing_dso_whitelist:
    - '*/R.dll'        # [win]
    - '*/Rblas.dll'    # [win]
    - '*/Rlapack.dll'  # [win]

requirements:
  build:
    - {{ posix }}zip               # [win]
    - cross-r-base {{ r_base }}    # [build_platform != target_platform]
  host:
    - r-base
    - r-cpp4r
  run:
    - r-base
    #- r-cpp4r

test:
  commands:
    - $R -e "library('armadillo4r')"           # [not win]
    - "\"%R%\" -e \"library('armadillo4r')\""  # [win]

about:
  home: https://pacha.dev/armadillo4r/
  dev_url: https://github.com/pachadotdev/armadillo4r
  license: Apache-2.0
  summary: Provides function declarations and inline function definitions that facilitate communication
    between R and the 'Armadillo' 'C++' library for linear algebra and scientific computing.
    This implementation is derived from Vargas Sepulveda and Schneider Malamud (2024)
    <doi:10.1016/j.softx.2025.102087>.
  license_family: APACHE
  license_file:
    - LICENSE-2.0.txt

extra:
  recipe-maintainers:
    - conda-forge/r
