context:
  version: 3.1.0

package:
  name: zxing-cpp-python
  version: ${{ version }}

source:
  - url: https://files.pythonhosted.org/packages/source/z/zxing-cpp/zxing_cpp-${{ version }}.tar.gz
    sha256: ecd2f0641ca2298f5decfd1746d7b08a7639523d515c5ed0c3df4e67327a6e45

build:
  number: 0
  script: ${{ PYTHON }} -m pip install . -vv --no-build-isolation

requirements:
  build:
    - ${{ compiler('c') }}
    - ${{ compiler('cxx') }}
    - ${{ stdlib('c') }}
    - cmake
    - ninja
    - if: build_platform != host_platform
      then:
        - cross-python_${{ host_platform }}
        - python
        - scikit-build-core
        - nanobind
  host:
    - python
    - scikit-build-core >=0.12
    - nanobind >=2.11.0
    - pip
  run:
    - python

tests:
  - python:
      imports:
        - zxingcpp
      pip_check: true

about:
  homepage: https://github.com/zxing-cpp/zxing-cpp/
  summary: Python bindings for the zxing-cpp barcode library
  documentation: https://github.com/zxing-cpp/zxing-cpp/blob/master/wrappers/python/README.md
  license: Apache-2.0
  license_file: LICENSE

extra:
  recipe-maintainers:
    - rxm7706
    - carlodri
