schema_version: 1

context:
  name: gha-tools
  version: "0.3.0"

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/${{ name[0] }}/${{ name }}/gha_tools-${{ version }}.tar.gz
  sha256: 1a5931d8ba756c11468680ff5ba390827e22424e2855ba200bf99cc5f7520818

build:
  number: 0
  noarch: python
  script: uv pip install --python ${{ PYTHON }} . -vv --no-deps --no-build-isolation
  python:
    entry_points:
      - gha-tools = gha_tools.cli:main

requirements:
  host:
    - python ${{ python_min }}.*
    - hatchling
    - uv
  run:
    - python >=${{ python_min }}
    - click >=7

tests:
  - python:
      imports:
        - gha_tools
      python_version: ${{ python_min }}.*
  - requirements:
      run:
        - python ${{ python_min }}.*
        - pip
    script:
      - pip check
      - gha-tools --help

about:
  summary: Tools for working with GitHub Actions
  license: MIT
  license_file: LICENSE.txt
  homepage: https://github.com/akx/gha-tools

extra:
  recipe-maintainers:
    - lucascolley
