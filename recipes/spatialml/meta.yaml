{% set name = "spatialml" %}
{% set python_min = "3.12" %}
{% set version = "0.2.1" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/spatialml-{{ version }}.tar.gz
  sha256: 882b462125915653769c12fd66918f09f40f89043e0cdb6e5d6c4c1caae32edb

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - setuptools >=61.0
    - setuptools-scm >=6.2
    - pip
  run:
    - python >={{ python_min }}
    - geopandas >=1.1.0
    - joblib >=1.5.0
    - libpysal >=4.12
    - numpy >=2.0.0
    - scipy >=1.14.0
    - scikit-learn >=1.5.0
    - pandas >=2.3.0

test:
  imports:
    - spatialml
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  home: http://pysal.org
  license: BSD-3-Clause
  license_file: LICENSE
  summary: Spatial modelling based on scikit-learn

extra:
  recipe-maintainers:
    - martinfleis
    - jGaboardi