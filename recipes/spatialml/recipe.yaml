schema_version: 1

context:
  python_min: "3.12"
  version: "0.2.1"

package:
  name: spatialml
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/s/spatialml/spatialml-${{ version }}.tar.gz
  sha256: 882b462125915653769c12fd66918f09f40f89043e0cdb6e5d6c4c1caae32edb

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - setuptools >=61.0
    - setuptools-scm >=6.2
    - pip
  run:
    - python >=${{ python_min }}
    - geopandas >=1.1.0
    - joblib >=1.5.0
    - libpysal >=4.12
    - numpy >=2.0.0
    - scipy >=1.14.0
    - scikit-learn >=1.5.0
    - pandas >=2.3.0

tests:
  - python:
      imports:
        - spatialml
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  summary: Spatial modeling based on scikit-learn.
  license: BSD-3-Clause
  license_file: LICENSE
  homepage: https://pysal.org/spatialml/
  documentation: https://pysal.org/spatialml/

extra:
  recipe-maintainers:
    - martinfleis
    - jGaboardi
