context:
  version: "4.7.0"

package:
  name: wireshark
  version: ${{ version }}

source:
  url: https://gitlab.com/wireshark/wireshark/-/archive/v${{ version }}/wireshark-v${{ version }}.tar.gz
  sha256: 9a8ad7d964b0123fe5c89128c8ad170b5a897a8e096e5eb8d5bd4439e36b7f8e

build:
  number: 0
  skip:
    - win
    - osx
  script:
    - cmake -G Ninja -S . -B build ${CMAKE_ARGS} -DCMAKE_BUILD_TYPE=Release -DCMAKE_INSTALL_PREFIX="${PREFIX}" -DENABLE_WERROR=OFF -DDUMPCAP_INSTALL_OPTION=normal -DENABLE_CAP=OFF -DENABLE_APPLICATION_BUNDLE=OFF -DHAVE_LINUX_IF_BONDING_H=OFF -DHAVE_LINUX_SOCKIOS_H=OFF
    - cmake --build build --parallel "${CPU_COUNT}"
    - cmake --install build

requirements:
  build:
    - ${{ compiler('c') }}
    - ${{ compiler('cxx') }}
    - ${{ stdlib('c') }}
    - bison
    - cmake
    - flex
    - ninja
    - perl
    - pkg-config
    - python 3.12.*
  host:
    - brotli
    - c-ares
    - glib
    - gnutls
    - libgcrypt
    - libgl-devel
    - libmaxminddb
    - libnghttp2
    - libopengl-devel
    - libopus
    - libpcap
    - libssh
    - libxml2-devel
    - lz4
    - pcre2
    - qt6-main
    - snappy
    - speexdsp
    - zlib
    - zstd

tests:
  - package_contents:
      bin:
        - capinfos
        - editcap
        - mergecap
        - randpkt
        - rawshark
        - reordercap
        - sharkd
        - text2pcap
        - tshark
        - wireshark
      lib:
        - wireshark
  - script:
      - tshark --version
      - wireshark --version

about:
  homepage: https://www.wireshark.org/
  summary: Network protocol analyzer
  description: |
    Wireshark is a network protocol analyzer for capturing, inspecting,
    and analyzing network traffic.
  license: GPL-2.0-or-later
  license_file: COPYING
  documentation: https://www.wireshark.org/docs/
  repository: https://gitlab.com/wireshark/wireshark

extra:
  recipe-maintainers:
    - user202729
