{% set version = "2.0.2" %}

package:
  name: quantmeta
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/q/quantmeta/quantmeta-{{ version }}.tar.gz
  sha256: 36ace042bea37be768555b1c63352e41d769947a6de111b9a69214dc6b88f2b7

build:
  entry_points:
    - detection-threshold = quantmeta.detection_threshold.run_sh:main
    - standard-curve = quantmeta.standard_curve.run_sh:main
    - quant-targets = quantmeta.quant_targets.run_sh:main
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python >=3.14
    - pip
  run:
    - python >=3.14
    - argparse >=1.4.0
    - biopython >=1.87
    - matplotlib-base >=3.10.8
    - numpy >=2.4.4
    - pandas >=3.0.2
    - path >=17.1.1
    - scikit-learn >=1.8.0
    - scipy >=1.17.1

test:
  imports:
    - quantmeta
  commands:
    - pip check
    - detection-threshold --help
    - standard-curve --help
    - quant-targets --help
  requires:
    - pip
    - python

about:
  home: https://pypi.org/project/quantmeta/
  summary: QuantMeta determines the absolute abundance of targets in metagenomes spiked with synthetic DNA standards. The tool accurately quantifies targets by establishing (1) entropy-based detection thresholds to confidently determine the presence of targets, and (2) an approach to identify and correct read mapping or assembly errors.
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - klangenf
