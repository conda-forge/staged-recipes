{% set name = "r-openmeteo" %}
{% set version = "0.2.4" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://github.com/tpisel/openmeteo/releases/tag/v{{ version }}/openmeteo_{{ version }}.tar.gz
  sha256:  0ca6545db3ee2aa145dd1741e71c73abbf5fac521294a6a56ce9fe138ab3639f

build:
  number: 0
  noarch: generic
  script: R CMD INSTALL --no-build-vignettes --no-multiarch .

requirements:
  host:
    - r-base >=4.1.0
    - r-httr
    - r-tibble
    - r-tidyr
    - r-tibblify
    - r-dplyr
    - r-yaml
    - r-testthat >=3.0.0

  run:
    - r-base >=4.1.0
    - r-httr
    - r-tibble
    - r-tidyr
    - r-tibblify
    - r-dplyr
    - r-yaml
    - r-testthat >=3.0.0    
test:
  source_files:
    - tests
  imports:
    - r-openmeteo


about:
  home: https://github.com/tpisel/openmeteo
  license: GPL-3.0-or-later
  summary: openmeteo provides functions for accessing the Open-Meteo weather API, enabling the desired weather data or 
           forecasts to be retrieved in a tidy data format. An API key is not required to access the Open-Meteo API.

extra:
  recipe-maintainers:
    - github_pseudo
