context:
  version: "0.17.0"

package:
  name: cargo-outdated
  version: ${{ version }}

source:
  url: https://github.com/kbknapp/cargo-outdated/archive/refs/tags/v${{ version }}.tar.gz
  sha256: 6c1c6914f34d3c0d9ebf26b74224fa6744a374e876b35f9836193c2b03858fa4

build:
  number: 0
  script:
    env:
      CARGO_PROFILE_RELEASE_STRIP: symbols
      CARGO_PROFILE_RELEASE_LTO: fat
    content:
      - if: unix
        then:
          - export OPENSSL_DIR=$PREFIX
          - cargo auditable install --locked --no-track --bins --root ${{ PREFIX }} --path .
        else:
          - cargo auditable install --locked --no-track --bins --root %LIBRARY_PREFIX% --path .
      - cargo-bundle-licenses --format yaml --output ./THIRDPARTY.yml

requirements:
  build:
    - ${{ stdlib('c') }}
    - ${{ compiler('c') }}
    - ${{ compiler('rust') }}
    - cargo-bundle-licenses
    - cargo-auditable
  host:
    - if: unix
      then:
        - openssl

tests:
  - script: cargo-outdated --help
  - package_contents:
      bin:
        - cargo-outdated
      strict: true

about:
  homepage: https://github.com/kbknapp/cargo-outdated
  summary: Cargo subcommand for displaying when dependencies are out of date
  description: |
    A cargo subcommand for displaying when Rust dependencies are out of date.
  license: MIT
  license_file:
    - LICENSE-MIT
    - THIRDPARTY.yml
  documentation: https://github.com/kbknapp/cargo-outdated
  repository: https://github.com/kbknapp/cargo-outdated

extra:
  recipe-maintainers:
    - pavelzw
