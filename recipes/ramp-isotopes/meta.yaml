{% set python_min = "3.11" %}
{% set version = "0.0.3" %}

package:
  name: ramp-isotopes
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/r/ramp-isotopes/ramp_isotopes-{{ version }}.tar.gz
  sha256: c2afe8c07d47738df9380c10a2754eb86a867ce670eed989a02f39385ce9eb83

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python {{ python_min }}.*
    - setuptools
    - setuptools-scm
    - wheel
    - pip
  run:
    - python >={{ python_min }}
    - bidict
    - scipy
    - pandas

test:
  imports:
    - isotopes
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}.*

about:
  home: https://github.com/ramp-nuclear/isotopes
  summary: Package for lightweight representation of nuclear isotopes
  doc_url: https://ramp-nuclear.github.io/isotopes/
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - esheder
