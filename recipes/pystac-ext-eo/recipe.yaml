schema_version: 1

context:
  version: "1.1.0"

package:
  name: pystac-ext-eo
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/p/pystac-ext-eo/pystac_ext_eo-${{ version }}.tar.gz
  sha256: c599b1f4a470eceefb745b26f4dabea05661e843d26c8c59f0d7343b6ac9ab35

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - hatchling
    - pip
  run:
    - python >=${{ python_min }}
    - pystac-core
    # imported but not declared as a dependency
    - pystac-ext-projection
    - pystac-ext-view

tests:
  - python:
      imports:
        - pystac.extensions.eo
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  summary: Electro-Optical extension for PySTAC
  license: Apache-2.0
  license_file: LICENSE
  homepage: https://pypi.org/project/pystac-ext-eo/
  documentation: https://pystac.readthedocs.io

extra:
  recipe-maintainers:
    - ocefpaf
