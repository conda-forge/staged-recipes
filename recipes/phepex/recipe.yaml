schema_version: 1

context:
  version: "0.1.0"

package:
  name: phepex
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/p/phepex/phepex-${{ version }}.tar.gz
  sha256: 619f2bc9658224c13689867fcabb2e5f7670a8d9afaa36583bb3b29d38597b0f

build:
  script:
    - if: win
      then:
        - set CMAKE_GENERATOR=Ninja
        - set "CMAKE_GENERATOR_PLATFORM="
        - set "CMAKE_GENERATOR_TOOLSET="
      else: export CMAKE_GENERATOR=Ninja
    - ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  build:
    - ${{ compiler("cxx") }}
    - ${{ stdlib("c") }}
    - cmake >=3.15
    - ninja
  host:
    - python
    - scikit-build-core >=0.10
    - nanobind >=2.0
    - setuptools-scm >=8
    - pip
  run:
    - python
    - numpy

tests:
  - python:
      imports:
        - phepex
        - phepex._core
      pip_check: true

about:
  homepage: https://github.com/phepex/phepex
  summary: "Photo-electron pulse extraction: fast PMT/SiPM waveform charge & timing extraction for Python."
  description: |
    Photo-electron pulse extraction: C++-accelerated kernels for extracting charge and
    timing from digitised PMT/SiPM waveforms, plus a fast waveform generator.
  repository: https://github.com/phepex/phepex
  documentation: https://phepex.github.io/phepex
  license: MPL-2.0
  license_file: LICENSE

extra:
  recipe-maintainers:
    - fwerner
