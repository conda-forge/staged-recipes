context:
  gem_name: "zeitwerk"
  version: "2.7.5"

package:
  name: rb-${{ gem_name }}
  version: ${{ version }}

source:
  url: https://rubygems.org/downloads/${{ gem_name }}-${{ version }}.gem
  sha256: d8da92128c09ea6ec62c949011b00ed4a20242b255293dd66bf41545398f73dd

build:
  noarch: generic
  number: 0
  script: build

requirements:
  host:
    - ruby
  run:
    - ruby

tests:
  - script:
      - ruby -r zeitwerk -e "exit 0"

about:
  homepage: https://rubygems.org/gems/${{ gem_name }}
  summary: Efficient and thread-safe constant autoloader.
  license: MIT
  license_file: ${{ gem_name }}-${{ version }}/MIT-LICENSE
  repository: https://github.com/fxn/zeitwerk

extra:
  recipe-maintainers:
    - aktech
