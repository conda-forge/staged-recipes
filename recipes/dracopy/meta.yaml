{% set name = "DracoPy" %}
{% set version = "2.0.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://github.com/seung-lab/DracoPy/archive/refs/tags/{{ version }}.tar.gz
  sha256: bfa3f8b67d4ef004e5ba70ffcd9f4541839cf8453a205efbb091c8cb00bad074
  patches:
    - patches/0001-use-system-draco.patch

build:
  number: 0
  skip: true  # [py<310 or py>=314]
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  build:
    - {{ compiler('c') }}
    - {{ compiler('cxx') }}
    - {{ stdlib("c") }}
  host:
    - python
    - cython
    - draco
    - numpy
    - pip
    - setuptools
    - wheel
  run:
    - python
    - draco
    - numpy

test:
  imports:
    - DracoPy
  commands:
    - pip check
  requires:
    - pip
  files:
    - run_test.py

about:
  home: https://github.com/seung-lab/DracoPy
  summary: Python wrapper for Google's Draco mesh compression library
  license: Apache-2.0
  license_file: LICENSE

extra:
  recipe-maintainers:
    - jeongseok-meta
