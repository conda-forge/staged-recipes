schema_version: 1

context:
  version: "26.4.6"
  python_min: "3.11"

package:
  name: ansible-dev-tools
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/a/ansible-dev-tools/ansible_dev_tools-${{ version }}.tar.gz
  sha256: 353930fe0a82f745ec39ff3ba5d154a8042b15755143412327f421604580059d

build:
  noarch: python
  number: 0
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - setuptools >=65.3.0
    - setuptools_scm >=7.0.5
  run:
    - python >=${{ python_min }}
    - ansible-builder >=3.1.1
    - ansible-compat >=26.3.0
    - ansible-creator >=26.3.3
    - ansible-dev-environment >=26.4.0
    - ansible-lint >=26.4.0
    - ansible-navigator >=26.1.3
    - ansible-sign >=0.1.5
    - molecule >=26.3.0
    - pytest-ansible >=26.4.0
    - setuptools >=65.5.1
    - tox-ansible >=26.3.0

tests:
  - python:
      imports:
        - ansible_dev_tools
      python_version: ${{ python_min }}.*
      pip_check: true

about:
  summary: |
    Ansible Developtment Tools kit bundles all tools needed for content creation and testing.
  homepage: https://pypi.org/project/ansible-dev-tools/
  repository: https://pypi.org/project/ansible-dev-tools/
  license: GPL-3.0-only
  license_file: LICENSE

extra:
  recipe-maintainers:
    - killua156
    - mgorny
