context:
  version: "1.0.1"

package:
  name: rfdetr-plus
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/r/rfdetr-plus/rfdetr_plus-${{ version }}.tar.gz
  sha256: 5243967b73519dc5b69df8a9a8a5d6670a01f4088787f86b1c2cde3c6a1582a0

build:
  noarch: python
  script: python -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python >=3.10
    - pip
    - setuptools >=42
    - wheel
  run:
    - python >=3.10
    - rfdetr >=1.4.3,<2

tests:
  - python:
      imports:
        - rfdetr_plus
      pip_check: true

about:
  homepage: https://github.com/roboflow/rf-detr-plus
  summary: RF-DETR+ extension adding XLarge and 2XLarge detection models by Roboflow
  description: |
    RF-DETR+ is an extension package for RF-DETR that adds the XLarge and 2XLarge
    detection models for maximum accuracy in object detection tasks.
  license: LicenseRef-PML-1.0
  license_file: LICENSE
  repository: https://github.com/roboflow/rf-detr-plus

extra:
  recipe-maintainers:
    - Borda
    - SkalskiP
