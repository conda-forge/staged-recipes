schema_version: 1

context:
  version: "0.1.0"

package:
  name: jupyverse-lab
  version: ${{ version }}

source:
  - url: https://pypi.org/packages/source/j/jupyverse-lab/jupyverse_lab-${{ version }}.tar.gz
    sha256: bd424d1e8446fb2969a0b989bec95a74158bc0c1aeecbeb54e7abf45c1162806

build:
  noarch: python
  number: 0
  script:
    - ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation --disable-pip-version-check

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - uv-build
  run:
    - python >=${{ python_min }}
    - fastapi-core
    - fps
    - jupyverse-api >=0.15.0,<0.16.0
    - jupyverse-auth >=0.2.0,<0.3.0
    - jupyverse-jupyterlab >=0.1.0,<0.2.0

tests:
  - python:
      imports: jupyverse_lab
      pip_check: true
      python_version: ${{ python_min }}.*

about:
  license: BSD-3-Clause
  license_file: COPYING.md
  homepage: https://github.com/jupyter-server/jupyverse/tree/main/api/lab
  summary: The API for Jupyverse's JupyterLab/Notebook.

extra:
  recipe-maintainers:
    - davidbrochart
