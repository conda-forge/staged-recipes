{% set version = "3.1.3" %}

package:
  name: gplite
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/g/gplite/gplite-{{ version }}.tar.gz
  sha256: 18951ad08b22b4680252d3da34d0d8f5e664aefabf621f74d275729c540b6db8

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - hatchling
    - pip
  run:
    - python >={{ python_min }}
    - numpy >=1.24
    - scipy >=1.10.0

test:
  imports:
    - gplite
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://pypi.org/project/gplite/
  summary: Lightweight Gaussian Process regression library
  license: GPL-3.0-only
  license_file: LICENSE

extra:
  recipe-maintainers:
    - soconnor16
