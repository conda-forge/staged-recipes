{% set name = "historia" %}
{% set version = "0.6.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz
  sha256: 3e273055217611f6c4516fc81615ee09ba5b072ecf2aa5705e29b13c80b6b3cc

build:
  number: 0
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  entry_points:
   - historia = historia._cli:historia_cli

requirements:
  host:
    - python {{ python_min }}
    - pip
    - hatchling
  run:
    - python >={{ python_min }}
    - requests
    - tqdm
    - rich-click

test:
  requires:
    - python {{ python_min }}
    - pytest
  source_files:
    - tests
  imports:
    - historia
  commands:
    - pytest

about:
  home: https://github.com/codycbakerphd/historia
  summary: A command-line tool for backing up records of GitHub activity
  description: |
    A command-line tool for backing up records of GitHub activity for use in creating dashboard reports of work history.
  license: MIT
  license_file: LICENSE.txt
  doc_url: https://historia.readthedocs.io/
  dev_url: https://github.com/codycbakerphd/historia

extra:
  recipe-maintainers:
    - codycbakerphd
