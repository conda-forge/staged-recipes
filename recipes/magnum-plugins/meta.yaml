{% set name = "magnum-plugins" %}
# Habitat-Sim v0.3.1 vendors this post-v2020.06 snapshot.
{% set version = "2024.02.14" %}
{% set commit = "3c6049f3f744669f4aeecb85895dd4050c0efba7" %}

package:
  name: {{ name|lower }}
  version: "{{ version }}"

source:
  - url: https://github.com/mosra/magnum-plugins/archive/{{ commit }}.tar.gz
    sha256: 56e68a0168c511456cb9ad25ab9c9c0b311d0debd8ac26ee722740e5daefa060
  - url: https://github.com/mosra/toolchains/archive/b0ea02e52c4b0b0622a7c6656b250a167ee4afbd.tar.gz
    sha256: 224126e558bd223b60594b06006e91104966618bdbeda1006e9c37c39d177d05
  - url: https://github.com/BinomialLLC/basis_universal/archive/v1_15_update2.tar.gz
    sha256: 3caff917d63ed0255fc56bcdf80d305bb47ac9315a4a45409a1264a0e5e0e572
    folder: external/basis_universal

build:
  number: 0
  run_exports:
    - {{ pin_subpackage('magnum-plugins', max_pin='x.x') }}
  skip: true  # [win or osx]

requirements:
  build:
    - {{ compiler('cxx') }}
    - {{ compiler('c') }}
    - {{ stdlib('c') }}
    - {{ cdt('libglvnd-egl') }}       # [linux]
    - {{ cdt('libglvnd-devel') }}     # [linux]
    - libgl-devel                     # [linux]
    - {{ cdt('mesa-libegl-devel') }}  # [linux]
    - {{ cdt('mesa-dri-drivers') }}   # [linux]
    - ninja
    - cmake <4
    - pkg-config

  host:
    - assimp
    - basisu
    - corrade
    - magnum
    - openexr
    - zstd

  run:
    - assimp
    - basisu
    - corrade
    - magnum
    - openexr
    - zstd

test:
  requires:
    - {{ compiler('cxx') }}
    - {{ stdlib('c') }}
    - cmake <4
    - ninja
  files:
    - test-cmake
  commands:
    - test -f $PREFIX/share/cmake/MagnumPlugins/MagnumPluginsConfig.cmake  # [not win]
    - test -f $PREFIX/lib/magnum/importers/StbImageImporter.so  # [linux]
    - test -f $PREFIX/lib/magnum/importers/TinyGltfImporter.so  # [linux]
    - test -f $PREFIX/lib/magnum/imageconverters/StbImageConverter.so  # [linux]
    - cmake -S test-cmake -B test-cmake-build -G Ninja -DCMAKE_BUILD_TYPE=Release  # [unix]
    - cmake --build test-cmake-build --verbose  # [unix]
    - ./test-cmake-build/magnum_plugins_consumer  # [unix]
    - if not exist %PREFIX%\\Library\\share\\cmake\\MagnumPlugins\\MagnumPluginsConfig.cmake exit 1  # [win]

about:
  home: https://magnum.graphics/
  license: MIT
  license_family: MIT
  license_file: COPYING
  summary: Plugins for the Magnum C++11 graphics engine

extra:
  recipe-maintainers:
    - jeongseok-meta
