context:
  version: "1.0"

package:
  name: font-libre-baskerville
  version: ${{ version }}

source:
  - url: https://github.com/impallari/Libre-Baskerville/archive/9852edf75ece3af500a5ec61245f94788c3d4633.tar.gz
    sha256: 5d8937a7f9594e2a0a66f79db0d8afc796fcea051a8b146ea531ac4fe6e47cb3

build:
  noarch: generic
  number: 0
  script:
    - mkdir -p $PREFIX/fonts
    - cp fonts/{otf,ttf,webfonts,variable}/LibreBaskerville* $PREFIX/fonts

tests:
  - package_contents:
      files:
        - fonts/LibreBaskerville*.otf
        - fonts/LibreBaskerville*.woff2
        - fonts/LibreBaskerville*.ttf
      strict: true

about:
  homepage: https://impallari.com/revivals/baskerville/
  summary: Libre Baskerville Fonts
  description: |
    Libre Baskerville is a web font optimized for body text (typically 16px.) It is based on the American Type Founder's Baskerville from 1941, but it has a taller x-height, wider counters and a little less contrast, that allow it to work well for reading on-screen.
  license: OFL-1.1
  license_file:
    - OFL.txt
  repository: https://github.com/impallari/Libre-Baskerville

extra:
  recipe-maintainers:
    - pavelzw
