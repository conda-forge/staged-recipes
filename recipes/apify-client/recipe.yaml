context:
  version: "3.0.4"

package:
  name: apify-client
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/a/apify-client/apify_client-${{ version }}.tar.gz
  sha256: b53c622bae1a04ce5d75112bc6bcdd3955e1465155fa6a4e0eb50d7e6561ebbd

build:
  noarch: python
  script: python -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python >=3.11
    - pip
    - hatchling
  run:
    - python >=3.11
    - colorama >=0.4.0
    - impit >=0.13.0,<0.14.0
    - more-itertools >=10.0.0
    - pydantic >=2.11.0
    - email-validator

tests:
  - python:
      imports:
        - apify_client
      pip_check: true

about:
  homepage: https://docs.apify.com/api/client/python/
  summary: Apify API client for Python
  description: |
    The Apify API client for Python is the official library to access the
    Apify REST API from your Python applications. It provides useful features
    like automatic retries and convenience functions that improve the Apify
    platform experience.
  license: Apache-2.0
  license_file: LICENSE
  documentation: https://docs.apify.com/api/client/python/
  repository: https://github.com/apify/apify-client-python

extra:
  recipe-maintainers:
    - Pijukatel
