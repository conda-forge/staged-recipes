# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  name: fastapi-slim
  version: "0.121.1"

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/${{ name[0] }}/${{ name }}/fastapi_slim-${{ version }}.tar.gz
  sha256: 5fb8fd99200a818de61e9746bf2da74f726458c13b83608b0be7ab02950ca91d

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - pdm-backend
    - pip
  run:
    - python >=${{ python_min }},<4
    - fastapi >=${{ version }}
    - starlette >=0.40.0,<0.50.0

tests:
  - python:
      imports:
        - fastapi
      pip_check: true
      python_version: ${{ python_min }}.*

about:
  summary: FastAPI framework, high performance, easy to learn, fast to code, ready for production
  license: MIT
  license_file: LICENSE
  homepage: https://github.com/fastapi/fastapi

extra:
  recipe-maintainers:
    - rxm7706
