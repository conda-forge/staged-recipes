context:
  version: "0.51.0"

package:
  name: comrak
  version: ${{ version }}

source:
  url: https://github.com/kivikakk/comrak/archive/refs/tags/v${{ version }}.tar.gz
  sha256: 44c150168c031b031c0a96f4c45844a6338c54518239affc6885b6afff76c5b7

build:
  number: 0
  script:
    env:
      CARGO_PROFILE_RELEASE_STRIP: symbols
      CARGO_PROFILE_RELEASE_LTO: fat
    content:
      - if: unix
        then:
          - cargo auditable install --locked --no-track --bins --root ${{ PREFIX }} --path .
        else:
          - cargo auditable install --locked --no-track --bins --root %LIBRARY_PREFIX% --path .
      - cargo-bundle-licenses --format yaml --output ./THIRDPARTY.yml

requirements:
  build:
    - ${{ stdlib('c') }}
    - ${{ compiler('c') }}
    - ${{ compiler('rust') }}
    - cargo-bundle-licenses
    - cargo-auditable

tests:
  - script:
      - comrak --help
      - comrak --version
  - package_contents:
      bin:
        - comrak
      strict: true

about:
  summary: A 100% CommonMark-compatible GitHub Flavored Markdown parser and renderer
  description: |
    Comrak is a CommonMark and GitHub Flavored Markdown compatible parser and
    renderer, written in Rust. It converts Markdown to HTML, XML and CommonMark,
    with various optional features like syntax highlighting, source position attributes,
    header ID prefixes and many more thanks to a flexible extension system.
  license: BSD-2-Clause
  license_file:
    - COPYING
    - THIRDPARTY.yml
  homepage: https://comrak.ee/
  repository: https://github.com/kivikakk/comrak

extra:
  recipe-maintainers:
    - salim-b
