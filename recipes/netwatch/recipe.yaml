context:
  version: "0.9.0"

package:
  name: netwatch
  version: ${{ version }}

source:
  url: https://github.com/matthart1983/netwatch/archive/refs/tags/v${{ version }}.tar.gz
  sha256: 857cb4fed48376ed95e0323c1f69c3aece3ed100ff7f4e84c27016ce8c9a384e

build:
  number: 0
  skip:
    - win
  script:
    env:
      CARGO_PROFILE_RELEASE_STRIP: symbols
      CARGO_PROFILE_RELEASE_LTO: fat
    content:
      - cargo auditable install --locked --no-track --bins --root ${{ PREFIX }} --path .
      - cargo-bundle-licenses --format yaml --output ./THIRDPARTY.yml

requirements:
  build:
    - ${{ stdlib('c') }}
    - ${{ compiler('c') }}
    - ${{ compiler('rust') }}
    - cargo-bundle-licenses
    - cargo-auditable
    - pkg-config
  host:
    - libpcap

tests:
  - package_contents:
      bin:
        - netwatch

about:
  homepage: https://github.com/matthart1983/netwatch
  summary: Real-time network diagnostics TUI — like htop for your network
  description: |
    Real-time network diagnostics in your terminal. One command, zero config,
    instant visibility. Built with Rust and ratatui, netwatch provides a TUI
    for monitoring network traffic, connections, and diagnostics.
  license: MIT
  license_file:
    - LICENSE
    - THIRDPARTY.yml
  repository: https://github.com/matthart1983/netwatch

extra:
  recipe-maintainers:
    - pavelzw
