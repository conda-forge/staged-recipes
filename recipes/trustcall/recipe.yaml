# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "0.0.39"

package:
  name: trustcall
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/t/trustcall/trustcall-${{ version }}.tar.gz
  sha256: ec315818224501b9537ce6b7618dbc21be41210c6e8f2e239169a5a00912cd6e

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - setuptools
    - wheel
    - pip
  run:
    - python >=${{ python_min }}
    - langgraph >=0.2.25
    - dydantic >=0.0.8,<1.0.0
    - jsonpatch >=1.33,<2.0

tests:
  - python:
      imports:
        - trustcall
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  homepage: https://github.com/hinthornw/trustcall
  license: MIT
  license_file: LICENSE
  summary: Tenacious & trustworthy tool calling built on LangGraph.
  repository: https://github.com/hinthornw/trustcall
  documentation: https://github.com/hinthornw/trustcall
  description: |
    trustcall is a library for tenacious and trustworthy tool calling
    built on LangGraph. LLMs struggle when asked to generate or modify
    large JSON blobs; trustcall solves this by asking the LLM to generate
    JSON patch operations instead — a simpler, iterative task. This enables
    faster and cheaper generation of structured output, resilient retrying
    of validation errors for complex nested schemas (defined as pydantic
    models, schema dictionaries, or regular Python functions), and accurate
    updates to existing schemas that avoid undesired deletions. It works
    across common LLM workflows such as extraction, schema updates, and
    patch generation.

extra:
  recipe-maintainers:
    - rxm7706
