# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json

schema_version: 1

context:
  version: "0.0.39"

package:
  name: trustcall
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/t/trustcall/trustcall-${{ version }}.tar.gz
  sha256: ec315818224501b9537ce6b7618dbc21be41210c6e8f2e239169a5a00912cd6e

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - setuptools
  run:
    - python >=${{ python_min }}
    - langgraph >=0.2.25
    - dydantic >=0.0.8,<1.0.0
    - jsonpatch >=1.33,<2.0

tests:
  - python:
      imports:
        - trustcall
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  homepage: https://github.com/hinthornw/trustcall
  repository: https://github.com/hinthornw/trustcall
  summary: Tenacious & trustworthy tool calling built on LangGraph
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - killua156
    - mgorny
