# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json

schema_version: 1

context:
  name: "trustcall"
  version: "0.0.39"
  python_min: "3.10"

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/t/trustcall/trustcall-0.0.39.tar.gz
  sha256: ec315818224501b9537ce6b7618dbc21be41210c6e8f2e239169a5a00912cd6e

build:
  number: 0
  noarch: python
  script: python -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - setuptools
  run:
    - python >=${{ python_min }}
    - langgraph >=0.2.25
    - dydantic <1.0.0,>=0.0.8
    - jsonpatch <2.0,>=1.33

tests:
  - python:
      imports:
        - trustcall
      pip_check: true
      python_version: ["${{ python_min ~ '.*' }}"]

about:
  homepage: https://pypi.org/project/trustcall/
  summary: Tenacious & trustworthy tool calling built on LangGraph
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - killua156
