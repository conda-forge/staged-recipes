schema_version: 1

context:
  version: "0.16.5"

package:
  name: titiler-openeo
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/t/titiler-openeo/titiler_openeo-${{ version }}.tar.gz
  sha256: b763bf96b4f2db99c0111401fcf6a9a36374bd965f2a3e5d6e38b8170187d910

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python >=3.11,<3.14
    - hatchling >=1.25.0
    - pip
  run:
    - python >=3.11,<3.14
    - titiler-core >=2.0,<3.0
    - starlette-cramjam >=0.4,<0.6
    - openeo-pg-parser-networkx ==2026.3.3
    - pystac-client
    - pydantic-settings >=2.0,<3.dev0
    - jsonpath-ng >=1.7.0,<1.8.dev0

tests:
  - python:
      imports:
        - titiler_openeo
      pip_check: true

about:
  summary: TiTiler backend for openEO.
  license: MIT
  license_file: LICENSE
  homepage: https://sentinel-hub.github.io/titiler-openeo/
  repository: https://github.com/sentinel-hub/titiler-openeo
  documentation: https://sentinel-hub.github.io/titiler-openeo/

extra:
  recipe-maintainers:
    - martinRenou
