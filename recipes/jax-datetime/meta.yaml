{% set version = "0.1.0" %}

package:
  name: jax-datetime
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/j/jax-datetime/jax_datetime-{{ version }}.tar.gz
  sha256: 76955cfb76d9246adc33c899149bbf97febd09ab3eaf2101b38ea0467cbd23e3

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python >=3.11
    - setuptools
    - pip
  run:
    - python >=3.11
    - jax
    - numpy

test:
  imports:
    - jax_datetime
  commands:
    - pip check
  requires:
    - pip
    - python

about:
  home: https://pypi.org/project/jax-datetime/
  summary: JAX compatible datetime and timedelta types
  license: Apache-2.0
  license_file: LICENSE

extra:
  recipe-maintainers:
    - mahf708
