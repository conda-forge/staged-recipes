{% set version = "0.0.57" %}

package:
  name: genai-prices
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/g/genai-prices/genai_prices-{{ version }}.tar.gz
  sha256: 6e101e9c53975557ceffa237b0995787d81fe75aac12410f2898504188bcad89

build:
  skip: true  # [py<39]
  entry_points:
    - genai-prices = genai_prices._cli:cli
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python >=3.9
    - uv-build >=0.8.10
    - pip
  run:
    - python >=3.9
    - eval-type-backport >=0.2  # [py<310]
    - httpx >=0.27
    - pydantic >=2.10

test:
  imports:
    - genai_prices
  commands:
    - pip check
    - genai-prices --help
  requires:
    - pip
    - python

about:
  home: https://github.com/pydantic/genai-prices
  summary: Calculate prices for calling LLM inference APIs.
  dev_url: https://github.com/pydantic/genai-prices
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - kklein
