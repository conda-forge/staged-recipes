schema_version: 1

context:
  name: limma
  version: "3.68.4"
  bioc: "3.23"

package:
  name: r-${{ name }}
  version: ${{ version }}

source:
  url: https://bioconductor.org/packages/${{ bioc }}/bioc/src/contrib/${{ name }}_${{ version }}.tar.gz
  md5: 80016f4099c7649492374f89188728db

build:
  number: 0
  script:
    - if: win
      then: build.bat
      else: build.sh
  dynamic_linking:
    rpaths:
      - lib/R/lib/
      - lib/

requirements:
  build:
    - ${{ compiler('c') }}
    - ${{ stdlib('c') }}
    - if: win
      then:
        - m2-base
    - make
  host:
    - r-base
    - r-statmod
  run:
    - r-base
    - r-statmod
  run_exports:
    - ${{ pin_subpackage("r-limma", upper_bound="x.x") }}

tests:
  - script:
      - R -e "library('limma')"

about:
  homepage: https://bioconductor.org/packages/${{ bioc }}/bioc/html/${{ name }}.html
  license: GPL-2.0-or-later
  license_file: DESCRIPTION
  summary: Linear Models for Microarray and Omics Data
  description: |
    Data analysis, linear models and differential expression for omics data.

extra:
  recipe-maintainers:
    - Wainberg
