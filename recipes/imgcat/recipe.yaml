context:
  version: "1.0.22"

package:
  name: imgcat
  version: ${{ version }}

source:
  url: https://github.com/danielgatis/imgcat/archive/refs/tags/v${{ version }}.tar.gz
  sha256: 1ff3ec14ff076f162f48f5273c008014f02168f21fb06784c87e3023abfed767

build:
  number: 0
  skip:
    - win
  script:
    - go build -ldflags="-s -w" -v -o ${PREFIX}/bin/imgcat

requirements:
  build:
    - ${{ compiler("go-nocgo") }}

tests:
  - script:
      - imgcat --help

about:
  homepage: https://github.com/danielgatis/imgcat
  summary: Display images and gifs in your terminal emulator
  license: MIT
  license_file: LICENSE
  repository: https://github.com/danielgatis/imgcat

extra:
  recipe-maintainers:
    - danielgatis
