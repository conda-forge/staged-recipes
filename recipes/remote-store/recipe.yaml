# conda-forge recipe for remote-store
# v1 format (CEP-13 / rattler-build)
#
# Submission: copy this file to conda-forge/staged-recipes as
#   recipes/remote-store/recipe.yaml
# then open a PR against https://github.com/conda-forge/staged-recipes

context:
  version: "0.14.0"
  python_min: "3.10"

package:
  name: remote-store
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/r/remote-store/remote_store-${{ version }}.tar.gz
  sha256: 3e2dcad10b6c1f5a94d16a163179b79ffb7dac26954ef178808ab5f9d1241034

build:
  noarch: python
  script: python -m pip install . --no-deps --no-build-isolation -vv
  number: 0

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - hatchling
  run:
    - python >=${{ python_min }}
  run_constraints:
    # Optional backend dependencies -- not installed automatically, but
    # version-constrained if the user installs them alongside remote-store.
    - s3fs >=2024.2.0
    - paramiko >=2.2
    - tenacity >=4.0
    # >=12.0.0 matches the `arrow` extra; `s3-pyarrow` needs >=14.0.0 but
    # conda run_constraints can only express one bound.  Use the lower pin
    # so arrow-only users aren't blocked; s3-pyarrow users must install
    # pyarrow >=14 themselves (conda can't express per-extra pins).
    - pyarrow >=12.0.0
    - azure-storage-file-datalake >=12.16.0
    - azure-identity >=1.0.0

tests:
  - python:
      imports:
        - remote_store
        - remote_store.ext
        - remote_store.ext.batch
        - remote_store.ext.glob
        - remote_store.ext.transfer
      pip_check: true
      python_version: ${{ python_min }}.*

about:
  homepage: https://github.com/haalfi/remote-store
  summary: "One simple API for file storage -- local, S3, SFTP, Azure"
  description: |
    remote-store provides a unified Python API for file storage across
    backends (Local, S3, SFTP, Azure). Same methods, swappable backends,
    zero reinvention. Core has no dependencies; optional extras add
    cloud backend support.
  license: MIT
  license_file: LICENSE
  documentation: https://remote-store.readthedocs.io/
  repository: https://github.com/haalfi/remote-store

extra:
  recipe-maintainers:
    - haalfi
