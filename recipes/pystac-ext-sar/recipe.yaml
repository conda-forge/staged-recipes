schema_version: 1

context:
  version: "1.0.0"

package:
  name: pystac-ext-sar
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/p/pystac-ext-sar/pystac.extensions.sar-${{ version }}.tar.gz
  sha256: 0d49130fc55152f039f22ac843df35e1c5b2a1a667a4ee91d4a9c5b3ecd379ca

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - hatchling
    - pip
  run:
    - python >=${{ python_min }}
    - pystac-core

tests:
  - python:
      imports:
        - pystac.extensions.sar
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  summary: SAR extension for PySTAC
  license: Apache-2.0
  license_file: LICENSE
  homepage: https://pypi.org/project/pystac-ext-sar/
  documentation: https://pystac.readthedocs.io

extra:
  recipe-maintainers:
    - ocefpaf
