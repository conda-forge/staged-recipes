context:
  version: "1.0.20250804"

package:
  name: niimath
  version: ${{ version }}

source:
  url: https://github.com/rordenlab/niimath/archive/refs/tags/v${{ version }}.tar.gz
  sha256: c9c87ab9c2d3369a6d2235d9bb369f6c666233d6d3069816e6eb96ffff02168c

build:
  number: 0
  # no Windows support in this recipe
  skip:
    - win
  script: build.sh

requirements:
  build:
    - ${{ compiler('c') }}
    - ${{ stdlib('c') }}
    - cmake >=3.10
    - ninja
    - pkg-config
  host:
    - if: osx
      then: llvm-openmp
    - if: linux
      then: libgomp
    - zlib
  run:
    - if: linux
      then: libgomp

tests:
  - script:
      - niimath --help 2>&1 | grep -i "usage\|niimath" || true

about:
  homepage: https://github.com/rordenlab/niimath
  summary: A clone of fslmaths – a general neuroimaging image calculator
  description: |
    niimath emulates the popular fslmaths tool from FSL. It is a general
    image calculator used widely in brain-imaging pipelines. Unlike fslmaths,
    niimath is fully open-source (BSD-2-Clause), compiles on macOS, Linux, and
    Windows, and is designed from the ground up to support OpenMP parallelism
    and optional zstd compression (.nii.zst files).
  license: BSD-2-Clause
  license_file: LICENSE
  repository: https://github.com/rordenlab/niimath

extra:
  recipe-maintainers:
    - hanayik
    - psadil
