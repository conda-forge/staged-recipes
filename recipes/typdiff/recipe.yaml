context:
  version: "0.1.1"

package:
  name: typdiff
  version: ${{ version }}

source:
  url: https://github.com/sou1118/typdiff/archive/refs/tags/v${{ version }}.tar.gz
  sha256: 37170bd94017c75873690eb7760857610c0ad7cd521baa40c1fa4f2efb8e3175

build:
  number: 0
  script:
    env:
      CARGO_PROFILE_RELEASE_STRIP: symbols
      CARGO_PROFILE_RELEASE_LTO: fat
    content:
      - if: unix
        then:
          - cargo auditable install --locked --no-track --bins --root ${{ PREFIX }} --path .
        else:
          - cargo auditable install --locked --no-track --bins --root %LIBRARY_PREFIX% --path .
      - cargo-bundle-licenses --format yaml --output ./THIRDPARTY.yml

requirements:
  build:
    - ${{ stdlib('c') }}
    - ${{ compiler('c') }}
    - ${{ compiler('rust') }}
    - cargo-bundle-licenses
    - cargo-auditable

tests:
  - script: typdiff --help
  - package_contents:
      bin:
        - typdiff
      strict: true

about:
  homepage: https://github.com/sou1118/typdiff
  summary: A diff tool for Typst documents, similar to latexdiff
  description: |
    typdiff compares two Typst source files and generates output highlighting
    changes with added text shown in blue with underline and deleted text in
    red with strikethrough. It uses typst-syntax for parsing and implements
    the Patience diff algorithm for comparison.
  license: Apache-2.0
  license_file:
    - LICENSE
    - THIRDPARTY.yml
  documentation: https://github.com/sou1118/typdiff
  repository: https://github.com/sou1118/typdiff

extra:
  recipe-maintainers:
    - pavelzw
