context:
  version: "0.2.0"

package:
  name: pint-cf
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/p/pint-cf/pint_cf-${{ version }}.tar.gz
  sha256: 7d3b193ee3d51edef277c56a94b8eb4b5d191da6bcd0eee64053550f1e5ddd93

build:
  noarch: python
  script: python -m pip install . -vv
  number: 0

requirements:
  host:
    - python 3.12.*
    - pip
    - setuptools
  run:
    - python >=3.12
    - pint >=0.25.2
    - lark

tests:
  - python:
      imports:
        - pint_cf
      pip_check: true

about:
  homepage: https://github.com/pgamez/pint-cf
  documentation: https://pgamez.github.io/pint-cf/
  repository: https://github.com/pgamez/pint-cf
  summary: CF-compliant unit registry and formatter for Pint
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - pgamez
