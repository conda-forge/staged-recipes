# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "0.5.4"

package:
  name: django-pydantic-field
  version: ${{ version }}

source:
  - url: https://pypi.org/packages/source/d/django-pydantic-field/django_pydantic_field-${{ version }}.tar.gz
    sha256: 3c884299ea777e8221e4c0ff222e078960ba3576a3b6970636629524e5d6cf39

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - uv-build
  run:
    - python >=${{ python_min }}
    - pydantic
    - django
    - typing_extensions

tests:
  - python:
      imports:
        - django_pydantic_field
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  homepage: https://github.com/surenkov/django-pydantic-field
  license: MIT
  license_file: LICENSE
  summary: Type-Safe Pydantic Schemas for Django JSONFields
  description: |
    Type-Safe Pydantic Schemas for Django JSONFields
  repository: https://github.com/surenkov/django-pydantic-field
  documentation: https://github.com/surenkov/django-pydantic-field

extra:
  recipe-maintainers:
    - rxm7706
