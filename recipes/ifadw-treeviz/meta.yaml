{% set python_min = "3.12" %}
{% set version = "1.0.1" %}

package:
  name: ifadw-treeviz
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/i/ifadw-treeviz/ifadw_treeviz-{{ version }}.tar.gz
  sha256: e1a92f7ce625cd93a043cdb19ab7ef17e202d790dd5b9fe3ff542be216a146ff

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python {{ python_min }}.*
    - hatchling
    - pip
  run:
    - python >={{ python_min }}
    - numpy >=2.0
    - plotly >=5.20
    - scikit-learn >=1.4

test:
  imports:
    - ifadw_treeviz
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}.*

about:
  home: https://codeberg.org/IfaDW/ifadw-treeviz
  summary: Sample-conserving decision tree visualization for scikit-learn with Plotly and matplotlib renderers.
  doc_url: https://codeberg.org/IfaDW/ifadw-treeviz

  license: AGPL-3.0-or-later

  license_file: LICENSE 

extra:
  recipe-maintainers:
    - Datagniel
