schema_version: 1

context:
  version: 1.1.0

package:
  name: livekit-blingfire
  version: ${{ version }}

source:
  # No official tag on the repository, but pushed as such to PyPI :(
  # See commit: https://github.com/livekit/agents/commit/3bea770e545b7aa02c2c34cf8f8d8022e5fbd1ed
  url: https://github.com/livekit/agents/archive/3bea770e545b7aa02c2c34cf8f8d8022e5fbd1ed.tar.gz
  sha256: f63e8a96189786f3c4e8d4cfa618d6ccbb7e01e4b931e12da47b1a75de08228b

build:
  number: 0
  script: ${{ PYTHON }} -m pip install livekit-plugins/livekit-blingfire -vv --no-deps --no-build-isolation

requirements:
  build:
    - if: build_platform != target_platform
      then: 
        - python
        - cross-python_${{ target_platform }}
        - pybind11
    - ${{ compiler('cxx') }}
    - ${{ stdlib("c") }}
    - cmake
    - if: unix
      then: make
  host:
    - python
    - pybind11
    - pip
    - setuptools
  run:
    - python

tests:
  - python:
      imports:
        - livekit.blingfire
        - lk_blingfire

about:
  license: Apache-2.0
  license_file: LICENSE
  summary: BlingFire bindings for LiveKit Agents
  homepage: https://github.com/livekit/agents/blob/main/livekit-plugins/livekit-blingfire
  repository: https://github.com/livekit/agents

extra:
  recipe-maintainers:
    - conda-forge/livekit
