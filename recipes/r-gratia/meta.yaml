{% set version = '0.11.2' %}
{% set posix = 'm2-' if win else '' %}

package:
  name: r-gratia
  version: {{ version|replace("-", "_") }}

source:
  url:
    - {{ cran_mirror }}/src/contrib/gratia_{{ version }}.tar.gz
    - {{ cran_mirror }}/src/contrib/Archive/gratia/gratia_{{ version }}.tar.gz
  sha256: f2c5f9ded3637e7748c58022651eee9987a17b9e7e815039004ea3b9e8f06e23

build:
  number: 0
  noarch: generic
  rpaths:
    - lib/R/lib/
    - lib/
  missing_dso_whitelist:
    - '*/R.dll'        # [win]
    - '*/Rblas.dll'    # [win]
    - '*/Rlapack.dll'  # [win]

requirements:
  build:
    - {{ posix }}zip               # [win]
    - cross-r-base {{ r_base }}    # [build_platform != target_platform]
  host:
    - r-base
    - r-cli
    - r-dplyr >=1.2.0
    - r-ggokabeito
    - r-ggplot2 >=3.5.0
    - r-lifecycle
    - r-mgcv >=1.9_0
    - r-mirai
    - r-mvnfast
    - r-nlme
    - r-patchwork >=1.2.0
    - r-pillar
    - r-purrr >=1.1.0
    - r-rlang
    - r-scales
    - r-stringr
    - r-tibble >=3.0.0
    - r-tidyr
    - r-tidyselect >=1.2.0
    - r-tweedie >=2.3.5
    - r-vctrs
    - r-withr
  run:
    - r-base
    - r-cli
    - r-dplyr >=1.2.0
    - r-ggokabeito
    - r-ggplot2 >=3.5.0
    - r-lifecycle
    - r-mgcv >=1.9_0
    - r-mirai
    - r-mvnfast
    - r-nlme
    - r-patchwork >=1.2.0
    - r-pillar
    - r-purrr >=1.1.0
    - r-rlang
    - r-scales
    - r-stringr
    - r-tibble >=3.0.0
    - r-tidyr
    - r-tidyselect >=1.2.0
    - r-tweedie >=2.3.5
    - r-vctrs
    - r-withr

test:
  commands:
    - $R -e "library('gratia')"           # [not win]
    - "\"%R%\" -e \"library('gratia')\""  # [win]

about:
  home: https://gavinsimpson.github.io/gratia/
  license: MIT
  summary: Graceful 'ggplot'-based graphics and utility functions for working with generalized
    additive models (GAMs) fitted using the 'mgcv' package. Provides a reimplementation
    of the plot() method for GAMs that 'mgcv' provides, as well as 'tidyverse' compatible
    representations of estimated smooths.
  license_family: MIT
  license_file:
    - '{{ environ["PREFIX"] }}/lib/R/share/licenses/MIT'
    - LICENSE

extra:
  recipe-maintainers:
    - conda-forge/r
    - funnell

