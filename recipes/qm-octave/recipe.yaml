schema_version: 1

context:
  version: 2.1.6
  python_min: "3.9"

package:
  name: qm-octave
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/q/qm-octave/qm_octave-${{ version }}.tar.gz
  sha256: 8a16e6a8c76b060bc2856020a3f54f2e6d936ffc24e2b7963376ce990a8110be

build:
  noarch: python
  number: 0
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - poetry-core
    - pip
  run:
    - python >=${{ python_min }},<3.13
    - betterproto 2.0.0b7.*
    - grpcio >=1.59.2,<2.0.0
    - protobuf >=4.24,<7
    - grpclib >=0.4.3rc3,<0.5.0

tests:
  - requirements:
      run:
        - pip
        - python ${{ python_min }}.*
    script:
      - pip check

about:
  summary: SDK to control an Octave with QUA
  license: BSD-3-Clause
  license_file: LICENSE
  homepage: https://pypi.org/project/qm-octave/

extra:
  recipe-maintainers:
    - noya-gol
