{% set name = "ssqueezepy" %}
{% set version = "0.6.6" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz
  sha256: 1c6e4417db1623e26d1264a6b89e5ca212cea24b2c9de9002c3ea13c791ba625

build:
  noarch: python
  number: 0
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python {{ python_min }}
    - pip
    - setuptools
    - wheel
  run:
    - python >={{ python_min }}
    - numpy
    - numba
    - scipy

test:
  imports:
    - ssqueezepy
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://github.com/OverLordGoldDragon/ssqueezepy
  summary: Synchrosqueezing, wavelet transforms, and time-frequency analysis in Python
  license: MIT
  license_file: LICENSE
  dev_url: https://github.com/OverLordGoldDragon/ssqueezepy

extra:
  recipe-maintainers:
    - nup002
