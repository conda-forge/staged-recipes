{% set version = "25.1.6" %}

package:
  name: balena-cli
  version: {{ version }}

source:
  url: https://github.com/balena-io/balena-cli/releases/download/v{{ version }}/balena-cli-v{{ version }}-linux-x64-standalone.tar.gz
  sha256: 55148065a7f364baca7c790b24c14db8816521547dd3113b340cf4f591a1f197

build:
  number: 0
  skip: true  # [not (linux and x86_64)]

requirements:
  run:
    - __glibc >=2.17

test:
  commands:
    - balena version

about:
  home: https://github.com/balena-io/balena-cli
  license: Apache-2.0
  license_family: Apache
  license_file: LICENSE
  summary: The official balena CLI tool
  description: |
    The balena CLI is a Command Line Interface for balenaCloud or openBalena.
    It can be used to manage fleets, devices, and projects. The CLI can also
    be used to develop balenaOS-based applications locally with balena preload
    and push commands.
  dev_url: https://github.com/balena-io/balena-cli
  doc_url: https://docs.balena.io/reference/balena-cli/

extra:
  recipe-maintainers:
    - nobleo
