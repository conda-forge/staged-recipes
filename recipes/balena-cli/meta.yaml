{% set version = "25.1.6" %}

package:
  name: balena-cli
  version: {{ version }}

source:
  url: https://github.com/balena-io/balena-cli/archive/refs/tags/v{{ version }}.tar.gz
  sha256: 44b292ce1a835506532b006366742d3c3f74b65f112748f15c7a90ff4fca1aa2

build:
  number: 0
  skip: true  # [not linux]
  ignore_run_exports:
    - nodejs
  # Native node modules ship prebuilt .node files that link to system libs
  missing_dso_whitelist:
    - /lib64/libc.so.6
    - /lib64/libm.so.6
    - /lib64/libpthread.so.0
    - /lib64/libdl.so.2
    - /lib64/ld-linux-x86-64.so.2
    - "**/libudev.so.1"

requirements:
  host:
    - nodejs >=24.11.0,<26
    - make
    - {{ compiler('cxx') }}
  run:
    - nodejs >=24.11.0,<26

test:
  commands:
    - balena version

about:
  home: https://github.com/balena-io/balena-cli
  license: Apache-2.0
  license_family: Apache
  license_file: LICENSE
  summary: The official balena CLI tool
  description: |
    The balena CLI is a Command Line Interface for balenaCloud or openBalena.
    It can be used to manage fleets, devices, and projects. The CLI can also
    be used to develop balenaOS-based applications locally with balena preload
    and push commands.
  dev_url: https://github.com/balena-io/balena-cli
  doc_url: https://docs.balena.io/reference/balena-cli/

extra:
  recipe-maintainers:
    - Timple
