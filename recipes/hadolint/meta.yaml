{% set name = "hadolint" %}
{% set version = "2.14.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  - url: https://github.com/hadolint/hadolint/releases/download/v{{ version }}/{{ name }}-linux-x86_64  # [linux-64]
    sha256: 6bf226944684f56c84dd014e8b979d27425c0148f61b3bd99bcc6f39e9dc5a47  # [linux-64]
  - url: https://github.com/hadolint/hadolint/releases/download/v{{ version }}/hadolint-linux-arm64  # [linux-aarch64]
    sha256: 331f1d3511b84a4f1e3d18d52fec284723e4019552f4f47b19322a53ce9a40ed  # [linux-aarch64]
  - url: https://github.com/hadolint/hadolint/releases/download/v{{ version }}/hadolint-macos-x86_64  # [osx-64]
    sha256: 2b69a853433f1eca522ffb921cd490bd1321424d03331fd8390f93b7fb4a02e9  # [osx-64]
  - url: https://github.com/hadolint/hadolint/releases/download/v{{ version }}/hadolint-macos-arm64  # [osx-arm64]
    sha256: 3625e2e9f43dcfe7bd38738a5f5520ed50ce39ed28485266e6803dd7bc197b10  # [osx-arm64]
  - url: https://github.com/hadolint/hadolint/releases/download/v{{ version }}/hadolint-windows-x86_64.exe  # [win-64]
    sha256: 8e0ee174f88edb14f207a68430c7a53c2883ed509cdbde9a3a26fffa140fa5e4  # [win-64]
  - url: https://github.com/hadolint/hadolint/archive/refs/tags/v{{ version }}.tar.gz
    sha256: 002a411ac608696327d65aaa6e77c8fafe2561429ce56cca0ccb67c2956f8dd5

build:
  number: 0
  skip: true  # [win and not x86_64]

test:
  commands:
    - hadolint --version

about:
  home: https://github.com/hadolint/hadolint
  license: GPL-3.0-only
  license_file:
    - LICENSE
    - ThirdPartyNotices.txt
  summary: Dockerfile linter, validate inline bash, written in Haskell
  description: |
    Hadolint is a smarter Dockerfile linter that checks Dockerfiles
    for common mistakes and best practices.
  doc_url: https://github.com/hadolint/hadolint
  dev_url: https://github.com/hadolint/hadolint

extra:
  recipe-maintainers:
    - brycekbargar
