context:
  version: "0.1.0"

package:
  name: zeus-bilby
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/z/zeus-bilby/zeus_bilby-${{ version }}.tar.gz
  sha256: db78db27f0423ef9e403c9beadc8f4360d49661fb0907e0835f04b58f9018502

build:
  noarch: python
  number: 0
  script: python -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - setuptools >=45
    - setuptools-scm >=6.2
  run:
    - python >=${{ python_min }}
    - bilby >=2.3.0
    - zeus-mcmc >=2.3.0

tests:
  - python:
      imports:
        - zeus_bilby
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  homepage: https://github.com/bilby-dev/zeus-bilby
  repository: https://github.com/bilby-dev/zeus-bilby
  summary: Plugin for using zeus with bilby.
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - ColmTalbot
    - mj-will
