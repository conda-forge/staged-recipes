schema_version: 1

context:
  version: "0.1.0"

package:
  name: fastspec
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/f/fastspec/fastspec-${{ version }}.tar.gz
  sha256: b81a01ecdf1f8995eb6c25eb32a3f8dabbd37c9a238432c907b88449590b269d

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - setuptools >=64
    - pip
  run:
    - python >=${{ python_min }}
    - fastcore >=1.14.3
    - httpx

tests:
  - python:
      imports:
        - fastspec
      pip_check: true
      python_version: 
        - ${{ python_min }}.*
        - "*"

about:
  summary: Dynamic OpenAPI and discovery spec client for Python — turn any API spec into a fully-typed async client with attribute chaining, streaming, and file uploads
  license: Apache-2.0
  license_file: LICENSE
  homepage: https://pypi.org/project/fastspec/
  documentation: https://AnswerDotAI.github.io/fastspec/

extra:
  recipe-maintainers:
    - thewchan
