context:
  version: 5.1.4

package:
  name: spot-cpp-sdk
  version: ${{ version }}

source:
  url: https://github.com/boston-dynamics/spot-cpp-sdk/archive/refs/tags/v${{ version }}.zip
  sha256: a5aa0b1d3fc4b58282d8fd94e9b89cb561d245403a472208312527cc13a37776
  patches:
    - 01-fix-protobuf-stringview.patch
    - 02-fix-grpc-deadline.osx.patch
    - 03-fix-proto-shared-linkage.osx.patch

build:
  number: 0
  script:
    - if: unix
      then:
        # Suppress deprecated warnings.
        - export CFLAGS="${CFLAGS} -Wno-deprecated-declarations"
        - export CXXFLAGS="${CXXFLAGS} -Wno-deprecated-declarations"
        # Configure C++ project.
        - echo ${CMAKE_ARGS}
        - cmake -S cpp/ -B build/
          ${CMAKE_ARGS}
          -DCMAKE_FIND_PACKAGE_PREFER_CONFIG=ON
          -GNinja
    - if: win
      then:
        # Configure C++ project.
        # Define NOMINMAX to avoid Windows SDK min/max macros colliding with gRPC
        # names in memory_request.h that otherwise cause C2059/C2143 syntax errors.
        # Define /WX- to disable "Warnings as Errors".
        # Define /wd4267 and /wd4996 to silence deprecated API warnings.
        # Define /EHsc to enable C++ exception handling (unwind semantics).
        # Define WIN32_LEAN_AND_MEAN to exclude rarely-used Windows headers to avoid macro collisions.
        # Define /DDWORD=SDK_DWORD to globally rename 'DWORD' to avoid collisions between the Windows macro and BD API.
        - echo %CMAKE_ARGS%
        - cmake -S cpp/ -B build/
          ${CMAKE_ARGS}
          -DCMAKE_FIND_PACKAGE_PREFER_CONFIG=ON
          -DCMAKE_CXX_FLAGS="%CXXFLAGS% /DNOMINMAX /wd4267 /wd4996 /WX- /EHsc /DWIN32_LEAN_AND_MEAN /DDWORD=SDK_DWORD"
          -GNinja
    # Build and install C++ project.
    - cmake --build build/ --config Release
    - cmake --install build/ --config Release

requirements:
  build:
    - ${{ stdlib('c') }}
    - ${{ compiler('c') }}
    - ${{ compiler('cxx') }}
    - cmake
    - ninja
  host:
    - cli11
    - eigen-abi-devel <5
    - libabseil
    - libgrpc
    - libprotobuf
  run:
    - cli11
    - eigen

tests:
  - script:
      - cmake-package-check bosdyn --targets bosdyn_client bosdyn_client_static
      - cmake-package-check bosdyn --targets bosdyn_api bosdyn_api_obj bosdyn_api_static
      - cmake-package-check bosdyn --targets bosdyn_api bosdyn_choreography_protos_obj bosdyn_choreography_protos bosdyn_choreography_protos_static
    requirements:
      run:
        - ${{ compiler('c') }}
        - ${{ compiler('cxx') }}
        - cmake-package-check

about:
  homepage: https://github.com/boston-dynamics/spot-cpp-sdk
  license: LicenseRef-BostonDynamics
  license_file: LICENSE
  repository: https://github.com/boston-dynamics/spot-cpp-sdk
  summary: Develop applications and payloads for Spot using the Boston Dynamics Spot C++ SDK.

extra:
  recipe-maintainers:
    - diegoferigo
