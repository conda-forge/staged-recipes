# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  name: sema4ai-common
  version: "0.3.0"
  python_min: "3.11"

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/${{ name[0] }}/${{ name }}/sema4ai_common-${{ version }}.tar.gz
  sha256: d6ce3276c72fa18ca913e7dd1462e529dce01ddd92380b76d89bbcd41e49ec75

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - poetry-core
    - pip
  run:
    - python >=${{ python_min }},<4
    - psutil >=5.0,<7.0
    - sema4ai-http-helper >=2.0.0,<3.0.0
    - pyyaml >=6.0.0,<7.0.0
    - msgspec >=0.18

tests:
  - python:
      imports:
        - sema4ai.common
      pip_check: true
      python_version: ${{ python_min }}.*

about:
  summary: Sema4AI Common
  license: Apache-2.0
  license_file: LICENSE
  homepage: https://github.com/Sema4AI/actions/

extra:
  recipe-maintainers:
    - rxm7706
