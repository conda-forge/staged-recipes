{% set version = '0.1.0' %}
{% set posix = 'm2-' if win else '' %}

package:
  name: r-arg
  version: {{ version|replace("-", "_") }}

source:
  url:
    - {{ cran_mirror }}/src/contrib/arg_{{ version }}.tar.gz
    - {{ cran_mirror }}/src/contrib/Archive/arg/arg_{{ version }}.tar.gz
  sha256: be0f39ad10c184dee801001fa86382c4b34826a16a58f0d4ce456b73c3af3aed

build:
  number: 0
  noarch: generic
  rpaths:
    - lib/R/lib/
    - lib/
  missing_dso_whitelist:
    - '*/R.dll'        # [win]
    - '*/Rblas.dll'    # [win]
    - '*/Rlapack.dll'  # [win]

requirements:
  build:
    - {{ posix }}zip               # [win]
    - cross-r-base {{ r_base }}    # [build_platform != target_platform]
  host:
    - r-base
    - r-cli >=3.6.4
    - r-rlang >=1.1.0
  run:
    - r-base
    - r-cli >=3.6.4
    - r-rlang >=1.1.0

test:
  commands:
    - $R -e "library('arg')"           # [not win]
    - "\"%R%\" -e \"library('arg')\""  # [win]

about:
  home: https://ngreifer.github.io/arg/
  dev_url: https://github.com/ngreifer/arg
  license: GPL-2.0-or-later
  summary: Checks function arguments, ideally for use in R packages. Uses a simple interface
    and produces clean, informative error messages using 'cli'.
  license_family: GPL2
  license_file:
    - '{{ environ["PREFIX"] }}/lib/R/share/licenses/GPL-2'

extra:
  recipe-maintainers:
    - conda-forge/r
