context:
  version: "0.18.0"

package:
  name: llm-github-models
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/l/llm-github-models/llm_github_models-${{ version }}.tar.gz
  sha256: b778aa6fa43e53ecb3b868fcf9875bc0e760a774a1fad76ea907a269582a2043

build:
  noarch: python
  script: python -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - setuptools
  run:
    - python >=${{ python_min }}
    - aiohttp >=3.11.18
    - llm >=0.26
    - azure-ai-inference >=1.0.0b8

tests:
  - python:
      imports:
        - llm_github_models
      pip_check: true
      python_version: ${{ python_min }}.*

about:
  homepage: https://github.com/tonybaloney/llm-github-models
  summary: LLM plugin to access GitHub Models API
  description: |
    A plugin for the llm CLI tool that provides access to GitHub Models API
    via the Azure AI Inference SDK. GitHub Models is available to all GitHub
    users and offers free usage of many AI LLMs including GPT-4o, DeepSeek-R1,
    Llama, and more.
  license: Apache-2.0
  license_file: LICENSE
  repository: https://github.com/tonybaloney/llm-github-models

extra:
  recipe-maintainers:
    - melund
