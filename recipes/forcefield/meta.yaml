{% set name = "forcefield" %}
{% set version = "0.7.2" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz
  sha256: 9e30bb59d167a6f3dc7dbbab67739a8ad94294f86e7824ba3b4f0b7e2cab7b35

build:
  noarch: python
  number: 0
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  entry_points:
    - forcefield = forcefield.cli:main

requirements:
  host:
    - python >=3.9
    - pip
    - setuptools >=68.0
    - wheel
  run:
    - python >=3.9

test:
  imports:
    - forcefield
  commands:
    - forcefield --help
    - python -c "import forcefield; g = forcefield.Guard(); r = g.selftest(); assert r.detected > 0"

about:
  home: https://datasciencetech.ca/en/python-sdk
  summary: Zero-dependency AI security library -- prompt-injection detection, PII redaction, content safety, rate limiting, abuse detection, tool governance, constitutions, evals, and audit reports for LLMs.
  description: |
    ForceField is a lightweight AI security scanner for Python. Detect prompt
    injection, PII leaks, LLM attacks, abuse, and more in 3 lines of code.
    Zero runtime dependencies for the base install. Optional ML extras
    available via pip install forcefield[ml].
  license: Apache-2.0
  license_family: Apache
  license_file: LICENSE
  doc_url: https://datasciencetech.ca/en/python-sdk
  dev_url: https://github.com/Data-ScienceTech/forcefield

extra:
  recipe-maintainers:
    - carlosdenner
