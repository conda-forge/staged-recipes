schema_version: 1

context:
  python_min: "3.9"
  version: "1.1.6"

package:
  name: qmctoolscl
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/q/qmctoolscl/qmctoolscl-${{ version }}.tar.gz
  sha256: aea7b0563203014cf1c1de58a2a1a8680c9791d6dceafad9cb1447502fbaffab

build:
  number: 0
  skip:
    - win
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  build:
    - ${{ compiler('c') }}
  host:
    - python ${{ python_min }}.*
    - setuptools
    - pip
  run:
    - python >=${{ python_min }}
    - numpy >=1.17.0

tests:
  - python:
      imports:
        - qmctoolscl
      pip_check: true

about:
  summary: Quasi-Monte Carlo Tools in PyOpenCL and C
  license: Apache-2.0
  license_file: LICENSE
  homepage: https://qmcsoftware.github.io/QMCToolsCL/

extra:
  recipe-maintainers:
    - zitterbewegung
