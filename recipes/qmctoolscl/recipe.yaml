schema_version: 1

context:
  version: "1.2.3"

package:
  name: qmctoolscl
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/q/qmctoolscl/qmctoolscl-${{ version }}.tar.gz
  sha256: 0aa1d41f5724409934a2650e0c58fa457f5524ffa5be1924f68f0e4760df44c9

build:
  number: 0
  skip:
    - win
    - match(python, "<3.9")
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  build:
    - ${{ compiler('c') }}
    - ${{ stdlib('c') }}
  host:
    - python
    - pdm-backend
    - setuptools
    - wheel
    - pip
  run:
    - python
    - numpy >=1.17.0

tests:
  - python:
      imports:
        - qmctoolscl
      pip_check: true
  - script:
      - python -c "from qmctoolscl import util; assert util.get_unsigned_long_size_c() in (4, 8)"

about:
  summary: Quasi-Monte Carlo Tools in C and PyOpenCL
  license: Apache-2.0
  license_file: LICENSE
  homepage: https://qmcsoftware.github.io/QMCToolsCL/

extra:
  recipe-maintainers:
    - zitterbewegung
