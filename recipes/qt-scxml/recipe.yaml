context:
  version: "6.11.0"
  maj_min: ${{ (version | split('.'))[:2] | join('.') }}

package:
  name: qt6-scxml
  version: ${{ version }}

source:
  url: https://download.qt.io/official_releases/qt/${{ maj_min }}/${{ version }}/submodules/qtscxml-everywhere-src-${{ version }}.tar.xz
  md5: 906e04c7e6596cb12f88abb03bbe5760

build:
  number: 0

requirements:
  build:
    - cmake
    - ninja
    - perl
    - ${{ compiler('cxx') }}
    - ${{ compiler('c') }}
    - ${{ stdlib("c") }}
    - if: build_platform != target_platform
      then: qt6-main ${{ version }}.*
  host:
    - qt6-main ${{ version }}.*
  run:
    - qt6-main ${{ version }}.*
  run_exports:
    - ${{ pin_subpackage('qt6-scxml', upper_bound='x.x') }}

tests:
  - package_contents:
      include:
        - qt6/QtScxml/qscxmlglobals.h
        - qt6/QtStateMachine/qstatemachine.h
      lib:
        - Qt6Scxml
        - Qt6StateMachine

about:
  homepage: http://qt-project.org
  license: GPL-3.0-only
  license_file:
    - LICENSES/GPL-3.0-only.txt
    - LICENSES/BSD-3-Clause.txt
    - LICENSES/GFDL-1.3-no-invariants-only.txt
    - LICENSES/LicenseRef-Qt-Commercial.txt
  summary: Qt SCXML module
  description: |
    The Qt SCXML module provides functionality to create state machines from SCXML files. This includes both dynamically creating state machines (loading the SCXML file and instantiating states and transitions) and generating a C++ file that has a class implementing the state machine. It also contains functionality to support data models and executable content.
  documentation: https://doc.qt.io/qt-6/qtscxml-index.html
  repository: https://github.com/qt/qtscxml

extra:
  recipe-maintainers:
    - AndreFavotto
    - conda-forge/qt-main
  feedstock-name: qt-scxml
