schema_version: 1

context:
  version: "1.15.1"

package:
  name: pystac-core
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/p/pystac-core/pystac_core-${{ version }}.tar.gz
  sha256: c24e50176035cc49b99a40a13da12115cab0b05c97ebac64c5e3ca8330d47b41

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - hatchling
    - pip
  run:
    - python >=${{ python_min }}
    - python-dateutil >=2.7.0

tests:
  - python:
      imports:
        - pystac_core
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  summary: Core functionality for PySTAC without extensions. Most users will want to use pystac, not this package
  license: Apache-2.0
  license_file: PLEASE_ADD_LICENSE_FILE
  homepage: https://pypi.org/project/pystac-core/
  documentation: https://pystac.readthedocs.io

extra:
  recipe-maintainers:
    - ocefpaf
