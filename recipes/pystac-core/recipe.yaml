schema_version: 1

context:
  version: "1.15.1"

package:
  name: pystac-core
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/p/pystac-core/pystac_core-${{ version }}.tar.gz
  sha256: c24e50176035cc49b99a40a13da12115cab0b05c97ebac64c5e3ca8330d47b41

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - hatchling
    - pip
  run:
    - python >=${{ python_min }}
    - python-dateutil >=2.7.0
    - pystac-core
    - pystac-ext-classification
    - pystac-ext-datacube
    - pystac-ext-eo
    - pystac-ext-file
    - pystac-ext-grid
    - pystac-ext-item-assets
    - pystac-ext-label
    - pystac-ext-mgrs
    - pystac-ext-mlm
    - pystac-ext-pointcloud
    - pystac-ext-projection
    - pystac-ext-raster
    - pystac-ext-render
    - pystac-ext-sar
    - pystac-ext-sat
    - pystac-ext-scientific
    - pystac-ext-storage
    - pystac-ext-table
    - pystac-ext-timestamps
    - pystac-ext-version
    - pystac-ext-view
    - pystac-ext-xarray-assets

tests:
  - python:
      # imports:
      #   - pystac
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  summary: Core functionality for PySTAC without extensions. Most users will want to use pystac, not this package
  license: Apache-2.0
  license_file: LICENSE
  homepage: https://pypi.org/project/pystac-core/
  documentation: https://pystac.readthedocs.io

extra:
  recipe-maintainers:
    - ocefpaf
