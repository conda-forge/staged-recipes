# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "1.0.0"

package:
  name: langchain-elasticsearch
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/l/langchain-elasticsearch/langchain_elasticsearch-${{ version }}.tar.gz
  sha256: 9211f9507c412e4b0642b9686eab3124e000a30c1f600f2edb8193d0710ad305

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - poetry-core >=1.0.0
    - pip
  run:
    - python >=${{ python_min }}
    - langchain-core >=1.0.0,<2.0.0
    - elasticsearch >=8.19.0,<9.0.0
    - numpy >=1
    - simsimd >=3

tests:
  - python:
      imports:
        - langchain_elasticsearch
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  homepage: https://pypi.org/project/langchain-elasticsearch/
  license: MIT
  license_file: LICENSE
  summary: An integration package connecting Elasticsearch and LangChain
  repository: https://github.com/langchain-ai/langchain-elastic
  documentation: https://python.langchain.com/docs/integrations/providers/elasticsearch/
  description: |
    langchain-elasticsearch is the LangChain partner package for
    Elasticsearch. It provides vector stores, retrievers, caches, chat
    message history, and embeddings backed by Elasticsearch, integrating
    Elasticsearch's search and vector capabilities with the LangChain
    framework.

extra:
  recipe-maintainers:
    - rxm7706
