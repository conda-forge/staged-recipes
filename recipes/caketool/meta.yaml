{% set name = "caketool" %}
{% set version = "1.8.3" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.io/packages/source/{{ name[0] }}/{{ name }}/caketool-{{ version }}.tar.gz
  sha256: 85ff8adc01251153ecd31305a9687f3465f10a4a635f3b7ccc0649bfd3ab6c19

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python >=3.10
    - pip
    - setuptools
    - setuptools-scm
  run:
    - python >=3.10
    - numpy >=1.24
    - pandas >=2.0
    - scikit-learn >=1.3
    - scipy >=1.10
    - tqdm >=4.60
    - xgboost >=2.0
    - category-encoders >=2.6
    - python-dotenv >=1.0
    - shap >=0.45
    - plotly >=5.0
    - nbformat >=5.0

test:
  imports:
    - caketool
  commands:
    - pip check
  requires:
    - pip

about:
  home: https://github.com/mazino2d/caketool
  summary: "Common tools for MLOps"
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - mazino2d
