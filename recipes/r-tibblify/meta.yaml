{% set version = '0.3.1' %}
{% set posix = 'm2-' if win else '' %}

package:
  name: r-tibblify
  version: {{ version|replace("-", "_") }}

source:
  url: {{ cran_mirror }}/src/contrib/Archive/tibblify/tibblify_{{ version }}.tar.gz
  sha256: 47a5bf6c12885aee3c6f4c20c8216e9696873b245537436b8cba0cc70d7ebe98

build:
  number: 0
  rpaths:
    - lib/R/lib/
    - lib/
  missing_dso_whitelist:
    - '*/R.dll'        # [win]
    - '*/Rblas.dll'    # [win]
    - '*/Rlapack.dll'  # [win]

requirements:
  build:
    - {{ compiler('c') }}              # [not win]
    - {{ compiler('m2w64_c') }}        # [win]
    - {{ compiler('cxx') }}            # [not win]
    - {{ compiler('m2w64_cxx') }}      # [win]
    - {{ stdlib("c") }}
    - {{ posix }}filesystem        # [win]
    - {{ posix }}make
    - {{ posix }}sed               # [win]
    - {{ posix }}coreutils         # [win]
    - {{ posix }}zip               # [win]
    - cross-r-base {{ r_base }}    # [build_platform != target_platform]
  host:
    - r-base
    - r-cli >=3.6.2
    - r-lifecycle >=1.0.4
    - r-purrr >=1.0.2
    - r-rlang >=1.1.3
    - r-tibble >=3.2.1
    - r-tidyselect >=1.2.0
    - r-vctrs >=0.6.5
    - r-withr >=2.5.2
  run:
    - r-base
    - r-cli >=3.6.2
    - r-lifecycle >=1.0.4
    - r-purrr >=1.0.2
    - r-rlang >=1.1.3
    - r-tibble >=3.2.1
    - r-tidyselect >=1.2.0
    - r-vctrs >=0.6.5
    - r-withr >=2.5.2

test:
  commands:
    - $R -e "library('tibblify')"           # [not win]
    - "\"%R%\" -e \"library('tibblify')\""  # [win]

about:
  home: https://github.com/mgirlich/tibblify, https://mgirlich.github.io/tibblify/
  license: GPL-3.0-only
  summary: A tool to rectangle a nested list, that is to convert it into a tibble. This is done
    automatically or according to a given specification.  A common use case is for nested
    lists coming from parsing JSON files or the JSON response of REST APIs. It is supported
    by the 'vctrs' package and therefore offers a wide support of vector types.
  license_family: GPL3
  license_file:
    - '{{ environ["PREFIX"] }}/lib/R/share/licenses/GPL-3'

extra:
  recipe-maintainers:
    - conda-forge/r
    - Mathmath34

