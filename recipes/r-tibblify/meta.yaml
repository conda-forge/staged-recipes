{% set name = "r-tibblify" %}
{% set version = "0.3.1" %}

package:
  name: {{ name }}
  version: {{ version }}

source:
  url: https://github.com/wranglezone/tibblify/releases/tag/v{{  version  }}/v{{ version }}.tar.gz
  sha256:  de035958246e82e3707138a5b79ad4b40db29e799b7e6cad52e7e001b5a384a8

build:
  number: 0
  noarch: generic
  script: R CMD INSTALL --no-build-vignettes --no-multiarch .

requirements:
  host:
    - r-base >=4.1.0
    - r-cli >= 3.6.2
    - r-purrr >= 1.0.2 
    - r-rlang >= 1.1.0
    - r-tibble >= 3.2.1
    - r-vctrs
  run:
    - r-base >=4.1.0
    - r-cli >= 3.6.2
    - r-purrr >= 1.0.2 
    - r-rlang >= 1.1.0
    - r-tibble >= 3.2.1
    - r-vctrs

test:
  source_files:
    - tests
  imports:
    - r-tibblify

about:
  home: https://github.com/mgirlich/tibblify
  license: MIT
  license_file: LICENSE
  summary: The goal of tibblify is to provide an easy way to convert a nested list into a tibble.

extra:
  recipe-maintainers:
    - Mathmath34