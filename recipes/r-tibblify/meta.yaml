{% set name = "r-tibblify" %}
{% set version = "0.3.1" %}

package:
  name: {{ name }}
  version: {{ version }}

source:
  url: https://github.com/wranglezone/tibblify/archive/refs/tags/v{{ version }}.tar.gz
  sha256:  6e291743a5b61baffc3977c49ad5a634b6be55be827be43918df6a50c6e4f10e

build:
  number: 0
  script: R CMD INSTALL --no-build-vignettes --no-multiarch .

requirements:
  build:
    - {{ compiler('c') }}
    - {{ compiler('cxx') }}
    - {{ stdlib("c") }}
  host:
    - r-base
    - r-cli >=3.6.2
    - r-purrr >=1.0.2 
    - r-rlang >=1.1.0
    - r-tibble >=3.2.1
    - r-vctrs
    - r-tidyselect
    - r-withr
  run:
    - r-base

test:
  source_files:
    - tests
  imports:
    - r-tibblify

about:
  home: https://github.com/wranglezone/tibblify
  license: MIT
  license_file: LICENSE
  summary: The goal of tibblify is to provide an easy way to convert a nested list into a tibble.

extra:
  recipe-maintainers:
    - Mathmath34
