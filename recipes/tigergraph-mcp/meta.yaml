{% set version = "1.0.0" %}
{% set python_min = "3.10" %}

package:
  name: tigergraph-mcp
  version: "{{ version }}"

source:
  url: https://pypi.org/packages/source/t/tigergraph-mcp/tigergraph_mcp-{{ version }}.tar.gz
  sha256: 6672b199299d8c7a2ae4cd9f2d2df21a3f25a99e3318cd6030c1182b0774569b

build:
  number: 0
  noarch: python
  script: {{ PYTHON }} -m pip install . --no-deps -vv
  entry_points:
    - tigergraph-mcp = tigergraph_mcp.main:main

requirements:
  host:
    - python {{ python_min }}
    - pip
    - setuptools
    - wheel
  run:
    - python >={{ python_min }}
    - pytigergraph >=2.0.2
    - mcp >=1.0.0
    - pydantic >=2.0.0
    - click
    - python-dotenv >=1.0.0

test:
  imports:
    - tigergraph_mcp
  requires:
    - python {{ python_min }}

about:
  home: https://github.com/tigergraph/tigergraph-mcp
  license: Apache-2.0
  license_family: Apache
  license_file: LICENSE
  summary: Model Context Protocol (MCP) server for TigerGraph

extra:
  recipe-maintainers:
    - chengbiao-jin
