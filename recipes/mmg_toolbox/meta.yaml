{% set python_min = "3.10" %}
{% set version = "0.6.2" %}

package:
  name: mmg_toolbox
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/m/mmg_toolbox/mmg_toolbox-{{ version }}.tar.gz
  sha256: 1b7bedde279fb4a270fe6d350b274da2ee5125c10d2674e5751810a6d36695fa

build:
  entry_points:
    - dataviewer = mmg_toolbox.tkguis:cli_run
    - create_notebooks = mmg_toolbox.scripts.experiment_startup:cli_create_notebooks
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python {{ python_min }}.*
    - setuptools >=61.0
    - wheel
    - pip
  run:
    - python >={{ python_min }}
    - numpy
    - h5py
    - hdf5plugin
    - hdfmap >=1.1.0
    - matplotlib-base
    - imageio
    - scipy
    - lmfit
    - stomp.py

test:
  imports:
    - mmg_toolbox
  commands:
    - pip check
    - dataviewer --help
    - create_notebooks --help
  requires:
    - pip
    - python {{ python_min }}.*

about:
  home: https://pypi.org/project/mmg-toolbox/
  summary: Repository for useful python data analysis functions for the Diamond Magnetic Materials Group
  license: Apache-2.0
  license_file: LICENSE

extra:
  recipe-maintainers:
    - DanPorter
    - NatLeung96
