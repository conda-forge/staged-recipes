schema_version: 1

context:
  version: "0.1.0"

package:
  name: mrtree-rs
  version: ${{ version }}

source:
  url: https://github.com/apcamargo/mrtree-rs/archive/refs/tags/v${{ version }}.tar.gz
  sha256: 247fa8d1869d1d6ce9ee87514746cbb7035362d8074a9989b11f3549e3f79ddd

build:
  number: 0
  script:
    env:
      CARGO_PROFILE_RELEASE_STRIP: symbols
      CARGO_PROFILE_RELEASE_LTO: fat
    content:
      - if: unix
        then:
          - cargo install --features cli --no-track --locked --root ${PREFIX} --path .
          - cargo-bundle-licenses --format yaml --output ${SRC_DIR}/THIRDPARTY.yml
      - if: win
        then:
          - cargo install --features cli --no-track --locked --root %PREFIX% --path .
          - if errorlevel 1 exit 1
          - cargo-bundle-licenses --format yaml --output %SRC_DIR%/THIRDPARTY.yml
          - if errorlevel 1 exit 1

requirements:
  build:
    - ${{ compiler('rust') }}
    - ${{ stdlib('c') }}
    - ${{ compiler('c') }}
    - cargo-bundle-licenses

tests:
  - script:
      - mrtree-rs --help

about:
  homepage: https://github.com/apcamargo/mrtree-rs
  repository: https://github.com/apcamargo/mrtree-rs
  documentation: https://github.com/apcamargo/mrtree-rs
  summary:  Reconciliation of multi-resolution clustering into a cluster hierarchy 
  description: |
    mrtree-rs is a Rust implementation of the MRtree algorithm for reconciling
    clustering labels from multiple resolutions into a consistent cluster
    hierarchy. Relative to the original R implementation, it offers up to
    30-fold speedup.
  license: GPL-3.0-only
  license_file:
    - LICENSE

extra:
  recipe-maintainers:
    - apcamargo
