#
# OpenFold conda-forge recipe.
#
# This recipe version mirrors the dependencies in OF pixi file and bring-in environments
# ready to compile just-in-time openfold extensions, with the difference that we do not
# isolate built extensions by default.
#
# Our future ambition is to provide packages with precompiled extensions tested natively.
#
# Notes and TODOs.
# -----
#
# - Once we get the feedstock, we will need to tweak disk space or touch tests,
#   as we are filling all allocated by the stage worker during testing.
#
# - We probably should add a noarch variant for CPU-only extension-less versions
#   See: https://conda-forge.org/blog/2024/10/15/python-noarch-variants/
#        https://rattler-build.prefix.dev/v0.42.1/build_options/#python-package-version-independence
#   I need to figure if rattler-build supports noarch variants
#
# - I expect the need to bring more pins than what we have in the pixi environments
#   Will find problems as we battle test in the wild
#
#  - To compile extensions, we need OF3 itself to allow:
#     - having a custom location for extensions
#     - overriding the custom location for power users / extension rebuild
#     - benchmarking (avoid performance regressions) and testing CI
#     - we need cross-compilation and hardware-independent extension building, plus infras
#    This will be iterative improvement of infrastructure, codebase(s) and packaging
#
#    Otherwise we can use some tricks from our pixi envs (e.g., build envvars)
#    and make them part of the package activation
#    Here is an example that likely will not work
#    (as we are not making the build independent of HW yet, and anyway we would need a full package installation)
#    - if: cuda_compiler_version != "None"
#      then:
#        - export TRITON_PTXAS_PATH=$CONDA_PREFIX/bin/ptxas
#        - export TRITON_PTXAS_BLACKWELL_PATH=$TRITON_PTXAS_PATH
#        - export CUTLASS_PATH=DS_IGNORE_CUTLASS_DETECTION
#        - export TORCH_EXTENSIONS_DIR=$CONDA_PREFIX/caches/torch_extensions
#        - pytest -v openfold3/tests/test_kernels.py -v
#
# - Testing no noarch builds with higher python versions
#
# - We usually need to tweak the build matrix for python. Reminder to self
#   Copy and modify as needed the following into recipe/variants.yaml
#   ----------------------
#   python:
#     - 3.11
#     - 3.12
#     - 3.13
#     - 3.14
#
#   is_python_min:
#     - true
#     - false
#     - false
#     - false
#
#   zip_keys:
#     - - python
#       - is_python_min
# ----------------------
#

context:
  version: "0.4.2"
  build_number: 0
  torch_proc_type: ${{ "cuda" ~ cuda_compiler_version | version_to_buildstring if cuda_compiler_version != "None" else "cpu" }}

package:
  name: openfold
  version: ${{ version }}

source:
  url: https://github.com/aqlaboratory/openfold-3/archive/refs/tags/${{ version }}.tar.gz
  sha256: 7dc5c18870af3b3ed88b217d6f2532f94cf87bd31132c415095d2e712e4a19e7

build:
  number: ${{ build_number }}
  string: ${{ torch_proc_type }}_py${{ python | version_to_buildstring }}_h${{ hash }}_${{ build_number }}
  skip:
    - win
    - match(python, "3.10.*")
  script:
    content:
      - pip install . --no-deps --ignore-installed --no-build-isolation --no-cache-dir -vvv

requirements:
  host:
    - python
    - pip
    - setuptools
    - setuptools-scm >=8
    - wheel
  run:
    - python
    - numpy
    - scipy
    - pandas
    # --- Machine learning
    - pytorch * ${{ torch_proc_type }}*
    - pytorch-lightning <=2.6.1
    - ml-collections
    # --- Handling molecules
    - rdkit <2026
    - biotite >=1.6
    - pdbeccdutils
    - kalign-python
    # --- Misc
    - pyyaml
    - ijson
    - memory_profiler
    - wandb
    - func_timeout
    - tqdm
    - typing-extensions
    - python-lmdb >=2.2.0
    # --- Downloading stuff
    - requests
    - awscli
    - awscrt
    - boto3
    - if: cuda_compiler_version != "None" and target_platform == "linux-64"  # we would need a deepspeed aarch64 package
      then:
        - deepspeed >=0.18.7
        # At the time of writing (May 29, 2026), deepspeed kernels cannot be compiled with CUDA >=13.3
        - cuda-version <13.3
        # For the `async_io` deepspeed op
        - libaio
        # This is needed when not precompiling non-triton kernels, but bloats the environment
        # We should explore a way to precompile the kernels in the build step
        # but that would require some changes in OF3 itself (e.g., manage kernel location for isolation)
        - ninja
        - cutlass
        - cuda-minimal-build
        - libcusparse-dev
        - libcublas-dev
        - libcusolver-dev
        - libcurand-dev

tests:
  # OF test suite
  # Runs out of disk space in staged_recipes for CUDA builds
  # Reactivate when we create the feedstock
  - if: cuda_compiler_version == "None"
    then:
    - requirements:
        run:
          - pytest
          - pytest-xdist
          - pytest-cov
          - pytest-benchmark
          - pytest-regressions
          - pytest-vcr
      files:
        source:
          - openfold3/tests/
      script:
          - pytest -vvv openfold3/tests -k "not test_inference_load_state_dict_benchmark_under_ten_seconds"
  - script:
      - run_openfold --help
  - python:
      imports:
        - openfold3
      pip_check: true

about:
  homepage: https://openfold.io
  repository: https://github.com/aqlaboratory/openfold-3
  summary: OpenFold's Biological Structure Prediction Model based on DeepMind's AlphaFold 3
  license: Apache-2.0
  license_file: LICENSE

extra:
  recipe-maintainers:
    - Emrys-Merlin
    - jandom
    - jnwei
    - sdvillal
