{% set version = "0.0.1" %}

package:
  name: nwchemex-tamm
  version: {{ version }}

source:
  url: https://github.com/NWChemEx/TAMM/releases/download/v{{ version }}/tamm-{{ version }}.tar.gz
  sha256: 44468ab963672e69a7ccb425c01b40f12b022afc7bff372d9deb156d55048592

build:
  number: 0
  skip: true  # [not linux]
  string: cuda{{ cuda_compiler_version | replace('.', '') }}_{{ mpi_prefix }}_h{{ PKG_HASH }}_{{ PKG_BUILDNUM }}  # [cuda_compiler_version != "None"]
  string: cpu_{{ mpi_prefix }}_h{{ PKG_HASH }}_{{ PKG_BUILDNUM }}  # [cuda_compiler_version == "None"]

  run_exports:
    - {{ pin_subpackage('nwchemex-tamm', max_pin='x.x') }} *_{{ mpi_prefix }}_*

requirements:
  build:
    - {{ compiler('c') }}
    - {{ compiler('cxx') }}
    - {{ compiler('fortran') }}
    - {{ compiler('cuda') }}  # [cuda_compiler_version != "None"]
    - {{ stdlib('c') }}
    - cmake
    - make
  host:
    - {{ mpi }}
    - hdf5 * {{ mpi_prefix }}*
    - zlib  # for HDF5
    - libblas
    - liblapack
    - libtmglib
    - blaspp
    - lapackpp
    - eigen
    - nlohmann_json
    - numactl
    - spdlog
    - ms-gsl
    - doctest
    - librett  # [cuda_compiler_version != "None"]
    - hptt
    - globalarrays * {{ mpi_prefix }}*
  run:
    - {{ mpi }}

test:
  commands:
    - test -f $PREFIX/lib/libtamm$SHLIB_EXT

about:
  home: https://tamm.readthedocs.io
  summary: Tensor Algebra for many-body methods
  description: |
    Tensor Algebra for Many-body Methods (TAMM) is a framework for productive
    and performance-portable development of scalable computational chemistry methods.
    The TAMM framework decouples the specification of the computation and the
    execution of these operations on available high-performance computing systems.
    With this design choice, the scientific application developers (domain scientists)
    can focus on the algorithmic requirements using the tensor algebra interface
    provided by TAMM whereas high-performance computing developers can focus on
    various optimizations on the underlying constructs such as efficient data
    distribution, optimized scheduling algorithms, efficient use of intra-node resources
    (e.g., GPUs). The modular structure of TAMM allows it to be extended to support
    different hardware architectures and incorporate new algorithmic advances.
  license: Apache-2.0
  license_file:
    - LICENSE
    - DISCLAIMER
  doc_url: https://tamm.readthedocs.io
  dev_url: https://github.com/nwchemex/tamm

extra:
  recipe-maintainers:
    - awvwgk
