# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  python_min: "3.11"
  version: "0.1.3"

package:
  name: ragworkbench
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/r/ragworkbench/ragworkbench-${{ version }}.tar.gz
  sha256: 7a81302195337ac17512603f351dae88a6eb3d6a477e62a98dc129073873fd27

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - hatchling
    - pip
  run:
    - python >=${{ python_min }}
    - pydantic
    - docling-core
    - typing_extensions
    - types-requests
    - requests
    - huggingface_hub
    - pandas
    - gdown
    - datasets
    - pandas-stubs
    - types-pyyaml
    - unitxt
    - scipy
    - nicegui
    - python-dotenv
    - bert_score
    - litellm
    - tenacity

tests:
  - python:
      imports:
        - ragworkbench
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  homepage: https://github.com/IBM/RagWorkbench
  repository: https://github.com/IBM/RagWorkbench
  documentation: https://github.com/IBM/RagWorkbench
  license: Apache-2.0
  license_file: LICENSE
  summary: A comprehensive benchmarking framework for Retrieval-Augmented Generation (RAG) systems
  description: |
    RAGWorkbench is a powerful Python framework designed to evaluate and
    benchmark RAG systems across multiple datasets and metrics. It provides a
    unified interface for loading diverse RAG benchmarks, running inference
    pipelines, and computing comprehensive evaluation metrics, with built-in
    support for 18+ RAG benchmark datasets, context- and answer-correctness
    metrics, cost tracking via LiteLLM, and an interactive dataset explorer.

extra:
  recipe-maintainers:
    - rxm7706
