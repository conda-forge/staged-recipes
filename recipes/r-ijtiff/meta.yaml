{% set version = '3.2.0' %}
{% set posix = 'm2-' if win else '' %}

package:
  name: r-ijtiff
  version: "{{ version|replace('-', '_') }}"

source:
  url:
    - {{ cran_mirror }}/src/contrib/ijtiff_{{ version }}.tar.gz
    - {{ cran_mirror }}/src/contrib/Archive/ijtiff/ijtiff_{{ version }}.tar.gz
  sha256: e8122a59166e6a6c078bcafd208312a4021c9e038b5bd71e9421395298cdf7b1

build:
  number: 0
  rpaths:
    - lib/R/lib/
    - lib/
  missing_dso_whitelist:
    - '*/R.dll'        # [win]
    - '*/Rblas.dll'    # [win]
    - '*/Rlapack.dll'  # [win]

requirements:
  build:
    - {{ compiler('c') }}              # [not win]
    - {{ stdlib("c") }}                # [not win]
    - {{ compiler('m2w64_c') }}        # [win]
    - {{ posix }}filesystem        # [win]
    - {{ posix }}sed               # [win]
    - {{ posix }}grep              # [win]
    - {{ posix }}autoconf
    - {{ posix }}automake          # [not win]
    - {{ posix }}automake-wrapper  # [win]
    - pkg-config
    - {{ posix }}make
    - {{ posix }}coreutils         # [win]
    - {{ posix }}zip               # [win]
    - cross-r-base {{ r_base }}    # [build_platform != target_platform]
  host:
    - libjpeg-turbo  # [not win]
    - libtiff
    - r-base
    - r-checkmate >=1.9.3
    - r-cli
    - r-dplyr
    - r-fs >=1.5
    - r-jsonlite
    - r-lubridate
    - r-magrittr >=1.5
    - r-purrr
    - r-readr
    - r-rlang >=1.0
    - r-strex >=1.5
    - r-stringr >=1.4
    - zlib
  run:
    - r-base
    - r-checkmate >=1.9.3
    - r-cli
    - r-dplyr
    - r-fs >=1.5
    - r-jsonlite
    - r-lubridate
    - r-magrittr >=1.5
    - r-purrr
    - r-readr
    - r-rlang >=1.0
    - r-strex >=1.5
    - r-stringr >=1.4
    - libjpeg-turbo    # [win]

test:
  commands:
    - $R -e "library('ijtiff')"           # [not win]
    - "\"%R%\" -e \"library('ijtiff')\""  # [win]

about:
  home: https://docs.ropensci.org/ijtiff/, https://github.com/ropensci/ijtiff
  license: GPL-3.0-only
  summary: General purpose TIFF file I/O for R users.  Currently the only such package with read
    and write support for TIFF files with floating point (real-numbered) pixels, and
    the only package that can correctly import TIFF files that were saved from 'ImageJ'
    and write TIFF files than can be correctly read by 'ImageJ' <https://imagej.net/ij/>.
    Also supports text image I/O.
  license_family: GPL3
  license_file:
    - '{{ environ["PREFIX"] }}/lib/R/share/licenses/GPL-3'
# Type: Package

extra:
  recipe-maintainers:
    - conda-forge/r

