{% set version = '1.0.2' %}
{% set posix = 'm2-' if win else '' %}

package:
  name: r-coxrobust
  version: "{{ version|replace('-', '_') }}"

source:
  url:
    - {{ cran_mirror }}/src/contrib/coxrobust_{{ version }}.tar.gz
    - {{ cran_mirror }}/src/contrib/Archive/coxrobust/coxrobust_{{ version }}.tar.gz
  sha256: 586b00933245e593b3f520e97d63ecbdc5822e811357988fb90a00362cf0b2d0

build:
  number: 0
  rpaths:
    - lib/R/lib/
    - lib/
  missing_dso_whitelist:
    - '*/R.dll'        # [win]
    - '*/Rblas.dll'    # [win]
    - '*/Rlapack.dll'  # [win]

requirements:
  build:
    - {{ compiler('c') }}              # [not win]
    - {{ stdlib("c") }}                # [not win]
    - {{ compiler('m2w64_c') }}        # [win]
    - {{ compiler('cxx') }}            # [not win]
    - {{ compiler('m2w64_cxx') }}      # [win]
    - {{ posix }}filesystem        # [win]
    - {{ posix }}make
    - {{ posix }}sed               # [win]
    - {{ posix }}coreutils         # [win]
    - {{ posix }}zip               # [win]
    - cross-r-base {{ r_base }}    # [build_platform != target_platform]
  host:
    - libblas
    - liblapack
    - r-base
    - r-rcpp
    - r-rcpparmadillo
    - r-survival
  run:
    - r-base
    - r-rcpp
    - r-rcpparmadillo
    - r-survival

test:
  commands:
    - $R -e "library('coxrobust')"           # [not win]
    - "\"%R%\" -e \"library('coxrobust')\""  # [win]

about:
  home: https://github.com/ShanaScogin/coxrobust
  license: GPL-3.0-only
  summary: An implementation of robust estimation in Cox model. Functionality includes fitting
    efficiently and robustly Cox proportional hazards regression model in its basic
    form, where explanatory variables are time independent with one event per subject.  Method
    is based on a smooth modification of the partial likelihood.
  license_family: GPL3
  license_file:
    - '{{ environ["PREFIX"] }}/lib/R/share/licenses/GPL-3'

extra:
  recipe-maintainers:
    - conda-forge/r

