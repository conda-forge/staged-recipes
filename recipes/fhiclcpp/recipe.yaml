# rattler-build recipe (v1 / CEP-13 format) for fhiclcpp.
#
# Build with (from conda/):
#   rattler-build build --recipe recipes/art-suite/fhiclcpp/recipe.yaml \
#     -c ./art-suite-output -c conda-forge --allow-symlinks-on-windows
#
# Product #4 in the art v3_14_04 build order (see conda/ART_BUILD_PLAN.md).
# The FHiCL (Fermilab Hierarchical Configuration Language) parser/value library
# plus its CLI tools (fhicl-dump, fhicl-expand, fhicl-get, fhicl-write-db).

context:
  version: "4.18.04"
  git_tag: v4_18_04

package:
  name: fhiclcpp
  version: ${{ version }}

source:
  url: https://github.com/art-framework-suite/fhicl-cpp/archive/refs/tags/${{ git_tag }}.tar.gz
  sha256: d0b8beca890707d0bbf35678c3b6bddd1b02b3ab7654801abbe31525dacdd7b5
  patches:
    # Missing #include <cassert> in DatabaseSupport.cc -> fails under conda's
    # newer libstdc++ (assert no longer pulled in transitively). See
    # potential_improvements.md (#5).
    - patches/0001-DatabaseSupport-include-cassert.patch

build:
  number: 2                      # _2: strip stray $PREFIX/{INSTALL,LICENSE,README} (README vs ROOT README/ dir at #7). _1: drop openssl from host (ROOT openssl<4 compat)
  script: build.sh
  skip: not linux

requirements:
  build:
    - ${{ compiler('c') }}
    - ${{ compiler('cxx') }}
    - ${{ stdlib('c') }}
    - cmake
    - make
  host:
    - cetmodules                 # build system (local art-suite channel)
    - cetlib                     # linked (local channel)
    - cetlib_except              # find_package(cetlib_except) direct (local channel)
    - tbb-devel 2021.9.*         # find_package(TBB) (UPS pin tbb v2021_9_0)
    - libboost-devel 1.85.*      # find_package(Boost program_options); matches WCT pin
    - libsqlite                  # find_package(SQLite3)
    # NOTE: openssl is intentionally NOT listed. It is cetlib's private dependency
    # (only libcetlib.so links libcrypto). cetlib already run-requires openssl 3.x,
    # so it is present transitively in the host env (cetlibConfig's
    # find_dependency(OpenSSL) resolves). Listing it here would wrongly attach
    # openssl's run_export to fhiclcpp and clash with ROOT's openssl<4 downstream.
  run:
    # Runtimes (cetlib/cetlib_except/boost/sqlite/openssl/tbb) arrive via the host
    # packages' run_exports; add explicit pins only if a missing .so appears.

tests:
  - package_contents:
      lib:
        - fhiclcpp               # libfhiclcpp.so (also installs a static lib)
      include:
        - fhiclcpp/ParameterSet.h
        - fhiclcpp/intermediate_table.h
      bin:
        - fhicl-dump
        - fhicl-expand
        - fhicl-get
        - fhicl-write-db
      files:
        - lib/fhiclcpp/cmake/fhiclcppConfig.cmake

about:
  homepage: https://github.com/art-framework-suite/fhicl-cpp
  license: BSD-3-Clause
  license_file: LICENSE
  summary: fhiclcpp -- FHiCL configuration language library and tools for the FNAL art suite
  description: |
    fhiclcpp implements FHiCL (the Fermilab Hierarchical Configuration
    Language): parsing, the ParameterSet value model, intermediate tables and
    the fhicl-dump/expand/get/write-db command-line tools used throughout the
    art framework. Depends on cetlib, cetlib_except, Boost, SQLite3 and TBB.
  repository: https://github.com/art-framework-suite/fhicl-cpp
