# AVFAudio became a standalone framework in the macOS 11.3 SDK; pyobjc's
# AVFoundation bindings include <AVFAudio/AVFAudio.h>, so an older SDK
# (staged-recipes defaults to 11.0 on osx-64) fails to compile.
# Note: while in staged-recipes this applies to all osx builds in the PR
# (their artifacts are validation-only); in the feedstock it only affects
# this package.
MACOSX_SDK_VERSION:  # [osx]
  - "11.3"           # [osx]
