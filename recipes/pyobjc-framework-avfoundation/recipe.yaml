schema_version: 1

context:
  version: "12.0"

package:
  name: pyobjc-framework-avfoundation
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/p/pyobjc-framework-AVFoundation/pyobjc_framework_avfoundation-${{ version }}.tar.gz
  sha256: e9e9a15edea43341b39de677a58ac98b2a6bd4d6c55176b4804c5f75b3d20ece

build:
  number: 0
  skip: not osx
  script:
    content:
      # force pyobjc to use conda-forge's chosen SDK
      - export CFLAGS="${CFLAGS} -isysroot ${SDKROOT:-$CONDA_BUILD_SYSROOT}"
      - ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  build:
    - ${{ stdlib('c') }}
    - ${{ compiler('c') }}
  host:
    - python
    - pip
    - setuptools
    - wheel
    # not used at build time, but forces rattler-build to build these sibling
    # staged recipes first; its topological sort ignores run-only dependencies,
    # and dependent test environments fail to solve if they aren't built yet.
    # Only needed while the recipes are staged together — remove once this
    # lives in its own feedstock.
    - pyobjc-framework-coreaudio
    - pyobjc-framework-coremedia
  run:
    # upstream metadata only requires >=12.0; the <13 cap guards against
    # mixing pyobjc major versions, which are released and ABI-matched in
    # lockstep
    - python
    - pyobjc-core >=${{ version }},<13
    - pyobjc-framework-cocoa >=${{ version }},<13
    - pyobjc-framework-quartz >=${{ version }},<13
    - pyobjc-framework-coreaudio >=${{ version }},<13
    - pyobjc-framework-coremedia >=${{ version }},<13

tests:
  - python:
      imports:
        - AVFoundation
      pip_check: true

about:
  summary: Wrappers for the framework AVFoundation on macOS
  description: |
    PyObjC wrappers for Apple's AVFoundation framework, giving Python
    access to audiovisual capture, playback, and editing on macOS (e.g.
    enumerating cameras and microphones via AVCaptureDevice). Part of the
    PyObjC project, which provides bridges between Python and Objective-C
    frameworks on macOS.
  license: MIT
  license_file: License.txt
  homepage: https://pyobjc.readthedocs.io/
  repository: https://github.com/ronaldoussoren/pyobjc
  documentation: https://pyobjc.readthedocs.io/

extra:
  recipe-maintainers:
    - ruben-arts
