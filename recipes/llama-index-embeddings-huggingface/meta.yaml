{% set name = "llama-index-embeddings-huggingface" %}
{% set version = "0.7.0" %}
{% set python_min = "3.10" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  - url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/llama_index_embeddings_huggingface-{{ version }}.tar.gz
    sha256: da8a2a65df9404112c4430dfada09d4f846ba165197a25dbe77f734014c56a87
  # license lives in the monorepo root, not in the sdist
  - url: https://raw.githubusercontent.com/run-llama/llama_index/main/LICENSE
    sha256: 24f40b5190fdacabc24ddbb5f76364d15e4f030925220ea300d8a2dd4993c8cb
    fn: LICENSE

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - hatchling
    - pip
  run:
    - python >={{ python_min }},<4.0
    - llama-index-core >=0.13.0,<0.15
    - sentence-transformers >=3.3.0
    - huggingface_hub >=0.19.0

test:
  imports:
    - llama_index.embeddings.huggingface
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://llamaindex.ai
  summary: llama-index embeddings huggingface integration
  license: MIT
  license_file: LICENSE
  dev_url: https://github.com/run-llama/llama_index/tree/main/llama-index-integrations/embeddings/llama-index-embeddings-huggingface

extra:
  recipe-maintainers:
    - arash77
