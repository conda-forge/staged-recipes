context:
  name: rapidminer-ai-sdk
  version: "2.0"
  python_min: "3.12"

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://maven.rapidminer.com/repository/pypi-snapshot/packages/rapidminer-ai-sdk/${{ version }}/rapidminer_ai_sdk-${{ version }}.tar.gz
  sha256: b87708da2f89e8c78a65a40ea6526383314cb104d93e09636087ef9a94f969e8

build:
  noarch: python
  number: 0
  python:
    entry_points:
      - build-extension = rapidminer.ai.dev._builder:build_extension
      - create-extension = rapidminer.ai.dev._create_extension:create_extension
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ==${{ python_min }}
    - hatchling
    - pip
  run:
    - python >=${{ python_min }}
    - networkx >=3.0
    - pipdeptree >=2.20
    - pyyaml >=6.0.3
    - conda-index >=0.6.1
    - conda-lock >=3.0.4
    - libmambapy >=2.0.8
    - rapidminer-ai-runtime >=2.0

tests:
  - python:
      imports:
      - rapidminer
      - rapidminer.core
      - rapidminer.ai
      - rapidminer.ai.ext
      - rapidminer.ai.dev
      pip_check: true

about:
  homepage: https://www.siemens.com/en-us/products/rapidminer/
  summary: 'rapidminer-ai-sdk is a comprehensive Python package for running Rapidminer AI extensions in Python.'
  description: |
    rapidminer-ai-sdk is a comprehensive Python package for developing Rapidminer
    AI extensions in Python. It provides tools and utilities that simplify extension
    development, support integration workflows, and help developers build and maintain
    custom AI capabilities efficiently for Rapidminer AI Studio, Rapidminer AI Hub
    and Rapidminer AI Cloud.
  license: Apache-2.0
  license_file: LICENSE

extra:
  recipe-maintainers:
    - skontar-altair
    - tjarvas-altair
    - mboeck-siemens
