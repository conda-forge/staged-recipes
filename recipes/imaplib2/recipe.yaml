schema_version: 1

context:
  version: "3.6"

package:
  name: imaplib2
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/i/imaplib2/imaplib2-${{ version }}.tar.gz
  sha256: 96cb485b31868a242cb98d5c5dc67b39b22a6359f30316de536060488e581e5b

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - setuptools
    - wheel
    - pip
  run:
    - python >=${{ python_min }}

tests:
  - python:
      python_version:
        - ${{ python_min }}.*
        - "*"
      imports:
        - imaplib2
      pip_check: true

about:
  summary: A threaded Python IMAP4 client.
  license: MIT
  license_file: LICENCE
  homepage: https://github.com/jazzband/imaplib2/

extra:
  recipe-maintainers:
    - cbourjau
