context:
  version: "2.1.1"
  pkg_name: "spotify-voyager"

package:
  name: ${{ pkg_name }}
  version: ${{ version }}

source:
  url: https://github.com/spotify/voyager/archive/refs/tags/v${{ version }}.tar.gz
  sha256: b04306f63b3fdd7aada8ca2bd74d53ec6b0746623e6b69f3820c2c412c75a23e

build:
  number: 0
  # Upstream's release workflow copies the repo-level C++ sources into
  # python/src before building Python artifacts:
  # https://github.com/spotify/voyager/blob/v2.1.1/.github/workflows/all.yml#L260-L264
  # The v2.1.1 GitHub release tarball also carries broken Python package
  # metadata; see https://github.com/spotify/voyager/pull/129.
  script: build

requirements:
  build:
    - if: build_platform != target_platform
      then:
        - python
        - cross-python_${{ target_platform }}
        - numpy
        - scikit-build-core
        - nanobind
        - cmake
        - ninja
    - ${{ compiler("cxx") }}
    - ${{ stdlib("c") }}
    - cmake
    - ninja
  host:
    - python
    - pip
    - numpy
    - scikit-build-core
    - nanobind
    - cmake
    - ninja
  run:
    - python
    - numpy

tests:
  - python:
      imports:
        - voyager
      pip_check: true
  - requirements:
      run:
        - numpy
    script:
      - python -c "import numpy as np, voyager; x = np.array([[1.0, 0.0], [0.0, 1.0]], dtype=np.float32); index = voyager.Index(space=voyager.Space.Euclidean, num_dimensions=2); index.add_items(x); labels, distances = index.query(x[:1], k=1); assert int(labels[0, 0]) == 0; assert np.isclose(float(distances[0, 0]), 0.0)"

about:
  homepage: https://github.com/spotify/voyager
  repository: https://github.com/spotify/voyager
  summary: Approximate nearest-neighbor search library for Python and Java.
  description: |
    Voyager is an approximate nearest-neighbor search library from Spotify
    with Python and Java bindings and a focus on ease of use, simplicity,
    and deployability.
  documentation: https://spotify.github.io/voyager/python
  license: Apache-2.0
  license_file: LICENSE

extra:
  feedstock_name: ${{ pkg_name }}
  recipe-maintainers:
    - moritzwilksch
