context:
  version: "1.6.7"

package:
  name: properdocs
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/p/properdocs/properdocs-${{ version }}.tar.gz
  sha256: adc7b16e562890af0e098a7e5b02e3a81c20894a87d6a28d345c9300de73c26e

build:
  number: 0
  python:
    entry_points:
      - properdocs=properdocs.__main__:cli
  noarch: python
  script: python -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - hatchling
  run:
    - python >=${{ python_min }}
    - click >=7.0
    - ghp-import >=1.0
    - jinja2 >=2.11.1
    - markdown >=3.3.6
    - markupsafe >=2.0.1
    - packaging >=20.5
    - pathspec >=0.11.1
    - platformdirs >=2.2.0
    - pyyaml >=5.1
    - pyyaml-env-tag >=0.1
    - watchdog >=2.0

tests:
  - python:
      imports:
        - properdocs
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"
  - script:
      - properdocs --help

about:
  homepage: https://github.com/properdocs/properdocs
  summary: Project documentation with Markdown.
  license: BSD-2-Clause
  license_file: LICENSE

extra:
  recipe-maintainers:
    - pavelzw
