{% set name = "libcoro" %}
{% set version = "0.16.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://github.com/jbaldwin/libcoro/archive/refs/tags/v{{ version }}.tar.gz
  sha256: 895ca24e6c73b994423fc187c86c635f5c2f20a1def2886b7397c40236f4c33b

build:
  number: 0
  skip: true  # [win or osx]

requirements:
  build:
    - {{ compiler('cxx') }}
    - {{ stdlib('c') }}
    - cmake
    - make  # [unix]
  host:
    - c-ares
    - openssl

test:
  requires:
    - {{ compiler('cxx') }}
    - cmake
    - make  # [unix]
    - pkg-config  # [unix]
  files:
    - cmake_test/
  commands:
    # Check that headers and library files are installed
    - test -f $PREFIX/include/coro/coro.hpp  # [unix]
    - test -f $PREFIX/lib/libcoro${SHLIB_EXT}  # [unix]
    - test -f $PREFIX/lib/pkgconfig/libcoro.pc  # [unix]
    - test -f $PREFIX/include/coro/task.hpp  # [unix]
    - test -f $PREFIX/include/coro/generator.hpp  # [unix]
    - test -f $PREFIX/include/coro/event.hpp  # [unix]
    - test -f $PREFIX/include/coro/thread_pool.hpp  # [unix]
    - test -f $PREFIX/include/coro/net/tcp/client.hpp  # [unix]
    - test -f $PREFIX/include/coro/scheduler.hpp  # [unix]

    # pkg-config validation
    - pkg-config --print-errors --modversion libcoro  # [unix]

    # CMake integration test - verify package can be found
    - cd cmake_test  # [unix]
    - cmake ${CMAKE_ARGS} .  # [unix]

about:
  home: https://github.com/jbaldwin/libcoro
  summary: 'C++20 coroutine library'
  description: |
    libcoro is a low-level C++20 coroutine library that provides constructs for building
    larger applications. It features modern async/await patterns, higher-level constructs
    like tasks and generators, networking capabilities, and executor support for concurrent
    execution.
  license: Apache-2.0
  license_file: LICENSE
  doc_url: https://github.com/jbaldwin/libcoro
  dev_url: https://github.com/jbaldwin/libcoro

extra:
  recipe-maintainers:
    - user202729
