context:
  version: "2.2.3"

package:
  name: thepeg
  version: ${{ version }}

source:
  url: https://thepeg.hepforge.org/downloads/ThePEG-${{ version }}.tar.bz2
  sha256: f21473197a761fc32917b08a8d24d2bfaf93ff57f3441fd605da99ac9de5d50b

build:
  script:
    - ./configure ${CONFIGURE_COMMON_FLAGS} --prefix=${PREFIX} --with-fastjet=${PREFIX} --with-gsl=${PREFIX} --with-hepmc=${PREFIX} --with-lhapdf=${PREFIX} --with-boost=${PREFIX}
    - make -j${CPU_COUNT} CXX=$CXX && make install
  number: 0
  skip:
    - win

requirements:
  build:
    - ${{ compiler("cxx") }}
    - ${{ stdlib("c") }}
    - make
  host:
    - boost
    - fastjet
    - gsl
    - hepmc2
    - lhapdf
    - zlib

about:
  homepage: https://thepeg.hepforge.org/
  summary: 'Toolkit for High Energy Physics Event Generation - ThePEG'
  description: |
    ThePEG is a general toolkit for implementing physics models of event generation in high energy
    particle collisions. It defines a general structure of event generation in terms of abstract base
    classes like hard partonic matrix elements, parton showers and the decay of unstable particles.
  license: GPL-3.0-or-later
  license_file: COPYING
  documentation: https://thepeg.hepforge.org/doxygen/
  repository: https://repo.hepforge.org/source/thepeghg/

extra:
  recipe-maintainers:
    - utk4r-sh
    - GiacomoXT
    - vvsagar
    - AlexanderHeidelbach
