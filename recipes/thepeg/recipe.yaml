context:
  version: "2.2.3"

package:
  name: thepeg
  version: ${{ version }}

source:
  url: https://thepeg.hepforge.org/downloads/ThePEG-${{ version }}.tar.bz2
  sha256: f21473197a761fc32917b08a8d24d2bfaf93ff57f3441fd605da99ac9de5d50b

build:
  script:
    - ./configure --prefix=${PREFIX} --with-fastjet=${PREFIX} --with-gsl=${PREFIX} --with-hepmc=${PREFIX} --with-lhapdf=${PREFIX} --with-boost=${PREFIX}
    - make -j${CPU_COUNT} CXX=$CXX
    - make check
    - make install
    - rm -rf "${PREFIX}/lib/ThePEG/Makefile" "${PREFIX}/lib/ThePEG/Makefile.common" "${PREFIX}/share/ThePEG/Doc"
    - rm -f "${PREFIX}/lib/ThePEG/runThePEG-2.2.3" "${PREFIX}/lib/ThePEG/setupThePEG-2.2.3"
  number: 0
  skip:
    - win
    - osx

requirements:
  build:
    - ${{ compiler("cxx") }}
    - ${{ stdlib("c") }}
    - make
    - time
  host:
    - fastjet-cxx
    - gsl
    - hepmc2
    - lhapdf
    - libboost-devel
    - zlib
  run_exports:
    - ${{ pin_subpackage("thepeg", upper_bound="x.x") }}

tests:
  - script:
    - runThePEG --version
  - package_contents:
      lib:
        - ThePEG/*.so
        - ThePEG/*.so.*
      bin:
        - runThePEG
        - setupThePEG
        - thepeg-config
      include:
        - ThePEG/*/*
      files:
        - lib/ThePEG/ThePEGDefaults-2.2.3.rpo
        - lib/ThePEG/ThePEGDefaults.rpo
        - share/*
      strict: true

about:
  homepage: https://thepeg.hepforge.org/
  summary: 'Toolkit for High Energy Physics Event Generation - ThePEG'
  description: |
    ThePEG is a general toolkit for implementing physics models of event generation in high energy
    particle collisions. It defines a general structure of event generation in terms of abstract base
    classes like hard partonic matrix elements, parton showers and the decay of unstable particles.
  license: GPL-3.0-or-later
  license_file: COPYING
  documentation: https://thepeg.hepforge.org/doxygen/
  repository: https://repo.hepforge.org/source/thepeghg/

extra:
  recipe-maintainers:
    - utk4r-sh
    - GiacomoXT
    - vvsagar
    - AlexanderHeidelbach
