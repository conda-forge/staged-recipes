{% set version = "15.2.rel1" %}

package:
  name: gcc-arm-none-eabi
  # conda package versions do not permit hyphens, replace with '.'
  version: {{ version|replace('-', '.') }}

source:
  url: https://developer.arm.com/-/media/Files/downloads/gnu/{{ version }}/binrel/arm-gnu-toolchain-{{ version }}-darwin-arm64-arm-none-eabi.tar.xz  # [osx and arm64]
  sha256: 1938a84b7105c192e3fb4fa5e893ba25f425f7ddab40515ae608cd40f68669a8  # [osx and arm64]

  url: https://developer.arm.com/-/media/Files/downloads/gnu/{{ version }}/binrel/arm-gnu-toolchain-{{ version }}-x86_64-arm-none-eabi.tar.xz  # [linux and x86_64]
  sha256: 597893282ac8c6ab1a4073977f2362990184599643b4c5ee34870a8215783a16  # [linux and x86_64]
  url: https://developer.arm.com/-/media/Files/downloads/gnu/{{ version }}/binrel/arm-gnu-toolchain-{{ version }}-aarch64-arm-none-eabi.tar.xz  # [linux and aarch64]
  sha256: d061559d814b205ed30c5b7c577c03317ec447ca51cd5a159d26b12a5bbeb20c  # [linux and aarch64]

  url: https://developer.arm.com/-/media/Files/downloads/gnu/{{ version }}/binrel/arm-gnu-toolchain-{{ version }}-mingw-w64-i686-arm-none-eabi.zip  # [win and x86]
  sha256: b40db54536d2fdf0ff21f4316b56c1fc4d3b782b792c5b298bcbeaf5eccedb96  # [win and x86]
  url: https://developer.arm.com/-/media/Files/downloads/gnu/{{ version }}/binrel/arm-gnu-toolchain-{{ version }}-mingw-w64-x86_64-arm-none-eabi.zip  # [win and x86_64]
  sha256: 7936cac895611023ffb22a64b8e426098c7104cb689778c1894572ca840b9ece  # [win and x86_64]

build:
  number: 0

  #  No upstream builds available
  skip: true  # [osx and x86_64]
  skip: true  # [win and arm64]

  binary_relocation: False  # [linux]
  detect_binary_files_with_prefix: False  # [linux]
  missing_dso_whitelist:  # [linux]
    - "/lib64/*"  # [linux and (x86_64 or aarch64)]
    - "/lib/ld-linux-aarch64.so.1"  # [linux and aarch64]

test:
  commands:
    - arm-none-eabi-gcc --version

about:
  home: https://developer.arm.com/Tools%20and%20Software/GNU%20Toolchain
  summary: Arm GNU Toolchain
  license: GPL-3.0-or-later WITH GCC-exception-3.1
  license_file:
    - COPYING3
    - COPYING3.LIB

extra:
  recipe-maintainers:
    - EliaCereda
