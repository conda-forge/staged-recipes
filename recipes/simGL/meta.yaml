{% set name = "simGL" %}
{% set version = "0.2.0" %}
{% set python_min = "3.9" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0]|lower }}/{{ name|lower }}/{{ name|lower }}-{{ version }}.tar.gz
  sha256: 7079acd4bc1380a8a0c5e6e53556be9dc323201471d7f5a9717287bb5d447324

build:
  noarch: python
  number: 0
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python {{ python_min }}
    - pip
    - setuptools
  run:
    - python >={{ python_min }}
    - numpy >=1.22
    - scipy

test:
  requires:
    - python {{ python_min }}
  imports:
    - simGL

about:
  home: https://github.com/RacimoLab/simGL
  summary: Simulate genotype likelihoods from haplotypic genotype matrices
  description: |
    simGL simulates genotype likelihoods (GLs) from haplotypic genotype matrices,
    given per-sample coverage and sequencing error rates. It is designed to work
    seamlessly with msprime and tskit pipelines, but accepts any NumPy haplotype matrix.
  license: MIT
  license_file: LICENSE
  doc_url: https://simgl.readthedocs.io

extra:
  recipe-maintainers:
    - MoiColl
