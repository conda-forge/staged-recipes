schema_version: 1

context:
  version: "1.0.0"

package:
  name: piecewise-rational
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/p/piecewise-rational/piecewise_rational-${{ version }}.tar.gz
  sha256: d6d9d9022b78fa689ac4a62045401c6d0489ca69c94ce55befe045e0bfd4d6da

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - poetry-core
  run:
    - python >=${{ python_min }}

tests:
  - python:
      imports:
        - piecewise_rational
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  homepage: https://github.com/vollib/piecewise-rational
  repository: https://github.com/vollib/piecewise-rational
  summary: Shape-preserving piecewise rational cubic interpolation (Delbourgo-Gregory algorithm)
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - killua156
