{% set name = "proteinview" %}
{% set version = "0.3.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://github.com/001TMF/ProteinView/archive/refs/tags/v{{ version }}.tar.gz
  sha256: 6948e107fe2fc680875cf028e1ba31f406cc69ad249dc5b05c3feb0a5d64827d

build:
  number: 0
  skip: true  # [win]

requirements:
  build:
    - {{ compiler('rust') }}  # [build_platform == target_platform]
    - rust >=1.85.0
    - {{ compiler('c') }}
    - {{ stdlib('c') }}
  host:
    - {{ stdlib('c') }}
  run:
    - {{ stdlib('c') }}

test:
  commands:
    # test simple help message
    - 'proteinview -h'

about:
  home: https://github.com/001TMF/ProteinView
  summary: "Terminal molecular structure viewer — load, rotate, and explore proteins right in your terminal."
  description: |
    Terminal molecular structure viewer — load, rotate, and explore proteins, nucleic acids, and small molecules from 
    PDB/CIF files right in your terminal. No browser, no GUI, no dependencies.
  license: MIT
  license_file: LICENSE
  doc_url: https://github.com/001TMF/ProteinView
  dev_url: https://github.com/001TMF/ProteinView

extra:
  recipe-maintainers:
    - gieses
