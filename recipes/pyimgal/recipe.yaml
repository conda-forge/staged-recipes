schema_version: 1

context:
  python_min: "3.10"
  version: "0.3.1"

package:
  name: pyimgal
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/p/pyimgal/pyimgal-${{ version }}.tar.gz
  sha256: 494062d21434a5ffcaa5fad7be0278291419709662acef9fd1e35a8e61f3ccb1

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - maturin >=1.8.3
    - puccinialin >=0.1.12
    - pip
  run:
    - python >=${{ python_min }}
    - numpy

tests:
  - python:
      imports:
        - pyimgal
  - requirements:
      run:
        - pip
        - python ${{ python_min }}.*
    script:
      - pip check

about:
  summary: Python bindings for the imgal image processing and algorithm library.
  license: Unlicense
  license_file: LICENSE-UNLICENSE
  homepage: https://pypi.org/project/pyimgal/

extra:
  recipe-maintainers:
    - elevans
    - imagejan
