context:
  version: "0.2.0"

package:
  name: jupyterlab-notebook-awareness
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/j/jupyterlab-notebook-awareness/jupyterlab_notebook_awareness-${{ version }}.tar.gz
  sha256: 98ef9e61088bec54cd826a793091b74ea557e69b8b7f9cdc8d8387e0ba60c1be

build:
  noarch: python
  script: python -m pip install . -vv
  number: 0

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - hatchling >=1.5.0
    - jupyterlab >=4.0.0,<5
    - hatch-nodejs-version >=0.3.2
    - hatch-jupyter-builder >=0.5
  run:
    - python >=${{ python_min }}

tests:
  - python:
      imports:
        - jupyterlab_notebook_awareness
      pip_check: true
    requirements:
      run:
        - python ${{ python_min }}.*

about:
  homepage: https://github.com/jupyter-ai-contrib/jupyterlab-notebook-awareness
  summary: "Track current notebook and active cell in JupyterLab's awareness"
  license: BSD-3-Clause
  license_file: LICENSE
  documentation: https://jupyter-ai.readthedocs.io/
  repository: https://github.com/jupyter-ai-contrib/jupyterlab-notebook-awareness

extra:
  recipe-maintainers:
    - dlqqq
    - andrii-i
