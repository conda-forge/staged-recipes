context:
  version: "1.4.1"
  posix: ${{ 'm2-' if win else '' }}

package:
  name: r-openeo
  version: ${{ version }}

source:
  url:
    - ${{ cran_mirror }}/src/contrib/openeo_${{ version }}.tar.gz
    - ${{ cran_mirror }}/src/contrib/Archive/openeo/openeo_${{ version }}.tar.gz
  sha256: 534223db13e0965c1323148400defbcc69382988a75506f2be4be4b9ce5ad0f3

build:
  number: 0
  noarch: generic
  script:
    - if: unix
      then:
        - export DISABLE_AUTOBREW=1
        - ${R} CMD INSTALL --build .
    - if: win
      then:
        - '"%R%" CMD INSTALL --build .'
  dynamic_linking:
    rpaths:
      - lib/R/lib/
      - lib/
    missing_dso_allowlist:
      - if: win
        then:
          - '*/R.dll'
          - '*/Rblas.dll'
          - '*/Rlapack.dll'

requirements:
  build:
    - if: win
      then: ${{ posix }}zip
    - if: build_platform != target_platform
      then: cross-r-base ${{ r_base }}
  host:
    - r-base
    - r-jsonlite
    - r-httr2 >=0.2.2
    - r-r6
    - r-lubridate
    - r-base64enc
    - r-sf
    - r-irdisplay
    - r-htmltools
    - r-rlang
  run:
    - r-base
    - r-jsonlite
    - r-httr2 >=0.2.2
    - r-r6
    - r-lubridate
    - r-base64enc
    - r-sf
    - r-irdisplay
    - r-htmltools
    - r-rlang

tests:
  - script:
      - if: unix
        then: $R -e "library('openeo')"
      - if: win
        then: '"%R%" -e "library(''openeo'')"'

about:
  homepage: https://open-eo.github.io/openeo-r-client/
  repository: https://github.com/Open-EO/openeo-r-client
  summary: Access data and processing functionalities of 'openEO' compliant back-ends in R.
  license: Apache-2.0
  license_file: LICENSE

extra:
  recipe-maintainers:
    - arjxn-py
