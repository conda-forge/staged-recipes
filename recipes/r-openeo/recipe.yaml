context:
  version: "1.4.1"
  cran_mirror: https://cran.r-project.org

package:
  name: r-openeo
  version: ${{ version }}

source:
  url:
    - ${{ cran_mirror }}/src/contrib/openeo_${{ version }}.tar.gz
    - ${{ cran_mirror }}/src/contrib/Archive/openeo/openeo_${{ version }}.tar.gz
  sha256: 534223db13e0965c1323148400defbcc69382988a75506f2be4be4b9ce5ad0f3

build:
  number: 0
  noarch: generic
  script: R CMD INSTALL --build .

requirements:
  host:
    - r-base
    - r-jsonlite
    - r-httr2 >=0.2.2
    - r-r6
    - r-lubridate
    - r-base64enc
    - r-sf
    - r-irdisplay
    - r-htmltools
    - r-rlang
  run:
    - r-base
    - r-jsonlite
    - r-httr2 >=0.2.2
    - r-r6
    - r-lubridate
    - r-base64enc
    - r-sf
    - r-irdisplay
    - r-htmltools
    - r-rlang

tests:
  - script:
      - R -e "library('openeo')"

about:
  homepage: https://open-eo.github.io/openeo-r-client/
  repository: https://github.com/Open-EO/openeo-r-client
  summary: Access data and processing functionalities of 'openEO' compliant back-ends in R.
  license: Apache-2.0
  license_file: LICENSE

extra:
  recipe-maintainers:
    - arjxn-py
