c_stdlib:
  - if: linux
    then:
      - sysroot
  - if: osx
    then:
      - macosx_deployment_target
  - if: not unix
    then:
      - vs
c_stdlib_version:
  - if: linux
    then:
      - "2.17"
  - if: osx
    then:
      - "11.0"
  - if: not unix
    then:
      - "2022"

zig_compiler:
  - zig
zig_compiler_version:
  - 0.15.2

tg_:
  - "aarch64"
  - "ppc64le"
  - "s390x"
  - "riscv64"
