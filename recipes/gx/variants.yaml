mpi:
  - mpich
  - openmpi

# Override the global pinning c_stdlib_version to v2.28 as the required CUDA
# shared libraries (libcublas, libcutensor, libcusolver, libnccl) reference
# glibc symbols introduced between v2.18 and v2.28 (e.g. powf@GLIBC_2.27) and
# so linking against the current global pinning sysroot (v2.17) fails at link
# time.
# Setting c_stdlib_version to v2.28 ensures that newer glibc symbols don't
# accidentally get tagged in the binary. It additionally emits a matching
# '__glibc >=2.28,<3.0.a0` run-export so the package doesn't overconstrain
# glibc at install time, making it portable to any glibc >= 2.28 host.

# This follows what the upstream libcublas feedstock is doing.
# c.f. https://github.com/conda-forge/libcublas-feedstock/blob/e6c0206d3bf7d021b9c22b79997f82d801b54a15/recipe/conda_build_config.yaml#L3-L5
# c.f. https://github.com/conda-forge/libcublas-feedstock/pull/33#issuecomment-2613643869
c_stdlib_version:
  # 'if' statement is to avoid linter warning
  - if: linux
    then: "2.28"
