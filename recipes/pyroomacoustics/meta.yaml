{% set name = "pyroomacoustics" %}
{% set version = "0.8.3" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  - url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz
    sha256: 5619bcab3d03ffa4221383cf1ebaa2f078335c08d45601e10864612c8cbbc7d3
    patches:
      - remove-build-deps-from-runtime-metadata.patch

build:
  number: 0
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  build:
    - {{ compiler('cxx') }}
    - {{ stdlib('c') }}
  host:
    - cython
    - numpy  # for global pinnings
    - numpy >=1.13.0
    - pip
    - pybind11 >=2.2
    - python
    - setuptools
    - wheel
  run:
    # numpy has run exports
    - python
    - scipy >=0.18.0

test:
  imports:
    - pyroomacoustics
  commands:
    - pip check
  requires:
    - pip
    - python

about:
  home: https://github.com/LCAV/pyroomacoustics
  summary: Pyroomacoustics is a package for audio signal processing for indoor applications. It was developed as a fast prototyping platform for beamforming algorithms in indoor scenarios
  license: MIT
  license_file:
    - LICENSE
    - pyroomacoustics/libroom_src/ext/eigen/COPYING.BSD
    - pyroomacoustics/libroom_src/ext/eigen/COPYING.GPL
    - pyroomacoustics/libroom_src/ext/eigen/COPYING.LGPL
    - pyroomacoustics/libroom_src/ext/eigen/COPYING.MINPACK
    - pyroomacoustics/libroom_src/ext/eigen/COPYING.MPL2
    - pyroomacoustics/libroom_src/ext/eigen/COPYING.README

extra:
  recipe-maintainers:
    - jeongseok-meta
