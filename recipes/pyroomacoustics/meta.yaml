{% set name = "pyroomacoustics" %}
{% set version = "0.8.3" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  - url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz
    sha256: 5619bcab3d03ffa4221383cf1ebaa2f078335c08d45601e10864612c8cbbc7d3
    patches:
      - remove-build-deps-from-runtime-metadata.patch
      - use-system-eigen.patch
      - remove-bundled-eigen-from-manifest.patch

build:
  number: 0
  script:
    - export EIGEN_INCLUDE_DIR=$PREFIX/include/eigen3  # [unix]
    - set EIGEN_INCLUDE_DIR=%LIBRARY_PREFIX%\include\eigen3  # [win]
    - rm -rf pyroomacoustics/libroom_src/ext/eigen  # [unix]
    - if exist pyroomacoustics\libroom_src\ext\eigen rmdir /S /Q pyroomacoustics\libroom_src\ext\eigen  # [win]
    - {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  build:
    - {{ compiler('cxx') }}
    - {{ stdlib('c') }}
  host:
    - cython
    - eigen
    - numpy  # for global pinnings
    - numpy >=1.13.0
    - pip
    - pybind11 >=2.2
    - python
    - setuptools
    - wheel
  run:
    # numpy has run exports
    - python
    - scipy >=0.18.0

test:
  imports:
    - pyroomacoustics
  commands:
    - python run_test.py
    - pip check
  requires:
    - pip
    - python
  source_files:
    - run_test.py

about:
  home: https://github.com/LCAV/pyroomacoustics
  summary: Pyroomacoustics is a package for audio signal processing for indoor applications. It was developed as a fast prototyping platform for beamforming algorithms in indoor scenarios
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - jeongseok-meta
