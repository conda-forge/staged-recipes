schema_version: 1

context:
  version: "0.26.3"

package:
  name: tree-sitter-powershell
  version: ${{ version }}

source:
  url: https://github.com/airbus-cert/tree-sitter-powershell/archive/refs/tags/v${{ version }}.tar.gz
  sha256: 38f9cba3174dc63274336120070cd6a1828fa8eb832360b94ed2ddfe6c3ac226

build:
  number: 0
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  build:
    - ${{ compiler("c") }}
  host:
    - python
    - pip
    - setuptools >=42
  run:
    - python

tests:
  - python:
      imports:
        - tree_sitter_powershell

about:
  homepage: https://github.com/airbus-cert/tree-sitter-powershell
  summary: PowerShell grammar for tree-sitter
  license: MIT
  license_file: LICENSE
  repository: https://github.com/airbus-cert/tree-sitter-powershell

extra:
  recipe-maintainers:
    - killua156
    - mgorny
