{% set name = "python-tetgen" %}
{% set pypi_name = "tetgen" %}
{% set version = "0.8.2" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ pypi_name[0] }}/{{ pypi_name }}/{{ pypi_name }}-{{ version }}.tar.gz
  sha256: 06ca8d8b9e21cdbb75334e20ee77e788e88f4b2cdb85c51b008592cb3f9af964

build:
  number: 0
  # Keep the combined Genesis dependency PR tractable; expand Python support after feedstock creation.
  skip: true  # [py<310 or py>=312]
  script:
    - export CMAKE_GENERATOR=Ninja  # [not win]
    - set CMAKE_GENERATOR=Ninja  # [win]
    - set CMAKE_GENERATOR_PLATFORM=  # [win]
    - set CMAKE_GENERATOR_TOOLSET=  # [win]
    - {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  build:
    - {{ compiler('cxx') }}
    - {{ stdlib("c") }}
    - cmake
    - ninja
  host:
    - python
    - pip
    - scikit-build-core >=0.4.3
    - nanobind >=1.3.2
    - numpy
  run:
    - python
    - numpy

test:
  imports:
    - tetgen
    - tetgen._tetgen
  commands:
    - pip check
    - python run_test.py
  requires:
    - pip
  files:
    - run_test.py

about:
  home: https://github.com/pyvista/tetgen
  summary: Python interface to TetGen
  license: AGPL-3.0-or-later
  license_file: LICENSE
  dev_url: https://github.com/pyvista/tetgen
  doc_url: https://tetgen.pyvista.org/

extra:
  recipe-maintainers:
    - jeongseok-meta
