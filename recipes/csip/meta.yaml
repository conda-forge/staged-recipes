{% set version = "1.1.17" %}

package:
  name: csip
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/c/csip/csip-{{ version }}.tar.gz
  sha256: 47dabf3a96dee37a06bf7882feed8cbf22044033883d1f2725741f1b50afb2b2

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - pip
  run:
    - python >={{ python_min }}
    - requests

test:
  imports:
    - csip
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  home: http://alm.engr.colostate.edu/cb/project/csip
  summary: CSIP client library
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - akrherz
