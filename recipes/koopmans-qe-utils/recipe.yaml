schema_version: 1

context:
  name: koopmans-qe-utils
  version: "0.1.1"
  qe_version: "7.4"
  mpi: openmpi
  mpi_prefix: "mpi_${{ mpi }}"

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  # TEMP: point at the add-scalapack branch for an osx-64 link fix; revert to
  # the v${{ version }} tag once the fix is merged and a new release is cut.
  - url: https://github.com/epfl-theos/${{ name }}/archive/refs/heads/add-scalapack.tar.gz
    sha256: "a4f31263afd6cdfd96a43afc110d7e474d6818cc0e45dac3f23b107a740c84b4"
  - url: https://gitlab.com/QEF/q-e/-/archive/qe-${{ qe_version }}/q-e-qe-${{ qe_version }}.tar.gz
    sha256: "b15dcfe25f4fbf15ccd34c1194021e90996393478226e601d876f7dea481d104"
    target_directory: external/qe

build:
  number: 0
  skip: win
  script: build.sh

requirements:
  build:
    - ${{ compiler('c') }}
    - ${{ stdlib('c') }}
    - ${{ compiler('fortran') }}
    - openmpi-mpifort
    - cmake >=3.18.0
    - make
    - pkg-config
  host:
    - libblas
    - liblapack
    - "hdf5 * *${{ mpi_prefix }}_*"
    - openmpi
    - scalapack
    - fftw
    - if: linux
      then: libgomp
    - if: osx
      then: llvm-openmp
  run:
    - fftw
    - openmpi
    - scalapack
    - qe ==${{ qe_version }}
    - if: linux
      then: libgomp
    - if: osx
      then: llvm-openmp
  ignore_run_exports:
    # The compiler's run_exports pin _openmp_mutex, but our binaries link
    # libgomp (linux) / llvm-openmp (osx) directly — we declare those in
    # run:, so _openmp_mutex is redundant and shows up as overdepending.
    by_name:
      - _openmp_mutex

tests:
  - package_contents:
      bin:
        - merge_evc.x
        - wann2kcp.x
        - epsilon.x
  - script:
      env:
        # Allow openmpi to launch inside the conda-forge test container:
        # root is fine, fall back to the local fork launcher rather than
        # looking for a nonexistent ssh/rsh agent, and oversubscribe so
        # `-np 2` runs on a single-core CI runner.
        OMPI_ALLOW_RUN_AS_ROOT: "1"
        OMPI_ALLOW_RUN_AS_ROOT_CONFIRM: "1"
        OMPI_MCA_plm_rsh_agent: "false"
        OMPI_MCA_rmaps_base_oversubscribe: "yes"
        # Force single-threaded BLAS/LAPACK to rule out Apple Accelerate's
        # internal threading as the cause of wannier90.x crashing mid-
        # wannierise on osx. VECLIB_* is Apple-specific; OMP_NUM_THREADS
        # is a common secondary hint.
        VECLIB_MAXIMUM_THREADS: "1"
        OMP_NUM_THREADS: "1"
      content:
        # --- temporary osx wannier90.x segfault diagnostics ---
        - echo "== which wannier90.x =="; which wannier90.x || true
        - echo "== file =="; file "$(which wannier90.x)" || true
        - echo "== linked libs =="
        - if [[ "$(uname)" == "Darwin" ]]; then otool -L "$(which wannier90.x)"; else ldd "$(which wannier90.x)"; fi || true
        - echo "== zero-arg run (should print usage, not crash) =="
        - wannier90.x; echo "wannier90.x exit=$?"
        - echo "== running wannier90.x on the wann2kcp_basic fixture (standalone) =="
        - |
          set +e  # the whole point is to inspect wannier90 AFTER it segfaults
          FIX=$(find "$PREFIX/etc/conda/test-files" -type d -name fixtures -path "*wann2kcp_basic*" | head -1)
          if [[ -z "$FIX" || ! -d "$FIX" ]]; then
            echo "ERROR: wann2kcp_basic fixtures not found under $PREFIX/etc/conda/test-files"
            echo "-- recursive listing of test-files dir --"
            ls -R "$PREFIX/etc/conda/test-files" 2>/dev/null | head -40
          else
            echo "fixtures: $FIX"
            DBG=/tmp/w90dbg
            rm -rf "$DBG"
            mkdir -p "$DBG"
            cp -r "$FIX"/. "$DBG"/
            echo "-- staged fixture files --"
            ls -la "$DBG"
            cd "$DBG"
            wannier90.x wannier90
            echo "exit=$?"
            echo "-- wannier90.wout (last 80 lines) --"
            tail -80 wannier90.wout 2>/dev/null || echo "(no .wout produced)"
            echo "-- wannier90.werr if any --"
            cat wannier90.werr 2>/dev/null || echo "(no .werr)"
          fi
          set -e
        - echo "== end diagnostics =="
        - cmake -S tests -B tests/_build
        - ctest --test-dir tests/_build --output-on-failure
    files:
      source:
        - tests/
    requirements:
      run:
        - cmake
        - make
        # wannier90.x comes from `qe` (already in the package's run:),
        # which ships its own bundled wannier90.x built in the same
        # environment as qe — guaranteed ABI-compatible and avoids a
        # segfault seen with the standalone wannier90 osx-64 package.
        - python

about:
  license: GPL-2.0-only
  license_file: LICENSE
  summary: Fortran utilities for performing Koopmans calculations with Quantum ESPRESSO
  description: |
    koopmans-qe-utils is a set of Fortran utilities required for
    performing Koopmans calculations with koopmans-kcp, built on top
    of Quantum ESPRESSO. It provides:

    - merge_evc.x, a program for merging wavefunction files
    - wann2kcp.x, a program for converting Wannier90 files into a
      format readable by kcp.x
    - epsilon.x, a modified version of Quantum ESPRESSO's epsilon.x
  homepage: https://github.com/epfl-theos/koopmans-qe-utils
  repository: https://github.com/epfl-theos/koopmans-qe-utils

extra:
  recipe-maintainers:
    - elinscott
    - nscolonna
