{% set python_min = "3.10" %}
{% set version = "0.63b1" %}

package:
  name: opentelemetry-instrumentation-asyncio
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/o/opentelemetry-instrumentation-asyncio/opentelemetry_instrumentation_asyncio-{{ version }}.tar.gz
  sha256: 0ae623583dcbe0ae17d63c995906d02a64213652ff180875ace680d1e6c286ec

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python {{ python_min }}.*
    - hatchling
    - pip
  run:
    - python >={{ python_min }}
    - opentelemetry-api >=1.14,<2.dev0
    - opentelemetry-instrumentation ==0.63b1
    - opentelemetry-semantic-conventions ==0.63b1
    - wrapt >=1.0.0,<3.0.0

test:
  imports:
    - opentelemetry_instrumentation_asyncio
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}.*

about:
  home: https://github.com/open-telemetry/opentelemetry-python-contrib/tree/main/instrumentation/opentelemetry-instrumentation-asyncio
  summary: OpenTelemetry instrumentation for asyncio
  license: Apache-2.0
  license_file: LICENSE

extra:
  recipe-maintainers:
    - BrownMunda1
