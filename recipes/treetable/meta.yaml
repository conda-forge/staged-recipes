{% set version = "0.2.6" %}
{% set python_min = "3.6" %}

package:
  name: treetable
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/t/treetable/treetable-{{ version }}.tar.gz
  sha256: 7e1d62dbce503fbf24561aee1461b8fbcc2c232ff45661c3b9d0c2081c795bdf

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python >={{ python_min }}
    - setuptools >=45
    - pip
  run:
    - python >={{ python_min }}

test:
  imports:
    - treetable
  commands:
    - pip check
  requires:
    - pip
    - python

about:
  home: https://github.com/adefossez/treetable
  summary: Helper to pretty print an ascii table with a tree-like structure
  license: Unlicense
  license_file: LICENSE

extra:
  recipe-maintainers:
    - fitzgeralddp
