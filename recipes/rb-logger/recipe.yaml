context:
  gem_name: "logger"
  version: "1.7.0"

package:
  name: rb-${{ gem_name }}
  version: ${{ version }}

source:
  url: https://rubygems.org/downloads/${{ gem_name }}-${{ version }}.gem
  sha256: 196edec7cc44b66cfb40f9755ce11b392f21f7967696af15d274dde7edff0203

build:
  noarch: generic
  number: 0
  script: build

requirements:
  host:
    - ruby
  run:
    - ruby

tests:
  - script:
      - ruby -r logger -e "exit 0"

about:
  homepage: https://rubygems.org/gems/${{ gem_name }}
  summary: Provides a simple logging utility for outputting messages.
  license: Ruby AND BSD-2-Clause
  license_file: ${{ gem_name }}-${{ version }}/COPYING
  repository: https://github.com/ruby/logger

extra:
  recipe-maintainers:
    - aktech
