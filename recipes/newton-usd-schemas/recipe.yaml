schema_version: 1

context:
  name: newton-usd-schemas
  version: 0.1.0
  build_number: 0

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/${{ name[0] }}/${{ name }}/${{ name|replace("-", "_")|lower }}-${{ version }}.tar.gz
  sha256: 07420c425abd6282e1e9ac0dce4ef2d87bc6e08639f0b00db694de63684ef341

build:
  noarch: python
  number: ${{ build_number }}
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - hatchling
  run:
    - python >=${{ python_min }}
    - openusd

tests:
  - python:
      imports:
        - newton_usd_schemas
      pip_check: true
      python_version: ${{ python_min }}.*
  - script:
      - python -m unittest discover -v -s ./tests
    files:
      source:
        - tests/
        - pyproject.toml
    requirements:
      run:
        - python ${{ python_min }}.*

about:
  homepage: https://github.com/newton-physics/newton-usd-schemas
  license: Apache-2.0
  license_file: LICENSE.md
  repository: https://github.com/newton-physics/newton-usd-schemas
  summary: OpenUSD Schemas for Newton

extra:
  recipe-maintainers:
    - adenzler-nvidia
    - diegoferigo
    - eric-heiden
