schema_version: 1

context:
  posix: '"m2-" if win else ""'
  native: '"m2w64-" if win else ""'

package:
  name: r-tikzdevice
  version: ${{ version }}

source:
  url: https://cran.r-project.org/src/contrib/tikzDevice_${{ version }}.tar.gz
  sha256: 04db2163ca9acb640161fb84dfc492f16abc6f5acc0c64782c197457e15004ac

build:
  number: 0
  script: R CMD INSTALL --build .
  merge_build_and_host_envs: true
  dynamic_linking:
    rpaths:
      - lib/R/lib/
      - lib/

requirements:
  build:
    - ${{ stdlib("c") }}
    - if: build_platform != target_platform
      then: cross-r-base ${{ r_base }}
    - if: unix
      then: autoconf
    - if: unix
      then: ${{ compiler('c') }}
    - if: win
      then: ${{ compiler('m2w64_c') }}
    - if: unix
      then: ${{ compiler('cxx') }}
    - if: win
      then: ${{ compiler('m2w64_cxx') }}
    - if: win
      then: m2-base
  host:
    - r-base
    - r-filehash >=2.3
    - r-png
  run:
    - r-base
    - r-filehash >=2.3
    - r-png

tests:
  - script:
      - if: not win
        then: $R -e "library('tikzDevice')"
      - if: win
        then: "\"%R%\" -e \"library('tikzDevice')\""

about:
  summary: Provides a graphics output device for R that records plots in a LaTeX-friendly format. The device transforms plotting commands issued by R functions into LaTeX code blocks. When included in a LaTeX document, these blocks are interpreted with the help of 'TikZ'---a graphics package for TeX and friends written by Till Tantau. Using the 'tikzDevice', the text of R plots can contain LaTeX commands such as mathematical formula. The device also allows arbitrary LaTeX code to be inserted into the output stream.
  license: GPL-2.0-only
  license_family: GPL2
  license_file:
    - '{{ environ["PREFIX"] }}/lib/R/share/licenses/GPL-2'
  homepage: https://github.com/daqana/tikzDevice

extra:
  recipe-maintainers:
    - GiulioCentorame
