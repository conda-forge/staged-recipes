build:
  number: 0

requirements:
  build:
    - ${{ compiler("c") }}
    - ${{ compiler("cxx") }}
    - ${{ stdlib("c") }}
    - ${{ "make" if unix }}
    - ${{ "jom" if win }}
    - cmake
    - ispc
    - python *
  host:
    - tbb-devel
  run_exports:
    - ${{ pin_subpackage(name|lower, upper_bound="x") }}

tests:
  - package_contents:
      lib:
        - OpenImageDenoise
        - OpenImageDenoise_core
        - ${{ "OpenImageDenoise_device_cpu" if not win }}
      include:
        - OpenImageDenoise/oidn.hpp

about:
  homepage: https://www.openimagedenoise.org
  repository: https://github.com/RenderKit/oidn
  documentation: https://www.openimagedenoise.org/documentation.html
  license: Apache-2.0
  license_file: LICENSE.txt
  summary: Intel® Open Image Denoise library
  description: |
    Intel Open Image Denoise is an open source library of high-performance, high-quality denoising filters for images rendered with ray tracing.
    Intel Open Image Denoise is part of the Intel® Rendering Toolkit and is released under the permissive Apache 2.0 license.
    It has been recognized with a Technical Achievement Award by the Academy of Motion Picture Arts and Sciences in 2025 for its contribution to the motion picture industry.

    The purpose of Intel Open Image Denoise is to provide an open, high-quality, efficient, and easy-to-use denoising library that allows one to significantly reduce rendering times in ray tracing based rendering applications.
    It filters out the Monte Carlo noise inherent to stochastic ray tracing methods like path tracing, reducing the amount of necessary samples per pixel by even multiple orders of magnitude (depending on the desired closeness to the ground truth).
    A simple but flexible C/C++ API ensures that the library can be easily integrated into most existing or new rendering solutions.

