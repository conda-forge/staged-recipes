context:
  version: "1.5.0"

package:
  name: mgclient
  version: ${{ version }}

source:
  url: https://github.com/memgraph/mgclient/archive/v${{ version }}.tar.gz
  sha256: 7934ee5fb2a5a9ddf861b9255cb092594e30b6b1fe88b55a4966d736933b5ef1

build:
  number: 0
  skip:
    - win

requirements:
  build:
    - ${{ compiler('c') }}
    - ${{ stdlib('c') }}
    - cmake
    - make
  host:
    - openssl

tests:
  - script:
      - test -f $PREFIX/include/mgclient.h
      - test -f $PREFIX/lib/libmgclient${SHLIB_EXT}

about:
  homepage: https://memgraph.com/
  summary: C library interface for Memgraph database
  description: |
    mgclient is a C library interface for Memgraph database. It provides a
    C API for connecting to and communicating with a Memgraph instance using
    the Bolt protocol.
  license: Apache-2.0
  license_file: LICENSE
  documentation: https://memgraph.github.io/mgclient/
  repository: https://github.com/memgraph/mgclient

extra:
  recipe-maintainers:
    - ryuwd
