schema_version: 1

context:
  version: "0.1.0"

package:
  name: jupyverse-frontend
  version: ${{ version }}

source:
  - url: https://pypi.org/packages/source/j/jupyverse-frontend/jupyverse_frontend-${{ version }}.tar.gz
    sha256: 2cd05e751734bf905e8fa3bc280e0fda0b22f133a8b14497121ef8892f806e77

build:
  noarch: python
  number: 0
  script:
    - ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation --disable-pip-version-check

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - uv-build
  run:
    - python >=${{ python_min }}
    - jupyverse-api >=0.15.0,<0.16.0

tests:
  - python:
      imports: jupyverse_frontend
      pip_check: true
      python_version: ${{ python_min }}.*

about:
  license: BSD-3-Clause
  license_file: COPYING.md
  homepage: https://github.com/jupyter-server/jupyverse/tree/main/api/frontend
  summary: The API for Jupyverse's frontend.

extra:
  recipe-maintainers:
    - davidbrochart
