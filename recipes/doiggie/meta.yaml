{% set version = "0.1.0" %}

package:
  name: doiggie
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/d/doiggie/doiggie-{{ version }}.tar.gz
  sha256: e9dd32a97d03e1517e906cfbb6e0ef8a98197f575b135845c8ed33620efcb6a4

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python >=3.9
    - setuptools >=61
    - setuptools-scm >=7
    - pip
  run:
    - python >=3.9
    - pooch
    - requests

test:
  imports:
    - doiggie
  commands:
    - pip check
  requires:
    - pip
    - python

about:
  home: https://pypi.org/project/doiggie/
  summary: Enable pooch to work with DOIs
  license: BSD-2-Clause
  license_file:
    - LICENSE.md

extra:
  recipe-maintainers:
    - dokempf
