schema_version: 1

context:
  version: "0.13.2"

package:
  name: openshift
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/o/openshift/openshift-${{ version }}.tar.gz
  sha256: f55789fce56fcbf7e2cd9377a68c4a99ab406074d3324b9abcca98477d101471

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
  run:
    - python >=${{ python_min }}
    - python-kubernetes >=12.0
    - python-string-utils
    - six

tests:
  - python:
      imports:
        - openshift
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  homepage: https://github.com/openshift/openshift-restclient-python
  summary: OpenShift python client
  license: Apache-2.0
  license_file: LICENSE

extra:
  recipe-maintainers:
    - pb01ka
