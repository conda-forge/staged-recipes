schema_version: 1

context:
  python_min: "3.9"
  version: "3.0.4"

package:
  name: pid
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/p/pid/pid-${{ version }}.tar.gz
  sha256: 0e33670e83f6a33ebb0822e43a609c3247178d4a375ff50a4689e266d853eb66

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - setuptools
    - pip
  run:
    - python >=${{ python_min }}
    - psutil >=5.4.8

tests:
  - python:
      imports:
        - pid
      pip_check: true
      python_version: ${{ python_min }}.*

about:
  summary: Pidfile featuring stale detection and file-locking, can also be used as context-manager or decorator
  license: Apache-2.0
  license_file: LICENSE
  homepage: https://github.com/trbs/pid/
  repository: https://github.com/trbs/pid/

extra:
  recipe-maintainers:
    - pavelzw
