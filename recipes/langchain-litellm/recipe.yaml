package:
  name: langchain-litellm
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/l/langchain-litellm/langchain_litellm-${{ version }}.tar.gz
  sha256: d3b8d0e6f65132f048fbe9d706e5334d45830e3c49aa033d32c37c6683ad2ceb

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - hatchling
    - pip
  run:
    - python >=${{ python_min }}
    - langchain-core >=1.4.7,<2.0.0
    - litellm >=1.83.14,<2.0.0,!=1.82.7,!=1.82.8
    - httpx >=0.28.1,<0.29.0
    - cryptography >=46.0.5,<49.0.0

tests:
  - python:
      imports:
        - langchain_litellm
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  homepage: https://pypi.org/project/langchain-litellm/
  license: MIT
  license_file: LICENSE
  summary: An integration package connecting LiteLLM and LangChain
  repository: https://github.com/langchain-ai/langchain-litellm
  documentation: https://docs.langchain.com/oss/python/integrations/chat/litellm
  description: |
    langchain-litellm is the LangChain partner package that connects LiteLLM
    and LangChain. It exposes ChatLiteLLM and ChatLiteLLMRouter chat models,
    LiteLLMEmbeddings and LiteLLMEmbeddingsRouter embeddings, and a
    LiteLLMOCRLoader document loader, letting LangChain applications call any
    of the 100+ LLM providers supported by LiteLLM through a single interface.

extra:
  recipe-maintainers:
    - rxm7706
