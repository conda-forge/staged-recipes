# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "0.11.0"

package:
  name: google-cloud-vectorsearch
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/g/google-cloud-vectorsearch/google_cloud_vectorsearch-${{ version }}.tar.gz
  sha256: 2946439c176576c5e399430cc78a3f843b6d7c1b9c1a914f06bcae20f32f3ced

build:
  noarch: python
  number: 0
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - setuptools
  run:
    - python >=${{ python_min }}
    - google-api-core >=2.17.1,<3.0.0
    - google-auth >=2.14.1,<3.0.0,!=2.24.0,!=2.25.0
    - grpcio >=1.59.0,<2.0.0
    - grpcio-status >=1.59.0,<2.0.0
    - proto-plus >=1.22.3,<2.0.0
    - protobuf >=4.25.8,<8.0.0

tests:
  - python:
      imports:
        - google.cloud.vectorsearch
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  homepage: https://github.com/googleapis/google-cloud-python/tree/main/packages/google-cloud-vectorsearch
  license: Apache-2.0
  license_file: LICENSE
  summary: Google Cloud Vectorsearch API client library
  repository: https://github.com/googleapis/google-cloud-python
  description: |
    Python Client for Vector Search.

    google-cloud-vectorsearch provides Python client access to Google
    Cloud's Vector Search service, a managed vector database for search,
    recommendation, and AI applications.

extra:
  recipe-maintainers:
    - rxm7706
