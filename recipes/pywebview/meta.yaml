schema_version: 1

context:
  name: pywebview
  version: "6.2.1"
  python_min: "3.8"

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/p/${{ name }}/${{ name }}-${{ version }}.tar.gz
  sha256: 71b7136752e40824655304d938efb62014218d1a90bd8e87e1cbdb1ce9c466af

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - setuptools
    - setuptools-scm
  run:
    - python >=${{ python_min }}
    - importlib_resources
    - proxy-tools
    - bottle
    - typing_extensions
    - if: unix
      then:
        - __unix
      else:
        - __win
    - if: win
      then:
        - pythonnet
    - if: osx
      then:
        - pyobjc-core >=9.0
        - pyobjc-framework-cocoa >=9.0
        - pyobjc-framework-quartz >=9.0
        - pyobjc-framework-webkit >=9.0
        - pyobjc-framework-security >=9.0
        - pyobjc-framework-uniformtypeidentifiers >=12.0

tests:
  - python:
      imports:
        - webview
  - requirements:
      run:
        - pip
    script:
      - pip check

about:
  homepage: https://${{ name }}.flowrl.com/
  summary: Build GUI for your Python program with JavaScript, HTML, and CSS
  license: BSD-3-Clause
  license_file: LICENSE
  repository: https://github.com/r0x0r/${{ name }}/

extra:
  recipe-maintainers:
    - jaromieee