{% set name = "pywebview" %}
{% set version = "6.2.1" %}
{% set python_min = "3.8" %}

package:
  name: {{ name }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/p/{{ name }}/{{ name }}-{{ version }}.tar.gz
  sha256: 71b7136752e40824655304d938efb62014218d1a90bd8e87e1cbdb1ce9c466af

build:
  skip: true  # [py<38]
  number: 0
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python
    - pip
    - setuptools
    - setuptools-scm
  run:
    - python
    - pythonnet  # [win]
    - pyobjc-core >=9.0  # [osx]
    - pyobjc-framework-cocoa >=9.0  # [osx]
    - pyobjc-framework-quartz >=9.0  # [osx]
    - pyobjc-framework-webkit >=9.0  # [osx]
    - pyobjc-framework-security >=9.0  # [osx]
    - pyobjc-framework-uniformtypeidentifiers >=12.0  # [osx]
    - qtpy  # [openbsd]
    - importlib_resources
    - proxy-tools
    - bottle
    - typing_extensions

test:
  imports:
    - webview
  commands:
    - pip check
  requires:
    - pip
    - python

about:
  home: https://{{ name }}.flowrl.com/
  summary: Build GUI for your Python program with JavaScript, HTML, and CSS
  license: BSD-3-Clause
  license_file: LICENSE
  dev_url: https://github.com/r0x0r/{{ name }}/

extra:
  recipe-maintainers:
    - jaromieee
