schema_version: 1

context:
  python_min: "3.12"
  version: "0.2.2"

package:
  name: spml
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/s/spml/spml-${{ version }}.tar.gz
  sha256: 3412e5bf2bb03fa2ef2a19ea1f71b87a25209a3455cfd291e0c8c7326ee08dde

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - setuptools >=61.0
    - setuptools-scm >=6.2
    - pip
  run:
    - python >=${{ python_min }}
    - geopandas >=1.1.0
    - joblib >=1.5.0
    - libpysal >=4.12
    - numpy >=2.0.0
    - scipy >=1.14.0
    - scikit-learn >=1.5.0
    - pandas >=2.3.0

tests:
  - python:
      imports:
        - spml
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  summary: Spatial machine learning.
  license: BSD-3-Clause
  license_file: LICENSE
  homepage: https://pysal.org/spml/
  documentation: https://pysal.org/spml/

extra:
  recipe-maintainers:
    - martinfleis
    - jGaboardi