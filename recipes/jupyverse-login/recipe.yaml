schema_version: 1

context:
  version: "0.1.0"

package:
  name: jupyverse-login
  version: ${{ version }}

source:
  - url: https://pypi.org/packages/source/j/jupyverse-login/jupyverse_login-${{ version }}.tar.gz
    sha256: 8fd4547a8fa4a111c42c7a7ee4027c42164959e58557292effd4557f1367ba5b

build:
  noarch: python
  number: 0
  script:
    - ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation --disable-pip-version-check

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - uv-build
  run:
    - python >=${{ python_min }}
    - fastapi-core
    - jupyverse-api >=0.15.0,<0.16.0

tests:
  - python:
      imports: jupyverse_login
      pip_check: true
      python_version: ${{ python_min }}.*

about:
  license: BSD-3-Clause
  license_file: COPYING.md
  homepage: https://github.com/jupyter-server/jupyverse/tree/main/api/login
  summary: The API for Jupyverse's login.

extra:
  recipe-maintainers:
    - davidbrochart
