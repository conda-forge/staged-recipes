{% set name = "dalphaball" %}
{% set version = "1.0.0" %}
{% set commit = "7b9dc05fa2a40f7ea36c6d89973d150eaed459d9" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://github.com/outpace-bio/DAlphaBall/archive/{{ commit }}.tar.gz
  sha256: 13078d63b3362b6c6cdf14298626d8d887b65a441c884fc6c65381a728b0575a

build:
  number: 0
  skip: true  # [win]

requirements:
  build:
    - {{ compiler('c') }}
    - {{ stdlib("c") }}
    - {{ compiler('fortran') }}
    - make
  host:
    - gmp

test:
  commands:
    - "DAlphaBall.gcc | grep 'at least one arg is required!'"
    - "dalphaball | grep 'at least one arg is required!'"

about:
  home: https://simtk.org/projects/alphamol
  summary: "DAlphaBall - a tool for computing the surface area and volume of unions of many balls."
  description: |
    DAlpahBall is a computational software tool designed to calculate the surface area and volume of the union of a set 
    of intersecting spheres. It is primarily used in structural bioinformatics for the analysis of protein
    structures.
  license: LGPL-2.1
  license_file: LICENSE
  doc_url: https://github.com/outpace-bio/DAlphaBall
  dev_url: https://github.com/outpace-bio/DAlphaBall

extra:
  recipe-maintainers:
    - gieses
