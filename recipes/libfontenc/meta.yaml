{% set version = "1.1.9" %}

package:
  name: libfontenc
  version: {{ version }}

source:
  url: https://www.x.org/releases/individual/lib/libfontenc-{{ version }}.tar.xz
  sha256: 9d8392705cb10803d5fe1d27d236cbab3f664e26841ce01916bbbe430cf273e2

build:
  number: 0
  skip: true  # [win]
  run_exports:
    - {{ pin_subpackage('libfontenc', max_pin='x') }}

requirements:
  build:
    - {{ compiler('c') }}
    - {{ stdlib('c') }}
    - meson
    - ninja
    - pkg-config
  host:
    - xorg-xorgproto
    - xorg-font-util
    - zlib

test:
  commands:
    - test -f "${PREFIX}/lib/libfontenc${SHLIB_EXT}"
    - test -f "${PREFIX}/lib/pkgconfig/fontenc.pc"

about:
  home: https://www.x.org/
  license: MIT
  license_family: MIT
  license_file: COPYING
  summary: X.Org font encoding library (libfontenc)
  description: |
    libfontenc is a library used by the X.Org font libraries (notably
    libXfont2) to handle font encoding tables, mapping between the various
    character-set encodings used by X11 fonts.
  dev_url: https://gitlab.freedesktop.org/xorg/lib/libfontenc

extra:
  recipe-maintainers:
    - hmaarrfk
