context:
  version: "0.1.0"

package:
  name: nokap
  version: ${{ version }}

source:
  url: https://github.com/posit-dev/nokap/archive/refs/tags/v${{ version }}.tar.gz
  sha256: 8d79818a12e7f33c370f9d34a240201ebbba40766a6406a3e8b31bfd11bf246a

build:
  noarch: python
  number: 0
  script:
    content: python -m pip install . -vv --no-deps --no-build-isolation --no-index --use-deprecated=legacy-certs
    env:
      PYTHONHASHSEED: "1"
      SETUPTOOLS_SCM_PRETEND_VERSION: ${{ version }}

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - setuptools >=45
    - setuptools_scm >=6.2
    - wheel
  run:
    - python >=${{ python_min }}
    - click >=8.0
    - websockets >=12.0

tests:
  - python:
      imports:
        - nokap
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"
  - script:
      - nokap --help
    requirements:
      run:
        - python ${{ python_min }}.*

about:
  homepage: https://github.com/posit-dev/nokap
  repository: https://github.com/posit-dev/nokap
  documentation: https://posit-dev.github.io/nokap/
  license: MIT
  license_file: LICENSE
  summary: Capture screenshots and PDFs from web pages using headless Chrome via CDP
  description: |
    nokap captures screenshots and PDFs from web pages or local HTML using
    headless Chrome via the Chrome DevTools Protocol. It communicates directly
    with Chrome over WebSockets and does not require Selenium or Playwright.

extra:
  recipe-maintainers:
    - rich-iannone
    - timkpaine
