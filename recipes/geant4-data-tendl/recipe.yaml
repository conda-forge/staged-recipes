schema_version: 1

context:
  dataset_name: TENDL
  version: "1.4.0"
  version_canonical_geant4: "1.4"
  env_var: G4PARTICLEHPDATA
  name: geant4-data-tendl
  install_dir: share/Geant4/data/G4TENDL1.4

package:
  name: ${{ name }}
  version: ${{ version }}

source:
  url: https://geant4-data.web.cern.ch/geant4-data/datasets/G4${{ dataset_name }}.${{ version_canonical_geant4 }}.tar.gz
  sha256: 4b7274020cc8b4ed569b892ef18c2e088edcdb6b66f39d25585ccee25d9721e0
  target_directory: dataset

build:
  number: 0
  noarch: generic
  script:
    interpreter: nu
    content: |
      let dest = $"($env.PREFIX)/${{ install_dir }}"
      mkdir $dest
      cp -r dataset/* $dest
      let activate_d = $"($env.PREFIX)/etc/conda/activate.d"
      let deactivate_d = $"($env.PREFIX)/etc/conda/deactivate.d"
      mkdir $activate_d
      mkdir $deactivate_d
      let install_dir_bs = ("${{ install_dir }}" | str replace -a "/" "\\")
      $"export ${{ env_var }}=\"$CONDA_PREFIX/${{ install_dir }}\"\n" | save -f $"($activate_d)/activate-${{ name }}.sh"
      $"unset ${{ env_var }}\n" | save -f $"($deactivate_d)/deactivate-${{ name }}.sh"
      $"set -gx ${{ env_var }} \"$CONDA_PREFIX/${{ install_dir }}\"\n" | save -f $"($activate_d)/activate-${{ name }}.fish"
      $"set -e ${{ env_var }}\n" | save -f $"($deactivate_d)/deactivate-${{ name }}.fish"
      $"setenv ${{ env_var }} \"$CONDA_PREFIX/${{ install_dir }}\"\n" | save -f $"($activate_d)/activate-${{ name }}.csh"
      $"unsetenv ${{ env_var }}\n" | save -f $"($deactivate_d)/deactivate-${{ name }}.csh"
      $"@set \"${{ env_var }}=%CONDA_PREFIX%\\($install_dir_bs)\"\r\n" | save -f $"($activate_d)/activate-${{ name }}.bat"
      $"@set \"${{ env_var }}=\"\r\n" | save -f $"($deactivate_d)/deactivate-${{ name }}.bat"

requirements:
  build:
    - nushell

tests:
  - package_contents:
      files:
        - etc/conda/activate.d/activate-${{ name }}.sh
        - etc/conda/activate.d/activate-${{ name }}.bat
        - ${{ install_dir }}/**
  - script:
      - if: unix
        then: '[ "${${{ env_var }}}" = "$CONDA_PREFIX/${{ install_dir }}" ] && [ -d "${${{ env_var }}}" ]'
        else: 'if not exist "%${{ env_var }}%\NUL" exit 1'

about:
  homepage: https://geant4.web.cern.ch/
  summary: Geant4 dataset translated from the TENDL-2014 incident proton data library
  description: |
    Database translated from the TENDL-2014 incident proton data library
    (written in ENDF-6 format).
  license: LicenseRef-Geant4
  license_file: CREDIT

extra:
  recipe-maintainers:
    - conda-forge/geant4
