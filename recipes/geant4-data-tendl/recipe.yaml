schema_version: 1

context:
  dataset_name: TENDL
  version: "1.4.0"
  version_canonical_geant4: "1.4"
  env_var: G4PARTICLEHPDATA
  name: geant4-data-tendl
  install_dir: share/Geant4/data/G4TENDL1.4

package:
  name: ${{ name }}
  version: ${{ version }}

source:
  url: https://geant4-data.web.cern.ch/geant4-data/datasets/G4${{ dataset_name }}.${{ version_canonical_geant4 }}.tar.gz
  sha256: 4b7274020cc8b4ed569b892ef18c2e088edcdb6b66f39d25585ccee25d9721e0
  target_directory: dataset

build:
  number: 0
  noarch: generic
  script:
    interpreter: nu
    content: |
      let dest = $"($env.PREFIX)/${{ install_dir }}"
      mkdir $dest
      cp -r dataset/* $dest
      mkdir $"($env.PREFIX)/etc/conda/env_vars.d"
      {"${{ env_var }}": $dest} | to json | save -f $"($env.PREFIX)/etc/conda/env_vars.d/${{ name }}.json"

requirements:
  build:
    - nushell

tests:
  - script:
      interpreter: nu
      content: |
        let json_path = $"($env.PREFIX)/etc/conda/env_vars.d/${{ name }}.json"
        if not ($json_path | path exists) { error make {msg: "env_vars.d JSON missing"} }
        let expected = $"($env.CONDA_PREFIX)/${{ install_dir }}"
        let actual = ($env | get "${{ env_var }}")
        if $actual != $expected { error make {msg: $"($actual) != ($expected)"} }
    requirements:
      run:
        - nushell

about:
  homepage: https://geant4.web.cern.ch/
  summary: GEANT4 TENDL-based data files for high precision models of particle interactions with nuclei
  license: LicenseRef-Geant4
  license_file: CREDIT

extra:
  recipe-maintainers:
    - conda-forge/geant4
