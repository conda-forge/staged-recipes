{% set name = "pysplashsurf" %}
{% set version = "0.14.1.0" %}
{% set tag = "v0.14.1" %}
{% set python_min = "3.10" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://github.com/InteractiveComputerGraphics/splashsurf/archive/refs/tags/{{ tag }}.tar.gz
  sha256: 95f140816d1b0038af9afeb6b57984820badfd960db8bb95968aff02dfc42e73

build:
  number: 0
  skip: true  # [py != 310]
  python_version_independent: true
  script:
    - cargo-bundle-licenses --format yaml --output THIRDPARTY.yml
    - cd pysplashsurf
    - {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  build:
    - {{ compiler('c') }}
    - {{ compiler('cxx') }}
    - {{ compiler('rust') }}
    - {{ stdlib('c') }}
    - cargo-bundle-licenses
  host:
    - python-abi3
    - python
    - pip
    - maturin >=1,<2
    - numpy
  run:
    - python >={{ python_min }}
    - numpy

test:
  imports:
    - pysplashsurf
  requires:
    - abi3audit
    - pip
  commands:
    - pip check
    - abi3audit $SP_DIR/pysplashsurf/pysplashsurf.abi3.so -s -v --assume-minimum-abi3 {{ python_min }}  # [unix]
    - abi3audit %SP_DIR%/pysplashsurf/pysplashsurf.pyd -s -v --assume-minimum-abi3 {{ python_min }}  # [win]
    - python run_test.py
  files:
    - run_test.py

about:
  home: https://splashsurf.physics-simulation.org/
  summary: Python bindings for splashsurf, a surface reconstruction library for SPH simulations.
  description: |
    pySplashsurf provides Python bindings for splashsurf, an open source
    surface reconstruction library for particle data from SPH simulations.
  license: MIT
  license_file:
    - LICENSE
    - THIRDPARTY.yml
  doc_url: https://pysplashsurf.readthedocs.io/
  dev_url: https://github.com/InteractiveComputerGraphics/splashsurf

extra:
  recipe-maintainers:
    - jeongseok-meta
