schema_version: 1

context:
  name: mwprop
  version: 2.0.4

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/${{ name[0] }}/${{ name }}/${{ name }}-${{ version }}.tar.gz
  sha256: c564f2f111ff0cd84935ba67302522b76dfb1167a30ca2955777f8400c7529e5

build:
  script: {{ PYTHON }} -m pip install . -vv
  number: 0

requirements:
  host:
    - python
    - pip
    - setuptools
  run:
    - astropy-base
    - matplotlib-base
    - mpmath
    - numpy
    - python
    - scipy

test:
  imports:
    - mwprop
    - mwprop.nemod
    - mwprop.scattering_functions
  requires:
    - pip
  commands:
    - pip check

about:
  home: https://github.com/stella-ocker/mwprop/
  summary: 'A python package for NE2025 and NE2001'
  description: |
    A python package for NE2025 and NE2001.
  license: GPL-3.0-only
  license_file: LICENSE.rst
  dev_url: https://github.com/stella-ocker/mwprop

extra:
  recipe-maintainers:
    - mattpitkin
