{% set python_min = "3.6" %}
{% set version = "2.0.4" %}

package:
  name: mwprop
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/m/mwprop/mwprop-${{ version }}.tar.gz
  sha256: c564f2f111ff0cd84935ba67302522b76dfb1167a30ca2955777f8400c7529e5

build:
  script: {{ PYTHON }} -m pip install . -vv
  number: 0

requirements:
  host:
    - python {{ python_min }}.*
    - pip
    - setuptools
  run:
    - astropy-base
    - matplotlib-base
    - mpmath
    - numpy
    - python >={{ python_min }}
    - scipy

test:
  imports:
    - mwprop
    - mwprop.nemod
    - mwprop.scattering_functions
  requires:
    - pip
    - python {{ python_min }}.*
  commands:
    - pip check

about:
  home: https://github.com/stella-ocker/mwprop/
  summary: 'A python package for NE2025 and NE2001'
  description: |
    A python package for NE2025 and NE2001.
  license: GPL-3.0-only
  license_file: LICENSE.rst
  dev_url: https://github.com/stella-ocker/mwprop

extra:
  recipe-maintainers:
    - mattpitkin
