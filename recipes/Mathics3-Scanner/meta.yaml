{% set name = "Mathics3-Scanner" %}
{% set python_min = "3.11" %}
{% set version = "10.0.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/mathics3_scanner-{{ version }}.tar.gz
  sha256: e9626e79a70018747e1c7c66a0dd5515e3f7da29a52e840dc2d1540943429f56

build:
  entry_points:
    - mathics3-make-boxing-character-json = mathics_scanner.generate.boxing_characters:main
    - mathics3-make-named-character-json = mathics_scanner.generate.named_characters:main
    - mathics3-make-operator-json = mathics_scanner.generate.operators:main
    - mathics3-codeparser-tokenize = mathics_scanner.mathics3_code_tokenize:main
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python {{ python_min }}.*
    - setuptools
    - pyyaml
    - click
    - pip
  run:
    - python >={{ python_min }}
    - pyyaml
    - chardet
    - click

test:
  imports:
    - mathics_scanner
  commands:
    - pip check
    - mathics3-make-boxing-character-json --help
    - mathics3-make-named-character-json --help
    - mathics3-make-operator-json --help
    - mathics3-codeparser-tokenize --help
  requires:
    - pip
    - python {{ python_min }}.*

about:
  home: https://mathics.org/
  summary: Character Tables and Tokenizer for Mathics and the Wolfram Language.
  license: GPL-3.0-or-later
  license_file: COPYING.txt

extra:
  recipe-maintainers:
    - mmatera
    - rocky
