context:
  name: decord
  version: 0.6.0

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://github.com/dmlc/decord/archive/refs/tags/v${{ version }}.tar.gz
  sha256: 4aeeb102973bbf6e3b0344d53b055e49939ea47f3607fd0e8ae4aad2d4e60b5b
  patches:
    - patch/0001-use-conda-includes-and-disable-audio.patch
    - patch/0002-update-for-dlpack-1.0.patch
    - patch/0003-ffmpeg-8-compat.patch

build:
  number: 0
  skip:
    - win
  variant:
    use_keys:
      - cuda_compiler_version
    down_prioritize_variant: ${{ 0 if cuda_compiler_version != "None" else 1 }}

requirements:
  build:
    - ${{ compiler('c') }}
    - ${{ compiler('cxx') }}
    - if: cuda_compiler_version != "None"
      then: ${{ compiler('cuda') }}
    - ${{ stdlib('c') }}
    - cmake
    - make
    - pkg-config
    - python
    - pip
    - setuptools
  host:
    - python
    - pip
    - setuptools
    - numpy
    - ffmpeg
    - dmlc
    - dlpack
    - if: cuda_compiler_version != "None"
      then:
        - cuda-version ==${{ cuda_compiler_version }}
        - cuda-cudart-dev
        - cuda-driver-dev
        - cuda-nvml-dev
        - cuda-nvrtc-dev
  run:
    - python
    - numpy
    - if: cuda_compiler_version != "None"
      then: __cuda >=${{ cuda_compiler_version }}

tests:
  - python:
      imports:
        - decord
        - decord.ndarray
        - decord.video_reader
      python_version: ${{ python }}
  - script:
      - python -c "from decord import VideoReader; print(VideoReader)"

about:
  homepage: https://github.com/dmlc/decord
  repository: https://github.com/dmlc/decord
  summary: Efficient video loader for deep learning with smart shuffling
  license: Apache-2.0
  license_file: LICENSE

extra:
  recipe-maintainers:
    - Tobias-Fischer
