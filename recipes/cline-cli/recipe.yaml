context:
  name: cline
  version: 3.0.5

package:
  name: ${{ name }}-cli
  version: ${{ version }}

source:
  url: https://registry.npmjs.org/${{ name }}/-/${{ name }}-${{ version }}.tgz
  sha256: 1a78fb6620a2a0c86569de1f9269caafcc3974e0739205912b4233d2f7ae232f

build:
  number: 0
  noarch: generic

requirements:
  host:
    - nodejs
    - pnpm
    - pnpm-licenses
  run:
    - nodejs

tests:
  - script:
      - cline --help 2>&1 | grep -q "Cline CLI - AI coding assistant in your terminal"

about:
  homepage: https://cline.bot
  documentation: https://docs.cline.bot
  repository: https://github.com/cline/cline
  license: Apache-2.0
  license_file:
    - LICENSE
    - third-party-licenses.txt
  summary: Cline CLI - AI coding assistant in your terminal
  description: |
    Run Cline in your terminal.
    Interactive chat for paired sessions, or fully headless for CI/CD and scripting.
    The CLI shares its agent core with the Cline VS Code extension, JetBrains plugin, and SDK, so plan/act modes, MCP servers, checkpoints, rules, skills, and provider configuration all behave the same across surfaces.

extra:
  recipe-maintainers:
    - eunos-1128
