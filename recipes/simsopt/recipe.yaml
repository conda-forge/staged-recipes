schema_version: 1

context:
  version: "1.10.6"

package:
  name: simsopt
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/s/simsopt/simsopt-${{ version }}.tar.gz
  sha256: 3d7f8ec9eabefba71def21bf5a29c328dda1902b3773131e959d6bd531289199
  patches:
    - use-cmake-find-package-for-dependencies.patch

build:
  number: 0
  skip:
    - win
  script:
    - export CMAKE_GENERATOR=Ninja
    - ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  build:
    - ${{ stdlib("c") }}
    - ${{ compiler("cxx") }}
    - cmake
    - ninja
    - if: build_platform != target_platform
      then:
        - python
        - cross-python_${{ target_platform }}
  host:
    - python
    - scikit-build-core
    - pybind11 <3.0.0
    - numpy >=2.0.0
    - setuptools-scm >=8.0
    - if: match(python, "<3.11")
      then: tomli
    - pip
    - libboost-devel
    - eigen 3.*
    - fmt
    - xsimd
    - xtensor-python
  run:
    - python
    - numpy >=1.21
    - jax >=0.2.5
    - jaxlib >=0.1.56
    - scipy >=1.5.4
    - deprecated >=1.2.10
    - monty >=2021.6.10
    - ruamel.yaml
    - sympy
    - f90nml
    - pyevtk
    - matplotlib-base

tests:
  - python:
      imports:
        - simsopt
      pip_check: true

about:
  summary: Framework for optimizing stellarators
  license: MIT
  license_file: LICENSE
  homepage: https://github.com/hiddenSymmetries/simsopt
  repository: https://github.com/hiddenSymmetries/simsopt
  documentation: https://simsopt.readthedocs.io/

extra:
  recipe-maintainers:
    - matthewfeickert
