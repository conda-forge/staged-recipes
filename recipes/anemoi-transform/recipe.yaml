schema_version: 1

context:
  version: "0.1.29"

package:
  name: anemoi-transform
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/a/anemoi-transform/anemoi_transform-${{ version }}.tar.gz
  sha256: 0df4584cf188ebe9cbd36196e600dde53e0a7e0822e704d99cecf344dd82ee4a

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  python:
    entry_points:
      - anemoi-transform = anemoi.transform.__main__:main

requirements:
  host:
    - python >=3.11,<3.14
    - setuptools >=60
    - setuptools-scm >=8
    - pip
  run:
    - python >=3.11,<3.14
    - anemoi-utils >=0.5.1
    - cfunits
    - earthkit-data >=0.12.4,<1
    - earthkit-geo >=0.3
    - earthkit-meteo >=0.4.1
    - earthkit-regrid >=0.4
    - healpy
    - pandas <3

tests:
  - python:
      imports:
        - anemoi
      pip_check: true
      python_version: ${{ python_min }}.*
  - requirements:
      run:
        - pip
        - python ${{ python_min }}.*
    script:
      - anemoi-transform --help

about:
  summary: A package to hold various data transformation functions to support training of ML models on ECMWF data.
  license: Apache-2.0
  license_file: LICENSE
  homepage: https://github.com/ecmwf/anemoi-transform/
  documentation: https://anemoi-transform.readthedocs.io/

extra:
  recipe-maintainers:
    - tjtg
    - jasonjunweilyu
    - HCookie