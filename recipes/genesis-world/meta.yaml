{% set name = "genesis-world" %}
{% set version = "0.4.6" %}
{% set python_min = "3.10" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://github.com/Genesis-Embodied-AI/genesis-world/archive/refs/tags/v{{ version }}.tar.gz
  sha256: 8e2f692f26afa83b9e24f71b2a684ad1bebf8075337c09d1fc3fb933eb7c8582
  patches:
    - patches/0001-relax-conda-runtime-metadata.patch
    - patches/0002-drop-restricted-isaacgym-helper.patch
    - patches/0003-add-vendored-font-license.patch

build:
  number: 0
  # Keep the combined dependency PR tractable; expand Python support after feedstock creation.
  skip: true  # [not linux or py<310 or py>=312]
  entry_points:
    - gs = genesis._main:main
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python
    - pip
    - setuptools
    - wheel
    - cython >=3.0.0
    - numpy >=1.26.4
  run:
    - python
    - coacd
    - dracopy
    - fast-simplification >=0.1.12
    - freetype-py
    - frozendict
    - igl !=2.6.2
    - moviepy >=2.0.0
    - mujoco >=3.2.5
    - numba
    - numpy >=1.26.4
    - openexr-python
    - pillow >=10,<12
    - psutil
    - py-cpuinfo
    - py-opencv
    - pycollada
    - pydantic >=2.11.0
    - pygel3d
    - pyglet >=1.5,!=2.1.8
    - pygltflib >=1.16.0,<1.17
    - pymeshlab
    - pyopengl >=3.1.4
    - pysplashsurf >=0.14,<0.15
    - pytorch >=2.8
    - python-tetgen ==0.8.2
    - quadrants ==0.6.2
    - rtree
    - scikit-image
    - trimesh >=4.8.2
    - vtk
    - xacro
    - z3-solver <4.15.5.0

test:
  imports:
    - genesis
    - genesis.vis.batch_renderer
  commands:
    - pip check
    - python run_test.py
    - gs --help
  requires:
    - python {{ python_min }}
    - pip
  files:
    - run_test.py

about:
  home: https://genesis-embodied-ai.github.io/
  summary: Universal and generative physics engine for robotics and embodied AI
  license: Apache-2.0 AND MIT AND OFL-1.1 AND Ubuntu-font-1.0
  license_file:
    - LICENSE
    - LICENSE-vendored-pyrender-urdfpy
    - LICENSE-vendored-fonts
  dev_url: https://github.com/Genesis-Embodied-AI/genesis-world
  doc_url: https://genesis-world.readthedocs.io/

extra:
  recipe-maintainers:
    - jeongseok-meta
