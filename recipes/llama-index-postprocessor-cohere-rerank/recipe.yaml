schema_version: 1

context:
  version: "0.8.0"

package:
  name: llama-index-postprocessor-cohere-rerank
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/l/llama-index-postprocessor-cohere-rerank/llama_index_postprocessor_cohere_rerank-${{ version }}.tar.gz
  sha256: 7491de5e45870a06d1ec85a3b27fd8edc143f5e9c8b13fa48fefb5fa6ffc5084

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - hatchling
    - pip
  run:
    - python >=${{ python_min }}
    - cohere >=5.15,<6
    - llama-index-core >=0.13.0,<0.15
    - tenacity >=8.2.0,<10

tests:
  - python:
      imports:
        - llama_index.postprocessor.cohere_rerank
      pip_check: true
      python_version: ${{ python_min }}.*

about:
  summary: llama-index postprocessor cohere rerank integration
  license: MIT
  license_file: LICENSE
  homepage: https://www.llamaindex.ai/
  repository: https://github.com/run-llama/llama_index/tree/main/llama-index-integrations/postprocessor/llama-index-postprocessor-cohere-rerank/

extra:
  recipe-maintainers:
    - JaRoSchm
