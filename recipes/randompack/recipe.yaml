schema_version: 1

context:
  version: "0.1.3"

package:
  name: randompack
  version: ${{ version }}

source:
  url: https://github.com/jonasson2/randompack/archive/refs/tags/v${{ version }}.tar.gz
  sha256: 20481e57cb02a88c6cb7dfec167e8ca90015732ee6ddec9b8dfe7e05deb82ae4

build:
  number: 0
  script: |
    cd python
    ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python
    - pip
    - meson-python
    - meson
    - ninja
    - cython
    - numpy
    - pkg-config
    - ${{ compiler('c') }}
  run:
    - python
    - numpy

tests:
  - python:
      imports:
        - randompack

about:
  homepage: https://github.com/jonasson2/randompack
  repository: https://github.com/jonasson2/randompack
  summary: Portable random number generation library
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - jonasson2
