{% set version = "0.6.0" %}

package:
  name: paretobench
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/p/paretobench/paretobench-{{ version }}.tar.gz
  sha256: 377d348c6273fd491635267f23a7a57e00f87a83256af3c926d24c8e7c7562e0

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python >=3.10
    - pip
  run:
    - python >=3.10
    - numpy
    - matplotlib-base
    - pydantic
    - h5py
    - pandas
    - scipy
    - jinja2

test:
  imports:
    - paretobench
  commands:
    - pip check
  requires:
    - pip
    - python

about:
  home: https://github.com/electronsandstuff/ParetoBench
  summary: A collection of multiobjective optimization test problems.
  license: BSD-3-Clause
  license_file: LICENSE

extra:
  recipe-maintainers:
    - electronsandstuff
