{% set name = "lets-plot" %}
{% set version = "4.2.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://github.com/JetBrains/lets-plot/archive/v{{ version }}.tar.gz
  sha256: 07dbb8185d92524d10909b3cf026c4cdce91b8aa8da8b0ec6869e2b5c101332e

build:
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  build:
    - {{ compiler('c') }}
  host:
    - python
    - pip
  run:
    - python
    - pypng
    - palettable

test:
  imports:
    - lets_plot
  commands:
    - pip check
  requires:
    - pip

about:
  home: https://lets-plot.org
  license: MIT
  license_file:
    - LICENSE
    - plot-base/src/commonMain/kotlin/org/jetbrains/letsPlot/core/plot/base/stat/math3/NOTICE

extra:
  recipe-maintainers:
    - Matt-BF
