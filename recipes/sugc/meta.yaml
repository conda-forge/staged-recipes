{% set name = "sugc" %}
{% set version = "0.1.0" %}

package:
  name: {{ name }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz
  sha256: 65f3a2a9986587532467460f9ffe326d282dcb8f67ce66018a174fce76589c52

build:
  number: 0
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  build:
    - {{ compiler('rust') }}
    - {{ compiler('c') }}
  host:
    - python
    - pip
    - maturin >=1.7,<2
  run:
    - python
    - numpy >=1.23
    - matplotlib >=3.8

test:
  imports:
    - sugc
  commands:
    - python -c "from sugc import count_pairs_1d; print('ok')"

about:
  home: https://github.com/OscarHickman/SUGC
  license: MIT
  license_file: LICENSE
  summary: Correlation function counters for galaxy catalogues from sparse N-body partitions
  description: |
    Computes xi(r), xi(s, mu) multipoles, and high-order N-point functions
    with corrections for statistical under-sampling in m-of-k partition
    realisations of periodic N-body simulations.
  doc_url: https://github.com/OscarHickman/SUGC
  dev_url: https://github.com/OscarHickman/SUGC

extra:
  recipe-maintainers:
    - OscarHickman
