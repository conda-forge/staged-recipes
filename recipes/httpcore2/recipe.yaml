schema_version: 1

context:
  version: "2.2.0"

package:
  name: httpcore2
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/h/httpcore2/httpcore2-${{ version }}.tar.gz
  sha256: 10e0e142f1ecc1c1cb2a9ebbce82e57f16169f61d163ea336abf36799e89294b

build:
  noarch: python
  number: 0
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - hatchling
    - hatch-fancy-pypi-readme
    - uv-dynamic-versioning >=0.7.0
  run:
    - python >=${{ python_min }}
    - certifi
    - h11 >=0.16
  run_constraints:
    - anyio >=4.0,<5.0
    - h2 >=3,<5
    - socksio 1.*
    - trio >=0.22.0,<1.0
  # depends on https://github.com/conda/ceps/pull/146
  # extras:
  #   asyncio:
  #     - anyio >=4.0,<5.0
  #   http2:
  #     - h2 >=3,<5
  #   socks:
  #     - socksio 1.*
  #   trio:
  #     - trio >=0.22.0,<1.0

tests:
  - python:
      imports:
        - httpcore2
      python_version:
        - ${{ python_min }}.*
        - "*"
      pip_check: true

about:
  homepage: https://github.com/pydantic/httpx2
  summary: A minimal low-level HTTP client.
  license: BSD-3-Clause
  license_file: LICENSE.md
  repository: https://github.com/pydantic/httpx2

extra:
  recipe-maintainers:
    - Kludex
