{% set name = "httpcore2" %}
{% set version = "2.0.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz
  sha256: 403692e0a0e8ea6de90993cdea815b2454d2ff5426e61d2a244846c12506af76

build:
  number: 0
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python {{ python_min }}
    - pip
    - hatchling
    - hatch-fancy-pypi-readme
    - uv-dynamic-versioning >=0.7.0
  run:
    - python >={{ python_min }}
    - certifi
    - h11 >=0.16

test:
  imports:
    - httpcore2
  requires:
    - python {{ python_min }}
    - pip
  commands:
    - pip check

about:
  home: https://github.com/pydantic/httpx2
  summary: A minimal low-level HTTP client.
  license: BSD-3-Clause
  license_family: BSD
  license_file: LICENSE.md
  dev_url: https://github.com/pydantic/httpx2

extra:
  recipe-maintainers:
    - Kludex
