context:
  version: 0.1.2
  build_number: '0'

package:
  name: vidstats
  version: ${{ version }}

source:
- url: https://pypi.org/packages/source/v/vidstats/vidstats-${{ version }}.tar.gz
  sha256: dc052def3d529c820199d3652f8a466fb8d843eaf39f70eabd1f32b5b1c490f5

build:
  number: ${{ build_number }}
  script: ${{ PYTHON }} -m pip install .
  python:
    entry_points:
    - vidstats = vidstats.cli:cli
  noarch: python

requirements:
  host:
  - python ${{ python_min }}.*
  - hatchling
  - pip
  run:
  - python >=${{ python_min }}
  - ffmpeg
  - polars >=0.20
  - typer >=0.9
  - typing-extensions >=4.0

tests:
- python:
    imports:
    - vidstats
    pip_check: true
    python_version: ${{ python_min }}.*
- script:
  - vidstats --help
  - vidstats --list-metrics

about:
  summary: Extract per-frame colour and luminosity metrics from video via ffprobe signalstats.
  description: |
    Extract per-frame colour and luminosity metrics from video using ffprobe's
    signalstats filter. Output goes to Parquet, CSV, IPC/Feather, or NDJSON.
    Designed for research pipelines that need a fast, dependency-light way to turn
    a video into a tabular time series — for example, non-contact cardiac monitoring
    in animals via colour/motion video analysis.
  homepage: https://github.com/roaldarbol/vidstats
  repository: https://github.com/roaldarbol/vidstats
  documentation: https://github.com/roaldarbol/vidstats
  license: MIT
  license_file:
  - LICENSE

extra:
  recipe-maintainers:
  - roaldarbol
