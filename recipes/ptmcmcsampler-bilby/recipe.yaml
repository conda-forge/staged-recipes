context:
  name: ptmcmcsampler-bilby
  version: "0.1.1"

package:
  name: ${{ name }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/${{ name[0] }}/${{ name }}/ptmcmcsampler_bilby-${{ version }}.tar.gz
  sha256: 29413e0eecf870c0c77112ba48b01d0bbd68bd2159ce3049866b04a8e5935e60

build:
  noarch: python
  number: 0
  script: python -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - setuptools >=45
    - setuptools-scm >=6.2
  run:
    - python >=${{ python_min }}
    - bilby >=2.3.0
    - ptmcmcsampler !=2.1.0,!=0.0.0

tests:
  - python:
      imports:
        - ptmcmcsampler_bilby
      # ptmcmcsampler currently installs broken version metadata on conda-forge.
      pip_check: false
      python_version: ${{ python_min }}.*

  - script:
      - python -m pytest tests/
    requirements:
      run:
        - python ${{ python_min }}.*
        - pytest
    files:
      source:
        - tests/
        - pyproject.toml

about:
  homepage: https://github.com/bilby-dev/ptmcmcsampler-bilby
  summary: Plugin for using ptmcmcsampler with bilby.
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - ColmTalbot
    - mj-will
