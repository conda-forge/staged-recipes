{% set name = "ptmcmcsampler-bilby" %}
{% set version = "0.1.0" %}
{% set python_min = "3.10" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/ptmcmcsampler_bilby-{{ version }}.tar.gz
  sha256: 0d8fc215c9c089fb176cd49e3d8c0018e10c80fc4ccdc34a1ea97b028350479b

build:
  noarch: python
  number: 0
  script_env:
    - SETUPTOOLS_SCM_PRETEND_VERSION={{ version }}
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python {{ python_min }}
    - pip
    - setuptools >=45
    - setuptools-scm >=6.2
  run:
    - python >={{ python_min }}
    - bilby >=2.3.0
    - ptmcmcsampler !=2.1.0,!=0.0.0

test:
  imports:
    - ptmcmcsampler_bilby
  commands:
    # - pip check    # ptmcmcsampelr has incorrect metadata, see https://github.com/conda-forge/ptmcmcsampler-feedstock/pull/12
    - python -m pytest tests/
  requires:
    - python {{ python_min }}
    - pip
    - pytest
  source_files:
    - tests
    - pyproject.toml

about:
  home: https://github.com/bilby-dev/ptmcmcsampler-bilby
  summary: Plugin for using ptmcmcsampler with bilby.
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - ColmTalbot
    - mj-will
