context:
  version: "1.0.0beta.8"
  tag: ${{ version | replace("beta", "-beta") }}

package:
  name: rustfs
  version: ${{ version }}

source:
  url: https://github.com/rustfs/rustfs/archive/refs/tags/${{ tag }}.tar.gz
  sha256: 142dc2c676549cc1a35ec2f7c98d5b35d671d127734d242e7e62ac261961a141

build:
  number: 0
  # Currently don't ship the web console because `rustfs/static` is empty at build time.
  skip: win
  script:
    env:
      # No fat LTO: the final binary is large and fat-LTO linking exhausts CI
      # memory (OOM). Upstream's default release profile also omits LTO.
      CARGO_PROFILE_RELEASE_STRIP: symbols
    content:
      - cargo auditable install --locked --no-track --bins --root ${{ PREFIX }} --path ./rustfs
      - cargo-bundle-licenses --format yaml --output ./THIRDPARTY.yml

requirements:
  build:
    - ${{ stdlib('c') }}
    - ${{ compiler('c') }}
    - ${{ compiler('cxx') }}
    - ${{ compiler('rust') }}
    - cargo-bundle-licenses
    - cargo-auditable
    - cmake
    - ninja
    - make
    - libprotobuf

tests:
  - script: rustfs --help
  - package_contents:
      bin:
        - rustfs
      strict: true

about:
  homepage: https://rustfs.com
  summary: High-performance distributed S3-compatible object storage written in Rust
  description: |
    RustFS is an open-source, S3-compatible high-performance object storage
    system built in Rust. It supports erasure coding, identity and access
    management, policy management, S3 Select, and migration and coexistence
    with other S3-compatible platforms such as MinIO and Ceph.
  license: Apache-2.0
  license_file:
    - LICENSE
    - THIRDPARTY.yml
  documentation: https://docs.rustfs.com/
  repository: https://github.com/rustfs/rustfs

extra:
  recipe-maintainers:
    - pavelzw
