# conda-build configuration for QCxMS2
# Uses Intel compilers and MKL on Linux for optimal performance
# Falls back to GCC/gfortran and OpenBLAS on macOS/Windows

c_compiler:
  - gcc          # [not linux]
  - icx          # [linux]
cxx_compiler:
  - gxx          # [not linux]
  - icx          # [linux]
fortran_compiler:
  - gfortran     # [not linux]
  - ifort        # [linux]

# BLAS/LAPACK implementation - MKL on Linux, OpenBLAS elsewhere
blas_impl:
  - libopenblas  # [not linux]
  - mkl          # [linux]
lapack_impl:
  - libopenblas  # [not linux]
  - mkl          # [linux]
