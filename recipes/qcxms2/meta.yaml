{% set name = "QCxMS2" %}
{% set version = "1.2.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  - url: https://github.com/grimme-lab/{{ name }}/archive/refs/tags/v{{ version }}.tar.gz
    sha256: 448afd94adf770108f5c0e8fae0b57754e1a481f6f7a559b0ef60299e3003c7a

build:
  number: 0
  skip: true  # [win]

requirements:
  build:
    - {{ compiler('c') }}
    - {{ compiler('fortran') }}
    - {{ stdlib("c") }}
    - meson
    - ninja
    - pkg-config
    - llvm-openmp  # [osx]
    - libgomp      # [linux]
  host:
    - libblas
    - liblapack
    - mctc-lib >=0.3
    - toml-f >=0.2.0

test:
  commands:
    - test -f $PREFIX/bin/{{ name }}

about:
  home: https://github.com/grimme-lab/QCxMS2
  license: GPL-3.0-or-later
  license_file: COPYING, COPYING.LESSER
  summary: QM-based Mass Spectra computation package
  doc_url: https://github.com/grimme-lab/QCxMS2#readme

extra:
  recipe-maintainers:
    - hechth
