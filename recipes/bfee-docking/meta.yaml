{% set name = "bfee-docking" %}
{% set version = "1.0.0rc7" %}

package:
  name: {{ name }}
  version: {{ version }}

source:
  url: https://github.com/fhh2626/BFEE-Docking/archive/refs/tags/v{{ version }}.tar.gz
  sha256: 48de5d0fdb7755a14079a7e9411ac965ff87aed0b77d1f86ad34b121b1f504e2

build:
  number: 0
  skip: true  # [osx]
  entry_points:
    - bfee-docking = bfee_docking.main_gui:main

requirements:
  host:
    - python
    - pip
    - setuptools
    - wheel
  run:
    - python
    - biotite
    - biopython
    - dimorphite-dl
    - mdanalysis
    - numba
    - pdb2pqr
    - pdb-tools
    - platformdirs
    - pyside6
    - pymol-open-source
    - qvina
    - rdkit
    - scipy

test:
  imports:
    - bfee_docking
  commands:
    - python -c "from bfee_docking import third_party_tools; print(third_party_tools.get_all_tool_paths())"

about:
  home: https://github.com/fhh2626/BFEE-Docking
  summary: GUI workflow for protein-ligand docking and MD preparation
  license: GPL-3.0-or-later
  license_file:
    - LICENSE
    - bfee_docking/licenses/GPL-3.0.txt
    - bfee_docking/licenses/GPL-2.0.txt
    - bfee_docking/licenses/Apache-2.0.txt
    - bfee_docking/licenses/MIT.txt
    - bfee_docking/licenses/CC-BY-4.0.txt

extra:
  recipe-maintainers:
    - fhh2626
