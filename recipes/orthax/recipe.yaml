schema_version: 1

context:
  version: "0.2.8"
  python_min: "3.10"

package:
  name: "orthax"
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/o/orthax/orthax-${{ version }}.tar.gz
  sha256: a08850ef2a35889b604043dab591801b35d1bb1acf65bc70c60ddd90493d878d
  # c.f. https://github.com/f0uriest/orthax/pull/92
  patches:
    - remove-deprecated-setup_requires.patch
    - add-missing-requirements.txt.patch

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - setuptools >=40.8.0
    - versioneer-518
    - pip
  run:
    - python >=${{ python_min }}
    - equinox >=0.11.0,<0.14
    - jax >=0.4.36,<0.10
    - numpy >=1.20.0,<2.5

tests:
  - python:
      imports:
        - orthax
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  summary: Orthogonal polynomials with JAX
  license: MIT
  license_file: LICENSE
  homepage: https://github.com/f0uriest/orthax
  repository: https://github.com/f0uriest/orthax
  documentation: https://orthax.readthedocs.io/

extra:
  recipe-maintainers:
    - matthewfeickert
