{% set name = "burner-redis" %}
{% set version = "0.1.5" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/b/burner-redis/burner_redis-{{ version }}.tar.gz
  sha256: 19280d9f6a531ad57e75f0e9b877372547229d9d3014181def56718cbc66f88d

build:
  number: 0

requirements:
  build:
    - {{ compiler('c') }}
    - {{ compiler('rust') }}
    - {{ stdlib('c') }}
    - cargo-bundle-licenses
    - python  # [build_platform != target_platform]
    - cross-python_{{ target_platform }}  # [build_platform != target_platform]
    - maturin >=1,<2  # [build_platform != target_platform]
  host:
    - pip
    - python
    - maturin >=1,<2
    - lua >=5.4,<5.5  # [win]
  run:
    - python

test:
  requires:
    - pip
  commands:
    - pip check
    - python -c "import burner_redis; burner_redis.BurnerRedis()"

about:
  home: https://github.com/PrefectHQ/burner-redis
  dev_url: https://github.com/PrefectHQ/burner-redis
  summary: An embedded, in-process Redis-compatible database
  license: MIT
  license_file:
    - LICENSE
    - THIRDPARTY.yml

extra:
  recipe-maintainers:
    - desertaxle
