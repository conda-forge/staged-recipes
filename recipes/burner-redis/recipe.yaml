schema_version: 1

context:
  name: burner-redis
  version: "0.1.5"

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/b/burner-redis/burner_redis-${{ version }}.tar.gz
  sha256: 19280d9f6a531ad57e75f0e9b877372547229d9d3014181def56718cbc66f88d

build:
  number: 0
  skip: target_platform == "linux-ppc64le"
  script:
    - if: win
      then:
        - set BUILD_SRC=%TEMP%\burner-redis-src-%RANDOM%%RANDOM%
        - cmd /d /c "robocopy \"%SRC_DIR%\" \"%BUILD_SRC%\" /E /NFL /NDL /NJH /NJS /NP & if errorlevel 8 exit /b 8 & exit /b 0"
        - set CARGO_TARGET_DIR=%TEMP%\burner-redis-cargo-target-%RANDOM%%RANDOM%
        - set LUA_LIB_NAME=lua
        - set LUA_LIB=%LIBRARY_LIB%
        - cd /D "%BUILD_SRC%"
        - python -m pip install "%BUILD_SRC%" -vv --no-build-isolation --config-settings=build-args=--no-default-features
    - if: not win
      then:
        - python -m pip install . -vv

requirements:
  build:
    - if: build_platform != target_platform
      then:
        - python
        - cross-python_${{ target_platform }}
        - maturin >=1,<2
    - ${{ compiler('c') }}
    - ${{ stdlib('c') }}
    - ${{ compiler('rust') }}
    - cargo-bundle-licenses
  host:
    - pip
    - python
    - maturin >=1,<2
    - if: win
      then:
        - lua >=5.4,<5.5
  run:
    - python

tests:
  - requirements:
      run:
        - pip
    script:
      - pip check
      - python -c "import burner_redis; burner_redis.BurnerRedis()"

about:
  summary: An embedded, in-process Redis-compatible database
  license: MIT
  license_file:
    - LICENSE
    - THIRDPARTY.yml
  homepage: https://github.com/PrefectHQ/burner-redis
  repository: https://github.com/PrefectHQ/burner-redis

extra:
  recipe-maintainers:
    - desertaxle
