# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "1.2.1"

package:
  name: faster-whisper
  version: ${{ version }}

source:
  url: https://github.com/SYSTRAN/faster-whisper/archive/refs/tags/v${{ version }}.tar.gz
  sha256: ff0b5428b3a074cd63f580ae73fa21f7d9fd3bba28e0e2e097868d78d5b06f2f

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - setuptools
  run:
    - python >=${{ python_min }}
    - ctranslate2 <5,>=4.0
    - huggingface_hub >=0.21
    - tokenizers <1,>=0.13
    - onnxruntime <2,>=1.14
    - av >=11
    - tqdm

tests:
  - python:
      imports:
        - faster_whisper
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"
  - requirements:
      run:
        - pip
    script:
      - python -c "from faster_whisper import WhisperModel, BatchedInferencePipeline"

about:
  homepage: https://github.com/SYSTRAN/faster-whisper
  license: MIT
  license_file: LICENSE
  summary: Faster Whisper transcription with CTranslate2
  description: |
    Faster Whisper transcription with CTranslate2

extra:
  recipe-maintainers:
    - rxm7706
