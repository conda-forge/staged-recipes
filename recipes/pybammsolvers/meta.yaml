{% set name = "pybammsolvers" %}
{% set version = "0.7.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  - url: https://github.com/pybamm-team/{{ name }}/archive/v{{ version }}.tar.gz
    sha256: dc29a7d9765e85a508c2fa49ffc790f4e538ba6aea4a6da54b1eb179ab3668a3
  - patches:
    - 0001-Fix-CasADi-include-dir.patch
    - 0002-Fix-CASADI_DIR.patch
    - 0003-Remove-CXX11-ABI-Definition.patch
    - 0004-Fix-Windows-cmake-prefix-path.patch  # [win]
 
build:
  number: 0
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  skip: true   # [py>314]

requirements:
  build:
    - {{ compiler('c') }}
    - {{ stdlib("c") }}
    - {{ compiler('cxx') }}
    - cmake
    - make
  host:
    - python
    - setuptools >=71
    - casadi
    - pybind11
    - pip
    - suitesparse
    - sundials
    - llvm-openmp  # [osx]
    - libgomp  # [linux]
  run:
    - python
    - casadi
    - numpy
    - vcomp14  # [win]


test:
  imports:
    - pybammsolvers
  commands:
    - pip check
  requires:
    - pip

about:
  home: https://github.com/pybamm-team/pybammsolvers
  summary: Python interface for the IDAKLU solver
  license: BSD-3-Clause
  license_file: LICENSE

extra:
  recipe-maintainers:
    - prady0t
    - Saransh-cpp
    - agriyakhetarpal
