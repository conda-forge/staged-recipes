schema_version: 1

context:
  version: "0.12.4"
  llvm_version: "20.1"

package:
  name: pyqir
  version: ${{ version }}

source:
  url: https://github.com/qir-alliance/pyqir/archive/refs/tags/v${{ version }}.tar.gz
  sha256: 4db944bc741863054b8e2fd2a0d4b7635d235d5ad8a4edcb5cc3f1476318e2ed
  patches:
    - if: win
      then: use-dynamic-msvc-runtime.patch

build:
  number: 0
  skip: match(python, "<3.9")
  script:
    - if: unix
      then: export LLVM_SYS_201_PREFIX="${PREFIX}"
    - if: win
      then: set LLVM_SYS_201_PREFIX=%LIBRARY_PREFIX%
    - if: unix
      then: export MATURIN_PEP517_ARGS="--features llvm20-1 --features llvm-sys-201/prefer-dynamic"
    - if: win
      then: set MATURIN_PEP517_ARGS=--features llvm20-1 --features llvm-sys-201/prefer-dynamic
    - if: unix
      then: export MATURIN_STRIP=true
    - if: win
      then: set MATURIN_STRIP=true
    - if: win
      then: if not exist "%LIBRARY_PREFIX%\lib\zstd.dll.lib" copy "%LIBRARY_PREFIX%\lib\zstd.lib" "%LIBRARY_PREFIX%\lib\zstd.dll.lib"
    - if: win
      then: if errorlevel 1 exit 1
    - if: unix and build_platform != target_platform
      then: export PYO3_CROSS_INCLUDE_DIR="${PREFIX}/include"
    - if: unix and build_platform != target_platform
      then: export PYO3_CROSS_LIB_DIR="${SP_DIR}/.."
    - if: unix and build_platform != target_platform
      then: export PYO3_CROSS_PYTHON_VERSION="${PY_VER}"
    - ${{ PYTHON }} -m pip install ./pyqir -vv --no-deps --no-build-isolation
    - if: win
      then: if errorlevel 1 exit 1
    - cargo-bundle-licenses --features "llvm20-1,llvm-sys-201/prefer-dynamic" --format yaml --output THIRDPARTY.yml
    - if: win
      then: if errorlevel 1 exit 1

requirements:
  build:
    - if: build_platform != target_platform
      then: python
    - if: build_platform != target_platform
      then: cross-python_${{ target_platform }}
    - if: build_platform != target_platform
      then: maturin >=1.10.2,<1.11
    - ${{ compiler('c') }}
    - ${{ compiler('cxx') }}
    - ${{ compiler('rust') }}
    - ${{ stdlib('c') }}
    - cargo-bundle-licenses
  host:
    - python
    - pip
    - maturin >=1.10.2,<1.11
    - llvmdev ${{ llvm_version }}.*
    - if: win
      then: libxml2-devel
    - if: win
      then: zlib
    - if: win
      then: zstd
  run:
    - python
    - libllvm20 ${{ llvm_version }}.*

tests:
  - python:
      imports:
        - pyqir
        - pyqir.qis
        - pyqir.rt
  - files:
      source:
        - pyqir/tests
    requirements:
      run:
        - pip
        - pytest
    script:
      - pip check
      - python -c "from pyqir import BasicQisBuilder, SimpleModule; m = SimpleModule('conda_forge_smoke', 1, 1); q = BasicQisBuilder(m.builder); q.h(m.qubits[0]); assert '__quantum__qis__h__body' in m.ir()"
      - cd pyqir && pytest -q tests

about:
  homepage: https://github.com/qir-alliance/pyqir
  summary: PyQIR parses, generates and evaluates the Quantum Intermediate Representation.
  description: |
    PyQIR is a set of Python APIs for generating, parsing, and evaluating
    Quantum Intermediate Representation (QIR). It provides a Python API for
    integrating the QIR toolchain into Python-based frontends.
  license: MIT
  license_file:
    - LICENSE
    - THIRDPARTY.yml
  documentation: https://www.qir-alliance.org/pyqir/
  repository: https://github.com/qir-alliance/pyqir

extra:
  recipe-maintainers:
    - basnijholt
