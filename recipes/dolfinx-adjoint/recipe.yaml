schema_version: 1

context:
  python_min: "3.12"
  version: 0.2.1

package:
  name: dolfinx-adjoint
  version: ${{ version }}

source:
  url: "https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz"
  sha256: f721fe5b78f74485af7300776641888d3ed22061f17cda8fcf3ca42424f1fa03

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  

requirements:
  host:
    - python ${{ python_min }}.*
    - setuptools >=61.2
    - pip
  run:
    - python >=${{ python_min }}
    - pyadjoint-ad
    - fenicsx-dolfinx >=0.11.0
    
tests:
  - python:
      imports:
        - dolfinx_adjoint
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"
  - requirements:
      run:
        - pip
        - python ${{ python_min }}.*

about:
  summary: Algorithmic differentiation framework for DOLFINx.
  license: MIT
  license_file: LICENSE
  homepage: https://github.com/scientificcomputing/dolfinx-adjoint

extra:
  recipe-maintainers:
    - finsberg
    - jorgensd