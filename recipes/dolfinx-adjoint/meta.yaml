{% set name = "dolfinx-adjoint" %}
{% set version = "0.2.1" %}

package:
  name: "{{ name|lower }}"
  version: "{{ version }}"

source:
  url: "https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz"
  sha256: f721fe5b78f74485af7300776641888d3ed22061f17cda8fcf3ca42424f1fa03

build:
  number: 0
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-build-isolation --no-deps

requirements:
  host:
    - python {{ python_min }}
    - pip
    - setuptools
  run:
    - python >={{ python_min }}
    - pyadjoint-ad
    - fenicsx-dolfinx >= 0.11.0
test:
  requires:
    - python {{ python_min }}

  imports:
    - dolfinx_adjoint

about:
  home: https://github.com/scientificcomputing/dolfinx-adjoint
  summary: Algorithmic differentiation framework for DOLFINx.
  license: MIT
  license_file: LICENSE
  doc_url: https://scientificcomputing.github.io/dolfinx-adjoint/
  dev_url: https://github.com/scientificcomputing/dolfinx-adjoint

extra:
  recipe-maintainers:
    - finsberg
    - cdaversin
