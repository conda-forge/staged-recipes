schema_version: 1

context:
  version: "0.8.3"

package:
  name: tonio
  version: ${{ version }}

source:
  - url: https://pypi.org/packages/source/t/tonio/tonio-${{ version }}.tar.gz
    sha256: 1b533825a434db81f49411a140e0debe0a509c0d9f45ef49427b78dc8a4ed6fa

build:
  number: 0
  skip:
    - win
    - match(python, "<3.14")
  script:
    - ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation --disable-pip-version-check
    - cargo-bundle-licenses --format yaml --output THIRDPARTY.yml

requirements:
  build:
    - python
    - if: build_platform != target_platform
      then:
        - cross-python_${{ target_platform }}
    - ${{ compiler('c') }}
    - ${{ stdlib('c') }}
    - ${{ compiler('rust') }}
    - cargo-bundle-licenses
    - maturin >=1.8,<1.9
  host:
    - maturin >=1.8,<1.9
    - pip
    - python
  run:
    - python

tests:
  - python:
      imports: tonio
      pip_check: true

about:
  license: BSD-3-Clause
  license_file:
    - LICENSE
    - THIRDPARTY.yml
  homepage: https://github.com/gi0baro/tonio
  repository: https://github.com/gi0baro/tonio
  summary: A multi-threaded async runtime for Python.

extra:
  recipe-maintainers:
    - davidbrochart
