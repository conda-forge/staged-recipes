{% set name = "ewccli" %}
{% set version = "0.1.1" %}
{% set python_min = "3.11" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/ewccli-{{ version }}.tar.gz
  sha256: dc40b7823e1feaa5e3c357e576eb32f209f1e9fabcb4672e1e16a688c6c2b4cb

build:
  entry_points:
    - ewc = ewccli.ewccli:cli
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python >={{ python_min }}
    - hatchling >=1.5
    - pip
  run:
    - python >={{ python_min }}
    - requests ==2.32.5
    - click ==8.1.8
    - rich ==14.1.0
    - rich-click ==1.8.9
    - prompt-toolkit ==3.0.51
    - pyyaml ==6.0.2
    - cryptography ==45.0.6
    - python-openstackclient ==8.2.0
    - ansible ==12.0.0
    - ansible-runner ==2.4.0
    - python-kubernetes ==33.1.0

test:
  imports:
    - ewccli
  commands:
    - pip check
    - ewc --help
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://pypi.org/project/ewccli/
  summary: Python package to handle EWC resources.
  dev_url: https://github.com/ewcloud/ewccli
  license: GPL-3.0-only
  license_file: LICENSE

extra:
  recipe-maintainers:
    - pacospace
    - tervo
