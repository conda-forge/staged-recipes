schema_version: 1

context:
  version: "0.5.0"

package:
  name: fla-core
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/f/fla-core/fla_core-${{ version }}.tar.gz
  sha256: 476dd94711702af81cc4827010d9209f6053d8cdceac8e43d3c8497071f07a81

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - setuptools
    - wheel
    - pip
  run:
    - python >=${{ python_min }}
    - pytorch >=2.7.0
    - triton >=3.3
    - einops

tests:
  - python:
      imports:
        - fla
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - '*'

about:
  summary: Core operations for flash-linear-attention
  license: MIT
  license_file: LICENSE
  homepage: https://github.com/fla-org/flash-linear-attention

extra:
  recipe-maintainers:
    - chrisdeutsch
