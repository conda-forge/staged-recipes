{% set name = "frd-score" %}
{% set version = "1.0.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.io/packages/source/{{ name[0] }}/{{ name }}/frd_score-{{ version }}.tar.gz
  sha256: 155ef0008dd903e56bc10509c3be6838a5137bdf96663ac57d989997de9bfee1

build:
  number: 0
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  entry_points:
    - frd-score = frd_score.frd:main

requirements:
  host:
    - python >=3.10
    - pip
    - setuptools >=61.0
    - wheel
  run:
    - python >=3.10
    - numpy
    - pillow >=10.3.0
    - scipy >=1.10.0
    - py-opencv >=4.8.1
    - simpleitk >=2.3.1
    # pyradiomics is required at runtime but not available on conda-forge
    # for Python >=3.10. Users must install it separately:
    #   pip install git+https://github.com/AIM-Harvard/pyradiomics.git@master

test:
  imports:
    - frd_score
    - frd_score.frd
  commands:
    - frd-score --version
    # pip check is skipped because pyradiomics is not installable via conda
  requires:
    - pip

about:
  home: https://github.com/RichardObi/frd-score
  summary: "Fréchet Radiomics Distance (FRD) — a metric for comparing medical image distributions"
  description: |
    FRD measures the similarity of radiomic image features between two datasets
    by computing the Fréchet distance between Gaussians fitted to the extracted
    and normalized features. It supports both 2D (PNG, JPG, TIFF, BMP) and
    3D (NIfTI .nii.gz) radiological images.
  license: Apache-2.0
  license_family: Apache
  license_file: LICENSE
  doc_url: https://richardobi.github.io/frd-score/
  dev_url: https://github.com/RichardObi/frd-score

extra:
  recipe-maintainers:
    - RichardObi
