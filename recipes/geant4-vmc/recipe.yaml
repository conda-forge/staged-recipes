context:
  version: "6.8.0"

package:
  name: geant4-vmc
  version: ${{ version }}

source:
  url: https://github.com/vmc-project/geant4_vmc/archive/refs/tags/v${{ version | replace(".0", "") | replace(".", "-") }}.tar.gz
  sha256: 5fc038ef63739bd7a7bf63e43589af020e37dc2154512619d11a6bed31fbe7b8

build:
  number: 0
  skip:
    - win
  script: build.sh

requirements:
  build:
    - ${{ compiler('cxx') }}
    - ${{ stdlib('c') }}
    - cmake
    - make
  host:
    - root_base
    - root_cxx_standard
    - vmc
    - geant4 >=11.4
    - vgm
    - clhep
  run_exports:
    - ${{ pin_subpackage('geant4-vmc', upper_bound='x.x') }}

tests:
  - package_contents:
      lib:
        - geant4vmc
        - g4root
      include:
        - geant4vmc/TG4RunConfiguration.h
        - g4root/TG4RootDetectorConstruction.h
      files:
        - lib/Geant4VMC-${{ version }}/Geant4VMCConfig.cmake
        - lib/Geant4VMC-${{ version }}/Geant4VMCTargets.cmake
        - lib/G4Root-${{ version }}/G4RootConfig.cmake
        - lib/G4Root-${{ version }}/G4RootTargets.cmake

about:
  homepage: https://vmc-project.github.io/
  summary: Geant4 implementation of the Virtual Monte Carlo interface
  description: |
    Geant4 VMC provides the Geant4 implementation of the abstract Virtual
    Monte Carlo (VMC) interface, along with G4Root which links Geant4
    transport to ROOT TGeo geometry. Allows VMC user code (e.g. ALICE,
    FairRoot, SHiP simulation frameworks) to run on top of Geant4.
  license: GPL-3.0-only
  license_file: LICENSE
  repository: https://github.com/vmc-project/geant4_vmc
  documentation: https://vmc-project.github.io/

extra:
  recipe-maintainers:
    - olantwin
