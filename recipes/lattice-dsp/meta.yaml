{% set name = "lattice-dsp" %}
{% set version = "0.1.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/l/lattice-dsp/lattice_dsp-{{ version }}.tar.gz
  sha256: e0ac0852848b76d013a3330f266627e1443912be200f6d2534f116fd7b0980e7

build:
  number: 0
  skip: true  # [py<310]
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  build:
    - {{ compiler('cxx') }}
    - {{ stdlib("c") }}
    - cmake
    - ninja
    - cross-python_{{ target_platform }}  # [build_platform != target_platform]
    - python                              # [build_platform != target_platform]

  host:
    - python
    - pip
    - scikit-build-core >=0.10
    - pybind11 >=2.12
    - numpy >=1.23
    - libgomp      # [linux]
    - llvm-openmp  # [osx]

  run:
    - python
    - numpy >=1.23

test:
  imports:
    - lattice_dsp
    - lattice_dsp._core
  commands:
    - pip check
    - python -c "import lattice_dsp, lattice_dsp._core as core; print(lattice_dsp.__version__); print(core.__file__); print(lattice_dsp.HAS_OPENMP)"
  requires:
    - pip

about:
  home: https://github.com/smiryusupov/lattice-dsp
  summary: Efficient stable IIR lattice filters, adaptive lattice-ladder DSP, and matrix/MIMO lattice experiments for Python
  license: Apache-2.0
  license_file:
    - LICENSE
    - NOTICE.md
  doc_url: https://lattice-dsp.readthedocs.io/
  dev_url: https://github.com/smiryusupov/lattice-dsp

extra:
  recipe-maintainers:
    - smiryusupov
