{% set name = "mkgraticule_planet" %}
{% set version = "0.5.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://github.com/ryodohemmi/{{ name }}/archive/refs/tags/v{{ version }}.tar.gz
  sha256: cfa57c7dd7a0b61272989c1de40870bc8cd13bb8a012d1cbd776233cd2957fd1

build:
  noarch: python
  number: 0
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  entry_points:
    - mkgraticule_planet = mkgraticule_planet._cli:main

requirements:
  host:
    - python >=3.9
    - pip
    - setuptools >=68.0
  run:
    - python >=3.9
    - numpy
    - gdal

test:
  imports:
    - mkgraticule_planet
  commands:
    - mkgraticule_planet --version
    - mkgraticule_planet --help

about:
  home: https://github.com/ryodohemmi/mkgraticule_planet
  summary: Create planetary graticules for IAU coordinate systems and export as GeoPackage
  license: Apache-2.0
  license_file: LICENSE

extra:
  recipe-maintainers:
    - ryodohemmi
