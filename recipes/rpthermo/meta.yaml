{% set name = "rpthermo" %}
{% set version = "6.8.1" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://github.com/brsynth/rpThermo/archive/refs/tags/{{ version }}.tar.gz
  sha256: c1f2bde24e549fa0d79c4e30f8067bac3d090861745f9ecd566e13e2f769b022

build:
  number: 0
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python {{ python_min }}
    - setuptools
    - pip
  run:
    - python >={{ python_min }}
    - numpy
    - scipy
    - equilibrator-api
    - brs_utils
    - chemlite
    - rplibs

test:
  requires:
    - python {{ python_min }}
    - pip
  imports:
    - rpthermo
  commands:
    - pip check

about:
  home: https://github.com/brsynth/rpThermo/tree/main
  summary: "Calculate the formation energy of chemical species and the Gibbs free energy for each reaction and for the heterologous pathway itself"
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - ramez17khaled
