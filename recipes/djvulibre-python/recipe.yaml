context:
  version: "0.9.3"

package:
  name: djvulibre-python
  version: ${{ version }}

source:
  url: https://github.com/FriedrichFroebel/python-djvulibre/archive/refs/tags/${{ version }}.tar.gz
  sha256: 25c1cee3bd962d7bec431d68d584c4b105d1d1ccc10b5a4050a23a9e3176aae2

build:
  number: 0
  skip:
    - win
  script: python -m pip install . -vv --no-deps --no-build-isolation

requirements:
  build:
    - ${{ compiler('c') }}
    - ${{ stdlib('c') }}
    - pkg-config
  host:
    - cython
    - djvulibre
    - packaging
    - pip
    - python
    - setuptools
    - wheel
  run:
    - djvulibre
    - python

tests:
  - python:
      imports:
        - djvu
        - djvu.decode
  - script:
      - python -c "import djvu.decode; print(djvu.decode.Context)"

about:
  homepage: https://github.com/FriedrichFroebel/python-djvulibre
  summary: Python bindings for the DjVuLibre library
  license: GPL-2.0-only
  license_file: COPYING
  repository: https://github.com/FriedrichFroebel/python-djvulibre

extra:
  recipe-maintainers:
    - user202729
