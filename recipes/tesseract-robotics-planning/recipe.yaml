schema_version: 1

context:
  version: "0.35.0"

package:
  name: tesseract-robotics-planning
  version: ${{ version }}

source:
  - url: https://github.com/tesseract-robotics/tesseract_planning/archive/refs/tags/${{ version }}.tar.gz
    sha256: 1c6b066ce0ee033086ba46945ee4f288047f407781bd0f6359d7f4a33588bc54
    file_name: source.tar.gz

build:
  number: 0


requirements:
  build:
    - ${{ compiler('c') }}
    - ${{ compiler('cxx') }}
    - ${{ stdlib("c") }}
    - gtest
    - gmock
    - cmake
    - ninja
    - ros-industrial-cmake-boilerplate
    - if: linux
      then: lcov
  host:
    - libboost-devel
    - cereal
    - eigen-abi-devel
    - tinyxml2
    - console_bridge
    - assimp
    - urdfdom
    - fcl
    - octomap 
    - orocos-kdl 
    - pcl
    - gtest
    - gmock
    - pkg-config 
    - liblzma-devel
    - flann
    - jsoncpp
    - yaml-cpp
    - bullet-cpp
    - blas
    - osqp
    - osqp-eigen
    - qpoases
    - ompl
    - taskflow <4
    - tesseract-robotics
    - descartes-light
    - trajopt
    - libruckig
    - if: unix
      then:
        - xorg-libx11
        - xorg-libxext
        - gperftools
  run:
    - cereal
    - eigen
    - tinyxml2
    - console_bridge
    - assimp
    - urdfdom
    - fcl
    - octomap 
    - orocos-kdl 
    - pcl
    - gtest
    - gmock
    - jsoncpp
    - taskflow 
    - yaml-cpp
    - bullet-cpp
    - blas
    - osqp
    - osqp-eigen
    - qpoases
    - ompl
    - if: unix
      then:
        - xorg-libx11
        - xorg-libxext
        - gperftools
  run_exports:
    - ${{ pin_subpackage('tesseract-robotics-planning', upper_bound='x.x') }}

tests:
  - package_contents:
      include:
        - tesseract/command_language/fwd.h
        - tesseract/motion_planners/fwd.h
        - tesseract/task_composer/fwd.h
        - tesseract/time_parameterization/fwd.h
      lib:
        - tesseract_command_language
        - tesseract_motion_planners
        - tesseract_motion_planners_ompl
        - tesseract_motion_planners_simple
        - tesseract_motion_planners_trajopt
        - tesseract_motion_planners_trajopt_ifopt
        - tesseract_task_composer
        - tesseract_task_composer_factories
        - tesseract_task_composer_nodes
        - tesseract_task_composer_planning_factories
        - tesseract_task_composer_planning_nodes
        - tesseract_task_composer_taskflow
        - tesseract_task_composer_taskflow_factories
        - tesseract_time_parameterization
        - tesseract_time_parameterization_isp
        - tesseract_time_parameterization_kdl
        - tesseract_time_parameterization_ruckig
        - tesseract_time_parameterization_totg

about:
  summary: Motion Planning Environment
  license: Apache-2.0 AND BSD-3-Clause AND BSD-2-Clause
  license_file:
    - src/LICENSE
    - src/LICENSE.Apache-2.0
    - src/LICENSE.BSD-3-Clause
    - src/LICENSE.BSD-2-Clause
  homepage: https://github.com/tesseract-robotics/tesseract_planning

extra:
  recipe-maintainers:
    - johnwason
