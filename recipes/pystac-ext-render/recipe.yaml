schema_version: 1

context:
  version: "2.0.0"

package:
  name: pystac-ext-render
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/p/pystac-ext-render/pystac_ext_render-${{ version }}.tar.gz
  sha256: ed53926d0af556c98d5f6bbfd86b8d02d635df24b70607f37f386cea7713b4f7

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - hatchling
    - pip
  run:
    - python >=${{ python_min }}
    - pystac-core

tests:
  - python:
      imports:
        - pystac_ext_render
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  summary: Render extension for PySTAC
  license: Apache-2.0
  license_file: LICENSE
  homepage: https://pypi.org/project/pystac-ext-render/
  documentation: https://pystac.readthedocs.io

extra:
  recipe-maintainers:
    - AddYourGitHubIdHere
