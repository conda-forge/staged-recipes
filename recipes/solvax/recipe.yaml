schema_version: 1

context:
  version: "0.8.7"
  python_min: "3.10"

package:
  name: solvax
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/s/solvax/solvax-${{ version }}.tar.gz
  sha256: 53af93fbc227898c776ddb0505dd537d4273449d1c598f32bb7a04bdca6c93ee

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - hatchling
    - pip
  run:
    - python >=${{ python_min }}
    - jax
    - equinox

tests:
  - python:
      imports:
        - solvax
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  summary: Differentiable structured linear solvers, preconditioners and matrix-free methods in JAX
  license: MIT
  license_file: LICENSE
  homepage: https://github.com/uwplasma/SOLVAX
  repository: https://github.com/uwplasma/SOLVAX
  documentation: https://solvax.readthedocs.io

extra:
  recipe-maintainers:
    - matthewfeickert
