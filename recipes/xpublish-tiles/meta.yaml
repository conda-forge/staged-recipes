{% set version = "0.6.0" %}

package:
  name: xpublish-tiles
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/x/xpublish-tiles/xpublish_tiles-{{ version }}.tar.gz
  sha256: c6585a17d560e7a04b0cd6e47a3a56266be15eb2e7daa2fbcec5b73ff4b74fc8

build:
  number: 0
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  entry_points:
    - xpublish-tiles = xpublish_tiles.cli.main:main
  skip: True  # [py<312]

requirements:
  host:
    - python {{ python_min }}
    - hatchling
    - hatch-vcs
    - pip
  run:
    - __linux  # [linux]
    - python >={{ python_min }}
    - cf-xarray >=0.11.1
    - cftime >=1.6.4.post1
    - datashader >=0.19.1
    - donfig >=0.8.0
    - morecantile >=5.4.2
    - numbagg >=0.9.0
    - numba >=0.60.0
    - pydantic-xml >=2.17.3
    - pyproj >=3.7.1
    - xpublish >=0.5.0
    - fastapi
    - xarray >=2025.12.0
    - zarr >=3.1.2
    - rasterix >=0.2.2
    - toolz >=1.0.0
    - cachetools >=5.5.2
    - tbb >=2022.2.0  # [linux]
    - structlog >=24.4.0
    - aiohttp >=3.12.15
    - pillow >=11.3.0
    - matplotlib-base >=3.10.5
    - requests >=2.32.5
    - numba_celltree >=0.4.1
    - py-triangle >=20250106
    - scikit-image >=0.25.2
    - icechunk >=2
    - pooch >=1.8.2
    - spatialpandas >=0.5

test:
  imports:
    - xpublish_tiles
  requires:
    - pip
    - python {{ python_min }}
  commands:
    - xpublish-tiles --help

about:
  summary: Tiles router for xpublish
  license: Apache-2.0
  license_file: LICENSE
  home: https://github.com/earth-mover/xpublish-tiles

extra:
  recipe-maintainers:
    - martinRenou
    - mfisher87
    - dcherian
