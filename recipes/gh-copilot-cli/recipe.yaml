# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "1.0.61"

package:
  name: gh-copilot-cli
  version: ${{ version }}

source:
  - if: target_platform == "linux-64"
    then:
      url: https://github.com/github/copilot-cli/releases/download/v${{ version }}/copilot-linux-x64.tar.gz
      sha256: 228bd802a369ad6b3477be1c08510d555628bb1fc8a53a26337f336659f817db

  - if: target_platform == "linux-aarch64"
    then:
      url: https://github.com/github/copilot-cli/releases/download/v${{ version }}/copilot-linux-arm64.tar.gz
      sha256: 225c87742394096557ec5d1cc559362654da895a672d5a7aa6fdc204b1c95d36

  - if: target_platform == "osx-arm64"
    then:
      url: https://github.com/github/copilot-cli/releases/download/v${{ version }}/copilot-darwin-arm64.tar.gz
      sha256: 448f550b8cecb216c60cff5cdfaa46fe984606c316fdb62b5b5ed83248eef0ae

  - if: target_platform == "osx-64"
    then:
      url: https://github.com/github/copilot-cli/releases/download/v${{ version }}/copilot-darwin-x64.tar.gz
      sha256: 8f7a7105b7a025bf57331b3443578dcd3fae252977c8246be797a01cffbab426

  - if: target_platform == "win-64"
    then:
      url: https://github.com/github/copilot-cli/releases/download/v${{ version }}/copilot-win32-x64.zip
      sha256: 554f2972903385528573500de183d3a4ef6a8335e22ea252e6588247ca03c466

  - url: https://raw.githubusercontent.com/github/copilot-cli/refs/tags/v${{ version }}/LICENSE.md
    sha256: 1fbd0dcc55c66738b1b591632132c927de20c8443dff1d55b4851e378883e402

build:
  number: 0

requirements:
  build:
    - if: unix
      then:
        - ${{ stdlib('c') }}

tests:
  - if: unix
    then:
      - requirements:
          run:
            - cf-nvidia-tools 1.*
            - ripgrep
        script:
          content: |
            set -euxo pipefail
            copilot --version | rg '${{ version }}'
            export c_stdlib_version='${{ c_stdlib_version }}'
            check-glibc "${PREFIX}"/bin/*
    else:
      - requirements:
          run:
            - ripgrep
        script:
          content: |
            copilot --version | rg "${{ version }}"
            if errorlevel 1 exit /b 1

about:
  homepage: https://github.com/github/copilot-cli
  summary: GitHub Copilot CLI brings the power of Copilot coding agent directly to your terminal.
  license: LicenseRef-Proprietary
  license_file: LICENSE.md

extra:
  recipe-maintainers:
    - rxm7706
