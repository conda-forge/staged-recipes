{% set version = "1.0" %}

package:
  name: librett
  version: "{{ version }}"

source:
  url: https://github.com/victor-anisimov/Librett/archive/refs/tags/{{ version }}.tar.gz
  sha256: cbce8389f5f64f6e5fbd6d2998e35dd9fa2020ef4b9da33e01195475c9a2227a
  patches:
    - checkfunctionexists.patch

build:
  number: 0
  skip: true  # [not linux or cuda_compiler_version == "None"]
  string: cuda{{ cuda_compiler_version | replace('.', '') }}_h{{ PKG_HASH }}_{{ PKG_BUILDNUM }}

  run_exports:
    - {{ pin_subpackage('librett', max_pin='x.x') }} cuda{{ cuda_compiler_version | replace('.', '') }}_*

requirements:
  build:
    - {{ compiler('c') }}
    - {{ compiler('cxx') }}
    - {{ compiler('cuda') }}
    - {{ stdlib('c') }}
    - cmake >=3.22
    - ninja
  host:
    - cuda-version {{ cuda_compiler_version }}

test:
  commands:
    - test -f ${PREFIX}/lib/liblibrett$SHLIB_EXT

about:
  home: https://github.com/victor-anisimov/Librett
  license: MIT
  license_file:
    - LICENSE.md
  summary: LibreTT is a free Tensor Transpose Library for nVidia, AMD, and Intel GPU accelerators.

extra:
  recipe-maintainers:
    - awvwgk
