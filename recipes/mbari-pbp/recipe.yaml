schema_version: 1

context:
  version: "1.8.74"

package:
  name: mbari-pbp
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/m/mbari-pbp/mbari_pbp-${{ version }}.tar.gz
  sha256: 856bdccf50f2aa5ffe747b5f8b5cf54f4b806a53eb6c6324d88f64c87793c597

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  python:
    entry_points:
      - pbp = pbp.main_cli:main
      - pbp-hmb-gen = pbp.hmb_gen.main_hmb_generator:main
      - pbp-cloud = pbp.cloud.main_cloud:main
      - pbp-hmb-plot = pbp.hmb_plot.main_plot:main
      - pbp-meta-gen = pbp.meta_gen.main_meta_generator:main

requirements:
  host:
    - python ${{ python_min }}.*
    - poetry-core
    - pip
  run:
    - python >=${{ python_min }}
    - lifewatch-pypam >=0.3.2,<0.3.3
    - boto3 >=1.35.0,<2.0.0
    - google-cloud-storage 2.18.0.*
    - dataclasses-json 0.6.*
    - python-dateutil 2.8.2.*
    - pyyaml 6.0.*
    - progressbar2 3.53.1.*
    - marshmallow 3.20.2.*
    - pysoundfile 0.12.1.*
    - h5netcdf 1.3.0.*
    - pvlib-python >=0.11.0,<0.12.0
    - pyarrow 15.0.0.*
    - loguru >=0.7.2,<0.8.0
    - awscli >=1.34.0,<2.0.0
    - isodate >=0.7.2,<0.8.0

tests:
  - python:
      imports:
        - pbp
      # Both dataclasses-json and pyyaml are poorly pinnied to extact version,
      # and dataclasses-json == 0.6 doesn't exist in conda-forge.
      # This is an "end of the stack" package and disabeling pip-check should not be an issue.
      pip_check: false
      python_version:
        - ${{ python_min }}.*
        - "*"
  - requirements:
      run:
        - python ${{ python_min }}.*
    script:
      - pbp --help
      - pbp-hmb-gen --help
      - pbp-cloud --help
      - pbp-hmb-plot --help
      - pbp-meta-gen --help

about:
  summary: PyPAM based Processing
  license: Apache-2.0
  license_file: LICENSE
  homepage: https://docs.mbari.org/pbp/

extra:
  recipe-maintainers:
    - ocefpaf
