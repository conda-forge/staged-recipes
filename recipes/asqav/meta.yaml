{% set version = "0.2.8" %}
{% set python_min = "3.10" %}

package:
  name: asqav
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/a/asqav/asqav-{{ version }}.tar.gz
  sha256: 47905243bec702c99ea2cb704c5489d80967663e90840b8800047f8e8da1fc8e

build:
  entry_points:
    - asqav = asqav.cli:app
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - hatchling
    - pip
  run:
    - python >={{ python_min }}

test:
  imports:
    - asqav
  commands:
    - pip check
    - asqav --help
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://asqav.com
  summary: AI agent governance - audit trails, policy enforcement, compliance
  doc_url: https://asqav.com/docs
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - jagmarques
