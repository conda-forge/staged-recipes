schema_version: 1

context:
  version: 0.0.12
  python_min: "3.8"

package:
  name: google-cloud-jupyter-config
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/g/google-cloud-jupyter-config/google_cloud_jupyter_config-${{ version }}.tar.gz
  sha256: 49c667400277bb2eabdfa82a39caf025bd029ba81a412c162f474c7b65246486

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
  run:
    - python >={{ python_min }}.*
    - cachetools
    - jupyter_server >=2.4.0
    - traitlets

tests:
  - python:
      imports:
        - google.cloud.jupyter_config
      python_version:
        - ${{ python_min }}.*
        - "*"
      pip_check: true

about:
  summary: Jupyter configuration utilities using gcloud
  license: Apache-2.0
  license_file: LICENSE
  homepage: https://github.com/GoogleCloudPlatform/jupyter-extensions/tree/master/google-cloud-jupyter-config

extra:
  recipe-maintainers:
    - sumanth-manchala
