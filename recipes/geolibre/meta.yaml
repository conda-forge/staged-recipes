{% set version = "1.0.0" %}

package:
  name: geolibre
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/g/geolibre/geolibre-{{ version }}.tar.gz
  sha256: 932ec6e85cceb0409580bee8fa308ad0f9880f0209140dc538fc6a0b593e125f

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - hatchling
    - pip
  run:
    - python >={{ python_min }}
    - anywidget >=0.9
    - traitlets >=5

test:
  imports:
    - geolibre
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://geolibre.app
  summary: 'GeoLibre in Jupyter: the full GeoLibre GIS app as an anywidget, with a leafmap-style Python API.'
  description: 'GeoLibre in Jupyter: the full GeoLibre GIS app as an anywidget, with a leafmap-style Python API.'
  license: MIT
  license_file: LICENSE
  doc_url: https://geolibre.app
  dev_url: https://github.com/opengeos/GeoLibre

extra:
  recipe-maintainers:
    - giswqs
