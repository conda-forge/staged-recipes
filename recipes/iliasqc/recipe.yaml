schema_version: 1

context:
  version: 0.1.0
  python_min: "3.12"

package:
  name: iliasqc
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/i/iliasqc/iliasqc-${{ version }}.tar.gz
  sha256: 6d7541db40c22d0ac7371f7af9989d0257068be9d94ecd8f3067d6b02ba45323

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  python:
    entry_points:
      - iliasqc = iliasqc.cli:main

requirements:
  host:
    - python ${{ python_min }}.*
    - setuptools >=64
    - pip
  run:
    - python >=${{ python_min }}

tests:
  - python:
      imports:
        - iliasqc
      pip_check: true
  - requirements:
      run:
        - pip
        - python ${{ python_min }}.*
    script:
      - iliasqc --help

about:
  summary: Python package to convert txt files into zip folder that can be uploaded to Ilias to create question pools.
  license: MIT
  license_file: LICENSE
  homepage: https://github.com/famosab/iliasqc

extra:
  recipe-maintainers:
    - famosab
