context:
  name: ccflow-etl
  version: "0.1.0"
  python_min: "3.11"

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/${{ name[0] }}/${{ name }}/${{ name|replace("-", "_") }}-${{ version }}.tar.gz
  sha256: 946250da77a73d25419ddc280b8622e1b9177e45ccd3fb77a44f90a617e8743c

build:
  number: 0
  noarch: python
  script: python -m pip install . -vv --no-deps --no-build-isolation
  python:
    entry_points:
      - cc-etl = ccflow_etl.cli:main
      - cc-etl-explain = ccflow_etl.cli:explain

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - hatchling
  run:
    - python >=${{ python_min }},<3.13
    - ccflow >=0.8.3
    - hydra-core
    - pydantic
    - pyarrow
tests:
  - python:
      imports:
        - ccflow_etl
        - ccflow_etl.cli
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "3.13"  # TODO: remove 3.14 gate once upstream dependencies are fixed

about:
  license: Apache-2.0
  license_file: LICENSE
  summary: Domain-neutral ETL building blocks for ccflow callable models
  homepage: https://github.com/1kbgz/ccflow-etl
  repository: https://github.com/1kbgz/ccflow-etl

extra:
  recipe-maintainers:
    - timkpaine
