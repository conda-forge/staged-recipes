schema_version: 1

context:
  name: jupyter-sidekick
  pyname: jupyter_sidekick
  version: "0.3.0"
  python_min: "3.10"

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/${{ pyname[0] }}/${{ pyname }}/${{ pyname }}-${{ version }}.tar.gz
  sha256: ad873199f34805f0b88c7f71bd23c39e674b108420f9145f677c9fdd14305ffc

build:
  noarch: python
  number: 0
  script: ${{ PYTHON }} -m pip install . --no-deps --no-build-isolation -vv

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - hatchling
    - hatch-jupyter-builder >=0.5
    - jupyterlab >=4.5.0
  run:
    - python >=${{ python_min }}
    - agent-client-protocol >=0.9,<0.10
    - jupyter_server >=2.4,<3
    - jupyterlab >=4.5.0

tests:
  - python:
      imports:
        - jupyter_sidekick
      pip_check: true
      python_version: ${{ python_min }}.*
  - requirements:
      run:
        - python ${{ python_min }}.*
    script:
      - jupyter server extension list
      - jupyter labextension list
      - if: unix
        then:
          - jupyter server extension list 2>&1 | grep -ie "jupyter_sidekick.*enabled"
          - jupyter labextension list 2>&1 | grep -ie "jupyter-sidekick.*enabled"

about:
  homepage: https://github.com/SchmidtDSE/jupyter-sidekick
  summary: Jupyter-native access to coding agents over the Agent Client Protocol (ACP)
  description: |
    jupyter-sidekick is a JupyterLab extension that gives each chat a single
    coding agent over the Agent Client Protocol (ACP) — a per-chat agent
    binding with capability UI (models, modes, config options), tool-call and
    reasoning rendering, tool approval, live notebook editing, and a
    marketplace backed by the shared ACP Agent Registry. It is a thin layer on
    open standards (agent-client-protocol + jupyter-server) with no dependency
    on the jupyter_ai stack.
  license: BSD-3-Clause
  license_file: LICENSE
  repository: https://github.com/SchmidtDSE/jupyter-sidekick
  documentation: https://jupyter-sidekick.readthedocs.io/

extra:
  recipe-maintainers:
    - cboettig
