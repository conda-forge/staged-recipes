schema_version: 1

context:
  version: "3.1.1"

package:
  name: graphrag-common
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/g/graphrag-common/graphrag_common-${{ version }}.tar.gz
  sha256: 0bf1382a563e9764e3e7fcfef8b8d64dec55648d8f9fc2cf9c5392123f31e63e

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - hatchling >=1.27.0,<2.0.0
    - pip
  run:
    - python >=${{ python_min }},<3.14
    - python-dotenv >=1.0,<2.dev0
    - pyyaml >=6.0,<7.dev0
    - toml >=0.10,<1.dev0

tests:
  - python:
      imports:
        - graphrag_common
      pip_check: true
      python_version: 
        - ${{ python_min }}.*
        - "*"

about:
  summary: Common utilities and types for GraphRAG
  license: MIT
  license_file: LICENSE
  homepage: https://pypi.org/project/graphrag-common/
  repository: https://github.com/microsoft/graphrag

extra:
  recipe-maintainers:
    - jan-janssen
