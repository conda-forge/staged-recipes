context:
  version: "0.1.2"

package:
  name: jupyterlite-polyglott
  version: ${{ version }}

source:
  url: https://files.pythonhosted.org/packages/source/j/jupyterlite-polyglott/jupyterlite_polyglott-${{ version }}.tar.gz
  sha256: 0f2284948bbf9de0370413b196a98de3a00ac7b58f04710d01153a45d3042c80

build:
  noarch: python
  script: python -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - hatch-jupyter-builder >=0.5
    - hatch-nodejs-version >=0.3.2
    - hatchling >=1.5.0
    - jupyterlab >=4.1.1,<4.2
    - pip
    - python
  run:
    - python >=${{ python_min }}
tests:
  - python:
      imports:
        - jupyterlite_polyglott
      pip_check: true

about:
  homepage: https://github.com/DerThorsten/jupyterlite-polyglott
  summary: A polyglot meta kernel for JupyterLite
  license: BSD-3-Clause
  license_file:
    - LICENSE
    - jupyterlite_polyglott/labextension/static/third-party-licenses.json

extra:
  recipe-maintainers:
    - DerThorsten
