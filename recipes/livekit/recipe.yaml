schema_version: 1

context:
  version: "1.1.2"

package:
  name: livekit
  version: ${{ version }}

source:
  - url: https://pypi.org/packages/source/l/livekit/livekit-${{ version }}.tar.gz
    sha256: ef826e94dd039767fcabc2f0d810b1b2335c9cf249f52320b6ab018b06d5ccd7
  - url: https://raw.githubusercontent.com/livekit/python-sdks/refs/tags/protocol-v${{ version }}/LICENSE
    sha256: c71d239df91726fc519c6eb72d318ec65820627232b2f796219e87dcf35d0ab4
    file_name: LICENSE

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - setuptools >=61
    - wheel
    - requests
    - pip
  run:
    - python >=${{ python_min }}
    - protobuf >=4.25.0
    - types-protobuf >=3
    - aiofiles >=24
    - numpy >=1.26

tests:
  - python:
      python_version:
        - ${{ python_min }}.*
        - "*"
      imports:
        - livekit
      pip_check: true

about:
  summary: Python Real-time SDK for LiveKit
  license: Apache-2.0
  license_file: LICENSE
  homepage: https://pypi.org/project/livekit/
  repository: https://github.com/livekit/python-sdks/
  documentation: https://docs.livekit.io

extra:
  recipe-maintainers:
    - xhochy
