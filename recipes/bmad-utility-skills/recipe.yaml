# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  name: bmad-utility-skills
  version: "1.3.0"
  # Upstream (bmad-code-org/bmad-utility-skills) has no release tags as of 2026-04-26.
  # Pinned to the latest main commit; bump both `version` and `commit` together.
  commit: b9b1de4df26daedfca5f2d9c31bdca54aebdda74

package:
  name: ${{ name }}
  version: ${{ version }}

source:
  url: https://github.com/bmad-code-org/bmad-utility-skills/archive/${{ commit }}.tar.gz
  sha256: f12a6d7f2e67ee48879de442ea2d27f565caed40e20a391b2c3e6f01f799b7bc

build:
  number: 0
  noarch: generic

requirements:
  run:
    - python >=3.10

tests:
  - script:
      - if: not win
        then:
          - bmad-utility-skills-install --help
          - test -d "${CONDA_PREFIX}/share/bmad-utility-skills/skills"
          - test -d "${CONDA_PREFIX}/share/bmad-utility-skills/skills/bmad-os-gh-triage"
          - test -d "${CONDA_PREFIX}/share/bmad-utility-skills/skills/bmad-os-review-pr"
          - test -d "${CONDA_PREFIX}/share/bmad-utility-skills/skills/bmad-os-release-module"
          - test -f "${CONDA_PREFIX}/share/bmad-utility-skills/.claude-plugin/marketplace.json"
      - if: win
        then:
          - bmad-utility-skills-install.bat --help
          - if not exist "%CONDA_PREFIX%\share\bmad-utility-skills\skills" exit 1
          - if not exist "%CONDA_PREFIX%\share\bmad-utility-skills\.claude-plugin\marketplace.json" exit 1

about:
  homepage: https://github.com/bmad-code-org/bmad-utility-skills
  repository: https://github.com/bmad-code-org/bmad-utility-skills
  license: MIT
  # Upstream repo does not yet ship a LICENSE file. The marketplace manifest and
  # README both declare MIT; the vendored LICENSE is the same MIT text used by
  # the sibling bmad-code-org/BMAD-METHOD project (v6.5.0). HOLD SUBMISSION until
  # upstream adds its own LICENSE file.
  license_file: LICENSE
  summary: Utility skills for BMad Method contributors (PR review, triage, changelog, release automation)
  description: |
    bmad-utility-skills is a collection of open-source utility skills for the
    BMad Code team and BMad Method contributors. It ships eleven skills covering
    GitHub issue triage, dual-layer adversarial PR review, findings triage,
    changelog drafting, social-media changelog posts, release-module automation,
    LLM prompt auditing, file-reference convention checks, Diataxis style fixes,
    and root cause analysis.

    After installation, run ``bmad-utility-skills-install`` in your project
    directory to copy the skills into ``.claude/skills/`` so Claude Code can
    discover them.

extra:
  recipe-maintainers:
    - rxm7706
