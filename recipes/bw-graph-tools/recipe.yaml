schema_version: 1

context:
  python_min: "3.9"
  version: "0.8"

package:
  name: bw-graph-tools
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/b/bw-graph-tools/bw_graph_tools-${{ version }}.tar.gz
  sha256: 69ef84395bad7cd2cf9618d412f50f4a8e391dd53270cd4d45deacd191d11bc9

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - setuptools >=68.0
    - pip
  run:
    - python >=${{ python_min }}
    - bw2calc >=2.4
    - bw2data >=4.7
    - bw_processing
    - matrix_utils
    - numpy <3
    - pydantic
    - scipy

tests:
  - python:
      imports:
        - bw_graph_tools
      pip_check: true
      python_version: ${{ python_min }}.*

about:
  summary: Graph traversal class and utilities
  license: BSD-3-Clause
  license_file: LICENSE
  homepage: https://pypi.org/project/bw-graph-tools/

extra:
  recipe-maintainers:
    - cmutel
