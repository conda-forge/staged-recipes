schema_version: 1

context:
  python_min: "3.9"
  version: "1.0.5"

package:
  name: pyvims
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/p/pyvims/pyvims-${{ version }}.tar.gz
  sha256: 577d07e3848ba8c07c2f5f45dcfbb41ce1e82cf2cdd3ecdb1701016f64901245

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - setuptools
    - pip
  run:
    - python >=${{ python_min }}
    - numpy >=1.17
    - matplotlib-base >=3.1
    - pillow
    - scipy
    - tqdm
    - requests
    - pvl

tests:
  - python:
      imports:
        - pyvims
      pip_check: true
      python_version: ${{ python_min }}.*

about:
  summary: Python package to manipulate the Cassini VIMS data
  license: BSD-3-Clause
  license_file: LICENSE.md
  homepage: https://github.com/seignovert/pyvims

extra:
  recipe-maintainers:
    - seignovert
