{% set name = "pymc-bilby" %}
{% set version = "0.1.0" %}
{% set python_min = "3.10" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/pymc_bilby-{{ version }}.tar.gz
  sha256: e291cf9cae7057c27b1b56e1a8da432e5a05502214edcca1d777d99257a9dccd

build:
  noarch: python
  number: 0
  script_env:
    - SETUPTOOLS_SCM_PRETEND_VERSION={{ version }}
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python {{ python_min }}
    - pip
    - setuptools >=45
    - setuptools-scm >=6.2
  run:
    - python >={{ python_min }}
    - bilby >=2.3.0
    - pymc >=5.9

test:
  imports:
    - pymc_bilby
  commands:
    - python -m pytest tests/
  requires:
    - python {{ python_min }}
    - pip
    - pytest
  source_files:
    - tests
    - pyproject.toml

about:
  home: https://github.com/bilby-dev/pymc-bilby
  summary: Plugin for using pymc with bilby.
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - ColmTalbot
    - mj-will
