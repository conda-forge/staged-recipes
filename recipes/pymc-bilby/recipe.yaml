context:
  name: pymc-bilby
  version: "0.1.0"
  python_min: "3.10"

package:
  name: ${{ name }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/${{ name[0] }}/${{ name }}/pymc_bilby-${{ version }}.tar.gz
  sha256: e291cf9cae7057c27b1b56e1a8da432e5a05502214edcca1d777d99257a9dccd

build:
  noarch: python
  number: 0
  script: python -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - setuptools >=45
    - setuptools-scm >=6.2
  run:
    - python >=${{ python_min }}
    - bilby >=2.3.0
    - pymc >=5.9

tests:
  - python:
      imports:
        - pymc_bilby
      # MKL-variant solves can make pip_check fail spuriously via mkl-service.
      pip_check: false
      python_version: ${{ python_min }}.*

  - script:
      - python -m pytest tests/
    requirements:
      run:
        - python ${{ python_min }}.*
        - pytest
    files:
      source:
        - tests/
        - pyproject.toml

about:
  homepage: https://github.com/bilby-dev/pymc-bilby
  summary: Plugin for using pymc with bilby.
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - ColmTalbot
    - mj-will
