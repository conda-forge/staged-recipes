schema_version: 1

context:
  version: "0.1.20"

package:
  name: rsloop
  version: ${{ version }}

source:
  - url: https://pypi.org/packages/source/r/rsloop/rsloop-${{ version }}.tar.gz
    sha256: a19af776df8f73248ed6fa98e3ea353c8907a40d458f1026bfb946b6d1a03258

build:
  number: 0
  script:
    - ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation --disable-pip-version-check
    - cargo-bundle-licenses --format yaml --output THIRDPARTY.yml

requirements:
  build:
    - python
    - if: build_platform != target_platform
      then:
        - cross-python_${{ target_platform }}
    - ${{ compiler('c') }}
    - ${{ stdlib('c') }}
    - ${{ compiler('rust') }}
    - cargo-bundle-licenses
    - maturin
  host:
    - maturin
    - pip
    - python
  run:
    - python

tests:
  - python:
      imports: rsloop
      pip_check: true

about:
  license: Apache-2.0
  license_file:
    - LICENSE
    - THIRDPARTY.yml
  homepage: https://rustedbytes.github.io/rsloop
  repository: https://github.com/RustedBytes/rsloop
  summary: An event loop for asyncio written in Rust.

extra:
  recipe-maintainers:
    - davidbrochart
