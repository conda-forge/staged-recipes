{% set version = "0.1.0" %}

package:
  name: evrex
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/e/evrex/evrex-{{ version }}.tar.gz
  sha256: ce451df1f2267ab8c55ab40f80d475c10c3bbba21ef24f3c68cac99ba1becaa4

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python >=3.9
    - setuptools >=64
    - wheel
    - pip
  run:
    - python >=3.9
    - numpy >=1.22
    - scipy >=1.8

test:
  imports:
    - evrex
  commands:
    - pip check
  requires:
    - pip
    - python

about:
  home: https://github.com/evrex-dev/evrex
  summary: 'EVreX - EV Resource eXchange: electric vehicle fleet adoption modeling, V2G potential, and grid impact assessment'
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - msotocalvo
