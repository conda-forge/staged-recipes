{% set version = "0.1.1" %}

package:
  name: evrex
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/e/evrex/evrex-{{ version }}.tar.gz
  sha256: e3b0c44298fc1c149afbf4c8996fb92427ae41e4649b934ca495991b7852b855

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - setuptools >=64
    - wheel
    - pip
  run:
    - python >={{ python_min }}
    - numpy >=1.22
    - scipy >=1.8

test:
  imports:
    - evrex
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://github.com/Net-Zero-Horizon/evrex
  summary: 'EVreX - EV Resource eXchange: electric vehicle fleet adoption modeling, V2G potential, and grid impact assessment'
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - msotocalvo