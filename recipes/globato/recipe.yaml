schema_version: 1

context:
  name: globato
  version: "0.2.12"
  python_min: "3.12"

package:
  name: ${{ name | lower }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/${{ name[0] }}/${{ name }}/${{ name | replace('-', '_') }}-${{ version }}.tar.gz
  sha256: e9aff035712071ebc05f011dea04c7afe29c122f4a5db54e98fde60c075f038b

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  python:
    entry_points:
      - globato = globato.cli:cli
      - wafflez = globato.cli.wafflez:wafflez_build

requirements:
  host:
    - python ${{ python_min }}.*
    - hatchling >=1.5.0
    - hatch-vcs
    - wheel
    - pip
  run:
    - python >=${{ python_min }}
    - fetchez >=0.6.4
    - transformez >=0.4.2
    - click
    - fiona
    - h5py
    - laspy
    # laszip is an optional dependency of laspy, expressed as laspy[lazrs,laszip] upstream
    - laszip
    - matplotlib-base
    - numpy >1.24
    - pandas
    - pyproj >3.6.1
    - pyshp
    - pyyaml
    - rasterio >1.4.0
    - requests
    - scipy
    - shapely

tests:
  - python:
      python_version: "${{ python_min }}.*"
      pip_check: true
      imports:
        - globato
  - script:
      - globato --help
    requirements:
      run:
        - python ${{ python_min }}.*

about:
  homepage: https://github.com/continuous-dems/globato
  summary: |
    A suite of specialized data processors (Multibeam, Lidar, Raster), etc. for
    the Fetchez ecosystem.
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - matth-love
    - mfisher87
