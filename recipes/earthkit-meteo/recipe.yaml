schema_version: 1

context:
  python_min: "3.10"
  version: "0.6.2"

package:
  name: earthkit-meteo
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/e/earthkit-meteo/earthkit_meteo-${{ version }}.tar.gz
  sha256: 2823ed56947dd2c9c69aae6fe19153eec393c80392126ab84cc760419d0b952b

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - setuptools >=61
    - setuptools-scm >=8
    - wheel
    - pip
  run:
    - python >=${{ python_min }}
    - earthkit-utils >=0.2,<0.99
    - numpy

tests:
  - python:
      imports:
        - earthkit
      pip_check: true
      python_version: ${{ python_min }}.*

about:
  summary: Meteorological computations
  license: Apache-2.0
  license_file: LICENSE
  homepage: https://github.com/ecmwf/earthkit-meteo/
  documentation: https://earthkit-meteo.readthedocs.io/

extra:
  recipe-maintainers:
    - tjtg
    - jasonjunweilyu
    - HCookie
