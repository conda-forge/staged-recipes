{% set version = "0.6.2" %}
{% set python_min = "3.11" %}

package:
  name: earthkit-meteo
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/e/earthkit-meteo/earthkit_meteo-{{ version }}.tar.gz
  sha256: 2823ed56947dd2c9c69aae6fe19153eec393c80392126ab84cc760419d0b952b

build:
  noarch: python
  script: "{{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation"
  number: 0

requirements:
  host:
    - python {{ python_min }}.*
    - setuptools >=61
    - setuptools-scm >=8
    - wheel
    - pip
  run:
    - python >={{ python_min }}
    - earthkit-utils >=0.2,<0.99
    - numpy

test:
  imports:
    - earthkit
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://github.com/ecmwf/earthkit-meteo/
  summary: Meteorological computations
  doc_url: https://earthkit-meteo.readthedocs.io/
  license: Apache-2.0
  license_file: LICENSE

extra:
  recipe-maintainers:
    - tjtg
    - jasonjunweilyu
    - HCookie
