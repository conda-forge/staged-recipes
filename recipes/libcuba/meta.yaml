{% set version = "4.2.2" %}

package:
  name: libcuba
  version: "4.2.2"

source:
  # url: https://feynarts.de/cuba/Cuba-{{ version }}.tar.gz
  # sha256: 8d9f532fd2b9561da2272c156ef7be5f3960953e4519c638759f1b52fe03ed52

  # upstream did not respond yet to submitted patches
  git_rev: "main"
  git_url: "https://github.com/jschueller/cuba.git"

build:
  number: 0
  run_exports:
    - {{ pin_subpackage('libcuba', max_pin='x.x') }}

requirements:
  build:
    - {{ compiler('c') }}
    - cmake
    - ninja

about:
  home: "https://feynarts.de/cuba/"
  license: LGPL-3.0-only
  license_family: LGPL
  license_file: COPYING
  summary: "Cuba - a library for multidimensional numerical integration"
  
extra:
  recipe-maintainers:
    - jschueller
