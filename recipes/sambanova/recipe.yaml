# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "1.9.1"

package:
  name: sambanova
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/s/sambanova/sambanova-${{ version }}.tar.gz
  sha256: 481445e9ca983ee50104531a701b951248e2570a4663554e0266ca6f90c36de8

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - hatchling
    - hatch-fancy-pypi-readme
    - pip
  run:
    - python >=${{ python_min }}
    - httpx >=0.23.0,<1
    - pydantic >=1.9.0,<3
    - typing_extensions >=4.14,<5
    - anyio >=3.5.0,<5
    - distro >=1.7.0,<2
    - sniffio

tests:
  - python:
      imports:
        - sambanova
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  homepage: https://github.com/sambanova/sambanova-python
  license: Apache-2.0
  license_file: LICENSE
  summary: The official Python library for the SambaNova API
  repository: https://github.com/sambanova/sambanova-python
  description: |
    The official Python library for the SambaNova API, providing convenient
    access to the SambaNova Cloud REST API from any Python 3.9+ application.
    It includes type definitions for request params and response fields, and
    offers both synchronous and asynchronous clients backed by httpx.

extra:
  recipe-maintainers:
    - rxm7706
