context:
  version: 0.2.1
  build_number: '0'
  python_min: "3.11"

package:
  name: nrel-revrt
  version: ${{ version }}

source:
- url: https://files.pythonhosted.org/packages/source/n/nrel-revrt/nrel_revrt-${{ version }}.tar.gz
  sha256: cad6601b41bc3e8065ee695ed700741ecbb57ffcdb73eafbeac27a5901011ada

build:
  number: ${{ build_number }}
  script:
    - cargo-bundle-licenses --format yaml --output THIRDPARTY.yml   # must run first
    - ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  python:
    entry_points:
    - reVRt = revrt._cli:main

requirements:
  build:
    - ${{ compiler('c') }}
    - ${{ compiler('rust') }}
    - ${{ stdlib('c') }}
    - cargo-bundle-licenses
  host:
  - python {{ python_min }}
  - maturin >=1.9.3,<2.0
  - pip
  run:
  - python >=3.11
  - affine <3,>=2.4.0
  - dask <2026,>=2025.4.1
  - distributed <2026,>=2025.4.1
  - geopandas <2,>=1.0.1
  - numpy <3,>=2.2.4
  - odc-geo <0.6,>=0.5.0rc1
  - pydantic <3,>=2.11.7
  - nrel-gaps <0.9,>=0.8.8
  - rasterio <2,>=1.4.3
  - rioxarray <0.19,>=0.18.2
  - shapely <3,>=2.1.1
  - xarray <2026,>=2025.9.0
  - zarr <4,>=3.0.7
  # - ipython <10,>=9.1.0 # extra == "dev"
  # - jupyter <2,>=1.1.1 # extra == "dev"
  # - maturin <2,>=1.9.3 # extra == "dev"
  # - pipreqs <0.5,>=0.4.13 # extra == "dev"
  # - ruff <0.13,>=0.12.10 # extra == "dev"
  # - ruff-lsp <0.0.63,>=0.0.62 # extra == "dev"
  # - pytest <9,>=8.3.5 # extra == "test"
  # - pytest-cases <4,>=3.8.6 # extra == "test"
  # - pytest-cov <7,>=6.1.1 # extra == "test"
  # - pytest-mock <4,>=3.14.0 # extra == "test"
  # - pytest-profiling <2,>=1.8.1 # extra == "test"
  # - pytest-xdist <4,>=3.6.1 # extra == "test"
  # - rasterstats <0.21,>=0.20.0 # extra == "test"
  # - scikit-image <0.26,>=0.25.2 # extra == "test"
  # - snakeviz <3,>=2.2.2 # extra == "test"
  # - tox <5,>=4.26.0 # extra == "test"
  # - ghp-import <3,>=2.1.0 # extra == "doc"
  # - myst-parser <5,>=4.0.1 # extra == "doc"
  # - numpydoc <2,>=1.8.0 # extra == "doc"
  # - pydata-sphinx-theme <0.17,>=0.16.1 # extra == "doc"
  # - sphinx <9,>=8.2.3 # extra == "doc"
  # - sphinx-click <7,>=6.0.0 # extra == "doc"
  # - sphinx-copybutton <0.6,>=0.5.2 # extra == "doc"
  # - sphinx-tabs <4,>=3.4.1 # extra == "doc"
  # - sphinxcontrib-mermaid <2,>=1.0.0 # extra == "doc"
  # - build <2,>=1.2.2 # extra == "build"
  # - pkginfo <2,>=1.12.1.2 # extra == "build"
  # - twine <7,>=6.1.0 # extra == "build"

tests:
- python:
    imports:
    - revrt
    pip_check: true

about:
  home: https://github.com/NatLabRockies/reVRt
  summary: National Laboratory of the Rockies's (NREL's) Transmission for reVX tool
  dev_url: https://github.com/NatLabRockies/reVRt
  description: |+
    *******************************
    Welcome to reV Routing (reVRt)!
    *******************************

    |Zenodo| |License| |Ruff| |Pixi| |SWR|

    .. |Ruff| image:: https://img.shields.io/endpoint?url=https://raw.githubusercontent.com/astral-sh/ruff/main/assets/badge/v2.json
        :target: https://github.com/astral-sh/ruff

    .. |License| image:: https://img.shields.io/badge/License-BSD_3--Clause-orange.svg
        :target: https://opensource.org/licenses/BSD-3-Clause

    .. |Pixi| image:: https://img.shields.io/endpoint?url=https://raw.githubusercontent.com/prefix-dev/pixi/main/assets/badge/v0.json
        :target: https://pixi.sh

    .. |SWR| image:: https://img.shields.io/badge/SWR--25--112_-blue?label=NREL
        :alt: Static Badge

    .. |Zenodo| image:: https://zenodo.org/badge/944738283.svg
        :target: https://doi.org/10.5281/zenodo.17173574

    .. inclusion-intro

    The reV Routing tool is a computational framework for modeling and optimizing
    transmission infrastructure requirements for electrical grid connections. By
    employing a spatially-aware least-cost-path methodology, it allows users to
    incorporate a wide range of factors including siting constraints, regional
    component costs, land composition costs, point-of-interconnection costs, and
    network upgrade costs. Additionally, the tool enables advanced follow-on
    analyses, such as land characterization for potential transmission line routes,
    to support informed decision-making. Although it's designed to integrate
    seamlessly with the reV model, the reV Routing tool is versatile and can also
    be utilized independently for standalone analyses in transmission planning and
    resource assessment scenarios.


    Installing reVRt
    ================
    The quickest way to install reVRt for users and analysts is from PyPi:

    .. code-block:: bash

        pip install nrel-revrt

    If you would like to install and run reVRt from source, we recommend using `pixi <https://pixi.sh/latest/>`_:

    .. code-block:: bash

        git clone git@github.com:NREL/reVRt.git; cd reVRt
        pixi run reVRt


    For detailed instructions, see the `installation documentation <https://nrel.github.io/reVRt/misc/installation.html>`_.


    Development
    ===========
    Please see the `Development Guidelines <https://nrel.github.io/reVRt/dev/index.html>`_
    if you wish to contribute code to this repository.

  license: BSD-3-Clause
  license_file:
  - LICENSE

extra:
  recipe-maintainers:
    - ppinchuk
    - castelao
