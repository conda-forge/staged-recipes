# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "0.8.1"

recipe:
  name: dbgpt-split
  version: ${{ version }}

source:
  url: https://github.com/eosphoros-ai/DB-GPT/archive/refs/tags/v${{ version }}.tar.gz
  sha256: 65e25642dfb0f2e3028a50301fda060ca09008d754ea46a8268edc47c131a2ec

build:
  number: 0

outputs:
  - package:
      name: dbgpt
      version: ${{ version }}
    build:
      noarch: python
      script: |
        ${{ PYTHON }} -c "import pathlib; p=pathlib.Path('packages/dbgpt-core/pyproject.toml'); p.write_text(p.read_text().replace('==', '>='))"
        ${{ PYTHON }} -m pip install ./packages/dbgpt-core --no-deps --no-build-isolation -vv
    requirements:
      host:
        - python ${{ python_min }}.*
        - hatchling
        - pip
      run:
        - python >=${{ python_min }}
        - aiohttp >=3.8.4
        - apscheduler >=3.10,<4
        - chardet >=5.1.0
        - importlib-resources >=5.12.0
        - cachetools
        - pydantic >=2.6.0
        - typeguard
        - snowflake-id
        - typing_inspect
        - tomli >=2.2.1
    tests:
      - python:
          imports:
            - dbgpt
          pip_check: true
          python_version:
            - ${{ python_min }}.*
            - "*"

  - package:
      name: dbgpt-ext
      version: ${{ version }}
    build:
      noarch: python
      script: |
        ${{ PYTHON }} -c "import pathlib; p=pathlib.Path('packages/dbgpt-ext/pyproject.toml'); p.write_text(p.read_text().replace('==', '>='))"
        ${{ PYTHON }} -m pip install ./packages/dbgpt-ext --no-deps --no-build-isolation -vv
    requirements:
      host:
        - python ${{ python_min }}.*
        - hatchling
        - pip
      run:
        - python >=${{ python_min }}
        - ${{ pin_subpackage('dbgpt', lower_bound='x.x.x', upper_bound='x.x.x') }}
        - pymysql
        # bs4 is an under-declared hard import in dbgpt_ext.rag
        - beautifulsoup4
    tests:
      - python:
          imports:
            - dbgpt_ext
          pip_check: true
          python_version:
            - ${{ python_min }}.*
            - "*"

  - package:
      name: dbgpt-serve
      version: ${{ version }}
    build:
      noarch: python
      script: ${{ PYTHON }} -m pip install ./packages/dbgpt-serve --no-deps --no-build-isolation -vv
    requirements:
      host:
        - python ${{ python_min }}.*
        - hatchling
        - pip
      run:
        - python >=${{ python_min }}
        - ${{ pin_subpackage('dbgpt-ext', lower_bound='x.x.x', upper_bound='x.x.x') }}
    tests:
      - python:
          imports:
            - dbgpt_serve
          pip_check: true
          python_version:
            - ${{ python_min }}.*
            - "*"

  - package:
      name: dbgpt-core-client-cli
      version: ${{ version }}
    build:
      noarch: python
    requirements:
      host:
        - python ${{ python_min }}.*
      run:
        - python >=${{ python_min }}
        - ${{ pin_subpackage('dbgpt', lower_bound='x.x.x', upper_bound='x.x.x') }}
        - httpx
        - fastapi >=0.100.0,<0.113.0
        - tenacity <=8.3.0
        - prettytable
        - click
        - psutil >=5.9.4
        - colorama >=0.4.6
        - tomlkit
        - rich
        - shortuuid
        - sqlalchemy >=2.0.25,<2.0.29
        - msgpack-python
        - cloudpickle

  - package:
      name: dbgpt-client
      version: ${{ version }}
    build:
      noarch: python
      script: ${{ PYTHON }} -m pip install ./packages/dbgpt-client --no-deps --no-build-isolation -vv
    requirements:
      host:
        - python ${{ python_min }}.*
        - hatchling
        - pip
      run:
        - python >=${{ python_min }}
        - ${{ pin_subpackage('dbgpt', lower_bound='x.x.x', upper_bound='x.x.x') }}
        - ${{ pin_subpackage('dbgpt-ext', lower_bound='x.x.x', upper_bound='x.x.x') }}
        - ${{ pin_subpackage('dbgpt-core-client-cli', lower_bound='x.x.x', upper_bound='x.x.x') }}
    tests:
      - python:
          imports:
            - dbgpt_client
          pip_check: true
          python_version:
            - ${{ python_min }}.*
            - "*"

  - package:
      name: dbgpt-sandbox
      version: ${{ version }}
    build:
      noarch: python
      script: ${{ PYTHON }} -m pip install ./packages/dbgpt-sandbox --no-deps --no-build-isolation -vv
    requirements:
      host:
        - python ${{ python_min }}.*
        - hatchling
        - pip
      run:
        - python >=${{ python_min }}
        - psutil >=5.9.0
        - colorama >=0.4.4
        - docker-py >=6.0.0
        - fastapi >=0.68.0
        - uvicorn >=0.15.0
        - pydantic >=1.8.0
        - python-multipart >=0.0.5
        - selenium >=4.0.0
        - typing_extensions >=4.0.0
    tests:
      - python:
          imports:
            - dbgpt_sandbox
          pip_check: false
          python_version:
            - ${{ python_min }}.*
            - "*"

  - package:
      name: dbgpt-acc-auto
      version: ${{ version }}
    build:
      noarch: python
      script: ${{ PYTHON }} -m pip install ./packages/dbgpt-accelerator/dbgpt-acc-auto --no-deps --no-build-isolation -vv
    requirements:
      host:
        - python ${{ python_min }}.*
        - hatchling
        - pip
      run:
        - python >=${{ python_min }}
    tests:
      - python:
          imports:
            - dbgpt_acc_auto
          pip_check: true
          python_version:
            - ${{ python_min }}.*
            - "*"

  - package:
      name: dbgpt-acc-flash-attn
      version: ${{ version }}
    build:
      noarch: python
      script: ${{ PYTHON }} -m pip install ./packages/dbgpt-accelerator/dbgpt-acc-flash-attn --no-deps --no-build-isolation -vv
    requirements:
      host:
        - python ${{ python_min }}.*
        - hatchling
        - pip
      run:
        - python >=${{ python_min }}
    tests:
      - python:
          imports:
            - dbgpt_acc_flash_attn
          pip_check: true
          python_version:
            - ${{ python_min }}.*
            - "*"

  - package:
      name: dbgpt-proxy-openai
      version: ${{ version }}
    build:
      noarch: python
    requirements:
      host:
        - python ${{ python_min }}.*
      run:
        - python >=${{ python_min }}
        - ${{ pin_subpackage('dbgpt', lower_bound='x.x.x', upper_bound='x.x.x') }}
        - openai >=1.59.6
        - tiktoken >=0.8.0
        - socksio

  - package:
      name: dbgpt-proxy-tongyi
      version: ${{ version }}
    build:
      noarch: python
    requirements:
      host:
        - python ${{ python_min }}.*
      run:
        - python >=${{ python_min }}
        - ${{ pin_subpackage('dbgpt', lower_bound='x.x.x', upper_bound='x.x.x') }}
        - dashscope

  - package:
      name: dbgpt-ext-rag
      version: ${{ version }}
    build:
      noarch: python
    requirements:
      host:
        - python ${{ python_min }}.*
      run:
        - python >=${{ python_min }}
        - ${{ pin_subpackage('dbgpt-ext', lower_bound='x.x.x', upper_bound='x.x.x') }}
        - spacy >=3.7
        - markdown
        - python-pptx
        - python-docx
        - olefile
        - pypdf
        - pdfplumber
        - onnxruntime >=1.14.1,<=1.18.1

  - package:
      name: dbgpt-ext-chromadb
      version: ${{ version }}
    build:
      noarch: python
    requirements:
      host:
        - python ${{ python_min }}.*
      run:
        - python >=${{ python_min }}
        - ${{ pin_subpackage('dbgpt-ext', lower_bound='x.x.x', upper_bound='x.x.x') }}
        - chromadb >=0.4.22

  - package:
      name: dbgpt-agent
      version: ${{ version }}
    build:
      noarch: python
    requirements:
      host:
        - python ${{ python_min }}.*
      run:
        - python >=${{ python_min }}
        - ${{ pin_subpackage('dbgpt', lower_bound='x.x.x', upper_bound='x.x.x') }}
        - termcolor
        - pandas >=2.2.3
        - numpy >=1.21.0,<2.0.0
        - auto-gpt-plugin-template >=0.0.3
        - mcp >=1.4.1

  - package:
      name: dbgpt-framework
      version: ${{ version }}
    build:
      noarch: python
    requirements:
      host:
        - python ${{ python_min }}.*
      run:
        - python >=${{ python_min }}
        - ${{ pin_subpackage('dbgpt', lower_bound='x.x.x', upper_bound='x.x.x') }}
        - jinja2
        - coloredlogs
        - seaborn
        - gtts >=2.3.1
        - jsonschema
        - python-jsonpath
        - tokenizers >=0.14
        - alembic >=1.12.0
        - openpyxl >=3.1.2
        - xlrd >=2.0.1
        - gitpython
        - python-graphviz
        - cryptography
        - pympler
        - python-duckdb
        - duckdb-engine >=0.9.1
        - schedule
        - sqlparse >=0.4.4

  - package:
      name: dbgpt-code
      version: ${{ version }}
    build:
      noarch: python
    requirements:
      host:
        - python ${{ python_min }}.*
      run:
        - python >=${{ python_min }}
        - ${{ pin_subpackage('dbgpt', lower_bound='x.x.x', upper_bound='x.x.x') }}
        - pyzmq
        - lyric-py >=0.1.7
        - lyric-py-worker >=0.1.7
        - lyric-js-worker >=0.1.7
        - lyric-component-ts-transpiling >=0.1.7

  - package:
      name: dbgpt-app
      version: ${{ version }}
    build:
      noarch: python
      script: ${{ PYTHON }} -m pip install ./packages/dbgpt-app --no-deps --no-build-isolation -vv
    requirements:
      host:
        - python ${{ python_min }}.*
        - hatchling
        - pip
      run:
        - python >=${{ python_min }}
        - ${{ pin_subpackage('dbgpt', lower_bound='x.x.x', upper_bound='x.x.x') }}
        - ${{ pin_subpackage('dbgpt-ext', lower_bound='x.x.x', upper_bound='x.x.x') }}
        - ${{ pin_subpackage('dbgpt-serve', lower_bound='x.x.x', upper_bound='x.x.x') }}
        - ${{ pin_subpackage('dbgpt-client', lower_bound='x.x.x', upper_bound='x.x.x') }}
        - ${{ pin_subpackage('dbgpt-sandbox', lower_bound='x.x.x', upper_bound='x.x.x') }}
        - ${{ pin_subpackage('dbgpt-acc-auto', lower_bound='x.x.x', upper_bound='x.x.x') }}
        - ${{ pin_subpackage('dbgpt-proxy-openai', lower_bound='x.x.x', upper_bound='x.x.x') }}
        - ${{ pin_subpackage('dbgpt-proxy-tongyi', lower_bound='x.x.x', upper_bound='x.x.x') }}
        - ${{ pin_subpackage('dbgpt-ext-rag', lower_bound='x.x.x', upper_bound='x.x.x') }}
        - ${{ pin_subpackage('dbgpt-ext-chromadb', lower_bound='x.x.x', upper_bound='x.x.x') }}
        - ${{ pin_subpackage('dbgpt-agent', lower_bound='x.x.x', upper_bound='x.x.x') }}
        - ${{ pin_subpackage('dbgpt-framework', lower_bound='x.x.x', upper_bound='x.x.x') }}
        - ${{ pin_subpackage('dbgpt-code', lower_bound='x.x.x', upper_bound='x.x.x') }}
        # direct deps from dbgpt-app's own pyproject.toml
        - aiofiles
        - httpx >=0.24.0  # tighter pin than dbgpt-client's unversioned httpx
        - pyparsing
    tests:
      - python:
          imports:
            - dbgpt_app
          pip_check: false
          python_version:
            - ${{ python_min }}.*
            - "*"

about:
  homepage: https://github.com/eosphoros-ai/DB-GPT
  repository: https://github.com/eosphoros-ai/DB-GPT
  documentation: http://docs.dbgpt.cn/docs/overview
  license: MIT
  license_file: LICENSE
  summary: An open-source AI native data app development framework with AWEL and agents (DB-GPT)

extra:
  feedstock-name: db-gpt
  recipe-maintainers:
    - pb01ka
