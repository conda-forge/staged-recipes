# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "0.8.1"

recipe:
  name: db-gpt
  version: ${{ version }}

source:
  url: https://github.com/eosphoros-ai/DB-GPT/archive/refs/tags/v${{ version }}.tar.gz
  sha256: 65e25642dfb0f2e3028a50301fda060ca09008d754ea46a8268edc47c131a2ec
  patches:
    # Loosen upstream's `==` pins to `>=` (G26) so the wheel METADATA matches the
    # loosened conda run deps and pip_check passes.
    - patches/0001-loosen-dbgpt-core-pins.patch
    - patches/0002-loosen-dbgpt-ext-pins.patch

build:
  number: 0

outputs:
  - package:
      name: dbgpt
      version: ${{ version }}
    build:
      noarch: python
      script: ${{ PYTHON }} -m pip install ./packages/dbgpt-core --no-deps --no-build-isolation -vv
    requirements:
      host:
        - python ${{ python_min }}.*
        - hatchling
        - pip
      run:
        - python >=${{ python_min }}
        - aiohttp >=3.8.4
        - apscheduler >=3.10,<4
        - chardet >=5.1.0
        - importlib-resources >=5.12.0
        - cachetools
        - pydantic >=2.6.0
        - typeguard
        - snowflake-id
        - typing_inspect
        - tomli >=2.2.1
    tests:
      - python:
          imports:
            - dbgpt
          pip_check: true
          python_version:
            - ${{ python_min }}.*
            - "*"

  - package:
      name: dbgpt-ext
      version: ${{ version }}
    build:
      noarch: python
      script: ${{ PYTHON }} -m pip install ./packages/dbgpt-ext --no-deps --no-build-isolation -vv
    requirements:
      host:
        - python ${{ python_min }}.*
        - hatchling
        - pip
      run:
        - python >=${{ python_min }}
        - ${{ pin_subpackage('dbgpt', exact=True) }}
        - pymysql
    tests:
      - python:
          imports:
            - dbgpt_ext
          pip_check: true
          python_version:
            - ${{ python_min }}.*
            - "*"

  - package:
      name: dbgpt-serve
      version: ${{ version }}
    build:
      noarch: python
      script: ${{ PYTHON }} -m pip install ./packages/dbgpt-serve --no-deps --no-build-isolation -vv
    requirements:
      host:
        - python ${{ python_min }}.*
        - hatchling
        - pip
      run:
        - python >=${{ python_min }}
        - ${{ pin_subpackage('dbgpt-ext', exact=True) }}
    tests:
      - python:
          imports:
            - dbgpt_serve
          pip_check: true
          python_version:
            - ${{ python_min }}.*
            - "*"

  - package:
      name: dbgpt-client
      version: ${{ version }}
    build:
      noarch: python
      script: ${{ PYTHON }} -m pip install ./packages/dbgpt-client --no-deps --no-build-isolation -vv
    requirements:
      host:
        - python ${{ python_min }}.*
        - hatchling
        - pip
      run:
        - python >=${{ python_min }}
        - ${{ pin_subpackage('dbgpt', exact=True) }}
        - ${{ pin_subpackage('dbgpt-ext', exact=True) }}
        # Flattened dbgpt-core[client] + [cli] extras (conda has no extras, G25)
        - httpx
        - fastapi >=0.100.0,<0.113.0
        - tenacity <=8.3.0
        - prettytable
        - click
        - psutil >=5.9.4
        - colorama >=0.4.6
        - tomlkit
        - rich
        - shortuuid
        - sqlalchemy >=2.0.25,<2.0.29
        - msgpack-python
        - cloudpickle
        # bs4 is an under-declared hard import pulled in via dbgpt_ext.rag (G27)
        - beautifulsoup4
    tests:
      - python:
          imports:
            - dbgpt_client
          pip_check: true
          python_version:
            - ${{ python_min }}.*
            - "*"

  - package:
      name: dbgpt-sandbox
      version: ${{ version }}
    build:
      noarch: python
      script: ${{ PYTHON }} -m pip install ./packages/dbgpt-sandbox --no-deps --no-build-isolation -vv
    requirements:
      host:
        - python ${{ python_min }}.*
        - hatchling
        - pip
      run:
        - python >=${{ python_min }}
        - psutil >=5.9.0
        - colorama >=0.4.4
        - docker-py >=6.0.0
        - fastapi >=0.68.0
        - uvicorn >=0.15.0
        - pydantic >=1.8.0
        - python-multipart >=0.0.5
        - selenium >=4.0.0
        - typing_extensions >=4.0.0
    tests:
      - python:
          imports:
            - dbgpt_sandbox
          pip_check: true
          python_version:
            - ${{ python_min }}.*
            - "*"

  - package:
      name: dbgpt-acc-auto
      version: ${{ version }}
    build:
      noarch: python
      script: ${{ PYTHON }} -m pip install ./packages/dbgpt-accelerator/dbgpt-acc-auto --no-deps --no-build-isolation -vv
    requirements:
      host:
        - python ${{ python_min }}.*
        - hatchling
        - pip
      run:
        - python >=${{ python_min }}
    tests:
      - python:
          imports:
            - dbgpt_acc_auto
          pip_check: true
          python_version:
            - ${{ python_min }}.*
            - "*"

  - package:
      name: dbgpt-acc-flash-attn
      version: ${{ version }}
    build:
      noarch: python
      script: ${{ PYTHON }} -m pip install ./packages/dbgpt-accelerator/dbgpt-acc-flash-attn --no-deps --no-build-isolation -vv
    requirements:
      host:
        - python ${{ python_min }}.*
        - hatchling
        - pip
      run:
        - python >=${{ python_min }}
    tests:
      - python:
          imports:
            - dbgpt_acc_flash_attn
          pip_check: true
          python_version:
            - ${{ python_min }}.*
            - "*"

  - package:
      name: dbgpt-app
      version: ${{ version }}
    build:
      noarch: python
      script: ${{ PYTHON }} -m pip install ./packages/dbgpt-app --no-deps --no-build-isolation -vv
    requirements:
      host:
        - python ${{ python_min }}.*
        - hatchling
        - pip
      run:
        - python >=${{ python_min }}
        - ${{ pin_subpackage('dbgpt', exact=True) }}
        - ${{ pin_subpackage('dbgpt-ext', exact=True) }}
        - ${{ pin_subpackage('dbgpt-serve', exact=True) }}
        - ${{ pin_subpackage('dbgpt-client', exact=True) }}
        - ${{ pin_subpackage('dbgpt-sandbox', exact=True) }}
        - ${{ pin_subpackage('dbgpt-acc-auto', exact=True) }}
        # dbgpt-app base
        - aiofiles
        - httpx >=0.24.0
        - pyparsing
        # Flattened dbgpt-core base (sibling built without extras, G25)
        - aiohttp >=3.8.4
        - chardet >=5.1.0
        - importlib-resources >=5.12.0
        - cachetools
        - pydantic >=2.6.0
        - typeguard
        - snowflake-id
        - typing_inspect
        - tomli >=2.2.1
        # Flattened dbgpt-core[client] + [cli]
        - fastapi >=0.100.0,<0.113.0
        - tenacity <=8.3.0
        - prettytable
        - click
        - psutil >=5.9.4
        - colorama >=0.4.6
        - tomlkit
        - rich
        # Flattened dbgpt-core[agent]
        - termcolor
        - pandas >=2.2.3
        - numpy >=1.21.0,<2.0.0
        - auto-gpt-plugin-template >=0.0.3
        - mcp >=1.4.1
        # Flattened dbgpt-core[simple_framework] + [framework]
        - jinja2
        - uvicorn
        - shortuuid
        - sqlalchemy >=2.0.25,<2.0.29
        - msgpack-python
        - cloudpickle
        - coloredlogs
        - seaborn
        - gtts >=2.3.1
        - pymysql
        - jsonschema
        - python-jsonpath
        - tokenizers >=0.14
        - alembic >=1.12.0
        - openpyxl >=3.1.2
        - xlrd >=2.0.1
        - gitpython
        - python-graphviz
        - cryptography
        # Flattened dbgpt-core[code] (lyric stack)
        - pyzmq
        - lyric-py >=0.1.7
        - lyric-py-worker >=0.1.7
        - lyric-js-worker >=0.1.7
        - lyric-component-ts-transpiling >=0.1.7
        # Flattened dbgpt-core[proxy_openai]
        - openai >=1.59.6
        - tiktoken >=0.8.0
        - socksio
        # Flattened dbgpt-core[proxy_tongyi]
        - dashscope
        # Flattened dbgpt-core[simple_framework] continued
        - pympler
        - python-duckdb
        - duckdb-engine >=0.9.1
        - schedule
        - sqlparse >=0.4.4
        - python-multipart
        # Flattened dbgpt-ext[rag]
        - spacy >=3.7
        - markdown
        - beautifulsoup4
        - python-pptx
        - python-docx
        - olefile
        - pypdf
        - pdfplumber
        - onnxruntime >=1.14.1,<=1.18.1
        # Flattened dbgpt-ext[storage_chromadb]
        - chromadb >=0.4.22
    tests:
      - python:
          imports:
            - dbgpt_app
          pip_check: true
          python_version:
            - ${{ python_min }}.*
            - "*"

about:
  homepage: https://github.com/eosphoros-ai/DB-GPT
  repository: https://github.com/eosphoros-ai/DB-GPT
  documentation: http://docs.dbgpt.cn/docs/overview
  license: MIT
  license_file: LICENSE
  summary: An open-source AI native data app development framework with AWEL and agents (DB-GPT)

extra:
  feedstock-name: db-gpt
  recipe-maintainers:
    - pb01ka
