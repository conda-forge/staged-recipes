schema_version: 1

context:
  name: httpx2
  version: "2.0.0"

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  - url: https://pypi.org/packages/source/${{ name[0] }}/${{ name }}/${{ name }}-${{ version }}.tar.gz
    sha256: f354249d2a9edce26e08fd2ad2276e98317b5763f673bb0d90f3ce9382cc2aed
  # The PyPI sdist does not bundle LICENSE.md, so fetch it from the tagged release.
  - url: https://raw.githubusercontent.com/pydantic/httpx2/v${{ version }}/LICENSE.md
    sha256: 7e7d6dbaf7fe160d39fd6e84fd02c33cab96bcbea34d36998d545bceb4a19c30
    target_directory: license

build:
  noarch: python
  number: 0
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  python:
    entry_points:
      - httpx2 = httpx2:main

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - hatchling
    - hatch-fancy-pypi-readme
    - uv-dynamic-versioning >=0.7.0
  run:
    - python >=${{ python_min }}
    - anyio
    - certifi
    - httpcore2 ${{ version }}.*
    - idna

tests:
  - python:
      imports:
        - httpx2
      python_version:
        - ${{ python_min }}.*
        - "*"
      pip_check: true
  - requirements:
      run:
        - python ${{ python_min }}.*
        - click 8.*
        - pygments 2.*
        - rich >=10,<15
    script:
      - if: win
        then:
          - set PYTHONIOENCODING=utf-8
          - set PYTHONUTF8=1
          - httpx2 --help
        else:
          - httpx2 --help

about:
  homepage: https://github.com/pydantic/httpx2
  summary: The next generation HTTP client.
  license: BSD-3-Clause
  license_file: license/LICENSE.md
  repository: https://github.com/pydantic/httpx2

extra:
  recipe-maintainers:
    - Kludex
