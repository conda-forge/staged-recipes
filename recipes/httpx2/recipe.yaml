schema_version: 1

context:
  version: "2.2.0"

package:
  name: httpx2
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/h/httpx2/httpx2-${{ version }}.tar.gz
  sha256: f3428d59b1752b8f5629826277262fb4d65e3a683f48af8a5b16c4d012e0b801

build:
  noarch: python
  number: 0
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  python:
    entry_points:
      - httpx2 = httpx2:main

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - hatchling
    - hatch-fancy-pypi-readme
    - uv-dynamic-versioning >=0.7.0
  run:
    - python >=${{ python_min }}
    - anyio
    - certifi
    - httpcore2 ==${{ version }}
    - idna
  extras:
    cli:
      - click 8.*
      - pygments 2.*
      - rich >=10,<15
    http2:
      - h2 >=3,<5
    socks:
      - socksio 1.*
    brotli:
      - brotli
    zstd:
      - zstandard >=0.18.0

tests:
  - python:
      imports:
        - httpx2
      python_version:
        - ${{ python_min }}.*
        - "*"
      pip_check: true
  - requirements:
      run:
        - python ${{ python_min }}.*
        - click 8.*
        - pygments 2.*
        - rich >=10,<15
    script:
      - if: win
        then:
          - set PYTHONIOENCODING=utf-8
          - set PYTHONUTF8=1
      - httpx2 --help

about:
  homepage: https://github.com/pydantic/httpx2
  summary: The next generation HTTP client.
  license: BSD-3-Clause
  license_file: LICENSE.md
  repository: https://github.com/pydantic/httpx2

extra:
  recipe-maintainers:
    - Kludex
