# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "0.0.1"

package:
  name: langchain-google-calendar-tools
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/l/langchain-google-calendar-tools/langchain_google_calendar_tools-${{ version }}.tar.gz
  sha256: 2222499ded96880c573c358bb6b4c75a86f638e1f3a446fb14b126a30ee7f62e

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - hatchling
    - pip
  run:
    - python >=${{ python_min }}
    - google-api-python-client >=2.104.0
    - google-auth-oauthlib >=1.1.0
    - langchain >=0.0.335
    - protobuf >=4.25.0
    - pytz >=2023.3.post1

tests:
  - python:
      imports:
        - langchain_google_calendar_tools
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  homepage: https://pypi.org/project/langchain-google-calendar-tools/
  license: MIT
  license_file: LICENSE.txt
  summary: This repo walks through connecting to the Google Calendar API.
  repository: https://github.com/sun-asterisk-research/langchain-google-calendar-tools
  documentation: https://github.com/sun-asterisk-research/langchain-google-calendar-tools
  description: |
    LangChain tools for connecting to and working with the Google Calendar
    API: listing events, creating new events, and updating existing events.

extra:
  recipe-maintainers:
    - rxm7706
