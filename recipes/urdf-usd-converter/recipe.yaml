context:
  version: 0.1.0
  build_number: 0

package:
  name: urdf-usd-converter
  version: ${{ version }}

source:
  url: https://github.com/newton-physics/urdf-usd-converter/archive/refs/tags/v${{ version }}.zip
  sha256: 78ac84dbb1a595f9c161f5b3f281a49f1e6ada6b9a2966d494fe0d22eb9a0db0

build:
  noarch: python
  number: ${{ build_number }}
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  python:
    entry_points:
      - urdf_usd_converter = urdf_usd_converter.__main__:run

requirements:
  host:
    - python ${{ python_min }}.*
    - hatchling
    - requests
    - pip
  run:
    - python >=${{ python_min }}
    - newton-usd-schemas >=0.1.0
    - numpy-stl >=3.2
    - pycollada >=0.9.2
    - tinyobjloader >=2.0.0rc13
    - usd-exchange >=2.2.2

tests:
  - python:
      imports:
        - urdf_usd_converter
      pip_check: true
      python_version: ${{ python_min }}.*
  # Scripts are currently failing due to missing modules:
  # * import usdex.test
  # * import omni.asset_validator
  #
  # - script:
  #     - python -m unittest discover -v -s ./tests
  #   files:
  #     source:
  #       - tests/
  #       - pyproject.toml
  #   requirements:
  #     run:
  #       - python ${{ python_min }}.*

about:
  documentation: https://github.com/newton-physics/urdf-usd-converter/#readme
  homepage: https://github.com/newton-physics/urdf-usd-converter
  license: Apache-2.0
  license_file:
    - LICENSE.md
  repository: https://github.com/newton-physics/urdf-usd-converter
  summary: A URDF to OpenUSD Data Converter

extra:
  recipe-maintainers:
    - diegoferigo
