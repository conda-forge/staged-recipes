schema_version: 1

context:
  version: "0.2.0"

package:
  name: supermorecado
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/s/supermorecado/supermorecado-${{ version }}.tar.gz
  sha256: e64f5667d7f00117486d04876aa58622b38f356b19e2c61ae29332f2cabf50e1

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  python:
    entry_points:
      - supermorecado = supermorecado.scripts.cli:cli

requirements:
  host:
    - python >=3.11
    - hatchling
    - hatch-fancy-pypi-readme >=22.5.0
    - pip
  run:
    - python >=3.11
    - morecantile
    - rasterio

tests:
  - python:
      imports:
        - supermorecado
      pip_check: true
  - requirements:
      run:
        - pip
        - python
    script:
      - supermorecado --help

about:
  summary: Extend the functionality of morecantile with additional commands.
  license: MIT
  license_file: LICENSE
  homepage: https://pypi.org/project/supermorecado/
  repository: https://github.com/developmentseed/supermorecado
  documentation: https://developmentseed.org/supermorecado/

extra:
  recipe-maintainers:
    - martinRenou
