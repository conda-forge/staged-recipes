# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json

schema_version: 1

context:
  name: pixi-build-r
  crate_name: pixi_build_r
  version: "0.1.1"

package:
  name: ${{ name }}
  version: ${{ version }}

source:
  url: https://github.com/prefix-dev/pixi/archive/refs/tags/${{ name }}-v${{ version }}.tar.gz
  sha256: 044d39584261b2157bd6a95f2404f580db3f0f4eee42132d1036dee54d7ea4db

build:
  number: 0
  script:
    env:
      AWS_LC_SYS_CMAKE_BUILDER: "1"
      CARGO_PROFILE_RELEASE_STRIP: symbols
      CARGO_PROFILE_RELEASE_LTO: fat
    content:
      - if: osx and x86_64
        then:
          - unset CARGO_TARGET_X86_64_APPLE_DARWIN_LINKER
      - if: unix
        then:
          - export OPENSSL_DIR="$PREFIX"
      - if: linux
        then:
          - export CMAKE_GENERATOR=Ninja
      - if: win
        then:
          - set CARGO_HOME=C:\\.cargo
          - md %CARGO_HOME%
      - cargo auditable install --locked --no-track --bins --root ${{ PREFIX }} --path crates/${{ crate_name }} --no-default-features --features native-tls
      - cargo-bundle-licenses --format yaml --output ./THIRDPARTY.yml
  files:
    - bin/${{ name }}
    - bin/${{ name }}.exe

requirements:
  build:
    - ${{ compiler("rust") }}
    - ${{ stdlib("c") }}
    - cmake
    - ninja
    - cargo-bundle-licenses
    - cargo-auditable
  host:
    - if: target_platform != 'win-arm64'
      then: pkg-config
    - if: unix
      then: openssl
  run:
    - pixi-build-api-version >=5,<6

tests:
  - script:
      - if: build_platform == target_platform
        then: ${{ name }} --help
  - package_contents:
      bin:
        - ${{ name }}

about:
  homepage: https://github.com/prefix-dev/pixi
  summary: A pixi build backend to build R packages.
  description: |
    This package provides a build backend for pixi that allows building R packages.
  license: BSD-3-Clause
  license_file:
    - LICENSE
    - THIRDPARTY.yml
  documentation: https://pixi.prefix.dev/latest/build/backends/pixi-build-r/
  repository: https://github.com/prefix-dev/pixi

extra:
  recipe-maintainers:
    - Hofer-Julian
    - baszalmstra
    - ruben-arts
