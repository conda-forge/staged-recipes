{% set python_min = "3.11" %}
{% set version = "0.0.2" %}

package:
  name: dorban
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/d/dorban/dorban-{{ version }}.tar.gz
  sha256: 5197a8f6d80d6a09b44d8caf930da9babc66bb28b5c51d4a84830f5e4db203cc

build:
  skip: true  # [win]
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python
    - setuptools
    - setuptools-scm
    - wheel
    - pip
  run:
    - python
    - numpy
    - scipy
    - slepc4py
    - petsc4py
    - matplotlib-base
    - numba
    - multipledispatch
    - more-itertools

test:
  imports:
    - dorban
  commands:
    - pip check
  requires:
    - pip
    - python 

about:
  home: https://pypi.org/project/dorban/
  summary: A neutron diffusion solver with finite difference and nodal implementations
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - esheder
