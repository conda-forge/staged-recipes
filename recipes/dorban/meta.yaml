{% set version = "0.0.3" %}

package:
  name: dorban
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/d/dorban/dorban-{{ version }}.tar.gz
  sha256: 870354186d0fa2b8590af9793faee600eb3c970a31fcaceb31a83c560bccb57d

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python {{ python_min }}.*
    - setuptools
    - setuptools-scm
    - wheel
    - pip
  run:
    - python >={{ python_min }}
    - numpy
    - scipy
    - slepc4py
    - petsc4py
    - matplotlib-base
    - numba
    - multipledispatch
    - more-itertools

test:
  imports:
    - dorban
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}.*

about:
  home: https://pypi.org/project/dorban/
  summary: A neutron diffusion solver with finite difference and nodal implementations
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - esheder
