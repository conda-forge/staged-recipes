{% set python_min = "3.11" %}
{% set version = "0.0.1" %}

package:
  name: dorban
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/d/dorban/dorban-{{ version }}.tar.gz
  sha256: fcb4bb613f6ceeb54c2f5099dd465e07b4690e32ee1bcc33d5692baee1a534bd

build:
  skip: true  # [win]
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python {{ python_min }}.*
    - setuptools
    - setuptools-scm
    - wheel
    - pip
  run:
    - python >={{ python_min }}
    - numpy
    - scipy
    - slepc4py
    - petsc4py
    - matplotlib-base
    - numba
    - multipledispatch
    - more-itertools

test:
  imports:
    - dorban
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}.*

about:
  home: https://pypi.org/project/dorban/
  summary: A neutron diffusion solver with finite difference and nodal implementations
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - esheder
