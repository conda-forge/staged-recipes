# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "0.4.5"

package:
  name: jigsawstack
  version: ${{ version }}

source:
  url: https://pypi.org/packages/py3/j/jigsawstack/jigsawstack-${{ version }}-py3-none-any.whl
  sha256: 014b029d132c7a36f2c26630fe424faf6880ca2a62c6d367bf72de8cf68d3e95

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install jigsawstack-${{ version }}-py3-none-any.whl -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
  run:
    - python >=${{ python_min }}
    - requests >=2.31.0
    - typing_extensions
    - aiohttp >=3.12.15

tests:
  - python:
      imports:
        - jigsawstack
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  homepage: https://github.com/jigsawstack/jigsawstack-python
  license: MIT
  license_file: LICENSE
  summary: JigsawStack - The AI SDK for Python
  description: |
    JigsawStack is the AI SDK for Python providing a unified client for the
    JigsawStack platform APIs (search, web scraping, vision/OCR, audio, text
    translation, summarization, sentiment, embeddings, prompt engine, SQL
    generation, validation, prediction, and file store).

extra:
  recipe-maintainers:
    - rxm7706
