# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "0.4.5"

package:
  name: jigsawstack
  version: ${{ version }}

source:
  url: https://github.com/jigsawstack/jigsawstack-python/archive/refs/tags/v${{ version }}.tar.gz
  sha256: 042be08a0e256363c7b918529edb120a35b86ab875c335accf62c5fdc56ea29f

build:
  number: 0
  noarch: python
  script: sed -i.bak '/setup_requires/d' setup.py && rm -f setup.py.bak && ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - setuptools
    - wheel
  run:
    - python >=${{ python_min }}
    - requests >=2.31.0
    - typing_extensions
    - aiohttp >=3.12.15

tests:
  - python:
      imports:
        - jigsawstack
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  homepage: https://github.com/jigsawstack/jigsawstack-python
  license: MIT
  license_file: LICENSE
  summary: JigsawStack - The AI SDK for Python
  description: |
    JigsawStack is the AI SDK for Python providing a unified client for the
    JigsawStack platform APIs (search, web scraping, vision/OCR, audio, text
    translation, summarization, sentiment, embeddings, prompt engine, SQL
    generation, validation, prediction, and file store).

extra:
  recipe-maintainers:
    - rxm7706
