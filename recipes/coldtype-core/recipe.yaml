schema_version: 1

context:
  version: "0.13.0"
  python_min: "3.11"

package:
  name: coldtype-core
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/c/coldtype-core/coldtype_core-${{ version }}.tar.gz
  sha256: 5647b53ab44b0ab4cc63c9e44c7c4838df7454a4d99e7e6635eefaca985489fd

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  python:
    entry_points:
      - coldtype = coldtype.renderer:main
      - ct = coldtype.renderer:main
      - ctb = coldtype.renderer:main_b3d

requirements:
  host:
    - python ${{ python_min }}.*
    - setuptools >=61.0
    - wheel
    - setuptools-scm >=8.0
    - pip
  run:
    - python >=${{ python_min }}
    - fonttools >=4.60.2
    - fontpens ==0.2.4
    - easing-functions ==1.0.4
    - b3denv >=0.0.22
    - coldtype-fontgoggles ==1.8.4.7
    - skia-pathops
    - defcon >=0.12.0
    - uharfbuzz <0.47.0
    - show-in-file-manager >=1.1.6

tests:
  - python:
      imports:
        - coldtype
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"
  - requirements:
      run:
        - python ${{ python_min }}.*
    script:
      - coldtype --help
      - ct --help
      - ctb --help

about:
  summary: Functions for manual vectorized typesetting.
  license: Apache-2.0
  license_file: LICENSE
  homepage: https://coldtype.xyz
  documentation: https://coldtype.goodhertz.com
  repository: https://github.com/coldtype/coldtype/tree/main/packages/coldtype-core

extra:
  recipe-maintainers:
    - thewchan
