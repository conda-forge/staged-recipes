schema_version: 1

context:
  version: "1.0.0b260514"
  python_min: "3.10"

package:
  name: agent-framework-redis
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/a/agent-framework-redis/agent_framework_redis-${{ version }}.tar.gz
  sha256: 755fd08460563c45cc96623a1a5454af1da5da34024a97e62ed51cf3500d5d29

build:
  noarch: python
  number: 0
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - flit-core <4.0,>=3.11
  run:
    - python >=${{ python_min }}
    - agent-framework-core <2,>=1.4.0
    - redis-py <7.2.1,>=6.4.0
    - redisvl <0.16,>=0.11.0
    - numpy <3,>=2.2.6

tests:
  - python:
      imports:
        - agent_framework.redis
      python_version: ${{ python_min }}.*
      pip_check: true

about:
  summary: |
    Redis integration for Microsoft Agent Framework.
  homepage: https://pypi.org/project/agent-framework-redis/
  repository: https://github.com/microsoft/agent-framework
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - killua156
    - mgorny
