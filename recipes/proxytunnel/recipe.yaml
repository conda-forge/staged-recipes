context:
  version: "1.13.0"

package:
  name: proxytunnel
  version: ${{ version }}

source:
  url: https://github.com/proxytunnel/proxytunnel/archive/refs/tags/v${{ version }}.tar.gz
  sha256: 1b1ae36327254cac351aa5358767c177b050ab4ce4a75fa100244da7816849e9

build:
  skip:
    - win
  number: 0

requirements:
  build:
    - ${{ compiler('c') }}
    - ${{ stdlib('c') }}
    - make
    - pkg-config
  host:
    - openssl

tests:
  - package_contents:
      bin:
        - proxytunnel
  - script:
      - proxytunnel --version
      - proxytunnel --help

about:
  homepage: https://github.com/proxytunnel/proxytunnel
  summary: Stealth tunneling through HTTP(S) proxies
  description: |
    Proxytunnel connects stdin and stdout to an origin server through a
    standard HTTP(S) proxy. It is commonly used as an OpenSSH ProxyCommand
    backend for SSH connections through HTTP(S) proxies, and can also run as
    a standalone tunnel for other TCP-based applications.
  license: GPL-2.0-or-later WITH cryptsetup-OpenSSL-exception AND BSD-3-Clause AND ISC
  license_file: LICENSE.txt
  documentation: https://proxytunnel.sourceforge.io/
  repository: https://github.com/proxytunnel/proxytunnel

extra:
  recipe-maintainers:
    - MarkusJungQC
