schema_version: 1

context:
  version: 1.8.0

package:
  name: deeptab
  version: ${{ version }}

source:
  url: https://github.com/OpenTabular/DeepTab/archive/v${{ version }}.tar.gz
  sha256: 710d0fdb3ae1e5b5a367ac866fbc0594fc95136969cf1edd69e890060d63f4b0

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - poetry-core
    - pip
  run:
    - python >=${{ python_min }},<3.14
    - numpy >=2.0.0,<3.0.0
    - pandas >=2.0.3,<3.0.0
    - lightning >=2.3.3,<3.0.0
    - scikit-learn >=1.3.2,<2.0.0
    - pytorch >=2.2.2,<2.10.0
    - torchmetrics >=1.5.2,<2.0.0
    - setuptools >=78.1.1
    - properscoring >=0.1.0,<0.2.0
    - scikit-optimize >=0.10.2,<0.11.0
    - einops >=0.8.0,<0.9.0
    - accelerate >=1.2.1,<2.0.0
    - scipy >=1.15.0,<2.0.0
    - pretab >=0.0.1,<0.0.2
    - delu
    - faiss-cpu

tests:
  - python:
      imports:
        - deeptab
      pip_check: true
      python_version: ${{ python_min }}.*

about:
  summary: DeepTab is a Python package that simplifies tabular deep learning by providing a suite of models for regression, classification, and distributional regression tasks. It includes models such as Mambular, TabM, FT-Transformer, TabulaRNN, TabTransformer, and tabular ResNets.
  license: MIT
  license_file: LICENSE
  homepage: https://github.com/OpenTabular/DeepTab

extra:
  recipe-maintainers:
    - jan-janssen
