context:
  version: "1.4.0"

package:
  name: libultrahdr
  version: ${{ version }}

source:
  url: https://github.com/google/libultrahdr/archive/refs/tags/v${{ version }}.tar.gz
  sha256: e7e1252e2c44d8ed6b99ee0f67a3caf2d8a61c43834b13b1c3cd485574c03ab9

build:
  number: 0

requirements:
  build:
    - ${{ compiler("cxx") }}
    - ${{ stdlib("c") }}
    - ${{ "m2-sed" if win }}
    - cmake
    - ninja
  host:
    - libjpeg-turbo
  run_exports:
    - ${{ pin_subpackage("libuhdr", upper_bound="x") }}

tests:
  - package_contents:
      include:
        - ultrahdr_api.h
      lib:
        - uhdr

about:
  homepage: https://developer.android.com/media/platform/hdr-image-format
  repository: https://github.com/google/libultrahdr
  documentation: https://developer.android.com/media/platform/hdr-image-format
  license: Apache-2.0
  license_file: LICENSE
  summary: Ultra HDR is a true HDR image format, and is backcompatible. libultrahdr is the reference codec for the Ultra HDR format. The codecs that support the format can render the HDR intent of the image on HDR displays; other codecs can still decode and display the SDR intent of the image.
  description: |
    libultrahdr is an image compression library that uses gain map technology to store and distribute HDR images.
    Conceptually on the encoding side, the library accepts SDR and HDR rendition of an image and from these a Gain Map (quotient between the two renditions) is computed.
    The library then uses backward compatible means to store the base image (SDR), gain map image and some associated metadata.
    Legacy readers that do not support handling the gain map image and/or metadata, will display the base image.
    Readers that support the format combine the base image with the gain map and render a high dynamic range image on compatible displays.

extra:
  recipe-maintainers:
    - eunos-1128
