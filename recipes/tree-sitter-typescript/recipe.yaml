schema_version: 1

context:
  version: "0.23.2"

package:
  name: tree-sitter-typescript
  version: ${{ version }}

source:
  url: https://github.com/tree-sitter/tree-sitter-typescript/archive/refs/tags/v${{ version }}.tar.gz
  sha256: 2c4ce711ae8d1218a3b2f899189298159d672870b5b34dff5d937bed2f3e8983

build:
  number: 0
  # abi3 packages build once at python_min and ship one artifact per platform.
  skip: is_abi3 and not is_python_min
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  python:
    version_independent: ${{ is_abi3 }}

requirements:
  build:
    - ${{ compiler("c") }}
    - ${{ stdlib("c") }}
  host:
    - if: is_abi3
      then: python-abi3
    - python
    - pip
    - setuptools >=42
  run:
    - python

tests:
  - python:
      imports:
        - tree_sitter_typescript
      # Verify the abi3 wheel works on the build-time Python AND the latest.
      python_version:
        - if: is_abi3
          then: ${{ python_min }}.*
        - "*"
  - if: is_abi3
    then:
      requirements:
        run:
          - abi3audit
      script:
        - if: unix
          then: abi3audit $SP_DIR/tree_sitter_typescript/_binding.abi3.so -s -v --assume-minimum-abi3 ${{ python_min }}
          else: abi3audit %SP_DIR%/tree_sitter_typescript/_binding.pyd -s -v --assume-minimum-abi3 ${{ python_min }}

about:
  homepage: https://github.com/tree-sitter/tree-sitter-typescript
  summary: TypeScript and TSX grammars for tree-sitter
  license: MIT
  license_file: LICENSE
  repository: https://github.com/tree-sitter/tree-sitter-typescript

extra:
  recipe-maintainers:
    - killua156
    - mgorny
