{% set version = "0.9.0" %}

package:
  name: hedtools
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/h/hedtools/hedtools-{{ version }}.tar.gz
  sha256: 4d8e0b2b11e59670e4bea193e85e5d82d8fe6fcfc6c49e9e871c8b3ec32680f3

build:
  entry_points:
    - hedpy = hed.cli.cli:main
    - validate_bids = hed.scripts.validate_bids:main
    - validate_hed_string = hed.scripts.validate_hed_string:main
    - validate_hed_sidecar = hed.scripts.validate_hed_sidecar:main
    - validate_hed_tabular = hed.scripts.validate_hed_tabular:main
    - hed_extract_bids_sidecar = hed.scripts.hed_extract_bids_sidecar:main
    - hed_validate_schemas = hed.scripts.validate_schemas:main
    - hed_update_schemas = hed.scripts.hed_convert_schema:main
    - hed_add_ids = hed.scripts.add_hed_ids:main
    - hed_create_ontology = hed.scripts.create_ontology:main
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - setuptools >=42
    - versioneer
    - pip
  run:
    - python >={{ python_min }}
    - click >=8.0.0
    - click-option-group >=0.5.0
    - defusedxml
    - et-xmlfile
    - inflect
    - jsonschema
    - matplotlib-base >=3.9.0
    - numpy
    - openpyxl
    - pandas
    - portalocker
    - python-dateutil
    - pytz
    - semantic_version
    - six
    - wordcloud ==1.9.5

test:
  imports:
    - hed
  commands:
    - pip check
    - hedpy --help
    - validate_bids --help
    - validate_hed_string --help
    - validate_hed_sidecar --help
    - validate_hed_tabular --help
    - hed_extract_bids_sidecar --help
    - hed_validate_schemas --help
    - hed_update_schemas --help
    - hed_add_ids --help
    - hed_create_ontology --help
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://www.hedtags.org/
  summary: HED validation, summary, and analysis tools for annotating events and experimental metadata.
  doc_url: https://www.hedtags.org/hed-python/
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - larsoner
