{% set version = "0.1.0" %}

package:
  name: mergen-doe
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/m/mergen-doe/mergen_doe-{{ version }}.tar.gz
  sha256: 7771f5cd7f2763f636cbe99cdb72b267024b373c688df4a69b0710d6262a2ebc

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - hatchling
    - pip
  run:
    - python >={{ python_min }}
    - numpy >=1.24
    - scipy >=1.10
    - pandas >=1.5
    - matplotlib-base >=3.6
    - joblib >=1.2
    - tabulate >=0.9
    - jinja2 >=3.0
test:
  imports:
    - mergen
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://github.com/acanbay/mergen
  summary: Space-filling Design of Experiments for Python
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - acanbay
