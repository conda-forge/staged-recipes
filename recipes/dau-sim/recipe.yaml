schema_version: 1

context:
  version: "0.2.0"
  python_min: "3.10"

package:
  name: dau-sim
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/d/dau-sim/dau_sim-${{ version }}.tar.gz
  sha256: cb548b4dd9174af31aeebb6ea67c6bc43b6e66529d4d9bb1c5d951cc7256bb05

build:
  number: 0
  noarch: python
  script: SKIP_HATCH_JS=1 ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - hatch-js
    - hatchling
    - pip
  run:
    - python >=${{ python_min }}
    - amaranth
    - csp
    - pyslang
    - rich
    - typer

tests:
  - python:
      imports:
        - dau_sim
      pip_check: true
  - requirements:
      run:
        - python ${{ python_min }}.*
    script:
      - dau-sim --help

about:
  summary: dau simulator
  license: Apache-2.0
  license_file: LICENSE
  homepage: https://github.com/dau-dev/dau-sim
  repository: https://github.com/dau-dev/dau-sim

extra:
  recipe-maintainers:
    - timkpaine
