schema_version: 1

context:
  version: "0.1.0"
  python_min: "3.11"

package:
  name: tiny-osm
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/t/tiny-osm/tiny_osm-${{ version }}.tar.gz
  sha256: ae795dd870931830b7ce46a072316c24c7229dd6207b700a95545e765b26afc0

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - hatch-vcs
    - hatchling
    - pip
  run:
    - python >=${{ python_min }}
    - httpx

tests:
  - python:
      python_version:
        - ${{ python_min }}.*
        - "*"
      imports:
        - tiny_osm
      pip_check: true

about:
  summary: Fetch OpenStreetMap road, waterway, and water-body data for a bounding box.
  license: MIT
  license_file: LICENSE
  homepage: https://cheginit.github.io/tiny-osm
  documentation: https://cheginit.github.io/tiny-osm

extra:
  recipe-maintainers:
    - cheginit
