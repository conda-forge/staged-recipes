{% set name = "projectdavid-orm" %}
{% set version = "1.6.2" %}
{% set python_min = "3.10" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/projectdavid_orm-{{ version }}.tar.gz
  sha256: 2f1b09f39d0b7eb608c30f824f1e31e055e2ff5b0e6faf61b1e9125ec6eef060

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - pip
    - setuptools >=61.0
    - wheel
  run:
    - python >={{ python_min }}
    - sqlalchemy >=2.0
    - pymysql
    - pydantic >=2.0
    - python-dotenv
    - passlib

test:
  commands:
    - pip check
  requires:
    - python {{ python_min }}
    - pip
about:
  home: https://github.com/project-david-ai/projectdavid-orm
  summary: Shared SQLAlchemy ORM models for Project David services.
  license: LicenseRef-PolyForm-Noncommercial-1.0.0
  license_file: LICENSE
  doc_url: https://docs.projectdavid.co.uk/docs
  dev_url: https://github.com/project-david-ai/projectdavid-orm

extra:
  recipe-maintainers:
    - frankie336
