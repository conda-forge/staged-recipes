{% set name = "xumi" %}
{% set version = "1.0.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://github.com/fravadona/xumi/archive/refs/tags/{{ version }}.tar.gz
  sha256: ea2b8bfc3ad293ea31544733208ae2d992a04f5badefcf468f569175eaff22ea

build:
  number: 0
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv

requirements:
  host:
    - python {{ python_min }}
    - pip
    - flit-core >=3.4
  run:
    - python >={{ python_min }}
    - pysam >=0.20

test:
  requires:
    - python {{ python_min }}  
    - pip
  commands:
    - xumi --help

about:
  home: https://github.com/fravadona/xumi
  summary: 'Extract subsequences from read alignments at specified genomic regions with full CIGAR awareness'
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - Fravadona

context:
  name: {{ name|lower }}
  version: {{ version }}
  python_min: "3.10"
