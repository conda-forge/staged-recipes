# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "5.0.0"

package:
  name: langchain-google-community
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/l/langchain-google-community/langchain_google_community-${{ version }}.tar.gz
  sha256: 8d4944ff36a44a7db5b908ad4a70f23838e51a94ce1e64650319b54d1fcd40a7

build:
  noarch: python
  number: 0
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - hatchling
    - pip
  run:
    - python >=${{ python_min }}
    - aiohttp >=3.8.3,<4.0.0
    - google-api-core >=2.25.0,<3.0.0
    - google-api-python-client >=2.161.0,<3.0.0
    - google-cloud-core >=2.4.3,<3.0.0
    - google-cloud-modelarmor >=0.2.8,<1.0.0
    - grpcio >=1.74.0,<2.0.0
    - langchain >=1.2.15,<2.0.0
    - langchain-core >=1.4.7,<2.0.0
    - langgraph >=1.2.5,<2.0.0
    - numpy >=1.26.4
    - requests >=2.32.5,<3.0.0

tests:
  - python:
      imports:
        - langchain_google_community
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  homepage: https://docs.langchain.com/oss/python/integrations/providers/google
  license: MIT
  license_file: LICENSE
  summary: An integration package connecting miscellaneous Google's products and LangChain
  repository: https://github.com/langchain-ai/langchain-google/tree/master/libs/community
  documentation: https://reference.langchain.com/python/integrations/langchain_google_community/
  description: |
    langchain-google-community provides LangChain integrations for a wide
    range of Google products and services, including BigQuery, Google Drive,
    Gmail, Google Calendar, Cloud Document AI, Cloud Vision, Speech-to-Text,
    Text-to-Speech, Translate, Places, Vertex AI Search, and more. Each
    integration is exposed as an optional extra; only the unconditional base
    dependencies are declared in this recipe.

extra:
  recipe-maintainers:
    - rxm7706
