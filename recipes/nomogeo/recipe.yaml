schema_version: 1

context:
  version: 0.1.0
  python_min: 3.11

package:
  name: nomogeo
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/n/nomogeo/nomogeo-${{ version }}.tar.gz
  sha256: a2f6c0351f09544d510d426984d197d4ffff83b6249e60607b9beb78f0533242

build:
  noarch: python
  number: 0
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - setuptools >=68
    - wheel
  run:
    - python >=${{ python_min }}
    - numpy >=2.0
    - scipy >=1.15

tests:
  - python:
      imports:
        - nomogeo
      python_version:
        - ${{ python_min }}.*
        - "*"
      pip_check: true

about:
  homepage: https://pypi.org/project/nomogeo/
  license: BSD-3-Clause
  license_file: LICENSE
  summary: Exact observer-geometry kernel for visible precision and hidden-load calculus.
  description: |
    nomogeo is a pure-Python observer-geometry kernel for exact
    finite-dimensional linear and Gaussian calculations.

    The package exposes visible precision, canonical lift and hidden
    projector operations, local visible calculus, hidden-load
    parametrisation beneath a fixed ceiling, and quotient-side Gaussian
    contraction utilities.

extra:
  recipe-maintainers:
    - jrdunkley
