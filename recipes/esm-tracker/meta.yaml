    {% set name = "esm-tracker" %}
    {% set version = "2.0.0" %}
    
    package:
      name: {{ name|lower }}
      version: {{ version }}
    
    source:
      url: https://pypi.io/packages/source/{{ name[0] }}/{{ name }}/esm_tracker-{{ version }}.tar.gz
      sha256: 48e213342f28a64ff25dfba6cb19eaf1517859c63a18c70985bd11f1bcea6aa0
    
    build:
      noarch: python
      script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
      number: 0
      entry_points:
        - esm-tracker = esm_tracker.cli:main

    requirements:
      host:
        - python >=3.10
        - pip
        - setuptools >=61.0.0
        - wheel
      run:
        - python >=3.10
        - xarray >=2023.0.0
        - netcdf4 >=1.6.0
        - zarr >=2.14.0
        - pyyaml >=6.0.0
        - requests >=2.28.0
        - watchdog >=3.0.0

    test:
      imports:
        - esm_tracker
      commands:
        - esm-tracker --help

    about:
      home: https://github.com/NOAA-GFDL/esm-form-automation
      summary: A lightweight CLI tool for extracting metadata from NetCDF and Zarr files.
      license: MIT
      license_family: MIT
      license_file: LICENSE
      dev_url: https://github.com/NOAA-GFDL/esm-form-automation

    extra:
      recipe-maintainers:
        - matthew7mendoza
