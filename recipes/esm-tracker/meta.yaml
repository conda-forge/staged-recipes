   {% set name = "esm-tracker" %}
    {% set version = "2.0.1" %}
    # Conda-forge's new preferred way to set python versions
    
    {% set python_min = "3.10" %}
    package:
      name: {{ name|lower }}
      version: {{ version }}
    
    source:
      # Updated from pypi.io to pypi.org
      url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/esm_tracker-{{ version }}.tar.gz
      sha256: 42e8eebea1fa69add744b2c455664f0e5662f2ea758012d6c7d8d6b8866a132d
    
    build:
      noarch: python
      script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
      number: 0
      entry_points:
        - esm-tracker = esm_tracker.cli:main
    
    requirements:
      host:
        - python {{ python_min }}
        - pip
        - setuptools >=61.0.0
        - wheel
      run:
        - python >={{ python_min }}
        - xarray >=2023.0.0
        - netcdf4 >=1.6.0
        - zarr >=2.14.0
        - pyyaml >=6.0.0
        - requests >=2.28.0
        - watchdog >=3.0.0

    test:
      requires:
        - python {{ python_min }}
      imports:
        - esm_tracker
      commands:
        - esm-tracker --help

    about:
      home: https://github.com/NOAA-GFDL/esm-form-automation
      summary: A lightweight CLI tool for extracting metadata from NetCDF and Zarr files.
      license: MIT
      license_family: MIT
      license_file: LICENSE
      dev_url: https://github.com/NOAA-GFDL/esm-form-automation

    extra:
      recipe-maintainers:
        - matthew7mendoza
