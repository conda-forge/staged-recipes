context:
  version: 0.13.2
  python_min: "3.11"

package:
  name: wombat
  version: ${{ version }}

source:
- url: https://github.com/NLRWindSystems/WOMBAT/archive/refs/tags/v${{ version }}.tar.gz
  sha256: 69ec9c53b6149330bbe3345494d593f549c91a032bc5b4ad2a434040b34d97ff

build:
  script: ${{ PYTHON }} -m pip install . --no-deps --no-build-isolation
  noarch: python
  number: 0

requirements:
  host:
  - python ${{ python_min }}.*
  - setuptools
  - setuptools-scm
  - pip
  run:
  - python >=${{ python_min }}
  - attrs >=24.1.0
  - numpy >=1.21
  - scipy >=1.8
  - pandas <3,>=2
  - polars >=1.33.1
  - pyarrow >=10
  - jupyterlab >=3
  - simpy >=4.0.1
  - pyyaml >=6
  - geopy >=2.3
  - networkx >=2.7
  - matplotlib >=3.3
  - types-typed-ast >=1.5
  - types-pyyaml >=6
  - types-python-dateutil >=2.8
  - python-dateutil

tests:
- script:
    - pytest -n auto -vvv
  requirements:
      run:
        - pytest >=7 
        - pytest-xdist
        - pytest-check
        - pytest-cov
        - python ${{ python_min }}.*
  files:
      source:
        - .

about:
  homepage: https://github.com/NLRWindSystems/WOMBAT/
  summary: Windfarm operations and maintenance cost-benefit analysis tool
  license: Apache-2.0
  license_file: LICENSE

extra:
  recipe-maintainers:
    - julian-belina
