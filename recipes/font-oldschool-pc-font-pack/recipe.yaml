context:
  version: "2.2"

package:
  name: font-oldschool-pc-font-pack
  version: ${{ version }}

source:
  - url: https://int10h.org/oldschool-pc-fonts/download/oldschool_pc_font_pack_v${{ version }}_FULL.zip
    sha256: 21b3c0a3770ef0afc46564760613d7b078f4fcc9ed93db4b829a440b68822e08

build:
  noarch: generic
  number: 0
  script:
    - mkdir -p $PREFIX/fonts
    - cp "ttf - Ac (aspect-corrected)"/*.ttf $PREFIX/fonts
    - cp "ttf - Mx (mixed outline+bitmap)"/*.ttf $PREFIX/fonts
    - cp "ttf - Px (pixel outline)"/*.ttf $PREFIX/fonts
    - cp "woff - Web (webfonts)"/*.woff $PREFIX/fonts

tests:
  - package_contents:
      files:
        - fonts/*.ttf
        - fonts/*.woff
      strict: true

about:
  homepage: https://int10h.org/oldschool-pc-fonts/
  summary: The Ultimate Oldschool PC Font Pack
  description: |
    The world's biggest collection of classic text mode fonts, system fonts and BIOS fonts from DOS-era IBM PCs and compatibles - preserving raster typography from pre-GUI times.
  license: CC-BY-SA-4.0
  license_file:
    - LICENSE.TXT

extra:
  recipe-maintainers:
    - pavelzw
