schema_version: 1

context:
  python_min: "3.11"
  version: "1.1.2"

package:
  name: ramp-stream
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/r/ramp-stream/ramp_stream-${{ version }}.tar.gz
  sha256: 6b0c7db10913ba0e2c75e5398777849866933c8aea27747f1ae9cf1cc9e543f4

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - setuptools
    - setuptools-scm
    - wheel
    - pip
  run:
    - python >=${{ python_min }}
    - cachetools
    - cytoolz
    - ipython
    - matplotlib-base
    - more-itertools
    - networkx
    - numba
    - numpy
    - pandas
    - rich
    - scikits.odes
    - scipy
    - sundials
    - dask-core
    - yaml

tests:
  - python:
      imports:
        - stream
      pip_check: true
      python_version: 
        - ${{ python_min }}.*
        - "*"

about:
  summary: System-level Thermohydraulics Code for reactor analysis using modular DAE coupling of components
  license: MIT
  license_file: LICENSE
  homepage: https://pypi.org/project/ramp-stream/

extra:
  recipe-maintainers:
    - esheder
