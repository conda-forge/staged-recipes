schema_version: 1

context:
  python_min: 3.10
  version: 0.4.3

package:
  name: mritk
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/m/mritk/mritk-${{ version }}.tar.gz
  sha256: b1cccc6ebd633faed4c8151f5688497ff1f763b395423ff7990137fff64f532e

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  python:
    entry_points:
      - mritk = mritk.cli:main

requirements:
  host:
    - python ${{ python_min }}.*
    - setuptools >=61.2
    - pip
  run:
    - python >=${{ python_min }}
    - tqdm
    - numpy
    - rich-argparse
    - nibabel
    - pandas
    - scipy
    - scikit-image
    - pydicom
    - dcm2niix
    - textual-image
    - pillow
    - matplotlib-base
    - napari

tests:
  - python:
      imports:
        - mritk
  - requirements:
      run:
        - pip
        - python ${{ python_min }}.*
    script:
      - pip check
      - mritk --help

about:
  summary: MRI processing toolkit.
  license: MIT
  license_file: LICENSE
  homepage: https://github.com/scientificcomputing/mri-toolkit.git

extra:
  recipe-maintainers:
    - finsberg
    - cdaversin
