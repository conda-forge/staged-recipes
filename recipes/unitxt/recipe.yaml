# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "1.26.10"

package:
  name: unitxt
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/u/unitxt/unitxt-${{ version }}.tar.gz
  sha256: f588045669c222a02ed703386aad8b02d0d41aa87a0122a06182e7623fad4ec2

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  python:
    entry_points:
      - unitxt-explore = unitxt.ui:launch
      - unitxt-assistant = unitxt.assistant:launch
      - unitxt-metrics-service = unitxt.service.metrics.main:start_metrics_http_service
      - unitxt-evaluate = unitxt.evaluate_cli:main
      - unitxt-summarize = unitxt.evaluate_cli:summarize_cli

requirements:
  host:
    - python ${{ python_min }}.*
    - setuptools
    - wheel
    - pip
  run:
    - python >=${{ python_min }},<3.14
    - datasets >=2.16.0
    - evaluate
    - scipy >=1.10.1
    - diskcache

tests:
  - python:
      imports:
        - unitxt
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "3.13.*"

about:
  homepage: https://pypi.org/project/unitxt/
  license: Apache-2.0
  license_file: LICENSE
  summary: Load any mixture of text to text data in one line of code
  repository: https://github.com/IBM/unitxt
  documentation: https://www.unitxt.ai/en/latest/documentation.html
  description: |
    Unitxt is a Python library for getting data fired up and set for
    utilization. In one line of code, it preps a dataset or mixtures of
    datasets into a unified format that can be fed straight into any
    instruction-tuned model or evaluation pipeline. Unitxt provides a
    declarative, modular way to define text-to-text data processing,
    spanning loading, preprocessing, prompting, and metric computation for
    large language models.

extra:
  recipe-maintainers:
    - rxm7706
