schema_version: 1

context:
  version: 2.6.3

package:
  name: np2typing
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/n/np2typing/np2typing-${{ version }}.tar.gz
  sha256: 8e64bba39960c388d4fd8a28d1a5d681fdfa0abdd347e88c6b23c6a00241381b

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - setuptools
  run:
    - python >=${{ python_min }}
    - numpy >=1.20.0
    - typing_extensions >=4.0.0,<5.0.0

tests:
  - python:
      imports:
        - nptyping
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  summary: Type hints for NumPy.
  license: MIT
  license_file: LICENSE
  homepage: https://github.com/jasper-tms/nptyping

extra:
  recipe-maintainers:
    - jan-janssen
