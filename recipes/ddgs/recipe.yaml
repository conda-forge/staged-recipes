# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "9.14.4"

package:
  name: ddgs
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/d/ddgs/ddgs-${{ version }}.tar.gz
  sha256: f7b118a2b709a9e9c04a1dca6e96b98c25d4dfaca1a4b0a244d74454fcca48ef

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  python:
    entry_points:
      - ddgs = ddgs.cli:safe_entry_point

requirements:
  host:
    - python ${{ python_min }}.*
    - setuptools
    - pip
  run:
    - python >=${{ python_min }}
    - click >=8.1.8
    - primp >=1.2.3
    - lxml >=4.9.4
    - httpx >=0.28.1
    - brotli
    - h2 >=3,<5
    - socksio
    - fake-useragent >=2.2.0

tests:
  - python:
      imports:
        - ddgs
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"
  - requirements:
      run:
        - pip
        - python ${{ python_min }}.*
    script:
      - ddgs --help

about:
  homepage: https://github.com/deedy5/ddgs
  repository: https://github.com/deedy5/ddgs
  documentation: https://github.com/deedy5/ddgs/blob/main/README.md
  license: MIT
  license_file: LICENSE.md
  summary: Dux Distributed Global Search. A metasearch library that aggregates results from diverse web search services.
  description: |
    DDGS (Dux Distributed Global Search) is a metasearch library that
    aggregates results from diverse web search services.

extra:
  recipe-maintainers:
    - rxm7706
