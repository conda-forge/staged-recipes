        - newton-sim >=1.2.0
        - pyopengl-accelerate
        - imgui-bundle >=1.92.5
    tests:
      - python:
          imports: isaaclab_visualizers.newton
          pip_check: false
          python_version: ${{ python_min }}.*
  - package:
      name: isaaclab-visualizers-rerun
    requirements:
      run:
        - ${{ pin_subpackage('isaaclab-visualizers', exact=True) }}
        - python >=${{ python_min }}
        - newton-sim >=1.2.0
        - rerun-sdk >=0.29.0
    tests:
      - python:
          imports: isaaclab_visualizers.rerun
          pip_check: false
          python_version: ${{ python_min }}.*
  - package:
      name: isaaclab-visualizers-viser
    requirements:
      run:
        - ${{ pin_subpackage('isaaclab-visualizers', exact=True) }}
        - python >=${{ python_min }}
        - newton-sim >=1.2.0
        - viser >=1.0.16
    tests:
      - python:
          imports: isaaclab_visualizers.viser
          pip_check: false
          python_version: ${{ python_min }}.*

