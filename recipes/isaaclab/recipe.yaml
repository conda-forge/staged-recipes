      host:
        - pip
        - python ${{ python_min }}.*
        - toml
      run:
        - python >= ${{ python_min }}
        - numpy
        - pytorch >=2.10
        - torchvision >=0.25.0
        - protobuf >=4.25.8
        - hydra-core
        - h5py
        - tensorboard
        - moviepy
        - packaging <24
        - tqdm >= 4.67.0
  - package:
      name: isaaclab-rl-sb3
    requirements:
      run:
        - ${{ pin_subpackage('isaaclab-rl', exact=True) }}
        - python >= ${{ python_min }}
        - stable-baselines3 >=2.6
        - rich
  # - package:
  #     name: isaaclab-rl-skrl
  #   requirements:
  #     run:
  #       - ${{ pin_subpackage('isaaclab-rl', exact=True) }}
  #       - python >= ${{ python_min }}
  #       - skrl  # missing in conda-forge
  # - package:
  #     name: isaaclab-rl-rl-games
  #   requirements:
  #     run:
  #       - ${{ pin_subpackage('isaaclab-rl', exact=True) }}
  #       - python >= ${{ python_min }}
  #       - rl-games  # missing in conda-forge
  - package:
      name: isaaclab-rl-rsl-rl
    requirements:
      run:
        - ${{ pin_subpackage('isaaclab-rl', exact=True) }}
        - python >= ${{ python_min }}
        - rsl-rl-lib 5.0.*
        - onnxscript >=0.5
  # ==============
