  # isaaclab-newton
  # ===============
  - package:
      name: isaaclab-newton
    build:
      script:
        - cd source/isaaclab_newton
        - sed -i '/^[[:space:]]*"isaaclab_newton\.test",/s/^\([[:space:]]*\)/\1"isaaclab_newton.sensors.imu",\'$'\n''\1/' setup.py
        - sed -i '/^[[:space:]]*"isaaclab_newton\.test",/s/^\([[:space:]]*\)/\1"isaaclab_newton.sensors.joint_wrench",\'$'\n''\1/' setup.py
        - sed -i '/^[[:space:]]*"isaaclab_newton\.test",/s/^\([[:space:]]*\)/\1"isaaclab_newton.sim",\'$'\n''\1/' setup.py
        - sed -i '/^[[:space:]]*"isaaclab_newton\.test",/s/^\([[:space:]]*\)/\1"isaaclab_newton.sim.schemas",\'$'\n''\1/' setup.py
        - sed -i '/^[[:space:]]*"isaaclab_newton\.test",/s/^\([[:space:]]*\)/\1"isaaclab_newton.sim.views",\'$'\n''\1/' setup.py
        - sed -i.bak 's|EXT_DIR = os.path.abspath(os.path.join(os.path.dirname(__file__), "../"))|EXT_DIR = f"{os.environ['\''CONDA_PREFIX'\'']}/share/isaaclab-newton/config"|' ./isaaclab_newton/__init__.py
        - ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
        - mkdir -p ${PREFIX}/share/isaaclab-newton
        - cp -r ./config ${PREFIX}/share/isaaclab-newton/config
    requirements:
      host:
        - pip
        - python ${{ python_min }}.*
        - setuptools
        - toml
      run:
        - ${{ pin_subpackage('isaaclab', exact=True) }}
        - python >=${{ python_min }}
        - prettytable >=3.3.0
        - pyopengl-accelerate >=3.1.10
        - newton-sim >=1.2.0
        - toml # missing in setup.py
    tests:
      - python:
          imports: isaaclab_newton
          pip_check: false
          python_version: ${{ python_min }}.*
