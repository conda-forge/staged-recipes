  #       - sed -i.bak -e 's/packages=\["isaaclab_mimic"\],$/packages=find_packages(include=\["isaaclab*"\]),/' ./setup.py
  #       - ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  #   requirements:
