{% set version = "0.0.85" %}

package:
  name: nwchemex-tensorwrapper
  version: {{ version }}

source:
  url: https://github.com/NWChemEx/TensorWrapper/archive/refs/tags/v{{ version }}.tar.gz
  sha256: f916fa61118f2b4d8cc9196ff41e2e27ea8a10caed8c9f3c0878d9cca9744110

build:
  number: 0
  skip: true  # [not linux]

  string: {{ mpi_prefix }}_py{{ CONDA_PY }}h{{ PKG_HASH }}_{{ PKG_BUILDNUM }}

  run_exports:
    - {{ pin_subpackage('nwchemex-tensorwrapper', max_pin='x.x') }} {{ mpi_prefix }}_*
  ignore_run_exports:
    - catch2

requirements:
  build:
    - {{ compiler('cxx') }}
    - {{ stdlib('c') }}
    - cmake >=3.18
    - ninja
  host:
    - {{ mpi }}
    - nwchemex-utilities
    - nwchemex-parallelzone * {{ mpi_prefix }}_*
    - nwchemex-weaklytypedfloat
    - eigen
    - libboost-cpp
    - python
    - pybind11
  run:
    - python
    - {{ mpi }}

test:
  commands:
    - test -f ${PREFIX}/lib/tensorwrapper/libtensorwrapper$SHLIB_EXT
    - pip check
  imports:
    - tensorwrapper
  requires:
    - pip

about:
  home: https://nwchemex.github.io/TensorWrapper/
  license: Apache-2.0
  license_file:
    - LICENSE
  summary: A type-erased wrapper around various tensor backends
  dev_url: https://github.com/NWChemEx/TensorWrapper

extra:
  recipe-maintainers:
    - awvwgk
