# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json

schema_version: 1

context:
  version: "0.0.8"

package:
  name: dydantic
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/d/dydantic/dydantic-${{ version }}.tar.gz
  sha256: 14a31d4cdfce314ce3e69e8f8c7c46cbc26ce3ce4485de0832260386c612942f

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - poetry-core
  run:
    - python >=${{ python_min }}
    - pydantic >=2,<3

tests:
  - python:
      imports:
        - dydantic
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  homepage: https://github.com/hinthornw/dydantic
  repository: https://github.com/hinthornw/dydantic
  summary: Dynamically generate pydantic models from JSON schema
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - killua156
