# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  name: grafeo
  version: "0.5.22"
  python_min: '3.12'

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/${{ name[0] }}/${{ name }}/grafeo-${{ version }}.tar.gz
  sha256: 2163598b265d58d3ca19b3a0311dd29512f6f3e8eade886ef0acb8a97178f5ec

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - maturin >=1.11.5
    - pip
  run:
    - python >=${{ python_min }},<4.0
    - solvor >=0.6.1

tests:
  - python:
      imports:
        - grafeo
      pip_check: true
      python_version:
        - ${{ python_min }}.*

about:
  summary: A high-performance, embeddable graph database with Python bindings
  homepage: https://pypi.org/project/grafeo
  repository: https://github.com/GrafeoDB/grafeo
  license: Apache-2.0
  license_file: LICENSE

extra:
  recipe-maintainers:
    - rxm7706
