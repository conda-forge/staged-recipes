# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "0.5.42"
  python_min: "3.12"

package:
  name: grafeo
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/g/grafeo/grafeo-${{ version }}.tar.gz
  sha256: f2af6bc4d243437744c84c01d1f0c99880098fd11b18205deaf2c774f987d443

build:
  number: 0
  script:
    - cargo-bundle-licenses --format yaml --output THIRDPARTY.yml
    - ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  build:
    - if: build_platform != target_platform
      then:
        - python
        - cross-python_${{ target_platform }}
    - ${{ compiler('c') }}
    - ${{ stdlib('c') }}
    - ${{ compiler('rust') }}
    - cargo-bundle-licenses
  host:
    - python ${{ python_min }}.*
    - pip
    - maturin >=1.11.5,<2.0
  run:
    - python
    - solvor >=0.6.1

tests:
  - python:
      imports:
        - grafeo
      pip_check: true

about:
  homepage: https://grafeo.dev
  repository: https://github.com/GrafeoDB/grafeo
  documentation: https://grafeo.dev/user-guide/
  license: Apache-2.0
  license_file:
    - LICENSE
    - THIRDPARTY.yml
  summary: A high-performance, embeddable graph database with Python bindings
  description: |
    grafeo is an embedded graph database written in Rust with Python
    bindings (PyO3 + maturin). It supports multiple query languages
    (GQL, Cypher, SPARQL, Gremlin, GraphQL, SQL/PGQ) via the
    grafeo-engine workspace crate, plus vector + text + hybrid search
    indexes. Targeted at AI/ML and knowledge-graph workloads.

extra:
  recipe-maintainers:
    - rxm7706
