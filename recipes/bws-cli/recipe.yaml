context:
  version: "2.1.0"

package:
  name: bws-cli
  version: ${{ version }}

source:
  url: https://github.com/bitwarden/sdk-sm/archive/refs/tags/bws-v${{ version }}.tar.gz
  sha256: 3ea669ae57b1d3090f98ff2c09894b4da0bf2c700a4f8d79f70a0f96615cd9ed

build:
  number: 0

requirements:
  build:
    - ${{ compiler('rust') }}
    - ${{ stdlib('c') }}
    - cargo-bundle-licenses

tests:
  - script:
      - bws --help

about:
  homepage: https://github.com/bitwarden/sdk-sm
  summary: Bitwarden Secrets Manager CLI
  description: |
    bws is the official CLI for Bitwarden Secrets Manager.
    It allows developers and CI/CD pipelines to retrieve, create, and manage secrets
    without embedding credentials in code or configuration files.
  license: LicenseRef-Bitwarden-SDK
  license_file:
    - LICENSE
    - THIRDPARTY.yml
  repository: https://github.com/bitwarden/sdk-sm

extra:
  recipe-maintainers:
    - phreed
