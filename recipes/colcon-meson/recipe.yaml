context:
  version: "0.5.0"

package:
  name: colcon-meson
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/c/colcon-meson/colcon_meson-${{ version }}.tar.gz
  sha256: 320acca52b61d11fbd01d515a10afccb5ba772220296f067e361611008adad7f

build:
  number: 0
  noarch: python
  script: python -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - setuptools
  run:
    - python >=${{ python_min }}
    - colcon-core >=0.10.0
    - colcon-library-path
    - meson >=0.60.0

tests:
  - python:
      imports:
        - colcon_meson
      pip_check: true
      python_version: ${{ python_min }}.*

about:
  homepage: https://github.com/colcon/colcon-meson
  summary: Extension for colcon to support Meson packages.
  license: Apache-2.0
  license_file: LICENSE
  repository: https://github.com/colcon/colcon-meson

extra:
  recipe-maintainers:
    - wolfv
