schema_version: 1

context:
  version: "1.8.1"

package:
  name: runpod-python
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/r/runpod/runpod-${{ version }}.tar.gz
  sha256: 3d31aa0e175a91e7c962fe1de51e2872a06e78f5d7e37ff7520ba23db1485413

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  python:
    entry_points:
      - runpod = runpod.cli.entry:runpod_cli

requirements:
  host:
    - python ${{ python_min }}.*
    - python
    - setuptools >=45
    - wheel
    - setuptools-scm
    - pip
  run:
    - python >=${{ python_min }}.*
    - python
    - aiohttp >=3.9.3
    - aiohttp-retry >=2.8.3
    - backoff >=2.2.1
    - boto3 >=1.26.165
    - click >=8.1.7
    - colorama >=0.2.5,<0.4.7
    - cryptography <46.0.0
    - fastapi >=0.94.0
    - filelock >=3.0.0
    - paramiko >=3.3.1
    - prettytable >=3.9.0
    - py-cpuinfo >=9.0.0
    - inquirerpy ==0.3.4
    - requests >=2.31.0
    - tomli >=2.0.1
    - tomlkit >=0.12.2
    - tqdm-loggable >=0.1.4
    - urllib3 >=1.26.6
    - watchdog >=3.0.0

tests:
  - script:
    - runpod --help
  - python:
      imports:
        - runpod
      pip_check: true
      python_version: ${{ python_min }}.*

about:
  homepage: https://runpod.io
  repository: https://github.com/runpod/runpod-python
  documentation: https://docs.runpod.io/tutorials/sdks/python
  license: MIT
  license_file: LICENSE
  summary: 🐍 | Python library for Runpod API and serverless worker SDK.
  description: |
    The Runpod Python SDK helps you develop Serverless AI applications so that you can build and deploy scalable AI solutions efficiently.

extra:
  recipe-maintainers:
    - eunos-1128
