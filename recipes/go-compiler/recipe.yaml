schema_version: 1

context:
  version: "1.26.4"

package:
  name: go-${{ go_variant_str }}-compiler
  version: ${{ version }}

source:
  url: https://dl.google.com/go/go${{ version }}.src.tar.gz
  sha256: 4f668a32fbfc1132e6a881fb968c2f1dada631492a339211735fbb255a42602d

build:
  number: 0

requirements:
  run:
    - go-${{ go_variant_str }}_${{ target_platform }} ${{ version }}.*

tests:
  - script:
      - go help
  - if: unix
    then:
      - script: test "$CONDA_GO_COMPILER" = "1"
  - if: win
    then:
      - script: if not "%CONDA_GO_COMPILER%"=="1" exit /b 1

about:
  license: BSD-3-Clause
  license_file: LICENSE.txt
  summary: A metapackage to select a Go compiler (not for use in recipes)
  homepage: https://conda-forge.org

extra:
  feedstock-name: go-compiler
  recipe-maintainers:
    - conda-forge/go
