{% set version = "26.1.0" %}
{% set rocm_version = "7.1.0" %}
{% set esmi_version = "4.2" %}

package:
  name: amdsmi-split
  version: {{ version }}

source:
  - url: https://github.com/ROCm/amdsmi/archive/refs/tags/rocm-{{ rocm_version }}.tar.gz
    sha256: 17ccddf8988a5674edb360b9f3b41bf3d94c6f4ba36cf8d84739c6ccdfc87c50
  - url: https://github.com/amd/esmi_ib_library/archive/refs/tags/esmi_pkg_ver-{{ esmi_version }}.tar.gz
    sha256: de19d222d09e2171f47f8bbd6608e5648bd547c82543379bb8fb5ed2e379e141
    folder: esmi_ib_library

build:
  number: 0
  skip: true  # [not linux]

requirements:
  build:
    - {{ compiler('c') }}
    - {{ compiler('cxx') }}
    - {{ stdlib('c') }}
    - cmake >=3.20
    - ninja
    - pkg-config
  host:
    - libdrm

outputs:
  - name: libamd-smi
    version: {{ version }}
    script: install_lib.sh
    build:
      run_exports:
        - {{ pin_subpackage('libamd-smi', max_pin='x') }}
    requirements:
      build:
        - {{ compiler('c') }}
        - {{ compiler('cxx') }}
        - {{ stdlib('c') }}
        - cmake >=3.20
        - ninja
        - pkg-config
      host:
        - libdrm
      run:
        - libdrm
    test:
      commands:
        - test -f $PREFIX/lib/libamd_smi.so
        - test -f $PREFIX/include/amd_smi/amdsmi.h

  - name: amdsmi
    version: {{ version }}
    script: install_python.sh
    requirements:
      host:
        - python >=3.6
        - pip
        - setuptools >=59.0
      run:
        - python >=3.6
        - {{ pin_subpackage('libamd-smi', exact=True) }}
    test:
      imports:
        - amdsmi
      requires:
        - pip
      commands:
        - pip check

about:
  home: https://github.com/ROCm/amdsmi
  summary: AMD System Management Interface Library
  description: |
    AMD SMI provides a C library and Python interface for monitoring and
    managing AMD hardware (GPUs and CPUs). It exposes telemetry data
    such as temperature, clock speeds, power usage, and allows device
    management operations.
  license: MIT
  license_family: MIT
  license_file: LICENSE
  doc_url: https://rocm.docs.amd.com/projects/amdsmi/
  dev_url: https://github.com/ROCm/amdsmi

extra:
  recipe-maintainers:
    - flferretti
