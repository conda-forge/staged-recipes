# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "3.0.0"
  # splunk-sdk requires python >=3.13, which is newer than conda-forge's
  # currently supported minimum python version.
  python_min: "3.13"

package:
  name: splunk-sdk
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/s/splunk-sdk/splunk_sdk-${{ version }}.tar.gz
  sha256: 9e2c0be4ada75c6cb536c3add636fe634d31b670c141f2a59dcf8d623753e192

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - setuptools >=82.0.1
    - pip
  run:
    - python >=${{ python_min }}

tests:
  - python:
      imports:
        - splunklib
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  homepage: https://pypi.org/project/splunk-sdk
  license: Apache-2.0
  license_file: LICENSE
  summary: Splunk Software Development Kit for Python
  repository: https://github.com/splunk/splunk-sdk-python
  documentation: https://docs.splunk.com/Documentation/PythonSDK
  description: |
    The Splunk Software Development Kit for Python contains library code to
    enable developers to build applications that interact with Splunk, and
    modules that support the Splunk Custom Search Command protocol.

extra:
  recipe-maintainers:
    - pb01ka
