{% set version = "5.2.0.post1" %}

package:
  name: freesimplegui
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/f/freesimplegui/freesimplegui-{{ version }}.tar.gz
  sha256: e58a0e6758e9a9e87152256911f94fcc3998356d1309973a9f4d9df2dc55f98a

build:
  entry_points:
    - fsgissue = FreeSimpleGUI:main_open_github_issue
    - fsgmain = FreeSimpleGUI:_main_entry_point
    - fsghelp = FreeSimpleGUI:main_sdk_help
    - fsgver = FreeSimpleGUI:main_get_debug_data
    - fsgsettings = FreeSimpleGUI:main_global_pysimplegui_settings
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - setuptools >=42
    - wheel
    - pip
  run:
    - python {{ python_min }}

test:
  imports:
    - FreeSimpleGUI
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}
    - xorg-libx11 
about:
  home: https://pypi.org/project/FreeSimpleGUI/
  summary: The free-forever Python GUI framework.
  doc_url: https://freesimplegui.readthedocs.io/en/latest/
  license: TMate AND LGPL-3.0-only
  license_file:
    - license.txt
    - NOTICE

extra:
  recipe-maintainers:
    - reedpen
