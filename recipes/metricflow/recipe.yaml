# New dependency of dbt-core >=1.12.0 (see dbt-feedstock#171), replacing the
# old dbt-semantic-interfaces dependency. Unlike dbt-core-experimental-parser
# (see the separate recipes/dbt-core-experimental-parser PR), this is a normal
# pure-Python package with a real, buildable sdist and a hatchling backend --
# no unusual packaging story here.

context:
  version: "0.211.0"

package:
  name: metricflow
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/m/metricflow/metricflow-${{ version }}.tar.gz
  sha256: e15d0c24647f4498fa0926e87c61dd23b15205c9577566bcf848460d58f48bec

build:
  number: 0
  noarch: python
  # Upstream's sdist ships 13 test-fixture files as symlinks (each
  # metricflow_semantics/test_helpers/semantic_manifest_yamls/*/project_configuration.yaml
  # points at .../shared/project_configuration.yaml). That resolves fine on
  # Linux/macOS, but breaks the win-64 build: hatchling's wheel builder calls
  # os.stat() on each included file while walking the tree, and Windows'
  # reparse-point handling for these tar-extracted symlinks makes that raise
  # WinError 123 ("invalid filename syntax"). Materialize them as real file
  # copies before the build so it's not relying on symlink support at all --
  # this produces the same bytes a working Unix build already gets (verified
  # against upstream's own published wheel), just without the Windows-specific
  # failure mode.
  script: |
    python -c "import glob, os, shutil; shared = 'metricflow_semantics/test_helpers/semantic_manifest_yamls/shared/project_configuration.yaml'; targets = [p for p in glob.glob('metricflow_semantics/test_helpers/semantic_manifest_yamls/*/project_configuration.yaml') if os.path.normpath(p) != os.path.normpath(shared)]; [os.remove(t) for t in targets if os.path.lexists(t)]; [shutil.copyfile(shared, t) for t in targets]"
    python -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - hatchling >=1.27.0,<1.28.0
    - hatch-requirements-txt >=0.4.1,<0.5.0
  run:
    - python >=${{ python_min }},<3.15
    - importlib-metadata >=4.0
    - jinja2 >=3.1.6,<3.7
    - jsonschema >=4.17,<5.0
    - more-itertools >=10.0.0,<11.0
    - pydantic >=1.10.0,<3.0
    - python-dateutil >=2.9.0,<2.10
    - pyyaml >=6.0,<7.0
    - rapidfuzz >=3.0,<4.0
    - referencing >=0.28
    - sqlglot >=20.0.0
    - tabulate >=0.8.9
    - typing_extensions >=4.4,<5.0

tests:
  - python:
      imports:
        - metricflow
        - metricflow_semantics
        - metricflow_semantic_interfaces
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - '*'

about:
  homepage: https://github.com/dbt-labs/metricflow
  repository: https://github.com/dbt-labs/metricflow
  documentation: https://docs.getdbt.com/docs/build/about-metricflow
  summary: Translates a simple metric definition into reusable SQL and executes it against the SQL engine of your choice
  license: Apache-2.0
  license_file: LICENSE

extra:
  recipe-maintainers:
    - zaneselvans
