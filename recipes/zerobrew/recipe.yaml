context:
  version: "0.2.1"

package:
  name: zerobrew
  version: ${{ version }}

source:
  url: https://github.com/lucasgelfond/zerobrew/archive/v${{ version }}.tar.gz
  sha256: 47e325a8de0b104fd9ee4a12062ba60b7edd225c951b3bea047603750dd760f1

build:
  number: 0
  skip:
    - win
  script:
    env:
      CARGO_PROFILE_RELEASE_STRIP: symbols
      CARGO_PROFILE_RELEASE_LTO: fat
    content:
      - cargo auditable install -j ${CPU_COUNT} --root "${PREFIX}" --path zb_cli --locked --no-track
      - cargo-bundle-licenses --format yaml --output ./THIRDPARTY.yml

requirements:
  build:
    - ${{ stdlib('c') }}
    - ${{ compiler('c') }}
    - ${{ compiler('rust') }}
    - cargo-bundle-licenses
    - cargo-auditable

tests:
  - script:
      - zb --version
      - zb --help
  - package_contents:
      strict: true
      bin:
        - zb
        - zbx

about:
  homepage: https://github.com/lucasgelfond/zerobrew
  summary: "A 5-20x faster experimental Homebrew alternative."
  description: |
    zerobrew brings uv-style architecture to Homebrew packages on macOS and Linux.
  license: MIT
  license_file:
    - LICENSE-MIT.md
    - THIRDPARTY.yml
  repository: https://github.com/lucasgelfond/zerobrew

extra:
  recipe-maintainers:
    - XhstormR
