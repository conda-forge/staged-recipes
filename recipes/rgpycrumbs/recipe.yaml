schema_version: 1

context:
  name: rgpycrumbs
  version: "1.8.0"

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://files.pythonhosted.org/packages/c0/26/db979dc2b3617e4941605f05c05602ccf378c04912c52edf090ce734eb14/rgpycrumbs-1.8.0.tar.gz
  sha256: e2591316c700b492e56eb4f035b62b222b1b1c8559280c1685b265ca9595acca

build:
  noarch: python
  number: 0
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python
    - pip
    - hatchling
    - hatch-vcs
  run:
    - python
    - click
    - numpy
    - rich

tests:
  - python:
      imports:
        - rgpycrumbs
      pip_check: true

about:
  homepage: https://github.com/HaoZeke/rgpycrumbs
  summary: Dispatcher-based analytical and visualization suite for chemical physics
  license: MIT
  license_file: LICENSE
  repository: https://github.com/HaoZeke/rgpycrumbs

extra:
  recipe-maintainers:
    - HaoZeke
