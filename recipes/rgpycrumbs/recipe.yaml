schema_version: 1

context:
  name: rgpycrumbs
  version: "1.8.0"

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/r/rgpycrumbs/rgpycrumbs-${{ version }}.tar.gz
  sha256: e2591316c700b492e56eb4f035b62b222b1b1c8559280c1685b265ca9595acca

build:
  noarch: python
  number: 0
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - hatchling
    - hatch-vcs
  run:
    - python >=${{ python_min }}
    - click
    - numpy
    - rich

tests:
  - python:
      imports:
        - rgpycrumbs
      python_version:
        - ${{ python_min }}.*
        - "*"
      pip_check: true

about:
  homepage: https://github.com/HaoZeke/rgpycrumbs
  summary: Dispatcher-based analytical and visualization suite for chemical physics
  license: MIT
  license_file: LICENSE
  repository: https://github.com/HaoZeke/rgpycrumbs

extra:
  recipe-maintainers:
    - HaoZeke
