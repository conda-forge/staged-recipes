# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "1.0.1"

package:
  name: langchain-unstructured
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/l/langchain-unstructured/langchain_unstructured-${{ version }}.tar.gz
  sha256: 9b4b832b8fcdef8598ff634ec6fc0e344e6d8fdae854c5727f717d605d28e406

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - poetry-core
    - pip
  run:
    - python >=${{ python_min }}
    - langchain-core >=1.0.5,<2.0.0
    - unstructured-client >=0.27.0,<1

tests:
  - python:
      imports:
        - langchain_unstructured
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  homepage: https://pypi.org/project/langchain-unstructured/
  license: MIT
  license_file: LICENSE
  summary: An integration package connecting Unstructured and LangChain
  repository: https://github.com/langchain-ai/langchain-unstructured
  documentation: https://python.langchain.com/
  description: |
    An integration package connecting Unstructured and LangChain. Provides
    document loaders that use the Unstructured library to parse and partition
    a wide range of file formats (PDF, HTML, Office documents, images, and
    more) into LangChain Document objects.

extra:
  recipe-maintainers:
    - rxm7706
    - pb01ka
