{% set version = "1.4.0" %}

{% set occt_version = "7.9.3" %}

package:
  name: occ_gordon
  version: {{ version }}

source:
  git_url: https://github.com/rainman110/occ_gordon
  git_tag: {{ version }}

build:
  number: 0

requirements:
  build:
    - ninja
    - cmake
    - swig
    - scikit-build-core
    #- ${{ compiler('cxx') }}
    #- ${{ stdlib('c') }}

  host:
    - python
    - pip
    - scikit-build-core
    - occt =={{ occt_version }}
    - pythonocc-core=={{ occt_version }}

  run:
    - python
    - occt =={{ occt_version }}
    - pythonocc-core=={{ occt_version }}

test:
  imports:
    - occ_gordon
  requires:
    - pip
  commands:
    - pip check
    
about:
  home: https://github.com/rainman110/occ_gordon
  license: Apache 2.0
  summary: A gordon surface algorithm for pythonocc
