{% set version = "1.4.0" %}

{% set occt_version = "7.9.3" %}

package:
  name: occ_gordon
  version: {{ version }}

source:
  url: https://github.com/rainman110/occ_gordon/archive/refs/tags/{{ version }}.tar.gz
  sha256: 3b4abff39f6fb0a7d96943ee71c5fb10ef03623ee1f273efb03b1de901266316

build:
  number: 0

requirements:
  build:
    - {{ compiler('cxx') }}
    - {{ stdlib("c") }}
    - ninja
    - cmake
    - swig
    - scikit-build-core

  host:
    - python
    - pip
    - scikit-build-core
    - occt =={{ occt_version }}
    - pythonocc-core =={{ occt_version }}

  run:
    - python
    - occt =={{ occt_version }}
    - pythonocc-core =={{ occt_version }}

test:
  imports:
    - occ_gordon
  requires:
    - pip
  commands:
    - pip check
    
about:
  home: https://github.com/rainman110/occ_gordon
  license: Apache-2.0
  license_file: LICENSE
  summary: A gordon surface algorithm for pythonocc
  
extra:
  recipe-maintainers:
    - rainman110
