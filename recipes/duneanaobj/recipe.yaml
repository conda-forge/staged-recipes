context:
  version: "04.00.00"
  tag: v04_00_00

package:
  name: duneanaobj
  version: ${{ version }}

source:
  url: https://github.com/DUNE/duneanaobj/archive/refs/tags/${{ tag }}.tar.gz
  sha256: 4425c906ba117e3823c479feb2c5ba168707c157df063f7c5aded2f77e16d595

build:
  number: 0
  script: build.sh
  skip:
    - win

requirements:
  build:
    - ${{ compiler('cxx') }}
    - ${{ stdlib('c') }}
    - cmake
    - ninja
  host:
    - root
  run:
    # libStandardRecord.so links ROOT's libCore/libPhysics (shipped by
    # root_base, which has no run_exports), so depend on it explicitly to
    # avoid overlinking.
    - root_base
  run_exports:
    - ${{ pin_subpackage('duneanaobj', upper_bound='x.x') }}

tests:
  - package_contents:
      lib:
        - StandardRecord
      include:
        - duneanaobj/StandardRecord/StandardRecord.h
        - duneanaobj/StandardRecord/SRInteraction.h
      files:
        - lib/cmake/duneanaobj/duneanaobjConfig.cmake

about:
  homepage: https://github.com/DUNE/duneanaobj
  repository: https://github.com/DUNE/duneanaobj
  summary: DUNE analysis object (StandardRecord) data classes for CAF files
  description: |
    duneanaobj defines the DUNE StandardRecord data classes used to read and
    write Common Analysis File (CAF) ROOT files across DUNE analyses. This conda
    package builds the StandardRecord library and installs its headers using the
    project's non-UPS (SKIP_CET) CMake path.
  license: Apache-2.0
  license_file: LICENSE

extra:
  recipe-maintainers:
    - calcuttj
