schema_version: 1

context:
  version: "0.3.3"

package:
  name: better-exceptions
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/b/better-exceptions/better_exceptions-${{ version }}.tar.gz
  sha256: e4e6bc18444d5f04e6e894b10381e5e921d3d544240418162c7db57e9eb3453b

build:
  number: 0
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python
    - pip
    - setuptools
  run:
    - python
    - if: win
      then: colorama

tests:
  - python:
      imports:
        - better_exceptions
      pip_check: true

about:
  summary: Pretty and helpful exceptions, automatically
  license: MIT
  license_file: LICENSE.txt
  homepage: https://github.com/qix-/better-exceptions
  repository: https://github.com/qix-/better-exceptions

extra:
  recipe-maintainers:
    - danyeaw
