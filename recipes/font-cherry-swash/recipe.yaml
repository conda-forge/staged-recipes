context:
  version: "1.0"

package:
  name: font-cherry-swash
  version: ${{ version }}

source:
  - url: https://github.com/google/fonts/archive/afb68dcdba0f5b1eff049f97394077851ba75f32.tar.gz
    sha256: a5a8240ea96a905a326f62c5cc5840bc500de8cd0511c9996796d0f3159c0f8c

build:
  noarch: generic
  number: 0
  script:
    - mkdir -p $PREFIX/fonts
    - cp ofl/cherryswash/CherrySwash-*.ttf $PREFIX/fonts

tests:
  - package_contents:
      files:
        - fonts/CherrySwash-Regular.ttf
        - fonts/CherrySwash-Bold.ttf
      strict: true

about:
  homepage: https://fonts.google.com/specimen/Cherry+Swash
  summary: The Cherry Swash font family.
  license: OFL-1.1
  license_file:
    - ofl/cherryswash/OFL.txt
  repository: https://github.com/google/fonts/tree/main/ofl/cherryswash

extra:
  recipe-maintainers:
    - pavelzw
