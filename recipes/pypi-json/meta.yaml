{% set name = "pypi-json" %}
{% set version = "0.5.0.post1" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/pypi_json-{{ version }}.tar.gz
  sha256: 423d37baa46d3a34689f7be447e72bee8a88f36b49f4d39af1c5ae77b7b171a8

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - whey
    - pip
    - python {{ python_min }}
  run:
    - apeye >=1.1.0
    - packaging >=21.0
    - requests >=2.26.0
    - python >={{ python_min }}

test:
  imports:
    - pypi_json
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://github.com/repo-helper/pypi-json
  summary: PyPI JSON API client library
  license: MIT
  license_file: LICENSE
  doc_url: https://pypi-json.readthedocs.io/en/latest/

extra:
  recipe-maintainers:
    - domdfcoding
