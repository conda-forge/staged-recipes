context:
  version: "1.0"

package:
  name: font-space-mono
  version: ${{ version }}

source:
  - url: https://github.com/googlefonts/spacemono/archive/329858c2c4dbd3476f972a4ae00624b018cf4b81.tar.gz
    sha256: d03a98e6e1a236b119ba72c1f3b44ecc675980aa993b5f5d244a2da696bf086f

build:
  noarch: generic
  number: 0
  script:
    - mkdir -p $PREFIX/fonts
    - cp fonts/{otf,ttf,webfonts}/* $PREFIX/fonts

tests:
  - package_contents:
      files:
        - fonts/SpaceMono-Bold.otf
        - fonts/SpaceMono-BoldItalic.otf
        - fonts/SpaceMono-Italic.otf
        - fonts/SpaceMono-Regular.otf
        - fonts/SpaceMono-Bold.ttf
        - fonts/SpaceMono-BoldItalic.ttf
        - fonts/SpaceMono-Italic.ttf
        - fonts/SpaceMono-Regular.ttf
        - fonts/SpaceMono-Bold.woff2
        - fonts/SpaceMono-BoldItalic.woff2
        - fonts/SpaceMono-Italic.woff2
        - fonts/SpaceMono-Regular.woff2
      strict: true

about:
  homepage: https://fonts.google.com/specimen/Space+Mono
  summary: Original monospace display typeface family
  license: OFL-1.1
  license_file:
    - LICENSE.txt
    - OFL.txt
  repository: https://github.com/googlefonts/spacemono

extra:
  recipe-maintainers:
    - pavelzw
