{% set python_min = "3.12" %}
{% set version = "0.1.2" %}

package:
  name: omenai
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/o/omenai/omenai-{{ version }}.tar.gz
  sha256: cc8d681c46fa78f575c285555998faca58d8d88a595b89d161b09e81f14345b8

build:
  entry_points:
    - omen = omen.cli.main:main
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - setuptools >=68
    - wheel
    - pip
  run:
    - python >={{ python_min }}
    - pydantic >=2.8.0
    - jsonschema >=4.23.0
    - pypdf >=4.2.0
    - pyyaml >=6.0
    - langchain >=0.3.0
    - langchain-openai >=0.2.0
    - voyageai >=0.3.2
    - streamlit >=1.37.0
    - plotly >=5.23.0
    - networkx >=3.3
    - scipy >=1.17.1
    - python-dotenv >=1.0.1

test:
  imports:
    - omen
  commands:
    - pip check
    - omen --help
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://github.com/StrategyLogic/omen
  summary: The AI-Powered open-source strategic reasoning engine.
  license: AGPL-3.0-or-later
  license_file:
    - LICENSE
    - NOTICE.md

extra:
  recipe-maintainers:
    - RCFans
