{% set name = "sctrial" %}
{% set version = "0.3.0" %}
{% set python_min = "3.9" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz
  sha256: 2fd430a0cc536e760187bd42b720290c5f2aeb9990376f5e6b5144db7f6be557

build:
  noarch: python
  number: 0
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python {{ python_min }}
    - pip
    - hatchling >=1.24.2
  run:
    - python >={{ python_min }}
    - numpy >=1.22
    - pandas >=1.5
    - scipy >=1.9
    - statsmodels >=0.13
    - anndata >=0.8

test:
  imports:
    - sctrial
    - sctrial.stats
    - sctrial.design
  requires:
    - python {{ python_min }}

about:
  home: https://github.com/TheOmarLab/sctrial
  summary: Participant-level differential analysis for longitudinal single-cell experiments
  license: MIT
  license_file: LICENSE
  doc_url: https://sctrial.readthedocs.io
  dev_url: https://github.com/TheOmarLab/sctrial

extra:
  recipe-maintainers:
    - MohamedOmar2020
