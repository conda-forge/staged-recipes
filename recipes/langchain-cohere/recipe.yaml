# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "0.6.0"

package:
  name: langchain-cohere
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/l/langchain-cohere/langchain_cohere-${{ version }}.tar.gz
  sha256: 5e45b56d0a5cc6f3de9f61bcd4fd449b9f3ece85e6b569c3d7c304992808bb0c

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - poetry-core
    - pip
  run:
    - python >=${{ python_min }}
    - langchain-core >=1.2.16,<2.0
    - cohere >=5.18.0,<6.0
    - pydantic >=2,<3
    - types-pyyaml >=6.0.12,<7.0.0

tests:
  - python:
      imports:
        - langchain_cohere
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  homepage: https://pypi.org/project/langchain-cohere/
  license: MIT
  license_file: LICENSE
  summary: An integration package connecting Cohere and LangChain
  repository: https://github.com/langchain-ai/langchain-cohere
  documentation: https://python.langchain.com/docs/integrations/providers/cohere/
  description: |
    langchain-cohere is the LangChain partner integration package for
    Cohere. It connects Cohere's chat, embeddings, rerank, and tool-use
    models to the LangChain framework via the standard LangChain
    interfaces (chat models, embeddings, retrievers, and the ReAct
    multi-hop agent).

extra:
  recipe-maintainers:
    - rxm7706
