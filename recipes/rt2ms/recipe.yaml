context:
  version: "1.0.0"
  python_min: "3.9"

package:
  name: rt2ms
  version: ${{ version }}

source:
  url: https://gitlab.com/earthscope/public/epic/passoft/rt2ms_py3/-/archive/v${{ version }}/rt2ms_py3-v${{ version }}.tar.gz
  sha256: 98dfdd67b6b5d352c0f982c3184c7186aa6dbe7c24bbf0c1d9a12161f474d0cd

build:
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0
  python:
    entry_points:
      - rt2ms = rt2ms_py3.rt2ms_py3:main

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - setuptools
  run:
    - python >=${{ python_min }}
    - obspy >=1.3.0

tests:
  - python:
      imports:
        - rt2ms_py3
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"
  - script:
      - rt2ms -h
about:
  homepage: https://epic.earthscope.org/content/software-resources
  summary: Convert raw RT130 data into day-long mseed files
  description: |
    Convert raw RT130 (RefTek) data into day-long mini-SEED files and write state-of-health information to a RefTek format log file.
  license: GPL-3.0-or-later
  license_file: LICENSE
  repository: https://gitlab.com/earthscope/public/epic/passoft/rt2ms_py3

extra:
  recipe-maintainers:
    - omid-earthscope
