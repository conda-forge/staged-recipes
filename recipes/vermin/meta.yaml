{% set name = "vermin" %}
{% set version = "1.8.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/vermin-{{ version }}.tar.gz
  sha256: 3621955ac2a2950175c5b4a9b2fc3bd24bd416da0388893c9eb6971264e4ca1f

build:
  entry_points:
    - vermin = vermin:main
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - setuptools >=80
    - wheel
    - pip
  run:
    - python >={{ python_min }}

test:
  imports:
    - vermin
  commands:
    - pip check
    - vermin --help
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://github.com/netromdk/vermin
  summary: Concurrently detect the minimum Python versions needed to run code
  dev_url: https://github.com/netromdk/vermin
  license: MIT
  license_file: LICENSE.txt

extra:
  recipe-maintainers:
    - jwlodek
