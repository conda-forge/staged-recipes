context:
  version: "0.0.7"

package:
  name: mutable-primitives
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/m/mutable-primitives/mutable_primitives-${{ version }}.tar.gz
  sha256: f9005b845eb8472a334e7100ec025e44b0272edf829b41013cd226821ec59bc1

build:
  noarch: python
  script: python -m pip install . -vv
  number: 0

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - setuptools
  run:
    - python >=${{ python_min }}

tests:
  - python:
      imports:
        - mutable_primitives
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  homepage: https://github.com/das-intensity/python-mutable-primitives
  summary: Mutable classes of python primitives
  license: MIT
  license_file: LICENSE
  repository: https://github.com/das-intensity/python-mutable-primitives

extra:
  recipe-maintainers:
    - das-intensity
