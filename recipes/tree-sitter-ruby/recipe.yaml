schema_version: 1

context:
  version: "0.23.1"

package:
  name: tree-sitter-ruby
  version: ${{ version }}

source:
  url: https://github.com/tree-sitter/tree-sitter-ruby/archive/refs/tags/v${{ version }}.tar.gz
  sha256: e7e49577ddc1f2de8e42d42353b477e338c15bbb95b2558e123ddc13d88789f0

build:
  number: 0
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  build:
    - ${{ compiler("c") }}
  host:
    - python
    - pip
    - setuptools >=42
  run:
    - python

tests:
  - python:
      imports:
        - tree_sitter_ruby

about:
  homepage: https://github.com/tree-sitter/tree-sitter-ruby
  summary: Ruby grammar for tree-sitter
  license: MIT
  license_file: LICENSE
  repository: https://github.com/tree-sitter/tree-sitter-ruby

extra:
  recipe-maintainers:
    - killua156
    - mgorny
