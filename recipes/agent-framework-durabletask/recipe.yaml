schema_version: 1

context:
  version: "1.0.0b260514"
  python_min: "3.10"

package:
  name: agent-framework-durabletask
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/a/agent-framework-durabletask/agent_framework_durabletask-${{ version }}.tar.gz
  sha256: 2607ea427595848596a807a24e14e178e522114eee858e09533f8606005e60b0

build:
  noarch: python
  number: 0
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - flit-core <4.0,>=3.11
  run:
    - python >=${{ python_min }}
    - agent-framework-core <2,>=1.4.0
    - durabletask <2,>=1.3.0
    - durabletask-azuremanaged <2,>=1.3.0
    - python-dateutil <3,>=2.8.0

tests:
  - python:
      imports:
        - agent_framework.durabletask
      python_version: ${{ python_min }}.*
      pip_check: true

about:
  summary: |
    Durable Task integration for Microsoft Agent Framework.
  homepage: https://pypi.org/project/agent-framework-durabletask/
  repository: https://github.com/microsoft/agent-framework
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - killua156
    - mgorny
