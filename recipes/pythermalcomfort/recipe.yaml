schema_version: 1

context:
  version: "3.9.8"

package:
  name: pythermalcomfort
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/p/pythermalcomfort/pythermalcomfort-${{ version }}.tar.gz
  sha256: e141787ef3b145f857d38b849d507f27becd9b41b14e3232f5c0122e176627c9

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  python:
    entry_points:
      - pythermalcomfort = pythermalcomfort.cli:main

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - setuptools
  run:
    - python >=${{ python_min }}
    - scipy
    - numba
    - numpy >=1.21,<2.3
    - setuptools

tests:
  - python:
      imports:
        - pythermalcomfort
        - pythermalcomfort.models
        - pythermalcomfort.models.pmv_ppd_iso
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"
  - requirements:
      run:
        - pip
        - python ${{ python_min }}.*
    script:
      - pythermalcomfort

about:
  summary: Toolkit for thermal comfort indices, heat and cold stress metrics, and thermophysiological models
  description: |
    pythermalcomfort calculates thermal comfort indices, heat and cold stress
    metrics, and thermophysiological responses. It implements PMV, PPD,
    adaptive comfort, SET, UTCI, Heat Index, Wind Chill Index, Humidex, and
    other indices, plus the two-node (Gagge) and multinode (JOS-3)
    thermophysiological models for estimating core temperature, skin
    temperature, and skin wettedness.
  license: MIT
  license_file: LICENSE
  homepage: https://github.com/pythermalcomfort/pythermalcomfort
  repository: https://github.com/pythermalcomfort/pythermalcomfort
  documentation: https://pythermalcomfort.readthedocs.io/

extra:
  recipe-maintainers:
    - FedericoTartarini
    - TIAN-TOM
