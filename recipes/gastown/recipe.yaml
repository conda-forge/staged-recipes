context:
  version: "1.2.1"

package:
  name: gastown
  version: ${{ version }}

source:
  - url: https://github.com/gastownhall/gastown/archive/refs/tags/v${{ version }}.tar.gz
    sha256: f5c5efcdc1ecc40f2b8efb95a5826f88ba6196137bc2e919d60a39b42cf446ba
  # Windows-only dep `go-localereader` (MIT-licensed) misses standard license file layout,
  # so we have to manually add the license file
  - url: https://raw.githubusercontent.com/mattn/go-localereader/master/LICENSE
    sha256: dceede03550621e65ec7b79fcba87cf6dbb9d31132a8ae71a8fe8ceec0af7da3
    target_directory: library_licenses_2/github.com/go-localereader

build:
  number: 0
  script:
    # upstream ref: https://github.com/gastownhall/gastown/blob/main/Makefile
    # NOTE: we must use the old `steveyegge/gastown` GitHub owner-repo specifier for variables set via LDFLAGS since the code still references it and doesn't recognize `gastownhall/gastown`
    - if: unix
      then:
        - BUILD_TIME="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
        - SHORT_COMMIT_HASH="$(curl -s "https://api.github.com/repos/gastownhall/gastown/commits/v${{ version }}" | jq -r '.sha' | cut -c 1-7)"
        - go build -v -trimpath -ldflags="-s -w -X github.com/steveyegge/gastown/internal/cmd.Build=conda-forge -X github.com/steveyegge/gastown/internal/cmd.BuildTime=${BUILD_TIME} -X github.com/steveyegge/gastown/internal/cmd.BuiltProperly=1 -X github.com/steveyegge/gastown/internal/cmd.Commit=${SHORT_COMMIT_HASH} -X github.com/steveyegge/gastown/internal/cmd.Version=${{ version }}" -o="$PREFIX"/bin/gt ./cmd/gt
        - go build -v -trimpath -ldflags="-s -w -X github.com/steveyegge/gastown/internal/cmd.Build=conda-forge -X github.com/steveyegge/gastown/internal/cmd.BuildTime=${BUILD_TIME} -X github.com/steveyegge/gastown/internal/cmd.BuiltProperly=1 -X github.com/steveyegge/gastown/internal/cmd.Commit=${SHORT_COMMIT_HASH} -X github.com/steveyegge/gastown/internal/cmd.Version=${{ version }}" -o="$PREFIX"/bin/gt-proxy-client ./cmd/gt-proxy-client
        - go build -v -trimpath -ldflags="-s -w -X github.com/steveyegge/gastown/internal/cmd.Build=conda-forge -X github.com/steveyegge/gastown/internal/cmd.BuildTime=${BUILD_TIME} -X github.com/steveyegge/gastown/internal/cmd.BuiltProperly=1 -X github.com/steveyegge/gastown/internal/cmd.Commit=${SHORT_COMMIT_HASH} -X github.com/steveyegge/gastown/internal/cmd.Version=${{ version }}" -o="$PREFIX"/bin/gt-proxy-server ./cmd/gt-proxy-server
        # generate shell completions
        - mkdir -p "$PREFIX"/share/bash-completion/completions "$PREFIX"/share/fish/vendor_completions.d "$PREFIX"/share/zsh/site-functions
        - '"$PREFIX"/bin/gt completion bash > "$PREFIX"/share/bash-completion/completions/gt'
        - '"$PREFIX"/bin/gt completion fish > "$PREFIX"/share/fish/vendor_completions.d/gt.fish'
        - '"$PREFIX"/bin/gt completion zsh  > "$PREFIX"/share/zsh/site-functions/_gt'
    - if: win
      then:
        - for /f "usebackq delims=" %%T in (`powershell -Command "[DateTime]::UtcNow.ToString('yyyy-MM-ddTHH:mm:ssZ')"`) do set BUILD_TIME=%%T
        - for /f "usebackq delims=" %%T in (`powershell -Command "((Invoke-RestMethod 'https://api.github.com/repos/gastownhall/gastown/commits/v${{ version }}').sha).Substring(0, 7)"`) do set SHORT_COMMIT_HASH=%%T
        - go build -v -trimpath -ldflags="-s -w -X github.com/steveyegge/gastown/internal/cmd.Build=conda-forge -X github.com/steveyegge/gastown/internal/cmd.BuildTime=%BUILD_TIME% -X github.com/steveyegge/gastown/internal/cmd.BuiltProperly=1 -X github.com/steveyegge/gastown/internal/cmd.Commit=%SHORT_COMMIT_HASH% -X github.com/steveyegge/gastown/internal/cmd.Version=${{ version }}" -o="%LIBRARY_BIN%"\gt.exe ./cmd/gt
        - go build -v -trimpath -ldflags="-s -w -X github.com/steveyegge/gastown/internal/cmd.Build=conda-forge -X github.com/steveyegge/gastown/internal/cmd.BuildTime=%BUILD_TIME% -X github.com/steveyegge/gastown/internal/cmd.BuiltProperly=1 -X github.com/steveyegge/gastown/internal/cmd.Commit=%SHORT_COMMIT_HASH% -X github.com/steveyegge/gastown/internal/cmd.Version=${{ version }}" -o="%LIBRARY_BIN%"\gt-proxy-server.exe ./cmd/gt-proxy-server
        # generate shell completions
        - mkdir "%LIBRARY_PREFIX%"\share\bash-completion\completions
        - mkdir "%LIBRARY_PREFIX%"\share\fish\vendor_completions.d
        - mkdir "%LIBRARY_PREFIX%"\share\zsh\site-functions
        - '"%LIBRARY_BIN%"\gt.exe completion bash > "%LIBRARY_PREFIX%"\share\bash-completion\completions\gt'
        - '"%LIBRARY_BIN%"\gt.exe completion fish > "%LIBRARY_PREFIX%"\share\fish\vendor_completions.d\gt.fish'
        - '"%LIBRARY_BIN%"\gt.exe completion zsh  > "%LIBRARY_PREFIX%"\share\zsh\site-functions\_gt'
    - go-licenses save ./cmd/gt ./cmd/gt-proxy-client ./cmd/gt-proxy-server --save_path=library_licenses --ignore=github.com/mattn/go-localereader

requirements:
  build:
    - ${{ compiler("go-nocgo") }}
    - go-licenses

tests:
  - script:
      env:
        GT_REAL_BIN: bin/gt
      content:
        - gt --help
        - gt --version
        - gt-proxy-server --help
        - if: unix
          then: gt-proxy-client --help
  - package_contents:
      bin:
        - gt
        - gt-proxy-server
        - if: unix
          then: gt-proxy-client
      files:
        - if: unix
          then:
            - share/bash-completion/completions/gt
            - share/fish/vendor_completions.d/gt.fish
            - share/zsh/site-functions/_gt
        - if: win
          then:
            - Library/share/bash-completion/completions/gt
            - Library/share/fish/vendor_completions.d/gt.fish
            - Library/share/zsh/site-functions/_gt
      strict: true

about:
  summary: Multi-agent orchestration system for Claude Code, GitHub Copilot, and other AI agents with persistent work tracking
  description: |
    Gas Town is a workspace manager that lets you coordinate multiple AI coding
    agents (Claude Code, GitHub Copilot, Codex, Gemini, and others) working on
    different tasks. Instead of losing context when agents restart, Gas Town
    persists work state in git-backed hooks, enabling reliable multi-agent
    workflows.
  license: MIT
  license_file:
    - LICENSE
    - library_licenses/
    - library_licenses_2/
  homepage: https://github.com/gastownhall/gastown
  documentation: https://github.com/gastownhall/gastown/tree/main/docs
  repository: https://github.com/gastownhall/gastown

extra:
  recipe-maintainers:
    - salim-b
