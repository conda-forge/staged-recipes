schema_version: 1

context:
  version: "0.5.0"

package:
  name: rust-tomli
  version: ${{ version }}

source:
  url: https://github.com/blinxen/tomli/archive/refs/tags/${{ version }}.tar.gz
  sha256: 7ec2dafe3dba6f4bde950942e739fc4b590df356d85c7c28f0f7eb7864b0d138

build:
  script:
    - if: unix
      then:
        - cargo-bundle-licenses --format yaml --output "${SRC_DIR}/THIRDPARTY.yml"
        - cargo install --locked --bins --root "${PREFIX}" --path .
    - if: win
      then:
        - cargo-bundle-licenses --format yaml --output "%SRC_DIR%\THIRDPARTY.yml"
        - cargo install --locked --bins --root "%PREFIX%" --path .
  number: 0

requirements:
  build:
    - ${{ compiler('rust') }}
    - ${{ stdlib("c") }}
    - cargo-bundle-licenses

tests:
  - script:
      - tomli --help

about:
  homepage: https://github.com/blinxen/tomli
  summary: A format-preserving command-line tool for querying and editing TOML files
  description: |
    tomli is a format-preserving command-line tool for querying and editing TOML files.
    It supports querying TOML files using jq-like syntax, editing values with support
    for multiple data types (strings, integers, floats, booleans, and datetime in
    RFC3339 format), deleting keys or array elements, and copying items between files.
  license: MIT
  license_file:
    - LICENSE
    - THIRDPARTY.yml
  repository: https://github.com/blinxen/tomli

extra:
  recipe-maintainers:
    - phreed
