{% set python_min = "3.9" %}

package:
  name: anidms
  version: "1.1.0"

source:
  url: https://pypi.org/project/anidms/#anidms-1.1.0.tar.gz
  sha256: 0836396382b2b84f55efd1c34ff84be61c14e8a05e1ee182fb2195ede19972e6

build:
  number: 0
  noarch: python
  script: "{{ PYTHON }} -m pip install . --no-deps -vv"

requirements:
  host:
    - python {{ python_min }}
    - pip
    - setuptools
  run:
    - python >={{ python_min }}
    - pandas >=1.3.0
    - numpy >=1.20.0
    - xarray >=0.18.0
    - scipy >=1.7.0
    - netcdf4 >=1.5.0
    - requests >=2.25.0
    - pyproj >=3.0.0

test:
  imports:
    - anidms
  requires:
    - python {{ python_min }}
  commands:
    - python -c "from anidms import AniDMS; print(AniDMS.__name__)"

about:
  home: https://github.com/BEGIN-StAndrews/AniDMS
  license: MIT
  license_file: LICENSE
  summary: AniDMS package for querying monthly file for DMS estimation (daily, 4km) and LAEA-based annotation.

extra:
  recipe-maintainers:
    - MeixuanLiuu
