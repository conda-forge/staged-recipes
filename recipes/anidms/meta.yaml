{% set python_min = "3.9" %}

package:
  name: anidms
  version: "1.1.0"

source:
  url: https://files.pythonhosted.org/packages/67/1d/4676a0870edd76506e968b197b1f6781d343c2c37d9d754158c0d8fa089f/anidms-1.1.0.tar.gz
  sha256: 0836396382b2b84f55efd1c34ff84be61c14e8a05e1ee182fb2195ede19972e6

build:
  number: 0
  noarch: python

requirements:
  host:
    - python {{ python_min }}
    - pip
    - setuptools
  run:
    - python >={{ python_min }}
    - pandas >=1.3.0
    - numpy >=1.20.0
    - xarray >=0.18.0
    - scipy >=1.7.0
    - netcdf4 >=1.5.0
    - requests >=2.25.0
    - pyproj >=3.0.0

test:
  imports:
    - anidms
  requires:
    - python {{ python_min }}

about:
  home: https://github.com/BEGIN-StAndrews/AniDMS
  license: MIT
  license_file: LICENSE
  summary: AniDMS package for querying monthly file for DMS estimation (daily, 4km) and LAEA-based annotation.

extra:
  recipe-maintainers:
    - MeixuanLiuu


