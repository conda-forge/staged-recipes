{% set name = "anidms" %}
{% set version = "1.1.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/project/anidms/#anidms-1.1.0.tar.gz
  sha256: 0836396382b2b84f55efd1c34ff84be61c14e8a05e1ee182fb2195ede19972e6

build:
  noarch: python
  script: "{{ PYTHON }} -m pip install . --no-deps -vv"

requirements:
  host:
    - python >=3.9
    - pip
    - setuptools
  run:
    - python >=3.9
    - pandas >=1.3.0
    - numpy >=1.20.0
    - xarray >=0.18.0
    - scipy >=1.7.0
    - netcdf4 >=1.5.0
    - requests >=2.25.0
    - pyproj >=3.0.0

test:
  imports:
    - anidms
  commands:
    - python -c "from anidms import AniDMS; print(AniDMS.__name__)"

about:
  summary: AniDMS package for querying monthly file for DMS estimation (daily, 4km) and LAEA-based annotation.
  license: MIT

extra:
  recipe-maintainers:
    - MeixuanLiuu