context:
  gem_name: "base64"
  version: "0.3.0"

package:
  name: rb-${{ gem_name }}
  version: ${{ version }}

source:
  url: https://rubygems.org/downloads/${{ gem_name }}-${{ version }}.gem
  sha256: 27337aeabad6ffae05c265c450490628ef3ebd4b67be58257393227588f5a97b

build:
  noarch: generic
  number: 0
  script: build

requirements:
  host:
    - ruby
  run:
    - ruby

tests:
  - script:
      - ruby -r base64 -e "exit 0"

about:
  homepage: https://rubygems.org/gems/${{ gem_name }}
  summary: Support for encoding and decoding binary data using a Base64 representation.
  license: Ruby AND BSD-2-Clause
  license_file: ${{ gem_name }}-${{ version }}/BSDL
  repository: https://github.com/ruby/base64

extra:
  recipe-maintainers:
    - aktech
