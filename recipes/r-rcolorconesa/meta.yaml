{% set version = '1.0.0' %}

{% set posix = 'm2-' if win else '' %}
{% set native = 'm2w64-' if win else '' %}

package:
  name: r-rcolorconesa
  version: {{ version|replace("-", "_") }}

source:
  url:
    - {{ cran_mirror }}/src/contrib/RColorConesa_{{ version }}.tar.gz
    - {{ cran_mirror }}/src/contrib/Archive/RColorConesa/RColorConesa_{{ version }}.tar.gz
  sha256: 46f1ac3a18fcb4764aa1e0d5acb71652cc5616959c6c9fbceaaae179e15e822c

build:
  merge_build_host: True  # [win]
  # If this is a new build for the same version, increment the build number.
  number: 0
  # no skip

  # This is required to make R link correctly on Linux.
  rpaths:
    - lib/R/lib/
    - lib/

# Suggests: testthat (>= 3.0.0)
requirements:
  build:
    - {{ posix }}zip               # [win]

  host:
    - r-base
    - r-ggplot2

  run:
    - r-base
    - r-ggplot2

test:
  commands:
    # You can put additional test commands to be run here.
    - $R -e "library('RColorConesa')"           # [not win]
    - "\"%R%\" -e \"library('RColorConesa')\""  # [win]

  # You can also put a file called run_test.r, run_test.py, run_test.sh,
  # or run_test.bat in the recipe that will be run at test time.

  # requires:
    # Put any additional test requirements here.

about:
  home: https://CRAN.R-project.org/package=RColorConesa
  license: MIT
  summary: Provides a collection of palettes designed to integrate with 'ggplot', reflecting
    the color schemes associated with 'ConesaLab'.
  license_family: MIT
  license_file:
    - '{{ environ["PREFIX"] }}/lib/R/share/licenses/MIT'
    - LICENSE
extra:
  recipe-maintainers:
    - pabloati
