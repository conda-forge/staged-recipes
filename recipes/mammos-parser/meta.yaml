{% set name = "mammos-parser" %}
{% set version = "0.1.0" %}
{% set python_min = "3.11" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/mammos_parser-{{ version }}.tar.gz
  sha256: d6cf9882898f241eb4c8f4d52d4c219179868b56c4fc4e30306705e59bdda94e

build:
  entry_points:
    - mammos-parser = mammos_parser.main:main
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python >={{ python_min }}
    - hatchling
    - pip
  run:
    - python >={{ python_min }}
    - cerberus >=1.3.5
    - mammos-analysis
    - mammos-entity >=0.13.0
    - numpy
    - pandas
    - pyyaml
    - rich
    - scipy

test:
  imports:
    - mammos_parser
  commands:
    - pip check
    - mammos-parser --help
  requires:
    - pip

about:
  home: https://mammos-project.github.io
  summary: Parse datasets from the MaMMoS project partners
  license: MIT
  license_file: LICENSE
  dev_url: https://github.com/mammos-project/mammos-parser

extra:
  recipe-maintainers:
    - andrea-petrocchi
    - lang-m
    - fangohr
