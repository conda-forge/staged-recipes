{% set name = "ptir5" %}
{% set version = "0.1.0" %}
{% set python_min = "3.11" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz
  sha256: d00be847ca34c9ac044415723424d042441cb3b49780a343d1cdfc6444c4b9d2

build:
  number: 0
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python {{ python_min }}
    - hatchling
    - pip
  run:
    - python >={{ python_min }}
    - h5py >=3.9
    - numpy >=1.24

test:
  imports:
    - ptir5
  requires:
    - python {{ python_min }}
    - pip
  commands:
    - pip check

about:
  home: https://github.com/photothermal/PTIR5-py
  license: MIT
  license_family: MIT
  license_file: LICENSE
  summary: Read-only Python library for PTIR5 files (HDF5-based format from Photothermal Spectroscopy Corp.)
  description: |
    ptir5 is a read-only Python library for PTIR5 files, the HDF5-based native
    format of Photothermal Spectroscopy Corp.'s PTIR Studio software (v5.0+).
    It provides access to measurement data as numpy arrays with lazy loading,
    typed metadata, and a navigable tree of measurements.
  dev_url: https://github.com/photothermal/PTIR5-py
  doc_url: https://github.com/photothermal/PTIR5-py

extra:
  recipe-maintainers:
    - andrew-stuart
