context:
  version: "0.10.0"

package:
  name: hunk
  version: ${{ version }}

source:
  url: https://github.com/modem-dev/hunk/archive/refs/tags/v${{ version }}.tar.gz
  sha256: 298caf795ef74a55b0f92bf3d1477ad195d35824ed05197864f16c35b2589ac6

build:
  number: 0
  skip:
    - win
  script:
    content:
      - bun install --frozen-lockfile --ignore-scripts
      - bash scripts/build-bin.sh
      - mkdir -p "${PREFIX}/bin"
      - install -m 0755 dist/hunk "${PREFIX}/bin/hunk"
      - mkdir -p "${PREFIX}/skills"
      - cp -R skills/hunk-review "${PREFIX}/skills/"

requirements:
  build:
    - bun
    - bash
    - coreutils
  run:
    - bun

tests:
  - script:
      - hunk skill path
  - package_contents:
      bin:
        - hunk

about:
  homepage: https://github.com/modem-dev/hunk
  summary: Review-first terminal diff viewer for agentic coders
  description: |
    Hunk is a terminal diff viewer for reviewing and understanding
    agent-authored changesets.
  license: MIT
  license_file: LICENSE
  repository: https://github.com/modem-dev/hunk

extra:
  recipe-maintainers:
    - moritzwilksch
