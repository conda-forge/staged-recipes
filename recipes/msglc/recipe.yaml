schema_version: 1

context:
  version: 260423

package:
  name: msglc
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/m/msglc/msglc-${{ version }}.tar.gz
  sha256: e173f561e3aaa0a868d0c349bbc7f25dc79a5e58a150e44b6ed9c35482b95f85

build:
  number: 0
  skip: match(python, "<3.10")
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  build:
    - ${{ compiler('c') }}
  host:
    - python
    - maturin >=1
    - cython
    - pip
  run:
    - python
    - bitarray
    - cbor2
    - msgpack-python >=1
    - universal-pathlib

tests:
  - python:
      imports:
        - msglc
      pip_check: true

about:
  summary: binary json representation (msgpack or cbor) with lazy/partial loading containers
  license: GPL-3.0-only
  license_file: LICENSE
  homepage: https://github.com/TLCFEM/msglc
  repository: https://github.com/TLCFEM/msglc

extra:
  recipe-maintainers:
    - jan-janssen
