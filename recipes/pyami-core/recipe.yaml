schema_version: 1

context:
  version: "5.1.4"

package:
  name: pyami-core
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/p/pyami-core/pyAMI_core-${{ version }}.tar.gz
  sha256: 1f246990b52a659361a2658648c551990e8d554aada7efe90a8a21452b118ae4
  patches:
    - patches/0001-drop-old-dependencies.patch
    - patches/0002-fix-httpsconnection.patch
    - patches/0003-add-main-function-for-entrypoint.patch
    - patches/0004-add-lxml-dep.patch
    - patches/0005-raw-strings-for-W.patch

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  python:
    entry_points:
      - ami=pyAMI.app:main

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
  run:
    - python >=${{ python_min }}
    - lxml

tests:
  - python:
      imports:
        - pyAMI
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"
  - script:
      - ami --help

about:
  summary: Python ATLAS Metadata Interface (pyAMI)
  homepage: http://ami.in2p3.fr/
  repository: https://github.com/ami-team/pyAMI-core
  documentation: https://ami.in2p3.fr/pyAMI/pyAMI5_core_api.html
  license: LGPL-2.1-only
  license_file: pyAMI/LICENSE.txt

extra:
  recipe-maintainers:
    - kratsg
