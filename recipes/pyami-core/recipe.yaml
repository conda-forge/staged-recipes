schema_version: 1

context:
  version: "5.1.4"
  python_min: "3.10"

package:
  name: pyami-core
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/p/pyami-core/pyAMI_core-${{ version }}.tar.gz
  sha256: 1f246990b52a659361a2658648c551990e8d554aada7efe90a8a21452b118ae4
  patches:
    - patches/0001-drop-old-dependencies.patch
    - patches/0002-fix-httpsconnection.patch

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  python:
    entry_points:
      - ami=ami:entry_point

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
  run:
    - python >=${{ python_min }}

tests:
  - python:
      imports:
        - pyAMI
      pip_check: true
      python_version: ${{ python_min }}.*
  - script:
      - ami --help

about:
  summary: Python ATLAS Metadata Interface (pyAMI)
  homepage: http://ami.in2p3.fr/
  repository: https://github.com/ami-team/pyAMI-core
  documentation: https://ami.in2p3.fr/pyAMI/pyAMI5_core_api.html
  license: LGPL-2.1-only
  license_file: pyAMI/LICENSE.txt

extra:
  recipe-maintainers:
    - kratsg
