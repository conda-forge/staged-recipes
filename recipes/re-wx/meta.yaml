{% set name = "re-wx" %}
{% set version = "0.1.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/re-wx-{{ version }}.tar.gz
  sha256: 34598db10bec2ace2b1d2b1bf0f512dc7ee81a5bd48166e7093a323ec1d88b51

build:
  number: 0
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python
    - pip
    - setuptools
    - wheel

  run:
    - python
    - wxpython >=4.1.0

test:
  imports:
    - rewx
  requires:
    - pip
  commands:
    - pip check

about:
  home: https://github.com/chriskiehl/re-wx/
  summary: A library for building modern declarative desktop applications.
  license: MIT
  license_family: MIT
  license_file: LICENSE.txt
  description: |
    re-wx is a library for building modern declarative desktop applications.
    It's built as a management layer on top of wxPython, giving you a React-inspired API.
  dev_url: https://github.com/chriskiehl/re-wx/

extra:
  recipe-maintainers:
    - sbillinge
    - cadenmyers13
