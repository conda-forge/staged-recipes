schema_version: 1

context:
  version: "0.5.3"

package:
  name: quack-kernels
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/q/quack-kernels/quack_kernels-${{ version }}.tar.gz
  sha256: e295c3861ffebca44f6adafff9bf9bc55102a7178b3e1690b2c4cd8f7e0533ff

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - setuptools
    - pip
  run:
    - python >=${{ python_min }}
    - nvidia-cutlass-dsl ==4.6.0.dev0
    - pytorch
    - apache-tvm-ffi >=0.1.6,<0.2
    - torch-c-dlpack-ext
    - einops

tests:
  - python:
      python_version:
        - '*'
        - ${{ python_min }}.*
      imports:
        - quack
      pip_check: true

about:
  license: Apache-2.0
  license_file: LICENSE
  repository: https://github.com/Dao-AILab/quack
  summary: A Quirky Assortment of CuTe Kernels 
  homepage: https://pypi.org/project/quack-kernels/

extra:
  recipe-maintainers:
    - xhochy
