context:
  version: 3.0.1
  python_min: "3.11"

package:
  name: python-couchdb3
  version: ${{ version }}

source:
- url: https://pypi.org/packages/source/c/couchdb3/couchdb3-${{ version }}.tar.gz
  sha256: a084ecda52de863b278c12eb6fbda46e6072dadc3b09562be0d96ebc1bb5465a

build:
  number: 0
  script: ${{ PYTHON }} -m pip install .
  noarch: python

requirements:
  host:
  - python ${{ python_min }}.*
  - uv-build >=0.10.9,<0.11.0
  - pip
  run:
  - python >=${{ python_min }}
  - requests <3.0.0,>=2.32.4

tests:
- python:
    imports:
    - couchdb3
    pip_check: true
    python_version: ${{ python_min }}.*

about:
  summary: A wrapper around the CouchDB API
  homepage: https://n-vlahovic.github.io/couchdb3/
  license: MIT
  license_file: LICENSE
  repository: https://github.com/N-Vlahovic/couchdb3
  documentation: https://n-vlahovic.github.io/couchdb3/

extra:
  recipe-maintainers:
    - chrisburr
