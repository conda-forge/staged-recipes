context:
  version: "0.0.6"

package:
  name: cell-gps
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/c/cell-gps/cell_gps-${{ version }}.tar.gz
  sha256: 7e273f817c35977e535872962f71cfd6c8b346ddf9d96f8a069daf1c1b52fc4c

build:
  noarch: python
  number: 0
  script: ${{ PYTHON }} -m pip install . --no-deps --no-build-isolation -vv
  python:
    entry_points:
      - cellgps-gui = cellgps.gui.gui_app:main

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - setuptools >=61.0
    - wheel
  run:
    - python >=${{ python_min }}
    - pandas >=1.3
    - numpy >=1.21
    - matplotlib-base >=3.4
    - seaborn >=0.11
    - scikit-learn >=1.0
    - scipy >=1.7
    - psutil >=5.8
    - joblib >=1.1
    - tqdm >=4.60
    - pillow

tests:
  - python:
      imports:
        - cellgps
        - sfplot
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  homepage: https://github.com/hutaobo/Cell-GPS
  repository: https://github.com/hutaobo/Cell-GPS
  documentation: https://github.com/hutaobo/Cell-GPS#readme
  summary: Cell-GPS spatial topology analysis for spatial omics data.
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - hutaobo
