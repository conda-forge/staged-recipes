schema_version: 1

context:
  # c.f. https://github.com/google/orbax/tree/3a4bbe907539767f41fbcc4ef2fcde5db9ae8292/export
  version: "0.0.8"
  python_min: "3.10"

package:
  name: orbax-export
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/o/orbax-export/orbax_export-${{ version }}.tar.gz
  sha256: 544eef564e2a6f17cd11b1167febe348b7b7cf56d9575de994a33d5613dd568a

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - flit-core >=3.5,<4
    - pip
  run:
    - python >=${{ python_min }}
    - absl-py
    - dataclasses-json
    - etils
    - jax >=0.4.34
    - jaxlib
    - jaxtyping
    - numpy
    - protobuf
    - orbax-checkpoint >=0.9.0
    # c.f. https://github.com/google/orbax/blob/3a4bbe907539767f41fbcc4ef2fcde5db9ae8292/export/README.md?plain=1#L11
    - tensorflow

tests:
  - package_contents:
      site_packages:
        - orbax.export

  - python:
      imports:
        - orbax.export
      pip_check: true
      python_version: ${{ python_min }}.*


about:
  summary: Orbax Export
  license: Apache-2.0
  license_file: LICENSE
  homepage: https://github.com/google/orbax
  repository: https://github.com/google/orbax
  documentation: https://orbax.readthedocs.io/

extra:
  recipe-maintainers:
    - conda-forge/flax
