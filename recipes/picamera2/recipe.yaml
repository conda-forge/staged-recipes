context:
  version: 0.3.34

package:
  name: picamera2
  version: ${{ version }}

source:
  - url: https://pypi.org/packages/source/p/picamera2/picamera2-${{ version }}.tar.gz
    sha256: fa923c2d25a124b1b591b332e10836a08690a1cf6bd233bb25862466d881229d

build:
  number: 0
  script: ${{ PYTHON }} -m pip install .
  skip:
    - win
    - osx

requirements:
  host:
    - python
    - pip
    - setuptools
  run:
    - python
    - libcamera
    - pidng
    - av
    - jsonschema
    - pykms
    - python-libarchive-c
    - numpy
    - piexif
    - pillow
    - python-prctl
    - simplejpeg
    - tqdm
    - py-videodev2
    - openexr-python
  # - pyqt5  # extra == "gui"
  # - pyopengl  # extra == "gui"

tests:
  - python:
      imports:
        - picamera2
      pip_check: true

about:
  homepage: https://github.com/RaspberryPi/picamera2
  summary: The libcamera-based Python interface to Raspberry Pi cameras, based on the original Picamera library
  license: BSD-2-Clause
  license_file: LICENSE

extra:
  recipe-maintainers:
    - carlodri
