schema_version: 1

context:
  version: "1.2.5"
  python_min: "3.10"

package:
  name: grimoirelab-toolkit
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/g/grimoirelab-toolkit/grimoirelab_toolkit-${{ version }}.tar.gz
  sha256: d824ed34bcca19182f4a15b04615350bc040a7f84e5761676ded3816f0c03ec0

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - poetry-core
    - pip
  run:
    - python >=${{ python_min }}
    - python-dateutil >=2.8.2,<3.0.0

tests:
  - python:
      imports:
        - grimoirelab_toolkit
      pip_check: true

about:
  summary: Toolkit of common functions used across GrimoireLab
  license: GPL-3.0-only
  license_file: LICENSE
  homepage: https://chaoss.github.io/grimoirelab/

extra:
  recipe-maintainers:
    - travishathaway
