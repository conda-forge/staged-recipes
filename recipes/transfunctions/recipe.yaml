schema_version: 1

context:
  version: "0.0.12"

package:
  name: transfunctions
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/t/transfunctions/transfunctions-${{ version }}.tar.gz
  sha256: a95980cdba8dc614db0e186031da038a0547051973a5bf01fdecdbd50be8cae5

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - setuptools ==68.0.0
    - pip
  run:
    - python >=${{ python_min }}
    - displayhooks >=0.0.6
    - getsources >=0.0.3
    - typing_extensions

tests:
  - python:
      imports:
        - transfunctions
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  summary: Say NO to Python fragmentation on sync and async
  license: MIT
  license_file: LICENSE
  homepage: https://github.com/mutating/transfunctions

extra:
  recipe-maintainers:
    - thewchan
