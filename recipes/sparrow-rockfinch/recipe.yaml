context:
  version: "0.2.2"

package:
  name: sparrow-rockfinch
  version: ${{ version }}

source:
  url: https://github.com/sparrow-org/sparrow-rockfinch/archive/refs/tags/v${{ version }}.tar.gz
  sha256: bd0a43f03f0f47ae395aae8730f64278fa473fc0de4ad0c4ad8a66914e0426ec

build:
  number: 0
  script:
    - if: unix
      then: export CMAKE_GENERATOR=Ninja
    - python -m pip install . --no-build-isolation -vv -Ccmake.define.FETCH_DEPENDENCIES_WITH_CMAKE=OFF -Ccmake.define.SPARROW_ROCKFINCH_BUILD_TESTS=OFF -Ccmake.define.SPARROW_ROCKFINCH_BUILD_SHARED=ON -Ccmake.define.SPARROW_ROCKFINCH_BUILD_PYTHON_MODULE=ON

requirements:
  build:
    - ${{ compiler("cxx") }}
    - cmake >=4.0
    - ninja >=1.13
  host:
    - python
    - pip
    - cmake >=4.0
    - ninja >=1.13
    - scikit-build-core >=0.10
    - nanobind >=2.0
    - sparrow-devel >=2.1.0
  run:
    - python
    - sparrow >=2.1.0

tests:
  - python:
      imports:
        - sparrow_rockfinch
      pip_check: false

about:
  homepage: https://github.com/sparrow-org/sparrow-rockfinch
  summary: C++ library for zero-copy Apache Arrow data exchange between C++ and Python via PyCapsules
  description: |
    sparrow-rockfinch provides a clean C++ API for exporting sparrow arrays to
    Python as PyCapsules (Arrow C Data Interface) and importing Arrow data from
    Python PyCapsules into sparrow arrays. It enables zero-copy data exchange
    with Python libraries like Polars, PyArrow, and pandas, and includes a
    SparrowArray Python class that implements the Arrow PyCapsule Interface.
  license: Apache-2.0
  license_file: LICENSE
  documentation: https://github.com/sparrow-org/sparrow-rockfinch#readme
  repository: https://github.com/sparrow-org/sparrow-rockfinch

extra:
  recipe-maintainers:
    - Alex-PLACET
