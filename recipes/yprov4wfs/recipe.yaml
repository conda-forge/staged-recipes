schema_version: 1

context:
  version: "0.0.8"

package:
  name: yprov4wfs
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/y/yprov4wfs/yprov4wfs-${{ version }}.tar.gz
  sha256: 9e05b9a84f6a1cd240880a43fe8212f2e26818e54b2e5746abe4e1b9d579c152

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python >=3.8
    - setuptools >=42
    - pip
  run:
    - python >=3.6

tests:
  - python:
      imports:
        - yprov4wfs
      pip_check: true

about:
  summary: A module for tracking the provenance of a workflow using a Workflow Management System.
  license: GPL-3.0-only
  license_file: LICENSE
  homepage: https://github.com/HPCI-Lab/yProv4WFs

extra:
  recipe-maintainers:
    - martinRenou
