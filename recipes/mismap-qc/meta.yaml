{% set version = "0.1.0" %}
{% set python_min = "3.10" %}

package:
  name: mismap-qc
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/m/mismap-qc/mismap_qc-{{ version }}.tar.gz
  sha256: 738c9ccf5e46aec40447621b30be85b347c88f65ebcacc9f3e6ecc153a77645a

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - hatchling
    - pip
  run:
    - python >={{ python_min }}
    - numpy
    - matplotlib-base
    - scipy
    - pandas

test:
  imports:
    - mismap_qc
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://github.com/foertsch/mismap-qc
  summary: Missing-data matrix for RNA-Seq and proteomics QC
  description: |
    mismap-qc visualises which genes (or any features) are detected vs missing
    across samples, with hierarchical clustering and multi-level colour
    annotation strips for experimental metadata. Supports static matplotlib
    output and interactive Plotly HTML export.
  license: MIT
  license_file: LICENSE
  dev_url: https://github.com/foertsch/mismap-qc
  doc_url: https://github.com/foertsch/mismap-qc

extra:
  recipe-maintainers:
    - foertsch
