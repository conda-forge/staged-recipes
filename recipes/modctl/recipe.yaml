context:
  version: "0.1.2"

package:
  name: modctl
  version: ${{ version }}

source:
  url: https://github.com/modelpack/modctl/archive/refs/tags/v${{ version }}.tar.gz
  sha256: b8f17e5c219cdffcb1cb4f2e7c7b3e9ebd2b597243146c9e992b5b259590fa34
  target_directory: src

build:
  number: 0
  script:
    - cd src
    - go-licenses save . --save_path ../library_licenses
    - if: unix
      then:
        - BUILD_TIME=$(date -u +%Y-%m-%dT%H:%M:%SZ)
        - SHORT_COMMIT_HASH="$(curl -s "https://api.github.com/repos/modelpack/modctl/commits/v${{ version }}" | jq -r '.sha' | cut -c 1-7)
        - go build -v -o $PREFIX/bin/modctl -ldflags="-s -w -X github.com/modelpack/modctl/pkg/version.BuildTime=${BUILD_TIME} -X github.com/modelpack/modctl/pkg/version.GitCommit=${SHORT_COMMIT_HASH}"
        # generate shell completions
        - mkdir -p $PREFIX/share/bash-completion/completions $PREFIX/share/fish/vendor_completions.d $PREFIX/share/zsh/site-functions
        - $PREFIX/bin/modctl completion bash > $PREFIX/share/bash-completion/completions/modctl
        - $PREFIX/bin/modctl completion fish > $PREFIX/share/fish/vendor_completions.d/modctl.fish
        - $PREFIX/bin/modctl completion zsh > $PREFIX/share/zsh/site-functions/_modctl
    - if: win
      then:
        - for /f "usebackq delims=" %%T in (`powershell -Command "[DateTime]::UtcNow.ToString('yyyy-MM-ddTHH:mm:ssZ')"`) do set BUILD_TIME=%%T
        - for /f "usebackq delims=" %%S in (`powershell -Command "((Invoke-RestMethod 'https://api.github.com/repos/modelpack/modctl/commits/v${{ version }}').sha).Substring(0, 7)"`) do set SHORT_COMMIT_HASH=%%S
        - go build -v -o %LIBRARY_BIN%\modctl.exe -ldflags="-s -w -X github.com/modelpack/modctl/pkg/version.BuildTime=%BUILD_TIME% -X github.com/modelpack/modctl/pkg/version.GitCommit=%SHORT_COMMIT_HASH%"
        # generate shell completions
        - mkdir %LIBRARY_PREFIX%\share\bash-completion\completions
        - mkdir %LIBRARY_PREFIX%\share\fish\vendor_completions.d
        - mkdir %LIBRARY_PREFIX%\share\zsh\site-functions
        - '%LIBRARY_BIN%\modctl.exe completion bash > %LIBRARY_PREFIX%\share\bash-completion\completions\modctl'
        - '%LIBRARY_BIN%\modctl.exe completion fish > %LIBRARY_PREFIX%\share\fish\vendor_completions.d\modctl.fish'
        - '%LIBRARY_BIN%\modctl.exe completion zsh > %LIBRARY_PREFIX%\share\zsh\site-functions\_modctl'
  skip:
    # Windows is currently unsupported, cf. https://github.com/modelpack/modctl/issues/472
    - win

requirements:
  build:
    - ${{ compiler("go-nocgo") }}
    - go-licenses

tests:
  - script:
      - modctl --help
      - modctl version
  - package_contents:
      bin:
        - modctl
      files:
        - if: unix
          then:
            - share/bash-completion/completions/modctl
            - share/fish/vendor_completions.d/modctl.fish
            - share/zsh/site-functions/_modctl
        - if: win
          then:
            - Library/share/bash-completion/completions/modctl
            - Library/share/fish/vendor_completions.d/modctl.fish
            - Library/share/zsh/site-functions/_modctl
      strict: true

about:
  summary: A CLI tool for managing OCI model artifacts bundled based on the ModelPack specification
  description: |
    Modctl is a user-friendly CLI tool for managing OCI model artifacts, which are
    bundled based on the ModelPack Model Specification. It offers commands such as
    build, pull, push, and more, making it easy to interact with AI/ML model registries.
  license: Apache-2.0
  license_file:
    - src/LICENSE
    - library_licenses/
  homepage: https://modelpack.org/
  repository: https://github.com/modelpack/modctl

extra:
  recipe-maintainers:
    - salim-b
