schema_version: 1

context:
  version: "2.6.0"

package:
  name: ansible-inventory-grapher
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/a/ansible-inventory-grapher/ansible_inventory_grapher-${{ version }}.tar.gz
  sha256: 7a782e3f50e11f6dec8f3663e063ac906eff292a628be7bd3cc473faec5a3d19

build:
  noarch: python
  number: 0
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  python:
    entry_points:
      - ansible-inventory-grapher = ansibleinventorygrapher.cli:main

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - setuptools
  run:
    - python >=${{ python_min }}
    - ansible-core >=2.12

tests:
  - python:
      imports:
        - ansibleinventorygrapher
      python_version: ${{ python_min }}.*
      pip_check: true

about:
  summary: |
    Creates graphs representing ansible inventory
  homepage: https://github.com/willthames/ansible-inventory-grapher
  repository: https://github.com/willthames/ansible-inventory-grapher
  license: GPL-3.0-only
  license_file: LICENSE.txt

extra:
  recipe-maintainers:
    - killua156
    - mgorny
