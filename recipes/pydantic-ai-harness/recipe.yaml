schema_version: 1

context:
  version: "0.1.1"

package:
  name: pydantic-ai-harness
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/p/pydantic-ai-harness/pydantic_ai_harness-${{ version }}.tar.gz
  sha256: 32a5e5859fa211bef1d53fa298c45f4be0a137f99266bc1fc81674298592e021

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - hatchling
    - uv-dynamic-versioning >=0.7.0
    - pip
  run:
    - python >=${{ python_min }}
    - pydantic-ai-slim >=1.80.0

tests:
  - python:
      imports:
        - pydantic_ai_harness
      pip_check: true
      python_version: ${{ python_min }}.*

about:
  summary: The batteries for your Pydantic AI agent
  license: MIT
  license_file: LICENSE
  homepage: https://github.com/pydantic/pydantic-ai-harness
  repository: https://github.com/pydantic/pydantic-ai-harness

extra:
  recipe-maintainers:
    - moritzwilksch
