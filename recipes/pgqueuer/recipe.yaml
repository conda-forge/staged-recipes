schema_version: 1

context:
  version: "1.2.0"

package:
  name: pgqueuer
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/p/pgqueuer/pgqueuer-${{ version }}.tar.gz
  sha256: dfb47d4f23a3b8cb87ba696db2a902882ece7ab19704e093e2007b722f952b9a

build:
  number: 0
  noarch: python
  python:
    # declare the CLI here so conda generates working launchers at install
    # time; the pip generated pgq.exe hardcodes the build prefix and fails
    # on Windows
    entry_points:
      - pgq = pgqueuer.__main__:main
  script:
    env:
      SETUPTOOLS_SCM_PRETEND_VERSION: ${{ version }}
    content: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - setuptools >=64
    - setuptools-scm >=8
    - wheel
  run:
    - python >=${{ python_min }}
    - anyio >=4.0
    - croniter >=5.0.1
    - pydantic >=2.0.0
    - pydantic-settings >=2.6.1
    - tabulate >=0.9.0
    - typer >=0.15.1
    # uvloop is a unix only dependency; the virtual packages let the solver
    # pick the right noarch variant per platform (see noarch_platforms in
    # conda-forge.yml)
    - if: unix
      then:
        - __unix
        - uvloop >=0.22.0
      else:
        - __win

tests:
  - python:
      imports:
        - pgqueuer
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"
  - script:
      env:
        # pgqueuer renders --help via rich (Unicode box drawing); force UTF-8
        # so it works on the default Windows console codepage
        PYTHONUTF8: "1"
      content:
        - python -m pgqueuer --help
        - pgq --help

about:
  homepage: https://github.com/janbjorge/pgqueuer
  repository: https://github.com/janbjorge/pgqueuer
  documentation: https://github.com/janbjorge/pgqueuer/wiki
  summary: Pgqueuer is a Python library leveraging PostgreSQL for efficient job queuing
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - killua156
    - mgorny
