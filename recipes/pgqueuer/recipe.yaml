schema_version: 1

context:
  version: "1.2.0"

package:
  name: pgqueuer
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/p/pgqueuer/pgqueuer-${{ version }}.tar.gz
  sha256: dfb47d4f23a3b8cb87ba696db2a902882ece7ab19704e093e2007b722f952b9a

build:
  number: 0
  # Not noarch: pgqueuer requires uvloop at runtime on non-Windows only
  # (sys_platform != "win32"), and uvloop has no conda-forge build for win.
  # A noarch package can't carry a platform-specific run dep, so this builds
  # per platform with uvloop added conditionally below.
  script:
    env:
      SETUPTOOLS_SCM_PRETEND_VERSION: ${{ version }}
    content: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python
    - pip
    - setuptools >=64
    - setuptools-scm >=8
    - wheel
  run:
    - python
    - anyio >=4.0
    - croniter >=5.0.1
    - pydantic >=2.0.0
    - pydantic-settings >=2.6.1
    - tabulate >=0.9.0
    - typer >=0.15.1
    - if: not win
      then:
        - uvloop >=0.22.0

tests:
  - python:
      imports:
        - pgqueuer
      pip_check: true
  - script:
      - pgq --help

about:
  homepage: https://github.com/janbjorge/pgqueuer
  repository: https://github.com/janbjorge/pgqueuer
  documentation: https://github.com/janbjorge/pgqueuer/wiki
  summary: Pgqueuer is a Python library leveraging PostgreSQL for efficient job queuing
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - killua156
    - mgorny
