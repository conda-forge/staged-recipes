context:
  version: 3.3.0

package:
  name: pninexus
  version: ${{ version }}

source:
  url: https://github.com/pni-libraries/python-pninexus/archive/refs/tags/v${{ version }}.tar.gz
  sha256: 4833db1524715f7172cdb63948364019c7cc44c284e612f1d103e8bd4ee2b89a
  patches:
    - add-empty-scalar-test.patch
  
build:
  noarch: python
  number: 0
  script:
    - if: win
      then:  set CL=/DH5_BUILT_AS_DYNAMIC_LIB=1 %CL%
    - if: win
      then:  set HDF5_HL_LOCAL_PATH="mylib"
    - if: win
      then:  python setup.py install  --prefix=%PREFIX%
      else: HDF5_HL_LOCAL_PATH=/mylib python -m pip install . -vv --no-deps --no-build-isolation --prefix=$PREFIX
    - if: win
      then:  python setup.py install
      else: HDF5_HL_LOCAL_PATH=/mylib python setup.py install
    - python -m pytest test
    
requirements:
  build:
    - ${{ compiler('cxx') }}
    - ${{ stdlib('c') }}
    - python
    - cmake
    - ninja
    - sphinx
    - pygments
    - setuptools
    - pytest
    - cython
    - pkgconf
    - pip
    - numpy
    - sphinx
    - h5py
    - make
    - libboost-devel
    - libboost-python-devel
  host:
    - python
    # - python ${{ python_min }}.*
    - setuptools
    - pip
    - numpy
    - hdf5
    - h5cpp
    - sphinx
    - libpninexus
    - libboost-devel
    - libboost-python-devel
    - blas
    - zlib
  run:
    - python
    # - python >=${{ python_min }}
    - libboost-devel
    - libboost-python-devel
    - hdf5
    - h5cpp
    - libpninexus

tests:
  - python:
      # python_version: ${{ python_min }}.*
      imports:
        - pninexus.h5cpp
        - pninexus.nexus
  - requirements:
      run:
        - python
        # - python ${{ python_min }}.*
        - numpy
        - hdf5
        - h5cpp
        - libpninexus
        - libboost-devel
        - libboost-python-devel
        
about:
  homepage: https://github.com/pni-libraries/python-pninexus
  license: GPL-2.0-only
  license_file: LICENSE
  summary: Python bindings or  NeXus libpninexus and h5cpp library
  description: |
    pninexus is python bindings of C++ library to create NeXus files.
    It provides NeXus tree-structure builder basedon XML (NXDL-like) input,
    NeXus path parsers and other algorithms to access NeXus files.
  documentation: https://pni-libraries.github.io/python-pninexus
  repository: https://github.com/pni-libraries/python-pninexus

extra:
  recipe-maintainers:
    - jkotan
    - yuelongyu
