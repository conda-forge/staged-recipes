context:
  version: 3.3.0

package:
  name: libpninexus
  version: ${{ version }}

source:
  url: https://github.com/pni-libraries/python-pninexus/archive/refs/tags/v${{ version }}.tar.gz
  sha256: 4833db1524715f7172cdb63948364019c7cc44c284e612f1d103e8bd4ee2b89a

build:
  # noarch: python
  number: 0
  script:
    - if: win
      then:  set CL=/DH5_BUILT_AS_DYNAMIC_LIB=1 %CL%
    - python -m pip install . -vv --no-deps --no-build-isolation
    - python -m pytest test

requirements:
  build:
    - ${{ compiler('cxx') }}
    - ${{ stdlib('c') }}
    - cmake
    - ninja
    - sphinx
    - pygments
    - setuptools
    - pytest
    - cython
    - pkgconf
    - if: not win
      then: make
    - if: not win
      then: cppunit
  host:
    - python >=3.10
    - pip
    - numpy
    - hdf5
    - h5cpp
    - libpninexus
    - boost-devel
    - boost-python-devel
    - blas
    - zlib
  run:
    - python >=3.10

tests:
  - python:
      imports:
        - pninexus
        - pninexus.h5cpp
        - pninexus.nexus

about:
  homepage: https://github.com/pni-libraries/python-pninexus
  license: GPL-2.0-only
  license_file: COPYING
  summary: Python bindings or  NeXus libpninexus and h5cpp library
  description: |
    pninexus is python bindings of C++ library to create NeXus files.
    It provides NeXus tree-structure builder basedon XML (NXDL-like) input,
    NeXus path parsers and other algorithms to access NeXus files.
  documentation: https://pni-libraries.github.io/python-pninexus
  repository: https://github.com/pni-libraries/python-pninexus

extra:
  recipe-maintainers:
    - jkotan
    - yuelongyu
