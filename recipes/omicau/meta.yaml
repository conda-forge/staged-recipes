{% set name = "omicau" %}
{% set version = "0.2.0" %}
{% set python_min = "3.10" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz
  sha256: b9e06ccbaf014f3b266d7f5268374d65391a203cd5d2ccbcf7be15404a19c130

build:
  noarch: python
  number: 0
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  entry_points:
    - omicau = omicau.cli:main

requirements:
  host:
    - python {{ python_min }}
    - pip
    - setuptools >=68
    - wheel
  run:
    - python >={{ python_min }}
    - numpy >=1.24
    - pandas >=2.2
    - scipy >=1.11
    - scikit-learn >=1.3
    - pytorch >=2.0
    - plotly >=5.18
    - click >=8.1
    - jinja2 >=3.1
    - tqdm >=4.65
    - tomli >=2.0            # TOML-config backport used on Python <3.11 (noarch: kept unconditional)

test:
  imports:
    - omicau
    - omicau.cli
  requires:
    - python {{ python_min }}
  commands:
    - omicau --help
    - omicau check-env

about:
  home: https://github.com/tunabirgun/omicau
  license: MIT
  license_file: LICENSE
  summary: Omics Audit -- a reproducible, leakage-safe multi-omics data-audit and fusion-benchmarking CLI.
  description: |
    omicau audits multi-omic datasets: flexible ingestion and alignment,
    value-level cryptographic provenance, missingness-bias and batch-effect
    diagnostics, leakage-safe classical and PyTorch fusion benchmarks under
    group-aware cross-validation, permutation-importance attribution, a
    modality-utility ledger, and a self-contained interactive HTML dashboard.
  doc_url: https://tunabirgun.github.io/omicau/
  dev_url: https://github.com/tunabirgun/omicau

extra:
  recipe-maintainers:
    - tunabirgun
