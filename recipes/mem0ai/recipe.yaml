context:
  version: "2.0.1"
  python_min: "3.10"

package:
  name: mem0ai
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/m/mem0ai/mem0ai-${{ version }}.tar.gz
  sha256: 070dbc3f1f332c8908379b42a81ab3a96ab169f2f9fa537e6ac719df02478f9c

build:
  noarch: python
  script: python -m pip install . --no-build-isolation -vv
  number: 0

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - hatchling
  run:
    - python >=${{ python_min }}
    - openai >=1.90.0
    - posthog >=4.5.0
    - protobuf >=5.29.6,<7.0.0
    - pydantic >=2.7.3
    - pytz >=2024.1
    - qdrant-client >=1.12.0
    - sqlalchemy >=2.0.31

tests:
  - python:
      imports:
        - mem0
      pip_check: true
      python_version: ${{ python_min }}.*

about:
  homepage: https://github.com/mem0ai/mem0
  summary: Universal memory layer for AI agents and assistants
  description: |
    mem0ai provides a universal, persistent memory layer for AI agents and
    assistants. It gives LLM-based applications the ability to remember user
    preferences, past interactions, and contextual information across sessions,
    enabling truly personalized AI experiences.
  license: Apache-2.0
  license_file: LICENSE
  repository: https://github.com/mem0ai/mem0

extra:
  recipe-maintainers:
    - killua156
