context:
  version: "0.9.0"

package:
  name: fastloess
  version: ${{ version }}

source:
  url: https://github.com/thisisamirv/loess-project/archive/v${{ version }}.tar.gz
  sha256: c53d3ac941d8b32c126321b5c8ca81fcd1c7ef0f1918a6beb435cc3a32886a1c

build:
  number: 0
  skip:
    - match(python, "<3.8")

requirements:
  build:
    - ${{ compiler('rust') }}
    - ${{ compiler('c') }}
    - ${{ stdlib('c') }}
    - cargo-bundle-licenses
  host:
    - python
    - pip
    - maturin >=1.0,<2.0
    - numpy >=1.20
  run:
    - python
    - numpy >=1.20

tests:
  - python:
      imports:
        - fastloess
      pip_check: true

about:
  homepage: https://github.com/thisisamirv/loess-project
  summary: High-performance LOESS (Locally Estimated Scatterplot Smoothing) for Python
  license: MIT OR Apache-2.0
  license_file:
    - LICENSE-MIT
    - LICENSE-APACHE
    - THIRDPARTY.yml
  documentation: https://loess.readthedocs.io/
  repository: https://github.com/thisisamirv/loess-project

extra:
  recipe-maintainers:
    - thisisamirv
