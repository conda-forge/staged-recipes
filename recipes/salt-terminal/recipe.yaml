context:
  version: "5.0.0"

package:
  name: salt-terminal
  version: ${{ version }}

source:
  url: https://github.com/mhekkel/salt/archive/refs/tags/v${{ version }}.tar.gz
  sha256: 6f4c79487e952d3f4a9a67a722a17d7d15f1e32296ca2ef85bb1f278ba05a1e1

build:
  number: 0
  # Remove windows in the future when we have windows support
  skip:
    - osx
    - win
  script: |
    set -exo pipefail
    cmake -S . -B build -G Ninja \
      ${CMAKE_ARGS} \
      -DBUILD_DOCUMENTATION=ON
    cmake --build build --parallel ${CPU_COUNT}
    ./build/salt -i --prefix ${PREFIX}

requirements:
  build:
    - ${{ compiler("cxx") }}
    - ${{ stdlib("c") }}
    - cmake
    - ninja
    - myst-parser
    - pkg-config
    - sphinx
  host:
    - asio
    - cryptopp
    - expat
    - freetype
    - glib
    - gtk4
    - libcanberra
    - libgxrio
    - libmcfp
    - libmgui
    - libpinch
    - libzeep
    - maartens_resource_compiler
    - zeem
    - zlib

tests:
  - script:
      - salt --version
      - salt --help

about:
  homepage: "https://github.com/mhekkel/salt"
  summary: "Terminal with built-in SSH"
  description: Salt is a terminal emulator with built-in SSH.
  license: BSD-2-Clause
  license_file: LICENSE
  repository: https://github.com/mhekkel/salt

extra:
  recipe-maintainers:
    - eunos-1128
