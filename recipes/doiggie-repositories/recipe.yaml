schema_version: 1

context:
  version: "0.1.0"

package:
  name: doiggie-repositories
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/d/doiggie-repositories/doiggie_repositories-${{ version }}.tar.gz
  sha256: eab71616473e3b27c55f109ae8b626b5046aac2646984f78efb6bf31e1b1c54c

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - setuptools >=61
    - setuptools-scm >=7
    - pip
  run:
    - doiggie
    - doiggie-dataverse
    - doiggie-figshare
    - doiggie-invenio

tests:
  - python:
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  summary: Meta package to install all doiggie data repository implementations
  license: BSD-2-Clause
  license_file: LICENSE.md
  homepage: https:/github.com/ssciwr/doiggie-repositories
  repository: https:/github.com/ssciwr/doiggie-repositories

extra:
  recipe-maintainers:
    - dokempf
