schema_version: 1

context:
  version: "0.1.0"

package:
  name: doiggie-repositories
  version: ${{ version }}

source:
  path: src

build:
  number: 0
  noarch: generic

requirements:
  run:
    - doiggie-dataverse
    - doiggie-figshare
    - doiggie-invenio

tests:
  - script:
      - python -c "import doiggie_dataverse"
      - python -c "import doiggie_figshare"
      - python -c "import doiggie_invenio"
    requirements:
      run:
        - python
  

about:
  summary: Meta package to install all doiggie data repository implementations
  license: BSD-2-Clause
  license_file: LICENSE.md
  homepage: https:/github.com/ssciwr/doiggie-repositories
  repository: https:/github.com/ssciwr/doiggie-repositories

extra:
  recipe-maintainers:
    - dokempf
