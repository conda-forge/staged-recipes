# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "3.3.0"

package:
  name: fastmcp-slim
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/f/fastmcp-slim/fastmcp_slim-${{ version }}.tar.gz
  sha256: 56fd0077226b8dbf0bba253f9baaad5d97a3f74eb62750d6997128486b91b0ba

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  python:
    entry_points:
      - fastmcp = fastmcp.cli:app

requirements:
  host:
    - python ${{ python_min }}.*
    - hatchling
    - uv-dynamic-versioning >=0.7.0
    - pip
  run:
    - python >=${{ python_min }}
    - platformdirs >=4.0.0
    - pydantic >=2.11.7
    - email-validator >=2.0.0
    - pydantic-settings >=2.0.0
    - python-dotenv >=1.1.0
    - rich >=13.9.4
    - typing_extensions >=4.0.0

tests:
  - python:
      imports:
        - fastmcp
      pip_check: true
      python_version:
      - ${{ python_min }}.*
      - "*"
  - requirements:
      run:
        - python ${{ python_min }}.*
        - pip
        - authlib >=1.6.11
        - py-key-value-aio >=0.4.4,<0.5.0
        - cachetools >=5.0.0
        - keyring >=25.6.0
        - aiofile >=3.5.0
        - anyio >=4.4.0
        - exceptiongroup >=1.2.2
        - httpx >=0.28.1,<1.0
        - mcp >=1.24.0,<2.0
        - opentelemetry-api >=1.20.0
    script:
      - python -c "from fastmcp import Client; print(Client)"

about:
  summary: The dependency-slim FastMCP package.
  homepage: https://gofastmcp.com
  license: Apache-2.0
  license_file: LICENSE
  documentation: https://gofastmcp.com
  repository: https://github.com/PrefectHQ/fastmcp

extra:
  recipe-maintainers:
    - rxm7706
