{% set version = "0.9.0" %}
{% set python_min = "3.10" %}

package:
  name: zyte-api
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/z/zyte-api/zyte_api-{{ version }}.tar.gz
  sha256: 37c719a53f762c92b5c72206ee759a30f774b907ff7c4b8b741cca7ab75472f9

build:
  entry_points:
    - zyte-api=zyte_api.__main__:_main
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - pip
  run:
    - python >={{ python_min }}
    - aiohttp >=3.8.0
    - attrs >=20.1.0
    - brotli >=0.5.2
    - runstats >=0.0.1
    - tenacity >=8.2.0
    - tqdm >=4.16.0
    - w3lib >=2.1.1

test:
  imports:
    - zyte_api
  commands:
    - pip check
    - zyte-api --help
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://github.com/zytedata/python-zyte-api
  summary: Python interface to Zyte API
  license: BSD-3-Clause
  license_file: LICENSE

extra:
  recipe-maintainers:
    - AdrianAtZyte
    - wRAR
