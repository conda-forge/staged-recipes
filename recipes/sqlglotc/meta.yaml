{% set name = "sqlglotc" %}
{% set version = "29.0.1" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/sqlglotc-{{ version }}.tar.gz
  sha256: 2b3116880e6f44c8cee2f690ae9ac58dfa23ce2921e6f67ea1715d70873a0d51

build:
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  build:
    - {{ compiler('c') }}
    - {{ stdlib("c") }}
    - cross-python_{{ target_platform }}     # [build_platform != target_platform]
    - python                                 # [build_platform != target_platform]
  host:
    - python
    - setuptools >=61.0
    - setuptools-scm
    - mypy >=1.0
    - types-python-dateutil
    - pip
  run:
    - python

test:
  imports:
    - sqlglot
  commands:
    - pip check
  requires:
    - pip

about:
  summary: mypyc-compiled extensions for sqlglot
  home: https://pypi.org/project/sqlglotc
  dev_url: https://github.com/tobymao/sqlglot
  docs_url: https://sqlglot.com/sqlglot.html
  description: "sqlglotc provides mypyc-compiled extensions for sqlglot, a Python SQL parser and transpiler. It is designed to improve the performance of sqlglot by compiling critical parts of the codebase to C extensions using mypyc."
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - rxm7706
