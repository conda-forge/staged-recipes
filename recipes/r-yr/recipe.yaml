schema_version: 1

context:
  version: "0.0.0.9000"

package:
  name: r-yr
  version: ${{ version }}

source:
  # No release yet; pinned to commit eb732ad (2026-04-13)
  url: https://github.com/y-crdt/yr/archive/eb732ad2e26ab1f4ad9937809a3d3ebf5138e686.tar.gz
  sha256: 1d5354eab5a3dd98e227ecf835bed92792188a46ec50b6ff9db6d9ade487068a

build:
  number: 0
  script:
    - cargo-bundle-licenses --format yaml --output "${SRC_DIR}/THIRDPARTY.yml"
    - DISABLE_AUTOBREW=1 ${R} CMD INSTALL --build . ${R_ARGS}
  skip:
    - not linux

requirements:
  build:
    - ${{ compiler('c') }}
    - ${{ stdlib('c') }}
    - ${{ compiler('rust') }}
    - cargo-bundle-licenses
    - make
    - autoconf
    - automake
    - pkg-config
    - if: build_platform != target_platform
      then: cross-r-base ${{ r_base }}
  host:
    - r-base
  run:
    - r-base

tests:
  - r:
      libraries:
        - yr

about:
  homepage: https://github.com/y-crdt/yr
  summary: Y-CRDT Bindings to R
  description: |
    Provides R bindings to y-crdt, a Rust implementation of the Yjs CRDT
    (Conflict-free Replicated Data Type) framework.
  license: MIT
  license_file:
    - LICENSE
    - THIRDPARTY.yml
  repository: https://github.com/y-crdt/yr

extra:
  recipe-maintainers:
    - AntoinePrv
