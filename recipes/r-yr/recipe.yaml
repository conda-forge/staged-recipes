schema_version: 1

context:
  version: "0.1.0"

package:
  name: r-yr
  version: ${{ version }}

source:
  url: https://github.com/y-crdt/yr/archive/refs/tags/v${{ version }}.tar.gz
  sha256: d5558cd419c8d46bdc958064cb97f963d1ea793866414c025906ec15033512ed

build:
  number: 0
  script:
    - cargo-bundle-licenses --format yaml --output "${SRC_DIR}/THIRDPARTY.yml"
    - DISABLE_AUTOBREW=1 ${R} CMD INSTALL --build . ${R_ARGS}
  skip:
    - not linux

requirements:
  build:
    - ${{ compiler('c') }}
    - ${{ stdlib('c') }}
    - ${{ compiler('rust') }}
    - cargo-bundle-licenses
    - make
    - autoconf
    - automake
    - pkg-config
    - if: build_platform != target_platform
      then: cross-r-base ${{ r_base }}
  host:
    - r-base
  run:
    - r-base

tests:
  - r:
      libraries:
        - yr

about:
  homepage: https://github.com/y-crdt/yr
  summary: Y-CRDT Bindings to R
  description: |
    Provides R bindings to y-crdt, a Rust implementation of the Yjs CRDT
    (Conflict-free Replicated Data Type) framework.
  license: MIT
  license_file:
    - LICENSE
    - THIRDPARTY.yml
  repository: https://github.com/y-crdt/yr

extra:
  recipe-maintainers:
    - AntoinePrv
