schema_version: 1

context:
  version: "0.1.1"

package:
  name: r-yr
  version: ${{ version }}

source:
  url: https://github.com/y-crdt/yr/archive/refs/tags/v${{ version }}.tar.gz
  sha256: e858d06ab55612c6b3bce7805f5682bdd631151fec57fcf3242de3a91370cbd6
  patches:
    - patches/0001-libdir-cargo-build-target.patch

build:
  number: 0
  dynamic_linking:
    rpaths:
      - lib/R/lib/
      - lib/
  script:
    env:
      NOT_CRAN: "1"
    content:
      - if: unix
        then: |
          # No install from brew on MacOS
          export DISABLE_AUTOBREW=1

          # Make libR findable for Cargo and R wrapper scripts
          export RUSTFLAGS="-C link-arg=-L${PREFIX}/lib/R/lib ${RUSTFLAGS}"
          export LD_LIBRARY_PATH="${PREFIX}/lib/R/lib:${LD_LIBRARY_PATH:-}"
          export DYLD_LIBRARY_PATH="${PREFIX}/lib/R/lib:${DYLD_LIBRARY_PATH:-}"

          ${R} CMD INSTALL --build . ${R_ARGS}

          # Bundle third party licenses from statically linked crates
          cd src/rust
          cargo-bundle-licenses --format yaml --output "${SRC_DIR}/THIRDPARTY.yml"
        else: |
          rem Make R.dll findable for Cargo and R wrapper scripts
          set RUSTFLAGS=-C link-arg=-L%PREFIX%\lib\R\lib %RUSTFLAGS%
          set PATH=%PREFIX%\lib\R\bin\x64;%PATH%
          rem Point the MSVC host linker at real link.exe so build scripts link cleanly.
          set CARGO_TARGET_X86_64_PC_WINDOWS_MSVC_LINKER=link.exe

          %R% CMD INSTALL --build . %R_ARGS%
          if %errorlevel% neq 0 exit /b %errorlevel%

          rem Bundle third party licenses from statically linked crates
          cd src\rust
          if %errorlevel% neq 0 exit /b %errorlevel%
          cargo-bundle-licenses --format yaml --output "%SRC_DIR%\THIRDPARTY.yml"
          if %errorlevel% neq 0 exit /b %errorlevel%

requirements:
  build:
    - if: win
      then:
        - ${{ compiler('m2w64_c') }}
        - ${{ stdlib('m2w64_c') }}
      else:
        - ${{ compiler('c') }}
        - ${{ stdlib('c') }}
    - ${{ compiler('rust') }}
    - cargo-bundle-licenses
    - ${{ 'm2-' if win }}autoconf
    - ${{ 'm2-automake-wrapper' if win else 'automake' }}
    - ${{ 'm2-' if win }}pkg-config
    - ${{ 'm2-' if win }}make
    - if: win
      then:
        - m2-filesystem
        - m2-sed
        - m2-grep
        - m2-coreutils
        - m2-zip
  host:
    - r-base
  run:
    - r-base

tests:
  - r:
      libraries:
        - yr

about:
  homepage: https://github.com/y-crdt/yr
  summary: Y-CRDT Bindings to R
  description: |
    Provides R bindings to y-crdt, a Rust implementation of the Yjs CRDT
    (Conflict-free Replicated Data Type) framework.
  license: MIT
  license_file:
    - LICENSE
    - THIRDPARTY.yml
  repository: https://github.com/y-crdt/yr

extra:
  recipe-maintainers:
    - AntoinePrv
