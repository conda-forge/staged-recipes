{% set name = "mortgagemath" %}
{% set version = "0.4.0" %}
{% set python_min = "3.11" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz
  sha256: 7e27f86c43c3dd944a1443d9b362d6121e22c207c6c1d6a21a952c6138d5d814

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0
  entry_points:
    - mortgagemath = mortgagemath.__main__:main

requirements:
  host:
    - python {{ python_min }}
    - hatchling
    - pip
  run:
    - python >={{ python_min }}

test:
  source_files:
    - tests
  requires:
    - python {{ python_min }}
    - pip
    - pytest >=8
  imports:
    - mortgagemath
  commands:
    - pip check
    - mortgagemath --version
    - python -m mortgagemath
    - pytest tests

about:
  home: https://github.com/murraystokely/mortgagemath
  summary: Cent-accurate mortgage amortization for Python, validated against published CFPB and Fannie Mae examples
  description: |
    mortgagemath produces fixed-rate and adjustable-rate mortgage
    amortization schedules that reproduce published lender, regulator,
    and textbook examples to the cent. Decimal end-to-end (no float
    drift); three configurable rounding modes; two balance-tracking
    modes (round-each-balance for US lender statements, carry-precision
    for Excel-style and graduate CRE-finance textbooks); 30/360 (US
    residential) and Actual/360 (US commercial, including SARM-style
    balloon loans) day counts; semi-annual and annual compounding
    (Canadian *Interest Act* §6); non-monthly payment frequencies
    (weekly / biweekly / semi-monthly / quarterly / annual); and
    Adjustable-Rate Mortgage support via a typed rate-change schedule
    with optional payment recast. A built-in CLI (`mortgagemath
    payment`, `mortgagemath schedule`, `mortgagemath selfcheck`)
    exposes the same surface from the shell. Validated against the
    CFPB H-25(B) sample Closing Disclosure, the Fannie Mae Multifamily
    Selling and Servicing Guide §1103 Tier 2 SARM example, Reg Z 12
    CFR Part 1026 Appendix H Sample H-14 (Variable-Rate Mortgage
    Sample, full 15-year cap-trajectory), Geltner et al. *Commercial
    Real Estate Analysis* CPM example, Goldstein *Finite Mathematics
    and Its Applications*, OpenStax textbooks, eCampus Ontario and
    Olivier Canadian-mortgage examples, and synthetic half-cent
    boundary cases. Zero runtime dependencies beyond the Python
    standard library.
  license: MIT
  license_family: MIT
  license_file: LICENSE
  doc_url: https://github.com/murraystokely/mortgagemath#readme
  dev_url: https://github.com/murraystokely/mortgagemath

extra:
  recipe-maintainers:
    - murraystokely
