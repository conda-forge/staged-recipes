{% set name = "mortgagemath" %}
{% set version = "0.1.0" %}
{% set python_min = "3.11" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz
  sha256: faf6de4d524525f03d9ae664c391c5bd66cca88ccffb338e573727229b1f2bd4

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - hatchling
    - pip
  run:
    - python >={{ python_min }}

test:
  source_files:
    - tests
  requires:
    - python {{ python_min }}
    - pip
    - pytest >=8
  imports:
    - mortgagemath
  commands:
    - pip check
    - pytest tests

about:
  home: https://github.com/murraystokely/mortgagemath
  summary: Cent-accurate mortgage amortization for Python, validated against published CFPB and Fannie Mae examples
  description: |
    mortgagemath produces fixed-rate mortgage amortization schedules that
    reproduce published lender, regulator, and textbook examples to the
    cent. Decimal end-to-end (no float drift), three configurable
    rounding modes, and both 30/360 (US residential) and Actual/360
    (US commercial, including SARM-style balloon loans) day counts.
    Validated against the CFPB H-25(B) sample Closing Disclosure, the
    Fannie Mae Multifamily Selling and Servicing Guide §1103 Tier 2
    SARM example, OpenStax textbooks, and synthetic half-cent
    boundary cases. Zero runtime dependencies beyond the Python
    standard library.
  license: MIT
  license_family: MIT
  license_file: LICENSE
  doc_url: https://github.com/murraystokely/mortgagemath#readme
  dev_url: https://github.com/murraystokely/mortgagemath

extra:
  recipe-maintainers:
    - murraystokely
