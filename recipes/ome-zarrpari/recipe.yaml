schema_version: 1

context:
  version: "1.0.0"

package:
  name: ome-zarrpari
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/o/ome-zarrpari/ome_zarrpari-${{ version }}.tar.gz
  sha256: 1e80ed84c95ad4d0ab75ae23bbfbf34b62853f88eb99e3f565424face579ee5c

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python >=3.11,<3.14
    - setuptools >=42.0.0
    - setuptools-scm
    - pip
  run:
    - python >=3.11,<3.14
    - qtpy
    - ome-zarr-models >=1.0
    - zarr
    - requests
    - aiohttp
    - gcsfs

tests:
  - python:
      imports:
        - ome_zarrpari
      pip_check: true
      python_version: ${{ python_min }}.*

about:
  summary: A plugin to load and use OME-Zarr data
  license: BSD-3-Clause
  license_file: LICENSE
  homepage: https://pypi.org/project/ome-zarrpari/
  documentation: https://ome-zarrpari.readthedocs.io

extra:
  recipe-maintainers:
    - dstansby
