{% set version = "1.0.0" %}

package:
  name: raschpy
  version: {{ version }}

source:
  url: https://pypi.io/packages/source/r/raschpy/raschpy-{{ version }}.tar.gz
  sha256: ffc9dfac321adab2fbb174fb943e6f9bf70fa08f3fc26d4e7be0373f0a9875c6

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python >=3.10
    - pip
    - setuptools >=68
    - wheel
  run:
    - python >=3.10
    - numpy >=1.24
    - pandas >=2.0
    - scipy >=1.9
    - scikit-learn >=1.1
    - matplotlib >=3.6
    - seaborn >=0.12
    - openpyxl >=3.0

test:
  imports:
    - raschpy
  commands:
    - pip check
  requires:
    - pip

about:
  home: https://github.com/MarkElliott999/RaschPy
  license: Apache-2.0
  license_file: LICENSE
  summary: Rasch measurement in Python — SLM, PCM, RSM, and Many-Facet Rasch models
  doc_url: https://github.com/MarkElliott999/RaschPy

extra:
  recipe-maintainers:
    - MarkElliott999
