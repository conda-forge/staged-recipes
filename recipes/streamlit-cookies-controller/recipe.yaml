schema_version: 1

context:
  version: "0.0.4"

package:
  name: streamlit-cookies-controller
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/s/streamlit-cookies-controller/streamlit-cookies-controller-${{ version }}.tar.gz
  sha256: f5df2543de858f1585dcb6e90f58f38aafbf313ee8e237c64663b2d9761583cc

build:
  number: 0
  noarch: python
  script:
    content:
      - ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - setuptools >=67.6.0
    - wheel >=0.40.0
  run:
    - python >=${{ python_min }}
    - streamlit >=0.63

tests:
  - python:
      imports:
        - streamlit_cookies_controller
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  homepage: https://github.com/NathanChen198/streamlit-cookies-controller
  summary: Control client browser cookies for Streamlit applications
  description: |
    streamlit-cookies-controller enables getting, setting, and removing browser
    cookies from within Streamlit applications. It uses the universal-cookie
    JavaScript package to access cookies on the client side, returning None
    when accessing non-existent cookies rather than raising an error.
  license: MIT
  license_file: LICENSE
  repository: https://github.com/NathanChen198/streamlit-cookies-controller

extra:
  recipe-maintainers:
    - pb01ka
    - mgorny
