{% set name = "ouxinfo" %}
{% set version = "1.0.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz
  sha256: 0c5287425ec6749d086493bc2de28f2f6792bc7ac9a9c33370d8ee788f9a2d6d

build:
  number: 0
  skip: true  # [py<310]

requirements:
  build:
    - {{ compiler('cxx') }}   # requires GCC >= 13; uses -Ofast, -fopenmp, C++14
    - llvm-openmp  # [osx]
    - libgomp      # [linux]
  host:
    - python
    - pip
    - setuptools
    - pybind11
    - llvm-openmp  # [osx]
    - libgomp      # [linux]
  run:
    - python
    - numpy
    - matplotlib-base
    - scipy
    - tqdm
    - joblib
    - llvm-openmp  # [osx]
    - libgomp      # [linux]

test:
  imports:
    - ouxinfo
  commands:
    - pip check
  requires:
    - pip

about:
  home: https://github.com/htymjun/OUxInfo
  summary: Fast Shannon entropy estimator for causal inference in dynamical systems
  description: |
    OUxInfo is a high-performance Shannon entropy estimator for Python with a C++
    backend. It implements k-nearest-neighbor (KSG/Kozachenko-Leonenko) algorithms
    with a Chebyshev-metric k-d tree and OpenMP parallelization. Designed for
    information-theoretic causal inference: transfer entropy, mutual information,
    information flow, and KL divergence.
  license: MIT
  license_file: LICENSE
  doc_url: https://github.com/htymjun/OUxInfo
  dev_url: https://github.com/htymjun/OUxInfo

extra:
  recipe-maintainers:
    - htymjun
