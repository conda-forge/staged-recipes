schema_version: 1

context:
  version: 0.10.0

package:
  name: graphemeu
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/g/graphemeu/graphemeu-${{ version }}.tar.gz
  sha256: 2cbf04ca39f16452c1a70e8afe403a86039e390b5dcc7e410a9a8a15c1a9c3b8

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - hatchling
    - pip
  run:
    - python >=${{ python_min }}

tests:
  - python:
      imports:
        - grapheme
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  summary: Unicode grapheme helpers
  license: MIT
  license_file: LICENSE
  homepage: https://github.com/timendum/grapheme
  documentation: https://graphemeu.readthedocs.io/

extra:
  recipe-maintainers:
    - Brainor
