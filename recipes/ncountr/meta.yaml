{% set name = "ncountr" %}
{% set version = "0.1.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz
  # sha256 will be filled after first PyPI release

build:
  noarch: python
  number: 0
  entry_points:
    - ncountr = ncountr.cli:cli
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python >=3.9
    - pip
    - setuptools >=64
    - setuptools-scm >=8
  run:
    - python >=3.9
    - numpy >=1.21
    - pandas >=1.3
    - scipy >=1.7
    - statsmodels >=0.13
    - matplotlib-base >=3.5
    - pyyaml >=5.4
    - click >=8.0

test:
  imports:
    - ncountr
    - ncountr.core
    - ncountr.io
    - ncountr.plotting
  commands:
    - ncountr --version
    - ncountr --help

about:
  home: https://github.com/princello/ncountr
  summary: Python pipeline for Nanostring nCounter data analysis
  description: |
    ncountr is the first Python package for end-to-end nCounter data analysis.
    Parse RCC files, run QC, normalize, test for differential expression, and
    score gene sets — all from a single config file or Python API.
  license: MIT
  license_file: LICENSE
  doc_url: https://ncountr.readthedocs.io
  dev_url: https://github.com/princello/ncountr

extra:
  recipe-maintainers:
    - princello
