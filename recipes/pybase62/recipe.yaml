# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "1.0.0"

package:
  name: pybase62
  version: ${{ version }}

source:
  url: https://pypi.org/packages/py3/p/pybase62/pybase62-${{ version }}-py3-none-any.whl
  sha256: 60539ad956ec9e9de091bc7ae88c9550bc2fa17f503050cf34d021b75e73cb27

build:
  noarch: python
  number: 0
  script: ${{ PYTHON }} -m pip install pybase62-${{ version }}-py3-none-any.whl --no-deps --no-build-isolation -vv

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
  run:
    - python >=${{ python_min }}

tests:
  - python:
      imports:
        - base62
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  homepage: https://pypi.org/project/pybase62/
  license: BSD-2-Clause
  license_file: LICENSE
  summary: Python module for base62 encoding
  repository: https://github.com/suminb/base62
  documentation: https://github.com/suminb/base62
  description: |
    A Python module for base62 encoding. base62 is a binary-to-text
    encoding scheme that represents binary data in an ASCII string
    format using the 62 alphanumeric characters (0-9, A-Z, a-z).

extra:
  recipe-maintainers:
    - rxm7706
