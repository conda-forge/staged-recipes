# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "1.0.0"

package:
  name: pybase62
  version: ${{ version }}

source:
  url: https://github.com/suminb/base62/archive/refs/tags/v${{ version }}.tar.gz
  sha256: 36ac9ef2bf547d1845aa48e3f5878251603904b0da881cdf92ccd011795c21cc

build:
  noarch: python
  number: 0
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - setuptools
  run:
    - python >=${{ python_min }}

tests:
  - python:
      imports:
        - base62
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  homepage: https://github.com/suminb/base62
  license: BSD-2-Clause
  license_file: LICENSE
  summary: Python module for base62 encoding
  repository: https://github.com/suminb/base62
  documentation: https://github.com/suminb/base62
  description: |
    A Python module for base62 encoding. base62 is a binary-to-text
    encoding scheme that represents binary data in an ASCII string
    format using the 62 alphanumeric characters (0-9, A-Z, a-z).

extra:
  recipe-maintainers:
    - rxm7706
