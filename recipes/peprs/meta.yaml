{% set version = "0.2.0" %}

package:
  name: peprs
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/p/peprs/peprs-{{ version }}.tar.gz
  sha256: 52cfb32c5b77d3cf8ad7061bed5fbb0818271924d57eb8b9e58f541baefabe9b

build:
  entry_points:
    - peprs = peprs:_cli_main
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  build:
    - {{ compiler('c') }}
    - {{ stdlib('c') }}
    - {{ compiler('rust') }}
    - cargo-bundle-licenses
  host:
    - python
    - maturin >=1.9,<2.0
    - pip
  run:
    - python

test:
  imports:
    - peprs
  commands:
    - pip check
    - peprs --help
  requires:
    - pip
    - python

about:
  home: https://github.com/khoroshevskyi/peprs/
  summary: Rust-powered PEP sample metadata toolkit for Python
  license: MIT
  license_file:
    - LICENSE.txt
    - THIRDPARTY.yml

extra:
  recipe-maintainers:
    - khoroshevskyi
