schema_version: 1

context:
  python_min: "3.11"
  version: "0.0.2"

package:
  name: ramp-dorbanadapter
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/r/ramp-dorbanadapter/ramp_dorbanadapter-${{ version }}.tar.gz
  sha256: 01e5083e487a4a6d810cf8b6a12665076d75d97a1671758558d26c3c76ba3911

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - setuptools
    - setuptools-scm
    - wheel
    - pip
  run:
    - python >=${{ python_min }}
    - dorban
    - more-itertools
    - numpy
    - ramp-corecompute
    - ramp-coremaker
    - ramp-coreoperator
    - ramp-isotopes
    - ramp-reactions
    - scipy

tests:
  - python:
      imports:
        - dorbanadapter
      pip_check: true
      python_version: 
        - ${{ python_min }}.*
        - "*"

about:
  summary: A neutron diffusion solver adapter to use it as an Oracle
  license: MIT
  license_file: LICENSE
  homepage: https://pypi.org/project/ramp-dorbanadapter/

extra:
  recipe-maintainers:
    - esheder
