{% set name = "xxxpython-package-namexxx" %}
{% set version = "0.2.1" %}
{% set python_min = "3.14" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/x/xxxpython-package-namexxx/xxxpython_package_namexxx-{{ version }}.tar.gz
  sha256: 5cb919ae529b23d1e54c75800ae9a5cd40fe1e7e1fb48a93e1ff00bd615b5f5a

build:
  entry_points:
    - xxxpython_package_namexxx = xxxpython_package_namexxx.cl_utils:main
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv
  number: 0

requirements:
  host:
    - python >=3.11
    - setuptools >=70
    - setuptools-scm
    - pip
    - wheel
  run:
    - python >=3.11
    - pyyaml
    - fundamentals

test:
  imports:
    - xxxpython_package_namexxx
  commands:
    - pip check
  requires:
    - pip
    - python

about:
  home: https://github.com/thespacedoctor/xxxpython_package_namexxx
  summary: xxxpackage_descriptionxxx
  license: GPL-3.0-only
  license_file: LICENSE
  license_family: GPL3
  doc_url: https://xxxpython-package-namexxx.readthedocs.io
  dev_url: https://github.com/thespacedoctor/xxxpython_package_namexxx

extra:
  recipe-maintainers:
    - thespacedoctor
