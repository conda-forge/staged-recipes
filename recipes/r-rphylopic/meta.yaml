{% set version = '1.7.0' %}
{% set posix = 'm2-' if win else '' %}

package:
  name: r-rphylopic
  version: {{ version|replace("-", "_") }}

source:
  url:
    - {{ cran_mirror }}/src/contrib/rphylopic_{{ version }}.tar.gz
    - {{ cran_mirror }}/src/contrib/Archive/rphylopic/rphylopic_{{ version }}.tar.gz
  sha256: b25a6a4fe54c28bcb0a26620323963b1547277592c045a60e43105d611ee1127

build:
  number: 0
  noarch: generic
  rpaths:
    - lib/R/lib/
    - lib/
  missing_dso_whitelist:
    - '*/R.dll'        # [win]
    - '*/Rblas.dll'    # [win]
    - '*/Rlapack.dll'  # [win]

requirements:
  build:
    - {{ posix }}zip               # [win]
    - cross-r-base {{ r_base }}    # [build_platform != target_platform]
  host:
    - r-base
    - r-ape
    - r-curl
    - r-ggplot2
    - r-grimport2 >=0.3.3
    - r-httpcache
    - r-httr
    - r-jsonlite
    - r-knitr
    - r-lifecycle
    - r-pbapply
    - r-png
    - r-rsvg >=2.6.0
    - r-scales
  run:
    - r-base
    - r-ape
    - r-curl
    - r-ggplot2
    - r-grimport2 >=0.3.3
    - r-httpcache
    - r-httr
    - r-jsonlite
    - r-knitr
    - r-lifecycle
    - r-pbapply
    - r-png
    - r-rsvg >=2.6.0
    - r-scales

test:
  commands:
    - $R -e "library('rphylopic')"           # [not win]
    - "\"%R%\" -e \"library('rphylopic')\""  # [win]

about:
  home: https://rphylopic.palaeoverse.org
  license: GPL-3.0-or-later
  summary: Work with the PhyloPic Web Service (<http://api-docs.phylopic.org/v2/>) to fetch silhouette
    images of organisms. Includes functions for adding silhouettes to both base R plots
    and ggplot2 plots.
  license_family: GPL3
  license_file:
    - '{{ environ["PREFIX"] }}/lib/R/share/licenses/GPL-3'
  dev_url: https://github.com/palaeoverse/rphylopic
  doc_url: https://rphylopic.palaeoverse.org
# biocViews:

extra:
  recipe-maintainers:
    - conda-forge/r
    - willgearty

