{% set version = "1.0.8" %}

package:
  name: sbtabpy
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/s/sbtabpy/sbtabpy-{{ version }}.tar.gz
  sha256: b8b543b09ed0a1d2dbe342b98de279432b624d0133740abee182f011cbf7dd9d

build:
  entry_points:
    - sbtab = sbtab.__main__:main
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - setuptools >=61
    - wheel
    - setuptools-git-versioning >=2.0,<3
    - pip
  run:
    - python >={{ python_min }}
    - python-libsbml >=5.0
    - numpy >=2.0
    - scipy >=1.13
    - openpyxl >=2.5
    - pandas >=2.0
    - pyarrow >=14.0.1

test:
  imports:
    - sbtab
  commands:
    - pip check
    - sbtab --help
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://www.sbtab.net
  summary: SBtab - Standardised Data Tables for Systems Biology
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - eladnoor
