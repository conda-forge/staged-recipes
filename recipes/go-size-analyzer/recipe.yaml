context:
  version: "1.13.0"

package:
  name: go-size-analyzer
  version: ${{ version }}

source:
  url: https://github.com/Zxilly/go-size-analyzer/archive/refs/tags/v${{ version }}.tar.gz
  sha256: 160415a10eaa2c1151dda1e8913d5d1ccf912cd7c18e35a673b88ac72667e507
  target_directory: src

build:
  number: 0
  script:
    - cd src
    - go-licenses save . --save_path ../library_licenses --ignore github.com/Zxilly/go-size-analyzer
    - if: unix
      then: GOEXPERIMENT=jsonv2 go build -v -o $PREFIX/bin/gsa -ldflags="-s -w" ./cmd/gsa
      else: set "GOEXPERIMENT=jsonv2" && go build -v -o %LIBRARY_BIN%\gsa.exe -ldflags="-s" ./cmd/gsa

requirements:
  build:
    - ${{ compiler("go-nocgo") }}
    - go-licenses

tests:
  - script: gsa --help
  - package_contents:
      bin:
        - gsa
      strict: true

about:
  homepage: https://github.com/Zxilly/go-size-analyzer
  summary: A tool for analyzing the size of compiled Go binaries
  description: |
    A simple tool to analyze the size of a Go compiled binary.
    Supports cross-platform analysis of ELF, Mach-O, PE and WebAssembly binary formats.
    Provides detailed size breakdown by packages and sections, with multiple output
    formats including text, JSON, HTML, SVG, and interactive web interface and TUI.
  license: AGPL-3.0-only
  license_file:
    - src/LICENSE
    - library_licenses/
  documentation: https://pkg.go.dev/github.com/Zxilly/go-size-analyzer
  repository: https://github.com/Zxilly/go-size-analyzer

extra:
  recipe-maintainers:
    - xhochy
