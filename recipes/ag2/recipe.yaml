# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "0.13.4"

package:
  name: ag2
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/a/ag2/ag2-${{ version }}.tar.gz
  sha256: df5a7ddbcba32f01023cf742bfc93fadc1997cc6dee30d5e86e7d0b732254477

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - hatchling
    - pip
  run:
    - python >=${{ python_min }}
    - anyio >=4.0.0,<5.0.0
    - fast-depends >=3.0.8,<4.0.0
    - httpx >=0.28.1,<1
    - packaging
    - pydantic >=2.6.1,<3
    - python-dotenv
    - pyyaml >=6.0.2
    - termcolor
    - tiktoken

tests:
  - python:
      imports:
        - autogen
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  homepage: https://pypi.org/project/ag2/
  license: Apache-2.0
  license_file:
    - LICENSE
    - NOTICE.md
  summary: A programming framework for agentic AI
  repository: https://github.com/ag2ai/ag2
  documentation: https://docs.ag2.ai
  description: |
    AG2 (formerly AutoGen) is an open-source programming framework for
    building AI agents and facilitating cooperation among multiple agents
    to solve tasks. AG2 aims to streamline the development and research of
    agentic AI. It offers features such as agents capable of interacting
    with each other, facilitates the use of various large language models
    (LLMs) and tool use support, autonomous and human-in-the-loop
    workflows, and multi-agent conversation patterns.

extra:
  recipe-maintainers:
    - rxm7706
