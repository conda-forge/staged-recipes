context:
  version: "0.5.2"

package:
  name: htmd
  version: ${{ version }}

source:
  url: https://github.com/letmutex/htmd-cli/archive/refs/tags/v${{ version }}.tar.gz
  sha256: 29476e0907eec2e42c94ffa760a81387982ca8dcba75e13b8b5366f78410e1d0

build:
  number: 0
  script:
    env:
      CARGO_PROFILE_RELEASE_STRIP: symbols
      CARGO_PROFILE_RELEASE_LTO: fat
    content:
      - if: unix
        then:
          - cargo auditable install --locked --no-track --bins --root ${{ PREFIX }} --path .
      - if: win
        then:
          - cargo auditable install --locked --no-track --bins --root %LIBRARY_PREFIX% --path .
      - cargo-bundle-licenses --format yaml --output ./THIRDPARTY.yml

requirements:
  build:
    - ${{ stdlib('c') }}
    - ${{ compiler('c') }}
    - ${{ compiler('rust') }}
    - cargo-bundle-licenses
    - cargo-auditable

tests:
  - script:
      - htmd --help
      - htmd --version
  - package_contents:
      bin:
        - htmd
      strict: true

about:
  summary: Command line tool for converting HTML to Markdown
  description: |
    htmd is a command-line tool for converting HTML to Markdown.
    It supports batch processing of files, directories, and glob patterns,
    with configurable conversion options.
  license: Apache-2.0
  license_file:
    - LICENSE
    - THIRDPARTY.yml
  homepage: https://github.com/letmutex/htmd-cli
  repository: https://github.com/letmutex/htmd-cli

extra:
  recipe-maintainers:
    - salim-b
