schema_version: 1

context:
  version: "26.4.0"

package:
  name: pytest-ansible
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/p/pytest-ansible/pytest_ansible-${{ version }}.tar.gz
  sha256: 50c2c5f05472e5a41a8d9b29c38e98292c1605f57a70954fc20b51b1f5cabb82

build:
  number: 0
  skip:
    - win
    - match(python, "<3.11")
    - match(python, ">=3.12")
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python
    - pip
    - setuptools_scm >=7.0.5
    - setuptools >=65.3.0
  run:
    - python
    - ansible-compat >=25.8.2
    - ansible-core >=2.16.14
    - cffi >=1.15.1
    - packaging >=23.2
    - pytest >=6
    - pytest-xdist >=3.8.0
    - typing_extensions >=4.15.0

tests:
  - python:
      imports:
        - pytest_ansible
      pip_check: true

about:
  summary: |
    Plugin for pytest to simplify calling ansible modules from tests or fixtures
  homepage: https://pypi.org/project/pytest-ansible/
  repository: https://pypi.org/project/pytest-ansible/
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - killua156
    - mgorny
