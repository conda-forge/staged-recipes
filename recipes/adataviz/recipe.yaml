schema_version: 1

context:
  name: adataviz
  version: "0.5"

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/${{ name[0] }}/${{ name }}/adataviz-${{ version }}.tar.gz
  sha256: a63a9a12c2d60800d1cd668e8f1647f99beb4cf0dbe041caf0bfb3eb1f5230db

build:
  noarch: python
  number: 0
  script:
    env:
      SETUPTOOLS_SCM_PRETEND_VERSION: ${{ version }}
    content: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  python:
    entry_points:
      - adataviz = adataviz:main

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - setuptools >=61.0
    - setuptools_scm >=6.2
  run:
    - python >=${{ python_min }}
    - matplotlib-base
    - numpy
    - pandas >=1.3.5
    - scipy
    - loguru
    - fire
    - anndata
    - scanpy
    - seaborn
    - pycomplexheatmap
    - adjusttext
    - plotly
    - ipywidgets

tests:
  - python:
      imports:
        - adataviz
      python_version:
        - ${{ python_min }}.*
        - "*"
      pip_check: true
  - script:
      - adataviz --help

about:
  homepage: https://github.com/DingWB/adataviz
  summary: A python package to visualize adata
  description: |
    adataviz provides functions and command-line tools to visualize
    AnnData (adata) objects, including plotting utilities and tools to
    aggregate single-cell data into pseudobulk profiles.
  license: MIT
  license_file: LICENSE
  documentation: https://dingwb.github.io/adataviz
  repository: https://github.com/DingWB/adataviz

extra:
  recipe-maintainers:
    - DingWB
