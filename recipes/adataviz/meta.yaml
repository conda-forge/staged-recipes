{% set name = "adataviz" %}
{% set version = "0.5" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/adataviz-{{ version }}.tar.gz
  sha256: a63a9a12c2d60800d1cd668e8f1647f99beb4cf0dbe041caf0bfb3eb1f5230db

build:
  noarch: python
  script: export SETUPTOOLS_SCM_PRETEND_VERSION={{ version }} && {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0
  entry_points:
    - adataviz = adataviz:main

requirements:
  host:
    - python >=3.9
    - pip
    - setuptools >=61.0
    - setuptools_scm >=6.2
    - wheel
  run:
    - python >=3.9
    - matplotlib-base
    - numpy
    - pandas >=1.3.5
    - scipy
    - loguru
    - fire
    - anndata
    - scanpy
    - seaborn
    - pycomplexheatmap
    - adjusttext
    - plotly
    - ipywidgets

test:
  imports:
    - adataviz
  requires:
    - pip
  commands:
    - pip check
    - adataviz --help

about:
  home: https://github.com/DingWB/adataviz
  summary: A python package to visualize adata
  description: |
    adataviz provides functions and command-line tools to visualize
    AnnData (adata) objects, including plotting utilities and tools to
    aggregate single-cell data into pseudobulk profiles.
  license: MIT
  license_family: MIT
  license_file: LICENSE
  doc_url: https://dingwb.github.io/adataviz
  dev_url: https://github.com/DingWB/adataviz

extra:
  recipe-maintainers:
    - DingWB
