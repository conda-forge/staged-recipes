schema_version: 1

context:
  version: "1.0.4"

package:
  name: pyroscope-io
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/p/pyroscope-io/pyroscope_io-${{ version }}.tar.gz
  sha256: b191ce8e2445e34591f250a23c1fa03e3b7a6ce0cf461fdf4f1a21bfd1c7da40

build:
  number: 0
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python
    - setuptools >=82.0.0,<83.0.0
    - setuptools-rust >=1.12.0,<2.0.0
    - cffi >=2.0.0,<3.0.0
    - pip
  run:
    - python
    - cffi >=2.0.0,<3.0.0

tests:
  - python:
      imports:
        - pyroscope
        - pyroscope_io
      pip_check: true

about:
  summary: Pyroscope Python integration
  license: Apache-2.0
  license_file: LICENSE
  homepage: https://pypi.org/project/pyroscope-io/

extra:
  recipe-maintainers:
    - AndreasAlbertQC
