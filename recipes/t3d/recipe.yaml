context:
  version: "0.1.0"
  # Avoid tomli issues
  python_min: "3.11"

package:
  name: t3d
  version: ${{ version }}

source:
  url: https://bitbucket.org/gyrokinetics/t3d/get/v${{ version }}.tar.gz
  sha256: 5f18df36243429616724d7eb64212e825e8630162035387a8daa795d33a3316d

build:
  number: 0
  noarch: python
  script:
    # The source tarball has no `.git`, so setuptools_scm cannot infer a version.
    env:
      SETUPTOOLS_SCM_PRETEND_VERSION_FOR_T3D: ${{ version }}
    content: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  python:
    entry_points:
      - t3d = t3d.__main__:main
      - t3d-plot = t3d.tools.profile_plot:main
      - t3d-time-plot = t3d.tools.time_plot:main
      - t3d-vmec-plot = t3d.geometry_models.VMEC:main
      - t3d-source-sink-plot = t3d.tools.source_sink_plot:main
      - t3d-extract-input-file = t3d.tools.extract_input_file_from_output:main

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - setuptools >=61.0
    - setuptools-scm >=6.2
  run:
    - python >=${{ python_min }}
    - numpy
    - scipy
    - matplotlib-base
    - pandas
    - pyqt
    - netcdf4
    - adios2
    - termcolor
    - f90nml
    - joblib
    - bpcmp

tests:
  - python:
      imports:
        - t3d
      # adios2 doesn't install Python metadata
      pip_check: false
      python_version:
        - ${{ python_min }}.*
        - "*"
  - script:
      - t3d --help
      - t3d-plot --help
      - t3d-time-plot --help
      - t3d-source-sink-plot --help
      - t3d-extract-input-file --help

about:
  homepage: https://bitbucket.org/gyrokinetics/t3d/
  summary: Trinity3D &mdash; transport solver for modeling macro-scale profile evolution in fusion plasmas
  description: |
    Trinity3D (t3d) is a transport solver for modeling macro-scale profile
    evolution in magnetic-confinement fusion plasmas (tokamaks and stellarators).
    It couples to a variety of flux models and geometry backends to evolve
    plasma profiles in time.
  license: GPL-3.0-or-later
  license_file: LICENSE
  repository: https://bitbucket.org/gyrokinetics/t3d/
  documentation: https://t3d.readthedocs.io/

extra:
  recipe-maintainers:
    - matthewfeickert
