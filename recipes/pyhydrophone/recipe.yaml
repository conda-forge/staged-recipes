schema_version: 1

context:
  version: "0.3.1"

package:
  name: pyhydrophone
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/p/pyhydrophone/pyhydrophone-${{ version }}.tar.gz
  sha256: 57ff521bd799229ad8c4063fe7366548507f5c6564d100301d27abd2cbd5bf79

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - poetry-core
    - pip
  run:
    - python >=${{ python_min }}
    - pandas >=2.0.2,<3.0.0
    - requests >=2.31.0,<3.0.0
    - pysoundfile >=0.12.1,<0.13.0
    - openpyxl >=3.1.2,<4.0.0
    - scipy 1.13.1.*

tests:
  - python:
      imports:
        - pyhydrophone
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  summary: Python package to read and calibrate hydrophone data.
  license: GPL-3.0-only
  license_file: LICENSE
  homepage: https://pypi.org/project/pyhydrophone/

extra:
  recipe-maintainers:
    - ocefpaf
