context:
  version: "6.11.0"
  maj_min: ${{ (version | split('.'))[:2] | join('.') }}

package:
  name: qt6-sensors
  version: ${{ version }}

source:
  url: https://download.qt.io/official_releases/qt/${{ maj_min }}/${{ version }}/submodules/qtsensors-everywhere-src-${{ version }}.tar.xz
  md5: b55f439d7d19463ea8854e0da07f8c4c

build:
  number: 0

requirements:
  build:
    - cmake
    - ninja
    - perl
    - ${{ compiler('cxx') }}
    - ${{ compiler('c') }}
    - ${{ stdlib("c") }}
    - if: build_platform != target_platform
      then: qt6-main ${{ version }}.*
  host:
    - qt6-main ${{ version }}.*
  run:
    - qt6-main ${{ version }}.*
  run_exports:
    - ${{ pin_subpackage('qt6-sensors', upper_bound='x.x') }}

tests:
  - package_contents:
      include:
        - qt6/QtSensors/qsensor.h
      lib:
        - Qt6Sensors

about:
  homepage: http://qt-project.org
  license: GPL-3.0-only
  license_file:
    - LICENSES/GPL-3.0-only.txt
    - LICENSES/BSD-3-Clause.txt
    - LICENSES/GFDL-1.3-no-invariants-only.txt
    - LICENSES/LicenseRef-Qt-Commercial.txt
  summary: Qt Sensors module
  description: |
    The Qt Sensors module provides access to sensor hardware via QML and C++ interfaces.
  documentation: https://doc.qt.io/qt-6/qtsensors-index.html
  repository: https://github.com/qt/qtsensors

extra:
  recipe-maintainers:
    - conda-forge/qt-main
    - jschueller
  feedstock-name: qt-sensors
