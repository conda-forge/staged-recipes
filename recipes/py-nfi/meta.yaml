{% set name = "py-nfi" %}
{% set version = "0.1.1" %}
{% set python_min = "3.10" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/py_nfi-{{ version }}.tar.gz
  sha256: 4ede478d5d3d064cfe2002594b45fa1d92bebb23e498ae9c7e6aef6f2a1fbced

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - pip
    - setuptools >=64
    - setuptools-scm >=8
  run:
    - python >={{ python_min }}
    - numpy
    - pandas
    - scipy
    - tqdm

test:
  imports:
    - nfi
  commands:
    - pip check
  requires:
    - python {{ python_min }}
    - pip

about:
  home: https://github.com/ivandevert/py-nfi
  summary: Normalized frequency index (nFI) computation for earthquake source spectra
  description: |
    py-nfi computes the normalized frequency index (nFI) from earthquake
    spectra. nFI is a data-driven measure of the relative high-frequency
    content of a seismic source, providing an observation-based alternative
    to stress-drop estimation for characterizing source behavior at high
    frequencies.
  license: MIT
  license_file: LICENSE
  doc_url: https://github.com/ivandevert/py-nfi
  dev_url: https://github.com/ivandevert/py-nfi

extra:
  recipe-maintainers:
    - ivandevert
