{% set name = "splicecraft" %}
{% set version = "0.4.3" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz
  sha256: 5a7d275d7b972d9e0f5b0bab1e8bad7861642494724c4f14a65d5b4d816f957b

build:
  number: 0
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  entry_points:
    - splicecraft = splicecraft:main

requirements:
  host:
    - python >=3.10
    - pip
    - hatchling >=1.24
  run:
    - python >=3.10
    - textual >=8.2.3
    - rich >=14
    - biopython >=1.87
    - primer3-py >=2.3.0
    - platformdirs >=4.2

test:
  imports:
    - splicecraft
  requires:
    - pip
  commands:
    - pip check
    - splicecraft --version
    - splicecraft --help

about:
  home: https://github.com/Binomica-Labs/SpliceCraft
  summary: Terminal-based circular plasmid map viewer, sequence editor, and primer/Golden Braid workbench
  description: |
    SpliceCraft is a terminal-based circular plasmid map viewer, sequence
    editor, primer-design workbench (Primer3-backed), Golden Braid L0
    parts domesticator, and SOE-PCR site-directed mutagenesis tool.
    Plasmids render as Unicode-braille rings with directional feature
    arcs, restriction-site overlays, and a per-base sequence panel.
    Plasmids organise into named collections; library, parts bin,
    primers, and feature library all persist to atomic JSON files with
    automatic .bak rotation.
  license: MIT
  license_family: MIT
  license_file: LICENSE
  doc_url: https://github.com/Binomica-Labs/SpliceCraft#readme
  dev_url: https://github.com/Binomica-Labs/SpliceCraft

extra:
  recipe-maintainers:
    - ATinyGreenCell
