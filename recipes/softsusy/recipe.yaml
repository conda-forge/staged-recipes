context:
  version: "4.1.22"

package:
  name: softsusy
  version: ${{ version }}

source:
  url: https://raw.githubusercontent.com/BAllanach/softsusy/v${{ version }}/tags/softsusy-${{ version }}.tar.gz
  sha256: 2584e8f8ddd2c7069e7f5f5f4c38a903daa9d8dbbb92256adc548547377e2e89
  patches:
    # c.f. https://github.com/BAllanach/softsusy/pull/42
    - fix-duplicate-tsil-header.patch

build:
  number: 0
  skip:
    - win

requirements:
  run_exports:
    - ${{ pin_subpackage("softsusy", upper_bound="x.x") }}
  build:
    - ${{ stdlib("c") }}
    - ${{ compiler("c") }}
    - ${{ compiler("cxx") }}
    - ${{ compiler("fortran") }}
    - automake
    - libtool
    - make
    - sed
    - grep
    - pkg-config
    - gnuconfig

tests:
  - package_contents:
      strict: true
      bin:
        - softsusy.x
        - softsusy-nmssm.x
        - softpoint.x
        - rpvsoftsusy.x
        - rpvneut.x
      lib:
        - soft
        - supermodel
        - tsil
      include:
        - softsusy/*.h
      files:
        - share/softsusy/*
  - script:
      - softsusy.x
      - softsusy-nmssm.x
      - rpvsoftsusy.x
      - rpvneut.x
      - softpoint.x sugra --m0=1000 --m12=1000 --a0=0 --tanBeta=10 --sgnMu=1

about:
  homepage: https://softsusy.hepforge.org/
  repository: https://github.com/BAllanach/softsusy
  documentation: https://softsusy.hepforge.org/html/
  license: GPL-3.0-or-later
  license_file:
    - README.md
    - src/Himalaya-1.0.0/LICENSE
  summary: Calculates supersymmetric particle spectra
  description: |
    This program provides a SUSY spectrum in the NMSSM, or the MSSM including
    flavour violation and with or without R-parity consistent with input
    Standard Model fermion mass/mixings and electroweak/strong coupling data.
    The R-parity violating mode can calculate neutrino masses and mixings to
    1 loop.
    SOFTSUSY can be used in conjunction with other programs for many different
    particle physics calculations.
    SOFTSUSY now has a mode with 3 loop RGEs and some 2-loop threshold
    correction and 2-loop SUSY QCD corrections to gluino and squark pole masses.
    SOFTSUSY now computes decay branching ratios for the MSSM and NMSSM.
    It also ships with (and links to) Himalaya-1.0 for three-loop corrections
    to mh0.

extra:
  recipe-maintainers:
    - matthewfeickert
