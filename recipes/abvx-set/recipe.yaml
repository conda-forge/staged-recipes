schema_version: 1

context:
  version: "0.2.4"
  python_min: "3.10"

package:
  name: abvx-set
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/a/abvx-set/abvx_set-${{ version }}.tar.gz
  sha256: b7168213eb5a11baf0a7e886441c1cd57f38fe5c16168b4f79e7178024d8c2a8

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  python:
    entry_points:
      - set-validate-registry = scripts.validate_registry:main
      - set-plan-config-apply = scripts.plan_config_apply:main

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - setuptools >=68
  run:
    - python >=${{ python_min }}

tests:
  - python:
      imports:
        - scripts
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

  - requirements:
      run:
        - python ${{ python_min }}.*
    script:
      - set-validate-registry --help
      - set-plan-config-apply --help

about:
  summary: SET workflow action helpers and registry tooling
  license: MIT
  license_file: LICENSE
  homepage: https://github.com/markoblogo/SET
  repository: https://github.com/markoblogo/SET

extra:
  recipe-maintainers:
    - markoblogo
