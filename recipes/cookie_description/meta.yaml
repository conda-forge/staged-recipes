{% set name = "cookie_description" %}
{% set version = "1.1.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.io/packages/source/{{ name[0] }}/{{ name }}/cookie_description-{{ version }}.tar.gz
  sha256: 64cadfe4e9a424f34aac5a5ca65ce9913908edaf2e70c55c51e27e1a96a6cec2

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python >=3.10
    - flit-core >=2,<4
    - pip
  run:
    - python >=3.10

test:
  imports:
    - cookie_description
  commands:
    - pip check
  requires:
    - pip

about:
  home: https://pypi.org/project/cookie_description
  summary:  URDF and Xacro descriptions for Cookie wheeled bipeds.
  dev_url: https://codeberg.org/upkie/cookie_description
  license: Apache-2.0
  license_file: LICENSE

extra:
  recipe-maintainers:
    - stephane-caron
