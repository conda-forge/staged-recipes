schema_version: 1

context:
  version: "1.1"
  python_min: "3.10"

package:
  name: pymecom
  version: ${{ version }}

source:
  url: https://github.com/meerstetter/pyMeCom/archive/refs/tags/v${{ version }}.tar.gz
  sha256: 5a303f664d7d5ee1021f57590184a372fcc2a7702b190b0a563311cf261c0f8e

build:
  number: 0
  noarch: python
  script: python -m pip install . -vv

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - setuptools
  run:
    - python >=${{ python_min }}
    - pyserial >=3.4

tests:
  - python:
      python_version: ${{ python_min }}.*
      imports:
        - mecom
      pip_check: true

about:
  homepage: https://github.com/meerstetter/pyMeCom
  repository: https://github.com/meerstetter/pyMeCom
  summary: Python interface for the MeCom protocol by Meerstetter Engineering
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - VolodymyrSvintozelskyi
