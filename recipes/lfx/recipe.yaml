context:
  version: "1.10.1"
  python_min: "3.10"

package:
  name: lfx
  version: ${{ version }}

source:
  url: https://github.com/langflow-ai/langflow/archive/refs/tags/v${{ version }}.tar.gz
  sha256: 807470ff4bc1283db9716e911af8755b4104847bb6dbba03fc2e610184598fdb

build:
  noarch: python
  script: $PYTHON -m pip install ./src/lfx --no-deps --no-build-isolation -vv
  number: 0

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - setuptools
  run:
    - python >=${{ python_min }},<3.15
    - ag-ui-protocol >=0.1.10
    - aiofile >=3.8.0,<4.0.0
    - aiofiles >=24.1.0,<25.0.0
    - asyncer >=0.0.8,<1.0.0
    - cachetools >=6.0.0
    - chardet >=7.3.0
    - cryptography >=48.0.1
    - defusedxml >=0.7.1,<1.0.0
    - docstring_parser >=0.16,<1.0.0
    - emoji >=2.14.1,<3.0.0
    - fastapi >=0.135.0,<1.0.0
    - filelock >=3.20.1,<4.0.0
    - httpx >=0.24.0,<1.0.0
    - json-repair >=0.30.3,<1.0.0
    - langchain-classic >=1.0.7,<1.1.0
    - langchain-core >=1.2.28,<2.0.0
    - langchain >=1.3.0,<1.4.0
    - langflow-sdk >=0.2.1
    - loguru >=0.7.3,<1.0.0
    - markitdown >=0.1.4,<2.0.0
    - mcp >=1.17.0,<2.0.0
    - nanoid >=2.0.0,<3.0.0
    - networkx >=3.4.2,<4.0.0
    - orjson >=3.11.6,<4.0.0
    - pandas >=2.0.0,<3.0.0
    - passlib >=1.7.4,<2.0.0
    - pillow >=11.1.0,<13.0.0
    - platformdirs >=4.3.8,<5.0.0
    - pydantic-settings >=2.10.1,<3.0.0
    - pydantic >=2.0.0,<3.0.0
    - pypdf >=6.10.0,<7.0.0
    - python-dotenv >=1.0.0,<2.0.0
    - pyyaml >=6.0.0,<7.0.0
    - rich >=13.0.0,<14.0.0
    - setuptools >=80.0.0,<81.0.0
    - structlog >=25.4.0,<26.0.0
    - tomli >=2.2.1,<3.0.0
    - typer >=0.16.0,<1.0.0
    - typing-extensions >=4.14.0,<5.0.0
    - uvicorn >=0.34.3,<1.0.0
    - validators >=0.34.0,<1.0.0

tests:
  - python:
      imports:
        - lfx
      pip_check: true
      python_version: ${{ python_min }}.*
  - script:
      - lfx --help

about:
  homepage: https://github.com/langflow-ai/langflow/tree/main/src/lfx
  summary: Langflow Executor - A lightweight CLI tool for executing and serving Langflow AI flows
  description: |
    LFX (Langflow Executor) is a command-line tool that serves and runs Langflow AI flows
    statelessly from flow JSON files with minimal dependencies. It uses a no-op database
    interface for all operations requiring persistent state, making it more lightweight
    than running the full Langflow package.
  license: MIT
  license_file: LICENSE
  repository: https://github.com/langflow-ai/langflow

extra:
  recipe-maintainers:
    - pb01ka
