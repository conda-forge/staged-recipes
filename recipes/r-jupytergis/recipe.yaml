schema_version: 1

context:
  version: "0.1.0"
  name: r-jupytergis

package:
  name: ${{ name }}
  version: ${{ version }}

source:
  url: https://github.com/geojupyter/${{ name }}/archive/refs/tags/v${{ version }}.tar.gz
  sha256: 7bda9e391af5ee1bde0127913d9ea3fe89785166b143d4e5bf40a9ba7719af2e

build:
  number: 0
  noarch: generic
  script:
    - R CMD INSTALL --build .

requirements:
  host:
    - r-base
    - r-r6
    - r-ywidgets ==0.1.3
    - xeus-r
  run:
    - r-base
    - r-r6
    - r-ywidgets ==0.1.3
    - jupytergis  # The JS runtime is bundled with the Python client

tests:
  - script:
      - Rscript -e 'library("jupytergis")'

about:
  homepage: https://github.com/geojupyter/${{ name }}
  summary: R client for JupyterGIS
  description: |
    R client to JupyterGIS
  license: MIT
  license_file:
    - LICENSE
  repository: https://github.com/geojupyter/${{ name }}

extra:
  recipe-maintainers:
    - AntoinePrv
