schema_version: 1

context:
  version: "2.1.5"

package:
  name: runpodctl
  version: ${{ version }}

source:
  url: https://github.com/runpod/runpodctl/archive/refs/tags/v${{ version }}.tar.gz
  sha256: 4932f856cfb7394ecf099fc551619741e8b164a67a26dde545db8d1c0b201778

build:
  number: 0
  script:
    - go-licenses save . --save_path=license-files --ignore github.com/runpod/runpodctl
    - if: linux and x86_64
      then:
        - make linux-amd64
        - mkdir -p ${PREFIX}/bin
        - install -m 755 bin/runpodctl-linux-amd64 ${PREFIX}/bin/runpodctl
    - if: osx and x86_64
      then:
        - make darwin-amd64
        - mkdir -p ${PREFIX}/bin
        - install -m 755 bin/runpodctl-darwin-amd64 ${PREFIX}/bin/runpodctl
    - if: win and x86_64
      then:
        - make windows-amd64
        - mkdir "%LIBRARY_BIN%"
        - move bin\runpodctl-windows-amd64.exe "%LIBRARY_BIN%\runpodctl.exe"

requirements:
  build:
    - ${{ compiler("go-nocgo") }}
    - go-licenses
    - make

tests:
  - script:
      - runpodctl --version
      - runpodctl --help

about:
  homepage: "https://www.runpod.io"
  repository: https://github.com/runpod/runpodctl
  documentation: https://docs.runpod.io/runpodctl
  license: GPL-3.0-only
  license_file:
    - LICENSE
    - license-files/
  summary: "🧰 | Runpod CLI for pod management"
  description: runpodctl is the cli tool to manage gpu pods, serverless endpoints, and more on [runpod.io](https://runpod.io).

extra:
  recipe-maintainers:
    - eunos-1128
