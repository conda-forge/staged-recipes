schema_version: 1

context:
  version: "2.1.5"

package:
  name: runpodctl
  version: ${{ version }}

source:
  url: https://github.com/runpod/runpodctl/archive/refs/tags/v${{ version }}.tar.gz
  sha256: 4932f856cfb7394ecf099fc551619741e8b164a67a26dde545db8d1c0b201778

build:
  number: 0
  script:
    - go-licenses save . --save_path=license-files --ignore github.com/runpod/runpodctl
    - if: unix
      then: go build -v -o ${PREFIX}/bin/runpodctl -ldflags="-s -w -X main.Version=${PKG_VERSION}"
    - if: win
      then: go build -v -o %LIBRARY_BIN%\runpodctl.exe -ldflags="-s -X main.Version=%PKG_VERSION%"
    - if: unix
      then:
        - mkdir -p ${PREFIX}/share/zsh/site-functions ${PREFIX}/share/bash-completion/completions ${PREFIX}/share/fish/vendor_completions.d
        - ${PREFIX}/bin/runpodctl completion --shell zsh > ${PREFIX}/share/zsh/site-functions/_runpodctl
        - ${PREFIX}/bin/runpodctl completion --shell bash > ${PREFIX}/share/bash-completion/completions/runpodctl
        - ${PREFIX}/bin/runpodctl completion --shell fish > ${PREFIX}/share/fish/vendor_completions.d/runpodctl.fish

requirements:
  build:
    - ${{ compiler("go-nocgo") }}
    - go-licenses

tests:
  - script:
      - runpodctl --version
      - runpodctl --help

about:
  homepage: "https://www.runpod.io"
  repository: https://github.com/runpod/runpodctl
  documentation: https://docs.runpod.io/runpodctl
  license: GPL-3.0-only
  license_file:
    - LICENSE
    - license-files/
  summary: "🧰 | Runpod CLI for pod management"
  description: runpodctl is the cli tool to manage gpu pods, serverless endpoints, and more on [runpod.io](https://runpod.io).

extra:
  recipe-maintainers:
    - eunos-1128
