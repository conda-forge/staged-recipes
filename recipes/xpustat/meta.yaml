{% set name = "xpustat" %}
{% set version = "0.1.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/xpustat-{{ version }}.tar.gz
  sha256: 9acf2e2a56b1fb9db3346a3284b2c3654ea1c1019b9beff08de655c5cd83c2a6

build:
  noarch: python
  number: 0
  script: {{ PYTHON }} -m pip install . -vv
  entry_points:
    - xpustat = xpustat.cli:main

requirements:
  host:
    - python {{ python_min }}
    - pip
    - setuptools >=61
  run:
    - python >={{ python_min }}
    - psutil >=5.9

test:
  imports:
    - xpustat
  requires:
    - python {{ python_min }}
  commands:
    - xpustat --version

about:
  home: https://github.com/Bekhouche/xpustat
  summary: 'A unified stat tool for NVIDIA, AMD, Intel, Huawei, Hygon, Cambricon and Moore Threads accelerators'
  license: MIT
  license_family: MIT
  license_file: LICENSE
  doc_url: https://github.com/Bekhouche/xpustat
  dev_url: https://github.com/Bekhouche/xpustat

extra:
  recipe-maintainers:
    - Bekhouche
