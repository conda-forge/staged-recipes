{% set name = "xpustat" %}
{% set version = "0.1.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.io/packages/source/{{ name[0] }}/{{ name }}/xpustat-{{ version }}.tar.gz
  sha256: f35c1c4f8f77d074bf8452d937ed996b99f50573f0315beaa584559d689119ed

build:
  noarch: python
  number: 0
  script: {{ PYTHON }} -m pip install . -vv
  entry_points:
    - xpustat = xpustat.cli:main

requirements:
  host:
    - python >=3.9
    - pip
    - setuptools >=61
  run:
    - python >=3.9
    - psutil >=5.9

test:
  imports:
    - xpustat
  commands:
    - xpustat --version

about:
  home: https://github.com/Bekhouche/xpustat
  summary: 'A unified stat tool for NVIDIA, AMD, Intel, Huawei, Hygon, Cambricon and Moore Threads accelerators'
  license: MIT
  license_family: MIT
  license_file: LICENSE
  doc_url: https://github.com/Bekhouche/xpustat
  dev_url: https://github.com/Bekhouche/xpustat

extra:
  recipe-maintainers:
    - Bekhouche
