{% set name = "circuitbench" %}
{% set version = "1.0.0" %}
{% set python_min = "3.9" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/circuitbench-{{ version }}.tar.gz
  sha256: cbe310689c73f863b163c07b291d7046581e3693509e403efd6d303f4b7b7d0b

build:
  noarch: python
  number: 0
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python {{ python_min }}
    - pip
    - setuptools >=61.0
  run:
    - python >=3.9
    - numpy >=1.21.0
    - pandas >=1.3.0
    - scipy >=1.7.0
    - pyyaml >=6.0          # If you use YAML files for circuit configurations
    - requests >=2.25.0
    - scikit-learn >=1.0
    - matplotlib >=3.4.0    # For plotting circuit metrics or loss curves
    # Optional deep learning backends:
    # - torch >=2.0
    - pyspice >=1.5         # If using PySpice to interact with Ngspice
    - lxml                  # For parsing XML/netlist outputs
    

test:
  imports:
    - circuitbench
  requires:
    - python {{ python_min }}

about:
  home: https://github.com/ksaad20/Circuit-Bench
  summary: An open-source benchmark and evaluation framework for AI methods in electrical circuit design.
  license: Apache-2.0
  license_file: LICENSE

extra:
  recipe-maintainers:
    - ksaad20
