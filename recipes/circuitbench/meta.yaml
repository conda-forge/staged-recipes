{% set name = "circuitbench" %}
{% set version = "0.1.0" %}
{% set python_min = "3.9" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/circuitbench-{{ version }}.tar.gz
  sha256: REPLACE_WITH_YOUR_SDIST_SHA256_HASH

build:
  noarch: python
  number: 0
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python {{ python_min }}
    - pip
    - setuptools >=61.0
  run:
    - python >={{ python_min }}

test:
  imports:
    - circuitbench
  requires:
    - python {{ python_min }}

about:
  home: https://github.com/ksaad20/Circuit-Bench
  summary: An open-source benchmark and evaluation framework for AI methods in electrical circuit design.
  license: Apache-2.0
  license_file: LICENSE

extra:
  recipe-maintainers:
    - ksaad20
