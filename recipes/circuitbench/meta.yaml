{% set name = "circuitbench" %}
{% set version = "1.0.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://files.pythonhosted.org/packages/2e/97/bf3e2fdad6074a025b2d4f4151e0f09e9adb4d182af18b363ce66132d0d5/circuitbench-{{ version }}.tar.gz
  sha256: cbe310689c73f863b163c07b291d7046581e3693509e403efd6d303f4b7b7d0b

build:
  number: 0
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  entry_points:
    - circuitbench = circuitbench.cli.main:main

requirements:
  host:
    - python
    - pip
    - setuptools
  run:
    - python
    - matplotlib-base
    - numpy
    - pandas
    - scipy
    - pyyaml
    - requests
    - scikit-learn
    - pyspice
    - lxml
    - rich
    - typer

test:
  imports:
    - circuitbench
  commands:
    - pip check
    - circuitbench --help
  requires:
    - python
    - pip

about:
  home: https://github.com/ksaad20/Circuit-Bench
  license: Apache-2.0
  license_family: APACHE
  license_file: License.txt
  summary: CircuitBench evaluation toolkit

extra:
  recipe-maintainers:
    - ksaad20
