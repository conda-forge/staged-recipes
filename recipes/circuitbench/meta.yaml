{% set name = "circuitbench" %}
{% set version = "0.1.0" %}
{% set python_min = "3.10" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/circuitbench-{{ version }}.tar.gz
  sha256: cbe310689c73f863b163c07b291d7046581e3693509e403efd6d303f4b7b7d0b

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - pip
    - setuptools >=61.0
  run:
    - python >={{ python_min }}
    - matplotlib-base
    - numpy >=1.21.0
    - pandas >=1.3.0
    - scipy >=1.7.0
    - pyyaml >=6.0
    - requests >=2.25.0
    - scikit-learn >=1.0
    - pyspice >=1.5
    - lxml

test:
  imports:
    - circuitbench
  commands:
    - pip check
  requires:
    - python {{ python_min }}
    - pip

about:
  home: https://github.com/ksaad20/Circuit-Bench
  license: Apache-2.0
  license_family: APACHE
  license_file: License.txt
  summary: CircuitBench evaluation toolkit

extra:
  recipe-maintainers:
    - ksaad20
