{% set name = "circuitbench" %}
{% set version = "1.0.0" %}
{% set python_min = "3.10" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://files.pythonhosted.org/packages/2e/97/bf3e2fdad6074a025b2d4f4151e0f09e9adb4d182af18b363ce66132d0d5/circuitbench-{{ version }}.tar.gz
  sha256: cbe310689c73f863b163c07b291d7046581e3693509e403efd6d303f4b7b7d0b

build:
  number: 0
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  entry_points:
    - circuitbench = circuitbench.cli.main:main

requirements:
  host:
    - python {{ python_min }}
    - pip
    - setuptools >=61.0
  run:
    - python >={{ python_min }}
    - matplotlib-base
    - numpy >=1.21.0
    - pandas >=1.3.0
    - scipy >=1.7.0
    - pyyaml >=6.0
    - requests >=2.25.0
    - scikit-learn >=1.0
    - pyspice >=1.5
    - lxml
    - rich
    - typer

test:
  imports:
    - circuitbench
  commands:
    - pip check
    - circuitbench --help
  requires:
    - python {{ python_min }}
    - pip

about:
  home: https://github.com/ksaad20/Circuit-Bench
  license: Apache-2.0
  license_family: APACHE
  license_file: LICENSE.txt
  summary: CircuitBench evaluation toolkit

extra:
  recipe-maintainers:
    - ksaad20
