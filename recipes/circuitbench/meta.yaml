{% set name = "circuitbench" %}
{% set version = "0.1.0" %} # Change to your published PyPI version

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/circuitbench-{{ version }}.tar.gz
  # You can get the sha256 hash from your PyPI release page under Download files
  sha256: REPLACE_WITH_YOUR_SDIST_SHA256_HASH

build:
  noarch: python
  number: 0
  script: {{ PYTHON }} -m pip install . -vv

requirements:
  host:
    - python >=3.8
    - pip
  run:
    - python >=3.8

test:
  imports:
    - circuitbench

about:
  home: https://github.com/ksaad20/Circuit-Bench
  summary: An open-source benchmark and evaluation framework for AI methods in electrical circuit design.
  license: Apache-2.0
  license_file: LICENSE

extra:
  recipe-maintainers:
    - ksaad20
