context:
  version: "0.4.0"
  grep: ${{ "grep" if unix else "findstr" }}

package:
  name: flux-schema
  version: ${{ version }}

source:
  url: https://github.com/fluxcd/flux-schema/archive/refs/tags/v${{ version }}.tar.gz
  sha256: d80c12a5529d3b9b16cc5ed2b018d9fd227d7b042fa6e58000f7a7063e1bf707

build:
  number: 0
  script:
    - go-licenses save ./cmd/flux-schema --save_path ./library_licenses
    - if: unix
      then:
        - go build -v -o $PREFIX/bin/flux-schema -ldflags="-s -w -X main.VERSION=${{ version }}" ./cmd/flux-schema
        - mkdir -p $PREFIX/share/zsh/site-functions $PREFIX/share/bash-completion/completions $PREFIX/share/fish/vendor_completions.d
        - $PREFIX/bin/flux-schema completion zsh > $PREFIX/share/zsh/site-functions/_flux-schema
        - $PREFIX/bin/flux-schema completion bash > $PREFIX/share/bash-completion/completions/flux-schema
        - $PREFIX/bin/flux-schema completion fish > $PREFIX/share/fish/vendor_completions.d/flux-schema.fish
      else: go build -v -o %LIBRARY_BIN%\flux-schema.exe -ldflags="-s -w -X main.VERSION=${{ version }}" ./cmd/flux-schema
requirements:
  build:
    - ${{ compiler("go-nocgo") }}
    - go-licenses

tests:
  - script: flux-schema version | ${{ grep }} "${{ version }}"
  - package_contents:
      bin:
        - flux-schema
      files:
        - if: unix
          then:
            - share/bash-completion/completions/flux-schema
            - share/fish/vendor_completions.d/flux-schema.fish
            - share/zsh/site-functions/_flux-schema
      strict: true

about:
  homepage: https://github.com/fluxcd/flux-schema
  summary: Flux CLI plugin for Kubernetes manifests validation against JSON Schemas and CEL rules
  description: |
    Flux Schema is a CLI for validating Kubernetes YAML manifests against JSON
    Schema and CEL rules using the same evaluation semantics as the Kubernetes
    API server. It ships as a single Go binary with a built-in catalog
    covering Kubernetes, OpenShift, Gateway API, and the Flux ecosystem CRDs.
  license: Apache-2.0
  license_file:
    - LICENSE
    - library_licenses/
  documentation: https://github.com/fluxcd/flux-schema/tree/main/docs
  repository: https://github.com/fluxcd/flux-schema

extra:
  recipe-maintainers:
    - aaronlionsheep