schema_version: 1

context:
  name: dfxm-geo
  version: "2.1.2"
  python_min: "3.11"

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://github.com/borgi-s/Geometrical_Optics_master/archive/8453513695d4a44c63930ef61d3218b2e68e50fb.tar.gz
  sha256: 23fb9df9b6478bb3f56bbf9df77b29ba5877db3cb77a32af89c45e8179c777a7

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - setuptools >=68
    - wheel
  run:
    - python >=${{ python_min }}
    - numpy >=1.23,<3
    - scipy >=1.10,<2
    - numba >=0.56
    - matplotlib-base >=3.6
    - seaborn-base >=0.12
    - fabio >=2023.4
    - h5py >=3
    - joblib >=1.3
    - tqdm >=4.66.3
  run_constraints:
    - xraylib >=4.1
    - psutil >=5
    - plotly >=5

tests:
  - python:
      imports:
        - dfxm_geo
        - dfxm_geo.analysis
        - dfxm_geo.crystal
        - dfxm_geo.data
        - dfxm_geo.direct_space
        - dfxm_geo.io
        - dfxm_geo.reciprocal_space
        - dfxm_geo.viz
      pip_check: true
      python_version: ${{ python_min }}.*
  - script:
      # DIAGNOSTIC (verification only): route uncaught exceptions to stdout
      # (the CI log captures stdout) and step-print to pinpoint which import
      # crashes dfxm-forward on win-64.
      - 'python -u -c "import sys,traceback; sys.excepthook=lambda et,ev,tb: traceback.print_exception(et,ev,tb,file=sys.stdout); print(''STEP1 interpreter up'',flush=True); import dfxm_geo; print(''STEP2 dfxm_geo'',flush=True); import dfxm_geo.crystal.rotations as r; print(''STEP3 rotations imported'',flush=True); import numpy as np; r.fast_inverse2(np.random.default_rng().random((4,3,3))); print(''STEP4 fast_inverse2 compiled+ran'',flush=True); import dfxm_geo.direct_space.forward_model; print(''STEP5 forward_model'',flush=True); import dfxm_geo.pipeline; print(''STEP6 pipeline OK'',flush=True)"'
    requirements:
      run:
        - python ${{ python_min }}.*

about:
  homepage: https://github.com/borgi-s/Geometrical_Optics_master
  repository: https://github.com/borgi-s/Geometrical_Optics_master
  documentation: https://github.com/borgi-s/Geometrical_Optics_master/tree/main/docs
  license: MIT
  license_file: LICENSE
  summary: Geometrical-optics forward model for dark-field X-ray microscopy
  description: |
    dfxm-geo is a geometrical-optics forward model for dark-field X-ray
    microscopy (DFXM).

extra:
  recipe-maintainers:
    - borgi-s
