schema_version: 1

context:
  name: dfxm-geo
  version: "2.1.2"
  python_min: "3.11"

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://github.com/borgi-s/Geometrical_Optics_master/archive/8453513695d4a44c63930ef61d3218b2e68e50fb.tar.gz
  sha256: 23fb9df9b6478bb3f56bbf9df77b29ba5877db3cb77a32af89c45e8179c777a7

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - setuptools >=68
    - wheel
  run:
    - python >=${{ python_min }}
    - numpy >=1.23,<3
    - scipy >=1.10,<2
    - numba >=0.56
    - matplotlib-base >=3.6
    - seaborn-base >=0.12
    - fabio >=2023.4
    - h5py >=3
    - joblib >=1.3
    - tqdm >=4.66.3
  run_constraints:
    - xraylib >=4.1
    - psutil >=5
    - plotly >=5

tests:
  - python:
      imports:
        - dfxm_geo
      pip_check: true
      python_version: ${{ python_min }}.*
  - script:
      # DIAGNOSTIC: (1) locate the launcher, (2) run the dfxm-forward launcher
      # via subprocess and capture its stdout+stderr (rattler does not surface
      # the launcher's own stderr) — always exits 0 so output reaches the log,
      # (3) call cli_main directly (SystemExit(0) from --help exits cleanly).
      - 'python -u -c "import shutil; print(''WHICH dfxm-forward ->'', shutil.which(''dfxm-forward''), flush=True)"'
      - 'python -u -c "import subprocess as s; p=s.run([''dfxm-forward'',''--help''], capture_output=True, text=True); print(''LAUNCHER RC ='', p.returncode, flush=True); print(''--- launcher STDOUT ---'', flush=True); print(p.stdout, flush=True); print(''--- launcher STDERR ---'', flush=True); print(p.stderr, flush=True)"'
      - 'python -u -c "import sys,traceback; sys.excepthook=lambda et,ev,tb: traceback.print_exception(et,ev,tb,file=sys.stdout); from dfxm_geo.pipeline import cli_main; cli_main([''--help''])"'
    requirements:
      run:
        - python ${{ python_min }}.*

about:
  homepage: https://github.com/borgi-s/Geometrical_Optics_master
  repository: https://github.com/borgi-s/Geometrical_Optics_master
  license: MIT
  license_file: LICENSE
  summary: Geometrical-optics forward model for dark-field X-ray microscopy
  description: |
    dfxm-geo is a geometrical-optics forward model for dark-field X-ray
    microscopy (DFXM).

extra:
  recipe-maintainers:
    - borgi-s
