schema_version: 1

context:
  name: dfxm-geo
  version: "2.1.2"
  # requires-python = ">=3.11"; override conda-forge's lower global python_min.
  python_min: "3.11"

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  # TEMPORARY (verification only): build from a GitHub archive of the
  # fastmath-fix commit to confirm the win-64 build before cutting a PyPI
  # 2.1.3 release. Will be switched back to the PyPI sdist for the final recipe.
  url: https://github.com/borgi-s/Geometrical_Optics_master/archive/8453513695d4a44c63930ef61d3218b2e68e50fb.tar.gz
  sha256: 23fb9df9b6478bb3f56bbf9df77b29ba5877db3cb77a32af89c45e8179c777a7

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - setuptools >=68
    - wheel
  run:
    - python >=${{ python_min }}
    - numpy >=1.23,<3
    - scipy >=1.10,<2
    - numba >=0.56
    - matplotlib-base >=3.6
    - seaborn-base >=0.12
    - fabio >=2023.4
    - h5py >=3
    - joblib >=1.3
    - tqdm >=4.66.3
  run_constraints:
    # Optional extras — not installed by default, but version-pinned if present.
    - xraylib >=4.1      # beamstop-wire (X-ray attenuation through the wire)
    - psutil >=5         # memory-aware (adaptive parallel worker capping)
    - plotly >=5         # identification (interactive viewers)

tests:
  - python:
      imports:
        - dfxm_geo
        - dfxm_geo.analysis
        - dfxm_geo.crystal
        - dfxm_geo.data
        - dfxm_geo.direct_space
        - dfxm_geo.io
        - dfxm_geo.reciprocal_space
        - dfxm_geo.viz
      pip_check: true
      python_version: ${{ python_min }}.*
  - script:
      - dfxm-forward --help
      - dfxm-identify --help
      - dfxm-bootstrap --help
      - dfxm-init --help
    # Pin the script-test env to the minimum supported Python, matching the
    # import test above. dfxm-geo targets Python 3.11–3.12.
    requirements:
      run:
        - python ${{ python_min }}.*

about:
  homepage: https://github.com/borgi-s/Geometrical_Optics_master
  repository: https://github.com/borgi-s/Geometrical_Optics_master
  documentation: https://github.com/borgi-s/Geometrical_Optics_master/tree/main/docs
  license: MIT
  license_file: LICENSE
  summary: Geometrical-optics forward model for dark-field X-ray microscopy
  description: |
    dfxm-geo is a geometrical-optics forward model for dark-field X-ray
    microscopy (DFXM). It simulates DFXM images of crystals containing
    dislocations, supports multi-reflection kernels, scan trajectories
    (theta / two_dtheta / z), and crystal layouts, and writes simulation
    output in a BLISS-compatible HDF5 layout. A companion identification
    mode reconstructs dislocation populations from simulated scans.

    The model is described in Borgi et al., IUCrJ (2024).

extra:
  recipe-maintainers:
    - borgi-s
