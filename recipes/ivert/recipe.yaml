schema_version: 1

context:
  python_min: "3.12"
  version: "0.6.0"
  build_number: 0
  sha256: "dea35f2e2cac2050838069196465d772d8e34c5f7ecd1a946774cb8beb0c67e8"

package:
  name: ivert
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/i/ivert/ivert-${{ version }}.tar.gz
  sha256: ${{ sha256 }}

build:
  number: ${{ build_number }}
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  python:
    entry_points:
      - ivert = ivert.cli:ivert_cli

requirements:
  host:
    - python ${{ python_min }}.*
    - hatchling >=1.5.0
    - hatch-vcs
    - pip
  run:
    - python >=${{ python_min }}
    - python-blosc2
    - click
    - dateparser
    - gdal
    - geopandas
    - h5py
    - matplotlib
    - netCDF4
    - numexpr
    - numpy
    - pandas
    - psutil
    - pyproj
    - rasterio
    - scipy
    - shapely
    - six
    - tabulate
    - xarray
    - fetchez
    - globato
    - transformez

tests:
  - python:
      python_version:
        - "${{ python_min }}.*"
        - "*"
      pip_check: true
      imports:
        - ivert 
  - script:
      - ivert --help
    requirements:
      run:
        - python ${{ python_min }}.*

about:
  homepage: https://github.com/continuous-dems/ivert
  summary: The ICESat-2 Validation of Elevations Reporting Tool (IVERT)
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - matth-love
    - mmacferrin 
    - mfisher87
