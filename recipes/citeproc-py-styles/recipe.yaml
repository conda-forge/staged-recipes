schema_version: 1

context:
  version: 0.1.5

package:
  name: citeproc-py-styles
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/c/citeproc-py-styles/citeproc_py_styles-${{ version }}.tar.gz
  sha256: 20a82e22b4eb814039449ba83be8c142a385e6f6f17f5b70b1b33b3fd1f8e619

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - pip
    - pytest-runner >=2.6.2
    - python ${{ python_min }}.*
    - setuptools
  run:
    - lxml >=4.1.1
    - python >=${{ python_min }}
    - six >=1.10.0

tests:
  - python:
      python_version:
        - ${{ python_min }}.*
        - "*"
      imports:
        - citeproc_styles
      pip_check: true

about:
  summary: CSL styles.
  license: MIT
  license_file: LICENSE
  homepage: https://github.com/inveniosoftware/citeproc-py-styles

extra:
  recipe-maintainers:
    - mikemhenry
