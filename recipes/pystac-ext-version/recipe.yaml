schema_version: 1

context:
  version: "1.2.0"

package:
  name: pystac-ext-version
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/p/pystac-ext-version/pystac_ext_version-${{ version }}.tar.gz
  sha256: aac23024e76cd64c9bec46a8b49f884f2e8c89cc3d0fe317f5f58dfaa56d1aa0

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - hatchling
    - pip
  run:
    - python >=${{ python_min }}
    - pystac-core

tests:
  - python:
      imports:
        - pystac_ext_version
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  summary: Version extension for PySTAC
  license: Apache-2.0
  license_file: LICENSE
  homepage: https://pypi.org/project/pystac-ext-version/
  documentation: https://pystac.readthedocs.io

extra:
  recipe-maintainers:
    - ocefpaf
