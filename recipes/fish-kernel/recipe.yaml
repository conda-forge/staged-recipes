schema_version: 1

context:
  version: "1.0.0"

package:
  name: fish-kernel
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/f/fish-kernel/fish_kernel-${{ version }}.tar.gz
  sha256: f2ac837c733cb0be8e78ac35be12f0344939b056eb54443ff400b84feb7f7ab1

build:
  number: 0
  noarch: python
  script:
    - ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
    - fish-kernel install --prefix ${{ PREFIX }}
  python:
    entry_points:
      - fish-kernel = fish_kernel.cli:main

requirements:
  host:
    - python ${{ python_min }}.*
    - hatchling >=1.26.0
    - pip
  run:
    - __unix  # Cannot install fish on Windows
    - python >=${{ python_min }}
    - filetype >=1.2.0
    - ipykernel >=6.29.4
    - jupyter_client >=8.6.2
    - pexpect >=4.9.0
  run_constraints:
    - fish >=4.1.0

tests:
  - python:
      imports:
        - fish_kernel
      python_version:
        - ${{ python_min }}.*
        - "*"
  - script:
      - fish-kernel --help
      - jupyter kernelspec list | grep fish
      - jupyter run --kernel=fish test.sh
    files:
      recipe:
        - test.sh
    requirements:
      run:
        - fish

about:
  homepage: eunos-1128.github.io/fish-kernel
  documentation: eunos-1128.github.io/fish-kernel
  repository: https://github.com/eunos-1128/fish-kernel
  license: BSD-3-Clause
  license_file: LICENSE
  summary: A fish kernel for Jupyter
  description: |
    `fish-kernel` is a Jupyter kernel implementation for the fish shell.

extra:
  recipe-maintainers:
    - eunos-1128
