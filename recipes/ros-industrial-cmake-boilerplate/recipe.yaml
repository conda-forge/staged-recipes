schema_version: 1

context:
  version: "0.7.4"

package:
  name: ros-industrial-cmake-boilerplate
  version: ${{ version }}

source:
  - url: https://github.com/ros-industrial/ros_industrial_cmake_boilerplate/archive/refs/tags/${{ version }}.tar.gz
    sha256: faee6cd5101b49c92d9499d8e32e851833e5a94acbe09c892e4a87f23a5aa3cd
    file_name: source.tar.gz

build:
  number: 0

requirements:
  build:
    - ${{ compiler('c') }}
    - ${{ compiler('cxx') }}
    - ${{ stdlib("c") }}
    - gtest
    - gmock
    - cmake
    - if: win
      then: ninja
    - if: linux
      then: make
    - if: linux
      then: lcov

tests:
  - script:
      - if: unix
        then: test -d ${PREFIX}/lib/cmake/ros_industrial_cmake_boilerplate
      - if: unix
        then: test -f ${PREFIX}/lib/cmake/ros_industrial_cmake_boilerplate/ros_industrial_cmake_boilerplate-config.cmake
      - if: win
        then: if not exist %LIBRARY_PREFIX%\lib\cmake\ros_industrial_cmake_boilerplate (exit 1)
      - if: win
        then: if not exist %LIBRARY_PREFIX%\lib\cmake\ros_industrial_cmake_boilerplate\ros_industrial_cmake_boilerplate-config.cmake (exit 1)

about:
  summary: A collection of boilerplate CMake scripts and marcos
  license: Apache-2.0 AND BSD-3-Clause
  license_file:
    - src/LICENSE
    - src/LICENSE.Apache-2.0
    - src/LICENSE.BSD-3-Clause
  homepage: https://github.com/ros-industrial/ros_industrial_cmake_boilerplate

extra:
  recipe-maintainers:
    - johnwason
