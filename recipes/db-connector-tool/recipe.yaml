schema_version: 1

context:
  python_min: "3.10"
  version: "1.1.2"

package:
  name: db-connector-tool
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/d/db-connector-tool/db_connector_tool-${{ version }}.tar.gz
  sha256: a48b981605fdf073e877c3d1873d668a4f5ad0bb077cdcea40b1c8565d372f9c

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  python:
    entry_points:
      - db-connector = db_connector_tool.cli:main

requirements:
  host:
    - python ${{ python_min }}.*
    - hatchling
    - pip
  run:
    - python >=${{ python_min }}
    - sqlalchemy >=2.0.0
    - cryptography >=47.0.0
    - tomli-w >=1.0.0
    - sqlparse >=0.5.0

tests:
  - python:
      imports:
        - db_connector_tool
      pip_check: true
      python_version: ${{ python_min }}.*
  - requirements:
      run:
        - pip
        - python ${{ python_min }}.*
    script:
      - db-connector --help

about:
  summary: 跨平台数据库连接管理工具，支持多种数据库类型（Oracle, PostgreSQL, SQL Server, MySQL, SQLite, GBase 8s）
  # readme
  # readme
  license: MIT
  # readme
  license_file: LICENSE.txt  # readme
  homepage: https://github.com/wangquanqing/db-connector-tool
  repository: https://github.com/wangquanqing/db-connector-tool/tree/main/src
  documentation: https://github.com/wangquanqing/db-connector-tool

extra:
  recipe-maintainers:
    - wangquanqing
