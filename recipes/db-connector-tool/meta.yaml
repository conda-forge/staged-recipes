{% set name = "db-connector-tool" %}
{% set version = "1.1.1" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.io/packages/source/{{ name[0] }}/{{ name }}/db-connector-tool-{{ version }}.tar.gz
  sha256: <需要从PyPI获取的实际SHA256值>

build:
  number: 0
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv

requirements:
  host:
    - python
    - pip
    - hatchling
  run:
    - python
    - sqlalchemy >=2.0.0
    - cryptography >=47.0.0
    - tomli-w >=1.0.0
    - sqlparse >=0.5.0

test:
  imports:
    - db_connector_tool

about:
  home: https://github.com/wangquanqing/db-connector-tool
  license: MIT
  license_family: MIT
  license_file: LICENSE.txt
  summary: 跨平台数据库连接管理工具，支持多种数据库类型
  description: |
    跨平台数据库连接管理工具，支持多种数据库类型（Oracle, PostgreSQL, SQL Server, MySQL, SQLite, GBase 8s）
  doc_url: https://github.com/wangquanqing/db-connector-tool#readme
  dev_url: https://github.com/wangquanqing/db-connector-tool

extra:
  recipe-maintainers:
    - wangquanqing
