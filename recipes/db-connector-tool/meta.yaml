{% set name = "db-connector-tool" %}
{% set version = "1.1.1" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.io/packages/source/{{ name[0] }}/{{ name }}/db-connector-tool-{{ version }}.tar.gz
  sha256: 121f5312d2e0dab13f7b558e44c31b2c317541de749f6e8478baf696d571ebc6

build:
  number: 0
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv

requirements:
  host:
    - python
    - pip
    - hatchling
  run:
    - python
    - sqlalchemy >=2.0.0
    - cryptography >=47.0.0
    - tomli-w >=1.0.0
    - sqlparse >=0.5.0

test:
  imports:
    - db_connector_tool
  commands:
    - python -c "import db_connector_tool; print('基础包导入成功')"

outputs:
  # Oracle支持包
  - name: db-connector-tool-oracle
    requirements:
      run:
        - {{ pin_subpackage('db-connector-tool', exact=True) }}
        - oracledb >=3.0.0
    test:
      imports:
        - db_connector_tool
      commands:
        - python -c "import db_connector_tool; print('Oracle支持包导入成功')"

  # PostgreSQL支持包
  - name: db-connector-tool-postgresql
    requirements:
      run:
        - {{ pin_subpackage('db-connector-tool', exact=True) }}
        - psycopg >=3.0.0
    test:
      imports:
        - db_connector_tool
      commands:
        - python -c "import db_connector_tool; print('PostgreSQL支持包导入成功')"

  # MySQL支持包
  - name: db-connector-tool-mysql
    requirements:
      run:
        - {{ pin_subpackage('db-connector-tool', exact=True) }}
        - pymysql >=1.0.0
    test:
      imports:
        - db_connector_tool
      commands:
        - python -c "import db_connector_tool; print('MySQL支持包导入成功')"

  # SQL Server支持包
  - name: db-connector-tool-sqlserver
    requirements:
      run:
        - {{ pin_subpackage('db-connector-tool', exact=True) }}
        - pymssql >=2.0.0
    test:
      imports:
        - db_connector_tool
      commands:
        - python -c "import db_connector_tool; print('SQL Server支持包导入成功')"

  # GBase 8s支持包
  - name: db-connector-tool-gbase8s
    requirements:
      run:
        - {{ pin_subpackage('db-connector-tool', exact=True) }}
        - jaydebeapi >=1.0.0
        - python-dateutil >=2.0.0
    test:
      imports:
        - db_connector_tool
      commands:
        - python -c "import db_connector_tool; print('GBase 8s支持包导入成功')"

  # 安全功能包
  - name: db-connector-tool-secure
    requirements:
      run:
        - {{ pin_subpackage('db-connector-tool', exact=True) }}
        - keyring >=25.0.0
    test:
      imports:
        - db_connector_tool
      commands:
        - python -c "import db_connector_tool; print('安全支持包导入成功')"

  # 完整支持包
  - name: db-connector-tool-all
    requirements:
      run:
        - {{ pin_subpackage('db-connector-tool', exact=True) }}
        - oracledb >=3.0.0
        - psycopg >=3.0.0
        - pymysql >=1.0.0
        - pymssql >=2.0.0
        - jaydebeapi >=1.0.0
        - python-dateutil >=2.0.0
        - keyring >=25.0.0
    test:
      imports:
        - db_connector_tool
      commands:
        - python -c "import db_connector_tool; print('完整支持包导入成功')"

about:
  home: https://github.com/wangquanqing/db-connector-tool
  license: MIT
  license_family: MIT
  license_file: LICENSE.txt
  summary: 跨平台数据库连接管理工具，支持多种数据库类型
  description: |
    跨平台数据库连接管理工具，支持多种数据库类型（Oracle, PostgreSQL, SQL Server, MySQL, SQLite, GBase 8s）
  doc_url: https://github.com/wangquanqing/db-connector-tool#readme
  dev_url: https://github.com/wangquanqing/db-connector-tool

extra:
  recipe-maintainers:
    - wangquanqing