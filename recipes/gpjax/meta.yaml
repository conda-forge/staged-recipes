{% set name = "gpjax" %}
{% set version = "0.12.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/gpjax-{{ version }}.tar.gz
  sha256: f59a19f71f488a06182cbb4cf6bf51fcb8d97aef011f77fb6d1507c808269532

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - hatchling
    - pip
  run:
    - python >={{ python_min }}
    - jax >=0.5.0
    - jaxlib >=0.5.0
    - optax >0.2.1
    - numpyro
    - jaxtyping >0.2.10
    - tqdm >4.66.2
    - beartype >0.16.1
    - flax >=0.10.0
    - numpy >=2.0.0

test:
  imports:
    - gpjax
  commands:
    - pip check
  requires:
    - python {{ python_min }}
    - pip

about:
  home: https://github.com/JaxGaussianProcesses/GPJax
  summary: Gaussian processes in JAX.
  dev_url: https://github.com/JaxGaussianProcesses/GPJax
  license: MIT
  license_file: LICENSE.txt

extra:
  recipe-maintainers:
    - thomaspinder
