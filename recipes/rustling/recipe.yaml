schema_version: 1

package:
  name: rustling
  version: "0.6.0"

source:
  url: https://pypi.org/packages/source/r/rustling/rustling-{{ version }}.tar.gz
  sha256: b37943fc44b196913ad7117f814861e149a109e5a116ce3fe21e4729722effcd

build:
  number: 0
  script:
    - cargo-bundle-licenses --format yaml --output ./THIRDPARTY.yml
    - pip install . -vv --no-build-isolation

requirements:
  build:
    - ${{ compiler('rust') }}
    - cargo-bundle-licenses
    - ${{ stdlib('c') }}
  host:
    - python
    - pip
    - maturin >=1.0,<2
  run:
    - python

tests:
  - python:
      imports:
        - rustling

about:
  homepage: https://github.com/jacksonllee/rustling
  license: MIT
  license_file:
    - LICENSE.md
    - THIRDPARTY.yml
  summary: Blazingly fast library for computational linguistics
  doc_url: https://rustling.readthedocs.io/

extra:
  recipe-maintainers:
    - jacksonllee
