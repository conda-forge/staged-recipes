# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "1.3.0"

package:
  name: azure-identity-broker
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/a/azure-identity-broker/azure_identity_broker-${{ version }}.tar.gz
  sha256: 1f40ea42d31da86669fe4cd4f93e4cdf91b9b1cffca1fba39cf5ba0f7df1bd27

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - setuptools >=77.0.3
    - wheel
  run:
    - python >=${{ python_min }}
    - azure-identity >=1.18.0,<2.0.0
    - msal >=1.33.0,<2.0.0

tests:
  - python:
      imports:
        - azure.identity.broker
      pip_check: true
      python_version:
      - ${{ python_min }}.*
      - "*"

about:
  summary: Microsoft Azure Identity Broker plugin for Python
  license: MIT
  license_file: LICENSE
  homepage: https://github.com/Azure/azure-sdk-for-python/tree/main/sdk/identity/azure-identity-broker

extra:
  recipe-maintainers:
    - rxm7706
