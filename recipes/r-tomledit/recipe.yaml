schema_version: 1

context:
  version: 0.1.1

package:
  name: r-tomledit
  version: ${{ version }}

source:
  url: https://cran.r-project.org/src/contrib/tomledit_${{ version }}.tar.gz
  sha256: 2627c39e3642ce81a4565daf643276429f3717746629e89b99236d658060ab28

build:
  number: 0
  script: build.sh
  merge_build_and_host_envs: true
  dynamic_linking:
    rpaths:
      - lib/R/lib/
      - lib/

requirements:
  build:
    - if: build_platform != target_platform
      then: cross-r-base ${{ r_base }}
    - if: unix
      then: autoconf
    - if: unix
      then: ${{ compiler('c') }}
    - if: win
      then: ${{ compiler('m2w64_c') }}
    - if: unix
      then: ${{ compiler('cxx') }}
    - if: win
      then: ${{ compiler('m2w64_cxx') }}
    - if: unix
      then: ${{ stdlib('c') }}
    - ${{ compiler('rust') }}
    - cargo-bundle-licenses
    - if: win
      then: m2-base
    - if: win
      then: xz-tools
  host:
    - r-base
    - r-rlang >=1.1.0
  run:
    - r-base
    - r-rlang >=1.1.0

tests:
  - script:
      - if: not win
        then: R --vanilla -e "library('tomledit')"
      - if: win
        then: '"%R%" --vanilla -e "library(''tomledit'')"'

about:
  summary: A toolkit for working with 'TOML' files in R while preserving formatting, comments, and structure. 'tomledit' enables serialization of R objects such as lists, data.frames, numeric, logical, and date vectors.
  license: MIT
  license_file:
    - LICENSE
    - THIRDPARTY.yml
  homepage: https://extendr.github.io/tomledit/
  repository: https://github.com/extendr/tomledit

extra:
  recipe-maintainers:
    - jiangyun-fun
