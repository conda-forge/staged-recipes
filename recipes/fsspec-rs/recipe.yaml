context:
  version: "0.1.1"

package:
  name: fsspec-rs
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/f/fsspec_rs/fsspec_rs-${{ version }}.tar.gz
  sha256: 99d4aafe471f346325dc4dfa6a25307e075bbda6b8d0919a3ddad0bf6926090e

build:
  number: 0
  python:
    version_independent: true
  script:
    - if: unix
      then: export PYO3_PYTHON="$PYTHON"
      else: set "PYO3_PYTHON=%PYTHON%"
    - cargo-bundle-licenses --format yaml --output THIRDPARTY.yml
    - ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  skip: is_abi3 and not is_python_min

requirements:
  build:
    - if: build_platform != target_platform
      then:
        - python
        - cross-python_${{ target_platform }}
        - crossenv
    - ${{ compiler('c') }}
    - ${{ stdlib("c") }}
    - ${{ compiler('rust') }}
    - cargo-bundle-licenses
  host:
    - python
    - pip
    - hatchling
    - hatch-rs
    - if: is_abi3
      then:
      - python-abi3
  run:
    - python
    - fsspec
  ignore_run_exports:
    from_package:
      - cross-python_${{ target_platform }}

tests:
  - python:
      imports:
        - fsspec_rs
      pip_check: true
      python_version: ${{ python_min }}.*

about:
  license: Apache-2.0
  license_file:
    - LICENSE
    - THIRDPARTY.yml
  summary: fsspec-compatible backends with Rust accleration
  homepage: https://github.com/1kbgz/fsspec-rs
  repository: https://github.com/1kbgz/fsspec-rs

extra:
  recipe-maintainers:
    - timkpaine
