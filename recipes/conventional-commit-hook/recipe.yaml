# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  name: conventional-commit-hook
  version: "0.1.0"
  python_min: "3.10"

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/${{ name[0] }}/${{ name }}/${{ name | replace("-", "_") }}-${{ version }}.tar.gz
  sha256: 814a30e2f3d99d34b13dbf5ff45f307732b1b862170fa974408ef76489bc0728

build:
  number: 0
  noarch: python
  script:
    - ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  python:
    entry_points:
      - conventional-commit-hook = conventional_commit_hook.main:entrypoint

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - hatchling >=1.24.0
  run:
    - python >=${{ python_min }},<4
    - structlog >=24.0.0

tests:
  - python:
      imports:
        - conventional_commit_hook
        - conventional_commit_hook.parser
        - conventional_commit_hook.validator
        - conventional_commit_hook.main
      pip_check: true
      python_version: ${{ python_min }}.*
  - script:
      - if: win
        then: set "SystemRoot=${{ env.get('SystemRoot', default='C:\Windows') }}"
      - if: win
        then: set "windir=${{ env.get('windir', default='C:\Windows') }}"
      - conventional-commit-hook --help

about:
  homepage: https://github.com/millsks/conventional-commit-hook
  repository: https://github.com/millsks/conventional-commit-hook
  documentation: https://github.com/millsks/conventional-commit-hook#readme
  summary: A pre-commit hook that enforces Conventional Commits standards on commit messages
  description: |
    conventional-commit-hook is a pre-commit hook that validates commit messages
    against the Conventional Commits specification. It can be used standalone or
    integrated into a pre-commit pipeline.
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - millsks
