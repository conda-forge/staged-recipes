schema_version: 1

context:
  python_min: "3.10"
  version: "0.3.0"

package:
  name: jupyterlite-pdf-exporter
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/j/jupyterlite-pdf-exporter/jupyterlite_pdf_exporter-${{ version }}.tar.gz
  sha256: 7d1ffb1cbadfa45a6a44f00e308f0c9af3ec84783d4e7297eabd2933e115e611

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - hatchling >=1.5.0
    - jupyterlab >=4.0.0,<5
    - hatch-nodejs-version >=0.3.2
    - hatch-jupyter-builder >=0.5
    - pip
  run:
    - python >=${{ python_min }}

tests:
  - python:
      imports:
        - jupyterlite_pdf_exporter
      pip_check: true
      python_version: ${{ python_min }}.*

about:
  summary: A PDF exporter for JupyterLite based on WebAssembly distributions of Pandoc and Typst.
  license: GPL-2.0-or-later
  license_file:
    - LICENSE-TYPST.txt
    - LICENSE-PANDOC.txt
    - LICENSE.txt
    - jupyterlite_pdf_exporter/labextension/static/third-party-licenses.json
  homepage: https://github.com/agriyakhetarpal/jupyterlite-pdf-exporter

extra:
  recipe-maintainers:
    - agriyakhetarpal
