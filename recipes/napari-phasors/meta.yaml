{% set version = "0.6.5" %}
{% set python_min = "3.12" %}

package:
  name: napari-phasors
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/n/napari-phasors/napari_phasors-{{ version }}.tar.gz
  sha256: 4ba10c196993914dd354004140838dbbd1d0155cae27925aefffb875c9922b4b

build:
  noarch: python
  # Pin the version so setuptools_scm does not fall back to a bogus value
  # when building from the sdist (no git metadata is available).
  script: SETUPTOOLS_SCM_PRETEND_VERSION={{ version }} {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - setuptools >=42.0.0
    - wheel
    - setuptools-scm
    - pip
  run:
    - python >={{ python_min }}
    - phasorpy >=0.10
    - qtpy
    - pyqt6
    - biaplotter >=0.4.2
    - fbdfile
    - sdtfile
    - ptufile
    - tifffile
    - pandas
    - pawflim
    - scipy
    - czifile
    - lfdfiles

test:
  commands:
    # A plain ``import napari_phasors`` pulls in napari -> vispy, whose OpenGL
    # (GL ES 2.0) backend cannot load on the headless build agents. We
    # validate the environment with ``pip check`` instead of an import test.
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://github.com/napari-phasors/napari-phasors
  summary: A simple plugin to use phasor analysis
  doc_url: https://github.com/napari-phasors/napari-phasors
  license: BSD-3-Clause
  license_file: LICENSE

extra:
  recipe-maintainers:
    - bruno-pannunzio
