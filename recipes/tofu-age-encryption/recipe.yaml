context:
  version: "1.1.1"

package:
  name: tofu-age-encryption
  version: ${{ version }}

source:
  url: https://github.com/josh/tofu-age-encryption/archive/refs/tags/v${{ version }}.tar.gz
  sha256: 2a6be598cefe32fb155868765aeedf69a9be0fbac007fec327852aba903929c1
  target_directory: src

build:
  number: 0
  script:
    - cd src
    - go-licenses save . --save_path ../library_licenses
    - if: unix
      then: go build -v -o $PREFIX/bin/tofu-age-encryption -ldflags="-s -w"
      else: go build -v -o %LIBRARY_BIN%\tofu-age-encryption.exe -ldflags="-s"

requirements:
  build:
    - ${{ compiler("go-nocgo") }}
    - go-licenses

tests:
  - script: tofu-age-encryption version
  - package_contents:
      bin:
        - tofu-age-encryption
      strict: true

about:
  homepage: https://github.com/josh/tofu-age-encryption
  summary: Encrypt OpenTofu state data with age encryption keys
  description: |
    OpenTofu encrypts state with a symmetric key derived from a shared passphrase
    that every operator must share and rotate together.
    This project replaces that workflow with age's asymmetric key pairs so operators
    can keep private keys, specify their own recipients,
    and rotate access without redistributing a secret.
  license: MIT
  license_file:
    - src/LICENSE
    - library_licenses/
  documentation: https://github.com/josh/tofu-age-encryption
  repository: https://github.com/josh/tofu-age-encryption

extra:
  recipe-maintainers:
    - brycekbargar
