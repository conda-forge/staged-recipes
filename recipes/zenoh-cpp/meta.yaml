{% set name = "libzenohcxx" %}
{% set version = "0.11.0" %}

package:
  name: {{ name }}
  version: {{ version }}

source:
  - url: https://github.com/eclipse-zenoh/zenoh-cpp/archive/refs/tags/{{ version }}.tar.gz
    sha256: a0ed1c19eca3c0db5b4c140c2a9cd84b471f1a427599ddf12ee1b4005d860e71

build:
  number: 0

requirements:
  build:
    - {{ compiler('c') }}
    - {{ stdlib('c') }}
    - {{ compiler('cxx') }}
    - cmake
    - pkg-config
    - ninja
  host:
    - 

test:
  commands:
    - test -f ${PREFIX}/include/zenoh.hxx  # [unix]
    - if not exist %LIBRARY_PREFIX%\\include\\zenoh.hxx exit 1  # [win]
    - cmake-package-check zenohcxx
  requires:
    - cmake-package-check
    - {{ compiler('c') }}
    - {{ compiler('cxx') }}
    - libzenohc

about:
  home: https://github.com/eclipse-zenoh/zenoh-cpp
  license: Apache-2.0 OR EPL-2.0
  license_file: LICENSE
  summary:  C++ API for zenoh

extra:
  feedstock-name: zenoh-cpp
  recipe-maintainers:
    - traversaro
