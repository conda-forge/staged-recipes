{% set name = "bigsmall" %}
{% set version = "3.14.4" %}
{% set python_min = "3.9" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/bigsmall-{{ version }}.tar.gz
  sha256: 43b6cd23beae417b6f059a40019465b99864d5385404190561144db313edcfbd

build:
  noarch: python
  number: 0
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  entry_points:
    - bigsmall = bigsmall.cli:main

requirements:
  host:
    - python {{ python_min }}
    - pip
    - setuptools
  run:
    - python >={{ python_min }}
    - numpy >=1.24
    - constriction >=0.4
    - zstandard >=0.21
    - python-blosc2 >=2.0
    - safetensors >=0.4
    - huggingface_hub >=0.20
    - tqdm >=4.0

test:
  imports:
    - bigsmall
  commands:
    - pip check
    - bigsmall --help
  requires:
    - python {{ python_min }}
    - pip

about:
  home: https://github.com/wpferrell/Bigsmall
  license: LicenseRef-Elastic-License-2.0
  license_file: LICENSE
  summary: Lossless neural network weight compression
  description: |
    BigSmall losslessly compresses neural network weights. Bit-identical
    reconstruction, md5-verified on every tensor. Works on CPU, NVIDIA, AMD,
    and Apple Silicon. Includes a streaming loader that decompresses one
    transformer layer at a time so multi-billion-parameter models can run on
    consumer GPUs at full quality.
  dev_url: https://github.com/wpferrell/Bigsmall

extra:
  recipe-maintainers:
    - wpferrell
