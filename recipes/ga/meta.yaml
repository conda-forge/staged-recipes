{% set version = "5.9.2" %}
{% set build = 0 %}

package:
  name: globalarrays
  version: {{ version }}

source:
  url: https://github.com/GlobalArrays/ga/releases/download/v{{ version }}/ga-{{ version }}.tar.gz
  sha256: cbf15764bf9c04e47e7a798271c418f76b23f1857b23feb24b6cb3891a57fbf2
  patches:
    - find-blaspp-lapackpp.patch
    - fix-lapack-preference-list.patch

build:
  number: {{ build }}
  skip: true  # [not linux]

  string: {{ mpi_prefix }}_h{{ PKG_HASH }}_{{ build }}

  run_exports:
    - {{ pin_subpackage('globalarrays', max_pin='x.x') }} {{ mpi_prefix }}_*

requirements:
  build:
    - {{ compiler('c') }}
    - {{ compiler('cxx') }}
    - {{ compiler('fortran') }}
    - {{ stdlib('c') }}
    - cmake >=3.18
    - libtool
    - automake
    - autoconf
    - ninja
  host:
    - {{ mpi }}
    - libblas
    - liblapack
    - blaspp
    - lapackpp
  run:
    - {{ mpi }}

test:
  commands:
    - test -f ${PREFIX}/lib/libarmci$SHLIB_EXT
    - test -f ${PREFIX}/lib/libcomex$SHLIB_EXT
    - test -f ${PREFIX}/lib/libga$SHLIB_EXT
    - test -f ${PREFIX}/lib/libga++$SHLIB_EXT

about:
  home: https://hpc.pnl.gov/globalarrays
  license: BSD-3-Clause
  license_file:
    - LICENSE
    - DISCLAIMER
  summary: 'Global Arrays (GA) is a Partitioned Global Address Space (PGAS) programming model' 
  doc_url: https://hpc.pnl.gov/globalarrays/documentation.shtml
  dev_url: https://github.com/GlobalArrays/ga

extra:
  recipe-maintainers:
    - awvwgk
