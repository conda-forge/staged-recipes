# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "4.5.0"

package:
  name: zxcvbn
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/z/zxcvbn/zxcvbn-${{ version }}.tar.gz
  sha256: 70392c0fff39459d7f55d0211151401e79e76fcc6e2c22b61add62900359c7c1

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - setuptools
  run:
    - python >=${{ python_min }}

tests:
  - python:
      imports:
        - zxcvbn
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  homepage: https://github.com/dwolfhub/zxcvbn-python
  license: MIT
  license_file: LICENSE.txt
  summary: Python implementation of zxcvbn password-strength estimator
  description: |
    Python port of Dropbox's zxcvbn password-strength estimator.

extra:
  recipe-maintainers:
    - rxm7706
