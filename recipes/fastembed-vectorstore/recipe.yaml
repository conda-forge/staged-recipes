schema_version: 1

context:
  version: "0.5.3"

package:
  name: fastembed-vectorstore
  version: ${{ version }}

source:
  - url: https://pypi.org/packages/source/f/fastembed-vectorstore/fastembed_vectorstore-${{ version }}.tar.gz
    sha256: 0c00aa9886840d77f11e637185c34edc7ec3e1aa3e319dd4c3268141d21aec8e
  # The PyPI sdist does not ship LICENSE; pull it from the upstream GitHub repo
  # (v0.5.3 has no git tag, so pin to the v0.5.2 commit — Apache-2.0 text is stable).
  # Upstream has no NOTICE file yet; reported upstream with a fix in
  # https://github.com/sauravniraula/fastembed-vectorstore/issues/3 and
  # https://github.com/sauravniraula/fastembed-vectorstore/pull/4
  - url: https://raw.githubusercontent.com/sauravniraula/fastembed_vectorstore/ee693fb103c818f077765981bd75d63700563cb9/LICENSE
    sha256: cfc7749b96f63bd31c3c42b5c471bf756814053e847c10f3eb003417bc523d30
    file_name: LICENSE

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - uv-build >=0.10.4,<0.11.0
  run:
    - python >=${{ python_min }}
    - fastembed
    - numpy

tests:
  - python:
      imports:
        - fastembed_vectorstore
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  homepage: https://github.com/sauravniraula/fastembed-vectorstore
  summary: In-memory vector store powered by fastembed
  description: |
    fastembed-vectorstore provides a lightweight, in-memory vector store backed
    by the fastembed embedding library. It is designed for high-performance
    semantic search and retrieval in Python applications without requiring an
    external vector database.
  license: Apache-2.0
  license_file: LICENSE
  repository: https://github.com/sauravniraula/fastembed-vectorstore

extra:
  recipe-maintainers:
    - killua156
    - mgorny
