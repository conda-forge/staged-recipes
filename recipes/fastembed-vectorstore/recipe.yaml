context:
  version: "0.5.3"

package:
  name: fastembed-vectorstore
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/f/fastembed-vectorstore/fastembed_vectorstore-${{ version }}.tar.gz
  sha256: 0c00aa9886840d77f11e637185c34edc7ec3e1aa3e319dd4c3268141d21aec8e

build:
  noarch: python
  script: python -m pip install . -vv
  number: 0

requirements:
  host:
    - python >=3.8
    - pip
    - setuptools
  run:
    - python >=3.8
    - fastembed
    - numpy

tests:
  - python:
      imports:
        - fastembed_vectorstore
      pip_check: true

about:
  homepage: https://github.com/sauravniraula/fastembed_vectorstore
  summary: In-memory vector store powered by fastembed
  description: |
    fastembed-vectorstore provides a lightweight, in-memory vector store backed
    by the fastembed embedding library. It is designed for high-performance
    semantic search and retrieval in Python applications without requiring an
    external vector database.
  license: Apache-2.0
  license_file: LICENSE
  repository: https://github.com/sauravniraula/fastembed_vectorstore

extra:
  recipe-maintainers:
    - hackert156
