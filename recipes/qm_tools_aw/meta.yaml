{% set name = "qm_tools_aw" %}
{% set version = "1.4.3" %}
{% set sha256 = "b0702b0f91c49ae61c1dfd45d53a7a41f756c2c7a34c1898688cda74376655cf" %}
{% set python_min = "3.8" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz
  sha256: {{ sha256 }}

build:
  number: 0
  noarch: python
  script: {{ PYTHON }} -m pip install . --no-deps -vv

requirements:
  host:
    - python {{ python_min }}
    - pip
    - setuptools
  run:
    - python >={{ python_min }}
    - numpy
    - matplotlib-base
    - pandas
    - qcelemental

test:
  requires:
    - python {{ python_min }}
  imports:
    - qm_tools_aw
  # requires:
  #   - pytest
  # commands:
  #   - pytest --pyargs qm_tools_aw -k "not pubchem_multiout_g"
about:
  home: https://github.com/Awallace3/qm_tools
  summary: 'Provides some functions that I have found value in reusing for quantum chemistry related tasks.'
  description: |
    Provides some functions that I have found value in reusing for quantum chemistry related tasks.
  license: MIT
  license_family: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - Awallace3
