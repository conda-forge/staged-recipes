{% set name = "qm_tools_aw" %}
{% set version = "1.4.3" %}
{% set sha256 = "e8292f3474ccdd62e636691f4a2822bbae89bf9a339a634af98ebd310a4ae25e" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz
  sha256: {{ sha256 }}

build:
  noarch: python
  number: 0
  script: {{ PYTHON }} -m pip install . --no-deps -vv

requirements:
  host:
    - python >=3.7
    - pip
  run:
    - python >=3.7
    - numpy
    - matplotlib-base
    - pandas
    - qcelemental

test:
  imports:
    - qm_tools_aw
  # requires:
  #   - pytest
  # commands:
  #   - pytest --pyargs qm_tools_aw -k "not pubchem_multiout_g"
about:
  home: https://github.com/Awallace3/qm_tools
  summary: 'Provides some functions that I have found value in reusing for quantum chemistry related tasks.'
  description: |
    Provides some functions that I have found value in reusing for quantum chemistry related tasks.
  license: MIT
  license_family: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - Awallace3
