{% set name = "proc-tree" %}
{% set version = "0.1.1" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://github.com/afiryulin/conda-pkg-proc-tree/archive/refs/tags/v{{ version }}.tar.gz
  sha256: a6f894f049ad1cd9b40910653b92bed79b7f464a069f2eb0a69a5fb993e4690d

build:
  number: 0

requirements:
  build:
    - cmake
    - ninja
    - {{ compiler('cxx') }}
    - {{ compiler('c') }}

  host:
    - nlohmann_json
    - fmt

  run:
    - fmt

test:
  commands:
    - proc-tree --help

about:
  home: https://github.com/afiryulin/conda-pkg-proc-tree
  summary: Cross-platform CLI tool to display process tree
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - afiryulin
