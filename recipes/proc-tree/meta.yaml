{% set name = "proc-tree" %}
{% set version = "0.1.2" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://github.com/afiryulin/conda-pkg-proc-tree/archive/refs/tags/v{{ version }}.tar.gz
  sha256: 3f0ee5871acf38c4ccef2f99f2b8902b5dbbefb2fa213429c5d8f47f9190114d

build:
  number: 0
  skip: true  # [osx]

requirements:
  build:
    - {{ compiler('c') }}
    - {{ compiler('cxx') }}
    - {{ stdlib("c") }}
    - cmake
    - ninja
    - m2-base  # [win]

  host:
    - nlohmann_json
    - fmt

  run:
    - fmt

test:
  commands:
    - proc-tree --help

about:
  home: https://github.com/afiryulin/conda-pkg-proc-tree
  summary: Cross-platform CLI tool to display process tree
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - afiryulin
