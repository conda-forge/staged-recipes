{% set name = "proc-tree" %}
{% set version = "0.1.3" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://github.com/afiryulin/conda-pkg-proc-tree/archive/refs/tags/v{{ version }}.tar.gz
  sha256: be89e0dba623553b9213dfc02ffd00cfc1a0538acd08243c95b87886ab60c0e3

build:
  number: 0

requirements:
  build:
    - {{ compiler('c') }}
    - {{ compiler('cxx') }}
    - {{ stdlib("c") }}
    - cmake
    - ninja
    - m2-base  # [win]

  host:
    - nlohmann_json
    - fmt

  run:
    - fmt

test:
  commands:
    - proc-tree --help

about:
  home: https://github.com/afiryulin/conda-pkg-proc-tree
  summary: Cross-platform CLI tool to display process tree
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - afiryulin
