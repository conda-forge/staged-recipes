{% set name = "proc-tree" %}
{% set version = "0.1.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://github.com/afiryulin/conda-pkg-proc-tree/archive/refs/tags/v{{ version }}.tar.gz
  sha256: 562192f205a919110848fbfcc4a16db988a1dfc207b6e8644f0f236406b2e7d0

build:
  number: 0

requirements:
  build:
    - cmake
    - ninja
    - {{ compiler('cxx') }}
    - {{ compiler('c') }}

  host:
    - nlohmann_json
    - fmt

  run:
    - fmt

test:
  commands:
    - proc-tree --help

about:
  home: https://github.com/afiryulin/conda-pkg-proc-tree
  summary: Cross-platform CLI tool to display process tree
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - afiryulin
