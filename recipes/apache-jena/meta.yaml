{% set name = "apache-jena" %}
{% set version = "6.1.0" %}
{% set sha256 = "9e2d8c64e2397e61aad4a48ff6c52ae481af1f93ab4cd509d53d68cd49c363a1" %}


package:
  name: {{ name }}
  version: '{{ version }}'

source:
  url: https://archive.apache.org/dist/jena/binaries/{{ name }}-{{ version }}.zip
  sha256: '{{ sha256 }}'

build:
  number: 0
  skip: true # [win]
  noarch: generic

requirements:
  run:
    - openjdk >=21

test:
  commands:
      - "bash -c 'tdbquery --version '"

about:
  license: Apache-2.0
  license_file: LICENSE
  summary: A free and open source Java framework for building Semantic Web and Linked Data applications.
  home: https://jena.apache.org

extra:
  recipe-maintainers:
    - lindenb
