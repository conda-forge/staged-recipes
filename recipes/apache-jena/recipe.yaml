{% set name = "apache-jena" %}
{% set version = "6.1.0" %}
{% set sha256 = "9e2d8c64e2397e61aad4a48ff6c52ae481af1f93ab4cd509d53d68cd49c363a1" %}



package:
  name: {{ name }}
  version: {{ version }}


context:
  openjdk_min: "23"
  openjdk_check_min: "23"


source:
  - url: https://archive.apache.org/dist/jena/binaries//{{ name }}-${{ version }}.zip
    sha256: d80b8f708e7a5840fd09b853a4343cace7e4c3504d4e8ac67367d4cb6224436e

build:
  number: 0
  noarch: generic

requirements:
  run:
    - openjdk >=${{ openjdk_min }}

tests:
  requires:
    - openjdk >=${{ openjdk_min }}
  commands:
      - echo "Hello world"
about:
  license: Apache-2.0
  license_file: LICENSE
  summary: A free and open source Java framework for building Semantic Web and Linked Data applications.
  homepage: https://jena.apache.org

extra:
  recipe-maintainers:
    - lindenb
