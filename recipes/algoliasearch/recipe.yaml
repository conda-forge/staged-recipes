context:
  version: 4.44.1

package:
  name: algoliasearch
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/a/algoliasearch/algoliasearch-${{ version }}.tar.gz
  sha256: 7542a1c14721fc90ceeb92784219f8b6a5d3faa3f56147c9515ba16957190680

build:
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python ${{ python_min }}.*
    - poetry-core
    - pip
  run:
    - python >=${{ python_min }}
    - urllib3 >=2.2.3
    - aiohttp >=3.10.11
    - requests >=2.32.3
    - python-dateutil >=2.8.2
    - async-timeout >=4.0.3
    - pydantic >=2

tests:
- python:
    python_version:
      - ${{ python_min }}.*
    imports:
    - algoliasearch 
    pip_check: true

about:
  homepage: https://www.algolia.com
  summary: A fully-featured and blazing-fast Python API client to interact with Algolia.
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - soapy1
