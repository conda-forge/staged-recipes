context:
  version: 1.3.2
  python_min: "3.10"

package:
  name: linak-controller
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/l/linak-controller/linak_controller-${{ version }}.tar.gz
  sha256: 7db96c9a9e52c9011992808a7afbc4df06b7bcc12013e47513ffb2221c4c64d4

build:
  number: 0
  script: ${{ PYTHON }} -m pip install . -vv
  python:
    entry_points:
      - idasen-controller = linak_controller.main:init
      - linak-controller = linak_controller.main:init
  noarch: python

requirements:
  host:
    - python ${{ python_min }}.*
    - hatchling
    - pip
  run:
    - python >=${{ python_min }}
    - aiohttp >=3.8.4,<4
    - appdirs >=1.4.4,<2
    - bleak >=1.1.1,<2
    - pyyaml >=6.0,<7.0

tests:
  - python:
      imports:
        - linak_controller
      pip_check: true
      python_version: ${{ python_min }}.*
  - script:
      - linak-controller --help
      - idasen-controller --help

about:
  homepage: https://github.com/rhyst/linak-controller
  repository: https://github.com/rhyst/linak-controller
  summary: Command line tool for controlling the Linak standing desks
  description: A Python script to control Linak standing desks.
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - rhyst
