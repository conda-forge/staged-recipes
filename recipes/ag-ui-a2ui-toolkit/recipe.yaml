# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "0.0.1"

package:
  name: ag-ui-a2ui-toolkit
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/a/ag-ui-a2ui-toolkit/ag_ui_a2ui_toolkit-${{ version }}.tar.gz
  sha256: 82cf57e363a3967b4564369e9e329900b65899aac685f7cea1dac1263f5b898d

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - uv-build >=0.8.0,<0.9
    - pip
  run:
    - python >=${{ python_min }}

tests:
  - python:
      imports:
        - ag_ui_a2ui_toolkit
      pip_check: true
      python_version:
      - ${{ python_min }}.*
      - "*"

about:
  summary: Framework-agnostic helpers for building A2UI subagent tools — op builders, prompt assembly, history walkers, and request/envelope orchestration shared across framework adapters.
  license: MIT
  license_file: LICENSE
  homepage: https://github.com/ag-ui-protocol/ag-ui
  repository: https://github.com/ag-ui-protocol/ag-ui

extra:
  recipe-maintainers:
    - rxm7706
