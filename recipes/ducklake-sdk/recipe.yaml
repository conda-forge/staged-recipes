context:
  version: "0.0.5"

package:
  name: ducklake-sdk
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/d/ducklake-sdk/ducklake_sdk-${{ version }}.tar.gz
  sha256: bed8a46f955e712e407bb17c07ea552ca73c91d7a196fad17c3dc39e57557be7

build:
  number: 0
  skip: is_abi3 and not is_python_min
  python:
    version_independent: true

requirements:
  build:
    - if: build_platform != target_platform
      then:
        - python
        - cross-python_${{ target_platform }}
        - crossenv
        - maturin >=1.7,<2
    - ${{ compiler('rust') }}
    - ${{ stdlib('c') }}
    - cargo-bundle-licenses
    - cargo-auditable
  host:
    - python
    - if: is_abi3
      then: python-abi3
    - pip
    - maturin >=1.7,<2
  run:
    - python
    - typing_extensions
  ignore_run_exports:
    from_package:
      - cross-python_${{ target_platform }}
  run_constraints:
    - polars >=1.40
    - sqlalchemy >=2

tests:
  - python:
      python_version: "${{ python_min ~ '.*' }}"
      imports:
        - ducklake
      pip_check: true
  - if: is_abi3
    then:
      script:
        - if: win
          then: abi3audit %PREFIX%/Lib/site-packages/ducklake/_native.pyd -s -v --assume-minimum-abi3 ${{ python_min }}
          else:
            - export SP_DIR=$(python -c "import site; print(site.getsitepackages()[0])")
            - abi3audit $SP_DIR/ducklake/_native.abi3.so -s -v --assume-minimum-abi3 ${{ python_min }}
      requirements:
        run:
          - abi3audit

about:
  homepage: https://github.com/borchero/ducklake-sdk
  summary: Python SDK to interact with DuckLake.
  license: MIT
  license_file:
    - LICENSE
    - THIRDPARTY.yml
  documentation: https://ducklake-sdk.readthedocs.io/
  repository: https://github.com/borchero/ducklake-sdk

extra:
  recipe-maintainers:
    - borchero
