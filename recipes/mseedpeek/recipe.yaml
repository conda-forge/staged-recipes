context:
  name: mseedpeek
  version: "1.0.0"

package:
  name: ${{ name }}
  version: ${{ version }}

source:
  url: https://gitlab.com/earthscope/public/epic/passoft/mseedpeek/-/archive/v${{ version }}/mseedpeek-v${{ version }}.tar.gz
  sha256: 6f99faadfd68dda44a3f2c454c2e5d3223199e071e49233c742b3a4f61313896

build:
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - setuptools
  run:
    - python >=${{ python_min }}
    - pyside6

tests:
  - python:
      imports:
        - mseedpeek
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"
  - script:
      - mseedpeek -#
  - script:
      - python -m unittest discover -s tests
    requirements:
      run:
        - python ${{ python_min }}.*
    files:
      source:
        - tests/

about:
  homepage: https://epic.earthscope.org/content/software-resources
  summary: View mseed headers
  description: |
    (TODO: add description)
  license: GPL-3.0-or-later
  license_file: LICENSE
  repository: https://gitlab.com/earthscope/public/epic/passoft/bline

extra:
  recipe-maintainers:
    - omid-earthscope