schema_version: 1

context:
  version: "0.1.8"

package:
  name: pyglenn
  version: ${{ version }}

source:
  url: https://github.com/ProfLeao/pyglenn/archive/refs/tags/v${{ version }}.tar.gz
  sha256: 223dff58dd2801f0af6f1de261bcacffb9a6067ae35f5313f09d9517ddd2066e

build:
  number: 0
  noarch: python
  script: python -m pip install . --no-deps --no-build-isolation -vv
  python:
    entry_points:
      - pyglenn = pyglenn.cli:main

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - setuptools >=64.0
    - wheel
  run:
    - python >=${{ python_min }}

tests:
  - python:
      python_version:
        - ${{ python_min }}.*
        - "*"
      imports:
        - pyglenn
        - pyglenn.calculator
        - pyglenn.database
        - pyglenn.builder
      pip_check: true
  - script:
      - pyglenn --help

about:
  homepage: https://github.com/ProfLeao/pyglenn
  repository: https://github.com/ProfLeao/pyglenn
  documentation: https://profleao.github.io/pyglenn
  license: MIT
  license_file: LICENSE
  summary: >-
    Thermochemical properties calculator — computes Cp(T), H°(T), S°(T)
    from NASA polynomial coefficients stored in SQLite.
  description: >-
    pyglenn is a Python package for calculating thermochemical properties
    (heat capacity, enthalpy, entropy) of chemical species using NASA-7
    polynomial coefficients. It converts FORTRAN thermo.inp files into
    a normalized SQLite3 database and provides both a Python API and a
    command-line interface.

extra:
  recipe-maintainers:
    - ProfLeao
