context:
  version: "0.1.0"
  python_min: "3.11"

package:
  name: bioimage-py
  version: ${{ version }}

source:
  url: https://github.com/computational-cell-analytics/bioimage-py/archive/refs/tags/${{ version }}.tar.gz
  sha256: 0ed488cb3493f753cafe4f0b09fd9ca92723fe782d30e9fb62ef1032463055ae

build:
  noarch: python
  number: 0
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - setuptools >=64
    - wheel
  run:
    - python >=${{ python_min }}
    - numpy
    - pandas
    - scikit-image >=0.20
    - cloudpickle
    - tqdm
    - threadpoolctl
    - bioimage-cpp
    - zarr >=3
    - z5py >=3

tests:
  - python:
      imports:
        - bioimage_py
      pip_check: true
      python_version: ${{ python_min }}.*

about:
  homepage: https://github.com/computational-cell-analytics/bioimage-py
  summary: Efficient, parallel, and distributed image analysis and segmentation for biomedical imaging.
  description: |
    bioimage_py is a Python library for efficient, parallel, and distributed
    image analysis and segmentation functionality for biomedical imaging.
  license: MIT
  license_file: LICENSE
  documentation: https://computational-cell-analytics.github.io/bioimage-py/
  repository: https://github.com/computational-cell-analytics/bioimage-py

extra:
  recipe-maintainers:
    - constantinpape
