context:
  version: "5.4"

package:
  name: vgm
  version: ${{ version }}

source:
  url: https://github.com/vmc-project/vgm/archive/refs/tags/v${{ version | replace(".", "-") }}.tar.gz
  sha256: f503f541f65a7184a386e83b021cdd6c96e78fbc2be65f1ce583d39c1375aca4

build:
  number: 0
  skip:
    - win
  script: build.sh

requirements:
  build:
    - ${{ compiler('cxx') }}
    - ${{ stdlib('c') }}
    - cmake
    - make
  host:
    - root_base
    - root_cxx_standard
    - geant4
    - clhep
  run_exports:
    - ${{ pin_subpackage('vgm', upper_bound='x.x') }}

tests:
  - package_contents:
      lib:
        - BaseVGM
        - ClhepVGM
        - Geant4GM
        - RootGM
        - XmlVGM
      include:
        - VGM/volumes/IVolume.h
      files:
        - lib/VGM-${{ version }}.0/VGMConfig.cmake
        - lib/VGM-${{ version }}.0/VGMConfigVersion.cmake
        - lib/VGM-${{ version }}.0/VGMTargets.cmake

about:
  homepage: https://vmc-project.github.io/
  summary: Virtual Geometry Model for HEP detector simulation
  description: |
    The Virtual Geometry Model (VGM) provides a generic geometry model and
    bidirectional conversion between Geant4 and ROOT TGeo geometry
    representations, plus XML import / export. It allows the same detector
    description to be used across both transport engines and is part of the
    vmc-project toolkit.

    Build dependency of geant4-vmc and downstream HEP experiment frameworks
    (ALICE, FairRoot, SHiP).
  license: GPL-3.0-only
  license_file: LICENSE
  repository: https://github.com/vmc-project/vgm
  documentation: https://vmc-project.github.io/

extra:
  recipe-maintainers:
    - olantwin
