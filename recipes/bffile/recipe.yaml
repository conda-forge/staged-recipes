schema_version: 1

context:
  version: 0.1.0

package:
  name: bffile
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/b/bffile/bffile-${{ version }}.tar.gz
  sha256: 9a751f2a325a9bf61a9ec210af147c6c8e5a21e74bc843570e45653ddb4cc25d

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - hatchling
    - hatch-vcs
    - pip
  run:
    - python >=${{ python_min }}
    - numpy >=2.1.0
    - ome-types >=0.6.3
    - scyjava >=1.12.2

tests:
  - python:
      python_version:
        - ${{ python_min }}.*
        - "*"
      imports:
        - bffile
      pip_check: true

about:
  summary: Yet another Bio-Formats wrapper for python
  license: BSD-3-Clause
  license_file: LICENSE/LICENSE
  homepage: https://github.com/imaging-formats/bffile

extra:
  recipe-maintainers:
    - tlambert03
    - psobolewskiPhD
