schema_version: 1

context:
  python_min: "3.11"
  version: "0.3.0"

package:
  name: anemoi-registry
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/a/anemoi-registry/anemoi_registry-${{ version }}.tar.gz
  sha256: fe0b5c50a7e2e0678acbc5dc430707c01ce3131c13b6ac2809f33da8582a771f

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  python:
    entry_points:
      - anemoi-registry = anemoi.registry.__main__:main_PYTHON_ARGCOMPLETE_OK

requirements:
  host:
    - python ${{ python_min }}.*
    - setuptools >=60
    - setuptools-scm >=8
    - pip
  run:
    - python >=${{ python_min }}
    - anemoi-datasets >=0.5.28
    - anemoi-utils >=0.4.39
    - jsonpatch
    - requests

tests:
  - python:
      imports:
        - anemoi
      pip_check: true
      python_version: ${{ python_min }}.*
  - requirements:
      run:
        - pip
        - python ${{ python_min }}.*
    script:
      - anemoi-registry --help

about:
  summary: A package to manage a registry or data-driven forecasts.
  license: Apache-2.0
  license_file: LICENSE
  homepage: https://github.com/ecmwf/anemoi-registry/
  documentation: https://anemoi-registry.readthedocs.io/

extra:
  recipe-maintainers:
    - tjtg
    - jasonjunweilyu
    - HCookie
