{% set version = "0.2.4" %}
{% set python_min = "3.11" %}

package:
  name: eniccs
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/e/eniccs/eniccs-{{ version }}.tar.gz
  sha256: f0c8f92962671f6c03c51c88d3654c5898caf9f083484baeba02caf3544671f2

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - setuptools >=77
    - wheel
    - pip
  run:
    - python >={{ python_min }}
    - scikit-learn >=1.4
    - rasterio >=1.4
    - numpy >=1.26
    - pandas >=2.0
    - matplotlib-base >=3.8
    - scipy >=1.13
    - scikit-image >=0.22
    - joblib >=1.3

test:
  imports:
    - eniccs
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://github.com/leleist/eniccs
  summary: EnMAP Improved Cloud and Cloud Shadow (EnICCS) masking pipeline for EnMAP hyperspectral satellite
  license_family: Apache
  license: Apache-2.0
  license_file: LICENSE.txt

extra:
  recipe-maintainers:
    - leleist
