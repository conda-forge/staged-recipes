{% set PYTHON_MIN = "3.11" %}
{% set PYTHON_MAX = "3.13" %}
{% set VERSION = "2.0.0rc18" %}
{% set SHA256 = "6faa1987a9ae8ac37fe5bb5344544bd671f2b00647abf2b3bda5f02e5f398ab9" %}
# curl -sL https://github.com/kreshuklab/panseg/archive/refs/tags/2.0.0.tar.gz | openssl sha256

package:
  name: panseg
  version: {{ VERSION }}

source:
  url: https://github.com/kreshuklab/panseg/archive/refs/tags/{{ VERSION }}.tar.gz
  sha256: {{ SHA256 }}

build:
  noarch: python
  number: 0
  skip: True  # [py<311]
  script:
    - "{{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation --ignore-installed --no-cache-dir"
    - "mkdir -p {{ PREFIX }}/Menu"  # [not win]
    - "cp {{ SRC_DIR }}/Menu/panseg.json {{ PREFIX }}/Menu/{{ PKG_NAME }}_menu.json"  # [not win]
    - "cp {{ SRC_DIR }}/Menu/icon.png {{ PREFIX }}/Menu/icon.png"  # [not win]
    - "cp {{ SRC_DIR }}/Menu/icon.ico {{ PREFIX }}/Menu/icon.ico"  # [not win]
    - "cp {{ SRC_DIR }}/Menu/logo_horizontal.png {{ PREFIX }}/Menu/logo_horizontal.png"  # [not win]
    - "cp {{ SRC_DIR }}/Menu/logo_vertical.png {{ PREFIX }}/Menu/logo_vertical.png"  # [not win]

  entry_points:
    - panseg = panseg.run_panseg:main

requirements:
  build:
    - python {{ python_min }}
    - pip
    - setuptools

  run:
    - python >={{ PYTHON_MIN }},<={{ PYTHON_MAX}}
    - pip
    - bioimageio.core ==0.9.6
    - bioimageio.spec ==0.5.7.4
    - h5py ==3.15.1
    - napari ==0.6.6
    - pydantic ==2.12.5
    - pyside6 ==6.10.2
    - python-elf ==0.7.4
    - python-graphviz ==0.21
    - pytorch ==2.10.0
    - pyyaml ==6.0.3
    - qt-material ==2.14
    - qtpy ==2.4.3
    - requests ==2.32.5
    - scikit-image ==0.26.0
    - tensorboard ==2.20.0
    - tifffile ==2026.3.3
    - vigra ==1.12.2
    - trimesh ==4.11.4
    - numpy >=2.4,<2.5
    - zarr <=3.1.6

test:
  requires:
    - python >={{ PYTHON_MIN }},<={{ PYTHON_MAX}}
  imports:
    - panseg

about:
  home: https://kreshuklab.github.io/panseg/
  summary: 'Cell instance segmentation in densely packed 3D volumetric images'
  description: |
    PanSeg is a tool for cell instance aware segmentation in densely packed 3D volumetric images.
    The pipeline uses a two stage segmentation strategy (Neural Network + Graph Partitioning).
    The pipeline is tuned for plant cell tissue acquired with confocal and light sheet microscopy.
    Pre-trained models are provided.
  license: MIT
  license_family: MIT
  license_file: LICENSE
  doc_url: https://kreshuklab.github.io/panseg/
  dev_url: https://github.com/kreshuklab/panseg

extra:
  recipe-maintainers:
    - KRiedmiller
