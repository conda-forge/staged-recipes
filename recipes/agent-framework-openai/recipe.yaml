schema_version: 1

context:
  version: "1.4.0"
  python_min: "3.10"

package:
  name: agent-framework-openai
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/a/agent-framework-openai/agent_framework_openai-${{ version }}.tar.gz
  sha256: e9fa6be2307988d2034a25c8b4eb8782c13f714bde160ed583c433deba7a212b

build:
  noarch: python
  number: 0
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - flit-core <4.0,>=3.11
  run:
    - python >=${{ python_min }}
    - agent-framework-core <2,>=1.4.0
    - openai <3,>=1.99.0

tests:
  - python:
      imports:
        - agent_framework.openai
      python_version: ${{ python_min }}.*
      pip_check: true

about:
  summary: |
    OpenAI integrations for Microsoft Agent Framework.
  homepage: https://pypi.org/project/agent-framework-openai/
  repository: https://github.com/microsoft/agent-framework
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - killua156
    - mgorny
