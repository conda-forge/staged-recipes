context:
  version: 24.7.1
  build_number: 5
  compiled_with: ${{ compiled_with }}

package:
  name: conda-launchers
  version: ${{ version }}

source:
  - url: https://raw.githubusercontent.com/python/cpython/3.7/LICENSE
    sha256: 96e4f59524cde5af4a2ea837ef5e52b65e51f1f999825fd8a9ec3b444cb82aea
    file_name: cpython-LICENSE
  - url: https://raw.githubusercontent.com/conda/conda-launchers/${{ version }}-${{ build_number }}/src/LICENSE
    sha256: 6df75cebd33d62bc1e0e62ee6431c272aad9c07648853eed3c460ebf1a0c0488

  - if: compiled_with == 'gcc'
    then:
      - url: https://github.com/conda/conda-launchers/releases/download/${{ version }}-${{ build_number }}/cli-64-${{ version }}-e8b2e36_gcc_${{ build_number }}.exe
        sha256: 4d8c479577961d0c6d940966f7987fbb0d6fc98b80edc03b00ee949dd8c1b3e2
      - url: https://github.com/conda/conda-launchers/releases/download/${{ version }}-${{ build_number }}/gui-64-${{ version }}-e8b2e36_gcc_${{ build_number }}.exe
        sha256: 1ebb2934a75dd3aa5845ec77f7c257a903dacfc3b77e1b893f61f8f281a7d9a9

  - if: compiled_with == 'zig'
    then:
      - url: https://github.com/conda/conda-launchers/releases/download/${{ version }}-${{ build_number }}/cli-32-${{ version }}-90b98ef_zig_${{ build_number }}.exe
        sha256: 3856b8e5971a9238eae5608701fc2694dd2f2084122ce3ba8eae400fc2314599
      - url: https://github.com/conda/conda-launchers/releases/download/${{ version }}-${{ build_number }}/cli-64-${{ version }}-ed4fef8_zig_${{ build_number }}.exe
        sha256: 860c80fb193d675d4a7b1818f7a93a8df2252982fa2bb0b0b35182f5911f25ff
      - url: https://github.com/conda/conda-launchers/releases/download/${{ version }}-${{ build_number }}/cli-arm64-${{ version }}-53f4ca0_zig_${{ build_number }}.exe
        sha256: 3833045196b8fcc6e1a58b92cd402af3db8752e9f7d9686e245fd217c08dd244
      - url: https://github.com/conda/conda-launchers/releases/download/${{ version }}-${{ build_number }}/gui-32-${{ version }}-90b98ef_zig_${{ build_number }}.exe
        sha256: ecfb19aec39ca631846acee20da1e337437c54b157d1c6db3ff0ede2ea8debf6
      - url: https://github.com/conda/conda-launchers/releases/download/${{ version }}-${{ build_number }}/gui-64-${{ version }}-ed4fef8_zig_${{ build_number }}.exe
        sha256: 873e31ae9b345d111320aedc7585647190585f849e6154ee36c829bc3eb5c41c
      - url: https://github.com/conda/conda-launchers/releases/download/${{ version }}-${{ build_number }}/gui-arm64-${{ version }}-53f4ca0_zig_${{ build_number }}.exe
        sha256: 0ba40321aec0c22cbc11ac6d7f82668ec756d5d882c1e2c5b9e4033606af1d32

  - if: compiled_with == 'vs'
    then:
      - url: https://github.com/conda/conda-launchers/releases/download/${{ version }}-${{ build_number }}/cli-64-${{ version }}-5d2d7a5_vs2022_${{ build_number }}.exe
        sha256: 0ed1bed28fe8759597266989c4e68839715226009e5b0ea13a79a287befa4624
      - url: https://github.com/conda/conda-launchers/releases/download/${{ version }}-${{ build_number }}/cli-arm64-${{ version }}-642fc7c_vs2022_${{ build_number }}.exe
        sha256: 883bb0599ad5624acc664c320388a07ffb4f23eec7e0cd29194a9450ff928267
      - url: https://github.com/conda/conda-launchers/releases/download/${{ version }}-${{ build_number }}/gui-64-${{ version }}-5d2d7a5_vs2022_${{ build_number }}.exe
        sha256: dbebff6af14ff90f968e298074a181bf22c46db125cb0eed996f7e16dc24a4e5
      - url: https://github.com/conda/conda-launchers/releases/download/${{ version }}-${{ build_number }}/gui-arm64-${{ version }}-642fc7c_vs2022_${{ build_number }}.exe
        sha256: 50c810f190be9fa7f63a829c87e54d265b6aa0d2ac3be6b680030b37a57208ca

build:
  number: ${{ build_number }}
  noarch: generic
  string: ${{ hash }}_${{ compiled_with }}_${{ build_number }}
  script:
    - mkdir -p "${{ PREFIX }}/Scripts"
    - set -ex
    - cp cli-64-*.exe "${{ PREFIX }}/Scripts/cli-64.exe"
    - cp gui-64-*.exe "${{ PREFIX }}/Scripts/gui-64.exe"
    - if: compiled_with == 'vs'
      then:
        - cp cli-arm64-*.exe "${{ PREFIX }}/Scripts/cli-arm64.exe"
        - cp gui-arm64-*.exe "${{ PREFIX }}/Scripts/gui-arm64.exe"
    - if: compiled_with == 'zig'
      then:
        - cp cli-32-*.exe "${{ PREFIX }}/Scripts/cli-32.exe"
        - cp gui-32-*.exe "${{ PREFIX }}/Scripts/gui-32.exe"
        - cp cli-arm64-*.exe "${{ PREFIX }}/Scripts/cli-arm64.exe"
        - cp gui-arm64-*.exe "${{ PREFIX }}/Scripts/gui-arm64.exe"
  variant:
    down_prioritize_variant: ${{ 2 if compiled_with == 'zig' else 1 if compiled_with == 'vs' else 0 }}

tests:
  - package_contents:
      strict: true
      files:
        - Scripts/cli-64.exe
        - Scripts/gui-64.exe
        - if: compiled_with == 'vs'
          then:
            - Scripts/cli-arm64.exe
            - Scripts/gui-arm64.exe
        - if: compiled_with == 'zig'
          then:
            - Scripts/cli-32.exe
            - Scripts/gui-32.exe
            - Scripts/cli-arm64.exe
            - Scripts/gui-arm64.exe

about:
  homepage: https://github.com/conda/conda-launchers
  summary: Conda's Windows launchers for Python entry points, repackaged from releases
  description: |
    Windows launchers for Python entry points used in the conda ecosystem

    In order to launch Python entrypoints properly on Windows, a corresponding
    executable is used to proxy the call because shebangs do not work on Windows.
    This is achieved by the launchers (or called shims).
  license: Python-2.0 AND BSD-3-Clause
  license_file:
    - cpython-LICENSE
    - LICENSE
  repository: https://github.com/conda/conda-launchers

extra:
  recipe-maintainers:
    - jaimergp
    - jezdez
