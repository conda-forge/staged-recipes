schema_version: 1

context:
  name: bless
  version: "0.2.0"

package:
  name: ${{ name }}
  version: ${{ version }}

source:
  url: https://github.com/HaoZeke/bless/archive/refs/tags/v${{ version }}.tar.gz
  sha256: ecab0bd5d792b7e33612761809e61c75ca24fe67e3c97693196f24acc32aa71d

build:
  number: 0

requirements:
  build:
    - ${{ compiler('rust') }}
    - ${{ compiler('c') }}
    - ${{ stdlib('c') }}
    - cargo-bundle-licenses

tests:
  - script:
      - bless --help
  - package_contents:
      bin:
        - bless

about:
  homepage: https://github.com/HaoZeke/bless
  summary: CLI logging helper for repeated development runs with metadata tracking
  license: MIT
  license_file:
    - LICENSE
    - THIRDPARTY.yml
  repository: https://github.com/HaoZeke/bless

extra:
  recipe-maintainers:
    - HaoZeke
