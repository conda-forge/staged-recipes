{% set version = "1.1.2" %}
{% set name = "omfiles" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz
  sha256: 00fbff49ae1a22591f0489d4169fbd7826e0d91b4745061947f55ec7506c38d0
  patches:
    # open-meteo/python-omfiles/pull/114 attempts to get CFLAGS passing correct
    - 114.patch

build:
  # unknown windows failures whilst doing staged-receipts PR
  # will effort fixing once feedstock is created
  skip: true  # [win]
  number: 0

requirements:
  build:
    - {{ compiler('rust') }}
    - {{ compiler('c') }}
    - {{ compiler('cxx') }}
    - {{ stdlib("c") }}
    - clangdev
    - cargo-bundle-licenses
    - python                                 # [build_platform != target_platform]
    - cross-python_{{ target_platform }}     # [build_platform != target_platform]
    - maturin >=1.7,<2.0                     # [build_platform != target_platform]
  host:
    - python
    - maturin >=1.7,<2.0
    - pip
    - puccinialin
  run:
    - python
    - numpy >=1.21.0

test:
  imports:
    - omfiles
  commands:
    - pip check
  requires:
    - pip
    - python

about:
  home: https://github.com/open-meteo/python-omfiles
  summary: Python bindings for the Open-Meteo file format
  license: GPL-2.0-only
  license_file: LICENSE

extra:
  recipe-maintainers:
    - akrherz
