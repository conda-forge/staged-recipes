# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json

context:
  name: nccl4py
  version: "0.1.1"

package:
  name: ${{ name }}
  version: ${{ version }}

source:
  # NVIDIA tags nccl4py releases separately as `nccl4py-vX.Y.Z` on the
  # NVIDIA/nccl repository; the tarball extracts to `nccl-nccl4py-vX.Y.Z/`
  # with the Python package at `nccl4py/` in that root.
  url: https://github.com/NVIDIA/nccl/archive/refs/tags/nccl4py-v${{ version }}.tar.gz
  sha256: ae3aa413e2063f42ad57bdc08bc54c3d666466e80e59161fde567501f1eb157e

build:
  number: 0
  skip:
    - not linux
    - cuda_compiler_version == "None"
    # - match(python, "<3.10")
    # Build exactly one CUDA variant (13.*). Combined with the
    # ignore_run_exports below, the resulting package serves both CUDA 12 and
    # CUDA 13 runtimes, so there's no value in duplicating the build.
    # - not match(cuda_compiler_version, "13.*")

requirements:
  # nccl4py is CUDA-major-agnostic: its compiled extensions use only opaque
  # CUDA handle types (cudaStream_t, etc. from driver_types.h) and do not
  # link libcudart. NCCL is dlopen'd at runtime via cuda-pathfinder, so a
  # single build can serve either a CUDA 12 or CUDA 13 environment. Drop the
  # normal run_exports that would otherwise pin cuda-version to the build's
  # CUDA major (analogous to CUDA Enhanced Compatibility).
  ignore_run_exports:
    by_name:
      - cuda-version
    from_package:
      - cuda-cudart-dev
  build:
    - ${{ compiler('c') }}
    - ${{ compiler('cxx') }}
    - ${{ compiler('cuda') }}
    - ${{ stdlib('c') }}
    - if: aarch64
      then:
        - arm-variant * ${{ arm_variant_type }}
    - if: build_platform != target_platform
      then:
        - cross-python_${{ target_platform }}
        - cython >=0.29.24
        - python
  host:
    - python
    - pip
    - setuptools >=77.0.3
    - cython >=0.29.24
    - cuda-version ${{ cuda_compiler_version }}.*
    - cuda-cudart-dev
  run:
    - python
    - numpy
    - packaging
    - cuda-core >=0.4.1,<1
    - cuda-pathfinder >=1.1,<2
    - cuda-bindings
    - cuda-version >=12,<14.0a0
    # nccl_linux.pyx was code-generated against NCCL 2.28.0 (see header
    # comment) and dlsym's symbols from that release, including the window
    # APIs introduced in 2.28 (ncclCommWindowRegister/Deregister). Older
    # NCCL would load but fail at first call to any post-2.27 symbol.
    - nccl >=2.28,<3

tests:
  # Default-env sanity: imports + pip_check. This exercises whichever
  # cuda-version the solver picks (will be 13.x given the build env).
  - python:
      imports:
        - this.module.does.not.exist.1827552161
        - nccl
        - nccl.bindings
        - nccl.core
      pip_check: true
  # Verify the single CUDA-13 build resolves cleanly in a CUDA 12 runtime.
  # This is the payoff of the `ignore_run_exports` above: one artifact is
  # expected to serve both CUDA majors. The `cuda-version 12.*` constraint
  # cascades through `nccl` and `cuda-bindings`' own cuda-version deps,
  # forcing the test env to pick their CUDA-12 variants.
  #
  # Using script: instead of python: because rattler-build currently drops
  # per-test `requirements:` overrides on python: tests — script: tests
  # honor them, which is what we need here.
  - script:
      - python -c "import nccl, nccl.bindings, nccl.core; print(nccl.__version__)"
    requirements:
      run:
        - python
        - cuda-version 12.*
  # Same, but forcing a CUDA 13 runtime.
  - script:
      - python -c "import nccl, nccl.bindings, nccl.core; print(nccl.__version__)"
    requirements:
      run:
        - python
        - cuda-version 13.*

about:
  license: BSD-3-Clause
  license_file: LICENSE.txt
  summary: Python bindings for NVIDIA NCCL
  description: |
    NCCL4Py provides Pythonic access to NCCL for efficient multi-GPU and
    multi-node collective communication and point-to-point transfers. It
    ships low-level Cython bindings plus a high-level `nccl.core` API.
  homepage: https://developer.nvidia.com/nccl
  documentation: https://docs.nvidia.com/deeplearning/nccl/user-guide/docs/index.html
  repository: https://github.com/NVIDIA/nccl

extra:
  recipe-maintainers:
    - conda-forge/cuda
