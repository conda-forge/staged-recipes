{% set version = "4.0.1" %}

package:
  name: openmx
  version: {{ version }}

source:
  - url: https://www.openmx-square.org/openmx4.0.tar.gz
    sha256: 8d5338faf70885f276352bbd2826cdfed2ffd08f33eca58752666d79a7d0c3bf
  - url: https://www.openmx-square.org/bugfixed/26May08/patch4.0.1.tar.gz
    sha256: c5312eeee13e17e0123beeb4eb2379bcf7c7cafa1815b1dcf6846452f9620bef
    folder: patch4.0.1

build:
  number: 0
  skip: true  # [win]
  string: mpi_{{ mpi }}_h{{ PKG_HASH }}_{{ PKG_BUILDNUM }}

requirements:
  build:
    - {{ compiler('c') }}
    - {{ compiler('fortran') }}
    - {{ stdlib('c') }}
    - make
  host:
    - {{ mpi }}
    - fftw
    - libblas
    - liblapack
    - scalapack
    - libgomp  # [linux]
    - llvm-openmp  # [osx]
  run:
    - {{ mpi }}
    - scalapack
    - openssh  # [linux]
    - libgcc  # [osx]

test:
  files:
    - openmx_test.sh
  commands:
    - bash openmx_test.sh

about:
  home: https://www.openmx-square.org/
  summary: DFT package for large-scale material simulations
  description: |
    OpenMX is a software package for first-principles electronic structure
    calculations of materials based on density functional theory,
    norm-conserving pseudopotentials, and optimized pseudo-atomic basis
    functions. It can treat clusters, molecules, solids, surfaces, interfaces,
    low-dimensional materials, and liquids.
  license: GPL-3.0-only
  license_file:
    - LICENSE.txt
    - LICENSE-ELPA.txt
  doc_url: https://www.openmx-square.org/

extra:
  recipe-maintainers:
    - miz77
