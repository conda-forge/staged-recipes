# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  name: ag_ui_adk
  version: "0.6.0"
  python_min: "3.10"

package:
  name: ${{ name | lower }}
  version: ${{ version }}

source:
  url: https://files.pythonhosted.org/packages/1b/35/bff6db8108798906462af842a14a95b2b5d401f9ed0e4ecd2ba9a6e0bdd9/ag_ui_adk-0.6.0.tar.gz
  sha256: 7255d98f51024d7a1b42057bd76e088e0aefec0d2906496af9afe2e1fcb1207c

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - setuptools
  run:
    - python >=${{ python_min }}
    - ag-ui-protocol
    - aiohttp
    - fastapi
    - google-adk
    - pydantic
    - uvicorn

tests:
  - python:
      imports:
        - ag_ui_adk
      pip_check: true
      python_version: ${{ python_min }}.*

about:
  homepage: https://github.com/ag-ui-protocol/ag-ui/tree/main/integrations/adk-middleware/python
  license: MIT
  license_file: LICENSE
  summary: ADK Middleware for AG-UI Protocol
  dev_url: https://github.com/ag-ui-protocol/ag-ui/tree/main/integrations/adk-middleware/python

extra:
  recipe-maintainers:
    - rxm7706
