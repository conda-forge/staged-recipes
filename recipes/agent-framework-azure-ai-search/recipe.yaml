schema_version: 1

context:
  version: "1.0.0b260514"
  python_min: "3.10"

package:
  name: agent-framework-azure-ai-search
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/a/agent-framework-azure-ai-search/agent_framework_azure_ai_search-${{ version }}.tar.gz
  sha256: ae0480c0e0cd78ce91699beed80e5d3c3ae1b1e4bd4d371b6498d065f7193442

build:
  noarch: python
  number: 0
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - flit-core <4.0,>=3.11
  run:
    - python >=${{ python_min }}
    - agent-framework-core <2,>=1.4.0
    - azure-search-documents <11.7.0b3,>=11.7.0b2

tests:
  - python:
      imports:
        - agent_framework.azure_ai_search
      python_version: ${{ python_min }}.*
      pip_check: true

about:
  summary: |
    Azure AI Search integration for Microsoft Agent Framework.
  homepage: https://pypi.org/project/agent-framework-azure-ai-search/
  repository: https://github.com/microsoft/agent-framework
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - killua156
    - mgorny
