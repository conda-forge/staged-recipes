# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  name: django-ai-assistant
  version: "0.4.0"

package:
  name: django-ai-assistant
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/d/django-ai-assistant/django_ai_assistant-${{ version }}.tar.gz
  sha256: 24e8349fb2b7a937a294f5cefe3cd9cd1f15411d1dfa66ee702cc21e627cf1bb

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - poetry-core
    - pip
  run:
    - python >=${{ python_min }},<4.0
    - django >=4.2
    - pydantic >=2.9.2,<3.0.0
    - django-ninja >=1.5.3,<2.0.0
    - langchain >=1.2.6,<2.0.0
    - langgraph >=1.0.6,<2.0.0
  run_constraints:
    - langchain-openai >=1.1.7,<2.0.0
    - langchain-anthropic >=1.3.1,<2.0.0
    - langchain-google-genai >=4.2.0,<5.0.0

tests:
  - python:
      imports:
        - django_ai_assistant
      pip_check: true
      python_version:
      - ${{ python_min }}.*
      - "*"

about:
  summary: Django app to integrate with OpenAI Assistants API
  license: MIT
  license_file: LICENSE.txt
  homepage: https://github.com/vintasoftware/django-ai-assistant
  documentation: https://vintasoftware.github.io/django-ai-assistant

extra:
  recipe-maintainers:
    - rxm7706
