{% set version = "10.0.0_RC2" %}
{% set build_number = "0" %}

package:
  name: isiscore
  version: {{ version }}

source:
  url: https://github.com/DOI-USGS/ISIS3/archive/refs/tags/{{ version }}.tar.gz
  sha256: cd83aa9469af5b4ecf9a41784112bae69033500efca269870cf351ed88ba5914

build:
  skip: true  # [win]
  number: {{ build_number }}

requirements:
  build:
    - {{ compiler("cxx") }}
    - {{ stdlib("c") }}
    - cmake >=3.27,<3.28
    - ninja >=1.10,<1.11
    - python
    - setuptools
  host:
    - python
    - gdal >=3.12.2,<4
    - mesalib  # [linux]
    - libgl-devel  # [linux]
    - libgdal-core
    - libvulkan-headers
    - nlohmann_json =3.11.2
    - setuptools
    - qt6-main >=6,<7
    - swig
  run:
    - python
    - libgdal-core

test:
  commands:
    - test -e $PREFIX/lib/libcore${SHLIB_EXT}
    - test -e $PREFIX/include/isis/Pvl.h

about:
  home: https://github.com/DOI-USGS/ISIS3
  license: CC0-1.0
  license_file: LICENSE.md
  summary: "ISIS Core"

extra:
  recipe-maintainers:
    - amystamile-usgs
    
