{% set version = "10.0.0_RC2" %}
{% set build_number = "0" %}

package:
  name: isiscore
  version: {{ version }}

source:
  url: https://github.com/DOI-USGS/ISIS3/releases/download/{{ version }}/isis-{{ version }}.tar.gz
  sha256: 9700aab183d71b65662fb596b43a7f1ad45caf6b1c21c52ac713168b03a1d68c
build:
  skip: true  # [win]
  number: {{ build_number }}

requirements:
  build:
    - {{ compiler('c') }}
    - {{ compiler('cxx') }}
    - {{ stdlib('c') }}
    - cmake >=3.27,<3.28
    - ninja
    - python
    - setuptools
  host:
    - python
    - gdal
    - libgl-devel  # [linux]
    - libgdal-core
    - libvulkan-headers
    - nlohmann_json
    - setuptools
    - qt6-main
    - swig
  run:
    - python

test:
  commands:
    - test -e $PREFIX/lib/libcore${SHLIB_EXT}
    - test -e $PREFIX/include/isis/Pvl.h

about:
  home: https://github.com/DOI-USGS/ISIS3
  license: CC0-1.0
  license_file: LICENSE.md
  summary: "ISIS Core"

extra:
  recipe-maintainers:
    - amystamile-usgs
    
