schema_version: 1

context:
  python_min: "3.11"
  version: "0.0.3"

package:
  name: mpl-measurements
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/m/mpl-measurements/mpl_measurements-${{ version }}.tar.gz
  sha256: d777cae5ee407b8cd14bd9d75aff3a14fe2c318d28b5309267d6693763ce2707

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - setuptools >=68
    - wheel
    - pip
  run:
    - python >=${{ python_min }}
    - matplotlib-base
    - numpy

tests:
  - python:
      imports:
        - mpl_measurements
      pip_check: true
      python_version: ${{ python_min }}.*

about:
  summary: mpl-measurements add measurements to your matplotlib plots
  license: BSD-3-Clause
  license_file: LICENSE
  homepage: https://github.com/ubaldot/mpl-measurements

extra:
  recipe-maintainers:
    - ubaldot
