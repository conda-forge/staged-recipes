requirements:
  build:
    - ${{ stdlib('c') }}  # Required for all compiled packages 
    - ${{ compiler('c') }}
    - ${{ compiler('rust') }}  # Rust compiler from conda-forge
    - cargo-bundle-licenses  # For collecting dependency licenses
    - cargo-auditable       # For reproducible builds

tests:
  # Basic smoke test
  - script: 
    - if: unix
      then:
         - tldr --help
      else:
         - tldr.exe --help
about:
  homepage: https://github.com/tldr-pages/tlrc
  summary: Official tldr client written in Rust
  description: |
    tlrc is the official Rust implementation of the tldr-pages client.
    It provides simplified, example-based community-driven man pages.
  license: MIT 
  license_file:
    - LICENSE  # Main project license
    - THIRDPARTY.yml  # Auto-generated dependency licenses
  documentation: https://tldr.sh/tlrc/
  repository: https://github.com/tldr-pages/tlrc

extra:
  recipe-maintainers:
    - HiroshiYa  # Replace with your GitHub handle
