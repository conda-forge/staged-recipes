context:
  version: "1.13.0"

package:
  name: tlrc
  version: ${{ version }}

source:
  url: https://github.com/tldr-pages/tlrc/archive/refs/tags/v${{ version }}.tar.gz
  sha256: be72997481480d66560886d2ff7b1e1d8e086169885d85edee663c9091bd32f3

build:
  number: 0

requirements:
  build:
    - ${{ stdlib('c') }}
    - ${{ compiler('c') }}
    - ${{ compiler('rust') }}
    - cargo-bundle-licenses
    - cargo-auditable

tests:
  - script: 
    - if: unix
      then:
         - tldr --help
      else:
         - tldr.exe --help
about:
  homepage: https://github.com/tldr-pages/tlrc
  summary: Official tldr client written in Rust
  description: |
    tlrc is the official Rust implementation of the tldr-pages client.
    It provides simplified, example-based community-driven man pages.
  license: MIT 
  license_file:
    - LICENSE
    - THIRDPARTY.yml
  documentation: https://tldr.sh/tlrc/
  repository: https://github.com/tldr-pages/tlrc

extra:
  recipe-maintainers:
    - hiroshi-ya
