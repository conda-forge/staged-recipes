context:
  version: "1.13.1"

package:
  name: tlrc
  version: ${{ version }}

source:
  url: https://github.com/tldr-pages/tlrc/archive/refs/tags/v${{ version }}.tar.gz
  sha256: 4b85b85c0299ae2ae6b78d2d52b2e597e1441da24b579034780663e33ccc85fc

build:
  number: 0

requirements:
  build:
    - ${{ stdlib('c') }}
    - ${{ compiler('c') }}
    - ${{ compiler('rust') }}
    - cargo-bundle-licenses
    - cargo-auditable

tests:
  - script:
      - tldr --help
  - package_contents:
      bin:
        - if: unix
          then:
            - tldr
          else:
            - tldr.exe
      files:
        - if: unix
          then:
            - share/bash-completion/completions/tldr
            - share/zsh/site-functions/_tldr
            - share/fish/vendor_completions.d/tldr.fish
            - share/man/man1/tldr.1
      strict: true

about:
  homepage: https://github.com/tldr-pages/tlrc
  summary: Official tldr client written in Rust
  description: |
    tlrc is the official Rust implementation of the tldr-pages client.
    It provides simplified, example-based community-driven man pages.
  license: MIT
  license_file:
    - LICENSE
    - THIRDPARTY.yml
  documentation: https://tldr.sh/tlrc/
  repository: https://github.com/tldr-pages/tlrc

extra:
  recipe-maintainers:
    - hiroshi-ya
