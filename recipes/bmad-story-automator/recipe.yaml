# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  name: bmad-story-automator
  version: "1.13.0"
  # Upstream repo (bmad-code-org/bmad-automator) has no release tags as of 2026-04-26.
  # Pinned to the latest main commit; bump both `version` and `commit` together.
  commit: 15da072b0806e586db01ff5dc946150d96ff287f

package:
  name: ${{ name }}
  version: ${{ version }}

source:
  url: https://github.com/bmad-code-org/bmad-automator/archive/${{ commit }}.tar.gz
  sha256: 6aa973864c32b1b1d8205daaca5772268cada7917ee030521212fdc8fc15a7b2

build:
  number: 0
  noarch: generic
  skip:
    # Required for staged-recipes CI: build_all.py ignores noarch_platforms
    # in the per-recipe conda-forge.yml, so the win-64 runner would otherwise
    # build the noarch artifact and then fail to solve __unix in the test env.
    # After feedstock creation, noarch_platforms takes over this role.
    - win

requirements:
  run:
    - nodejs >=18
    - python >=3.10
    # bin/bmad-story-automator explicitly errors on Windows; the __unix virtual
    # package keeps Windows users from installing, while conda-forge.yml
    # restricts CI to non-Windows runners.
    - __unix

tests:
  - script:
      - bmad-story-automator --version
      - bmad-story-automator --help
      - test -f "${PREFIX}/lib/node_modules/bmad-story-automator/package.json"
      - test -f "${PREFIX}/lib/node_modules/bmad-story-automator/bin/bmad-story-automator"
      - test -f "${PREFIX}/lib/node_modules/bmad-story-automator/install.sh"
      - test -d "${PREFIX}/lib/node_modules/bmad-story-automator/payload"
      - test -d "${PREFIX}/lib/node_modules/bmad-story-automator/source"

about:
  homepage: https://github.com/bmad-code-org/bmad-automator
  repository: https://github.com/bmad-code-org/bmad-automator
  license: MIT
  license_file: LICENSE
  summary: BMAD story-automator skill bundle and Python helper runtime installer
  description: |
    bmad-story-automator is the portable installer for the BMAD `bmad-story-automator`
    pure skill bundle. It installs the orchestration skill, the bundled review skill,
    and the Python helper runtime that parses stories, builds state docs, spawns tmux
    child sessions, monitors child agents, and verifies review completion into a
    target BMAD project's `.claude/skills/` tree.

    After installation, run `bmad-story-automator <bmad-project-root>` (or just
    `bmad-story-automator` from inside a BMAD project) to deploy the skill bundle.

extra:
  recipe-maintainers:
    - rxm7706
