# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  name: django-lasuite
  version: "0.0.26"

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/${{ name[0] }}/${{ name }}/django_lasuite-${{ version }}.tar.gz
  sha256: b4ffb15d3e56e366d71b527195d26198e2d26e28cc1ab1c11aefdc581db9c02b

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - hatchling
    - pip
  run:
    - python >=${{ python_min }},<4.0
    - django >=5.0
    - djangorestframework >=3.15.2
    - mozilla-django-oidc >=4.0.1
    - pyjwt >=2.8.0
    - joserfc >=1.4.0
    - requests >=2.32.3
    - requests-toolbelt >=1.0.0

tests:
  - python:
      imports:
        - lasuite
      pip_check: true
      python_version:
      - ${{ python_min }}.*
      - "*"

about:
  summary: Django La Suite - A Django library
  license: MIT
  license_file: LICENSE
  homepage: https://github.com/suitenumerique/django-lasuite

extra:
  recipe-maintainers:
    - rxm7706
