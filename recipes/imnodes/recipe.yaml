context:
  name: imnodes
  version: "0.5"

package:
  name: ${{ name }}
  version: ${{ version }}

source:
  - url: https://github.com/Nelarius/imnodes/archive/v${{ version }}.tar.gz
    sha256: c19a1d8e3fabf71def02b98c43a3f4551f0a5bd3740a93474a356e8957ec2ab2
  - path: CMakeLists.txt

build:
  number: 0

requirements:
  build:
    - ${{ compiler('cxx') }}
    - ${{ stdlib("c") }}
    - cmake
    - ninja
  host:
    - imgui-docking
  run:
    - imgui-docking
  run_exports:
    - ${{ pin_subpackage('imnodes', upper_bound='x.x.x') }}

tests:
  - package_contents:
      lib:
        - imnodes

about:
  summary: A small, dependency-free node editor for Dear ImGui
  license: MIT
  license_file: LICENSE.md
  homepage: https://github.com/Nelarius/imnodes

extra:
  recipe-maintainers:
    - julian-belina
