context:
  name: imnodes
  version: "0.5"

package:
  name: ${{ name }}
  version: ${{ version }}

source:
  - url: https://github.com/Nelarius/imnodes/archive/d88f99125bb72cdb71b4c27ff6eb7f318d89a4c5.tar.gz
    sha256: de79364b27d661b5058179af92ba438886512ca3ca7eb976b3ae1b9c315bdd85
    patches:
      - dearpygui-compat.patch
  - path: CMakeLists.txt

build:
  number: 0

requirements:
  build:
    - ${{ compiler('cxx') }}
    - ${{ stdlib("c") }}
    - cmake
    - ninja
  host:
    - imgui-docking
    - if: win
      then: freetype
  run:
    - imgui-docking
  run_exports:
    - ${{ pin_subpackage('imnodes', upper_bound='x.x.x') }}

tests:
  - package_contents:
      lib:
        - imnodes

about:
  summary: A small, dependency-free node editor for Dear ImGui
  license: MIT
  license_file: LICENSE.md
  homepage: https://github.com/Nelarius/imnodes

extra:
  recipe-maintainers:
    - julian-belina
