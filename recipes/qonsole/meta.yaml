{% set name = "qonsole" %}
{% set version = "2.0.0" %}

package:
  name: qonsole
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/q/qonsole/qonsole-{{ version }}.tar.gz
  sha256: fd0d26b59dfdec078494b42d2b63f072cc7e2f801aa4a87b47544bd7ec7dbe39

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - hatchling
    - pip
  run:
    - python >={{ python_min }}
    - qtpy >=2.4.3,<3
    - jedi >=0.19.2,<0.20
    - pygments >=2.20.0,<3
    - ipython_pygments_lexers >=1.1.1,<2

test:
  imports:
    - qonsole
  commands:
    - pip check
  requires:
    - python {{ python_min }}
    - pip
    - pyside6

about:
  home: https://github.com/jacobwilliams/qonsole
  summary: Light-weight python interpreter, easy to embed into Qt applications
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - jacobwilliams
