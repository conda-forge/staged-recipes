context:
  name: gaudi
  tag: v40r4
  version: ${{ tag[1:] | replace('r', '.') | replace('p', '.') }}

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://gitlab.cern.ch/gaudi/Gaudi/-/archive/${{ tag }}/Gaudi-${{ tag }}.tar.gz
  sha256: dd288f066e09237f2968a2390e80bef5580e0075896116f4d729b9b609bc25c8
  patches:
    - patches/0001-fix-scan-default-plugin-path-in-Registry-initialize.patch
    - if: osx
      then: patches/0001-fix-define-_LIBCPP_DISABLE_AVAILABILITY-on-macOS.patch
    - patches/0002-fix-resolve-Gaudi-libraries-by-absolute-path-on-macOS.patch
    - patches/0003-fix-platform-appropriate-library-path-in-confdb-test-on-macOS.patch
    - patches/0004-fix-Make-linker-flags-Linux-specific-in-DeveloperBuildType.patch
    - patches/0005-fix-Remove-lowlink-value-from-SCC-error-output.patch
    - patches/0006-fix-Normalize-strsignal-output-for-macOS.patch
    - patches/0007-fix-Output-pthread_t-as-decimal-for-macOS.patch
    - patches/0008-fix-Sort-Configurable-properties-alphabetically.patch
    - patches/0009-fix-Normalize-graph-test-for-cross-platform-hash.patch
    - patches/0010-fix-Remove-hardcoded-.so-extension-for-macOS.patch
    - patches/0011-fix-Add-macOS-support-to-GAUDI-404-test.patch
    - patches/0012-fix-Skip-exception-catching-tests-on-macOS.patch
  # patches:
  #   - patches/1871.patch
  #   - patches/1872.patch
  #   - patches/1873.patch
  #   - patches/1874.patch
  #   - patches/1876.patch
  #   - patches/1877.patch
  #   - patches/plugin-loading.patch
  #   - patches/system-implementation.patch
  #   - patches/libcxx-fixes.patch
  #   - patches/test-cmake-portability.patch
  #   - patches/0001-fix-Disable-Clang-colored-diagnostics-in-test_Counte.patch

build:
  number: 0
  skip:
    - win
    # conda-forge Python lacks gdbm support, so dbm.sqlite3 (Python 3.13+) is needed for confdb2
    - match(python, "<3.13")
  script:
    - |
      mkdir -p build
      cd build
      cmake ${CMAKE_ARGS} \
          -GNinja \
          -DCMAKE_BUILD_TYPE=Release \
          -DCMAKE_INSTALL_PREFIX=$PREFIX \
          -DCMAKE_EXPORT_COMPILE_COMMANDS=ON \
          -DCMAKE_CXX_SCAN_FOR_MODULES=OFF \
          -DBUILD_SHARED_LIBS=ON \
          -DGAUDI_INSTALL_PYTHONDIR=$SP_DIR \
          -DGAUDI_DEFAULT_PLUGIN_PATH=$PREFIX/lib \
          -DPython_EXECUTABLE=$PYTHON \
          -DGAUDI_USE_DOXYGEN=OFF \
          $SRC_DIR
      cmake --build . -j${CPU_COUNT}
    # Run most of the test suite as Gaudi has been shown to be quite delicate to build conditions:
    # * Exclude cmake.test_dummyGaudiDownstreamProject - requires vdt/ROOT
    #   development dependencies not available in test install environmet
    # * Exclude whiteboard.test_bug_cfhep114 - the reproducer requests a thread
    #   pool of 10 with cardinality 10 and consistently exceeds its 120s timeout
    #   under the oversubscription of a resource-constrained CI runner
    # * Exclude GaudiConfiguration.pytest.python.test_ConfDB_wrapper (and its
    #   coverage_combine/coverage_report fixtures, which require it) - the
    #   test_confdb case strips DYLD_LIBRARY_PATH and points GAUDI_PLUGIN_PATH at
    #   an empty dir, then loads libGaudiPluginService. On macOS that library is
    #   only reachable from the not-yet-installed build tree, so it cannot be
    #   found until "cmake --install" runs below. The test passes against the
    #   installed package and is covered by upstream CI.
    # * Gaudi tests are flaky on resource constrained environments to retry up to three times
    - ctest --output-on-failure -E 'cmake\.test_dummyGaudiDownstreamProject|whiteboard\.test_bug_cfhep114|GaudiConfiguration\.pytest\.python\.(test_ConfDB_wrapper|coverage_combine|coverage_report)' --repeat until-pass:3 -j${CPU_COUNT}
    - cmake --install .

requirements:
  run_exports:
    - ${{ pin_subpackage(name, upper_bound="x.x.x") }}
  build:
    - ${{ compiler('cxx') }}
    - ${{ stdlib('c') }}
    - cmake
    - ninja
    - git
    - if: linux
      then: procps-ng
  host:
    - python
    - pytest
    - pytest-cov
    - coverage
    - pyyaml
    - networkx
    - libboost-devel
    - libboost-python-devel
    - root_base
    - root_cxx_standard
    - tbb-devel
    - zlib
    - libuuid
    - range-v3
    - nlohmann_json
    - fmt
    - clhep
    - xerces-c
    - catch2
    - ms-gsl
    - aida
    - heppdt
  run:
    - python

tests:
  - python:
      imports:
        - GaudiKernel
      pip_check: false
  - script:
      - test -f $PREFIX/bin/Gaudi
      - Gaudi --help
      - gaudirun.py

about:
  homepage: https://gitlab.cern.ch/gaudi/Gaudi
  license: Apache-2.0
  license_file: LICENSE
  summary: The Gaudi software framework for event data processing applications
  description: |
    Gaudi is a software framework used for building event data processing
    applications in high-energy physics. It provides a component model,
    an event data model, and interfaces for tools, services, and algorithms.
    Originally developed at CERN for the LHCb experiment, it is now used
    by multiple experiments including ATLAS and LHCb.
  documentation: https://gaudi-framework.readthedocs.io/
  repository: https://gitlab.cern.ch/gaudi/Gaudi

extra:
  recipe-maintainers:
    - chrisburr
