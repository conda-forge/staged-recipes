context:
  name: gaudi
  tag: v40r4
  version: ${{ tag[1:] | replace('r', '.') | replace('p', '.') }}

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://gitlab.cern.ch/gaudi/Gaudi/-/archive/${{ tag }}/Gaudi-${{ tag }}.tar.gz
  sha256: dd288f066e09237f2968a2390e80bef5580e0075896116f4d729b9b609bc25c8
  patches:
    # gaudi/Gaudi!1925 added getDefaultPluginPath() and wired it into
    # loadPluginLibrary() but not Registry::initialize(), so in a Conda env
    # with no GAUDI_PLUGIN_PATH / (DY)LD_LIBRARY_PATH the factory registry
    # initialises empty and lookups (e.g. EvtDataSvc) fail. Pending upstream
    # fix to be submitted as a follow-up to !1925.
    - patches/0001-fix-scan-default-plugin-path-in-Registry-initialize.patch
    # libc++ availability annotations reject std::to_chars (and other 13.3+
    # features) when targeting older macOS. Exporting it via CXXFLAGS isn't
    # enough as genreflex/cling never sees it, so inject the define via CMake
    # compile definitions which also reach the genreflex command lines.
    - if: osx
      then: patches/0001-fix-define-_LIBCPP_DISABLE_AVAILABILITY-on-macOS.patch
    # dyld ignores LD_LIBRARY_PATH so the build-tree dlopen of
    # libGaudiPluginService.dylib by bare name (introduced in v40r4 by
    # gaudi/Gaudi!1925) fails on macOS, e.g. in genconfuser.py. The pending
    # upstream fix (gaudi/Gaudi!1932) exports DYLD_LIBRARY_PATH in the
    # generated environment, but that is insufficient as SIP strips DYLD_*
    # across protected executables like the /usr/bin/env in scripts'
    # shebangs. Instead fall back to resolving the library to an absolute
    # path via GAUDI_PLUGIN_PATH/(DY)LD_LIBRARY_PATH inside cpluginsvc.
    - if: osx
      then: patches/0002-fix-resolve-GaudiPluginService-library-via-search-paths.patch
  # patches:
  #   - patches/1871.patch
  #   - patches/1872.patch
  #   - patches/1873.patch
  #   - patches/1874.patch
  #   - patches/1876.patch
  #   - patches/1877.patch
  #   - patches/plugin-loading.patch
  #   - patches/system-implementation.patch
  #   - patches/libcxx-fixes.patch
  #   - patches/test-cmake-portability.patch
  #   - patches/0001-fix-Disable-Clang-colored-diagnostics-in-test_Counte.patch

build:
  number: 0
  skip:
    - win
    # conda-forge Python lacks gdbm support, so dbm.sqlite3 (Python 3.13+) is needed for confdb2
    - match(python, "<3.13")
  script:
    - |
      mkdir -p build
      cd build
      cmake ${CMAKE_ARGS} \
          -GNinja \
          -DCMAKE_BUILD_TYPE=Release \
          -DCMAKE_INSTALL_PREFIX=$PREFIX \
          -DCMAKE_EXPORT_COMPILE_COMMANDS=ON \
          -DCMAKE_CXX_SCAN_FOR_MODULES=OFF \
          -DBUILD_SHARED_LIBS=ON \
          -DGAUDI_INSTALL_PYTHONDIR=$SP_DIR \
          -DGAUDI_DEFAULT_PLUGIN_PATH=$PREFIX/lib \
          -DPython_EXECUTABLE=$PYTHON \
          -DGAUDI_USE_DOXYGEN=OFF \
          $SRC_DIR
      cmake --build . -j${CPU_COUNT}
    - which ps
    # Exclude cmake.test_dummyGaudiDownstreamProject - requires vdt/ROOT
    # development dependencies not available in test install environmet
    # Exclude whiteboard.test_bug_cfhep114 - the reproducer requests a thread
    # pool of 10 with cardinality 10 and consistently exceeds its 120s timeout
    # under the oversubscription of a resource-constrained CI runner
    # Gaudi tests are flaky on resource constrained environments to retry up to three times
    - ctest --output-on-failure -E 'cmake\.test_dummyGaudiDownstreamProject|whiteboard\.test_bug_cfhep114' --repeat until-pass:3 -j${CPU_COUNT}
    - cmake --install .
    - root -l -b -q -e 'if (TClass::GetClass("DataObject") == nullptr) { std::cerr << "Failed to load DataObject" << std::endl; return 1; } return 0;'

requirements:
  run_exports:
    - ${{ pin_subpackage(name, upper_bound="x.x.x") }}
  build:
    - ${{ compiler('cxx') }}
    - ${{ stdlib('c') }}
    - cmake
    - ninja
    - git
    - if: linux
      then: procps-ng
  host:
    - python
    - pytest
    - pytest-cov
    - coverage
    - pyyaml
    - networkx
    - libboost-devel
    - libboost-python-devel
    - root_base
    - root_cxx_standard
    - tbb-devel
    - zlib
    - libuuid
    - range-v3
    - nlohmann_json
    - fmt
    - clhep
    - xerces-c
    - catch2
    - ms-gsl
    - aida
    - heppdt
  run:
    - python

tests:
  - python:
      imports:
        - GaudiKernel
      pip_check: false
  - script:
      - test -f $PREFIX/bin/Gaudi
      - Gaudi --help
      - gaudirun.py

about:
  homepage: https://gitlab.cern.ch/gaudi/Gaudi
  license: Apache-2.0
  license_file: LICENSE
  summary: The Gaudi software framework for event data processing applications
  description: |
    Gaudi is a software framework used for building event data processing
    applications in high-energy physics. It provides a component model,
    an event data model, and interfaces for tools, services, and algorithms.
    Originally developed at CERN for the LHCb experiment, it is now used
    by multiple experiments including ATLAS and LHCb.
  documentation: https://gaudi-framework.readthedocs.io/
  repository: https://gitlab.cern.ch/gaudi/Gaudi

extra:
  recipe-maintainers:
    - chrisburr
