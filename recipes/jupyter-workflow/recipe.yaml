schema_version: 1

context:
  version: "0.0.37"

package:
  name: jupyter-workflow
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/j/jupyter-workflow/jupyter-workflow-${{ version }}.tar.gz
  sha256: ed7b1a224bd5a5709dd2358e6528e88b195bc3194cc1907d82fd759e4119d0f8

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python =${{ python_min }}.*
    - pip
    - setuptools
  run:
    - python >=${{ python_min }},<4.0
    - dill
    - ipython
    - ipython_genutils
    - ipykernel
    - jsonref
    - jsonschema
    - jupyter_client
    - streamflow >=0.0.30
    - traitlets

tests:
  - python:
      imports:
        - jupyter_workflow
      pip_check: true
      python_version: 
        - ${{ python_min }}.*
        - "*"

about:
  summary: Jupyter Workflow Kernel
  license: LGPL-3.0-only
  license_file: LICENSE
  homepage: https://github.com/alpha-unito/jupyter-workflow

extra:
  recipe-maintainers:
    - jan-janssen
