schema_version: 1

context:
  version: "9.1.1"

package:
  name: pyoxipng
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/p/pyoxipng/pyoxipng-${{ version }}.tar.gz
  sha256: c9c3c087b0c744ba9b709a321c61183668f024c138748a8da565fe89a4bf0fb8

build:
  number: 0
  script:
    - cargo-bundle-licenses --format yaml --output THIRDPARTY.yml
    - ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  build:
    - ${{ stdlib('c') }}
    - ${{ compiler('c') }}
    - ${{ compiler('rust') }}
    - cargo-bundle-licenses
  host:
    - python
    - maturin >=1.8.0,<1.9.dev0
    - pip
  run:
    - python

tests:
  - python:
      imports:
        - oxipng
      pip_check: true

about:
  summary: Python wrapper for multithreaded .png image file optimizer oxipng
  license: MIT
  license_file:
    - LICENSE
    - THIRDPARTY.yml
  homepage: https://github.com/nfrasser/pyoxipng

extra:
  recipe-maintainers:
    - thewchan
