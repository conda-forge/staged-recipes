schema_version: 1

context:
  version: "0.0.2"
  python_min: "3.11"

recipe:
  name: retriever-core
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/r/retriever-core/retriever_core-${{ version }}.tar.gz
  sha256: 508b48af16c89156db38c9558fc142f957ceefd7f300dad5b48dfcd54e7cb702

build:
  number: 0
  noarch: python

outputs:
  # The core Retriever package.
  - package:
      name: retriever-core
    build:
      script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
      python:
        entry_points:
          - retriever = retriever.cli:main
    requirements:
      host:
        - python ${{ python_min }}.*
        - hatchling
        - pip
      run:
        - python >=${{ python_min }}
        - packaging >=23
    tests:
      - python:
          imports:
            - retriever
          pip_check: true
          python_version:
            - ${{ python_min }}.*
            - "*"
      - script:
          - retriever --help

  # Metapackages mirroring the upstream extras (pip install "retriever-core[<extra>]").
  - package:
      name: retriever-core-dora
    requirements:
      host:
        - python ${{ python_min }}.*
      run:
        - python >=${{ python_min }}
        - ${{ pin_subpackage('retriever-core', exact=true) }}
        - dora-cli >=0.3.12
        - dora-rs >=0.3.12
        - psutil
        - pyarrow
        - pyyaml
    tests:
      - python:
          imports:
            - retriever
          pip_check: true
          python_version:
            - ${{ python_min }}.*
            - "*"

  - package:
      name: retriever-core-jax
    requirements:
      host:
        - python ${{ python_min }}.*
      run:
        - python >=${{ python_min }}
        - ${{ pin_subpackage('retriever-core', exact=true) }}
        - flax
        - jax
        - jaxlib
        - optax
    tests:
      - python:
          imports:
            - retriever
          pip_check: true
          python_version:
            - ${{ python_min }}.*
            - "*"

  - package:
      name: retriever-core-mcp
    requirements:
      host:
        - python ${{ python_min }}.*
      run:
        - python >=${{ python_min }}
        - ${{ pin_subpackage('retriever-core', exact=true) }}
        - mcp >=1.25.0,<2
    tests:
      - python:
          imports:
            - retriever
          pip_check: true
          python_version:
            - ${{ python_min }}.*
            - "*"

  - package:
      name: retriever-core-otel
    requirements:
      host:
        - python ${{ python_min }}.*
      run:
        - python >=${{ python_min }}
        - ${{ pin_subpackage('retriever-core', exact=true) }}
        - opentelemetry-api
        - opentelemetry-sdk
        - uptrace
    tests:
      - python:
          imports:
            - retriever
          pip_check: true
          python_version:
            - ${{ python_min }}.*
            - "*"

  - package:
      name: retriever-core-recording
    requirements:
      host:
        - python ${{ python_min }}.*
      run:
        - python >=${{ python_min }}
        - ${{ pin_subpackage('retriever-core', exact=true) }}
        - mcap >=1.0.0
        - numpy
        - rerun-sdk >=0.21.0,<0.24
    tests:
      - python:
          imports:
            - retriever
          pip_check: true
          python_version:
            - ${{ python_min }}.*
            - "*"

  - package:
      name: retriever-core-vision
    requirements:
      host:
        - python ${{ python_min }}.*
      run:
        - python >=${{ python_min }}
        - ${{ pin_subpackage('retriever-core', exact=true) }}
        - pillow
        - pytorch >=2.0.0
        - transformers
    tests:
      - python:
          imports:
            - retriever
          pip_check: true
          python_version:
            - ${{ python_min }}.*
            - "*"

  - package:
      name: retriever-core-web
    requirements:
      host:
        - python ${{ python_min }}.*
      run:
        - python >=${{ python_min }}
        - ${{ pin_subpackage('retriever-core', exact=true) }}
        - fastapi
        - uvicorn-standard
    tests:
      - python:
          imports:
            - retriever
          pip_check: true
          python_version:
            - ${{ python_min }}.*
            - "*"

about:
  homepage: https://github.com/openretriever/retriever
  summary: A Python programming model and runtime for closed-loop robot agents whose perception, planning, and control run at different rates.
  license: Apache-2.0
  license_file:
    - LICENSE
    - THIRD_PARTY_NOTICES.md
  documentation: https://retriever.build/

extra:
  recipe-maintainers:
    - linfeng-z
    - tobyxdd
    - sea-bass
