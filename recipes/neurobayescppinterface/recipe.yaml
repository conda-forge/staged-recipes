context:
  version: "2018.01.11.c7d36c5"
  commit: ${{ (version | split('.'))[3] }}

package:
  name: neurobayescppinterface
  version: ${{ version }}

source:
  url: https://github.com/thomaskeck/NeurobayesCppInterface/archive/${{ commit }}.tar.gz
  sha256: 243dac1e273428f37a4ac8b45aa710c7c1096407f1f99a6c4bf733afd815d792

build:
  script:
    - cmake -S . -B build -G Ninja -DCMAKE_C_COMPILER=$CC -DCMAKE_CXX_COMPILER=$CXX -DCMAKE_POLICY_VERSION_MINIMUM=3.5 ${CMAKE_ARGS}
    - cmake build -LH
    - cmake --build build --parallel ${CPU_COUNT}
    - cmake --install build
    - rm -f ${PREFIX}/bin/minimaltest
  number: 0
  skip:
    - win

requirements:
  build:
    - ${{ compiler("cxx") }}
    - ${{ stdlib("c") }}
    - ${{ compiler("fortran") }}
    - cmake
    - ninja
  run_exports:
    - ${{ pin_subpackage("neurobayescppinterface", upper_bound="x.x.x") }}

tests:
  - package_contents:
      lib:
        - NeuroBayesCPPInterface_shared
        - NeuroBayesCore_shared
      include:
        - neurobayes/NeuroBayesExpert.hh
        - neurobayes/NeuroBayesTeacher.hh
        - neurobayes/nb_c_utils.h
        - neurobayes/nb_cpp_utils.h
        - neurobayes/nb_param.hh
      strict: true

about:
  homepage: https://github.com/thomaskeck/NeurobayesCppInterface
  summary: 'An interface to NeuroBayes(R)'
  license: MIT
  license_file: LICENSE
  repository: https://github.com/thomaskeck/NeurobayesCppInterface

extra:
  recipe-maintainers:
    - utk4r-sh
    - GiacomoXT
    - vvsagar
    - AlexanderHeidelbach
