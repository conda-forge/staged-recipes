context:
  version: "1.3.0"

package:
  name: alibabacloud-oss-v2
  version: ${{ version }}

source:
  url: https://github.com/aliyun/alibabacloud-oss-python-sdk-v2/archive/refs/tags/${{ version }}.tar.gz
  sha256: 0e7b3990c9dfa6ed287f4829377de9fa47c7a71d313687078f32a75586d05d0a

build:
  noarch: python
  script: python -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - setuptools
  run:
    - python >=${{ python_min }}
    - requests >=2.18.4
    - pycryptodome >=3.4.7
    - crcmod-plus >=2.1.0

tests:
  - python:
      imports:
        - alibabacloud_oss_v2
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  homepage: https://github.com/aliyun/alibabacloud-oss-python-sdk-v2
  summary: Alibaba Cloud OSS (Object Storage Service) SDK V2 for Python
  license: Apache-2.0
  license_file: LICENSE
  documentation: https://github.com/aliyun/alibabacloud-oss-python-sdk-v2/blob/master/README.md
  repository: https://github.com/aliyun/alibabacloud-oss-python-sdk-v2

extra:
  recipe-maintainers:
    - xylar
