schema_version: 1

context:
  python_min: "3.9"
  version: "1.4.0"

package:
  name: python-munge
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/m/munge/munge-${{ version }}.tar.gz
  sha256: 2f8c156e624fcc993fce1bfee5b9739f11b505c7f581562bd6bb46615c1f356a

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  python:
    entry_points:
      - munge = munge.cli:main

requirements:
  host:
    - python ${{ python_min }}.*
    - hatchling
    - pip
  run:
    - python >=${{ python_min }}
    - requests >=2.32.0
    - click >=8.0.1
    - toml >=0.10.2
    - tomlkit >=0.11.6
    - pyyaml >=6.0.1
    - urllib3 >=2.0.0
    - charset-normalizer >=3.3.0

tests:
  - python:
      imports:
        - munge
      pip_check: true
      python_version: ${{ python_min }}.*
  - requirements:
      run:
        - pip
        - python ${{ python_min }}.*
    script:
      - munge --help

about:
  summary: data manipulation library and client
  license: Apache-2.0
  license_file: LICENSE.txt
  homepage: https://github.com/20c/munge
  repository: https://github.com/20c/munge

extra:
  recipe-maintainers:
    - pavelzw
