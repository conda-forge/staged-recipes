{% set name = "jupyterlab-acp" %}
{% set pyname = "jupyterlab_acp" %}
{% set version = "0.2.0" %}
{% set python_min = "3.10" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ pyname[0] }}/{{ pyname }}/{{ pyname }}-{{ version }}.tar.gz
  sha256: a3b5674d0ad61c680dbd10bc291336f4b17f2fa5bb7ccaf689c55913ba2bbdc0

build:
  noarch: python
  number: 0
  script: {{ PYTHON }} -m pip install . --no-deps --no-build-isolation -vv

requirements:
  host:
    - python {{ python_min }}
    - pip
    - hatchling
    - hatch-jupyter-builder >=0.5
    - jupyterlab >=4.5.0
  run:
    - python >={{ python_min }}
    - agent-client-protocol >=0.9,<0.10
    - jupyter-server >=2.4,<3
    - jupyterlab >=4.5.0

test:
  imports:
    - jupyterlab_acp
  commands:
    - pip check
    - jupyter server extension list 2>&1 | grep -ie "jupyterlab_acp.*enabled"
    - jupyter labextension list 2>&1 | grep -ie "jupyterlab-acp.*enabled"
  requires:
    - python {{ python_min }}
    - pip

about:
  home: https://github.com/SchmidtDSE/jupyterlab-acp
  summary: Jupyter-native access to coding agents over the Agent Client Protocol (ACP)
  description: |
    jupyterlab-acp is a JupyterLab extension that gives each chat a single
    coding agent over the Agent Client Protocol (ACP) — a per-chat agent
    binding with capability UI (models, modes, config options), tool-call and
    reasoning rendering, tool approval, live notebook editing, and a
    marketplace backed by the shared ACP Agent Registry. It is a thin layer on
    open standards (agent-client-protocol + jupyter-server) with no dependency
    on the jupyter_ai stack.
  license: BSD-3-Clause
  license_file: LICENSE
  dev_url: https://github.com/SchmidtDSE/jupyterlab-acp
  doc_url: https://jupyterlab-acp.readthedocs.io/

extra:
  recipe-maintainers:
    - cboettig
