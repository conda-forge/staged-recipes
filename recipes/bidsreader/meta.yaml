{% set name = "bidsreader" %}
{% set version = "0.1.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.io/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz
  sha256: ef6b49b10e1e1e84f3e31320fff0291ede6ab8f218ac280b08114f0d31375282

build:
  noarch: python
  number: 0
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python >=3.10
    - pip
    - setuptools >=64
    - setuptools-scm >=8
  run:
    - python >=3.10
    - mne-base >=1.0
    - mne-bids >=0.14
    - numpy >=1.23
    - pandas >=1.5

test:
  imports:
    - bidsreader

about:
  home: https://github.com/pennmem/bidsreader
  license: MIT
  license_family: MIT
  license_file: LICENSE
  summary: Data loader and file reader for the OpenBIDS format
  dev_url: https://github.com/pennmem/bidsreader

extra:
  recipe-maintainers:
    - zrentala