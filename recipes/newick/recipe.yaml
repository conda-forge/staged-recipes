schema_version: 1

context:
  version: "1.11.0"
  python_min: "3.8"

package:
  name: newick
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/n/newick/newick-${{ version }}.tar.gz
  sha256: b8bf81f88dbc0e1cb85928e6f4c7e0e29062c3739e27216aae76c3065a297186

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - setuptools
    - pip
  run:
    - python >=${{ python_min }}

tests:
  - python:
      imports:
        - newick
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  summary: A python module to read and write the Newick format
  license: Apache-2.0
  license_file: LICENSE
  homepage: https://gitlab.mpcdf.mpg.de/dlce-eva/python-newick
  repository: https://gitlab.mpcdf.mpg.de/dlce-eva/python-newick
  documentation: https://gitlab.mpcdf.mpg.de/dlce-eva/python-newick

extra:
  recipe-maintainers:
    - xrotwang
    - connor-french
