context:
  version: 0.1.1
  python_min: "3.8"
  build_number: "0"

package:
  name: datadesclib
  version: ${{ version }}

source:
- url: https://pypi.org/packages/source/d/datadesclib/datadesclib-${{ version }}.tar.gz
  sha256: 35e32671655ae521d4e8d7aaa25a0abef451b5ad5cf4d6ca2d91d1b1b71588ce

build:
  number: ${{ build_number }}
  script: ${{ PYTHON }} -m pip install .  --no-deps --no-build-isolation
  noarch: python

requirements:
  host:
  - python ${{ python_min }}.*
  - setuptools>=61.0
  - pip
  run:
  - python >=${{ python_min }}

tests:
- python:
    imports:
    - datadesclib
    pip_check: true

about:
  homepage: https://github.com/FZJ-IEK3-VSA/DataDesc
  summary: A lightweight library to attach and extract metadata from Python classes and functions.
  license: CC0 1.0 Universal (Public Domain)
  license_file: LICENSE

extra:
  recipe-maintainers:
    - julian-belina