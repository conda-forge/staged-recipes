schema_version: 1

context:
  name: gravitools
  version: 0.2.0
  python_min: 3.8

package:
  name: ${{ name }}
  version: ${{ version }}

recipe:
  name: ${{ name }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/g/gravitools/gravitools-${{ version }}.tar.gz
  sha256: 5a502256bd4fbc1f7274f28760fc3688a60680856f9bcc341916835285db0233

build:
  number: 0

outputs:
  - name: ${{ name }}
    build:
      entry_points:
        - gt-aqg-proc = gravitools.aqg.cli:main
      noarch: python
      script: ${{ PYTHON }} -m pip install . -vv
    requirements:
      host:
        - python ${{ python_min }}
        - setuptools
        - pip
      run:
        - python >=${{ python_min }}
        - allantools
        - fpdf2
        - matplotlib-base
        - netcdf4
        - numpy
        - packaging
        - pandas
        - pyyaml
        - requests
        - xarray
    tests:
      - python:
          imports:
            - gravitools
          # issue opened at 'allantools'-feedstock: https://github.com/conda-forge/allantools-feedstock/issues/7 
          pip_check: false
          python_version: ${{ python_min }}.*
  - package:
      name: ${{ name }}-dashboard
    build:
      entry_points:
        - gt-aqg-proc = gravitools.aqg.cli:main
        - gt-aqg-dash = "gravitools.aqg.dashboard:main"
      noarch: python
      script: ${{ PYTHON }} -m pip install . -vv
    requirements:
      host:
        - python ${{ python_min }}
        - setuptools
        - pip
      run:
        - python >=${{ python_min }}
        - allantools
        - fpdf2
        - matplotlib-base
        - netcdf4
        - numpy
        - packaging
        - pandas
        - pyyaml
        - requests
        - xarray
        - pyqtgraph
        - PySide6
    tests:
      - python:
          imports:
            - gravitools
          # issue opened at 'allantools'-feedstock: https://github.com/conda-forge/allantools-feedstock/issues/7 
          pip_check: false
          python_version: ${{ python_min }}.*

about:
  home: https://pypi.org/project/gravitools/
  summary: A collection of tools for gravimeter data analysis
  doc_url: https://gravitools.readthedocs.io/
  license: EUPL-1.2
  license_file: LICENSE.txt

extra:
  recipe-maintainers:
    - marcianito
  feedstock-name:
    - gravitools
