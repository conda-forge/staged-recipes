context:
  version: "20260107.1"

package:
  name: libabseil-bazel-systemlib
  version: ${{ version }}

source:
  url: https://github.com/abseil/abseil-cpp/archive/refs/tags/${{ version }}.tar.gz
  sha256: 4314e2a7cbac89cac25a2f2322870f343d81579756ceff7f431803c2c9090195

build:
  number: 0
  noarch: generic

requirements:
  build:
    - sed
  run_constraints:
    - libabseil ${{ version }}.*

tests:
  - package_contents:
      files:
        - share/bazel/systemlibs/absl/BUILD
  - script: tests/run_test.sh
    files:
      recipe:
        - tests/
    requirements:
      build:
        - ${{ compiler('cxx') }}
        - bazel >=8
        - bazel-toolchain >=0.5.7
      run:
        - libabseil ${{ version }}.*

about:
  homepage: https://github.com/abseil/abseil-cpp
  repository: https://github.com/conda-forge/libabseil-bazel-systemlib-feedstock
  license: Apache-2.0
  license_file: LICENSE
  summary: Bazel systemlib definitions for abseil
  description: |
    You can use the systemlib definitions by assembling them together with
    the following lines in your build script:

    ```bash
    mkdir -p ./third_party/systemlibs
    cp -ap "${PREFIX}/share/bazel/systemlibs/absl" third_party/systemlibs/
    export ABSEIL_VERSION="$(conda list -p "${PREFIX}" libabseil --fields version | awk '!/^#/ && NF { print $1; exit }')"
    sed -i "s:ABSEIL_VERSION:${ABSEIL_VERSION}:" MODULE.bazel
    ```

    You will also need an override in the top-level `MODULE.bazel`:

    ```python
    local_path_override(
        module_name = "abseil-cpp",
        path = "./third_party/systemlibs/absl",
    )
    ```


extra:
  recipe-maintainers:
    - conda-forge/bazel
