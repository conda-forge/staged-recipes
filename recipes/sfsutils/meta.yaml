{% set name = "sfsutils" %}
{% set pypi_name = "sfsutils-popgen" %}
{% set version = "1.0.0" %}
{% set python_min = "3.11" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  # The PyPI distribution is 'sfsutils-popgen' (the bare 'sfsutils' name on PyPI belongs to an unrelated
  # project); the import name and this conda package are 'sfsutils'.
  url: https://pypi.org/packages/source/{{ pypi_name[0] }}/{{ pypi_name }}/{{ pypi_name|replace('-', '_') }}-{{ version }}.tar.gz
  sha256: 0b4e18b7f1d77ea0cf21739f22f17f322d1dd309d0fe969db1fa4e8b75200c8f

build:
  noarch: python
  number: 0
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  entry_points:
    - sfsutils = sfsutils.cli:main

requirements:
  host:
    - python {{ python_min }}
    - pip
    - poetry-core
  run:
    - python >={{ python_min }},<3.14
    - matplotlib-base >=3.9,<4
    - seaborn >=0.13.2,<1
    - numpy >=1.24,<3
    - pandas >=2.2.2,<3
    - jsonpickle >=3,<4
    - multiprocess >=0.70.12,<0.71
    - tqdm >=4.60,<5
    - biopython >=1.84,<2
    - requests >=2.28
    - scipy >=1.13,<2

test:
  imports:
    - sfsutils
  commands:
    - pip check
    - sfsutils --help
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://github.com/Sendrowski/SFSUtils
  license: GPL-3.0-or-later
  license_file: LICENSE
  summary: SFS parsing with site filtration and annotation, from VCF, Zarr, or tree sequences
  description: |
    sfsutils parses site-frequency spectra (SFS) from VCF, VCF-Zarr, or tskit tree-sequence
    input, with versatile stratification, ancestral-allele and site-degeneracy annotation, and
    filtering. It also derives the joint SFS across several populations and the two-site SFS of
    linked pairs of sites. The import name is `sfsutils`; on PyPI the distribution is
    `sfsutils-popgen`.
  doc_url: https://sfsutils.readthedocs.io/
  dev_url: https://github.com/Sendrowski/SFSUtils

extra:
  recipe-maintainers:
    - Sendrowski
