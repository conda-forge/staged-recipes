# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "0.2.4"
  # see https://github.com/conda-forge/spacy-feedstock/pull/170
  python_check_max: "3.13"
  cov_fail_under: "34"

package:
  name: morphseg
  version: ${{ version }}

source:
  - url: https://pypi.org/packages/source/m/morphseg/morphseg-${{ version }}.tar.gz
    sha256: 45a3319997d08f14887d6734a8c00fe8ca278a3714e3b32a96c197cce07c9a51
    target_directory: dist
  # upstream doesn't have tags
  - url: https://raw.githubusercontent.com/TheWelcomer/MorphSeg/refs/heads/master/LICENSE.TXT
    sha256: 606ff9c1102dd8e3c1f5b18eecf4b1fd505c11f775d70bb4aee916413d0b278b

build:
  number: 0
  noarch: python
  script:
    - cd dist
    # work around `tests` getting deployed to `site-packages`
    - ${{ "mv" if unix else "move" }} tests ..
    - ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation --disable-pip-version-check

requirements:
  host:
    - pip
    - python ${{ python_min }}.*
    - setuptools >=61.0
    - wheel >=0.36.0
  run:
    - editdistance >=0.6.0
    - entmax >=1.3
    - huggingface_hub >=0.20.0
    - numpy >=1.20.0
    - pandas >=2.0.0
    - pytest >=7.0.0
    - python >=${{ python_min }}
    - pytorch >=2.0.0
    - regex >=2022.1.18
    - rich >=1.0.0
    - safetensors >=0.3.0
    - spacy >=3.0.0
    - tqdm >=4.1.0
    - unicodedata2 >=15.0.0

tests:
  - python:
      imports: morphseg
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - ${{ python_check_max }}.*
  - requirements:
      run:
        - coverage
        - python ${{ python_min }}.*
    files:
      source:
        - tests/
    script:
      - coverage run --source=morphseg --branch -m pytest -vv --tb=long --color=yes
      - coverage report --show-missing --skip-covered --fail-under=${{ cov_fail_under }}

about:
  summary: A multilingual package for segmenting text into morphemes using supervised deep learning.
  license: MIT
  license_file: LICENSE.TXT
  homepage: https://pypi.org/project/morphseg
  repository: https://github.com/TheWelcomer/MorphSeg

extra:
  recipe-maintainers:
    - bollwyvl
