{% set name = "wannier90" %}
{% set version = "3.1.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://github.com/wannier-developers/wannier90/archive/refs/tags/v{{ version }}.tar.gz
  sha256: 40651a9832eb93dec20a8360dd535262c261c34e13c41b6755fa6915c936b254

build:
  number: 0

requirements:
  build:
    - {{ compiler('fortran') }}
    - make
  host:
    - libblas
    - liblapack
  run:
    - libblas
    - liblapack

test:
  commands:
    - test -x "$PREFIX/bin/wannier90.x"  # [unix]
    - test -x "$PREFIX/bin/postw90.x"  # [unix]
    - wannier90.x --help || true
    - postw90.x --help || true

about:
  home: https://wannier.org/
  summary: "Wannier90: Maximally-localized Wannier functions"
  description: |
    Wannier90 is an open-source code for generating maximally-localized Wannier functions and using them to compute advanced electronic properties of materials with high efficiency and accuracy.
  license: LGPL-2.1-only
  license_family: LGPL
  license_file: LICENSE
  dev_url: https://github.com/wannier-developers/wannier90
  doc_url: https://wannier90.readthedocs.io/

extra:
  recipe-maintainers:
    - edan-bainglass
