{% set name = "wannier90" %}
{% set version = "3.1.0.post202606" %}
{% set commit = "d3772db24d216f44e089125726164e6880251da1" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://github.com/wannier-developers/wannier90/archive/{{ commit }}.tar.gz
  sha256: 79525d32736f1ad5d80a0f3c10bb941b7f723bc965d2fb99002d3bf5fce6d60a

build:
  number: 0

requirements:
  build:
    - {{ compiler('fortran') }}
    - make
  host:
    - openmpi >=4.1.6,<5
    - libblas
    - liblapack
  run:
    - openmpi >=4.1.6,<5
    - libblas
    - liblapack

test:
  commands:
    - test -x "$PREFIX/bin/wannier90.x"  # [unix]
    - test -x "$PREFIX/bin/postw90.x"  # [unix]
    - wannier90.x --help || true
    - postw90.x --help || true

about:
  home: https://wannier.org/
  summary: "Wannier90: Maximally-localized Wannier functions"
  description: |
    Wannier90 is an open-source code for generating maximally-localized
    Wannier functions and using them to compute advanced electronic
    properties of materials with high efficiency and accuracy.
  license: LGPL-2.1-only
  license_family: LGPL
  license_file: LICENSE
  dev_url: https://github.com/wannier-developers/wannier90
  doc_url: https://wannier90.readthedocs.io/

extra:
  recipe-maintainers:
    - edan-bainglass
