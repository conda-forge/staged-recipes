{% set version = "2.1.0" %}

package:
  name: udkm1dsim
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/u/udkm1Dsim/udkm1dsim-{{ version }}.tar.gz
  sha256: 693c2c4927799df09a605500d3009798ea4776746148f5fe3ee2361cc9366ee5

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python >=3.9
    - pip
  run:
    - python >=3.9
    - tqdm >=4.43.0
    - numpy >=1.18.2,<2.0.0
    - pint >=0.23
    - scipy >=1.4.1
    - sympy >=1.5.1
    - tabulate
    - matplotlib-base >=2.0.0

test:
  imports:
    - udkm1Dsim
  commands:
    - pip check
  requires:
    - pip
    - python

about:
  home: https://github.com/dschick/udkm1Dsim
  summary: A Python Simulation Toolkit for 1D Ultrafast Dynamics in Condensed Matter
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - dschick
