{% set version = "2.2.0" %}

package:
  name: udkm1dsim
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/u/udkm1Dsim/udkm1dsim-{{ version }}.tar.gz
  sha256: b7639ce88c7c08e1f1647bd4f27301127d3fb0e525d73e801e01c9d9864a2930

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - pip
    - setuptools
  run:
    - python >={{ python_min }}
    - tqdm >=4.43.0
    - numpy
    - pint >=0.23
    - scipy >=1.4.1
    - sympy >=1.5.1
    - tabulate
    - matplotlib-base >=2.0.0

test:
  imports:
    - udkm1Dsim
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://github.com/dschick/udkm1Dsim
  summary: A Python Simulation Toolkit for 1D Ultrafast Dynamics in Condensed Matter
  license: MIT
  license_file: LICENSE
  doc_url: https://udkm1dsim.readthedocs.io
  dev_url: https://github.com/dschick/udkm1Dsim

extra:
  recipe-maintainers:
    - dschick
