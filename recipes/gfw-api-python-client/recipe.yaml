schema_version: 1

context:
  python_min: "3.11"
  version: "1.4.0"

package:
  name: gfw-api-python-client
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/g/gfw-api-python-client/gfw_api_python_client-${{ version }}.tar.gz
  sha256: 38fd67fe4751972acf18e048942cb3cc00971f7ee72e4d5e1d14b3fd5fbae96c

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - setuptools >=80.10.2
    - pip
  run:
    - python >=${{ python_min }}
    - httpx >=0.28,<0.29
    - typing-extensions >=4.15,<4.16
    - pydantic >=2.12,<2.13
    - pydantic-settings >=2.11,<2.12
    - geojson-pydantic >=2.1,<2.2
    - mapbox-vector-tile >=2.2,<2.3
    - mercantile >=1.2,<1.3
    - pandas >=2.3,<2.4
    - geopandas >=1.1,<1.2

tests:
  - python:
      imports:
        - gfwapiclient
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  documentation: https://globalfishingwatch.github.io/gfw-api-python-client/
  homepage: https://github.com/GlobalFishingWatch/gfw-api-python-client
  license: Apache-2.0
  license_file: LICENSE
  repository: https://github.com/GlobalFishingWatch/gfw-api-python-client
  summary: Python package for accessing data from Global Fishing Watch APIs.

extra:
  recipe-maintainers:
    - lykmapipo
