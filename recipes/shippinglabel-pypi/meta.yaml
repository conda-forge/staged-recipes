{% set name = "shippinglabel-pypi" %}
{% set version = "0.2.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/shippinglabel_pypi-{{ version }}.tar.gz
  sha256: f27064a4a04d1cec9400fbbdc54d21881ea86aa5d70b8502f15c6a6342a050a7

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - whey
    - pip
    - python {{ python_min }}
  run:
    - apeye >=1.2.0
    - dist-meta >=0.5.0
    - domdf-python-tools >=3.3.0
    - packaging >=21.3
    - pypi-json >=0.5.0
    - python >={{ python_min }}
    - requests >=2.27.1
    - shippinglabel >=1.3.1

test:
  imports:
    - shippinglabel_pypi
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://github.com/domdfcoding/shippinglabel-pypi
  summary: Shippinglabel extension for interacting with PyPI.
  license: MIT
  license_file: LICENSE
  doc_url: https://shippinglabel.readthedocs.io/en/latest/extensions/shippinglabel-pypi.html

extra:
  recipe-maintainers:
    - domdfcoding
