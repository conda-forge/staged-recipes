{% set name = "filament" %}
{% set version = "1.71.3" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://github.com/google/filament/archive/refs/tags/v{{ version }}.tar.gz
  sha256: 5fa14aaa3d1284da1ad79c0548a9fbe249c99b2c081001b14ffa6af754cc6188
  patches:
    - patches/0001-guard-newer-metal-command-buffer-errors.patch
    - patches/0002-drop-strict-vtable-pointers-with-gcc.patch
    - patches/0003-use-system-libpng-zlib.patch

build:
  number: 0
  skip: true  # [win]
  ignore_run_exports_from:
    - libegl-devel  # [linux]
    - libgl-devel  # [linux]
    - libgles-devel  # [linux]

requirements:
  build:
    - {{ compiler('c') }}
    - {{ compiler('cxx') }}
    - {{ stdlib('c') }}
    - cmake
    - ninja
    - python
  host:
    - assimp
    - libegl-devel  # [linux]
    - libgl-devel  # [linux]
    - libgles-devel  # [linux]
    - libpng
    - zlib
    - zstd

test:
  files:
    - bakedColor.mat
  commands:
    - matc --help
    - matinfo --help
    - cmgen --help
    - filamesh --help
    - matc -o bakedColor.filamat bakedColor.mat

outputs:
  - name: filament
    files:
      - bin/cmgen
      - bin/diffimg
      - bin/filamesh
      - bin/glslminifier
      - bin/matc
      - bin/matinfo
      - bin/matedit
      - bin/mipgen
      - bin/normal-blending
      - bin/resgen
      - bin/roughness-prefilter
      - bin/specgen
      - bin/specular-color
      - bin/uberz
      - docs
      - LICENSE
      - README.md

  - name: filament-static
    files:
      - include
      - lib/libbackend.a
      - lib/libbluegl.a
      - lib/libbluevk.a
      - lib/libfilabridge.a
      - lib/libfilaflat.a
      - lib/libfilament.a
      - lib/libgeometry.a
      - lib/libshaders.a
      - lib/libsmol-v.a
      - lib/libutils.a
      - lib/cmake/Filament
    requirements:
      run:
        - {{ pin_subpackage('filament', exact=True) }}
        - libegl-devel  # [linux]
        - libgl-devel  # [linux]
        - libopengl-devel  # [linux]
        - zstd
    test:
      requires:
        - {{ compiler('cxx') }}
        - {{ stdlib('c') }}
        - cmake
        - libegl-devel  # [linux]
        - libgl-devel  # [linux]
        - libopengl-devel  # [linux]
        - ninja
      files:
        - test-cmake
      commands:
        - test -f "${PREFIX}/include/filament/Engine.h"  # [unix]
        - test -f "${PREFIX}/include/backend/DriverEnums.h"  # [unix]
        - test -f "${PREFIX}/lib/libfilament.a"  # [unix]
        - test -f "${PREFIX}/lib/cmake/Filament/FilamentConfig.cmake"  # [unix]
        - cmake -S test-cmake -B test-cmake-build -G Ninja -DCMAKE_BUILD_TYPE=Release  # [unix]
        - cmake --build test-cmake-build --verbose  # [unix]
        - ./test-cmake-build/hello_world  # [unix]

about:
  home: https://github.com/google/filament
  summary: Real-time physically based rendering engine
  description: |
    Filament is a real-time physically based rendering engine for Android,
    iOS, Windows, Linux, macOS, and WebGL2. This package provides host-side
    command line tools, and the filament-static output provides a constrained
    C++ development surface for downstream consumers such as DART and Open3D.
  license: Apache-2.0 AND BSD-2-Clause AND BSD-3-Clause AND MIT AND Zlib
  license_file:
    - LICENSE
    - third_party/abseil/LICENSE
    - third_party/basisu/LICENSE
    - third_party/benchmark/LICENSE
    - third_party/cgltf/LICENSE
    - third_party/civetweb/LICENSE.md
    - third_party/clang/LICENSE.TXT
    - third_party/dawn/LICENSE
    - third_party/draco/LICENSE
    - third_party/getopt/LICENSE
    - third_party/gl-matrix/LICENSE.md
    - third_party/glslang/LICENSE
    - third_party/glslang/LICENSE.txt
    - third_party/gltumble/LICENSE
    - third_party/imgui/LICENSE.txt
    - third_party/jsmn/LICENSE
    - third_party/libgtest/LICENSE
    - third_party/libwebp/COPYING
    - third_party/markdeep/LICENSE
    - third_party/meshoptimizer/LICENSE
    - third_party/robin-map/LICENSE
    - third_party/smol-v/LICENSE
    - third_party/spirv-cross/LICENSE
    - third_party/spirv-cross/LICENSES/LicenseRef-KhronosFreeUse.txt
    - third_party/spirv-headers/LICENSE
    - third_party/spirv-tools/LICENSE
    - third_party/stb/LICENSE
    - third_party/tinyexr/LICENSE
    - third_party/vkmemalloc/LICENSE.txt
  dev_url: https://github.com/google/filament

extra:
  recipe-maintainers:
    - jeongseok-meta
