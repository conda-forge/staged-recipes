schema_version: 1

context:
  version: "0.1.0"
  python_min: "3.10"

package:
  name: rucio-mcp
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/r/rucio_mcp/rucio_mcp-${{ version }}.tar.gz
  sha256: 08652b1044eb43b349b5002ed43ab8355431f981f36939a10e82214de5a4a954

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  python:
    entry_points:
      - rucio-mcp=rucio_mcp.cli:main

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - hatchling >=0.7
  run:
    - python >=${{ python_min }}
    - rucio-clients >=35.0.0
    - mcp >=1.0
    - ca-policy-lcg  # for cert
    - voms # for voms-client
    - voms-lsc # for voms-certs
    - __unix  # see https://github.com/rucio/rucio/issues/8461?reload=1

tests:
  - python:
      imports:
        - rucio_mcp
      pip_check: true
      python_version: ${{ python_min }}.*
  - script:
      - rucio-mcp --help

about:
  summary: An MCP server that exposes Rucio distributed data management operations as tools for LLMs.
  homepage: https://rucio-mcp.readthedocs.io/en/latest/
  repository: https://github.com/kratsg/rucio-mcp
  documentation: https://rucio-mcp.readthedocs.io/en/latest/
  license: Apache-2.0
  license_file: LICENSE

extra:
  recipe-maintainers:
    - kratsg
