schema_version: 1

context:
  python_min: "3.9"
  version: "2.0.0"

package:
  name: pyqtspinner
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/p/pyqtspinner/pyqtspinner-${{ version }}.tar.gz
  sha256: 273d42cf95b11203375c06ee9e6c9e853c0017bb1ada844f494e21e97ca305e4

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  python:
    entry_points:
      - pyqtspinner-conf = pyqtspinner.configurator:main

requirements:
  host:
    - python ${{ python_min }}.*
    - poetry-core
    - pip
  run:
    - python >=${{ python_min }}
    - pyqt >5.8

tests:
  - python:
      imports:
        - pyqtspinner
      pip_check: true
      python_version: ${{ python_min }}.*
  - requirements:
      run:
        - pip
        - python ${{ python_min }}.*
    script:
      - pyqtspinner-conf --help

about:
  summary: Waiting spinner for PyQt5
  license: MIT
  license_file: LICENSE.md
  homepage: https://github.com/fbjorn/QtWaitingSpinner

extra:
  recipe-maintainers:
    - AyrisA
