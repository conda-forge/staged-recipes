context:
  version: 2602.0.1

recipe:
  name: py-oidc-auth-split
  version: ${{ version }}

source:
  - url: https://pypi.org/packages/source/p/py-oidc-auth/py_oidc_auth-${{ version }}.tar.gz
    sha256: 6c0cc24011b7679d22b9171b2cd45d278ecd01c579c1f95ae1a680a51f7b8bec

build:
  number: 0

outputs:
  - package:
      name: py-oidc-auth
    build:
      script: ${{ PYTHON }} -m pip install . --no-deps -vv
      noarch: python
    requirements:
      host:
        - python ${{ python_min }}.*
        - flit-core
        - pip
      run:
        - python >=${{ python_min }}
        - httpx
        - pydantic
        - cryptography
        - pyjwt
        - typing-extensions
    tests:
      - python:
          imports:
            - py_oidc_auth
          pip_check: true
          python_version: ${{ python_min }}.*

  - package:
      name: py-oidc-auth-fastapi
    build:
      noarch: generic
    requirements:
      run:
        - ${{ pin_subpackage('py-oidc-auth', exact=True) }}
        - fastapi
        - python-multipart
        - uvicorn
    tests:
      - python:
          imports:
            - py_oidc_auth

  - package:
      name: py-oidc-auth-flask
    build:
      noarch: generic
    requirements:
      run:
        - ${{ pin_subpackage('py-oidc-auth', exact=True) }}
        - flask
    tests:
      - python:
          imports:
            - py_oidc_auth

  - package:
      name: py-oidc-auth-quart
    build:
      noarch: generic
    requirements:
      run:
        - ${{ pin_subpackage('py-oidc-auth', exact=True) }}
        - quart
    tests:
      - python:
          imports:
            - py_oidc_auth

  - package:
      name: py-oidc-auth-tornado
    build:
      noarch: generic
    requirements:
      run:
        - ${{ pin_subpackage('py-oidc-auth', exact=True) }}
        - tornado
    tests:
      - python:
          imports:
            - py_oidc_auth

  - package:
      name: py-oidc-auth-litestar
    build:
      noarch: generic
    requirements:
      run:
        - ${{ pin_subpackage('py-oidc-auth', exact=True) }}
        - litestar
    tests:
      - python:
          imports:
            - py_oidc_auth

  - package:
      name: py-oidc-auth-django
    build:
      noarch: generic
    requirements:
      run:
        - ${{ pin_subpackage('py-oidc-auth', exact=True) }}
        - django >=4.0
    tests:
      - python:
          imports:
            - py_oidc_auth

about:
  summary: Pluggable OIDC/OAuth 2.1 authentication routes and token validation.
  description: A small, typed OpenID Connect helper for authentication and authorization.
  homepage: https://github.com/freva-org/py-oidc-auth
  license: BSD-3-Clause
  license_file:
    - LICENSE

extra:
  feedstock-name: py-oidc-auth
  recipe-maintainers:
    - antarcticrainforest
