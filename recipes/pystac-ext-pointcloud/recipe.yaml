schema_version: 1

context:
  version: "1.0.0"

package:
  name: pystac-ext-pointcloud
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/p/pystac-ext-pointcloud/pystac_ext_pointcloud-${{ version }}.tar.gz
  sha256: 92a4bc88fe6eb15ad27c75358b1dbf5bf40ded26df4cd6b8bfc16a4c9a838764

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - hatchling
    - pip
  run:
    - python >=${{ python_min }}
    - pystac-core

tests:
  - python:
      imports:
        - pystac_ext_pointcloud
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  summary: Point Cloud extension for PySTAC
  license: Apache-2.0
  license_file: LICENSE
  homepage: https://pypi.org/project/pystac-ext-pointcloud/
  documentation: https://pystac.readthedocs.io

extra:
  recipe-maintainers:
    - ocefpaf
