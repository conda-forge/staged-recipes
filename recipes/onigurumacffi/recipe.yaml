schema_version: 1

context:
  version: "1.5.0"

package:
  name: onigurumacffi
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/o/onigurumacffi/onigurumacffi-${{ version }}.tar.gz
  sha256: d4fa9bee44a6d38a98b2237c67d9acdf27ed0c32d6c218125fe46681a5edea4d

build:
  number: 0
  skip:
    - win
    - match(python, "<3.11")
  script:
    - ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation --disable-pip-version-check

requirements:
  build:
    - ${{ compiler("c") }}
    - ${{ stdlib("c") }}
    - if: build_platform != target_platform
      then:
        - python
        - cross-python_${{ target_platform }}
        - cffi >=1
  host:
    - python
    - pip
    - setuptools >=42
    - wheel
    - cffi >=1
    - oniguruma
  run:
    - python
    - cffi >=1
    - oniguruma

tests:
  - python:
      imports:
        - onigurumacffi
      pip_check: true

about:
  summary: |
    Python cffi bindings for the oniguruma regex engine.
  homepage: https://github.com/davwheat/python-onigurumacffi
  repository: https://github.com/davwheat/python-onigurumacffi
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - killua156
    - mgorny
