{% set version = "0.7.0" %}

package:
  name: tomosipo
  version: {{ version }}

source:
  url: https://github.com/cicwi/tomosipo/archive/v{{ version }}.tar.gz
  sha256: e2a1fb97ad00ccf6cca1d20da76a468db22015de8e66fd71290755cfd36b80bb

build:
  script: {{ PYTHON }} -m pip install . --no-deps --no-build-isolation --no-index -vv
  number: 0
  skip: true  # [cuda_compiler_version in (undefined, "None")]

requirements:
  host:
    - python {{ python_min }}
    - pip
    - setuptools
  run:
    - python >={{ python_min }}
    - astra-toolbox >=2.0
    - numpy >=1.21
    - __cuda

test:
  requires:
    - python {{ python_min }}
    - pytest
    - pytorch
    # Without sphinx, test discovery breaks at the moment
    - sphinx
  source_files:
    - tests/
  commands:
    - pytest -k "not slow" --disable-warnings --report-chars=a

about:
  home: https://github.com/cicwi/tomosipo
  summary: 'A library for painless tomographic reconstruction based on ASTRA Toolbox.'
  license: GPL-3.0-only
  license_file: LICENSE

extra:
  recipe-maintainers:
    - askorikov
