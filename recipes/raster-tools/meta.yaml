{% set name = "raster-tools" %}
{% set version = "0.10.2" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.io/packages/source/{{ name[0] }}/{{ name }}/raster_tools-{{ version }}.tar.gz
  sha256: e3b0c44298fc1c149afbf4c8996fb92427ae41e4649b934ca495991b7852b855

build:
  noarch: python
  number: 0
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python >=3.10
    - pip
    - setuptools >=77
  run:
    - python >=3.10
    - affine
    - dask
    - dask-geopandas
    - dask-image
    - fiona
    - geopandas
    - numba
    - numpy >=1.22
    - odc-geo
    - pandas
    - pyogrio
    - pyproj
    - rioxarray
    - rasterio
    - scipy
    - shapely >=2.0
    - xarray
    # Optional: install `netcdf4` and `cfgrib` alongside raster-tools to
    # enable `open_dataset` for .nc and .grib files.

test:
  imports:
    - raster_tools
  commands:
    - pip check
  requires:
    - pip

about:
  home: https://github.com/UM-RMRS/raster_tools
  license: GPL-3.0-only
  license_family: GPL3
  license_file: LICENSE
  summary: Tools for processing geospatial data
  dev_url: https://github.com/UM-RMRS/raster_tools

extra:
  recipe-maintainers:
    - fbunt
