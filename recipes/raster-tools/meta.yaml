{% set name = "raster-tools" %}
{% set version = "0.10.2" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/raster_tools-{{ version }}.tar.gz
  sha256: b7d5857c5ba284d13e3cbd2b27da1069fc759fd5af3463b506a0037a4296ac05

build:
  noarch: python
  number: 0
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python {{ python_min }}
    - pip
    - setuptools >=77
  run:
    - python >={{ python_min }}
    - affine
    - dask
    - dask-geopandas
    - dask-image
    - fiona
    - geopandas
    - numba
    - numpy >=1.22
    - odc-geo
    - pandas
    - pyogrio
    - pyproj
    - rioxarray
    - rasterio
    - scipy
    - shapely >=2.0
    - xarray
    # Optional: install `netcdf4` and `cfgrib` alongside raster-tools to
    # enable `open_dataset` for .nc and .grib files.

test:
  imports:
    - raster_tools
  commands:
    - pip check
  requires:
    - python {{ python_min }}
    - pip

about:
  home: https://github.com/UM-RMRS/raster_tools
  license: GPL-3.0-only
  license_family: GPL3
  license_file: LICENSE
  summary: Tools for processing geospatial data
  dev_url: https://github.com/UM-RMRS/raster_tools

extra:
  recipe-maintainers:
    - fbunt
