schema_version: 1

context:
  version: "1.0.0b260514"
  python_min: "3.10"

package:
  name: agent-framework-purview
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/a/agent-framework-purview/agent_framework_purview-${{ version }}.tar.gz
  sha256: 9b521bc9bcff6b2e0a8a3bced14dded455e61573d16265a24b2c5c256440a26a

build:
  noarch: python
  number: 0
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - flit-core <4.0,>=3.9
  run:
    - python >=${{ python_min }}
    - agent-framework-core <2,>=1.4.0
    - azure-core <2,>=1.30.0
    - httpx <0.29,>=0.27.0

tests:
  - python:
      imports:
        - agent_framework_purview
      python_version: ${{ python_min }}.*
      pip_check: true

about:
  summary: |
    Microsoft Purview (Graph dataSecurityAndGovernance) integration for Microsoft Agent Framework.
  homepage: https://pypi.org/project/agent-framework-purview/
  repository: https://github.com/microsoft/agent-framework
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - killua156
    - mgorny
