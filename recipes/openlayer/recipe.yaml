# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "0.29.1"

package:
  name: openlayer
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/o/openlayer/openlayer-${{ version }}.tar.gz
  sha256: bf2f07b2ba684016ad1afbba1be056877a0a0134344cbd00f696dc61ef910d8c

build:
  noarch: python
  number: 0
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - hatchling >=1.26.3
    - hatch-fancy-pypi-readme
    - pip
  run:
    - python >=${{ python_min }}
    - httpx >=0.23.0,<1
    - pydantic >=1.9.0,<3
    - typing_extensions >=4.14,<5
    - anyio >=3.5.0,<5
    - distro >=1.7.0,<2
    - sniffio
    - pandas
    - pyarrow >=18.0.0
    - pyyaml >=6.0
    - requests-toolbelt >=1.0.0
    - tqdm
    - wrapt >=1.14.0

tests:
  - python:
      imports:
        - openlayer
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  homepage: https://pypi.org/project/openlayer/
  license: Apache-2.0
  license_file: LICENSE
  summary: The official Python library for the openlayer API
  repository: https://github.com/openlayer-ai/openlayer-python
  documentation: https://github.com/openlayer-ai/openlayer-python#readme
  description: |
    The official Python library for the Openlayer API — an AI evaluation
    and observability platform. The SDK provides convenient access to the
    Openlayer REST API from Python, including synchronous and asynchronous
    clients, model and dataset uploads, and inference-pipeline monitoring.

extra:
  recipe-maintainers:
    - rxm7706
