{% set name = "pyccapt" %}
{% set version = "0.2.1" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/pyccapt-{{ version }}.tar.gz
  sha256: c2fad0f7ddda5061930bff54fccaae9b299b483ef798ad70055b47d6ee87d332

build:
  entry_points:
    - pyccapt=pyccapt.control.__main__:main
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - setuptools >=69
    - wheel
    - pip
  run:
    - python >={{ python_min }}
    - deepdiff
    - h5py
    - matplotlib-base
    - numba
    - numpy
    - pandas
    - requests
    - scipy
    - pytables
    - python-wget

test:
  imports:
    - pyccapt
  commands:
    - pip check
    - pyccapt --help
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://github.com/mmonajem/pyccapt
  summary: A Python package for atom probe control and data calibration.
  license: GPL-3.0-only
  license_file: LICENSE

extra:
  recipe-maintainers:
    - jan-janssen
