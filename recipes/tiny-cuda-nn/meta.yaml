{% set name = "tiny-cuda-nn" %}
{% set version = "1.6" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  - url: https://github.com/NVlabs/tiny-cuda-nn/archive/v{{ version }}.tar.gz
    sha256: 490c944b58af1b376bfaaa3695f86d16eef81c3f903b67acdbd4d08612b099c5

build:
  number: 0
  skip: true  # [osx]
  skip: true  # [win]

requirements:
  build:
    - {{ compiler("cxx") }}
    - {{ stdlib("c") }}
    - cmake
    - pybind11
    - pytorch
  host:
    - pip
    - python
    - pytorch
    - setuptools
    - setuptools_scm
  run:
    - python
    - pytorch

test:
  imports:
    - tinycudann
  commands:
    - pip check
  requires:
    - pip

about:
  home: https://github.com/NVlabs/tiny-cuda-nn
  summary: Lightning fast C++/CUDA neural network framework
  license: BSD-3-Clause
  license_file: LICENSE.txt

extra:
  recipe-maintainers:
    - jeongseok-meta
