{% set version = "0.2.1" %}
{% set python_min = "3.9" %}

package:
  name: molsym
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/m/molsym/molsym-{{ version }}.tar.gz
  sha256: 0be445d308dcaa800f78ce53a784ce0e058106f01cd9c2edb28a2aa0fca1f839

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python =={{ python_min }}
    - setuptools >=64
    - pip
  run:
    - python >={{ python_min }}
    - numpy >=1.23.4

test:
  imports:
    - molsym
  commands:
    - pip check
  requires:
    - pip
    - python =={{ python_min }}

about:
  home: https://github.com/NASymmetry/MolSym
  summary: A program for molecular symmetry detection and SALC construction
  doc_url: https://molsym.readthedocs.io
  license: MIT
  license_file: LICENSE.txt

extra:
  recipe-maintainers:
    - nlk36701
