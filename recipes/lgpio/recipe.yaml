schema_version: 1

context:
  version: "0.2.2.0"

package:
  name: lgpio
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/l/lgpio/lgpio-${{ version }}.tar.gz
  sha256: 11372e653b200f76a0b3ef8a23a0735c85ec678a9f8550b9893151ed0f863fff

build:
  number: 0
  # Linux SBC GPIO library; only meaningful on Linux.
  skip: not linux
  # PYPI=1 builds a statically linked module bundling liblgpio (no system liblgpio needed).
  script:
    env:
      PYPI: "1"
    content:
      - ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  build:
    - ${{ stdlib('c') }}
    - ${{ compiler('c') }}
    - swig
  host:
    - python
    - pip
    - setuptools
  run:
    - python

tests:
  - python:
      imports:
        - lgpio
      pip_check: true

about:
  summary: Linux SBC GPIO module
  description: |
    lgpio provides Python bindings for the lg library to control the GPIO
    of Linux single-board computers such as the Raspberry Pi through the
    /dev/gpiochip character devices. It supports reading and writing GPIO
    lines, alerts/callbacks on level changes, software PWM and waves, as
    well as I2C, SPI, and serial communication. This build statically
    links liblgpio, so no system lg installation is required.
  license: Unlicense
  license_file: LICENSE
  homepage: http://abyz.me.uk/lg/py_lgpio.html
  repository: https://github.com/joan2937/lg

extra:
  recipe-maintainers:
    - ruben-arts
