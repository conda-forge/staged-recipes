# lgpio uses the GPIO v2 character-device uapi from <linux/gpio.h>
# (GPIO_V2_LINE_SET_VALUES_IOCTL etc.), which was added in kernel 5.10. The
# default sysroot (glibc 2.17) ships 3.10 kernel headers, so a newer
# stdlib/sysroot is required; 2.34 is the oldest with kernel headers >=5.10 (5.14).
# Note: while in staged-recipes this applies to all linux builds in the PR
# (their artifacts are validation-only); in the feedstock it only affects lgpio.
c_stdlib_version:  # [linux]
  - "2.34"         # [linux]
