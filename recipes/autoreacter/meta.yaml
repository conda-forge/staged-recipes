{% set version = "0.2.3" %}
{% set python_min = "3.12" %}

package:
  name: autoreacter
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/A/AutoREACTER/autoreacter-{{ version }}.tar.gz
  sha256: 2a56186a8cc3bbba74ed738b4f4d597726de69c40b1ca24044120d4295c022dd

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - setuptools >=77.0.0
    - wheel
    - pip
  run:
    - python >={{ python_min }}
    - numpy
    - pandas
    - networkx
    - rdkit
    - pillow
    - setuptools
    - matplotlib-base
    - scipy

test:
  imports:
    - AutoREACTER
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://github.com/NanoCIPHER-Lab/AutoREACTER
  summary: Automated reaction modeling setup for LAMMPS REACTER simulations
  doc_url: https://autoreacter.org/
  license: MIT
  license_file: LICENSE.md

extra:
  recipe-maintainers:
    - janitha-mahanthe
