context:
  version: "0.2.3"
  python_min: "3.12"

package:
  name: autoreacter
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/A/AutoREACTER/autoreacter-${{ version }}.tar.gz
  sha256: 2a56186a8cc3bbba74ed738b4f4d597726de69c40b1ca24044120d4295c022dd

build:
  noarch: python
  number: 0
  script: python -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - setuptools >=77.0.0
    - wheel
  run:
    - python >=${{ python_min }}
    - numpy
    - pandas
    - networkx
    - rdkit
    - pillow
    - setuptools
    - matplotlib-base
    - scipy

tests:
  - python:
      imports:
        - AutoREACTER
      pip_check: true
      python_version: ${{ python_min }}
  - script:
      - python -c "import AutoREACTER as arx; print(arx.__version__)"
    requirements:
      run:
        - python ${{ python_min }}.*

about:
  homepage: https://github.com/NanoCIPHER-Lab/AutoREACTER
  summary: Automated reaction modeling setup for LAMMPS REACTER simulations
  documentation: https://autoreacter.org/
  license: MIT
  license_file: LICENSE.md

extra:
  recipe-maintainers:
    - janitha-mahanthe
