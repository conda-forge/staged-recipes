# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "1.6.0"

package:
  name: nested-multipart-parser
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/n/nested-multipart-parser/nested_multipart_parser-${{ version }}.tar.gz
  sha256: 8c7a07952a4a3c2cb2b99ca16158961af215c6f8c9e04337bc13da016500c69c

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - setuptools
  run:
    - python >=${{ python_min }}

tests:
  - python:
      imports:
        - nested_multipart_parser
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"


about:
  homepage: https://github.com/remigermain/nested-multipart-parser
  license: MIT
  license_file: LICENSE
  summary: A parser for nested data in multipart form
  description: |
    A parser for nested data in multipart form

extra:
  recipe-maintainers:
    - rxm7706
