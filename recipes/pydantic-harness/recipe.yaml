schema_version: 1

context:
  version: "0.1.0"

package:
  name: pydantic-harness
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/p/pydantic-harness/pydantic_harness-${{ version }}.tar.gz
  sha256: c15f5637566f4c02aa5a0cb25a5a36ca51b4b7a438805a4ec5a279287a9c9f69

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - hatchling
    - uv-dynamic-versioning >=0.7.0
    - pip
  run:
    - python >=${{ python_min }}
    - pydantic-ai-slim >=1.80.0

tests:
  - python:
      imports:
        - pydantic_harness
      pip_check: true
      python_version: ${{ python_min }}.*

about:
  summary: The batteries for your Pydantic AI agent
  license: MIT
  license_file: LICENSE
  homepage: https://github.com/pydantic/pydantic-harness
  repository: https://github.com/pydantic/pydantic-harness

extra:
  recipe-maintainers:
    - moritzwilksch
