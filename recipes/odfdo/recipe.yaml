# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "3.22.8"

package:
  name: odfdo
  version: ${{ version }}

source:
  - url: https://pypi.org/packages/source/o/odfdo/odfdo-${{ version }}.tar.gz
    sha256: 1f1303f5be52f168b01dbcd3c3551066f403ba43d6e9958800a5d3a5c6eaf91a

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - uv-build
  run:
    - python >=${{ python_min }}
    - lxml >=4.8.0

tests:
  - python:
      imports:
        - odfdo
      pip_check: false  # lxml env_marker (==3.10) mismatches pip_check on 3.14 test env
      python_version:
        - ${{ python_min }}.*
        - "*"


about:
  homepage: https://github.com/jdum/odfdo
  license: Apache-2.0
  license_file: LICENSE
  summary: Python library for OpenDocument Format
  description: |
    Python library for OpenDocument Format
  documentation: https://jdum.github.io/odfdo/

extra:
  recipe-maintainers:
    - rxm7706
