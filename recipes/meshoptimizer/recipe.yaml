context:
  version: "1.0.1"

package:
  name: meshoptimizer
  version: ${{ version }}

source:
  url: https://github.com/zeux/meshoptimizer/archive/refs/tags/v${{ version }}.tar.gz
  sha256: 9579624541e27e1cd01379c87e1295407e72c49e4b5b3e2f948393f3b68258ac

build:
  number: 0
  skip:
    - win
  script:
    - cmake -S . -B build -G Ninja ${CMAKE_ARGS}
        -DCMAKE_BUILD_TYPE=Release
        -DMESHOPT_BUILD_SHARED_LIBS=ON
        -DMESHOPT_STABLE_EXPORTS=ON
        -DMESHOPT_INSTALL=ON
        -DMESHOPT_BUILD_DEMO=ON
        -DMESHOPT_BUILD_GLTFPACK=OFF
    - cmake --build build --parallel ${{ CPU_COUNT }}
    - ctest --test-dir build --output-on-failure 
    - cmake --install build
    - mkdir -p $PREFIX/bin
    - install -m 755 build/meshoptdemo $PREFIX/bin/meshoptdemo

requirements:
  build:
    - ${{ compiler('cxx') }}
    - ${{ stdlib('c') }}
    - cmake
    - ninja

tests:
  - package_contents:
      include:
        - meshoptimizer.h
      lib:
        - meshoptimizer
      bin:
        - meshoptdemo
  - script:
      - meshoptdemo

about:
  homepage: https://meshoptimizer.org
  summary: Mesh optimization library that makes meshes smaller and faster to render
  description: |
    When a GPU renders triangle meshes, various stages of the GPU pipeline have to process vertex and index data.
    The efficiency of these stages depends on the data you feed to them;
    this library provides algorithms to help optimize meshes for these stages,
    as well as algorithms to reduce the mesh complexity and storage overhead.
  license: MIT
  license_file: LICENSE.md
  documentation: https://meshoptimizer.org
  repository: https://github.com/zeux/meshoptimizer

extra:
  recipe-maintainers:
    - multimeric
