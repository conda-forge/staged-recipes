# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
context:
  version: "20250404"

package:
  name: acpica-tools
  version: ${{ version }}

source:
  url: https://github.com/acpica/acpica/releases/download/R2025_04_04/acpica-unix2-${{ version }}.tar.gz
  sha256: 2abeef0b11d208aa9607d8acde07f3e5cee8cc7a43fc354701efa8075b2e5a9f

build:
  number: 0
  script: |
    make PREFIX=$PREFIX OPT_CFLAGS="-DACPI_PACKED_POINTERS_NOT_SUPPORTED"
    make install PREFIX=$PREFIX
  skip: not unix

requirements:
  build:
    - ${{ compiler('c') }}
    - ${{ stdlib("c") }}
    - make
    - bison
    - flex
    - m4

tests:
  - script: acpihelp -u

about:
  license: Intel-ACPI OR GPL-2.0-only
  license_file: LICENSE
  summary: OS-independent implementation of the ACPI specification
  description: |
    ACPICA (ACPI Component Architecture) project provides an OS-independent
    reference implementation of the Advanced Configuration and Power Interface
    Specification (ACPI).
  homepage: https://www.acpica.org/
  repository: https://github.com/acpica/acpica
  documentation: https://www.acpica.org/

extra:
  recipe-maintainers:
    - hameerabbasi
