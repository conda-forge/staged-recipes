{% set name = "pymef" %}
{% set version = "1.4.8" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz
  sha256: 242074b714a0762cd1cc6ec2447c662f7a46dbddbfe49f2af0abff93ff08bb96

build:
  number: 0
  skip: true  # [py<310]
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  build:
    - {{ compiler('c') }}
    - {{ stdlib('c') }}
  host:
    - python
    - pip
    - setuptools >=42
    - wheel
    - numpy >=2.0
  run:
    - python
    - numpy >=2.0

test:
  imports:
    - pymef
    - pymef.mef_file
  commands:
    - pip check
  requires:
    - pip

about:
  home: https://github.com/msel-source/pymef
  summary: Python wrapper for Multiscale Electrophysiology Format (MEF)
  description: |
    Pymef is a wrapper library for Multiscale Electrophysiology Format (MEF)
    version 3.0, developed by the Mayo Systems Electrophysiology Laboratory.
    MEF is a medical data file format designed for storing neurophysiological
    electrographic data, such as intracranial EEG.
  license: Apache-2.0
  license_file: LICENSE.txt
  doc_url: https://pymef.readthedocs.io/
  dev_url: https://github.com/msel-source/pymef

extra:
  recipe-maintainers:
    - bruAristimunha
