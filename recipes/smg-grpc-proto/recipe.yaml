schema_version: 1

context:
  version: "0.4.11"

package:
  name: smg-grpc-proto
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/s/smg-grpc-proto/smg_grpc_proto-${{ version }}.tar.gz
  sha256: b58e871a7b24182973d866e04d3f3ba64ff10a7dd68bbca7093026b5bf8e3e2b

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - setuptools >=68.0
    - grpcio-tools >=1.81.1
    - pip
  run:
    - python >=${{ python_min }}
    - grpcio >=1.81.1
    - protobuf >=5.26.0

tests:
  - python:
      python_version:
        - ${{ python_min }}.*
        - '*'
      imports:
        - smg_grpc_proto
      pip_check: true

about:
  summary: SMG gRPC proto definitions for vLLM, TRT-LLM, MLX, TokenSpeed, and SGLang
  license: Apache-2.0
  license_file: PLEASE_ADD_LICENSE_FILE
  homepage: https://github.com/lightseekorg/smg

extra:
  recipe-maintainers:
    - xhochy

