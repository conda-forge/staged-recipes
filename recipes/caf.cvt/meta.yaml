{% set version = "0.1.1" %}

package:
  name: caf.cvt
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/c/caf.cvt/caf_cvt-{{ version }}.tar.gz
  sha256: ac34aa0c5fa3a46cbfc0483861d30ca5e929945b8c19a7a6aec384f4e57ba49f

build:
  entry_points:
    - caf.cvt = caf.cvt.__main__:_main
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python >= 3.11
    - setuptools >=64.0.0
    - versioningit
    - pip
  run:
    - python >= 3.11
    - caf.toolkit >=0.12.0
    - fiona >=1.10.1
    - geopandas >=1.1.1
    - h5py >=3.15.1
    - numpy >=2.3.3
    - pandas >=2.3.3
    - py7zr >=1.0.0
    - scikit-learn >=1.7.2
    - shapely >=2.1.2
    - xarray >=2025.10.1

test:
  imports:
    - caf.cvt
  commands:
    - pip check
    - caf.cvt --help
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://github.com/transport-for-the-north/caf.cvt
  summary: Climate Vulnerability Tool to assess the vulnerability of the transport network in the North to climate hazards.
  doc_url: http://cafcvt.readthedocs.io/
  dev_url: https://github.com/transport-for-the-north/caf.cvt
  license: LicenseRef-TfN-License
  license_file: LICENSE

extra:
  recipe-maintainers:
    - DanielJacksonTfN
    - MattBuckley-TfN
    - BenTaylor-TfN
    - isaac-tfn
