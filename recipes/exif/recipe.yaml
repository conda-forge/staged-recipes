context:
    version: 1.6.1
    build_number: "0"

package:
    name: exif
    version: ${{ version }}

source:
    - url: https://pypi.org/packages/source/e/exif/exif-${{ version }}.tar.gz
      sha256: 763599b89b9b67495713060a703f32d1874abf8f0628c9d77711c2c06a5f44c8

build:
    number: ${{ build_number }}
    script: ${{ PYTHON }} -m pip install .
    noarch: python

requirements:
    host:
        - python ${{ python_min }}.*
        - setuptools
        - pip
    run:
        - python >=${{ python_min }}
        - plum-py <2.0.0,>=0.5.0

tests:
    - python:
          imports:
              - exif
          pip_check: true
          python_version:
              - ${{ python_min }}.*
              - "*"

about:
    homepage: https://gitlab.com/TNThieding/exif
    summary: Read and modify image EXIF metadata using Python.
    license: MIT
    license_file: LICENSE

extra:
    recipe-maintainers:
        - carlodri
