context:
  version: "1.7.3"
  python_min: "3.10"

# The base `crawlee` output ships only the core dependencies. The optional
# dependency groups from crawlee's pyproject.toml are bundled into a single
# `crawlee-all` meta-package for users who want everything installed at once.
# The `stagehand` extra is omitted because its `stagehand` dependency is not
# available on conda-forge, so `crawlee-all` also excludes it.
recipe:
  name: crawlee
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/c/crawlee/crawlee-${{ version }}.tar.gz
  sha256: 5c0a2dad5ae13bc5e07f4e0184de54837e2ad465c4d3580637d8fa70d701b163

build:
  number: 0

outputs:
  - package:
      name: crawlee
    build:
      noarch: python
      script: python -m pip install . -vv --no-deps --no-build-isolation
      number: 0
    requirements:
      host:
        - python ${{ python_min }}.*
        - pip
        - hatchling
      run:
        - python >=${{ python_min }}
        - async-timeout >=5.0.1
        - cachetools >=5.5.0
        - colorama >=0.4.0
        - impit >=0.8.0
        - more-itertools >=10.2.0
        - protego >=0.5.0
        - psutil >=6.0.0
        - pydantic-settings >=2.12.0
        - pydantic >=2.11.0
        - pyee >=9.0.0
        - tldextract >=5.1.0
        - typing-extensions >=4.10.0
        - yarl >=1.18.0
    tests:
      - python:
          imports:
            - crawlee
          pip_check: true
          python_version:
            - ${{ python_min }}.*
            - "*"

  - package:
      name: crawlee-all
    build:
      noarch: python
      number: 0
    requirements:
      host:
        - python ${{ python_min }}.*
      run:
        - python >=${{ python_min }}
        - ${{ pin_subpackage('crawlee', exact=True) }}
        - apify_fingerprint_datapoints >=0.0.3
        - browserforge >=1.2.4
        - jaro-winkler >=2.0.3
        - playwright >=1.27.0
        - scikit-learn >=1.6.0
        - beautifulsoup4 >=4.12.0
        - lxml
        - html5lib >=1.0
        - cookiecutter >=2.6.0
        - inquirer >=3.3.0
        - rich >=13.9.0
        - typer >=0.12.0
        - curl-cffi >=0.9.0
        - httpx >=0.27.0
        - brotli-python
        - h2
        - zstandard
        - opentelemetry-api >=1.34.1
        - opentelemetry-distro >=0.54
        - opentelemetry-exporter-otlp >=0.54
        - opentelemetry-instrumentation >=0.54
        - opentelemetry-instrumentation-httpx >=0.54
        - opentelemetry-sdk >=1.34.1
        - opentelemetry-semantic-conventions >=0.54
        - wrapt >=1.17.0
        - parsel >=1.10.0
        - redis-py >=7.0.0
        - hiredis
        - sqlalchemy >=2.0.0,<3.0.0
        - aiomysql >=0.3.2
        - cryptography >=46.0.5
        - asyncpg >=0.24.0
        - aiosqlite >=0.21.0
    tests:
      - python:
          imports:
            - crawlee
          pip_check: false
          python_version:
            - ${{ python_min }}.*
            - "*"

about:
  homepage: https://crawlee.dev/python
  summary: Crawlee for Python
  description: |
    Crawlee is a web scraping and browser automation library for Python.
    It helps you build reliable crawlers and handles request queues,
    autoscaling, proxy rotation, session management, and integration with
    HTTP clients and Playwright, so you can focus on the data extraction
    itself.
  license: Apache-2.0
  license_file: LICENSE
  documentation: https://crawlee.dev/python/docs/quick-start
  repository: https://github.com/apify/crawlee-python

extra:
  recipe-maintainers:
    - Pijukatel
