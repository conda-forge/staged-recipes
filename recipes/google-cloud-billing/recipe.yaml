schema_version: 1

context:
  version: "1.19.0"

package:
  name: google-cloud-billing
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/g/google-cloud-billing/google_cloud_billing-${{ version }}.tar.gz
  sha256: b81befc22044f915aa5164cb78ec0ff4d90b53c9b5ea7d00ee282352427e93f2

build:
  number: 0
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  noarch: python

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - setuptools
  run:
    - python >=${{ python_min }}
    - google-api-core >=2.11.0,<3.0.0
    - google-auth >=2.14.1,<3.0.0,!=2.24.0,!=2.25.0
    - grpcio >=1.33.2,<2.0.0
    - proto-plus >=1.22.3,<2.0.0
    - protobuf >=4.25.8,<8.0.0
    - grpc-google-iam-v1 >=0.14.0,<1.0.0

tests:
  - python:
      python_version: ${{ python_min }}.*
      imports:
        - google.cloud.billing
        - google.cloud.billing_v1
      pip_check: true

about:
  home: https://github.com/googleapis/google-cloud-python/tree/main/packages/google-cloud-billing
  summary: Google Cloud Billing API client library
  doc_url: https://docs.cloud.google.com/python/docs/reference/cloudbilling/latest
  dev_url: https://github.com/googleapis/google-cloud-python/tree/main/packages/google-cloud-billing
  license: Apache-2.0
  license_file: LICENSE
  homepage: https://github.com/googleapis/google-cloud-python/tree/main/packages/google-cloud-billing

extra:
  recipe-maintainers:
    - timpalpant
