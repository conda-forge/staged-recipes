{% set version = "0.1.0" %}
{% set python_min = "3.11" %}

package:
  name: caf.mat
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/c/caf.mat/caf_mat-{{ version }}.tar.gz
  sha256: e8f2c16f20b6b5463394cd5b0345f3fc8e48a9249167731cccac184f8f8507c5

build:
  entry_points:
    - caf.mat = caf.mat.__main__:main
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - setuptools >=82.0.1
    - versioningit
    - pip
  run:
    - python >={{ python_min }}
    - numpy >=2
    - pandas >=2.2.3
    - caf.base >=0.4.0
    - caf.toolkit >=0.9.0
    - caf.distribute >=0.7.0
    - xarray >=2025
    - tqdm >=4.67
    - pytables >=3.10.1

test:
  imports:
    - caf
  commands:
    - pip check
    - caf.mat --help
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://github.com/transport-for-the-north/caf.mat
  summary: Interacting with, and converting between formats of, transport modelling matrices.
  doc_url: http://cafmat.readthedocs.io/
  dev_url: https://github.com/transport-for-the-north/caf.mat
  license: LicenseRef-TfN-License
  license_file: LICENSE

extra:
  recipe-maintainers:
    - MattBuckley-TfN
    - BenTaylor-TfN
    - isaac-tfn
    - Kieran-Fishwick-TfN
