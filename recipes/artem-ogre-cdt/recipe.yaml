context:
  version: "1.4.4"

package:
  name: artem-ogre-cdt 
  version: ${{ version }}

source:
  url: https://github.com/artem-ogre/CDT/archive/refs/tags/${{ version }}.tar.gz
  sha256: 97e57bdd1cf8219dcc81634236a502390a20dda3599dd3414a74343b7f03427f

build:
  number: 0

requirements:
  build:
    - cmake
    - ninja
    - ${{ compiler('cxx') }}
    - ${{ compiler('c') }}
    - ${{ stdlib("c") }}
  host:
  run:

tests:
  - package_contents:
      include:
        - CDTUtils.h

about:
  homepage: https://artem-ogre.github.io/CDT/
  license: MPL-2.0
  license_file: LICENSE
  summary: Constrained Delaunay Triangulation
  description: |
    C++ library for generating constraint or conforming Delaunay triangulations
  documentation: https://artem-ogre.github.io/CDT/group__API.html
  repository: https://github.com/artem-ogre/CDT

extra:
  recipe-maintainers:
    - jschueller
