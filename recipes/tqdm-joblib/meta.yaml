{% set version = "0.0.5" %}

package:
  name: tqdm-joblib
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/t/tqdm-joblib/tqdm_joblib-{{ version }}.tar.gz
  sha256: 34dd63c92e1b88b5118661a41eaf91001cac2687bfe217a4b6a9ab1bbf0f1c64

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - hatchling
    - wheel
    - pip
  run:
    - python >={{ python_min }}
    - tqdm
    - joblib

test:
  imports:
    - tqdm_joblib
  commands:
    - pip check
  requires:
    - python {{ python_min }}
    - pip

about:
  home: https://github.com/louisabraham/tqdm_joblib
  summary: Tracking progress of joblib.Parallel execution
  license: CC-BY-SA-4.0
  license_file: LICENSE.txt

extra:
  recipe-maintainers:
    - FGarridoV
    - sandervancranenburgh
