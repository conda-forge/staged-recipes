{% set name = "imdtrack" %}
{% set version = "0.2.6" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  # Built from the PyPI sdist. Update `version` and `sha256` for each release
  # (conda-forge's bot does this automatically once the feedstock exists).
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz
  sha256: 7df22d6ac74a441149e8c521b6c75aebb5672e2de5e960b3f76dfe3322c029c1

build:
  noarch: python
  number: 0
  # hatch-vcs bakes the version into the PyPI sdist (_version.py / PKG-INFO), so
  # the build resolves 0.2.5 without needing git.
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  entry_points:
    - imdtrack = imdtrack.cli:main

requirements:
  host:
    - python >=3.9
    - pip
    - hatchling
    - hatch-vcs
  run:
    - python >=3.9
    - pandas >=1.5
    - pyarrow >=10.0

test:
  imports:
    - imdtrack
  commands:
    - imdtrack --help
    - pip check
  requires:
    - pip

about:
  home: https://github.com/syedhamidali/imdtrack
  summary: IMD RSMC New Delhi North Indian Ocean cyclone best-track data as pandas / xarray
  description: |
    imdtrack serves the India Meteorological Department (RSMC New Delhi) cyclone
    best-track record as tidy pandas DataFrames and CF-style xarray Datasets,
    kept up to date automatically by a validated monthly pipeline. Optional
    extras add xarray output ([xarray]), cartopy map plotting ([plot]), and the
    workbook-parsing pipeline ([pipeline]).
  license: BSD-3-Clause
  license_file: LICENSE
  doc_url: https://imdtrack.readthedocs.io/
  dev_url: https://github.com/syedhamidali/imdtrack

extra:
  recipe-maintainers:
    - syedhamidali
