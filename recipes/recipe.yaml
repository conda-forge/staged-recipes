schema_version: 1

context:
  version: 2.0.0

package:
  name: timed-threads
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/T/Timed-Threads/timed_threads-{{ version }}.tar.gz
  sha256: 55d30ecb50bbc541680edb734d444cd233ed8ca0e4f894ee4047b6c1786ee30c

build:
  noarch: python
  number: 0
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - setuptools
    - pip
  run:
    - python >=${{ python_min }}

tests:
  - python:
      imports:
        - timed_threads
      python_version:
        - ${{ python_min }}.*
        - "*"
      pip_check: true

about:
  homepage: https://github.com/Mathics3/python-timed-threads/
  summary: Absolute time deadlines and thread cancelling for Python asynchronous threads
  license: MIT
  license_file: LICENSE
  description: |
    A library for setting relative elapsed time deadlines on asynchronous threads, and allows
    one thread to stop another by means of raising an exception.

  repository: https://github.com/Mathics3/python-timed-threads
  documentation: https://github.com/Mathics3/python-timed-threads/blob/master/README.rst

extra:
  recipe-maintainers:
    - mmatera
    - rocky