schema_version: 1

context:
  version: "4.26.1"

package:
  name: firecrawl
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/f/firecrawl/firecrawl-${{ version }}.tar.gz
  sha256: be2598fae385fb5f7299f262d686c26ac900cf53de259d8cd0b5b330ae0bb48a

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - setuptools >=42
    - wheel
    - pip
  run:
    - python >=${{ python_min }}
    - requests
    - httpx
    - python-dotenv
    - websockets
    - nest-asyncio
    - pydantic >=2.0
    - aiohttp

tests:
  - python:
      imports:
        - firecrawl
      pip_check: true
      python_version: ${{ python_min }}.*

about:
  summary: Python SDK for Firecrawl API
  license: MIT
  license_file: LICENSE
  homepage: https://github.com/firecrawl/firecrawl
  repository: https://github.com/firecrawl/firecrawl
  documentation: https://docs.firecrawl.dev

extra:
  recipe-maintainers:
    - moritzwilksch
