schema_version: 1

context:
  python_min: "3.9"
  version: "2.1.0"

package:
  name: fmm3dpy
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/f/fmm3dpy/fmm3dpy-${{ version }}.tar.gz
  sha256: b2de0767fd59c8e7d82c7c624699903f6a902a895ef48407fa444068c939e790

build:
  number: 0
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  build:
    - ${{ compiler('c') }}
    - ${{ compiler('fortran') }}
  host:
    - python ${{ python_min }}.*
    - meson-python
    - numpy >=2.0.0
    - pip
  run:
    - python >=${{ python_min }}
    - numpy >=1.26.4

tests:
  - python:
      imports:
        - fmm3dpy
      pip_check: true
      python_version: ${{ python_min }}.*
  - script:
      - pytest -s python/test
    files:
      source:
        - python/test/
    requirements:
      run:
        - pip
        - pytest

about:
  homepage: https://github.com/flatironinstitute/FMM3D
  repository: https://github.com/flatironinstitute/FMM3D
  documentation: https://fmm3d.readthedocs.io/en/latest/
  summary: This package contains basic routines for Laplace, Helmholtz, Stokes and Maxwell fast multipole methods in three dimensions
  license: Apache-2.0
  license_file:
    - LICENSE
    - julia/LICENSE

extra:
  recipe-maintainers:
    - srimanachanta
