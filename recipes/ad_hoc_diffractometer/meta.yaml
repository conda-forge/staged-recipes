{% set version = "0.3.4" %}
{% set python_min = "3.10" %}

package:
  name: hklpy2_solvers
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/h/hklpy2_solvers/hklpy2_solvers-{{ version }}.tar.gz
  sha256: 4a2cf440966a7d04a91d89e44e2aa7626a342eb0ad252f4ba527db8a649d

build:
  script: {{ PYTHON }} -m pip install . -vv
  number: 0
  noarch: python

requirements:
  host:
    - conda-verify
    - hatch-vcs
    - hatchling
    - pip
    - python {{ python_min }}
  run:
    - python >={{ python_min }}
    - ad_hoc_diffractometer >=0.11.2
    - diffcalc-core
    - hklpy2 >=0.7.1
    - numpy

test:
  imports:
    - hklpy2 >=0.7.1
  requires:
    - ad_hoc_diffractometer >=0.11.2
    - conda-verify
    - diffcalc-core
    - pip
    - python {{ python_min }}
  commands:
    - pip check
    - python -c "import hklpy2; psic = hklpy2.creator(geometry='psic', solve='ad_hoc')"
    - python -c "import hklpy2; psic = hklpy2.creator(geometry='diffcalc_4S_2D', solve='diffcalc')"

about:
  home: https://github.com/prjemian/hklpy2_solvers
  summary: 'Solvers for the [hklpy2](https://github.com/prjemian/hklpy2) package.'
  description: |
    **hklpy2-solvers** provides solvers that plug into the
    `hklpy2 <https://blueskyproject.io/hklpy2/>`_ diffractometer control
    framework via its entry-point interface.
  license: BSD-4-Clause
  license_file: LICENSE
  doc_url: https://prjemian.github.io/hklpy2_solvers/
  dev_url: https://github.com/prjemian/hklpy2_solvers

extra:
  recipe-maintainers:
    - prjemian
