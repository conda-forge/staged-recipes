context:
  name: crosshair
  version: "0.0.101"
  python_min: "3.10"

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/${{ name[0] }}/${{ name }}_tool/${{ name }}_tool-${{ version }}.tar.gz
  sha256: c36eb18e211b344b47dc9aaf85d0b16ae4cb00719d20f131eb6ebf5e79767983

build:
  script: python -m pip install . -vv
  python:
    entry_points:
      - crosshair=crosshair.main:main
      - mypycrosshair=crosshair.main:mypy_and_check
  number: 0

requirements:
  build:
    - ${{ compiler('c') }}
    - ${{ stdlib("c") }}
  host:
    - python ==${{ python_min }}
    - pip
    - setuptools
    - if: linux or osx
      then: libxcrypt
  run:
    - python >=${{ python_min }}
    - packaging
    - typing_inspect >=0.7.1
    - typing_extensions >=3.10.0
    - z3-solver >=4.13.0.0
    - importlib-metadata >=4.0.0
    - pygls >=1.0.0
    - typeshed-client >=2.0.5

tests:
  - python:
      imports:
        - crosshair
      pip_check: false # complains about z3-solver
      python_version: ${{ python_min }}.*
  - requirements:
      run:
        - python ${{ python_min }}.*
        - pip
        - z3-solver
    script:
      - crosshair --help
      - mypycrosshair --help

about:
  homepage: https://github.com/pschanely/CrossHair
  summary: Analyze Python code for correctness using symbolic execution.
  license: Apache-2.0
  license_file: LICENSE
  documentation: https://crosshair.readthedocs.io/en/latest/
  repository: https://github.com/pschanely/CrossHair

extra:
  recipe-maintainers:
    - kratsg
