# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "0.30.0"
  python_min: "3.11"

package:
  name: langgraph-runtime-inmem
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/l/langgraph-runtime-inmem/langgraph_runtime_inmem-${{ version }}.tar.gz
  sha256: 31954e1de6cd43c284b425243d4faeae818f68b3daca4dbe4313e651b6f5e11d

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - hatchling
  run:
    - python >=${{ python_min }}
    - blockbuster <2.0.0,>=1.5.24
    - croniter >=1.0.1
    - langgraph-checkpoint <5,>=3
    - langgraph <2,>=0.4.10
    - sse-starlette >=2
    - starlette >=0.37
    - structlog >23

tests:
  - python:
      imports:
        - langgraph_runtime_inmem
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  homepage: https://pypi.org/project/langgraph-runtime-inmem/
  license: Elastic-2.0
  license_file: LICENSE
  summary: Inmem implementation for the LangGraph API server.
  description: |
    Inmem implementation for the LangGraph API server.

extra:
  recipe-maintainers:
    - rxm7706
