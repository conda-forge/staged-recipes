# Presenton requires exactly Python 3.11 (upstream pins >=3.11,<3.12).
#
# python, python_min, and is_python_min are a *zipped* group in conda-forge's
# global conda_build_config.yaml — all three must be fully specified here when
# overriding any of them, and python must use the canonical "x.y.* *_cpython"
# format to match the global list entries (bare "3.11" is ambiguous).
#
# is_python_min: true — this single entry is both the minimum and the only
# supported Python version, which is the correct value for the noarch/CFEP-25
# build-once semantics and for non-noarch packages pinned to one version.
python:
  - "3.11.* *_cpython"

python_min:
  - "3.11"

is_python_min:
  - true
