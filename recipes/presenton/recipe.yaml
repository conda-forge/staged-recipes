context:
  version: "0.8.2"
  tag: "v0.8.2-beta"

package:
  name: presenton
  version: ${{ version }}

source:
  url: https://github.com/presenton/presenton/archive/refs/tags/${{ tag }}.tar.gz
  sha256: 6a0f62e1e47a9951b75a7a84319e59e8449a0b4faab512e79ba835c833b82d9f

build:
  noarch: python
  script: pip install --no-build-isolation servers/fastapi
  number: 0

requirements:
  host:
    - python >=3.11,<3.12
    - pip
    - setuptools >=68
    - wheel
  run:
    - python >=3.11,<3.12
    - alembic >=1.14.0
    - aiohttp >=3.12.15
    - aiomysql >=0.2.0
    - aiosqlite >=0.21.0
    - asyncpg >=0.30.0
    - dirtyjson >=1.0.8
    - email-validator
    - fastapi >=0.116.1
    - fastembed-vectorstore >=0.5.2
    - fastmcp >=2.11.0
    - google-genai >=1.28.0
    - greenlet >=3.0.3
    - httpx
    - jsonschema >=4.26.0
    - llmai ==0.2.2
    - mem0ai >=0.1.115
    - nltk >=3.9.1
    - openai >=1.98.0
    - pathvalidate >=3.3.1
    - pdfplumber >=0.11.7
    - psycopg >=3.2.0
    - python-multipart
    - sqlmodel >=0.0.24
    - uvicorn

tests:
  - python:
      pip_check: true

about:
  homepage: https://github.com/presenton/presenton
  summary: Open-source AI-powered presentation generator
  description: |
    Presenton is an open-source AI-powered presentation generator supporting
    multiple LLM providers including OpenAI, Google Gemini, Anthropic Claude,
    Azure OpenAI, and Ollama. It provides a FastAPI backend that generates
    presentations and exports them to PPTX and PDF formats.
  license: Apache-2.0
  license_file: LICENSE
  repository: https://github.com/presenton/presenton

extra:
  recipe-maintainers:
    - killua156
    - mgorny
