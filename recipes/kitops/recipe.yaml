context:
  version: "1.11.0"
  commit: "0c270a8"

package:
  name: kitops
  version: ${{ version }}

source:
  url: https://github.com/kitops-ml/kitops/archive/refs/tags/v${{ version }}.tar.gz
  sha256: 58c12c8db7c08ea64b094fdaf0ce11cee301f21091830260b260c4c96c770c69
  target_directory: src

build:
  number: 0
  script:
    - cd src
    - go-licenses save . --save_path ../library_licenses
    - if: unix
      then:
        - BUILD_TIME=$(date -u +%Y-%m-%dT%H:%M:%SZ)
        - go build -v -o $PREFIX/bin/kit -ldflags="-s -w -X github.com/kitops-ml/kitops/pkg/lib/constants.Version=${{ version }} -X github.com/kitops-ml/kitops/pkg/lib/constants.GitCommit=${{ commit }} -X github.com/kitops-ml/kitops/pkg/lib/constants.BuildTime=${BUILD_TIME}"
        # generate shell completions
        - mkdir -p $PREFIX/share/bash-completion/completions $PREFIX/share/fish/vendor_completions.d $PREFIX/share/zsh/site-functions
        - $PREFIX/bin/kit completion bash > $PREFIX/share/bash-completion/completions/kit
        - $PREFIX/bin/kit completion fish > $PREFIX/share/fish/vendor_completions.d/kit.fish
        - $PREFIX/bin/kit completion zsh > $PREFIX/share/zsh/site-functions/_kit
    - if: win
      then:
        - for /f "usebackq delims=" %%T in (`powershell -Command "Get-Date -AsUTC -Format yyyy-MM-ddTHH:mm:ssZ"`) do set BUILD_TIME=%%T
        - go build -v -o %LIBRARY_BIN%\kit.exe -ldflags="-s -w -X github.com/kitops-ml/kitops/pkg/lib/constants.Version=${{ version }} -X github.com/kitops-ml/kitops/pkg/lib/constants.GitCommit=${{ commit }} -X github.com/kitops-ml/kitops/pkg/lib/constants.BuildTime=%BUILD_TIME%"
        # generate shell completions
        - mkdir %LIBRARY_PREFIX%\share\bash-completion\completions
        - mkdir %LIBRARY_PREFIX%\share\fish\vendor_completions.d
        - mkdir %LIBRARY_PREFIX%\share\zsh\site-functions
        - '%LIBRARY_BIN%\kit.exe completion bash > %LIBRARY_PREFIX%\share\bash-completion\completions\kit'
        - '%LIBRARY_BIN%\kit.exe completion fish > %LIBRARY_PREFIX%\share\fish\vendor_completions.d\kit.fish'
        - '%LIBRARY_BIN%\kit.exe completion zsh > %LIBRARY_PREFIX%\share\zsh\site-functions\_kit'

requirements:
  build:
    - ${{ compiler("go-nocgo") }}
    - go-licenses

tests:
  - script:
      - kit --help
      - kit version
  - package_contents:
      bin:
        - kit
      files:
        - if: unix
          then:
            - share/bash-completion/completions/kit
            - share/fish/vendor_completions.d/kit.fish
            - share/zsh/site-functions/_kit
        - if: win
          then:
            - Library/share/bash-completion/completions/kit
            - Library/share/fish/vendor_completions.d/kit.fish
            - Library/share/zsh/site-functions/_kit
      strict: true

about:
  homepage: https://kitops.ml
  summary: An open source MLOps tool for packaging, versioning, and sharing AI/ML projects
  description: |
    KitOps is an open source tool that allows to package, version, share, and
    deploy AI/ML models and their associated artifacts using familiar DevOps practices and
    OCI standards. It facilitates collaborative work on self-hosted AI/ML models and makes
    sharing, automating, and deploying those models as simple as managing containerized apps. 
  license: Apache-2.0
  license_file:
    - src/LICENSE
    - library_licenses/
  repository: https://github.com/kitops-ml/kitops

extra:
  recipe-maintainers:
    - salim-b
