{% set name = "pyspectrakit" %}
{% set version = "1.9.6" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz
  sha256: 616bbd8631573b39b6aab5759f9cb0546d11e0a5c64627c20fd256a96c3b8696

build:
  noarch: python
  number: 0
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  entry_points:
    - spectrakit = spectrakit.cli:app

requirements:
  host:
    - python >=3.10
    - pip
    - hatchling
  run:
    - python >=3.10
    - numpy >=1.24
    - scipy >=1.10

test:
  imports:
    - spectrakit
    - spectrakit.baseline
    - spectrakit.normalize
    - spectrakit.similarity
    - spectrakit.smooth
    - spectrakit.derivative
    - spectrakit.despike
    - spectrakit.scatter
    - spectrakit.transform
    - spectrakit.ops
    - spectrakit.peaks
    - spectrakit.quality
    - spectrakit.pipeline
    - spectrakit.spectrum
    - spectrakit.io
  requires:
    - pip
  commands:
    - pip check

about:
  home: https://tubhyam.dev/libraries/spectrakit
  summary: Python toolkit for spectral data processing: baseline correction, normalization, smoothing, despiking, similarity metrics, peak analysis, and multi-format I/O.
  description: |
    SpectraKit is a Python toolkit for spectral data processing designed for
    vibrational spectroscopy (IR, Raman, NIR). It provides format parsers,
    baseline correction (ALS, ArPLS, SNIP, polynomial, rubberband),
    normalization (SNV, min-max, area, vector), smoothing (Savitzky-Golay,
    Whittaker), despiking, derivative computation, scatter correction (MSC,
    EMSC), spectral transforms (Kubelka-Munk, ATR correction), similarity
    metrics (cosine, Pearson, spectral angle, Euclidean), peak analysis, and
    a composable pipeline API. Multi-format I/O supports JCAMP-DX, SPC, CSV,
    Bruker OPUS, and HDF5.
  license: MIT
  license_family: MIT
  license_file: LICENSE
  doc_url: https://ktubhyam.github.io/spectrakit/
  dev_url: https://github.com/ktubhyam/spectrakit

extra:
  recipe-maintainers:
    - ktubhyam
