schema_version: 1

context:
  version: "0.1.0"

package:
  name: doiggie-invenio
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/d/doiggie-invenio/doiggie_invenio-${{ version }}.tar.gz
  sha256: 361f08575871d127ba6d4fd060d3d97c4958b60ccc2fb1a8a3a8acef4eca7548

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - setuptools >=61
    - setuptools-scm >=7
    - pip
  run:
    - python >=${{ python_min }}
    - doiggie
    - requests

tests:
  - python:
      imports:
        - doiggie_invenio
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"
about:
  summary: InvenioRDM (and Zenodo) support for doiggie
  license: BSD-2-Clause
  license_file:
    - COPYING.md
    - LICENSE.md
  homepage: https://github.com/ssciwr/doiggie-invenio
  repository: https://github.com/ssciwr/doiggie-invenio

extra:
  recipe-maintainers:
    - dokempf
