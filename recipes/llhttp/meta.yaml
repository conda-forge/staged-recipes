{% set name = "llhttp" %}
{% set version = "9.3.1" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://github.com/nodejs/llhttp/archive/refs/tags/release/v{{ version }}.tar.gz
  sha256: c14a93f287d3dbd6580d08af968294f8bcc61e1e1e3c34301549d00f3cf09365

build:
  number: 0
  run_exports:
    - {{ pin_subpackage("llhttp", max_pin="x.x") }}

requirements:
  build:
    - {{ compiler('c') }}
    - {{ compiler('cxx') }}
    - {{ stdlib('c') }}
    - cmake >=3.25
    - ninja

test:
  commands:
    - test -f ${PREFIX}/include/llhttp.h  # [unix]
    - test -f ${PREFIX}/lib/pkgconfig/libllhttp.pc  # [unix]

about:
  home: https://llhttp.org/
  summary: Fast HTTP message parser based on llparse
  description: |
    llhttp is a fast HTTP message parser based on llparse. It provides
    C headers, pkg-config metadata, and CMake package exports for
    consumers that need a compact embeddable HTTP parser.
  license: MIT
  license_family: MIT
  license_file: LICENSE
  dev_url: https://github.com/nodejs/llhttp

extra:
  recipe-maintainers:
    - auscaster
