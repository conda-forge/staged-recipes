# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "0.3.0"

package:
  name: py3langid
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/p/py3langid/py3langid-${{ version }}.tar.gz
  sha256: 0a875a031a58aaf9dbda7bb8285fd75e801a7bd276216ffabe037901d4b449ec

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - setuptools
  run:
    - python >=${{ python_min }}
    - numpy >=2.0.0

tests:
  - python:
      imports:
        - py3langid
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  homepage: https://github.com/adbar/py3langid
  license: BSD-3-Clause
  license_file: LICENSE
  summary: Fork of the language identification tool langid.py, featuring a modernized codebase and faster execution times.
  description: |
    Fork of the language identification tool langid.py, featuring a modernized codebase and faster execution times.

extra:
  recipe-maintainers:
    - rxm7706
