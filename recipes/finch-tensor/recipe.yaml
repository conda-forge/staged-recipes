context:
  version: "0.6.0"
  python_min: "3.11"

package:
  name: finch-tensor
  version: ${{ version }}

source:
  - url: https://pypi.org/packages/source/f/finch-tensor/finch_tensor-${{ version }}.tar.gz
    sha256: 756483bdb062fc94abbccb99f933d367c6d903026c0d637fa5170c31eb146038
  - git: https://github.com/finch-tensor/finch-tensor.git
    tag: v${{ version }}
    target_directory: repo

build:
  noarch: python
  script: uv pip install --python ${{ PYTHON }} . -vv --no-deps
  number: 0

requirements:
  host:
    - python ${{ python_min }}.*
    - uv
  run:
    - python >=${{ python_min }}
    - numpy >=2.0,<2.4
    - numba >=0.61,<2
    - donfig >=0.8.1.post1,<0.9.0
    - lark >=1.3.0,<2
    - scipy >=1.7,<2
    - c-compiler # not minimally activated yet: https://github.com/conda-forge/conda-forge.github.io/issues/2595#issuecomment-3719580016

tests:
  - python:
      imports:
      - finch
  - script:
      - pytest -ra repo/tests --ignore-glob=repo/tests/reference/*
    requirements:
      run:
        - python ${{ python_min }}.*
        - pytest
        - pytest-regressions
        - sparse
        - scipy
    files:
      source:
        - repo/tests/
        - pyproject.toml

about:
  homepage: https://github.com/finch-tensor/finch-tensor
  summary: Sparse Tensor Programming in Pure Python
  description: Sparse Tensor Programming in Pure Python
  license: MIT
  license_file:
    # TODO: get from sdist instead
    - repo/LICENSE

extra:
  recipe-maintainers:
    - lucascolley
    - mtsokol
    - willow-ahrens
