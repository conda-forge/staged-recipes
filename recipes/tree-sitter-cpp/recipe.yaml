schema_version: 1

context:
  version: "0.23.4"

package:
  name: tree-sitter-cpp
  version: ${{ version }}

source:
  url: https://github.com/tree-sitter/tree-sitter-cpp/archive/refs/tags/v${{ version }}.tar.gz
  sha256: 7a2c55afe3028f4105f25762ea58cc16537d1f5a1dcd9cca90410b3cd5d46051

build:
  number: 0
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  build:
    - ${{ compiler("c") }}
  host:
    - python
    - pip
    - setuptools >=42
  run:
    - python

tests:
  - python:
      imports:
        - tree_sitter_cpp

about:
  homepage: https://github.com/tree-sitter/tree-sitter-cpp
  summary: C++ grammar for tree-sitter
  license: MIT
  license_file: LICENSE
  repository: https://github.com/tree-sitter/tree-sitter-cpp

extra:
  recipe-maintainers:
    - killua156
    - mgorny
