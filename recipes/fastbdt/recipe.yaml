schema_version: 1

context:
  version: "5.6"
  build_number: 0

recipe:
  name: fastbdt-suite
  version: ${{ version }}

source:
  url: https://github.com/belle2/FastBDT/archive/refs/tags/v${{ version }}.tar.gz
  sha256: 644ef4d4044cef4272d976ad85e8efb56e51fc485d19eb8aa9a3115e90f1ff11

build:
  number: ${{ build_number }}
  variant:
    # Default to the no-double-weight variant
    down_prioritize_variant: ${{ 0 if use_double_weight == "OFF" else 1 }}
  skip:
    - win

outputs:
  - package:
      name: fastbdt
    build:
      string: double_weight_${{ use_double_weight| lower }}_np${{ numpy | version_to_buildstring }}_h${{ hash }}_${{ build_number }}
      script:
        - cmake ${CMAKE_ARGS} -S . -B build -DBUILD_TESTING=OFF -DUSE_DOUBLE_WEIGHT=${{ use_double_weight }}
        - cmake build -LH
        - cmake --build build --parallel ${CPU_COUNT}
        - cmake --install build
        # FIXME: Add disable static builds in upstream as STATIC is used explicitly in add_library
        - find $PREFIX/lib -name "libFastBDT_static.a" -delete
    requirements:
      run_exports:
        - ${{ pin_subpackage("fastbdt", upper_bound="x.x") }}
      build:
        - ${{ stdlib("c") }}
        - ${{ compiler("cxx") }}
        - cmake
        - make
      host:
        - python
        - pip
        - setuptools
        - numpy
      run:
        - python
        - numpy >=1.20
    tests:
      - python:
          imports:
            - PyFastBDT
          pip_check: true
      - package_contents:
          strict: true
          include:
            - FastBDT.h
            - Classifier.h
            - FastBDT_IO.h
          lib:
            - FastBDT_shared
            - FastBDT_CInterface
          files:
            - lib/python3.*/site-packages/PyFastBDT/*
            - lib/python3.*/site-packages/pyfastbdt*/*

  - package:
      name: fastbdt-double-weight
    build:
      noarch: generic
      skip:
        - ${{ use_double_weight == "OFF" }}
      # Avoid inheriting built script and do nothing instead
      script: "true"
    requirements:
      run:
        - ${{ pin_subpackage("fastbdt", exact=true) }}

about:
  summary: "FastBDT: Stochastic gradient-boosted decision trees for multivariate classification, usable standalone and via Python interface"
  license: GPL-3.0-or-later
  license_file: LICENSE
  homepage: https://github.com/belle2/FastBDT
  repository: https://github.com/belle2/FastBDT

extra:
  feedstock-name: fastbdt
  recipe-maintainers:
    - GiacomoXT
    - vvsagar
    - AlexanderHeidelbach
