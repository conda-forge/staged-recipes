schema_version: 1

context:
  version: 0.0.26

package:
  name: delu
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/d/delu/delu-${{ version }}.tar.gz
  sha256: 460fb6e1bb8b8fcc5639337486c3d32752820147be7442f1d52bbf93beb919a4

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - flit-core >=3.2,<4
    - pip
  run:
    - python >=${{ python_min }}
    - numpy >=1.21,<3
    - pytorch >=1.9,<3

tests:
  - python:
      imports:
        - delu
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  summary: Deep Learning Utilities for PyTorch users.
  license: MIT
  license_file: LICENSE
  homepage: https://github.com/Yura52/delu
  documentation: https://yura52.github.io/delu

extra:
  recipe-maintainers:
    - jan-janssen
