{% set version = '0.1.3' %}
{% set posix = 'm2-' if win else '' %}

package:
  name: r-mixopt
  version: {{ version|replace("-", "_") }}

source:
  url:
    - {{ cran_mirror }}/src/contrib/mixopt_{{ version }}.tar.gz
    - {{ cran_mirror }}/src/contrib/Archive/mixopt/mixopt_{{ version }}.tar.gz
  sha256: d6f8fcbc19bbaa95e5e332c1efbce49269c02b0acc2a4c66b13857a7bf9aed7d

build:
  number: 0
  noarch: generic
  rpaths:
    - lib/R/lib/
    - lib/
  missing_dso_whitelist:
    - '*/R.dll'        # [win]
    - '*/Rblas.dll'    # [win]
    - '*/Rlapack.dll'  # [win]

requirements:
  build:
    - {{ posix }}zip               # [win]
    - cross-r-base {{ r_base }}    # [build_platform != target_platform]
  host:
    - r-base
    - r-dplyr
    - r-ggplot2
    - r-splitfngr
  run:
    - r-base
    - r-dplyr
    - r-ggplot2
    - r-splitfngr

test:
  commands:
    - $R -e "library('mixopt')"           # [not win]
    - "\"%R%\" -e \"library('mixopt')\""  # [win]

about:
  home: https://github.com/CollinErickson/mixopt
  license: LGPL-3.0-or-later
  summary: Mixed variable optimization for non-linear functions. Can optimize function whose
    inputs are a combination of continuous, ordered, and unordered variables.
  license_family: LGPL
  license_file:
    - '{{ environ["PREFIX"] }}/lib/R/share/licenses/LGPL-3'

extra:
  recipe-maintainers:
    - conda-forge/r
