{% set version = "0.0.5" %}

package:
  name: xarrera
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/x/xarrera/xarrera-{{ version }}.tar.gz
  sha256: 6aff7335ec298400fd94e00b24418973792e1a49ed4cde7b7093b525e3e9e047

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python >=3.9
    - setuptools >=30.3.0
    - wheel
    - setuptools-scm >=6.0
    - pip
  run:
    - python >=3.9
    - xarray >=0.16
    - numpy >=1.21

test:
  imports:
    - xarrera
  commands:
    - pip check
  requires:
    - pip
    - python

about:
  home: https://github.com/javgat/xarrera
  summary: Schema validation for Xarray objects
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - javgat
