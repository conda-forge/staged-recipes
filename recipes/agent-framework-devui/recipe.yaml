schema_version: 1

context:
  version: "1.0.0b260514"
  python_min: "3.10"

package:
  name: agent-framework-devui
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/a/agent-framework-devui/agent_framework_devui-${{ version }}.tar.gz
  sha256: 7038d947367133caa387804fc68bcbf0caa8a7a2a14e363ec10435d0a161eb6b

build:
  noarch: python
  number: 0
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - flit-core <4.0,>=3.11
  run:
    - python >=${{ python_min }}
    - agent-framework-core <2,>=1.4.0
    - openai <3,>=1.99.0
    - opentelemetry-sdk <2,>=1.39.0
    - fastapi <0.133.1,>=0.115.0
    - uvicorn <0.42.0,>=0.30.0

tests:
  - python:
      imports:
        - agent_framework.devui
      python_version: ${{ python_min }}.*
      pip_check: true

about:
  summary: |
    Debug UI for Microsoft Agent Framework with OpenAI-compatible API server.
  homepage: https://pypi.org/project/agent-framework-devui/
  repository: https://github.com/microsoft/agent-framework
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - killua156
    - mgorny
