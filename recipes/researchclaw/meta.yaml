{% set version = "0.1.1" %}
{% set python_min = "3.10" %}

package:
  name: researchclaw
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/r/researchclaw/researchclaw-{{ version }}.tar.gz
  sha256: 8da6881fbff330fb61051fcb4f02379e66cc6d392d3a65434fa4a66e67ad6013

build:
  entry_points:
    - researchclaw = researchclaw.cli:main
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - hatchling
    - pip
  run:
    - python >={{ python_min }}
    - click >=8.1
    - pyyaml >=6.0
    - rich >=13.0
    - jinja2 >=3.1
    - prompt-toolkit >=3.0

test:
  imports:
    - researchclaw
  commands:
    - pip check
    - researchclaw --help
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://github.com/jellyheadandrew/researchclaw
  summary: Automated research experiment orchestrator — plan, run, evaluate, iterate.
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - jellyheadandrew
