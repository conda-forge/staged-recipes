context:
  version: "1.0.6"

package:
  name: libgbm
  version: ${{ version }}

source:
  url: https://github.com/glfs-book/libgbm/archive/refs/tags/${{ version }}.tar.gz
  sha256: dbfc383f6f6f294f6d9723c7e85096c4d98c46e0bed34c9254be690b8f4f0fd6

build:
  number: 0
  skip:
    - not linux

requirements:
  build:
    - ${{ compiler('c') }}
    - ${{ stdlib("c") }}
    - ${{ compiler('cxx') }}
    - meson
    - pkg-config
  host:
    - libdrm
  run_exports:
    - ${{ pin_subpackage('libgbm', upper_bound='x.x') }}

tests:
  - package_contents:
      include:
        - gbm.h
      lib:
        - gbm

about:
  homepage: https://github.com/glfs-book/libgbm
  license: MIT
  license_file: LICENSE
  summary: Generic Buffer Management backend loader

extra:
  recipe-maintainers:
    - jschueller
