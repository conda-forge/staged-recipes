context:
  name: "astyle"
  version: "3.1"
  sha256: "cbcc4cf996294534bb56f025d6f199ebfde81aa4c271ccbd5ee1c1a3192745d7"
  build_number: "0"

package:
  name: ${{ name }}
  version: ${{ version }}

source:
  url: https://sourceforge.net/projects/${{ name }}/files/${{ name }}/${{ name }}%20${{ version }}/${{ name }}_${{ version }}_linux.tar.gz
  sha256: ${{ sha256 }}

build:
  script:
    - make -C build/gcc -j${CPU_COUNT} CXX=$CXX CC=$CC
    - make -C build/gcc prefix=${PREFIX} INSTALL=install install
    - rm -rf ${PREFIX}/share/doc/astyle/html/*
  number: ${{ build_number }}
  skip:
    - win
    - osx

requirements:
  build:
    - ${{ compiler('cxx') }}
    - ${{ compiler('c') }}
    - ${{ stdlib("c") }}
    - cmake =3.31.8
    - make

tests:
  - package_contents:
      bin:
        - astyle
      strict: true
  - script:
      - astyle --version

about:
  homepage: https://astyle.sourceforge.net/index.html
  summary: 'Source code indenter, formatter, and beautifier for the C, C++, C++/CLI, Objective-C, C# and Java programming languages'
  description: |
    Artistic Style is a source code indenter, formatter, and beautifier for the C, C++, C++/CLI, Objective-C, C# and
    Java programming languages. Written in C++, it can be used from the command line or incorporated as a library
    in another program. Options can be entered from the command line or from an option file. The library version can be
    called from programs written in languages other than C++.
  license: MIT
  license_file: LICENSE.md
  documentation: https://astyle.sourceforge.net/astyle.html
  repository: https://gitlab.com/saalen/astyle

extra:
  recipe-maintainers:
    - utk4r-sh
    - GiacomoXT
    - vvsagar
