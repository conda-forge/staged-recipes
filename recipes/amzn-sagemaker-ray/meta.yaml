{% set name = "amzn-sagemaker-ray" %}
{% set version = "0.1.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/amzn_sagemaker_ray-{{ version }}.tar.gz
  sha256: a71465a653bc90b7abc801baef6c98ea65fbf909893b90ae3d96b629c200d7e7

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python >=3.11
    - pip
    - hatchling
  run:
    - python >=3.11

test:
  imports:
    - amzn_sagemaker_ray
  commands:
    - pip check
  requires:
    - pip

about:
  home: https://pypi.org/project/amzn-sagemaker-ray/
  summary: Amazon SageMaker Ray library
  description: |
    Amazon SageMaker Ray integration library.
  license: Apache-2.0
  license_file: LICENSE.txt

extra:
  recipe-maintainers:
    - HariniNarayanan
