schema_version: 1

context:
  version: "0.1.0"
  # amzn-sagemaker-ray requires Python >=3.11, above conda-forge's global
  # python_min default (3.10), so it must be pinned here.
  python_min: "3.11"

package:
  name: amzn-sagemaker-ray
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/a/amzn-sagemaker-ray/amzn_sagemaker_ray-${{ version }}.tar.gz
  sha256: a71465a653bc90b7abc801baef6c98ea65fbf909893b90ae3d96b629c200d7e7

build:
  noarch: python
  number: 0
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - hatchling
  run:
    - python >=${{ python_min }}

tests:
  - python:
      imports:
        - amzn_sagemaker_ray
      python_version:
        - ${{ python_min }}.*
        - "*"
      pip_check: true

about:
  homepage: https://pypi.org/project/amzn-sagemaker-ray/
  license: Apache-2.0
  license_file: LICENSE.txt
  summary: Amazon SageMaker Ray library
  description: |
    Amazon SageMaker Ray integration library.

extra:
  recipe-maintainers:
    - HariniNarayanan
