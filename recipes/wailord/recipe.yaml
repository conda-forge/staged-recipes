schema_version: 1

context:
  name: wailord
  version: "0.1.4"

package:
  name: ${{ name }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/${{ name[0] }}/${{ name }}/${{ name }}-${{ version }}.tar.gz
  sha256: b40e3ccf2c12a104770ba24d833329c0cceca421ee4d761149e0749b45d8722e

build:
  noarch: python
  number: 0
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - hatchling
  run:
    - python >=${{ python_min }}
    - rgpycrumbs >=1.9.18
    - chemparseplot >=1.9.8
    - pint >=0.22
    - pint-pandas >=0.5
    - numpy >=1.26
    - pandas >=2.2.0
    - pyyaml >=6.0.1
    - parsimonious >=0.10.0
    - cookiecutter >=2.4.0
    - click >=8.1.7

tests:
  - python:
      imports:
        - wailord
      python_version:
        - ${{ python_min }}.*
        - "*"
      pip_check: true

about:
  homepage: https://wailord.xyz
  summary: Python library to interact with ORCA quantum chemistry outputs
  license: GPL-3.0-only
  license_file: LICENSE
  repository: https://github.com/HaoZeke/wailord

extra:
  recipe-maintainers:
    - HaoZeke
