schema_version: 1

context:
  name: wailord
  version: "0.0.2"

package:
  name: ${{ name }}
  version: ${{ version }}

source:
  url: https://files.pythonhosted.org/packages/73/78/e8734247a37a8df7488fa47523c5a3feaf6841727455db7c37df61abc948/wailord-0.0.2.tar.gz
  sha256: 24870765f6db662eaa5c16c7d83d355cd3caaec03987579085937c7a48994463

build:
  noarch: python
  number: 0
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python
    - pip
    - poetry-core
  run:
    - python
    - click
    - ase
    - pandas
    - parsimonious
    - konfik
    - cookiecutter
    - jinja2
    - vg
    - pint
    - pint-pandas
    - siuba

tests:
  - python:
      imports:
        - wailord
      pip_check: false

about:
  homepage: https://wailord.xyz
  summary: Python library to interact with ORCA quantum chemistry outputs
  license: GPL-3.0-only
  license_file: LICENSE
  repository: https://github.com/HaoZeke/wailord

extra:
  recipe-maintainers:
    - HaoZeke
