schema_version: 1

context:
  name: wailord
  version: "0.0.2"
  python_min: "3.9"

package:
  name: ${{ name }}
  version: ${{ version }}

source:
  url: https://files.pythonhosted.org/packages/73/78/e8734247a37a8df7488fa47523c5a3feaf6841727455db7c37df61abc948/wailord-0.0.2.tar.gz
  sha256: 24870765f6db662eaa5c16c7d83d355cd3caaec03987579085937c7a48994463

build:
  noarch: python
  number: 0
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - poetry-core
  run:
    # Runtime modules used by wailord/ (not the over-broad poetry install_requires)
    - python >=${{ python_min }}
    - click
    - ase
    - numpy
    - pandas
    - jinja2
    - pint
    - pint-pandas
    - parsimonious
    - konfik
    - cookiecutter
    - scipy
    # vg is imported by wailord.io.orca but is not on conda-forge yet

tests:
  - python:
      python_version: ${{ python_min }}.*
      imports:
        - wailord
      # Upstream PKG-INFO pins Sphinx/black/flake8/etc as install_requires and
      # imports vg (not on conda-forge). Disable until metadata is fixed upstream.
      pip_check: false

about:
  homepage: https://wailord.xyz
  summary: Python library to interact with ORCA quantum chemistry outputs
  license: GPL-3.0-only
  license_file: LICENSE
  repository: https://github.com/HaoZeke/wailord

extra:
  recipe-maintainers:
    - HaoZeke
