schema_version: 1

context:
  version: "0.1.4"

package:
  name: llama-cpp-server-py-core
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/l/llama-cpp-server-py-core/llama_cpp_server_py_core-${{ version }}.tar.gz
  sha256: a38c3a0e0b2756e542618369a0105b82c2ffa7c538463221f6a784928b6ff995

build:
  number: 0
  skip:
    - match(python, "<3.10")
  script:
    env:
      CMAKE_GENERATOR: Ninja
    content:
      - ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  build:
    - ${{ compiler('c') }}
    - ${{ compiler('cxx') }}
    - ${{ stdlib('c') }}
    - cmake
    - ninja
  host:
    - python
    - pip
    - scikit-build-core
  run:
    - python

tests:
  - python:
      imports:
        - llama_cpp_server_py_core
      pip_check: true

about:
  homepage: https://github.com/ggml-org/llama.cpp
  summary: Python core library wrapping llama.cpp server, quantize, and conversion tools
  license: MIT
  license_file: llama.cpp/LICENSE
  repository: https://github.com/ggml-org/llama.cpp

extra:
  recipe-maintainers:
    - pb01ka
