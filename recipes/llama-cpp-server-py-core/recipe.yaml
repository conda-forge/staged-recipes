schema_version: 1

context:
  version: "0.1.4"

package:
  name: llama-cpp-server-py-core
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/l/llama-cpp-server-py-core/llama_cpp_server_py_core-${{ version }}.tar.gz
  sha256: a38c3a0e0b2756e542618369a0105b82c2ffa7c538463221f6a784928b6ff995

build:
  number: 0
  skip:
    - match(python, "<3.10")
  script:
    content:
      - if: unix
        then: export CMAKE_GENERATOR=Ninja
      - ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation -Ccmake.define.LLAMA_BUILD=OFF -Ccmake.define.LLAVA_BUILD=OFF
      - if: unix
        then: |
          mkdir -p "$SP_DIR/llama_cpp_server_py_core/lib"
          ln -s "$PREFIX/bin/llama-server" "$SP_DIR/llama_cpp_server_py_core/lib/llama-server"
          ln -s "$PREFIX/bin/llama-quantize" "$SP_DIR/llama_cpp_server_py_core/lib/llama-quantize" || true
      - if: win
        then: |
          mkdir "%SP_DIR%\llama_cpp_server_py_core\lib"
          copy "%LIBRARY_BIN%\llama-server.exe" "%SP_DIR%\llama_cpp_server_py_core\lib\"
          copy "%LIBRARY_BIN%\llama-quantize.exe" "%SP_DIR%\llama_cpp_server_py_core\lib\"

requirements:
  build:
    - ${{ compiler('c') }}
    - ${{ compiler('cxx') }}
    - ${{ stdlib('c') }}
    - cmake
    - ninja
  host:
    - python
    - pip
    - scikit-build-core
    - llama.cpp ==5289
  run:
    - python
    - requests
    - urllib3
    - llama.cpp ==5289

tests:
  - python:
      imports:
        - llama_cpp_server_py_core
      pip_check: true

about:
  homepage: https://github.com/ggml-org/llama.cpp
  summary: Python core library wrapping llama.cpp server, quantize, and conversion tools
  license: MIT
  license_file: llama.cpp/LICENSE
  repository: https://github.com/ggml-org/llama.cpp

extra:
  recipe-maintainers:
    - pb01ka
