{% set name = "scinumtools3" %}
{% set version = "0.5.2" %}

package:
  name: {{ name }}
  version: {{ version }}

source:
  url: https://github.com/vrtulka23/scinumtools3/archive/refs/tags/v{{ version }}.tar.gz
  sha256: 0cdd0149f03cec07dc044b52a41fd009da89bae6953d9d36406116fee72d087d

build:
  number: 0
  script: 
    - export CMAKE_BUILD_PARALLEL_LEVEL=2
    - {{ PYTHON }} -m pip install . --no-deps -vv

requirements:
  build:
    - {{ compiler('cxx') }}
    - {{ stdlib("c") }}
    - cmake >=3.24
    - ninja

  host:
    - python
    - pip
    - scikit-build-core
    - pybind11
    - numpy

  run:
    - python
    - numpy

test:
  imports:
    - scinumtools3

  commands:
    - python -c "import scinumtools3"

about:
  home: https://github.com/vrtulka23/scinumtools3
  summary: Python bindings for the SciNumTools3 C++ numerical library.
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - vrtulka23
