{% set name = "scinumtools3" %}
{% set version = "0.5.9" %}

package:
  name: {{ name }}
  version: {{ version }}

source:
  url: https://github.com/vrtulka23/scinumtools3/archive/refs/tags/v{{ version }}.tar.gz
  sha256: 319101ab7899f3dd738ef22a1cce6313b5c59ec7db1d2dce0e4d9af056b435ae

build:
  number: 0
  script: 
    - export CMAKE_BUILD_PARALLEL_LEVEL=1  # [unix]
    - export CMAKE_GENERATOR=Ninja         # [unix]
    - {{ PYTHON }} -m pip install . --no-deps -vv

requirements:
  build:
    - {{ compiler('cxx') }}
    - {{ stdlib("c") }}
    - cmake >=3.24
    - ninja
  host:
    - python
    - pip
    - scikit-build-core
    - pybind11
    - numpy
  run:
    - python
    - numpy

test:
  imports:
    - scinumtools3
  commands:
    - ctest --output-on-failure

about:
  home: https://github.com/vrtulka23/scinumtools3
  summary: Python bindings for the SciNumTools3 C++ numerical library.
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - vrtulka23
