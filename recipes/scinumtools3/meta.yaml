{% set name = "scinumtools3" %}
{% set version = "0.5.1" %}

package:
  name: {{ name }}
  version: {{ version }}

source:
  url: https://github.com/vrtulka23/scinumtools3/archive/refs/tags/v{{ version }}.tar.gz
  sha256: ae314d922519b14a64005976ccb795d9feda5251e7d6c6ce2fe31f466997c2b8

build:
  number: 0
  script: {{ PYTHON }} -m pip install . --no-deps -vv

requirements:
  build:
    - {{ compiler('cxx') }}
    - cmake >=3.24
    - ninja

  host:
    - python
    - pip
    - scikit-build-core
    - pybind11
    - numpy

  run:
    - python
    - numpy

test:
  imports:
    - scinumtools3

  commands:
    - python -c "import scinumtools3"

about:
  home: https://github.com/vrtulka23/scinumtools3
  summary: Python bindings for the SciNumTools3 C++ numerical library.
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - vrtulka23
