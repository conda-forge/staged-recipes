{% set name = "code-graph-rag" %}
{% set version = "0.0.100" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/code_graph_rag-{{ version }}.tar.gz
  sha256: 79701be2f395befce01a85f288ce22ef6ecd2ce47598e52e5444040b73f8c1b2

build:
  noarch: python
  number: 0
  entry_points:
    - code-graph-rag = codebase_rag.cli:app
    - cgr = codebase_rag.cli:app
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python >=3.12
    - pip
    - setuptools
  run:
    - python >=3.12
    - loguru >=0.7.3
    - mcp >=1.21.1
    - pydantic-ai >=1.27.0
    - pydantic-settings >=2.0.0
    - pymgclient >=1.4.0
    - python-dotenv >=1.1.0
    - toml >=0.10.2
    - tree-sitter-python >=0.23.6
    - tree-sitter ==0.25.0
    - watchdog >=6.0.0
    - typer >=0.12.5
    - rich >=13.7.1
    - prompt-toolkit >=3.0.0
    - diff-match-patch >=20241021
    - click >=8.0.0
    - protobuf >=5.27.0
    - defusedxml >=0.7.1
    - huggingface-hub >=0.36.0

test:
  imports:
    - codebase_rag
  commands:
    - cgr --help

about:
  home: https://github.com/vitali87/code-graph-rag
  summary: Knowledge graph RAG for multi-language codebase analysis
  description: |
    The ultimate RAG for your monorepo. Query, understand, and edit
    multi-language codebases with the power of AI and knowledge graphs.
  license: MIT
  license_file: LICENSE
  dev_url: https://github.com/vitali87/code-graph-rag
  doc_url: https://vitali87.github.io/code-graph-rag/

extra:
  recipe-maintainers:
    - vitali87
