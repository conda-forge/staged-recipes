context:
  python_min: "3.11"
  version: "5.5.1"

package:
  name: pip-licenses
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/p/pip-licenses/pip_licenses-${{ version }}.tar.gz
  sha256: 7df370e6e5024a3f7449abf8e4321ef868ba9a795698ad24ab6851f3e7fc65a7

build:
  noarch: python
  script: python -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - setuptools
    - setuptools-scm
  run:
    - python >=${{ python_min }} 
    - prettytable >=3.12.0

tests:
  - python:
      imports:
        - piplicenses
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"
  - script:
      - pip-licenses --help

about:
  homepage: https://github.com/raimon49/pip-licenses
  summary: Dump the software license list of Python packages installed with pip.
  description: |
    pip-licenses is a CLI tool for checking the software license of installed
    Python packages with pip. It supports output in many formats including
    plain text, Markdown, reStructuredText, Confluence, HTML, JSON, and CSV.
  license: MIT
  license_file: LICENSE
  repository: https://github.com/raimon49/pip-licenses

extra:
  recipe-maintainers:
    - jdmarques
    - jaromieee 
