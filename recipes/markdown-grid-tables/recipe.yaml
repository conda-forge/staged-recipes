schema_version: 1

context:
  version: "0.6.0"

package:
  name: markdown-grid-tables
  version: ${{ version }}

source:
  url: https://gitlab.com/WillDaSilva/markdown_grid_tables/-/archive/${{ version }}/markdown_grid_tables-${{ version }}.tar.gz
  sha256: b754d23105d1447964dfca399f6b2858739450c05929e8e1a9fd732433c88445

build:
  number: 0
  noarch: python
  script:
    - export SETUPTOOLS_SCM_PRETEND_VERSION=${{ version }}
    - ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - flit-core >=3.2
    - flit-scm
    - pip
  run:
    - python >=${{ python_min }}
    - markdown >=3.0.0

tests:
  - python:
      imports:
        - markdown_grid_tables
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  summary: Python-Markdown extension to support grid tables.
  license: GPL-3.0-or-later
  license_file: LICENSE
  homepage: https://gitlab.com/WillDaSilva/markdown_grid_tables
extra:
  recipe-maintainers:
    - ocefpaf
