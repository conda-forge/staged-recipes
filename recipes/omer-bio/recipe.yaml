schema_version: 1

context:
  name: omer-bio
  version: 0.1.0

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/${{ name[0] }}/${{ name }}/omer_bio-${{ version }}.tar.gz
  sha256: 6a20ce1e265ee97a75b27ba200b1d32d2d0875a9054b53c09db6c9a5c50b2025

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python >=3.9
    - setuptools >=80.3.1
    - pip
  run:
    - python >=3.9
    - numpy
    - pandas
    - scikit-learn
    - matplotlib-base ==3.9.4
    - pymupdf ==1.26.1
    - promethee

tests:
  - python:
      imports:
        - omerbio
      pip_check: true

about:
  summary: "Ce package contient un module d'Analyse Promethee et des fonctions necessaires pour cette analyse"
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - juleschevalier