schema_version: 1

context:
  name: omer-bio
  version: 0.1.1

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/${{ name[0] }}/${{ name }}/omer_bio-${{ version }}.tar.gz
  sha256: cf93a5e31b786bf9378e544b567a54d68faf6a19009caad5532f5e1380b14257

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - setuptools >=80.3.1
    - pip
  run:
    - python >=${{ python_min }}
    - numpy
    - pandas
    - scikit-learn
    - matplotlib-base ==3.9.4
    - pymupdf >=1.26.1
    - promethee

tests:
  - python:
      imports:
        - omerbio
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  homepage: https://forge.inrae.fr/pfem/dev/libs/omerbio
  summary: "A package for Promethee analysis improved by PCA"
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - etiennejls
