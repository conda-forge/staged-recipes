context:
  version: "0.1.22"

package:
  name: rustfs-cli
  version: ${{ version }}

source:
  url: https://github.com/rustfs/cli/archive/refs/tags/v${{ version }}.tar.gz
  sha256: 9aa84bbf1d6b9cb150fa52d669a296eff5d97b472406bb25833728c7e8ef231a

build:
  number: 0
  script:
    env:
      CARGO_PROFILE_RELEASE_STRIP: symbols
      CARGO_PROFILE_RELEASE_LTO: fat
    content:
      - if: unix
        then:
          - cargo auditable install --locked --no-track --bins --root ${{ PREFIX }} --path ./crates/cli
        else:
          - cargo auditable install --locked --no-track --bins --root %LIBRARY_PREFIX% --path ./crates/cli
      - cargo-bundle-licenses --format yaml --output ./THIRDPARTY.yml

requirements:
  build:
    - ${{ stdlib('c') }}
    - ${{ compiler('c') }}
    - ${{ compiler('rust') }}
    - cargo-bundle-licenses
    - cargo-auditable

tests:
  - script: rc --help
  - package_contents:
      bin:
        - rc
      strict: true

about:
  homepage: https://github.com/rustfs/cli
  summary: An S3-compatible command-line client written in Rust
  description: |
    rc is a Rust S3 CLI client for S3-compatible object storage. It provides
    commands for managing buckets and objects against AWS S3, RustFS, MinIO,
    and other S3-compatible services, including an Admin API interface.
  license: MIT OR Apache-2.0
  license_file:
    - LICENSE-APACHE
    - LICENSE-MIT
    - THIRDPARTY.yml
  documentation: https://github.com/rustfs/cli
  repository: https://github.com/rustfs/cli

extra:
  recipe-maintainers:
    - pavelzw
