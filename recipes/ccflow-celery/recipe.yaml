context:
  name: ccflow-celery
  version: "0.1.0"

package:
  name: ${{ name }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/c/ccflow-celery/ccflow_celery-${{ version }}.tar.gz
  sha256: fdcc4f88aa1e391158a6feb61d810a1b63d46422f5143e1d6e299530944351d8

build:
  noarch: python
  number: 0
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - hatchling
  run:
    - python >=${{ python_min }}
    - ccflow >=0.6.10
    - celery

tests:
  - python:
      imports:
        - ccflow_celery
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  homepage: https://github.com/1kbgz/ccflow-celery
  repository: https://github.com/1kbgz/ccflow-celery
  summary: Celery evaluator for ccflow
  license: Apache-2.0
  license_file: LICENSE

extra:
  recipe-maintainers:
    - timkpaine
