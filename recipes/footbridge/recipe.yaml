schema_version: 1

context:
  python_min: "3.11"
  version: "1.0.9"

package:
  name: footbridge
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/f/footbridge/footbridge-${{ version }}.tar.gz
  sha256: eeaed01d65ebe7c1035ecc08c38aa5fa48b552028c33b3f110ff1f03465e1e3b

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - hatchling
    - pip
  run:
    - python >=${{ python_min }}
    - geojson
    - geopandas >=1.1.0
    - matplotlib-base >=3.10.0
    - pyarrow
    - xmltodict >=1.0.0

tests:
  - python:
      imports:
        - footbridge
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  summary: Towards more pythonic use of GeoDatabases
  license: MIT
  license_file: LICENSE
  homepage: https://pypi.org/project/footbridge/

extra:
  recipe-maintainers:
    - p-vdp
