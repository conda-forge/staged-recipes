context:
  version: "0.2.50"

package:
  name: datui
  version: ${{ version }}

source:
  url: https://github.com/derekwisong/datui/archive/refs/tags/v${{ version }}.tar.gz
  sha256: ee5a5fb120b4da52227e62772b4f893a342449420f8f30899969bdb913bd4eee

build:
  number: 0
  script:
    env:
      CARGO_PROFILE_RELEASE_STRIP: symbols
      CARGO_PROFILE_RELEASE_LTO: fat
    content:
      - if: unix
        then:
          - cargo auditable install --locked --no-track --bins --root ${{ PREFIX }} --path .
        else:
          - cargo auditable install --locked --no-track --bins --root %LIBRARY_PREFIX% --path .
      - cargo-bundle-licenses --format yaml --output ./THIRDPARTY.yml

requirements:
  build:
    - ${{ stdlib('c') }}
    - ${{ compiler('c') }}
    - ${{ compiler('rust') }}
    - cargo-bundle-licenses
    - cargo-auditable

tests:
  - script: datui --help
  - package_contents:
      bin:
        - datui
      strict: true

about:
  homepage: https://github.com/derekwisong/datui
  summary: Data Exploration in the Terminal
  description: Datui is a high-performance terminal UI for exploring and analyzing tabular datasets.
  license: MIT
  license_file:
    - LICENSE
    - THIRDPARTY.yml
  documentation: https://derekwisong.github.io/datui/
  repository: https://github.com/derekwisong/datui

extra:
  recipe-maintainers:
    - synapticarbors
