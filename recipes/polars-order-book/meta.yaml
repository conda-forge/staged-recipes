{% set name = "polars-order-book" %}
{% set version = "0.4.3" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/polars_order_book-{{ version }}.tar.gz
  sha256: df31f057f7ffa46048740937ec6382f6b33ee58b2a2734abea209d0219abcbbd

build:
  number: 0
  skip: true  # [py<310]

requirements:
  build:
    - {{ compiler('c') }}
    - {{ stdlib('c') }}
    - {{ compiler('rust') }}
  host:
    - python
    - maturin >=1.0,<2.0
    - pip
    - polars >=0.20.6
  run:
    - python
    - polars >=0.20.6

test:
  imports:
    - polars_order_book
  commands:
    - pip check
  requires:
    - pip

about:
  home: https://github.com/ChristopherRussell/polars-order-book
  license: Apache-2.0
  license_file: 
    - LICENSE
    - THIRDPARTY.yml
  summary: >
    A performant Polars expression plugin for calculating price-level summaries
    from a dataframe of order-book updates.

extra:
  recipe-maintainers:
    - ChristopherRussell