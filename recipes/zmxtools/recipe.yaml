schema_version: 1

context:
  python_min: "3.12"
  version: "0.1.5"

package:
  name: zmxtools
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/z/zmxtools/zmxtools-${{ version }}.tar.gz
  sha256: 3635f077939b754073e8612be78bf3e22a0c5bb855eeb14f48a146825839a97e

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  python:
    entry_points:
      - unzar = zmxtools.cli:unzar

requirements:
  host:
    - python ${{ python_min }}.*
    - poetry-core
    - pip
  run:
    - python ${{ python_min }}.*

tests:
  - python:
      imports:
        - zmxtools
      python_version:
        - ${{ python_min }}.*
        - "*"
      pip_check: true

about:
  summary: Toolkit to read Zemax OpticStudio files.
  license: AGPL-3.0-only
  license_file: LICENSE
  homepage: https://github.com/tttom/zmxtools

extra:
  recipe-maintainers:
    - mjhoptics
