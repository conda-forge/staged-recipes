{% set python_min = "3.9" %}
{% set version = "0.4.0" %}

package:
  name: jupyterlab-plugin-playground
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/j/jupyterlab-plugin-playground/jupyterlab_plugin_playground-{{ version }}.tar.gz
  sha256: 81783712c286f334af46b55b912635671b68e1fe445439e7f8c817242f702d2f

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python {{ python_min }}.*
    - jupyter-packaging >=0.10,<1
    - jupyterlab >=3.0,<4.dev0
    - pip
  run:
    - python >={{ python_min }}
    - jupyterlab >=3.0,<4.dev0

test:
  imports:
    - jupyterlab_plugin_playground
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}.*

about:
  home: https://github.com/jupyterlab/plugin-playground
  summary: A JupyterLab Plugin Playground.
  license: BSD-3-Clause
  license_file: LICENSE

extra:
  recipe-maintainers:
    - MUFFANUJ
    - krassowski
