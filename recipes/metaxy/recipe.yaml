schema_version: 1

context:
  python_min: "3.10"
  name: metaxy
  version: "0.1.10"

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/${{ name[0] }}/${{ name }}/${{ name }}-${{ version }}.tar.gz
  sha256: 62b4970cdc196ee1f31a3cc972002a521fbea1dc1280db66fd540fec1456030e

build:
  number: 0
  noarch: python
  script:
    content:
      - ${{ PYTHON }} -m build --wheel --no-isolation
      - if: unix
        then:
          - ${{ PYTHON }} -m installer --destdir=$PREFIX dist/*.whl
      - if: win
        then:
          - for %%f in (dist\*.whl) do ${{ PYTHON }} -m installer --destdir=%PREFIX% "%%f"
    env:
      PYTHONHASHSEED: "0"
  python:
    entry_points:
      - metaxy = metaxy.cli.app:main
      - mx = metaxy.cli.app:main

requirements:
  host:
    - python ${{ python_min }}.*
    - python-build
    - python-installer
    - uv-build >=0.8.14,<0.9.0
  run:
    - python >=${{ python_min }}
    - cyclopts >=4.4.0
    - narwhals >=2.18.1
    - typing-extensions >=4.0.0
    - pydantic-core >=2.0.0
    - polars >=1.35.0
    - polars-hash >=0.5.1
    - pydantic >=2.11.9
    - pydantic-settings >=2.11.0
    - python-dotenv >=1.0.0
    - pyyaml >=6.0.0
    - pytest-cases >=3.9.1
    - sqlglot >=28.1.0
    - tomli >=2.3.0
    - rich >=13.0.0
    - packaging >=25.0
    - tomli-w >=1.2.0
    - tomlkit >=0.13.2

tests:
  - python:
      imports:
        - metaxy
      python_version: ${{ python_min }}.*
  - requirements:
      run:
        - pip
        - python ${{ python_min }}.*
    script:
      - pip check
      - metaxy --help
      - mx --help

about:
  license: Apache-2.0
  license_file: LICENSE
  summary: Pluggable versioned metadata management for incremental multimodal pipelines.
  homepage: https://github.com/anam-org/metaxy
  repository: https://github.com/anam-org/metaxy
  documentation: https://docs.metaxy.io

extra:
  recipe-maintainers:
    - geoHeil
    - mrubenw
