github:
  branch_name: main
  tooling_branch_name: main
conda_build:
  error_overlinking: true
conda_forge_output_validation: true
bot:
  # Only automerge successful version PRs; migrations should still be reviewed.
  automerge: 'version'
  # Only open PRs if the rendered environment is solvable.
  check_solvable: true
  inspection: hint-all
conda_install_tool: pixi
conda_build_tool: rattler-build
