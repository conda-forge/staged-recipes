schema_version: 1

context:
  version: "1.4.6"

package:
  name: livekit-agents
  version: ${{ version }}

source:
  - url: https://pypi.org/packages/source/l/livekit-agents/livekit_agents-${{ version }}.tar.gz
    sha256: 2162c295e5e53808d3dae6887a131e0b9cc22f9cb9f57fc4014004ba57dd52c1
  - url: https://raw.githubusercontent.com/livekit/agents/refs/tags/livekit-agents%40${{ version }}/LICENSE
    sha256: c71d239df91726fc519c6eb72d318ec65820627232b2f796219e87dcf35d0ab4
    file_name: LICENSE

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - hatchling
    - pip
  run:
    - python >=${{ python_min }}
    - typer >=0.15.1
    - click >=8.1,<9.dev0
    - certifi >=2025.6.15
    - livekit ==1.1.2
    - livekit-api >=1.0.7,<2
    - livekit-protocol >=1.1,<2
    - livekit-blingfire >=1.1,<2.dev0,<2
    - protobuf >=3
    - pyjwt >=2.0
    - types-protobuf >=4
    - watchfiles >=1.0
    - psutil >=7.0
    - aiohttp >=3.10,<4.dev0
    - typing_extensions >=4.12
    - python-sounddevice >=0.5
    - docstring_parser >=0.16
    - eval-type-backport
    - colorama >=0.4.6
    - av >=14.0.0
    - numpy >=1.26.0
    - pydantic >=2.0,<3
    - nest-asyncio >=1.6.0
    - opentelemetry-api >=1.39.0,<1.40.dev0
    - opentelemetry-sdk >=1.39.0,<1.40.dev0
    - opentelemetry-exporter-otlp >=1.39.0,<1.40.dev0
    - prometheus_client >=0.22
    - openai >=2
    - aiofiles >=24

tests:
  - python:
      python_version:
        - ${{ python_min }}.*
        - "*"
      imports:
        - livekit.agents
      pip_check: true

about:
  summary: A powerful framework for building realtime voice AI agents
  license: Apache-2.0
  license_file: LICENSE
  homepage: https://pypi.org/project/livekit-agents/
  repository: https://github.com/livekit/agents
  documentation: https://docs.livekit.io

extra:
  recipe-maintainers:
    - conda-forge/livekit
