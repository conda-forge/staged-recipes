{% set version = "1.1.0" %}

package:
  name: trame-radial-menu
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/t/trame-radial-menu/trame_radial_menu-{{ version }}.tar.gz
  sha256: 84b00f371760c2b79a706eb6b4b73cb71639c48de54af8fd8757830ff08e39e8

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0
 
requirements:
  host:
    - python {{ python_min }}
    - hatchling
    - pip
  run:
    - python >={{ python_min }}
    - trame-client >=3.10

test:
  imports:
    - trame_radial_menu
  commands:
     - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://pypi.org/project/trame-radial-menu/
  summary: A trame component that make a radial menu around the mouse cursor
  license: Apache-2.0
  license_file: LICENSE

extra:
  recipe-maintainers:
    - UlysseDurand
