context:
  version: "1.3.3"

package:
  name: opencode
  version: ${{ version }}

source:
  - url: https://github.com/anomalyco/opencode/archive/refs/tags/v${{ version }}.tar.gz
    sha256: ea99cf2586eaf1ef56108a29a97f317cbed726d87603006f9bcd591d87966733
  - url: https://raw.githubusercontent.com/anomalyco/opencode/refs/tags/v${{ version }}/LICENSE
    sha256: 625f0f619133f89bbbb2abe37369613dfa1885eba1e50d02170deb62bb42cb6b

build:
  script:
    - export LD_LIBRARY_PATH=$BUILD_PREFIX/lib:$LD_LIBRARY_PATH
    - bun install
    - ./packages/opencode/script/build.ts --single
    - PLATFORM_DIR=$(ls packages/opencode/dist)
    - mkdir -p $PREFIX/bin
    - cp packages/opencode/dist/${PLATFORM_DIR}/bin/opencode $PREFIX/bin/opencode
  number: 0

requirements:
  build:
    - bun
    - brotli
  host:
    - bun
    - brotli
  run:
    - bun
    - brotli

tests:
  - script:
      - opencode --help
      - opencode --version

about:
  homepage: https://opencode.ai
  summary: The open source coding agent.
  license: MIT
  license_file:
    - LICENSE
  documentation: https://opencode.ai/docs
  repository: https://github.com/sst/opencode

extra:
  recipe-maintainers:
    - connor-stewarty
