context:
  name: opencode
  version: "1.0.146"

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  - url: https://github.com/anomalyco/opencode/archive/refs/tags/v${{ version }}.tar.gz
    sha256: f7bcdfbcf07bd0b1de105f7d5faa0898af2e0afb8f94ad01ef149d116880bc5b

build:
  number: 0
  script: |
    sed -i.bak 's/if (process.versions.bun !== expectedBunVersion)/if (false)/' packages/script/src/index.ts
    pushd packages/opencode
    bun install --ignore-scripts
    bunx license-checker --production --plainTextOutput --out ${SRC_DIR}/third-party-licenses.txt
    bun run build --single
    case "${target_platform}" in
      linux-64)      DIST=opencode-linux-x64 ;;
      linux-aarch64) DIST=opencode-linux-arm64 ;;
      osx-64)        DIST=opencode-darwin-x64 ;;
      osx-arm64)     DIST=opencode-darwin-arm64 ;;
    esac
    mkdir -p ${PREFIX}/bin
    install -m 755 dist/${DIST}/bin/opencode ${PREFIX}/bin/opencode
    popd

requirements:
  build:
    - bun
  run:
    - ${{ "icu >=75,<76" if linux }}
    - hdrhistogram-c
    - libhwy
    - libdeflate
    - lol-html
    - ls-hpack

tests:
  - script:
      - opencode --help
      - opencode --version

about:
  homepage: https://opencode.ai
  summary: The open source coding agent.
  license: MIT
  license_file:
    - LICENSE
    - third-party-licenses.txt
  documentation: https://opencode.ai/docs
  repository: https://github.com/anomalyco/opencode

extra:
  recipe-maintainers:
    - pavelzw
    - moritzwilksch
