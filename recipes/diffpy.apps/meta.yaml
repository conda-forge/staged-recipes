{% set name = "diffpy.apps" %}
{% set version = "0.1.1" %}
{% set python_min = "3.11" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/d/diffpy_apps/diffpy_apps-0.1.1.tar.gz
  sha256: bcdcb915c7dbe839436ee8ed2fe0bfd314e607979d515c946ff85c10b203c67f

build:
  noarch: python
  number: 0
  script: {{ PYTHON }} -m pip install --no-deps --ignore-installed .
  entry_points:
    -  diffpy-app = diffpy.apps.apps:main
    -  diffpy-apps = diffpy.apps.apps:main

requirements:
  build:

  host:
    - python {{ python_min }}
    - setuptools
    - setuptools-git-versioning >=2.0
    - pip

  run:
    - python >={{ python_min }}
    - diffpy.cmi
    - scipy
    - textx
    - psutil
    - pyyaml

test:
  requires:
    - python {{ python_min }}
    - pip
    - pytest

  source_files:
    - tests

  commands:
    - pip check
    - pytest

about:
  home: https://github.com/diffpy.apps/diffpy.apps/
  summary: Python package for doing science.
  license: BSD-3-Clause
  license_family: BSD
  license_file: LICENSE.rst
  description: |
    User applications to help with tasks using diffpy packages. Currently it contains (1) runmacro: A runner for DiffPy macro files. (2) agentify: A deployer for diffpy.cmi agent skills.
  doc_url: http://diffpy.apps.github.io/diffpy.apps/
  dev_url: https://github.com/diffpy.apps/diffpy.apps/

extra:
  recipe-maintainers:
    - sbillinge
