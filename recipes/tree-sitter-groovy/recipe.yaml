schema_version: 1

context:
  version: "0.1.2"

package:
  name: tree-sitter-groovy
  version: ${{ version }}

source:
  - url: https://github.com/amaanq/tree-sitter-groovy/archive/refs/tags/v${{ version }}.tar.gz
    sha256: d3eafa455e3a092d79c2d3488fa58a461c1a18cdfa1b7edb22e168b513e454fe

build:
  number: 0
  script:
    - ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation --disable-pip-version-check

requirements:
  build:
    - ${{ compiler("c") }}
    - ${{ stdlib("c") }}
    - if: build_platform != target_platform
      then:
        - python
        - cross-python_${{ target_platform }}
  host:
    - python
    - setuptools >=42
    - wheel
    - pip
  run:
    - python

tests:
  - python:
      imports:
        - tree_sitter_groovy
      pip_check: true

about:
  license: MIT
  license_file: LICENSE
  homepage: https://github.com/amaanq/tree-sitter-groovy
  summary: Groovy grammar for tree-sitter.

extra:
  recipe-maintainers:
    - killua156
    - mgorny
