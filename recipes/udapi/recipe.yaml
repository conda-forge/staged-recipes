# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "0.5.1"
  python_check_max: "3.14"

package:
  name: udapi
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/u/udapi/udapi-${{ version }}.tar.gz
  sha256: 5f8db0c5e6a63108e0f2f8001970c3ecb8381da471509593393941259e44f44a
  patches:
    # remove after https://github.com/udapi/udapi-python/issues/137
    - 133-no-scripts.patch

build:
  number: 0
  noarch: python
  script:
    - ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation --disable-pip-version-check
  python:
    entry_points:
      - udapy = udapi:cli.main

requirements:
  host:
    - pip
    - python ${{ python_min }}.*
    - setuptools >=42
    - wheel
  run:
    - colorama
    - python >=${{ python_min }}
    - termcolor

tests:
  - python:
      imports: udapi
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - ${{ python_check_max }}.*
  - requirements:
      run:
        - python ${{ python_min }}.*
    script:
      - udapy --help

about:
  summary: Python framework for processing Universal Dependencies data
  license: GPL-3.0-only
  license_file: LICENSE
  homepage: https://pypi.org/project/udapi
  repository: https://github.com/udapi/udapi-python

extra:
  recipe-maintainers:
    - bollwyvl
