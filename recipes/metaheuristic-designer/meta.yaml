{% set version = "1.0.0" %}

package:
  name: metaheuristic-designer
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/m/metaheuristic-designer/metaheuristic_designer-{{ version }}.tar.gz
  sha256: d06021d30e77ea3c28aa47bc5db9d89ed1acfb48b05b0862c1f462ae433ce353

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python >=3.10
    - setuptools
    - pip
  run:
    - python >=3.10
    - numpy
    - scipy
    - pyparsing
    - pandas
    - scikit-image
    - scikit-learn
    - cloudpickle
    - tqdm

test:
  imports:
    - metaheuristic_designer
  commands:
    - pip check
  requires:
    - pip
    - python

about:
  home: https://pypi.org/project/metaheuristic-designer/
  summary: A python package to design metaheuristic optimization algorithms from components.
  license: LGPL-3.0-only
  license_file: LICENSE

extra:
  recipe-maintainers:
    - eugenioLR
