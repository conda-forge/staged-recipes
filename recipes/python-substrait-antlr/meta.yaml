{% set name = "substrait-antlr" %}
{% set version = "0.79.0" %}

package:
  name: python-{{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/substrait_antlr-{{ version }}.tar.gz
  sha256: fa745258a3d00a9e09a44078b0dca49dd58e2917bc5cc0db0134e76c38b0074f

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - pip
    - setuptools >=80
  run:
    - python >={{ python_min }}
    - antlr4-python3-runtime >=4.13,<5

test:
  imports:
    - substrait_antlr.substrait_type.SubstraitTypeParser
  commands:
    - pip check
  requires:
    - python {{ python_min }}
    - pip

about:
  home: https://substrait.io
  summary: Generated Substrait ANTLR Parser Code
  license: Apache-2.0
  license_file: LICENSE
  dev_url: https://github.com/substrait-io/substrait-packaging

extra:
  recipe-maintainers:
    - nielspardon
