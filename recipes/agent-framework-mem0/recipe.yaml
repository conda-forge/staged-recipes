schema_version: 1

context:
  version: "1.0.0b260514"
  python_min: "3.10"

package:
  name: agent-framework-mem0
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/a/agent-framework-mem0/agent_framework_mem0-${{ version }}.tar.gz
  sha256: 2324a739fd947b9c2d3ea10d605ed437b409795236895576f1b5bb8c825281a4

build:
  noarch: python
  number: 0
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - flit-core <4.0,>=3.11
  run:
    - python >=${{ python_min }}
    - agent-framework-core <2,>=1.4.0
    - mem0ai <2,>=1.0.0

tests:
  - python:
      imports:
        - agent_framework.mem0
      python_version: ${{ python_min }}.*
      pip_check: true

about:
  summary: |
    Mem0 integration for Microsoft Agent Framework.
  homepage: https://pypi.org/project/agent-framework-mem0/
  repository: https://github.com/microsoft/agent-framework
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - killua156
    - mgorny
