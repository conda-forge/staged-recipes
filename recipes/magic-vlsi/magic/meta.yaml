package:
  name: magic
  version: "8.3.644"

source:
  git_url:  https://github.com/RTimothyEdwards/magic.git
  sha256: 4331fe68810dd89b2344c03ec688edbc67ddc2b12effb243c08ebcfa15da98f8
build:
  number: 0
requirements:
  build:
    - autoconf
    - automake
    - make
    - tcsh
    - python
    - {{ compiler('c') }}
    - xorg-libx11
    - zlib
    - xorg-libice
    - xorg-libsmi
    - cairo
    - {{ stdlib("c") }}
  host:
    - tk
    - xorg-libx11
    - cairo
    - zlib
    - xorg-xproto
    - xorg-libxext
    - readline
    - xorg-libsm
    - xorg-libice
    - freetype
  run:
    - xorg-libx11
    - tk
test:
  commands:
    - magic --version


about:
  home: http://opencircuitdesign.com/magic/
  license: BSD-3-Clause
  license_family: BSD
  license_file: COPYING
  summary: Magic VLSI Layout Tool
extra:
  recipe-maintainers:
    - Xkhanh720
    - proppy
    - curtisma
