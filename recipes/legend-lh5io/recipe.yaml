schema_version: 1

context:
  name: legend-lh5io
  version: "0.1.0"
  python_min: "3.10"

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/${{ name[0] }}/${{ name }}/legend_lh5io-${{ version }}.tar.gz
  sha256: 171c734c945a8926d9ffdfa3d3ec6c269b3cafc3948b77cbd8ed10fdc612aefd

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - setuptools >=77
    - setuptools-scm >=7
  run:
    - python >=${{ python_min }}
    - awkward >=2
    - colorlog
    - h5py >=3.10
    - hdf5plugin
    - numba !=0.53.*,!=0.54.*
    - numpy >=1.21
    - pandas >=1.4.4
    - parse

tests:
  - python:
      imports:
        - lh5
      pip_check: true
      python_version: ${{ python_min }}.*
  - requirements:
      run:
        - python ${{ python_min }}.*
        - pip
    script:
      - pip list
      - lh5ls --help
      - lh5concat --help

about:
  license: GPL-3.0-only
  license_file: LICENSE
  summary: LEGEND Python Data Objects
  description: |
    This package provides a Python implementation of the LEGEND Data Objects
    (LGDO) I/O to HDF5, including Numba-accelerated custom compression
    algorithms for particle detector signals.
    More documentation is available in the
    [LEGEND data format specification](https://legend-exp.github.io/legend-data-format-specs).
  homepage: https://github.com/legend-exp/legend-lh5io
  repository: https://github.com/legend-exp/legend-lh5io
  documentation: https://legend-lh5io.readthedocs.io/

extra:
  recipe-maintainers:
    - gipert
