context:
  name: quickview-family
  version: "0.1.0"

package:
  name: ${{ name | lower }}
  version: ${{ version }}

build:
  number: 0
  noarch: generic

requirements:
  run:
    - e3sm-quickview
    - e3sm_compareview

tests:
  - script:
      - quickview --help
      - quickcompare --help

about:
  homepage: https://kitware.github.io/QuickView/
  summary: Metapackage bundling QuickView-related applications and utilities
  license: Apache-2.0
  license_file: LICENSE

extra:
  recipe-maintainers:
    - willdunklin
    - jourdain
