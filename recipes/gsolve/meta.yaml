{% set version = "5.6.1" %}
{% set python_min = "3.12" %}

package:
  name: gsolve
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/g/gsolve/gsolve-{{ version }}.tar.gz
  sha256: 468be8b1eafcfecba35d1e5261298d3e79d9168c623730ef516f1a9fd664ebe2

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - hatchling
    - uv-dynamic-versioning
    - pip
  run:
    - python >={{ python_min }}
    - boule ==0.5.*
    - harmonica <0.8
    - pandas <3
    - pygtide >=0.8.2
    - pyhardisp >=0.2.1
    - rioxarray >=0.22.0
    - tqdm >=4.67.3
    - xarray >2025.12

test:
  imports:
    - gsolve
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://pypi.org/project/gsolve/
  summary: A Python package for processing gravity survey data.
  doc_url: https://gns-science.github.io/gsolve/
  license: GPL-3.0-only
  license_file: LICENSE

extra:
  recipe-maintainers:
    - craigmillernz
