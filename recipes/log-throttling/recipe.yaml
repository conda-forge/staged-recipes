schema_version: 1

context:
  python_min: "3.9"
  version: "0.0.3"

package:
  name: log-throttling
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/l/log-throttling/log-throttling-${{ version }}.tar.gz
  sha256: df714e1448cd9cb4c916cf668ab88323032e61ece733548708d996ecf63190b9

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - setuptools >=42
    - wheel
    - pip
  run:
    - python >=${{ python_min }}

tests:
  - python:
      imports:
        - log_throttling
      pip_check: true
      python_version: ${{ python_min }}.*

about:
  summary: A python log throttling utility
  description: |
    log-throttling is a small utility to throttle repeated calls to
    Python's standard logging. It limits how often identical log
    statements are actually emitted, either by a minimum time interval or
    by call count, which prevents log flooding when logging from tight
    loops or frequently triggered code paths.
  license: MIT
  license_file: LICENSE
  # No repository available (github.com/MPalarya/log-throttling is gone);
  # only the PyPI project page is publicly accessible.
  homepage: https://pypi.org/project/log-throttling/

extra:
  recipe-maintainers:
    - ruben-arts
