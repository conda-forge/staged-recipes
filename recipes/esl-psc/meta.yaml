{% set name = "esl-psc" %}
{% set version = "2.4.2" %}
{% set sha256 = "75bae8d93d13a161d154becb57e088140f2430e2305fdeec6a21d99fa31339b8" %}

package:
  name: {{ name }}
  version: {{ version }}

source:
  url: https://github.com/John-Allard/ESL-PSC/archive/refs/tags/v{{ version }}.tar.gz
  sha256: {{ sha256 }}

build:
  number: 0

requirements:
  build:
    - {{ compiler('rust') }}
    - {{ stdlib("c") }}
    - cargo-auditable
  host:
    - python
  run:
    - python
    - numpy >=1.20.0
    - pandas >=1.3.0
    - matplotlib-base >=3.4.0
    - seaborn >=0.11.0
    - biopython >=1.85.0
    - libgcc  # [linux]

test:
  commands:
    - esl-psc --help
    - esl-psc pairs --help
    - esl-psc site-counter --help
    - esl-psc plot --help
    - python -c "import esl_psc_cli"
    - python -c "import gui.core.fast_scan"

about:
  home: https://github.com/John-Allard/ESL-PSC
  summary: Evolutionary Sparse Learning with Paired Species Contrast (ESL-PSC)
  license: MIT
  license_file: LICENSE
  dev_url: https://github.com/John-Allard/ESL-PSC

extra:
  recipe-maintainers:
    - John-Allard
