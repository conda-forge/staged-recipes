{% set name = "esl-psc" %}
{% set version = "2.4.1" %}
{% set sha256 = "669d2fca928f61082c37965792a284ca1b992024c7697650713ca1fb835ea4a0" %}

package:
  name: {{ name }}
  version: {{ version }}

source:
  url: https://github.com/John-Allard/ESL-PSC/archive/refs/tags/v{{ version }}.tar.gz
  sha256: {{ sha256 }}

build:
  number: 0

requirements:
  build:
    - {{ compiler('c') }}
    - {{ compiler('cxx') }}
    - {{ compiler('rust') }}
    - {{ stdlib("c") }}
  host:
    - python
  run:
    - python
    - numpy >=1.20.0
    - pandas >=1.3.0
    - matplotlib-base >=3.4.0
    - seaborn >=0.11.0
    - biopython >=1.85.0

test:
  commands:
    - esl-psc --help
    - esl-psc pairs --help
    - esl-psc site-counter --help
    - esl-psc plot --help
    - python -c "import esl_psc_cli"
    - python -c "import gui.core.fast_scan"

about:
  home: https://github.com/John-Allard/ESL-PSC
  summary: Evolutionary Sparse Learning with Paired Species Contrast (ESL-PSC)
  license: LicenseRef-NOASSERTION
  dev_url: https://github.com/John-Allard/ESL-PSC

extra:
  recipe-maintainers:
    - John-Allard
