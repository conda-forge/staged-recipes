schema_version: 1

context:
  python_min: "3.11"
  version: "0.5.14"

package:
  name: ministats
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/m/ministats/ministats-${{ version }}.tar.gz
  sha256: 8df3600949a0f69c69183effe4bb24113be6c2282ca53b5a8634562e71dceba2

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
  run:
    - python >=${{ python_min }}
    - numpy <2.4
    - scipy ==1.17.1
    - pandas ==3.0.1
    - seaborn ==0.13.2
    - bambi ==0.17.2
    - pymc ==5.28.1
    - pytensor ==2.38.2
    - arviz <1.0
    - statsmodels ==0.14.6
    - matplotlib-base ==3.10.8
    - pingouin ==0.6.0

tests:
  - python:
      imports:
        - ministats
      pip_check: true
      python_version: ${{ python_min }}.*

about:
  summary: Common statistical testing procedures used for STATS 101 topics. The code is intentionally simple to make it easy to follow for beginners.
  license: MIT
  license_file: LICENSE
  homepage: https://github.com/minireference/ministats

extra:
  recipe-maintainers:
    - ivanistheone
