# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json

context:
  name: cel-spec-proto-python
  version: "0.25.1"

package:
  name: ${{ name }}
  version: ${{ version }}

source:
  url: https://github.com/google/cel-spec/archive/refs/tags/v${{ version }}.tar.gz
  sha256: 13583c5a312861648449845b709722676a3c9b43396b6b8e9cbe4538feb74ad2

build:
  number: 0
  noarch: python
  script: bash ${{ RECIPE_DIR }}/build.sh

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - setuptools
    - libprotobuf 6.33.*
  run:
    - python >=${{ python_min }}
    - protobuf >=5

tests:
  - python:
      imports:
        - cel_spec_proto_python.expr.syntax_pb2
        - cel_spec_proto_python.expr.checked_pb2
        - cel_spec_proto_python.expr.value_pb2
        - cel_spec_proto_python.expr.eval_pb2
        - cel_spec_proto_python.expr.explain_pb2
        - cel_spec_proto_python.expr.conformance.conformance_service_pb2
        - cel_spec_proto_python.expr.conformance.env_config_pb2
        - cel_spec_proto_python.expr.conformance.proto2.test_all_types_pb2
        - cel_spec_proto_python.expr.conformance.proto2.test_all_types_extensions_pb2
        - cel_spec_proto_python.expr.conformance.proto3.test_all_types_pb2
        - cel_spec_proto_python.expr.conformance.test.simple_pb2
        - cel_spec_proto_python.expr.conformance.test.suite_pb2
        - cel_spec_proto_python.policy.policy_pb2
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - '*'
  - if: unix
    then:
      script:
        - python test_deserialize.py
      requirements:
        run:
          - cel-expr-python >=0.1.1
      files:
        recipe:
          - test_deserialize.py

about:
  homepage: https://github.com/google/cel-spec
  license: Apache-2.0
  license_file: LICENSE
  summary: Python protobuf stubs for the Common Expression Language (CEL) specification
  description: |
    Python protobuf bindings generated from the .proto files in the
    google/cel-spec repository.
  repository: https://github.com/google/cel-spec

extra:
  recipe-maintainers:
    - swenger
