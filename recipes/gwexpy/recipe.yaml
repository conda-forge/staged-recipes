context:
  name: gwexpy
  version: "0.1.1"
  python_min: "3.11"

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/g/gwexpy/gwexpy-${{ version }}.tar.gz
  sha256: 82176ef7c07d1196755eb7f113d5a74988466d6f373da4a92711c77d9bf13092

build:
  number: 0
  noarch: python
  script: python -m pip install . -vv --no-deps --no-build-isolation
  python:
    entry_points:
      - gwexpy = gwexpy.cli:main

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - setuptools >=68
    - wheel
  run:
    - python >=${{ python_min }}
    - numpy >=1.23.2,<2.0.0
    - scipy >=1.10.0
    - astropy-base >=5.0
    - gwpy >=4.0.0,<5.0.0
    - pandas >=1.5.0
    - matplotlib-base >=3.5.0
    - typing-extensions
    - bottleneck
    - h5py
    - igwn-segments
    - ligotimegps
    - gpstime

tests:
  - python:
      imports:
        - gwexpy
      pip_check: true
      python_version: ${{ python_min }}.*
  - script:
      - python -m pip check
      - gwexpy --help
      - python -c "import gwexpy; gwexpy.register_all()"
      - python -c "import importlib.util; assert importlib.util.find_spec('gwexpy.gui') is None"
      - python -c "import importlib.util; assert importlib.util.find_spec('gwexpy.utils.sphinx') is None"
      - python -c "from gwexpy.timeseries import TimeSeries; ts = TimeSeries([1, 2, 3], dt=1); assert ts.shape == (3,)"
    requirements:
      run:
        - python
        - pip

about:
  homepage: https://github.com/tatsuki-washimi/gwexpy
  repository: https://github.com/tatsuki-washimi/gwexpy
  documentation: https://tatsuki-washimi.github.io/gwexpy/
  summary: GWpy extensions for gravitational-wave experimental data analysis
  description: |
    GWexpy extends GWpy with matrix-aware containers, field operations, fitting
    workflows, expanded I/O, and interoperability layers for experimental
    physics and gravitational-wave data analysis.
  license: MIT
  license_file: LICENSE.txt

extra:
  recipe-maintainers:
    - tatsuki-washimi
