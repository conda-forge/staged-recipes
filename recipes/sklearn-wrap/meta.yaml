{% set version = "0.1.0a3" %}

package:
  name: sklearn-wrap
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/s/sklearn-wrap/sklearn_wrap-{{ version }}.tar.gz
  sha256: d187577af84f974d69d37c6026d2dcb0d3a9f8cafddb0f0e6338b000ea070b3c

build:
  entry_points:
    - pytest = pytest:console_main
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python >=3.11
    - hatchling
    - hatch-vcs
    - pip
  run:
    - python >=3.11
    - scikit-learn >=1.6.0
    - joblib >=1.2.0

test:
  imports:
    - sklearn_wrap
  commands:
    - pip check
    - pytest --help
  requires:
    - pip
    - python

about:
  home: https://github.com/stateful-y/sklearn-wrap
  summary: A Package for wrapping Python classes into Scikit-Learn estimators
  doc_url: https://sklearn-wrap.readthedocs.io
  license: Apache-2.0
  license_file: LICENSE

extra:
  recipe-maintainers:
    - gtauzin
