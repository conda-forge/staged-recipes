{% set name = "projectdavid" %}
{% set version = "1.97.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/projectdavid-{{ version }}.tar.gz
  sha256: 8bcb31ad37a454662974d18644848f49a461dbd6cc001a1f4ac34f68c889427c

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python >=3.9
    - pip
    - setuptools >=61.0
    - wheel
  run:
    - python >=3.9
    - httpx >=0.25.2,<0.29
    - pydantic >=2.0,<3.0
    - python-dotenv >=1.0.1,<2.0
    - aiofiles >=23.2.1,<25.0
    - projectdavid_common >=0.64.1
    - qdrant-client >=1.0.0,<2.0.0
    - pdfplumber >=0.11.0,<0.12.0
    - validators >=0.29.0,<0.35.0
    - nest-asyncio >=1.6.0,<2.0
    - requests >=2.31.0,<3.0
    - sseclient-py >=1.7.2,<2.0
    - python-docx >=1.1.0,<2.0
    - python-pptx >=1.0.0,<2.0

test:
  imports:
    - projectdavid
  commands:
    - pip check
  requires:
    - pip

about:
  home: https://projectdavid.co.uk
  summary: Python SDK for interacting with the Project David Platform Assistant API.
  description: |
    Project David is a sovereign AI runtime implementing the OpenAI Assistants API
    specification, designed airgap-first for organisations that cannot use cloud-based
    AI providers. This package provides the Python SDK for interacting with the platform.
  license: LicenseRef-PolyForm-Noncommercial-1.0.0
  license_file: LICENSE
  doc_url: https://docs.projectdavid.co.uk
  dev_url: https://github.com/frankie336/projectdavid

extra:
  recipe-maintainers:
    - frankie336