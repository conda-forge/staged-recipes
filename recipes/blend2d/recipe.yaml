context:
  version: "0.21.2"
  commit: "6dbc2cefbc996379e07104e34519a440b49b15d7"

package:
  name: blend2d
  version: ${{ version }}

source:
  url: https://github.com/blend2d/blend2d/archive/${{ commit }}.tar.gz
  sha256: 212a77ceebf8c37ad5ca7e7eac1757ce7aa911b88085b076a9ed24f6de6e36fa

build:
  number: 0

requirements:
  build:
    - ${{ compiler('c') }}
    - ${{ compiler('cxx') }}
    - ${{ stdlib('c') }}
    - cmake
    - ninja
  host:
    - asmjit

tests:
  - package_contents:
      include:
        - blend2d.h
      lib:
        - blend2d

about:
  homepage: https://blend2d.com
  repository: https://github.com/blend2d/blend2d
  license: Zlib
  license_file: LICENSE.md
  summary: 2D vector graphics engine powered by a JIT compiler
  description: |
    Blend2D is a high performance 2D vector graphics engine written in C++
    and released under the Zlib license. The engine utilizes a built-in JIT
    compiler to generate optimized pipelines at runtime and is also capable
    of using a reference pipeline for environments where JIT compilation is
    not possible.

extra:
  recipe-maintainers:
    - kklein
