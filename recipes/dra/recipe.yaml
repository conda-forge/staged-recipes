context:
  version: "0.10.1"

package:
  name: dra
  version: ${{ version }}

source:
  url: https://github.com/devmatteini/dra/archive/refs/tags/${{ version }}.tar.gz
  sha256: 81fc4e6bd174d238932a6415db7029a84acda5f4dc84a285ee0a10c6b3cb3580

build:
  number: 0
  script:
    env:
      CARGO_PROFILE_RELEASE_STRIP: symbols
      CARGO_PROFILE_RELEASE_LTO: fat
    content:
      - if: unix
        then:
          - cargo auditable install --locked --no-track --bins --root ${{ PREFIX }} --path .
          # generate shell completions
          - mkdir -p $PREFIX/share/bash-completion/completions $PREFIX/share/fish/vendor_completions.d $PREFIX/share/zsh/site-functions
          - $PREFIX/bin/dra completion bash > $PREFIX/share/bash-completion/completions/dra
          - $PREFIX/bin/dra completion fish > $PREFIX/share/fish/vendor_completions.d/dra.fish
          - $PREFIX/bin/dra completion zsh > $PREFIX/share/zsh/site-functions/_dra
        else:
          - cargo auditable install --locked --no-track --bins --root %LIBRARY_PREFIX% --path .
          # generate shell completions
          - mkdir %LIBRARY_PREFIX%\share\bash-completion\completions
          - mkdir %LIBRARY_PREFIX%\share\fish\vendor_completions.d
          - mkdir %LIBRARY_PREFIX%\share\zsh\site-functions
          - '%LIBRARY_BIN%\dra.exe completion bash > %LIBRARY_PREFIX%\share\bash-completion\completions\dra'
          - '%LIBRARY_BIN%\dra.exe completion fish > %LIBRARY_PREFIX%\share\fish\vendor_completions.d\dra.fish'
          - '%LIBRARY_BIN%\dra.exe completion zsh > %LIBRARY_PREFIX%\share\zsh\site-functions\_dra'
      - cargo-bundle-licenses --format yaml --output ./THIRDPARTY.yml

requirements:
  build:
    - ${{ stdlib('c') }}
    - ${{ compiler('c') }}
    - ${{ compiler('rust') }}
    - cargo-bundle-licenses
    - cargo-auditable

tests:
  - script:
      - dra --help
      - dra --version
  - package_contents:
      bin:
        - dra
      files:
        - if: unix
          then:
            - share/bash-completion/completions/dra
            - share/fish/vendor_completions.d/dra.fish
            - share/zsh/site-functions/_dra
        - if: win
          then:
            - Library/share/bash-completion/completions/dra
            - Library/share/fish/vendor_completions.d/dra.fish
            - Library/share/zsh/site-functions/_dra
      strict: true

about:
  homepage: https://github.com/devmatteini/dra
  summary: Download and install release assets from GitHub
  description: |
    dra eases downloading and installing release assets from GitHub:
    no authentication needed for public repositories, built-in generation
    of patterns to select an asset to download, automatic selection based
    on your operating system and architecture, and support for downloading
    and installing assets in the most common formats.
  license: MIT
  license_file:
    - LICENSE
    - THIRDPARTY.yml
  repository: https://github.com/devmatteini/dra

extra:
  recipe-maintainers:
    - salim-b
