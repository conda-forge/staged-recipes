schema_version: 1

context:
  version: "0.5.4"

package:
  name: polyglot-sql
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/p/polyglot-sql/polyglot_sql-${{ version }}.tar.gz
  sha256: f49636e056631b9a310f667360c45d1b0864ba0ec0297dabfab5a5d4e7556297

build:
  number: 0
  skip:
    - match(python, "<3.10")
  script:
    - cargo-bundle-licenses --format yaml --output THIRDPARTY.yml
    - ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  build:
    - ${{ compiler('c') }}
    - ${{ stdlib('c') }}
    - ${{ compiler('rust') }}
    - cargo-bundle-licenses
  host:
    - python
    - pip
    - maturin >=1.7,<2.0
  run:
    - python

tests:
  - python:
      imports:
        - polyglot_sql
  - requirements:
      run:
        - python
        - pip
    script:
      - pip check
      - python -c "import polyglot_sql; assert polyglot_sql.transpile('SELECT IFNULL(a, b) FROM t', read='mysql', write='postgres') == ['SELECT COALESCE(a, b) FROM t']"

about:
  homepage: https://github.com/tobilg/polyglot
  repository: https://github.com/tobilg/polyglot
  documentation: https://polyglot.gh.tobilg.com
  summary: Rust-powered SQL transpiler for 32+ dialects.
  license: MIT
  license_file:
    - LICENSE
    - THIRDPARTY.yml

extra:
  recipe-maintainers:
    - geoHeil
