context:
  version: "0.3.6"

package:
  name: weave-merge
  version: ${{ version }}

source:
  url: https://github.com/Ataraxy-Labs/weave/archive/refs/tags/v${{ version }}.tar.gz
  sha256: 3795fcc28ada8b522fb0081a1b8f3ace6e4f61d7be46fdb3cf588777b5f0608f

build:
  number: 0
  script:
    env:
      CARGO_PROFILE_RELEASE_STRIP: symbols
      CARGO_PROFILE_RELEASE_LTO: fat
    content:
      - if: win
        then:
          - cargo auditable install --locked --root %LIBRARY_PATH% --path crates/weave-cli --no-track
          - cargo auditable install --locked --root %LIBRARY_PATH% --path crates/weave-driver --no-track
        else:
          - export OPENSSL_DIR=$PREFIX
          - cargo auditable install --locked --root ${{ PREFIX }} --path crates/weave-cli --no-track
          - cargo auditable install --locked --root ${{ PREFIX }} --path crates/weave-driver --no-track
      - cargo-bundle-licenses --format yaml --output THIRDPARTY.yml

requirements:
  build:
    - ${{ compiler("rust") }}
    - cargo-auditable
    - cargo-bundle-licenses
  host:
    - if: unix
      then: openssl

tests:
  - script: weave --help
  - package_contents:
      bin:
        - weave
        - weave-driver
      strict: true

about:
  homepage: https://ataraxy-labs.github.io/weave
  license: MIT OR Apache-2.0
  license_file:
    - LICENSE-APACHE
    - LICENSE-MIT
    - THIRDPARTY.yml
  summary: Entity-level semantic merge driver for Git
  description: |
    Resolves merge conflicts that Git can't by understanding
    code structure via tree-sitter
  repository: https://github.com/Ataraxy-Labs/weave

extra:
  recipe-maintainers:
    - chawyehsu
