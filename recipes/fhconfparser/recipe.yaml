context:
  version: "2024.1"
  build_number: "0"

package:
  name: fhconfparser
  version: ${{ version }}

source:
  - url: https://pypi.org/packages/source/f/fhconfparser/fhconfparser-${{ version }}.tar.gz
    sha256: de8af019f0071e614d523985e1d93e0fce20a409d1c64dead03b1b665d4b2e4d

build:
  number: 0
  script: ${{ PYTHON }} -m pip install .
  noarch: python

requirements:
  host:
    - python ${{ python_min }}.*
    - poetry-core
    - pip
  run:
    - python >=${{ python_min }}
    - attrs >=23.2.0,<24
    - tomli >=2.0.1,<3

tests:
  - python:
      imports:
        - fhconfparser
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  homepage: https://github.com/FHPythonUtils/FHConfParser
  summary: Provides a config language independent way to read a config file.
  license: MIT
  license_file: LICENSE.md
  documentation: https://github.com/FHPythonUtils/FHConfParser/blob/master/README.md

extra:
  recipe-maintainers:
    - carlodri
