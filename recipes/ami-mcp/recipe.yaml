schema_version: 1

context:
  version: "0.1.0"
  python_min: "3.10"

package:
  name: ami-mcp
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/a/ami_mcp/ami_mcp-${{ version }}.tar.gz
  sha256: d88cc433894e9a75e3e16aa89fff35d93a7a00e4fc0e2d89d14b0403539cfb7a

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  python:
    entry_points:
      - ami-mcp=ami_mcp.cli:main

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - hatchling >=0.7
  run:
    - python >=${{ python_min }}
    - pyami-atlas
    - mcp >=1.0
    - ca-policy-lcg  # for cert

tests:
  - python:
      imports:
        - ami_mcp
      pip_check: true
      python_version: ${{ python_min }}.*
  - script:
      - ami-mcp --help

about:
  summary: An MCP server that exposes ATLAS Metadata Information (AMI) operations as tools for LLMs.
  homepage: https://ami-mcp.readthedocs.io/en/latest/
  repository: https://github.com/kratsg/ami-mcp
  documentation: https://ami-mcp.readthedocs.io/en/latest/
  license: Apache-2.0
  license_file: LICENSE

extra:
  recipe-maintainers:
    - kratsg
