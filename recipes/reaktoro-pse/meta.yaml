{% set name = "reaktoro-pse" %}
{% set version = "0.3.0" %}

package:
  name: {{ name|lower}}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/r/reaktoro-pse/reaktoro_pse-{{ version }}.tar.gz
  sha256: 669de1b69249c7a9fcdf449f4fd9c40b9f04c386464cb14b3182f951d01a6a6d

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python
    - setuptools >=64
    - setuptools-scm >=7
    - pip
  run:
    - python
    - pyomo
    - watertap-solvers >=24.12.9

test:
  imports:
    - reaktoro_pse
  commands:
    - pip check
  requires:
    - pip
    - python

about:
  home: https://pypi.org/project/reaktoro-pse/
  license_family: BSD
  license: BSD-3-Clause
  license_file:
    - LICENSE.md
    - COPYRIGHT.md
  summary: "Reaktoro-PSE is a package for configuring Reaktoro as a gray box model in Pyomo, IDAES-PSE, and WaterTAP modeling libraries. "
  dev_url: "https://github.com/watertap-org/reaktoro-pse"

extra:
  recipe-maintainers:
    - sufikaur
    - lbianchi-lbl
    -  sbeattie