# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "0.1.7"

package:
  name: lyric-js-worker
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/l/lyric-js-worker/lyric_js_worker-${{ version }}.tar.gz
  sha256: 3c18e565d230fabc1b1d5b08d2a3a9472b40446faa18f43ad03e2f66c5d3022c

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . --no-deps --no-build-isolation -vv

requirements:
  host:
    - python ${{ python_min }}.*
    - hatchling
    - pip
  run:
    - python >=${{ python_min }}
    - lyric-task >=${{ version }}

tests:
  - python:
      imports:
        - lyric_js_worker
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"
  - script:
      - python -c "import os, lyric_js_worker as m; w = os.path.join(os.path.dirname(m.__file__), 'javascript_worker.wasm'); assert os.path.isfile(w), w; print('wasm OK:', os.path.getsize(w), 'bytes')"

about:
  homepage: https://github.com/lyric-project/lyric-runtime
  repository: https://github.com/lyric-project/lyric-runtime
  license: MIT
  license_file: LICENSE
  summary: Default JavaScript WebAssembly worker for Lyric (pre-built WASI component).

extra:
  recipe-maintainers:
    - rxm7706
