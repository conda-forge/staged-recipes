schema_version: 1

context:
  version: "0.4.0"

package:
  name: jupyter-chat-components
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/j/jupyter-chat-components/jupyter_chat_components-${{ version }}.tar.gz
  sha256: faeade7b51ba4cddf73d7dadce6567171102a1e6f4c43d066f124a657363c395

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - hatch-jupyter-builder >=0.5
    - hatchling >=1.5.0
    - jupyterlab >=4.0.0,<5
    - hatch-nodejs-version >=0.3.2
    - pip
  run:
    - python >=${{ python_min }}

tests:
  - python:
      python_version: ${{ python_min }}.*
      pip_check: true
      imports: jupyter_chat_components
  - script:
      - jupyter labextension list 2>&1 | rg -ie "jupyter-chat-components.*OK"
    requirements:
      run:
        - python ${{ python_min }}.*
        - jupyterlab >=4.5.0,<5
        - ripgrep

about:
  summary: Components to displayed in jupyter chat
  license: BSD-3-Clause
  license_file: LICENSE
  homepage: https://github.com/brichet/jupyter-chat-components

extra:
  recipe-maintainers:
    - brichet
    - jtpio
