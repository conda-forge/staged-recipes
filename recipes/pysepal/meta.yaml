{% set name = "pysepal" %}
{% set version = "3.3.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz
  sha256: abbc938b3c590336250f1f3b13230acde64a73a0c3648dd98f64cbfe8d92229e

build:
  entry_points:
    - module_deploy = pysepal.bin.module_deploy:main
    - module_factory = pysepal.bin.module_factory:main
    - module_l10n = pysepal.bin.module_l10n:main
    - module_theme = pysepal.bin.module_theme:main
    - module_venv = pysepal.bin.module_venv:main
    - activate_venv = pysepal.bin.activate_venv:main
    - sepal_ipyvuetify = pysepal.bin.sepal_ipyvuetify:main
    - entry_point = pysepal.bin.entry_point:main
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - pip
    - setuptools >=61.2
    - wheel
  run:
    - python >={{ python_min }}
    - tomli
    - ipykernel
    - ipyvuetify
    - markdown
    - ipyleaflet >=0.14.0
    - earthengine-api >1.6.0
    - colorama
    - pipreqs
    - rioxarray
    - dask
    - geopandas >=0.14.0
    - matplotlib-base
    - jupyter-server-proxy
    - planet >=2.0,<3.0
    - pyarrow
    - localtileserver >=0.10.1
    - pygaul >=0.4.2
    - pygadm >=0.5.0
    - python-box
    - tqdm
    - deprecated >=1.2.14
    - anyascii
    - natsort
    - typing-extensions
    - solara
    - ee-client >=2.5.0
    - colorlog
    - reactivex

test:
  imports:
    - pysepal
  commands:
    - module_deploy --help
    - module_factory --help
    - module_l10n --help
    - module_theme --help
    - module_venv --help
    - activate_venv --help
    - sepal_ipyvuetify --help
    - entry_point --help
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://github.com/openforis/pysepal
  summary: Wrapper for ipyvuetify widgets to unify the display of voila dashboards in SEPAL platform
  description: |
    pysepal is a library designed to create elegant Python-based dashboards
    in the SEPAL environment. It is built on top of ipyvuetify and helps
    developers easily create interfaces for their geospatial workflows.
    Previously published as sepal-ui, the package has been renamed to pysepal.
  license: MIT
  license_family: MIT
  license_file: LICENSE.txt
  doc_url: https://sepal-ui.readthedocs.io/en/latest/
  dev_url: https://github.com/openforis/pysepal

extra:
  recipe-maintainers:
    - dfguerrerom
    - 12rambau
