{% set name = "htrmopo" %}
{% set version = "0.5" %}

package:
  name: {{ name|lower }}
  version: "{{ version }}"

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz
  sha256: 900f1111e7d7ab05eda0e69d243a12bada07d0360d52b3b018d7b6b722a5a787

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  entry_points:
    - htrmopo = htrmopo.cli:cli
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - hatchling
    - versioningit
    - pip
  run:
    - python >={{ python_min }}
    - click
    - rich
    - lxml
    - flufl.lock
    - requests
    - pyyaml
    - sickle
    - markdown
    - jsonschema
    - python-dateutil
    - platformdirs

test:
  imports:
    - htrmopo
  commands:
    - pip check
    - htrmopo --help
  requires:
    - pip
    - python {{ python_min }}

about:
  home: http://htrmopo.github.io
  summary: HTRMoPo repository reference implementation
  license: Apache-2.0
  license_file: LICENSE

extra:
  recipe-maintainers:
    - IvoLeist
