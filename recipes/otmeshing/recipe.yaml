context:
  version: "0.1"

package:
  name: otmeshing
  version: ${{ version }}

source:
  url: https://github.com/openturns/otmeshing/archive/v${{ version }}.tar.gz
  sha256: 5425dbc429e1b0baa8b1e5202e7fd9c8ee8c401b781ab2561e8107b5aafacf7a

build:
  number: 0
  python:
    version_independent: true
  skip:
    - win

requirements:
  build:
    - cmake
    - ninja
    - swig
    - ${{ compiler('c') }}
    - ${{ stdlib("c") }}
    - ${{ compiler('cxx') }}
    - if: build_platform != target_platform
      then:
        - python-abi3 ${{ python_min }}.*
        - python ${{ python_min }}.*
        - cross-python_${{ target_platform }}
  host:
    - python-abi3 ${{ python_min }}.*
    - python ${{ python_min }}.*
    - openturns
    - cddlib
    - qhull
    - cgal-cpp
  run:
    - python >=${{ python_min }}
  run_exports:
    - ${{ pin_subpackage('otmeshing', upper_bound='x.x') }}

tests:
  - python:
      imports:
        - otmeshing

about:
  homepage: http://openturns.org/
  license: GPL-3.0-or-later
  license_family: GPL
  license_file: COPYING
  summary: Meshing module
  documentation: https://openturns.github.io/otmeshing/master/
  repository: https://github.com/openturns/otmeshing

extra:
  recipe-maintainers:
    - jschueller
