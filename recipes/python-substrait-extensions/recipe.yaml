schema_version: 1

context:
  version: "0.79.0"
  python_min: "3.10"

package:
  name: python-substrait-extensions
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/s/substrait-extensions/substrait_extensions-${{ version }}.tar.gz
  sha256: ae295944eb007d5d8243b4e9b818635ee054c6cab224b28e2d45746541b384f2

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - setuptools >=80
    - pip
  run:
    - python >=${{ python_min }}

tests:
  - python:
      imports:
        - substrait_extensions.extensions.simple_extensions
      pip_check: true
      python_version: ${{ python_min }}.*

about:
  summary: Packaged Substrait Extension Files
  license: Apache-2.0
  license_file: LICENSE
  homepage: https://substrait.io
  repository: https://github.com/substrait-io/substrait-packaging

extra:
  recipe-maintainers:
    - nielspardon
