schema_version: 1

context:
  version: "0.0.1"

package:
  name: nmlform
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/n/nmlform/nmlform-${{ version }}.tar.gz
  sha256: e19b71288929026dd0dd99ae8d28c168922db348e44debce9f0651b6203bd588

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  python:
    entry_points:
      - nmlform = nmlform.main:cli_main
      - nmlform-set = nmlform.apply:cli_main_set

requirements:
  host:
    - python ${{ python_min }}.*
    - setuptools >=60
    - setuptools-scm >=8.0
    - pip
  run:
    - python >=${{ python_min }}

tests:
  - python:
      python_version:
        - ${{ python_min }}.*
        - "*"
      imports:
        - nmlform
      pip_check: true
  - requirements:
      run:
        - python ${{ python_min }}.*
    script:
      - nmlform --help
      - nmlform-set --help

about:
  summary: A round-trip parser and formatter of Fortran namelists
  license: BSD-3-Clause
  license_file: LICENSE
  homepage: https://github.com/ken-lauer/nmlform
  repository: https://github.com/ken-lauer/nmlform
  documentation: https://ken-lauer.github.io/nmlform

extra:
  recipe-maintainers:
    - ken-lauer
