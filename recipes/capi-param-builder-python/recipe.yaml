schema_version: 1

context:
  name: capi-param-builder-python
  version: "1.3.0"

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/${{ name[0] }}/${{ name }}/capi_param_builder_python-${{ version }}.tar.gz
  sha256: 154ed35227c1f10040073b1912f6c075cdc72cddc98a8948ca80a18877c0817b

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - setuptools
  run:
    - python >=${{ python_min }}

tests:
  - python:
      imports:
        - capi_param_builder
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  summary: Parameter builder SDK for Conversion API events
  license: LicenseRef-Facebook-Platform
  license_file: LICENSE
  homepage: https://github.com/facebook/capi-param-builder/tree/main/python
  repository: https://github.com/facebook/capi-param-builder
  documentation: https://github.com/facebook/capi-param-builder/blob/main/README.md

extra:
  recipe-maintainers:
    - xylar
