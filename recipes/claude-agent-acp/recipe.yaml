context:
  version: "0.21.0"

package:
  name: claude-agent-acp
  version: ${{ version }}

source:
  url: https://registry.npmjs.org/@zed-industries/claude-agent-acp/-/claude-agent-acp-${{ version }}.tgz
  sha256: 610cc41d23e339c328ce4ca75dafbb85759d1f3381a9401644ef1288236fe59f

build:
  noarch: generic
  number: 0
  script: build.sh

requirements:
  build:
    - nodejs
    - pnpm
    - pnpm-licenses
  run:
    - nodejs

tests:
  - package_contents:
      bin:
        - claude-agent-acp
  - script:
      - test -z "$(find ${PREFIX}/lib/node_modules/@zed-industries/claude-agent-acp -type l)"

about:
  homepage: https://github.com/zed-industries/claude-agent-acp
  summary: Bridges the Claude Agent SDK to the Agent Client Protocol (ACP)
  description: |
    claude-agent-acp is a TypeScript CLI tool by Zed Industries that bridges
    the Claude Agent SDK to the Agent Client Protocol (ACP), enabling Claude
    to be used as an ACP-compatible agent.
  license: Apache-2.0
  license_file:
    - LICENSE
    - third-party-licenses.txt
  repository: https://github.com/zed-industries/claude-agent-acp

extra:
  recipe-maintainers:
    - tdejager
