{% set version = "1.1" %}
{% set posix = 'm2-' if win else '' %}

package:
  name: r-circe
  version: {{ version|replace("-", "_") }}

source:
  url:     {{ cran_mirror }}/src/contrib/Archive/CircE/CircE_{{ version }}.tar.gz
  sha256: e267184f2dd0197f08af79e7442e73164211f0f0bac2696a42e3f1b4ff507291

build:
  number: 0
  noarch: generic
  rpaths:
    - lib/R/lib/
    - lib/
  missing_dso_whitelist:
    - '*/R.dll'        # [win]
    - '*/Rblas.dll'    # [win]
    - '*/Rlapack.dll'  # [win]

requirements:
  build:
    - {{ posix }}zip               # [win]
    - cross-r-base {{ r_base }}    # [build_platform != target_platform]
  host:
    - r-base
  run:
    - r-base

test:
  commands:
    - $R -e "library('CircE')"           # [not win]
    - "\"%R%\" -e \"library('CircE')\""  # [win]

about:
  home: https://CRAN.R-project.org/package=CircE
  license: GPL-2.0-only
  summary: This package contains functions for fitting circumplex structural models for correlation
    matrices (with negative correlation) by the method of maximum likelihood.
  license_family: GPL2
  license_file:
    - '{{ environ["PREFIX"] }}/lib/R/share/licenses/GPL-2'
extra:
  recipe-maintainers:
    - conda-forge/r
    - MitchellAcoustics

# Package: CircE
# Version: 1.1
# Date: 2014/7/8
# Title: Circumplex models Estimation
# Author: Michele Grassi <grassi.mic@gmail.com>
# Maintainer: Michele Grassi <grassi.mic@gmail.com>
# Depends: R (>= 1.6.0), stats
# Description: This package contains functions for fitting circumplex structural models for correlation matrices (with negative correlation) by the method of maximum likelihood.
# License: GPL (>= 2)
# LazyLoad: true
# Packaged: 2014-09-09 08:57:53 UTC; michelegrassi
# NeedsCompilation: no
# Repository: CRAN
# Date/Publication: 2014-09-09 14:12:27
