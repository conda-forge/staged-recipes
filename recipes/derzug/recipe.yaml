schema_version: 1

context:
  python_min: "3.13"
  version: "0.0.3"

package:
  name: derzug
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/d/derzug/derzug-${{ version }}.tar.gz
  sha256: d2e9e88cde0c12f1688d19bc62a6f998eb14f433f5e4dfe4c5211de5de418a46

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  python:
    entry_points:
      - derzug = derzug.cli:app

requirements:
  host:
    - python ${{ python_min }}.*
    - setuptools >=69
    - setuptools-git-versioning
    - scikit-build
    - pip
  run:
    - python >=${{ python_min }}
    - dascore >=0.1.15
    - pyqtgraph
    - orange3
    - typer
    - pyqt6
    - tiledb
    - python-duckdb

tests:
  - python:
      imports:
        - derzug
      pip_check: true
      python_version: ${{ python_min }}.*
  - requirements:
      run:
        - pip
        - python ${{ python_min }}.*
    script:
      - derzug --help

about:
  summary: A DFOS workflow engine with interactive visualizations.
  license: GPL-3.0-only
  license_file: LICENSE
  homepage: https://github.com/DASDAE/derzug
  repository: https://github.com/DASDAE/derzug
  documentation: https://github.com/DASDAE/derzug

extra:
  recipe-maintainers:
    - d-chambers
