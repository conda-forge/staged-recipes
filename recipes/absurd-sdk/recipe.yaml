context:
  version: "0.3.0"

package:
  name: absurd-sdk
  version: ${{ version }}

source:
  - url: https://pypi.org/packages/source/a/absurd-sdk/absurd_sdk-${{ version }}.tar.gz
    sha256: 4fa1c794e483f5b8893e86ac0a68ff005b0d059a14c4c93743f9ed45625ee206
  - url: https://raw.githubusercontent.com/earendil-works/absurd/main/LICENSE
    sha256: a60eea817514531668d7e00765731449fe14d059d3249e0bc93b36de45f759f2
    file_name: LICENSE

build:
  number: 0
  noarch: python
  script: python -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - uv-build
  run:
    - python >=${{ python_min }}
    - psycopg >=3.0.0

tests:
  - python:
      imports:
        - absurd_sdk
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  homepage: https://github.com/earendil-works/absurd
  summary: Python SDK for Absurd - PostgreSQL-based durable task execution
  license: Apache-2.0
  license_file: LICENSE

extra:
  recipe-maintainers:
    - StevenSchaererQC
