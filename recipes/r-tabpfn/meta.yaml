{% set version = '0.2.0' %}
{% set posix = 'm2-' if win else '' %}

package:
  name: r-tabpfn
  version: {{ version|replace("-", "_") }}

source:
  url:
    - {{ cran_mirror }}/src/contrib/tabpfn_{{ version }}.tar.gz
    - {{ cran_mirror }}/src/contrib/Archive/tabpfn/tabpfn_{{ version }}.tar.gz
  sha256: d459b1ef30f72ad5b193e352f72c3567a79b4221d9b1bf529b9b0965be45540a

build:
  number: 0
  noarch: generic
  rpaths:
    - lib/R/lib/
    - lib/
  missing_dso_whitelist:
    - '*/R.dll'        # [win]
    - '*/Rblas.dll'    # [win]
    - '*/Rlapack.dll'  # [win]

requirements:
  build:
    - {{ posix }}zip               # [win]
    - cross-r-base {{ r_base }}    # [build_platform != target_platform]
  host:
    - r-base
    - r-cli
    - r-dplyr
    - r-generics
    - r-hardhat
    - r-purrr
    - r-reticulate >=1.41.0.1
    - r-rlang >=1.1.0
    - r-tibble
  run:
    - r-base
    - r-cli
    - r-dplyr
    - r-generics
    - r-hardhat
    - r-purrr
    - r-reticulate >=1.41.0.1
    - r-rlang >=1.1.0
    - r-tibble

test:
  commands:
    - $R -e "library('tabpfn')"           # [not win]
    - "\"%R%\" -e \"library('tabpfn')\""  # [win]

about:
  home: https://tabpfn.tidymodels.org, https://github.com/tidymodels/tabpfn
  license: Apache-2.0
  summary: Provides a consistent API for classification and regression models based on the 'TabPFN'
    model of Hollmann et al. (2025), "Accurate predictions on small data with a tabular
    foundation model," Nature, 637(8045) <doi:10.1038/s41586-024-08328-6>. The calculations
    are served via 'Python' to train and predict the model.
  license_family: APACHE
  license_file:
    - LICENSE-2.0.txt

extra:
  recipe-maintainers:
    - conda-forge/r
