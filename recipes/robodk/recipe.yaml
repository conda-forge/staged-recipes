schema_version: 1

context:
  version: "5.9.2"

package:
  name: robodk
  version: ${{ version }}

source:
  # PyPI ships wheels only (no sdist), so build from the GitHub release tag.
  url: https://github.com/RoboDK/RoboDK-API/archive/refs/tags/${{ version }}.tar.gz
  sha256: 2e30713f9c0e46f1838b7b76a2a7fc0fbe26341a2860b12ad08695bfc407f213

build:
  noarch: python
  number: 0
  # The Python package lives in the Python/ subdirectory. Its setup.py reads
  # "README.md", but the tag ships that file lowercase as "readme.md". On
  # case-sensitive filesystems create the expected name; on case-insensitive
  # ones (macOS/Windows) it already resolves, so skip to avoid a copy error.
  script:
    - ${{ PYTHON }} -c "import os, shutil; shutil.copyfile('Python/readme.md', 'Python/README.md') if not os.path.exists('Python/README.md') else None"
    - ${{ PYTHON }} -m pip install ./Python -vv --no-deps --no-build-isolation 

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - setuptools
  run:
    - python >=${{ python_min }}

tests:
  - python:
      imports:
        - robodk
        - robolink
        - pylint_robodk
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  homepage: https://robodk.com/doc/en/PythonAPI/index.html
  summary: RoboDK tools for simulating and programming industrial robots (implements the RoboDK API)
  description: |
    The robodk package implements the RoboDK API for Python. It allows
    simulating and programming industrial robots, generating vendor-specific
    robot programs (offline programming), and interacting with a running
    RoboDK simulation. It provides a Python alternative to robot-specific
    programming languages across many robot manufacturers.
  license: Apache-2.0
  license_file: Python/LICENSE
  documentation: https://robodk.com/doc/en/PythonAPI/index.html
  repository: https://github.com/RoboDK/RoboDK-API

extra:
  recipe-maintainers:
    - rshanor
