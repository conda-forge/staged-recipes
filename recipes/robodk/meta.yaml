{% set name = "robodk" %}
{% set version = "5.9.4" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  # robodk publishes wheels only (no sdist on PyPI), so we build from the
  # pure-python wheel.
  url: https://pypi.org/packages/py3/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}-py3-none-any.whl
  sha256: 96e130b23ccd9f3503da42dea0f286ff6f00439ca2051edf0bbeb90d48389a24

build:
  noarch: python
  number: 0
  script: {{ PYTHON }} -m pip install {{ name }}-{{ version }}-py3-none-any.whl --no-deps --no-build-isolation -vv

requirements:
  host:
    - python >=3.5
    - pip
  run:
    - python >=3.5

test:
  imports:
    - robodk
    - robolink
    - pylint_robodk
  requires:
    - pip
  commands:
    - pip check

about:
  home: https://robodk.com/doc/en/PythonAPI/index.html
  summary: RoboDK tools for simulating and programming industrial robots (implements the RoboDK API)
  description: |
    The robodk package implements the RoboDK API for Python. It allows
    simulating and programming industrial robots, generating vendor-specific
    robot programs (offline programming), and interacting with a running
    RoboDK simulation. It provides a Python alternative to robot-specific
    programming languages across many robot manufacturers.
  license: Apache-2.0
  license_family: APACHE
  license_file: {{ SP_DIR }}/{{ name }}-{{ version }}.dist-info/LICENSE
  doc_url: https://robodk.com/doc/en/PythonAPI/index.html
  dev_url: https://github.com/RoboDK/RoboDK-API

extra:
  recipe-maintainers:
    - rshanor
