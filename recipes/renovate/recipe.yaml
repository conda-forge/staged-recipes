context:
  version: "43.195.6"

package:
  name: renovate
  version: ${{ version }}

source:
  url: https://github.com/renovatebot/renovate/archive/refs/tags/${{ version }}.tar.gz
  sha256: d067dba4f638f06a3a52ec0d286888c8f37526e11275c72afc1d378e7caf1851

build:
  number: 0
  skip:
    - win # renovate team does not support windows anymore
  script:
      - set -ex
      - npm version ${{ version }} # source does not maintain version in package.json
      - pnpm install --ignore-scripts
      - pnpm build
      - npm pkg delete scripts.prepare
      - npm pack --ignore-scripts
      - npm install --global ${SRC_DIR}/${PKG_NAME}-${PKG_VERSION}.tgz
      - pnpm-licenses generate-disclaimer --prod --output-file=third-party-licenses.txt

requirements:
  build:
    - nodejs
    - pnpm
    - pnpm-licenses
  host:
    - nodejs
  run:
    - nodejs

tests:
  - package_contents:
      bin:
        - renovate
  - script:
      - renovate --version | grep "${{ version }}"

about:
  homepage: https://docs.renovatebot.com
  summary: Automated dependency updates. Multi-platform and multi-language.
  description: |
    Renovate is an automated dependency update tool. It helps to update
    dependencies in your code without needing to do it manually. When Renovate
    runs on your repo, it looks for references to dependencies (both public
    and private) and, if there are newer versions available, Renovate can
    create pull requests to update your versions automatically.
  license: AGPL-3.0-only
  license_file:
    - license
    - third-party-licenses.txt
  documentation: https://docs.renovatebot.com
  repository: https://github.com/renovatebot/renovate

extra:
  recipe-maintainers:
    - AaronLionsheep
