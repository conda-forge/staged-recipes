{% set name = "condynsate" %}
{% set version = "0.5.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.io/packages/source/{{ name[0] }}/{{ name }}/condynsate-{{ version }}.tar.gz
  sha256: d50ab00cbe4dd01f3becb10e761bb5075fb6430cdbde89302b338226e5758b06

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python >=3.8
    - pip
  run:
    - python >=3.8
    - control
    - matplotlib-base
    - meshcat-python
    - notebook
    - numpy
    - pybullet
    - pynput
    - sympy

test:
  imports:
    - condynsate
  commands:
    - pip check
  requires:
    - pip

about:
  summary: Simulates and visualizes articulated systems in real time
  license: MIT
  license_file: LICENSE
  home: https://github.com/GrayKS3248/condynsate

extra:
  recipe-maintainers:
    - GrayKS3248
