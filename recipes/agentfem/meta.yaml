{% set name = "agentfem" %}
{% set version = "0.1.2" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz
  sha256: 889391dc0524bcaef3b6fd0b6dfd20e2dfbfdc4c966f724508c65c4e5a926604

build:
  skip: true  # [win or py<311]
  script: {{ PYTHON }} -m pip install . -vv
  number: 0

requirements:
  host:
    - python
    - pip
    - setuptools >=77
    - wheel
  run:
    - python
    - fenics-dolfinx
    - fenics-ufl
    - gmsh
    - mpi4py
    - numpy
    - petsc4py

test:
  imports:
    - agentfem
    - agentfem.fields
    - agentfem.materials
    - agentfem.mesh
    - agentfem.operators
  commands:
    - python -c "import agentfem; assert agentfem.__version__ == '{{ version }}'"

about:
  home: https://github.com/haoming-luo/agentfem
  summary: Agent-oriented finite-element workflow tools built on DOLFINx/PETSc.
  description: |
    AgentFEM is an agent-oriented finite-element workflow platform built on
    DOLFINx/PETSc. It keeps standard CAE concepts such as studies, models,
    fields, materials, loads, constraints, operators, solvers, and output
    visible to both researchers and AI agents.
  license: Apache-2.0
  license_file:
    - LICENSE
    - NOTICE
  dev_url: https://github.com/haoming-luo/agentfem
  doc_url: https://github.com/haoming-luo/agentfem#readme

extra:
  recipe-maintainers:
    - haoming-luo
