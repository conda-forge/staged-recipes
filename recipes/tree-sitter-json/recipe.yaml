schema_version: 1

context:
  version: "0.24.8"

package:
  name: tree-sitter-json
  version: ${{ version }}

source:
  - url: https://pypi.org/packages/source/t/tree-sitter-json/tree_sitter_json-${{ version }}.tar.gz
    sha256: ca8486e52e2d261819311d35cf98656123d59008c3b7dcf91e61d2c0c6f3120e

build:
  number: 0
  script:
    - ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation --disable-pip-version-check

requirements:
  build:
    - ${{ compiler("c") }}
    - ${{ stdlib("c") }}
    - if: build_platform != target_platform
      then:
        - python
        - cross-python_${{ target_platform }}
  host:
    - python
    - setuptools >=42
    - wheel
    - pip
  run:
    - python

tests:
  - python:
      imports:
        - tree_sitter_json
      pip_check: true

about:
  license: MIT
  license_file: LICENSE
  homepage: https://github.com/tree-sitter/tree-sitter-json
  summary: JSON grammar for tree-sitter.

extra:
  recipe-maintainers:
    - killua156
    - mgorny
