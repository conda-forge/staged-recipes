context:
  name: mambajs
  version: "0.20.1"

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://github.com/emscripten-forge/mambajs/archive/v${{ version }}.tar.gz
  sha256: 237f55316be787b1e846e67f561e968fdd22c7152bb3e22eddf4183d60bd8fce

build:
  noarch: generic
  script: |
    yarn
    yarn run build
    npm install -g packages/mambajs-cli
  number: 0

requirements:
  build:
    - yarn
    - nodejs
  host:
    - yarn
    - nodejs
  run:
    - nodejs

tests:
  - script:
    - mambajs --help

about:
  homepage: https://github.com/emscripten-forge/mambajs
  summary: 'Mambajs CLI for generating lock files'
  license: BSD-3-Clause
  license_file: LICENSE
  repository: https://github.com/emscripten-forge/mambajs

extra:
  recipe-maintainers:
    - martinRenou
