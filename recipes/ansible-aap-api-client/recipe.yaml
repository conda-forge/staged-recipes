schema_version: 1

context:
  version: "0.1.4"

package:
  name: ansible-aap-api-client
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/a/ansible-aap-api-client/ansible_aap_api_client-${{ version }}.tar.gz
  sha256: 0d133ac8b01fe84b6c57b1d1a3c71c979dbd2ba782bed661dac854d3e9f93786

build:
  noarch: python
  number: 0
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - setuptools >=67.6.0
  run:
    - python >=${{ python_min }}
    - requests ~=2.32.0

tests:
  - python:
      imports:
        - ansible_aap_api_client
      python_version: ${{ python_min }}.*
      pip_check: true

about:
  summary: |
    A client to interact with Ansible AAP REST API
  homepage: https://github.com/btr1975/ansible-aap-api-client
  repository: https://github.com/btr1975/ansible-aap-api-client
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - killua156
    - mgorny
