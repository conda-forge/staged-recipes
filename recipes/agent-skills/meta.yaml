{% set name = "agent-skills" %}
{% set version = "0.5.0" %} # Use the current date as a pseudo-version
{% set commit = "b3e905987490e948667f04d95ab3169236b9c212" %}

package:
  name: {{ name }}
  version: {{ version }}

source:
  git_url: https://github.com/addyosmani/agent-skills.git
  git_rev: {{ commit }}

build:
  number: 0
  noarch: generic
  script:
    # Create a directory in the conda environment to hold the skills
    - mkdir -p $PREFIX/share/agent-skills
    # Copy the essential agent files and documentation
    - cp -r skills $PREFIX/share/agent-skills/
    - cp -r docs $PREFIX/share/agent-skills/
    - cp AGENTS.md $PREFIX/share/agent-skills/

requirements:
  build:
    - nodejs 20.*
  host:
    - nodejs 20.*
  run:
    - __unix   # [unix]
    - __win    # [win]
    - nodejs >=20

about:
  home: https://github.com/addyosmani/agent-skills
  license: MIT
  license_file: LICENSE
  summary: Production-grade engineering skills for AI coding agents.
  description: |
    A collection of skills for Claude.ai and Claude Code for senior software engineers. 
    Skills are packaged instructions and scripts that extend AI coding agent capabilities.

extra:
  recipe-maintainers:
    - rxm7706
