context:
  name: detect-agent
  version: "0.2.0"
  python_min: '3.10'

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/d/detect-agent/detect_agent-${{ version }}.tar.gz
  sha256: da0287ca55c96c6ceb36004dd77cd05b7e6aa4c227f29760efdb163c24803ca6

build:
  number: 0
  noarch: python
  script: python -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - hatchling
  run:
    - python >=${{ python_min }}

tests:
  - python:
      imports:
        - detect_agent
      pip_check: true
      python_version: ${{ python_min }}.*

about:
  license: Apache-2.0
  license_file: LICENSE
  summary: Detect if code is running in an AI agent or automated development environment
  homepage: https://github.com/togethercomputer/detect_agent
  repository: https://github.com/togethercomputer/detect_agent

extra:
  recipe-maintainers:
    - timkpaine
