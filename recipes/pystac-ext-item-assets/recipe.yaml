schema_version: 1

context:
  version: "1.0.0"

package:
  name: pystac-ext-item-assets
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/p/pystac-ext-item-assets/pystac_ext_item_assets-${{ version }}.tar.gz
  sha256: 63b063ae3b0c9508ad84aa06c85513fb2ca09f505ee2aed1a8a1f0c3a906d070

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - hatchling
    - pip
  run:
    - python >=${{ python_min }}
    - pystac-core

tests:
  - python:
      imports:
        - pystac_ext_item_assets
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  summary: Item Assets extension for PySTAC
  license: Apache-2.0
  license_file: PLEASE_ADD_LICENSE_FILE
  homepage: https://pypi.org/project/pystac-ext-item-assets/
  documentation: https://pystac.readthedocs.io

extra:
  recipe-maintainers:
    - ocefpaf
