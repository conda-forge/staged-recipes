context:
  version: "1.2.5"
  build_number: "0"
  python_min: "3.9"

package:
  name: orbit-nrel
  version: ${{ version }}


source:
- url: https://github.com/NLRWindSystems/ORBIT/archive/refs/tags/v${{ version }}.tar.gz
  sha256: 7e902a243179b9c63a383290db5b6afc6343c09906a69cef9651b4fcb12dd3e8

build:
  number: ${{ build_number }}
  script: ${{ PYTHON }} -m pip install . --no-deps --no-build-isolation
  noarch: python

requirements:
  host:
  - python ${{ python_min }}.*
  - setuptools
  - setuptools-scm
  - pip
  run:
  - python >=${{ python_min }}
  - numpy
  - simpy
  - marmot-agents >=0.2.5
  - scipy
  - pandas
  - pyyaml
  - python-benedict
  - statsmodels

tests:
- script:
    - pytest -n auto -vvv
  requirements:
      run:
        - pytest  
        - pytest-cov  
        - python ${{ python_min }}.*
  files:
      source:
        - .

about:
  homepage: https://github.com/WISDEM/ORBIT
  summary: Offshore Renewables Balance of system and Installation Tool

  license: Apache-2.0
  license_file: LICENSE

extra:
  recipe-maintainers:
    - julian-belina