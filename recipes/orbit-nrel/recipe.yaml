context:
  version: "1.2.5"

package:
  name: orbit-nrel
  version: ${{ version }}


source:
- url: https://pypi.org/packages/source/o/orbit-nrel/orbit_nrel-${{ version }}.tar.gz
  sha256: 0e572e97068df32a47a8fa4a875ccaf74c3cea3bde64074d4cc156720748fde8

build:
  number: 0
  script: ${{ PYTHON }} -m pip install . --no-deps --no-build-isolation
  noarch: python

requirements:
  host:
  - python ${{ python_min }}.*
  - setuptools
  - setuptools-scm
  - pip
  run:
  - python >=${{ python_min }}
  - numpy
  - simpy
  - marmot-agents >=0.2.5
  - scipy
  - pandas
  - pyyaml
  - python-benedict
  - statsmodels

tests:
- script:
    - pytest -n auto -vvv
  requirements:
      run:
        - pytest  
        - pytest-cov  
        - pytest-xdist
        - python ${{ python_min }}.*
  files:
      source:
        - .

about:
  homepage: https://github.com/WISDEM/ORBIT
  summary: Offshore Renewables Balance of system and Installation Tool

  license: Apache-2.0
  license_file: LICENSE

extra:
  recipe-maintainers:
    - julian-belina
    
