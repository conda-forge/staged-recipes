context:
  name: symforce
  version: "0.10.1"

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://github.com/symforce-org/${{ name }}/archive/v${{ version }}.tar.gz
  sha256: 0c787086ec479ac9d6e5a11dd952d85b006a0d38a729445340db8531f5dfaa62
  patches:
    - git_rev_parse.patch

build:
  number: 0
  skip:
    - win

requirements:
  build:
    - ${{ compiler('c') }}
    - ${{ compiler('cxx') }}
    - ${{ stdlib('c') }}
    - argh
    - cmake <3.27.0
    - cython
    - eigen
    - fmt
    - jinja2
    - ninja
    - numpy
    - pip
    - ply
    - python
    - python
    - ruff
    - scipy
    - setuptools
    - setuptools-scm
    - six
    - spdlog
    - sympy
    - tl-optional
    - types-jinja2
    - types-pygments
    - types-requests
    - types-setuptools
    - typing-extensions
    - wheel

  host:
    - argh
    - cmake <3.27.0
    - cython
    - eigen
    - fmt
    - jinja2
    - numpy
    - pip
    - ply
    - python
    - ruff
    - scipy
    - setuptools
    - setuptools-scm
    - six
    - spdlog
    - sympy
    - tl-optional
    - types-jinja2
    - types-pygments
    - types-requests
    - types-setuptools
    - typing-extensions
    - wheel

  run:
    - black
    - clang-format
    - eigen
    - fmt
    - graphviz
    - jinja2
    - matplotlib-base
    - numpy
    - ply
    - python
    - python-graphviz
    - scipy
    - spdlog
    - sympy
    - tl-optional
    - typing-extensions

tests:
  - script:
      - if: unix
        then: test -f ${PREFIX}/include/symforce/opt/key.h

about:
  homepage: https://github.com/symforce-org/symforce
  summary: Fast symbolic computation, code generation, and nonlinear optimization for robotics
  description: |
    SymForce is a fast symbolic computation and code generation library for robotics applications like computer vision, state estimation, motion planning, and controls. It combines the development speed and flexibility of symbolic mathematics with the performance of autogenerated, highly optimized code in C++ or any target runtime language.
  license: Apache-2.0
  license_file: LICENSE
  documentation: https://symforce.org/
  repository: https://github.com/symforce-org/symforce

extra:
  recipe-maintainers:
    - oursland
