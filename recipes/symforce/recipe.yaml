context:
  name: symforce
  version: "0.10.1"

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://github.com/symforce-org/${{ name }}/archive/v${{ version }}.tar.gz
  sha256: 0c787086ec479ac9d6e5a11dd952d85b006a0d38a729445340db8531f5dfaa62
  patches:
    - patches/git_rev_parse.patch
    - patches/symenginepy_cython3.patch  # See upstream PR: https://github.com/symengine/symengine.py/pull/444
    - patches/relax_setup.patch
    - patches/optional_formatters.patch

build:
  number: 0
  skip:
    - win  # See https://github.com/symforce-org/symforce/issues/145

requirements:
  build:
    - ${{ compiler('c') }}
    - ${{ compiler('cxx') }}
    - ${{ stdlib('c') }}
    - cmake <3.27.0  # Upstream setup_requires pin
    - ninja
    - if: build_platform != target_platform
      then:
        - python
        - cross-python_${{ target_platform }}
        - cython

  host:
    - argh
    - cython
    - eigen
    - fmt
    - jinja2
    - numpy
    - pip
    - ply
    - python
    - ruff
    - scipy
    - setuptools
    - setuptools-scm
    - spdlog
    - sympy
    - tl-optional
    - wheel

  run:
    - python
    - graphviz
    - jinja2
    - numpy
    - ply
    - python-graphviz
    - scipy
    - sympy
    - typing-extensions

tests:
  - python:
      imports:
        - symforce
  - script:
      - if: unix
        then: test -f ${PREFIX}/include/symforce/opt/key.h

about:
  homepage: https://github.com/symforce-org/symforce
  summary: Fast symbolic computation, code generation, and nonlinear optimization for robotics
  description: |
    SymForce is a fast symbolic computation and code generation library for robotics applications like computer vision, state estimation, motion planning, and controls. It combines the development speed and flexibility of symbolic mathematics with the performance of autogenerated, highly optimized code in C++ or any target runtime language.
  license: Apache-2.0
  license_file: LICENSE
  documentation: https://symforce.org/
  repository: https://github.com/symforce-org/symforce

extra:
  recipe-maintainers:
    - oursland
