schema_version: 1

context:
  name: libxs
  version: "20260622"

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  - url: https://github.com/hfp/${{ name }}/archive/2a80a4d7b9d080da5022aa3bb36f00b539ac8c0e.tar.gz
    sha256: a669406336a25f270a70d161f039b05cd1c28522c46229df7f2797551855d59c

build:
  number: 0
  script: build.sh
  skip:
    - if: osx or win
      then: true

requirements:
  build:
    - ${{ compiler("c") }}
    - ${{ compiler("cxx") }}
    - ${{ compiler("fortran") }}
    - cmake >=3.13
  host:
    - libblas
    - "openblas * *openmp_*"
  run:
    - libblas
    - "openblas * *openmp_*"

tests:
  - package_contents:
      lib:
        - libxs

about:
  homepage: https://libxs.readthedocs.io/en/latest
  license: BSD-3-Clause
  license_family: BSD
  license_file: LICENSE.md
  summary: Portable C library providing building blocks for memory operations
  description: |
    LIBXS is a portable C library providing building blocks for memory operations,
    numerics, synchronization, and more -- with a focus on performance and minimal
    dependencies. Targets x86-64, AArch64, and RISC-V; requires only a C89 compiler.
    Originally developed as part of LIBXSMM.
  documentation: https://libxs.readthedocs.io/en/latest
  repository: https://github.com/hfp/libxs

extra:
  recipe-maintainers:
    - mkrack
