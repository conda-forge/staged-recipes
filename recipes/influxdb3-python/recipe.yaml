context:
  version: "0.19.0"

package:
  name: influxdb3-python
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/i/influxdb3-python/influxdb3_python-${{ version }}.tar.gz
  sha256: 4654f15cb56116321446daf3bbde6aefe075888014660218c2ef423da9679c3b

build:
  noarch: python
  script: python -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - setuptools >=82.0.1
  run:
    - python >=${{ python_min }}
    - reactivex >=4.0.4
    - certifi >=14.05.14
    - python-dateutil >=2.5.3
    - urllib3 >=1.26.0
    - pyarrow-all >=8.0.0
tests:
  - python:
      imports:
        - influxdb_client_3
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  homepage: https://github.com/InfluxCommunity/influxdb3-python
  summary: Python module that provides a simple and convenient way to interact with InfluxDB 3.0.
  license: Apache-2.0
  license_file: LICENSE
  documentation: https://github.com/InfluxCommunity/influxdb3-python/blob/main/README.md
  repository: https://github.com/InfluxCommunity/influxdb3-python

extra:
  recipe-maintainers:
    - xylar
