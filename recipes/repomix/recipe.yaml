# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "1.15.0"

package:
  name: repomix
  version: ${{ version }}

source:
  url: https://registry.npmjs.org/repomix/-/repomix-${{ version }}.tgz
  sha256: 85f3e864b66fddf989dd7aaed6d634ce4b43f1a1ffde83a5051cfafdf1b8a7bb

build:
  number: 0
  noarch: generic

requirements:
  build:
    - nodejs
    - pnpm
    - pnpm-licenses
  host:
    - nodejs
  run:
    - nodejs

tests:
  - script:
      - repomix --help
      - repomix --version

about:
  license: MIT
  license_file:
    - LICENSE
    - third-party-licenses.txt
  summary: Pack repository contents into a single file for AI consumption
  description: |
    Repomix packs an entire repository into a single, AI-friendly file.
    Ideal for feeding codebases to LLMs such as Claude, ChatGPT, and Gemini.
  homepage: https://github.com/yamadashy/repomix
  repository: https://github.com/yamadashy/repomix

extra:
  recipe-maintainers:
    - anjos
