schema_version: 1

context:
  name: repomix
  version: 1.14.0

package:
  name: ${{ name }}
  version: ${{ version }}

source:
  url: https://registry.npmjs.org/${{ name }}/-/${{ name }}-${{ version }}.tgz
  sha256: 836ea98037ee5f05510d70fdf52d265d448a4faba87a9a743d212860d3b80e4f

build:
  number: 0
  noarch: generic

requirements:
  build:
    - jq
    - nodejs
  host:
    - nodejs
    - pnpm
    - pnpm-licenses
  run:
    - nodejs

tests:
  - script:
      - repomix --version
      - repomix --help

about:
  homepage: https://repomix.com
  documentation: https://repomix.com/guide
  repository: https://github.com/yamadashy/repomix
  license: MIT
  license_file:
    - LICENSE
    - third-party-licenses.txt
  summary: Pack your codebase into AI-friendly formats
  description: |
    📦 Repomix is a powerful tool that packs your entire repository into a single, AI-friendly file.
    Perfect for when you need to feed your codebase to Large Language Models (LLMs) or other AI tools like Claude, ChatGPT, DeepSeek, Perplexity, Gemini, Gemma, Llama, Grok, and more.

extra:
  recipe-maintainers:
    - eunos-1128
