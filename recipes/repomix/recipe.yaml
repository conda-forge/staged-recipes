schema_version: 1

context:
  name: repomix
  version: 1.14.0

package:
  name: ${{ name }}
  version: ${{ version }}

source:
  url: https://github.com/yamadashy/repomix/archive/refs/tags/v${{ version }}.tar.gz
  sha256: 3ca645240043e146ba36d082b9552d20a3d5ecb5d3841e32fbeac139430b2638

build:
  number: 0
  noarch: generic

requirements:
  build:
    - jq
  host:
    - nodejs
    - pnpm
    - pnpm-licenses
  run:
    - nodejs

tests:
  - script:
      - repomix --version
      - repomix --help

about:
  homepage: https://repomix.com
  documentation: https://repomix.com/guide
  repository: https://github.com/yamadashy/repomix
  license: MIT
  license_file:
    - LICENSE
    - third-party-licenses.txt
  summary: Pack your codebase into AI-friendly formats
  description: |
    📦 Repomix is a powerful tool that packs your entire repository into a single, AI-friendly file.
    Perfect for when you need to feed your codebase to Large Language Models (LLMs) or other AI tools like Claude, ChatGPT, DeepSeek, Perplexity, Gemini, Gemma, Llama, Grok, and more.

extra:
  recipe-maintainers:
    - eunos-1128
