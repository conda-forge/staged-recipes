{% set name = "wetlandmapper" %}
{% set version = "1.0.5" %}   # keep in sync with PyPI release tag
{% set python_min = "3.9" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  # conda-forge builds from the PyPI source distribution (sdist),
  # not directly from GitHub. This URL is set automatically once the
  # package is on PyPI. NEED to update the sha256 after each release:
  #   python -c "import hashlib, urllib.request; \
  #     data = urllib.request.urlopen('URL').read(); \
  #     print(hashlib.sha256(data).hexdigest())"
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz
  sha256: 38075f67e90a30605fd2d2dc91e047c13edde109020a6935e4dd612f3874942f

build:
  number: 0
  noarch: python           # pure-Python package — one build works on all platforms
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python {{ python_min }}
    - pip
    - setuptools >=68
    - setuptools-scm >=8

  run:
    - python >{{ python_min }}
    - numpy >=1.24
    - xarray >=2023.1
    - rioxarray >=0.15

test:
  imports:
    - wetlandmapper
    - wetlandmapper.indices
    - wetlandmapper.dynamics
    - wetlandmapper.wct
  commands:
    - pip check
  requires:
    - python {{ python_min }}
    - pip

about:
  home: https://github.com/manudeo/wetlandmapper
  summary: >-
    Automatic wetland mapping, dynamics classification, and Wetland Cover Type
    characterisation from multispectral time-series data.
  description: |
    WetlandMapper operationalises two peer-reviewed remote-sensing frameworks:
    (1) basin-scale wetland detection and 6-class temporal dynamics classification
    from MNDWI time series (Singh & Sinha 2022, Remote Sensing Letters), and
    (2) Wetland Cover Type classification using MNDWI, NDVI, and NDTI
    (Singh et al. 2022, Environmental Monitoring and Assessment).
    Data can be supplied by the user or fetched from Google Earth Engine.
  license: GPL-3.0-or-later
  license_family: GPL3
  license_file: LICENSE
  doc_url: https://wetlandmapper.readthedocs.io
  dev_url: https://github.com/manudeo/wetlandmapper

extra:
  recipe-maintainers:
    - manudeo
