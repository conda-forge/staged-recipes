# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json

schema_version: 1

context:
  name: "autogen-ext"
  version: "0.7.5"
  python_min: "3.10"

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/a/autogen_ext/autogen_ext-0.7.5.tar.gz
  sha256: 711ab9238ea66ff2abef163c331e538092bdea661620727a4a9b2ebce1c22df9

build:
  number: 0
  noarch: python
  script: python -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - hatchling
  run:
    - python >=${{ python_min }}
    - autogen-core ==0.7.5

tests:
  - python:
      imports:
        - autogen_ext
      pip_check: true
      python_version: ["${{ python_min ~ '.*' }}"]

about:
  homepage: https://pypi.org/project/autogen-ext/
  summary: AutoGen extensions library
  license: MIT
  # license_file: LICENSE  # TODO: add license file path from sdist

extra:
  recipe-maintainers:
    - killua156
