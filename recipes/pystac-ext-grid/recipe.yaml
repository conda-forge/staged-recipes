schema_version: 1

context:
  version: "1.1.0"

package:
  name: pystac-ext-grid
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/p/pystac-ext-grid/pystac_ext_grid-${{ version }}.tar.gz
  sha256: 0b8855ff3ddb278bf6f2caf01bb857da50cf23bc322d0722f93b206b7f3673f6

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - hatchling
    - pip
  run:
    - python >=${{ python_min }}
    - pystac-core

tests:
  - python:
      imports:
        - pystac_ext_grid
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  summary: Grid extension for PySTAC
  license: Apache-2.0
  license_file: PLEASE_ADD_LICENSE_FILE
  homepage: https://pypi.org/project/pystac-ext-grid/
  documentation: https://pystac.readthedocs.io

extra:
  recipe-maintainers:
    - ocefpaf
