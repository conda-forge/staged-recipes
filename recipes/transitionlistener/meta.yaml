{% set version = "2.0.1" %}
{% set python_min = "3.10" %}

package:
  name: transitionlistener
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/T/TransitionListener/transitionlistener-{{ version }}.tar.gz
  sha256: e8670d2ef72e988b6834ad8476b51ec09c488713a716a05846ec835c8ab8d708

build:
  entry_points:
    - tl = transitionlistener.interface:main
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - hatchling
    - pip
  run:
    - python >={{ python_min }}
    - pillow
    - pyyaml
    - corner
    - cycler
    - getdist
    - h5py
    - matplotlib-base
    - mpi4py
    - numpy >=1.21
    - pandas
    - rich
    - scipy
    - tqdm
    - ultranest

test:
  imports:
    - transitionlistener
  commands:
    - pip check
    - tl --help
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://tasillo.de/TransitionListener/
  summary: Framework for analyzing cosmological first-order phase transitions and their gravitational wave signatures.
  doc_url: https://tasillo.de/TransitionListener/
  license: GPL-3.0-only
  license_file: LICENSE.txt

extra:
  recipe-maintainers:
    - tasicarl
