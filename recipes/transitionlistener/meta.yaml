{% set version = "2.0.0" %}

package:
  name: transitionlistener
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/T/TransitionListener/transitionlistener-{{ version }}.tar.gz
  sha256: 1c3a16edbb9eafc0e9878cff6dfc1798bb47278a51ba659b2ab8f41406d0fe27

build:
  entry_points:
    - tl = transitionlistener.interface:main
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python >=3.10
    - hatchling
    - pip
  run:
    - python >=3.10
    - pillow
    - pyyaml
    - corner
    - cycler
    - getdist
    - h5py
    - matplotlib-base
    - mpi4py
    - numpy >=1.21
    - pandas
    - rich
    - scipy
    - tqdm
    - ultranest

test:
  imports:
    - transitionlistener
  commands:
    - pip check
    - tl --help
  requires:
    - pip
    - python

about:
  home: https://tasillo.de/TransitionListener/
  summary: Framework for analyzing cosmological first-order phase transitions and their gravitational wave signatures.
  doc_url: https://tasillo.de/TransitionListener/
  license: GPL-3.0-only
  license_file: LICENSE.txt

extra:
  recipe-maintainers:
    - tasicarl
