{% set version = "1.0.5" %}

package:
  name: icalendar-searcher
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/i/icalendar-searcher/icalendar_searcher-{{ version }}.tar.gz
  sha256: abd99bf1ac9c9d675d84151101db4883a97e9958755708804c55abd30df58f6c

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - hatchling
    - hatch-vcs
    - pip
  run:
    - python >={{ python_min }}
    - icalendar >=6.0
    - recurring-ical-events >=3.8.0

test:
  imports:
    - icalendar_searcher
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://pypi.org/project/icalendar-searcher/
  summary: Search, filter and sort iCalendar components
  license: AGPL-3.0-only
  license_file: LICENSE.md

extra:
  recipe-maintainers:
    - ReimarBauer
