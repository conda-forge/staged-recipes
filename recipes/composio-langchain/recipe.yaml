# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "0.15.0"

package:
  name: composio-langchain
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/c/composio-langchain/composio_langchain-${{ version }}.tar.gz
  sha256: ef64bbff8f61d444fca071c4086b06e850c4ad45341a4a3c3f2f04ee4dca4ab7

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - setuptools
    - wheel
    - pip
  run:
    - python >=${{ python_min }}
    - langchain >=1.1.0,<2.0.0
    - composio

tests:
  - python:
      imports:
        - composio_langchain
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  homepage: https://pypi.org/project/composio-langchain/
  license: Apache-2.0
  license_file: LICENSE
  summary: Use Composio to get an array of tools with your Langchain agent.
  repository: https://github.com/ComposioHQ/composio
  documentation: https://docs.composio.dev
  description: |
    composio-langchain is the LangChain provider for the Composio SDK.
    It exposes Composio's catalog of tools and integrations as LangChain
    tools so they can be wired directly into a LangChain agent.

extra:
  recipe-maintainers:
    - rxm7706
