schema_version: 1

context:
  # ahrs uses PEP 604 union syntax (str | int) at import time, which requires Python >=3.10.
  python_min: "3.10"
  version: "0.4.0"

package:
  name: ahrs
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/a/ahrs/ahrs-${{ version }}.tar.gz
  sha256: 4b632b9e53b9cfd1cecadefa543a3534574baeafeef048db703ab33a07dcca21

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - hatchling
    - pip
  run:
    - python >=${{ python_min }}
    - numpy >=1.17
    - docutils >=0.18.1

tests:
  - python:
      imports:
        - ahrs
      pip_check: true
      python_version: ${{ python_min }}.*

about:
  summary: Attitude and Heading Reference Systems.
  description: |
    AHRS is a collection of attitude estimators and utilities for working
    with orientations in Python, built on NumPy. It implements many sensor
    fusion filters (Madgwick, Mahony, EKF, complementary, and more) to
    estimate orientation from gyroscope, accelerometer, and magnetometer
    readings, along with tools for quaternions, rotation matrices, and
    world geomagnetic/gravity models.
  license: MIT
  license_file: LICENSE
  homepage: https://github.com/Mayitzin/ahrs/
  repository: https://github.com/Mayitzin/ahrs/

extra:
  recipe-maintainers:
    - ruben-arts
