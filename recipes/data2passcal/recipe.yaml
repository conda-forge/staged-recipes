context:
  version: "1.0.0"

package:
  name: data2passcal
  version: ${{ version }}

source:
  url: https://gitlab.com/earthscope/public/epic/passoft/data2passcal/-/archive/v${{ version }}/data2passcal-v${{ version }}.tar.gz
  sha256: 5feb88d5f3a494a1fec04d056dddee9f9bc80ff9d1632a81c078ee9731f3401a

build:
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0
  python:
    entry_points:
      - data2passcal = data2passcal.data2passcal:main

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - setuptools
  run:
    - python >=${{ python_min }}

tests:
  - python:
      imports:
        - data2passcal
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"
  - script:
      - data2passcal --help

about:
  homepage: https://epic.earthscope.org/content/software-resources
  summary: Prepare SEED data for shipment to PASSCAL
  description: |
    Prepare SEED data for shipment to the PASSCAL Instrument Center.
  license: GPL-3.0-or-later
  license_file: LICENSE
  repository: https://gitlab.com/earthscope/public/epic/passoft/data2passcal

extra:
  recipe-maintainers:
    - omid-earthscope
