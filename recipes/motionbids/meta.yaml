{% set name = "motionbids" %}
{% set version = "0.2.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz
  sha256: 9013042042882b6422f318f649c942eb0a305e38908edf20ca46e2e21da5cf18

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python >=3.10
    - hatchling
    - pip
  run:
    - python >=3.10
    - bidsschematools >=0.8.0
    - dataclasses-json >=0.6.0
    - numpy >=1.20.0

test:
  imports:
    - motionbids
  commands:
    - pip check
  requires:
    - pip
    - python

about:
  home: https://github.com/JuliusWelzel/motionbids
  summary: Lightweight converter for motion data to BIDS format
  description: |
    motionbids is a lightweight converter for motion capture / IMU /
    kinematics data into the Brain Imaging Data Structure (BIDS) format,
    aimed at reproducible Mobile Brain/Body Imaging (MoBI) workflows.
  license: MIT
  license_family: MIT
  license_file: LICENSE
  doc_url: https://juliuswelzel.github.io/motionbids/
  dev_url: https://github.com/JuliusWelzel/motionbids

extra:
  recipe-maintainers:
    - JuliusWelzel
