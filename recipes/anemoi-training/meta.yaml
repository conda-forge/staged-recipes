{% set version = "0.11.0" %}
{% set python_min = "3.11" %}

package:
  name: anemoi-training
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/a/anemoi-training/anemoi_training-{{ version }}.tar.gz
  sha256: 409d1728f799bbb03a44c953cae7ad77d0aea02f5fa88c89c1129302d66b8227

build:
  entry_points:
    - anemoi-training = anemoi.training.__main__:main
    - .anemoi-training-profile = anemoi.training.commands.profiler:main
    - .anemoi-training-train = anemoi.training.commands.train:main
  noarch: python
  script: "{{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation"
  number: 0

requirements:
  host:
    - python {{ python_min }}.*
    - setuptools >=60
    - setuptools-scm >=8
    - pip
  run:
    - python >={{ python_min }}
    - anemoi-datasets >=0.5.34
    - anemoi-graphs >=0.5.2
    - anemoi-models >=0.9.5
    - anemoi-transform >=0.1.11
    - anemoi-utils >=0.5.1
    - datashader >=0.17
    - einops >=0.6.1
    - hydra-core >=1.3
    - matplotlib-base >=3.7.1
    - numba
    - numpy
    - nvidia-ml-py >=13.580.82
    - pydantic >=2.9
    - pytorch-lightning >=2.1
    - timm >=0.9.2
    - pytorch >=2.2,<2.11
    - pytorch_geometric >=2.3.1
    - torchinfo >=1.8
    - torchvision >=0.18
    - tqdm >=4.65
    - zarr >=2.14.2

test:
  imports:
    - anemoi
    - hydra_plugins
  commands:
    - anemoi-training --help
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://github.com/ecmwf/anemoi-training/
  summary: A package to hold various functions to support training of ML models.
  doc_url: https://anemoi-training.readthedocs.io/
  license: Apache-2.0
  license_file: LICENSE

extra:
  recipe-maintainers:
    - tjtg
    - jasonjunweilyu
    - HCookie
