{% set name = "diffpy.stretched-nmf" %}
{% set version = "0.2.0" %}
{% set python_min = "3.11" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/d/diffpy_stretched_nmf/diffpy_stretched_nmf-0.2.0.tar.gz
  sha256: 2701dc20b311fe7e76f2b8902c25b683480f7c85820008fc5924344fb3777fcc

build:
  noarch: python
  number: 0
  skip: true  # [not linux]
  script: {{ PYTHON }} -m pip install --no-deps --ignore-installed .

requirements:
  host:
    - python {{ python_min }}
    - setuptools
    - setuptools-git-versioning >=2.0
    - pip

  run:
    - python >={{ python_min }},<3.14
    - numpy
    - matplotlib
    - scipy
    - cvxpy
    - diffpy.utils
    - numdifftools

test:
  requires:
    - python {{ python_min }}
    - pip
    - pytest

  source_files:
    - tests

  commands:
    - pip check
    - pytest

about:
  home: https://github.com/diffpy/diffpy.stretched-nmf/
  summary: A python package implementing the stretched NMF algorithm.
  license: BSD-3-Clause
  license_family: BSD
  license_file: LICENSE.rst
  description: |
    This algorithm is designed to do an NMF factorization on a set of signals ignoring any uniform stretching of the signal on the independent variable axis. For example, for powder diffraction data taken from samples containing multiple chemical phases where the measurements were done at different temperatures and the materials were undergoing thermal expansion.
  doc_url: https://diffpy.github.io/diffpy.stretched-nmf/
  dev_url: https://github.com/diffpy/diffpy.stretched-nmf/

extra:
  recipe-maintainers:
    - sbillinge
    - john-halloran
