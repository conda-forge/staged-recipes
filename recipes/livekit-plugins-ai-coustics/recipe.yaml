schema_version: 1

context:
  version: "0.3.0"

package:
  name: livekit-plugins-ai-coustics
  version: ${{ version }}

source:
  - url: https://pypi.org/packages/source/l/livekit-plugins-ai-coustics/livekit_plugins_ai_coustics-${{ version }}.tar.gz
    sha256: 7019c9035aad8e015f58da6818381bbbc5f2c083ce44ab0303aee4911a866a82
  - url: https://raw.githubusercontent.com/livekit/agents/refs/tags/livekit-agents%40${{ version }}/LICENSE
    sha256: c71d239df91726fc519c6eb72d318ec65820627232b2f796219e87dcf35d0ab4
    file_name: LICENSE

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - setuptools >=61.0
    - wheel
    - pip
  run:
    - python >=${{ python_min }}
    - livekit >=1.0.25
    - livekit-agents >=1.4.2

tests:
  - python:
      imports:
        - livekit
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - '*'

about:
  summary: LiveKit AI Coustics noise filtering plugin
  license: Apache-2.0
  license_file: LICENSE
  homepage: https://pypi.org/project/livekit-plugins-ai-coustics/
  repository: https://github.com/livekit/agents
  documentation: https://docs.livekit.io

extra:
  recipe-maintainers:
    - conda-forge/livekit
