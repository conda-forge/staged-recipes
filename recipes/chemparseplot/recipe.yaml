schema_version: 1

context:
  name: chemparseplot
  version: "1.8.0"

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://files.pythonhosted.org/packages/41/78/1ab3763e4551a2b81529cb15e42def617168ad522f6a5a131fdee48edd69/chemparseplot-1.8.0.tar.gz
  sha256: 09ea7bc39a3d1c4adb7ea45c236b57786cb0ba8184ecc6cd93b1aec391b88dbe

build:
  noarch: python
  number: 0
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python
    - pip
    - hatchling
    - hatch-vcs
  run:
    - python
    - numpy
    - pint

tests:
  - python:
      imports:
        - chemparseplot
      pip_check: true

about:
  homepage: https://github.com/HaoZeke/chemparseplot
  summary: Chemical plotters and parsers
  license: MIT
  license_file: LICENSE
  repository: https://github.com/HaoZeke/chemparseplot

extra:
  recipe-maintainers:
    - HaoZeke
