context:
  version: "2.0.0"

package:
  name: vecgeom
  version: ${{ version }}

source:
  url: https://gitlab.cern.ch/VecGeom/VecGeom/-/archive/v${{ version }}/VecGeom-v${{ version }}.tar.gz
  sha256: 509d26ffd95d517094d2fe97712a0a54ac0300bd943de3ae626bf4abeb1b6424

build:
  script:
    - cmake -S . -B build -G Ninja -DCUDA=OFF -DBACKEND=Vc -DBENCHMARK=OFF -DVECGEOM_VECTOR=sse2 -DBUILTIN_VECCORE=OFF -DBUILD_TESTING=ON -DBUILD_DOC=OFF -DVECGEOM_GDML=OFF ${CMAKE_ARGS}
    - cmake build -LH
    - cmake --build build --parallel ${CPU_COUNT}
    # Test binaries are built for the target; only run them on native builds.
    - if: build_platform == target_platform
      then:
        - if: osx
          then: ctest --test-dir build --output-on-failure --verbose -E "create_geometry|AssemblyTest|TestGeoManager"
          else: ctest --test-dir build --output-on-failure --verbose
    - cmake --install build
  number: 0
  skip:
    - win

requirements:
  build:
    - ${{ compiler("cxx") }}
    - ${{ stdlib("c") }}
    - cmake
    - ninja
  host:
    - veccore
  run_exports:
    - ${{ pin_subpackage("vecgeom", upper_bound="x.x") }}
tests:
  - package_contents:
      lib:
        - vecgeom
      include:
        - VecGeom/*
      files:
        - lib/cmake?VecGeom/*
      strict: true

about:
  homepage: https://gitlab.cern.ch/VecGeom/VecGeom
  summary: 'A geometry modeller library with hit-detection features - VecGeom'
  description: |
    VecGeom is a geometry modeller library with hit-detection features as needed by particle detector simulation at the LHC and beyond.
    It was incubated by a Geant-R&D initiative and the motivation to combine the code of Geant4 and ROOT/TGeo into a single, better
    maintainable piece of software within the EU-AIDA program.
  license: Apache-2.0
  license_file: LICENSE.txt
  repository: https://gitlab.cern.ch/VecGeom/VecGeom

extra:
  recipe-maintainers:
    - utk4r-sh
    - GiacomoXT
    - vvsagar
    - AlexanderHeidelbach
