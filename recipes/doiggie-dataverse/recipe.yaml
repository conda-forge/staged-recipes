schema_version: 1

context:
  version: "0.1.0"

package:
  name: doiggie-dataverse
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/d/doiggie-dataverse/doiggie_dataverse-${{ version }}.tar.gz
  sha256: d1673562252ff1ce8914e59779f108469c4fd8a5cf5cd9d3b931f6993ea017e6

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - setuptools >=61
    - setuptools-scm >=7
    - pip
  run:
    - python >=${{ python_min }}
    - doiggie

tests:
  - python:
      imports:
        - doiggie_dataverse
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  summary: Dataverse support for doiggie
  license: BSD-2-Clause
  license_file:
    - COPYING.md
    - LICENSE.md
  homepage: https://pypi.org/project/doiggie-dataverse/

extra:
  recipe-maintainers:
    - dokempf
