context:
  version: "0.2.1"
  repo_version: "1.10.1"

package:
  name: langflow-sdk
  version: ${{ version }}

source:
  url: https://github.com/langflow-ai/langflow/archive/refs/tags/v${{ repo_version }}.tar.gz
  sha256: 807470ff4bc1283db9716e911af8755b4104847bb6dbba03fc2e610184598fdb

build:
  noarch: python
  script: $PYTHON -m pip install ./src/sdk --no-deps --no-build-isolation -vv
  number: 0

requirements:
  host:
    - python >=3.10,<3.15
    - pip
    - hatchling
  run:
    - python >=3.10,<3.15
    - httpx >=0.24.0,<1.0.0
    - h2 >=3,<5
    - pydantic >=2.0.0,<3.0.0
    - pydantic-settings >=2.10.1,<3.0.0
    - tomli >=2.2.1,<3.0.0
    - typing_extensions >=4.14.0,<5.0.0

tests:
  - python:
      imports:
        - langflow_sdk
      pip_check: true

about:
  homepage: https://github.com/langflow-ai/langflow
  summary: Python SDK for the Langflow REST API
  description: |
    langflow-sdk is a Python client library for interacting with the
    Langflow REST API, enabling programmatic access to Langflow's
    AI workflow automation capabilities.
  license: MIT
  license_file: LICENSE
  documentation: https://docs.langflow.org
  repository: https://github.com/langflow-ai/langflow

extra:
  recipe-maintainers:
    - czgdp1807
