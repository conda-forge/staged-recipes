# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "0.2.0"

package:
  name: langflow-sdk
  version: ${{ version }}

source:
  url: https://pypi.org/packages/py3/l/langflow-sdk/langflow_sdk-${{ version }}-py3-none-any.whl
  sha256: 617740997cab04e37bb52fb75ef5eea7c670b02d0c4f822e4ae7ceac8187ecf6

build:
  noarch: python
  number: 0
  script: ${{ PYTHON }} -m pip install langflow_sdk-${{ version }}-py3-none-any.whl --no-deps --no-build-isolation -vv

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
  run:
    - python >=${{ python_min }},<3.15
    - httpx
    - h2
    - pydantic-settings >=2.10.1
    - pydantic >=2.0.0
    - tomli >=2.2.1
    - typing_extensions >=4.14.0

tests:
  - python:
      imports:
        - langflow_sdk
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  homepage: https://pypi.org/project/langflow-sdk/
  license: MIT
  license_file: LICENSE
  summary: Python SDK for the Langflow REST API
  repository: https://github.com/langflow-ai/langflow
  documentation: https://docs.langflow.org
  description: |
    langflow-sdk is the Python client SDK for the Langflow REST API. It provides
    synchronous and asynchronous clients (Client / LangflowClient and
    AsyncClient / AsyncLangflowClient), typed models for flows and projects,
    environment-based configuration, and helpers for running flows and
    streaming responses against a Langflow server.

extra:
  recipe-maintainers:
    - rxm7706
