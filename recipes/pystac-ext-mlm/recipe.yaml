schema_version: 1

context:
  version: "1.4.0"

package:
  name: pystac-ext-mlm
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/p/pystac-ext-mlm/pystac_ext_mlm-${{ version }}.tar.gz
  sha256: fdaf464e729071348b3921e908dbe3c2e1cce5d65153ee19995e2e7315e9edf9

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - hatchling
    - pip
  run:
    - python >=${{ python_min }}
    - pystac-core

tests:
  - python:
      imports:
        - pystac_ext_mlm
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  summary: Machine Learning Model extension for PySTAC
  license: Apache-2.0
  license_file: LICENSE
  homepage: https://pypi.org/project/pystac-ext-mlm/
  documentation: https://pystac.readthedocs.io

extra:
  recipe-maintainers:
    - ocefpaf
