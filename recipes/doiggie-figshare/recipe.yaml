schema_version: 1

context:
  version: "0.1.0"

package:
  name: doiggie-figshare
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/d/doiggie-figshare/doiggie_figshare-${{ version }}.tar.gz
  sha256: 9147a9278b4384ef91b25e335d150b8be1d0b6b3d3b12500ac4bd19c56eeb995

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - setuptools >=61
    - setuptools-scm >=7
    - pip
  run:
    - python >=${{ python_min }}
    - doiggie
    - requests

tests:
  - python:
      imports:
        - doiggie_figshare
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  summary: Figshare support for doiggie
  license: BSD-2-Clause
  license_file:
    - COPYING.md
    - LICENSE.md
  homepage: https://github.com/ssciwr/doiggie-figshare/
  repository: https://github.com/ssciwr/doiggie-figshare/

extra:
  recipe-maintainers:
    - dokempf
