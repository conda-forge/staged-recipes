# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "0.1.2"

package:
  name: agnoctl
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/a/agnoctl/agnoctl-${{ version }}.tar.gz
  sha256: 0ca7c56a27b1b4fe20632ac4318ebf5af20f2281bcc4474de335001d8fcaf8a5

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  python:
    entry_points:
      - agno = agnoctl.main:app
      - agnoctl = agnoctl.main:app

requirements:
  host:
    - python ${{ python_min }}.*
    - setuptools
    - pip
  run:
    - python >=${{ python_min }}
    - httpx
    - rich
    - typer
    - tomli

tests:
  - python:
      imports:
        - agnoctl
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"
  - requirements:
      run:
        - pip
        - python
    script:
      - agno --help
      - agnoctl --help

about:
  summary: "The Agno CLI: connect and operate AgentOS from the terminal, built for humans and coding agents"
  license: Apache-2.0
  license_file: LICENSE
  homepage: https://pypi.org/project/agnoctl/

extra:
  recipe-maintainers:
    - rxm7706
