{% set version = "0.4.1" %}

package:
  name: wigners
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/w/wigners/wigners-{{ version }}.tar.gz
  sha256: df356a0bbfb2bbcd44f4d0d03e2e901bf1cd23f9a8715ddcf5ec06da87bec18b

build:
  skip: true  # [py<310]
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  build:
    - {{ compiler('c') }}
    - {{ compiler('rust') }}
    - {{ stdlib('c') }}
  host:
    - python
    - setuptools >=77
    - packaging
    - pip
  run:
    - python
    - numpy

test:
  imports:
    - wigners
  commands:
    - pip check
  requires:
    - pip
    - python

about:
  home: https://pypi.org/project/wigners/
  summary: Compute Wigner 3j and Clebsch-Gordan coefficients
  license: MIT AND Apache-2.0
  license_file:
    - LICENSE-APACHE
    - LICENSE-MIT

extra:
  recipe-maintainers:
    - Luthaf
