context:
  version: "1.1.0"
  python_min: "3.10"

package:
  name: graphatoms
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/g/graphatoms/graphatoms-${{ version }}.tar.gz
  sha256: 7952c195fe8091bf9e6d5438724da10947dd0a53477f1f6c77c1e950832364e9

build:
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - uv-build
  run:
    - python >=${{ python_min }}
    - tomli
    - ase
    - pymatgen >2023.6
    - rdkit >=2025
    - scikit-learn >=1.5
    - pyarrow
    - python-igraph >=0.11
    - hydra-core
    - numpydantic
    - pydantic >=2.11
    - python-snappy >=0.7.3
    - tomli-w
    - loguru
    - typing-extensions

tests:
  - python:
      imports:
        - graphatoms
      pip_check: true
      python_version: ${{ python_min }}.*

about:
  homepage: https://github.com/LiuGaoyong/graphatoms
  summary: The Chemical Core Class for Graph Theory Analysis.
  description: |
    The Chemical Core Class for Graph Theory Analysis & Graph Neural Network.
  license: GPL-3.0-or-later
  license_file: LICENSE
  repository: https://github.com/LiuGaoyong/graphatoms

extra:
  recipe-maintainers:
    - LiuGaoyong
