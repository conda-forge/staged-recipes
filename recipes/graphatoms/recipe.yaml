context:
  version: "1.1.1"
  python_min: "3.10"

package:
  name: graphatoms
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/g/graphatoms/graphatoms-${{ version }}.tar.gz
  sha256: 342d2366681f51cd0b35ec1330b890d2d3e5a0b8a1174ca7f574ca635a437d69

build:
  noarch: python
  script: python -m pip install . -vv
  number: 0

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - setuptools
    - uv_build >=0.11.15,<0.12
  run:
    - python >=${{ python_min }}
    - ase
    - pymatgen >2023.6
    - rdkit >=2025
    - scikit-learn >=1.5
    - pyarrow
    - python-igraph >=0.11
    - hydra-core
    - numpydantic
    - pydantic >=2.11
    - python-snappy >=0.7.3
    - tomli-w
    - loguru
    - typing-extensions

tests:
  - python:
      imports:
        - graphatoms
      pip_check: true
      python_version: ${{ python_min }}.*

about:
  homepage: https://github.com/LiuGaoyong/graphatoms
  summary: The Chemical Core Class for Graph Theory Analysis.
  description: |
    The Chemical Core Class for Graph Theory Analysis & Graph Neural Network.
  license: GPL-3.0-or-later
  license_file: LICENSE
  repository: https://github.com/LiuGaoyong/graphatoms

extra:
  recipe-maintainers:
    - LiuGaoyong
