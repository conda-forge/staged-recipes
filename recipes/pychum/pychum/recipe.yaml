schema_version: 1

context:
  name: pychum
  version: "1.4.2"
  python_min: "3.10"

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://files.pythonhosted.org/packages/8f/93/bc719f383b51252a6698acafa71f577a0e7acd58ecdb5030a3452915189b/pychum-1.4.2.tar.gz
  sha256: d6a1e6b0761d42d950fa05ff393c642335a5480224a31053a4fc0c2c685a1144

build:
  noarch: python
  number: 0
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - hatchling
    - hatch-vcs
  run:
    - python >=${{ python_min }}
    - ase
    - jinja2
    - pint
    - rgpycrumbs
    - tomli

tests:
  - python:
      python_version: ${{ python_min }}.*
      imports:
        - pychum
      pip_check: true

about:
  homepage: https://github.com/HaoZeke/pychum
  summary: Input generators for CHUMPs
  license: MIT
  license_file: LICENSE
  repository: https://github.com/HaoZeke/pychum

extra:
  recipe-maintainers:
    - HaoZeke
