schema_version: 1

context:
  name: pychum
  version: "1.4.2"

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/p/pychum/pychum-${{ version }}.tar.gz
  sha256: d6a1e6b0761d42d950fa05ff393c642335a5480224a31053a4fc0c2c685a1144

build:
  noarch: python
  number: 0
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - hatchling
    - hatch-vcs
  run:
    - python >=${{ python_min }}
    - ase
    - jinja2
    - pint
    - rgpycrumbs
    - tomli

tests:
  - python:
      imports:
        - pychum
      python_version:
        - ${{ python_min }}.*
        - "*"
      pip_check: true

about:
  homepage: https://github.com/HaoZeke/pychum
  summary: Input generators for CHUMPs
  license: MIT
  license_file: LICENSE
  repository: https://github.com/HaoZeke/pychum

extra:
  recipe-maintainers:
    - HaoZeke
