{% set version = "0.4.3" %}
{% set python_min = "3.10" %}

package:
  name: biaplotter
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/b/biaplotter/biaplotter-{{ version }}.tar.gz
  sha256: c61c8ed4c6792e2627258acad32ccdeb09ed5ac17ebb793c8cc283cbe9cfe99f

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - setuptools >=42.0.0
    - setuptools-scm
    - wheel
    - pip
  run:
    - python >={{ python_min }}
    - numpy >=1.22.0
    - magicgui
    - qtpy
    - napari-matplotlib
    - nap-plot-tools >=0.1.0

test:
  commands:
    # A plain ``import biaplotter`` pulls in napari -> vispy, whose OpenGL
    # (GL ES 2.0) backend cannot load on the headless build agents. We
    # validate the environment with ``pip check`` instead of an import test.
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://github.com/BiAPoL/biaplotter
  summary: A tool for interactive plotting in napari
  doc_url: https://biapol-biaplotter.readthedocs.io/en/stable/
  license: BSD-3-Clause
  license_file: LICENSE

extra:
  recipe-maintainers:
    - bruno-pannunzio
