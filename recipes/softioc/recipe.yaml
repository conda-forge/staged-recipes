schema_version: 1

context:
  name: softioc
  version: 4.7.0

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/${{ name[0] }}/${{ name }}/softioc-${{ version }}.tar.gz
  sha256: 8514c6f6b9df1191462171df6a2b9d9b33e6492fe252d3c5839d2f132d307add

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  python:
    entry_points:
      - pythonSoftIOC = softioc.__main__:main

requirements:
  build:
    - ${{ compiler('c') }}
    - ${{ stdlib('c') }}
  host:
    - python ${{ python_min }}.*
    - setuptools
    - wheel
    - setuptools_dso >=2.1
    - epicscorelibs >=7.0.7.99.1.1a3
    - pip
  run:
    - python >=${{ python_min }}
    - epicscorelibs >=7.0.10.99.0.1,<7.0.10.99.1
    - pvxslibs >=1.3.2a2
    - numpy
    - epicsdbbuilder >=1.4
    - pyyaml >=6.0

tests:
  - python:
      imports:
        - softioc
  - requirements:
      run:
        - pip
        - python ${{ python_min }}.*
    script:
      - pip check
      - pythonSoftIOC --help

about:
  summary: Embed an EPICS IOC in a Python process
  license: Apache-2.0
  license_file: LICENSE
  homepage: https://github.com/DiamondLightSource/pythonSoftIOC

extra:
  recipe-maintainers:
    - jwlodek
