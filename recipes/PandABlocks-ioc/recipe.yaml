schema_version: 1

context:
  name: PandABlocks-ioc
  version: 0.11.5

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/${{ name[0] }}/${{ name }}/pandablocks_ioc-${{ version }}.tar.gz
  sha256: f09e27854069096f1fe36ac81a7508f669c9db6cf71160838b4d6a3513423852

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  python:
    entry_points:
      - pandablocks-ioc = pandablocks_ioc.__main__:cli

requirements:
  host:
    - python ${{ python_min }}
    - setuptools >=64
    - setuptools-scm >=8
    - pip
  run:
    - python >=${{ python_min }}
    - setuptools >=64
    - numpy <2
    - click
    - h5py
    - softioc >=4.4.0
    - pandablocks >=0.10.0,<0.11.dev0
    - pvi >=0.10.0,<0.11.dev0
    - typing_extensions

tests:
  - python:
      imports:
        - pandablocks_ioc
      pip_check: true
  - requirements:
      run:
        - pip
        - python ${{ python_min }}
    script:
      - pandablocks-ioc --help

about:
  homepage: https://github.com/PandaBlocks/PandABlocks-ioc
  summary: Create an IOC from a PandA
  license: Apache-2.0
  license_file: LICENSE

extra:
  recipe-maintainers:
    - jwlodek
