{% set version = "0.3.0" %}

package:
  name: pypath-ewe
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/p/pypath-ewe/pypath_ewe-{{ version }}.tar.gz
  sha256: 073ee9609adc937cab2b6e7932088b38e634296dc89e1c9543ea036a7af902eb

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python >=3.10
    - setuptools >=68.0
    - pip
  run:
    - python >=3.10
    - numpy >=1.24
    - pandas >=2.0
    - scipy >=1.10
    - matplotlib-base >=3.7

test:
  imports:
    - pypath
  commands:
    - pip check
  requires:
    - pip
    - python

about:
  home: https://github.com/razinkele/PyPath
  summary: Python implementation of Ecopath with Ecosim (EwE) for food web modeling
  doc_url: https://razinkele.github.io/PyPath/
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - razinkele
