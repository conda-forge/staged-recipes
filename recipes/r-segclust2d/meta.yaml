{% set version = '0.3.3' %}
{% set posix = 'm2-' if win else '' %}

package:
  name: r-segclust2d
  version: "{{ version|replace('-', '_') }}"

source:
  url:
    - {{ cran_mirror }}/src/contrib/segclust2d_{{ version }}.tar.gz
    - {{ cran_mirror }}/src/contrib/Archive/segclust2d/segclust2d_{{ version }}.tar.gz
  sha256: 953becdfd4374445ebe94ef4eda239ec2ea97ee67ef388f6a2a8d9e42ead4d6f

build:
  number: 0
  rpaths:
    - lib/R/lib/
    - lib/
  missing_dso_whitelist:
    - '*/R.dll'        # [win]
    - '*/Rblas.dll'    # [win]
    - '*/Rlapack.dll'  # [win]

requirements:
  build:
    - {{ compiler('c') }}              # [not win]
    - {{ stdlib("c") }}                # [not win]
    - {{ compiler('m2w64_c') }}        # [win]
    - {{ compiler('cxx') }}            # [not win]
    - {{ compiler('m2w64_cxx') }}      # [win]
    - {{ posix }}filesystem        # [win]
    - {{ posix }}make
    - {{ posix }}sed               # [win]
    - {{ posix }}coreutils         # [win]
    - {{ posix }}zip               # [win]
    - cross-r-base {{ r_base }}    # [build_platform != target_platform]
  host:
    - r-base
    - r-rcolorbrewer >=1.1_2
    - r-rcpp
    - r-rcpparmadillo
    - r-cli
    - r-dplyr >=1.0.0
    - r-ggplot2 >=2.1.0
    - r-magrittr
    - r-plyr >=1.8.4
    - r-reshape2 >=1.4.1
    - r-rlang
    - r-scales
    - r-zoo
  run:
    - r-base
    - r-rcolorbrewer >=1.1_2
    - r-rcpp
    - r-rcpparmadillo
    - r-cli
    - r-dplyr >=1.0.0
    - r-ggplot2 >=2.1.0
    - r-magrittr
    - r-plyr >=1.8.4
    - r-reshape2 >=1.4.1
    - r-rlang
    - r-scales
    - r-zoo

test:
  commands:
    - $R -e "library('segclust2d')"           # [not win]
    - "\"%R%\" -e \"library('segclust2d')\""  # [win]

about:
  home: https://github.com/rpatin/segclust2d
  license: GPL-3.0-only
  summary: Provides two methods for segmentation and joint segmentation/clustering of bivariate
    time-series. Originally intended for ecological segmentation (home-range and behavioural
    modes) but easily applied on other series, the package also provides tools for analysing
    outputs from R packages 'moveHMM' and 'marcher'. The segmentation method is a bivariate
    extension of  Lavielle's method available in 'adehabitatLT' (Lavielle, 1999 <doi:10.1016/S0304-4149(99)00023-X>
    and 2005 <doi:10.1016/j.sigpro.2005.01.012>). This method rely on dynamic programming
    for efficient segmentation. The segmentation/clustering method alternates steps
    of dynamic programming with an Expectation-Maximization algorithm. This is an extension
    of Picard et al (2007) <doi:10.1111/j.1541-0420.2006.00729.x> method (formerly available
    in 'cghseg' package) to the bivariate case. The method is fully described in Patin
    et al (2018) <doi:10.1101/444794>.
  license_family: GPL3
  license_file:
    - '{{ environ["PREFIX"] }}/lib/R/share/licenses/GPL-3'

extra:
  recipe-maintainers:
    - conda-forge/r

