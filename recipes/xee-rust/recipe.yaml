context:
  version: "0.1.6"

package:
  name: xee-rust
  version: ${{ version }}

source:
  url: https://github.com/Paligo/xee/archive/refs/tags/xee-v${{ version }}.tar.gz
  sha256: a330b26d359e83fad9b736f4ab112a907b031e9dea8523af1561d3c3a9f94be5

build:
  number: 0
  script:
    env:
      CARGO_PROFILE_RELEASE_STRIP: symbols
      CARGO_PROFILE_RELEASE_LTO: fat
    content:
      - if: unix
        then:
          - cargo auditable install --locked --no-track --bins --root ${{ PREFIX }} --path ./xee
        else:
          - cargo auditable install --locked --no-track --bins --root %LIBRARY_PREFIX% --path ./xee
      - cargo-bundle-licenses --format yaml --output ./THIRDPARTY.yml

requirements:
  build:
    - ${{ stdlib('c') }}
    - ${{ compiler('c') }}
    - ${{ compiler('rust') }}
    - cargo-bundle-licenses
    - cargo-auditable

tests:
  - script:
      - xee --help
      - xee --version
  - package_contents:
      bin:
        - xee
      strict: true

about:
  homepage: https://github.com/Paligo/xee
  summary: "Xee CLI. Swiss Army knife for XML. XPath and XSLT"
  description: |
    Xee is an XML Execution Engine written in Rust. It provides
    an almost complete XPath 3.1 implementation and a command-line
    tool that can load XML documents, issue XPath expressions against
    them (including in a REPL), pretty-print XML documents, and
    transform XML documents using XSLT stylesheets.
  license: MIT
  license_file:
    - LICENSE-MIT
    - THIRDPARTY.yml
  documentation: https://docs.rs/xee
  repository: https://github.com/Paligo/xee

extra:
  recipe-maintainers:
    - salim-b
