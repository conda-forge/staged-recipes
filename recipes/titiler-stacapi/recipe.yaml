schema_version: 1

context:
  version: "2.0.2"

package:
  name: titiler-stacapi
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/t/titiler-stacapi/titiler_stacapi-${{ version }}.tar.gz
  sha256: 848694882bf81ff460de906ff5d749a6aafbdddbedd0889deaf6ee5363369bae

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python >=3.11
    - hatchling
    - pip
  run:
    - python >=3.11
    - orjson
    - titiler-core >=2.0,<2.1
    - titiler-mosaic >=2.0,<2.1
    - titiler-extensions >=2.0,<2.1
    - pystac-client
    - pydantic >=2.4,<3.0
    - pydantic-settings >=2.0,<3.dev0

tests:
  - python:
      imports:
        - titiler.stacapi
      pip_check: true

about:
  summary: Connect titiler to STAC APIs.
  license: MIT
  license_file: LICENSE
  homepage: https://developmentseed.org/titiler-stacapi/
  repository: https://github.com/developmentseed/titiler-stacapi
  documentation: https://developmentseed.org/titiler-stacapi/

extra:
  recipe-maintainers:
    - martinRenou
