schema_version: 1

context:
  version: 4.3.0

package:
  name: pyosmium
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/o/osmium/osmium-${{ version }}.tar.gz
  sha256: 8f1f66633dbed1a0259a890afabd14592b1dec29a72970fd7a69f462215214f5

build:
  number: 0
  python:
    entry_points:
      - pyosmium-get-changes = osmium.tools.pyosmium_get_changes:main
      - pyosmium-up-to-date = osmium.tools.pyosmium_up_to_date:main

requirements:
  host:
    - python
    - scikit-build-core >=0.10
    - pybind11 >=2.9
    - pip
    - libosmium
    - protozero
    - lz4-c
  run:
    - python
    - requests
    - lz4-c

tests:
  - python:
      imports:
        - osmium
      pip_check: true
  - requirements:
      run:
        - pip
        - python
    script:
      - pyosmium-get-changes --help
      - pyosmium-up-to-date --help

about:
  summary: Python bindings for libosmium, the data processing library for OSM data
  license: BSD-2-Clause
  license_file: LICENSE.TXT
  homepage: https://osmcode.org/pyosmium
  repository: https://github.com/osmcode/pyosmium
  documentation: https://docs.osmcode.org/pyosmium/latest/

extra:
  recipe-maintainers:
    - travishathaway
