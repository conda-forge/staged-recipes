{% set name = "astropydantic" %}
{% set version = "0.0.6" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/astropydantic-{{ version }}.tar.gz
  sha256: c4afcc4083211944693838923729342fe1c59e39468feb27829c5ded39fca443

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python >=3.10
    - setuptools
    - pip
  run:
    - python >=3.10
    - pydantic >2.0.0
    - astropy

test:
  imports:
    - astropydantic
  commands:
    - pip check
  requires:
    - pip

about:
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - JBorrow
    - iparask
