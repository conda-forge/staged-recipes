{% set name = "astropydantic" %}
{% set version = "0.0.6" %}
{% set python_min = "3.10" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/astropydantic-{{ version }}.tar.gz
  sha256: c4afcc4083211944693838923729342fe1c59e39468feb27829c5ded39fca443

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - setuptools
    - pip
  run:
    - python >={{ python_min }}
    - pydantic >2.0.0
    - astropy-base

test:
  imports:
    - astropydantic
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://pypi.org/project/astropydantic/
  summary: An (unofficial) package providing pydantic typing support for astropy unit types. Can be used to de(serialize) astropy quantities and units.
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - JBorrow
    - iparask
