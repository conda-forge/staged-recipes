{% set version = "0.1.0" %}

package:
  name: cholrot
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/c/cholrot/cholrot-{{ version }}.tar.gz
  sha256: f4d2afff0e9071941eceb1229ab05d3d91a0fa7a5ec4775cfbb2369bc55c48cf

build:
  skip: true  # [py<312]
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  build:
    - {{ compiler('cxx') }}
    - {{ stdlib("c") }}
  host:
    - python
    - setuptools >=77
    - wheel
    - pybind11 >=2.12
    - pip
  run:
    - python
    - numpy >=1.23

test:
  imports:
    - cholrot
  commands:
    - pip check
    - python -c "import cholrot; print(cholrot.__version__, cholrot.backend()); assert cholrot.backend() == 'cpp'"
  requires:
    - pip
    - python

about:
  home: https://github.com/smiryusupov/cholrot
  summary: Rank-one Cholesky update/downdate, implicit factor-vector products, and rank-one Cholesky solves.
  license: Apache-2.0
  license_file:
    - LICENSE
    - NOTICE
  dev_url: https://github.com/smiryusupov/cholrot
  doc_url: https://cholrot.readthedocs.io/

extra:
  recipe-maintainers:
    - smiryusupov
