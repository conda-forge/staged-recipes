{% set name = "jnv" %}
{% set version = "0.1.1" %}

package:
  name: {{ name | lower }}
  version: {{ version }}

source:
  url: https://github.com/ynqa/{{ name }}/archive/refs/tags/v{{ version }}.tar.gz
  sha256: 40fdb9de56d7ad55f7f3c52440ba7920f9aaffec07d59881b04e87a6facc5d28

build:
  number: 0
  skip: True  # [win]

requirements:
  # https://github.com/ynqa/j9/issues/3
  # host:
  #   - jq
  build:
    - {{ compiler('rust') }}
    - {{ compiler('c') }}
    - {{ compiler('cxx') }}
    - autoconf
    - automake
    - libtool
    - cargo-bundle-licenses

test:
  commands:
    - jnv --version

about:
  home: https://github.com/ynqa/jnv
  license: MIT
  license_family: MIT
  license_file:
    - LICENSE
    - THIRDPARTY_LICENSES.yaml
  summary: JSON navigator and interactive filter leveraging jq

extra:
  recipe-maintainers:
    - pavelzw
    - moritzwilksch
