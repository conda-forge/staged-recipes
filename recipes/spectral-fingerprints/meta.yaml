{% set name = "spectral-fingerprints" %}
{% set version = "2.1.2" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/spectral_fingerprints-{{ version }}.tar.gz
  sha256: a8f34b487ff2baf459026a8fae6bfe1b85c149f8828c5b7376660b66f6fa0609

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - setuptools >=61.0
    - pip
  run:
    - python >={{ python_min }}
    - numpy >=1.22.2
    - bitarray ==2.4.1
    - matplotlib-base
    - scipy

test:
  imports:
    - spectral_fingerprints
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  summary: Binary-valued fingerprints for describing spectral properties.
  home: https://github.com/kubanmar/spectral-fingerprints
  license: Apache-2.0
  license_file: LICENSE

extra:
  recipe-maintainers:
    - jan-janssen
