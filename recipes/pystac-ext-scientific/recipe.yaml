schema_version: 1

context:
  version: "1.0.0"

package:
  name: pystac-ext-scientific
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/p/pystac-ext-scientific/pystac.extensions.scientific-${{ version }}.tar.gz
  sha256: b55128b7b2281c28dcfc3c00c008fe4391c84b47a7572c4770766f1e96eec5b5

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - hatchling
    - pip
  run:
    - python >=${{ python_min }}
    - pystac-core

tests:
  - python:
      imports:
        - pystac.extensions.scientific
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  summary: Scientific extension for PySTAC
  license: Apache-2.0
  license_file: LICENSE
  homepage: https://pypi.org/project/pystac-ext-scientific/
  documentation: https://pystac.readthedocs.io

extra:
  recipe-maintainers:
    - ocefpaf
