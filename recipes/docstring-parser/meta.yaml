{% set version = "0.16" %}

package:
  name: docstring-parser
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/d/docstring-parser/docstring_parser-{{ version }}.tar.gz
  sha256: 538beabd0af1e2db0146b6bd3caa526c35a34d61af9fd2887f3a8a27a739aa6e

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python >=3.6,<4.0
    - poetry-core
    - pip
  run:
    - python >=3.6,<4.0

test:
  imports:
    - docstring_parser
  commands:
    - pip check
  requires:
    - pip
    - python

about:
  home: https://github.com/rr-/docstring_parser
  summary: Parse Python docstrings in reST, Google and Numpydoc format
  license: MIT
  license_file: LICENSE.md

extra:
  recipe-maintainers:
    - fitzgeralddp
