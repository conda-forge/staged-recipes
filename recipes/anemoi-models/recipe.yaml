schema_version: 1

context:
  version: "0.13.1"

package:
  name: anemoi-models
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/a/anemoi-models/anemoi_models-${{ version }}.tar.gz
  sha256: d2b578d7288d452af2bfe8db69f0aae7b460ddb7c3c16b8da2afcc82e9fa3b75

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  python:
    entry_points:
      - anemoi-models = anemoi.models.__main__:main

requirements:
  host:
    - python >=3.11,<3.14
    - setuptools >=61
    - setuptools-scm >=8
    - pip
  run:
    - python >=3.11,<3.14
    - anemoi-utils >=0.1.9
    - einops >=0.6.1
    - hydra-core >=1.3
    - pytorch >=2.3,<2.11
    - pytorch_geometric >=2.3

tests:
  - python:
      imports:
        - anemoi
      pip_check: true
      python_version: ${{ python_min }}.*
  - requirements:
      run:
        - pip
        - python ${{ python_min }}.*
    script:
      - anemoi-models --help

about:
  summary: A package to hold various functions to support training of ML models.
  license: Apache-2.0
  license_file: LICENSE
  homepage: https://github.com/ecmwf/anemoi-models/
  documentation: https://anemoi-models.readthedocs.io/

extra:
  recipe-maintainers:
    - tjtg
    - jasonjunweilyu
    - HCookie
