{% set name = "speckit-specops" %}
{% set version = "0.2.0" %}
{% set python_min = "3.10" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/speckit_specops-{{ version }}.tar.gz
  sha256: 9ea6aec31dc7dc39e6be163e28e2101c79989b165bcda0e3f4094a4dd6064e08

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0
  entry_points:
    - specops = specops.cli:app

requirements:
  host:
    - python {{ python_min }}
    - hatchling
    - pip
  run:
    - python >={{ python_min }}
    - typer >=0.9.0
    - pyyaml >=6.0
    - gitpython >=3.1.40
    - git

test:
  imports:
    - specops
  commands:
    - pip check
    - specops --help
  requires:
    - python {{ python_min }}
    - pip

about:
  home: https://github.com/paulo2nd/specops
  summary: A Spec-Driven Development (SDD) process enforcement CLI extending Speckit
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - paulo2nd
