context:
  version: "0.2.1"
  python_min: "3.10"

package:
  name: speckit-specops
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/s/speckit-specops/speckit_specops-${{ version }}.tar.gz
  sha256: aef0e0c351f845c09ed2068f526c57845c2b5aaaefb45fe9edecfc575801bac8

build:
  noarch: python
  script: python -m pip install . -vv --no-deps --no-build-isolation
  number: 0
  python:
    entry_points:
      - specops = specops.cli:app

requirements:
  host:
    - python ${{ python_min }}
    - hatchling
    - pip
  run:
    - python >=${{ python_min }}
    - typer >=0.9.0
    - pyyaml >=6.0
    - gitpython >=3.1.40
    - git

tests:
  - python:
      imports:
        - specops
      pip_check: true
      python_version: ${{ python_min }}.*
  - script:
      - specops --help

about:
  homepage: https://github.com/paulo2nd/specops
  summary: A Spec-Driven Development (SDD) process enforcement CLI extending Speckit
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - paulo2nd
