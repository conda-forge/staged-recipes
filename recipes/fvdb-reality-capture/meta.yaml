{% set name = "fvdb-reality-capture" %}
{% set version = "0.5.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/fvdb_reality_capture-{{ version }}.tar.gz
  sha256: 8b4c14bb50ac784b69413a2c9bbfdbfeffc1fa136137b586cbd72cf292f7baba

build:
  entry_points:
    - frgs = fvdb_reality_capture.cli.frgs:frgs
    - frdev = fvdb_reality_capture.cli.frdev:frdev
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python
    - setuptools >=61.0
    - pip
  run:
    - python
    - fvdb-core >=0.5.0
    - boto3
    - dlnr_lite
    - numpy >=2.0.0
    - opencv
    - point-cloud-utils
    - pye57
    - pyproj
    - requests
    - sam2 ==1.1.0
    - scikit-image
    - scipy
    - tensorboard
    - pytorch >=2.8.0
    - torchvision
    - tqdm
    - tyro
    - usd-core
    - msgpack-python
    - types-usd

test:
  imports:
    - fvdb_reality_capture
  commands:
    - pip check
    - frgs --help
    - frdev --help
  requires:
    - pip

about:
  summary: fVDB Reality Capture Toolbox.
  license: Apache-2.0
  license_file: LICENSE

extra:
  recipe-maintainers:
    - swahtz
