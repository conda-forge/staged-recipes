{% set version = "0.4.2" %}

package:
  name: mkl_umath
  version: {{ version }}

source:
  url: https://github.com/IntelPython/mkl_umath/archive/{{ version }}.tar.gz
  sha256: a2d9571bb967e3dd17a7edb43373dda7e0df7399853dd59f36069b2b61ab3d2d

build:
  number: 0
  skip: true  # [osx]
  ignore_run_exports:
    - blas
    - numpy  # [win]
  missing_dso_whitelist:
    - $RPATH/mkl_umath_loops.dll  # [win]

requirements:
  build:
    - {{ compiler('c') }}
    - {{ compiler('cxx') }}
    - {{ compiler('dpcpp') }} >=2024.2  # [not osx]
    - {{ stdlib('c') }}
  host:
    - python
    - pip
    - setuptools >=77
    - cmake
    - ninja
    - cython
    - scikit-build
    - mkl-devel
    - numpy  # [not win]
    - numpy <2.4  # [win]
    # TODO: remove win numpy pin when numpy 2.5 is released, see https://github.com/numpy/numpy/issues/31337
  run:
    - python
    - python-gil  # [py>=314]
    - {{ pin_compatible('mkl') }}
    - {{ pin_compatible('numpy') }}
    - {{ pin_compatible('intel-cmplr-lib-rt', min_pin='x.x', max_pin='x') }}
    - llvm-openmp  # [linux]

test:
  requires:
    - pip
    - pytest
  imports:
    - mkl_umath
    - mkl_umath._ufuncs
    - mkl_umath._patch_numpy
  commands:
    - pip check
    - pytest --pyargs mkl_umath

about:
  home: http://github.com/IntelPython/mkl_umath
  license: BSD-3-Clause
  license_file: LICENSE.txt
  summary: Universal functions for real and complex floating point arrays powered by Intel(R) MKL SVML
  description: |
    mkl_umath is a package implementing NumPy universal functions (ufuncs) based on
    Intel Short Vector Math Library (SVML) and Intel MKL Vector Math Library (VML),
    providing accelerated math operations for real and complex floating point arrays.
  dev_url: https://github.com/IntelPython/mkl_umath

extra:
  recipe-maintainers:
    - ndgrigorian
    - xaleryb
    - jharlow-intel
    - antonwolfy
