context:
  version: "2.7.0"

package:
  name: oapi-codegen
  version: ${{ version }}

source:
  url: https://github.com/oapi-codegen/oapi-codegen/archive/refs/tags/v${{ version }}.tar.gz
  sha256: ceb1c0f9812b7d7c8ea9a5f05790ee80020e7b65c7872eb6bf0425c1ef2c9825
  target_directory: src

build:
  number: 0
  script:
    - cd src
    - go-licenses save ./cmd/oapi-codegen --save_path "../library_licenses"
    - if: unix
      then: go build -v -o $PREFIX/bin/oapi-codegen -ldflags="-s -w" ./cmd/oapi-codegen
      else: go build -v -o %LIBRARY_BIN%\oapi-codegen.exe -ldflags="-s -w" ./cmd/oapi-codegen

requirements:
  build:
    - ${{ compiler("go-nocgo") }}
    - go-licenses

tests:
  - script: oapi-codegen --help
  - package_contents:
      bin:
        - oapi-codegen
      strict: true

about:
  homepage: https://github.com/oapi-codegen/oapi-codegen
  summary: Generate Go client and server boilerplate from OpenAPI 3 specifications
  description: |
    oapi-codegen is a Go-based tool for generating Go client and server boilerplate
    code from OpenAPI 3 specifications. It supports generating types, client code,
    server code, and more from a single OpenAPI specification file.
  license: Apache-2.0
  license_file:
    - src/LICENSE
    - library_licenses/
  documentation: https://pkg.go.dev/github.com/oapi-codegen/oapi-codegen/v2
  repository: https://github.com/oapi-codegen/oapi-codegen

extra:
  recipe-maintainers:
    - xhochy
