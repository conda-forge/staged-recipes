{% set name = "textract-py3" %}
{% set version = "2.1.1" %}
{% set python_min = "3.7" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/textract_py3-{{ version }}.tar.gz
  sha256: b5b99cca3d5f737e3243fe75c74e295d1ee8077b8e7437f8ff7460bf1857b9e3

build:
  entry_points:
    - textract = textract.bin.textract:main
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - poetry-core
    - pip
  run:
    - python >={{ python_min }}
    - argcomplete >=1.10.0
    - beautifulsoup4 >=4.8.0
    - chardet >=3
    - cryptography >=39.0
    - docx2txt >=0.8
    - importlib-metadata  # [py<38]
    - msg-extractor >=0.30.11
    - pdfminer.six >=20221105
    - python-pptx >=0.6.18
    - six >=1.16.0
    - speechrecognition >=3.8.1
    - xlrd >=1.2.0,<2.0.0
  run_constrained:
    - pocketsphinx >=0.1.15

test:
  imports:
    - textract
  commands:
    - pip check
    - textract --help
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://github.com/KyleKing/textract-py3
  summary: "Minimally maintained fork of deanmalmgren/textract to replace '*' dependencies "
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - KyleKing
