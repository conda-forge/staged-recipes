{% set version = "1.1.6" %}

package:
  name: w2dynamics
  version: {{ version }}

source:
  url: https://github.com/w2dynamics/w2dynamics/archive/v{{ version }}.tar.gz
  sha256: ed95e3f849ef9881e5675a728d1c6c4cd790800d971433288eea76c15d680d54

build:
  skip: True  # [not linux]
  number: 0

requirements:
  build:
    - {{ compiler('fortran') }}
    - {{ compiler('cxx') }}
    - {{ stdlib('c') }}
    - cmake
  host:
    - libblas
    - libcblas
    - liblapack
    - liblapacke
    - python
    - numpy
    - scipy
    - mpi4py
    - h5py
    - nfft
    - configobj
  run:
    - python

test:
  commands:
    - DMFT.py

about:
  home: https://github.com/w2dynamics/w2dynamics
  summary: 'w2dynamics is a hybridization-expansion continuous-time quantum Monte Carlo package, developed jointly in Wien and Würzburg.'
  description: |
    A continuous-time hybridization-expansion Monte Carlo code for 
    calculating n-particle Greens functions of the Anderson impurity model
    and within dynamical mean-field theory.
  license: GPL-3.0-or-later
  license_family: GPL
  license_file: LICENSE

extra:
  recipe-maintainers:
    - jan-janssen
