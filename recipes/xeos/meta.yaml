{% set name = "xeos" %}
{% set version = "0.1.0" %}
{% set python_min = "3.11" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz
  sha256: 63ea705977f355293546610f6c7e331503e9f418b2dba960f10be6d36c94d245

build:
  noarch: python
  number: 0
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python {{ python_min }}
    - hatchling
    - pip
  run:
    - python >={{ python_min }}
    - numpy
    - xarray

test:
  imports:
    - xeos
  commands:
    - pip check
  requires:
    - python {{ python_min }}
    - pip

about:
  home: https://github.com/hdrake/xeos
  summary: xarray-enabled wrappers for various Equations of State of seawater
  description: |
    Lightweight, xarray/dask-aware wrappers over many seawater Equations of
    State, so analysts can apply the same EOS their ocean-model run used
    (MOM6, Oceananigans, MITgcm, MPAS-Ocean), selected by the model's own
    selector string.
  license: MIT
  license_file: LICENSE
  doc_url: https://github.com/hdrake/xeos
  dev_url: https://github.com/hdrake/xeos

extra:
  recipe-maintainers:
    - hdrake
