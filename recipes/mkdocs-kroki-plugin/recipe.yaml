context:
  version: "1.6.0"

package:
  name: mkdocs-kroki-plugin
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/m/mkdocs-kroki-plugin/mkdocs_kroki_plugin-${{ version }}.tar.gz
  sha256: 5d07909a8189703470571c6beabe29e168c32b16f84b231f68d9739868afe4c2

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - hatchling
    - pip
  run:
    - python >=${{ python_min }}
    - defusedxml >=0.7.1
    - httpx >=0.24.0
    - mkdocs >=1.5.0,<=1.6.1
    - properdocs
    - result >=0.17.0

tests:
  - python:
      imports:
        - kroki
        - kroki.plugin
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"
  - script:
      - python -c "from importlib.metadata import entry_points; assert any(ep.name == 'kroki' for ep in entry_points(group='mkdocs.plugins')), 'kroki plugin entry point is not registered'"

about:
  homepage: https://github.com/AVATEAM-IT-SYSTEMHAUS/mkdocs-kroki-plugin
  repository: https://github.com/AVATEAM-IT-SYSTEMHAUS/mkdocs-kroki-plugin
  documentation: https://github.com/AVATEAM-IT-SYSTEMHAUS/mkdocs-kroki-plugin#readme
  summary: MkDocs plugin for Kroki diagrams
  description: |
    mkdocs-kroki-plugin is a MkDocs plugin that renders text-based diagrams
    through a Kroki server. It supports a wide range of diagram languages
    (PlantUML, Mermaid, GraphViz, BlockDiag, D2, C4 and more), can embed
    diagrams from external files, and provides display sizing, background
    color and theme-aware styling options.
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - julian-belina
