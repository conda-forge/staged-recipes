# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  name: tree-sitter-php
  version: "0.24.2"

package:
  name: ${{ name }}
  version: ${{ version }}

# Upstream publishes wheels only (no sdist) to PyPI, so build from GitHub tag.
# Patch fixes upstream pyproject.toml's invalid `license = "LICENSE"` field
# (rejected as a non-SPDX identifier by setuptools >=70); reported upstream.
source:
  url: https://github.com/tree-sitter/${{ name }}/archive/refs/tags/v${{ version }}.tar.gz
  sha256: 0e73ad63dda67ac12c0e012726a4e1a9811c26b020a0a2dea3e889f8246d9cf4
  patches:
    - patches/0001-fix-invalid-pep621-license-field.patch

build:
  number: 0
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  build:
    - if: build_platform != host_platform
      then:
        - python
        - cross-python_${{ target_platform }}
    - ${{ compiler('c') }}
    - ${{ stdlib('c') }}
  host:
    - python
    - setuptools >=42
    - wheel
    - pip
  run:
    - python

tests:
  - python:
      imports:
        - tree_sitter_php
      pip_check: true

about:
  summary: PHP grammar for tree-sitter
  license: MIT
  license_file: LICENSE
  homepage: https://github.com/tree-sitter/tree-sitter-php

extra:
  recipe-maintainers:
    - rxm7706
