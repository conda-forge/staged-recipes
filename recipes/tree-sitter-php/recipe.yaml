schema_version: 1

context:
  version: "0.24.1"

package:
  name: tree-sitter-php
  version: ${{ version }}

source:
  url: https://github.com/tree-sitter/tree-sitter-php/archive/refs/tags/v${{ version }}.tar.gz
  sha256: 3320ba539ea988967a02568dbf41945df0044ecb9fa88ea38daa1116489093db

build:
  number: 0
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  build:
    - ${{ compiler("c") }}
  host:
    - python
    - pip
    - setuptools >=42
    - wheel
  run:
    - python

tests:
  - python:
      imports:
        - tree_sitter_php

about:
  homepage: https://github.com/tree-sitter/tree-sitter-php
  summary: PHP grammar for tree-sitter
  license: MIT
  license_file: LICENSE
  repository: https://github.com/tree-sitter/tree-sitter-php

extra:
  recipe-maintainers:
    - killua156
    - mgorny
