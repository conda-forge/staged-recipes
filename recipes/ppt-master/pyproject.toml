[build-system]
requires = ["setuptools>=64"]
build-backend = "setuptools.backends.legacy:build"

[project]
name = "ppt-master"
version = "2.4.0"
description = "AI-generates natively editable PPTX from any document"
readme = "README.md"
license = {file = "LICENSE"}
requires-python = ">=3.10"
dependencies = [
    "python-pptx>=0.6.21",
    "PyMuPDF>=1.23.0",
    "mammoth>=1.6.0",
    "markdownify>=0.11.6",
    "openpyxl>=3.1.0",
    "Pillow>=9.0.0",
    "numpy>=1.20.0",
    "requests>=2.31.0",
    "beautifulsoup4>=4.12.0",
]

[project.scripts]
svg-to-pptx      = "svg_to_pptx:main"
pdf-to-md        = "source_to_md.pdf_to_md:main"
doc-to-md        = "source_to_md.doc_to_md:main"
web-to-md        = "source_to_md.web_to_md:main"
ppt-image-gen    = "image_gen:main"
ppt-finalize-svg = "finalize_svg:main"
ppt-manager      = "project_manager:main"
ppt-update-spec  = "update_spec:main"
ppt-notes-split  = "total_md_split:main"
ppt-master-install = "ppt_master_install:main"

[tool.setuptools]
py-modules = [
    "config",
    "error_helper",
    "finalize_svg",
    "image_gen",
    "project_manager",
    "project_utils",
    "analyze_images",
    "batch_validate",
    "pptx_animations",
    "pptx_template_import",
    "rotate_images",
    "svg_position_calculator",
    "svg_quality_checker",
    "total_md_split",
    "update_spec",
    "ppt_master_install",
]

[tool.setuptools.package-dir]
"" = "skills/ppt-master/scripts"

[tool.setuptools.packages.find]
where = ["skills/ppt-master/scripts"]
include = [
    "svg_to_pptx*",
    "svg_finalize*",
    "image_backends*",
    "template_import*",
    "source_to_md*",
]
