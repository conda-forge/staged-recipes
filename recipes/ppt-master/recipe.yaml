schema_version: 1

context:
  version: "2.4.0"
  python_min: "3.10"

package:
  name: ppt-master
  version: ${{ version }}

source:
  url: https://github.com/hugohe3/ppt-master/archive/refs/tags/v${{ version }}.tar.gz
  sha256: ea632797d6a48443399b1d59f0900b534cb67679d5ec17d7bd0d9acfa97c54b3

build:
  number: 0
  noarch: python

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - setuptools >=64
  run:
    - python >=${{ python_min }}
    - python-pptx >=0.6.21
    - pymupdf >=1.23.0
    - mammoth >=1.6.0
    - markdownify >=0.11.6
    - openpyxl >=3.1.0
    - pillow >=9.0.0
    - numpy >=1.20.0
    - requests >=2.31.0
    - beautifulsoup4 >=4.12.0

tests:
  - python:
      imports:
        - svg_to_pptx
        - svg_finalize
        - image_backends
        - source_to_md
      pip_check: false
      python_version: ${{ python_min }}.*
  - script:
      - svg-to-pptx --help
      - pdf-to-md --help
      - doc-to-md --help
      - web-to-md --help
      - ppt-finalize-svg --help
      - ppt-master-install --help
      # ppt-manager uses raw sys.argv with no --help flag; test with no args
      - ppt-manager

about:
  homepage: https://github.com/hugohe3/ppt-master
  summary: AI-generates natively editable PPTX from any document
  description: |
    ppt-master converts PDFs, DOCX files, URLs, and Markdown into fully editable
    PowerPoint presentations using real DrawingML shapes, not images. Includes a
    Claude Code skill for AI-assisted presentation authoring, plus standalone CLI
    tools for document conversion and SVG-to-PPTX pipeline steps.
  license: MIT
  license_file: LICENSE
  documentation: https://github.com/hugohe3/ppt-master/tree/main/docs
  repository: https://github.com/hugohe3/ppt-master

extra:
  recipe-maintainers:
    - killua156
