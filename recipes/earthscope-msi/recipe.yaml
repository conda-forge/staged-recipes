context:
  name: earthscope-msi
  version: "4.2.4"

package:
  name: ${{ name }}
  version: ${{ version }}

source:
  url: https://github.com/EarthScope/msi/archive/refs/tags/v${{ version }}.tar.gz
  sha256: 3b7e7d3ec805fd3461c55ae64e72c43d1ba58d1855ab1af7d9755ceed2917c78

build:
  number: 0
  # Unix-style Makefile (uses uname, curl-config); EarthScope does not target Windows.
  skip:
    - win
  script: build.sh

requirements:
  build:
    - ${{ compiler('c') }}
    - ${{ stdlib('c') }}
    - make
  host:
    - libcurl

tests:
  - script:
      - msi -V
      - msi -h
      # Confirm the build was compiled with libcurl URL support.
      # msi prints its usage to stderr, so redirect it before grepping.
      - msi -h 2>&1 | grep -q "URL-based reads"

about:
  homepage: https://github.com/EarthScope/msi
  summary: miniSEED Inspector, a general purpose tool for parsing miniSEED records
  description: |
    msi (miniSEED Inspector) is a command-line tool for parsing, inspecting
    and summarizing miniSEED formatted data records. It bundles libmseed and
    can optionally read records directly from http(s) URLs.
  license: Apache-2.0
  license_file: LICENSE
  repository: https://github.com/EarthScope/msi

extra:
  recipe-maintainers:
    - omid-earthscope
