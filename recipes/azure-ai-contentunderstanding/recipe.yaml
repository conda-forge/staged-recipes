# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  python_min: "3.10"
  version: "1.1.0"

package:
  name: azure-ai-contentunderstanding
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/a/azure-ai-contentunderstanding/azure_ai_contentunderstanding-${{ version }}.tar.gz
  sha256: 00f39c7cf2ba50c8d4586315f4295a45fad0881daaff07d13d33aea2bafc7ec8

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - setuptools >=77.0.3
    - wheel
    - pip
  run:
    - python >=${{ python_min }}
    - isodate >=0.6.1
    - azure-core >=1.37.0
    - typing-extensions >=4.6.0

tests:
  - python:
      imports:
        - azure.ai.contentunderstanding
        - azure.ai.contentunderstanding.aio
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  summary: Microsoft Corporation Azure AI Content Understanding Client Library for Python
  license: MIT
  license_file: LICENSE
  homepage: https://github.com/Azure/azure-sdk-for-python
  repository: https://github.com/Azure/azure-sdk-for-python
  documentation: https://learn.microsoft.com/python/api/overview/azure/ai-contentunderstanding-readme

extra:
  recipe-maintainers:
    - rxm7706
