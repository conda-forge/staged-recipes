{% set name = "medpython" %}
{% set version = "1.1.2" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/medpython-{{ version }}.tar.gz
  sha256: d0a985526c482a9667f65a66e7b135e579c421feac9b2f53ff1769e1a95f8e70
  

build:
  number: 0
  skip: true  # [py<38 or (win and py!=312 and py!=311)]
  script: 
    - {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  build:
    - {{ compiler('cxx') }}
    - cmake
    - make
    - libgomp  # [linux or win]
    - llvm-openmp  # [osx]
    - {{ stdlib("c") }}
  host:
    - python
    - setuptools >=61.0
    - wheel
    - swig <4.3
    - numpy
    - pip
    - libgomp  # [linux or win]
    - llvm-openmp  # [osx]
    - {{ stdlib("c") }}
  run:
    - python
    - pandas
    - plotly
    - numpy
    - libgomp  # [linux or win]
    - vcomp14  # [win]
    - llvm-openmp  # [osx]
    - {{ stdlib("c") }}

test:
  imports:
    - med
    - AlgoMarker
  commands:
    - pip check
  requires:
    - pip

about:
  home: https://github.com/Medial-EarlySign/medpython
  doc_url: https://medial-earlysign.github.io/MR_Wiki
  dev_url: https://github.com/Medial-EarlySign/medpython
  summary: Medial EarlySign Python Library for Electronical Medical Records
  description: |
    Medial EarlySign Infrastructure for machine learning on Electronical Medical Records 
  license: MIT
  license_file:
    - LICENCE

extra:
  recipe-maintainers:
    - alonyado
