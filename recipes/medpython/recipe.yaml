context:
  name: "medpython"
  version: "1.1.2"
  use_pypi: false

package:
  name: ${{ name }}
  version: ${{ version }}

source:
  - if: use_pypi
    then:
      url: https://pypi.org/packages/source/${{ name[0] }}/${{ name }}/medpython-${{ version }}.tar.gz
      sha256: d0a985526c482a9667f65a66e7b135e579c421feac9b2f53ff1769e1a95f8e70
    else:
      git: https://github.com/Medial-EarlySign/medpython.git
      git_rev: "318c7ecaccd1b8cd6e4b793afb23840d91f816ef"

build:
  number: 0
  script:
    - if: win
      then: set "CMAKE_GENERATOR_TOOLSET=v143"
    - if: win
      then: set "CXXFLAGS=%CXXFLAGS% /openmp:llvm"

    - if: not use_pypi
      then: cd Internal/MedPyExport/generate_binding

    - python -m pip install . --no-deps -vv

requirements:
  build:
    - ${{ compiler('cxx') }}
    - ${{ stdlib("c") }}
    - cmake
    - make
    - swig
  host:
    - python
    - setuptools >=61.0
    - wheel
    - numpy
    - pip
    - eigen
    - libboost-headers
    - libxgboost ==2.0.3
    - dmlc
    - nlohmann_json
    - liblightgbm ==4.6.0
    - if: linux
      then: libgomp
      else: llvm-openmp
  run:
    - python
    - pandas
    - plotly
    - numpy
    - medpython-etl
    - libxgboost ==2.0.3


tests:
  - python:
      imports:
        - med
        - AlgoMarker
      pip_check: true

about:
  homepage: https://github.com/Medial-EarlySign/medpython
  documentation: https://medial-earlysign.github.io/MR_Wiki
  repository: https://github.com/Medial-EarlySign/medpython
  summary: Medial EarlySign Python Library for Electronical Medical Records
  description: |
    Medial EarlySign Infrastructure for machine learning on Electronical Medical Records
  license: MIT
  license_file:
    - LICENCE

extra:
  recipe-maintainers:
    - alonyado
