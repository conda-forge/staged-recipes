context:
  name: "medpython"
  version: "1.2.0"
  use_pypi: true

package:
  name: ${{ name }}
  version: ${{ version }}

source:
  - if: use_pypi
    then:
      url: https://pypi.org/packages/source/${{ name[0] }}/${{ name }}/${{ name }}-${{ version }}.tar.gz
      sha256: eeee5a38889fe3a30241ac115fc20614c03a227a1653e775c54a0af503f6b8f4
    else:
      git: https://github.com/Medial-EarlySign/medpython.git
      rev: "afc5f4992e98c97633b2175aaa3042db7ff57a57"

build:
  number: 0
  script:
    - if: win
      then: set "CMAKE_GENERATOR_TOOLSET=v143"
    - if: win
      then: set "CXXFLAGS=%CXXFLAGS% /openmp:llvm"

    - if: not use_pypi
      then: cd Internal/MedPyExport/generate_binding

    - python -m pip install . --no-deps -vv

requirements:
  build:
    - ${{ compiler('cxx') }}
    - ${{ stdlib("c") }}
    - cmake
    - make
    - swig
  host:
    - python
    - setuptools >=61.0
    - wheel
    - numpy
    - pip
    - eigen
    - libboost-headers
    - libxgboost ==2.0.3
    - dmlc
    - nlohmann_json
    - liblightgbm ==4.6.0
    - if: linux
      then: libgomp
      else: llvm-openmp
  run:
    - python
    - pandas
    - plotly
    - numpy
    - medpython-etl
    - libxgboost ==2.0.3


tests:
  - python:
      imports:
        - med
        - AlgoMarker
      pip_check: true

  - script: 
      - python tests/run_all.py
    requirements:
      run:
        - requests
    files:
      recipe:
        - tests/

about:
  homepage: https://github.com/Medial-EarlySign/medpython
  documentation: https://medial-earlysign.github.io/MR_Wiki
  repository: https://github.com/Medial-EarlySign/medpython
  summary: Medial EarlySign Python Library for Electronical Medical Records
  description: |
    Medial EarlySign Infrastructure for machine learning on Electronical Medical Records
  license: MIT
  license_file:
    - LICENCE

extra:
  recipe-maintainers:
    - alonyado
