context:
  name: "medpython"
  version: "1.1.2"

package:
  name: ${{ name }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/${{ name[0] }}/${{ name }}/medpython-${{ version }}.tar.gz
  sha256: d0a985526c482a9667f65a66e7b135e579c421feac9b2f53ff1769e1a95f8e70

build:
  number: 0
  skip:
    - win and match(python, "<3.11|>3.12")
  script:
    - python -m pip install . --no-deps -vv

requirements:
  build:
    - ${{ compiler('cxx') }}
    - cmake
    - make
    - if: linux or win
      then: libgomp  
    - if: osx
      then: llvm-openmp
    - ${{ stdlib("c") }}
  host:
    - python
    - setuptools >=61.0
    - wheel
    - swig <4.3
    - numpy
    - pip
    - if: linux or win
      then: libgomp  
    - if: osx
      then: llvm-openmp
    - ${{ stdlib("c") }}
  run:
    - python
    - pandas
    - plotly
    - numpy
    - if: linux or win
      then: libgomp
    - if: win
      then: vcomp14
    - if: osx
      then: llvm-openmp
    - ${{ stdlib("c") }}

tests:
  - python:
      imports:
        - med
        - AlgoMarker
      pip_check: true

about:
  homepage: https://github.com/Medial-EarlySign/medpython
  documentation: https://medial-earlysign.github.io/MR_Wiki
  repository: https://github.com/Medial-EarlySign/medpython
  summary: Medial EarlySign Python Library for Electronical Medical Records
  description: |
    Medial EarlySign Infrastructure for machine learning on Electronical Medical Records
  license: MIT
  license_file:
    - LICENCE

extra:
  recipe-maintainers:
    - alonyado
