context:
  name: medpython
  version: "1.1.2"

package:
  name: "{{ context.name }}"
  version: "{{ context.version }}"

source:
  url: https://pypi.org/packages/source/{{ context.name[0] }}/{{ context.name }}/medpython-{{ context.version }}.tar.gz
  sha256: d0a985526c482a9667f65a66e7b135e579c421feac9b2f53ff1769e1a95f8e70

build:
  number: 0
  skip:
    - if: win and py != 3.12 and py != 3.11
  script:
    - python -m pip install . -vv

requirements:
  build:
    - {{ compiler('cxx') }}
    - cmake
    - make
    - libgomp:
        if: linux or win
    - llvm-openmp:
        if: osx
    - {{ stdlib("c") }}
  host:
    - python
    - setuptools >=61.0
    - wheel
    - swig <4.3
    - numpy
    - pip
    - libgomp:
        if: linux or win
    - llvm-openmp:
        if: osx
    - {{ stdlib("c") }}
  run:
    - python
    - pandas
    - plotly
    - numpy
    - libgomp:
        if: linux or win
    - vcomp14:
        if: win
    - llvm-openmp:
        if: osx
    - {{ stdlib("c") }}

test:
  - python:
      imports:
        - med
        - AlgoMarker
      pip_check: true

about:
  home: https://github.com/Medial-EarlySign/medpython
  doc_url: https://medial-earlysign.github.io/MR_Wiki
  dev_url: https://github.com/Medial-EarlySign/medpython
  summary: Medial EarlySign Python Library for Electronical Medical Records
  description: |
    Medial EarlySign Infrastructure for machine learning on Electronical Medical Records
  license: MIT
  license_file:
    - LICENCE

extra:
  recipe-maintainers:
    - alonyado
