# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "2026.3.4"

package:
  name: dockerflow
  version: ${{ version }}

source:
  - url: https://pypi.org/packages/source/d/dockerflow/dockerflow-${{ version }}.tar.gz
    sha256: 6cc7fcab2a078d06aeca8b02e22fd7f6766dca322fb30aed6910684dbc08690c

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - setuptools
  run:
    - python >=${{ python_min }}

tests:
  - python:
      imports:
        - dockerflow
      pip_check: true
      python_version:
      - ${{ python_min }}.*
      - "*"
  - package_contents:
      site_packages:
        - dockerflow

about:
  homepage: https://github.com/mozilla-services/python-dockerflow
  license: MPL-2.0
  license_file: LICENSE
  summary: Python tools and helpers for Mozilla's Dockerflow
  description: |
    Python tools and helpers for Mozilla's Dockerflow

extra:
  recipe-maintainers:
    - rxm7706
