context:
  name: rosdoc2
  version: "0.2.1"

package:
  name: ${{ name | lower }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/${{ name[0] }}/${{ name }}/rosdoc2-${{ version }}.tar.gz
  sha256: fbb2ba4d0d867590955963363bf24b969c6ed18c24d730845b38884736b8ccf7

build:
  number: 0
  noarch: python
  script: python -m pip install . -vv --no-deps --no-build-isolation
  python:
    entry_points:
      - rosdoc2 = rosdoc2.main:main

requirements:
  host:
    - python ${{ python_min }}.*
    - setuptools <82
    - wheel
    - pip
  run:
    - python >=${{ python_min }}
    - breathe
    - catkin_pkg
    - exhale
    - jinja2
    - osrf_pycommon
    - pyyaml
    - setuptools <82
    - sphinx
    - sphinx-rtd-theme
    - myst-parser
    - mdit-py-plugins 0.3.1.*

tests:
  - python:
      pip_check: true
      imports:
        - rosdoc2
  - script:
      - rosdoc2 --help

about:
  homepage: https://github.com/ros-infrastructure/rosdoc2
  summary: Command line tool to build documentation for ROS packages.
  license: Apache-2.0
  license_file: LICENSE

extra:
  recipe-maintainers:
    - Tobias-Fischer
