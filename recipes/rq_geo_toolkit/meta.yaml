{% set name = "rq_geo_toolkit" %}
{% set version = "2025.6.0" %}
{% set python_min = "3.9" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/rq_geo_toolkit-{{ version }}.tar.gz
  sha256: 3246055afd58d4fd8082cfb4c5ac7619bc1ab995ea0d3607dd31e38faeca86ad

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python >={{ python_min }}
    - pdm-backend
    - pip
  run:
    - python >={{ python_min }}
    - geopandas >=1.0
    - shapely >=2.0.6
    - pyarrow >=16.0.0
    - rich >=12.0.0
    - geoarrow-rust-core >=0.3.0
    - pooch >=1.6.0
    - geopy >=2.0.0
    - numpy >=1.26.0
    - python-duckdb >=1.1.2
    - psutil >=5.6.2
    - polars >=1.9
    - packaging >=17.0

test:
  imports:
    - rq_geo_toolkit
  commands:
    - pip check
  requires:
    - pip

about:
  home: https://github.com/kraina-ai/rq_geo_toolkit
  summary: Collection of geo related functions for reuse in other geospatial libraries
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - RaczeQ
