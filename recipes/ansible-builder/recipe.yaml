schema_version: 1

context:
  version: "3.1.1"
  python_min: "3.10"

package:
  name: ansible-builder
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/a/ansible-builder/ansible_builder-${{ version }}.tar.gz
  sha256: 9d88bc15acc7d31056d0c51914a6102dac8e5ad73f9f2d35ba98378c89714ed2

build:
  noarch: python
  number: 0
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  python:
    entry_points:
      - ansible-builder = ansible_builder.cli:run

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - setuptools <=70.0.0,>=45
    - setuptools_scm <=8.1.0,>=6.2
  run:
    - python >=${{ python_min }}

tests:
  - python:
      imports:
        - ansible_builder
      python_version: ${{ python_min }}.*
      pip_check: true

about:
  summary: |
    "A tool for building Ansible Execution Environments"
  homepage: https://ansible-builder.readthedocs.io
  repository: https://ansible-builder.readthedocs.io
  license: Apache-2.0
  license_file: LICENSE

extra:
  recipe-maintainers:
    - killua156
    - mgorny
