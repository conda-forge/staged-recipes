{% set version = "0.4.2" %}

package:
  name: diplotocus
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/d/diplotocus/diplotocus-{{ version }}.tar.gz
  sha256: 8662af879de96045397a6e3e6e6ddf815b2aecaf578c1987f1e7c4fdb6357451

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python
    - setuptools >=77
    - pip
  run:
    - python
    - numpy
    - matplotlib
    - svgpath2mpl

test:
  imports:
    - diplotocus
  commands:
    - pip check
  requires:
    - pip
    - python

about:
  home: https://pypi.org/project/diplotocus/
  summary: A python package to generate animations of matplotlib objects.
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - titanbin
