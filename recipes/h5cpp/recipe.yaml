context:
  version: 0.7.1

package:
  name: h5cpp
  version: ${{ version }}

source:
    url: https://github.com/ess-dmsc/h5cpp/archive/refs/tags/v${{ version }}.tar.gz
    sha256: e832fb729aaf328d0f30b34e577645f33fdaccda0e1b0c06cb9a3d412a728ad3

build:
    script:
        - cmake -B build ${CMAKE_ARGS}  -DH5CPP_CONAN=DISABLE
        - cmake --build build
        - cmake --install build
        - ctest --test-dir build --extra-verbose --no-tests=error 

requirements:
  build:
    - ${{ compiler('cxx') }}
    - cmake
    - make
  host:
    - hdf5
    - catch2
    - zlib

tests:
    - package_contents:
        include: [h5cpp/file/file.hpp]

extra:
  recipe-maintainers:
    - jkotan
