{% set name = "nerfstudio" %}
{% set version = "1.1.5" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/nerfstudio-{{ version }}.tar.gz
  sha256: c3d8fd27208565e2031e4b0c89f82eb78199207d5194755f5b6c8f41e02f4cf9

build:
  entry_points:
    - flit = flit:main
  noarch: python
  number: 0
  script: {{ PYTHON }} -m pip install . -vv

requirements:
  host:
    - pip
    - python {{ python_min }}
    - setuptools
  run:
    - python >={{ python_min }}

test:
  imports:
    - nerfstudio
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://github.com/nerfstudio-project/nerfstudio
  summary: A collaboration friendly studio for NeRFs
  license: Apache-2.0
  license_file: LICENSE

extra:
  recipe-maintainers:
    - jeongseok-meta
