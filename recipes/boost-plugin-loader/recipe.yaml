schema_version: 1

context:
  version: "0.4.3"

package:
  name: boost-plugin-loader
  version: ${{ version }}

source:
  - url: https://github.com/tesseract-robotics/boost_plugin_loader/archive/refs/tags/${{ version }}.tar.gz
    sha256: 71ff45e37850153a94cf02fabf9c6fde54417692860a61d85c43cff4b3da7efa
    file_name: source.tar.gz

build:
  number: 0

requirements:
  build:
    - ${{ compiler('c') }}
    - ${{ compiler('cxx') }}
    - ${{ stdlib("c") }}
    - gtest
    - gmock
    - cmake
    - if: win
      then: ninja
    - if: unix
      then: make
    - ros-industrial-cmake-boilerplate
  host:
    - libboost-devel
  run_exports:
    - ${{ pin_subpackage('boost-plugin-loader', upper_bound='x.x') }}

tests:
  - package_contents:
      include:
        - boost_plugin_loader/plugin_loader.h      
      lib:
        - boost_plugin_loader

about:
  summary: Plugin loader utility based on Boost.DLL
  license: Apache-2.0
  license_file: src/LICENSE.Apache-2.0
  homepage: https://github.com/tesseract-robotics/boost_plugin_loader

extra:
  recipe-maintainers:
    - johnwason
