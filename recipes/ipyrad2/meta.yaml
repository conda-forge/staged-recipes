{% set version = "0.1.9" %}
{% set python_min = "3.9" %}

package:
  name: ipyrad2
  version: {{ version }}

source:
  url: https://github.com/eaton-lab/ipyrad2/archive/v{{ version }}.tar.gz
  sha256: d4148bce6a4696a3e6b5ac2430cd830e9c139247e9a885c8b2933edd4295c30a

build:
  entry_points:
    - ipyrad2 = ipyrad2.cli:main
    - ipyrad2-classic = ipyrad2.classic:main
  script_env:
    - SETUPTOOLS_SCM_PRETEND_VERSION={{ version }}
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - setuptools >=69
    - setuptools-scm >=8
    - wheel
    - pip
  run:
    - python >={{ python_min }}
    - loguru
    - numpy
    - pandas
    - h5py
    - tomlkit

test:
  imports:
    - ipyrad2
  commands:
    - pip check
    - ipyrad2 --help
    - ipyrad2-classic --help
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://github.com/eaton-lab/ipyrad2
  summary: Interactive assembly and analysis of RAD-seq data sets
  license: GPL-3.0-only
  license_file: LICENSE.txt
  doc_url: https://eaton-lab.org/ipyrad2
  dev_url: https://github.com/eaton-lab/ipyrad2

extra:
  recipe-maintainers:
    - isaacovercast
