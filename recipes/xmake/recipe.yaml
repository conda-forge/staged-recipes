context:
  version: "3.0.9"

package:
  name: xmake
  version: ${{ version }}

source:
  url: https://github.com/xmake-io/xmake/releases/download/v${{ version }}/xmake-v${{ version }}.tar.gz
  sha256: 45335220e83cee7ab9ad9e50900f9e751f32510e204719f89c5866c143ef3a5a

build:
  number: 0

requirements:
  build:
    - ${{ compiler('c') }}
    - ${{ compiler('cxx') }}
    - ${{ stdlib('c') }}
    - pkg-config
    - if: unix
      then:
        - ninja
        - patch
    - if: win
      then:
        - autotools_clang_conda
        - m2-patch
        - m2-sed
  host:
    - lua 5.4.*
    - lz4-c
    - tbox >=1.8.0,<1.9.0a0
    - if: unix
      then:
        - ncurses
        - readline
  run:
    - lua >=5.4,<5.5.0a0
    - tbox >=1.8.0,<1.9.0a0

tests:
  - script:
      - xmake --version
      - xrepo --version

about:
  homepage: https://xmake.io
  summary: A cross-platform build utility based on Lua
  description: |
    XMake is a lightweight, cross-platform build utility based on Lua. It uses
    xmake.lua files to describe project builds and includes a built-in package
    manager for C and C++ dependencies.
  license: Apache-2.0 AND Unlicense AND BSD-2-Clause
  license_file:
    - LICENSE.md
    - NOTICE.md
    - core/src/sv/sv/UNLICENSE
    - core/src/xxhash/xxhash/LICENSE
  documentation: https://xmake.io/guide/
  repository: https://github.com/xmake-io/xmake

extra:
  recipe-maintainers:
    - luadebug
