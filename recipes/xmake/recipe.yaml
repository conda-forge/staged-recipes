context:
  version: "3.0.7"

package:
  name: xmake
  version: ${{ version }}

source:
  url: https://github.com/xmake-io/xmake/archive/refs/tags/v${{ version }}.tar.gz
  sha256: 91d9a5c8893c6d7712253914e7c5fbc52277a36ffd39b869e2b1e2aaada94f5d

build:
  number: 0

requirements:
  build:
    - if: unix
      then:
        - ${{ stdlib('c') }}
        - ${{ compiler('c') }}
        - ${{ compiler('cxx') }}
        - make
    - if: win
      then:
        - m2-bash
        - m2-coreutils
        - m2-findutils
        - m2-gawk
        - m2-make
        - m2-sed
        - m2w64-gcc

tests:
  - script:
      - xmake --version

about:
  homepage: https://xmake.io
  summary: A cross-platform build utility based on Lua
  description: |
    xmake is a lightweight cross-platform build utility based on Lua.
    It uses xmake.lua to maintain project builds with a syntax simpler
    than makefile/CMakeLists.txt. It can be used to build source code
    directly, or generate project files like CMake, Makefile, etc.
  license: Apache-2.0
  license_file: LICENSE.md
  repository: https://github.com/xmake-io/xmake
  documentation: https://xmake.io/#/getting_started

extra:
  recipe-maintainers:
    - luadebug
