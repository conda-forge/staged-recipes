# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "0.7.0"

package:
  name: ironcalc
  version: ${{ version }}

source:
  - url: https://pypi.org/packages/source/i/ironcalc/ironcalc-${{ version }}.tar.gz
    sha256: c641746809c1bf8d67dcc7d1e16d0c13334a754c6f8360f97edfa610a3eb6490

build:
  number: 0
  script:
    env:
      CARGO_PROFILE_RELEASE_STRIP: symbols
      CARGO_PROFILE_RELEASE_LTO: fat
    content:
      - cargo-bundle-licenses --format yaml --output THIRDPARTY.yml
      - ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  build:
    - if: build_platform != target_platform
      then:
        - python
        - cross-python_${{ target_platform }}
        - crossenv
        - maturin >=1,<2
    - ${{ compiler("c") }}
    - ${{ stdlib("c") }}
    - ${{ compiler("rust") }}
    - cargo-bundle-licenses
  host:
    - python ${{ python_min }}.*
    - pip
    - maturin >=1.7,<2.0
  run:
    - python

tests:
  - python:
      imports:
        - ironcalc
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"


about:
  homepage: https://www.ironcalc.com/
  license: Apache-2.0
  license_file:
    - bindings/python/LICENSE-Apache-2.0.md
    - bindings/python/LICENSE-MIT.md
    - THIRDPARTY.yml
  summary: Create, edit and evaluate Excel spreadsheets
  description: |
    Create, edit and evaluate Excel spreadsheets
  repository: https://github.com/ironcalc/ironcalc

extra:
  recipe-maintainers:
    - rxm7706
