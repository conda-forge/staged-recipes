{% set name = "graph-hypothesis" %}
{% set version = "0.1.2" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/graph_hypothesis-{{ version }}.tar.gz
  sha256: 9ebfb658313b0ecdf4e41a5ac4f060e1147431844fcdd8d40c14876424563ca6

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - setuptools >=77.0
    - pip
  run:
    - python >={{ python_min }}
    - networkx >=2.5
    - numpy >=1.20
    - tqdm >=4.0

test:
  imports:
    - graph_hypothesis
  commands:
    - pip check
    - python -c "import networkx as nx; from graph_hypothesis import graph_hypothesis; G = nx.Graph(); G.add_node('a', type='X'); G.add_node('b', type='Y'); G.add_node('c', type='X'); G.add_node('d', type='Y'); G.add_edges_from([('a', 'b'), ('b', 'c'), ('c', 'd'), ('a', 'd')]); r = graph_hypothesis(G, fixed_type='X', target_type='Y', metric_name='interactions', num_permutations=50, random_seed=1, num_processes=1); assert 0.0 <= r['p_value'] <= 1.0"
  requires:
    - python {{ python_min }}
    - pip

about:
  home: https://github.com/NikolaTesla-007/graph-hypothesis
  summary: A Python package for statistical analysis on graphs using permutation tests.
  description: |
    graph-hypothesis performs permutation-based statistical hypothesis testing on
    undirected, unweighted, node-typed graphs. It assesses the significance of
    graph metrics between node types by comparing an observed statistic against a
    null distribution generated by shuffling node type labels across a fixed
    topology. Four metrics are provided: interaction (edge) counts, A-X-B motif
    counts, interaction proportion, and average shortest path to the nearest
    target type.
  license: MIT
  license_file: LICENSE
  dev_url: https://github.com/NikolaTesla-007/graph-hypothesis
  doc_url: https://github.com/NikolaTesla-007/graph-hypothesis

extra:
  recipe-maintainers:
    - NikolaTesla-007
