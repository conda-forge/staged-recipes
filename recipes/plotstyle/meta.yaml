{% set version = "1.1.0" %}
{% set sha256 = "942d9e3ae6205be43e50b11c261f77f25f4511946f0a1bd619eb33d70ae9c323" %}
{% set python_min = "3.10" %}

package:
  name: plotstyle
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/p/plotstyle/plotstyle-{{ version }}.tar.gz
  sha256: {{ sha256 }}

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0
  entry_points:
    - plotstyle = plotstyle.cli.main:main

requirements:
  host:
    - python {{ python_min }}
    - pip
    - hatchling >=1.27
    - hatch-vcs >=0.5
  run:
    - python >={{ python_min }}
    - matplotlib-base >=3.9,<4
    - tomli >=2.0
  run_constrained:
    - seaborn >=0.13.2,<1
    - pandas >=2.2,<3
    - pillow >=11.0,<13
    - fonttools >=4.55,<5

test:
  imports:
    - plotstyle
    - plotstyle.cli
  requires:
    - python {{ python_min }}
    - pip
  commands:
    - plotstyle --help
    - pip check

about:
  home: https://github.com/rahulkaushal04/plotstyle
  license: MIT
  license_family: MIT
  license_file: LICENSE
  summary: Publication-ready scientific figure styling for Matplotlib
  description: |
    plotstyle provides Matplotlib/seaborn style presets matching scientific
    journal requirements (Nature, IEEE, Science, and more), with composable
    overlays, built-in validation, accessible colour palettes, and
    submission-ready export.
  doc_url: https://plotstyle.readthedocs.io
  dev_url: https://github.com/rahulkaushal04/plotstyle

extra:
  recipe-maintainers:
    - rahulkaushal04
