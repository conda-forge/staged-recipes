schema_version: 1

context:
  python_min: "3.10"
  version: "2.0.4"

package:
  name: simple-track
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/s/simple-track/simple_track-${{ version }}.tar.gz
  sha256: ef686dc0d4ec7cb29fac0ef835e5ba042d1ea6a5806d304238d7c8e6c6ece8d4

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  python:
    entry_points:
      - simpletrack = run_simple_track:run_tracking

requirements:
  host:
    - python ${{ python_min }}.*
    - setuptools >=77.0.3
    - pip
  run:
    - python >=${{ python_min }}
    - numpy >=2.2.0
    - pytest >=9.0
    - pytest-cov
    - pytest-xdist
    - pyyaml
    - scipy >=1.15.0
    - scikit-image >=0.25.2

tests:
  - python:
      imports:
        - run_simple_track
        - simpletrack
      pip_check: true
      python_version: ${{ python_min }}.*
  - requirements:
      run:
        - pip
        - python ${{ python_min }}.*
    script:
      - simpletrack --help

about:
  summary: Threshold-based object tracking algorithm for 2D data
  license: MPL-2.0
  license_file: LICENSE
  homepage: https://github.com/ParaChute-UK/simple-track/

extra:
  recipe-maintainers:
    - A-Gainford
    - thmstein
