# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "0.8.1"
  python_min: "3.11"

package:
  name: bmad-loop
  version: ${{ version }}

source:
  url: https://github.com/bmad-code-org/bmad-loop/archive/refs/tags/v${{ version }}.tar.gz
  sha256: b9aceb3feb1cc4251d309312cd2b93cc77e4cd33dfdb768f11b56bb7c6029ca8

build:
  noarch: python
  number: 0
  script: python -m pip install . -vv --no-deps --no-build-isolation
  python:
    entry_points:
      - bmad-loop = bmad_loop.cli:main

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - hatchling >=1.30
  run:
    - python >=${{ python_min }}
    - pyyaml >=6.0
    - psutil >=7.2.2
    - textual >=8.0,<9
    - tomlkit >=0.13
    - pyte >=0.8.2

tests:
  - python:
      imports:
        - bmad_loop
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"
  - script:
      - bmad-loop --version
      - bmad-loop --help

about:
  summary: Deterministic ralph-loop orchestrator for the BMAD implementation phase
  description: |
    bmad-loop drives the BMAD Method implementation phase as a
    deterministic outer loop: for each story in the sprint plan it
    dispatches DEV -> VERIFY -> REVIEW -> VERIFY -> COMMIT stages in
    fresh agent sessions (tmux-multiplexed), gating progression on
    configurable policy (.bmad-loop/policy.toml). Includes a Textual
    TUI dashboard (`bmad-loop tui`) for live run monitoring.
  homepage: https://github.com/bmad-code-org/bmad-loop
  repository: https://github.com/bmad-code-org/bmad-loop
  documentation: https://github.com/bmad-code-org/bmad-loop#readme
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - rxm7706
