schema_version: 1

context:
  version: 1.5.1

package:
  name: defermi
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/d/defermi/defermi-${{ version }}.tar.gz
  sha256: a03823181e4ec86749d90a5da267aea83a68e9f0d0557f31f9ebea4103bd5c64

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  python:
    entry_points:
      - defermi = defermi.cli.main:main

requirements:
  host:
    - python ${{ python_min }}.*
    - setuptools >=61.0
    - pip
  run:
    - python >=${{ python_min }}
    - ase
    - pymatgen >=2023.3.23
    - pymatgen-analysis-defects >=2023.3.25
    - mp-api

tests:
  - python:
      imports:
        - defermi
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"
  - requirements:
      run:
        - python ${{ python_min }}.*
    script:
      - defermi --help

about:
  summary: Compute and analyse point-defect equilibria.
  license: MIT
  license_file: LICENSE
  homepage: https://github.com/lorenzo-villa-hub/defermi

extra:
  recipe-maintainers:
    - jan-janssen
