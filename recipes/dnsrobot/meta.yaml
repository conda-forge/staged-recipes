{% set name = "dnsrobot" %}
{% set version = "0.1.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz
  sha256: 678f64472bb31d3e0908f9ec1341dfc156bfcc6b48be07a8abbf6582434b6366

build:
  noarch: python
  number: 0
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python >=3.7
    - pip
    - setuptools
  run:
    - python >=3.7

test:
  imports:
    - dnsrobot

about:
  home: https://dnsrobot.net
  summary: Python client for the DNS Robot API - DNS lookups, WHOIS, SSL checks, SPF/DKIM/DMARC validation
  description: |
    Official Python client for DNS Robot (dnsrobot.net). Provides DNS lookups,
    WHOIS, SSL checks, SPF/DKIM/DMARC validation, MX/NS lookups, IP geolocation,
    port checks, and HTTP header analysis. Zero external dependencies.
  license: MIT
  license_file: LICENSE
  doc_url: https://dnsrobot.net/all-tools
  dev_url: https://github.com/dnsrobot/dnsrobot-python

extra:
  recipe-maintainers:
    - dnsrobot
