# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "0.1.0"

package:
  name: py-yaml12
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/p/py-yaml12/py_yaml12-${{ version }}.tar.gz
  sha256: e7b6140fad56d5528e6d51c7b8ff79bdb27631b73a9a7c1bc4b55fda1bddbaef

build:
  number: 0
  script:
    env:
      CARGO_PROFILE_RELEASE_STRIP: symbols
      CARGO_PROFILE_RELEASE_LTO: fat
    content:
      - cargo-bundle-licenses --format yaml --output THIRDPARTY.yml
      - ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  python:
    version_independent: true

requirements:
  build:
    - if: build_platform != target_platform
      then:
        - python
        - cross-python_${{ target_platform }}
        - crossenv
        - maturin >=1,<2
    - ${{ compiler("c") }}
    - ${{ stdlib("c") }}
    - ${{ compiler("rust") }}
    - cargo-bundle-licenses
  host:
    - python
    - pip
    - maturin >=1.7,<2.0
  run:
    - python

tests:
  - python:
      imports:
        - yaml12
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  homepage: https://github.com/posit-dev/py-yaml12
  repository: https://github.com/posit-dev/py-yaml12
  documentation: https://posit-dev.github.io/py-yaml12/
  license: MIT
  license_file:
    - LICENSE
    - THIRDPARTY.yml
  summary: A modern YAML 1.2 parser and emitter for Python, written in Rust.
  description: |
    yaml12 is a YAML 1.2 parser/formatter for Python, implemented in Rust
    for speed and correctness. Built on the `saphyr` crate.

    For almost every use case, yaml12 lets you work with plain builtin
    Python types end to end: dict, list, int, float, str, and None. JSON
    is a subset of YAML 1.2, so all valid JSON is also valid YAML and
    parses the same way. 100% compliance with the yaml-test-suite.

extra:
  recipe-maintainers:
    - rxm7706
