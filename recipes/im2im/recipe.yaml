schema_version: 1

context:
  version: 0.0.6

package:
  name: im2im
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/i/im2im/im2im-${{ version }}.tar.gz
  sha256: f30e2717632d19514fa46cd5e2962ecfbb99b29ac1b7b21488a37630212b75ea

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{python_min}}.*
    - setuptools >=46.1.0
    - setuptools-scm >=5
    - pip
  run:
    - python >=${{python_min}},<3.12
    - importlib-metadata
    - networkx ==3.2.1

tests:
  - python:
      imports:
        - im2im
      pip_check: true
      python_version: ${{ python_min }}.*

about:
  summary: Automatically converting in-memory representations of images using a knowledge graph of type description.
  license: MIT
  license_file: LICENSE.txt
  homepage: https://github.com/c3di/im2im
  repository: https://github.com/c3di/im2im

extra:
  recipe-maintainers:
    - jan-janssen
