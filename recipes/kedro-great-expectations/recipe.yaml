# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "0.0.1"

package:
  name: kedro-great-expectations
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/k/kedro-great-expectations/kedro_great_expectations-${{ version }}.tar.gz
  sha256: a1fbbe14e03c705805bfa7103fa4b92e7c266959f0307d75a8978b492b6fd8fc

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - hatchling
    - pip
  run:
    - python >=${{ python_min }}

tests:
  - python:
      imports:
        - kedro_great_expectations
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  summary: Kedro Integration with Great Expectations
  license: MIT
  license_file: LICENSE.txt
  homepage: https://pypi.org/project/kedro-great-expectations/
  repository: https://github.com/deepyaman/kedro-great-expectations
  documentation: https://github.com/deepyaman/kedro-great-expectations/blob/main/README.md

extra:
  recipe-maintainers:
    - rxm7706
