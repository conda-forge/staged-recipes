schema_version: 1

context:
  version: "0.2.0"
  # NOTE: `python_min` doesn't control which version of Python will be used at
  # build-time. `variants.yaml` was needed for that.
  python_min: "3.12"

package:
  name: triangular
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/t/triangular/triangular-${{ version }}.tar.gz
  sha256: 1c80c814b04b13fd89c0d25eefa3852f902e0b2cf26731e30b06c21a9de3edd0

build:
  number: 0
  # NOTE: Since we're using Python's "Limited API" (abi3), we can skip all
  # builds except for the minimum-supported Python version
  skip: is_abi3 and not is_python_min
  script:
    - cargo-bundle-licenses --format yaml --output THIRDPARTY.yml
    - ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  python:
    version_independent: ${{ is_abi3 }}

requirements:
  build:
    # NOTE: For cross-compilation, we need the Python interpreter's headers and
    # stuff (cross-python_*) for the target architecture.
    - if: build_platform != target_platform
      then:
        - python
        - cross-python_${{ target_platform }}
        - maturin >=1.7,<2
    - ${{ compiler('c') }}
    - ${{ stdlib('c') }}
    - ${{ compiler('rust') }}
    - cargo-bundle-licenses
  host:
    - if: is_abi3
      then: python-abi3
    - python
    - maturin >=1.7,<2
    - pip
  run:
    - python
    - numpy >=1.23

tests:
  - python:
      python_version:
        - if: is_abi3
          then: ${{ python_min }}.*
        - "*"
      imports:
        - triangular
        - triangular._triangular
      pip_check: true
  - if: is_abi3
    then:
      requirements:
        run:
          - abi3audit
      script:
        - if: unix
          then: abi3audit $SP_DIR/triangular/_triangular.abi3.so -s -v --assume-minimum-abi3 ${{ python_min }}
          else: abi3audit %SP_DIR%\triangular\_triangular.pyd -s -v --assume-minimum-abi3 ${{ python_min }}


about:
  summary: 2-D Delaunay triangulation and convex hull, API-compatible with the triangle library.
  license: MIT
  license_file:
    - LICENSE
    - THIRDPARTY.yml
  homepage: https://github.com/earth-mover/triangular
  repository: https://github.com/earth-mover/triangular

extra:
  recipe-maintainers:
    - martinRenou
    - samantha-earthmover
