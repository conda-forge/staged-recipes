context:
  name: qpmad
  version: 1.4.0

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://github.com/asherikov/qpmad/archive/refs/tags/${{ version }}.zip
  sha256: 2d3e8890a5538ec78f83c47a30df05531f5bf18960d948179bcce0ec4e30df3d

build:
  number: 0
  script:
    - if: win
      then: |
        cmake -S %SRC_DIR% -B build -G Ninja -DCMAKE_BUILD_TYPE=Release -DCMAKE_INSTALL_PREFIX=%LIBRARY_PREFIX% -DCMAKE_POLICY_VERSION_MINIMUM=3.5
        cmake --build build -v
        cmake --install build --prefix %LIBRARY_PREFIX%
      else: |
        cmake -S $SRC_DIR -B build -G Ninja -DCMAKE_BUILD_TYPE=Release -DCMAKE_INSTALL_PREFIX=$PREFIX -DCMAKE_POLICY_VERSION_MINIMUM=3.5
        cmake --build build -v
        cmake --install build --prefix $PREFIX

requirements:
  build:
    - ${{ compiler('cxx') }}
    - cmake
    - ninja
  host:
    - eigen
    - eigen-abi-devel

tests:
  - package_contents:
      include:
        - qpmad/solver.h
        - qpmad/config.h
      files:
        - share/qpmad/cmake/qpmadConfig.cmake
        - share/qpmad/cmake/qpmadConfigVersion.cmake

about:
  homepage: https://github.com/asherikov/qpmad
  license: Apache-2.0
  summary: QPMAD - Quadratic Programming solver

extra:
  feedstock-name: qpmad
  recipe-maintainers:
    - ahoarau
