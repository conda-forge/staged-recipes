{% set name = "maketables" %}
{% set version = "0.1.8" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz
  sha256: aa4b3776fd9bac6d6f881866824e6a13b9e647f8c87f234d9a24463242ad19f1

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - pip
    - hatchling
    - hatch-vcs
  run:
    - python >={{ python_min }}
    - numpy >=1.20.0
    - pandas >=1.3.0
    - great_tables >=0.2.0
    - tabulate >=0.9.0
    - python-docx >=0.8.11
    - ipython >=7.0.0

test:
  imports:
    - maketables
  requires:
    - python {{ python_min }}
    - pip
  commands:
    - pip check

about:
  home: https://github.com/py-econometrics/maketables
  summary: Publication-ready tables from regression results, descriptive statistics, and balance tables
  license: MIT
  license_family: MIT
  license_file: LICENSE
  doc_url: https://py-econometrics.github.io/maketables/
  dev_url: https://github.com/py-econometrics/maketables

extra:
  recipe-maintainers:
    - s3alfisc
