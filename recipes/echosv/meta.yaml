{% set version = "1.0" %}

package:
  name: echosv
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/e/echosv/echosv-{{ version }}.tar.gz
  sha256: 6796764a27ec5e1557e993fc02096adaaddc737eb4544627c3313adb9b0c1275

build:
  entry_points:
    - echosv = echosv.main:main
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python >=3.8
    - setuptools >=61.0
    - pip
  run:
    - python >=3.8
    - pysam
    - intervaltree
    - biopython
    - scipy
    - networkx
    - pandas
    - numpy
    - rich

test:
  imports:
    - echosv
  commands:
    - pip check
    - echosv --help
  requires:
    - pip
    - python

about:
  home: https://github.com/parklab/EchoSV
  summary: A novel tool for accurately merging haplotype-based SV calls and comparing SVs across reference genomes
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - AddYourGitHubIdHere
