# conda-forge-meta-recipe-options: channels=bioconda,conda-forge
{% set version = "1.0" %}
{% set python_min = "3.8" %}

package:
  name: echosv
  version: "{{ version }}"

source:
  url: https://pypi.org/packages/source/e/echosv/echosv-{{ version }}.tar.gz
  sha256: 6796764a27ec5e1557e993fc02096adaaddc737eb4544627c3313adb9b0c1275

build:
  entry_points:
    - echosv = echosv.main:main
  # noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0
  skip: true  # [win]

requirements:
  host:
    - python {{ python_min }}
    - setuptools >=61.0
    - pip
  run:
    - python >={{ python_min }}
    - pysam >=0.23.0
    - intervaltree
    - biopython
    - scipy
    - networkx
    - pandas
    - numpy
    - rich

test:
  imports:
    - echosv
  commands:
    - pip check
    - echosv --help
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://github.com/parklab/EchoSV
  summary: A novel tool for accurately merging haplotype-based SV calls and comparing SVs across reference genomes
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - ywZhangV
