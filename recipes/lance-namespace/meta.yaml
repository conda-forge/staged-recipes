{% set name = "lance-namespace" %}
{% set version = "0.6.1" %}
{% set python_min = "3.10" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/lance_namespace-{{ version }}.tar.gz
  sha256: f0deea442bd3f1056a8e2fed056ae2778e3356517ec2e680db049058b824d131

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - hatchling
    - pip
  run:
    - python >={{ python_min }}
    - lance-namespace-urllib3-client ==0.6.1

test:
  imports:
    - lance_namespace
  commands:
    - pip check
  requires:
    - python {{ python_min }}
    - pip

about:
  summary: Lance Namespace interface and plugin registry
  license: Apache-2.0
  license_file: LICENSE
  home: https://pypi.org/project/lance-namespace/
  dev_url: https://github.com/lance-format/lance-namespace

extra:
  recipe-maintainers:
    - rxm7706
