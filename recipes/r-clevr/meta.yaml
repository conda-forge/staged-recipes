{% set version = '0.1.2' %}
{% set posix = 'm2-' if win else '' %}

package:
  name: r-clevr
  version: "{{ version|replace('-', '_') }}"

source:
  url:
    - {{ cran_mirror }}/src/contrib/clevr_{{ version }}.tar.gz
    - {{ cran_mirror }}/src/contrib/Archive/clevr/clevr_{{ version }}.tar.gz
  sha256: fdaacd77aa6ac1ec2067b4e717017e034856b154d486fde79663973201ae8764

build:
  number: 0
  rpaths:
    - lib/R/lib/
    - lib/
  missing_dso_whitelist:
    - '*/R.dll'        # [win]
    - '*/Rblas.dll'    # [win]
    - '*/Rlapack.dll'  # [win]

requirements:
  build:
    - {{ compiler('c') }}              # [not win]
    - {{ stdlib("c") }}                # [not win]
    - {{ compiler('m2w64_c') }}        # [win]
    - {{ compiler('cxx') }}            # [not win]
    - {{ compiler('m2w64_cxx') }}      # [win]
    - {{ posix }}filesystem        # [win]
    - {{ posix }}make
    - {{ posix }}sed               # [win]
    - {{ posix }}coreutils         # [win]
    - {{ posix }}zip               # [win]
    - cross-r-base {{ r_base }}    # [build_platform != target_platform]
  host:
    - r-base
    - r-bh >=1.69.0
    - r-matrix
    - r-rcpp >=1.0.5
  run:
    - r-base
    - r-bh >=1.69.0
    - r-matrix
    - r-rcpp >=1.0.5

test:
  commands:
    - $R -e "library('clevr')"           # [not win]
    - "\"%R%\" -e \"library('clevr')\""  # [win]

about:
  home: https://github.com/cleanzr/clevr
  license: GPL-2.0-only
  summary: Tools for evaluating link prediction and clustering algorithms with respect to ground
    truth. Includes efficient implementations of common performance measures such as
    pairwise precision/recall, cluster homogeneity/completeness, variation of information,
    Rand index etc.
  license_family: GPL2
  license_file:
    - '{{ environ["PREFIX"] }}/lib/R/share/licenses/GPL-2'

extra:
  recipe-maintainers:
    - conda-forge/r

