{% set version = '1.14.0-2' %}
{% set posix = 'm2-' if win else '' %}

package:
  name: r-highs
  version: {{ version|replace("-", "_") }}

source:
  url:
    - {{ cran_mirror }}/src/contrib/highs_{{ version }}.tar.gz
    - {{ cran_mirror }}/src/contrib/Archive/highs/highs_{{ version }}.tar.gz
  sha256: b4a132451d15dc67cd61ac12a346cf3686dbbd03e23686bc6adc91f073049b68

build:
  number: 0
  rpaths:
    - lib/R/lib/
    - lib/
  missing_dso_whitelist:
    - '*/R.dll'        # [win]
    - '*/Rblas.dll'    # [win]
    - '*/Rlapack.dll'  # [win]

requirements:
  build:
    - cross-r-base {{ r_base }}    # [build_platform != target_platform]
    - {{ compiler('c') }}          # [not win]
    - {{ stdlib('c') }}            # [not win]
    - {{ compiler('m2w64_c') }}    # [win]
    - {{ stdlib('m2w64_c') }}      # [win]
    - {{ compiler('cxx') }}        # [not win]
    - {{ compiler('m2w64_cxx') }}  # [win]
    - {{ posix }}filesystem        # [win]
    - {{ posix }}sed               # [win]
    - {{ posix }}grep              # [win]
    - {{ posix }}autoconf
    - {{ posix }}automake          # [not win]
    - {{ posix }}automake-wrapper  # [win]
    - cmake
    - pkg-config
    - {{ posix }}make
    - {{ posix }}coreutils         # [win]
    - {{ posix }}zip               # [win]
  host:
    - r-base
    - r-rcpp >=1.0.7
    - r-checkmate
  run:
    - r-base
    - r-rcpp >=1.0.7
    - r-checkmate

test:
  commands:
    - $R -e "library('highs')"           # [not win]
    - "\"%R%\" -e \"library('highs')\""  # [win]

about:
  home: https://gitlab.com/roigrp/solver/highs
  license: GPL-2.0-only
  summary: R interface to 'HiGHS', an optimization solver for solving mixed integer optimization
    problems with quadratic or linear objective and linear constraints.
  license_family: GPL2
  license_file:
    - '{{ environ["PREFIX"] }}/lib/R/share/licenses/GPL-2'

extra:
  recipe-maintainers:
    - conda-forge/r

