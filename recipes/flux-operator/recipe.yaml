context:
  version: "0.50.0"

package:
  name: flux-operator
  version: ${{ version }}

source:
  - url: https://github.com/controlplaneio-fluxcd/flux-operator/archive/refs/tags/v${{ version }}.tar.gz
    sha256: 7d6b525b9bc6cd7f120fef893ea6e80f16b2f3c0fd6d89feb7a308f7369abccb
    target_directory: src
  - url: https://raw.githubusercontent.com/in-toto/in-toto-golang/refs/heads/master/LICENSE
    sha256: b5c26c8a2ad6dd7cac6646e470a32ee42d23c36124caac4e66c989b6545b2a44
    file_name: LICENSE-in-toto-golang-1
  - url: https://www.apache.org/licenses/LICENSE-2.0.txt
    sha256: cfc7749b96f63bd31c3c42b5c471bf756814053e847c10f3eb003417bc523d30
    file_name: LICENSE-in-toto-golang-2
  - url: https://raw.githubusercontent.com/cyberphone/json-canonicalization/refs/heads/master/LICENSE
    sha256: 6821faaddedf2d78c95bb6d98b127e9e616097afd2f6bcc34389f000d13ab12d
    file_name: LICENSE-json-canonicalization-1
  - url: https://www.apache.org/licenses/LICENSE-2.0.txt
    sha256: cfc7749b96f63bd31c3c42b5c471bf756814053e847c10f3eb003417bc523d30
    file_name: LICENSE-json-canonicalization-2
  - url: https://raw.githubusercontent.com/in-toto/attestation/refs/heads/main/LICENSE
    sha256: b3a6ac899861c2c28a1abd5c7ea8733fefaed6938d730e099c42671386032aeb
    file_name: LICENSE-in-toto-attestation-1
  - url: https://www.apache.org/licenses/LICENSE-2.0.txt
    sha256: cfc7749b96f63bd31c3c42b5c471bf756814053e847c10f3eb003417bc523d30
    file_name: LICENSE-in-toto-attestation-2

build:
  number: 0
  skip:
    - win # kustomize is not available on win-64
  script:
    - cd src
    - go-licenses save ./cmd/cli --save_path ../library_licenses --ignore github.com/cyberphone/json-canonicalization --ignore github.com/in-toto/attestation --ignore github.com/in-toto/in-toto-golang
    - if: unix
      then: go build -v -o $PREFIX/bin/flux-operator -ldflags="-s -w -X main.VERSION=${{ version }}" ./cmd/cli
      else: go build -v -o %LIBRARY_BIN%\flux-operator.exe -ldflags="-s -w -X main.VERSION=${{ version }}" ./cmd/cli
    - if: unix
      then:
        - mkdir -p $PREFIX/share/zsh/site-functions $PREFIX/share/bash-completion/completions $PREFIX/share/fish/vendor_completions.d
        - $PREFIX/bin/flux-operator completion zsh > $PREFIX/share/zsh/site-functions/_flux-operator
        - $PREFIX/bin/flux-operator completion bash > $PREFIX/share/bash-completion/completions/flux-operator
        - $PREFIX/bin/flux-operator completion fish > $PREFIX/share/fish/vendor_completions.d/flux-operator.fish

requirements:
  build:
    - ${{ compiler("go-nocgo") }}
    - go-licenses

tests:
  - script: flux-operator version --client
  - package_contents:
      bin:
        - flux-operator
      files:
        - if: unix
          then:
            - share/bash-completion/completions/flux-operator
            - share/fish/vendor_completions.d/flux-operator.fish
            - share/zsh/site-functions/_flux-operator
      strict: true

about:
  homepage: https://fluxoperator.dev
  summary: The Flux Operator CLI is a command line tool that allows you to manage the Flux Operator resources in your Kubernetes clusters.
  description: |
    The Flux Operator CLI is a command line tool that allows you to manage the
    Flux Operator resources in your Kubernetes clusters. It provides a
    convenient way to interact with the operator and perform various
    operations.
  license: AGPL-3.0-or-later
  license_file:
    - src/LICENSE
    - library_licenses/
    - LICENSE-in-toto-golang-1
    - LICENSE-in-toto-golang-2
    - LICENSE-in-toto-attestation-1
    - LICENSE-in-toto-attestation-2
    - LICENSE-json-canonicalization-1
    - LICENSE-json-canonicalization-2
  documentation: https://fluxoperator.dev/docs/guides/cli/
  repository: https://github.com/controlplaneio-fluxcd/flux-operator

extra:
  recipe-maintainers:
    - aaronlionsheep
