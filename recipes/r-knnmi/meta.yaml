{% set version = '1.0' %}
{% set posix = 'm2-' if win else '' %}

package:
  name: r-knnmi
  version: "{{ version|replace('-', '_') }}"

source:
  url:
    - {{ cran_mirror }}/src/contrib/knnmi_{{ version }}.tar.gz
    - {{ cran_mirror }}/src/contrib/Archive/knnmi/knnmi_{{ version }}.tar.gz
  sha256: 3911a85c8d961aab47503ce1cc0e8c2a3ded3c9c4094037d42826e83917a8d99

build:
  number: 0
  rpaths:
    - lib/R/lib/
    - lib/
  missing_dso_whitelist:
    - '*/R.dll'        # [win]
    - '*/Rblas.dll'    # [win]
    - '*/Rlapack.dll'  # [win]

requirements:
  build:
    - {{ compiler('c') }}              # [not win]
    - {{ stdlib("c") }}                   # [not win]
    - {{ compiler('m2w64_c') }}        # [win]
    - {{ compiler('cxx') }}            # [not win]
    - {{ compiler('m2w64_cxx') }}      # [win]
    - {{ posix }}filesystem        # [win]
    - {{ posix }}make
    - {{ posix }}sed               # [win]
    - {{ posix }}coreutils         # [win]
    - {{ posix }}zip               # [win]
    - cross-r-base {{ r_base }}    # [build_platform != target_platform]
  host:
    - r-base
  run:
    - r-base

test:
  commands:
    - $R -e "library('knnmi')"           # [not win]
    - "\"%R%\" -e \"library('knnmi')\""  # [win]

about:
  home: https://CRAN.R-project.org/package=knnmi
  license: GPL-3.0-only
  summary: This is a 'C++' mutual information (MI) library based on the k-nearest neighbor (KNN)
    algorithm. There are three functions provided for computing MI for continuous values,
    mixed continuous and discrete values, and conditional MI for continuous values.
    They are based on algorithms by A. Kraskov, et. al. (2004) <doi:10.1103/PhysRevE.69.066138>,
    BC Ross (2014)<doi:10.1371/journal.pone.0087357>, and A. Tsimpiris (2012) <doi:10.1016/j.eswa.2012.05.014>,
    respectively.
  license_family: GPL3
  license_file:
    - '{{ environ["PREFIX"] }}/lib/R/share/licenses/GPL-3'

extra:
  recipe-maintainers:
    - conda-forge/r

