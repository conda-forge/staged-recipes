schema_version: 1

context:
  version: "24.12.0"

package:
  name: pulsectl
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/p/pulsectl/pulsectl-${{ version }}.tar.gz
  sha256: 288d6715232ac6f3dcdb123fbecaa2c0b9a50ea4087e6e87c3f841ab0a8a07fc

build:
  number: 0
  # ctypes bindings for PulseAudio (libpulse); the module dlopens libpulse.so
  # at import time, and conda-forge only packages it (pulseaudio-client) for
  # Linux, so this package is Linux-only.
  skip: not linux
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python
    - setuptools
    - pip
  run:
    - python
    # pulsectl dlopens libpulse.so.0 via ctypes at import time
    - pulseaudio-client

tests:
  - python:
      imports:
        - pulsectl
      pip_check: true

about:
  summary: Python high-level interface and ctypes-based bindings for PulseAudio (libpulse)
  description: |
    pulsectl provides a high-level Python interface on top of ctypes-based
    bindings for libpulse. It can list and control sinks, sources, cards,
    and per-application streams, adjust and track volumes, move streams
    between devices, and subscribe to server-side events of a PulseAudio
    or PipeWire (via pipewire-pulse) sound server.
  license: MIT
  license_file: COPYING
  homepage: https://pypi.org/project/pulsectl/
  repository: https://github.com/mk-fg/python-pulse-control

extra:
  recipe-maintainers:
    - ruben-arts
