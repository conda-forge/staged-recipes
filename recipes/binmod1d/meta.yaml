{% set name = "binmod1d" %}
{% set version = "1.0.4" %}
{% set python_min = "3.8" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  - url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz
    sha256: f072333b9dcae967f2d9f733e2572bf3ba0270fb6d3dedd626b42f1373d879e8
  - url: https://raw.githubusercontent.com/NOAA-National-Severe-Storms-Laboratory/BinMod1D-PARS/main/LICENSE
    fn: LICENSE
    sha256: 3d509f611116235b0e8b15ca167b56f2f9f5923c31862140a33a3038676a0846

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - setuptools >=61
    - wheel
    - pip
    - matplotlib-base >=3.10.3
  run:
    - python >={{ python_min }}
    - numpy >=2.2.6
    - mpmath >=1.3.0
    - scipy >=1.15.3
    - numba >=0.61.2
    - matplotlib-base >=3.10.3
    - netcdf4 >=1.7.2
    - tqdm >=4.67.1
    - cloudpickle >=3.1.1

test:
  imports:
    - binmod1d
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}
    - matplotlib-base >=3.10.3
    - numpy >=2.2.6
    - scipy >=1.15.3

about:
  home: https://github.com/NOAA-National-Severe-Storms-Laboratory/BinMod1D-PARS
  summary: A 1D Column bin microphysics model that performs collision-coalescence and breakup.
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
- EdwinDunnavan

