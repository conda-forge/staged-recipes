{% set name = "binmod1d" %}
{% set version = "1.0.3" %}
{% set python_min = "3.8" %}

package:
  name: {{ name|lower}}
  version: {{ version }}

source:
  - url: https://pypi.org/packages/source/b/binmod1d/binmod1d-{{ version }}.tar.gz
    sha256: 8b0b126e0fbd7071e3cf012fb506127a8ae68f753e2f5c96ce850880ce849981

  - url: https://raw.githubusercontent.com/NOAA-National-Severe-Storms-Laboratory/BinMod1D-PARS/main/LICENSE
    fn: LICENSE  # This downloads the license separately and names it correctly

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python >={{ python_min }}
    - setuptools >=61
    - wheel
    - python-build
    - pip
  run:
    - python >={{ python_min }}
    - numpy >=2.2.6
    - mpmath >=1.3.0
    - scipy >=1.15.3
    - numba >=0.61.2
    - matplotlib-base >=3.10.3
    - netcdf4 >=1.7.2
    - cmweather >=0.3.2
    - tqdm >=4.67.1
    - cloudpickle >=3.1.1

test:
  imports:
    - binmod1d
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://github.com/NOAA-National-Severe-Storms-Laboratory/BinMod1D-PARS
  summary: A 1D Column bin microphysics model that performs collision-coalescence and breakup.
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - EdwinDunnavan
