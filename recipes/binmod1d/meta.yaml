{% set version = "1.0.2" %}

package:
  name: binmod1d
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/b/binmod1d/binmod1d-{{ version }}.tar.gz
  sha256: 36de5b47b18597adf23904ba00cf0e79f8d35c54bf7f9d09ea78c11889ed54f2

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python >=3.8
    - setuptools >=61
    - wheel
    - python-build
    - pip
  run:
    - python >=3.8
    - numpy >=2.2.6
    - mpmath >=1.3.0
    - scipy >=1.15.3
    - numba >=0.61.2
    - matplotlib-base >=3.10.3
    - netcdf4 >=1.7.2
    - cmweather >=0.3.2
    - tqdm >=4.67.1
    - cloudpickle >=3.1.1

test:
  imports:
    - binmod1d
  commands:
    - pip check
  requires:
    - pip
    - python

about:
  home: https://github.com/NOAA-National-Severe-Storms-Laboratory/BinMod1D-PARS
  summary: A 1D Column bin microphysics model that performs collision-coalescence and breakup.
  license: MIT
  license_file: PLEASE_ADD_LICENSE_FILE

extra:
  recipe-maintainers:
    - AddYourGitHubIdHere
