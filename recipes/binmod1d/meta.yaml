{% set name = "binmod1d" %}
{% set version = "1.0.9" %}
{% set python_min = "3.11" %}#Changed version to 3.11.

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  - url: https://pypi.io/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz
    sha256: db1b901614041e17df20005a9643f87c068393526c8b93196f7c8f940827299a
  - url: https://raw.githubusercontent.com/NOAA-National-Severe-Storms-Laboratory/BinMod1D-PARS/main/LICENSE
    fn: LICENSE
    sha256: 792e342898c614b1f61ca588a4e39755497210e3be5b078426176378e9f69748

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - setuptools >=61
    - wheel
    - pip
    - numpy >=2.0.0
    - matplotlib >=3.9.0
  run:
    - python >={{ python_min }}
    - numpy >=2.0.0
    - mpmath >=1.3.0
    - scipy >=1.15.0
    - numba >=0.61.0
    - matplotlib >=3.9.0
    - netcdf4 >=1.7.0
    - tqdm >=4.66.0
    - cloudpickle >=3.0.0

test:
  imports:
    - binmod1d
  commands:
    - python -c "import binmod1d; print('Import successful')"
  requires:
    - pip
    - python {{ python_min }}
    - numpy >=2.0.0
    - mpmath >=1.3.0
    - scipy >=1.15.0
    - numba >=0.61.0
    - matplotlib >=3.9.0
    - netcdf4 >=1.7.0
    - tqdm >=4.66.0
    - cloudpickle >=3.0.0

about:
  home: https://github.com/NOAA-National-Severe-Storms-Laboratory/BinMod1D-PARS
  summary: A 1D Column bin microphysics model that performs collision-coalescence and breakup.
  license: CC-BY-NC-SA-4.0
  license_family: OTHER
  license_file: LICENSE

extra:
  recipe-maintainers:
    - EdwinDunnavan
