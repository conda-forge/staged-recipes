{% set name = "binmod1d" %}
{% set version = "1.0.7" %}
{% set python_min = "3.11" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  - url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz
    sha256: 687494acf8deba46248ac2417638b08e60eb2237eb2e70c81d79440f02d91c29
  - url: https://raw.githubusercontent.com/NOAA-National-Severe-Storms-Laboratory/BinMod1D-PARS/main/LICENSE
    fn: LICENSE
    sha256: 3d509f611116235b0e8b15ca167b56f2f9f5923c31862140a33a3038676a0846

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - setuptools >=61
    - wheel
    - pip
    - numpy >=2.2.6
    - matplotlib >=3.10.3
  run:
    - python >={{ python_min }}
    - numpy >=2.0.0
    - mpmath >=1.3.0
    - scipy >=1.15.0
    - numba >=0.61.0
    - matplotlib >=3.9.0
    - netcdf4 >=1.7.0
    - tqdm >=4.66.0
    - cloudpickle >=3.0.0

test:
  imports:
    - binmod1d
  commands:
    - pip check
    - python -c "import binmod1d; print('Import successful')"
  requires:
    - pip
    - python {{ python_min }}
    - numpy >=2.2.0
    - mpmath >=1.3.0
    - scipy >=1.15.0
    - numba >=0.61.0
    - matplotlib >=3.9.0
    - netcdf4 >=1.7.0
    - tqdm >=4.66.0
    - cloudpickle >=3.0.0

about:
  home: https://github.com/NOAA-National-Severe-Storms-Laboratory/BinMod1D-PARS
  summary: A 1D Column bin microphysics model that performs collision-coalescence and breakup.
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - EdwinDunnavan
