{% set name = "binmod1d" %}
{% set version = "1.0.8" %}
{% set python_min = "3.11" %}#Changed version to 3.11.

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  - url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz
    sha256: 7f1f75f6a6533ab863910adf0bd1c08e5999b2afb72eda88c82e189937c5d737
  - url: https://raw.githubusercontent.com/NOAA-National-Severe-Storms-Laboratory/BinMod1D-PARS/main/LICENSE
    fn: LICENSE
    sha256: 0523297a7a6c9e88b60a37397b98f2402120e6a86c6414736f34589255627252

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - setuptools >=61
    - wheel
    - pip
    - numpy >=2.0.0
    - matplotlib >=3.9.0
  run:
    - python >={{ python_min }}
    - numpy >=2.0.0
    - mpmath >=1.3.0
    - scipy >=1.15.0
    - numba >=0.61.0
    - matplotlib >=3.9.0
    - netcdf4 >=1.7.0
    - tqdm >=4.66.0
    - cloudpickle >=3.0.0

test:
  imports:
    - binmod1d
  commands:
    - python -c "import binmod1d; print('Import successful')"
  requires:
    - pip
    - python {{ python_min }}
    - numpy >=2.2.0
    - mpmath >=1.3.0
    - scipy >=1.15.0
    - numba >=0.61.0
    - matplotlib >=3.9.0
    - netcdf4 >=1.7.0
    - tqdm >=4.66.0
    - cloudpickle >=3.0.0

about:
  home: https://github.com/NOAA-National-Severe-Storms-Laboratory/BinMod1D-PARS
  summary: A 1D Column bin microphysics model that performs collision-coalescence and breakup.
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - EdwinDunnavan
