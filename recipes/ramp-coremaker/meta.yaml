{% set python_min = "3.11" %}
{% set version = "0.0.3" %}

package:
  name: ramp-coremaker
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/r/ramp-coremaker/ramp_coremaker-{{ version }}.tar.gz
  sha256: b188f3deb9fb38aa44aeda8325ad2088d642aee6dbbc991b310a408bb5e30298

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python {{ python_min }}.*
    - setuptools
    - setuptools-scm
    - wheel
    - pip
  run:
    - python >={{ python_min }}
    - scipy
    - numpy
    - cytoolz
    - pyparsing
    - more-itertools
    - multipledispatch
    - ramp-core
    - ramp-isotopes

test:
  imports:
    - coremaker
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}.*

about:
  home: https://pypi.org/project/ramp-coremaker/
  summary: Package for representation of geometric and material compositions of nuclear reactor components
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - esheder
