schema_version: 1

context:
  version: 1.3.1

package:
  name: qm-qua
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/q/qm-qua/qm_qua-${{ version }}.tar.gz
  sha256: 9b874087ef35a464904e7a59a8db9c87e1189c07853871191e39108fd5c60339

build:
  noarch: python
  number: 0
  script:
    - ${{ PYTHON }} -c "open('README.md', 'a').close()"
    - ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - poetry-core
    - poetry-dynamic-versioning >=1.0.0,<2.0.0
    - pip
  run:
    - python >=${{ python_min }},<3.15
    - grpcio >=1.57.0,<2.0.0
    - protobuf >=4.25,<8
    - marshmallow >=3,<4
    - marshmallow-polyfield >=5.7.0,<6.0.0
    - multidict >=6.7.0,<7.0.0
    - numpy <3
    - tinydb >=4.6.1,<5.0.0
    - datadog-api-client >=2.6.0,<3.0.0
    - typing_extensions >=4.5.0,<5.0.0
    - plotly >=5
    - httpx >=0.27.0,<1
    - h2 >=4.3.0
  run_constraints:
    - certifi *
tests:
  - requirements:
      run:
        - pip
        - python ${{ python_min }}.*
    script:
      - pip check

about:
  summary: QUA language SDK to control a Quantum Computer
  license: BSD-3-Clause
  license_file: LICENSE
  homepage: https://docs.quantum-machines.co/

extra:
  recipe-maintainers:
    - noya-gol
