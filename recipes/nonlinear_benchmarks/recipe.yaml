schema_version: 1

context:
  version: "1.0.1"
  python_min: "3.8"
  # X.Y.Z-N used in rare cases for PyPI releases
  version_sanitized: ${{ (version | split("-"))[0] }}

package:
  name: nonlinear_benchmarks
  version: ${{ version_sanitized }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz
  sha256: c80d3bd1fa26fe21936a221f4dc2314a3052b378910c0abfdb4f7372086fc02f

build:
  number: 0
  noarch: python
  script:
    - python -m pip install . --no-deps -vv

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - poetry-core
  run:
    - python >=${{ python_min }}
    - numpy
    - tqdm
    - progressbar
    - scipy
    - requests
    - rarfile

tests:
  - python:
      imports:
        - nonlinear_benchmarks
      pip_check: true
      python_version: ${{ python_min }}.*

about:
  homepage: https://www.nonlinearbenchmark.org/
  summary: The official dataloader of nonlinearbenchmark.org
  license: BSD-3-Clause
  license_file: LICENSE
  repository: https://github.com/MaartenSchoukens/nonlinear_benchmarks

extra:
  recipe-maintainers:
    - MatthewSZhang
