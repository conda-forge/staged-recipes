{% set name = "nonlinear_benchmarks" %}
{% set version = "1.0.1" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz
  sha256: c80d3bd1fa26fe21936a221f4dc2314a3052b378910c0abfdb4f7372086fc02f

build:
  number: 0
  noarch: python
  script: {{ PYTHON }} -m pip install . --no-deps -vv

requirements:
  host:
    - python
    - pip
    - poetry-core
  run:
    - python
    - numpy
    - tqdm
    - progressbar
    - scipy
    - requests
    - rarfile

test:
  imports:
    - nonlinear_benchmarks
  commands:
    - pip check
  requires:
    - pip

about:
  home: https://www.nonlinearbenchmark.org/
  summary: The official dataloader of nonlinearbenchmark.org
  license: BSD-3-Clause
  license_file: LICENSE
  dev_url: https://github.com/MaartenSchoukens/nonlinear_benchmarks

extra:
  recipe-maintainers:
    - MatthewSZhang
