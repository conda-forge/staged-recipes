schema_version: 1

context:
  version: "1.4.9"
  commit: "980971e835876dc0cde415e8f9bc646e64667bf7"

package:
  name: directx-headers
  version: ${{ version }}

source:
  url: https://github.com/microsoft/DirectX-Headers/archive/${{ commit }}.tar.gz
  sha256: b5a4b6d8806ff7f29f19879f83d015dbe8740676d4ca0b48647a789cc7773c4e

build:
  number: 0
  script:
    interpreter: brush
    content: |
      set -euxo pipefail

      mkdir -p "${LIBRARY_INC:-$PREFIX/include}"
      cp -R include/directx include/wsl "${LIBRARY_INC:-$PREFIX/include}/"

requirements:
  build:
    - brush
    - uutils-coreutils

tests:
  - package_contents:
      include:
        - directx/d3d12.h
        - directx/d3dx12.h
        - directx/dxcore.h

about:
  homepage: https://github.com/microsoft/DirectX-Headers
  repository: https://github.com/microsoft/DirectX-Headers
  summary: Official Direct3D 12 headers for Windows and Linux
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - baszalmstra
