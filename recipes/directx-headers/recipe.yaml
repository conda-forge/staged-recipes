schema_version: 1

context:
  version: "1.4.9"
  commit: "980971e835876dc0cde415e8f9bc646e64667bf7"

package:
  name: directx-headers
  version: ${{ version }}

source:
  url: https://github.com/microsoft/DirectX-Headers/archive/${{ commit }}.tar.gz
  sha256: b5a4b6d8806ff7f29f19879f83d015dbe8740676d4ca0b48647a789cc7773c4e

build:
  number: 0
  script:
    - if: unix
      then:
        - mkdir -p "$PREFIX/include"
        - cp -R include/directx include/wsl "$PREFIX/include/"
    - if: win
      then:
        - if not exist "%LIBRARY_INC%" mkdir "%LIBRARY_INC%"
        - xcopy /E /I /Y include\directx "%LIBRARY_INC%\directx"
        - xcopy /E /I /Y include\wsl "%LIBRARY_INC%\wsl"

tests:
  - package_contents:
      include:
        - directx/d3d12.h
        - directx/d3dx12.h
        - directx/dxcore.h

about:
  homepage: https://github.com/microsoft/DirectX-Headers
  repository: https://github.com/microsoft/DirectX-Headers
  summary: Official Direct3D 12 headers for Windows and Linux
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - baszalmstra
