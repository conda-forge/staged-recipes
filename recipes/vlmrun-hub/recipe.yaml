# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "0.1.35"

package:
  name: vlmrun-hub
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/v/vlmrun-hub/vlmrun_hub-${{ version }}.tar.gz
  sha256: a15b0a7b6d1c32f752f65aadb51148c3d69791db9b7e30e69e6cbdc82a067f65

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - setuptools >=61.0
    - pip
  run:
    - python >=${{ python_min }}
    - annotated-types >=0.7.0
    - datamodel-code-generator >=0.26.1,<=0.39.0
    - loguru >=0.7.3
    - pillow >=10.2.0
    - pydantic >=2.5,<3
    - pydantic-core >=2.23.4
    - pydantic-yaml >=1.2.0
    - typing_extensions >=4.12.2

tests:
  - python:
      imports:
        - vlmrun.hub
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  homepage: https://pypi.org/project/vlmrun-hub/
  license: Apache-2.0
  license_file: LICENSE
  summary: VLM Run Hub for various industry-specific schemas
  repository: https://github.com/vlm-run/vlmrun-hub
  documentation: https://docs.vlm.run/hub
  description: |
    VLM Run Hub is a centralized repository of pre-defined, industry-specific
    Pydantic schemas and utilities for extracting structured data from visual
    inputs (images, videos, documents) using Vision Language Models (VLMs).
    It provides a catalog of domain schemas (documents, healthcare, retail,
    media, and more) plus a registry and helpers for working with them.

extra:
  recipe-maintainers:
    - rxm7706
