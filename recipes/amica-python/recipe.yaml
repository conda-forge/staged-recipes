schema_version: 1

context:
  version: "0.1.1"
  python_min: "3.10"

package:
  name: amica-python
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/a/amica-python/amica_python-${{ version }}.tar.gz
  sha256: cfcf0e98c1f5db858ca57ec7b1265e517062389c23d236b3bba83dac21855056

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - setuptools >=68
    - wheel
    - pip
  run:
    - python >=${{ python_min }}
    - loguru >=0.6.0
    - rich >=13.7
    - pooch >=1.6
    - psutil
    - numpy >=2.0
    - scikit-learn >=1.6
    - pytorch >=2.3

tests:
  - python:
      imports:
        - amica
      pip_check: true
      python_version: ${{ python_min }}.*

about:
  summary: Adaptive Mixture ICA in Python
  license: BSD-2-Clause
  license_file: LICENSE
  homepage: https://github.com/scott-huberty/amica-python

extra:
  recipe-maintainers:
    - scott-huberty
