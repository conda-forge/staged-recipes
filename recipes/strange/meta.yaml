{% set name = "strange-mol" %}
{% set version = "0.1.1" %} 
{% set python_min = "3.12" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name.replace('-', '_') }}-{{ version }}.tar.gz
  sha256: 07758e8a748c8380f9b7b78918b0eea30939ab91f8cae96d40cde7e785151077 

build:
  number: 0
  noarch: python
  entry_points:
    - strange = strange.__main__:main
  script: {{ PYTHON }} -m pip install . -vv

requirements:
  host:
    - python >={{ python_min }}
    - pip
    - setuptools
  run:
    - python >={{ python_min }}
    - mdanalysis
    - molviewspec
    - numpy
    - openmm
    - legacy-cgi
    - pdbfixer
    - pyyaml
    - rdkit

test:
  imports:
    - strange
  commands:
    - pip check
    - strange --help
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://gitlab.galaxy.ibpc.fr/rouaud/strange
  summary: Compute possible interaction between molecules.
  license: MIT
  license_file: LICENSE_MIT
  doc_url: https://strange.mol3d.tech/
  dev_url: https://gitlab.galaxy.ibpc.fr/rouaud/strange

extra:
  recipe-maintainers:
    - FilouPlains
