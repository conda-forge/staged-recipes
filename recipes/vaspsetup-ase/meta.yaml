{% set name = "vaspsetup-ase" %}
{% set version = "0.2.0" %}

package:
  name: {{ name }}
  version: {{ version }}

source:
  url: https://github.com/mappoh/vaspsetup-ase/archive/v{{ version }}.tar.gz

build:
  number: 0
  skip: true  # [win]
  script: |
    cargo build --release
    mkdir -p ${PREFIX}/bin
    cp target/release/vaspsetup ${PREFIX}/bin/
    ${PYTHON} -m pip install . --no-deps --no-build-isolation -vv

requirements:
  build:
    - rust >=1.70
    - {{ compiler('c') }}
  host:
    - python >=3.9
    - pip
    - setuptools
  run:
    - python >=3.9
    - ase >=3.22
    - numpy >=1.24

test:
  commands:
    - vaspsetup --help || true
    - python -m vaspsetup_core -c '{"command":"version","args":{}}' || true

about:
  home: https://github.com/mappoh/vaspsetup-ase
  license: MIT
  license_file: LICENSE
  summary: Terminal UI for setting up and submitting VASP calculations to an SGE cluster
  dev_url: https://github.com/mappoh/vaspsetup-ase

extra:
  recipe-maintainers:
    - mappoh
