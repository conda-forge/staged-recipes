{% set name = "conda-recipe-upstream-validator" %}
{% set name_pypi = name | replace("-", "_") %}
{% set version = "0.1.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.io/packages/source/{{ name[0] }}/{{ name }}/{{ name_pypi }}-{{ version }}.tar.gz
  sha256: 84f3388a414de096e8ada11ca4c6d0d358c0201cc424097685cfc2f15fdad8db

build:
  noarch: python
  number: 0
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python >=3.7
    - pip
    - setuptools >=61
  run:
    - python >=3.7
    - pyyaml

test:
  imports:
    - upstream_recipe_validator
    - upstream_recipe_validator.cli
  commands:
    - pip check
    - conda-recipe-upstream-validator --help
  requires:
    - pip

about:
  home: https://github.com/cofinoa/conda-recipe-upstream-validator
  summary: Validate conda recipe dependencies against upstream R DESCRIPTION metadata
  description: |
    A Python command-line tool and library for validating conda recipe
    dependencies against upstream package metadata. Currently supports R
    DESCRIPTION files. Compares dependency declarations in upstream package
    metadata with those listed in conda recipes (meta.yaml), intended for use
    by conda-forge recipe maintainers and R package authors.
  license: BSD-3-Clause
  license_family: BSD
  license_file: LICENSE
  doc_url: https://github.com/cofinoa/conda-recipe-upstream-validator#readme
  dev_url: https://github.com/cofinoa/conda-recipe-upstream-validator

extra:
  recipe-maintainers:
    - cofinoa
