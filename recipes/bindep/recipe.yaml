schema_version: 1

context:
  version: "2.14.0"
  python_min: "3.8"

package:
  name: bindep
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/b/bindep/bindep-${{ version }}.tar.gz
  sha256: 0c804c7e48dd17db24cb39121ade7171f684fb463c8aa01d0338cd11d254364a

build:
  noarch: python
  number: 0
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  python:
    entry_points:
      - bindep = bindep.main:main

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - pbr >=6.1.1
  run:
    - python >=${{ python_min }}
    - distro >=1.7
    - packaging
    - parsley
    - pbr >=2

tests:
  - python:
      imports:
        - bindep
      python_version: ${{ python_min }}.*
      pip_check: true

about:
  summary: |
    Binary dependency utility
  homepage: https://pypi.org/project/bindep/
  repository: https://pypi.org/project/bindep/
  license: Apache-2.0
  license_file: LICENSE

extra:
  recipe-maintainers:
    - killua156
    - mgorny
