schema_version: 1

context:
  name: mjlab
  version: 1.2.0
  build_number: 0

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://github.com/mujocolab/mjlab/archive/refs/tags/v${{ version }}.zip
  sha256: 79aa96c2bc1d7d1c1689287357a47f3af68e37c2851886e9e9869b096df3c3e5

build:
  number: ${{ build_number }}
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  noarch: python

requirements:
  host:
    - pip
    - python ${{ python_min }}.*
    - uv-build
  run:
    - python >=${{ python_min }}
    - prettytable
    - tqdm
    - tyro >=1.0.1
    - pytorch >=2.7.0
    - if: linux
      then:
        - __linux
        - torchrunx >=0.3.4
    - warp-lang >=1.12.0
    - mujoco-warp >=3.5.0
    - mujoco >=3.5.0
    - trimesh >=4.8.3
    - viser >=1.0.24
    - mediapy >=1.2.6
    - imageio-ffmpeg
    - tensordict
    - rsl-rl-lib ==5.0.1
    - tensorboard >=2.20.0
    - onnxscript >=0.5.4
    - wandb >=0.22.3

tests:
  - python:
      imports:
        - mjlab
      pip_check: true
      python_version: 3.11.*
  - script:
      - pytest tests/
        --deselect "tests/test_tyro_flags.py::test_tyro_cli_calls_have_tyro_flags"
    files:
      source:
        - pyproject.toml
        - src/mjlab/asset_zoo
        - tests/
    requirements:
      run:
        - pytest
        - python 3.11.*
        - scipy

about:
  homepage: https://mujocolab.github.io/mjlab/
  license: Apache-2.0
  license_file: LICENSE
  repository: https://github.com/mujocolab/mjlab
  summary: Isaac Lab API, powered by MuJoCo-Warp, for RL and robotics research.

extra:
  recipe-maintainers:
    - diegoferigo
