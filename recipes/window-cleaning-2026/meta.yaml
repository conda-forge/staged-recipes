{% set name = "window-cleaning-2026" %}
{% set version = "0.1.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/w/window-cleaning-2026/window_cleaning_2026-{{ version }}.tar.gz
  sha256: ea9f8b7bc19fcf4264065ec46dad30f4c5aa54facdf47608f5a6ef477ceeabf5

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv
  number: 0

requirements:
  host:
    - python >=3.9
    - pip
    - setuptools
  run:
    - python >=3.9

test:
  imports:
    - window_cleaning_2026
  requires:
    - pip
  commands:
    - pip check

about:
  home: https://github.com/DaveCookVectorLabs/window-cleaning-2026
  summary: Commercial window cleaning cost estimation engine for facility managers
  description: |
    A cost estimation engine for commercial window cleaning jobs. Takes window
    count, type, access method, service scope, frequency, labour rate, and profit
    margin as inputs and returns a detailed cost breakdown. Includes lookup tables
    for access difficulty multipliers (ground level through swing stage), service
    type factors, and frequency-based volume discounts. Calculation logic is
    identical across Python, Rust, Java, Ruby, Elixir, and PHP implementations.
  license: MIT
  license_family: MIT
  license_file: LICENSE
  doc_url: https://window-cleaning-2026.readthedocs.io/
  dev_url: https://github.com/DaveCookVectorLabs/window-cleaning-2026

extra:
  recipe-maintainers:
    - DaveCookVectorLabs
