# clair must be compiled with Clang (it FATAL_ERRORs otherwise), so force the
# clang/clangxx compilers on every platform (overrides the default gcc on linux)
# and pin the compiler to the same major version as the LLVM/Clang libraries it
# links (llvmdev/clangdev/libclang-cpp >= 20).
c_compiler:
  - clang
cxx_compiler:
  - clangxx
c_compiler_version:
  - "20"
cxx_compiler_version:
  - "20"
