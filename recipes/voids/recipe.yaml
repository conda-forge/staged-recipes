schema_version: 1

context:
  version: "0.1.6"

package:
  name: voids
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/v/voids/voids-${{ version }}.tar.gz
  sha256: a36a44102e6367b825cdd747544f1d2bcc90da00426b426d7046df68c19d3978

build:
  number: 0
  skip: match(python, "<3.11")
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python >=3.11
    - hatchling >=1.24
    - pip
  run:
    - python >=3.11
    - numpy >=1.26,<2.2
    - scipy >=1.11
    - scikit-image >=0.22
    - porespy >=2.4
    - openpnm >=3.6,<3.7
    - pyamg >=5.3
    - if: linux
      then: pypardiso >=0.4
    - if: linux
      then: mkl >=2023
    - thermo >=0.6.0,<0.7
    - coolprop >=6.6
    - h5py >=3.10
    - plotly >=5.0
    - pyvista >=0.43
    - typing_extensions >=4.10
    - edt <3.1
    - matplotlib-inline

tests:
  - python:
      imports:
        - voids
      pip_check: true

about:
  summary: Scientific Python package for pore network modeling (PNM)
  license: LGPL-2.1-only
  license_file: LICENSE
  homepage: https://github.com/geomech-project/voids

extra:
  recipe-maintainers:
    - volpatto
