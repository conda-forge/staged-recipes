schema_version: 1

context:
  python_min: "3.11"
  version: "0.1.5"

package:
  name: voids
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/v/voids/voids-${{ version }}.tar.gz
  sha256: 4a2d0dc2c1622acc132d749af4e1d15de83187c9275bbc03d0a4e398442fe2dd

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - hatchling >=1.24
    - pip
  run:
    - python >=${{ python_min }}
    - numpy >=1.26,<2.2
    - scipy >=1.11
    - scikit-image >=0.22
    - porespy >=2.4
    - openpnm >=3.6,<3.7
    - pyamg >=5.3
    - thermo >=0.6.0,<0.7
    - coolprop >=6.6
    - h5py >=3.10
    - plotly >=5.0
    - pyvista >=0.43
    - typing_extensions >=4.10
    - matplotlib-inline
    - pypardiso
    - edt <3.1
    - mkl

tests:
  - python:
      imports:
        - voids
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  summary: Scientific Python package for pore network modeling (PNM)
  license: LGPL-2.1-only
  license_file: LICENSE
  homepage: https://github.com/geomech-project/voids

extra:
  recipe-maintainers:
    - volpatto
