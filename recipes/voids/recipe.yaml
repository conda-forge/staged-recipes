schema_version: 1

context:
  python_min: "3.11"
  version: "0.1.4"

package:
  name: voids
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/v/voids/voids-${{ version }}.tar.gz
  sha256: 29b87bf4ee01fe7e13a019c6022c8884497d071cc683bf993e5d77fc5bc03843

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - hatchling >=1.24
    - pip
  run:
    - python >=${{ python_min }}
    - numpy >=1.26,<2.2
    - scipy >=1.11
    - scikit-image >=0.22
    - porespy >=2.4
    - openpnm >=3.6,<3.7
    - h5py >=3.10
    - plotly >=5.0
    - pyvista >=0.43
    - typing_extensions >=4.10
    - matplotlib-inline
    - pypardiso
    - edt <3.1

tests:
  - python:
      imports:
        - voids
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  summary: Scientific Python package for pore network modeling (PNM)
  license: LGPL-2.1-only
  license_file: LICENSE
  homepage: https://github.com/geomech-project/voids

extra:
  recipe-maintainers:
    - volpatto
