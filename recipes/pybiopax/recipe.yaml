schema_version: 1

context:
  python_min: "3.9"
  version: "0.1.5"

package:
  name: pybiopax
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/p/pybiopax/pybiopax-${{ version }}.tar.gz
  sha256: 0e0bf410592c36c32c0428d8f64fca65aac69293859b0d233815ae62ceca547c

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
  run:
    - python >=${{ python_min }}
    - lxml
    - requests
    - tqdm

tests:
  - python:
      imports:
        - pybiopax
      pip_check: true
      python_version: ${{ python_min }}.*

about:
  summary: A Python implementation of the BioPAX object model, and parts of PaxTools.
  license: BSD-2-Clause
  license_file: LICENSE
  homepage: https://github.com/indralab/pybiopax

extra:
  recipe-maintainers:
    - guillaume-gricourt
