context:
  version: 0.5.3.4

package:
  name: graphriccicurvature
  version: ${{ version }}

source:
  url: https://github.com/AlainKadar/GraphRicciCurvature/archive/refs/tags/v${{ version }}.tar.gz
  sha256: dcd28f532650746f1878fc6c350ea0774134c6dd002a1c76ebd65763e35592ff

build:
  number: 0
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  build:
    - ${{ compiler('c') }}
    - ${{ stdlib('c') }}
  host:
    - python
    - pip
    - setuptools
  run:
    - python
    - cython
    - numpy
    - networkx >=2.0
    - pot >=0.8.0
    - packaging
    - networkit >=6.1
    - python-louvain
    - tabulate

tests:
  - python:
      imports:
        - GraphRicciCurvature

about:
  summary: Compute discrete Ricci curvatures and Ricci flow on NetworkX graphs.
  license: Apache-2.0
  license_file: LICENSE.txt
  homepage: https://github.com/AlainKadar/GraphRicciCurvature

extra:
  recipe-maintainers:
    - AlainKadar
