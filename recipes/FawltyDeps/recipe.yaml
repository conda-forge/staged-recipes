# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "0.20.0"

package:
  name: fawltydeps
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/f/fawltydeps/fawltydeps-${{ version }}.tar.gz
  sha256: ad080b284a2278c9940540b643483aff8b57794a1362735d3024c270810c0182

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  python:
    entry_points:
      - fawltydeps = fawltydeps.main:main

requirements:
  host:
    - python ${{ python_min }}.*
    - poetry-core
    - pip
  run:
    - python >=${{ python_min }}
    - importlib-metadata >=6.6.0
    - isort >=5.10
    - packaging >=24.0
    - pip-requirements-parser >=32.0.1
    - pydantic >=1.10.4,<3.0.0
    - pyyaml >=6.0.1
    - tomli >=2.0.1

tests:
  - python:
      imports:
        - fawltydeps
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"
  - requirements:
      run:
        - pip
        - python
    script:
      - fawltydeps --help

about:
  summary: Find undeclared and unused 3rd-party dependencies in your Python project.
  license: MIT
  license_file: LICENSE
  homepage: https://github.com/tweag/FawltyDeps
  documentation: https://tweag.github.io/FawltyDeps/

extra:
  recipe-maintainers:
    - rxm7706
