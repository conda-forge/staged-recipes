context:
  name: highspy-extras
  version: "1.14.0.dev3"

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  git: https://github.com/ERGO-Code/HiGHS
  rev: 356c48c5772b46c484f6f328bde577fb3ec93519 # PR #3038

build:
  number: 0
  script:
    ${{ PYTHON }} -m pip install ./highspy-extras --config-settings=cmake.define.BUILD_OPENBLAS=OFF -vv --no-deps --no-build-isolation

requirements:
  build:
    - if: build_platform != target_platform
      then:
        - python
        - cross-python_${{ target_platform }}
        - numpy
    - ${{ compiler('c') }}
    - ${{ stdlib('c') }}
    - ${{ compiler('cxx') }}
    - cmake
    - if: unix
      then: make
  host:
    - python
    - pip
    - scikit-build-core
    - numpy
    - pybind11
    - if: not osx
      then : openblas
  run:
    - python
    - numpy
  ignore_run_exports:
    from_package:
      - numpy

tests:
  - python:
      imports:
        - highspy_extras
      pip_check: true
  - script:
      - python -m pytest highspy-extras/tests/test_highspy_extras.py
    requirements:
      run:
        - python
        - pytest
    files:
      source:
        - highspy-extras/tests/

about:
  summary: Extension package for [highspy](highs.dev)
  description: |
    Extension package for highspy(https://pypi.org/project/highspy/) that
    enables access to external dependencies with licensing terms that differ
    from the HiGHS MIT, such as Metis (Apache 2.0).

    The HiPO Interior Point Method (IPM) solver currently uses these external
    dependencies to provide enhanced performance for linear programming
    problems. Other algorithms may also rely on `highspy-extras` in the future.

  license: Apache-2.0
  license_file: THIRD_PARTY_NOTICES.md
  homepage: https://github.com/ERGO-Code/HiGHS
  repository: https://github.com/ERGO-Code/HiGHS
  documentation: https://ergo-code.github.io/HiGHS/stable/

extra:
  recipe-maintainers:
    - galabovaa
