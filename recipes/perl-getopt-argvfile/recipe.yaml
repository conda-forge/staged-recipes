context:
  name: perl-getopt-argvfile
  version: "1.11"

package:
  name: ${{ name }}
  version: ${{ version }}

source:
  - url: https://cpan.metacpan.org/authors/id/J/JS/JSTENZEL/Getopt-ArgvFile-${{ version }}.tar.gz
    sha256: 3709aa513ce6fd71d1a55a02e34d2f090017d5350a9bd447005653c9b0835b22
  - url: https://raw.githubusercontent.com/Perl/perl5/v5.32.1/Copying
    sha256: d77d235e41d54594865151f4751e835c5a82322b0e87ace266567c3391a4b912
    file_name: Copying
  - url: https://raw.githubusercontent.com/Perl/perl5/v5.32.1/Artistic
    sha256: dd90d4f42e4dcadf5a7c09eea0189d93c7b37ae560c91f0f6d5233ed3b9292a2
    file_name: Artistic

build:
  number: 0
  noarch: generic
  script:
    - perl Makefile.PL INSTALLDIRS=vendor NO_PERLLOCAL=1 NO_PACKLIST=1
    - make
    - make test
    - make install VERBINST=1

requirements:
  build:
    - make
  host:
    - perl
  run:
    - perl

tests:
  - script: perl -e 'use Getopt::ArgvFile; print "ok\n"'

about:
  homepage: https://metacpan.org/dist/Getopt-ArgvFile
  summary: Interpolates script options from files into @ARGV or another array
  license: Artistic-1.0-Perl OR GPL-1.0-or-later
  license_file:
    - Artistic
    - Copying

extra:
  recipe-maintainers:
    - baszalmstra
