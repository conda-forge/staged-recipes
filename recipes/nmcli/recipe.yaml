schema_version: 1

context:
  python_min: "3.9"
  version: "1.7.0"

package:
  name: nmcli
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/n/nmcli/nmcli-${{ version }}.tar.gz
  sha256: 4fb17b6c33d276a264a27b7109fa1d70987570536fa8852b51830f9f7732f982

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - setuptools >=61.0
    - wheel
    - pip
  run:
    - python >=${{ python_min }}

tests:
  - python:
      imports:
        - nmcli
      pip_check: true
      python_version: ${{ python_min }}.*

about:
  summary: A python wrapper library for the network-manager cli client
  description: |
    nmcli is a Python wrapper around NetworkManager's command line client
    of the same name. It lets you manage network connections, devices,
    Wi-Fi networks, hotspots, and radio state programmatically by driving
    the system `nmcli` binary, so NetworkManager must be available on the
    host at runtime.
  license: MIT
  license_file: LICENSE.txt
  homepage: https://github.com/ushiboy/nmcli
  repository: https://github.com/ushiboy/nmcli

extra:
  recipe-maintainers:
    - ruben-arts
