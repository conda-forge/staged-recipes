{% set version = "1.0" %}

package:
  name: cppjoules
  version: "{{ version }}"

source:
  url: https://github.com/rishalab/CPPJoules/archive/refs/tags/v{{ version }}.tar.gz
  sha256: 4e87db25f825795fadd84509cb1916c37c65c85d2ca3adba4404a9f3f0947d46

build:
  number: 0
  skip: true  # [not linux]

  run_exports:
    - {{ pin_subpackage('cppjoules', max_pin='x.x') }}

requirements:
  build:
    - {{ compiler('cxx') }}
    - {{ stdlib('c') }}
    - cmake >=3.5
    - ninja

test:
  commands:
    - test -f ${PREFIX}/lib/libCPP_Joules$SHLIB_EXT

about:
  home: https://rishalab.github.io/CPPJoules/
  license: MIT
  license_file:
    - LICENSE
  summary: Energy Measurement tool for CPP/CUDA programs
  dev_url: https://github.com/rishalab/CPPJoules

extra:
  recipe-maintainers:
    - awvwgk
