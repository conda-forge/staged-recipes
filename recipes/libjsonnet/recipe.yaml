context:
  version: "0.22.0"

package:
  name: libjsonnet
  version: ${{ version }}

source:
  url: https://github.com/google/jsonnet/archive/refs/tags/v${{ version }}.tar.gz
  sha256: 5914b9904d97efa662d919519cef1a14e4132bfddddaeed8b061b4a8af628f8d

build:
  number: 0
  skip:
    - win
  script: build.sh

requirements:
  build:
    - ${{ compiler('cxx') }}
    - ${{ stdlib('c') }}
    - cmake
    - make
  host:
    - nlohmann_json
  run_exports:
    - ${{ pin_subpackage('libjsonnet', upper_bound='x.x') }}

tests:
  - package_contents:
      bin:
        - jsonnet
      lib:
        - jsonnet
        - jsonnet++
      include:
        - libjsonnet.h
        - libjsonnet++.h

about:
  homepage: https://jsonnet.org/
  summary: Data templating language — C/C++ library, headers, and CLI
  description: |
    Jsonnet is a data templating language for app and tool developers. It
    generates configuration data in JSON, YAML, or any text-based format,
    with computed expressions, parameters, conditionals, arrays, objects,
    and import. This package provides the C/C++ shared libraries
    (libjsonnet, libjsonnet++), public headers, and the `jsonnet` CLI.

    The conda-forge `jsonnet` package ships only the Python bindings; this
    `libjsonnet` package complements it for native consumers (following the
    libgit2 / libxml2 naming convention).
  license: Apache-2.0
  license_file: LICENSE
  repository: https://github.com/google/jsonnet

extra:
  recipe-maintainers:
    - olantwin
