{% set version = '1.6.1' %}
{% set posix = 'm2-' if win else '' %}

package:
  name: r-bedassle
  version: "{{ version|replace('-', '_') }}"

source:
  url:
    - {{ cran_mirror }}/src/contrib/BEDASSLE_{{ version }}.tar.gz
    - {{ cran_mirror }}/src/contrib/Archive/BEDASSLE/BEDASSLE_{{ version }}.tar.gz
  sha256: a7250e2ff1da3c1761f1dc3a883401a85dfe0c0f9a3c8d85f91dbeadaf634ffe

build:
  number: 0
  noarch: generic
  rpaths:
    - lib/R/lib/
    - lib/
  missing_dso_whitelist:
    - '*/R.dll'        # [win]
    - '*/Rblas.dll'    # [win]
    - '*/Rlapack.dll'  # [win]

requirements:
  build:
    - {{ posix }}zip               # [win]
    - cross-r-base {{ r_base }}    # [build_platform != target_platform]
  host:
    - r-base
    - r-mass
    - r-emdbook
    - r-matrixcalc
  run:
    - r-base
    - r-mass
    - r-emdbook
    - r-matrixcalc

test:
  commands:
    - $R -e "library('BEDASSLE')"           # [not win]
    - "\"%R%\" -e \"library('BEDASSLE')\""  # [win]

about:
  home: https://CRAN.R-project.org/package=BEDASSLE
  license: GPL-2.0-only
  summary: Provides functions that allow users to quantify the relative contributions of geographic
    and ecological distances to empirical patterns of genetic differentiation on a landscape.  Specifically,
    we use a custom Markov chain Monte Carlo (MCMC) algorithm, which is used to estimate
    the parameters of the inference model, as well as functions for performing MCMC
    diagnosis and assessing model adequacy.
  license_family: GPL2
  license_file:
    - '{{ environ["PREFIX"] }}/lib/R/share/licenses/GPL-2'

extra:
  recipe-maintainers:
    - conda-forge/r

# Package: BEDASSLE
# Type: Package
# Title: Quantifies Effects of Geo/Eco Distance on Genetic Differentiation
# Version: 1.6.1
# Date: 2024-1-09
# Author: Gideon Bradburd
# Maintainer: Gideon Bradburd <bradburd@umich.edu>
# Description: Provides functions that allow users to quantify the relative contributions of geographic and ecological distances to empirical patterns of genetic differentiation on a landscape.  Specifically, we use a custom Markov chain Monte Carlo (MCMC) algorithm, which is used to estimate the parameters of the inference model, as well as functions for performing MCMC diagnosis and assessing model adequacy.
# License: GPL (>= 2)
# Imports: MASS, matrixcalc, emdbook
# NeedsCompilation: no
# Packaged: 2024-01-11 16:05:04 UTC; bradburd
# Repository: CRAN
# Date/Publication: 2024-01-11 23:50:08 UTC
