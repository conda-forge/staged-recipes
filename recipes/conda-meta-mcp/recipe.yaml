schema_version: 1

context:
  version: "0.1.0"
  python_min: "3.13"

package:
  name: conda-meta-mcp
  version: ${{ version }}

source:
  url: https://github.com/conda-incubator/conda-meta-mcp/archive/refs/tags/${{ version }}.tar.gz
  sha256: 04001e7c163c10c9c0fa251d23b0fa8ce8059a8265e38722798181182e8d7dce

build:
  number: 0
  noarch: python
  script:
    env:
      SETUPTOOLS_SCM_PRETEND_VERSION: ${{ version }}
    content: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  python:
    entry_points:
      - cmm = conda_meta_mcp.cli:main

requirements:
  host:
    - python ${{ python_min }}.*
    - hatchling >=1.12.2
    - hatch-vcs >=0.2.0
    - pip
  run:
    - python >=${{ python_min }}
    - argparse-manpage >=4.7
    - conda >=26.1
    - conda-forge-metadata >=0.13.0
    - conda-libmamba-solver
    - conda-package-streaming >=0.12.0
    - fastmcp >=3.1.0,<3.2.0
    - pyyaml >=6.0.3
    - requests >=2.28.0

tests:
  - python:
      imports:
        - conda_meta_mcp
        - conda_meta_mcp.tools
      pip_check: true
      python_version: ${{ python_min }}.*
  - requirements:
      run:
        - python ${{ python_min }}.*
    script:
      - cmm --help

about:
  summary: A Model Context Protocol server providing conda ecosystem context for AI agents
  description: |
    An MCP server exposing authoritative, read-only conda ecosystem metadata
    for AI agents — package info, search, import mapping, PyPI to conda mapping,
    CLI help, and repoquery.
  license: BSD-3-Clause
  license_file: LICENSE
  homepage: https://github.com/conda-incubator/conda-meta-mcp
  repository: https://github.com/conda-incubator/conda-meta-mcp
  documentation: https://github.com/conda-incubator/conda-meta-mcp#readme

extra:
  recipe-maintainers:
    - dbast
    - jezdez
