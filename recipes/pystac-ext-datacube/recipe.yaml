schema_version: 1

context:
  version: "2.2.0"

package:
  name: pystac-ext-datacube
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/p/pystac-ext-datacube/pystac.extensions.datacube-${{ version }}.tar.gz
  sha256: a64643cb826c3f2f169c7497b5e5ba218f0a1ababbbd3bad04c57f99df3a67c7

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - hatchling
    - pip
  run:
    - python >=${{ python_min }}
    - pystac-core

tests:
  - python:
      imports:
        - pystac.extensions.datacube
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  summary: Datacube extension for PySTAC
  license: Apache-2.0
  license_file: LICENSE
  homepage: https://pypi.org/project/pystac-ext-datacube/
  documentation: https://pystac.readthedocs.io

extra:
  recipe-maintainers:
    - ocefpaf
