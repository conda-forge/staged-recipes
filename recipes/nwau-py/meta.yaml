{% set name = "nwau-py" %}
{% set version = "0.2.2" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.io/packages/source/n/nwau-py/nwau_py-{{ version }}.tar.gz
  sha256: c0998035a2e0ceebe913717170994ef668159c6e384524932c55c18fc1ce0480

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv

requirements:
  host:
    - python
    - pip
  run:
    - python >=3.10,<3.15

about:
  home: https://github.com/edithatogo/mchs
  license: MIT
  summary: Utilities for calculating IHACPA National Weighted Activity Units
