{% set name = "nwau-py" %}
{% set version = "0.2.2" %}
{% set python_min = "3.10" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/n/nwau-py/nwau_py-{{ version }}.tar.gz
  sha256: c0998035a2e0ceebe913717170994ef668159c6e384524932c55c18fc1ce0480

build:
  number: 0
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  entry_points:
    - funding-calculator = nwau_py.cli.main:cli
    - mchs-mcp = nwau_py.mcp_server:main
    - mchs-mcp-http = nwau_py.mcp_server:main_http

requirements:
  host:
    - python {{ python_min }}
    - pip
    - setuptools >=77
  run:
    - python >={{ python_min }}
    - click
    - lightgbm
    - numpy
    - pandas
    - pyarrow
    - pydantic
    - polars
    - pyreadstat
    - pyxlsb
    - pyyaml >=6.0.3

test:
  imports:
    - nwau_py
  commands:
    - funding-calculator --help
  requires:
    - python {{ python_min }}

about:
  home: https://github.com/edithatogo/mchs
  license: MIT
  license_file: LICENSE
  summary: Utilities for calculating IHACPA National Weighted Activity Units

extra:
  recipe-maintainers:
    - edithatogo
