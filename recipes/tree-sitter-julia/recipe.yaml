schema_version: 1

context:
  version: "0.23.1"

package:
  name: tree-sitter-julia
  version: ${{ version }}

source:
  url: https://github.com/tree-sitter/tree-sitter-julia/archive/refs/tags/v${{ version }}.tar.gz
  sha256: 9f6926734e09110dd4792f6c327c6b547834b52b8ce2bc7c1eba2ed4f7f7aba0

build:
  number: 0
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  build:
    - ${{ compiler("c") }}
  host:
    - python
    - pip
    - setuptools >=42
    - wheel
  run:
    - python

tests:
  - python:
      imports:
        - tree_sitter_julia

about:
  homepage: https://github.com/tree-sitter/tree-sitter-julia
  summary: Julia grammar for tree-sitter
  license: MIT
  license_file: LICENSE
  repository: https://github.com/tree-sitter/tree-sitter-julia

extra:
  recipe-maintainers:
    - killua156
    - mgorny
