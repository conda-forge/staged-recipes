context:
  version: "3.4.2"

package:
  name: taskwarrior
  version: ${{ version }}

source:
  url: https://github.com/GothenburgBitFactory/taskwarrior/releases/download/v${{ version }}/task-${{ version }}.tar.gz
  sha256: d302761fcd1268e4a5a545613a2b68c61abd50c0bcaade3b3e68d728dd02e716
  patches:
    - fix-cmake-corrosion.patch

build:
  number: 0
  skip:
    # Possibly support Windows in the future
    # Refer to https://github.com/GothenburgBitFactory/taskwarrior/issues/2159
    - win

requirements:
  build:
    - ${{ compiler('cxx') }}
    - ${{ compiler('rust') }}
    - ${{ stdlib('c') }}
    - cargo-bundle-licenses
    - cmake
    - corrosion
    - if: unix
      then: make
    - pkg-config
  host:
    - if: linux
      then: libuuid

tests:
  - script:
    - touch ~/.taskrc
    - task add Hello Tasks
    - task list | grep "Hello Tasks"
    - task --version
    - task help

about:
  homepage: https://taskwarrior.org
  repository: https://github.com/GothenburgBitFactory/taskwarrior
  documentation: https://taskwarrior.org/docs
  license: MIT
  license_file: LICENSE
  summary: Taskwarrior - Command line Task Management
  description: |
    Taskwarrior is Free and Open Source Software that manages your TODO list from the command line.
    It is flexible, fast, and unobtrusive. It does its job then gets out of your way.

extra:
  recipe-maintainers:
    - eunos-1128
