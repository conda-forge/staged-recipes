context:
  gem_name: "kamal"
  version: "2.10.1"

package:
  name: ${{ gem_name }}
  version: ${{ version }}

source:
  url: https://rubygems.org/downloads/${{ gem_name }}-${{ version }}.gem
  sha256: 53b7ecb4c33dd83b1aedfc7aacd1c059f835993258a552d70d584c6ce32b6340

build:
  noarch: generic
  number: 0
  script: build

requirements:
  host:
    - ruby
  run:
    - ruby
    - rb-activesupport >=7.0
    - rb-base64 >=0.2
    - rb-bcrypt_pbkdf >=1.0,<2.0
    - rb-concurrent-ruby >=1.2,<2.0
    - rb-dotenv >=3.1,<4.0
    - rb-ed25519 >=1.4,<2.0
    - rb-net-ssh >=7.3,<8.0
    - rb-sshkit >=1.23.0,<2.0
    - rb-thor >=1.3,<2.0
    - rb-zeitwerk >=2.6.18,<3.0

tests:
  - script:
      - kamal version

about:
  homepage: https://kamal-deploy.org
  summary: Deploy web apps in containers to servers running Docker with zero downtime.
  license: MIT
  license_file: ${{ gem_name }}-${{ version }}/MIT-LICENSE
  repository: https://github.com/basecamp/kamal

extra:
  recipe-maintainers:
    - aktech
