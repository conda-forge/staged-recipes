{% set name = "aspose-cad" %}
{% set version = "26.6.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

build:
  number: 0
  script:
    - >
      {% if win %}
        %PYTHON% -m pip install --no-deps --ignore-installed --no-index "{{ PYPI_WHEEL_WIN }}"
      {% else %}
        $PYTHON -m pip install --no-deps --ignore-installed --no-index "{{ PYPI_WHEEL_UNIX }}"
      {% endif %}
  skip: true  # [py2k]

requirements:
  host:
    - python
    - pip
    - python_abi
  run:
    - python
    - python_abi
    - libglib >=2.17              # [not win]
    - libcxx                      # [osx]
    - vc                          # [win]

test:
  imports:
    - aspose
    - aspose.cad
  commands:
    - pip check
    - python -c "import aspose; print(aspose.__version__)"
    - python -c "import aspose.cad; print('Import OK')"
  requires:
    - pip

about:
  home: https://products.aspose.com/cad/python
  summary: Aspose.CAD for Python is a CAD and BIM drawings Processing library that allows developers to modify, convert and publish various drawing and image formats without need to have any other CAD software.
  license: proprietary
  license_file: License.txt
  extra:
    recipe-maintainers:
      - alexefaspose
