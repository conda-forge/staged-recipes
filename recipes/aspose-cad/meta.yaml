{% set name = "aspose-cad" %}
{% set version = "26.6.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/a/aspose-cad/aspose_cad-{{ version }}.tar.gz
  sha256: 8ff3ed303e09eba0ded4b78cfd7d3c6087ff6a015b2e5c4fefda15fd5ce06c1b

build:
  number: 0
  script: |
    echo "Downloading and installing pre-built wheel for $target_platform..."
    
    # Скачиваем нужный whl файл под текущую платформу
    case "$target_platform" in
      linux-64)
        WHEEL_URL="https://files.pythonhosted.org/packages/cf/7f/ed9b1cb3c1a258838ca36dcf782ecf91ac21f010bc6effc0882f87b4388b/aspose_cad-26.6.0-py3-none-manylinux1_x86_64.whl"
        ;;
      osx-64 | osx-arm64)
        WHEEL_URL="https://files.pythonhosted.org/packages/fc/ad/79f8a37bfaf84183eec24ae400f104e0e8b12d831042dda743e91166d752/aspose_cad-26.6.0-py3-none-macosx_11_0_arm64.whl"
        ;;
      win-64)
        WHEEL_URL="https://files.pythonhosted.org/packages/b4/53/67ef7ac1d6a349319e282dfc23939c19656a0b68e382faf203b13a267ad3/aspose_cad-26.6-py3-none-win_amd64.whl"
        ;;
    esac
    
    curl -L -o aspose_cad-26.6.0-py3-none-manylinux1_x86_64.whl "$WHEEL_URL"
    
    # Устанавливаем пакет напрямую через pip
    {{ PYTHON }} -m pip install --no-deps --ignore-installed --no-index aspose_cad-26.6.0-py3-none-manylinux1_x86_64.whl
    
requirements:
  host:
    - python
    - pip
    - python_abi
  run:
    - python
    - python_abi
    # Системные рантаймы для бинарных модулей (.so / .dll)
    - libgcc-ng >=15.2.0          # <-- Для libgcc_s.so.1
    - libstdcxx-ng >=15.2.0       # <-- Для libstdc++.so.6
    - sysroot_linux-64 >=2.17     # <-- КРИТИЧНО: вместо 'glibc'. Содержит libc.so.6 и другие базовые либы
    - zlib                        # [not win] Требуется System.Native.so
    - libcxx                      # [osx]
    - vc                          # [win]

build:
  missing_dso_allowlist:
    # Явно разрешаем ссылки на базовые системные библиотеки Linux,
    # чтобы избежать ошибки "is this binary repackaging?"
    - /lib64/libc.so.6
    - /lib64/libm.so.6
    - /lib64/libdl.so.2
    - /lib64/librt.so.1
    - /lib64/libpthread.so.0
    - /lib64/libstdc++.so.6
    - /lib64/libgcc_s.so.1
    
test:
  imports:
    - aspose
    - aspose.cad
  commands:
    - pip check
    - python -c "import aspose; print(aspose.__version__)"
    - python -c "import aspose.cad; print('Import OK')"
  requires:
    - pip

about:
  home: https://products.aspose.com/cad/python
  summary: Aspose.CAD for Python is a CAD and BIM drawings Processing library that allows developers to modify, convert and publish various drawing and image formats without need to have any other CAD software.
  license: proprietary
  license_file: PLEASE_ADD_LICENSE_FILE
  description: |
    Aspose.CAD for Python is a CAD and BIM drawings Processing library that allows developers to modify, convert and publish various drawing and image formats without need to have any other CAD software.
  extra:
    recipe-maintainers:
      - alexefaspose   # <-- ВАЖНО: Замените на ваш GitHub username