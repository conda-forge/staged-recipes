
{% set name = "aspose-cad" %}
{% set version = "26.6.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

build:
  # Отключаем стандартный build, так как всё делаем вручную в outputs
  script: echo "Dummy package"
  number: 0
  skip: true  # [py2k]

# Секция source оставлена пустой для прохождения валидации,
# но фактически ссылка на pypi нужна только для метаданных версии
source:
  url: https://pypi.org/packages/source/a/aspose-cad/aspose_cad-{{ version }}.tar.gz
  sha256: 8ff3ed303e09eba0ded4b78cfd7d3c6087ff6a015b2e5c4fefda15fd5ce06c1b

requirements:
  host:
    - python
    - pip
    - python_abi
    # Зависимости хоста нужны для корректной работы самого conda при установке whl
    - libglib >=2.17              # [not win]
    - libcxx                      # [osx]
    - vc                          # [win]
  run:
    - python
    - python_abi
    - libglib >=2.17              # [not win]
    - libcxx                      # [osx]
    - vc                          # [win]

test:
  commands:
    - python -c "import aspose; print(aspose.__version__)"
    - python -c "import aspose.cad; print('Import OK')"
  requires:
    - pip

##############################################
####   ВЫХОДНОЙ ПАКЕТ (ОСНОВНАЯ ЛОГИКА)   ####
##############################################
outputs:
  - name: aspose-cad
    version: {{ version }}
    
    build:
      # Скрипт выполняется ПОСЛЕ скачивания файла из 'url' ниже
      script: |
        # Скачиваем нужный wheel файл динамически 
        {% if win %}
          curl -L -o dist_pkg.whl https://files.pythonhosted.org/packages/b4/53/67ef7ac1d6a349319e282dfc23939c19656a0b68e382faf203b13a267ad3/aspose_cad-26.6-py3-none-win_amd64.whl
        {% elif osx %}
          curl -L -o dist_pkg.whl https://files.pythonhosted.org/packages/fc/ad/79f8a37bfaf84183eec24ae400f104e0e8b12d831042dda743e91166d752/aspose_cad-26.6.0-py3-none-macosx_11_0_arm64.whl
        {% else %}
          # Linux manylinux
          curl -L -o dist_pkg.whl https://files.pythonhosted.org/packages/cf/7f/ed9b1cb3c1a258838ca36dcf782ecf91ac21f010bc6effc0882f87b4388b/aspose_cad-26.6.0-py3-none-manylinux1_x86_64.whl
        {% endif %}
        
        # Устанавливаем скачанный файл
        {{ PYTHON }} -m pip install --no-deps --ignore-installed --no-index ./dist_pkg.whl
        
    requirements:
      run:
        - python
        - python_abi
        - libglib >=2.17              # [not win]
        - libcxx                      # [osx]
        - vc                          # [win]
        
about:
  home: https://products.aspose.com/cad/python
  summary: Aspose.CAD for Python is a CAD and BIM drawings Processing library that allows developers to modify, convert and publish various drawing and image formats without need to have any other CAD software.
  license: proprietary
  license_file: LICENSE.txt

extra:
  recipe-maintainers:
    - alexefaspose  # <-- ВАЖНО: замените на ваш GitHub username

