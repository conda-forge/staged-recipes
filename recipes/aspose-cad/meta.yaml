{% set name = "aspose-cad" %}
{% set version = "26.6.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  {% if target_platform == "linux-64" %}
  - url: https://files.pythonhosted.org/packages/{{ name[0] }}/{{ name }}/aspose_cad-{{ version }}-py3-none-manylinux1_x86_64.whl
    sha256: 295ea148d50567316f1331a905696c030c510d0a03c2df399d6068f73053d67d
  {% elif target_platform == "win-64" %}
  - url: https://files.pythonhosted.org/packages/{{ name[0] }}/{{ name }}/aspose_cad-{{ version }}-py3-none-win_amd64.whl
    sha256: 516720c81a11be3dc22f841443e806572bce4ef8051ccd137cccf016f2be3689
  {% elif target_platform == "osx-arm64" %}
  - url: https://files.pythonhosted.org/packages/{{ name[0] }}/{{ name }}/aspose_cad-{{ version }}-py3-none-macosx_11_0_arm64.whl
    sha256: b5bb25a03831aef984b16c4d78891795e511055be00828605280cf4c125204ed
  {% endif %}

build:
  script: |
    echo "Placeholder for Aspose.CAD documentation" > README.in
    {{ PYTHON }} -m pip install {{ SRC_DIST }} --no-index --find-links . --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python >=3.9,<3.13
    - pip
    - setuptools
    - python-wheel
  run:
    - python >=3.9,<3.13

test:
  imports:
    - aspose
    - aspose.cad
  commands:
    - pip check
  requires:
    - pip
  test_commands:
    - URL={{ TEST_WHL_URL }}
    - echo "Downloading test artifact from $URL"
    - curl -L -o test_artifact.whl "$URL"
    - echo "{{ TEST_WHL_SHA256 }}  test_artifact.whl" | sha256sum --check -
  test_requires:
    - curl
  test_variables:
    TEST_WHL_URL: >-
      {%- if linux -%}
      https://files.pythonhosted.org/packages/{{ name[0] }}/{{ name }}/aspose_cad-{{ version }}-py3-none-manylinux1_x86_64.whl
      {%- elif win -%}
      https://files.pythonhosted.org/packages/{{ name[0] }}/{{ name }}/aspose_cad-{{ version }}-py3-none-win_amd64.whl
      {%- elif osx and arm64 -%}
      https://files.pythonhosted.org/packages/{{ name[0] }}/{{ name }}/aspose_cad-{{ version }}-py3-none-macosx_11_0_arm64.whl
      {%- else -%}
      https://files.pythonhosted.org/packages/{{ name[0] }}/{{ name }}/aspose_cad-{{ version }}-py3-none-manylinux1_x86_64.whl
      {%- endif -%}
    TEST_WHL_SHA256: >-
      {%- if linux -%}
      295ea148d50567316f1331a905696c030c510d0a03c2df399d6068f73053d67d
      {%- elif win -%}
      516720c81a11be3dc22f841443e806572bce4ef8051ccd137cccf016f2be3689
      {%- elif osx and arm64 -%}
      b5bb25a03831aef984b16c4d78891795e511055be00828605280cf4c125204ed
      {%- else -%}
      295ea148d50567316f1331a905696c030c510d0a03c2df399d6068f73053d67d
      {%- endif -%}

about:
  home: https://products.aspose.com/cad/python
  summary: Aspose.CAD for Python is a CAD and BIM drawings Processing library that allows developers to modify, convert and publish various drawing and image formats without need to have any other CAD software.
  license: Proprietary
  license_file: License.txt

extra:
  recipe-maintainers:
    - alexefaspose
