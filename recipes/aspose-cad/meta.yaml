{% set name = "aspose-cad" %}
{% set version = "26.6.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/aspose_cad-{{ version }}.tar.gz
  sha256: 8ff3ed303e09eba0ded4b78cfd7d3c6087ff6a015b2e5c4fefda15fd5ce06c1b

build:
  noarch: python
  script: |
    echo "Placeholder for Aspose.CAD documentation" > README.in
    {{ PYTHON }} -m pip install . --only-binary :all: -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python >=3.5,<3.14
    - pip
    - setuptools
  run:
    - python >=3.5,<3.14
    - libglib >=2.17      
    - libcxx             
    - msvc_runtime       

test:
  imports:
    - aspose
    - build
    - dist
  commands:
    - pip check
  requires:
    - pip

about:
  home: https://products.aspose.com/cad/python
  summary: Aspose.CAD for Python is a CAD and BIM drawings Processing library that allows developers to modify, convert and publish various drawing and image formats without need to have any other CAD software.
  license: IT-WAS-NOT-POSSIBLE-TO-RECOVER-LICENCE
  license_file: PLEASE_ADD_LICENSE_FILE

extra:
  recipe-maintainers:
    - alexefaspose
