{% set name = "aspose-cad" %}
{% set version = "26.6.0" %}
{% set versionwin = "26.6" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  {% if target_platform == "linux-64" %}
  - url: https://pypi.org/packages/cf/7f/ed9b1cb3c1a258838ca36dcf782ecf91ac21f010bc6effc0882f87b4388b/aspose_cad-{{ version }}-py3-none-manylinux1_x86_64.whl
    sha256: 295ea148d50567316f1331a905696c030c510d0a03c2df399d6068f73053d67d
  {% elif target_platform == "win-64" %}
  - url: https://pypi.org/packages/b4/53/67ef7ac1d6a349319e282dfc23939c19656a0b68e382faf203b13a267ad3/aspose_cad-{{ versionwin }}-py3-none-win_amd64.whl
    sha256: 516720c81a11be3dc22f841443e806572bce4ef8051ccd137cccf016f2be3689
  {% elif target_platform == "osx-arm64" %}
  - url: https://pypi.org/packages/fc/ad/79f8a37bfaf84183eec24ae400f104e0e8b12d831042dda743e91166d752/aspose_cad-{{ version }}-py3-none-macosx_11_0_arm64.whl
    sha256: b5bb25a03831aef984b16c4d78891795e511055be00828605280cf4c125204ed
  {% endif %}

build:
  script: |
    echo "Placeholder for Aspose.CAD documentation" > README.in
    {% if target_platform == "linux-64" %}
    {{ PYTHON }} -m pip install aspose_cad-{{ version }}-py3-none-manylinux1_x86_64.whl --no-index --find-links . --no-deps --no-build-isolation --force-reinstall
    {% elif target_platform == "win-64" %}
    {{ PYTHON }} -m pip install aspose_cad-{{ versionwin }}-py3-none-win_amd64.whl --no-index --find-links . --no-deps --no-build-isolation --force-reinstall
    {% elif target_platform == "osx-arm64" %}
    {{ PYTHON }} -m pip install aspose_cad-{{ version }}-py3-none-macosx_11_0_arm64.whl --no-index --find-links . --no-deps --no-build-isolation --force-reinstall
    {% endif %}
  number: 0
  missing_dso_allowlist:
    - "*/libc.so.6"
    - "*/libdl.so.2"
    - "*/libm.so.6"
    - "*/libpthread.so.0"
    - "*/librt.so.1"
    - "*/libz.so.1"
    - "*/libstdc++.so.6"
    - "*/libgcc_s.so.1"

requirements:
  host:
    - python >=3.9,<3.13
    - pip
    - setuptools
  run:
    - python >=3.9,<3.13
    - libgcc >=15.2.0  # [linux]
    - libstdcxx-ng >=15.2.0  # [linux]
    - zlib >=1.3.2  # [linux]

test:
  imports:
    - aspose
    - aspose.cad
  commands:
    - pip check

about:
  home: https://products.aspose.com/cad/python
  summary: Aspose.CAD for Python is a CAD and BIM drawings Processing library that allows developers to modify, convert and publish various drawing and image formats without need to have any other CAD software.
  license: Proprietary
  license_file: License.txt

extra:
  recipe-maintainers:
    - alexefaspose
