{% set name = "aspose-cad" %}
{% set version = "26.6.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  {% if target_platform == "linux-64" %}
  - url: https://drive.google.com/file/d/1s2fgzvdnLI2Hqu3wq1bpNH-PfqTZj4ps/view?usp=drive_link
    sha256: a10fef39592cadaa0ef545103f4acdc54765ebff59297e96c40a81b821c37baf
    fn: aspose_cad-{{ version }}-linux.tar.gz
  {% elif target_platform == "win-64" %}
  - url: https://disk.yandex.ru/d/ITE4lu_A5ffOUw
    sha256: 4c19e06e4eb18e8d778594f70bd02a5ae7470f4e82c04de8ac1c27d372821c1e
    fn: aspose_cad-{{ version }}-windows.tar.gz
  {% elif target_platform == "osx-arm64" %}
  - url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/aspose_cad-{{ version }}.tar.gz
    sha256: 8ff3ed303e09eba0ded4b78cfd7d3c6087ff6a015b2e5c4fefda15fd5ce06c1b
    fn: aspose_cad-{{ version }}-macosx-arm64.tar.gz
  {% endif %}

build:
  script: |
    echo "Placeholder for Aspose.CAD documentation" > README.in
    {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python >=3.9,<3.13
    - pip
    - setuptools
  run:
    - python >=3.9,<3.13

test:
  imports:
    - aspose
    - aspose.cad
  commands:
    - pip check
  requires:
    - pip

about:
  home: https://products.aspose.com/cad/python
  summary: Aspose.CAD for Python is a CAD and BIM drawings Processing library that allows developers to modify, convert and publish various drawing and image formats without need to have any other CAD software.
  license: Proprietary
  license_file: License.txt

extra:
  recipe-maintainers:
    - alexefaspose
