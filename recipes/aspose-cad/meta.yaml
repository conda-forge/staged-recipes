{% set name = "aspose-cad" %}
{% set version = "26.6.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/a/aspose-cad/aspose_cad-{{version}}.tar.gz
  sha256: 8ff3ed303e09eba0ded4b78cfd7d3c6087ff6a015b2e5c4fefda15fd5ce06c1b

build:
  number: 0
  script:
    - echo "Placeholder for Aspose.CAD documentation" > README.in
    - export _CE_M=1
    - {{ PYTHON }} -m pip install . --no-deps --ignore-installed -vv
  skip: false

requirements:
  host:
    - python
    - pip
    - setuptools
    - python_abi
    - libglib >=2.17              # [not win]
    - libcxx                      # [osx]
    - vc                          # [win]  
    
  run:
    - python
    - libglib >=2.17              # [not win]
    - libcxx                      # [osx]
    - vc                          # [win]  
    - python_abi

test:
  imports:
    - aspose
    - aspose.cad
  commands:
    - pip check
    - python -c "import aspose; print(aspose.__version__)"
  requires:
    - pip

about:
  home: https://products.aspose.com/cad/python
  summary: Aspose.CAD for Python is a CAD and BIM drawings Processing library that allows developers to modify, convert and publish various drawing and image formats without need to have any other CAD software.
  license: proprietary                  
  license_file: License.txt

extra:
  recipe-maintainers:
    - alexefaspose