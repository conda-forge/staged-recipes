context:
  name: Exporter-Lite
  version: "0.09"

package:
  name: perl-exporter-lite
  version: ${{ version }}

source:
  - url: https://cpan.metacpan.org/authors/id/N/NE/NEILB/${{ name }}-${{ version }}.tar.gz
    sha256: "79d8b14fd5013922c63e850f15bf51059f2502404535eb6690ef23612c2a198d"
  - url: https://raw.githubusercontent.com/Perl/perl5/v5.32.1/Copying
    sha256: "d77d235e41d54594865151f4751e835c5a82322b0e87ace266567c3391a4b912"
  - url: https://raw.githubusercontent.com/Perl/perl5/v5.32.1/Artistic
    sha256: "dd90d4f42e4dcadf5a7c09eea0189d93c7b37ae560c91f0f6d5233ed3b9292a2"

build:
  number: 0
  skip:
    - win
  script:
    - perl Makefile.PL INSTALLDIRS=vendor NO_PERLLOCAL=1 NO_PACKLIST=1
    - make -j${CPU_COUNT}
    - make test
    - make install VERBINST=1

requirements:
  build:
    - make
  host:
    - perl
    - perl-extutils-makemaker

tests:
  - perl:
      uses:
        - Exporter::Lite

about:
  homepage: https://metacpan.org/pod/Exporter::Lite
  summary: Lightweight exporting of functions and variables
  license: Artistic-1.0-Perl OR GPL-1.0-or-later
  license_file:
    - Artistic
    - Copying

extra:
  recipe-maintainers:
    - user202729
