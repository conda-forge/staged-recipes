schema_version: 1

context:
  name: usd
  version: 25.02

package:
  name: ${{ name }}
  version: ${{ version }}

source:
  - url: https://github.com/PixarAnimationStudios/OpenUSD/archive/refs/tags/v${{ version }}.tar.gz
    sha256: 2979c0f09b766fd6470bdf06c8500c90ed51327aae1c22af132641a44178b722

build:
  number: 0

requirements:
  build:
    - ${{ compiler('c') }}
    - ${{ stdlib('c') }}
    - ${{ compiler('cxx') }}
    - ninja
    - cmake
  host:
    - if: linux
      then:
        - libgl-devel
        - libglx-devel
        - xorg-libxrandr
    - glfw
    - tbb-devel
    - libboost-devel
    - libboost-python-devel
    - libopensubdiv 
    - python
    - jinja2
    - pyside6
    - pyopengl
  run_exports:
    - ${{ pin_subpackage(name, upper_bound='x.x') }}

tests:
  - package_contents:
      include:
        - pxr/pxr.h
      lib:
        - usd_ms
  - requirements:
      run:
        - cmake-package-check
        - ${{ compiler('c') }}
        - ${{ compiler('cxx') }}
    script:
      - cmake-package-check pxr
  - python:
      imports:
        - pxr
        - pxr.Usd
        - pxr.UsdGeom

about:
  license: Apache-2.0
  license_file: LICENSE.txt
  summary: Library to read and write Universal Scene Description (USD) files.
  homepage: https://github.com/PixarAnimationStudios/OpenUSD

extra:
  recipe-maintainers:
    - traversaro
