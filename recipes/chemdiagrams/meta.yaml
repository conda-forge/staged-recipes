{% set name = "chemdiagrams" %}
{% set version = "0.3.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz
  sha256: 0af8d811bf405fa0c3109d58cf36657c91ebae566e5fb9886e6c2571f6c5732d

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - setuptools >=68
    - wheel
    - pip
  run:
    - python >={{ python_min }}
    - matplotlib-base >=3.7
    - numpy >=1.23
    - scipy >=1.10

test:
  imports:
    - chemdiagrams
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  summary: Publication-quality reaction energy diagrams for computational chemistry
  home: https://github.com/Tonner-Zech-Group/chem-diagrams
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - jan-janssen
