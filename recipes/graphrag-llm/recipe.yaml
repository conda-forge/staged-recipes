schema_version: 1

context:
  version: "3.1.1"
  python_min: "3.11"

package:
  name: graphrag-llm
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/g/graphrag-llm/graphrag_llm-${{ version }}.tar.gz
  sha256: 205ae724a3c0d4c11a0b7ee16ed33b27cf72774aacbe2c971cf06c7c189a7fe6

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - hatchling >=1.27.0,<2.0.0
    - pip
  run:
    - python >=${{ python_min }},<3.14
    - azure-identity >=1.25,<2.dev0
    - fastapi >=0.136.3,<1.0
    - graphrag-cache ==3.1.1
    - graphrag-common ==3.1.1
    - jinja2 >=3.1,<4.dev0
    - litellm ==1.92.0
    - nest-asyncio2 >=1.7,<2.dev0
    - orjson >=3.11.6,<4.0
    - pydantic >=2.10,<3.dev0
    - typing_extensions >=4.12,<5.dev0

tests:
  - python:
      imports:
        - graphrag_llm
      pip_check: true
      python_version: 
        - ${{ python_min }}.*
        - "*"

about:
  summary: GraphRAG LLM package.
  license: MIT
  license_file: LICENSE
  homepage: https://pypi.org/project/graphrag-llm/
  repository: https://github.com/microsoft/graphrag

extra:
  recipe-maintainers:
    - jan-janssen
