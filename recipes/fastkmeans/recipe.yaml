context:
  version: "0.5.0"
  python_min: "3.10"

package:
  name: fastkmeans
  version: ${{ version }}

source:
  url: https://files.pythonhosted.org/packages/source/f/fastkmeans/fastkmeans-${{ version }}.tar.gz
  sha256: 64196ba228bfa02a98358ee4d30e5af33ddf1aa44cd72e93428916d0e5d2167f

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - setuptools
  run:
    - python >=${{ python_min }}
    - numpy
    - pytorch

tests:
  - python:
      imports:
        - fastkmeans
      pip_check: true
      python_version: ${{ python_min }}.*
  - script: python -c "import numpy as np; from fastkmeans import FastKMeans; x = np.random.rand(32, 8).astype('float32'); km = FastKMeans(d=8, k=4, niter=2, gpu=False, verbose=False); km.train(x); assert km.centroids.shape == (4, 8)"

about:
  homepage: https://github.com/AnswerDotAI/fastkmeans
  summary: Fast and efficient k-means implementation for PyTorch
  repository: https://github.com/AnswerDotAI/fastkmeans
  license: Apache-2.0
  license_file: LICENSE

extra:
  recipe-maintainers:
    - moritzwilksch
