{% set version = '2.1.3' %}
{% set posix = 'm2-' if win else '' %}

package:
  name: r-fclust
  version: "{{ version|replace('-', '_') }}"

source:
  url:
    - {{ cran_mirror }}/src/contrib/fclust_{{ version }}.tar.gz
    - {{ cran_mirror }}/src/contrib/Archive/fclust/fclust_{{ version }}.tar.gz
  sha256: d19bd58ff140015b9cfcb76b4d4c582a21ed955480ffd46a392f8286be55166e

build:
  number: 0
  rpaths:
    - lib/R/lib/
    - lib/
  missing_dso_whitelist:
    - '*/R.dll'        # [win]
    - '*/Rblas.dll'    # [win]
    - '*/Rlapack.dll'  # [win]

requirements:
  build:
    - {{ compiler('c') }}              # [not win]
    - {{ stdlib("c") }}                # [not win]
    - {{ compiler('m2w64_c') }}        # [win]
    - {{ compiler('cxx') }}            # [not win]
    - {{ compiler('m2w64_cxx') }}      # [win]
    - {{ posix }}filesystem        # [win]
    - {{ posix }}make
    - {{ posix }}sed               # [win]
    - {{ posix }}coreutils         # [win]
    - {{ posix }}zip               # [win]
    - cross-r-base {{ r_base }}    # [build_platform != target_platform]
  host:
    - libblas
    - liblapack
    - r-base
    - r-mass >=7.3_65
    - r-rcpp >=1.1.0
    - r-rcpparmadillo >=15.0.2_2
  run:
    - r-base
    - r-mass >=7.3_65
    - r-rcpp >=1.1.0
    - r-rcpparmadillo >=15.0.2_2

test:
  commands:
    - $R -e "library('fclust')"           # [not win]
    - "\"%R%\" -e \"library('fclust')\""  # [win]

about:
  home: https://CRAN.R-project.org/package=fclust
  license: GPL-2.0-only
  summary: Algorithms for fuzzy clustering, cluster validity indices and plots for cluster validity
    and visualizing fuzzy clustering results.
  license_family: GPL2
  license_file:
    - '{{ environ["PREFIX"] }}/lib/R/share/licenses/GPL-2'

extra:
  recipe-maintainers:
    - conda-forge/r

