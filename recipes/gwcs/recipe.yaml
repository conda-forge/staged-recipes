schema_version: 1

context:
  python_min: "3.11"
  version: "1.0.3"

package:
  name: gwcs
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/g/gwcs/gwcs-${{ version }}.tar.gz
  sha256: c7cc83b0a2faf4433d94a047065e1686ba0e94b736c6453083a82d5111fc114a

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - setuptools >=61.2
    - setuptools-scm >=3.4
    - pip
  run:
    - python >=${{ python_min }}
    - asdf >=3.3.0
    - astropy >=6.0
    - numpy >=1.25
    - scipy >=1.14.1
    - asdf-wcs-schemas >=0.5.0
    - asdf-astropy >=0.8.0

tests:
  - python:
      imports:
        - gwcs
      pip_check: true
      python_version: ${{ python_min }}.*

about:
  summary: Generalized World Coordinate System
  license: BSD-3-Clause
  license_file: licenses/LICENSE.rst
  homepage: https://github.com/spacetelescope/gwcs
  documentation: https://gwcs.readthedocs.io/en/stable/

extra:
  recipe-maintainers:
    - bmorris3 
