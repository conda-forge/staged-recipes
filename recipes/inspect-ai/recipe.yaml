schema_version: 1

context:
  version: "0.3.240"
  python_min: "3.14"

package:
  name: inspect-ai
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/i/inspect-ai/inspect_ai-${{ version }}.tar.gz
  sha256: 8a0bb8ba1fd73a86b106eed7ea9c32eecb9a856f9ae2dcd08d94385801a5bcb3

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  python:
    entry_points:
      - inspect = inspect_ai._cli.main:main

requirements:
  host:
    - python ${{ python_min }}.*
    - setuptools >=64
    - setuptools-scm >=8
    - pip
  run:
    - python >=${{ python_min }}
    - agent-client-protocol >=0.10.1
    - aioboto3 >=13.0.0
    - anyio >=4.8.0
    - beautifulsoup4 >=4.10.0
    - boto3
    - click !=8.2.0,<8.2.2,>=8.1.3
    - debugpy
    - docstring_parser >=0.16
    - fastapi >=0.119.0
    - fsspec <=2025.9.0,>=2023.1.0
    - httpx
    - ijson >=3.2.0
    - jsonlines >=3.0.0
    - jsonpatch >=1.32
    - jsonpath-ng >=1.8.0
    - jsonref >=1.1.0
    - jsonschema >3.1.1
    - mmh3 >3.1.0
    - nest-asyncio2 >=1.7.2
    - numpy
    - platformdirs >=2.3.0
    - psutil
    - pydantic >=2.13.0
    - python-dotenv >=0.16.0
    - pyyaml
    - rich !=14.0.0,>=13.3.3
    - s3fs >=2023.1.0
    - semver >=3.0.0
    - shortuuid
    - sniffio
    - tenacity
    - textual >=6.2.0
    - tiktoken >=0.12.0
    - typing_extensions >=4.14.0
    - universal_pathlib >=0.2.6
    - uvicorn
    - zipp >=3.19.1
    - zstandard >=0.20.0

tests:
  - python:
      imports:
        - inspect_ai
      pip_check: true
      python_version: ${{ python_min }}.*
  - requirements:
      run:
        - python ${{ python_min }}.*
    script:
      - inspect --help

about:
  summary: Framework for large language model evaluations
  license: MIT
  license_file: LICENSE
  homepage: https://inspect.aisi.org.uk/
  repository: https://github.com/UKGovernmentBEIS/inspect_ai
  documentation: https://inspect.aisi.org.uk/

extra:
  recipe-maintainers:
    - maxvolk
