{% set version = "0.2.2" %}

package:
  name: esmbenchmarkviz
  version: {{ version }}

source:
  url: https://github.com/PCMDI/ESMBenchmarkViz/archive/v{{ version }}.tar.gz
  sha256: 66cc9d90391b39cf0a0e9d289d0fa1dc8ed67a1e0294430cf201919121dcbada

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - setuptools >=69
    - wheel
    - pip
  run:
    - python {{ python_min }},<=3.13
    - matplotlib-base
    - pandas
    - bokeh

test:
  imports:
    - ESMBenchmarkViz
  commands:
    - pip check
  requires:
    - pip
        - python {{ python_min }}

about:
  home: https://github.com/PCMDI/ESMBenchmarkViz
  summary: A Python toolkit for interactive visualizations for Earth System Model evaluation and benchmarking
  license: BSD-3-Clause
  license_file: LICENSE

extra:
  recipe-maintainers:
    - kristinchang3
