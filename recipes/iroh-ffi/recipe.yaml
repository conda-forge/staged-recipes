schema_version: 1

context:
  version: "1.0.0"

package:
  name: iroh
  version: ${{ version }}

source:
  url: https://github.com/n0-computer/iroh-ffi/archive/refs/tags/v${{ version }}.tar.gz
  sha256: 627ffd935e787355ef5620f8d4413120d3f0ed1cba56b8ed8df40362985d5d53

build:
  number: 0
  script:
    env:
      PYTHONIOENCODING: utf-8
    content:
      - ${{ PYTHON }} -m pip install -v --use-pep517 --no-deps --no-build-isolation .
      - cargo-bundle-licenses --format yaml --output THIRDPARTY.yml

requirements:
  build:
    - ${{ compiler('c') }}
    - ${{ compiler('rust') }}
    - ${{ stdlib('c') }}
    - cargo-bundle-licenses
    - uniffi-bindgen
    - if: build_platform != target_platform
      then:
        - python
        - cross-python_${{ target_platform }}
  host:
    - maturin >=1.2,<2.0
    - python
    - pip
  run:
    - python

tests:
  - python:
      imports:
        - iroh
      pip_check: true

about:
  homepage: https://iroh.computer
  summary: Python bindings for iroh, a toolkit for building distributed applications
  description: |
    Python language bindings for Iroh, generated using uniffi-rs.
    Iroh provides a stable 1.0 surface for building distributed applications:
    endpoints, connections, paths, tickets, relays, and services.
  license: Apache-2.0 OR MIT
  license_file:
    - LICENSE-APACHE
    - LICENSE-MIT
    - THIRDPARTY.yml
  documentation: https://docs.rs/iroh
  repository: https://github.com/n0-computer/iroh-ffi

extra:
  recipe-maintainers:
    - MementoRC
