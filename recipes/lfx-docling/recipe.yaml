# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "0.1.1"
  # wheel-only on PyPI; source IS in the langflow monorepo (src/bundles/docling).
  # conda-forge prefers source > wheel. monorepo tag != package version - bump BOTH.
  monorepo_tag: "1.10.0"

package:
  name: lfx-docling
  version: ${{ version }}

source:
  url: https://github.com/langflow-ai/langflow/archive/refs/tags/v${{ monorepo_tag }}.tar.gz
  sha256: 45a317111a5d7cbc2709e683a72a80779801a658f61e506b612978588788ab71

build:
  noarch: python
  number: 0
  script: ${{ PYTHON }} -m pip install ./src/bundles/docling --no-deps --no-build-isolation -vv

requirements:
  host:
    - python ${{ python_min }}.*
    - hatchling
    - pip
  run:
    - python >=${{ python_min }},<3.15
    - docling-core >=2.36.1,<3.0.0
    - httpx >=0.28.1,<1.0.0
    - lfx >=1.10.0,<2.0.0

tests:
  - python:
      imports:
        - lfx_docling
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  homepage: https://github.com/langflow-ai/langflow
  repository: https://github.com/langflow-ai/langflow
  documentation: https://docs.langflow.org/bundles-docling
  license: MIT
  license_file: LICENSE
  summary: Docling document processing components as a standalone Langflow Extension Bundle.

extra:
  recipe-maintainers:
    - rxm7706
