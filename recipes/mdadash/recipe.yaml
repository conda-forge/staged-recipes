schema_version: 1

context:
  python_min: "3.11"
  version: "0.0.2"

package:
  name: mdadash
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/m/mdadash/mdadash-${{ version }}.tar.gz
  sha256: 4d189bbda18276794f475a467635af3c0d28576f57f1bd1cc3fac76f87533035

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  python:
    entry_points:
      - mdadash = mdadash.backend.main:start_server

requirements:
  host:
    - python ${{ python_min }}.*
    - setuptools >=77
    - versioningit
    - pip
  run:
    - python >=${{ python_min }}
    - fastapi >=0.136.3
    - imdclient >=0.2.3
    - ipykernel >=7.2.0
    - mdanalysis >=2.10.0
    - python-socketio >=5.16.2
    - uvicorn >=0.47.0

tests:
  - python:
      imports:
        - mdadash
      pip_check: true
      python_version: ${{ python_min }}.*
  - requirements:
      run:
        - pip
        - python ${{ python_min }}.*
    script:
      - mdadash --help

about:
  summary: Dashboard for tracking and analyzing live MD simulations with streaming.
  license: MIT
  license_file: LICENSE
  homepage: https://pypi.org/project/mdadash/

extra:
  recipe-maintainers:
    - PardhavMaradani
