schema_version: 1

context:
  version: 1.1.4

package:
  name: pydentate
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/p/pydentate/pydentate-${{ version }}.tar.gz
  sha256: ebecb7d4bc6607c31a0b2459139c6136e3388376d1d03da3efd2604872f6ef12

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - setuptools
  run:
    - python >=${{ python_min }},<3.13
    - pandas >=1.5.3
    - numpy >=1.24.1
    - pytorch >=2.1.0
    - rdkit >=2023.3.3
    - tqdm >=4.66.1
    - jupyter >=1.1.1
    - pip >=22.3.1

tests:
  - python:
      imports:
        - pydentate
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  summary: Graph Neural Networks for Predicting Metal-Ligand Coordination in Transition Metal Complexes
  license: MIT
  license_file: LICENSE
  homepage: https://pypi.org/project/pydentate/

extra:
  recipe-maintainers:
    - jan-janssen
