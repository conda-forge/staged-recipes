schema_version: 1

context:
  version: "0.1.2"
  python_min: "3.12"

package:
  name: tau-ai
  version: ${{ version }}

source:
  - url: https://pypi.org/packages/source/t/tau-ai/tau_ai-${{ version }}.tar.gz
    sha256: 62ab741ea2ab10546770e2ebb08dec6c450d779448e2be1631eb8963a7f94cb2

build:
  number: 0
  noarch: python
  script:
    - ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation --disable-pip-version-check

requirements:
  host:
    - pip
    - python ${{ python_min }}.*
    - hatchling >=1.26
  run:
    - python >=${{ python_min }}
    - anyio >=4.0.0
    - httpx >=0.27
    - packaging >=24.0
    - pydantic >=2.0
    - rich >=13.0
    - textual >=1.0
    - typer >=0.12

tests:
  - python:
      imports: tau_agent
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  license: MIT
  license_file: LICENSE
  homepage: https://twotimespi.dev
  repository: https://github.com/huggingface/tau
  summary: A Python implementation of a minimalist Pi-style coding-agent harness.

extra:
  recipe-maintainers:
    - davidbrochart
