schema_version: 1

context:
  version: "0.1.0"
  python_min: "3.14"

package:
  name: tau-ai
  version: ${{ version }}

source:
  - url: https://pypi.org/packages/source/t/tau-ai/tau_ai-${{ version }}.tar.gz
    sha256: 4d4c93c21b2870723c58e5ae9d42fcc8114608233255a68c6cd9715d322fc9d9
    patches:
      - 0001-Add-license-file.patch

build:
  number: 0
  noarch: python
  script:
    - ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation --disable-pip-version-check

requirements:
  host:
    - pip
    - python ${{ python_min }}.*
    - hatchling >=1.26
  run:
    - python >=${{ python_min }}
    - anyio >=4.0.0
    - httpx >=0.27
    - pydantic >=2.0
    - rich >=13.0
    - textual >=1.0
    - typer >=0.12

tests:
  - python:
      imports: tau_agent
      pip_check: true
      python_version: ${{ python_min }}.*

about:
  license: MIT
  license_file: LICENSE
  homepage: https://twotimespi.dev
  repository: https://github.com/alejandro-ao/tau
  summary: A Python implementation of a minimalist Pi-style coding-agent harness.

extra:
  recipe-maintainers:
    - davidbrochart
