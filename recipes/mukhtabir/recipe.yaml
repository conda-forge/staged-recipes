schema_version: 1

context:
  version: "0.1.1"
  python_min: "3.10"

package:
  name: mukhtabir
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/m/mukhtabir/mukhtabir-${{ version }}.tar.gz
  sha256: 201c845ea5149db8319185c76f06caae576c343d4bd0f41e8287c878fffd373e

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - hatchling >=1.27.0
    - pip
  run:
    - python >=${{ python_min }}
    - httpx >=0.27,<1.0

tests:
  - python:
      imports:
        - mukhtabir
      pip_check: true
      python_version: ${{ python_min }}.*

about:
  summary: Typed Python SDK for the Mukhtabir API
  license: MIT
  license_file: LICENSE
  homepage: https://github.com/voramind/mukhtabir-sdk

extra:
  recipe-maintainers:
    - voramind
