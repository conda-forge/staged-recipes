{% set name = "substrait-protobuf" %}
{% set version = "0.85.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/substrait_protobuf-{{ version }}.tar.gz
  sha256: e7776181dcb18703a6e27b0291de86c8034a02b5d92e1fc2fc919ced62757570

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - pip
    - setuptools >=80
  run:
    - python >={{ python_min }}
    - protobuf >=5,<7

test:
  imports:
    - substrait.plan_pb2
  commands:
    - pip check
  requires:
    - python {{ python_min }}
    - pip

about:
  home: https://substrait.io
  summary: Generated Substrait Protocol Buffer Code
  license: Apache-2.0
  license_file: LICENSE
  dev_url: https://github.com/substrait-io/substrait-packaging

extra:
  recipe-maintainers:
    - nielspardon
