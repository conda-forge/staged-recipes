schema_version: 1

context:
  python_min: "3.11"
  version: "0.0.4"

package:
  name: rebinpy
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/r/rebinpy/rebinpy-${{ version }}.tar.gz
  sha256: acdd68e6dac89197bd15d9c4087f826f9f4b5a9a5c52e9989bdb816f74ddd132

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - setuptools
    - setuptools-scm
    - wheel
    - pip
  run:
    - python >=${{ python_min }}
    - numpy
    - xarray

tests:
  - python:
      imports:
        - rebinpy
      pip_check: true
      python_version: 
        - ${{ python_min }}.*
        - "*"

about:
  summary: Package for refining and integrating binned data correctly
  license: MIT
  license_file: LICENSE
  homepage: https://pypi.org/project/rebinpy/

extra:
  recipe-maintainers:
    - esheder
