{% set name = "tdlpackio" %}
{% set version = "2.0.0b1" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://github.com/NOAA-MDL/tdlpackio/archive/refs/tags/v{{ version }}.tar.gz
  sha256: 6a553216a1eea4a93f986dc6256176acb4a951e51a65c5e266fcb13c0bb6add5

build:
  skip: true  # [win or py<310]
  number: 0
  script: {{ PYTHON }} -m pip install . -vv

requirements:
  build:
    - python                                 # [build_platform != target_platform]
    - cross-python_{{ target_platform }}     # [build_platform != target_platform]
    - cython                                 # [build_platform != target_platform]
    - numpy                                  # [build_platform != target_platform]
    - {{ compiler('c') }}
    - {{ stdlib("c") }}
    - libtdlpack
  host:
    - python
    - cython >=0.29.16
    - setuptools >=61.0
    - numpy
    - pip
    - libtdlpack
  run:
    - python
    - pyproj
    - libtdlpack

test:
  imports:
    - tdlpackio
  commands:
    - pip check
  requires:
    - pip

about:
  home: https://github.com/NOAA-MDL/tdlpackio
  summary: Python interface for reading and writing TDLPACK data.
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - EricEngle-NOAA
