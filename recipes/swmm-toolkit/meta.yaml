{% set name = "swmm-toolkit" %}
{% set version = "0.15.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.io/packages/source/{{ name[0] }}/{{ name }}/swmm-toolkit-{{ version }}.tar.gz
  sha256: 60ec9c1013b35c6c9839a48243c28b7be9e023ecd9d167f467e2073d6413c540

build:
  missing_dso_whitelist:
    - "*/swmm5.dll"  # [win]
    - "*/swmm-output.dll"  # [win]
  
  ignore_run_exports_from:
    - {{ compiler('c') }}
    - {{ compiler('cxx') }}

  script: 
    - set SWMM_CMAKE_ARGS="-GNinja"  # [win]
    - {{ PYTHON }} setup.py build_ext --inplace
    - {{ PYTHON }} -m pip install . -vvv

  number: 0

requirements:
  build: 
    - python  # [build_platform != target_platform]
    - cross-python_{{ target_platform }}  # [build_platform != target_platform]
    - {{ compiler('c') }}
    - {{ compiler('cxx') }}
    - cmake
    - make  # [linux]
    - ninja  # [not linux]
    - swig =4.0.2
   
  host: 
    - python
    - pip
    - scikit-build
    - setuptools
    - wheel
    - llvm-openmp =11.1.0  # [osx]
    - libgomp  # [linux]

  run:
    - _openmp_mutex  # [linux]
    - python
    - aenum =3.1.11

test:
  imports:
    - swmm.toolkit.solver
    - swmm.toolkit.output
  commands:
    - pip check
  requires:
    - pip

about:
  home: https://github.com/pyswmm/swmm-python
  summary: SWMM Python Toolkit
  license: CC0-1.0
  license_file:
    - LICENSE.md

extra:
  recipe-maintainers:
    - karosc
