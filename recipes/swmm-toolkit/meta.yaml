{% set name = "swmm-toolkit" %}
{% set version = "0.14.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.io/packages/source/{{ name[0] }}/{{ name }}/swmm-toolkit-{{ version }}.tar.gz
  sha256: 8fbe8146981fdfbd62762d1711287c5cb6304a8e0c8dd36cda43a6c0ec609e4a

build:
  ignore_run_exports_from:
      - {{ compiler('c') }}
      - {{ compiler('cxx') }}
      - llvm-openmp  # [osx]
      - libgomp      # [linux]
  script: 
    - {{ PYTHON }} setup.py build_ext --inplace
    - {{ PYTHON }} -m pip install . -vvv

  number: 0

requirements:
  build: 
    - python                                 # [build_platform != target_platform]
    - cross-python_{{ target_platform }}     # [build_platform != target_platform]
    - {{ compiler('c') }}
    - {{ compiler('cxx') }}
    - cmake
    - make                                   # [not win]
    - ninja                                  # [win]
    - swig =4.0.2
    - llvm-openmp                            # [osx]
    - libgomp                                # [linux]

  host: 
    - python
    - pip
    - scikit-build
    - setuptools
    - wheel

  run:
    - _openmp_mutex                          # [linux]
    - python
    - aenum =3.1.11

test:
  imports:
    - swmm.toolkit.solver
    - swmm.toolkit.output
  commands:
    - pip check
  requires:
    - pip

about:
  home: https://github.com/pyswmm/swmm-python
  summary: SWMM Python Toolkit
  license: CC0-1.0
  license_file:
    - LICENSE.md

extra:
  recipe-maintainers:
    - karosc
