{% set name = "swmm-toolkit" %}
{% set version = "0.14.1" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.io/packages/source/{{ name[0] }}/{{ name }}/swmm-toolkit-{{ version }}.tar.gz
  sha256: aaad984847af00fd0bf930ff85d9a501f0cd14996a2b5e21555ca46beb5ff15a

build:
  ignore_run_exports_from:
      - {{ compiler('c') }}
      - {{ compiler('cxx') }}
      - llvm-openmp  # [osx]
      - libgomp      # [linux]
  script: 
    - set SKBUILD_CONFIGURE_OPTIONS="-GNinja"  # [win]
    - {{ PYTHON }} setup.py build_ext --inplace
    - {{ PYTHON }} -m pip install . -vvv

  number: 0

requirements:
  build: 
    - python  # [build_platform != target_platform]
    - cross-python_{{ target_platform }}  # [build_platform != target_platform]
    - {{ compiler('c') }}
    - {{ compiler('cxx') }}
    - cmake
    - make  # [linux]
    - ninja  # [not linux]
    - swig =4.0.2
    

  host: 
    - python
    - pip
    - scikit-build
    - setuptools
    - wheel
    - llvm-openmp  # [osx]
    - libgomp  # [linux]

  run:
    - _openmp_mutex  # [linux]
    - python
    - aenum =3.1.11

test:
  imports:
    - swmm.toolkit.solver
    - swmm.toolkit.output
  commands:
    - pip check
  requires:
    - pip

about:
  home: https://github.com/pyswmm/swmm-python
  summary: SWMM Python Toolkit
  license: CC0-1.0
  license_file:
    - LICENSE.md

extra:
  recipe-maintainers:
    - karosc
