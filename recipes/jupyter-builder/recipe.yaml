schema_version: 1

context:
  version: "0.0.5"
  python_min: "3.9"

package:
  name: jupyter-builder
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/j/jupyter-builder/jupyter_builder-${{ version }}.tar.gz
  sha256: 59fce848827e9f7dae1a2d67304ad3994c68124bda8b0d892daddf7a6b7b13ca

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  python:
    entry_points:
      - jupyter-builder = jupyter_builder.main:main
      - jlpm = jupyter_builder.jlpm:main

requirements:
  host:
    - python ${{ python_min }}.*
    - hatchling >=1.21.1
    - hatch-nodejs-version >=0.3.2
    - pip
  run:
    - python >=${{ python_min }}
    - traitlets
    - requests
    - jupyter_core

tests:
  - python:
      imports:
        - jupyter_builder
      pip_check: true
      python_version: ${{ python_min }}.*
  - requirements:
      run:
        - pip
        - python ${{ python_min }}.*
    script:
      - jupyter-builder --help
      - jlpm --help

about:
  summary: JupyterLab build tools
  license: BSD-3-Clause
  license_file: LICENSE
  homepage: https://jupyter.org
  repository: https://github.com/jupyterlab/jupyter-builder

extra:
  recipe-maintainers:
    - darshan808
    - krassowski
