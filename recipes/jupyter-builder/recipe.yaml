# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "0.0.8"
  nodejs_min: "22"
  python_check_max: "3.14"

package:
  name: jupyter-builder
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/j/jupyter-builder/jupyter_builder-${{ version }}.tar.gz
  sha256: 0192128efc379fc34a9a3de3de7118759aca6f6571a58556c1fa1518d1db2917

build:
  number: 0
  noarch: python
  script:
    - ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation --disable-pip-version-check
  python:
    entry_points:
      - jupyter-builder = jupyter_builder.main:main
      - jlpm = jupyter_builder.jlpm:main

requirements:
  host:
    - hatch-nodejs-version >=0.3.2
    - hatchling >=1.21.1
    - pip
    - python ${{ python_min }}.*
  run:
    - jupyter_core
    - nodejs >=${{ nodejs_min }}
    - python >=${{ python_min }}
    - requests
    - tomli
    - traitlets

tests:
  - python:
      imports: jupyter_builder
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - ${{ python_check_max }}.*
  - requirements:
      run:
        - nodejs ${{ nodejs_min }}.*
    script:
      - jupyter-builder --help
      - jlpm --help

about:
  summary: JupyterLab build tools
  license: BSD-3-Clause AND MIT AND ISC
  license_file:
    - LICENSE
    - THIRD_PARTY_LICENSES/
  homepage: https://pypi.org/project/jupyter-builder
  repository: https://github.com/jupyterlab/jupyter-builder

extra:
  recipe-maintainers:
    - darshan808
    - krassowski
    - bollwyvl
