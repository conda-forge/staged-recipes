{% set name = "financial-ratios" %}
{% set version = "1.0.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name.replace('-','_') }}-{{ version }}.tar.gz
  # Update sha256 after first PyPI publish:
  #   curl -s https://pypi.org/pypi/financial-ratios/1.0.0/json | python3 -c "import sys,json; d=json.load(sys.stdin); [print(f['digests']['sha256']) for f in d['urls'] if f['packagetype']=='sdist']"
  sha256: 1b40b1ee40816011d80657bca7fbd176f745e9c71d638cfce06053625923d396

build:
  noarch: python
  number: 0
  script: {{ PYTHON }} -m pip install . --no-deps --no-build-isolation -vv
  entry_points:
    - fin-ratios = fin_ratios.cli:main

requirements:
  host:
    - python >=3.9
    - pip
    - hatchling
  run:
    - python >=3.9

test:
  imports:
    - fin_ratios
  commands:
    - fin-ratios --help
  requires:
    - pip
  commands:
    - pip check

about:
  home: https://piyushgupta344.github.io/fin-ratios/
  summary: "The most comprehensive financial ratios library. 136+ ratios, 10 institutional-grade scoring models."
  description: |
    fin-ratios is a zero-dependency library that computes financial ratios and
    institutional-grade scoring models from raw financial statement data. It ships
    identical APIs for both TypeScript and Python.
  license: MIT
  license_file: ../LICENSE
  doc_url: https://piyushgupta344.github.io/fin-ratios/
  dev_url: https://github.com/piyushgupta344/fin-ratios

extra:
  recipe-maintainers:
    - piyushgupta344
