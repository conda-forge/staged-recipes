{% set name = "financial-ratios" %}
{% set version = "1.0.2" %}
{% set python_min = "3.9" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name.replace('-','_') }}-{{ version }}.tar.gz
  sha256: 2ca92abf0d65987bac7d6b4905932f81be3ac46c6578335e7391e9da28b6a4eb

build:
  noarch: python
  number: 0
  script: {{ PYTHON }} -m pip install . --no-deps --no-build-isolation -vv
  entry_points:
    - fin-ratios = fin_ratios.cli:main

requirements:
  host:
    - python {{ python_min }}
    - pip
    - hatchling
  run:
    - python >={{ python_min }}

test:
  imports:
    - fin_ratios
  requires:
    - pip
    - python {{ python_min }}
  commands:
    - fin-ratios --help
    - pip check

about:
  home: https://piyushgupta344.github.io/fin-ratios/
  summary: "The most comprehensive financial ratios library. 136+ ratios, 10 institutional-grade scoring models."
  description: |
    fin-ratios is a zero-dependency library that computes financial ratios and
    institutional-grade scoring models from raw financial statement data. It ships
    identical APIs for both TypeScript and Python.
  license: MIT
  license_file: LICENSE
  doc_url: https://piyushgupta344.github.io/fin-ratios/
  dev_url: https://github.com/piyushgupta344/fin-ratios

extra:
  recipe-maintainers:
    - piyushgupta344
