schema_version: 1

context:
  version: "0.5.2"

package:
  name: coherent.licensed
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/c/coherent.licensed/coherent_licensed-${{ version }}.tar.gz
  sha256: d8071403ce742d3ac3592ddc4fb7057a46caffb415b928b4d52802e5f208416d

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - flit-core >=3.11,<4
    - pip
  run:
    - python >=${{ python_min }}

tests:
  - python:
      imports:
        - coherent.licensed
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  summary: License management tooling for Coherent System and skeleton projects
  license: MIT
  license_file: LICENSE
  homepage: https://github.com/coherent-oss/coherent.licensed

extra:
  recipe-maintainers:
    - thewchan
