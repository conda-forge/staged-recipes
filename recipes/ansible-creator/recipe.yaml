schema_version: 1

context:
  version: "26.4.3"

package:
  name: ansible-creator
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/a/ansible-creator/ansible_creator-${{ version }}.tar.gz
  sha256: db8a33fa765f5a3cb4f17ac6856a2e9e93b2434a7ecf5cbbdd495d96b0ec71d1

build:
  noarch: python
  number: 0
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  python:
    entry_points:
      - ansible-creator = ansible_creator.cli:main

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - setuptools_scm >=7.0.5
    - setuptools >=65.3.0
  run:
    - python >=${{ python_min }}
    - importlib_resources
    - jinja2 >=3.1.2
    - pyyaml >=6.0.1

tests:
  - python:
      imports:
        - ansible_creator
      python_version: ${{ python_min }}.*
      pip_check: true

about:
  summary: |
    A CLI tool for scaffolding Ansible Content.
  homepage: https://pypi.org/project/ansible-creator/
  repository: https://pypi.org/project/ansible-creator/
  license: Apache-2.0
  license_file: LICENSE

extra:
  recipe-maintainers:
    - killua156
    - mgorny
