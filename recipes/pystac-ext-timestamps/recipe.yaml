schema_version: 1

context:
  version: "1.1.0"

package:
  name: pystac-ext-timestamps
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/p/pystac-ext-timestamps/pystac_ext_timestamps-${{ version }}.tar.gz
  sha256: d78250e3ddc61b825348444ad05c8cff8c2aa1cd3d18155b880783ee880520d3

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - hatchling
    - pip
  run:
    - python >=${{ python_min }}
    - pystac-core

tests:
  - python:
      imports:
        - pystac_ext_timestamps
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  summary: Timestamps extension for PySTAC
  license: Apache-2.0
  license_file: LICENSE
  homepage: https://pypi.org/project/pystac-ext-timestamps/
  documentation: https://pystac.readthedocs.io

extra:
  recipe-maintainers:
    - ocefpaf
