{% set name = "metatomic-torch" %}
{% set version = "0.1.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  # pretend to use the same source as the Python package, so we can keep the same
  # version number up to date automatically with the help of the conda-forge bot
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/metatomic_torch-{{ version }}.tar.gz
  sha256: 7a8a72030361d854e934e9022499c30c457b91df9f3e4e82da842d5a37a913c4

build:
  number: 0
  noarch: generic

requirements:
  run:
    - libmetatomic-torch
    - python-metatomic-torch

test:
  commands:
    # check if libmetatomic_torch files exists
    - test -f $PREFIX/lib/libmetatomic_torch$SHLIB_EXT  # [unix]
    - if not exist %PREFIX%\\Library\\bin\\metatomic_torch.dll exit 1  # [win]

about:
  home: https://github.com/metatensor/metatomic
  summary: Atomistic machine learning models you can use everywhere for everything
  license: BSD-3-Clause
  license_family: BSD
  license_file:
    - LICENSE
  doc_url: https://docs.metatensor.org/metatomic

extra:
  recipe-maintainers:
    - Luthaf
    - PicoCentauri
    - Haozeke
