{% set version = "5.3.0" %}

package:
  name: pygenn-suite
  version: {{ version }}

source:
  url: https://github.com/genn-team/genn/archive/refs/tags/5.3.0_RC1.tar.gz
  sha256: f1a6807d15f99d91732cd2484727100e54c39b055bcbe2126e7792d07c776fe3

build:
  number: 0

outputs:
  # --------------------------------------------------------------------------
  # CPU-only output
  # conda install pygenn          → picks this on CPU-only machines
  # conda install "pygenn=*=cpu*" → forces CPU variant explicitly
  # --------------------------------------------------------------------------
  - name: pygenn-cpu
    build:
      number: 0
      string: "cpu_py{{ PY_VER | replace('.', '') }}_{{ PKG_BUILDNUM }}"
      skip: true  # [osx or py>311]
      missing_dso_whitelist:
        - $RPATH/genn_Release_DLL.dll                     # Private GeNN core DLL (shipped with package_data)
        - $RPATH/libffi_Release_DLL.dll                   # Private libffi DLL (shipped with package_data)
        - $RPATH/genn_single_threaded_cpu_backend_Release_DLL.dll  # Private backend DLL (shipped with package_data)
      script: |
        {% if win %}
        :: --- CPU-only backend build (Windows) ---
        :: Disable CUDA so GeNN configures a pure CPU backend
        set CUDA_PATH=
        "%PYTHON%" setup.py install --single-version-externally-managed --record=record.txt
        {% else %}
        # --- CPU-only backend build (Linux) ---
        unset CUDA_PATH
        "$PYTHON" setup.py install --single-version-externally-managed --record=record.txt
        {% endif %}

    requirements:
      build:
        - {{ stdlib("c") }}  # [linux]
        - {{ compiler('cxx') }}
        - make  # [not win]
        - python
        - setuptools
        - pybind11
        - psutil

      host:
        - python
        - numpy
        - setuptools
        - psutil
        - pybind11
        - libffi

      run:
        - python
        - numpy
        - make  # [not win]
        - cxx-compiler  # PyGeNN JIT-compiles models via `make` + `g++`, so users need a C++ compiler.
        - psutil
        - libffi
        - importlib-metadata  # [py<38]

      run_constrained:
        - pygenn-cuda ==9999999999  # mutually exclusive: both install into site-packages/pygenn/        

    test:
      imports:
        - pygenn
      files:
        - tests/run_pygenn_cpu_smoketest.py
      commands:
        - python tests/run_pygenn_cpu_smoketest.py

    about:
      summary: "PyGeNN (CPU-only backend)"
      description: |
        GeNN with single-threaded CPU backend only. No CUDA required.
        For GPU support, install the cuda* build string variant:
          CONDA_OVERRIDE_CUDA="12.6" conda install pygenn

  # --------------------------------------------------------------------------
  # CUDA output
  # conda install pygenn                        → picks this on GPU machines
  # conda install "pygenn=*=cuda*"              → forces CUDA variant explicitly
  # CONDA_OVERRIDE_CUDA=12.6 conda install pygenn → forces CUDA on headless nodes
  # --------------------------------------------------------------------------
  - name: pygenn-cuda
    build:
      number: 0
      skip: true  # [not (linux64 or win) or py>311]
      string: "cuda{{ cuda_compiler_version | replace('.', '') }}_py{{ PY_VER | replace('.', '') }}_{{ PKG_BUILDNUM }}"
      missing_dso_whitelist:
        - $RPATH/libcuda.so.1                     # Provided by NVIDIA driver at runtime (Linux driver lib)
        - $RPATH/nvcuda.dll                       # Provided by NVIDIA driver at runtime (Windows driver lib)
        # --- GeNN private DLLs (bundled with PyGeNN) ---
        - $RPATH/genn_Release_DLL.dll                 # GeNN core runtime
        - $RPATH/libffi_Release_DLL.dll               # Private libffi runtime
        - $RPATH/genn_single_threaded_cpu_backend_Release_DLL.dll  # CPU backend, bundled
        - $RPATH/genn_cuda_backend_Release_DLL.dll    # CUDA backend, bundled
      script: |
        {% if win %}
        :: --- CUDA backend build (Windows, modular CUDA) ---
        :: Point GeNN at Conda's modular CUDA.
        set "CUDA_PATH=%BUILD_PREFIX%\Library"
        :: Let MSBuild projects (for libgenn/backends) link against modular CUDA without the VS CUDA plugin
        set "CUDA_LIBRARY_PATH=%BUILD_PREFIX%\Library\lib"
        :: Make sure modular CUDA headers/libs and DLLs are discoverable during build
        set "INCLUDE=%BUILD_PREFIX%\Library\include;%INCLUDE%"
        set "LIB=%BUILD_PREFIX%\Library\lib;%LIB%"
        set "PATH=%BUILD_PREFIX%\Library\bin;%PATH%"
        "%PYTHON%" setup.py install --single-version-externally-managed --record=record.txt
        {% else %}
        # --- CUDA backend build (Linux, modular CUDA) ---
        export CUDA_PATH="${BUILD_PREFIX}"
        export PATH="${BUILD_PREFIX}/bin:${PATH}"
        "$PYTHON" setup.py install --single-version-externally-managed --record=record.txt
        {% endif %}

    requirements:
      build:
        - {{ stdlib("c") }}  # [linux]
        - {{ compiler('cuda') }}
        - {{ compiler('cxx') }}
        - make  # [linux]
        - python
        - setuptools
        - pybind11
        - psutil
        - cuda-cudart-dev
        - cuda-driver-dev  # [linux]
        - cuda-cccl

      host:
        - python
        - numpy
        - setuptools
        - psutil
        - pybind11
        - cuda-version {{ cuda_compiler_version }}
        - cuda-cudart-dev  # run_exports → cuda-cudart added to run automatically
        - cuda-driver-dev  # [linux] run_exports → driver stub added to run automatically
        - cuda-cccl
        - libffi

      run:
        - python
        - numpy
        - psutil
        - make  # [linux]
        - {{ compiler('cxx') }}  # Required at runtime: PyGeNN JIT-compiles models via `make` + `g++`.
        - cuda-version =={{ cuda_compiler_version }}
        - cuda-nvcc               # Required at runtime: GeNN shells out to nvcc in model.build()
        - libffi
        - importlib-metadata  # [py<38]
        # cuda-cudart and cuda-driver-dev come in automatically via run_exports from host

      run_constrained:
        - pygenn-cpu ==9999999999   # mutually exclusive: both install into site-packages/pygenn/
        - __cuda >={{ cuda_compiler_version }}  # Constrains NVIDIA driver version; virtual pkg, not installed from channel

    test:
      imports:
        - pygenn
      files:
        - tests/run_pygenn_cuda_smoketest.py
      commands:
        - python tests/run_pygenn_cuda_smoketest.py

    about:
      summary: "PyGeNN (CUDA backend)"
      description: |
        GeNN (GPU enhanced Neuronal Networks) with CUDA backend for GPU-accelerated
        spiking neural network simulations. Also includes the CPU backend.
        On machines without a GPU, conda will automatically select the cpu* variant.
        To force the CPU variant: conda install "pygenn=*=cpu*"

about:
  summary: "PyGeNN: Python bindings for GeNN (GPU enhanced Neuronal Networks)"
  home: https://github.com/genn-team/genn
  license: LGPL-2.1-or-later
  license_family: LGPL
  license_file: LICENSE
  description: |
    GeNN (GPU enhanced Neuronal Networks) is a code generation framework for
    accelerating spiking neural network simulations using GPUs and CPUs.

    Two variants are available under the single package name pygenn:
      - cpu*  build string: CPU-only backend, no CUDA required
      - cuda* build string: CUDA + CPU backends, requires NVIDIA driver at runtime

    conda selects the correct variant automatically based on whether an NVIDIA
    GPU driver is detected. Use CONDA_OVERRIDE_CUDA to override (e.g. on HPC
    login nodes without a GPU).

extra:
  # feedstock-name: pygenn
  recipe-maintainers:
    - Agrim-P777
    - tnowotny
    - neworderofjamie
