schema_version: 1

context:
  version: 10

package:
  name: pipcl
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/p/pipcl/pipcl-${{ version }}.tar.gz
  sha256: 4cbe80b570e5c842411c1db2d9c4038582eae7818b8baa73f22bf023535f199f

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - setuptools
    - pip
  run:
    - python >=${{ python_min }}
    - packaging

tests:
  - python:
      python_version:
        - ${{ python_min }}.*
        - "*"
      imports:
        - pipcl
      pip_check: true

about:
  summary: Python packaging operations, including PEP-517 support, for use by a setup.py script.
  license: AGPL-3.0-only
  license_file: COPYING
  homepage: https://pypi.org/project/pipcl/

extra:
  recipe-maintainers:
    - soapy1 
