context:
  name: liteparse
  version: 1.4.2

package:
  name: ${{ name }}
  version: ${{ version }}

source:
  url: https://registry.npmjs.org/@llamaindex/liteparse/-/liteparse-${{ version }}.tgz
  sha256: a0358ede9e4968d8032399e260093eb7b74334a13537d6514dfce131eaa2a58c

build:
  number: 0
  skip:
    - ppc64le
    - win

requirements:
  build:
    - pnpm
    - pnpm-licenses
    - nodejs
  run:
    - nodejs

tests:
  - requirements:
      run:
        - nodejs
    script:
      - liteparse --help

about:
  summary: Open-source PDF parsing with spatial text extraction and OCR processing
  license: Apache-2.0
  license_file:
    - LICENSE
    - third-party-licenses.txt
  homepage: https://github.com/run-llama/liteparse
  repository: https://github.com/run-llama/liteparse

extra:
  recipe-maintainers:
    - moritzwilksch
