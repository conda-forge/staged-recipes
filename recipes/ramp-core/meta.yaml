{% set python_min = "3.11" %}
{% set version = "0.0.5" %}

package:
  name: ramp-core
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/r/ramp-core/ramp_core-{{ version }}.tar.gz
  sha256: 1b6675924e9e1cae03ccd6b1b43c7fed29dbdf9c6f61773ab55d9cd5680d813b

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python {{ python_min }}.*
    - setuptools
    - setuptools-scm
    - wheel
    - pip
  run:
    - python >={{ python_min }}
    - cytoolz
    - numpy

test:
  imports:
    - ramp_core
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}.*

about:
  home: https://pypi.org/project/ramp-core/
  summary: Utilities package for the Nuclear RAMP
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - esheder
