{% set name = "igwn-monitor" %}
{% set version = "1.3.2" %}

package:
  name: {{ name|lower }}-split
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/igwn_monitor-{{ version }}.tar.gz
  sha256: 609eb1fbba36447c986660e4241bd1bf948f424709419783b783706999603f1f

build:
  number: 0
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - pip
    - python {{ python_min }}.*
    - setuptools >=78.1.1
    - setuptools-scm >=3.4
    - wheel

outputs:
  - name: igwn-monitor
    build:
      noarch: python
    files:
      include:
        - "lib/python*/site-packages/igwn_monitor/**"
        - "lib/python*/site-packages/igwn_monitor-{{ version }}.dist-info/**"
    requirements:
      host:
        - python {{ python_min }}.*
      run:
        - python >={{ python_min }}
        - ciecplib
        - gpstime
        - python-gssapi
        - igwn-auth-utils >=1.0.0
        - requests
        - requests-gssapi >=1.2.2
    test:
      requires:
        - pip
        - python {{ python_min }}.*
      imports:
        - igwn_monitor
      commands:
        - python -m pip check
        - python -m pip show igwn-monitor
    about:
      summary: Python library for IGWN monitoring plugins
      description: |
        The igwn-monitoring-plugins project defines a Python library
        and set of dependent monitoring plugin scripts developed for the
        International Gravitational-Wave Observatory Network (IGWN).

        The igwn-monitor library provides Python routes to support
        custom Nagios (Icinga) monitoring plugins for IGWN.

  - name: monitoring-plugins-igwn-common
    build:
      entry_points:
        - check_command = igwn_monitor.plugins.check_command:main
        - check_file_latency = igwn_monitor.plugins.check_file_latency:main
        - check_nmap = igwn_monitor.plugins.check_nmap:main
        - check_rsync = igwn_monitor.plugins.check_rsync:main
        - check_url = igwn_monitor.plugins.check_url:main
      noarch: python
    requirements:
      host:
        - python {{ python_min }}.*
      run:
        - {{ pin_subpackage('igwn-monitor', exact=True) }}
        - gwdatafind
        - python >={{ python_min }}
    test:
      requires:
        - python {{ python_min }}.*
      commands:
        - check_command --help
        - check_file_latency --help
        - check_nmap --help
        - check_rsync --help
        - check_url --help
    about:
      summary: Common Nagios (Icinga) monitoring plugins for IGWN
      description: |
        The igwn-monitoring-plugins project defines a Python library
        and set of dependent monitoring plugin scripts developed for the
        International Gravitational-Wave Observatory Network (IGWN).

        This package provides common monitoring plugins for IGWN.

  - name: monitoring-plugins-igwn-cvmfs
