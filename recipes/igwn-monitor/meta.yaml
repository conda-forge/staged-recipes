        - freezegun
        - pytest
        - python {{ python_min }}.*
        - requests-mock
      commands:
        - python -m pytest --pyargs -ra -v igwn_monitor.tests -k "not test_check_command"
    about:
      summary: Nagios (Icinga) monitoring plugins for IGWN (metapackage)
      description: |
        The igwn-monitoring-plugins project defines a Python library
        and set of dependent monitoring plugin scripts developed for the
        International Gravitational-Wave Observatory Network (IGWN).

        This package is a metapackage that depends on all individual
        IGWN monitoring plugins packages (`monitoring-plugins-igwn-*`).

about:
  summary: Nagios (Icinga) monitoring plugins for IGWN
  description: |
    The igwn-monitoring-plugins project defines a Python library
    and set of dependent monitoring plugin scripts developed for the
    International Gravitational-Wave Observatory Network (IGWN).
  home: https://git.ligo.org/computing/monitoring/igwn-monitoring-plugins
  dev_url: https://git.ligo.org/computing/monitoring/igwn-monitoring-plugins.git
  doc_url: https://computing.docs.ligo.org/monitoring/igwn-monitoring-plugins/
  license: MIT
  license_file: LICENSE

