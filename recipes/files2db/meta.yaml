{% set version = "0.0.1" %}

package:
  name: files2db
  version: {{ version }}

source:
  url: https://github.com/LouisLeNezet/files2db/archive/v{{ version }}.tar.gz
  sha256: 93d08bf07d7de8050c31316d92b99178b03c140541d8b4720a4249a965c940f8

build:
  entry_points:
    - files2db = files2db.cli:main
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python
    - setuptools
    - wheel
    - pip
  run:
    - python
    - pandas >=2.2.0,<2.3.0
    - xlrd
    - openpyxl
    - typer >=0.16.0,<0.17.0

test:
  imports:
    - files2db
  commands:
    - pip check
    - files2db --help
  requires:
    - pip
    - python

about:
  summary: A tool to normalize and combine flat files into a database.
  license: GPL-3.0-only
  license_file: LICENSE

extra:
  recipe-maintainers:
    - LouisLeNezet
