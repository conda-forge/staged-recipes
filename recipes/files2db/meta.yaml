{% set version = "0.0.1" %}
{% set python_min = "3.9" %}

package:
  name: files2db
  version: {{ version }}

source:
  url: https://github.com/LouisLeNezet/files2db/archive/v{{ version }}.tar.gz
  sha256: d1e948cce97c383530fccd23bc619b63c652831edf91a8e09e5f50434d10c6be

build:
  entry_points:
    - files2db = files2db.cli:main
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - setuptools >=64
    - wheel
    - pip
  run:
    - python >={{ python_min }}
    - pandas >=2.2.0,<2.3.0
    - xlrd
    - openpyxl
    - typer >=0.16.0,<0.17.0

test:
  imports:
    - files2db
  commands:
    - pip check
    - files2db --help
  requires:
    - pip
    - python

about:
  home: https://github.com/LouisLeNezet/files2db
  summary: A tool to normalize and combine flat files into a database.
  description: |
    files2db strong> is a python tool to help anyone concatenate, normalize
    and check a multitude of flat plain files (.csv, .xlsx) into a single,
    standardized database.
  license: GPL-3.0-only
  license_file: LICENSE

extra:
  recipe-maintainers:
    - LouisLeNezet
