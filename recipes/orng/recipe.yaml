context:
  version: "0.1.0"
  python_min: "3.10"

package:
  name: orng
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/o/orng/orng-${{ version }}.tar.gz
  sha256: b1d86a860a80cff9475deab45a45be34ecd2132b71b01faa75c0b8c9b98f6269

build:
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - setuptools >=68
    - setuptools-scm >=6.2
  run:
    - python >=${{ python_min }}
    - array-api-compat

tests:
  - python:
      imports:
        - orng
      pip_check: true
      python_version: ${{ python_min }}.*

about:
  homepage: https://github.com/sequince-dev/orng
  repository: https://github.com/sequince-dev/orng
  summary: "Omni RNG: A unified, cross-backend random number generator built on the Array API standard."
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - mj-will
    - cchapmanbird
