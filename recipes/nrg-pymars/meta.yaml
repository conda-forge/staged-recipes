{% set name = "nrg-pymars" %}
{% set version = "1.2.0" %}
{% set python_min = "3.10" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name|replace('-', '_') }}-{{ version }}.tar.gz
  sha256: 61c72f17f8067c525e6429c6926c16a35d20ef1a79d3b6ca3d33d40a57978774

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0
  entry_points:
    - pymars = pymars.__main__:main

requirements:
  host:
    - python {{ python_min }}
    - pip
    - hatchling
  run:
    - python >={{ python_min }}
    - numpy
    - cantera >=3.0
    - networkx
    - h5py
    - pyyaml >=6.0

test:
  imports:
    - pymars
  requires:
    - python {{ python_min }}
  commands:
    - pymars --help

about:
  home: https://github.com/Niemeyer-Research-Group/pyMARS
  summary: Python-based chemical kinetic Model Automatic Reduction Software (pyMARS)
  description: |
    pyMARS implements multiple methods for automatically reducing the size and
    complexity of detailed chemical kinetic models, including directed relation
    graph (DRG), DRG with error propagation (DRGEP), path flux analysis (PFA),
    and sensitivity analysis (SA). It is distributed on PyPI as ``nrg-pymars``;
    the import package and command-line tool are named ``pymars``.
  license: MIT
  license_family: MIT
  license_file: LICENSE
  doc_url: https://Niemeyer-Research-Group.github.io/pyMARS/
  dev_url: https://github.com/Niemeyer-Research-Group/pyMARS

extra:
  recipe-maintainers:
    - kyleniemeyer