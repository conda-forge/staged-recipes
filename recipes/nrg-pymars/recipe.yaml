schema_version: 1

context:
  version: "1.2.0"

package:
  name: nrg-pymars
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/n/nrg-pymars/nrg_pymars-${{ version }}.tar.gz
  sha256: 61c72f17f8067c525e6429c6926c16a35d20ef1a79d3b6ca3d33d40a57978774

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  python:
    entry_points:
      - pymars = pymars.__main__:main

requirements:
  host:
    - python ${{ python_min }}.*
    - hatchling
    - pip
  run:
    - python >=${{ python_min }}
    - numpy
    - cantera >=3.0
    - networkx
    - h5py
    - pyyaml >=6.0

tests:
  - python:
      imports:
        - pymars
      # pip check is disabled: cantera's wheel metadata declares a
      # typing-extensions dependency the conda package does not ship, which
      # produces a false-positive failure unrelated to this package.
      pip_check: false
      python_version:
        - ${{ python_min }}.*
        - "*"
  - requirements:
      run:
        - python ${{ python_min }}.*
    script:
      - pymars --help

about:
  summary: Python-based chemical kinetic Model Automatic Reduction Software (pyMARS)
  description: |
    pyMARS implements multiple methods for automatically reducing the size and
    complexity of detailed chemical kinetic models, including directed relation
    graph (DRG), DRG with error propagation (DRGEP), path flux analysis (PFA),
    and sensitivity analysis (SA). It is distributed on PyPI as nrg-pymars; the
    import package and command-line tool are named pymars.
  license: MIT
  license_file: LICENSE
  homepage: https://github.com/Niemeyer-Research-Group/pyMARS
  repository: https://github.com/Niemeyer-Research-Group/pyMARS
  documentation: https://Niemeyer-Research-Group.github.io/pyMARS/

extra:
  recipe-maintainers:
    - kyleniemeyer
