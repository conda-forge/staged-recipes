{% set version = "1.5.0" %}

package:
  name: xkbcomp
  version: {{ version }}

source:
  url: https://www.x.org/releases/individual/app/xkbcomp-{{ version }}.tar.xz
  sha256: 2ac31f26600776db6d9cd79b3fcd272263faebac7eb85fb2f33c7141b8486060

build:
  number: 0
  skip: true  # [win]

requirements:
  build:
    - {{ compiler('c') }}
    - {{ stdlib('c') }}
    - meson
    - ninja
    - pkg-config
    - bison
  host:
    - xorg-libx11
    - xorg-xorgproto
    - libxkbfile
  run:
    - xkeyboard-config

test:
  commands:
    - test -f "${PREFIX}/bin/xkbcomp"
    - xkbcomp -version

about:
  home: https://www.x.org/
  license: MIT
  license_family: MIT
  license_file: COPYING
  summary: Compile XKB keyboard description from source to a compiled keymap
  description: |
    xkbcomp is the X Keyboard (XKB) keymap compiler. The X server invokes it
    at runtime to translate the keyboard description data shipped by
    xkeyboard-config into the compiled keymap used by the running server.
  dev_url: https://gitlab.freedesktop.org/xorg/app/xkbcomp

extra:
  recipe-maintainers:
    - hmaarrfk
