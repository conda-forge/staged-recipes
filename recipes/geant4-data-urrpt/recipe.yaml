schema_version: 1

context:
  dataset_name: URRPT
  version: "1.1.0"
  version_canonical_geant4: "1.1"
  env_var: G4URRPTDATA
  name: geant4-data-urrpt
  install_dir: share/Geant4/data/G4URRPT1.1

package:
  name: ${{ name }}
  version: ${{ version }}

source:
  url: https://geant4-data.web.cern.ch/geant4-data/datasets/G4${{ dataset_name }}.${{ version_canonical_geant4 }}.tar.gz
  sha256: 6a3432db80bc088aee19c504b9c0124913005d6357ea14870451400ab20d9c11
  target_directory: dataset

build:
  number: 0
  noarch: generic
  script:
    interpreter: nu
    content: |
      let dest = $"($env.PREFIX)/${{ install_dir }}"
      mkdir $dest
      cp -r dataset/* $dest
      mkdir $"($env.PREFIX)/etc/conda/env_vars.d"
      {"${{ env_var }}": $dest} | to json | save -f $"($env.PREFIX)/etc/conda/env_vars.d/${{ name }}.json"

requirements:
  build:
    - nushell

tests:
  - script:
      interpreter: nu
      content: |
        let json_path = $"($env.PREFIX)/etc/conda/env_vars.d/${{ name }}.json"
        if not ($json_path | path exists) { error make {msg: "env_vars.d JSON missing"} }
        let expected = $"($env.CONDA_PREFIX)/${{ install_dir }}"
        let actual = ($env | get "${{ env_var }}")
        if $actual != $expected { error make {msg: $"($actual) != ($expected)"} }
    requirements:
      run:
        - nushell

about:
  homepage: https://geant4.web.cern.ch/
  summary: Probability tables for low-energy neutrons in the Unresolved Resonance Region
  description: |
    Data used for the treatment of low-energy neutrons in the Unresolved
    Resonance Region (URR), at temperature of 293.15 K, processed with
    both NJOY and CALENDF.
  license: LicenseRef-Geant4
  license_file: CREDIT

extra:
  recipe-maintainers:
    - conda-forge/geant4
