schema_version: 1

context:
  dataset_name: URRPT
  version: "1.1.0"
  version_canonical_geant4: "1.1"
  env_var: G4URRPTDATA
  name: geant4-data-urrpt
  install_dir: share/Geant4/data/G4URRPT1.1

package:
  name: ${{ name }}
  version: ${{ version }}

source:
  url: https://geant4-data.web.cern.ch/geant4-data/datasets/G4${{ dataset_name }}.${{ version_canonical_geant4 }}.tar.gz
  sha256: 6a3432db80bc088aee19c504b9c0124913005d6357ea14870451400ab20d9c11
  target_directory: dataset

build:
  number: 0
  noarch: generic
  skip: win
  script:
    - mkdir -p ${PREFIX}/${{ install_dir }}
    - cp -r dataset/* ${PREFIX}/${{ install_dir }}
    - mkdir -p ${PREFIX}/etc/conda/env_vars.d
    - |
      cat > ${PREFIX}/etc/conda/env_vars.d/${{ name }}.json <<EOF
      {
        "${{ env_var }}": "${PREFIX}/${{ install_dir }}"
      }
      EOF


tests:
  - script:
      - test -f "${PREFIX}/etc/conda/env_vars.d/${{ name }}.json"
      - '[ "${${{ env_var }}}" = "$CONDA_PREFIX/${{ install_dir }}" ]'

about:
  homepage: https://geant4.web.cern.ch/
  summary: GEANT4 unresolved resonance probability tables for neutron cross sections
  license: LicenseRef-Geant4
  license_file: CREDIT

extra:
  recipe-maintainers:
    - conda-forge/geant4
