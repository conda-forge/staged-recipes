schema_version: 1

context:
  dataset_name: URRPT
  version: "1.1.0"
  version_canonical_geant4: "1.1"
  env_var: G4URRPTDATA
  name: geant4-data-urrpt
  install_dir: share/Geant4/data/G4URRPT1.1

package:
  name: ${{ name }}
  version: ${{ version }}

source:
  url: https://geant4-data.web.cern.ch/geant4-data/datasets/G4${{ dataset_name }}.${{ version_canonical_geant4 }}.tar.gz
  sha256: 6a3432db80bc088aee19c504b9c0124913005d6357ea14870451400ab20d9c11
  target_directory: dataset

build:
  number: 0
  noarch: generic
  prefix_detection:
    force_file_type:
      text:
        - etc/conda/env_vars.d/*.json
  script:
    interpreter: nu
    content: |
      let dest = ($env.PREFIX | path join ${{ install_dir }})
      mkdir $dest
      cp -r dataset/* $dest
      let env_dir = ($env.PREFIX | path join "etc" "conda" "env_vars.d")
      mkdir $env_dir
      let json_path = ($env_dir | path join $"${{ name }}.json")
      {"${{ env_var }}": $dest} | to json | save -f $json_path
      print "=== DEBUG: env_vars.d JSON contents ==="
      print (open --raw $json_path)
      print $"=== DEBUG: build PREFIX = ($env.PREFIX) ==="

requirements:
  build:
    - nushell

tests:
  - package_contents:
      files:
        - etc/conda/env_vars.d/${{ name }}.json
        - ${{ install_dir }}/**
  - script:
      - if: unix
        then: |
          set -x
          echo "CONDA_PREFIX=$CONDA_PREFIX"
          echo "${{ env_var }}=${${{ env_var }}}"
          cat "$CONDA_PREFIX/etc/conda/env_vars.d/${{ name }}.json"
          [ -d "${${{ env_var }}}" ]
        else: |
          @echo on
          echo CONDA_PREFIX=%CONDA_PREFIX%
          echo ${{ env_var }}=%${{ env_var }}%
          type "%CONDA_PREFIX%\etc\conda\env_vars.d\${{ name }}.json"
          if not exist "%${{ env_var }}%\NUL" exit 1

about:
  homepage: https://geant4.web.cern.ch/
  summary: Probability tables for low-energy neutrons in the Unresolved Resonance Region
  description: |
    Data used for the treatment of low-energy neutrons in the Unresolved
    Resonance Region (URR), at temperature of 293.15 K, processed with
    both NJOY and CALENDF.
  license: LicenseRef-Geant4
  license_file: CREDIT

extra:
  recipe-maintainers:
    - conda-forge/geant4
