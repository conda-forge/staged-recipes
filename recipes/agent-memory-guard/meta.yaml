{% set version = "0.2.2" %}

package:
  name: agent-memory-guard
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/a/agent-memory-guard/agent_memory_guard-{{ version }}.tar.gz
  sha256: b90f03d71352577264afcb1c610a3007b36579a19fc7b102e060f2ed7d941d03

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python >=3.9
    - setuptools >=68
    - wheel
    - pip
  run:
    - python >=3.9
    - pyyaml >=6.0

test:
  imports:
    - agent_memory_guard
  commands:
    - pip check
  requires:
    - pip
    - python

about:
  home: https://owasp.org/www-project-agent-memory-guard/
  summary: Runtime defense layer that protects AI agent memory from poisoning attacks (OWASP ASI06).
  doc_url: https://owasp.org/www-project-agent-memory-guard/
  dev_url: https://github.com/OWASP/www-project-agent-memory-guard
  license: Apache-2.0
  license_file: LICENSE.md

extra:
  recipe-maintainers:
    - vgudur-dev
