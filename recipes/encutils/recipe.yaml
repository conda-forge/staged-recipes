schema_version: 1

context:
  version: "1.0.0"

package:
  name: encutils
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/e/encutils/encutils-${{ version }}.tar.gz
  sha256: 38eca5af18cebabd8be43c17f14c9d3fbba83cc5f7ac8e3ab1c86e24c4b2b91a

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - flit-core >=3.11,<4
    - pip
  run:
    - python >=${{ python_min }}
    - chardet

tests:
  - python:
      imports:
        - encutils
      pip_check: true
      python_version: 
        - ${{ python_min }}.*
        - "*"

about:
  summary: Encoding tools for cssutils
  license: GPL-3.0-only
  license_file: LICENSE
  homepage: https://github.com/coherent-oss/encutils

extra:
  recipe-maintainers:
    - thewchan
