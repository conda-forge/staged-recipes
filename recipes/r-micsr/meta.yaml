{% set version = '0.1-5' %}
{% set posix = 'm2-' if win else '' %}

package:
  name: r-micsr
  version: "{{ version|replace("-", "_") }}"

source:
  url:
    - {{ cran_mirror }}/src/contrib/micsr_{{ version }}.tar.gz
    - {{ cran_mirror }}/src/contrib/Archive/micsr/micsr_{{ version }}.tar.gz
  sha256: e45541afcc181d3699a01b85f99339b7c466ff1c3c2c127e8f95a9779c200796

build:
  number: 0
  rpaths:
    - lib/R/lib/
    - lib/
  missing_dso_whitelist:
    - '*/R.dll'        # [win]
    - '*/Rblas.dll'    # [win]
    - '*/Rlapack.dll'  # [win]

requirements:
  build:
    - {{ compiler('c') }}              # [not win]
    - {{ stdlib('c') }}                # [not win]
    - {{ compiler('m2w64_c') }}        # [win]
    - {{ stdlib('m2w64_c') }}          # [win]
    - {{ compiler('cxx') }}            # [not win]
    - {{ compiler('m2w64_cxx') }}      # [win]
    - {{ posix }}filesystem        # [win]
    - {{ posix }}make
    - {{ posix }}sed               # [win]
    - {{ posix }}coreutils         # [win]
    - {{ posix }}zip               # [win]
    - cross-r-base {{ r_base }}    # [build_platform != target_platform]
  host:
    - r-base
    - r-compquadform
    - r-formula
    - r-rcpp
    - r-rdpack
    - r-dfidx
    - r-generics
    - r-numderiv
    - r-sandwich
    - r-survival
  run:
    - r-base
    - r-compquadform
    - r-formula
    - r-rcpp
    - r-rdpack
    - r-dfidx
    - r-generics
    - r-numderiv
    - r-sandwich
    - r-survival

test:
  commands:
    - $R -e "library('micsr')"           # [not win]
    - "\"%R%\" -e \"library('micsr')\""  # [win]

about:
  home: https://www.r-project.org
  license: GPL-2.0-or-later
  summary: 'Functions, data sets and examples for the book: Yves Croissant (2025) "Microeconometrics
    with R", Chapman and Hall/CRC The R Series <doi:10.1201/9781003100263>. The package
    includes a set of estimators for models used in microeconometrics, especially for
    count data and limited dependent variables. Test functions include score test, Hausman
    test, Vuong test, Sargan test and conditional moment test. A small subset of the
    data set used in the book is also included.'
  license_family: GPL2
  license_file:
    - '{{ environ["PREFIX"] }}/lib/R/share/licenses/GPL-2'

extra:
  recipe-maintainers:
    - conda-forge/r
