{% set name = "pypi-simple" %}
{% set version = "1.8.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/pypi_simple-{{ version }}.tar.gz
  sha256: 466f2fcd0d723822aae3a0ccfda22e68ff8cd7f50aae68911946ab1dd1d587e1

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - hatchling
    - pip
    - python {{ python_min }}
  run:
    - beautifulsoup4 >=4.5,<5.dev0
    - mailbits >=0.2,<1.dev0
    - packaging >=20
    - pydantic >=2.0,<3.dev0
    - python >={{ python_min }}
    - requests >=2.20,<3.dev0

test:
  imports:
    - pypi_simple
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://github.com/jwodder/pypi-simple
  summary: PyPI Simple Repository API client library
  license: MIT
  license_file: LICENSE
  doc_url: https://pypi-simple.readthedocs.io/en/stable/

extra:
  recipe-maintainers:
    - domdfcoding
