context:
  version: "1.500"

package:
  name: font-departure-mono
  version: ${{ version }}

source:
  - url: https://github.com/rektdeckard/departure-mono/releases/download/v${{ version }}/DepartureMono-${{ version }}.zip
    sha256: bf3e48059aeef4617ec585bdea81dcc3491c576b3e7a472f52faf40e09ee5c3a

build:
  noarch: generic
  number: 0
  script:
    - mkdir -p $PREFIX/fonts
    - cp DepartureMono-Regular* $PREFIX/fonts

tests:
  - package_contents:
      files:
        - fonts/DepartureMono-Regular.otf
        - fonts/DepartureMono-Regular.woff
        - fonts/DepartureMono-Regular.woff2
      strict: true

about:
  homepage: https://departuremono.com
  summary: A monospaced pixel font with a lo-fi, techy vibe
  description: |
    Departure Mono is a monospaced pixel font inspired by the constraints of early command-line and graphical user interfaces, the tiny pixel fonts of the late 90s/early 00s, and sci-fi concepts from film and television.
  license: OFL-1.1
  license_file:
    - LICENSE
  repository: https://github.com/rektdeckard/departure-mono

extra:
  recipe-maintainers:
    - pavelzw
