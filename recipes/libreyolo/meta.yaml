{% set name = "libreyolo" %}
{% set version = "1.1.1" %}
{% set python_min = "3.10" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz
  sha256: a25bb2643e7001ffe1ed5de2e51c3d2f78ade547ade225ac707035a674013bdc

build:
  number: 0
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  entry_points:
    - libreyolo = libreyolo.cli:entrypoint

requirements:
  host:
    - python {{ python_min }}
    - pip
    - setuptools
    - wheel
  run:
    - python >={{ python_min }}
    - numpy >=1.19.0
    - pillow >=8.0.0
    - pytorch >=1.13.0
    - torchvision >=0.11.0
    - pyyaml >=6.0
    - requests >=2.25.0
    - opencv >=4.11.0
    - tqdm >=4.65.0
    - pycocotools >=2.0.0
    - typer >=0.9.0

test:
  imports:
    - libreyolo
  commands:
    - pip check
    - libreyolo --help
  requires:
    - python {{ python_min }}
    - pip

about:
  home: https://github.com/LibreYOLO/libreyolo
  summary: MIT-licensed YOLO library for training and inference
  description: |
    LibreYOLO is an MIT-licensed object detection library with training and
    inference support across YOLOv9, YOLOX, YOLO-NAS, RF-DETR, D-FINE, and
    RT-DETR. ONNX is the release-blocking export target; TorchScript,
    TensorRT, OpenVINO, and NCNN are supported as experimental backends.
  license: MIT
  license_family: MIT
  license_file: LICENSE
  doc_url: https://www.libreyolo.com/docs
  dev_url: https://github.com/LibreYOLO/libreyolo

extra:
  recipe-maintainers:
    - EHxuban11
