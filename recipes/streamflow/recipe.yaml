schema_version: 1

context:
  version: "0.1.6"

package:
  name: streamflow
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/s/streamflow/streamflow-${{ version }}.tar.gz
  sha256: 0e0356323ecf910dd8ced3ceff1450ee30ec4b8a17b4a6cf39fdc8812659bc01

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  python:
    entry_points:
      - streamflow=streamflow.main:run
      - cwl-runner=streamflow.cwl.runner:run

requirements:
  host:
    - python >=3.9,<4.0
    - pip
  run:
    - python >=3.9,<4.0
    - aiohttp
    - antlr4-python3-runtime <4.10
    - asyncssh
    - bcrypt
    - cachetools
    - cwltool
    - jinja2
    - jsonref
    - jsonschema
    - kubernetes_asyncio >=22.6.2
    - pandas

tests:
  - python:
      imports:
        - streamflow
      pip_check: true
      python_version: ${{ python_min }}.*
  - requirements:
      run:
        - pip
        - python ${{ python_min }}.*
    script:
      - streamflow --help
      - cwl-runner --help

about:
  summary: StreamFlow framework
  license: LGPL-3.0-only
  license_file: LICENSE
  homepage: https://github.com/alpha-unito/streamflow

extra:
  recipe-maintainers:
    - jan-janssen
