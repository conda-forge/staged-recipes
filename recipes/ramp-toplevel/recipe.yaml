schema_version: 1

context:
  python_min: "3.11"
  version: "0.0.2"

package:
  name: ramp-toplevel
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/r/ramp-toplevel/ramp_toplevel-${{ version }}.tar.gz
  sha256: 12d0af1c0f30ce7a4c2377e4f02f7dcb1a1cde447a8437e8288c80dc17d69a8f

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - setuptools
    - setuptools-scm
    - wheel
    - pip
  run:
    - python >=${{ python_min }}
    - dask-core
    - dask-jobqueue
    - distributed
    - more-itertools
    - numpy
    - pandas
    - pyyaml
    - ramp-batman
    - ramp-corecompute
    - ramp-coremaker
    - ramp-coreoperator
    - ramp-isotopes
    - ramp-reactions
    - toolz
    - scipy
    - uncertainties

tests:
  - python:
      imports:
        - ramp
      pip_check: true
      python_version: 
        - ${{ python_min }}.*
        - "*"

about:
  summary: High level analysis of reactor states
  license: MIT
  license_file: LICENSE
  homepage: https://pypi.org/project/ramp-toplevel/

extra:
  recipe-maintainers:
    - esheder
