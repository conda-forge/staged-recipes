schema_version: 1

context:
  version: "1.3.4"

recipe:
  name: minhook-split
  version: ${{ version }}

source:
  - url: https://github.com/TsudaKageyu/minhook/archive/refs/tags/v${{ version }}.tar.gz
    sha256: 1aebeae4ca898330c507860acc2fca2eb335fe446a3a2b8444c3bf8b2660a14e

build:
  number: 0

outputs:
  - package:
      name: minhook
      version: ${{ version }}
    build:
      number: 0
      skip: unix
      script:
        - cmake -GNinja %CMAKE_ARGS% -B build_shared -DBUILD_SHARED_LIBS=ON -DCMAKE_INSTALL_PREFIX=%LIBRARY_PREFIX% .
        - cmake --build build_shared --config Release
        - cmake --install build_shared --config Release
    requirements:
      build:
        - ${{ compiler('c') }}
        - ${{ compiler('cxx') }}
        - ${{ stdlib("c") }}
        - cmake
        - ninja
      host: []
    tests:
      - package_contents:
          files:
            - Library/bin/minhook*.dll
            - Library/lib/minhook*.lib
          include:
            - MinHook.h
    about:
      summary: "The Minimalistic x86/x64 API Hooking Library for Windows"
      description: |
        MinHook is a Windows API hooking library.
        It is a tool that allows a programmer to intercept and modify function calls at runtime.
        This package provides the dynamic link library (DLL) build of MinHook.
        Note: This library is Windows-only and requires appropriate permissions to modify running processes.

  - package:
      name: minhook-static
      version: ${{ version }}
    build:
      number: 0
      skip: unix
      script:
        - cmake -GNinja %CMAKE_ARGS% -B build_static -DBUILD_SHARED_LIBS=OFF -DCMAKE_INSTALL_PREFIX=%LIBRARY_PREFIX% .
        - cmake --build build_static --config Release
        - cmake --install build_static --config Release
    requirements:
      build:
        - ${{ compiler('c') }}
        - ${{ compiler('cxx') }}
        - ${{ stdlib("c") }}
        - cmake
        - ninja
      host: []
    tests:
      - package_contents:
          files:
            - Library/lib/minhook*.lib
          include:
            - MinHook.h
    about:
      summary: "The Minimalistic x86/x64 API Hooking Library for Windows (static)"
      description: |
        MinHook is a Windows API hooking library.
        It is a tool that allows a programmer to intercept and modify function calls at runtime.
        This package provides the static library build of MinHook.
        Note: This library is Windows-only and requires appropriate permissions to modify running processes.

about:
  homepage: https://github.com/TsudaKageyu/minhook
  summary: "The Minimalistic x86/x64 API Hooking Library for Windows"
  description: |
    MinHook is a Windows API hooking library.
    It is a tool that allows a programmer to intercept and modify function calls at runtime.
    Note: This library is Windows-only and requires appropriate permissions to modify running processes.
  license: BSD-2-Clause
  license_file: LICENSE.txt
  repository: https://github.com/TsudaKageyu/minhook
  documentation: https://github.com/TsudaKageyu/minhook/blob/master/README.md

extra:
  feedstock-name: minhook
  recipe-maintainers:
    - phreed
