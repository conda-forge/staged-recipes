context:
  name: cql2
  version: "0.5.3"
  python_min: "3.10"

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/${{ name[0] }}/${{ name }}/cql2-{{ version }}.tar.gz
  sha256: 4a9fb1034e6d7c37ed224598e09787cf393b0e2cccdb3dd55a3ecc1edaa788f2

build:
  number: 0
  python:
    entry_points:
      - cql2 = cql2:main
    version_independent: true
  script:
    - cargo-bundle-licenses --format yaml --output THIRDPARTY.yml
    - ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  build:
    - ${{ stdlib("c") }}
    - ${{ compiler("rust") }}
    - cargo-bundle-licenses
  host:
    - python {{ python_min }}.*
    - maturin >=1.7,<2.0
    - pip
  run:
    - python >={{ python_min }}

tests:
  - python:
      imports:
        - cql2
      pip_check: true
      python_version: ["${{ python_min ~ '.*' }}"]
  - script:
      - cql2 --help

about:
  home: https://github.com/developmentseed/cql2-rs
  summary: Parse, validate, and convert Common Query Language (CQL2) text and JSON
  license: MIT
  license_file:
    - LICENSE
    - THIRDPARTY.yml

extra:
  recipe-maintainers:
    - gadomski
