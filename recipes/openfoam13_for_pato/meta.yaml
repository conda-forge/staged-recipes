{% set name = "openfoam13_for_pato" %}
{% set version = "13_20250911" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pub-4a1d27844ac44e0882c868149ab29117.r2.dev/src/openfoam13_for_pato_conda-{{ version }}_v4.tar.gz
  sha256: 90d63a287e7d90f67995e3fe3d0f818d45a444d6ae1f7b94233dbb4a58491905

build:
  number: 16
  skip: True  # [win]
  # Disable conda-build's automatic binary relocation. The sparsebundle band
  # files (raw HFS+ disk image data) contain Mach-O-like bytes that confuse
  # install_name_tool during packaging, crashing bundle_conda. All rpath/path
  # fixups are already done explicitly in build.sh, so relocation is not needed.
  binary_relocation: false  # [osx]

requirements:
  build:
    - sed ==4.8  # [target_platform == 'osx-64']
    - sed ==4.8  # [target_platform == 'osx-arm64']
    - {{ stdlib("c") }}  # [darwin]
    - {{ compiler('c') }}  # [darwin]
    - {{ compiler('cxx') }}  # [darwin]
    - gcc ==11.2.0  # [linux]
    - gxx ==11.2.0  # [linux]
    - cmake ==3.23.0
    - coreutils ==9.0
    - flex ==2.6.4  # [linux]
    - m4 ==1.4.18  # [linux]
    - make ==4.3
    - openmpi ==4.1.3  # [linux]
    - openssh ==8.9p1  # [linux]
    - patchelf ==0.14.5  # [linux]
    - perl ==5.26.2  # [linux]
    - readline  # [linux]
    - wget ==1.20.3
    - zlib ==1.2.11  # [linux]

  host:
    - sed ==4.8  # [target_platform == 'osx-64']
    - sed ==4.8  # [target_platform == 'osx-arm64']
    - boost ==1.72  # [linux]
    - boost ==1.72  # [target_platform == 'osx-64']
    - {{ compiler('c') }}  # [darwin]
    - {{ compiler('cxx') }}  # [darwin]
    - gcc ==11.2.0  # [linux]
    - gxx ==11.2.0  # [linux]
    - cgal ==5.0.1  # [linux]
    - cgal ==5.0.1  # [target_platform == 'osx-64']
    - cmake ==3.23.0
    - coreutils ==9.0
    - flex ==2.6.4  # [linux]
    - m4 ==1.4.18  # [linux]
    - make ==4.3  # [linux]
    - metis ==5.1.0  # [linux]
    - openmpi ==4.1.3  # [linux]
    - openssh ==8.9p1  # [linux]
    - patchelf ==0.14.5  # [linux]
    - perl ==5.26.2  # [linux]
    - ptscotch ==6.1.3  # [linux]
    - readline  # [linux]
    - scotch ==6.0.9  # [linux]
    - wget ==1.20.3  # [linux]
    - zlib ==1.2.11  # [linux]

  run:
    - sed ==4.8  # [target_platform == 'osx-64']
    - sed ==4.8  # [target_platform == 'osx-arm64']
    - boost ==1.72  # [linux]
    - gcc ==11.2.0  # [linux]
    - gxx ==11.2.0  # [linux]
    - cgal ==5.0.1  # [linux]
    - cmake ==3.23.0  # [linux]
    - coreutils ==9.0  # [linux]
    - flex ==2.6.4  # [linux]
    - m4 ==1.4.18  # [linux]
    - make ==4.3  # [linux]
    - metis ==5.1.0  # [linux]
    - openmpi ==4.1.3  # [linux]
    - openssh ==8.9p1  # [linux]
    - patchelf ==0.14.5  # [linux]
    - perl ==5.26.2  # [linux]
    - ptscotch ==6.1.3  # [linux]
    - readline  # [linux]
    - scotch ==6.0.9  # [linux]
    - wget ==1.20.3  # [linux]
    - zlib ==1.2.11  # [linux]
    # macOS: scotch/ptscotch/metis/mpi dylibs are bundled inside the sparsebundle
    # (platforms/darwin64ClangDPInt32Opt/lib/) so they are found via DYLD_LIBRARY_PATH
    # at runtime without needing conda-installed versions.
    # openmpi is still declared so users have mpirun/mpiexec for parallel jobs.
    - openmpi ==5.0.10  # [target_platform == 'osx-arm64']
    - scotch ==7.0.11  # [target_platform == 'osx-arm64']
    - ptscotch ==7.0.11  # [target_platform == 'osx-arm64']

about:
  home: https://openfoam.org
  license: GPL-3.0-only
  summary: OpenFOAM 13 compiled for use with PATO

extra:
  recipe-maintainers:
    - jmeurisse
