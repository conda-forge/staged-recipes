{% set name = "openfoam13_for_pato" %}
{% set version = "13_20250911" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pub-4a1d27844ac44e0882c868149ab29117.r2.dev/src/openfoam13_for_pato_conda-{{ version }}.tar.gz
  sha256: 1e244c58a4c5aa07662ca7b197a9f84af943814baad91ff0315dfb63a3dce6fc

build:
  number: 0
  skip: True  # [win]

requirements:
  build:
    - sed ==4.8  # [target_platform == 'osx-64']
    - sed ==4.8  # [target_platform == 'osx-arm64']
    - {{ stdlib("c") }}  # [darwin]
    - {{ compiler('c') }}  # [darwin]
    - {{ compiler('cxx') }}  # [darwin]
    - gcc ==11.2.0  # [linux]
    - gxx ==11.2.0  # [linux]
    - cmake ==3.23.0
    - coreutils ==9.0
    - flex ==2.6.4  # [linux]
    - m4 ==1.4.18  # [linux]
    - make ==4.3
    - openmpi ==4.1.3  # [linux]
    - openmpi ==4.1.2  # [target_platform == 'osx-64']
    - openmpi-mpicc ==4.1.6  # [target_platform == 'osx-arm64']
    - openssh ==8.9p1  # [linux]
    - patchelf ==0.14.5  # [linux]
    - perl ==5.26.2  # [linux]
    - readline  # [linux]
    - wget ==1.20.3
    - zlib ==1.2.11  # [linux]

  host:
    - sed ==4.8  # [target_platform == 'osx-64']
    - sed ==4.8  # [target_platform == 'osx-arm64']
    - boost ==1.72  # [linux]
    - boost ==1.72  # [target_platform == 'osx-64']
    - boost ==1.82  # [target_platform == 'osx-arm64']
    - {{ compiler('c') }}  # [darwin]
    - {{ compiler('cxx') }}  # [darwin]
    - gcc ==11.2.0  # [linux]
    - gxx ==11.2.0  # [linux]
    - cgal ==5.0.1  # [linux]
    - cgal ==5.0.1  # [target_platform == 'osx-64']
    - cgal ==5.6  # [target_platform == 'osx-arm64']
    - cmake ==3.23.0
    - coreutils ==9.0
    - flex ==2.6.4  # [linux]
    - m4 ==1.4.18  # [linux]
    - make ==4.3  # [linux]
    - metis ==5.1.0
    - openmpi ==4.1.3  # [linux]
    - openmpi ==4.1.2  # [target_platform == 'osx-64']
    - openmpi-mpicc ==4.1.6  # [target_platform == 'osx-arm64']
    - openssh ==8.9p1  # [linux]
    - patchelf ==0.14.5  # [linux]
    - perl ==5.26.2  # [linux]
    - ptscotch ==6.1.3
    - readline  # [linux]
    - scotch ==6.0.9
    - wget ==1.20.3  # [linux]
    - zlib ==1.2.11  # [linux]

  run:
    - sed ==4.8  # [target_platform == 'osx-64']
    - sed ==4.8  # [target_platform == 'osx-arm64']
    - boost ==1.72  # [linux]
    - boost ==1.72  # [target_platform == 'osx-64']
    - boost ==1.82  # [target_platform == 'osx-arm64']
    - {{ compiler('c') }}  # [darwin]
    - {{ compiler('cxx') }}  # [darwin]
    - gcc ==11.2.0  # [linux]
    - gxx ==11.2.0  # [linux]
    - cgal ==5.0.1  # [linux]
    - cgal ==5.0.1  # [target_platform == 'osx-64']
    - cgal ==5.6  # [target_platform == 'osx-arm64']
    - cmake ==3.23.0
