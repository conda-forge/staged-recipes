{% set name = "itkwasm-downsample" %}
{% set version = "1.8.1" %}

package:
  name: {{ name }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/i/itkwasm-downsample/itkwasm_downsample-{{ version }}.tar.gz
  sha256: b4a91cb79fb7f69e6333fbc18f745348cd58659a0b9da8e1f391289f8ff06afb

build:
  number: 0
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  

requirements:
  host:
    - python >=3.8
    - hatchling
    - hatch-vcs
    - pip
  run:
    - python >=3.8
    - itkwasm
    - itkwasm-downsample-wasi 

test:
  imports:
    - itkwasm_downsample
  requires:
    - python
  commands:
    - pip check

about:
  home: https://pypi.org/project/itkwasm-downsample/
  summary: Pipelines for downsampling images.
  dev_url: https://github.com/InsightSoftwareConsortium/ITK-Wasm
  license: Apache-2.0
  license_file: LICENSE.txt

extra:
  recipe-maintainers:
    - khaled196
    - thewtex
