{% set version = '0.2.0' %}
{% set posix = 'm2-' if win else '' %}

package:
  name: r-abdiv
  version: "{{ version|replace('-', '_') }}"

source:
  url:
    - {{ cran_mirror }}/src/contrib/abdiv_{{ version }}.tar.gz
    - {{ cran_mirror }}/src/contrib/Archive/abdiv/abdiv_{{ version }}.tar.gz
  sha256: 49484975fda33200175fd58b5387ea6dff120b66566b740018be699417497414

build:
  number: 0
  noarch: generic
  rpaths:
    - lib/R/lib/
    - lib/
  missing_dso_whitelist:
    - '*/R.dll'        # [win]
    - '*/Rblas.dll'    # [win]
    - '*/Rlapack.dll'  # [win]

requirements:
  build:
    - {{ posix }}zip               # [win]
    - cross-r-base {{ r_base }}    # [build_platform != target_platform]
  host:
    - r-base
    - r-ape
  run:
    - r-base
    - r-ape

test:
  commands:
    - $R -e "library('abdiv')"           # [not win]
    - "\"%R%\" -e \"library('abdiv')\""  # [win]

about:
  home: https://github.com/kylebittinger/abdiv
  license: MIT
  summary: |
    A collection of measures for measuring ecological diversity. Ecological diversity
    comes in two flavors: alpha diversity measures the diversity within a single site
    or sample, and beta diversity measures the diversity across two sites or samples.
    This package overlaps considerably with other R packages such as ''vegan'', ''gUniFrac'',
    ''betapart'', and ''fossil''. We also include a wide range of functions that are
    implemented in software outside the R ecosystem, such as ''scipy'', ''Mothur'',
    and ''scikit-bio''.  The implementations here are designed to be basic and clear
    to the reader
  license_family: MIT
  license_file:
    - '{{ environ["PREFIX"] }}/lib/R/share/licenses/MIT'
    - LICENSE

extra:
  recipe-maintainers:
    - conda-forge/r

