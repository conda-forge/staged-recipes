schema_version: 1

context:
  version: "1.9.2602.24"

package:
  name: directx-shader-compiler
  version: ${{ version }}

source:
  url: https://github.com/microsoft/DirectXShaderCompiler/archive/refs/tags/v${{ version }}.tar.gz
  sha256: 895044b0c08d16119acf2b0e956da3ceadf0f4b0191cdec51b2c6dfdc53a58c0
  patches:
    - use-system-spirv-tools.patch

build:
  number: 0
  script:
    interpreter: brush
    content: |
      set -euxo pipefail

      cmake ${CMAKE_ARGS:-} \
        -S . \
        -B build \
        -G Ninja \
        -C cmake/caches/PredefinedParams.cmake \
        -DCMAKE_BUILD_TYPE=Release \
        -DCMAKE_INSTALL_PREFIX="${LIBRARY_PREFIX:-$PREFIX}" \
        -DCMAKE_INSTALL_LIBDIR=lib \
        -DDIRECTX_HEADER_INCLUDE_DIR="${LIBRARY_INC:-$PREFIX/include}" \
        -DSPIRV-Headers_SOURCE_DIR="${LIBRARY_PREFIX:-$PREFIX}" \
        -DDXC_USE_SYSTEM_SPIRV_TOOLS=ON \
        -DENABLE_SPIRV_CODEGEN=ON \
        -DLLVM_USE_HOST_TOOLS="${CONDA_BUILD_CROSS_COMPILATION:-OFF}" \
        "-DCROSS_TOOLCHAIN_FLAGS_NATIVE=-DCMAKE_C_COMPILER=${CC_FOR_BUILD:-$CC};-DCMAKE_CXX_COMPILER=${CXX_FOR_BUILD:-$CXX};-DCMAKE_C_FLAGS=;-DCMAKE_CXX_FLAGS=;-DCMAKE_EXE_LINKER_FLAGS=;-DCMAKE_SHARED_LINKER_FLAGS=;-DCMAKE_PREFIX_PATH=${BUILD_PREFIX}${LIBRARY_PREFIX:+/Library};-DDIRECTX_HEADER_INCLUDE_DIR=${LIBRARY_INC:-$PREFIX/include};-DSPIRV-Headers_SOURCE_DIR=${BUILD_PREFIX}${LIBRARY_PREFIX:+/Library};-DDXC_USE_SYSTEM_SPIRV_TOOLS=ON;-DHLSL_ENABLE_FIXED_VER=ON;-DHLSL_SUPPORT_QUERY_GIT_COMMIT_INFO=OFF;-DHLSL_INCLUDE_TESTS=OFF;-DSPIRV_BUILD_TESTS=OFF;-DLLVM_INCLUDE_TESTS=OFF;-DCLANG_INCLUDE_TESTS=OFF;-DLLVM_ENABLE_ZLIB=FORCE_ON" \
        -DHLSL_ENABLE_FIXED_VER=ON \
        -DHLSL_SUPPORT_QUERY_GIT_COMMIT_INFO=OFF \
        -DHLSL_INCLUDE_TESTS=OFF \
        -DSPIRV_BUILD_TESTS=OFF \
        -DLLVM_INCLUDE_TESTS=OFF \
        -DCLANG_INCLUDE_TESTS=OFF \
        -DLLVM_ENABLE_ZLIB=FORCE_ON

      cmake --build build --target install-distribution --parallel "$CPU_COUNT"

requirements:
  build:
    - ${{ compiler('c') }}
    - ${{ compiler('cxx') }}
    - ${{ stdlib('c') }}
    - brush
    - cmake >=3.17.2
    - ninja
    - python
    - if: build_platform != host_platform
      then:
        - spirv-headers
        - spirv-tools
        - zlib
  host:
    - directx-headers
    - spirv-headers
    - spirv-tools
    - zlib

tests:
  - package_contents:
      bin:
        - dxc
      lib:
        - dxcompiler
      include:
        - dxc/dxcapi.h
        - dxc/dxcerrors.h
        - dxc/dxcisense.h

about:
  homepage: https://github.com/microsoft/DirectXShaderCompiler
  repository: https://github.com/microsoft/DirectXShaderCompiler
  documentation: https://github.com/microsoft/DirectXShaderCompiler/wiki
  summary: Compiler and related tools for High-Level Shader Language programs
  description: |
    DirectX Shader Compiler provides the dxc command-line compiler and the
    dxcompiler library for compiling HLSL to DXIL or SPIR-V.
  license: NCSA
  license_file:
    - LICENSE.TXT
    - ThirdPartyNotices.txt

extra:
  recipe-maintainers:
    - baszalmstra
