context:
  version: "1.0"

package:
  name: font-enriqueta
  version: ${{ version }}

source:
  - url: https://github.com/vv-monsalve/Enriqueta/archive/b089cc3582699c3cc72d45b9f19e5ac5a18742a3.tar.gz
    sha256: 5f970032792c7ca1cc931ac14d20ca131acad41ec2b0b72bec996f897259b922

build:
  noarch: generic
  number: 0
  script:
    - mkdir -p $PREFIX/fonts
    - cp fonts/Enriqueta*.ttf $PREFIX/fonts

tests:
  - package_contents:
      files:
        - fonts/Enriqueta-Bold.ttf
        - fonts/Enriqueta-Medium.ttf
        - fonts/Enriqueta-Regular.ttf
        - fonts/Enriqueta-SemiBold.ttf
      strict: true

about:
  homepage: https://fonts.google.com/specimen/Enriqueta
  summary: The Enriqueta font family.
  license: OFL-1.1
  license_file:
    - OFL.txt
  repository: https://github.com/vv-monsalve/Enriqueta

extra:
  recipe-maintainers:
    - pavelzw
