{% set name = "calcfidata" %}
{% set version = "0.1.2" %}
{% set python_min = "3.9" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz
  sha256: 85fb5e10ed21279b96bd9c65db871290890a7bdf59bdba027aba53900b607825

build:
  number: 0
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python {{ python_min }}
    - pip
    - setuptools >=77
    - wheel
  run:
    - python >={{ python_min }}
    - pandas >=2.0
    - requests >=2.28

test:
  imports:
    - calcfidata
  commands:
    - pip check
    - python -c "import calcfidata; assert calcfidata.__version__ == '0.1.2'"
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://calcfi.app
  summary: Free US personal-finance calculator data - IRS, BLS, FRED, Freddie Mac PMMS primary sources, MCP server, CC-BY 4.0
  description: |
    calcfidata is the official Python client for CalcFi Open Data, a free
    CC-BY-4.0 dataset of 34 US personal-finance and macroeconomic time
    series mirrored verbatim from primary government and central-bank
    sources: the Federal Reserve Bank of St. Louis (FRED), the US Bureau
    of Labor Statistics (BLS), the Internal Revenue Service (IRS),
    Freddie Mac (Primary Mortgage Market Survey, PMMS), the US Department
    of the Treasury, the Bureau of Economic Analysis (BEA), the Board of
    Governors of the Federal Reserve System, the Federal Deposit Insurance
    Corporation (FDIC), the US Energy Information Administration (EIA),
    and the World Bank.

    The dataset powers mortgage, retirement, paycheck, tax-bracket, auto-
    loan, savings, and inflation calculators at https://calcfi.app and is
    designed for reproducible personal-finance research. Series include
    the 30-year and 15-year fixed mortgage rates (Freddie Mac PMMS), 2Y
    and 10Y Treasury constant maturity yields, the Effective Federal
    Funds Rate, CPI-U and PCE inflation, civilian unemployment, average
    hourly earnings, WTI and Brent crude oil prices, US gasoline retail
    prices, USD/EUR, USD/GBP and USD/JPY FX rates, credit-card APR,
    consumer-loan rates, and US and Eurozone GDP per capita.

    A companion Model Context Protocol (MCP) server exposes the same
    series to LLM agents. The package code is MIT-licensed; the
    underlying dataset is CC BY 4.0 with permanent DOIs deposited at
    Figshare (10.6084/m9.figshare.32332290), Zenodo, OSF, Kaggle, and
    Mendeley Data. A methodology paper is under review at SSRN.

    Maintained by Jere Salmisto (ORCID 0009-0000-0916-8684), founder of
    calcfi.app.
  license: MIT
  license_family: MIT
  license_file: LICENSE
  doc_url: https://calcfi.app/developers
  dev_url: https://gitlab.com/jere.salmisto/calcfi-open-data

extra:
  recipe-maintainers:
    - jeresalmisto
