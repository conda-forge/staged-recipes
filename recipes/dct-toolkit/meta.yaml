{% set python_min = "3.8" %}

package:
  name: dct-toolkit
  version: 0.5.0

source:
  url: https://pypi.org/packages/source/d/dct-toolkit/dct_toolkit-0.5.0.tar.gz
  sha256: 9650850ae15600cef28b87350a7c80d61fd9f868a246f4727bc5959e4bb2e7d8

build:
  number: 0
  noarch: python
  script: "{{ PYTHON }} -m pip install . -vv"

requirements:
  host:
    - python {{ python_min }}
    - pip
    - hatchling >=1.25.0
  run:
    - python >={{ python_min }}
    - numpy >=1.20
    - scipy >=1.8

test:
  imports:
    - dct_toolkit
  requires:
    - python {{ python_min }}
    - pytest
  commands:
    - python -m pytest tests -q

about:
  home: https://github.com/JValdivia23/dct-toolkit
  summary: DCT/FFT-based convolutional statistics for Cartesian and polar data
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - JValdivia23
