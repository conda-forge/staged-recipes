# SPDX-License-Identifier: Apache-2.0

{% set version = "0.1.3" %}

package:
  name: chiltepin
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/c/chiltepin/chiltepin-{{ version }}.tar.gz
  sha256: 522620e7711dff246607d28f472700ccff76b6a3a9b34fc24b414a54d187b9dd

build:
  number: 0
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  # Skip Windows: chiltepin requires fork-based multiprocessing not available on Windows
  # Skip Python <3.10: minimum supported version
  # Skip Python >=3.13 for conda builds: transitive dependency pyzmq not yet available on conda-forge for Python 3.13
  skip: true  # [win or py<310 or py>=313]
  entry_points:
    - chiltepin = chiltepin.cli:main
requirements:
  host:
    - python
    - pip
    - setuptools >=61.0
  run:
    - python
    - globus-compute-sdk >=4.3.0,<4.7.0
    - globus-compute-endpoint >=4.3.0,<4.7.0  # [linux]
    - globus-sdk >=3.65.0
    - parsl >=2025.12.1
    - psutil <6.0
    - pyyaml >=6.0

test:
  requires:
    - pip
    - python
  imports:
    - chiltepin
    - chiltepin.cli
    - chiltepin.configure
    - chiltepin.endpoint
    - chiltepin.tasks
    - chiltepin.data
  commands:
    - pip check
    - chiltepin --help

about:
  home: https://github.com/NOAA-GSL/chiltepin
  license: Apache-2.0
  license_file: LICENSE
  summary: Federated NWP Workflow Tools
  description: |
    Chiltepin is a Python library for exploring federated workflow capabilities
    using Parsl and Globus Compute. It provides tools and demonstrations for
    implementing distributed scientific workflows on HPC systems.
  doc_url: https://chiltepin.readthedocs.io
  dev_url: https://github.com/NOAA-GSL/chiltepin

extra:
  recipe-maintainers:
    - christopherwharrop-noaa
