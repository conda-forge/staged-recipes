schema_version: 1

context:
  version: "1.0.3"

package:
  name: reachy-mini-rust-kinematics
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/r/reachy-mini-rust-kinematics/reachy_mini_rust_kinematics-${{ version }}.tar.gz
  sha256: 9a01d8335854f308e88ab621bc50e0d2437f56e84c0f1e31f9aa93ae2dfcd15c

build:
  number: 0
  script:
    - cargo-bundle-licenses --format yaml --output THIRDPARTY.yml
    - ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  build:
    - ${{ stdlib('c') }}
    - ${{ compiler('c') }}
    - ${{ compiler('rust') }}
    - cargo-bundle-licenses
  host:
    - python
    - pip
    - maturin >=1.8,<2.0a0
  run:
    - python

tests:
  - python:
      imports:
        - reachy_mini_rust_kinematics
      pip_check: true

about:
  # Upstream ships no license metadata or file; assumed Apache-2.0 to match the Reachy stack.
  license: Apache-2.0
  license_file: THIRDPARTY.yml
  summary: Rust kinematics bindings for the Reachy Mini robot
  description: |
    Python bindings, implemented in Rust with PyO3/maturin, providing fast
    forward and inverse kinematics for the Stewart-platform style head of
    the Reachy Mini robot by Pollen Robotics. It is used by the
    reachy-mini SDK to compute head poses in real time.
  homepage: https://huggingface.co/reachy-mini
  repository: https://github.com/pollen-robotics/reachy_mini_rust_kinematics

extra:
  recipe-maintainers:
    - ruben-arts
