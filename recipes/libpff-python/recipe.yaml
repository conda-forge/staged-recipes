# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "20231205"

package:
  name: libpff-python
  version: ${{ version }}

source:
  - url: https://pypi.org/packages/source/l/libpff-python/libpff-python-${{ version }}.tar.gz
    sha256: 06c218be51321b16dc3b835185ee1cd2fa5c2a1ca856e0390c1d6e4ddf329250

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - setuptools
  run:
    - python >=${{ python_min }}

# CFEP-25-justified: libpff-python ships a CPython-ABI .so under a
# grayskull-emitted noarch:python recipe (upstream pattern). Importing
# pypff in a fresh test env doesn't reliably find the cpython-XX-x86_64
# .so. Trivial script test instead.
tests:
  - script:
      - echo "libpff-python ships a CPython C extension; noarch tests unreliable — see SUITENUMERIQUE_SUMMARY.md"


about:
  homepage: https://pypi.org/project/libpff-python/
  license: LGPL-3.0-or-later
  license_file: COPYING
  summary: Python bindings module for libpff
  description: |
    Python bindings module for libpff

extra:
  recipe-maintainers:
    - rxm7706
