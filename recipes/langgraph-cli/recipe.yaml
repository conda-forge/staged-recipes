# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "0.4.30"

package:
  name: langgraph-cli
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/l/langgraph-cli/langgraph_cli-${{ version }}.tar.gz
  sha256: 4948fdc77ff45fc5ef3d8330d17bbecfcb26cd9c4d3a4f00da84a41a0226cd72

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - hatchling
  run:
    - python >=${{ python_min }}
    - click >=8.1.7
    - httpx >=0.24.0
    - langgraph-sdk >=0.1.0
    - pathspec >=0.11.0
    - python-dotenv >=0.8.0
    - tomli >=2.0.1

tests:
  - python:
      imports:
        - langgraph_cli
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  homepage: https://pypi.org/project/langgraph-cli/
  license: MIT
  license_file: LICENSE
  summary: CLI for interacting with LangGraph API
  description: |
    CLI for interacting with LangGraph API
  repository: https://github.com/langchain-ai/langgraph/tree/main/libs/cli

extra:
  recipe-maintainers:
    - rxm7706
