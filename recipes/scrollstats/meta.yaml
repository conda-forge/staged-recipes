{% set version = "0.1.3" %}

package:
  name: scrollstats
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/scrollstats-{{ version }}.tar.gz
  sha256: 4053ed6029e0857887e067f376faf892e1664ba359a60311cfeb0654c36c6c3f

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python >=3.10
    - hatchling
    - hatch-vcs
    - pip
  run:
    - python >=3.10
    - geopandas
    - matplotlib-base
    - scipy
    - rasterio
    - numba
    - tqdm
    - nptyping
    - lazy-loader

test:
  imports:
    - scrollstats
  commands:
    - pip check
  requires:
    - pip

about:
  home: https://pypi.org/project/scrollstats/
  summary: An open-source python library to calculate and extract morphometrics from scroll bar floodplains
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - AddYourGitHubIdHere
