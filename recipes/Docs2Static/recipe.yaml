# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  name: Docs2Static
  version: "0.6"
  python_min: "3.14"

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/${{ name[0] }}/${{ name }}/docs2static-${{ version }}.tar.gz
  sha256: 55db2d6b898b55132e191fc8cbeb6e0543b32509ac2302ab0e4533555888b745

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  python:
    entry_points:
      - docs2static = docs2static.main:main

requirements:
  host:
    - python ${{ python_min }}.*
    - hatchling
    - pip
  run:
    - python >=${{ python_min }},<4.0
    - colorlog >=6.10.1
    - python-dotenv >=1.2.1
    - requests >=2.32.5
    - requests-cache >=1.2.1
    - zensical >=0.0.17

tests:
  - python:
      imports:
        - docs2static
      pip_check: true
      python_version:
      - ${{ python_min }}.*
      - "*"
  - requirements:
      run:
        - pip
    script:
      - docs2static --help

about:
  summary: Fetch collaborative documents from a Docs instance and generate static sites with Zensical
  homepage: https://github.com/CoopCodeCommun/Docs2static
  repository: https://github.com/CoopCodeCommun/Docs2static
  license: Apache-2.0
  license_file: LICENSE

extra:
  recipe-maintainers:
    - rxm7706
