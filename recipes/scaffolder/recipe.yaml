schema_version: 1

context:
  version: "1.5.4"

package:
  name: scaffolder
  version: ${{ version }}

source:
  url: https://github.com/nodtem66/Scaffolder/archive/v${{ version }}.tar.gz
  sha256: 7912ce893dbf02aded3ffd5c7e4267bbbdbaa61513617db15c0cd9bbcdc2b515

build:
  number: 0
  script:
    env:
      SCAFFOLDER_VERSION: ${{ version }}
  
requirements:
  build:
    - ${{ compiler("c") }}
    - ${{ compiler("cxx") }}
    - ${{ stdlib("c") }}
    - cmake
    - ninja
  host:
    - if: unix
      then: ${{ openmp }}
  run:
    - if: unix
      then: ${{ openmp }}
  
tests:
  - script:
    - if: unix
      then:
        - test -f "${PREFIX}/bin/Scaffolder"
        - test -f "${PREFIX}/bin/Scaffolder.SliceTest"
    - if: win
      then:
        - if not exist "%LIBRARY_PREFIX%\bin\Scaffolder.exe" ( exit 1 )
        - if not exist "%LIBRARY_PREFIX%\bin\Scaffolder.SliceTest.exe" ( exit 1 )

about:
  homepage: https://nodtem66.github.io/Scaffolder
  license: GPL-3.0-only AND MIT AND MPL-2.0
  license_file:
    - LICENSE.txt
    - LICENSE_libigl-GPL.txt
    - LICENSE_libigl-MPL2.txt
    - LICENSE_openctm.txt
    - LICENSE_pybind11.txt
    - LICENSE_sol2.txt
    - LICENSE_vcglib.txt

  summary: Generate 3D mesh from implicit surface and an input mesh
  documentation: https://nodtem66.github.io/Scaffolder
  repository: https://github.com/nodtem66/Scaffolder
  description: |
    # Scaffolder
    
    ![GitHub Release](https://img.shields.io/github/v/release/nodtem66/scaffolder) ![GitHub last commit](https://img.shields.io/github/last-commit/nodtem66/Scaffolder) 
    [![PyPI - Version](https://img.shields.io/pypi/v/PyScaffolder)](https://pypi.org/project/PyScaffolder/) [![Socket Badge](https://socket.dev/api/badge/pypi/package/PyScaffolder/1.5.3?artifact_id=tar-gz)](https://socket.dev/pypi/package/PyScaffolder/overview/1.5.3/tar-gz)
    ![Scaffolder Logo](https://github.com/nodtem66/Scaffolder/raw/main/docs/images/scaffolder_logo.jpg)

    Transform a 3D model from STL/PLY/OFF/OBJ to a porous model with implicit function (e.g., Schwarz P/ Gyroid).

    | [Documentation](https://nodtem66.github.io/Scaffolder) | [Command line options](https://github.com/nodtem66/Scaffolder/releases/tag/v1.5.2) | [Python API](https://nodtem66.github.io/Scaffolder/python/) | [Example: TPMS with Python](https://nodtem66.github.io/Scaffolder/tutorial_2/) |
    | --- | ---- | ---- | ---- |

    Scaffolder is a computational geometry tool that transforms 3D models
    (STL/PLY/OFF/OBJ) into porous scaffolds using implicit surface functions
    such as Triply Periodic Minimal Surfaces (TPMS), including Schwarz P and
    Gyroid. It works by reading an input mesh, computing winding numbers to
    determine the implicit isosurface condition, generating the isosurface
    field on a grid, and constructing a manifold via Dual Marching Cubes.
    The resulting mesh is cleaned up and exported to the target 3D format.

    Scaffolder is published in Computer Methods and Programs in Biomedicine
    (doi:10.1016/j.cmpb.2021.106088) and is used in biomedical engineering
    for porous scaffold design. It also provides a Python library
    (PyScaffolder) installable via pip. Dependencies include libigl, vcglib,
    sol2 (Lua scripting), and OpenMP for threading.

    ## How it works
    - Read STL file and find the boundary box of STL mesh
    - Generate the grid and calculate the winding number with STL mesh
    - Use winding number to determine the condition for [implicit isosurface function](https://wewanttolearn.wordpress.com/2019/02/03/triply-periodic-minimal-surfaces/)
    - Generate the isosurface field in the grid
    - Perform [Dual marching cube](https://github.com/dominikwodniok/dualmc) to construct the manifold
    - Clean up the duplicated vertices or faces, and abandon the group of connected faces having the diameter below the setting
    - Export to the target 3D format

extra:
  recipe-maintainers:
    - nodtem66
