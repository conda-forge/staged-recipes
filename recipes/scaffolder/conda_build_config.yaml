c_compiler:
  - gcc # [linux]
  - clang # [osx]
  - vs2022 # [win]
c_compiler_version: # [unix]
  - 14 # [linux]
  - 19 # [osx]

cxx_compiler:
  - gxx # [linux]
  - clangxx # [osx]
  - vs2022 # [win]
cxx_compiler_version: # [unix]
  - 14 # [linux]
  - 19 # [osx]

c_stdlib:
  - sysroot # [linux]
  - macosx_deployment_target # [osx]
  - vs # [win]
c_stdlib_version: # [unix]
  - 2.17 # [linux]
  - 11.0 # [osx and arm64]

MACOSX_DEPLOYMENT_TARGET:      # [osx]
  - 11.0                       # [osx and arm64]