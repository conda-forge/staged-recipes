schema_version: 1

context:
  name: sphinx-rustdoc-postprocess
  version: "0.1.0"

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/s/sphinx-rustdoc-postprocess/sphinx_rustdoc_postprocess-${{ version }}.tar.gz
  sha256: 6da5c09df398159edc2c18e53c9fe524ece87bffed8bde9e3f826a7a37aa96c6

build:
  noarch: python
  number: 0
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - hatchling
    - hatch-vcs
  run:
    - python >=${{ python_min }}
    - sphinx >=7

tests:
  - python:
      imports:
        - sphinx_rustdoc_postprocess
      python_version:
        - ${{ python_min }}.*
        - "*"
      pip_check: true

about:
  homepage: https://github.com/HaoZeke/sphinx-rustdoc-postprocess
  summary: Helper for including Rust sources into Sphinx docs
  license: MIT
  license_file: LICENSE
  repository: https://github.com/HaoZeke/sphinx-rustdoc-postprocess

extra:
  recipe-maintainers:
    - HaoZeke
