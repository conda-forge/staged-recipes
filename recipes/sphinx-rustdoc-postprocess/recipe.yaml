schema_version: 1

context:
  name: sphinx-rustdoc-postprocess
  version: "0.1.0"

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://files.pythonhosted.org/packages/14/02/2f77f4bcb709891aeb9f970b9038f8c135a06e36affdc57e487c91b8b9d3/sphinx_rustdoc_postprocess-0.1.0.tar.gz
  sha256: 6da5c09df398159edc2c18e53c9fe524ece87bffed8bde9e3f826a7a37aa96c6

build:
  noarch: python
  number: 0
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python
    - pip
    - setuptools
  run:
    - python
    - sphinx >=7

tests:
  - python:
      imports:
        - sphinx_rustdoc_postprocess
      pip_check: true

about:
  homepage: https://github.com/HaoZeke/sphinx-rustdoc-postprocess
  summary: Helper for including Rust sources into Sphinx docs
  license: MIT
  license_file: LICENSE
  repository: https://github.com/HaoZeke/sphinx-rustdoc-postprocess

extra:
  recipe-maintainers:
    - HaoZeke
