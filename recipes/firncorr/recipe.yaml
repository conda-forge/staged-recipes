schema_version: 1

context:
  name: FirnCorr
  version: "0.0.1"
  sha256: da2b3a8aeaae75728127e26319474546b3d08aa9ca822c3766850741a9fd8076

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/${{ name[0] }}/${{ name }}/${{ name|lower }}-${{ version }}.tar.gz
  sha256: ${{ sha256 }}

build:
  noarch: python
  script:
    - ${{ PYTHON }} -m pip install . -vv
  number: 0
  python:
    entry_points:
      - fetch_gemb.py = FirnCorr.datasets.fetch_gemb:main
      - fetch_gsfcfdm.py = FirnCorr.datasets.fetch_gsfcfdm:main
      - fetch_gesdisc.py = FirnCorr.datasets.fetch_gesdisc:main
      - fetch_mar.py = FirnCorr.datasets.fetch_mar:main

requirements:
  host:
    - python ${{ python_min }}.*
    - setuptools >=77
    - pip
  run:
    - dask
    - h5netcdf
    - ipyleaflet
    - ipywidgets
    - jupyterlab
    - lxml
    - matplotlib-base
    - numpy
    - pint
    - platformdirs
    - pyproj >=2.5.0
    - python >=${{ python_min }}
    - scipy >=1.10.1
    - timescale >=0.1.1
    - xarray

tests:
  - python:
      imports:
        - FirnCorr
      python_version: ${{ python_min }}.*
  - requirements:
      run:
        - pip
        - python ${{ python_min }}.*
    script:
      - pip check
      - fetch_gemb.py --help
      - fetch_gsfcfdm.py --help
      - fetch_gesdisc.py --help
      - fetch_mar.py --help

about:
  summary: Python-based SMB and firn correction software
  license: MIT
  license_file: LICENSE
  description: |
    Python-based tools for correcting data for surface mass balance and firn processes
  homepage: https://github.com/tsutterley/FirnCorr
  repository: https://github.com/tsutterley/FirnCorr
  documentation: https://firncorr.readthedocs.io/

extra:
  recipe-maintainers:
    - tsutterley
