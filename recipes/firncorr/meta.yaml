{% set name = "FirnCorr" %}
{% set version = "0.0.1" %}
{% set sha256 = "da2b3a8aeaae75728127e26319474546b3d08aa9ca822c3766850741a9fd8076" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name|lower }}-{{ version }}.tar.gz
  sha256: {{ sha256 }}

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0
  entry_points:
    - fetch_gemb.py = FirnCorr.datasets.fetch_gemb:main
    - fetch_gsfcfdm.py = FirnCorr.datasets.fetch_gsfcfdm:main
    - fetch_gesdisc.py = FirnCorr.datasets.fetch_gesdisc:main
    - fetch_mar.py = FirnCorr.datasets.fetch_mar:main

requirements:
  host:
    - python {{ python_min }}
    - setuptools >=77
    - pip
  run:
    - python >=3.9
    - h5netcdf
    - lxml
    - numpy
    - pint
    - platformdirs
    - pyproj >=2.5.0
    - python >={{ python_min }}
    - scipy >=1.10.1
    - timescale >=0.1.1
    - xarray

test:
  imports:
    - FirnCorr
  commands:
    - pip check
    - fetch_gemb.py --help
    - fetch_gsfcfdm.py --help
    - fetch_gesdisc.py --help
    - fetch_mar.py --help
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://github.com/tsutterley/FirnCorr
  summary: Python-based SMB and firn correction software
  description: |
    Python-based tools for correcting data for surface mass balance and firn processes
  doc_url: https://firncorr.readthedocs.io
  dev_url: https://github.com/tsutterley/FirnCorr
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - tsutterley
