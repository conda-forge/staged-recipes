schema_version: 1

context:
  version: "0.7.0a0"

package:
  name: json-logic
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/j/json-logic/json_logic-${{ version }}.tar.gz
  sha256: 84580b974bcfec7b00d63745f19ca363939fc2b93c579f578d41d7d10c12fe0c

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - setuptools
  run:
    - python >=${{ python_min }}

tests:
  - python:
      imports:
        - json_logic
      pip_check: true
      python_version: ${{ python_min }}.*

about:
  summary: Build complex rules, serialize them as JSON, and execute them in Python
  license: MIT
  license_file: LICENSE
  homepage: https://github.com/nadirizr/json-logic-py

extra:
  recipe-maintainers:
    - synapticarbors
