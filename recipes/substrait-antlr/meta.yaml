{% set name = "substrait-antlr" %}
{% set version = "0.85.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/substrait_antlr-{{ version }}.tar.gz
  sha256: caf7197e065f9d50b51e8aca6607abd24219ce82dbf4e5a5f70eb711388436c2

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - pip
    - setuptools >=80
  run:
    - python >={{ python_min }}
    - antlr4-python3-runtime >=4.13,<5

test:
  imports:
    - substrait_antlr.substrait_type.SubstraitTypeParser
  commands:
    - pip check
  requires:
    - python {{ python_min }}
    - pip

about:
  home: https://substrait.io
  summary: Generated Substrait ANTLR Parser Code
  license: Apache-2.0
  license_file: LICENSE
  dev_url: https://github.com/substrait-io/substrait-packaging

extra:
  recipe-maintainers:
    - nielspardon
