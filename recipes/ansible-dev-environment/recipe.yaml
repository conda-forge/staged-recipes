schema_version: 1

context:
  version: "26.4.0"
  python_min: "3.10"

package:
  name: ansible-dev-environment
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/a/ansible-dev-environment/ansible_dev_environment-${{ version }}.tar.gz
  sha256: 03f53108b7b81d8d31914f9bf49d1b06d291b6135e0a81675f2515e8ea70493e

build:
  noarch: python
  number: 0
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  python:
    entry_points:
      - ade = ansible_dev_environment.cli:main

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - setuptools_scm <10.0.0,>=8.4
    - setuptools >=80
  run:
    - python >=${{ python_min }}
    - ansible-builder >=3.1.0
    - bindep >=2.13.0
    - pyyaml >=6.0.1
    - subprocess-tee >=0.4.2

tests:
  - python:
      imports:
        - ansible_dev_environment
      python_version: ${{ python_min }}.*
      pip_check: true

about:
  summary: |
    A pip-like ansible collection installer.
  homepage: https://pypi.org/project/ansible-dev-environment/
  repository: https://pypi.org/project/ansible-dev-environment/
  license: GPL-3.0-only
  license_file: LICENSE

extra:
  recipe-maintainers:
    - killua156
    - mgorny
