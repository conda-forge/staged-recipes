context:
  name: readcon-core
  version: "0.13.1"

package:
  name: ${{ name }}
  version: ${{ version }}

source:
  url: https://github.com/lode-org/${{ name }}/archive/refs/tags/v${{ version }}.tar.gz
  sha256: a261e69b87228dcc8f161eef800590b0395b4c93605b838c6216d40a1780f0bf

build:
  number: 0

requirements:
  build:
    - ${{ compiler('c') }}
    - ${{ compiler('rust') }}
    - ${{ stdlib('c') }}
    - cargo-auditable
    - cargo-bundle-licenses
    - cargo-c
  # Shared C ABI: allow patch within the same 0.y minor (0.x semver may break on minor bumps).
  # Peers: lol-html uses x.x.x (stable major); rav1e uses x.x for similar pre/minor-sensitive libs.
  run_exports:
    - ${{ pin_subpackage('readcon-core', upper_bound='x.x') }}

tests:
  - package_contents:
      files:
        - if: linux
          then:
            - lib/libreadcon_core.so
            - include/readcon-core.h
            - include/readcon-core.hpp
            - lib/pkgconfig/readcon-core.pc
        - if: osx
          then:
            - lib/libreadcon_core.dylib
            - include/readcon-core.h
            - include/readcon-core.hpp
            - lib/pkgconfig/readcon-core.pc
        - if: win
          then:
            - Library/bin/readcon_core.dll
            - Library/lib/readcon_core.dll.lib
            - Library/include/readcon-core.h
            - Library/include/readcon-core.hpp
            - Library/lib/pkgconfig/readcon-core.pc

about:
  homepage: https://github.com/lode-org/readcon-core
  summary: CON file reader/writer in Rust with C FFI bindings
  description: |
    readcon-core is a Rust library for reading and writing CON (coordinate)
    files used in computational chemistry. It provides C FFI bindings for
    ergonomic C/C++ usage, supporting both single-frame and multi-frame
    files with mmap-based I/O for large files.
  license: MIT
  license_file:
    - LICENSE
    - THIRDPARTY.yml
  repository: https://github.com/lode-org/readcon-core
  documentation: https://lode-org.github.io/readcon-core/

extra:
  recipe-maintainers:
    - HaoZeke
