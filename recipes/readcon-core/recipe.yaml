context:
  name: readcon-core
  version: "0.4.4"

package:
  name: ${{ name }}
  version: ${{ version }}

source:
  url: https://github.com/lode-org/${{ name }}/archive/refs/tags/v${{ version }}.tar.gz
  sha256: c2579b7dab8f25b201a11933703288aeceaea6fb02b5a193fbcb91a8994e1bad

build:
  number: 0

requirements:
  build:
    - ${{ compiler('c') }}
    - ${{ compiler('rust') }}
    - ${{ stdlib('c') }}
    - cargo-bundle-licenses
    - meson >=1.8.0
    - ninja
    - cbindgen >=0.29.0
    - python
  host: []
  run: []

tests:
  - script:
    - if: unix
      then:
        - test -f $PREFIX/include/readcon-core.h
        - test -f $PREFIX/share/pkgconfig/meson-readcon-core.pc
    - if: win
      then:
        - if exist %LIBRARY_INC%\readcon-core.h (exit 0) else (exit 1)

about:
  homepage: https://github.com/lode-org/readcon-core
  summary: CON file reader/writer in Rust with C FFI bindings
  description: |
    readcon-core is a Rust library for reading and writing CON (coordinate)
    files used in computational chemistry. It provides C FFI bindings for
    ergonomic C/C++ usage, supporting both single-frame and multi-frame
    files with mmap-based I/O for large files.
  license: MIT
  license_file:
    - LICENSE
    - THIRDPARTY.yml
  repository: https://github.com/lode-org/readcon-core
  documentation: https://lode-org.github.io/readcon-core/

extra:
  recipe-maintainers:
    - HaoZeke
