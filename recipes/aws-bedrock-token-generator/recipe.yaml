schema_version: 1

context:
  version: "1.1.0"

package:
  name: aws-bedrock-token-generator
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/a/aws-bedrock-token-generator/aws_bedrock_token_generator-${{ version }}.tar.gz
  sha256: 95ccb07f63a91ac486561f6df05cc4e04784c8ff5086dc687ed9c5fd3ab1b5ba

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - setuptools >=45
    - wheel
    - setuptools-scm >=6.2
    - pip
  run:
    - python >=${{ python_min }}
    - botocore >=1.33.0

tests:
  - python:
      imports:
        - aws_bedrock_token_generator
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  summary: A lightweight library for generating short-term bearer tokens for AWS Bedrock API authentication
  # readme
  license: Apache-2.0
  license_file:
    - NOTICE
    - LICENSE.txt
  homepage: https://github.com/aws/aws-bedrock-token-generator-python
  documentation: https://github.com/aws/aws-bedrock-token-generator-python

extra:
  recipe-maintainers:
    - janjagusch
