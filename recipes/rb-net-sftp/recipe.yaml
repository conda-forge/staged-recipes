context:
  gem_name: "net-sftp"
  version: "4.0.0"

package:
  name: rb-${{ gem_name }}
  version: ${{ version }}

source:
  url: https://rubygems.org/downloads/${{ gem_name }}-${{ version }}.gem
  sha256: 65bb91c859c2f93b09826757af11b69af931a3a9155050f50d1b06d384526364

build:
  noarch: generic
  number: 0
  script: build

requirements:
  host:
    - ruby
  run:
    - ruby
    - rb-net-ssh >=5.0.0,<8.0.0

tests:
  - script:
      - ruby -r net/sftp -e "exit 0"

about:
  homepage: https://rubygems.org/gems/${{ gem_name }}
  summary: A pure-Ruby implementation of the SFTP protocol.
  license: MIT
  license_file: ${{ gem_name }}-${{ version }}/LICENSE.txt
  repository: https://github.com/net-ssh/net-sftp

extra:
  recipe-maintainers:
    - aktech
