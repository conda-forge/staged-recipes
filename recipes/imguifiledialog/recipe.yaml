context:
  name: imguifiledialog
  version: "0.6.7"

package:
  name: ${{ name }}
  version: ${{ version }}

source:
  - url: https://github.com/aiekick/ImGuiFileDialog/archive/v${{ version }}.tar.gz
    sha256: 136e714965afaec2bac857bf46a653fdd74a0bf493e281682706c604113026b8
  - path: CMakeLists.txt

build:
  number: 0

requirements:
  build:
    - ${{ compiler('cxx') }}
    - ${{ stdlib("c") }}
    - cmake
    - ninja
  host:
    - imgui-docking
    - if: win
      then: freetype
  run:
    - imgui-docking
  run_exports:
    - ${{ pin_subpackage('imguifiledialog', upper_bound='x.x.x') }}

tests:
  - package_contents:
      lib:
        - ImGuiFileDialog

about:
  summary: File dialog for Dear ImGui
  license: MIT
  license_file: LICENSE
  homepage: https://github.com/aiekick/ImGuiFileDialog

extra:
  recipe-maintainers:
    - julian-belina
