schema_version: 1

context:
  version: "12.0"

package:
  name: pyobjc-framework-coreaudio
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/p/pyobjc-framework-CoreAudio/pyobjc_framework_coreaudio-${{ version }}.tar.gz
  sha256: 19741907d2d80a658d3721140eb998061007955323b427afca67eda0e2ad3215

build:
  number: 0
  skip: not osx
  script:
    content:
      # force pyobjc to use conda-forge's chosen SDK
      - export CFLAGS="${CFLAGS} -isysroot ${SDKROOT:-$CONDA_BUILD_SYSROOT}"
      - ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  build:
    - ${{ stdlib('c') }}
    - ${{ compiler('c') }}
  host:
    - python
    - pip
    - setuptools
    - wheel
  run:
    # upstream metadata only requires >=12.0; the <13 cap guards against
    # mixing pyobjc major versions, which are released and ABI-matched in
    # lockstep
    - python
    - pyobjc-core >=${{ version }},<13
    - pyobjc-framework-cocoa >=${{ version }},<13

tests:
  - python:
      imports:
        - CoreAudio
      pip_check: true

about:
  summary: Wrappers for the framework CoreAudio on macOS
  description: |
    PyObjC wrappers for Apple's CoreAudio framework, giving Python access
    to the macOS audio hardware abstraction layer (audio devices, streams,
    and their properties). Part of the PyObjC project, which provides
    bridges between Python and Objective-C frameworks on macOS.
  license: MIT
  license_file: License.txt
  homepage: https://pyobjc.readthedocs.io/
  repository: https://github.com/ronaldoussoren/pyobjc
  documentation: https://pyobjc.readthedocs.io/

extra:
  recipe-maintainers:
    - ruben-arts
