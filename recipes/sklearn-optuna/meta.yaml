{% set version = "0.1.0a2" %}
{% set python_min = "3.11" %}

package:
  name: sklearn-optuna
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/s/sklearn-optuna/sklearn_optuna-{{ version }}.tar.gz
  sha256: 6505d9b39f804b8bdcb37c7c2ad50d502ec108e8229b8adbcea1ff4c7a7c3af5

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - hatchling
    - hatch-vcs
    - pip
  run:
    - python >={{ python_min }}
    - scikit-learn >=1.6.0
    - numpy >=1.26
    - optuna >=3.5
    - sklearn-wrap

test:
  imports:
    - sklearn_optuna
  commands:
    - pip check
    - pytest --help
  requires:
    - pip
    - pytest
    - python {{ python_min }}

about:
  home: https://github.com/stateful-y/sklearn-optuna
  summary: An Optuna integration for hyperparameter tuning in Scikit-Learn
  doc_url: https://sklearn-optuna.readthedocs.io
  license: Apache-2.0
  license_file: LICENSE

extra:
  recipe-maintainers:
    - gtauzin
