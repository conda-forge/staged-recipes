{% set version = "0.1.0a1" %}

package:
  name: sklearn-optuna
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/s/sklearn-optuna/sklearn_optuna-{{ version }}.tar.gz
  sha256: 5c59521f4d409e2656e2c542aec7fad767868c9752c8017bf4724cbb9acb0fbb

build:
  entry_points:
    - pytest = pytest:console_main
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python >=3.11
    - hatchling
    - hatch-vcs
    - pip
  run:
    - python >=3.11
    - scikit-learn >=1.6.0
    - numpy >=1.26
    - optuna >=3.5,<4.0
    - sklearn-wrap

test:
  imports:
    - sklearn_optuna
  commands:
    - pip check
    - pytest --help
  requires:
    - pip
    - python

about:
  home: https://github.com/stateful-y/sklearn-optuna
  summary: An Optuna integration for hyperparameter tuning in Scikit-Learn
  doc_url: https://sklearn-optuna.readthedocs.io
  license: Apache-2.0
  license_file: LICENSE

extra:
  recipe-maintainers:
    - gtauzin
