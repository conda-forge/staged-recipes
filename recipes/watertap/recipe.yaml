schema_version: 1

context:
  version: "1.7.0"

package:
  name: watertap
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/w/watertap/watertap-${{ version }}.tar.gz
  sha256: bb7a6c51d934214330f8029bc842fe9fbdc84feea49d4b268e9587909ce64a3a

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - setuptools >=64
    - pip
  run:
    - python >=${{ python_min }}
    - idaes-pse >=2.12.0
    - pyomo >=6.6.1
    - watertap-solvers
    - pyyaml
    - parameter-sweep >=0.2.0
    - numpy
    - pint <0.25

tests:
  - python:
      imports:
        - watertap
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  summary: WaterTAP modeling library
  license: BSD-3-Clause
  license_file: 
    - LICENSE.md
  homepage: https://github.com/watertap-org/watertap

extra:
  recipe-maintainers:
    - sufikaur
