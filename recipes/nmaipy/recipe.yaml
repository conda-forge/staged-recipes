schema_version: 1

context:
  name: nmaipy
  version: "4.4.5"
  python_min: "3.12"

package:
  name: ${{ name }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/n/nmaipy/nmaipy-${{ version }}.tar.gz
  sha256: 26a1e65f458a920a9d62a755659cc2e00be8f999587ac543bdad7f080170b1e3

build:
  noarch: python
  script: python -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - setuptools >=61.0
    - wheel
  run:
    - python >=${{ python_min }}
    - fsspec >=2025.3.0
    - geopandas >=1.1.1
    - numpy >=2.3.5
    - pandas >=2.3.3
    - psutil >=7.1.3
    - pyarrow >=20.0.0
    - pyproj >=3.7.2
    - python-dotenv >=1.2.1
    - requests >=2.32.5
    - rtree
    - s3fs >=2025.3.0
    - shapely >=2.1.1
    - stringcase >=1.2.0
    - tqdm >=4.67.1

tests:
  - python:
      imports:
        - nmaipy
      pip_check: true
      python_version: ${{ python_min }}.*

about:
  homepage: https://github.com/nearmap/nmaipy
  summary: Python library for extracting AI geospatial features from Nearmap aerial imagery
  license: Apache-2.0
  license_file: LICENSE
  repository: https://github.com/nearmap/nmaipy

extra:
  recipe-maintainers:
    - mbewley
    - bretttully
