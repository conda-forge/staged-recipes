schema_version: 1

context:
  version: "0.24.2"

package:
  name: tree-sitter-rust
  version: ${{ version }}

source:
  url: https://github.com/tree-sitter/tree-sitter-rust/archive/refs/tags/v${{ version }}.tar.gz
  sha256: 061e90a539a55a6aa65dceb0ad6425c50ab1a6e3e6d4ba430e2795ed4550f10e

build:
  number: 0
  # abi3 packages build once at python_min and ship one artifact per platform.
  skip: is_abi3 and not is_python_min
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  python:
    version_independent: ${{ is_abi3 }}

requirements:
  build:
    - ${{ compiler("c") }}
    - ${{ stdlib("c") }}
  host:
    - if: is_abi3
      then: python-abi3
    - python
    - pip
    - setuptools >=42
  run:
    - python

tests:
  - python:
      imports:
        - tree_sitter_rust
      # Verify the abi3 wheel works on the build-time Python AND the latest.
      python_version:
        - if: is_abi3
          then: ${{ python_min }}.*
        - "*"
  - if: is_abi3
    then:
      requirements:
        run:
          - abi3audit
      script:
        - if: unix
          then: abi3audit $SP_DIR/tree_sitter_rust/_binding.abi3.so -s -v --assume-minimum-abi3 ${{ python_min }}
          else: abi3audit %SP_DIR%/tree_sitter_rust/_binding.pyd -s -v --assume-minimum-abi3 ${{ python_min }}

about:
  homepage: https://github.com/tree-sitter/tree-sitter-rust
  summary: Rust grammar for tree-sitter
  license: MIT
  license_file: LICENSE
  repository: https://github.com/tree-sitter/tree-sitter-rust

extra:
  recipe-maintainers:
    - killua156
    - mgorny
