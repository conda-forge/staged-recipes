# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  name: tree-sitter-rust
  version: "0.24.2"

package:
  name: ${{ name }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/t/${{ name }}/tree_sitter_rust-${{ version }}.tar.gz
  sha256: 54fb02a5911e345308b405174465112479f56dc39e3f1e7744d7568595f00db9

build:
  number: 0
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  build:
    - if: build_platform != host_platform
      then:
        - python
        - cross-python_${{ target_platform }}
    - ${{ compiler('c') }}
    - ${{ stdlib('c') }}
  host:
    - python
    - setuptools >=42
    - wheel
    - pip
  run:
    - python

tests:
  - python:
      imports:
        - tree_sitter_rust
      pip_check: true

about:
  summary: Rust grammar for tree-sitter
  license: MIT
  license_file: LICENSE
  homepage: https://github.com/tree-sitter/tree-sitter-rust

extra:
  recipe-maintainers:
    - rxm7706
