schema_version: 1

context:
  version: "0.24.2"

package:
  name: tree-sitter-rust
  version: ${{ version }}

source:
  url: https://github.com/tree-sitter/tree-sitter-rust/archive/refs/tags/v${{ version }}.tar.gz
  sha256: 061e90a539a55a6aa65dceb0ad6425c50ab1a6e3e6d4ba430e2795ed4550f10e

build:
  number: 0
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  build:
    - ${{ compiler("c") }}
  host:
    - python
    - pip
    - setuptools >=42
    - wheel
  run:
    - python

tests:
  - python:
      imports:
        - tree_sitter_rust

about:
  homepage: https://github.com/tree-sitter/tree-sitter-rust
  summary: Rust grammar for tree-sitter
  license: MIT
  license_file: LICENSE
  repository: https://github.com/tree-sitter/tree-sitter-rust

extra:
  recipe-maintainers:
    - killua156
    - mgorny
