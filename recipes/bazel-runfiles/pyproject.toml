[build-system]
requires = ["setuptools"]
build-backend = "setuptools.build_meta"

[project]
name = "bazel-runfiles"
version = "0.0.0"
requires-python = ">=3.7"

[tool.setuptools]
packages = ["runfiles"]

[tool.setuptools.package-dir]
runfiles = "."

[tool.setuptools.package-data]
runfiles = ["py.typed"]
