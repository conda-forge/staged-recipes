[build-system]
requires = ["setuptools", "setuptools-scm"]
build-backend = "setuptools.build_meta"

[project]
name = "bazel-runfiles"
dynamic = ["version"]
description = "A Bazel Runfiles lookup library for Bazel-built Python binaries and tests."
readme = "README.md"
requires-python = ">=3.7"
classifiers = [
    "Development Status :: 5 - Production/Stable",
    "License :: OSI Approved :: Apache Software License",
]

[project.urls]
Homepage = "https://github.com/bazel-contrib/rules_python"

[tool.setuptools]
packages = ["runfiles"]

[tool.setuptools.package-dir]
runfiles = "."

[tool.setuptools.package-data]
runfiles = ["py.typed"]

[tool.setuptools_scm]
