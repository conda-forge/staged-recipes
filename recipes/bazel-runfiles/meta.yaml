{% set name = "bazel-runfiles" %}
{% set version = "2.0.1" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://files.pythonhosted.org/packages/47/6e/4ae69d9e1eebc517e7a19e711fcb0c093c9a9b23c8ec31ae92fad430a13a/bazel_runfiles-{{ version }}-py3-none-any.whl
  sha256: bcd10a7eb418140575039eeb2446ba4d64bf82ff52ac0f9cfb34c3d7d4277705

build:
  noarch: python
  number: 0
  script: {{ PYTHON }} -m pip install --no-deps --no-build-isolation *.whl -vv

requirements:
  host:
    - python {{ python_min }}
    - pip
    - setuptools
  run:
    - python >={{ python_min }}

test:
  imports:
    - runfiles
  requires:
    - python {{ python_min }}
    - pip
  commands:
    - pip check

about:
  home: https://github.com/bazel-contrib/rules_python
  summary: A Bazel Runfiles lookup library for Bazel-built Python binaries and tests.
  license: Apache-2.0
  license_file: LICENSE
  dev_url: https://github.com/bazel-contrib/rules_python

extra:
  recipe-maintainers:
    - ctcjab
