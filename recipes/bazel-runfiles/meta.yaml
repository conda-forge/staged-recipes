{% set name = "bazel-runfiles" %}
{% set version = "2.0.1" %}
{% set python_min = "3.10" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://github.com/bazel-contrib/rules_python/archive/refs/tags/{{ version }}.tar.gz
  sha256: d4dd58e857a7c1bfc7da68adaef1178a20b197b1176c877afd2373369857e65c

build:
  noarch: python
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - pip
    - setuptools
  run:
    - python >={{ python_min }}

test:
  imports:
    - runfiles
  requires:
    - python {{ python_min }}
    - pip
  commands:
    - pip check

about:
  home: https://github.com/bazel-contrib/rules_python
  summary: A Bazel Runfiles lookup library for Bazel-built Python binaries and tests.
  license: Apache-2.0
  license_file: LICENSE
  dev_url: https://github.com/bazel-contrib/rules_python

extra:
  recipe-maintainers:
    - ctcjab
