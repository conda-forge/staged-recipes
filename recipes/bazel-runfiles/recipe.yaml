schema_version: 1

context:
  version: "2.2.0"

package:
  name: bazel-runfiles
  version: ${{ version }}

source:
  # The runfiles library lives in the rules_python repo, which builds its PyPI
  # wheel with Bazel's own py_wheel rule and so carries no Python packaging
  # metadata of its own. Rather than building with Bazel, we drop the minimal
  # pyproject.toml shipped next to this recipe into the source tree and let
  # pip/setuptools do the rest; the version is injected via
  # SETUPTOOLS_SCM_PRETEND_VERSION in the build script below.
  - url: https://github.com/bazel-contrib/rules_python/releases/download/${{ version }}/rules_python-${{ version }}.tar.gz
    sha256: e11d2e1efce1589e5bdfa93986712c74fc7467a0f093143d489d2ef5ebb1ed2a
  - path: pyproject.toml
    target_directory: python/runfiles
  # The official Bazel-built wheel from PyPI, fetched as a checksum-pinned
  # source so the parity test below can compare against it with no network
  # access in the (network-isolated) test environment. file_name keeps it as a
  # file rather than extracting it as an archive. The version-predictable PyPI
  # download URL (which redirects to files.pythonhosted.org) is used rather
  # than the content-addressed one so the autotick-bot can re-resolve and
  # re-hash it on a version bump.
  - url: https://pypi.org/packages/py3/b/bazel-runfiles/bazel_runfiles-${{ version }}-py3-none-any.whl
    sha256: d64a1ba0e7d58a4a48f233fc26147248b40bbdcad37aa7ef48734c0191908b42
    file_name: reference.whl

build:
  noarch: python
  number: 0
  script:
    content: python -m pip install ./python/runfiles --no-deps --no-build-isolation -vv
    env:
      SETUPTOOLS_SCM_PRETEND_VERSION: ${{ version }}

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - setuptools
    - setuptools-scm
  run:
    - python >=${{ python_min }}

tests:
  - python:
      imports:
        - runfiles
      python_version: ${{ python_min }}.*
      pip_check: true
  # Compare the installed payload and metadata against the Bazel-built wheel
  # upstream publishes to PyPI (carried in from the reference.whl source), so
  # any upstream packaging change is caught here instead of drifting silently.
  - script:
      - python test_wheel_parity.py reference.whl
    files:
      source:
        - reference.whl
      recipe:
        - test_wheel_parity.py
    requirements:
      run:
        - python ${{ python_min }}.*

about:
  homepage: https://github.com/bazel-contrib/rules_python
  summary: A Bazel Runfiles lookup library for Bazel-built Python binaries and tests.
  license: Apache-2.0
  license_file: LICENSE
  repository: https://github.com/bazel-contrib/rules_python

extra:
  recipe-maintainers:
    - ctcjab
