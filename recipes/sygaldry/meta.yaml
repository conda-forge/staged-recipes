{% set version = "0.4.0" %}

package:
  name: sygaldry
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/s/sygaldry/sygaldry-{{ version }}.tar.gz
  sha256: 03b639da41a07cca961eeb6aa29a875894a46d6f4c0508923a848f222b9fb63c

build:
  entry_points:
    - sygaldry = sygaldry.cli:cli
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python
    - hatchling
    - pip
  run:
    - python
    - pyyaml >=6.0.3,<7
    - click >=8.0,<9
    - rich-click >=1.7,<2
    - tomli  # [ py == 310 ]

test:
  imports:
    - sygaldry
  commands:
    - pip check
    - sygaldry --help
  requires:
    - pip
    - python

about:
  home: https://pypi.org/project/sygaldry/
  summary: Build arbitrary Python objects from YAML or TOML configuration files.
  doc_url: https://sygaldry.art
  license: MIT
  license_family: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - RohanDalton
