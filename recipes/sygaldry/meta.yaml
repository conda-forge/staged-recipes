{% set version = "0.3.0" %}

package:
  name: sygaldry
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/s/sygaldry/sygaldry-{{ version }}.tar.gz
  sha256: 0e50a577eede1504183e1ef0d79cb7c1f2ceeae451fa546e650d3c135730fd38

build:
  entry_points:
    - sygaldry = sygaldry.cli:cli
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python
    - hatchling
    - pip
  run:
    - python
    - click >=8.0,<9
    - pyyaml >=6.0.3,<7
    - rich-click >=1.7,<2
    - tomli   # [ py == 310 ]

test:
  imports:
    - sygaldry
  commands:
    - pip check
    - sygaldry --help
  requires:
    - pip
    - python

about:
  doc_url: https://sygaldry.art
  home: https://pypi.org/project/sygaldry/
  license: MIT
  license_family: MIT
  license_file: LICENSE
  summary: Build arbitrary Python objects from YAML or TOML configuration files.

extra:
  recipe-maintainers:
    - RohanDalton
