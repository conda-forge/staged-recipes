{% set version = "0.4.0" %}

package:
  name: flacarray
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/f/flacarray/flacarray-{{ version }}.tar.gz
  sha256: 6da027423733972ce542108d197aff579a089c5c92d480930138f3ce81d02aeb

build:
  number: 0
  skip: true  # [win]
  script_env:
    - SETUPTOOLS_SCM_PRETEND_VERSION={{ version }}
  script:
    - {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  build:
    - {{ compiler('c') }}
    - {{ stdlib('c') }}
    - cmake
    - ninja
    - make
  host:
    - python
    - pip
    - scikit-build-core
    - cython
    - cython-cmake
    - setuptools >=61
    - setuptools-scm >7.0
    - numpy
    - libflac
    - libgomp  # [linux]
    - llvm-openmp  # [osx]
  run:
    - python
    - numpy
    - h5py
    - zarr

test:
  requires:
    - mpi4py
  commands:
    - OMP_NUM_THREADS=2 python -c 'import flacarray.tests; flacarray.tests.run()'
    - OMP_NUM_THREADS=1 mpirun -np 2 python -c 'import flacarray.tests; flacarray.tests.run()'

about:
  home: https://github.com/hpc4cmb/flacarray
  summary: Tools for FLAC compression of numpy arrays.
  description: |
    Flacarray provides a set of tools for compressing multi-dimensional arrays 
    where the last array dimension consists of "streams" of data. These streams 
    are compressed with the FLAC algorithm and can be written to different file 
    formats as well as decompressed back into numpy arrays.  This package is
    NOT intended for use with audio data.
  license: BSD-2-Clause
  license_family: BSD
  license_file: LICENSE
  doc_url: https://hpc4cmb.github.io/flacarray
  dev_url: https://github.com/hpc4cmb/flacarray

extra:
  recipe-maintainers:
    - tskisner
