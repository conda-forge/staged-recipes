schema_version: 1

context:
  version: "1.0.3"

package:
  name: "abscab-cpp"
  version: ${{ version }}

source:
  url: https://github.com/jonathanschilling/abscab-cpp/archive/refs/tags/v${{ version }}.tar.gz
  sha256: d7d4d8060117ac047ca7a3c5824f79cc7d8f42c538e542946650b188c7d2e145

build:
  number: 0
  skip:
    # Windows can be supported, but skipping for simplicity
    - win
  script:
    # Repository uses Bazel, but building manually to avoid having to use Bazel in conda-forge
    - cd ./abscab
    - $CXX ./abscab.cc -o $PREFIX/lib/libabscab${SHLIB_EXT} $CXXFLAGS -shared $LDFLAGS
    - mkdir -p $PREFIX/include/abscab-cpp
    - mv ./abscab.hh $PREFIX/include/abscab-cpp/

requirements:
  run_exports:
    - ${{ pin_subpackage("abscab-cpp", upper_bound="x.x") }}
  build:
    - ${{ stdlib("c") }}
    - ${{ compiler("cxx") }}
  # c.f. https://conda-forge.org/docs/maintainer/knowledge_base/#openmp
  # Run exports from the host packages ensure that OpenMP runtime is available
  host:
    - if: linux
      then: libgomp
    - if: osx
      then: llvm-openmp

tests:
  - package_contents:
      strict: true
      lib:
        - abscab
      include:
        - abscab-cpp/abscab.hh
      files:
        - etc/conda/test-files/abscab-cpp/*

  - files:
      source:
        - abscab/demo_abscab.cc
        - test_util/test_util.hh
        - test_util/test_util.cc
    requirements:
      run:
        - ${{ compiler("cxx") }}
        - sed
    script:
      - mv ./abscab/demo_abscab.cc .
      - sed -i 's|abscab-cpp/||g' demo_abscab.cc
      - sed -i 's|abscab-cpp/||g' test_util/test_util.cc
      - $CXX ./demo_abscab.cc ./test_util/test_util.cc -o ./DemoAbscab $CXXFLAGS -I${CONDA_PREFIX}/include/abscab-cpp -I. -fopenmp $LDFLAGS -labscab
      - ./DemoAbscab

about:
  summary: Accurate Biot-Savart routines with Correct Asymptotic Behaviour (C++)
  license: Apache-2.0
  license_file: LICENSE
  homepage: https://github.com/jonathanschilling/abscab-cpp
  repository: https://github.com/jonathanschilling/abscab-cpp
  documentation: https://github.com/jonathanschilling/abscab-cpp


extra:
  recipe-maintainers:
    - matthewfeickert
