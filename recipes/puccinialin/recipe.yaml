schema_version: 1

context:
  python_min: 3.9
  version: 0.1.12

package:
  name: puccinialin
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/p/puccinialin/puccinialin-${{ version }}.tar.gz
  sha256: fcee002b222dffef0898715ea16213a72e8b44f2d8bed9332f82bcb502ac07d3

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  python:
    entry_points:
      - puccinialize = puccinialin.__main__:main

requirements:
  host:
    - python ${{ python_min }}.*
    - flit-core >=3.2,<4
    - pip
  run:
    - python >=${{ python_min }}
    - filelock >=3.19.1,<4.0.0
    - httpx >=0.28.1,<0.29
    - platformdirs >=4.3.6,<5
    - tqdm >=4.67.1,<5

tests:
  - python:
      imports:
        - puccinialin
  - requirements:
      run:
        - pip
        - python ${{ python_min }}.*
    script:
      - pip check
      - puccinialize --help

about:
  summary: Install rust into a temporary directory for boostrapping a rust-based build backend
  license: MIT AND Apache-2.0
  license_file:
    - license-apache
    - license-mit
  homepage: https://pypi.org/project/puccinialin/

extra:
  recipe-maintainers:
    - imagejan
