{% set version = "0.1.0" %}

package:
  name: babelwrap
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/b/babelwrap/babelwrap-{{ version }}.tar.gz
  sha256: d0341a34927f1c548a3491eeadc36a2dfac24c42291dc73977dfbfcae8d68ec2

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python >=3.10
    - setuptools >=75
    - pip
  run:
    - python >=3.10
    - httpx >=0.27

test:
  imports:
    - babelwrap
  commands:
    - pip check
  requires:
    - pip
    - python

about:
  home: https://babelwrap.com
  summary: Python SDK for the BabelWrap API — the web, as an API, for your agents.
  doc_url: https://babelwrap.com/docs/quickstart
  dev_url: https://github.com/babelwrap/babelwrap-python
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - soulfir
