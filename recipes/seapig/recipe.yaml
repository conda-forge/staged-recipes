context:
  version: "0.1.0"
  python_min: "3.11"

package:
  name: seapig
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/s/seapig/seapig-${{ version }}.tar.gz
  md5: a24cb6947ad555bc32f6ed718f268a04
  sha256: 722a7c8655f5f960b05a53b75401543e39f9d77f7b43234076b2db149134baad

build:
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python ${{ python_min }}.*
    - setuptools >=61
    - pip
  run:
    - python >=${{ python_min }}
    - numpy
    - pandas
    - pytorch
    - torchmetrics
    - tqdm
    - nmslib
    - lightning <=3.6.1
    - typing_extensions
    - matplotlib-base
    - pyod
    - umap-learn
    - scikit-learn
    - rich

tests:
  - python:
      python_version:
        - ${{ python_min }}.*
        - "*"
      imports:
        - seapig
  - requirements:
      run:
        - python ${{ python_min }}.*
        - pytest
    files:
      source:
        - tests/
    script:
      - pytest -q

about:
  homepage: https://www.seapig.dev
  repository: https://www.github.com/goergen95/seapig
  documentation: https://www.seapig.dev/reference
  license: MIT
  license_file: LICENSE
  summary: Selective prediction based on confidence scores
  description: |
    seapig provides confidence-based selective inference for deep learning models. Its main focus currently lies on analyzing latent representations. The library implements a small set of lightweight, composable confidence scores that are used to decide whether to accept or reject an individual query sample at prediction time.


extra:
  recipe-maintainers:
    - goergen95
