{% set name = "ebltable" %}
{% set version = "0.6.4" %}
{% set python_min = "3.8" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz
  sha256: 59358cd66c92e6adc8b4ef9be068b881b3ff644943d01d7e7a41b2f2e349d7fa

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - pip
    - setuptools >=45
    - setuptools-scm >=7
  run:
    - python >={{ python_min }}
    - numpy >=1.19
    - scipy >=1.7
    - astropy-base >=4.0

test:
  requires:
    - python {{ python_min }}
  imports:
    - ebltable
    - ebltable.ebl_from_model
    - ebltable.tau_from_model

about:
  home: https://github.com/me-manu/ebltable
  summary: Python package to read and interpolate EBL photon density tables and compute gamma-ray opacity
  description: |
    ebltable provides classes for reading, interpolating, and computing with
    tables of the Extragalactic Background Light (EBL) photon density and the
    resulting opacity for high-energy gamma rays. It supports multiple published
    EBL models and includes support for Lorentz invariance violation corrections.
  license: BSD-3-Clause
  license_file: LICENSE
  doc_url: https://ebltable.readthedocs.io
  dev_url: https://github.com/me-manu/ebltable

extra:
  recipe-maintainers:
    - me-manu
