{% set name = "rgtlib" %}
{% set version = "1.1.3" %}
{% set python_min = "3.12" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/rgtlib-{{ version }}.tar.gz
  sha256: 1dc03ad060bca27d3615751ddfe0d48aa73c3ebb65837fd8f9c1cd93c4e12806

build:
  entry_points:
    - ResponseGT = rgtlib.entrypoints:main_gui
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-build-isolation
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - setuptools >=80.9
    - wheel
    - pip
  run:
    - python >={{ python_min }}
    - numpy ==2.2.6
    - pandas ==2.3.2
    - scipy ==1.16.2
    - matplotlib-base ==3.10.6
    - opencv ==4.12.0
    - pillow ==11.3.0
    - pyside6 ==6.9.2
    - packaging ==25.0

test:
  imports:
    - rgtlib
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  summary: A software that computes electrical/mechanical flow within a graph network.
  home: https://github.com/owuordickson/response-gt
  license: GPL-3.0-only
  license_file: LICENSE
  description: A software that computes electrical/mechanical flow within a graph network.

extra:
  recipe-maintainers:
    - owuordickson