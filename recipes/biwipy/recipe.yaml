schema_version: 1

context:
  python_min: "3.9"
  version: "0.11.0"

package:
  name: biwipy
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/b/biwipy/biwipy-${{ version }}.tar.gz
  sha256: 369d0c43e1c86c74d922d114d56b92223876a54070f603faf5792166e6349418

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - setuptools >=61.0
    - pip
  run:
    - python >=${{ python_min }}
    - numpy
    - scipy
    - matplotlib-base
    - folium
    - herbie-data
    - rasterio
    - pygrib

tests:
  - python:
      imports:
        - biwipy
      pip_check: false
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  summary: "Biwipy: cycling performance simulation with GRIB wind data"
  license: MIT
  license_file: LICENSE
  homepage: https://github.com/jacme31/biwipy
  repository: https://github.com/jacme31/biwipy
  documentation: https://biwipy.readthedocs.io

extra:
  recipe-maintainers:
    - jacme31
