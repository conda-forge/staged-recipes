{% set python_min = "3.9" %}
{% set version = "0.11.0" %}

package:
  name: biwipy
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/b/biwipy/biwipy-{{ version }}.tar.gz
  sha256: 369d0c43e1c86c74d922d114d56b92223876a54070f603faf5792166e6349418

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python {{ python_min }}.*
    - setuptools >=61.0
    - wheel
    - pip
  run:
    - python >={{ python_min }}
    - numpy
    - scipy
    - matplotlib-base
    - folium
    - herbie-data
    - rasterio
    - pygrib

test:
  imports:
    - biwipy
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}.*

about:
  home: https://github.com/jacme31/biwipy
  summary: 'Biwipy: cycling performance simulation with GRIB wind data'
  doc_url: https://biwipy.readthedocs.io
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - jacme31
