schema_version: 1

context:
  python_min: "3.9"
  version: "0.10.1"

package:
  name: biwipy
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/b/biwipy/biwipy-${{ version }}.tar.gz
  sha256: 0881fb850a4e0291f832950c1af92fb99716e4e2c5f3f96674095a3cf1cebb63

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - setuptools >=61.0
    - wheel
    - pip
  run:
    - python >=${{ python_min }}
    - numpy
    - scipy
    - matplotlib-base
    - folium
    - herbie-data
    - rasterio
    - pygrib

tests:
  - python:
      imports:
        - biwipy
      pip_check: true
      python_version: ${{ python_min }}.*

about:
  summary: "Biwipy: cycling performance simulation with GRIB wind data"
  license: MIT
  license_file: PLEASE_ADD_LICENSE_FILE
  homepage: https://github.com/jacme31/biwipy
  documentation: https://biwipy.readthedocs.io

extra:
  recipe-maintainers:
    - jacme31
