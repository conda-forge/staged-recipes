{% set version = "1.2.4" %}

package:
  name: visioplot
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/v/visioplot/visioplot-{{ version }}.tar.gz
  sha256: 976f271020f7f55f392befff5bd88f8da01a326311941052c1361178aa8e718e

build:
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python
    - hatchling
    - pip
  run:
    - python
    - matplotlib-base
    - lxml
    - beautifulsoup4
    - pywin32  # [win]
    - matplotlib-inline

test:
  imports:
    - visioplot
  commands:
    - pip check
  requires:
    - pip
    - python

about:
  home: https://github.com/jchliao/visioplot
  summary: Matplotlib to editable SVG and Visio (VSDX) export toolkit
  license: MIT
  license_file: LICENSE
  dev_url: https://github.com/jchliao/visioplot
  doc_url: https://zread.ai/jchliao/visioplot

extra:
  recipe-maintainers:
    - jchliao
