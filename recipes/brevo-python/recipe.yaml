# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "4.0.10"

package:
  name: brevo-python
  version: ${{ version }}

source:
  - url: https://pypi.org/packages/source/b/brevo-python/brevo_python-${{ version }}.tar.gz
    sha256: 3ba2808937556b02d7afe4aaf6392438e1af3a8db77ef97349e46307bbf27311

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - poetry-core
  run:
    - python >=${{ python_min }}
    - httpx
    - pydantic
    - pydantic-core
    - typing_extensions

tests:
  - python:
      imports:
        - brevo
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  homepage: https://brevo.com
  license: MIT
  license_file: LICENSE
  summary: Python client for the Brevo (ex Sendinblue) transactional email API
  description: |
    brevo-python is the official Python client for the Brevo
    (formerly Sendinblue) transactional email and marketing API.
    It provides programmatic access to transactional email sending,
    contact management, SMS, automation workflows, and analytics
    endpoints.
  repository: https://github.com/getbrevo/brevo-python
  documentation: https://developers.brevo.com

extra:
  recipe-maintainers:
    - rxm7706
