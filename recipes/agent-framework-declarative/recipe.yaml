schema_version: 1

context:
  version: "1.0.0b260514"
  python_min: "3.10"

package:
  name: agent-framework-declarative
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/a/agent-framework-declarative/agent_framework_declarative-${{ version }}.tar.gz
  sha256: 524e4f5d9062d138e949dfaa20475b26f78df4ec3ca7fbe2e587aac65ce2a93e

build:
  noarch: python
  number: 0
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - flit-core <4.0,>=3.11
  run:
    - python >=${{ python_min }}
    - agent-framework-core <2,>=1.4.0
    - httpx <1,>=0.27
    - powerfx <0.0.35,>=0.0.32
    - pyyaml <7.0,>=6.0

tests:
  - python:
      imports:
        - agent_framework.declarative
      python_version: ${{ python_min }}.*
      pip_check: true

about:
  summary: |
    Declarative specification support for Microsoft Agent Framework.
  homepage: https://pypi.org/project/agent-framework-declarative/
  repository: https://github.com/microsoft/agent-framework
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - killua156
    - mgorny
