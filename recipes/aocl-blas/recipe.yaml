schema_version: 1

context:
  name: aocl-blas
  version: "5.1"
  build_number: 0
  thread_model: "openmp"

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  - url: https://github.com/amd/blis/archive/refs/tags/${{ version }}.tar.gz
    sha256: 4ab210cea8753f4be9646a3ad8e6b42c7d19380084a66312497c97278b8c76a4

build:
  number: ${{ build_number }}

requirements:
  build:
    - if: linux
      then:
        - gcc<15
        - make
        - sed
    - ${{ compiler('c') }}
    - ${{ compiler('fortran') }}
    - if: osx
      then:
        - make
        - llvm-openmp
        - sed
    - cmake
    - if: win
      then:
        - ninja
        - llvm-openmp
  host:
  run:

tests:
  - package_contents:
      include:
        - blis.h

about:
  homepage: https://www.amd.com/en/developer/aocl/dense.html
  license: BSD-3-Clause
  license_file: LICENSE
  summary: AMD's fork of BLIS optimized for AMD processors.
  description: |
    AOCL-BLAS is AMD's optimized version of BLAS targeted for AMD EPYC and Ryzen CPUs.
  documentation: https://www.amd.com/en/developer/aocl/dense.html
  repository: https://github.com/amd/blis
