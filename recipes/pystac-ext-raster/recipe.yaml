schema_version: 1

context:
  version: "1.1.0"

package:
  name: pystac-ext-raster
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/p/pystac-ext-raster/pystac_ext_raster-${{ version }}.tar.gz
  sha256: 19dd7c993defe450fa90b3fd690f30a6191b701fc704f1626748bdb57d9da1ed

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - hatchling
    - pip
  run:
    - python >=${{ python_min }}
    - pystac-core

tests:
  - python:
      imports:
        - pystac_ext_raster
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  summary: Raster extension for PySTAC
  license: Apache-2.0
  license_file: PLEASE_ADD_LICENSE_FILE
  homepage: https://pypi.org/project/pystac-ext-raster/
  documentation: https://pystac.readthedocs.io

extra:
  recipe-maintainers:
    - AddYourGitHubIdHere
