context:
  version: "0.4.6"

package:
  name: dex-retargeting
  version: ${{ version }}

source:
  url: https://github.com/dexsuite/dex-retargeting/archive/refs/tags/v${{ version }}.tar.gz
  sha256: 4d0f34891a5cc7307762e3714d7afa2bbdac0e9e8a2913f67c3b607698bdd750

build:
  number: 0
  noarch: python
  script:
    - ${{ PYTHON }} -m pip install . --no-deps --no-build-isolation -vv

requirements:
  host:
    - pip
    - python ${{ python_min }}.*
    - setuptools
  run:
    - anytree >=2.12.0
    - lxml >=5.2.2
    - nlopt >=2.6.1,<2.8.0
    - numpy >=1.21.0,<2.0.0
    - pinocchio >=2.7.0
    - pytorch
    - pytransform3d >=3.5.0
    - trimesh >=4.4.0
    - python >=${{ python_min }},<3.13
    - pyyaml >=6.0.0

tests:
  - python:
      # Upstream uses PyPI package name `pin`, while conda-forge provides `pinocchio`.
      # For this reason we skip pip_check
      # See https://github.com/conda-forge/pinocchio-feedstock/issues/139
      pip_check: false
      imports:
        - dex_retargeting
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  homepage: https://github.com/dexsuite/dex-retargeting
  repository: https://github.com/dexsuite/dex-retargeting
  summary: Hand pose retargeting for dexterous robot hands
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - flferretti
