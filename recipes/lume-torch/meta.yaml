{% set version = "3.0.0" %}

package:
  name: lume-torch
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/l/lume-torch/lume_torch-{{ version }}.tar.gz
  sha256: 276e90b7bd7ff4b7bba1d67a2ad40eebf3015a8dbe1e2683fbcd21745545a676

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python >=3.11
    - setuptools >=75.0
    - setuptools-scm
    - pip
  run:
    - python >=3.11
    - pydantic
    - numpy
    - pyyaml
    - botorch >=0.15
    - lume-base

test:
  imports:
    - lume_torch
  commands:
    - pip check
  requires:
    - pip
    - python

about:
  home: https://github.com/lume-science/lume-torch
  summary: LUME compatible wrapper for Torch based surrogate models.
  doc_url: https://lume-science.github.io/lume-torch/
  license: BSD-3-Clause
  license_file: LICENSE

extra:
  recipe-maintainers:
    - pluflou
