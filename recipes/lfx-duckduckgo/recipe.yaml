# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "0.1.1"
  # wheel-only on PyPI; source IS in the langflow monorepo (src/bundles/duckduckgo).
  # conda-forge prefers source > wheel. monorepo tag != package version - bump BOTH.
  monorepo_tag: "1.10.0"

package:
  name: lfx-duckduckgo
  version: ${{ version }}

source:
  url: https://github.com/langflow-ai/langflow/archive/refs/tags/v${{ monorepo_tag }}.tar.gz
  sha256: 45a317111a5d7cbc2709e683a72a80779801a658f61e506b612978588788ab71

build:
  noarch: python
  number: 0
  script: ${{ PYTHON }} -m pip install ./src/bundles/duckduckgo --no-deps --no-build-isolation -vv

requirements:
  host:
    - python ${{ python_min }}.*
    - hatchling
    - pip
  run:
    - python >=${{ python_min }}
    - ddgs >=9.0.0
    - langchain-community >=0.4.1,<1.0.0
    - lfx >=1.10.0.rc0,<2.0.0

tests:
  - python:
      imports:
        - lfx_duckduckgo
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  homepage: https://github.com/langflow-ai/langflow
  repository: https://github.com/langflow-ai/langflow
  documentation: https://docs.langflow.org/extensions
  license: MIT
  license_file: LICENSE
  summary: DuckDuckGo Search component as a standalone Langflow Extension Bundle.
  description: |
    lfx-duckduckgo packages the DuckDuckGo Search component as a standalone
    Langflow Extension Bundle (lfx plugin), exposing it as a reusable
    component for Langflow flows.

extra:
  recipe-maintainers:
    - rxm7706
