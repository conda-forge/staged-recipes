{% set name = "llm-rosetta" %}
{% set version = "0.6.12" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/llm_rosetta-{{ version }}.tar.gz
  sha256: 70713d55a5da23b4051d98c3c9b7c4a527c1c7a2ae716c7f06ce4e19615995fa

build:
  noarch: python
  number: 0
  script: {{ PYTHON }} -m pip install . -vv
  entry_points:
    - llm-rosetta-gateway = llm_rosetta.gateway:main

requirements:
  host:
    - python >=3.10
    - setuptools >=61.0
    - pip
  run:
    - python >=3.10
    - typing_extensions >=4.0.0
  run_constrained:
    - openai >=1.0.0
    - anthropic >=0.20.0
    - google-genai >=1.0.0

test:
  imports:
    - llm_rosetta
    - llm_rosetta.types
    - llm_rosetta.converters
  commands:
    - pip check
    - llm-rosetta-gateway --help
  requires:
    - pip

about:
  home: https://github.com/Oaklight/llm-rosetta
  summary: "LLM-Rosetta: Unified LLM API adapter — bidirectional conversion between OpenAI, Anthropic, and Google formats via IR."
  license: MIT
  license_family: MIT
  license_file: LICENSE
  doc_url: https://llm-rosetta.readthedocs.io
  dev_url: https://github.com/Oaklight/llm-rosetta

extra:
  recipe-maintainers:
    - Oaklight
