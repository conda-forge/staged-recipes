schema_version: 1

context:
  python_min: "3.9"
  version: "20251023"

package:
  name: pycaw
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/p/pycaw/pycaw-${{ version }}.tar.gz
  sha256: 19935b92eb5efc3f3ea5ee8a2d37ca49009e9dc00f83d067b74b9922e84b5b3b

build:
  number: 0
  skip: not win
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
  run:
    - python >=${{ python_min }}
    - comtypes
    - psutil

tests:
  - python:
      imports:
        - pycaw
      pip_check: true
      python_version: ${{ python_min }}.*

about:
  summary: Python Core Audio Windows Library
  description: |
    pycaw exposes the Windows Core Audio APIs to Python through comtypes.
    It can enumerate audio devices and sessions, control master and
    per-application volume and mute state, and receive audio session event
    callbacks, making it the standard way to script Windows audio from
    Python.
  license: MIT
  license_file: LICENSE
  homepage: https://andremiras.github.io/pycaw/
  repository: https://github.com/AndreMiras/pycaw

extra:
  recipe-maintainers:
    - ruben-arts
