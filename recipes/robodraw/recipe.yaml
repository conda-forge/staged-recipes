schema_version: 1

context:
  python_min: "3.11"
  version: "0.1.0"

package:
  name: robodraw
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/r/robodraw/robodraw-${{ version }}.tar.gz
  sha256: f022fe98f055cc20488cf05177f1649e98d8c9383a5ff900649ce0f13a9acd1b

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - hatchling
    - hatch-vcs
    - pip
  run:
    - python >=${{ python_min }}
    - matplotlib-base
    - numpy

tests:
  - python:
      imports:
        - robodraw
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  summary: An ergonomic and programmatic drawing library for python.
  license: Apache-2.0
  license_file: LICENSE
  homepage: https://pypi.org/project/robodraw/
  documentation: https://robodraw.readthedocs.io/

extra:
  recipe-maintainers:
    - jcmgray
