schema_version: 1

context:
  name: jbig2enc
  version: "0.32"

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://github.com/agl/jbig2enc/archive/refs/tags/${{ version }}.tar.gz
  sha256: 5b3b1c48617e5b1608f916a78038ea867a2c9eb20c2ff34a78a48a243f655c2a
  patches:
    - 0001-dont-require-giflib-pkgconfig.patch
    - 0002-install-jbig2enc-header.patch

build:
  number: 0

requirements:
  build:
    - ${{ compiler('cxx') }}
    - ${{ stdlib("c") }}
    - meson
    - ninja
    - pkg-config
  host:
    - leptonica
    - giflib
  run:
    - leptonica

tests:
  - script:
      - jbig2 --version
  - package_contents:
      lib:
        - jbig2enc
      include:
        - jbig2enc.h
      bin:
        - jbig2

about:
  homepage: https://github.com/agl/jbig2enc
  repository: https://github.com/agl/jbig2enc
  documentation: https://github.com/agl/jbig2enc/blob/master/README.md
  summary: JBIG2 Encoder
  description: |
    jbig2enc is an open-source encoder for the JBIG2 image format. It can
    generate standalone JBIG2 files as well as fragments suitable for
    embedding in PDFs, and supports generic region encoding, symbol
    extraction/classification/text-region coding, refinement coding, and
    compression of multipage documents. It is built on top of the
    Leptonica image processing library.
  license: Apache-2.0
  license_file: COPYING

extra:
  recipe-maintainers:
    - carlodri
