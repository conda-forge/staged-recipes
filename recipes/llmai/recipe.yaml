context:
  version: "0.2.2"

package:
  name: llmai
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/l/llmai/llmai-${{ version }}.tar.gz
  sha256: 1f62d1e3d05fa5c43bbd948275398668d8f85c8d2fde252d34562332101dd7b3

build:
  noarch: python
  script: python -m pip install . -vv
  number: 0

requirements:
  host:
    - python >=3.11
    - pip
    - setuptools
  run:
    - python >=3.11
    - anthropic >=0.79.0
    - boto3 >=1.42.89
    - google-genai >=1.62.0
    - openai >=2.18.0

tests:
  - python:
      imports:
        - llmai
      pip_check: true

about:
  homepage: https://pypi.org/project/llmai/
  summary: Unified Python client for OpenAI, Azure OpenAI, Vertex AI, Anthropic, Gemini, DeepSeek, Bedrock, and ChatGPT
  description: |
    llmai provides a single, consistent Python interface to interact with multiple
    large language model providers, including OpenAI, Azure OpenAI, Vertex AI,
    Anthropic Claude, Google Gemini, DeepSeek, Amazon Bedrock, and ChatGPT.
    It eliminates per-provider boilerplate and supports Python 3.11+.
  license: Apache-2.0
  license_file: LICENSE

extra:
  recipe-maintainers:
    - hackert156
