context:
  version: "1.0.0"
  python_min: "3.9"

package:
  name: nexus-passoft
  version: ${{ version }}

source:
  url: https://gitlab.com/earthscope/public/epic/passoft/nexus/-/archive/v${{ version }}/nexus-v${{ version }}.tar.gz
  sha256: 6e2459dcbc12995ca524a34f9521f6b6904f32e401c9816861df0124c045e24a

build:
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0
  python:
    entry_points:
      - nexus = nexus.nexus:main
      - ms_sum = nexus.ms_sum:main

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - setuptools
  run:
    - python >=${{ python_min }}
    - obspy >=1.3.0
    - pyside6
    - cartopy
    - if: linux
      then:
        - __linux
    - if: osx
      then:
        - __osx

tests:
  - python:
      imports:
        - nexus
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  homepage: https://epic.earthscope.org/content/software-resources
  summary: StationXML creation GUI
  description: |
    Graphical tool for creating StationXML metadata files.
  license: GPL-3.0-or-later
  license_file: LICENSE
  repository: https://gitlab.com/earthscope/public/epic/passoft/nexus

extra:
  recipe-maintainers:
    - omid-earthscope
