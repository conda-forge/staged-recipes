context:
  name: perl-win32-longpath
  version: "2.3"

package:
  name: ${{ name }}
  version: ${{ version }}

source:
  url: https://cpan.metacpan.org/authors/id/R/RB/RBOISVERT/Win32-LongPath-${{ version }}.tar.gz
  sha256: 764a9c87562a108478cbfd50edad06f0b4ea13476b40b5f093d1ae251a09a6d0

build:
  number: 0
  skip: not win
  script:
    - perl Makefile.PL INSTALLDIRS=vendor NO_PERLLOCAL=1 NO_PACKLIST=1
    - make
    - make test
    - make install VERBINST=1

requirements:
  build:
    - ${{ compiler('c') }}
    - ${{ stdlib('c') }}
    - make
  host:
    - perl
  run:
    - perl

tests:
  - script: perl -e "use Win32::LongPath; print qq(ok\n)"

about:
  homepage: https://metacpan.org/dist/Win32-LongPath
  summary: Provide functions to access long paths and Unicode in the Windows environment
  license: GPL-1.0-or-later OR Artistic-1.0-Perl
  license_file: lib/Win32/LongPath.pm

extra:
  recipe-maintainers:
    - baszalmstra
