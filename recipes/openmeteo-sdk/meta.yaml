{% set version = "1.25.0" %}

package:
  name: openmeteo-sdk
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/o/openmeteo-sdk/openmeteo_sdk-{{ version }}.tar.gz
  sha256: a2225e5fb8e92b5493f60d926ff57cb8bc6cbeacad4b94dc436f537d468b5414

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - hatchling
    - pip
  run:
    - python >={{ python_min }}
    - python-flatbuffers ==25.9.23

test:
  imports:
    - openmeteo_sdk
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://pypi.org/project/openmeteo-sdk/
  summary: Open-Meteo Python SDK
  doc_url: https://github.com/open-meteo/sdk/tree/main
  dev_url: https://github.com/open-meteo/sdk
  license: 'MIT'
  license_file: LICENSE

extra:
  recipe-maintainers:
    - akrherz
