context:
  version: "2.0.0"

package:
  name: font-space-grotesk
  version: ${{ version }}

source:
  - url: https://github.com/floriankarsten/space-grotesk/archive/refs/tags/${{ version }}.tar.gz
    sha256: 366da4ddec4f637f6d2d342251c2e5e8b8af67d10653f347a9d9d603cc64547a

build:
  noarch: generic
  number: 0
  script:
    - mkdir -p $PREFIX/fonts
    - cp fonts/{otf,ttf/static,woff2/static}/* $PREFIX/fonts
    - cp fonts/ttf/SpaceGrotesk[wght].ttf $PREFIX/fonts
    - cp fonts/woff2/SpaceGrotesk[wght].woff2 $PREFIX/fonts

tests:
  - package_contents:
      files:
        - fonts/SpaceGrotesk-Bold.otf
        - fonts/SpaceGrotesk-Light.otf
        - fonts/SpaceGrotesk-Medium.otf
        - fonts/SpaceGrotesk-Regular.otf
        - fonts/SpaceGrotesk-Bold.ttf
        - fonts/SpaceGrotesk-Light.ttf
        - fonts/SpaceGrotesk-Medium.ttf
        - fonts/SpaceGrotesk-Regular.ttf
        - fonts/SpaceGrotesk-Bold.woff2
        - fonts/SpaceGrotesk-Light.woff2
        - fonts/SpaceGrotesk-Medium.woff2
        - fonts/SpaceGrotesk-Regular.woff2
      # https://github.com/prefix-dev/rattler-build/issues/2482
      #   - fonts/SpaceGrotesk[wght].ttf
      #   - fonts/SpaceGrotesk[wght].woff2
      # strict: true

about:
  homepage: https://floriankarsten.github.io/space-grotesk
  summary: "Space Grotesk: a proportional variant of the original fixed-width Space Mono family"
  description: |
    Space Grotesk is a proportional sans-serif typeface variant based on Colophon Foundry's fixed-width Space Mono family (2016). Originally designed by Florian Karsten in 2018, Space Grotesk retains the monospace's idiosyncratic details while optimizing for improved readability at non-display sizes.
  license: OFL-1.1
  license_file:
    - OFL.txt
  repository: https://github.com/floriankarsten/space-grotesk

extra:
  recipe-maintainers:
    - pavelzw
