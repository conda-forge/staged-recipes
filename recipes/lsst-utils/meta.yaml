{% set version = "30.2026.1400" %}
package:
  name: lsst-utils
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/l/lsst-utils/lsst_utils-{{ version }}.tar.gz
  sha256: 24bc26117651f7412037480d8e998e250abbd548c91c093594501aeb4968b1b1

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - setuptools
    - lsst-versions >=1.3.0
    - pip
  run:
    - python >={{ python_min }}
    - bqplot >=0.12.43
    - numpy
    - pandas
    - psutil >=5.7
    - deprecated >=1.2
    - pyyaml >=5.1
    - astropy-base >=5.0
    - structlog
    - threadpoolctl

test:
  imports:
    - lsst
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://github.com/lsst/utils
  summary: Utility functions from Rubin Observatory Data Management for the Legacy Survey of Space and Time (LSST).
  dev_url: https://github.com/lsst/utils
  license: BSD-3-Clause
  license_file:
    - LICENSE
    - COPYRIGHT

extra:
  recipe-maintainers:
    - Roceb
    - rhiannonlynne
