build:
  number: 0
  noarch: generic
  script: build.py

requirements:
  build:
    - python
  run:
    - voms
    - __unix  # virtual package to skip windows

tests:
  - script:
      interpreter: python
      content: |
        import os
        os.environ["X509_VOMS_DIR"]
        os.environ["VOMS_USERCONF"]

  - package_contents:
      strict: true
      files:
        # -- Env Vars --
        - etc/conda/env_vars.d/voms-lsc.json
        # --- VOs ---
        - etc/grid-security/vomsdir/alice/voms-alice-auth.cern.ch.lsc
        - etc/grid-security/vomsdir/atlas/voms-atlas-auth.cern.ch.lsc
        - etc/grid-security/vomsdir/cms/voms-cms-auth.cern.ch.lsc
        - etc/grid-security/vomsdir/lhcb/voms-lhcb-auth.cern.ch.lsc
        - etc/grid-security/vomsdir/ops/voms-ops-auth.cern.ch.lsc
        - etc/grid-security/vomsdir/dteam/voms-dteam-auth.cern.ch.lsc
        - etc/grid-security/vomsdir/dteam/voms2.hellasgrid.gr.lsc
        - etc/grid-security/vomsdir/ams02.cern.ch/voms-02.pd.infn.it.lsc
        - etc/grid-security/vomsdir/ams02.cern.ch/voms-ams.cloud.cnaf.infn.it.lsc
        - etc/grid-security/vomsdir/dream/voms.hpcc.ttu.edu.lsc
        - etc/grid-security/vomsdir/dune/voms1.fnal.gov.lsc
        - etc/grid-security/vomsdir/dune/voms2.fnal.gov.lsc
        - etc/grid-security/vomsdir/escape/voms-escape.cloud.cnaf.infn.it.lsc
        - etc/grid-security/vomsdir/ilc/voms-ilc-auth.cern.ch.lsc
        - etc/grid-security/vomsdir/na62.vo.gridpp.ac.uk/voms.gridpp.ac.uk.lsc
        - etc/grid-security/vomsdir/na62.vo.gridpp.ac.uk/voms02.gridpp.ac.uk.lsc
        - etc/grid-security/vomsdir/na62.vo.gridpp.ac.uk/voms03.gridpp.ac.uk.lsc
        - etc/grid-security/vomsdir/vo.compass.cern.ch/voms-compass-auth.cern.ch.lsc
        # --- vomses ---
        - etc/vomses/alice-voms-alice-auth.cern.ch
        - etc/vomses/atlas-voms-atlas-auth.cern.ch
        - etc/vomses/cms-voms-cms-auth.cern.ch
        - etc/vomses/lhcb-voms-lhcb-auth.cern.ch
        - etc/vomses/ops-voms-ops-auth.cern.ch
        - etc/vomses/dteam-voms-dteam-auth.cern.ch
        - etc/vomses/dteam-voms2.hellasgrid.gr
        - etc/vomses/ams02.cern.ch-voms-02.pd.infn.it
        - etc/vomses/ams02.cern.ch-voms-ams.cloud.cnaf.infn.it
        - etc/vomses/dream-voms.hpcc.ttu.edu
        - etc/vomses/dune-voms1.fnal.gov
        - etc/vomses/dune-voms2.fnal.gov
        - etc/vomses/escape-voms-escape.cloud.cnaf.infn.it
