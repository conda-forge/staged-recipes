    target_directory: etc/grid-security/vomsdir/lhcb
  - path: vomsdir/ops/voms-ops-auth.cern.ch.lsc
    target_directory: etc/grid-security/vomsdir/ops
  - path: vomsdir/dteam/voms-dteam-auth.cern.ch.lsc
    target_directory: etc/grid-security/vomsdir/dteam
  - path: vomsdir/ams02.cern.ch/voms-02.pd.infn.it.lsc
    target_directory: etc/grid-security/vomsdir/ams02.cern.ch
  - path: vomsdir/ams02.cern.ch/voms-ams.cloud.cnaf.infn.it.lsc
    target_directory: etc/grid-security/vomsdir/ams02.cern.ch
  - path: vomsdir/dream/voms.hpcc.ttu.edu.lsc
    target_directory: etc/grid-security/vomsdir/dream
  - path: vomsdir/dteam/voms2.hellasgrid.gr.lsc
    target_directory: etc/grid-security/vomsdir/dteam
  - path: vomsdir/dune/voms1.fnal.gov.lsc
    target_directory: etc/grid-security/vomsdir/dune
  - path: vomsdir/dune/voms2.fnal.gov.lsc
    target_directory: etc/grid-security/vomsdir/dune
  - path: vomsdir/escape/voms-escape.cloud.cnaf.infn.it.lsc
    target_directory: etc/grid-security/vomsdir/escape
  - path: vomsdir/ilc/voms-ilc-auth.cern.ch.lsc
    target_directory: etc/grid-security/vomsdir/ilc
  - path: vomsdir/na62.vo.gridpp.ac.uk/voms.gridpp.ac.uk.lsc
    target_directory: etc/grid-security/vomsdir/na62.vo.gridpp.ac.uk
  - path: vomsdir/na62.vo.gridpp.ac.uk/voms02.gridpp.ac.uk.lsc
    target_directory: etc/grid-security/vomsdir/na62.vo.gridpp.ac.uk
  - path: vomsdir/na62.vo.gridpp.ac.uk/voms03.gridpp.ac.uk.lsc
    target_directory: etc/grid-security/vomsdir/na62.vo.gridpp.ac.uk
