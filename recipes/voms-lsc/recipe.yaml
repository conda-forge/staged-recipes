    target_directory: etc/grid-security/vomsdir/vo.compass.cern.ch
  - path: vomses/alice-voms-alice-auth.cern.ch
    target_directory: etc/vomses
  - path: vomses/atlas-voms-atlas-auth.cern.ch
    target_directory: etc/vomses
  - path: vomses/cms-voms-cms-auth.cern.ch
    target_directory: etc/vomses
  - path: vomses/lhcb-voms-lhcb-auth.cern.ch
    target_directory: etc/vomses
  - path: vomses/ops-voms-ops-auth.cern.ch
    target_directory: etc/vomses
  - path: vomses/dteam-voms-dteam-auth.cern.ch
    target_directory: etc/vomses
  - path: vomses/dteam-voms2.hellasgrid.gr
    target_directory: etc/vomses
  - path: vomses/ams02.cern.ch-voms-02.pd.infn.it
    target_directory: etc/vomses
  - path: vomses/ams02.cern.ch-voms-ams.cloud.cnaf.infn.it
    target_directory: etc/vomses
  - path: vomses/dream-voms.hpcc.ttu.edu
    target_directory: etc/vomses
  - path: vomses/dune-voms1.fnal.gov
    target_directory: etc/vomses
  - path: vomses/dune-voms2.fnal.gov
    target_directory: etc/vomses
  - path: vomses/escape-voms-escape.cloud.cnaf.infn.it
    target_directory: etc/vomses
  - path: vomses/ilc-voms-ilc-auth.cern.ch
    target_directory: etc/vomses
  - path: vomses/na62.vo.gridpp.ac.uk-voms.gridpp.ac.uk
    target_directory: etc/vomses
  - path: vomses/na62.vo.gridpp.ac.uk-voms02.gridpp.ac.uk
    target_directory: etc/vomses
  - path: vomses/na62.vo.gridpp.ac.uk-voms03.gridpp.ac.uk
    target_directory: etc/vomses
  - path: vomses/vo.compass.cern.ch-voms-compass-auth.cern.ch
    target_directory: etc/vomses

build:
  number: 0
  noarch: generic
  script: build.py

requirements:
  build:
    - python
  run:
    - voms

tests:
  - script:
      # base dirs
      - test -d "${X509_VOMS_DIR}"
      - test -d "${VOMS_USERCONF}"
      # --- VOs ---
      - test -f "${X509_VOMS_DIR}/alice/voms-alice-auth.cern.ch.lsc"
      - test -f "${X509_VOMS_DIR}/atlas/voms-atlas-auth.cern.ch.lsc"
      - test -f "${X509_VOMS_DIR}/cms/voms-cms-auth.cern.ch.lsc"
      - test -f "${X509_VOMS_DIR}/lhcb/voms-lhcb-auth.cern.ch.lsc"
      - test -f "${X509_VOMS_DIR}/ops/voms-ops-auth.cern.ch.lsc"
      - test -f "${X509_VOMS_DIR}/dteam/voms-dteam-auth.cern.ch.lsc"
      - test -f "${X509_VOMS_DIR}/dteam/voms2.hellasgrid.gr.lsc"
      - test -f "${X509_VOMS_DIR}/ams02.cern.ch/voms-02.pd.infn.it.lsc"
      - test -f "${X509_VOMS_DIR}/ams02.cern.ch/voms-ams.cloud.cnaf.infn.it.lsc"
      - test -f "${X509_VOMS_DIR}/dream/voms.hpcc.ttu.edu.lsc"
      - test -f "${X509_VOMS_DIR}/dune/voms1.fnal.gov.lsc"
      - test -f "${X509_VOMS_DIR}/dune/voms2.fnal.gov.lsc"
      - test -f "${X509_VOMS_DIR}/escape/voms-escape.cloud.cnaf.infn.it.lsc"
      - test -f "${X509_VOMS_DIR}/ilc/voms-ilc-auth.cern.ch.lsc"
      - test -f "${X509_VOMS_DIR}/na62.vo.gridpp.ac.uk/voms.gridpp.ac.uk.lsc"
      - test -f "${X509_VOMS_DIR}/na62.vo.gridpp.ac.uk/voms02.gridpp.ac.uk.lsc"
      - test -f "${X509_VOMS_DIR}/na62.vo.gridpp.ac.uk/voms03.gridpp.ac.uk.lsc"
      - test -f "${X509_VOMS_DIR}/vo.compass.cern.ch/voms-compass-auth.cern.ch.lsc"
      # --- vomses ---
      - test -f "${VOMS_USERCONF}/alice-voms-alice-auth.cern.ch"
      - test -f "${VOMS_USERCONF}/atlas-voms-atlas-auth.cern.ch"
      - test -f "${VOMS_USERCONF}/cms-voms-cms-auth.cern.ch"
      - test -f "${VOMS_USERCONF}/lhcb-voms-lhcb-auth.cern.ch"
      - test -f "${VOMS_USERCONF}/ops-voms-ops-auth.cern.ch"
      - test -f "${VOMS_USERCONF}/dteam-voms-dteam-auth.cern.ch"
      - test -f "${VOMS_USERCONF}/dteam-voms2.hellasgrid.gr"
      - test -f "${VOMS_USERCONF}/ams02.cern.ch-voms-02.pd.infn.it"
      - test -f "${VOMS_USERCONF}/ams02.cern.ch-voms-ams.cloud.cnaf.infn.it"
      - test -f "${VOMS_USERCONF}/dream-voms.hpcc.ttu.edu"
      - test -f "${VOMS_USERCONF}/dune-voms1.fnal.gov"
      - test -f "${VOMS_USERCONF}/dune-voms2.fnal.gov"
      - test -f "${VOMS_USERCONF}/escape-voms-escape.cloud.cnaf.infn.it"
      - test -f "${VOMS_USERCONF}/ilc-voms-ilc-auth.cern.ch"
      - test -f "${VOMS_USERCONF}/na62.vo.gridpp.ac.uk-voms.gridpp.ac.uk"
      - test -f "${VOMS_USERCONF}/na62.vo.gridpp.ac.uk-voms02.gridpp.ac.uk"
      - test -f "${VOMS_USERCONF}/na62.vo.gridpp.ac.uk-voms03.gridpp.ac.uk"
      - test -f "${VOMS_USERCONF}/vo.compass.cern.ch-voms-compass-auth.cern.ch"


about:
  summary: VOMS LSC and vomses configuration files for WLCG VOs
  homepage: https://twiki.cern.ch/twiki/bin/view/LCG/VOMSLSCfileConfiguration
  documentation: https://twiki.cern.ch/twiki/bin/view/LCG/VOMSLSCfileConfiguration
  license: Apache-2.0
  license_file: LICENSE

extra:
  recipe-maintainers:
    - kratsg
