context:
  version: 0.9.2

package:
  name: cmake-parser
  version: ${{ version }}

source:
- url: https://pypi.org/packages/source/c/cmake-parser/cmake_parser-${{ version }}.tar.gz
  sha256: b7a313d3f41e58c09e0886f2c98f3fcee2b1897fe7f87449823a53e51ab23a3d

build:
  number: 0
  script: ${{ PYTHON }} -m pip install .
  noarch: python

requirements:
  host:
  - python ${{ python_min }}.*
  - setuptools
  - setuptools_scm
  - pip
  run:
  - python >=${{ python_min }}
  - attrs >=21.3.0

tests:
- python:
    imports:
    - cmake_parser
    python_version:
    - ${{ python_min }}.*
    pip_check: true

about:
  homepage: 'https://roehling.github.io/cmake_parser/'
  summary: Pure Python library to parse CMake scripts
  description: |
    **cmake_parser** is a pure Python parser for CMake code. It is still work in progress,
    but is reasonably usable. It provides the following features:

    * AST representation of CMake code
    * Correct handling of quoted and bracketed values
    * Variable expansion
    * Basic boolean expression evaluation

    Notably missing but planned are:

    * Some operators for boolean expressions
    * Generator expression support
    * Script engine for convenient CMake execution within Python
  license: Apache-2.0
  license_file: LICENSES/Apache-2.0.txt
  documentation: https://roehling.github.io/cmake_parser/

extra:
  recipe-maintainers:
    - jorisv
