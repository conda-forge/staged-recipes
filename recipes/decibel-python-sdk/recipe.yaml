context:
  version: "0.2.1"

package:
  name: decibel-python-sdk
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/d/decibel-python-sdk/decibel_python_sdk-${{ version }}.tar.gz
  sha256: 4179cfdb4a4efef6985b724c75f59d18b7a21adce490cac719ff99893ccd7f4b

build:
  noarch: python
  script: python -m pip install . -vv
  number: 0

requirements:
  host:
    - aptos-sdk >=0.11.0
    - httpx >=0.28.0
    - pydantic >=2.0.0
    - websockets >=14.0
    - python ${{ python_min }}.*
    - uv-build
  run:
    - python >=${{ python_min }}

tests:
  - python:
      imports:
      - decibel-python-sdk
      pip_check: true

about:
  homepage: https://github.com/decibeltrade/python-sdk
  summary: 'Python SDK for interacting with Decibel, a fully on-chain trading engine built on Aptos.'
  description: |
    Python SDK for interacting with Decibel, a fully on-chain trading engine built on Aptos.
  license: MIT
  license_file: LICENSE
  documentation: https://docs.decibel.trade/
  repository: https://github.com/decibeltrade/python-sdk

extra:
  recipe-maintainers:
    - MementoRC
