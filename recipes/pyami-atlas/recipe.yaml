schema_version: 1

context:
  version: "5.1.4"
  python_min: "3.10"

package:
  name: pyami-atlas
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/p/pyami-atlas/pyAMI_atlas-${{ version }}.tar.gz
  sha256: 073c7b570cfea5bdd9a6e2cd00f8b9948080698a649c65226bcd116049e1e020
  patches:
    - patches/0001-move-ami_atlas-to-cli.py-inside-package.patch
    - patches/0002-drop-ami_atlas_post_install-usage.patch

build:
  number: 0
  noarch: python
  script:
    - ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
    - ${{ PYTHON }} post-build.py
  python:
    entry_points:
      - ami=pyAMI.atlas.cli:main

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - pyami-core
  run:
    - python >=${{ python_min }}
    - pyami-core

tests:
  - python:
      imports:
        - pyAMI_atlas
      pip_check: true
      python_version: ${{ python_min }}.*
  - script:
      - ami --help

about:
  summary: Python ATLAS Metadata Interface (pyAMI) for ATLAS
  homepage: https://ami.in2p3.fr/docs/pyAMI/
  repository: https://github.com/ami-team/pyAMI-atlas
  documentation: https://ami.in2p3.fr/docs/pyAMI/
  license: LGPL-2.1-only
  license_file: pyAMI_atlas/LICENSE.txt

extra:
  recipe-maintainers:
    - kratsg
