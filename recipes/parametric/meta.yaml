{% set name = "parametric" %}
{% set version = "0.3.5" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://github.com/grunk-dev/parametric/archive/v{{ version }}.tar.gz
  sha256: 61687a2c768cf86b415a91d71cb80e663edc1eeaa6a6475feb71a1a1403811a0

build:
  number: 0

requirements:
  build:
    - {{ compiler('cxx') }}
    - {{ stdlib('c') }}
    - cmake
    - ninja

test:
  commands:
    - test -d ${PREFIX}/include/parametric
    - test -f ${PREFIX}/include/parametric/adaptors.hpp
    - test -f ${PREFIX}/include/parametric/core.hpp
    - test -f ${PREFIX}/include/parametric/dag.hpp
    - test -f ${PREFIX}/include/parametric/operators.hpp
    - test -f ${PREFIX}/include/parametric/serialization.hpp
    - test -f ${PREFIX}/include/parametric/tupletools.hpp
    - test -f ${PREFIX}/include/parametric/typename.hpp
    - test -d ${PREFIX}/include/parametric/impl
    - test -f ${PREFIX}/include/parametric/impl/core_impl.hpp
    - test -f ${PREFIX}/lib/cmake/parametric/parametric-config.cmake
    - test -f ${PREFIX}/lib/cmake/parametric/parametric-config-version.cmake
    - test -f ${PREFIX}/lib/cmake/parametric/parametric-targets.cmake
    - if not exist %LIBRARY_PREFIX%\include\parametric\core.hpp (exit 1)  # [win]
    - if not exist %LIBRARY_PREFIX%\lib\cmake\parametric\parametric-config.cmake (exit 1)  # [win]
    - if not exist %LIBRARY_PREFIX%\lib\cmake\parametric\parametric-config-version.cmake (exit 1)  # [win]

about:
  home: https://github.com/grunk-dev/parametric/
  summary: 'Simple C++ library for parametric lazy evaluation of functions.'
  description: |
    Parametric is a C++ library for parametric lazy evaluation of functions. The base concept are parameters from which computational expensive parametric results are derived.

    The result is only computed, if it is required (lazy evaluation). If any input parameter has changed, the result will be invalidated and the computation is computed again.
  license: Apache-2.0
  license_file: LICENSES/Apache-2.0.txt
  doc_url: https://grunk-dev.github.io/parametric/
  dev_url: https://github.com/grunk-dev/parametric/

extra:
  recipe-maintainers:
    - joergbrech