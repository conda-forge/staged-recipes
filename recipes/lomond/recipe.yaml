# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json

schema_version: 1

context:
  version: "0.3.3"

package:
  name: lomond
  version: ${{ version }}

source:
  - url: https://pypi.org/packages/source/l/lomond/lomond-${{ version }}.tar.gz
    sha256: 427936596b144b4ec387ead99aac1560b77c8a78107d3d49415d3abbe79acbd3
  # The PyPI sdist ships no license file (upstream packaging bug). Pull it from
  # the repo, pinned to the commit on master matching 0.3.3 (no v0.3.3 tag exists).
  - url: https://raw.githubusercontent.com/wildfoundry/dataplicity-lomond/2e3235fb64f4c630ceb9a141f4d44977e89e7322/LICENSE.md
    sha256: 439551f517af12c11b01c31b293b861570bbd1bb156cb09c996d353e4208e447
    file_name: LICENSE.md

build:
  number: 0
  noarch: python
  script:
    # Build in UTF-8 mode: upstream setup.py reads README.md without an explicit
    # encoding, which fails under the cp1252 default on Windows.
    env:
      PYTHONUTF8: "1"
    content: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - setuptools
  run:
    - python >=${{ python_min }}
    - six >=1.10.0

tests:
  - python:
      imports:
        - lomond
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  homepage: https://github.com/wildfoundry/dataplicity-lomond
  repository: https://github.com/wildfoundry/dataplicity-lomond
  summary: Websocket Client Library
  license: BSD-3-Clause
  license_file: LICENSE.md

extra:
  recipe-maintainers:
    - killua156
