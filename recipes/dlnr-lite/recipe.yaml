schema_version: 1

context:
  name: dlnr-lite
  version: 0.1.1

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/d/dlnr-lite/dlnr_lite-${{ version }}.tar.gz
  sha256: ac5edd488e7def57deafc0fa8e6096656b6a95d8729cca73fa87fe61cd0f8b0e

build:
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python
    - setuptools >=61.0
    - pip
  run:
    - python
    - einops >=0.8.1
    - numpy
    - pytorch
    - scipy

tests:
  - python:
      imports:
        - dlnr_lite
      pip_check: true

about:
  homepage: https://pypi.org/project/dlnr-lite/
  summary: Lightweight fork of DLNR with minimal dependencies for inference only
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - swahtz
