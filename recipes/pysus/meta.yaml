{% set name = "pysus" %}
{% set version = "2.6.3" %}
{% set sha256 = "e537a501befafc055406f3ed820175e863f95033189a4a2c130ade18087bc076" %}
{% set python_min = "3.11" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/pysus-{{ version }}.tar.gz
  sha256: {{ sha256 }}

build:
  noarch: python
  number: 0
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  entry_points:
    - pysus = pysus.cli:app

requirements:
  host:
    - python {{ python_min }}
    - pip
    - setuptools
    - poetry-core >=1.0.0
  run:
    - python >={{ python_min }}
    - unidecode >=1.3.6
    - aioftp >=0.21.4
    - anyio >=4.13.0
    - bigtree >=0.12.2
    - boto3 >=1.42.89
    - chardet >=7.4.0
    - dateparser >=1.1.8
    - dbfread 2.0.7
    - python-dotenv >=0.9.9
    - duckdb >=1.4.4
    - duckdb-engine >=0.15.0
    - fastparquet >=2023.10.1
    - httpx >=0.28.0
    - humanize >=4.8.0
    - loguru >=0.6.0
    - numpy >=2.4.0
    - pandas >=2.2.2
    - pyarrow >=11.0.0
    - pydantic >=2.12.5
    - pyreaddbc >=2.0.4
    - python-dateutil 2.8.2
    - python-magic
    - sqlalchemy >=2.0.48
    - tqdm >=4.67.0
    - typer >=0.24.1
    - typing_extensions >=4.10.0
    - python-wget >=3.2

test:
  imports:
    - pysus
  commands:
    - pysus --help
  requires:
    - python {{ python_min }}

about:
  home: https://github.com/AlertaDengue/PySUS
  license: GPL-3.0-only
  license_file: LICENSE
  summary: Tools for dealing with Brazil's Public health data
  description: |
    PySUS is a Python package for downloading, parsing, and analyzing
    Brazil's Public Health data (DATASUS). It provides tools for
    fetching data from various sources including FTP servers, DadosGov
    API, and DuckLake (S3-based catalog), also contains utilities for
    reading DBC/DBF file formats present in DATASUS.
  doc_url: https://pysus.readthedocs.io/
  dev_url: https://github.com/AlertaDengue/PySUS
  doc_source_url: https://github.com/AlertaDengue/PySUS/tree/main/docs

extra:
  recipe-maintainers:
    - fccoelho
    - luabida
    - esloch
