schema_version: 1

context:
  version: "2.6.5"
  python_min: "3.11"

package:
  name: pysus
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/p/pysus/pysus-${{ version }}.tar.gz
  sha256: 139e60223e947a49cacde9b610cd712de91e443b8018ccd2e989944efd60051a

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  python:
    entry_points:
      - pysus = pysus.cli:app

requirements:
  host:
    - python ${{ python_min }}.*
    - poetry-core
    - pip
  run:
    - python >=${{ python_min }}
    - python-dateutil ==2.8.2
    - fastparquet >=2023.10.1,<=2024.11.0
    - pyarrow
    - numpy
    - tqdm
    - loguru >=0.6.0,<0.7.0
    - unidecode
    - dateparser
    - pandas >=2.2.2,<3.0.0
    - typing_extensions
    - pydantic
    - duckdb
    - duckdb-engine >=0.17.0,<0.18.0
    - sqlalchemy
    - python-magic
    - libmagic
    - chardet
    - anyio
    - httpx
    - aioftp >=0.21.4,<0.22.0
    - dbfread
    - bigtree >=0.12.2,<0.13.0
    - pyreaddbc
    - python-dotenv
    - boto3
    - typer >=0.24.1,<0.25.0
    - humanize

tests:
  - python:
      imports:
        - pysus
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"
  - script:
      - pysus --help

about:
  summary: Tools for dealing with Brazil's Public health data
  license: GPL-3.0-only
  license_file: LICENSE
  homepage: https://github.com/AlertaDengue/PySUS
  documentation: https://pysus.readthedocs.io/
  repository: https://github.com/AlertaDengue/PySUS
  description: |
    PySUS is a Python package for downloading, parsing, and analyzing
    Brazil's Public Health data (DATASUS). It provides tools for fetching data 
    from various sources including FTP servers, DadosGov API, and DuckLake 
    (S3-based catalog), also contains utilities for reading DBC/DBF file formats
    present in DATASUS.

extra:
  recipe-maintainers:
    - fccoelho
    - luabida
    - esloch
