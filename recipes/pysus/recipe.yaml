schema_version: 1

context:
  version: "2.6.3"

package:
  name: pysus
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/p/pysus/pysus-${{ version }}.tar.gz
  sha256: e537a501befafc055406f3ed820175e863f95033189a4a2c130ade18087bc076

build:
  number: 0
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  python:
    entry_points:
      - pysus = pysus.cli:app
  skip:
    - match(python, "<3.11")

requirements:
  host:
    - python
    - poetry-core
    - pip
  run:
    - python
    - python-dateutil 2.8.2.*
    - fastparquet >=2023.10.1
    - pyarrow >=11.0.0
    - numpy >=2.4.0
    - tqdm >=4.67.0
    - python-wget >=3.2.0
    - loguru >=0.6.0
    - unidecode >=1.3.6
    - dateparser >=1.1.8
    - pandas >=2.2.2
    - typing_extensions >=4.10.0
    - pydantic >=2.12.5
    - duckdb >=1.4.4
    - duckdb-engine >=0.15.0
    - sqlalchemy >=2.0.48
    - python-magic
    - libmagic
    - chardet >=7.4.0
    - anyio >=4.13.0
    - httpx >=0.28.0
    - aioftp >=0.21.4
    - dbfread 2.0.7.*
    - bigtree >=0.12.2
    - pyreaddbc >=2.0.4
    - python-dotenv >=0.9.9
    - boto3 >=1.42.89
    - typer >=0.24.1
    - humanize >=4.8.0

tests:
  - python:
      imports:
        - pysus
  - script:
      - pysus --help

about:
  summary: Tools for dealing with Brazil's Public health data
  license: GPL-3.0-only
  license_file: LICENSE
  homepage: https://github.com/AlertaDengue/PySUS
  documentation: https://pysus.readthedocs.io/
  repository: https://github.com/AlertaDengue/PySUS
  description: |
    PySUS is a Python package for downloading, parsing, and analyzing
    Brazil's Public Health data (DATASUS). It provides tools for fetching data 
    from various sources including FTP servers, DadosGov API, and DuckLake 
    (S3-based catalog), also contains utilities for reading DBC/DBF file formats
    present in DATASUS.

extra:
  recipe-maintainers:
    - fccoelho
    - luabida
    - esloch
