schema_version: 1

context:
  python_min: "3.11"
  version: "0.0.3"

package:
  name: ramp-coreoperator
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/r/ramp-coreoperator/ramp_coreoperator-${{ version }}.tar.gz
  sha256: 5feb50ac80491f9d03f12bf1f562c3b5b697ef173dc6f9f36133725415aad5d2

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - setuptools
    - setuptools-scm
    - wheel
    - pip
  run:
    - python >=${{ python_min }}
    - more-itertools
    - numpy
    - ramp-coremaker
    - ramp-core
    - ramp-isotopes

tests:
  - python:
      imports:
        - coreoperator
      pip_check: true
      python_version: 
        - ${{ python_min }}.*
        - "*"

about:
  summary: Package for applying operations on cores from coremaker
  license: MIT
  license_file: LICENSE
  homepage: https://pypi.org/project/ramp-coreoperator/

extra:
  recipe-maintainers:
    - esheder
