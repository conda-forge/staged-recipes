schema_version: 1

context:
  version: "3.0.3"

package:
  name: noisereduce
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/n/noisereduce/noisereduce-${{ version }}.tar.gz
  sha256: ff64a28fb92e3c81f153cf29550e5c2db56b2523afa8f56f5e03c177cc5e918f

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
  run:
    - python >=${{ python_min }}
    - scipy
    - matplotlib-base
    - numpy
    - tqdm
    - joblib

tests:
  - python:
      imports:
        - noisereduce
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  summary: Noise reduction using Spectral Gating in Python
  license: MIT
  license_file: LICENSE
  homepage: https://github.com/timsainb/noisereduce

extra:
  recipe-maintainers:
    - ocefpaf
