{% set version = "1.1.1" %}

package:
  name: quboify
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/q/quboify/quboify-{{ version }}.tar.gz
  sha256: 532f359c212f3d0c9e5bf49f575ba7dbd9db8acb408983c41530f1ef79e3aac5

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python
    - hatchling
    - hatch-vcs
    - pip
  run:
    - python
    - qubovert >=1.2.5
    - sympy

test:
  imports:
    - quboify
  commands:
    - pip check
  requires:
    - pip
    - python

about:
  home: https://pypi.org/project/quboify/
  summary: Symbolic QUBO Modeling
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - henrikarhula
