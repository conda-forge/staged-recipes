# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json

context:
  name: asmjit
  version: 0.0.0.2026.03.26
  commit: 0bd5787b54b575ed94bf32ac452153b34385c514

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://github.com/asmjit/asmjit/archive/${{ commit }}.tar.gz
  sha256: 8d642612b05d0fd932beee8bdb8c9559c675cb4d2db2946b9636a1fef32b3fb9

build:
  number: 0
  script:
    - if: unix
      then:
        - cmake -S . -B build -G Ninja ${CMAKE_ARGS} -DCMAKE_BUILD_TYPE=Release -DASMJIT_STATIC=OFF -DASMJIT_TEST=OFF
        - cmake --build build --config Release --parallel ${CPU_COUNT}
    - if: win
      then:
        - cmake -S . -B build -G Ninja %CMAKE_ARGS% -DCMAKE_BUILD_TYPE=Release -DASMJIT_STATIC=OFF -DASMJIT_TEST=OFF
        - cmake --build build --config Release --parallel %CPU_COUNT%
    - cmake --install build --config Release

requirements:
  build:
    - ${{ compiler("cxx") }}
    - ${{ stdlib("c") }}
    - cmake
    - ninja
  run_exports:
    weak:
      - ${{ pin_subpackage("asmjit", upper_bound="x.x") }}

tests:
  - package_contents:
      include:
        - asmjit/asmjit.h
      lib:
        - asmjit
      files:
        - if: unix
          then: lib/cmake/asmjit/asmjit-config.cmake
        - if: win
          then: Library/lib/cmake/asmjit/asmjit-config.cmake
  - script:
      - cmake -S test -B test-build -G Ninja -DCMAKE_BUILD_TYPE=Release
      - cmake --build test-build --config Release
      - if: unix
        then: ./test-build/asmjit-smoke
      - if: win
        then: test-build\asmjit-smoke.exe
    files:
      recipe:
        - test/CMakeLists.txt
        - test/test.cpp
    requirements:
      build:
        - ${{ compiler("cxx") }}
        - ${{ stdlib("c") }}
      run:
        - cmake
        - ninja

about:
  homepage: https://asmjit.com
  repository: https://github.com/asmjit/asmjit
  summary: Low-latency machine code generation
  license: Zlib
  license_file: LICENSE.md

extra:
  recipe-maintainers:
    - kklein
