{% set name = "magnum-integration" %}
# Habitat-Sim v0.3.3 vendors this post-v2020.06 snapshot.
{% set version = "2024.12.19" %}
{% set commit = "bc056f8800c88e21990e11461f75d409748f18a7" %}

package:
  name: {{ name|lower }}
  version: "{{ version }}"

source:
  - url: https://github.com/mosra/magnum-integration/archive/{{ commit }}.tar.gz
    sha256: e1c893b0acfb3488e21f1a29fa64c44d927b5135a415a9ccd1db18d37ca3fb1c
  - url: https://github.com/mosra/toolchains/archive/23cd3a402cb3004a35c1248f4e1c185c49d097da.tar.gz
    sha256: 19888dee2da5991581ab66f0dbaa7902822dde1361a6a540f31c5405a48d842d

build:
  number: 0
  run_exports:
    - {{ pin_subpackage('magnum-integration', max_pin='x.x') }}
  skip: true  # [win or osx]

requirements:
  build:
    - {{ compiler('cxx') }}
    - {{ compiler('c') }}
    - {{ stdlib('c') }}
    - {{ cdt('libglvnd-egl') }}       # [linux]
    - {{ cdt('libglvnd-devel') }}     # [linux]
    - libgl-devel                     # [linux]
    - {{ cdt('mesa-libegl-devel') }}  # [linux]
    - {{ cdt('mesa-dri-drivers') }}   # [linux]
    - ninja
    - cmake <4
    - pkg-config

  host:
    - eigen
    - magnum

  run:
    - eigen
    - magnum

test:
  requires:
    - {{ compiler('cxx') }}
    - {{ stdlib('c') }}
    - cmake <4
    - ninja
  files:
    - test-cmake
  commands:
    - test -f $PREFIX/share/cmake/MagnumIntegration/MagnumIntegrationConfig.cmake  # [not win]
    - cmake -S test-cmake -B test-cmake-build -G Ninja -DCMAKE_BUILD_TYPE=Release  # [unix]
    - cmake --build test-cmake-build --verbose  # [unix]
    - ./test-cmake-build/magnum_integration_consumer  # [unix]
    - if not exist %PREFIX%\\Library\\share\\cmake\\MagnumIntegration\\MagnumIntegrationConfig.cmake exit 1  # [win]

about:
  home: https://magnum.graphics/
  license: MIT
  license_family: MIT
  license_file: COPYING
  summary: Integration libraries for the Magnum C++11 graphics engine

extra:
  recipe-maintainers:
    - jeongseok-meta
