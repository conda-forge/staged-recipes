context:
  name: perl-par
  version: "1.021"

package:
  name: ${{ name }}
  version: ${{ version }}

source:
  url: https://cpan.metacpan.org/authors/id/R/RS/RSCHUPP/PAR-${{ version }}.tar.gz
  sha256: 732fcfd3c1ba8bb314d7df92d14209e066d19b4c45f8451e58d684f0ddfe6bf3

build:
  number: 0
  noarch: generic
  script:
    - perl Makefile.PL INSTALLDIRS=vendor NO_PERLLOCAL=1 NO_PACKLIST=1
    - make
    - make test
    - make install VERBINST=1

requirements:
  build:
    - make
  host:
    - perl
    - perl-archive-zip
    - perl-par-dist
  run:
    - perl
    - perl-archive-zip
    - perl-par-dist

tests:
  - script: perl -e 'use PAR; print "ok\n"'

about:
  homepage: https://metacpan.org/dist/PAR
  summary: Perl Archive Toolkit
  license: Artistic-1.0-Perl OR GPL-1.0-or-later
  license_file: LICENSE

extra:
  recipe-maintainers:
    - baszalmstra
