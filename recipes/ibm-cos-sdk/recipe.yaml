# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json

schema_version: 1

context:
  version: "2.14.3"

package:
  name: ibm-cos-sdk
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/i/ibm-cos-sdk/ibm_cos_sdk-${{ version }}.tar.gz
  sha256: 643b6f2aa1683adad7f432df23407d11ae5adb9d9ad01214115bee77dc64364a

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - setuptools
  run:
    - python >=${{ python_min }}
    # Co-released and version-locked to the core and s3transfer packages.
    - ibm-cos-sdk-core ==2.14.3
    - ibm-cos-sdk-s3transfer ==2.14.3
    - jmespath >=0.10.0,<=1.0.1

tests:
  - python:
      imports:
        - ibm_boto3
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  homepage: https://github.com/ibm/ibm-cos-sdk-python
  repository: https://github.com/ibm/ibm-cos-sdk-python
  summary: IBM SDK for Python
  license: Apache-2.0
  license_file: LICENSE

extra:
  recipe-maintainers:
    - killua156
    - mgorny
