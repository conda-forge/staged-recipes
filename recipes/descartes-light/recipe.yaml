schema_version: 1

context:
  version: "0.4.10"

package:
  name: descartes-light
  version: ${{ version }}

source:
  - url: https://github.com/swri-robotics/descartes_light/archive/refs/tags/${{ version }}.tar.gz
    sha256: 2e0ca99ffc7c54f94dc731ee0f995c3ec3763c111bd409d30451ffbd6381d17d
    file_name: source.tar.gz

build:
  number: 0

requirements:
  build:
    - ${{ compiler('c') }}
    - ${{ compiler('cxx') }}
    - ${{ stdlib("c") }}
    - gtest
    - gmock
    - cmake
    - ninja
    - ros-industrial-cmake-boilerplate
  host:
    - eigen
    - eigen-abi-devel
    - console_bridge
    - libboost-devel
  run:
    - eigen
    - console_bridge
  run_exports:
    - ${{ pin_subpackage('descartes-light', upper_bound='x.x') }}

tests:
  - package_contents:
      include:
      - descartes_light/core/solver.h
      lib:
      - descartes_light

about:
  summary: Library for generation motion plans for process toolpaths
  license: Apache-2.0
  license_file: src/LICENSE.Apache-2.0
  homepage: https://github.com/swri-robotics/descartes_light

extra:
  recipe-maintainers:
    - johnwason
