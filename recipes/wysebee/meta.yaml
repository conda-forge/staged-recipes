{% set version = "0.2.0" %}

package:
  name: wysebee
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/w/wysebee/wysebee-{{ version }}.tar.gz
  sha256: d42560c06c60318e4b2a1c38374d6a063f11c31fe042a515fe5b2bcca78cc51b

build:
  entry_points:
    - wyse = wysebee.cli.main:app
    - wyse-web = wysebee.cli.main:app_web
    - wyse-desktop = wysebee.cli.main:app_desktop
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python >=3.9
    - flit-core <4
    - pip
  run:
    - python >=3.9
    - pyside6 >=6.9.0
    - jinja2 >=3.1.2
    - typer >=0.15.2
    - colorama >=0.4.6
    - watchdog ==6.0.0

test:
  imports:
    - wysebee
  commands:
    - pip check
    - wyse --help
    - wyse-web --help
    - wyse-desktop --help
  requires:
    - pip
    - python

about:
  home: https://github.com/wysebee/wysebee-io
  summary: A simple cross-platform framework for your AI project.
  license: MIT
  license_file: LICENSE.txt

extra:
  recipe-maintainers:
    - Jeffxz
