{% set version = "0.3.6" %}
{% set python_min = "3.9" %}

package:
  name: wysebee
  version: {{ version }}


source:
  url: https://pypi.org/packages/source/w/wysebee/wysebee-{{ version }}.tar.gz
  sha256: efc0b8f39b36feb24a67a4b542dd21906a5e73b71e8236e90df3b66da3694c31

build:
  entry_points:
    - wyse = wysebee.cli.main:app
    - wyse-web = wysebee.cli.main:app_web
    - wyse-desktop = wysebee.cli.main:app_desktop
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - flit-core <4
    - pip
  run:
    - python >={{ python_min }}
    - pyside6 >=6.9.0
    - jinja2 >=3.1.2
    - typer >=0.15.2
    - colorama >=0.4.6
    - watchdog ==6.0.0

test:
  imports:
    - wysebee
  commands:
    - pip check
    - wyse --help
    - wyse-web --help
    - wyse-desktop --help
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://github.com/wysebee/wysebee
  summary: A simple cross-platform framework for your AI project.
  license: MIT
  license_file: LICENSE.txt

extra:
  recipe-maintainers:
    - Jeffxz
