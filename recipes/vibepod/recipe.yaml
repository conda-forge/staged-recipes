context:
  version: 0.17.0
  build_number: '0'

package:
  name: vibepod
  version: ${{ version }}

source:
- url: https://files.pythonhosted.org/packages/c2/a5/97bdd0c24ac6ed099e8ecd6e84b478d2908c3daaeca9739748b736498454/vibepod-${{ version }}.tar.gz
  sha256: f8d5f09fffeee426cb6e81359b2711410727e832612b5d22a69dc5ec847cfad7

build:
  number: ${{ build_number }}
  script: ${{ PYTHON }} -m pip install .
  python:
    entry_points:
    - vibepod = vibepod.cli:app
    - vp = vibepod.cli:app
  noarch: python

requirements:
  host:
  - python ${{ python_min }}.*
  - hatchling >=1.24.0
  - pip
  - setuptools
  run:
  - python >=${{ python_min }}
  - click >=8.0.0
  - docker >=7.0.0
  - platformdirs >=4.0.0
  - pyyaml >=6.0.0
  - rich >=13.0.0
  - typer >=0.12.0

tests:
- python: ${{ python_min }}.*
    imports:
    - vibepod
    pip_check: true

about:
  homepage: https://vibepod.dev/
  summary: One CLI for containerized AI coding agents
  repository: https://github.com/VibePod/vibepod-cli
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - ReimarBauer
    - nezhar
