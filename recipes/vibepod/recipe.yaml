schema_version: 1

context:
  version: "0.17.0"

package:
  name: vibepod
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/v/vibepod/vibepod-${{ version }}.tar.gz
  sha256: f8d5f09fffeee426cb6e81359b2711410727e832612b5d22a69dc5ec847cfad7

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  python:
    entry_points:
      - vp = vibepod.cli:app
      - vibepod = vibepod.cli:app

requirements:
  host:
    - python ${{ python_min }}
    - hatchling >=1.24.0
    - pip
    - setuptools
  run:
    - python >=${{ python_min }}
    - typer >=0.12.0
    - click >=8.0.0
    - rich >=13.0.0
    - docker-py >=7.0.0
    - pyyaml >=6.0.0
    - platformdirs >=4.0.0

tests:
  - python:
      imports:
        - vibepod
      pip_check: true
      python_version: ${{ python_min }}
  - requirements:
      run:
        - pip
        - python ${{ python_min }}
    script:
      - vp --help
      - vibepod --help

about:
  summary: One CLI for containerized AI coding agents
  license: MIT
  license_file: LICENSE
  homepage: https://vibepod.dev/
  repository: https://github.com/VibePod/vibepod-cli

extra:
  recipe-maintainers:
    - ReimarBauer
    - nezhar
