version: 1
disable_existing_loggers: false
formatters:
    console:
        format: '%(asctime)s : [%(levelname)s] %(name)s : %(module)s : %(funcName)s :: %(message)s'
        datefmt: '%Y-%m-%d %H:%M:%S'
handlers:
    console:
      class: logging.StreamHandler
      level: DEBUG
      formatter: console
loggers:
    distributed:
      level: DEBUG
      handlers: [console]
      propagate: true
    dask:
      level: DEBUG
      handlers: [console]
      propagate: true
