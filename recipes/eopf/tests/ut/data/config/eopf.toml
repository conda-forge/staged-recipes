# Example TOML Configuration File

foo1 = "1"
foo2 = "1"
foonodefaults = "1"

[triggering]
validate_run = true
use_default_filename = true
use_basic_logging = false
load_default_logging = false
wait_before_exit = 0
use_datatree = false

[general]
title = "My Application"
version = 1.0
description = "An example configuration file with complex structures."

[database]
host = "localhost"
port = 5432
username = "admin"
password = "secretpassword"

[logging]
level = "DEBUG"


[accessors.memmap]
packet_cache_size = 20000

[store.convert]
use_multithreading = false

#[zarr]
#format = 3

[dask_context]
cluster_type = "local"
[dask_context.cluster_config]
# Default to use only multi-process dask local cluster
threads_per_worker = 2
n_workers = 2
processes = true
memory_limit = "8GiB"

[product]
mask_apply = true
scale_apply = true
mask_and_scale = true

[users]
[[users.admin]]
name = "Alice"
email = "alice@example.com"

[[users.admin]]
name = "Bob"
email = "bob@example.com"

[[users.editor]]
name = "Charlie"
email = "charlie@example.com"

[[users.viewer]]
name = "Dave"
email = "dave@example.com"
