---
general_configuration:
  logging:
    level: DEBUG
  # breakpoints folder
  breakpoints__folder: ./breakpoints
  triggering__use_default_filename: False
  triggering__wait_before_exit: 1
  triggering__cache_writer_params:
    mode: "w"
    compute: false
workflow:
  - module: tests.ut.computing.test_abstract
    processing_unit: TestAbstractProcessor
    name: test_abstract_processor
    outputs:
      out: output
    parameters:
      size_x: 5000
      size_y: 5000
      chunk_x: 5000
      chunk_y: 5000
      min_value: 0
      max_value: 100
      nb_var: 1
      variables_paths:
        - "/measurements/image/oa01_radiance"
        - "/measurements/image/oa02_radiance"
        - "/measurements/image/oa03_radiance"
        - "/measurements/image/oa04_radiance"
        - "/measurements/image/oa05_radiance"
        - "/measurements/image/oa06_radiance"
        - "/measurements/image/oa07_radiance"
        - "/measurements/image/oa08_radiance"
        - "/measurements/image/oa09_radiance"
        - "/measurements/image/oa10_radiance"
      dest_path: "/measurements/variable"
  - module: tests.ut.computing.test_abstract
    processing_unit: TestHeavyProcessingProcessor
    name: test_heavy_processor
    inputs:
      in: output
    outputs:
      out: outputs
io:
  output_products:
    - id: output
      path: output.zarr
      type: file
      engine: cpm_zarr
      writer_params:
        mode: "w"
        compute: true
      apply_eoqc: true
    - id: outputs
      path: "./finals/"
      type: folder
      engine: cpm_zarr
      writer_params:
        default_codec: !ZarrCompressor
          cname: "zstd"
          clevel: 3
          shuffle: 2
        mode: "w"
        compute: true
context_managers:
  - module: eopf.dask_utils.dask_context_manager
    context_manager: DaskContext
    parameters:
      cluster_type: local
      cluster_config: { }
      client_config: { }
      connect_timeout: 60
logging:
  - "./default.json"
config:
  - "./eopf.toml"
