---
general_configuration:
  logging:
    level: DEBUG
  # Export the dask graph for variables at writing time
  dask__export_graphs: ./graphs/
  # breakpoints folder
  breakpoints__folder: ./breakpoints
breakpoints:
  ids:
    - test_abstract_container_processor
  folder: breakpoint
workflow:
  - module: tests.ut.computing.test_abstract
    processing_unit: TestAbstractContainerProcessor
    name: test_abstract_container_processor
    inputs:
      in1: OLCI
      in2: foobar
    adfs:
      dem: DEM
      tes: pasla
    parameters:
      variables_paths:
        - "/measurements/image/oa01_radiance"
        - "/measurements/image/oa02_radiance"
        - "/measurements/image/oa03_radiance"
        - "/measurements/image/oa04_radiance"
        - "/measurements/image/oa05_radiance"
        - "/measurements/image/oa06_radiance"
        - "/measurements/image/oa07_radiance"
        - "/measurements/image/oa08_radiance"
        - "/measurements/image/oa09_radiance"
        - "/measurements/image/oa10_radiance"
      dest_path: "/measurements/variable"
  - module: tests.ut.computing.test_abstract
    processing_unit: TestAbstractContainerProcessor
    name: test_abstract_container_processor_bis
    inputs:
      in1: OLCI
      in2: test_abstract_container_processor.out
    outputs:
      out: output
    parameters:
      variables_paths:
        - "/measurements/image/oa01_radiance"
        - "/measurements/image/oa02_radiance"
        - "/measurements/image/oa03_radiance"
        - "/measurements/image/oa04_radiance"
        - "/measurements/image/oa05_radiance"
        - "/measurements/image/oa06_radiance"
        - "/measurements/image/oa07_radiance"
        - "/measurements/image/oa08_radiance"
        - "/measurements/image/oa09_radiance"
        - "/measurements/image/oa10_radiance"
      dest_path: "/measurements/variable"
io:
  input_products:
    - id: OLCI
      path: input.SAFE
  output_products:
    - id: output
      path: output.zarr
    - id: outputs
      path: "./finals/"
      type: folder
      engine: cpm_zarr
  adfs:
    - id: DEM
      path: DEM.zarr
context_managers:
  - module: eopf.dask_utils.dask_context_manager
    context_manager: DaskContext
    parameters:
      cluster_type: local
      cluster_config: { }
      client_config: { }
      connect_timeout: 60
logging:
  - "./default.json"
config:
  - "./eopf.toml"
