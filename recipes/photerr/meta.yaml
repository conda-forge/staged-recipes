{% set version = "1.5.1" %}
{% set python_min = "3.10" %}

package:
  name: photerr
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/p/photerr/photerr-{{ version }}.tar.gz
  sha256: 164b87c9ff8cf759be879d3910121f5760d57c8fa66ccd1792984c0267b3c3c0

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - hatchling
    - pip
  run:
    - python >={{ python_min }}
    - numpy >=1.23.2
    - pandas >=1.4.3

test:
  imports:
    - photerr
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://github.com/jfcrenshaw/photerr
  summary: Photometric error model for astronomical imaging surveys
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - jfcrenshaw
