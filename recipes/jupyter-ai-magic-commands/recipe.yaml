context:
  version: "0.0.2"

package:
  name: jupyter-ai-magic-commands
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/j/jupyter-ai-magic-commands/jupyter_ai_magic_commands-${{ version }}.tar.gz
  sha256: 57451a82b165ba4c32b5747eb2036b2cf0abcfa7dcae2d703ecaa3f989e70f30

build:
  noarch: python
  script: python -m pip install . -vv
  number: 0

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - hatchling >=1.4.0
  run:
    - python >=${{ python_min }}
    - click >=8.1.0,<9
    - ipython
    - pydantic >=2.10.0,<3

tests:
  - python:
      imports:
        - jupyter_ai_magic_commands
      pip_check: true
    requirements:
      run:
        - python ${{ python_min }}.*

about:
  homepage: https://github.com/jupyter-ai-contrib/jupyter-ai-magic-commands
  summary: "Magic commands for using LLMs in Jupyter notebooks"
  license: BSD-3-Clause
  license_file: LICENSE
  documentation: https://jupyter-ai.readthedocs.io/
  repository: https://github.com/jupyter-ai-contrib/jupyter-ai-magic-commands

extra:
  recipe-maintainers:
    - dlqqq
    - andrii-i
