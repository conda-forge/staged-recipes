context:
  version: "0.1.46"

recipe:
  name: pytoniq_core-split
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/p/pytoniq-core/pytoniq_core-${{ version }}.tar.gz
  sha256: c8e3cf9ccb1852780a725cd51ba7a66a28122eb39c8b9bb97dcdc5bd02c24734
  patches:
    # Requested changes upstream: https://github.com/yungwine/pytoniq-core/issues/31
    - use-nacl-crypto_scalarmult-cyphers.py.patch

build:
  number: 0

outputs:
  - package:
      name: pytoniq-core
    build:
      noarch: python
      script: python -m pip install . -vv
    requirements:
      host:
        - python ${{ python_min }}.*
        - pip
        - setuptools >=65.5.1
      run:
        - bitarray
        - pynacl
        - pycryptodomex
        - python >=${{ python_min }}
        - requests
    tests:
      - python:
          imports:
            - pytoniq_core
          pip_check: true
      - script:
          - pytest tests
        requirements:
          run:
            - pytest
            - python ${{ python_min }}.*
        files:
          source:
            - tests

  - package:
      name: pytoniq_core
    requirements:
      run:
        - ${{ pin_subpackage("pytoniq-core", exact=True) }}
    tests:
      - python:
          imports:
            - pytoniq_core

about:
  homepage: https://github.com/yungwine/pytoniq
  summary: 'TON Blockchain SDK with native ADNL protocols implementations'
  description: |
    Pytoniq is a Python SDK for the TON Blockchain. This library extends pytoniq-core with native LiteClient and ADNL.
  license: MIT
  license_file: LICENSE
  repository: https://github.com/yungwine/pytoniq

extra:
  recipe-maintainers:
    - MementoRC
