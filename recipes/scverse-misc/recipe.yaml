schema_version: 1

context:
  version: "0.0.3"
  python_min: "3.10"

package:
  name: scverse-misc
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/s/scverse-misc/scverse_misc-${{ version }}.tar.gz
  sha256: 18c46eeeac8ccef8f435e41a8ee86173b3d7ef6ea1167fde97a17553f70d3210

build:
  noarch: python
  number: 0
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - hatch-vcs
    - hatchling
    - pip
  run:
    - python >= ${{ python_min }}
    - session-info2
    - typing_extensions

tests:
  - python:
      python_version: ${{ python_min }}.*
      imports:
        - scverse_misc
      pip_check: true

about:
  summary: Miscellaneous utility code used by scverse packages
  license: BSD-3-Clause
  license_file: LICENSE
  homepage: https://github.com/scverse/scverse-misc
  repository: https://github.com/scverse/scverse-misc
  documentation: https://scverse-misc.readthedocs.io/

extra:
  recipe-maintainers:
    - ilia-kats
