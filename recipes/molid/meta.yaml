{% set name = "molid" %}
{% set version = "0.8.5" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/molid-{{ version }}.tar.gz
  sha256: 2f69da64bd7e0f884d0640f7231c29ed9ebd1fff3d565463e39bd87c5313165f

build:
  entry_points:
    - molid = molid.cli:cli
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - setuptools >=61
    - wheel
    - pip
  run:
    - python >={{ python_min }}
    - click >=8.0
    - ase >=1.1.7
    - appdirs >=1.4
    - psutil >=5.0.0
    - pydantic >=2.0
    - pydantic-settings >=2.0
    - requests >=2.20.0
    - tqdm

test:
  imports:
    - molid
  commands:
    - pip check
    - molid --help
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://github.com/FAIRmat-NFDI/molid
  summary: A package for processing PubChem data and managing a database of chemical compounds.
  license: Apache-2.0
  license_file: LICENSE

extra:
  recipe-maintainers:
    - jan-janssen
