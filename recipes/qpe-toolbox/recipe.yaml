schema_version: 1

context:
  version: "1.1.0"

package:
  name: qpe-toolbox
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/q/qpe-toolbox/qpe_toolbox-${{ version }}.tar.gz
  sha256: 60b6a5db826cfc36fa2c42a7f52e816e5a093ebc9ea42fef1c404a0489b6caf9

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python >=3.12
    - hatchling >=1.26
    - pip
  run:
    - python >=3.12
    - jax >=0.8.1
    - numpy >=2.0.0
    - openfermion >=1.0.0
    - optuna >=4.6.0
    - pyscf >=2.0.0
    - quimb >=1.11.2
    - scipy >=1.16.3,!=1.17.0
    - cmaes >=0.12.0
    - qiskit >=2.3.0
    - qiskit-aer >=0.17.2
    - autoray >=0.8.4
    - cotengra >=0.7.5
    - matplotlib-base >=3.10.8
    - networkx >=3.6.1

tests:
  - python:
      imports:
        - qpe_toolbox
      pip_check: true

about:
  summary: A Quantum Phase Estimation Toolbox
  license: Apache-2.0
  license_file:
    - NOTICE.txt
    - LICENSE.txt
  homepage: https://pypi.org/project/qpe-toolbox/
  documentation: https://quobly-sw.github.io/qpe-toolbox

extra:
  recipe-maintainers:
    - ogauthe
    - bvermersch
    - thibxlv
