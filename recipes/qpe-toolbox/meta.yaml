{% set version = "1.0.0" %}

package:
  name: qpe-toolbox
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/q/qpe-toolbox/qpe_toolbox-{{ version }}.tar.gz
  sha256: cfde7c03ccc9beeb1e9e970e5133b9238fb25fa9704f7821889eb636d5ae6402

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python >=3.12
    - hatchling >=1.26
    - pip
  run:
    - python >=3.12
    - jax >=0.8.1
    - numpy >=2.0.0
    - openfermion >=1.0.0
    - kahypar >=1.3.5
    - optuna >=4.6.0
    - pyscf >=2.0.0
    - quimb >=1.11.2
    - scipy >=1.16.3,!=1.17.0
    - cmaes >=0.12.0
    - qiskit >=2.3.0
    - autoray >=0.8.4
    - cotengra >=0.7.5
    - matplotlib-base >=3.10.8

test:
  imports:
    - qpe_toolbox
  commands:
    - pip check
  requires:
    - pip
    - python

about:
  home: https://pypi.org/project/qpe-toolbox/
  summary: A Quantum Phase Estimation Toolbox
  doc_url: https://quobly-sw.github.io/qpe-toolbox
  license: Apache-2.0
  license_file:
    - NOTICE.txt
    - LICENSE.txt

extra:
  recipe-maintainers:
    - ogauthe
