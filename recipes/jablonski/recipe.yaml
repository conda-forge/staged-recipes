context:
  version: "0.1.0"
  python_min: '3.12'

package:
  name: jablonski
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/j/jablonski/jablonski-${{ version }}.tar.gz
  sha256: 59a4620d21b6e3eac80eb9f1161fde8a5f5021321bd1c43f393f33e35017808c

build:
  noarch: python
  script: python -m pip install . -vv
  number: 0

requirements:
  host:
    - python ${{ python_min }}.*
    - uv-build
    - pip
  run:
    - python >=${{ python_min }}
    - poincare >=1.1.1

tests:
  - python:
      imports:
        - poincare
      pip_check: true

about:
  homepage: https://dyscolab.github.io
  documentation: https://dyscolab.github.io/jablonski
  repository: https://github.com/dyscolab/jablonski
  license: BSD-3-Clause
  license_file: LICENSE
  summary: 'Simulation of dynamical systems.'

extra:
  recipe-maintainers:
    - maurosilber
    - olistarosta
