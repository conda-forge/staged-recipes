schema_version: 1

context:
  name: pdf_cpplib
  version: "0.1.0"
  commit: "8dcca62461e6e6c7857299c4c4d90a6ccbc6347b"

package:
  name: ${{ name }}
  version: ${{ version }}

source:
  url: https://github.com/amritagos/pdf_cpplib/archive/${{ commit }}.tar.gz
  sha256: ac05ed0b59dc5e700ce5f4fa83ca94e1b5cf46355101927a8ec8e9b2d73f4abd

build:
  # Header-only; ship once as noarch.
  noarch: generic
  number: 0

requirements:
  build: []
  run: []

tests:
  - package_contents:
      files:
        - include/pdf_cpplib/include/probability_dist.hpp
        - include/pdf_cpplib/include/reservoir_sampling.hpp
        - include/pdf_cpplib/include/beta_distribution.hpp
        - include/pdf_cpplib/include/erfinv.hpp
        - lib/pkgconfig/pdf_cpplib.pc

about:
  homepage: https://github.com/amritagos/pdf_cpplib
  summary: Header-only C++ probability distribution helpers
  license: GPL-3.0-only
  license_file: LICENSE
  repository: https://github.com/amritagos/pdf_cpplib

extra:
  recipe-maintainers:
    - HaoZeke
