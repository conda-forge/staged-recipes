{% set version = "0.3.5" %}

package:
  name: hklpy2_solvers
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/h/hklpy2_solvers/hklpy2_solvers-{{ version }}.tar.gz
  sha256: c0995b3deb4ab828bfa545947e3441b8926f44a6102797ea4d5430912ba95d6a

build:
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0
  # hklpy2 requires hkl (libhkl), which is only available on linux-64.
  # Restrict to linux until libhkl is packaged for other platforms.
  # (noarch is intentionally omitted: noarch packages cannot use skip
  # selectors, and this package is only installable on linux anyway.)
  skip: true  # [not linux or py<310]

requirements:
  host:
    - hatch-vcs
    - hatchling
    - pip
    - python
  run:
    - python
    - ad-hoc-diffractometer >=0.11.2
    - hklpy2 >=0.7.1
    - numpy

test:
  imports:
    - hklpy2_solvers
  requires:
    - pip
  commands:
    - pip check
    - python -c "import hklpy2; psic = hklpy2.creator(geometry='psic', solver='ad_hoc')"

about:
  home: https://github.com/prjemian/hklpy2_solvers
  summary: 'Solvers for the hklpy2 diffractometer control package.'
  description: |
    **hklpy2-solvers** provides solvers that plug into the
    `hklpy2 <https://blueskyproject.io/hklpy2/>`_ diffractometer control
    framework via its entry-point interface.
  license: LicenseRef-UChicago-Argonne-LLC-License
  license_file: LICENSE
  doc_url: https://prjemian.github.io/hklpy2_solvers/
  dev_url: https://github.com/prjemian/hklpy2_solvers

extra:
  recipe-maintainers:
    - prjemian
