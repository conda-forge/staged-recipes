{% set version = "0.3.4" %}
{% set python_min = "3.10" %}

package:
  name: hklpy2_solvers
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/h/hklpy2_solvers/hklpy2_solvers-{{ version }}.tar.gz
  sha256: 16f84e77f10eb19f1d73ffbe67cb5df7008c6a48402e6b3d8f3a7a3a5e99fa34

build:
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0
  noarch: python

requirements:
  host:
    - hatch-vcs
    - hatchling
    - pip
    - python {{ python_min }}
  run:
    - python >={{ python_min }}
    - ad-hoc-diffractometer >=0.11.2
    - diffcalc-core
    - hklpy2 >=0.7.1
    - numpy

test:
  imports:
    - hklpy2_solvers
  requires:
    - pip
    - python {{ python_min }}
  commands:
    - pip check
    - python -c "import hklpy2; psic = hklpy2.creator(geometry='psic', solver='ad_hoc')"
    - python -c "import hklpy2; psic = hklpy2.creator(geometry='diffcalc_4S_2D', solver='diffcalc')"

about:
  home: https://github.com/prjemian/hklpy2_solvers
  summary: 'Solvers for the hklpy2 diffractometer control package.'
  description: |
    **hklpy2-solvers** provides solvers that plug into the
    `hklpy2 <https://blueskyproject.io/hklpy2/>`_ diffractometer control
    framework via its entry-point interface.
  license: LicenseRef-UChicago-Argonne-LLC-License
  license_file: LICENSE
  doc_url: https://prjemian.github.io/hklpy2_solvers/
  dev_url: https://github.com/prjemian/hklpy2_solvers

extra:
  recipe-maintainers:
    - prjemian
