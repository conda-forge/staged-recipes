schema_version: 1

context:
  version: "0.0.2"

package:
  name: mom6_forge
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/m/mom6_forge/mom6_forge-${{ version }}.tar.gz
  sha256: 48135146efe5cd758a4095d88778c5db9a07bca8e6ea9e5a2496ab212b5c3a84

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python >=3.11,<3.15
    - setuptools >=77.0.3
    - pip
  run:
    - python >=3.11,<3.15
    - setuptools >=69.0,<82.1
    - numpy >=1.26,<2.5.0
    - xarray >=2023.12,<2026.3.0
    - matplotlib-base >=3.9,<3.11.0
    - scipy >=1.11,<1.18.0
    - netcdf4 >=1.6,<1.8.0
    - jupyterlab >=4.0,<4.6.0
    - ipympl >=0.9.4,<0.11.0
    - ipywidgets >=8.1.1,<8.2.0
    - sphinx >=8.1,<9.2.0
    - sphinx_rtd_theme >=3.0,<3.2.0
    - black >=24.1,<26.4.0
    - pytest >=8.0,<9.1.0
    - pytest-cov >=7.0,<7.2.0
    - gitpython >=3.1,<3.2.0
    - cartopy >=0.23,<0.30
    - xesmf >=0.8.10,<1.0.0

tests:
  - python:
      imports:
        - mom6_forge
      pip_check: true
      python_version: ${{ python_min }}.*
  - requirements:
      run:
        - pytest
    files:
      source:
      - tests/test_supergrid.py

about:
  summary: MOM6 simple grid and bathymetry generator
  license: Apache-2.0
  license_file: LICENSE.md
  homepage: https://github.com/NCAR/mom6_forge

extra:
  recipe-maintainers:
    - alperaltuntas
    - manishvenu
