{% set version = "1.0.0" %}

package:
  name: mf6adj
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/m/mf6adj/mf6adj-{{ version }}.tar.gz
  sha256: 6eb191dbed5f5e7d474aa3e99ad7bfdd101d0fd28da07a5aa2e30effe7e49a50

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python {{ python_min }}.*
    - hatchling
    - hatch-fancy-pypi-readme
    - pip
  run:
    - python >={{ python_min }}
    - numpy >=2.0
    - matplotlib-base >=3.5.0
    - pandas >=2.0.0
    - flopy >=3.10.0
    - modflowapi >=0.2.0
    - h5py >=3.0.0
    - scipy >=1.7.0
    - pyemu >=1.4.0
    - geopandas >=1.0.0

test:
  imports:
    - mf6adj
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}.*

about:
  home: https://pypi.org/project/mf6adj/
  summary: mf6adj is a Python package for adjoint-state sensitivity analysis with MODFLOW 6
  doc_url: https://md6adj.readthedocs.io
  license: CC0-1.0
  license_file: LICENSE

extra:
  recipe-maintainers:
    - jdhughes-dev
    - jtwhite79
