{% set name = "substrait-protobuf" %}
{% set version = "0.79.0" %}

package:
  name: python-{{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/substrait_protobuf-{{ version }}.tar.gz
  sha256: f1bf8641eb3ee785f4affd4f728568958deda2bb1ededa09f02f2118229616d4

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - pip
    - setuptools >=80
  run:
    - python >={{ python_min }}
    - protobuf >=5,<7

test:
  imports:
    - substrait.plan_pb2
  commands:
    - pip check
  requires:
    - python {{ python_min }}
    - pip

about:
  home: https://substrait.io
  summary: Generated Substrait Protocol Buffer Code
  license: Apache-2.0
  license_file: LICENSE
  dev_url: https://github.com/substrait-io/substrait-packaging

extra:
  recipe-maintainers:
    - nielspardon
