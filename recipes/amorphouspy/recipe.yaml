schema_version: 1

context:
  version: "0.5.1"

package:
  name: amorphouspy
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/a/amorphouspy/amorphouspy-${{ version }}.tar.gz
  sha256: 0a437728a55289d835e67b9cb4c82c25937e094e6e88ff33306cf86a22df43bf

build:
  noarch: python
  script: python -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python >=3.12
    - pip
    - hatchling >=1.21
  run:
    - python >=3.12
    - ase
    - numba
    - pandas
    - lammpsparser
    - networkx
    - pymatgen
    - scikit-image
    - scipy

test:
  imports:
    - amorphouspy

about:
  home: https://github.com/glasagent/amorphouspy
  summary: Workflows for atomistic modeling of oxide glasses
  description: |
    A Python package for atomistic simulations of glasses. amorphouspy provides
    capabilities from generating initial structural models through running
    molecular dynamics simulations with LAMMPS, all the way to computing
    material properties and performing detailed structural analysis.
  license: BSD-3-Clause
  license_file: LICENSE
  doc_url: https://glasagent.github.io/amorphouspy/
  dev_url: https://github.com/glasagent/amorphouspy

extra:
  recipe-maintainers:
    - ltalirz
