schema_version: 1

context:
  version: "0.5.0"

package:
  name: tango-keystore
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/t/tango-keystore/tango_keystore-${{ version }}.tar.gz
  sha256: d139601e07bde4c80792c6c54e6efb89fa3c5478439d4ffa8209dc3027763166

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  python:
    entry_points:
      - tango-keystore = tango_keystore.cli:main

requirements:
  host:
    - python ${{ python_min }}.*
    - setuptools >=77.0.3
    - setuptools-scm >=8
    - pip
  run:
    - python >=${{ python_min }}
    - pytango >=9.3.0
    - rich >=13.0.0

tests:
  - python:
      imports:
        - tango_keystore
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - 3.*
  - script:
      - tango-keystore --help
    requirements:
      run:
        - python ${{ python_min }}.*

about:
  summary: Type-preserving key-value store for Tango database
  license: GPL-3.0-or-later
  license_file: LICENSE
  homepage: https://gitlab.com/maxiv/tools/tango-keystore
  repository: https://gitlab.com/maxiv/tools/tango-keystore

extra:
  recipe-maintainers:
    - beenje
