schema_version: 1

context:
  version: "1.6.0"

package:
  name: apfel
  version: ${{ version }}

source:
  # Pre-built binary: apfel wraps Apple's on-device FoundationModels API, which has
  # no public C/Swift ABI to compile against outside of a full macOS 26 SDK + Xcode
  # toolchain, so conda-forge ships the upstream binary release instead of building
  # from source.
  url: https://github.com/Arthur-Ficial/apfel/releases/download/v${{ version }}/apfel-${{ version }}-arm64-macos.tar.gz
  sha256: 9dd4b523cac3947166bd16749e6646e0bb49f97dc0b0367569d16041385dcd84

build:
  number: 0
  skip:
    # arm64-only prebuilt binary: Apple Intelligence/FoundationModels requires
    # Apple Silicon, so there is no Intel macOS, Linux, or Windows build.
    - not (osx and arm64)
  script: build.sh

requirements:
  run:
    # FoundationModels (Apple Intelligence) is only available starting with
    # macOS 26 "Tahoe"; older macOS releases cannot run this binary at all.
    - __osx >=26

tests:
  - script:
      - apfel --version

about:
  homepage: https://github.com/Arthur-Ficial/apfel
  summary: The free AI already on your Mac - CLI tool, OpenAI-compatible server, and interactive chat via Apple Intelligence
  description: |
    apfel exposes the on-device LLM built into Apple Silicon Macs (via Apple
    FoundationModels) as a UNIX tool and a local OpenAI-compatible HTTP server.
    Inference runs 100% on-device: no API keys, no cloud, no downloads. It
    supports piping, file attachments, JSON output, streaming, tool calling, and
    an interactive chat REPL.

    Requires macOS 26 Tahoe or later on Apple Silicon (M1+) with Apple
    Intelligence enabled.
  license: MIT
  license_file: LICENSE
  repository: https://github.com/Arthur-Ficial/apfel

extra:
  recipe-maintainers:
    - jan-janssen
