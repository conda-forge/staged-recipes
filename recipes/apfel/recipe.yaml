schema_version: 1

context:
  version: "1.6.0"

package:
  name: apfel
  version: ${{ version }}

source:
  url: https://github.com/Arthur-Ficial/apfel/archive/refs/tags/v${{ version }}.tar.gz
  sha256: d10be2811bbbfaeeca35ccda967c7750d78b0f66c2b3e6b23502e5129d463fd0

build:
  number: 0
  skip:
    # arm64-only: Apple Intelligence/FoundationModels requires Apple
    # Silicon, so there is no Intel macOS, Linux, or Windows build.
    - not (osx and arm64)
  script: build.sh

requirements:
  build:
    # The Swift toolchain (swift, make) is system-provided by Xcode/Command
    # Line Tools on the conda-forge osx_arm64 runner; there is no
    # conda-forge Swift compiler package to list here. See build.sh for the
    # macOS 26.4 SDK selection logic.
    []
  run:
    # FoundationModels' tokenCount/contextSize APIs (used unconditionally
    # by apfel) only exist starting with the macOS 26.4 SDK/runtime.
    - __osx >=26.4

tests:
  - script:
      - apfel --version
  - package_contents:
      bin:
        - apfel
      files:
        - share/man/man1/apfel.1
        - share/apfel/demo/README.md

about:
  homepage: https://github.com/Arthur-Ficial/apfel
  summary: The free AI already on your Mac - CLI tool, OpenAI-compatible server, and interactive chat via Apple Intelligence
  description: |
    apfel exposes the on-device LLM built into Apple Silicon Macs (via Apple
    FoundationModels) as a UNIX tool and a local OpenAI-compatible HTTP server.
    Inference runs 100% on-device: no API keys, no cloud, no downloads. It
    supports piping, file attachments, JSON output, streaming, tool calling, and
    an interactive chat REPL.

    Requires macOS 26.4 or later on Apple Silicon (M1+) with Apple
    Intelligence enabled.
  license: MIT
  license_file: LICENSE
  repository: https://github.com/Arthur-Ficial/apfel

extra:
  recipe-maintainers:
    - jan-janssen
