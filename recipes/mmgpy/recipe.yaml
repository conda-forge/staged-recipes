schema_version: 1

context:
  version: "0.6.0"
  mmg_version: "5.8.0"

package:
  name: mmgpy
  version: ${{ version }}

source:
  - url: https://github.com/kmarchais/mmgpy/archive/refs/tags/v${{ version }}.tar.gz
    sha256: c12d3bb41fcf6bfb6d9c43ea5c06508f6c754721928dcfcb1b9ecbcfcea7df75
  - url: https://github.com/MmgTools/mmg/archive/refs/tags/v${{ mmg_version }}.tar.gz
    sha256: 686eaab84de79c072f3aedf26cd11ced44c84b435d51ce34e016ad203172922f
    target_directory: mmg-src

build:
  number: 0
  script:
    - if: unix
      then: |
        cmake -B build ${CMAKE_ARGS} -DMMGPY_CONDA_BUILD=ON -DFETCHCONTENT_SOURCE_DIR_MMG=$SRC_DIR/mmg-src -GNinja
        cmake --build build
        cmake --install build
    - if: win
      then: |
        cmake -B build %CMAKE_ARGS% -DMMGPY_CONDA_BUILD=ON -DFETCHCONTENT_SOURCE_DIR_MMG=%SRC_DIR%\mmg-src -GNinja
        if errorlevel 1 exit 1
        cmake --build build
        if errorlevel 1 exit 1
        cmake --install build
        if errorlevel 1 exit 1

requirements:
  build:
    - ${{ compiler('c') }}
    - ${{ compiler('cxx') }}
    - ${{ stdlib("c") }}
    - cmake >=3.15
    - ninja
  host:
    - python
    - pybind11 >=3.0.0
    - numpy
    - vtk >=9.5,<9.6
  run_exports:
    - ${{ pin_subpackage('mmgpy', upper_bound='x.x') }}
  run:
    - python
    - numpy >=2.0.2
    - meshio >=5.3.5
    - pyvista >=0.46.4
    - rich >=13.0.0
    - scipy >=1.11.0,<1.17
    - vtk >=9.5,<9.6
    - if: python < '3.11'
      then: typing-extensions >=4.0.0

tests:
  - python:
      imports:
        - mmgpy
        - mmgpy._mmgpy
  - script:
      - if: unix
        then:
          # MMG -h returns exit code 2; just verify executables are on PATH
          - mmg3d_O3 -h || test $? -eq 2
          - mmg2d_O3 -h || test $? -eq 2
          - mmgs_O3 -h || test $? -eq 2
          - python -c "from mmgpy._mmgpy import MmgMesh3D; m = MmgMesh3D(); print('MmgMesh3D OK')"
      - if: win
        then:
          - mmg3d_O3.exe -h || ver >nul
          - mmg2d_O3.exe -h || ver >nul
          - mmgs_O3.exe -h || ver >nul
          - python -c "from mmgpy._mmgpy import MmgMesh3D; m = MmgMesh3D(); print('MmgMesh3D OK')"

about:
  homepage: https://github.com/kmarchais/mmgpy
  license: MIT
  license_file: LICENSE
  summary: Python bindings for the MMG mesh generation/optimization library
  description: |
    mmgpy provides Python bindings for the MMG library, enabling 2D, 3D,
    and surface mesh remeshing through both a Python API and CLI tools.
    MMG libraries and executables are installed to standard conda paths,
    making them available to other packages in the environment.
  repository: https://github.com/kmarchais/mmgpy

extra:
  recipe-maintainers:
    - kmarchais
