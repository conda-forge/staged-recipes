context:
  version: "0.8.1"

package:
  name: dbgpt
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/d/dbgpt/dbgpt-${{ version }}.tar.gz
  sha256: ef572835acf61a40cf21f3b3c3d1398abfdd8cfe9e601925a0951e0bf41e8806

build:
  noarch: python
  script: python -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python >=3.10
    - pip
    - hatchling
  run:
    - python >=3.10
    # Pinned versions follow upstream's pyproject.toml exactly
    - aiohttp ==3.8.4
    - apscheduler >=3.10,<4
    - cachetools
    - chardet ==5.1.0
    - importlib-resources ==5.12.0
    - pydantic >=2.6.0
    - snowflake-id
    - tomli >=2.2.1
    - typeguard
    - typing_inspect

tests:
  - python:
      imports:
        - dbgpt
      pip_check: true

about:
  homepage: https://github.com/eosphoros-ai/DB-GPT
  summary: An experimental open-source project using localized LLMs to interact with data privately
  description: |
    DB-GPT is an experimental open-source project that uses localized GPT large models
    to interact with your data and environment. With this solution, you can be assured
    that there is no risk of data leakage, and your data is 100% private and secure.
  license: MIT
  license_file: LICENSE
  documentation: http://docs.dbgpt.cn/docs/overview
  repository: https://github.com/eosphoros-ai/DB-GPT

extra:
  recipe-maintainers:
    - czgdp1807
