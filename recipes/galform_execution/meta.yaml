{% set name = "galform_execution" %}
{% set version = "0.1.5" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz
  # Update sha256 for each release:
  #   curl -s https://pypi.org/pypi/galform_execution/json | python -c "import sys,json; d=json.load(sys.stdin); [print(f['digests']['sha256']) for f in d['releases']['{{ version }}'] if f['filename'].endswith('.tar.gz')]"
  sha256: 792726fc7eb2e54c4f21061e46613630e92d34fd8fef83a6ea0dda9e4691630c

build:
  skip: True  # [win or osx]
  script: {{ PYTHON }} -m pip install . --no-deps -vv
  number: 0

requirements:
  host:
    - python >=3.8
    - pip
    - setuptools >=61
    - wheel
  run:
    - python >=3.8

test:
  imports:
    - galform_execution
  commands:
    - submit-galform-job --help

about:
  home: https://github.com/OscarHickman/galform_execution
  summary: GALFORM execution helper utilities for SLURM submission on COSMA
  description: |
    A Python-based utility to manage GALFORM N-body simulation submissions
    to SLURM on COSMA. Automates SLURM batch script generation, parameter
    injection into .input.ref files, and conditional post-processing
    (NETA, luminosity functions, galaxy samples).
  license: MIT
  license_file: LICENSE
  doc_url: https://github.com/OscarHickman/galform_execution
  dev_url: https://github.com/OscarHickman/galform_execution

extra:
  recipe-maintainers:
    - OscarHickman
