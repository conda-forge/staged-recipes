context:
  tag_name: "04-16-03"

package:
  name: millepede
  version: ${{ tag_name | replace("-", ".") }}

source:
  url: https://gitlab.desy.de/millepede/millepede-ii/-/archive/V${{ tag_name }}/millepede-ii-V${{ tag_name }}.tar.gz
  sha256: ede22293d731526749aa964559e62745a33e269ca913b0707ac9952769f6bddb

build:
  script:
    - make pede GCC=$CC ZLIB_INCLUDES_DIR="${PREFIX}/include" ZLIB_LIBS_DIR="${PREFIX}/lib" PREFIX="${PREFIX}" install
  number: 0
  skip:
    - win

requirements:
  build:
    - ${{ compiler("c") }}
    - ${{ compiler("fortran") }}
    - ${{ stdlib("c") }}
    - make
  host:
    - zlib

tests:
  - package_contents:
      bin:
        - pede
        - readMilleBinary
      strict: true
  - script:
      - pede -t1
      - readMilleBinary ./mp2tst.bin
    requirements:
      run:
        - python

about:
  homepage: https://millepede.pages.desy.de/millepede-ii/index.html
  summary: 'Linear least squares solver for alignment and calibration of tracking detectors'
  description: |
    Millepede II is a package for linear least squares fits with a large number of parameters,
    developed for the alignment and calibration of tracking detectors.
  license: LGPL-2.0-or-later
  license_file: COPYING.LIB
  documentation: https://millepede.pages.desy.de/millepede-ii/draftman_page.html
  repository: https://gitlab.desy.de/millepede/millepede-ii

extra:
  recipe-maintainers:
    - utk4r-sh
    - GiacomoXT
    - vvsagar
    - AlexanderHeidelbach
