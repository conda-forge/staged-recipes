c_compiler:          # [linux]
  - clang            # [linux]
cxx_compiler:        # [linux]
  - clangxx          # [linux]
# Override the global GCC version pin (14) which has no clang_linux-64 equivalent.
# clang_linux-64 / clangxx_linux-64 are available at 16–22 in conda-forge.
c_compiler_version:    # [linux]
  - '22'               # [linux]
cxx_compiler_version:  # [linux]
  - '22'               # [linux]
c_stdlib_version:    # [osx]
  - '12.3'           # [osx]
