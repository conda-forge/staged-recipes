c_compiler:          # [linux]
  - clang            # [linux]
cxx_compiler:        # [linux]
  - clangxx          # [linux]
# jank requires the build compiler to match the embedded LLVM/clang version (22).
# On Linux, the global GCC version pin (14) would otherwise be applied to clang.
# On macOS, clang is the default compiler but also needs an explicit version pin.
c_compiler_version:
  - '22'
cxx_compiler_version:
  - '22'
# std::to_chars for floating point requires macOS 13.3+
# https://conda-forge.org/docs/maintainer/knowledge_base#newer-c-features-with-old-sdk
c_stdlib_version:    # [osx]
  - '13.3'           # [osx]
