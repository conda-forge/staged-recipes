build:
  number: 1
  # Windows requires MSYS2/CLANG64 (MinGW-w64), which doesn't map to conda-forge's
  # MSVC-based Windows environment. sbcl is available on conda-forge for all platforms
  # including Windows, but the jank build on Windows has not been validated.
  skip: win
  script:
    interpreter: nu
    content: |
      cd compiler+runtime

      # Set macOS SDK root so jank's embedded clang can find system headers during JIT
      # compilation. The cmake build runs jank-phase-1 to AOT-compile clojure.core; without
      # SDKROOT that embedded clang invocation fails to find system headers, leaving the
      # generated C++ files empty and Phase 2 missing symbols at link time.
      # Also expose $PREFIX/lib via DYLD_LIBRARY_PATH so jank-phase-1 can load LLVM dylibs
      # when cmake invokes it as a custom command (before install RPATH is in effect).
      if ($env.HOST | str contains "darwin") {
        $env.SDKROOT = (^xcrun --sdk macosx --show-sdk-path | str trim)
        $env.DYLD_LIBRARY_PATH = $"($env.PREFIX)/lib"
      }

      # GNU ld flags (-ldl, --no-as-needed) are not supported on macOS Apple ld.
      # jank's cmake uses -Wl,-force_load for the merged archive on macOS, but Phase 2
      # inherits Phase 1's LINK_LIBRARIES via a generator expression; cmake can separate
      # the flag from its archive-path argument when processing the expanded list, so
      # -force_load silently becomes a no-op. -all_load is a global alternative that does
      # not require flag-path adjacency. bdwgc (libgc) is already bundled in the merged
      # archive, so do not add -lgc here or duplicate symbols may cause a link failure.
      let linker_flags = if ($env.HOST | str contains "darwin") {
        $"-L($env.PREFIX)/lib -lzstd -Wl,-all_load"
      } else {
        $"-L($env.PREFIX)/lib -ldl -lzstd -pthread -Wl,--no-as-needed"
      }

      ^./bin/configure -GNinja -DCMAKE_BUILD_TYPE=Release $"-DCMAKE_PREFIX_PATH=($env.PREFIX)" $"-Dclang_dir=($env.PREFIX)" $"-DCMAKE_EXE_LINKER_FLAGS=($linker_flags)"

      ^./bin/compile

      # Install binary and resource dir (lib/jank/0.1/ with headers and sources)
      ^./bin/install --prefix $env.PREFIX

      # Create clang symlinks so jank can discover clang at runtime via lib/jank/0.1/bin/
      let jank_bin_dir = ($env.PREFIX | path join "lib" "jank" "0.1" "bin")
      ^mkdir -p $jank_bin_dir
      ^ln -sf "../../../../bin/clang" ($jank_bin_dir | path join "clang")
      ^ln -sf "../../../../bin/clang++" ($jank_bin_dir | path join "clang++")
      ^ln -sf "../../../../bin/clang-22" ($jank_bin_dir | path join "clang-22")

      # Activation scripts so the conda env lib/ is in LIBRARY_PATH for jank's AOT linker
      let activate_dir = ($env.PREFIX | path join "etc" "conda" "activate.d")
      let deactivate_dir = ($env.PREFIX | path join "etc" "conda" "deactivate.d")
      ^mkdir -p $activate_dir $deactivate_dir
      "export JANK_LIBRARY_PATH_BACKUP=\"${LIBRARY_PATH:-}\"\nexport LIBRARY_PATH=\"${CONDA_PREFIX}/lib${LIBRARY_PATH:+:${LIBRARY_PATH}}\"\n" | save ($activate_dir | path join "jank.sh")
      "export LIBRARY_PATH=\"${JANK_LIBRARY_PATH_BACKUP}\"\nunset JANK_LIBRARY_PATH_BACKUP\n" | save ($deactivate_dir | path join "jank.sh")

requirements:
  build:
    - ${{ compiler('c') }}
    - ${{ compiler('cxx') }}
    - ${{ stdlib('c') }}
    - if: linux
      then: binutils
    - cmake
    - git
    - ninja
    - nushell
    - pkg-config
    - sbcl
    - sed

  host:
    - bdw-gc
    - bzip2
    - doctest
    - double-conversion
    - if: linux
      then: elfutils
    - fmt
    - gmp
    - libatomic_ops
    - libboost-devel
    - clangdev
    - libclang-cpp
    - libffi
    - libzip
    - llvmdev
    - openssl
    - zlib
    - zstd

  run:
    - clang 22.*
    - clangdev 22.*

tests:
  - package_contents:
      bin:
        - jank
      files:
        - lib/jank/0.1/bin/clang++
        - lib/jank/0.1/src/jank/clojure/core.jank
  - script:
      - jank --help || true

about:
  license: MPL-2.0
  license_file: LICENSE
  summary: Jank a LLVM hosted Clojure
  description: |
    Jank is a general-purpose programming language which embraces the interactive,
    functional, value-oriented nature of Clojure and the desire for the native
    runtime and performance of C++. It is a dialect of Clojure that targets LLVM,
    offering native code compilation via a C++ backend and an LLVM-based JIT
    compiler, with seamless C++ interop from within Clojure source files.
  homepage: https://jank-lang.org/
  documentation: https://book.jank-lang.org
  repository: https://github.com/${{ group }}/jank

extra:
  recipe-maintainers:
    - phreed
    - jeaye
