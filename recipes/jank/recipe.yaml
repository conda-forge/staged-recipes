build:
  number: 0
  # Windows requires MSYS2/CLANG64 (MinGW-w64), which doesn't map to conda-forge's
  # MSVC-based Windows environment. sbcl (required at build time) also has no
  # conda-forge Windows package.
  skip: win
  script:
    interpreter: nu
    content: |
      cd compiler+runtime
      ^./bin/configure -GNinja -DCMAKE_BUILD_TYPE=Release -DCMAKE_EXE_LINKER_FLAGS="-ldl -pthread -Wl,--no-as-needed"
      ^./bin/compile

      let bin_dir = ($env.PREFIX | path join "bin")
      ^mkdir -p $bin_dir
      ^cp build/jank ($bin_dir | path join "jank")

requirements:
  build:
    - ${{ compiler('c') }}
    - ${{ compiler('cxx') }}
    - ${{ stdlib('c') }}
    - binutils
    - cmake
    - ninja
    - nushell
    - pkg-config
    - sbcl
    - sed

  host:
    - bdw-gc
    - bzip2
    - doctest
    - double-conversion
    - if: linux
      then: elfutils
    - fmt
    - gmp
    - libatomic_ops
    - libboost-devel
    - libclang-cpp
    - libffi
    - libzip
    - llvmdev
    - openssl
    - zlib

tests:
  - requirements:
      build:
        - nushell
    script:
      interpreter: nu
      content:
        - ^jank --help

about:
  license: MPL-2.0
  license_file: LICENSE
  summary: Jank a LLVM hosted Clojure
  description: |
    Jank is a general-purpose programming language which embraces the interactive,
    functional, value-oriented nature of Clojure and the desire for the native
    runtime and performance of C++. It is a dialect of Clojure that targets LLVM,
    offering native code compilation via a C++ backend and an LLVM-based JIT
    compiler, with seamless C++ interop from within Clojure source files.
  homepage: https://jank-lang.org/
  documentation: https://book.jank-lang.org
  repository: https://github.com/${{ group }}/jank

extra:
  recipe-maintainers:
    - phreed
