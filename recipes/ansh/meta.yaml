{% set version = "0.2.0" %}

package:
  name: ansh
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/a/ansh/ansh-{{ version }}.tar.gz
  sha256: d1367df77fd66ad9a368100c5b3ecfc069e233e83aed0b13a047eb966858ea93

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python >=3.11
    - hatchling
    - pip
  run:
    - python >=3.11
    - beartype >=0.22.4
    - h5py >=3.16
    - jinja2 >=3.1.6
    - numpy <2.5
    - pyvista >=0.46.3
    - scikit-fem >=12

test:
  imports:
    - ansh
  commands:
    - pip check
  requires:
    - pip
    - python

about:
  home: https://pypi.org/project/ansh/
  summary: A python package to define scalar and vector finite-element fields.
  doc_url: https://sankhya.codeberg.page/AnshPustak
  dev_url: https://codeberg.org/Sankhya/Ansh
  license: MIT
  license_file: LICENSE.txt

extra:
  recipe-maintainers:
    - swapneelap
