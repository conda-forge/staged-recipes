{% set version = "0.1.1" %}
{% set python_min = "3.11.0" %}

package:
  name: jax-solar
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/j/jax-solar/jax_solar-{{ version }}.tar.gz
  sha256: 17c9b178170d250287bdac454feebdc8b2213dc6ea93a5135f8c15d245c3a01e

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - setuptools
    - pip
  run:
    - python >={{ python_min }}
    - jax
    - jax-datetime
    - numpy

test:
  imports:
    - jax_solar
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://pypi.org/project/jax-solar/
  summary: Top of atmosphere incident solar radiation, in JAX
  license: Apache-2.0
  license_file: LICENSE

extra:
  recipe-maintainers:
    - mahf708
