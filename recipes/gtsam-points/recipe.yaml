schema_version: 1

context:
  name: gtsam-points
  version: "1.2.1"
  build_number: 0

recipe:
  name: ${{ name|lower }}-split
  version: ${{ version }}

source:
  - url: https://github.com/koide3/gtsam_points/archive/refs/tags/v${{ version }}.tar.gz
    sha256: 2ab79ff2797398a60a6ca9ce592f4da66607f5a3a9d4eefcde113b94ba1eb8c0
    patches:
      - 001-unvendor-nanoflann.patch

build:
  number: ${{ build_number }}
  skip: not linux

outputs:
  # =====================
  # Package: gtsam-points
  # =====================
  - package:
      name: gtsam-points
    build:
      script:
        - cmake -S . -B build -GNinja
          ${{ "${CMAKE_ARGS}" if not win else "%CMAKE_ARGS%" }}
          -DBUILD_DEMO=OFF
          -DBUILD_TOOLS=OFF
          -DBUILD_TESTS=OFF
          -DBUILD_EXAMPLE=OFF
          -DBUILD_WITH_TBB=ON
          -DBUILD_WITH_MARCH_NATIVE=OFF
          -DCMAKE_CUDA_FLAGS="-Wno-deprecated-gpu-targets"
          -DBUILD_WITH_CUDA=${{ "ON" if cuda_compiler_version != "None" else "OFF" }}
          -DGTSAM_POINTS_USE_CUDA=${{ "ON" if cuda_compiler_version != "None" else "OFF" }}
          -DCMAKE_CUDA_ARCHITECTURES=${{ "86" if cuda_compiler_version != "None" else "" }}
        - cmake --build build/ --config Release
        - cmake --install build/ --config Release
        - if: build_platform == target_platform
          then:
          - cmake -S . -B build -DBUILD_TESTS=ON
          - cmake --build build/
          - ctest --test-dir build/ --rerun-failed --output-on-failure
    requirements:
      build:
        - ${{ compiler('c') }}
        - ${{ compiler('cxx') }}
        - ${{ stdlib("c") }}
        - if: cuda_compiler_version != "None"
          then: ${{ compiler('cuda') }}
        - cmake
        - ninja
        - pkg-config
      host:
        - gtsam
        - eigen-abi-devel
        - libboost-devel
        - nanoflann
        - tbb-devel
        - if: cuda_compiler_version != "None"
          then:
            - cuda-version ${{ cuda_compiler_version }}.*
            - cuda-cudart-dev
            - libcublas-dev
            - libcurand-dev
            - libcusparse-dev
            - libcusolver-dev
      run:
      run_exports:
        - ${{ pin_subpackage('gtsam-points', upper_bound='x.x') }}
    tests:
      - package_contents:
          include:
            - gtsam_points/config.hpp
          lib:
            - gtsam_points
  # ===========================
  # Package: gtsam-points-devel
  # ===========================
  - package:
      name: gtsam-points-devel
    requirements:
      run:
        - ${{ pin_subpackage('gtsam-points', exact=True) }}
        - eigen
        - eigen-abi-devel
        - libboost-devel
        - nanoflann
        - tbb-devel
        - if: cuda_compiler_version != "None"
          then:
            - cuda-cudart-dev
            - cuda-version ${{ cuda_compiler_version }}.*
    tests:
      - script:
          - cmake-package-check gtsam_points --targets gtsam_points
        requirements:
          run:
            - ${{ compiler('cxx') }}
            - cmake
            - cmake-package-check
            - ninja
            - if: cuda_compiler_version != "None"
              then: ${{ compiler('cuda') }}

about:
  homepage: https://github.com/koide3/gtsam_points
  license: MIT
  license_file: LICENSE
  repository: https://github.com/koide3/gtsam_points
  summary: A collection of GTSAM factors and optimizers for point cloud SLAM.

extra:
  feedstock-name: gtsam-points
  recipe-maintainers:
    - diegoferigo
