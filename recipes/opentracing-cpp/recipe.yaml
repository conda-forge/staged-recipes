context:
  version: "1.6.0"

package:
  name: opentracing-cpp
  version: ${{ version }}

source:
  url: https://github.com/opentracing/opentracing-cpp/archive/refs/tags/v${{ version }}.tar.gz
  sha256: 5b170042da4d1c4c231df6594da120875429d5231e9baa5179822ee8d1054ac3

build:
  number: 0
  script:
    - cmake ${CMAKE_ARGS} -DCMAKE_INSTALL_PREFIX=$PREFIX -DCMAKE_BUILD_TYPE=Release -DBUILD_TESTING=OFF -DBUILD_MOCKTRACER=OFF -DCMAKE_POLICY_VERSION_MINIMUM=3.5 -B build
    - cmake --build build -j${CPU_COUNT}
    - cmake --install build

requirements:
  build:
    - cmake
    - make
    - ${{ compiler('cxx') }}

tests:
  - package_contents:
      include:
        - opentracing/tracer.h
      lib:
        - libopentracing

about:
  homepage: https://github.com/opentracing/opentracing-cpp
  license: Apache-2.0
  license_file: LICENSE
  summary: OpenTracing API for C++
  description: |
    C++ implementation of the OpenTracing API. Provides a vendor-neutral
    API for distributed tracing instrumentation.
  dev_url: https://github.com/opentracing/opentracing-cpp
