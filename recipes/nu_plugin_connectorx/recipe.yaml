context:
  version: "0.1.0"

package:
  name: nu_plugin_connectorx
  version: ${{ version }}

source:
  url: https://github.com/VasanthakumarV/nu_plugin_connectorx/archive/refs/tags/v${{ version }}.tar.gz
  sha256: 5019965c6fd3829d7dbae0536c032bd642bb387469e54773197b6b7a4ac62e99

build:
  number: 0
  script:
    env:
      CARGO_PROFILE_RELEASE_STRIP: symbols
      CARGO_PROFILE_RELEASE_LTO: fat
    content:
      - if: unix
        then: |
          if [[ "${target_platform}" == linux-* ]]; then
            export BINDGEN_EXTRA_CLANG_ARGS="$CFLAGS"
          fi
          cargo-bundle-licenses --format yaml --output ${SRC_DIR}/THIRDPARTY.yml
          cargo auditable install --locked --no-track --path . --root ${PREFIX}
        else: |
          cargo-bundle-licenses --format yaml --output %SRC_DIR%\THIRDPARTY.yml
          cargo auditable install --locked --no-track --path . --root %LIBRARY_PREFIX%

requirements:
  build:
    - ${{ compiler('rust') }}
    - ${{ stdlib('c') }}
    - cargo-bundle-licenses
    - cargo-auditable
    - if: win
      then: perl
    - if: unix
      then: make
    - if: linux
      then:
        - clangdev
        - pkg-config
  host:
    - if: linux
      then:
        - openssl
        - krb5-static
        - zlib

tests:
  - script:
      - nu_plugin_connectorx

about:
  homepage: https://github.com/VasanthakumarV/nu_plugin_connectorx
  license: Apache-2.0 OR MIT
  license_file:
    - LICENSE-MIT
    - LICENSE-APACHE
    - THIRDPARTY.yml
  description: "Load data from DBs in nushell using ConnectorX"
  summary: "Load data from DBs in nushell using ConnectorX"

extra:
  recipe-maintainers:
    - VasanthakumarV
