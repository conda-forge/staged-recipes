{% set name = "kwcoco" %}
{% set version = "0.8.2" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.io/packages/source/{{ name[0] }}/{{ name }}/kwcoco-{{ version }}.tar.gz
  sha256: 843681384ebf140b4bb4ef6edae80fb22a5351f7eae9e57187599d7ea5e9367c

build:
  skip: true  # [py<38]
  entry_points:
    - kwcoco = kwcoco.cli.__main__:main
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python
    - setuptools >=41.0.1
    - pip
  run:
    - python
    - delayed-image >=0.3.1
    - jsonschema >=3.2.0
    - kwarray >=0.6.19
    - kwimage >=0.10.0
    - packaging >=21.3
    - parse >=1.14.0
    - safer >=4.4.1
    - scriptconfig >=0.7.7
    - sortedcontainers >=2.3.0
    - ubelt >=1.3.6
    - uritools >=3.0.0
    - xarray >=0.16.0
    - scipy >=1.8.0  # [py<310 and py>=39]
    - numpy >=1.19.3  # [py<310 and py>=39]
    - pandas >=1.4.0  # [py<310 and py>=39]
    - scikit-learn >=1.0.2  # [py<310 and py>=39]
    - psutil >=5.7.3  # [py<310 and py>=39]
    - networkx >=2.7  # [py<311 and py>=38]

test:
  imports:
    - examples
    - kwcoco
  commands:
    - pip check
    - kwcoco --help
  requires:
    - pip

about:
  home: https://gitlab.kitware.com/computer-vision/kwcoco
  summary: The kwcoco module and cli for image datasets
  license: Apache-2.0
  license_file: LICENSE.txt

extra:
  recipe-maintainers:
    - Erotemic
    - vicentebolea
