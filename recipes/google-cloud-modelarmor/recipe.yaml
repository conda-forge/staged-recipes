# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "0.7.0"

package:
  name: google-cloud-modelarmor
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/g/google-cloud-modelarmor/google_cloud_modelarmor-${{ version }}.tar.gz
  sha256: 2ac62135620cdfc610ad9d9b3f92553de0d27343b693f021fd2012f1898d4ac6

build:
  noarch: python
  number: 0
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - setuptools
  run:
    - python >=${{ python_min }}
    - google-api-core >=2.17.1,<3.0.0
    - grpcio >=1.59.0,<2.0.0
    - grpcio-status >=1.41.0,<2.0.0
    - google-auth >=2.14.1,<3.0.0,!=2.24.0,!=2.25.0
    - proto-plus >=1.22.3,<2.0.0
    - protobuf >=4.25.8,<8.0.0

tests:
  - python:
      imports:
        - google.cloud.modelarmor_v1
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  homepage: https://pypi.org/project/google-cloud-modelarmor/
  license: Apache-2.0
  license_file: LICENSE
  summary: Google Cloud Modelarmor API client library
  repository: https://github.com/googleapis/google-cloud-python/tree/main/packages/google-cloud-modelarmor
  documentation: https://cloud.google.com/security-command-center/docs/model-armor-overview
  description: |
    Python Client for Model Armor.

    Model Armor is a Google Cloud service that screens prompts and
    responses for safety, security, and prompt-injection risks. This
    package is the generated GAPIC client library for the Model Armor
    API.

extra:
  recipe-maintainers:
    - rxm7706
