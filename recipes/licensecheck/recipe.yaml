context:
  version: 2025.1.0
  build_number: "0"

package:
  name: licensecheck
  version: ${{ version }}

source:
  - url: https://pypi.org/packages/source/l/licensecheck/licensecheck-${{ version }}.tar.gz
    sha256: 411a1d81606b8be695794c1e7e79cc899b51fe5c501164155361cd2d6f3c5969

build:
  number: ${{ build_number }}
  script: ${{ PYTHON }} -m pip install .
  python:
    entry_points:
      - licensecheck = licensecheck:cli
  noarch: python

requirements:
  host:
    - python ${{ python_min }}.*
    - hatchling
    - pip
  run:
    - python >=${{ python_min }}
    - appdirs >=1.4.4
    - fhconfparser >=2024.1
    - license-expression >=30.4.1
    - loguru >=0.7.3
    - markdown >=3.7
    - packaging >=24.2
    - requests >=2.32.3
    - requests-cache >=1.2.1
    - requirements-parser >=0.11.0
    - rich >=13.9.4
    - tomli >=2.2.1
    - uv >=0.6.8

tests:
  - python:
      imports:
        - licensecheck
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"
  - script:
      - licensecheck --help

about:
  homepage: https://github.com/FHPythonUtils/LicenseCheck
  summary: Output the licenses used by dependencies and check if these are compatible with the project license
  license: MIT
  license_file: LICENSE.md
  documentation: https://github.com/FHPythonUtils/LicenseCheck/blob/master/README.md

extra:
  recipe-maintainers:
    - carlodri
