schema_version: 1

context:
  version: "1.1.2"

package:
  name: tree-sitter-zig
  version: ${{ version }}

source:
  url: https://github.com/tree-sitter-grammars/tree-sitter-zig/archive/refs/tags/v${{ version }}.tar.gz
  sha256: 612d67059faa90ec7691e5d786d70d8f7c2c8b15b83de901b9b801122ad4cf25

build:
  number: 0
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  build:
    - ${{ compiler("c") }}
  host:
    - python
    - pip
    - setuptools >=42
  run:
    - python

tests:
  - python:
      imports:
        - tree_sitter_zig

about:
  homepage: https://github.com/tree-sitter-grammars/tree-sitter-zig
  summary: Zig grammar for tree-sitter
  license: MIT
  license_file: LICENSE
  repository: https://github.com/tree-sitter-grammars/tree-sitter-zig

extra:
  recipe-maintainers:
    - killua156
    - mgorny
