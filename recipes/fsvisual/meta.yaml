{% set name = "fsvisual" %}
{% set version = "0.0.1" %}
{% set python_min = "3.11" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/fsvisual-{{ version }}.tar.gz
  sha256: 6f8f9d9813c8d685ddf71d556a11a84a584b8be7e9cb6b20d5e30eedc8d8d9bc

build:
  entry_points:
    - fsvisual = fsvisual.cli:main
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - setuptools >=77.0.3
    - pip
  run:
    - python >={{ python_min }}
    - pandas >=2.3.1
    - numpy >=2.3.1
    - trimesh >=4.7.4
    - pymeshlab >=2023.12.post3
    - scikit-image >=0.25.2
    - requests >=2.32.4
    - pymatgen >=2025.6.14
    - plotly >=6.3.0
    - shapely >=2.1.1
    - python-kaleido >=1.0.0

test:
  imports:
    - fsvisual
  commands:
    - pip check
    - fsvisual --help
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://github.com/exciting/FSvisual
  summary: A Fermi surface visualization package
  license: GPL-3.0-only
  license_file: LICENSE

extra:
  recipe-maintainers:
    - jan-janssen
