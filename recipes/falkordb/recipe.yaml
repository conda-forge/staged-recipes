# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "1.6.1"

package:
  name: falkordb
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/f/FalkorDB/falkordb-${{ version }}.tar.gz
  sha256: bbef448a0b43e00ff3062bd6201368618d7b36e969d16ba71e8b8e3fa90873d4

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - hatchling
  run:
    - python >=${{ python_min }}
    - python-dateutil >=2.9.0
    - redis-py >=7.1.0

tests:
  - python:
      imports:
        - falkordb
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  homepage: https://www.falkordb.com/
  license: MIT
  license_file: LICENSE
  summary: Python client for interacting with FalkorDB database
  description: |
    Python client for interacting with FalkorDB, a graph database
    using Redis protocol.
  repository: https://github.com/falkorDB/falkordb-py
  documentation: https://falkordb-py.readthedocs.io

extra:
  recipe-maintainers:
    - rxm7706
