schema_version: 1

context:
  version: "0.2.1"

package:
  name: canyonbpy
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/c/canyonbpy/canyonbpy-${{ version }}.tar.gz
  sha256: eb3b2718f59cdfda2979bc6087d9c09d094eb17d22e98bea537ed16cde8d73de

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - setuptools >=42
    - wheel
    - pip
  run:
    - python >=${{ python_min }}
    - numpy >=1.20.0
    - xarray >=0.16.0
    - matplotlib-base >=3.3.0
    - pyco2sys >=1.8.0
    - pandas >=1.2.0
    - scipy >=1.6.0

tests:
  - python:
      imports:
        - canyonbpy
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  summary: Python implementation of CANYON-B for oceanographic parameter predictions
  license: MIT
  license_file: LICENSE
  homepage: https://github.com/RaphaelBajon/canyonbpy
  repository: https://github.com/RaphaelBajon/canyonbpy
  documentation: https://canyonbpy.readthedocs.io

extra:
  recipe-maintainers:
    - ocefpaf
