schema_version: 1

context:
  python_min: "3.9"
  version: "0.3.0"

package:
  name: canyonbpy
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/c/canyonbpy/canyonbpy-${{ version }}.tar.gz
  sha256: 76636ed97308a928aeef7baa26ced9bee2269dbc264df9ac0b0d69326565da40

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - setuptools >=42
    - wheel
    - pip
  run:
    - python >=${{ python_min }}
    - numpy >=1.20.0
    - xarray >=0.16.0
    - matplotlib-base >=3.3.0
    - pyco2sys >=1.8.0
    - pandas >=1.2.0
    - scipy >=1.6.0

tests:
  - python:
      imports:
        - canyonbpy
      pip_check: true
      python_version: ${{ python_min }}.*

about:
  summary: Python implementation of CANYON-B for oceanographic parameter predictions
  license: MIT
  license_file: LICENSE
  homepage: https://github.com/RaphaelBajon/canyonbpy
  repository: https://github.com/RaphaelBajon/canyonbpy
  documentation: https://canyonbpy.readthedocs.io

extra:
  recipe-maintainers:
    - RaphaelBajon
