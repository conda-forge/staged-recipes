{% set version = "0.1.0a1" %}
{% set python_min = "3.11" %}

package:
  name: yohou
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/y/yohou/yohou-{{ version }}.tar.gz
  sha256: bf70f7e857ee5bb17969dcb5df069dde5e396d8e5ffd9f613f9a69159b9d39e7

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - hatchling
    - hatch-vcs
    - pip
  run:
    - python >={{ python_min }}
    - scikit-learn >=1.6.0
    - sklearn-wrap
    - scipy >=1.13
    - polars >=0.20
    - plotly >=5.19
    - pydantic >=2.6
    - pyarrow >=14.0.0

test:
  imports:
    - yohou
  commands:
    - pip check
    - pytest --help
  requires:
    - pip
    - pytest
    - python {{ python_min }}

about:
  home: https://github.com/stateful-y/yohou
  summary: A time series forecasting package based on Scikit-Learn and Polars
  doc_url: https://yohou.readthedocs.io
  license: Apache-2.0
  license_file: LICENSE

extra:
  recipe-maintainers:
    - gtauzin
