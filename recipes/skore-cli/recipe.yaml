schema_version: 1

context:
  name: skore-cli
  version: "0.0.1"
  python_min: "3.11"

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/${{ name[0] }}/${{ name }}/skore_cli-${{ version }}.tar.gz
  sha256: 8981eebd504ca54c6f4bcb033dd0668b462b41ce3e6661e4569df679b82f9577

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  python:
    entry_points:
      - skore = skore_cli:cli

requirements:
  host:
    - python ${{ python_min }}.*
    - hatchling
    - pip
  run:
    - python >=${{ python_min }}
    - click
    - rich >=14.2
    - rich-click >=1.9
    - textual

tests:
  - python:
      imports:
        - skore_cli
      pip_check: true
      python_version:
	- ${{ python_min }}.*
	- "*"
  - requirements:
      run:
        - pip
    script:
      - skore --help

about:
  summary: Command-line interface for skore. Discover, install and manage agent skills from the command line.
  homepage: https://probabl.ai
  repository: https://github.com/probabl-ai/skore
  documentation: https://github.com/probabl-ai/skore
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - glemaitre
