# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  name: ag-ui-crewai
  version: "0.2.0"
  python_min: "3.10"

package:
  name: ${{ name | lower }}
  version: ${{ version }}

source:
  url: https://files.pythonhosted.org/packages/52/a6/03df3ce106e387b82257ba9151e4a0819884c484c3949a5d030ae6e16e56/ag_ui_crewai-0.2.0.tar.gz
  sha256: 090ce4d2b88689947510aa631c6d0177543ac0a79a94300ad7c0983d363f408b

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - setuptools
  run:
    - python >=${{ python_min }}
    - ag-ui-protocol
    - crewai
    - fastapi
    - uvicorn

tests:
  - python:
      imports:
        - ag_ui_crewai
      pip_check: true
      python_version: ${{ python_min }}.*

about:
  homepage: https://pypi.org/project/ag-ui-crewai/
  license: MIT
  license_file: LICENSE
  summary: Implementation of the AG-UI protocol for CrewAI.
  dev_url: https://github.com/ag-ui-protocol/ag-ui/tree/main/integrations/crewai/python

extra:
  recipe-maintainers:
    - rxm7706
