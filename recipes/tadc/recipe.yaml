schema_version: 1

context:
  version: "2.3.5"

package:
  name: tadc
  version: ${{ version }}

source:
  url: https://github.com/NOAA-CO-OPS/CO-OPS-Tidal-Analysis-Datum-Calculator/archive/v${{ version }}.tar.gz
  sha256: 1366c2d79f8c1860f30fe0802b6618eff0c0961b20684acf5c4a212d2a0944e7

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - setuptools >=61.0
    - pip
  run:
    - python >=${{ python_min }}
    - matplotlib-base
    - numpy
    - pandas >=2.0.3
    - python-dateutil
    - requests
    - scipy

tests:
  - python:
      imports:
        - tadc
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  summary: The Tidal Analysis Datum Calculator (TADC) computes tidal datums from a water level data time series.
  license: MIT
  license_file: LICENSE.txt

extra:
  recipe-maintainers:
    - ocefpaf
