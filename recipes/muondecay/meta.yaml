{% set version = "0.1.5" %}
{% set python_min = "3.10" %}

package:
  name: muondecay
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/m/muondecay/muondecay-{{ version }}.tar.gz
  sha256: fca42ca5dbb34e6d41bffb727d1d1cb48ca897668b5ea837c6e302c10b3e8429

build:
  entry_points:
    - muon_detect = muondecay.detect:main
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - pip
    - setuptools
    - wheel
  run:
    - python
    - numpy
    - scipy
    - pyserial
    - lmfit
    - matplotlib-base
    - tk

test:
  imports:
    - muondecay
  requires:
    - python {{ python_min }}
    - tk

about:
  home: https://github.com/sprague252/muondecay/
  summary: Read and analyze data from TeachSpin's muon detector.
  dev_url: https://github.com/sprague252/muondecay/
  license: GPL-3.0-only
  license_file: LICENSE

extra:
  recipe-maintainers:
    - sprague252
