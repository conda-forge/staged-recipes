{% set version = "0.0.3" %}
{% set python_min = "3.10" %}

package:
  name: mt-io
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/m/mt-io/mt_io-{{ version }}.tar.gz
  sha256: 40567effb4e878ba4b7f919f27e3e3093af804bc694081425cf057d558d734d0

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - setuptools >=45
    - setuptools-scm >=6.2
    - wheel
    - pip
  run:
    - python >={{ python_min }}
    - numpy
    - scipy
    - xarray
    - loguru
    - mt-metadata >=1.0.0
    - mt-timeseries >=0.0.2

test:
  imports:
    - mt_io
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://github.com/kujaku11/mt-io
  summary: Readers for various magnetotelluric data file types from various data loggers
  license: CC0-1.0
  license_file: LICENSE

extra:
  recipe-maintainers:
    - kujaku11
