{% set organization = "OpenModelica" %}
{% set name = "OMPython" %}
{% set version = "4.0.1" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name|lower }}-{{ version }}.tar.gz
  sha256: 5d28b5f276b646ca947a8f0fb41029fdac329f49d4e96b335d01a8ad7ed897de

build:
  noarch: python
  number: 0
  script: "{{ PYTHON }} -m pip install . -vv"

requirements:
  host:
    - python {{ python_min }}
    - pip
    - setuptools
  run:
    - python >={{ python_min }}
    - numpy
    - psutil
    - pyparsing
    - pyzmq
  run_constrained:
    - omcompiler >=1.25  # [linux]

test:
  imports:
    - OMPython
  requires:
    - python {{ python_min }}
    - omcompiler  # [linux]
  commands:
    - python -c "from OMPython import OMCSessionZMQ; omc = OMCSessionZMQ(); print(omc.sendExpression('getVersion()'))"  # [linux]

about:
  home: https://github.com/{{ organization }}/{{ name }}
  license: LicenseRef-OSMC-PL
  license_file: LICENSE
  summary: "Python interface to OpenModelica."
  description: |
    OMPython is a Python interface that uses ZeroMQ to communicate with OpenModelica.
  dev_url: https://github.com/{{ organization }}/{{ name }}

extra:
  recipe-maintainers:
    - adeas31
