context:
  version: "1.0"
  build_number: 0

package:
  name: scservo
  version: ${{ version }}

source:
  url: https://github.com/adityakamath/SCServo_Linux/archive/v${{ version }}.tar.gz
  sha256: 48f38a19633674301c52fef6dd4950f43f9a2c47574ed9c3182eda997ce9b89a
  patches:
    - build-shared-libs.patch

build:
  skip:
    - win
    - osx
  number: ${{ build_number }}
  script:
    - mkdir build && cd build
    - cmake ${CMAKE_ARGS} -GNinja -DCMAKE_BUILD_TYPE=Release -DBUILD_SHARED_LIBS=ON -DCMAKE_INSTALL_PREFIX=$PREFIX $SRC_DIR
    - ninja install

requirements:
  build:
    - ${{ compiler('cxx') }}
    - ${{ stdlib('c') }}
    - cmake
    - ninja

tests:
  - package_contents:
      include:
        - scservo/SCServo.h
        - scservo/SCS0009.h
      files:
        exists:
          - lib/libSCServo.so
          - lib/cmake/SCServo/SCServoConfig.cmake
          - lib/cmake/SCServo/SCServoConfigVersion.cmake

about:
  homepage: https://github.com/adityakamath/SCServo_Linux
  repository: https://github.com/adityakamath/SCServo_Linux
  license: MIT
  license_family: MIT
  license_file: LICENSE
  summary: Linux SDK for Feetech serial bus servo motors
  description: |
    C++17 library for controlling Feetech SMS/STS, SCSCL, HLSCL, and SCS0009
    series serial bus servo motors on Linux.
  documentation: https://github.com/adityakamath/SCServo_Linux

extra:
  recipe-maintainers:
    - mjohnson459
    - adityakamath
