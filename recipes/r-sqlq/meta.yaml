{% set version = '1.0.1' %}
{% set posix = 'm2-' if win else '' %}

package:
  name: r-sqlq
  version: {{ version|replace("-", "_") }}

source:
  url:
    - {{ cran_mirror }}/src/contrib/sqlq_{{ version }}.tar.gz
    - {{ cran_mirror }}/src/contrib/Archive/sqlq/sqlq_{{ version }}.tar.gz
  sha256: f023c92d5dcfcbb3f73845ffcd13f053cf075d29f749b11692506f7fafcfed84

build:
  number: 0
  noarch: generic
  rpaths:
    - lib/R/lib/
    - lib/
  missing_dso_whitelist:
    - '*/R.dll'        # [win]
    - '*/Rblas.dll'    # [win]
    - '*/Rlapack.dll'  # [win]

requirements:
  build:
    - {{ posix }}zip               # [win]
    - cross-r-base {{ r_base }}    # [build_platform != target_platform]
  host:
    - r-base
    - r-dbi
    - r-r6
    - r-chk
  run:
    - r-base
    - r-dbi
    - r-r6
    - r-chk

test:
  commands:
    - $R -e "library('sqlq')"           # [not win]
    - "\"%R%\" -e \"library('sqlq')\""  # [win]

about:
  home: https://gitlab.com/cnrgh/databases/r-sqlq
  license: AGPL-3.0-or-later
  summary: Allows to build complex 'SQL' (Structured Query Language) queries dynamically. Classes
    and/or factory functions are used to produce a syntax tree from which the final
    character string is generated. Strings and identifiers are automatically quoted
    using the right quotes, using either ANSI (American National Standards Institute)
    quoting or the quoting style of an existing database connector. Style can be configured
    to set uppercase/lowercase for keywords, remove unnecessary spaces, or omit optional
    keywords.
  license_family: AGPL
  license_file:
    - '{{ environ["PREFIX"] }}/lib/R/share/licenses/AGPL-3'

extra:
  recipe-maintainers:
    - conda-forge/r

