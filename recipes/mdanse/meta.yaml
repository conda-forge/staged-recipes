{% set version = "2.0.0" %}
{% set python_min = "3.10" %}

package:
  name: mdanse
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/m/mdanse/mdanse-{{ version }}.tar.gz
  sha256: 1d71811f1079afedd7c7ff555bcc11ee681d6e0f355e2d15f45a622832156bc1

build:
  entry_points:
    - mdanse = MDANSE.Scripts.mdanse:main
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - setuptools
    - wheel
    - pip
  run:
    - python >={{ python_min }}
    - numpy
    - scipy
    - h5py >=3.13
    - ase
    - rdkit >=2025.3.3
    - mdanalysis
    - mdtraj
    - networkx
    - more-itertools

test:
  imports:
    - MDANSE
  commands:
    - pip check
    - mdanse --help
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://www.isis.stfc.ac.uk/Pages/MDANSEproject.aspx
  summary: MDANSE Core package - Molecular Dynamics trajectory handling and analysis code
  license: GPL-3.0-only
  license_file: LICENSE

extra:
  recipe-maintainers:
    - MBartkowiakSTFC
    - ChiCheng45
