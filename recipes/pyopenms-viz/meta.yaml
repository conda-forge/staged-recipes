{% set version = "1.0.1" %}

package:
  name: pyopenms-viz
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/p/pyopenms-viz/pyopenms_viz-{{ version }}.tar.gz
  sha256: 890920247644bd2b6b7e46ebe4c7a4437b77f3eced686c0dcae1cb76ac7d8708

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - flit-core >=3.12,<4
    - pip
  run:
    - python >={{ python_min }},<3.13
    - matplotlib-base
    - bokeh
    - plotly
    - pandas >=0.17

test:
  imports:
    - pyopenms_viz
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}.*

about:
  home: https://github.com/OpenMS/pyopenms_viz/
  summary: A package for visualizing mass spectrometry data using pandas dataframes
  license: BSD-3-Clause
  license_file: LICENSE

extra:
  recipe-maintainers:
    - hechth
