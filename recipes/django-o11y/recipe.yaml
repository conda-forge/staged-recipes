# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  name: django-o11y
  version: "0.7.0"

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/${{ name[0] }}/${{ name }}/django_o11y-${{ version }}.tar.gz
  sha256: 374c11f7e5cccaaf1bde5524cc278dfd2b0edbc9a05c6ce96d19e3a24c278412

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - hatchling
    - prometheus_client
    - celery
    - pip
  run:
    - python >=${{ python_min }},<4.0
    - django >=5.2
    - opentelemetry-api >=1.39.1
    - opentelemetry-sdk >=1.39.1
    - opentelemetry-instrumentation-django >=0.60b1
    - opentelemetry-exporter-otlp-proto-grpc >=1.39.1
    - structlog >=25.5.0
    - django-structlog >=10.0.0
    - click >=8.1.7
    - django-prometheus >=2.4.0
    - prometheus_client >=0.24.1

tests:
  - python:
      imports:
        - django_o11y
      pip_check: true
      python_version: ${{ python_min }}.*

about:
  summary: Comprehensive OpenTelemetry observability for Django with traces, logs, metrics, and profiling
  license: Apache-2.0
  license_file: LICENSE
  homepage: https://github.com/adinhodovic/django-o11y

extra:
  recipe-maintainers:
    - rxm7706
