{% set version = "0.1.0a1" %}

package:
  name: yohou-optuna
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/y/yohou-optuna/yohou_optuna-{{ version }}.tar.gz
  sha256: 21b1065af3323589bd379a3e455bf0ba329a47e074e2c792475f2d304a4941ae

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python >=3.11
    - hatchling
    - hatch-vcs
    - pip
  run:
    - python >=3.11
    - optuna
    - scipy
    - sklearn-optuna
    - yohou

test:
  imports:
    - yohou_optuna
  commands:
    - pip check
  requires:
    - pip
    - python

about:
  home: https://github.com/stateful-y/yohou-optuna
  summary: An Optuna integration for hyperparameter tuning in Yohou
  doc_url: https://yohou-optuna.readthedocs.io
  license: Apache-2.0
  license_file: LICENSE

extra:
  recipe-maintainers:
    - gtauzin
