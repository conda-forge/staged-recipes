{% set version = '8.3-14' %}
{% set posix = 'm2-' if win else '' %}

package:
  name: r-cdm
  version: "{{ version|replace('-', '_') }}"

source:
  url:
    - {{ cran_mirror }}/src/contrib/CDM_{{ version }}.tar.gz
    - {{ cran_mirror }}/src/contrib/Archive/CDM/CDM_{{ version }}.tar.gz
  sha256: 1faec752a3547257649b420c9d0c6d1df28042ee061366ab9ce9991d7278a7a0

build:
  number: 0
  skip: true  # [osx]
  rpaths:
    - lib/R/lib/
    - lib/
  missing_dso_whitelist:
    - '*/R.dll'        # [win]
    - '*/Rblas.dll'    # [win]
    - '*/Rlapack.dll'  # [win]

requirements:
  build:
    - {{ compiler('c') }}              # [not win]
    - {{ stdlib("c") }}                # [not win]
    - {{ compiler('m2w64_c') }}        # [win]
    - {{ compiler('cxx') }}            # [not win]
    - {{ compiler('m2w64_cxx') }}      # [win]
    - {{ posix }}filesystem        # [win]
    - {{ posix }}make
    - {{ posix }}sed               # [win]
    - {{ posix }}coreutils         # [win]
    - {{ posix }}zip               # [win]
    - cross-r-base {{ r_base }}    # [build_platform != target_platform]
  host:
    - libblas
    - liblapack
    - r-base
    - r-rcpp
    - r-rcpparmadillo
    - r-mvtnorm
    - r-polycor
  run:
    - r-base
    - r-rcpp
    - r-rcpparmadillo
    - r-mvtnorm
    - r-polycor

test:
  commands:
    - $R -e "library('CDM')"           # [not win]
    - "\"%R%\" -e \"library('CDM')\""  # [win]

about:
  home: https://github.com/alexanderrobitzsch/CDM, https://sites.google.com/view/alexander-robitzsch/software
  license: GPL-2.0-only
  summary: Functions for cognitive diagnosis modeling and multidimensional item response modeling
    for dichotomous and polytomous item responses. This package enables the estimation
    of the DINA and DINO model (Junker & Sijtsma, 2001, <doi:10.1177/01466210122032064>),
    the multiple group (polytomous) GDINA model (de la Torre, 2011, <doi:10.1007/s11336-011-9207-7>),
    the multiple choice DINA model (de la Torre, 2009, <doi:10.1177/0146621608320523>),
    the general diagnostic model (GDM; von Davier, 2008, <doi:10.1348/000711007X193957>),
    the structured latent class model (SLCA; Formann, 1992, <doi:10.1080/01621459.1992.10475229>)
    and regularized latent class analysis (Chen, Li, Liu, & Ying, 2017, <doi:10.1007/s11336-016-9545-6>).
    See George, Robitzsch, Kiefer, Gross, and Uenlue (2017) <doi:10.18637/jss.v074.i02>
    or Robitzsch and George (2019, <doi:10.1007/978-3-030-05584-4_26>) for further details
    on estimation and the package structure. For tutorials on how to use the CDM package
    see George and Robitzsch (2015, <doi:10.20982/tqmp.11.3.p189>) as well as Ravand
    and Robitzsch (2015).
  license_family: GPL2
  license_file:
    - '{{ environ["PREFIX"] }}/lib/R/share/licenses/GPL-2'

extra:
  recipe-maintainers:
    - conda-forge/r

# Package: CDM
# Type: Package
# Title: Cognitive Diagnosis Modeling
# Version: 8.3-14
# Date: 2025-07-13 14:03:01
# Authors@R: c(person(given = "Alexander", family = "Robitzsch", role = c("aut", "cre"), email = "robitzsch@ipn.uni-kiel.de"), person(given = "Thomas", family = "Kiefer", role = "aut"), person(given = c("Ann", "Cathrice"), family = "George", role = "aut"), person(given = "Ali", family = "Uenlue", role = "aut"))
# Maintainer: Alexander Robitzsch <robitzsch@ipn.uni-kiel.de>
# Description: Functions for cognitive diagnosis modeling and multidimensional item response modeling for dichotomous and polytomous item responses. This package enables the estimation of the DINA and DINO model (Junker & Sijtsma, 2001, <doi:10.1177/01466210122032064>), the multiple group (polytomous) GDINA model (de la Torre, 2011, <doi:10.1007/s11336-011-9207-7>), the multiple choice DINA model (de la Torre, 2009, <doi:10.1177/0146621608320523>), the general diagnostic model (GDM; von Davier, 2008, <doi:10.1348/000711007X193957>), the structured latent class model (SLCA; Formann, 1992, <doi:10.1080/01621459.1992.10475229>) and regularized latent class analysis (Chen, Li, Liu, & Ying, 2017, <doi:10.1007/s11336-016-9545-6>). See George, Robitzsch, Kiefer, Gross, and Uenlue (2017) <doi:10.18637/jss.v074.i02> or Robitzsch and George (2019, <doi:10.1007/978-3-030-05584-4_26>) for further details on estimation and the package structure. For tutorials on how to use the CDM package see George and Robitzsch (2015, <doi:10.20982/tqmp.11.3.p189>) as well as Ravand and Robitzsch (2015).
# Depends: R (>= 3.1), mvtnorm
