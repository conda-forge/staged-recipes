{% set version = '3.4' %}
{% set posix = 'm2-' if win else '' %}

package:
  name: r-imputets
  version: "{{ version|replace("-", "_") }}"

source:
  url:
    - {{ cran_mirror }}/src/contrib/imputeTS_{{ version }}.tar.gz
    - {{ cran_mirror }}/src/contrib/Archive/imputeTS/imputeTS_{{ version }}.tar.gz
  sha256: ca7217cf05b52ebfac7f638c6f0d2edef7e2aa91f137b68702c036c091f2bf6f

build:
  number: 0
  rpaths:
    - lib/R/lib/
    - lib/
  missing_dso_whitelist:
    - '*/R.dll'        # [win]
    - '*/Rblas.dll'    # [win]
    - '*/Rlapack.dll'  # [win]

requirements:
  build:
    - {{ compiler('c') }}              # [not win]
    - {{ stdlib("c") }}                # [not win]
    - {{ compiler('m2w64_c') }}        # [win]
    - {{ stdlib("m2w64_c") }}          # [win]
    - {{ compiler('cxx') }}            # [not win]
    - {{ compiler('m2w64_cxx') }}      # [win]
    - {{ posix }}filesystem        # [win]
    - {{ posix }}make
    - {{ posix }}sed               # [win]
    - {{ posix }}coreutils         # [win]
    - {{ posix }}zip               # [win]
    - cross-r-base {{ r_base }}    # [build_platform != target_platform]
  host:
    - r-base
    - r-rcpp
    - r-forecast
    - r-ggplot2 >=3.3.0
    - r-ggtext
    - r-magrittr
    - r-stinepack
  run:
    - r-base
    - r-rcpp
    - r-forecast
    - r-ggplot2 >=3.3.0
    - r-ggtext
    - r-magrittr
    - r-stinepack

test:
  commands:
    - $R -e "library('imputeTS')"           # [not win]
    - "\"%R%\" -e \"library('imputeTS')\""  # [win]

about:
  home: https://github.com/SteffenMoritz/imputeTS, https://steffenmoritz.github.io/imputeTS/
  license: GPL-3.0-only
  summary: 'Imputation (replacement) of missing values in univariate time series. Offers several
    imputation functions and missing data plots. Available imputation algorithms include:
    ''Mean'', ''LOCF'', ''Interpolation'', ''Moving Average'', ''Seasonal Decomposition'',
    ''Kalman Smoothing on Structural Time Series models'', ''Kalman Smoothing on ARIMA
    models''. Published in Moritz and Bartz-Beielstein (2017) <doi:10.32614/RJ-2017-009>.'
  license_family: GPL3
  license_file:
    - '{{ environ["PREFIX"] }}/lib/R/share/licenses/GPL-3'

extra:
  recipe-maintainers:
    - conda-forge/r
    - JNuss71

