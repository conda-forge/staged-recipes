{% set version = "1.3.0" %}

package:
  name: reset-bio
  version: {{ version }}

source:
  url: https://files.pythonhosted.org/packages/63/be/964d684fd1f02fbf61dd39bdb7afa9f4e7b6dc0207a35d517bfc7a46617c/reset_bio-{{ version }}.tar.gz
  sha256: 5e88af6d68864d7b8abb8c3dd79cf36bb54ce30812e838559a14e5727260264c

build:
  number: 0
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python >=3.10
    - pip
    - hatchling
    - hatch-vcs
  run:
    - python >=3.10
    - numpy >=2.0,<3.0
    - scipy >=1.14,<2.0
    - pandas >=2.0,<3.0
    - streamlit >=1.37,<2.0

test:
  imports:
    - reset
    - reset.dashboard
  commands:
    - python -c "from reset import Solution, Solution_shm"
    - python -c "from reset.dashboard import pipeline"

about:
  home: https://github.com/JaspervB-tud/ReSeT
  license: MIT
  license_file: LICENSE
  summary: Reference genome Selection Tool
  description: |
    ReSeT selects a minimal, representative subset of sequences from a
    pre-clustered collection by minimising a local-search objective that
    balances selection cost, intra-cluster coverage, and inter-cluster
    similarity. Includes a Streamlit dashboard.
  doc_url: https://github.com/JaspervB-tud/ReSeT/blob/main/README.md
  dev_url: https://github.com/JaspervB-tud/ReSeT

extra:
  recipe-maintainers:
    - JaspervB-tud
