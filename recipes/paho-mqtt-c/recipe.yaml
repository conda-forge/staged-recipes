context:
  version: "1.3.16"
  name: paho-mqtt-c

package:
  name: ${{ name }}
  version: ${{ version }}

source:
  url: https://github.com/eclipse-paho/paho.mqtt.c/archive/refs/tags/v${{ version }}.tar.gz
  sha256: 8b960f51edc7e03507637d987882bc486d8f4be6e79431bf99e2763344fd14c5

build:
  number: 0

requirements:
  run_exports:
    - ${{ pin_subpackage(name, upper_bound='x.x') }}
  build:
    - ${{ compiler('c') }}
    - ${{ stdlib('c') }}
    - cmake
    - if: unix
      then: make
    - if: win
      then: ninja
  host:
    - openssl

tests:
  - package_contents:
      include:
        - MQTTClient.h
        - MQTTAsync.h
      lib:
        - paho-mqtt3as
        - paho-mqtt3cs

about:
  homepage: https://github.com/eclipse-paho/paho.mqtt.c
  summary: Eclipse Paho MQTT C Client Library
  description: |
    The Eclipse Paho project provides open-source client implementations of MQTT
    and MQTT-SN messaging protocols aimed at new, existing, and emerging
    applications for the Internet of Things (IoT). This is the C client library.
  license: EPL-2.0 AND BSD-3-Clause
  license_file:
    - LICENSE
    - epl-v20
    - edl-v10
  repository: https://github.com/eclipse-paho/paho.mqtt.c

extra:
  recipe-maintainers:
    - AndreFavotto
