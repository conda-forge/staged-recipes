context:
  name: topaz
  version: 0.1.0

package:
  name: topaz
  version: 0.1.0

source:
  url: https://github.com/kullrich/topaz-arm64/archive/refs/tags/0.1.0.tar.gz
  sha256: e86c2a15b03fa5e463cbc1676d9d2361a5e5af0418dc6ce435f03b65e4b04dfc

build:
  number: 0
  skip:
    - win
  script:
    - bash ${RECIPE_DIR}/build.sh

requirements:
  build:
    - ${{ compiler('c') }}
    - ${{ compiler('cxx') }}
    - make

  host:
    - if: osx
      then:
        - llvm-openmp  # [osx]
    - if: linux
      then:
        - libgomp  # [linux]

  run:
    - if: osx
      then:
        - llvm-openmp  # [osx]
    - if: linux
      then:
        - libgomp  # [linux]

about:
  summary: "TOPAZ: asymmetric suffix array neighbourhood search for massive protein databases"
  license: GPL-3.0-only
  license_file: LICENSE
  repository: https://github.com/kullrich/topaz-arm64

extra:
  recipe-maintainers:
    - kullrich
