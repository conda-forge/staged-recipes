{% set version = "1.1.1" %}
{% set python_min = "3.11" %}

package:
  name: daaf-plot
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/d/daaf-plot/daaf_plot-{{ version }}.tar.gz
  sha256: 6f400e0bd6db13002bba1d174eae823f2aec506865c2463a23ae1a7619f21be3

build:
  noarch: python
  script: python -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - hatchling
    - pip
  run:
    - python >={{ python_min }}
    - cartopy
    - ipympl
    - ipython
    - ipywidgets
    - matplotlib-base
    - numpy
    - pandas
    - xarray

test:
  imports:
    - daaf_plot
  commands:
    - pip check
  requires:
    - pip
    - python

about:
  home: https://pypi.org/project/daaf-plot/
  summary: Python toolbox to make interactive plot in python notebooks
  dev_url: https://github.com/aFarchi/daaf-plot
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - aFarchi
