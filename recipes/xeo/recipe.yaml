context:
  version: "0.2.1"

package:
  name: xeo
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/x/xeo/xeo-${{ version }}.tar.gz
  sha256: db7fd09877933012f5620a2f69d4567e2cbb78f19157e7c4581ad8fe7f8c8582

build:
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python ${{ python_min }}.*
    - setuptools >=68
    - pip
  run:
    - python >=${{ python_min }}
    - pandas >=2.0.3
    - python-box >=6.0

tests:
  - python:
      imports:
        - xeo
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  homepage: https://github.com/awesome-spectral-indices/xeo
  summary: Awesome Earth Observation Instruments in Python
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - davemlz
