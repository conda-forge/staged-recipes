schema_version: 1

context:
  python_min: "3.12"
  version: "0.1.1"

package:
  name: pydantic-ai-trace
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/p/pydantic-ai-trace/pydantic_ai_trace-${{ version }}.tar.gz
  sha256: 866399385bc82976d6377272ca37064b599cd4ceba9515210d118b315170f48e

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  python:
    entry_points:
      - paitrace = pydantic_ai_trace.cli:main

requirements:
  host:
    - python ${{ python_min }}.*
    - hatchling
    - hatch-vcs
    - pip
  run:
    - python >=${{ python_min }}
    - starlette >=0.40
    - uvicorn >=0.30
    - watchfiles >=0.24

tests:
  - python:
      imports:
        - pydantic_ai_trace
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"
  - requirements:
      run:
        - pip
        - python ${{ python_min }}.*
    script:
      - paitrace --help

about:
  summary: Fast local web viewer for pydantic-ai traces (list[ModelMessage] JSON dumps)
  license: MIT
  license_file: LICENSE
  homepage: https://pypi.org/project/pydantic-ai-trace/

extra:
  recipe-maintainers:
    - moritzwilksch
