context:
  version: "0.0.4"

package:
  name: nb-cli
  version: ${{ version }}

source:
  url: https://github.com/jupyter-ai-contrib/nb-cli/archive/v${{ version }}.tar.gz
  sha256: 25008bdf69c2653d02118244532e3c262ffd543ac323a508138d75d4f65aeb99

build:
  number: 0

requirements:
  build:
    - ${{ compiler('rust') }}
    - ${{ compiler('c') }}
    - ${{ stdlib('c') }}
    - cargo-bundle-licenses
    - cargo-auditable
    - pkg-config
  host:
    - openssl

tests:
  - script:
      - nb --help
      - nb --version

about:
  homepage: https://github.com/jupyter-ai-contrib/nb-cli
  repository: https://github.com/jupyter-ai-contrib/nb-cli
  license: BSD-3-Clause
  license_file:
    - LICENSE
    - THIRDPARTY.yml
  summary: "A command-line tool for reading, writing, and executing Jupyter notebooks"

extra:
  recipe-maintainers:
    - 3coins
    - andrii-i
    - ellisonbg
