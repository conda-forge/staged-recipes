context:
  name: tssh
  version: "0.1.25"

package:
  name: ${{ name }}
  version: ${{ version }}

source:
  url: https://github.com/trzsz/trzsz-ssh/archive/refs/tags/v${{ version }}.tar.gz
  sha256: 9a692854733333643b6108f68bed0239b266c461e15125781503d957c9b47842

build:
  number: 0
  script:
    - go-licenses save ./cmd/${{ name }} --save_path ./library_licenses
    - if: unix
      then: go build -v -trimpath -o $PREFIX/bin/${{ name }} -ldflags="-s -w" ./cmd/${{ name }}
      else: go build -v -trimpath -o %LIBRARY_BIN%\${{ name }}.exe -ldflags="-s -w" .\cmd\${{ name }}

requirements:
  build:
    - ${{ compiler("go-nocgo") }}
    - go-licenses

tests:
  - script:
      - ${{ name }} -V

about:
  homepage: https://trzsz.github.io/tssh
  summary: "Highly OpenSSH-compatible client with extended features"
  license: MIT
  license_file:
    - LICENSE
    - library_licenses/
  repository: https://github.com/trzsz/trzsz-ssh

extra:
  recipe-maintainers:
    - lonnywong
