{% set name = "sc-rs" %}
{% set version = "1.0.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://github.com/cytokineking/sc-rs/archive/refs/tags/v{{ version }}.tar.gz
  sha256: 13db2f76fe64fbe21f4e85d4fe588d6620f807c3b137d1f280165a124e92977d

build:
  number: 0
  skip: true  # [win]

requirements:
  build:
    - rust >=1.70

test:
  commands:
    # sc has no --help flag; calling it with no args prints usage to stderr and
    # exits 1.  Pipe stderr→stdout and assert the usage line is present.
    - 'sc 2>&1 | grep -q "Usage: sc"'

about:
  home: https://github.com/cytokineking/sc-rs
  summary: "Rust implementation of the Shape Complementarity (SC) algorithm for protein–protein interfaces"
  description: |
    An open-source Rust implementation of the Shape Complementarity (SC)
    "goodness of fit" between two protein interfaces as defined by
    Lawrence & Colman (1993). The SC statistic ranges from 0 to 1, where 1
    indicates maximum shape compatibility. Features CPU multi-core support
    via Rayon, Connolly-style molecular surface generation, peripheral
    trimming, nearest-neighbour statistics, and SC medians.
  license: MIT
  license_file: LICENSE
  doc_url: https://github.com/cytokineking/sc-rs
  dev_url: https://github.com/cytokineking/sc-rs

extra:
  recipe-maintainers:
    - gieses
