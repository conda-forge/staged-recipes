{% set name = "pyfcwt" %}
{% set version = "0.1.0" %}

package:
  name: {{ name }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz
  sha256: d469b7a9311bb2663e4be99b389f410b127f8adae95cbd1c93cd73735e09ac18

build:
  noarch: python
  number: 0
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python >=3.10
    - pip
    - hatchling
  run:
    - python >=3.10
    - numpy >=2.2.6
    - numba >=0.65.1
    - pyfftw >=0.15.0

test:
  imports:
    - pyfcwt
  pip_check: true

about:
  home: https://github.com/larshnelson/pyfcwt
  license: MIT
  license_file: LICENSE
  summary: A pure-Python fast continuous wavelet transform (fCWT) implementation
  repository: https://github.com/LarsHenrikNelson/pyfcwt

extra:
  recipe-maintainers:
    - LarsHenrikNelson
