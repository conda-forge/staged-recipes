schema_version: 1

context:
  name: pyfcwt
  version: '0.1.0'
  python_min: '3.10'

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/${{ name[0] }}/${{ name }}/pyfcwt-${{ version }}.tar.gz
  sha256: d469b7a9311bb2663e4be99b389f410b127f8adae95cbd1c93cd73735e09ac18

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - hatchling
  run:
    - python >=${{ python_min }}
    - numpy >=2.2.6
    - numba >=0.65.1
    - pyfftw >=0.15.0

tests:
  - python:
      imports:
        - pyfcwt
      pip_check: true
      python_version: ${{ python_min }}.*

about:
  homepage: https://github.com/larshnelson/pyfcwt
  license: MIT
  license_file: LICENSE
  summary: A pure-Python fast continuous wavelet transform (fCWT) implementation

extra:
  recipe-maintainers:
    - LarsHenrikNelson
