context:
  version: "0.1.0"

package:
  name: pyfcwt
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/p/pyfcwt/pyfcwt-${{ version }}.tar.gz
  sha256: d469b7a9311bb2663e4be99b389f410b127f8adae95cbd1c93cd73735e09ac18

build:
  script: python -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python
    - pip
    - hatchling
  run:
    - python
    - numpy >=2.2.6
    - numba >=0.65.1
    - pyfftw >=0.15.0

tests:
  - python:
    imports:
    - pyfcwt
    pip_check: true

about:
  homepage: https://github.com/larshnelson/pyfcwt
  license: MIT
  license_file: LICENSE
  summary: 'A pure-Python fast continuous wavelet transform (fCWT) implementation'
  repository: https://github.com/LarsHenrikNelson/pyfcwt

extra:
  recipe-maintainers:
    - LarsHenrikNelson
