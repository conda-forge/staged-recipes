context:
  name: "isobase"
  version: "0.1.1"
  python_min: "3.12"

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://github.com/landspark/IsoBase/archive/refs/tags/${{ version }}.tar.gz
  sha256: 016e717013737f516e635ea842868eaae846e425115ae5dd75f7944d66455224

build:
  noarch: python
  number: 0
  script: python -m pip install . -vv

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - hatchling
  run:
    - python >=${{ python_min }}
    - annotated-types
    - anthropic
    - anyio
    - cairo
    - certifi
    - cffi
    - charset-normalizer
    - click
    - colorlog
    - docstring_parser
    - filelock
    - fsspec
    - httpx
    - huggingface_hub
    - openai
    - packaging
    - phonenumbers
    - pillow
    - pydantic
    - pycountry
    - pyyaml
    - regex
    - requests
    - rich
    - sqlalchemy
    - sqlite
    - tavily-python
    - tiktoken
    - tokenizers
    - tqdm
    - typer

tests:
  - python:
      python_version: ${{ python_min }}.*
      imports:
        - isobase
      pip_check: true

about:
  homepage: https://github.com/landspark/IsoBase
  repository: https://github.com/landspark/IsoBase
  summary: Isomorphic Base (IsoBase) is a Python automation framework built around a JSON-driven workflow engine with AI/LLM integration.
  license: MPL-2.0
  license_file: LICENSE

extra:
  recipe-maintainers:
    - SwordJack
