context:
  name: "isobase"
  version: "0.1.2"
  python_min: "3.12"

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://github.com/landspark/IsoBase/archive/refs/tags/${{ version }}.tar.gz
  sha256: bb34067377774043281c76339c23a6534e0720f1c9d34d62ba86bd69023d51e2

build:
  noarch: python
  number: 0
  script: python -m pip install . -vv

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - hatchling
  run:
    - python >=${{ python_min }}
    - annotated-types
    - anthropic
    - colorlog
    - httpx
    - openai
    - phonenumbers
    - pillow
    - pydantic
    - pycountry
    - pyyaml
    - regex
    - requests
    - sqlalchemy
    - sqlite
    - tavily-python

tests:
  - python:
      python_version: ${{ python_min }}.*
      imports:
        - isobase
      pip_check: true

about:
  homepage: https://github.com/landspark/IsoBase
  repository: https://github.com/landspark/IsoBase
  summary: Isomorphic Base (IsoBase) is a Python automation framework built around a JSON-driven workflow engine with AI/LLM integration.
  license: MPL-2.0
  license_file: LICENSE

extra:
  recipe-maintainers:
    - SwordJack
