context:
  name: "isobase"
  version: "0.1.0"

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://github.com/landspark/IsoBase/archive/refs/tags/{{ version }}.tar.gz
  sha256: dc1aa5e7df42fa95253c977c5a17840fbda55de471dabc28a6ed8ba72799fe19

build:
  noarch: python
  number: 0
  script: python -m pip install . -vv

requirements:
  host:
    - python >=3.10
    - pip
    - hatchling
  run:
    - python >=3.10
    - annotated-types
    - anthropic
    - anyio
    - cairo
    - certifi
    - cffi
    - charset-normalizer
    - click
    - colorlog
    - docstring-parser
    - filelock
    - fsspec
    - httpx
    - huggingface-hub
    - openai
    - packaging
    - phonenumbers
    - pillow
    - pydantic
    - pycountry
    - pyyaml
    - regex
    - requests
    - rich
    - sqlalchemy
    - sqlite
    - tavily-python
    - tiktoken
    - tokenizers
    - tqdm
    - typer

tests:
  - python:
      imports:
        - isobase
      pip_check: true

about:
  homepage: https://github.com/landspark/IsoBase
  repository: https://github.com/landspark/IsoBase
  summary: Isomorphic Base (IsoBase) is a Python automation framework built around a JSON-driven workflow engine with AI/LLM integration.
  license: MPL-2.0
  license_file: LICENSE

extra:
  recipe-maintainers:
    - SwordJack
