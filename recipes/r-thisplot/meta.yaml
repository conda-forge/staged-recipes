{% set version = "0.4.0" %}
{% set posix = 'm2-' if win else '' %}

package:
  name: r-thisplot
  version: {{ version|replace("-", "_") }}

source:
  url:
    - {{ cran_mirror }}/src/contrib/thisplot_{{ version }}.tar.gz
    - {{ cran_mirror }}/src/contrib/Archive/thisplot/thisplot_{{ version }}.tar.gz
  sha256: 765444aaef267aa8150a0c6020193b5074c602e7eee0a2381546b0e5d559e0b4

build:
  number: 0
  noarch: generic
  rpaths:
    - lib/R/lib/
    - lib/

requirements:
  build:
    - {{ posix }}zip               # [win]
  host:
    - r-base
    - r-cli
    - r-dendextend
    - r-ggforce
    - r-geomtextpath
    - r-ggnewscale
    - r-ggplot2
    - r-ggrepel
    - r-gtable
    - r-igraph
    - r-patchwork
    - r-proxyc
    - r-reshape2
    - r-thisutils >=0.4.3
  run:
    - r-base
    - r-cli
    - r-dendextend
    - r-ggforce
    - r-geomtextpath
    - r-ggnewscale
    - r-ggplot2
    - r-ggrepel
    - r-gtable
    - r-igraph
    - r-patchwork
    - r-proxyc
    - r-reshape2
    - r-thisutils >=0.4.3

test:
  commands:
    - $R -e "library('thisplot')"           # [not win]
    - "\"%R%\" -e \"library('thisplot')\""  # [win]

about:
  home: https://mengxu98.github.io/thisplot/
  dev_url: https://github.com/mengxu98/thisplot
  doc_url: https://mengxu98.github.io/thisplot/reference/index.html
  license: MIT
  license_family: MIT
  license_file:
    - {{ environ["PREFIX"] }}/lib/R/share/licenses/MIT
    - LICENSE
  summary: Utility functions for plotting.
  description: |
    Provides utility functions for plotting. Includes functions for color
    manipulation, plot customization, panel size control, data optimization for
    plots, and layout adjustments.

extra:
  recipe-maintainers:
    - conda-forge/r
    - mengxu98
