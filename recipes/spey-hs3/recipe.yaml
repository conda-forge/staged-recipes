schema_version: 1

context:
  version: "0.0.1-b3"
  python_min: "3.10"

package:
  name: spey-hs3
  version: ${{ version }}

source:
  url: https://github.com/SpeysideHEP/spey-hs3/archive/refs/tags/v${{ version }}.tar.gz
  sha256: 0a48d26ec9d65312a4e5a4245ff7f6a992cdfcc03142063b95cc7823bb538f9f

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - setuptools >=64
  run:
    - python >=${{ python_min }},<3.15
    - spey >=0.2.6
    - pyhs3 ==0.4.1

tests:
  - python:
      imports:
        - spey_hs3
      pip_check: true
      python_version: ${{ python_min }}.*

about:
  homepage: https://github.com/SpeysideHEP/spey-hs3
  summary: HS3 plugin for spey interface
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - jackaraz
