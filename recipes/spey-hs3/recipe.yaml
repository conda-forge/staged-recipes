schema_version: 1

context:
  version: "0.0.2"
  python_min: "3.10"

package:
  name: spey-hs3
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/s/spey-hs3/spey_hs3-${{ version }}.tar.gz
  sha256: 76aaaa71154e80c3b5d93ab094a10c5efd6500e3a62c6d35a72908e2ad99b0cc

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - setuptools >=64
  run:
    - python >=${{ python_min }},<3.15
    - spey >=0.2.6
    - pyhs3 ==0.4.1
    - pytensor <3.0.0

tests:
  - python:
      imports:
        - spey_hs3
      pip_check: true
      python_version: ${{ python_min }}.*

about:
  homepage: https://github.com/SpeysideHEP/spey-hs3
  summary: HS3 plugin for spey interface
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - jackaraz
