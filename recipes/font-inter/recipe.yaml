context:
  version: "4.1"

package:
  name: font-inter
  version: ${{ version }}

source:
  - url: https://github.com/rsms/inter/releases/download/v${{ version }}/Inter-${{ version }}.zip
    sha256: 9883fdd4a49d4fb66bd8177ba6625ef9a64aa45899767dde3d36aa425756b11e

build:
  noarch: generic
  number: 0
  script:
    - mkdir -p $PREFIX/fonts
    - cp Inter.ttc $PREFIX/fonts
    - cp InterVariable*.ttf $PREFIX/fonts
    - cp Inter*.ttf $PREFIX/fonts
    - cp extras/{otf,ttf,woff-hinted}/* $PREFIX/fonts

tests:
  - package_contents:
      files:
        - fonts/Inter.ttc
        - fonts/InterVariable-Italic.ttf
        - fonts/InterVariable.ttf
        - fonts/Inter-*.otf
        - fonts/InterDisplay-*.otf
        - fonts/Inter-*.ttf
        - fonts/InterDisplay-*.ttf
        - fonts/Inter-*.woff2
        - fonts/InterDisplay-*.woff2
      strict: true

about:
  homepage: https://rsms.me/inter
  summary: The Inter font family
  description: |
    Inter is a typeface carefully crafted & designed for computer screens. Inter features a tall x-height to aid in readability of mixed-case and lower-case text. Inter is a variable font with several OpenType features, like contextual alternates that adjusts punctuation depending on the shape of surrounding glyphs, slashed zero for when you need to disambiguate "0" from "o", tabular numbers, etc.
  license: OFL-1.1
  license_file:
    - LICENSE.txt
  repository: https://github.com/rsms/inter

extra:
  recipe-maintainers:
    - pavelzw
