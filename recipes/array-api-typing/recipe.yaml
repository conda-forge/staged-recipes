context:
  version: 0.0.0.dev0
  build_number: '0'

package:
  name: array-api-typing
  version: ${{ version }}

source:
- url: https://pypi.org/packages/source/a/array-api-typing/array_api_typing-${{ version }}.tar.gz
  sha256: a0bce0e3ac47b1bc4b98dbbcd69fba72e86735aa437337f974ad2e94a3b4f11b

build:
  number: ${{ build_number }}
  script: ${{ PYTHON }} -m pip install .
  noarch: python

requirements:
  host:
  - python ${{ python_min }}.*
  - hatchling
  - pip
  run:
  - python >=${{ python_min }}

tests:
- python:
    # NotImplementedError for now
    # imports:
    # - array_api_typing
    pip_check: true
    python_version: ${{ python_min }}.*

about:
  summary: Coming soon - Static typing support for the array API standard
  description: |
    coming soon
  homepage: https://github.com/data-apis/array-api-typing
  license: MIT
  license_file:
  - LICENSE
extra:
  recipe-maintainers:
    - lucascolley
