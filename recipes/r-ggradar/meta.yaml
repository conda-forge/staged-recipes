package:
  name: r-ggradar
  version: "0.2.0"

source:
  url: https://github.com/ricardo-bion/ggradar/archive/f99517a.tar.gz
  sha256: e6ca50af5f1b0079cabb42702742427f2b9df633afa4eb0af19d5979ee637be6
  folder: ggradar-f99517a

build:
  number: 0
  noarch: generic
  script:
    - R CMD INSTALL --build ggradar-f99517a
  rpaths:
    - lib/R/lib/
    - lib/

requirements:
  host:
    - r-base
    - r-forcats
    - r-ggplot2
  run:
    - r-base
    - r-forcats
    - r-ggplot2

test:
  commands:
    - Rscript -e 'library("ggradar")'

about:
  home: https://github.com/ricardo-bion/ggradar
  license: GPL
  license_file: ggradar-f99517a/DESCRIPTION
  summary: Radar charts using ggplot2

extra:
  recipe-maintainers:
    - conda-forge/r
    - samtobam
