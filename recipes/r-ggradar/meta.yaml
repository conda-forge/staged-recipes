package:
  name: r-ggradar
  version: "0.2.0"

source:
  url: https://github.com/ricardo-bion/ggradar/archive/f99517a.tar.gz
  sha256: e6ca50af5f1b0079cabb42702742427f2b9df633afa4eb0af19d5979ee637be6

build:
  number: 0
  noarch: generic
  rpaths:
    - lib/R/lib/
    - lib/

requirements:
  host:
    - r-base
    - r-forcats
    - r-ggplot2
  run:
    - r-base
    - r-forcats
    - r-ggplot2

test:
  commands:
    - $R -e "library(ggradar)"

about:
  home: https://github.com/ricardo-bion/ggradar
  license: GPL-2
  license_file: DESCRIPTION
  summary: Radar charts using ggplot2

extra:
  recipe-maintainers:
    - conda-forge/r
    - samtobam
