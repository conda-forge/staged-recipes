schema_version: 1

context:
  name: sim-atlas
  version: "0.0.2"
  python_min: '3.12'

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/s/sim-atlas/sim_atlas-${{ version }}.tar.gz
  sha256: 4c305440fe169e45902392011440ff63736cdde042eaf2228f41b4fcbc39b362

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  python:
    entry_points:
      - sim-atlas-access-token = sim_atlas.cli:token
      - sim-atlas = sim_atlas.cli:backend

requirements:
  host:
    - python ${{ python_min }}.*
    - hatchling
    - pip
  run:
    - python >=${{ python_min }},<3.14
    - fastapi-mcp >=0.4.0
    - fastapi >=0.122.0
    - langfuse-python >=4.6.1
    - numpy >=1.21
    - openai >=2.8.1
    - pydantic-settings >=2.13.1
    - pyjwt >=2.12.1
    - python-workflow-definition >=0.1.2
    - tqdm >=4.67.3
    - voyageai >=0.3.7

tests:
  - python:
      imports:
        - sim_atlas
      pip_check: true
      python_version: ${{ python_min }}.*
  - requirements:
      run:
        - pip
        - python ${{ python_min }}.*
    script:
      - sim-atlas-access-token --help
      - sim-atlas --help

about:
  summary: Search and discovery platform for simulation nodes — Python functions, workflow definitions, and pyiron nodes used in scientific computing.
  license: BSD-3-Clause
  license_file: LICENSE
  homepage: https://pypi.org/project/sim-atlas/

extra:
  recipe-maintainers:
    - niklassiemer
