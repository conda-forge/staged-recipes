schema_version: 1

context:
  version: "0.2.2"
  python_min: "3.11"

package:
  name: rasterix
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/r/rasterix/rasterix-${{ version }}.tar.gz
  sha256: 6d1d189a45934c4c7ac87e0d0311f7b8fba5146908db4983f297b5ab10b311d4

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - hatchling
    - hatch-vcs
    - pip
  run:
    - python >=${{ python_min }}
    - affine
    - pandas >=2
    - numpy >=2
    - xproj >=0.2.0
    - xarray >=2025

tests:
  - python:
      python_version: ${{ python_min }}.*
      imports:
        - rasterix
      pip_check: true

about:
  summary: Raster extensions for Xarray
  license: Apache-2.0
  license_file: LICENSE
  homepage: https://pypi.org/project/rasterix/

extra:
  recipe-maintainers:
    - martinRenou
