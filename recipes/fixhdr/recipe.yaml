context:
  version: "1.0.0"

package:
  name: fixhdr
  version: ${{ version }}

source:
  url: https://gitlab.com/earthscope/public/epic/passoft/fixhdr/-/archive/v${{ version }}/fixhdr-v${{ version }}.tar.gz
  sha256: eb5d65c0e0d0fde3286ac88a584eeb165760e7c87e0adad93f8e0e5944d7d9ab

build:
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0
  python:
    entry_points:
      - fixhdr = fixhdr.fixhdr:main

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - setuptools
  run:
    - python >=${{ python_min }}
    - pyside6

tests:
  - python:
      imports:
        - fixhdr
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"
  - script:
      - fixhdr -h

about:
  homepage: https://epic.earthscope.org/content/software-resources
  summary: Modify mseed headers
  description: |
    Modify mini-SEED (mseed) file headers.
  license: GPL-3.0-or-later
  license_file: LICENSE
  repository: https://gitlab.com/earthscope/public/epic/passoft/fixhdr

extra:
  recipe-maintainers:
    - omid-earthscope
