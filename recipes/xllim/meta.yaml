{% set name = "xllim" %}
{% set version = "2.0.7" %}

# If the version of a package is not being increased, please add or increase the build/number.
# If the version of a package is being increased, please remember to return the build/number back to 0
{% set build = 0 %}


package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  # url: https://pypi.org/packages/source/x/xllim/xllim-{{ version }}.tar.gz
  url: https://github.com/xllim-tools/xllim/archive/a37398fed72b54aff10a56ecb04912def875aad1.tar.gz
  sha256: 0b2d31b8009f8a3e091a724233ebc61681838a71f4c4c7c54aa2afe969fb5bfc

build:
  number: {{ build }}
  # The upstream sdist vendors pybind11 and carma as git submodules in extern/.
  # We delete them and use conda-forge packages instead (see host requirements).
  # SKBUILD_CMAKE_DEFINE activates find_package() paths in CMakeLists.txt.
  script_env:
    - SKBUILD_CMAKE_DEFINE=XLLIM_USE_SYSTEM_PYBIND11=ON;XLLIM_USE_SYSTEM_CARMA=ON
  script: 
    - rm -rf extern/carma extern/pybind11   # [unix]   # Remove vendored sources completely
    - rd /s /q extern\carma extern\pybind11  # [win]  
    - {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  skip: true  # [py<311 or py>=313]  # >=3.11 requirement from NumPy 2, <3.13 from CARMA 

requirements:
  build:
    - {{ compiler('cxx') }}
    - {{ stdlib("c") }}
    - cmake >=3.21
    - ninja

  host:
    - python # Build python versions should not be constrained here
    - pip
    - setuptools >=42
    - wheel
    - scikit-build-core >=0.7.0,<1  
    - numpy  # numpy build version is decided by the conda-forge-pinning-feedstock, cannot constrain it here. Good news, it's numpy 2
    - boost >=1.78,<2.0  # 1.78 matches the PyPI wheel build; <2.0 ensures ABI stability
    - armadillo >=12.6,<13  # 12.6 minimum tested; <13 bounds to compatible major ABI
    - pybind11 >=2.12,<3  # replaces vendored extern/pybind11; <3 needed (API break)
    - carma  # replaces vendored extern/carma
    - libblas * *openblas
    - liblapack * *openblas
    - openblas

  run:
    - python
    - numpy
    - h5py >=3.8,<4
    - libopenblas >=0.3.15

test:
  imports:
    - xllim
    - xllim._core
    - xllim.cli
    - xllim.utils
  commands:
    - xllim_cli --help
  requires:
    - pip
  source_files:
    - tests/

about:
  home: https://github.com/xllim-tools/xllim
  license: CECILL-C
  license_file: LICENCE.txt
  summary: 'Python package for XLLiM with C++ core'
  description: |
    xLLiM is a C++ with Python bindings implementation of Gaussian Locally-Linear Mapping. It can be used to perform efficient inversion of high-dimensional models.
  doc_url: https://xllim-tools.github.io/xllim/
  dev_url: https://github.com/xllim-tools/xllim

extra:
  recipe-maintainers:
    - ffrancois-inria
    - stan-borkowski
