schema_version: 1

context:
  name: habitat-sim
  version: "0.3.3"

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  - url: https://github.com/facebookresearch/habitat-sim/archive/v${{ version }}.tar.gz
    sha256: 2c28959c9edb6b948e07485b75150e0fea7d289e79e5a9b51ef423869ab54800
    patches:
      - rapidjson-document-object.patch
      - find-installed-magnum-bindings-python.patch
  - url: https://github.com/erikwijmans/recastnavigation/archive/8eef00be6003a6bf9c49cb4c126662e05e58d508.tar.gz
    sha256: b237275985282fe9d38a184de37e06da57da475601cf1e853da203570ef3ada7
    target_directory: src/deps/recastnavigation

build:
  number: 0
  skip:
    - win
    - osx
  script: bash "${RECIPE_DIR}/build.sh"

requirements:
  build:
    - ${{ compiler("cxx") }}
    - ${{ stdlib("c") }}
    - cmake <4
    - ninja
    - pkg-config
    - pybind11
    - if: build_platform != target_platform
      then:
        - cross-python_${{ target_platform }}
        - numpy
        - python
    - setuptools
  host:
    - assimp
    - bullet-cpp
    - eigen
    - glfw
    - openexr
    - rapidjson
    - python
    - pip
    - attrs >=19.1.0
    - smmap <4.0,>=3.0.1
    - numba
    - numpy >=1.13
    - gitpython
    - quaternion
    - pillow
    - scipy >=1.3.0
    - tqdm
    - imageio
    - imageio-ffmpeg
    - matplotlib-base
    - corrade
    - magnum
    - magnum-bindings
    - magnum-integration
    - magnum-plugins
    - zstd
    - if: linux
      then:
        - libegl-devel
        - libgl-devel
        - libglu
        - libglx
        - libxcb
        - xorg-libx11
        - xorg-libxau
        - xorg-libxext
        - xorg-libxfixes
        - xorg-libxi
        - xorg-libxrandr
        - xorg-libxinerama
        - xorg-libxcursor
    - requests
    - setuptools
  run:
    - python
    - smmap <4.0,>=3.0.1
    - gitpython
    - attrs >=19.1.0
    - numba
    - numpy >=1.13
    - quaternion
    - pillow
    - scipy >=1.3.0
    - tqdm
    - imageio
    - imageio-ffmpeg
    - matplotlib-base
    - magnum-bindings

tests:
  - python:
      imports:
        - habitat_sim
  - script:
      - python run_test.py
    files:
      recipe:
        - run_test.py
    requirements:
      run:
        - python

about:
  homepage: https://aihabitat.org
  license: MIT
  license_family: MIT
  license_file: LICENSE
  summary: A flexible, high-performance 3D simulator for Embodied AI research.

extra:
  recipe-maintainers:
    - jeongseok-meta
