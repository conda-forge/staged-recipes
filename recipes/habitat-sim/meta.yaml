{% set name = "habitat-sim" %}
{% set version = "0.3.3" %}

package:
  name: {{ name|lower }}
  version: "{{ version }}"

source:
  - url: https://github.com/facebookresearch/habitat-sim/archive/v{{ version }}.tar.gz
    sha256: 2c28959c9edb6b948e07485b75150e0fea7d289e79e5a9b51ef423869ab54800
    patches:
      - rapidjson-document-object.patch
  - url: https://github.com/erikwijmans/recastnavigation/archive/8eef00be6003a6bf9c49cb4c126662e05e58d508.tar.gz
    sha256: b237275985282fe9d38a184de37e06da57da475601cf1e853da203570ef3ada7
    folder: src/deps/recastnavigation

build:
  number: 0
  skip: true  # [win or osx]

requirements:
  build:
    - {{ compiler('cxx') }}
    - {{ stdlib('c') }}
    - cmake <4
    - ninja
    - pkg-config  # [unix]
    - pybind11
    - cross-python_{{ target_platform }}  # [build_platform != target_platform]
    - numpy                               # [build_platform != target_platform]
    - python                              # [build_platform != target_platform]
    - setuptools
  host:
    - assimp
    - bullet-cpp
    - eigen
    - glfw
    - openexr
    - rapidjson
    - python
    - pip
    - attrs >=19.1.0
    - smmap <4.0,>=3.0.1
    - numba
    - numpy >=1.13
    - gitpython
    - quaternion
    - pillow
    - scipy >=1.3.0
    - tqdm
    - imageio
    - imageio-ffmpeg
    - matplotlib-base
    - corrade
    - magnum
    - magnum-bindings
    - magnum-integration
    - magnum-plugins
    - zstd
    - libegl-devel           # [linux]
    - libgl-devel            # [linux]
    - libglu                 # [linux]
    - libglx                 # [linux]
    - libxcb                 # [linux]
    - xorg-libx11            # [linux]
    - xorg-libxau            # [linux]
    - xorg-libxext           # [linux]
    - xorg-libxfixes         # [linux]
    - xorg-libxi             # [linux]
    - xorg-libxrandr         # [linux]
    - xorg-libxinerama       # [linux]
    - xorg-libxcursor        # [linux]
    - pip
    - python
    - requests
    - setuptools
  run:
    - python
    - smmap <4.0,>=3.0.1
    - gitpython
    - attrs >=19.1.0
    - numba
    - numpy >=1.13
    - quaternion
    - pillow
    - scipy >=1.3.0
    - tqdm
    - imageio
    - imageio-ffmpeg
    - matplotlib-base
    - magnum-bindings

test:
  imports:
    - habitat_sim
  commands:
    - python run_test.py
  files:
    - run_test.py

about:
  home: https://aihabitat.org
  license: MIT
  license_family: MIT
  license_file: LICENSE
  summary: A flexible, high-performance 3D simulator for Embodied AI research.

extra:
  recipe-maintainers:
    - jeongseok-meta
