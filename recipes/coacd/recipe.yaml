context:
  version: "1.0.10"

package:
  name: coacd
  version: ${{ version }}

source:
  url: https://github.com/SarahWeiii/CoACD/archive/refs/tags/${{ version }}.tar.gz
  sha256: e43873d3ebe647cb720ce28d5167c888ff5401c4c8c38666bee25cf7f04abe40
  patches:
    # drop msvc lib prefix
    - prefix.patch

build:
  number: 0

requirements:
  build:
    - cmake
    - ninja
    - ${{ compiler('cxx') }}
    - ${{ compiler('c') }}
    - ${{ stdlib("c") }}
  host:
    - artem-ogre-cdt
  run:
  run_exports:
    - ${{ pin_subpackage('coacd', upper_bound='x.x') }}

tests:
  - package_contents:
      include:
        - CoACD/coacd.h
      lib:
        - _coacd

about:
  homepage: https://colin97.github.io/CoACD/
  license: MIT
  license_file: LICENSE
  summary: Qt Sensors module
  description: |
    Approximate Convex Decomposition for 3D Meshes with Collision-Aware Concavity and Tree Search
  documentation: https://doc.qt.io/qt-6/qtsensors-index.html
  repository: https://github.com/SarahWeiii/CoACD

extra:
  recipe-maintainers:
    - jschueller
