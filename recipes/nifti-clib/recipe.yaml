context:
  version: "3.0.1"

package:
  name: nifti-clib
  version: ${{ version }}

source:
  url: https://github.com/NIFTI-Imaging/nifti_clib/archive/refs/tags/v${{ version }}.tar.gz
  sha256: 868b611b5f8a3a73809436c9072db50db4975615905f0bd5fb7b1432e6d24b37

build:
  number: 0

requirements:
  build:
    - ${{ compiler("c") }}
    - ${{ stdlib("c") }}
    - ${{ "jom" if win else "make" }}
    - cmake
  host:
    - expat
    - zlib
  run_exports:
    - ${{ pin_subpackage("nifti-clib", upper_bound="x") }}

tests:
  - package_contents:
      include:
        - ${{ "nifti/nifticdf.h" if not win }}  # disabled on Windows because `USE_NIFTICDF_CODE=OFF`
        - nifti/nifti1.h
        - nifti/nifti1_io.h
        - nifti/nifti2.h
        - nifti/nifti2_io.h
        - nifti/znzlib.h
      lib:
        - ${{ "nifticdf" if not win }}  # disabled on Windows because `USE_NIFTICDF_CODE=OFF`
        - cifti
        - niftiio
        - nifti2
        - znz
  - script:
      - ${{ "nifti_stats -help" if not win }}  # disabled on Windows because `USE_NIFTICDF_CODE=OFF`
      - nifti1_tool -help
      - nifti_tool -help
      - cifti_tool -help
      - afni_xml_tool -help
about:
  homepage: https://nifti-imaging.github.io
  documentation: https://nifti.nimh.nih.gov
  repository: https://github.com/NIFTI-Imaging/nifti_clib
  license: LicenseRef-scancode-public-domain
  license_file: LICENSE
  summary: 'C libraries for NIFTI support'
  description: |
    `Nifti_clib` is a set of i/o libraries for reading and writing files in the nifti-1,
    nifti-2, and (to some degree) cifti file formats.  These libraries provide api's
    for binary file format for storing medical image data, e.g. magnetic resonance
    image (MRI) and functional MRI (fMRI) brain images.

extra:
  recipe-maintainers:
    - eunos-1128
