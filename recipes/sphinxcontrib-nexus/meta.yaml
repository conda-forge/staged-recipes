{% set name = "sphinxcontrib-nexus" %}
{% set version = "0.1.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/s/{{ name }}/sphinxcontrib_nexus-{{ version }}.tar.gz
  sha256: bb65c4d7d426d17943be35b3947be62b95039719fbbb7acb2be586116a8c2e53

build:
  noarch: python
  number: 0
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  entry_points:
    - nexus = sphinxcontrib.nexus.cli:main

requirements:
  host:
    - python >=3.10
    - pip
    - flit-core >=3.7
  run:
    - python >=3.10
    - sphinx >=7.0
    - networkx >=3.0
    - mcp >=1.0

test:
  imports:
    - sphinxcontrib.nexus
  commands:
    - nexus --help

about:
  home: https://github.com/deOliveira-R/sphinxcontrib-nexus
  summary: Unified code + documentation knowledge graph from Sphinx builds and Python AST analysis
  description: |
    A Sphinx extension + Python AST analyzer + MCP server that extracts a unified
    code + documentation knowledge graph. The only tool that puts call graphs,
    type annotations, equations, cross-references, and citations in the same graph.
    Queryable via 16 MCP tools, 10 CLI commands, and Python API.
  license: MIT
  license_file: LICENSE
  dev_url: https://github.com/deOliveira-R/sphinxcontrib-nexus

extra:
  recipe-maintainers:
    - deOliveira-R
