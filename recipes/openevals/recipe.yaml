# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "0.2.0"

package:
  name: openevals
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/o/openevals/openevals-${{ version }}.tar.gz
  sha256: 7e95fa64625be53eaa8c657d7f69b842a52bda10bdf3bb91781c7d09a385b069

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - setuptools
    - wheel
  run:
    - python >=${{ python_min }}
    - langchain >=0.3.18
    - langchain-openai >=0.3.6
    - langsmith >=0.3.32
    - rich >=13.9.4

tests:
  - python:
      imports:
        - openevals
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  homepage: https://github.com/langchain-ai/openevals
  repository: https://github.com/langchain-ai/openevals
  license: MIT
  license_file: LICENSE
  summary: Open-source evaluators for LLM applications
  description: |
    Open-source evaluators for LLM applications

extra:
  recipe-maintainers:
    - rxm7706
