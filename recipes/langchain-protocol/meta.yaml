{% set name = "langchain-protocol" %}
{% set version = "0.0.12" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/langchain_protocol-{{ version }}.tar.gz
  sha256: 5e14c434290a705c9510fdb1a83ecf7561a5e6e0dfd053930ade80dba069269f

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - hatchling
    - pip
  run:
    - python >={{ python_min }},<4.0.0
    - typing_extensions >=4.7.0,<5.0.0

test:
  imports:
    - langchain_protocol
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://github.com/langchain-ai/langchain
  summary: Python bindings for the LangChain agent streaming protocol
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - jan-janssen
