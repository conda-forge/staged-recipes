context:
  version: "2.2"
  python_min: "3.10"

package:
  name: dearpygui
  version: ${{ version }}

source:
  - url: https://github.com/hoffstadt/DearPyGui/archive/refs/tags/v${{ version }}.0.tar.gz
    sha256: 10f2fb79667925f38665932bd254fb82e700531e2a955c4dd922aa3d584aedb0
    patches:
      - use-system-libs.patch
  - url: https://github.com/ocornut/imgui/archive/139e99ca37a3e127c87690202faec005cd892d36.tar.gz
    sha256: 152cffb9403e7ce5907897546223da096bd63a92a6f3560f2ed29d06fb0631b2
    target_directory: thirdparty/imgui
  - url: https://github.com/epezent/implot/archive/f156599faefe316f7dd20fe6c783bf87c8bb6fd9.tar.gz
    sha256: d779ce33326343724d1e0fa23d4960cc9acaf4af584bc0134e504e7717ccc4bb
    target_directory: thirdparty/implot

build:
  number: 0
  skip:
    - match(python_impl, "pypy")

requirements:
  build:
    - ${{ compiler('cxx') }}
    - ${{ stdlib("c") }}
    - cmake >=3.13
    - if: unix
      then:
        - make
    - if: win
      then:
        - ninja
  host:
    - python
    - setuptools
    - pip
    - if: unix
      then:
        - glfw
    - if: win
      then:
        - freetype
    - if: linux
      then:
        - libgl-devel
        - libxcrypt
        - xorg-libx11
        - xorg-libxrandr
        - xorg-libxinerama
        - xorg-libxcursor
        - xorg-libxi
  run:
    - python
    - if: linux
      then:
        - libgl

tests:
  - python:
      imports:
        - dearpygui
        - dearpygui.dearpygui
      pip_check: true
  - script:
      - python -c "import dearpygui.dearpygui as dpg; assert hasattr(dpg, 'create_context'); assert hasattr(dpg, 'setup_dearpygui'); assert hasattr(dpg, 'add_window'); print('API check passed')"

about:
  homepage: https://github.com/hoffstadt/DearPyGui
  summary: A modern, fast and powerful GUI framework for Python
  description: |
    Dear PyGui is a simple to use (but powerful) Python GUI framework.
    It provides a wrapping of Dear ImGui that simulates a traditional
    retained-mode GUI, as opposed to Dear ImGui's immediate-mode paradigm.
    Dear PyGui runs on Windows, Linux, and macOS with GPU rendering
    via DirectX 11 (Windows), Metal (macOS), and OpenGL 3 (Linux).
  license: MIT AND Zlib
  license_file:
    - LICENSE
    - thirdparty/imgui/LICENSE.txt
    - thirdparty/implot/LICENSE

extra:
  recipe-maintainers:
    - julian-belina
