{% set name = "solid-dmft" %}
{% set version = "3.3.5" %}
{% set python_min = "3.11" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/solid_dmft-{{ version }}.tar.gz
  sha256: 21583720352f1df4a4abbd446c11c387fc223f6ab6b9f1276cfdfb6264c90931

build:
  entry_points:
    - solid_dmft = solid_dmft.main:main
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - setuptools
    - pip
  run:
    - python >={{ python_min }}
    - numpy
    - scipy
    - scikit-image
    - triqs
    - triqs_dft_tools
    - mpi4py

test:
  files:
    - dmft_config.toml
    - inp.h5
  imports:
    - solid_dmft
  commands:
    - pip check
    - OMPI_COMM_WORLD_RANK=4 solid_dmft
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://triqs.github.io/solid_dmft/index.html
  summary: 'solid_dmft: a versatile python wrapper to perform DFT+DMFT calculations utilizing the TRIQS software library'
  license: MIT
  license_file: LICENSE.txt

extra:
  recipe-maintainers:
    - jan-janssen
