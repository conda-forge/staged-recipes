schema_version: 1

context:
  version: "0.1.0"

package:
  name: jupyverse-jupyterlab
  version: ${{ version }}

source:
  - url: https://pypi.org/packages/source/j/jupyverse-jupyterlab/jupyverse_jupyterlab-${{ version }}.tar.gz
    sha256: 309ecd018a6720ef64d57d66c76455985bd709ddf4091e224a93e2b93563b347

build:
  noarch: python
  number: 0
  script:
    - ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation --disable-pip-version-check

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - uv-build
  run:
    - python >=${{ python_min }}
    - fastapi
    - fps
    - jupyverse-api >=0.15.0,<0.16.0
    - jupyverse-auth >=0.2.0,<0.3.0

tests:
  - python:
      imports: jupyverse_jupyterlab
      pip_check: true
      python_version: ${{ python_min }}.*

about:
  license: BSD-3-Clause
  license_file: COPYING.md
  homepage: https://github.com/jupyter-server/jupyverse/tree/main/api/jupyterlab
  summary: The API for Jupyverse's JupyterLab.

extra:
  recipe-maintainers:
    - davidbrochart
