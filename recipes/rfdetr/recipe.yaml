context:
  version: "1.6.0"
  python_min: "3.10"

package:
  name: rfdetr
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/r/rfdetr/rfdetr-${{ version }}.tar.gz
  sha256: 6e7919582ee975732e23c05a477aea7a3be0bc82b67ebe346579725195878bf4

build:
  noarch: python
  script: python -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - setuptools >=42
    - wheel
  run:
    - python >=${{ python_min }}
    - pytorch >=2.2.0
    - torchvision >=0.17.0
    - tqdm
    - transformers >=5.1.0,<6.0.0
    - peft
    - pydantic
    - supervision
    - requests
    - pydeprecate >=0.3,<0.6

tests:
  - python:
      python_version: ${{ python_min }}.*
      imports:
        - rfdetr
      pip_check: true

about:
  homepage: https://github.com/roboflow/rf-detr
  summary: Real-time object detection transformer (RF-DETR) by Roboflow
  description: |
    RF-DETR is a real-time, transformer-based object detection model built by
    Roboflow. It uses a DINOv2 backbone and achieves state-of-the-art accuracy
    at real-time inference speeds. The package supports both detection and
    instance segmentation tasks.
  license: Apache-2.0
  license_file: LICENSE
  repository: https://github.com/roboflow/rf-detr

extra:
  recipe-maintainers:
    - Borda
