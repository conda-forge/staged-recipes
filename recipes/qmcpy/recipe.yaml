schema_version: 1

context:
  version: "2.2"

package:
  name: qmcpy
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/q/qmcpy/qmcpy-${{ version }}.tar.gz
  sha256: 80c6aa6c06ef2726858db76c3b794d6d0bde09c44d5eb5a33ebb2a31e6a0b783

build:
  number: 0
  skip:
    - win
    - match(python, "<3.9")
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  build:
    - ${{ compiler('c') }}
    - ${{ stdlib('c') }}
  host:
    - python
    - pdm-backend
    - setuptools
    - wheel
    - pip
  run:
    - python
    - numpy >=1.17.0
    - scipy >=1.1.0
    - qmctoolscl >=1.1.6

tests:
  - python:
      imports:
        - qmcpy
      pip_check: true
  - script:
      - python -c "from qmcpy import Halton; x = Halton(2, randomize='QRNG', seed=7)(4); assert x.shape == (4, 2)"

about:
  summary: Quasi-Monte Carlo point generators, automatic transformations, and adaptive stopping criteria
  license: Apache-2.0
  license_file: LICENSE
  homepage: https://pypi.org/project/qmcpy/
  documentation: https://qmcsoftware.github.io/QMCSoftware/

extra:
  recipe-maintainers:
    - zitterbewegung
