schema_version: 1

context:
  version: "1.5.0"
  python_min: "3.10"

package:
  name: spectraxgk
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/s/spectraxgk/spectraxgk-${{ version }}.tar.gz
  sha256: a155d528a6d6baf1926a26b64ed9dac534b9a102c653a9ddb1fcde23623908dd

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  python:
    entry_points:
      - spectrax-gk = spectraxgk.cli:main
      - spectraxgk = spectraxgk.cli:main

requirements:
  host:
    - python ${{ python_min }}.*
    - setuptools
    - pip
  run:
    - python >=${{ python_min }}
    - numpy
    - jax
    - matplotlib-base
    - scipy
    - netcdf4
    - diffrax
    - equinox
    # python < 3.11
    - tomli
    - tqdm

tests:
  - python:
      imports:
        - spectraxgk
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"
  - script:
      - spectrax-gk --help
      - spectraxgk --help

about:
  summary: Gyrokinetic Spectral Solver of Plasma Turbulence
  description: |
    SPECTRAX-GK is a JAX-native gyrokinetic solver designed for
    differentiability, high-performance accelerator execution, and advanced
    stellarator optimization.
    The code employs a Hermite-Laguerre velocity space, Fourier perpendicular
    coordinates, and field-aligned flux-tube geometry to simulate linear and
    nonlinear electrostatic and electromagnetic turbulence in magnetized
    plasmas.
  license: MIT
  license_file: LICENSE
  homepage: https://spectrax-gk.readthedocs.io/
  repository: https://github.com/uwplasma/SPECTRAX-GK
  documentation: https://spectrax-gk.readthedocs.io/

extra:
  recipe-maintainers:
    - matthewfeickert
