{% set version = "0.5.1" %}
{% set python_min = "3.11" %}

package:
  name: anemoi-utils
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/a/anemoi-utils/anemoi_utils-{{ version }}.tar.gz
  sha256: be71a04d3e14936641c46b4c65f04e16ddb5efab9c35bdb387534dc1ce438aba

build:
  entry_points:
    - anemoi-utils = anemoi.utils.__main__:main
  noarch: python
  script: "{{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation"
  number: 0

requirements:
  host:
    - python {{ python_min }}.*
    - setuptools >=60
    - setuptools-scm >=8
    - pip
  run:
    - python >={{ python_min }}
    - aniso8601
    - deprecation
    - entrypoints
    - filelock
    - multiurl
    - numpy
    - pydantic >=2.9
    - python-dateutil
    - pyyaml
    - rich
    - tqdm

test:
  imports:
    - anemoi
  commands:
    - pip check
    - anemoi-utils --help
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://github.com/ecmwf/anemoi-utils/
  summary: A package to hold various functions to support training of ML models on ECMWF data.
  doc_url: https://anemoi-utils.readthedocs.io/
  license: Apache-2.0
  license_file: LICENSE

extra:
  recipe-maintainers:
    - tjtg
    - jasonjunweilyu
    - HCookie
