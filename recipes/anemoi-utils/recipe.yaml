schema_version: 1

context:
  version: "0.5.1"

package:
  name: anemoi-utils
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/a/anemoi-utils/anemoi_utils-${{ version }}.tar.gz
  sha256: be71a04d3e14936641c46b4c65f04e16ddb5efab9c35bdb387534dc1ce438aba

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  python:
    entry_points:
      - anemoi-utils = anemoi.utils.__main__:main

requirements:
  host:
    - python ${{ python_min }}.*
    - setuptools >=60
    - setuptools-scm >=8
    - pip
  run:
    - python >=${{ python_min }}
    - aniso8601
    - deprecation
    - entrypoints
    - filelock
    - multiurl
    - numpy
    - pydantic >=2.9
    - python-dateutil
    - pyyaml
    - rich
    - tqdm

tests:
  - python:
      imports:
        - anemoi
      pip_check: true
      python_version: ${{ python_min }}.*
  - requirements:
      run:
        - pip
        - python ${{ python_min }}.*
    script:
      - anemoi-utils --help

about:
  summary: A package to hold various functions to support training of ML models on ECMWF data.
  license: Apache-2.0
  license_file: LICENSE
  homepage: https://github.com/ecmwf/anemoi-utils/
  documentation: https://anemoi-utils.readthedocs.io/

extra:
  recipe-maintainers:
    - tjtg
    - jasonjunweilyu
    - HCookie
