context:
  name: calday
  version: "1.0.0"

package:
  name: ${{ name }}
  version: ${{ version }}

source:
  url: https://gitlab.com/earthscope/public/epic/passoft/calday/-/archive/v${{ version }}/calday-v${{ version }}.tar.gz
  sha256: 9059454355469ef3ea93d8cd0566004ea605a5c9205f210e4bb94826bf969b18

build:
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0
  python:
    entry_points:
      - calday = calday.calday:main

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - setuptools
  run:
    - python >=${{ python_min }}

tests:
  - python:
      imports:
        - calday
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"
  - script:
      - calday 123 2026
  - script:
      - python -m unittest discover -s tests
    requirements:
      run:
        - python ${{ python_min }}.*
    files:
      source:
        - tests/

about:
  homepage: https://epic.earthscope.org/content/software-resources
  summary: Convert between Julian day-of-year and calendar date
  description: |
    calday is a small command-line utility that converts a Julian
    day-of-year and year into the corresponding calendar date.
    It is commonly used in seismic data archiving workflows that
    label files by Julian day.
  license: GPL-3.0-or-later
  license_file: LICENSE
  repository: https://gitlab.com/earthscope/public/epic/passoft/calday

extra:
  recipe-maintainers:
    - omid-earthscope
