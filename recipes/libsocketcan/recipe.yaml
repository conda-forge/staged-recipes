context:
  name: libsocketcan
  version: "0.0.12"

recipe:
  name: ${{ name }}
  version: ${{ version }}

source:
  url: https://github.com/linux-can/${{ name }}/archive/refs/tags/v${{ version }}.tar.gz
  sha256: e4432d32afa6f34d34521ae8c65d237cd175ae4510372792cb7952b62a4ea44c

build:
  skip:
    - osx
    - win
  number: 0

outputs:
  - package:
      name: ${{ name }}
    requirements:
      build:
        - ${{ compiler('c') }}
        - ${{ stdlib('c') }}
        - autoconf
        - automake
        - libtool
        - make
      run_exports:
        - ${{ pin_subpackage(name, upper_bound='x.x.x') }}
    build:
      files:
        - include
        - bin
        - lib/*.so*
        - lib/pkgconfig
    tests:
      - script:
          - test -f "${PREFIX}/include/libsocketcan.h"
          - test -f "${PREFIX}/lib/libsocketcan.so"

  - package:
      name: ${{ name }}-static
    requirements:
      build:
        - ${{ compiler('c') }}
        - ${{ stdlib('c') }}
        - autoconf
        - automake
        - libtool
        - make
    build:
      files:
        - lib/*.a
    tests:
      - script:
          - test -f "${PREFIX}/lib/libsocketcan.a"

about:
  homepage: https://github.com/linux-can/libsocketcan/
  summary: "This library allows you to control some basic functions in SocketCAN from userspace"
  license: LGPL-2.1-or-later
  license_file: LICENSE
  repository: https://github.com/linux-can/libsocketcan/

extra:
  feedstock-name: libsocketcan
  recipe-maintainers:
    - AndreFavotto
