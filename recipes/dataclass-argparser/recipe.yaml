schema_version: 1

context:
  version: "2026.6.17.0"
  python_min: "3.10"

package:
  name: dataclass-argparser
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/d/dataclass-argparser/dataclass_argparser-${{ version }}.tar.gz
  sha256: e675b6eef5180030fb1601ef5ec1c195be822b3842be11732af8e296f5b03232

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - hatchling
    - pip
  run:
    - python >=${{ python_min }}
    - result

tests:
  - python:
      imports:
        - dataclass_argparser
      pip_check: true
      python_version: ${{ python_min }}.*

about:
  summary: A utility for creating command-line argument parsers from dataclasses
  license: MIT
  license_file: LICENSE
  homepage: https://github.com/amirhosseindavoody/dataclass_argparser
  repository: https://github.com/amirhosseindavoody/dataclass_argparser

extra:
  recipe-maintainers:
    - amirhosseindavoody
