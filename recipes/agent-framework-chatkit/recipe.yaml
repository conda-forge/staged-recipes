schema_version: 1

context:
  version: "1.0.0b260514"
  python_min: "3.10"

package:
  name: agent-framework-chatkit
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/a/agent-framework-chatkit/agent_framework_chatkit-${{ version }}.tar.gz
  sha256: fc7e9fd1589c6d8b9f306d8369a98a17b4048ae16c73fe8434b44f5c92fd5687

build:
  noarch: python
  number: 0
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - flit-core <4.0,>=3.11
  run:
    - python >=${{ python_min }}
    - agent-framework-core <2,>=1.4.0
    - openai-chatkit <2.0.0,>=1.4.1

tests:
  - python:
      imports:
        - agent_framework.chatkit
      python_version: ${{ python_min }}.*
      pip_check: true

about:
  summary: |
    OpenAI ChatKit integration for Microsoft Agent Framework.
  homepage: https://pypi.org/project/agent-framework-chatkit/
  repository: https://github.com/microsoft/agent-framework
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - killua156
    - mgorny
