schema_version: 1

context:
  version: "0.2.0"

package:
  name: anemoi-plugins
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/a/anemoi-plugins/anemoi_plugins-${{ version }}.tar.gz
  sha256: 6689e7e49c2f4d941e6d92eabf4cde60deeb55bdf7c08e984a160eeb4d8edad5

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  python:
    entry_points:
      - anemoi-plugins = anemoi.plugins.__main__:main

requirements:
  host:
    - python >=3.11,<3.14
    - setuptools >=60
    - setuptools-scm >=8
    - pip
  run:
    - python >=3.11,<3.14
    - anemoi-utils
    - mako

tests:
  - python:
      imports:
        - anemoi
      pip_check: true
      python_version: ${{ python_min }}.*
  - requirements:
      run:
        - pip
        - python ${{ python_min }}.*
    script:
      - anemoi-plugins --help

about:
  summary: A package to hold various functions to support training of ML models on ECMWF data.
  license: Apache-2.0
  license_file: LICENSE
  homepage: https://github.com/ecmwf/anemoi-plugins/
  documentation: https://anemoi-plugins.readthedocs.io/

extra:
  recipe-maintainers:
    - tjtg
    - jasonjunweilyu
    - HCookie
