schema_version: 1

context:
  name: probsamplers
  version: "0.1.2"

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://github.com/HaoZeke/probsamplers/archive/refs/tags/v${{ version }}.tar.gz
  sha256: 317586ab9080645a2a2a7d250fc3c66c9c8ca59ca6db373aa9ad5c0433717dd6

build:
  noarch: python
  number: 0
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - setuptools
  run:
    - python >=${{ python_min }}
    - numpy
    - scipy

tests:
  - python:
      imports:
        - probsamplers
      python_version:
        - ${{ python_min }}.*
        - "*"
      pip_check: true

about:
  homepage: https://github.com/HaoZeke/probsamplers
  summary: Probability samplers for MCMC methods
  license: MIT
  license_file: LICENSE
  repository: https://github.com/HaoZeke/probsamplers

extra:
  recipe-maintainers:
    - HaoZeke
