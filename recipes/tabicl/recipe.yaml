context:
  version: "2.1.1"
  python_min: "3.10"

package:
  name: tabicl
  version: ${{ version }}

source:
  url: https://github.com/soda-inria/tabicl/releases/download/v${{ version }}/tabicl-${{ version }}.tar.gz
  sha256: 7abdb1fa878e7a1edfa1c6606bf4189e9cccc20935e8011d7e690f4693c9c5c5

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - hatchling >=1.26.1
  run:
    - python >=${{ python_min }}
    - pytorch >=2.2
    - scikit-learn >=1.3.0
    - numpy
    - scipy
    - einops >=0.7
    - psutil
    - tqdm >=4.64.0
    - huggingface_hub

tests:
  - python:
      python_version: ${{ python_min }}.*
      imports:
        - tabicl
      pip_check: true

about:
  homepage: https://github.com/soda-inria/tabicl
  license: BSD-3-Clause
  license_file: LICENSE
  summary: "TabICL: A state-of-the-art tabular foundation model"
  description: |
    TabICL is an open-source tabular foundation model for classification and
    regression using in-context learning (ICL). A pre-trained transformer performs
    fit and predict in a single forward pass, without hyperparameter tuning on
    downstream tasks.

    TabICLv2 achieves state-of-the-art accuracy on benchmarks such as TabArena and
    TALENT, often outperforming heavily tuned gradient-boosted models. The API is
    scikit-learn compliant via TabICLClassifier and TabICLRegressor. Optional extras
    cover time-series forecasting, SHAP explainability, and per-dataset fine-tuning.

    The package scales from hundreds to hundreds of thousands of training samples
    and supports GPU inference, KV caching for repeated prediction, and CPU/disk
    offloading for very large datasets. Pre-trained checkpoints are downloaded from
    Hugging Face on first use.
  repository: https://github.com/soda-inria/tabicl
  documentation: https://tabicl.readthedocs.io/en/latest/

extra:
  recipe-maintainers:
    - jjerphan
