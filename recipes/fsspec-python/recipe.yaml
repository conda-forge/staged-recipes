context:
  name: fsspec-python
  version: "0.1.0"

package:
  name: ${{ name }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/f/fsspec-python/fsspec_python-${{ version }}.tar.gz
  sha256: 224de5735a687e4a805dc18a61ec755fce81d0f9d80a1633d64ba30d901ffc0d

build:
  noarch: python
  number: 0
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - hatchling
  run:
    - python >=${{ python_min }}
    - fsspec >=2025.12.0

tests:
  - python:
      imports:
        - fsspec_python
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  homepage: https://github.com/1kbgz/fsspec-python
  repository: https://github.com/1kbgz/fsspec-python
  summary: Native python integration for fsspec backends
  license: Apache-2.0
  license_file: LICENSE

extra:
  recipe-maintainers:
    - timkpaine
