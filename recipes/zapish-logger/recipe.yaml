schema_version: 1

context:
  name: zapish-logger
  version: "1.1.3"

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/${{ name[0] }}/${{ name }}/zapish_logger-${{ version }}.tar.gz
  sha256: 85de29c3220eec45f72f4a22e9308af22725fc7522201cf7edf39d42123ffda8

build:
  number: 0
  noarch: python
  script:
    content:
      - ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
    env:
      PYTHONHASHSEED: "0"

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - setuptools >=67.6.0
    - wheel >=0.40.0
  run:
    - python >=${{ python_min }}

tests:
  - python:
      imports:
        - zapish_logger
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  homepage: https://github.com/btr1975/zapish-logger
  summary: A simple logger that logs in a JSON format inspired by go zap
  description: |
    zapish-logger is a simple Python logger that emits log records in
    JSON format, inspired by the Go logging library zap. It is useful
    for applications that need structured, machine-parsable logs.
  license: MIT
  license_file: LICENSE
  documentation: https://zapish-logger.readthedocs.io/en/latest/
  repository: https://github.com/btr1975/zapish-logger

extra:
  recipe-maintainers:
    - pb01ka
