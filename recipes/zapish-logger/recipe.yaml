schema_version: 1

context:
  version: "1.1.3"

package:
  name: zapish-logger
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/z/zapish-logger/zapish_logger-${{ version }}.tar.gz
  sha256: 85de29c3220eec45f72f4a22e9308af22725fc7522201cf7edf39d42123ffda8

build:
  number: 0
  noarch: python
  script:
    # PYTHONHASHSEED=0: Windows CI runners with restricted APIs fail at
    # Python startup (_Py_HashRandomization_Init) when the OS RNG is unavailable.
    # Setting PYTHONHASHSEED=0 disables hash randomisation, avoiding that call.
    #
    # --use-deprecated=legacy-certs: pip >= 24.2 eagerly constructs a
    # truststore-backed SSLContext during session init (before any network call
    # is made), which also hits the OS crypto stack and fails on the same
    # restricted runners. The legacy-certs flag skips that construction
    # entirely, which is safe here since this is a fully local install
    # (--no-deps --no-build-isolation).
    # See: https://pip.pypa.io/en/stable/topics/https-certificates/
    content:
      - ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation --use-deprecated=legacy-certs
    env:
      PYTHONHASHSEED: "0"

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - setuptools >=67.6.0
    - wheel >=0.40.0
  run:
    - python >=${{ python_min }}

tests:
  - python:
      imports:
        - zapish_logger
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  homepage: https://github.com/btr1975/zapish-logger
  summary: A simple logger that logs in a JSON format inspired by go zap
  description: |
    zapish-logger is a simple Python logger that emits log records in
    JSON format, inspired by the Go logging library zap. It is useful
    for applications that need structured, machine-parsable logs.
  license: MIT
  license_file: LICENSE
  documentation: https://zapish-logger.readthedocs.io/en/latest/
  repository: https://github.com/btr1975/zapish-logger

extra:
  recipe-maintainers:
    - pb01ka
    - mgorny
