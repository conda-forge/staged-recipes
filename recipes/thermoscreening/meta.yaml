{% set name = "ThermoScreening" %}
{% set version = "0.1.0" %}
{% set python_min = "3.12" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0]|lower }}/{{ name|lower }}/{{ name|lower }}-{{ version }}.tar.gz
  sha256: bf4e0d8d962d849788b7ae3687ec0b4da8abc7300d09278173b674285cff77a1

build:
  number: 0
  noarch: python
  # The PyPI sdist has no .git, so pin the version for setuptools_scm.
  script: |
    export SETUPTOOLS_SCM_PRETEND_VERSION=${PKG_VERSION}
    {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  entry_points:
    - thermo = ThermoScreening.cli.thermo:main

requirements:
  host:
    - python {{ python_min }}
    - pip
    - setuptools >=42
    - setuptools_scm >=8
    - wheel
  run:
    - python >={{ python_min }}
    - numpy >=1.26
    - scipy
    - pymatgen-core >=2026.5.18
    - beartype
    - ase
    - rdkit
    - pqanalysis >=1.3.0

test:
  imports:
    - ThermoScreening
    - ThermoScreening.thermo
  commands:
    - pip check
    - thermo --help
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://github.com/MolarVerse/ThermoScreening
  license: LGPL-2.1-or-later
  license_file: LICENSE
  summary: Thermochemical property calculation and screening for molecular systems.
  description: |
    ThermoScreening calculates thermochemical properties for molecular systems
    with DFTB+ and xTB backends. It provides conformer generation, batch
    screening, and post-processing for reaction/redox free energies and
    conformer-ensemble (Boltzmann) thermochemistry.
  doc_url: https://molarverse.github.io/ThermoScreening/
  dev_url: https://github.com/MolarVerse/ThermoScreening

extra:
  recipe-maintainers:
    - galjos
