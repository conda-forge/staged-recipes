context:
  version: "1.2.1"

package:
  name: speexdsp
  version: ${{ version }}

source:
  url: https://gitlab.xiph.org/xiph/speexdsp/-/archive/SpeexDSP-${{ version }}/speexdsp-SpeexDSP-${{ version }}.tar.gz
  sha256: d17ca363654556a4ff1d02cc13d9eb1fc5a8642c90b40bd54ce266c3807b91a7

build:
  number: 0
  skip:
    - win
  script:
    - ./autogen.sh
    - ./configure --prefix="${PREFIX}" --disable-dependency-tracking --disable-examples
    - make -j${CPU_COUNT}
    - make install

requirements:
  build:
    - ${{ compiler('c') }}
    - ${{ stdlib('c') }}
    - autoconf
    - automake
    - libtool
    - make
    - pkg-config
  run_exports:
    - ${{ pin_subpackage("speexdsp", upper_bound="x.x") }}

tests:
  - package_contents:
      files:
        - lib/pkgconfig/speexdsp.pc
      include:
        - speex/speex_echo.h
        - speex/speex_jitter.h
        - speex/speex_preprocess.h
        - speex/speex_resampler.h
        - speex/speexdsp_types.h
      lib:
        - speexdsp
  - script:
      - pkg-config --modversion speexdsp
      - test "$(pkg-config --modversion speexdsp)" = "${PKG_VERSION}"
    requirements:
      run:
        - pkg-config

about:
  homepage: https://gitlab.xiph.org/xiph/speexdsp
  summary: Patent-free DSP library for speech processing
  description: |
    SpeexDSP is a patent-free, open source DSP library for speech
    processing. It includes resampling, echo cancellation, jitter buffering,
    and preprocessing functionality.
  license: BSD-3-Clause
  license_file: COPYING
  repository: https://gitlab.xiph.org/xiph/speexdsp

extra:
  recipe-maintainers:
    - user202729
