context:
  version: "1.4.1"

package:
  name: versitygw
  version: ${{ version }}

source:
  url: https://github.com/versity/versitygw/archive/refs/tags/v${{ version }}.tar.gz
  sha256: bdbe036f282aba67ff179795f4eba2115106237d88a9453bea1ed3353f5ffb5d
  target_directory: src

build:
  number: 0
  skip: win
  script:
    - cd src
    - go-licenses save ./cmd/versitygw --save_path ../library_licenses
    - go build -v -trimpath -o ${PREFIX}/bin/versitygw -ldflags="-s -w -X main.Version=v${{ version }}" ./cmd/versitygw

requirements:
  build:
    - ${{ compiler('go-nocgo') }}
    - go-licenses

tests:
  - script:
      - versitygw --version
      - versitygw --help
  - package_contents:
      bin:
        - versitygw
      strict: true

about:
  homepage: https://github.com/versity/versitygw
  summary: High-performance S3-compatible gateway that translates S3 API calls to filesystem and other storage backends
  description: |
    The Versity S3 Gateway (versitygw) is an open-source, stateless server that
    presents an AWS S3-compatible API in front of existing storage systems,
    including POSIX filesystems, Versity ScoutFS, Azure Blob Storage, and other
    S3 servers. It is written in Go and licensed under Apache 2.0.
  license: Apache-2.0
  license_file:
    - src/LICENSE
    - library_licenses/
  documentation: https://github.com/versity/versitygw/wiki
  repository: https://github.com/versity/versitygw

extra:
  recipe-maintainers:
    - tropicrainforest
