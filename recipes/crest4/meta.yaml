{% set version = "4.4.5" %}
{% set python_min = "3.10" %}

package:
  name: crest4
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/c/crest4/crest4-{{ version }}.tar.gz
  sha256: 4b2282244b2184af91555561154723c024a3b597fbf2cc72df665874ce3f60e5

build:
  skip: true  # [win or arm64 or aarch64]
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python >={{ python_min }}
    - pip
    - setuptools
  run:
    - python >={{ python_min }}
    - autopaths ==1.6.3
    - plumbing ==2.11.4
    - fasta ==2.3.6
    - seqsearch ==2.2.4
    - optmagic ==1.1.1
    - biopython ==1.86
    - rich ==14.2.0
    - ete4 ==4.3.0
    - pandas ==2.3.3
    - pytest ==9.0.2
    - pytest-asyncio ==1.3.0

test:
  imports:
    - crest4
  requires:
    - pip
  commands:
    - pip check

about:
  home: https://github.com/xapple/crest4/
  summary: 'The `crest4` python package can automatically assign taxonomic names to DNA sequences obtained from environmental sequencing.'
  license: MIT
  license_family: MIT
  license_file: LICENSE.txt

extra:
  recipe-maintainers:
    - xapple
