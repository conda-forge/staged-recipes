context:
  name: nestle-bilby
  version: "0.1.1"
  python_min: "3.10"

package:
  name: ${{ name }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/${{ name[0] }}/${{ name }}/nestle_bilby-${{ version }}.tar.gz
  sha256: b3a7e0d2e55188eb710b9970dd36428935c653be46443c03778c98ad65b733f5

build:
  noarch: python
  number: 0
  script: python -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - setuptools >=45
    - setuptools-scm >=6.2
  run:
    - python >=${{ python_min }}
    - bilby >=2.3.0
    - nestle >=0.2.0

tests:
  - python:
      imports:
        - nestle_bilby
      pip_check: false     # nestle on conda forge doesn't have the correct metadata, so skip pip check
      python_version: ${{ python_min }}.*

  - script:
      - python -m pytest tests/ -k "not test_interrupt_sampler"
    requirements:
      run:
        - python ${{ python_min }}.*
        - pytest
    files:
      source:
        - tests/
        - pyproject.toml

about:
  homepage: https://github.com/bilby-dev/nestle-bilby
  summary: Plugin for using nestle with bilby.
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - ColmTalbot
    - mj-will
