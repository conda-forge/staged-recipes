schema_version: 1

context:
  version: "0.9.0"

package:
  name: pytest-pilot
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/p/pytest-pilot/pytest_pilot-${{ version }}.tar.gz
  sha256: c438041025424f586caa3a2d7ec7f79310189693e236211755367d869aa5f1f2

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    # setup.py imports pkg_resources, which setuptools removed in 82.0.0
    - setuptools <82
    - setuptools_scm
    - six
  run:
    - python >=${{ python_min }}
    # pytest plugin (pytest11 entry point); pytest_pilot imports pytest at
    # import time, so it is a hard runtime dep even though upstream omits it
    # from install_requires.
    - pytest

tests:
  - python:
      imports:
        - pytest_pilot
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  homepage: https://github.com/smarie/python-pytest-pilot
  repository: https://github.com/smarie/python-pytest-pilot
  documentation: https://smarie.github.io/python-pytest-pilot/
  summary: Slice in your test base thanks to powerful markers.
  license: BSD-3-Clause
  license_file: LICENSE

extra:
  recipe-maintainers:
    - killua156
    - mgorny
