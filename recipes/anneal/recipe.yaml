schema_version: 1

context:
  name: anneal
  version: "0.5.0"
  python_min: "3.10"

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://files.pythonhosted.org/packages/35/31/59dd60913c1b59029ddbe26570ca32743cf434f41de3deee28f847c26ddf/anneal-0.5.0.tar.gz
  sha256: e150070da669a4dc3438fb77c32b9ecbb5c6d6c631ffa3694020dc1cc25096a7

build:
  noarch: python
  number: 0
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - setuptools
  run:
    - python >=${{ python_min }}
    - numpy
    - array-api-compat

tests:
  - python:
      python_version: ${{ python_min }}.*
      imports:
        - anneal
      pip_check: true

about:
  homepage: https://github.com/HaoZeke/anneal
  summary: Simulated annealing and quenching for Python
  license: MIT
  license_file: LICENSE.txt
  repository: https://github.com/HaoZeke/anneal

extra:
  recipe-maintainers:
    - HaoZeke
