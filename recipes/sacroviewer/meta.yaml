{% set name = "sacroviewer" %}
{% set version = "0.1.1" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://github.com/AI-SDC/SACRO-Viewer/archive/v{{ version }}.tar.gz
  sha256: 7f0d50f69c464471eeb5d955fe30d76d6e161d6e1bf4c7f24d434c46be3b06cd

build:
  number: 0
  noarch: python
  entry_points:
    - sacroviewer = sacro.__main__:main

requirements:
  host:
    - python >=3.10
    - setuptools
    - pip
    - nodejs
    - hatchling
    - hatch-nodejs-version
    - hatch-requirements-txt
    # Requirements for collectstatic
    - django <4.2
    - django-extensions
    - django-htmx
    - django-vite
    - environs
    - requests
    - slippers
    - structlog
    - uvicorn
    - whitenoise
    - brotli-python
  run:
    - python >=3.10
    - django <4.2
    - django-extensions
    - django-htmx
    - django-vite
    - environs
    - requests
    - slippers
    - structlog
    - uvicorn
    - whitenoise
    - brotli-python

about:
  home: https://github.com/AI-SDC/SACRO-Viewer
  license: MIT
  license_file: LICENSE
  summary: A viewer for research outputs produced using the ACRO tools
  dev_url: https://github.com/AI-SDC/SACRO-Viewer

extra:
 recipe-maintainers:
    - JessUwe
