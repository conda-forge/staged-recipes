{% set name = "sacroviewer" %}
{% set version = "0.2.0" %}
{% set python_min = "3.10" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://github.com/AI-SDC/SACRO-Viewer/archive/v{{ version }}.tar.gz
  sha256: 6b8fa50e9d16d3acae541281ce848766b9efd8af62639bc185882dc79750de42

build:
  number: 0
  noarch: python
  entry_points:
    - sacroviewer = sacro.__main__:main

requirements:
  host:
    - python {{ python_min }}
    - setuptools
    - pip
    - nodejs
    - hatchling
    - hatch-nodejs-version
    - hatch-requirements-txt
    # Requirements for collectstatic
    - django <4.2
    - django-extensions
    - django-htmx
    - django-vite
    - environs
    - requests
    - slippers
    - structlog
    - uvicorn
    - whitenoise
    - brotli-python
  run:
    - python >={{ python_min }}
    - django <4.2
    - django-extensions
    - django-htmx
    - django-vite
    - environs
    - requests
    - slippers
    - structlog
    - uvicorn
    - whitenoise
    - brotli-python

test:
  requires:
    - python {{ python_min }}
    - pip
  imports:
    - sacro
  commands:
    - pip check
    - export DJANGO_SETTINGS_MODULE="sacro.settings" && export SECRET_KEY="dummy" && export SACRO_APP_TOKEN="dummy" && timeout 5 sacroviewer --help || true  # [unix]
    - set "DJANGO_SETTINGS_MODULE=sacro.settings" && set "SECRET_KEY=dummy" && set "SACRO_APP_TOKEN=dummy" && start /b sacroviewer --help & timeout /t 5 & taskkill /f /im sacroviewer.exe || true  # [win]

about:
  home: https://github.com/AI-SDC/SACRO-Viewer
  license: MIT
  license_file: LICENSE
  summary: A viewer for research outputs produced using the ACRO tools
  dev_url: https://github.com/AI-SDC/SACRO-Viewer

extra:
  recipe-maintainers:
    - JessUwe
