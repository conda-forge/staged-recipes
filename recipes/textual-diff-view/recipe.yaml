schema_version: 1

context:
  version: "0.1.3"
  python_min: "3.11"

package:
  name: textual-diff-view
  version: ${{ version }}

source:
  - url: https://pypi.org/packages/source/t/textual-diff-view/textual_diff_view-${{ version }}.tar.gz
    sha256: 8b2c1aaa5ed2b1195ffbaf04c869f95ac6aa3b5392a0500ae137ed44c8774b2d

build:
  noarch: python
  number: 0
  script:
    - ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation --disable-pip-version-check

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - uv-build >=0.9.18,<0.10.0
  run:
    - python >=${{ python_min }}
    - textual >=8.2.1

tests:
  - python:
      imports: textual_diff_view
      pip_check: true
      python_version: ${{ python_min }}.*

about:
  license: AGPL-3.0-only
  license_file: LICENSE
  homepage: https://github.com/batrachianai/textual-diff-view
  summary: A Textual widget for beautiful diffs in the terminal

extra:
  recipe-maintainers:
    - davidbrochart
