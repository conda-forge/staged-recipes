schema_version: 1

context:
  version: "0.1.5"
  python_min: "3.11"

package:
  name: textual-diff-view
  version: ${{ version }}

source:
  - url: https://pypi.org/packages/source/t/textual-diff-view/textual_diff_view-${{ version }}.tar.gz
    sha256: e28151c45d4207fb7b50b57fce2bc249e880c2a496b21bf7d8560a92e59caecb

build:
  noarch: python
  number: 0
  script:
    - ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation --disable-pip-version-check

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - uv-build >=0.9.18,<0.10.0
  run:
    - python >=${{ python_min }}
    - textual >=8.2.5

tests:
  - python:
      imports: textual_diff_view
      pip_check: true
      python_version: ${{ python_min }}.*

about:
  license: AGPL-3.0-only
  license_file: LICENSE
  homepage: https://github.com/batrachianai/textual-diff-view
  summary: Beautiful Diff view widget for Textual applications

extra:
  recipe-maintainers:
    - davidbrochart
