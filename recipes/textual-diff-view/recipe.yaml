context:
  version: 0.1.4
  build_number: "0"
  python_min: "3.11"

package:
  name: textual-diff-view
  version: ${{ version }}

source:
  - url: https://pypi.org/packages/source/t/textual-diff-view/textual_diff_view-${{ version }}.tar.gz
    sha256: f0ad09195239a0061207e0d4790efeff593353c5b9c9318e9fd5eeb209cfefc6

build:
  number: ${{ build_number }}
  script: ${{ PYTHON }} -m pip install .
  python:
    entry_points:
      - tdiff = tdiff.cli:app
  noarch: python

requirements:
  host:
    - python ${{ python_min }}.*
    - uv-build >=0.9.18,<1.0.0
    - pip
  run:
    - python >=${{ python_min }}
    - textual >=8.2.1

tests:
  - python:
      imports:
        - textual_diff_view
      pip_check: true
      python_version: ${{ python_min }}.*

about:
  summary: Beautiful Diff view widget for Textual applications
  homepage: https://github.com/batrachianai/textual-diff-view
  repository: https://github.com/batrachianai/textual-diff-view
  license: AGPL-3.0-or-later
  license_file:
    - LICENSE

extra:
  recipe-maintainers:
    - apcamargo
