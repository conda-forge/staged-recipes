context:
  version: "2.2.0"

package:
  name: sfcgal
  version: ${{ version }}

source:
  url: https://gitlab.com/sfcgal/SFCGAL/-/archive/v${{ version }}/SFCGAL-v${{ version }}.tar.gz
  sha256: bb6bb77ddb58523d8c229764de23699f99c1a7011d873419afd2a67df85602a2

build:
  number: 0
  script:
    - cmake -S . -B build -G Ninja
        -DCMAKE_BUILD_TYPE=Release
        -DCMAKE_INSTALL_PREFIX=${{ PREFIX }}
        -DSFCGAL_BUILD_TESTS=OFF
        -DSFCGAL_BUILD_EXAMPLES=OFF
        -DSFCGAL_BUILD_DOC=OFF
        -DSFCGAL_WITH_OSG=OFF
        -DBoost_USE_STATIC_LIBS=OFF
    - cmake --build build --parallel ${{ CPU_COUNT }}
    - cmake --install build

requirements:
  build:
    - ${{ compiler('cxx') }}
    - cmake
    - ninja
    - pkg-config
  host:
    - cgal-cpp >=5.6
    - gmp
    - mpfr
    - boost-cpp
  run:
    - gmp
    - mpfr
    - boost-cpp

tests:
  - package_contents:
      include:
        - SFCGAL/config.h
      lib:
        - SFCGAL
      files:
        - lib/pkgconfig/sfcgal.pc
  - script:
      - sfcgal-config --version
      - sfcgal-config --libs

about:
  homepage: https://sfcgal.gitlab.io/SFCGAL/
  summary: ISO 19107:2013 and OGC Simple Features for 3D operations on geometries
  description: |
    SFCGAL is a C++ wrapper library around CGAL with the aim of supporting
    ISO 19107:2013 and OGC Simple Features Access 1.2 for 3D operations.
    It provides a C API and is used by PostGIS (via the sfcgal extension) for
    advanced 3D geometry operations such as 3D intersections, unions, straight
    skeletons, extrusions, and Minkowski sums.
  license: LGPL-2.0-or-later
  license_file: LICENSE
  documentation: https://sfcgal.gitlab.io/SFCGAL/
  repository: https://gitlab.com/sfcgal/SFCGAL

extra:
  recipe-maintainers:
    - migwell
