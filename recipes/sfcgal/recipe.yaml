context:
  version: "2.2.0"

package:
  name: sfcgal
  version: ${{ version }}

source:
  url: https://gitlab.com/sfcgal/SFCGAL/-/archive/v${{ version }}/SFCGAL-v${{ version }}.tar.gz
  sha256: bb6bb77ddb58523d8c229764de23699f99c1a7011d873419afd2a67df85602a2

build:
  skip:
    - win
  number: 0
  script:
    - export CXXFLAGS="$CXXFLAGS -Wno-template-body"
    - cmake -S . -B build -G Ninja -Wno-dev
        -DCMAKE_BUILD_TYPE=Release
        -DCMAKE_INSTALL_PREFIX=${{ PREFIX }}
    - cmake --build build --parallel ${{ CPU_COUNT }}
    - cmake --install build

requirements:
  build:
    - ${{ compiler('cxx') }}
    - ${{ stdlib("c") }}
    - cmake
    - ninja
    - pkg-config
  host:
    - cgal-cpp >=5.6
    - gmp
    - mpfr
    - libboost-devel
    - nlohmann_json

tests:
  - package_contents:
      include:
        - SFCGAL/config.h
      lib:
        - SFCGAL
      files:
        - lib/pkgconfig/sfcgal.pc
  - script:
      - sfcgal-config --version
      - sfcgal-config --libs

about:
  homepage: https://sfcgal.gitlab.io/SFCGAL/
  summary: A wrapper around CGAL that intents to implement 2D and 3D operations on OGC standards models
  description: |
    SFCGAL is a C++ wrapper library around CGAL with the aim of supporting ISO 19107:2013 and OGC Simple Features Access 1.2 for 3D operations.
    SFCGAL provides standard compliant geometry types and operations. PostGIS uses the C API, to expose some SFCGAL's functions in spatial databases (cf. PostGIS manual).
  license: LGPL-2.0-or-later
  license_file: LICENSE
  documentation: https://sfcgal.gitlab.io/SFCGAL/
  repository: https://gitlab.com/sfcgal/SFCGAL

extra:
  recipe-maintainers:
    - multimeric
