schema_version: 1

context:
  version: "0.7.1"

package:
  name: llama-index-llms-openai-like
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/l/llama-index-llms-openai-like/llama_index_llms_openai_like-${{ version }}.tar.gz
  sha256: ce7cef3686b1e62d7c08134b4d8ca56706cca816e4c4098eaede33002829a6f9

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - hatchling
    - pip
  run:
    - python >=${{ python_min }}
    - llama-index-llms-openai >=0.7.0,<0.8
    - llama-index-core >=0.14.3,<0.15

tests:
  - python:
      imports:
        - llama_index.llms.openai_like
      pip_check: true
      python_version: 
        - ${{ python_min }}.*
        - "*"

about:
  summary: llama-index llms openai like integration
  license: MIT
  license_file: LICENSE
  homepage: https://www.llamaindex.ai/
  repository: https://github.com/run-llama/llama_index/tree/main/llama-index-integrations/llms/llama-index-llms-openai-like/

extra:
  recipe-maintainers:
    - JaRoSchm
