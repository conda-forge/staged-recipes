schema_version: 1

context:
  name: brighteyes-mcs-reader
  version: "0.1.0"

package:
  name: ${{ name }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/b/brighteyes-mcs-reader/brighteyes_mcs_reader-${{ version }}.tar.gz
  sha256: 67e8615e68917b162a1aab31a747f91d908577ccf89c52d572480b2e809999ca

build:
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - setuptools >=77
    - wheel
  run:
    - python >=${{ python_min }}
    - h5py
    - numpy

tests:
  - python:
      python_version:
        - ${{ python_min }}.*
        - "*"
      imports:
        - brighteyes_mcs_reader
      pip_check: true
  - requirements:
      run:
        - python ${{ python_min }}.*
    script:
      - python -c "from brighteyes_mcs_reader import list_datasets, read_signal"

about:
  homepage: https://github.com/VicidominiLab/BrightEyes-MCS-Reader
  summary: Reader utilities for BrightEyes MCS HDF5 files.
  license: BSD-3-Clause
  license_file: LICENSE

extra:
  recipe-maintainers:
    - mattia-donato
