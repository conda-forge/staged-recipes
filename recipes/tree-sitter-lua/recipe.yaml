schema_version: 1

context:
  version: "0.5.0"

package:
  name: tree-sitter-lua
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/t/tree_sitter_lua/tree_sitter_lua-${{ version }}.tar.gz
  sha256: 0e46356038ccb8ce1049289104c56230003448309a335f2e353f1edc7b373552

build:
  number: 0
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  build:
    - ${{ compiler("c") }}
  host:
    - python
    - pip
    - setuptools >=42
    - wheel
  run:
    - python

tests:
  - python:
      imports:
        - tree_sitter_lua

about:
  homepage: https://github.com/tree-sitter-grammars/tree-sitter-lua
  summary: Lua grammar for tree-sitter
  license: MIT
  license_file: LICENSE
  repository: https://github.com/tree-sitter-grammars/tree-sitter-lua

extra:
  recipe-maintainers:
    - killua156
    - mgorny

    