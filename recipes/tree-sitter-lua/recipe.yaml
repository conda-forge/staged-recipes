schema_version: 1

context:
  version: "0.5.0"

package:
  name: tree-sitter-lua
  version: ${{ version }}

source:
  url: https://github.com/tree-sitter-grammars/tree-sitter-lua/archive/refs/tags/v${{ version }}.tar.gz
  sha256: cf01b93f4b61b96a6d27942cf28eeda4cbce7d503c3bef773a8930b3d778a2d9

build:
  number: 0
  # abi3 packages build once at python_min and ship one artifact per platform.
  skip: is_abi3 and not is_python_min
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  python:
    version_independent: ${{ is_abi3 }}

requirements:
  build:
    - ${{ compiler("c") }}
    - ${{ stdlib("c") }}
  host:
    - if: is_abi3
      then: python-abi3
    - python
    - pip
    - setuptools >=42
  run:
    - python

tests:
  - python:
      imports:
        - tree_sitter_lua
      # Verify the abi3 wheel works on the build-time Python AND the latest.
      python_version:
        - if: is_abi3
          then: ${{ python_min }}.*
        - "*"
  - if: is_abi3
    then:
      requirements:
        run:
          - abi3audit
      script:
        - if: unix
          then: abi3audit $SP_DIR/tree_sitter_lua/_binding.abi3.so -s -v --assume-minimum-abi3 ${{ python_min }}
          else: abi3audit %SP_DIR%/tree_sitter_lua/_binding.pyd -s -v --assume-minimum-abi3 ${{ python_min }}

about:
  homepage: https://github.com/tree-sitter-grammars/tree-sitter-lua
  summary: Lua grammar for tree-sitter
  license: MIT
  license_file: LICENSE.md
  repository: https://github.com/tree-sitter-grammars/tree-sitter-lua

extra:
  recipe-maintainers:
    - killua156
    - mgorny
