context:
  version: "1.0.0b9"

package:
  name: azure-ai-inference
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/a/azure-ai-inference/azure_ai_inference-${{ version }}.tar.gz
  sha256: 1feb496bd84b01ee2691befc04358fa25d7c344d8288e99364438859ad7cd5a4

build:
  noarch: python
  script: python -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - setuptools
  run:
    - python >=${{ python_min }}
    - isodate >=0.6.1
    - azure-core >=1.30.0
    - typing_extensions >=4.6.0

tests:
  - python:
      imports:
        - azure.ai.inference
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  homepage: https://github.com/Azure/azure-sdk-for-python/tree/main/sdk/ai/azure-ai-inference
  summary: Microsoft Azure AI Inference Client Library for Python
  description: |
    The Azure AI Inference client library provides access to Azure AI
    model inference services including chat completions, text embeddings,
    and image embeddings. Supports GitHub Models, Azure AI Foundry
    serverless and managed compute endpoints, and Azure OpenAI.
  license: MIT
  license_file: LICENSE
  repository: https://github.com/Azure/azure-sdk-for-python

extra:
  recipe-maintainers:
    - melund
