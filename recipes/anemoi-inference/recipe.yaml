schema_version: 1

context:
  version: "0.10.0"

package:
  name: anemoi-inference
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/a/anemoi-inference/anemoi_inference-${{ version }}.tar.gz
  sha256: 96c45c16d1ee3259f8dae38be22fba3672bff24b4099cb5abdbaf80a9c4ac150

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  python:
    entry_points:
      - anemoi-inference = anemoi.inference.__main__:main

requirements:
  host:
    - python >=3.11,<3.14
    - setuptools >=60
    - setuptools-scm >=8
    - pip
  run:
    - python >=3.11,<3.14
    - anemoi-transform >0.1.13
    - anemoi-utils >=0.4.32
    - aniso8601
    - anytree
    - deprecation
    - earthkit-data >=0.12.4,<1
    - python-eccodes >=2.38.3
    - numpy
    - omegaconf >=2.2,<2.4
    - packaging
    - pydantic
    - pyyaml
    - rich
    - semantic_version
    - pytorch

tests:
  - python:
      imports:
        - anemoi
      pip_check: true
      python_version: ${{ python_min }}.*
  - requirements:
      run:
        - pip
        - python ${{ python_min }}.*
    script:
      - anemoi-inference --help

about:
  summary: A package to run inference from data-driven forecasts weather models.
  license: Apache-2.0
  license_file: LICENSE
  homepage: https://github.com/ecmwf/anemoi-inference/
  documentation: https://anemoi-inference.readthedocs.io/

extra:
  recipe-maintainers:
    - tjtg
    - jasonjunweilyu
    - HCookie
