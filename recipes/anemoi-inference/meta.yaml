{% set version = "0.10.0" %}
{% set python_min = "3.11" %}

package:
  name: anemoi-inference
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/a/anemoi-inference/anemoi_inference-{{ version }}.tar.gz
  sha256: 96c45c16d1ee3259f8dae38be22fba3672bff24b4099cb5abdbaf80a9c4ac150

build:
  entry_points:
    - anemoi-inference = anemoi.inference.__main__:main
  noarch: python
  script: "{{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation"
  number: 0

requirements:
  host:
    - python {{ python_min }}.*
    - setuptools >=60
    - setuptools-scm >=8
    - pip
  run:
    - python >={{ python_min }}
    - anemoi-transform >0.1.13
    - anemoi-utils >=0.4.32
    - aniso8601
    - anytree
    - deprecation
    - earthkit-data >=0.12.4,<1
    - python-eccodes >=2.38.3
    - numpy
    - omegaconf >=2.2,<2.4
    - packaging
    - pydantic
    - pyyaml
    - rich
    - semantic_version
    - pytorch

test:
  imports:
    - anemoi
  commands:
    - anemoi-inference --help
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://github.com/ecmwf/anemoi-inference/
  summary: A package to run inference from data-driven forecasts weather models.
  doc_url: https://anemoi-inference.readthedocs.io/
  license: Apache-2.0
  license_file: LICENSE

extra:
  recipe-maintainers:
    - tjtg
    - jasonjunweilyu
    - HCookie
