context:
  version: "0.0.3"

recipe:
  name: ljosbru
  version: ${{ version }}

source:
  url: https://github.com/pavelzw/ljosbru/archive/refs/tags/v${{ version }}.tar.gz
  sha256: 645c4d992df224090da771fc723cc536ba4826d722d3e3ed005cf26234f40f33

build:
  number: 0

outputs:
  - package:
      name: ljosbru-encode
      version: ${{ version }}

    build:
      script:
        env:
          CARGO_PROFILE_RELEASE_STRIP: symbols
          CARGO_PROFILE_RELEASE_LTO: fat
        content:
          - if: unix
            then:
              - cargo auditable install --locked --no-track --bin ljosbru-encode --root ${{ PREFIX }} --path .
            else:
              - cargo auditable install --locked --no-track --bin ljosbru-encode --root %LIBRARY_PREFIX% --path .
          - cargo-bundle-licenses --format yaml --output ./THIRDPARTY.yml

    requirements:
      build:
        - ${{ stdlib('c') }}
        - ${{ compiler('c') }}
        - ${{ compiler('rust') }}
        - cargo-bundle-licenses
        - cargo-auditable

    tests:
      - script: ljosbru-encode --help
      - package_contents:
          bin:
            - ljosbru-encode
          strict: true

  - package:
      name: ljosbru-decode
      version: ${{ version }}

    build:
      script:
        env:
          CARGO_PROFILE_RELEASE_STRIP: symbols
          CARGO_PROFILE_RELEASE_LTO: fat
        content:
          - if: unix
            then:
              - cargo auditable install --locked --no-track --bin ljosbru-decode --features decode --root ${{ PREFIX }} --path .
            else:
              - cargo auditable install --locked --no-track --bin ljosbru-decode --features decode --root %LIBRARY_PREFIX% --path .
          - cargo-bundle-licenses --format yaml --output ./THIRDPARTY.yml

    requirements:
      build:
        - ${{ stdlib('c') }}
        - ${{ compiler('c') }}
        - ${{ compiler('rust') }}
        - cargo-bundle-licenses
        - cargo-auditable
        - if: linux
          then:
            - pkg-config
      host:
        - if: linux
          then:
            - wayland
            - libegl-devel
            - libgbm
            - libxcb

    tests:
      - script: ljosbru-decode --help
      - package_contents:
          bin:
            - ljosbru-decode
          strict: true

about:
  homepage: https://github.com/pavelzw/ljosbru
  summary: Transfer data through QR codes
  description: |
    ljosbru turns an input file into a numbered sequence of QR PNGs and can later decode that sequence from screenshots of a monitor. It is useful when the only available path between two machines is a screen and an automated screenshot loop.
  license: BSD-3-Clause
  license_file:
    - LICENSE
    - THIRDPARTY.yml
  documentation: https://github.com/pavelzw/ljosbru
  repository: https://github.com/pavelzw/ljosbru

extra:
  recipe-maintainers:
    - pavelzw
