schema_version: 1

context:
  dataset_name: NUDEXLIB
  version: "1.0.0"
  version_canonical_geant4: "1.0"
  env_var: G4NUDEXLIBDATA
  name: geant4-data-nudexlib
  install_dir: share/Geant4/data/G4NUDEXLIB1.0

package:
  name: ${{ name }}
  version: ${{ version }}

source:
  url: https://geant4-data.web.cern.ch/geant4-data/datasets/G4${{ dataset_name }}.${{ version_canonical_geant4 }}.tar.gz
  sha256: cac7d65e9c5af8edba2b2667d5822e16aaf99065c95f805e76de4cc86395f415
  target_directory: dataset

build:
  number: 0
  noarch: generic
  script:
    interpreter: nu
    content: |
      let dest = $"($env.PREFIX)/${{ install_dir }}"
      mkdir $dest
      cp -r dataset/* $dest
      mkdir $"($env.PREFIX)/etc/conda/env_vars.d"
      {"${{ env_var }}": $dest} | to json | save -f $"($env.PREFIX)/etc/conda/env_vars.d/${{ name }}.json"

requirements:
  build:
    - nushell

tests:
  - package_contents:
      files:
        - etc/conda/env_vars.d/${{ name }}.json

about:
  homepage: https://geant4.web.cern.ch/
  summary: Nuclear data tables used by the Geant4 NuDEX de-excitation model
  description: |
    Dataset including data file with general parameters used by NuDEX
    model; data tables to get internal conversion factors, obtained from
    BrICC; nuclear level schemes and densities downloaded from the RIPL-3
    data library; files containing primary capture gamma rays, obtained
    from ENSDF; photon strength function parameters, obtained from RIPL-3
    and from the IAEA Photon Strength Function Database; folder to change
    the default parameters for the decay of specific nuclei.
  license: LicenseRef-Geant4
  license_file: CREDIT

extra:
  recipe-maintainers:
    - conda-forge/geant4
