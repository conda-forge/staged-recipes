schema_version: 1

context:
  dataset_name: NUDEXLIB
  version: "1.0.0"
  version_canonical_geant4: "1.0"
  env_var: G4NUDEXLIBDATA
  name: geant4-data-nudexlib
  install_dir: share/Geant4/data/G4NUDEXLIB1.0

package:
  name: ${{ name }}
  version: ${{ version }}

source:
  url: https://geant4-data.web.cern.ch/geant4-data/datasets/G4${{ dataset_name }}.${{ version_canonical_geant4 }}.tar.gz
  sha256: cac7d65e9c5af8edba2b2667d5822e16aaf99065c95f805e76de4cc86395f415
  target_directory: dataset

build:
  number: 0
  noarch: generic
  script:
    - mkdir -p ${PREFIX}/${{ install_dir }}
    - cp -r dataset/* ${PREFIX}/${{ install_dir }}
    - ${RECIPE_DIR}/create_activation_scripts.sh ${{ name }} ${{ env_var }} ${{ install_dir }}

# Conda-forge is unable to build packages that have no dependencies so add
# `make` as a dummy build dependency
requirements:
  build:
    - make

tests:
  - script:
      - '[ "${${{ env_var }}}" == "$CONDA_PREFIX/${{ install_dir }}" ]'

about:
  homepage: https://geant4.web.cern.ch/
  summary: GEANT4 NUDEX data files for de-excitation gamma cascades following neutron capture
  license: LicenseRef-Geant4
  license_file: CREDIT

extra:
  recipe-maintainers:
    - tkittel
    - chrisburr
