# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "1.5.26"

package:
  name: blockbuster
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/b/blockbuster/blockbuster-${{ version }}.tar.gz
  sha256: cc3ce8c70fa852a97ee3411155f31e4ad2665cd1c6c7d2f8bb1851dab61dc629

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - hatchling
  run:
    - python >=${{ python_min }}
    - forbiddenfruit >=0.1.4

tests:
  - python:
      imports:
        - blockbuster
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  homepage: https://pypi.org/project/blockbuster/
  license: Apache-2.0
  license_file: LICENSE
  summary: Utility to detect blocking calls in the async event loop
  description: |
    Utility to detect blocking calls in the async event loop
  repository: https://github.com/cbornet/blockbuster.git

extra:
  recipe-maintainers:
    - rxm7706
