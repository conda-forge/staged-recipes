{% set name = "pyoctomap" %}
{% set version = "1.2.1" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  - url: https://pypi.io/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz
    sha256: a614eb56ecca12cade9d953e30dbabd4b447b2268b5d53943caf5e48ecd82845
  - url: https://github.com/OctoMap/octomap/archive/b03549ec601f5e9ab309a327185f473e5c82f4a4.tar.gz
    sha256: 69fcfd267d0a9f7aa3d50f44d8790ef5f18baef12bbd24577c8d901616155d55
    folder: octomap_repo

build:
  number: 0
  skip: true  # [py<38]

requirements:
  build:
    - {{ compiler('cxx') }}
    - {{ compiler('c') }}
    - {{ stdlib("c") }}
    - cmake
    - make  # [unix]
  host:
    - python
    - pip
    - setuptools
    - cython
    - numpy
  run:
    - python
    - {{ pin_compatible('numpy') }}

test:
  imports:
    - pyoctomap
  commands:
    - python -c "import pyoctomap; from pyoctomap import OcTree; OcTree(0.1)"

about:
  home: https://github.com/Spinkoo/pyoctomap
  license: MIT
  license_file: LICENSE
  summary: Cross-platform Python binding of the OctoMap library.
  description: |
    A comprehensive Python wrapper for the OctoMap C++ library, providing efficient
    3D occupancy mapping capabilities for robotics and computer vision applications.
    It builds upon the original OctoMap library (https://octomap.github.io/) to
    provide a seamless Pythonic interface for Octrees and 3D mapping.
  dev_url: https://github.com/Spinkoo/pyoctomap
  doc_url: https://github.com/Spinkoo/pyoctomap#readme

extra:
  recipe-maintainers:
    - Spinkoo
