{% set version = "0.1.0" %}

package:
  name: ctypes-dlpack
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/c/ctypes-dlpack/ctypes_dlpack-{{ version }}.tar.gz
  sha256: a1f8811e761f05bc28aa60cab2674afe4f6c7242255987214776cfc04c605132

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - setuptools >=77
    - pip
  run:
    - python >={{ python_min }}

test:
  imports:
    - ctypes_dlpack
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://pypi.org/project/ctypes-dlpack/
  summary: ctypes helpers for DLPack interop
  license: BSD-3-Clause
  license_file: LICENSE

extra:
  recipe-maintainers:
    - Luthaf
