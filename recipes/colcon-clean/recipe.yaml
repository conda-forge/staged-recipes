context:
  version: "0.2.1"

package:
  name: colcon-clean
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/c/colcon-clean/colcon-clean-${{ version }}.tar.gz
  sha256: f2bbf2724db84b122184ff402a247b8758d8f692c9f32ba53801f69da6dceb54

build:
  number: 0
  noarch: python
  script: python -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - setuptools
  run:
    - python >=${{ python_min }}
    - colcon-core >=0.5.2
    - scantree

tests:
  - python:
      imports:
        - colcon_clean
      pip_check: true
      python_version: ${{ python_min }}.*

about:
  homepage: https://colcon.readthedocs.io
  summary: Extension for colcon to clean package workspaces.
  license: Apache-2.0
  license_file: LICENSE
  repository: https://github.com/colcon/colcon-clean

extra:
  recipe-maintainers:
    - wolfv
