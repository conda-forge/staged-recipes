schema_version: 1

context:
  python_min: "3.11"
  name: umfive
  version: "0.2.2"

package:
  name: ${{ name }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/${{ name[0] }}/${{ name }}/${{ name }}-${{ version }}.tar.gz
  sha256: 46d40b4bb83c644e4ca013b42632cf8afde96c9c4e32b17355fd9acfc2383d9a

build:
  number: 0
  skip:
    - win
    - match(python, "<3.11")
  script: ${{ PYTHON }} -m pip install . --no-deps -vv --no-build-isolation

requirements:
  build:
    - ${{ compiler('c') }}
    - ${{ stdlib("c") }}
  host:
    - python
    - pip
    - setuptools >=80
    - setuptools-scm >=8
    - numpy >=1.24
  run:
    - python
    - numpy >=1.24
    - cftime
    - pyfive >=1.1.2 

tests:
  - python:
      imports:
        - umfive
        - umfive._wgdos
      pip_check: true
  - files:
      source:
        - tests
    requirements:
      run:
        - fsspec
        - pip
        - pytest >6.0.0
        - pytest-xdist
        - python
    script:
      - pytest -n 2
      - ppdump --help

about:
  homepage: https://pypi.org/project/umfive/
  license: MIT
  license_file: LICENSE
  summary: PP/Fields reader with pyfive-style high-level API
  description: PP/Fields reader with pyfive-style high-level API.

extra:
  recipe-maintainers:
    - valeriupredoi
