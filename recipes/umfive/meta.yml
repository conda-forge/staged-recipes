{% set python_min = "3.11" %}
{% set name = "umfive" %}
{% set version = "0.2.1" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/u/umfive/umfive-{{ version }}.tar.gz
  sha256: eef343a62334ed5f3f4edb2ba3c4533e6a763a5a10fd38ea5c4f336086a56f36

build:
  number: 0
  skip: true  # [win]
  script: {{ PYTHON }} -m pip install . --no-deps --no-build-isolation

requirements:
  build:
    - {{ compiler('c') }}

  host:
    - python >=3.11
    - pip
    - setuptools >=80
    - numpy >=1.24

  run:
    - python >=3.11
    - numpy >=1.24
    - cftime
    - pyfive >=1.1.2

test:
  imports:
    - umfive
    - umfive._wgdos

  commands:
    - ppdump --help

  requires:
    - pip

about:
  license: MIT
  license_file: LICENSE
  summary: PP/Fields reader with pyfive-style high-level API
  description: PP/Fields reader with pyfive-style high-level API.

extra:
  recipe-maintainers:
    - valeriupredoi
