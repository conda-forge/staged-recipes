schema_version: 1

context:
  version: "1.2.0"

package:
  name: geoparquet-io
  version: ${{ version }}

source:
  url: https://github.com/geoparquet/geoparquet-io/archive/v${{ version }}.tar.gz
  sha256: d744a2647baed9e1ece3126eac344a5b45b9effd9ef4ac9631bf15e32e1edd0a

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  python:
    entry_points:
      - gpio = geoparquet_io:cli

requirements:
  host:
    - python >=${{ python_min }}
    - hatchling
    - pip
  run:
    - python >=${{ python_min }}
    - click >=8.0.0
    - click-plugins >=1.1.1
    - pyarrow >=23.0.1
    - python-duckdb >=1.5.0
    - pandas >=1.0.0
    - fsspec >=2023.9.0
    - rich >=13.0.0
    - pystac >=1.9.0
    - jsonschema >=4.0.0
    - psutil >=5.9.0
    - obstore >=0.8.2
    - aiohttp >=3.13.4
    - s3fs >=2023.9.0
    - geoarrow-pyarrow >=0.1.0
    - pyproj >=3.0.0
    - mercantile >=1.2.0
    - httpx >=0.25.0
    - owslib >=0.29.0
    - requests >=2.33.0
    - lxml >=6.1.0
    - idna >=3.15
    - urllib3 >=2.7.0

tests:
  - python:
      imports:
        - geoparquet_io
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"
  - requirements:
      run:
        - pip
        - ${{ python_min }}.*
    script:
      - gpio --help

about:
  summary: Fast I/O and transformation tools for GeoParquet files
  license: Apache-2.0
  license_file: LICENSE
  homepage: https://github.com/geoparquet/geoparquet-io

extra:
  recipe-maintainers:
    - hobu
