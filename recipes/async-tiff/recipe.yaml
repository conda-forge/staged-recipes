context:
  name: async-tiff
  version: "0.7.0"
  python_min: "3.10"

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://github.com/developmentseed/async-tiff/archive/refs/tags/py-v${{ version }}.tar.gz
  sha256: 4eff220c6193146fba3b3f86dbc2212864996d62c8aef5f794ed73d5691aea53

build:
  number: 0
  python:
    version_independent: true
  script:
    - cargo-bundle-licenses --format yaml --output THIRDPARTY.yml
    - ${{ PYTHON }} -m pip install ./python -vv --no-deps --no-build-isolation

requirements:
  build:
    - ${{ stdlib("c") }}
    - ${{ compiler("c") }}
    - ${{ compiler("cxx") }}
    - ${{ compiler("rust") }}
    - cargo-bundle-licenses
    - clangdev
  host:
    - maturin >=1.7,<2.0
    - pip
    - python ${{ python_min }}.*
    - if: is_abi3
      then:
        - python-abi3 ${{ python_min }}.*
  run:
    - python >= ${{ python_min }}

tests:
  - python:
      imports:
        - async_tiff
      pip_check: true
      python_version: ["${{ python_min ~ '.*' }}"]
  - script:
      # NOTE: we must manually set SP_DIR since it is not set.
      # Can be removed once https://github.com/prefix-dev/rattler-build/issues/1733 is fixed.
      - if: unix and is_abi3
        then:
          - export SP_DIR=$(python -c "import site; print(site.getsitepackages()[0])")
          - abi3audit $SP_DIR/async-tiff/async-tiff.abi3.so -s -v --assume-minimum-abi3 ${{ python_min }}
      - if: win and is_abi3
        then:
          - set "SP_DIR=%PREFIX%\\Lib\\site-packages"
          - abi3audit %SP_DIR%\\async-tiff\\async-tiff.pyd -s -v --assume-minimum-abi3 ${{ python_min }}
    requirements:
      run:
        - abi3audit

about:
  homepage: http://developmentseed.org/async-tiff
  repository: https://github.com/developmentseed/async-tiff
  summary: Low-level asynchronous TIFF reader.
  license: MIT OR Apache-2.0
  license_file:
    - LICENSE.txt
    - THIRDPARTY.yml

extra:
  recipe-maintainers:
    - gadomski
    - kylebarron
