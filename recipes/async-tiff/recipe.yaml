context:
  name: async-tiff
  version: "0.7.0"
  python_min: "3.10"

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://github.com/developmentseed/async-tiff/archive/refs/tags/py-v${{ version }}.tar.gz
  sha256: 4eff220c6193146fba3b3f86dbc2212864996d62c8aef5f794ed73d5691aea53

build:
  number: 0
  python:
    version_independent: true
  script:
    - cargo-bundle-licenses --format yaml --output THIRDPARTY.yml
    - ${{ PYTHON }} -m pip install ./python -vv --no-deps --no-build-isolation

requirements:
  build:
    - ${{ stdlib("c") }}
    - ${{ compiler("rust") }}
    - cargo-bundle-licenses
  host:
    - python ${{ python_min }}.*
    - maturin >=1.7,<2.0
    - pip
  run:
    - python >= ${{ python_min }}

tests:
  - python:
      imports:
        - async_tiff
      pip_check: true
      python_version: ["${{ python_min ~ '.*' }}"]

about:
  homepage: http://developmentseed.org/async-tiff
  repository: https://github.com/developmentseed/async-tiff
  summary: Low-level asynchronous TIFF reader.
  license: MIT OR Apache-2.0
  license_file:
    - LICENSE.txt
    - THIRDPARTY.yml

extra:
  recipe-maintainers:
    - gadomski
