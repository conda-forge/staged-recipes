# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "1.3"
  python_check_max: "3.14"
  cov_fail_under: "95"

package:
  name: entmax
  version: ${{ version }}

source:
  # no sdist on PyPI
  url: https://github.com/deep-spin/entmax/archive/refs/tags/v${{ version }}.tar.gz
  sha256: 7937bd64754e7bf9533b16cf09d8f1f28ed7894658f2ef7be934c1fe480d25fc

build:
  number: 0
  noarch: python
  script:
    - ${{ PYTHON }} -m pip install . --no-deps --no-build-isolation --disable-pip-version-check

requirements:
  host:
    - pip
    - python ${{ python_min }}.*
    - setuptools
  run:
    - python >=${{ python_min }}
    - pytorch >=1.9

tests:
  - python:
      imports: entmax
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - ${{ python_check_max }}.*
  - requirements:
      run:
        - pytest-cov
        - python ${{ python_min }}.*
    script:
      - coverage run --source=entmax --branch -m pytest -vv --tb=long --color=yes --pyargs entmax
      - coverage report --show-missing --skip-covered --fail-under=${{ cov_fail_under }}

about:
  summary: >
    The entmax mapping and its loss, a family of sparse alternatives to softmax.
  license: Apache-2.0
  license_file: LICENSE
  homepage: https://pypi.org/project/entmax
  repository: https://github.com/deep-spin/entmax

extra:
  recipe-maintainers:
    - bollwyvl
