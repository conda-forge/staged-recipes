{% set name = "fish-lsp" %}
{% set version = "1.0.8-4" %}

package:
  name: {{ name|lower }}
  version: {{ version|replace("-", "_") }}

source:
  url: https://registry.npmjs.org/fish-lsp/-/fish-lsp-{{ version }}.tgz
  sha256: 5ab1efa4a3a28f97e934bf1dc7ba56347d6cbadd3817cbf3839e333108170597

build:
  number: 0
  noarch: generic

requirements:
  build:
    - jq
    - nodejs
    - husky
    - pnpm
    - pnpm-licenses
  run:
    - nodejs
    - fish

test:
  commands:
    - npm list -g fish-lsp
    - fish-lsp --help
    - fish-lsp --version
    - "fish-lsp info | grep Version"

about:
  home: https://www.fish-lsp.dev
  dev_url: https://github.com/ndonfris/fish-lsp
  summary: LSP implementation for the fish shell language
  license: MIT
  license_file:
    - LICENSE.md
    - third-party-licenses.txt

extra:
  recipe-maintainers:
    - anjos
