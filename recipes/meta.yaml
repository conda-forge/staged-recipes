{% set version = "0.1.8" %}

package:
  name: ipyrad2
  version: {{ version }}

source:
  #git_url: https://github.com/eaton-lab/ipyrad2.git
  #git_rev: {{version}}
  url: https://github.com/eaton-lab/ipyrad2/archive/v{{ version }}.tar.gz
  sha256: 2702fedb5c1feab30fdf524f8e8c6803f877092dc9f3dd80ee43868aedafaf1f

build:
  entry_points:
    - ipyrad2 = ipyrad2.cli:main
    - ipyrad2-classic = ipyrad2.classic:main
  noarch: python
  script: SETUPTOOLS_SCM_PRETEND_VERSION={{ version }} {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python >=3.8
    - setuptools >=69
    - setuptools-scm >=8
    - wheel
    - pip
  run:
    - python >=3.8
    - loguru
    - numpy
    - pandas
    - h5py
    - tomlkit

test:
  imports:
    - ipyrad2
  commands:
    - pip check
    - ipyrad2 --help
    - ipyrad2-classic --help
  requires:
    - pip
    - python

about:
  home: https://github.com/eaton-lab/ipyrad2
  summary: Interactive assembly and analysis of RAD-seq data sets
  license: GPL-3.0-only
  license_file: LICENSE.txt
  doc_url: https://eaton-lab.org/ipyrad2
  dev_url: https://github.com/eaton-lab/ipyrad2

extra:
  recipe-maintainers:
    - isaacovercast
