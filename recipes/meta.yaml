{% set name = "pysmiles" %}
{% set version = "2.0.1" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://github.com/gruenewald-lab/CGsmiles/archive/{{ version }}.tar.gz
  urk: https://github.com/pckroon/pysmiles/archive/{{ version }}.tar.gz
  sha256: c33ceab0b6ce9d6eeb30d2fae8cc8250cec1a4f3af0baca98458069f5e9ce31a 

build:
  noarch: python
  number: 0
  script: {{ PYTHON }} -m pip install . -vv

requirements:
  host:
    - pip
    - python {{ python_min }}
    - setuptools
  run:
    - numpy >=2.0
    - networkx >=3.0
    - python >={{ python_min }},<=3.13
    - setuptools
    - importlib_resources

test:
  requires:
    - python {{ python_min }}
  imports:
    - pysmiles 

about:
  home: https://github.com/pckroon/pysmiles
  license: Apache-2.0
  license_file: LICENSE
  summary: A lightweight python-only library for reading and writing SMILES strings 
  doc_url: https://github.com/pckroon/pysmiles
  dev_url: https://github.com/pckroon/pysmiles

extra:
  recipe-maintainers:
    - fgrunewald 
    - pckroon
    - ricalessandri 
    - chrisjonesBSU
