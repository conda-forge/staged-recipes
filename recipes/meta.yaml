{% set version = "0.6.5" %}

package:
  name: napari-phasors
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/n/napari-phasors/napari_phasors-{{ version }}.tar.gz
  sha256: 4ba10c196993914dd354004140838dbbd1d0155cae27925aefffb875c9922b4b

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python >=3.12
    - setuptools >=42.0.0
    - wheel
    - setuptools-scm
    - pip
  run:
    - python >=3.12
    - phasorpy >=0.10
    - qtpy
    - biaplotter >=0.4.2
    - fbdfile
    - sdtfile
    - ptufile
    - tifffile
    - pandas
    - pawflim
    - scipy
    - czifile
    - lfdfiles

test:
  imports:
    - napari_phasors
  commands:
    - pip check
  requires:
    - pip
    - python

about:
  home: https://github.com/napari-phasors/napari-phasors
  summary: A simple plugin to use phasor analysis
  doc_url: https://github.com/napari-phasors/napari-phasors
 # README.md
  license: BSD-3-Clause
 # README.md
  license_file: LICENSE  # README.md

extra:
  recipe-maintainers:
    - bruno-pannunzio
