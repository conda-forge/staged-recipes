{% set version = "0.2.1" %}

package:
  name: pyhardisp
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/p/pyhardisp/pyhardisp-{{ version }}.tar.gz
  sha256: cdcabd56898b240117a05319ce5829d1efb8d185f939875bee241fbf8f52f006

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python >=3.8
    - setuptools >=77.0.0
    - wheel
    - pip
  run:
    - python >=3.8
    - numpy >=1.19.0

test:
  imports:
    - pyhardisp
  commands:
    - pip check
  requires:
    - pip
    - python

about:
  home: https://github.com/craigmillernz/pyhardisp
  summary: Ocean loading tidal displacement calculator - Python conversion of IERS HARDISP Fortran program
  license: SL
  license_file: LICENCE

extra:
  recipe-maintainers:
    - craigmillernz