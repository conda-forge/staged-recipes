schema_version: 1

context:
  version: "0.1.0"

package:
  name: jupyverse-file-id
  version: ${{ version }}

source:
  - url: https://pypi.org/packages/source/j/jupyverse-file-id/jupyverse_file_id-${{ version }}.tar.gz
    sha256: 39696bf7a532311222ab87a89989fb5b26a00f5d73bd5659301b2f79b7c55af5

build:
  noarch: python
  number: 0
  script:
    - ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation --disable-pip-version-check

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - uv-build
  run:
    - python >=${{ python_min }}
    - jupyverse-api >=0.15.0,<0.16.0

tests:
  - python:
      imports: jupyverse_file_id
      pip_check: true
      python_version: ${{ python_min }}.*

about:
  license: BSD-3-Clause
  license_file: COPYING.md
  homepage: https://github.com/jupyter-server/jupyverse/tree/main/api/file_id
  summary: The API for Jupyverse's file ID.

extra:
  recipe-maintainers:
    - davidbrochart
