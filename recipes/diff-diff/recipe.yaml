schema_version: 1

context:
  version: "3.7.0"

package:
  name: diff-diff
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/d/diff-diff/diff_diff-${{ version }}.tar.gz
  sha256: 36eb8256a6aa0b37ce092a7b98d25eda2c0e562daa534c9a468dbfe4aa8e1cd3

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python >=3.9,<3.15
    - maturin >=1.4,<2.0
    - pip
  run:
    - python >=3.9,<3.15
    - numpy >=1.20.0
    - pandas >=1.3.0
    - scipy >=1.10

tests:
  - python:
      imports:
        - diff_diff
      pip_check: true
      python_version: ${{ python_min }}.*

about:
  summary: Difference-in-Differences causal inference with sklearn-like API. Callaway-Sant'Anna, Synthetic DiD, Honest DiD, event studies, parallel trends.
  license: MIT
  license_file: LICENSE
  homepage: https://github.com/igerber/diff-diff
  documentation: https://diff-diff.readthedocs.io

extra:
  recipe-maintainers:
    - rpanai
