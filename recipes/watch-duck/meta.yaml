{% set version = "1.0.0" %}
{% set python_min = "3.11" %}

package:
  name: watch-duck
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/w/watch-duck/watch_duck-{{ version }}.tar.gz
  sha256: e855d07b372ae54998fee12fab46500396057bb4e85c9cc51e4220417b469d5f

build:
  entry_points:
    - watch-duck = watch_duck.main:cli
  noarch: python
  script: python -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - hatchling
    - pip
  run:
    - python >={{ python_min }}
    - bottleneck
    - dask-core
    - h5netcdf
    - numpy
    - pandas
    - rich
    - rich-click
    - xarray
    - zarr

test:
  imports:
    - watch_duck
  commands:
    - pip check
    - watch-duck --help
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://pypi.org/project/watch-duck/
  summary: Python toolbox to track progress of ecflow experiments
  dev_url: https://github.com/aFarchi/watch-duck
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - aFarchi
