{% set version = "2.1.0" %}
{% set posix = 'm2-' if win else '' %}

package:
  name: r-slope
  version: {{ version|replace("-", "_") }}

source:
  url:
    - {{ cran_mirror }}/src/contrib/SLOPE_{{ version }}.tar.gz
    - {{ cran_mirror }}/src/contrib/Archive/SLOPE/SLOPE_{{ version }}.tar.gz
  sha256: 5dac8184e1a2f94cd0a956685daf8d6a322776fcaf2019397e2103e3186c2481

build:
  number: 0
  rpaths:
    - lib/R/lib/
    - lib/
  missing_dso_allowlist:
    - '*/R.dll'        # [win]
    - '*/Rblas.dll'    # [win]
    - '*/Rlapack.dll'  # [win]

requirements:
  build:
    - {{ compiler('c') }}          # [not win]
    - {{ stdlib('c') }}            # [not win]
    - {{ compiler('cxx') }}        # [not win]
    - {{ compiler('m2w64_c') }}    # [win]
    - {{ stdlib('m2w64_c') }}      # [win]
    - {{ compiler('m2w64_cxx') }}  # [win]
    - {{ posix }}filesystem        # [win]
    - {{ posix }}make
    - {{ posix }}sed               # [win]
    - {{ posix }}coreutils         # [win]
    - {{ posix }}zip               # [win]
    - cross-r-base {{ r_base }}    # [build_platform != target_platform]
  host:
    - r-base
    - libgomp                      # [not osx]
    - llvm-openmp                  # [osx]
    - r-bh
    - r-bigmemory
    - r-matrix
    - r-rcpp
    - r-rcppeigen
  run:
    - r-base
    - r-matrix
    - r-rcpp

test:
  commands:
    - $R -e "library('SLOPE')"           # [not win]
    - "\"%R%\" -e \"library('SLOPE')\""  # [win]

about:
  home: https://jolars.github.io/SLOPE/
  dev_url: https://github.com/jolars/SLOPE
  license: GPL-3.0-only
  license_family: GPL3
  license_file: '{{ environ["PREFIX"] }}/lib/R/share/licenses/GPL-3'
  summary: Sorted L-One Penalized Estimation
  description: >
    Efficient implementations for Sorted L-One Penalized Estimation (SLOPE):
    generalized linear models regularized with the sorted L1-norm. There is
    support for ordinary least-squares, binomial, multinomial, and Poisson
    regression.

extra:
  recipe-maintainers:
    - jolars
    - conda-forge/r
