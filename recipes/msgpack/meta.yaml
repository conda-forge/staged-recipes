{% set version = "1.1.2" %}

package:
  name: msgpack
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/m/msgpack/msgpack-{{ version }}.tar.gz
  sha256: 3b60763c1373dd60f398488069bcdc703cd08a711477b5d480eecc9f9626f47e

build:
  skip: true  # [py<39]
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  build:
    - {{ compiler('c') }}
  host:
    - python >=3.9
    - setuptools >=80.9.0
    - pip
  run:
    - python >=3.9

test:
  imports:
    - msgpack
  commands:
    - pip check
  requires:
    - pip
    - python

about:
  home: https://msgpack.org/
  summary: MessagePack serializer
  doc_url: https://msgpack-python.readthedocs.io/
  license: Apache-2.0
  license_file: COPYING

extra:
  recipe-maintainers:
    - fitzgeralddp
