# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "0.6.0"

package:
  name: needle-python
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/n/needle-python/needle_python-${{ version }}.tar.gz
  sha256: 6fb2aa99ef56e8f63171add525ab4756c91504dc39b6fd3e33f14cec9ce33b46

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - poetry-core
    - pip
  run:
    - python >=${{ python_min }}
    - requests >=2.32.3,<3.0.0

tests:
  - python:
      imports:
        - needle
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  homepage: https://pypi.org/project/needle-python/
  license: MIT
  license_file: LICENSE
  summary: Needle client library for Python
  repository: https://github.com/oeken/needle-python
  documentation: https://docs.needle.app
  description: |
    The needle-python library provides convenient access to the Needle API
    from Python applications. It exposes methods and data types for working
    with Needle collections and files, helping developers explore the Needle
    retrieval API quickly.

extra:
  recipe-maintainers:
    - rxm7706
