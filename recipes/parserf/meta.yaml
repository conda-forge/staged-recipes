{% set version = "1.0.1" %}

package:
  name: parserf
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/p/parserf/parserf-{{ version }}.tar.gz
  sha256: fbd977894317b882afa9d29981415ae1487cf5fea06a5370eccaaf5709a1df86

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python >=3.12
    - setuptools >=61.0
    - pip
  run:
    - python >=3.12
    - geopandas
    - numpy >=1.26
    - pandas
    - pyarrow >=23.0.1
    - pyproj
    - shapely >=2.1.2

test:
  imports:
    - parserf
  commands:
    - pip check
    # Smoke test that the whitelisted data files (MANIFEST.in) actually landed in
    # the installed package -- not just that the module imports.
    - python -c "from parserf.models import FaultModel, FaultModelDataset; ds = FaultModelDataset(FaultModel.UCERF3_31); assert len(ds.subsections) > 0; assert len(ds.ruptures) > 0"
  requires:
    - pip
    - python

about:
  home: https://github.com/asarmy/parserf
  summary: Parser for earthquake rupture forecasts like UCERF3 and 2023 NSHMP.
  license: Apache-2.0
  license_file: LICENSE
  dev_url: https://github.com/asarmy/parserf
  doc_url: https://parserf.readthedocs.io/

extra:
  recipe-maintainers:
    - asarmy
