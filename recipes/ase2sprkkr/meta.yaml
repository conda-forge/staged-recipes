{% set name = "ase2sprkkr" %}
{% set version = "3.4.2" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/ase2sprkkr-{{ version }}.tar.gz
  sha256: 6d19b4bacb1c2f25489654141c44683694beec171264ca583bba75be199e6ca8

build:
  entry_points:
    - ase2sprkkr = ase2sprkkr.tools.ase2sprkkr:run
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  build:
    - {{ compiler('c') }}
    - {{ compiler('fortran') }}
    - {{ stdlib('c') }}
    - cmake
    - make
  host:
    - python
    - scikit-build-core
    - cython
    - numpy
    - pip
  run:
    - python
    - ase
    - asr
    - spglib
    - pyparsing >=3.0
    - mendeleev
    - platformdirs
    - packaging
    - cython
    - setuptools
    - pint
    - pytest
    - pyyaml
    - requests
    - argcomplete
    - numpy
    - unyt

test:
  imports:
    - ase2sprkkr
  commands:
    - pip check
    - ase2sprkkr --help
  requires:
    - pip

about:
  home: https://github.com/ase2sprkkr/ase2sprkkr
  summary: Wrapper/calculator for SPRKKR to be used within ASE (Atomic Simulation Environment)
  license: MIT
  license_file: LICENCE

extra:
  recipe-maintainers:
    - jan-janssen
