schema_version: 1

context:
  version: 0.3.4
  build_number: 0

package:
  name: torchrunx
  version: ${{ version }}

source:
  url: https://github.com/apoorvkh/torchrunx/archive/refs/tags/${{ version }}.zip
  sha256: dccd806666d9daf09461c588a2092fd7d08b085d87a319c3c94167050e2f0e20

build:
  number: ${{ build_number }}
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  noarch: python

requirements:
  host:
    - pip
    - python ${{ python_min }}.*
    - uv-build
  run:
    - cloudpickle >=3.0
    - fabric >=3.2
    - numpy >=1.20
    - python >=${{ python_min }}
    - pytorch >=2.0
    - typing-extensions >=4.9.0
    # This package only supports linux.
    - __linux

tests:
  - python:
      imports:
        - torchrunx
      pip_check: true
      python_version: ${{ python_min }}.*
  # Run pytest skipping tests that require a GPU.
  - script:
      - pytest tests/
        --deselect=tests/test_func.py::test_launch
        --deselect=tests/test_submitit.py::test_submitit
        --deselect=tests/test_train_gpu.py::test_distributed_train
    files:
      source:
        - pyproject.toml
        - tests
    requirements:
      run:
        - pytest
        - python ${{ python_min }}.*
        - submitit
        - transformers

about:
  homepage: https://torchrun.xyz
  license: GPL-3.0-only
  license_file: LICENSE
  repository: https://github.com/apoorvkh/torchrunx
  summary: Automatically initialize distributed PyTorch environments

extra:
  recipe-maintainers:
    - diegoferigo
    -   apoorvkh
