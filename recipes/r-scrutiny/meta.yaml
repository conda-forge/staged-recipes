{% set version = '0.6.1' %}
{% set posix = 'm2-' if win else '' %}

package:
  name: r-scrutiny
  version: {{ version|replace("-", "_") }}

source:
  url:
    - {{ cran_mirror }}/src/contrib/scrutiny_{{ version }}.tar.gz
    - {{ cran_mirror }}/src/contrib/Archive/scrutiny/scrutiny_{{ version }}.tar.gz
  sha256: 06a24e1ff4e06e5657a98a91a2dad94177e16b7cf72fa49b29853b52e75f1973

build:
  number: 0
  noarch: generic
  rpaths:
    - lib/R/lib/
    - lib/
  missing_dso_whitelist:
    - '*/R.dll'        # [win]
    - '*/Rblas.dll'    # [win]
    - '*/Rlapack.dll'  # [win]

requirements:
  build:
    - {{ posix }}zip               # [win]
    - cross-r-base {{ r_base }}    # [build_platform != target_platform]
  host:
    - r-base
    - r-cli
    - r-corrr
    - r-dplyr
    - r-ggplot2
    - r-ggrepel
    - r-glue
    - r-lifecycle
    - r-magrittr
    - r-purrr
    - r-rlang >=1.1.0
    - r-stringr
    - r-tibble
    - r-tidyr
    - r-tidyselect
  run:
    - r-base
    - r-cli
    - r-corrr
    - r-dplyr
    - r-ggplot2
    - r-ggrepel
    - r-glue
    - r-lifecycle
    - r-magrittr
    - r-purrr
    - r-rlang >=1.1.0
    - r-stringr
    - r-tibble
    - r-tidyr
    - r-tidyselect

test:
  commands:
    - $R -e "library('scrutiny')"           # [not win]
    - "\"%R%\" -e \"library('scrutiny')\""  # [win]

about:
  home: https://lhdjung.github.io/scrutiny/
  dev_url: https://github.com/lhdjung/scrutiny/
  license: MIT
  summary: Test published summary statistics for consistency (Brown and Heathers, 2017, <doi:10.1177/1948550616673876>;
    Allard, 2018, <https://aurelienallard.netlify.app/post/anaytic-grimmer-possibility-standard-deviations/>;
    Heathers and Brown, 2019, <https://osf.io/5vb3u/>). The package also provides infrastructure
    for implementing new error detection techniques.
  license_family: MIT
  license_file:
    - '{{ environ["PREFIX"] }}/lib/R/share/licenses/MIT'
    - LICENSE

extra:
  recipe-maintainers:
    - conda-forge/r
