{% set version = "0.1.0" %}

package:
  name: openorbitaloptimizer-pyscf
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/o/openorbitaloptimizer-pyscf/openorbitaloptimizer_pyscf-{{ version }}.tar.gz
  sha256: 0648247d5223f12e10b16c783473306808d3be854a5aadfb1e206cb681bc68ae

build:
  skip: true  # [win]
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

  ignore_run_exports:
    - openorbitaloptimizer  # header-only

requirements:
  build:
    - {{ compiler('cxx') }}
    - {{ stdlib('c') }}
    - cmake >=3.17
    - make
  host:
    - armadillo
    - libblas  # [linux]
    - nanobind >=2.0
    - openorbitaloptimizer
    - pip
    - python
    - scikit-build-core >=0.9
  run:
    - numpy
    - python
    - scipy

test:
  imports:
    - openorbitaloptimizer.pyscf
  commands:
    - pip check
  requires:
    - pip
    - pyscf >=2.4

about:
  home: https://github.com/awvwgk/openorbitaloptimizer-pyscf
  summary: Python bindings for OpenOrbitalOptimizer SCF library
  license: Apache-2.0
  license_file: LICENSE

extra:
  recipe-maintainers:
    - awvwgk
