context:
  version: "0.0.3"
  python_min: "3.9"

package:
  name: pygfnff
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/p/pygfnff/pygfnff-${{ version }}.tar.gz
  sha256: 6b5f8019737939507f16555941e56a13bd97af15ce992859487e16be81a68b99

build:
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - {{ compiler }}
    - {{ compiler('c') }}
    - {{ compiler('cxx') }}
    - {{ compiler('f77') }}
    - python ${{ python_min }}.*
    - pip
    - uv-build
  run:
    - python >=${{ python_min }}
    - array-api-compat
    - numpy
    - typing-extensions

tests:
  - python:
      imports:
        - adsorption
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  homepage: https://github.com/LiuGaoyong/PyGFNFF
  summary: Python wrapper for GFN-FF based on F2PY.
  description: |
    Python wrapper for GFN-FF based on F2PY.
  license: GPL-3.0-or-later
  license_file: LICENSE
  repository: https://github.com/LiuGaoyong/PyGFNFF

extra:
  recipe-maintainers:
    - LiuGaoyong
