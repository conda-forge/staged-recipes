schema_version: 1

context:
  version: "2.0.0"

package:
  name: pystac-ext-storage
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/p/pystac-ext-storage/pystac_ext_storage-${{ version }}.tar.gz
  sha256: 58b28988e49a188cc8ee09e8bc88440aec9985f0d3ccd295b6209215896e4250

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - hatchling
    - pip
  run:
    - python >=${{ python_min }}
    - pystac-core

tests:
  - python:
      imports:
        - pystac_ext_storage
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  summary: Storage extension for PySTAC
  license: Apache-2.0
  license_file: PLEASE_ADD_LICENSE_FILE
  homepage: https://pypi.org/project/pystac-ext-storage/
  documentation: https://pystac.readthedocs.io

extra:
  recipe-maintainers:
    - AddYourGitHubIdHere
