# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json

schema_version: 1

context:
  version: "2.14.3"

package:
  name: ibm-cos-sdk-s3transfer
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/i/ibm-cos-sdk-s3transfer/ibm_cos_sdk_s3transfer-${{ version }}.tar.gz
  sha256: 2251ebfc4a46144401e431f4a5d9f04c262a0d6f95c88a8e71071da056e55f72

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - setuptools
  run:
    - python >=${{ python_min }}
    # Co-released and version-locked to ibm-cos-sdk-core by upstream.
    - ibm-cos-sdk-core ==2.14.3

tests:
  - python:
      imports:
        - ibm_s3transfer
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  homepage: https://github.com/IBM/ibm-cos-sdk-python-s3transfer
  repository: https://github.com/IBM/ibm-cos-sdk-python-s3transfer
  summary: IBM S3 Transfer Manager
  license: Apache-2.0
  license_file:
    - LICENSE.txt
    - NOTICE.txt

extra:
  recipe-maintainers:
    - killua156
