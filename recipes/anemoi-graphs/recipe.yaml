schema_version: 1

context:
  version: "0.9.1"

package:
  name: anemoi-graphs
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/a/anemoi-graphs/anemoi_graphs-${{ version }}.tar.gz
  sha256: 97d7e1433595d902f747a224c4e58da384e43a08521339711899941886bdb9ef

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  python:
    entry_points:
      - anemoi-graphs = anemoi.graphs.__main__:main

requirements:
  host:
    - python ${{ python_min }}.*
    - setuptools >=60
    - setuptools-scm >=8
    - pip
  run:
    - python >=${{ python_min }}
    - anemoi-utils >=0.4.11
    - hydra-core >=1.3
    - matplotlib-base >=3.6
    - networkx >=3.1
    - numpy >=1.26
    - plotly >=5.19
    - scikit-learn >=1.5
    - pytorch >=2.2,<2.11
    - pytorch_geometric >=2.3.1
    - typeguard >=4

tests:
  - python:
      imports:
        - anemoi
      pip_check: true
      python_version: ${{ python_min }}.*
  - requirements:
      run:
        - pip
        - python ${{ python_min }}.*
    script:
      - anemoi-graphs --help

about:
  summary: A package to build graphs for data-driven forecasts.
  license: Apache-2.0
  license_file: LICENSE
  homepage: https://github.com/ecmwf/anemoi-graphs/
  documentation: https://anemoi-graphs.readthedocs.io/

extra:
  recipe-maintainers:
    - tjtg
    - jasonjunweilyu
    - HCookie
