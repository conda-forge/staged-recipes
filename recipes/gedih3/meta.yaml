{% set name = "gedih3" %}
{% set version = "0.14.3" %}
{# gedih3 requires a newer Python than conda-forge's current default minimum, so python_min is overridden here per the linter's guidance. #}
{% set python_min = "3.12" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz
  # Integrity check, not a secret: PyPI publishes this digest itself. It pins
  # the exact bytes, so a replaced or tampered sdist fails the build instead of
  # being packaged silently. Must be updated with every version — a stale hash
  # fails loudly, which is the point. Once the feedstock exists, conda-forge's
  # autotick bot updates both fields on each PyPI release.
  sha256: 7399a4cde45c014aad627d9449bad60acd5258b54fb3c097772c16f2f11579c2

build:
  number: 0
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  entry_points:
    - gh3_build = gedih3.cli.gh3_build:main
    - gh3_download = gedih3.cli.gh3_download:main
    - gh3_extract = gedih3.cli.gh3_extract:main
    - gh3_aggregate = gedih3.cli.gh3_aggregate:main
    - gh3_list_resolutions = gedih3.cli.gh3_list_resolutions:main
    - gh3_read_schema = gedih3.cli.gh3_read_schema:main
    - gh3_rasterize = gedih3.cli.gh3_rasterize:main
    - gh3_update = gedih3.cli.gh3_update:main
    - gh3_from_img = gedih3.cli.gh3_from_img:main
    - gh3_from_polygon = gedih3.cli.gh3_from_polygon:main
    - gh3_build_ducklake = gedih3.cli.gh3_build_ducklake:main
    - gh3_doctor = gedih3.cli.gh3_doctor:main

requirements:
  host:
    - python {{ python_min }}
    - pip
    - setuptools >=80.0.0
  run:
    - python >={{ python_min }}
    - numpy >=1.26.0
    - pandas >=2.1.1
    - geopandas >=1.0.0
    - shapely >=2.0.2
    - pyogrio >=0.7.2
    - pyproj >=3.6.1
    - h3-py >=4.3.0
    - h3pandas >=0.3.0
    - antimeridian >=0.3.0
    - fsspec >=2025.2.0
    - s3fs >=2025.2.0
    - aiohttp >=3.9.0
    - requests >=2.26.0
    - dask >=2025.1.0
    - dask-geopandas >=0.5.0
    - distributed >=2025.1.0
    - psutil >=5.9.4
    - numba >=0.59.0
    - pyarrow >=14.0.1
    - h5py >=3.10.0
    - xarray >=2024.1.0
    - rasterio >=1.3.8.post1
    - rioxarray >=0.15.0
    - geocube >=0.7.1
    - affine >=2.3.0
    - python-dateutil >=2.9.0
    - python-dotenv >=1.0.0
    - earthaccess >=0.16.0
    - pqdm >=0.2.0
    - tqdm >=4.60.0
    - pyyaml >=6.0.1
    - scipy >=1.11.2
    # optional in the pip package (raster.build_vrt falls back to a
    # rasterio-only VRT writer), but free to depend on in conda
    - gdal >=3.4.0
    # pin to 1.4.x LTS: DuckLake catalog format v0.3 is version-locked;
    # 1.5+ writes v0.4 which 1.4 cannot read
    - python-duckdb >=1.4.4,<1.5

test:
  imports:
    - gedih3
  requires:
    - pip
    - python {{ python_min }}
  commands:
    # `pip check` is the conda-forge convention: it verifies the installed
    # package's declared dependencies are actually satisfied in the built
    # environment, catching a run: list that drifted from pyproject.toml.
    - pip check
    - gh3_list_resolutions --help

about:
  home: https://github.com/tiagodc/GEDI-H3
  summary: Access, index, and analyze NASA GEDI LiDAR data with H3 hexagonal spatial indexing and Dask-distributed processing
  description: |
    gedih3 is a Python library for accessing NASA's GEDI satellite LiDAR data
    with H3 and EGI spatial indexing. It handles downloading GEDI products from
    NASA's DAACs, building spatially-indexed parquet databases for efficient
    queries, extracting/aggregating data, and producing raster outputs.
  license: LicenseRef-UMD-Source-Available-NonCommercial-1.0
  license_family: Proprietary
  license_file:
    - LICENSE
    - NOTICE
  doc_url: https://tiagodc.github.io/GEDI-H3/
  dev_url: https://github.com/tiagodc/GEDI-H3

extra:
  recipe-maintainers:
    - tiagodc
