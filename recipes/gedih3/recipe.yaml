schema_version: 1

context:
  python_min: "3.12"
  version: "0.14.3"

package:
  name: gedih3
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/g/gedih3/gedih3-${{ version }}.tar.gz
  sha256: 7399a4cde45c014aad627d9449bad60acd5258b54fb3c097772c16f2f11579c2

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  python:
    entry_points:
      - gh3_build = gedih3.cli.gh3_build:main
      - gh3_download = gedih3.cli.gh3_download:main
      - gh3_extract = gedih3.cli.gh3_extract:main
      - gh3_aggregate = gedih3.cli.gh3_aggregate:main
      - gh3_list_resolutions = gedih3.cli.gh3_list_resolutions:main
      - gh3_read_schema = gedih3.cli.gh3_read_schema:main
      - gh3_rasterize = gedih3.cli.gh3_rasterize:main
      - gh3_update = gedih3.cli.gh3_update:main
      - gh3_from_img = gedih3.cli.gh3_from_img:main
      - gh3_from_polygon = gedih3.cli.gh3_from_polygon:main
      - gh3_build_ducklake = gedih3.cli.gh3_build_ducklake:main
      - gh3_doctor = gedih3.cli.gh3_doctor:main

requirements:
  host:
    - python ${{ python_min }}.*
    - setuptools >=80.0.0
    - pip
  run:
    - python >=${{ python_min }}
    - numpy >=1.26.0
    - pandas >=2.1.1
    - geopandas >=1.0.0
    - shapely >=2.0.2
    - pyogrio >=0.7.2
    - pyproj >=3.6.1
    - h3-py >=4.3.0
    - h3pandas >=0.3.0
    - antimeridian >=0.3.0
    - fsspec >=2025.2.0
    - s3fs >=2025.2.0
    - aiohttp >=3.9.0
    - requests >=2.26.0
    - dask-core >=2025.1.0
    - dask-geopandas >=0.5.0
    - distributed >=2025.1.0
    - psutil >=5.9.4
    - numba >=0.59.0
    - pyarrow >=14.0.1
    - h5py >=3.10.0
    - xarray >=2024.1.0
    - rasterio >=1.3.8.post1
    - rioxarray >=0.15.0
    - geocube >=0.7.1
    - affine >=2.3.0
    - python-dateutil >=2.9.0
    - python-dotenv >=1.0.0
    - earthaccess >=0.16.0
    - pqdm >=0.2.0
    - tqdm >=4.60.0
    - pyyaml >=6.0.1
    - scipy >=1.11.2
    - python-duckdb >=1.4.4,<1.5
    - gdal >=3.4.0

tests:
  - python:
      imports:
        - gedih3
      pip_check: true
      python_version: ${{ python_min }}.*
  - requirements:
      run:
        - pip
        - python ${{ python_min }}.*
    script:
      - gh3_build --help
      - gh3_download --help
      - gh3_extract --help
      - gh3_aggregate --help
      - gh3_list_resolutions --help
      - gh3_read_schema --help
      - gh3_rasterize --help
      - gh3_update --help
      - gh3_from_img --help
      - gh3_from_polygon --help
      - gh3_build_ducklake --help
      - gh3_doctor --help

about:
  summary: Access, index, and analyze NASA GEDI LiDAR data with H3 hexagonal spatial indexing and Dask-distributed processing
  description: |
    gedih3 is a Python library for accessing NASA's GEDI satellite LiDAR data
    with H3 and EGI spatial indexing. It handles downloading GEDI products from
    NASA's DAACs, building spatially-indexed parquet databases for efficient
    queries, extracting/aggregating data, and producing raster outputs.
  license: LicenseRef-UMD-Source-Available-NonCommercial-1.0
  license_file:
    - LICENSE
    - NOTICE
  homepage: https://github.com/tiagodc/GEDI-H3
  repository: https://github.com/tiagodc/GEDI-H3
  documentation: https://tiagodc.github.io/GEDI-H3/

extra:
  recipe-maintainers:
    - tiagodc
