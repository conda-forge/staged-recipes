{% set name = "foscat" %}
{% set version = "2026.4.1" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz
  sha256: 7d64f9161b6c157da07566064fc022d923b6ebbbe7fcc5fc4a3725c06bfb6ccf

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - pip
    - setuptools
  run:
    - python >={{ python_min }}
    - imageio
    - imagecodecs
    - matplotlib-base
    - numpy
    - healpy
    - spherical
    # `spherical` declares `spinsfast` as a hard dep in its PyPI
    # metadata but the conda-forge `spherical` recipe doesn't pull
    # spinsfast automatically. Add it explicitly so `pip check` passes
    # and runtime imports of foscat's spherical-stencil code path work.
    - spinsfast

test:
  imports:
    - foscat
  commands:
    - pip check
  requires:
    - python {{ python_min }}
    - pip

about:
  home: https://github.com/jmdelouis/FOSCAT
  summary: Generate synthetic HEALPix or 2D data using Cross Scattering Transform
  description: |
    FOSCAT is a Python package implementing the Cross Scattering Transform
    method described in Delouis et al. 2022, Astronomy & Astrophysics 668,
    A122 (DOI: 10.1051/0004-6361/202244566). It provides multi-scale
    scattering transform features for HEALPix sphere maps and 2D image
    arrays, supporting both feature extraction and iterative synthesis
    (gap-filling, denoising, statistical-realisation generation) with
    configurable orientations and kernel sizes. FOSCAT autodetects the
    available compute backend (NumPy, TensorFlow, or PyTorch) at runtime.
    For PyTorch / TensorFlow backends the relevant framework must be
    installed separately (FOSCAT does not list them as required
    dependencies).
  license: BSD-3-Clause
  license_family: BSD
  license_file: LICENSE
  doc_url: https://foscat-documentation.readthedocs.io/
  dev_url: https://github.com/jmdelouis/FOSCAT

extra:
  recipe-maintainers:
    - annefou
