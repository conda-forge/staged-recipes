# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "0.1.7"

package:
  name: lyric-task
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/l/lyric-task/lyric_task-${{ version }}.tar.gz
  sha256: 0bb13983165bfa8d9d14e13974639a83a23efc1fb7248e2c789ffd7d0ea3ed22

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    # TODO: tighten once 1.26.3 stays current upstream (upstream pyproject pins ==1.26.3)
    - hatchling >=1.26.3
    - pip
  run:
    - python >=${{ python_min }}
    - cloudpickle
    - msgpack-python

tests:
  - python:
      imports:
        - lyric_task
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  summary: Runtime helpers shared across the lyric-* WebAssembly worker family
  description: |
    Task-runtime primitives (pickle serialization, logging, std streams, utilities)
    shared between lyric-py, lyric-py-worker, lyric-js-worker, and
    lyric-component-ts-transpiling. Part of the Lyric WebAssembly worker system
    from the Bytecode Alliance ecosystem.
  license: MIT
  license_file:
    - LICENSE
  homepage: https://github.com/lyric-project/lyric-runtime

extra:
  recipe-maintainers:
    - rxm7706
