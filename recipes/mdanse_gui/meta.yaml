{% set version = "2.0.0" %}
{% set python_min = "3.10" %}

package:
  name: mdanse_gui
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/m/mdanse_gui/mdanse_gui-{{ version }}.tar.gz
  sha256: 40aafacf6fd3a391baf54afdd58dd6f7783134c2e09b79869ea74932579839bd

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - setuptools
    - numpy
    - wheel
    - pip
  run:
    - python >={{ python_min }}
    - mdanse
    - matplotlib-base
    - qtpy
    - vtk >=9.4.0
    - pyqt6
    - pyyaml
    - tomlkit

test:
  imports:
    - MDANSE_GUI
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://pypi.org/project/MDANSE-GUI/
  summary: MDANSE GUI package - the graphical interface for MDANSE
  license: GPL-3.0-only
  license_file: LICENSE

extra:
  recipe-maintainers:
    - MBartkowiakSTFC
    - ChiCheng45
