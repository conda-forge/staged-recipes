schema_version: 1

context:
  version: "0.1.1"

package:
  name: cel-expr-python
  version: ${{ version }}

source:
  url: https://github.com/cel-expr/cel-python/archive/refs/tags/v${{ version }}.tar.gz
  sha256: 3eb0a619e8df0f338d0430cda01427a742e77e3c433a1c7c3ebd409cd804c45a

build:
  skip: match(python, '<3.11') or win
  number: 0

requirements:
  build:
    - ${{ stdlib('c') }}
    - ${{ compiler('c') }}
    - bazel
    - bazel-toolchain
    - sed
  host:
    - python
    - setuptools
    - pip
  run:
    - python

tests:
  - python:
      imports:
        - cel_expr_python
      pip_check: true

about:
  summary: This is a Python wrapper for the CEL C++ implementation.
  license: Apache-2.0
  license_file: LICENSE
  homepage: https://github.com/cel-expr/cel-python
  repository: https://github.com/cel-expr/cel-python

extra:
  recipe-maintainers:
    - xhochy
