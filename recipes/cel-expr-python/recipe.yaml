schema_version: 1

context:
  version: "0.1.1"

package:
  name: cel-expr-python
  version: ${{ version }}

source:
  url: https://github.com/cel-expr/cel-python/archive/refs/tags/v${{ version }}.tar.gz
  sha256: f2e25344cd47a81c92c7e9c4a2595dca5d080bb50981f4522580b0094395159a
  patches:
    - 0001-Use-system-dependencies.patch

build:
  skip: match(python, '<3.11') or win
  number: 0

requirements:
  build:
    - ${{ stdlib('c') }}
    - ${{ compiler('c') }}
    - ${{ compiler('cxx') }}
    - bazel 8.*
    - bazel-toolchain
    - sed
  host:
    - python
    - setuptools
    # TODO: Unpin on feedstock where we can add the current abseil/protobuf migration
    - libabseil 20260107.*
    - libabseil-bazel-systemlib
    - libprotobuf-bazel-systemlib
    - libprotobuf 6.33.5.*
    - protobuf-bazel-rules
    - pip
  run:
    - python

tests:
  - python:
      imports:
        - cel_expr_python
      pip_check: true

about:
  summary: This is a Python wrapper for the CEL C++ implementation.
  license: Apache-2.0
  # This bundles cel-spec and cel-cpp under the same license terms
  license_file: LICENSE
  homepage: https://github.com/cel-expr/cel-python
  repository: https://github.com/cel-expr/cel-python

extra:
  recipe-maintainers:
    - xhochy
