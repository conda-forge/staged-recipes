# noarch_platforms tells conda-smithy that this recipe ships a noarch:python
# artifact whose runtime behavior is platform-conditional (here: git-annex is
# only available on linux-64, so `requirements.run:` carries an
# `if: linux / then:` selector). Listing >=2 platforms gates the
# `lint_noarch_selectors` rule on (multi-platform = "I have verified the
# selector resolves correctly on each platform I list").
#
# Listing all three because the Windows hatchling sdist-symlink failure is
# now fixed by the [tool.hatch.build.targets.wheel] exclude in
# patches/0001-strip-cli-tool-deps-for-conda-forge.patch.
noarch_platforms:
  - linux_64
  - osx_64
  - win_64
