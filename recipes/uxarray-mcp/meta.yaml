{% set name = "uxarray-mcp" %}
{% set version = "0.1.1" %}
{% set python_min = "3.12" %}

package:
  name: {{ name }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/u/uxarray-mcp/uxarray_mcp-{{ version }}.tar.gz
  sha256: be7c5442628a2cc348a831141da542112cc6d3c6685597389978ecc0c47c3483

build:
  noarch: python
  number: 0
  script: {{ PYTHON }} -m pip install . -vv
  entry_points:
    - uxarray-mcp = uxarray_mcp.cli:main

requirements:
  host:
    - python {{ python_min }}
    - pip
    - uv-build >=0.9.26,<0.10.0
  run:
    - python >={{ python_min }},<3.13
    - fastmcp >=3.4.0
    - holoviews >=1.19.0
    - matplotlib-base >=3.9.0
    - pyyaml >=6.0
    - uxarray >=2025.12.0

test:
  requires:
    - python {{ python_min }}
  imports:
    - uxarray_mcp
  commands:
    - uxarray-mcp --help

about:
  home: https://github.com/UXARRAY/uxarray-mcp-server
  summary: MCP server for analyzing unstructured meshes with UXarray
  description: |
    uxarray-mcp exposes UXarray mesh inspection, analysis, plotting, provenance,
    and optional Globus Compute remote execution tools through the Model Context
    Protocol.
  license: Apache-2.0
  license_file: LICENSE
  doc_url: https://uxarray-mcp-server.readthedocs.io
  dev_url: https://github.com/UXARRAY/uxarray-mcp-server

extra:
  recipe-maintainers:
    - rajeeja
