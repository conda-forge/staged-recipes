context:
  version: "0.3.0"
  build_number: 0

package:
  name: sparrow-ipc
  version: ${{ version }}

source:
  url: https://github.com/sparrow-org/sparrow-ipc/archive/refs/tags/${{ version }}.tar.gz
  sha256: d833ebb392b43391838185befc5aed62696233fb3338d0f80a94f99ca52cd4b4
  patches:
    - fix-install.patch

build:
  script: build
  number: ${{ build_number }}

requirements:
  build:
    - ${{ compiler('cxx') }}
    - ${{ stdlib('c') }}
    - cmake
    - flatbuffers
    - if: unix
      then: make
    - if: win
      then: ninja
  host:
    - sparrow-devel
    - lz4-c
    - zstd
    - nlohmann_json
  run_exports:
    - ${{ pin_subpackage('sparrow-ipc', upper_bound='x.x') }}

tests:
  - package_contents:
      include:
        - sparrow_ipc/serialize.hpp
        - sparrow_ipc/deserialize.hpp
        - sparrow_ipc/config/sparrow_ipc_version.hpp
      lib:
        - sparrow-ipc

  - script:
      - if: unix
        then:
          - test -f ${PREFIX}/share/cmake/sparrow-ipc/sparrow-ipcConfig.cmake
          - test -f ${PREFIX}/share/cmake/sparrow-ipc/sparrow-ipcConfigVersion.cmake
          - test -f ${PREFIX}/share/cmake/sparrow-ipc/sparrow-ipcTargets.cmake
      - if: win
        then:
          - if not exist %LIBRARY_PREFIX%\share\cmake\sparrow-ipc\sparrow-ipcConfig.cmake (exit 1)
          - if not exist %LIBRARY_PREFIX%\share\cmake\sparrow-ipc\sparrow-ipcConfigVersion.cmake (exit 1)
          - if not exist %LIBRARY_PREFIX%\share\cmake\sparrow-ipc\sparrow-ipcTargets.cmake (exit 1)

about:
  homepage: https://github.com/sparrow-org/sparrow-ipc
  summary: C++20 idiomatic APIs for the Apache Arrow Serialization and Interprocess Communication (IPC)
  description: |
    sparrow-ipc provides a high-level, C++20 idiomatic interface for working with
    Apache Arrow IPC messages and streams. It leverages the sparrow library for
    modern C++ memory management and data structures.
  license: BSD-3-Clause AND Apache-2.0
  license_file:
     - LICENSE
     - ARROW_LICENSE.txt
  documentation: https://sparrow-org.github.io/sparrow-ipc/
  repository: https://github.com/sparrow-org/sparrow-ipc

extra:
  recipe-maintainers:
    - Hind-M
