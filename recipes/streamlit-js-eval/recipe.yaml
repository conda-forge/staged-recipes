schema_version: 1

context:
  version: "1.0.0"

package:
  name: streamlit-js-eval
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/s/streamlit_js_eval/streamlit_js_eval-${{ version }}.tar.gz
  sha256: 9e2b2005e3e8a4971d222488a02c880b7b93c8951393ff7f97419ded914498e4

build:
  number: 0
  noarch: python
  script:
    content:
      - ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - setuptools >=67.6.0
    - wheel >=0.40.0
  run:
    - python >=${{ python_min }}
    - streamlit >=1.0.0

tests:
  - python:
      imports:
        - streamlit_js_eval
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  homepage: https://github.com/aghasemi/streamlit_js_eval
  summary: A custom Streamlit component to evaluate arbitrary Javascript expressions
  description: |
    streamlit-js-eval enables evaluating JavaScript expressions from within
    Streamlit applications and returning the results to Python. It facilitates
    functionality that is straightforward in JavaScript but challenging in
    Streamlit, such as cookie management, clipboard operations, device width
    detection, browser language retrieval, and Android share features.
  license: MIT
  license_file: LICENSE
  repository: https://github.com/aghasemi/streamlit_js_eval

extra:
  recipe-maintainers:
    - pb01ka
    - mgorny
