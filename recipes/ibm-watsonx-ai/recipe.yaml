# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "1.5.13"
  python_min: "3.11"

package:
  name: ibm-watsonx-ai
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/i/ibm-watsonx-ai/ibm_watsonx_ai-${{ version }}.tar.gz
  sha256: 63a38fa0ea5ac604e703e3d76888742528d046f376cbaa16762b4b98b0cec973

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - setuptools
    - pip
  run:
    - python >=${{ python_min }}
    - requests
    - httpx >=0.27,<0.29
    - urllib3
    - pandas >=2.3.3,<2.4.0
    - certifi
    - lomond
    - tabulate
    - packaging
    - ibm-cos-sdk >=2.12.0,<2.15.0
    - cachetools

tests:
  - python:
      imports:
        - ibm_watsonx_ai
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  license: BSD-3-Clause
  license_file: LICENSE
  summary: IBM watsonx.ai API Client
  homepage: https://pypi.org/project/ibm-watsonx-ai/
  repository: https://github.com/IBM/watsonx-ai-python-sdk
  documentation: https://ibm.github.io/watsonx-ai-python-sdk
  description: |
    ibm-watsonx-ai is the IBM watsonx.ai Python SDK / API client. It lets you
    interact with IBM watsonx.ai services to build, train, deploy, and manage
    machine learning and foundation models, run inference and prompt tuning,
    and orchestrate AI assets programmatically.

extra:
  recipe-maintainers:
    - rxm7706
