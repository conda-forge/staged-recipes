# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json

schema_version: 1

context:
  version: "1.5.14"
  # Upstream requires-python is >=3.11,<3.15, so override the global 3.10 floor.
  python_min: "3.11"

package:
  name: ibm-watsonx-ai
  version: ${{ version }}

source:
  - url: https://pypi.org/packages/source/i/ibm-watsonx-ai/ibm_watsonx_ai-${{ version }}.tar.gz
    sha256: a756488bd57e87c0fc51be42dcba871143cfe0ac1e805c497c5047e1e4f13e9d
  # The PyPI sdist ships no license file (upstream packaging bug). Pull it from
  # the repo, pinned to a commit on the default branch (the repo publishes no tags).
  - url: https://raw.githubusercontent.com/IBM/watsonx-ai-python-sdk/67d74911f6159d971ef01ebfddb667fdd43b59df/LICENSE
    sha256: 39d8b78315c231c67575129fed8329eb3624be295a8ba807783297406bd79f5d
    file_name: LICENSE

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - setuptools
  run:
    - python >=${{ python_min }},<3.15
    - requests
    - httpx >=0.27,<0.29
    - urllib3
    # Upstream pins pandas per Python version (>=0.24.2,<2.4.0 below 3.14;
    # >=2.3.3 on 3.14). Merged here for the single noarch build; the range is
    # compatible with both markers.
    - pandas >=0.24.2,<2.4.0
    - certifi
    - lomond
    - tabulate
    - packaging
    - ibm-cos-sdk >=2.12.0,<2.15.0
    - cachetools

tests:
  - python:
      imports:
        - ibm_watsonx_ai
      pip_check: true
      # Upstream caps python at <3.15, so the run constraint pins the test env;
      # a scalar python_min is the canonical form here.
      python_version: ${{ python_min }}.*

about:
  homepage: https://github.com/IBM/watsonx-ai-python-sdk
  repository: https://github.com/IBM/watsonx-ai-python-sdk
  documentation: https://ibm.github.io/watsonx-ai-python-sdk
  summary: IBM watsonx.ai API Client
  license: BSD-3-Clause
  license_file: LICENSE

extra:
  recipe-maintainers:
    - killua156
