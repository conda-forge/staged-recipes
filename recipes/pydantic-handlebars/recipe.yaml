schema_version: 1

context:
  name: pydantic-handlebars
  version: "0.2.1"

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/p/pydantic-handlebars/pydantic_handlebars-${{ version }}.tar.gz
  sha256: d4124cfbf7d6e3bded9331a08ccccf6f29f3e3a93665b35b5d6061650aeeb49f

build:
  number: 0
  noarch: python
  script:
    - ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - hatchling
  run:
    - python >=${{ python_min }}
    - pydantic >=2.0

tests:
  - python:
      imports:
        - pydantic_handlebars
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  homepage: https://github.com/pydantic/pydantic-handlebars
  summary: Handlebars template engine for composing LLM prompts, built on Pydantic
  description: |
    A Handlebars template engine for composing LLM prompts, built on Pydantic.
    Designed for AI/agent developers who build system prompts from dynamic
    data, such as few-shot examples, user-specific context, and tool
    descriptions. Templates are validated against Pydantic models at compile
    time, catching typos and missing fields before any data is rendered. The
    only runtime dependency is Pydantic (2.0+).
  license: MIT
  license_file: LICENSE
  repository: https://github.com/pydantic/pydantic-handlebars

extra:
  recipe-maintainers:
    - claydugo
