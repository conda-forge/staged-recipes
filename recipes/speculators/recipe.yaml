schema_version: 1

context:
  version: "0.6.0"

package:
  name: speculators
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/s/speculators/speculators-${{ version }}.tar.gz
  sha256: 6f8babb769bc1719883f2020f745fdc44c481d33d94114695f219011dc3fee03

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - setuptools >=82.0.1
    - setuptools-git-versioning >=2.0,<3
    - packaging
    - pip
  run:
    - python >=${{ python_min }}
    - click
    - datasets >=4.0.0,<=5.0.0
    - huggingface_hub
    - loguru >=0.7.2,<=0.7.3
    - numpy >=2.0.0,<=2.4.6
    - openai >=2.0.0
    - protobuf
    - psutil
    - pydantic >=2.0.0
    - pydantic-settings >=2.0.0
    - rich
    - safetensors
    - pytorch >=2.9.0,<=2.12.0
    - torchaudio
    - torchvision
    - tqdm >=4.66.3,<=4.68.2
    - transformers >=4.56.1,<5.11.0
    - typer >=0.12.0

tests:
  - python:
      python_version:
        - ${{ python_min }}.*
        - '*'
      imports:
        - speculators
      pip_check: true

about:
  summary: A unified library for creating, representing, and storing speculative decoding algorithms for LLM serving such as in vLLM.
  license: Apache-2.0
  license_file: LICENSE
  homepage: https://pypi.org/project/speculators/

extra:
  recipe-maintainers:
    - xhochy
