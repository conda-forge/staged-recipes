{% set name = "flashdeg" %}
{% set version = "1.0.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://github.com/tus-kondolab/flashdeg/archive/refs/tags/v{{ version }}.tar.gz
  sha256: eaca80442006f9678991ca798d2508edda54b23bbc7df73a2f40d218a6d8776b

build:
  number: 0

requirements:
  build:
    - {{ compiler('c') }}
    - {{ compiler('cxx') }}
    - {{ stdlib("c") }}
    - cmake
    - ninja
  host:
    - boost-cpp
    - eigen
    - libblas
    - liblapack

test:
  commands:
    - flashdeg --version
    - flashdeg --build-info
    - flashdeg --help

about:
  home: https://github.com/tus-kondolab/flashdeg
  summary: Fast native differential expression analysis compatible with DESeq2-style workflows
  description: |
    FlashDEG is a fast, lightweight native implementation of DESeq2-style
    differential expression analysis for bulk RNA-seq count matrices.
  license: MIT
  license_file:
    - LICENSE
    - THIRD_PARTY_NOTICES.md
    - LICENSES/scipy-lbfgsb/LICENSE.txt
    - LICENSES/boost/LICENSE.txt
    - LICENSES/eigen/LICENSE.txt
    - LICENSES/openblas/LICENSE.txt
    - LICENSES/blas-lapack/LICENSE.txt
    - LICENSES/pydeseq2/LICENSE.txt

extra:
  recipe-maintainers:
    - tus-kondolab
