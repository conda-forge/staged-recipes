{% set name = "magnum-bindings" %}
# Habitat-Sim v0.3.3 vendors this post-v2020.06 snapshot.
{% set version = "2024.12.31" %}
{% set commit = "c8824470c98eb91f8efea6e541e8ed9ddee7181e" %}

package:
  name: {{ name|lower }}
  version: "{{ version }}"

source:
  url: https://github.com/mosra/magnum-bindings/archive/{{ commit }}.tar.gz
  sha256: 58d41d27c79bc57a806e9316c3991b976f4e4891966b68b7944d9f4adbe09445
  patches:
    - find-installed-python-bindings.patch

build:
  number: 0
  run_exports:
    - {{ pin_subpackage('magnum-bindings', max_pin='x.x') }}
  skip: true  # [win or osx]

requirements:
  build:
    - {{ compiler('cxx') }}
    - {{ stdlib('c') }}
    - cmake <4
    - ninja
    - pkg-config
  host:
    - corrade
    - glfw
    - libgl  # [linux]
    - magnum
    - pip
    - pybind11
    - python
    - setuptools
    - xorg-libx11
  run:
    - corrade
    - glfw
    - libgl  # [linux]
    - magnum
    - python
    - xorg-libx11

test:
  imports:
    - corrade
    - corrade.containers
    - corrade.utility
    - magnum
    - magnum.math
    - magnum.scenegraph
    - magnum.trade
  requires:
    - cmake <4
    - ninja
  files:
    - test-cmake
  commands:
    - test -f $PREFIX/share/cmake/MagnumBindings/MagnumBindingsConfig.cmake  # [not win]
    - cmake -S test-cmake -B test-cmake-build -G Ninja  # [unix]

about:
  home: https://magnum.graphics/
  license: MIT
  license_family: MIT
  license_file: COPYING
  summary: Python bindings for the Magnum C++11/C++14 graphics engine

extra:
  recipe-maintainers:
    - jeongseok-meta
