{% set name = "magnum-bindings" %}
{% set version = "2024.02.14" %}
{% set commit = "806a0e46a06221074afd03c2787034567fc00c1c" %}

package:
  name: {{ name|lower }}
  version: "{{ version }}"

source:
  url: https://github.com/mosra/magnum-bindings/archive/{{ commit }}.tar.gz
  sha256: 316504ba0006411dfa05bfe68bde1bd14e597ec7ecc618f1898b83354e9714a7

build:
  number: 0
  run_exports:
    - {{ pin_subpackage('magnum-bindings', max_pin='x.x') }}
  skip: true  # [win]
  skip: true  # [osx]

requirements:
  build:
    - {{ compiler('cxx') }}
    - {{ stdlib('c') }}
    - cmake <4
    - ninja
    - pkg-config
  host:
    - corrade
    - magnum
    - pip
    - pybind11
    - python
    - setuptools
  run:
    - corrade
    - magnum
    - python

test:
  imports:
    - corrade
    - corrade.containers
    - corrade.utility
    - magnum
    - magnum.math
    - magnum.scenegraph
    - magnum.trade
  commands:
    - test -f $PREFIX/share/cmake/MagnumBindings/MagnumBindingsConfig.cmake  # [not win]

about:
  home: https://magnum.graphics/
  license: MIT
  license_family: MIT
  license_file: COPYING
  summary: Python bindings for the Magnum C++11/C++14 graphics engine

extra:
  recipe-maintainers:
    - jeongseok-meta
