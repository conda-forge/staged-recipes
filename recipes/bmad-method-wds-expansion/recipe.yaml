# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1
context:
  name: bmad-method-wds-expansion
  version: "0.3.1"

package:
  name: ${{ name }}
  version: ${{ version }}

source:
  url: https://github.com/bmad-code-org/bmad-method-wds-expansion/archive/refs/tags/v${{ version }}.tar.gz
  sha256: 1a61fc1ddfc46d055acb97ba9c24b508081de5b09746a57531d35bc9257a6ce6

build:
  number: 0
  noarch: generic

requirements:
  run:
    - python >=3.10

tests:
  - script:
      - if: not win
        then:
          - bmad-wds-install --help
          - test -d "${CONDA_PREFIX}/share/bmad-method-wds-expansion/agents"
          - test -d "${CONDA_PREFIX}/share/bmad-method-wds-expansion/agents/wds-agent-freya-ux"
          - test -d "${CONDA_PREFIX}/share/bmad-method-wds-expansion/agents/wds-agent-saga-analyst"
          - test -d "${CONDA_PREFIX}/share/bmad-method-wds-expansion/workflows"
          - test -f "${CONDA_PREFIX}/share/bmad-method-wds-expansion/module.yaml"
      - if: win
        then:
          - bmad-wds-install.bat --help
          - if not exist "%CONDA_PREFIX%\share\bmad-method-wds-expansion\agents" exit 1
          - if not exist "%CONDA_PREFIX%\share\bmad-method-wds-expansion\workflows" exit 1
          - if not exist "%CONDA_PREFIX%\share\bmad-method-wds-expansion\module.yaml" exit 1

about:
  homepage: https://github.com/bmad-code-org/bmad-method-wds-expansion
  repository: https://github.com/bmad-code-org/bmad-method-wds-expansion
  license: MIT
  license_file: LICENSE
  summary: BMad Web Design System expansion module with UX and strategy agents

extra:
  recipe-maintainers:
    - rxm7706
