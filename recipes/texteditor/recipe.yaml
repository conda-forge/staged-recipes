schema_version: 1

context:
  version: 1.4.1

package:
  name: texteditor
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/t/texteditor/texteditor-${{ version }}.tar.gz
  sha256: ab53fb8e2df2212eace989913210b1b10991a26718c4ee8f70928d81276095ae

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - setuptools >=34.4
    - wheel
    - pip
  run:
    - python >=${{ python_min }},<4.0

tests:
  - python:
      imports:
        - texteditor
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  summary: Like webbrowser, but for the text editor.
  license: MIT
  license_file: LICENSE
  homepage: https://github.com/jpsca/texteditor

extra:
  recipe-maintainers:
    - jan-janssen
