context:
  name: tsshd
  version: "0.1.7"

package:
  name: ${{ name }}
  version: ${{ version }}

source:
  url: https://github.com/trzsz/tsshd/archive/refs/tags/v${{ version }}.tar.gz
  sha256: 84041afef83b2bc63f288bb744f3d8473c7e257ab316b75a148767acd5e5f611

build:
  number: 0
  script:
    - go-licenses save ./cmd/${{ name }} --save_path ./library_licenses
    - if: unix
      then: go build -v -trimpath -o $PREFIX/bin/${{ name }} -ldflags="-s -w" ./cmd/${{ name }}
      else: go build -v -trimpath -o %LIBRARY_BIN%\${{ name }}.exe -ldflags="-s -w" .\cmd\${{ name }}

requirements:
  build:
    - ${{ compiler("go-nocgo") }}
    - go-licenses

tests:
  - script:
      - ${{ name }} -V

about:
  homepage: https://trzsz.github.io/tsshd
  summary: "UDP-based SSH server with roaming support"
  license: MIT
  license_file:
    - LICENSE
    - library_licenses/
  repository: https://github.com/trzsz/tsshd

extra:
  recipe-maintainers:
    - lonnywong
