schema_version: 1

context:
  python_min: "3.10"
  version: 0.63b1
  name: opentelemetry-instrumentation-aiokafka

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/o/opentelemetry-instrumentation-aiokafka/opentelemetry_instrumentation_aiokafka-${{ version }}.tar.gz
  sha256: 3c60f0f22a50780f84b6b61660e5e107f54f92c8ac2384f704f67bc00ff08c46

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - hatchling
    - pip
  run:
    - python >=${{ python_min }}
    - opentelemetry-api >=1.27,<2.dev0
    - opentelemetry-instrumentation ==0.63b1
    - opentelemetry-semantic-conventions ==0.63b1
    - typing_extensions >=4.1,<5.dev0
    - aiokafka >=0.8,<1.0

tests:
  - python:
      imports:
        - opentelemetry
        - opentelemetry.instrumentation.aiokafka
      pip_check: true
      python_version: ${{ python_min }}.*

about:
  summary: OpenTelemetry aiokafka instrumentation
  license: Apache-2.0
  license_file: LICENSE
  homepage: https://github.com/open-telemetry/opentelemetry-python-contrib/tree/main/instrumentation/opentelemetry-instrumentation-aiokafka

extra:
  recipe-maintainers:
    - BrownMunda1
