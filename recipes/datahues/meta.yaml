{% set version = "0.1.0" %}

package:
  name: datahues
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/d/datahues/datahues-{{ version }}.tar.gz
  sha256: 35d50c8aaef8d4f0552f9769e61ebeec38b4b61fc998f56f443f29b694a34d9d

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - setuptools >=64
    - setuptools-scm >=8
    - pip
  run:
    - python >={{ python_min }}
    - numpy >=1.17
    - matplotlib-base >=3.3

test:
  imports:
    - datahues
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://github.com/aneeshnaik/datahues
  summary: Generate perceptually uniform colour ramps for data visualisation.
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - aneeshnaik
