schema_version: 1

context:
  version: "3.3.2"

package:
  name: tixi
  version: ${{ version }}

source:
  url: https://github.com/DLR-SC/tixi/archive/v${{ version }}.tar.gz
  md5: 071882eb7820214e204191f6c31d4fb3
  patches:
    - disabled-fortran-example.patch

build:
  number: 0
  python:
    version_independent: true

requirements:
  build:
    - python
    - ${{ stdlib("c") }}
    - ${{ compiler('c') }}
    - ${{ compiler('cxx') }}
    - ninja
    - make
    - doxygen >=1.8.10
    - cmake   >=3.0.0
  host:
    - python
    - libcurl
    - libxml2-devel
    - libxslt
  run:
    - python
  run_exports:
    - ${{ pin_subpackage('tixi', upper_bound='x.x') }}

tests:
  - python:
      imports:
        - tixi3
      pip_check: false
  - script:
      - tixiDemo

about:
  license: Apache-2.0
  license_file: LICENSE
  summary: Fast and simple XML interface library
  description: |
    TIXI is a C++ library for reading and writing XML files. It provides a simple interface to access XML data, and is designed to be fast and efficient. TIXI is used in a variety of applications, including aerospace engineering, where it is used to read and write CPACS files.
  homepage: https://github.com/DLR-SC/tixi
  documentation: https://dlr-sc.github.io/tixi/

extra:
  recipe-maintainers:
    - joergbrech
    - AntonReiswich
