context:
  version: "0.10.5"

package:
  name: cyclonedds-py
  version: ${{ version }}

source:
  - url: https://github.com/eclipse-cyclonedds/cyclonedds-python/archive/refs/tags/${{ version }}.zip
    sha256: a297a1e623ea8053d4991bf997222b5915e1ef6be79790549c3b1568310644f1

build:
  number: 0
  # skip:
    # - match(python, ">=3.13")
  python:
    entry_points:
        - ddsls = cyclonedds.tools.ddsls:command
        - ddsls = cyclonedds.tools.pubsub:command
        - cyclonedds = cyclonedds.tools.cli.main:cli


requirements:
  build:
    - ${{ stdlib("c") }}
    - ${{ compiler('c') }}
  host:
    - ${{ pin_compatible('cyclonedds', lower_bound='x.x', upper_bound='x.x') }}
    - python
    - pip
    - setuptools
    - rich-click
  run:
    - python
    - ${{ pin_compatible('cyclonedds', lower_bound='x.x', upper_bound='x.x') }}
    - rich-click



tests:
    - script:
        - cyclonedds --help
    - python:
        imports:
            - cyclonedds
        pip_check: true


about:
    homepage: https://cyclonedds.io/docs/
    documentation: https://cyclonedds.io/docs/cyclonedds-python/latest/
    repository: https://github.com/eclipse-cyclonedds/cyclonedds-python
    summary: Python binding for Eclipse Cyclone DDS
    license: EPL-2.0
    license_file: LICENSE

extra:
    recipe-maintainers:
        - nmarticorena
