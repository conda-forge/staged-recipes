context:
  name: cyclonedds-py
  version: "0.10.5"

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  - url: https://github.com/eclipse-cyclonedds/cyclonedds-python/archive/refs/tags/${{ version }}.zip
    sha256: a297a1e623ea8053d4991bf997222b5915e1ef6be79790549c3b1568310644f1

build:
  number: 0
  skip:
    - match(python, ">=3.13")


requirements:
  build:
    - ${{ stdlib("c") }}
    - ${{ compiler('c') }}
  host:
    - cyclonedds ==${{ version }}
    - python
    - pip
    - setuptools
  run:
    - python
    - cyclonedds ==${{ version }}
    - rich-click



tests:
    - script:
        - cyclonedds --help
    - python:
        imports:
            - cyclonedds


about:
    homepage: https://cyclonedds.io/docs/
    documentation: https://cyclonedds.io/docs/cyclonedds-python/latest/
    repository: https://github.com/eclipse-cyclonedds/cyclonedds-python
    summary: Python binding for Eclipse Cyclone DDS
    license: EPL-2.0
    license_file: LICENSE

extra:
    recipe-maintainers:
        - nmarticorena
