context:
  version: "0.11.0"

package:
  name: aptos-sdk
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/a/aptos-sdk/aptos_sdk-${{ version }}.tar.gz
  sha256: acfe77c3224007fa063972b9c0525b809e007bf6458f4e5d061fdf00dc046f65

build:
  noarch: python
  script: python -m pip install . -vv
  number: 0

requirements:
  host:
    - bip-utils >=2.9,<3
    - cryptography >=46.0.7,<47
    - httpx >=0.28.0,<0.29
    - PyNaCl >=1.6.2,<2
    - pip
    - python ${{ python_min }}.*
    - python-graphql-client >=0.4.3,<0.5
    - tomli >=2.4.0,<3
    - poetry
    - typing-extensions >=4.15.0,<5
  run:
    - python >=${{ python_min }}

tests:
  - python:
      imports:
      - aptos_sdk
      pip_check: true

about:
  homepage: https://github.com/aptos-labs/aptos-core
  summary: 'The official Python SDK for interacting with the Aptos blockchain.'
  description: |
    The official Python SDK for interacting with the Aptos blockchain.
  license: Apache-2.0
  license_file: LICENSE
  repository: https://github.com/aptos-labs/aptos-core

extra:
  recipe-maintainers:
    - MementoRC
