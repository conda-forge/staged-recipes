# CPU + CUDA variant matrix for warp-md
# "None" = CPU-only build, "12.6" = CUDA 12.x build
cuda_compiler_version:
  - None
  - "12.6"

# Standard conda-forge zip keys for CUDA builds
zip_keys:
  - - cuda_compiler_version                          # [linux]

# Pin Python versions to build against
python:
  - "3.9"
  - "3.10"
  - "3.11"
  - "3.12"
  - "3.13"
