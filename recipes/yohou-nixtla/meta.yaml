{% set version = "0.1.0a1" %}
{% set python_min = "3.11" %}

package:
  name: yohou-nixtla
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/y/yohou-nixtla/yohou_nixtla-{{ version }}.tar.gz
  sha256: fc83f043cd6bf1d0ce29d4d76ad2cc12d163633771b6747b691351101f3ece73

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - hatchling
    - hatch-vcs
    - pip
  run:
    - python >={{ python_min }},<3.14
    - yohou
    - sklearn-wrap >=0.1.0a1
    - polars >=0.20
    - numpy >=2.0.0
    - pandas >=2.2.0
    - statsforecast >=2.0
    - neuralforecast >=3.0

test:
  imports:
    - yohou_nixtla
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://github.com/stateful-y/yohou-nixtla
  summary: A Nixtla integration for Yohou
  doc_url: https://yohou-nixtla.readthedocs.io
  license: Apache-2.0
  license_file: LICENSE

extra:
  recipe-maintainers:
    - gtauzin
