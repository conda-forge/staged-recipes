context:
  version: "0.5.0"

package:
  name: poop
  version: ${{ version }}

source:
  url: https://github.com/andrewrk/poop/archive/refs/tags/${{ version }}.tar.gz
  sha256: b67d62c3583994fb262ccaf05094b215d3514d4d2935a25a3867dcab0cf89c93

build:
  number: 0
  skip:
    - not linux
  script:
    - zig build --prefix $PREFIX -Doptimize=ReleaseSafe -Dstrip=true

requirements:
  build:
    - zig >=0.13.0,<0.14

tests:
  - package_contents:
      strict: true
      bin:
        - poop
  - script: poop --help

about:
  homepage: https://github.com/andrewrk/poop
  summary: Performance Optimizer Observation Platform
  description: |
    This command line tool uses Linux's perf_event_open functionality to
    compare the performance of multiple commands with a colorful terminal
    user interface.
  license: MIT
  license_file: LICENSE
  repository: https://github.com/andrewrk/poop

extra:
  recipe-maintainers:
    - vvsagar
