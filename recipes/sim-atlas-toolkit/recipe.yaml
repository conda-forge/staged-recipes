schema_version: 1

context:
  name: sim-atlas-toolkit
  version: "0.0.2"
  python_min: '3.11'

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/${{ name[0] }}/${{ name }}/sim_atlas_toolkit-${{ version }}.tar.gz
  sha256: f2ec3d7a2f46106ff56b3be92d370741d3a380154161aae4d2c141440984d53c

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  python:
    entry_points:
      - sim-atlas-upload=sim_atlas_toolkit.cli:main

requirements:
  host:
    - python ${{ python_min }}.*
  run:
    - python >=${{ python_min }},<3.14

tests:
  - python:
      imports:
        - sim-atlas-toolkit
      pip_check: true
      python_version: ${{ python_min }}.*
  - requirements:
      run:
        - pip
        - python ${{ python_min }}.*
    script:
      - sim-atlas-upload --help

about:
  summary: sim-atlas-toolkit - Toolkit to interact with a Sim Atlas backend.
  license: BSD-3-Clause
  license_file: LICENSE

extra:
  recipe-maintainers:
    - niklassiemer
