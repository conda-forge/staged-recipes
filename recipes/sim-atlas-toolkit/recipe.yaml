schema_version: 1

context:
  name: sim-atlas-toolkit
  version: "0.0.2"
  python_min: '3.11'

package:
  name: sim-atlas-toolkit
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/sim-atlas-toolkit/sim-atlas-toolkit//sim_atlas_toolkit-${{ version }}.tar.gz
  sha256: f2ec3d7a2f46106ff56b3be92d370741d3a380154161aae4d2c141440984d53c

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  python:
    entry_points:
      - sim-atlas-upload=sim_atlas_toolkit.cli:main

requirements:
  host:
    - python ${{ python_min }}.*
    - uv-build >=0.9.13,<0.10.0
    - pip
  run:
    - python >=${{ python_min }},<3.14
    - pydantic >=2
    - requests >=2

tests:
  - python:
      imports:
        - sim_atlas_toolkit
      pip_check: true
      python_version: ${{ python_min }}.*
  - requirements:
      run:
        - pip
        - python ${{ python_min }}.*
    script:
      - sim-atlas-upload --help

about:
  summary: Tools for parsing and storing workflow nodes with support for pyiron and Python functions
  license: BSD-3-Clause
  license_file: LICENSE
  homepage: https://github.com/XzzX/sim_atlas/

extra:
  recipe-maintainers:
    - niklassiemer
