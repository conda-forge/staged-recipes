context:
  version: "0.1.4"

package:
  name: bttf
  version: ${{ version }}

source:
  url: https://github.com/BurntSushi/bttf/archive/refs/tags/v${{ version }}.tar.gz
  sha256: 21b265959403c02406137adac1012f676a25ad67d6fbf29a553b9e459c7bbc73

build:
  number: 0
  script:
    env:
      CARGO_PROFILE_RELEASE_STRIP: symbols
      CARGO_PROFILE_RELEASE_LTO: fat
    content:
      - if: unix
        then:
          - cargo auditable install --locked --no-track --bins --root ${{ PREFIX }} --path .
        else:
          - cargo auditable install --locked --no-track --bins --root %LIBRARY_PREFIX% --path .
      - cargo-bundle-licenses --format yaml --output ./THIRDPARTY.yml

requirements:
  build:
    - ${{ stdlib('c') }}
    - ${{ compiler('c') }}
    - ${{ compiler('rust') }}
    - cargo-bundle-licenses
    - cargo-auditable

tests:
  - script: bttf --help
  - package_contents:
      bin:
        - bttf
      strict: true

about:
  homepage: https://github.com/BurntSushi/bttf
  summary: A command line tool for datetime arithmetic, parsing, formatting and more.
  license: MIT OR Unlicense
  license_file:
    - UNLICENSE
    - LICENSE-MIT
    - THIRDPARTY.yml
  repository: https://github.com/BurntSushi/bttf

extra:
  recipe-maintainers:
    - synapticarbors
