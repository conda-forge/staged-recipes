context:
  version: "02.04.52"

package:
  name: dasgoclient
  version: ${{ version }}

source:
  url: https://github.com/dmwm/dasgoclient/archive/refs/tags/v${{ version }}.tar.gz
  sha256: dbf5eafe1276a520cde6c28b60ddd15710bde1a2aa321ade9f866f0cd32319d7
  target_directory: src

build:
  number: 0
  script:
    - cd src
    - go-licenses save . --save_path ../library_licenses
    - if: unix
      then: sed -i.bak -e "s,{{VERSION}},v${{ version }},g" main.go && rm main.go.bak
      else: powershell -Command "$content = [System.IO.File]::ReadAllText('main.go').Replace('{{VERSION}}', 'v${{ version }}'); $utf8 = New-Object System.Text.UTF8Encoding $false; [System.IO.File]::WriteAllText('main.go', $content, $utf8)"
    - if: unix
      then: go build -v -o $PREFIX/bin/dasgoclient -ldflags="-s -w"
      else: go build -v -o %LIBRARY_BIN%\dasgoclient.exe -ldflags="-s"

requirements:
  build:
    - ${{ compiler("go-nocgo") }}
    - go-licenses

tests:
  - script: dasgoclient -help
  - package_contents:
      bin:
        - dasgoclient
      strict: true

about:
  homepage: https://github.com/dmwm/dasgoclient
  summary: Go client for the CMS Data Aggregation System
  description: |
    dasgoclient is the Go implementation of the CMS Data Aggregation System
    (DAS) client. It provides a command-line interface for querying CMS
    data services and returning results in text or JSON formats.
  license: MIT
  license_file:
    - src/LICENSE
    - library_licenses/
  documentation: https://pkg.go.dev/github.com/dmwm/dasgoclient
  repository: https://github.com/dmwm/dasgoclient

extra:
  recipe-maintainers:
    - clelange
