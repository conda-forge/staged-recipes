context:
  version: "1.7.5"
  name: stationxml-validator

package:
  name: ${{ name }}
  version: ${{ version }}

source:
  url: https://github.com/iris-edu/${{ name }}/archive/refs/tags/${{ name }}-${{ version }}.tar.gz
  sha256: aa618f7901d817ef25e9f0e872d2e4a2278014de00b81a0befa26bafbca88899

build:
  number: 0
  noarch: generic
  script:
    - mvn package -DskipTests=true
    - mkdir -p $PREFIX/share/java/${{ name }}
    - cp target/${{ name }}-*-jar-with-dependencies.jar $PREFIX/share/java/${{ name }}/${{ name }}.jar
    - cp LICENSE.md $PREFIX/share/java/${{ name }}/LICENSE.md
    - mkdir -p $PREFIX/bin
    - |
      cat > $PREFIX/bin/${{ name }} << 'EOF'
      #!/bin/sh
      exec java -jar "$CONDA_PREFIX/share/java/stationxml-validator/stationxml-validator.jar" "$@"
      EOF
    - chmod +x $PREFIX/bin/${{ name }}

requirements:
  build:
    - maven
    - openjdk >=11
  run:
    - openjdk >=11

tests:
  - script:
      - stationxml-validator -h

about:
  homepage: https://epic.earthscope.org/content/software-resources
  summary: Validate FDSN StationXML metadata files
  description: |
    stationxml-validator is a Java command-line tool that validates FDSN
    StationXML files against the schema and reports schema violations or
    inconsistencies.
  license: GPL-3.0-or-later
  license_file: LICENSE.md
  repository: https://github.com/iris-edu/stationxml-validator

extra:
  recipe-maintainers:
    - omid-earthscope
