context:
  version: "0.1.2"

package:
  name: jupyter-server-mcp
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/j/jupyter-server-mcp/jupyter_server_mcp-${{ version }}.tar.gz
  sha256: 772a70295f87b2d94ef08da8672e19395e3040ed18bc0dea6f70273a8b316a71

build:
  noarch: python
  script: python -m pip install . -vv
  number: 0

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - hatchling >=1.5
  run:
    - python >=${{ python_min }}
    - fastmcp >=2.0.0
    - jupyter_server >=1.6,<3

tests:
  - python:
      imports:
        - jupyter_server_mcp
      pip_check: true
    requirements:
      run:
        - python ${{ python_min }}.*

about:
  homepage: https://github.com/jupyter-ai-contrib/jupyter-server-mcp
  summary: "An MCP interface/extension for Jupyter Server"
  license: BSD-3-Clause
  license_file: LICENSE
  documentation: https://jupyter-ai.readthedocs.io/
  repository: https://github.com/jupyter-ai-contrib/jupyter-server-mcp

extra:
  recipe-maintainers:
    - dlqqq
    - andrii-i
