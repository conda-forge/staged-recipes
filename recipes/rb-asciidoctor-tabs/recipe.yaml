schema_version: 1

context:
  version: "1.0.0.beta.6"

package:
  name: rb-asciidoctor-tabs
  version: ${{ version }}

source:
  url: https://rubygems.org/downloads/asciidoctor-tabs-${{ version }}.gem
  sha256: 83886e3d7c7d89ff1de2a6eb38a43f966132920c0bbe1fffea3fb953b9f3bb47

build:
  noarch: generic
  number: 0
  script:
    - gem install -N -l -V --norc --ignore-dependencies asciidoctor-tabs-${{ version }}.gem
    - gem unpack asciidoctor-tabs-${{ version }}.gem
    - cp asciidoctor-tabs-${{ version }}/LICENSE .

requirements:
  host:
    - ruby
  run:
    - ruby
    - asciidoctor >=2.0.0,<3.0

tests:
  - script:
      - ruby -r asciidoctor -r asciidoctor-tabs -e ''

about:
  homepage: https://github.com/asciidoctor/asciidoctor-tabs
  license: MIT
  license_file: LICENSE
  summary: Asciidoctor extension that adds a tabs block to the AsciiDoc syntax
  description: |
    An Asciidoctor extension that adds a tabs block to the AsciiDoc syntax.
    The tabset is constructed from a dlist enclosed in an example block marked
    with the tabs style.
  repository: https://github.com/asciidoctor/asciidoctor-tabs

extra:
  recipe-maintainers:
    - phreed
