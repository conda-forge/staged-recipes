# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "0.2.5"

package:
  name: deepxiv-sdk
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/d/deepxiv-sdk/deepxiv_sdk-${{ version }}.tar.gz
  sha256: cee3cc785c3f540710f7903ba6a9af6f98276eede93177bc25d1b95a34ec7594

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  python:
    entry_points:
      - deepxiv=deepxiv_sdk.cli:main

requirements:
  host:
    - python ${{ python_min }}.*
    - setuptools >=45,<70
    - wheel
    - pip
  run:
    - python >=${{ python_min }}
    - requests >=2.31.0
    - click >=8.0.0
    - python-dotenv >=0.19.0

tests:
  - python:
      imports:
        - deepxiv_sdk
      pip_check: true
      python_version:
      - ${{ python_min }}.*
      - "*"
  - requirements:
      run:
        - pip
        - python ${{ python_min }}.*
    script:
      - deepxiv --help

about:
  summary: A Python package for arXiv paper access with CLI and MCP server support
  license: MIT
  license_file: LICENSE
  homepage: https://1stauthor.com/
  repository: https://github.com/DeepXiv/deepxiv_sdk
  documentation: https://data.rag.ac.cn/api/docs

extra:
  recipe-maintainers:
    - rxm7706
