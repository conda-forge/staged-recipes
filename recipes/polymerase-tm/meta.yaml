{% set name = "polymerase-tm" %}
{% set version = "0.6.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name.replace('-', '_') }}-{{ version }}.tar.gz
  sha256: d76152b377214f570c5a4148f5eacf9e916209a6194e348ab1051f22df9d2bdc

build:
  noarch: python
  number: 0
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  entry_points:
    - polymerase-tm = polymerase_tm.cli:main

requirements:
  host:
    - python {{ python_min }}
    - pip
    - hatchling
  run:
    - python >={{ python_min }}

test:
  requires:
    - pip
    - python {{ python_min }}
  imports:
    - polymerase_tm
  commands:
    - polymerase-tm --help
    - pip check

about:
  home: https://github.com/Dioskurides/polymerase-tm
  license: MIT
  license_file: LICENSE
  summary: Exact Python reproduction of the NEB Tm Calculator for PCR primer analysis with all NEB polymerases
  description: |
    polymerase-tm reproduces the NEB Tm Calculator algorithm for
    computing PCR primer melting temperature (Tm) and annealing
    temperature (Ta) with support for 22 NEB polymerase products,
    buffer-specific salt corrections, DMSO analysis,
    batch processing, and primer quality scoring.
  dev_url: https://github.com/Dioskurides/polymerase-tm

extra:
  recipe-maintainers:
    - Dioskurides
