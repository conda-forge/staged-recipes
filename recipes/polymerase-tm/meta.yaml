{% set name = "polymerase-tm" %}
{% set version = "0.1.0" %}
{% set python_min = "3.9" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name.replace('-', '_') }}-{{ version }}.tar.gz
  sha256: 5582ba67a51838c677fcd2747fffccb963428b54dfb88f62262afd08b836e74b

build:
  noarch: python
  number: 0
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  entry_points:
    - polymerase-tm = polymerase_tm.cli:main

requirements:
  host:
    - python {{ python_min }}
    - pip
    - hatchling
  run:
    - python >={{ python_min }}

test:
  requires:
    - pip
  imports:
    - polymerase_tm
  commands:
    - polymerase-tm --help
    - pip check

about:
  home: https://github.com/Dioskurides/polymerase-tm
  summary: Exact reproduction of the NEB Tm Calculator for PCR primer analysis
  description: |
    Exact Python reproduction of the NEB Tm Calculator for PCR primer
    melting temperature (Tm) and annealing temperature (Ta) prediction.
    Supports 22 NEB polymerase products with buffer-specific salt
    concentrations and Ta rules. Includes DMSO recommendation analysis.
  license: MIT
  license_file: LICENSE
  doc_url: https://github.com/Dioskurides/polymerase-tm#readme
  dev_url: https://github.com/Dioskurides/polymerase-tm

extra:
  recipe-maintainers:
    - Dioskurides
