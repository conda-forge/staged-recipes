{% set name = "skymap-convert" %}
{% set version = "0.1.1" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/skymap_convert-{{ version }}.tar.gz
  sha256: 56664471060559613a3a825cbb4f5656eb06e75362de7a84d28cfe82b0066090

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - setuptools >=62
    - setuptools-scm >=6.2
    - pip
  run:
    - python >={{ python_min }}
    - astropy-base >=5.0
    - matplotlib-base >=3.4
    - numpy >=2

test:
  imports:
    - skymap-convert
  commands:
    - pip check
    - pytest tests/skymap-convert
  requires:
    - pip
    - pytest
    - python {{ python_min }}
  source_files:
    - tests

about:
  home: https://github.com/lincc-frameworks/skymap-convert
  summary: A dependency-light package for skymap operations--use the LSST skymap without the LSST stack.
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - olivialynn
    - delucchi-cmu
    - camposandro
    - dougbrn
    - hombit
    - smcguire-cmu
    - drewoldag
    - jeremykubica
