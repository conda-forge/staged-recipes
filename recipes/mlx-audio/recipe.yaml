schema_version: 1

context:
  version: "0.4.3"

package:
  name: mlx-audio
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/m/mlx-audio/mlx_audio-${{ version }}.tar.gz
  sha256: 8e87badf56a0f73bf91e3797b1195c01440a181cf0b64a2a08dc1bda4b037f54

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  python:
    entry_points:
      - mlx_audio.convert = mlx_audio.convert:main
      - mlx_audio.stt.generate = mlx_audio.stt.generate:main
      - mlx_audio.tts.generate = mlx_audio.tts.generate:main
      - mlx_audio.server = mlx_audio.server:main
      - mlx_audio.sts.generate = mlx_audio.sts.generate:main

requirements:
  host:
    - python ${{ python_min }}.*
    - setuptools >=61.0
    - wheel
    - poetry-core
    - pip
  run:
    - python >=${{ python_min }}
    - huggingface_hub >=1.0
    - miniaudio >=1.61
    - mlx-lm >=0.31.1
    - mlx >=0.31.1
    - numpy >=1.26.4
    - scipy >=1.10.0
    - python-sounddevice >=0.5.3
    - tqdm >=4.67.1
    - transformers >=5.5.0

tests:
  - python:
      imports:
        - mlx_audio
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - '*'
  - requirements:
      run:
        - pip
        - python
    script:
      - mlx_audio.convert --help
      - mlx_audio.stt.generate --help
      - mlx_audio.tts.generate --help
      # This needs a uvicorn extra
      # - mlx_audio.server --help
      - mlx_audio.sts.generate --help

about:
  summary: MLX-Audio is a package for inference of text-to-speech (TTS) and speech-to-speech (STS) models locally on your Mac using MLX
  license: MIT
  license_file: LICENSE
  homepage: https://github.com/Blaizzy/mlx-audio

extra:
  recipe-maintainers:
    - xhochy
