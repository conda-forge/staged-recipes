schema_version: 1

context:
  python_min: "3.10"
  version: "0.1.1"

package:
  name: ninejs
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/n/ninejs/ninejs-${{ version }}.tar.gz
  sha256: 2d04a579a091e8498b622fefa59450d879f5d99f99161d7d164a0486c5e78e34

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - setuptools
    - setuptools-scm
    - pip
  run:
    - python >=${{ python_min }}
    - jinja2 >=3.0.0
    - matplotlib-base >=3.10.0
    - narwhals >=2.0.0
    - plotnine >=0.12.0

tests:
  - python:
      imports:
        - ninejs
      pip_check: true
      python_version: ${{ python_min }}.*

about:
  summary: Bringing interactivity to plotnine
  license: MIT
  license_file: LICENSE
  homepage: https://y-sunflower.github.io/ninejs/
  documentation: https://y-sunflower.github.io/ninejs/

extra:
  recipe-maintainers:
    - rpanai
