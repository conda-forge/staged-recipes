context:
  version: "2026.6.24+2"

package:
  name: csv-utils
  version: ${{ version }}

source:
  url: https://github.com/amirhosseindavoody/csv-utils/archive/v2026.6.24%2B2.tar.gz
  sha256: f911511a52d195a5330d78502ce663d340ad8a9fe8e3faa83cb40cfc89081769

build:
  number: 0

requirements:
  build:
    - ${{ compiler('rust') }}
    - ${{ compiler('c') }}
    - ${{ stdlib('c') }}
    - cargo-bundle-licenses

tests:
  - script:
      - csv --help
      - csv-utils-web --help

about:
  homepage: https://github.com/amirhosseindavoody/csv-utils
  repository: https://github.com/amirhosseindavoody/csv-utils
  summary: High-performance CSV CLI, TUI, and browser UI explorer
  license: MIT
  license_file:
    - LICENSE
    - THIRDPARTY.yml

extra:
  recipe-maintainers:
    - amirhosseindavoody
