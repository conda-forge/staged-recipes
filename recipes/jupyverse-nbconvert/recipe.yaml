schema_version: 1

context:
  version: "0.1.0"

package:
  name: jupyverse-nbconvert
  version: ${{ version }}

source:
  - url: https://pypi.org/packages/source/j/jupyverse-nbconvert/jupyverse_nbconvert-${{ version }}.tar.gz
    sha256: 239842c02b96ecf215a0991d251ffafd1fb81edb09aaac0d965817a18f38b47d

build:
  noarch: python
  number: 0
  script:
    - ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation --disable-pip-version-check

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - uv-build
  run:
    - python >=${{ python_min }}
    - fastapi-core
    - jupyverse-api >=0.15.0,<0.16.0
    - jupyverse-auth >=0.2.0,<0.3.0

tests:
  - python:
      imports: jupyverse_nbconvert
      pip_check: true
      python_version: ${{ python_min }}.*

about:
  license: BSD-3-Clause
  license_file: COPYING.md
  homepage: https://github.com/jupyter-server/jupyverse/tree/main/api/nbconvert
  summary: The API for Jupyverse's nbconvert.

extra:
  recipe-maintainers:
    - davidbrochart
