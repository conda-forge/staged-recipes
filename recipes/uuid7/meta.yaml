{% set version = "0.1.0" %}

package:
  name: uuid7
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/u/uuid7/uuid7-{{ version }}.tar.gz
  sha256: 8c57aa32ee7456d3cc68c95c4530bc571646defac01895cfc73545449894a63c

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python >=3.7
    - pip
  run:
    - python >=3.7

test:
  imports:
    - uuid_extensions
  commands:
    - pip check
  requires:
    - pip
    - python

about:
  home: https://github.com/stevesimmons/uuid7
  summary: UUID version 7, generating time-sorted UUIDs with 200ns time resolution and 48 bits of randomness
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - Ertugrulmert
