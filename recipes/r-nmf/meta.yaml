package:
  name: r-nmf
  version: 0.28

source:
  url: https://cran.r-project.org/src/contrib/NMF_0.28.tar.gz
  sha256: 77dfe7b323ee5e5f8801851d1d4356932e2ffc810a7ac7faf5542cbfd92eeefb

build:
  number: 0
  rpaths:
    - lib/R/lib/
    - lib/
  script_env:
    - DISABLE_AUTOBREW=1

requirements:
  build:
    - {{ compiler('c') }}
    - {{ compiler('cxx') }}
    - cross-r-base {{ r_base }}  # [build_platform != target_platform]
  host:
    - r-base >=4.3
    - r-registry
    - r-rngtools >=1.2.3
    - r-cluster
    - r-stringr >=1.0.0
    - r-digest
    - r-gridbase
    - r-colorspace
    - r-rcolorbrewer
    - r-foreach
    - r-doparallel
    - r-ggplot2
    - r-reshape2
    - bioconductor-biobase
    - r-codetools
    - r-biocmanager
  run:
    - r-base >=4.3
    - r-registry
    - r-rngtools >=1.2.3
    - r-cluster
    - r-stringr >=1.0.0
    - r-digest
    - r-gridbase
    - r-colorspace
    - r-rcolorbrewer
    - r-foreach
    - r-doparallel
    - r-ggplot2
    - r-reshape2
    - bioconductor-biobase
    - r-codetools
    - r-biocmanager

test:
  commands:
    - $R -e "library('NMF')"

about:
  home: http://renozao.github.io/NMF/
  license: GPL-2.0-or-later
  summary: Algorithms and Framework for Nonnegative Matrix Factorization (NMF)

extra:
  recipe-maintainers:
    - Yuri-Kawahara