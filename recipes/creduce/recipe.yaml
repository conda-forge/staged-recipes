context:
  name: creduce
  version: "2.10.0"

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://github.com/csmith-project/creduce/archive/refs/tags/creduce-${{ version }}.tar.gz
  sha256: "de320cd83bd77ec1a591f36dd6a4d0d1c47a0a28d850a6ebd348540feeab2297"

build:
  number: 0
  skip:
    - win
  script:
    - export CFLAGS="${CFLAGS:-} -std=gnu17"
    - export CXXFLAGS="${CXXFLAGS:-} -std=c++17"
    - cp "$BUILD_PREFIX/share/gnuconfig/config.sub" autoconf/config.sub
    - cp "$BUILD_PREFIX/share/gnuconfig/config.guess" autoconf/config.guess
    - ./configure --prefix="$PREFIX"
    - make -j${CPU_COUNT}
    - make check
    - make install

requirements:
  build:
    - ${{ compiler('c') }}
    - ${{ compiler('cxx') }}
    - ${{ stdlib('c') }}
    - make
    - flex
    - gnuconfig
  host:
    - perl
    - perl-exporter-lite
    - perl-file-which
    - perl-getopt-tabular
    - perl-regexp-common
    - zlib
    - llvmdev 9.*
    - clangdev 9.*
  run:
    - libllvm9 9.*
    - perl-exporter-lite
    - perl-file-which
    - perl-getopt-tabular
    - perl-regexp-common

tests:
  - script:
      - creduce --version
      - $PREFIX/libexec/clang_delta --version

about:
  homepage: https://github.com/csmith-project/creduce
  summary: C-Reduce, a C and C++ program reducer
  description: |
    C-Reduce is a tool that takes a large C or C++ program that has a
    property of interest (such as triggering a compiler bug) and
    automatically produces a much smaller C/C++ program that has the same
    property. It is intended for use by people who discover and report
    bugs in compilers and other tools that process C/C++ code.
  license: NCSA
  license_file: COPYING
  repository: https://github.com/csmith-project/creduce

extra:
  recipe-maintainers:
    - user202729
