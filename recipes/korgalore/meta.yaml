{% set version = "0.6.0" %}

package:
  name: korgalore
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/k/korgalore/korgalore-{{ version }}.tar.gz
  sha256: 66143a8ba547ea3d2b1c03204d9ecd71347c0485b6f474946e00ff48e1ca2257

build:
  entry_points:
    - kgl = korgalore.cli:main
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0
  skip: true  # [win or py<311]

requirements:
  host:
    - python
    - setuptools >=61.0
    - wheel
    - pip
  run:
    - python
    - google-auth >=2.0.0
    - google-auth-oauthlib >=1.0.0
    - google-auth-httplib2 >=0.1.0
    - google-api-python-client >=2.0.0
    - click >=8.3.0
    - click-log >=0.4.0

test:
  imports:
    - korgalore
  commands:
    - pip check
    - kgl --help
  requires:
    - pip
    - python

about:
  home: https://git.kernel.org/pub/scm/utils/korgalore/korgalore.git/
  summary: A tool to put public-inbox messages into your Gmail inbox.
  license: GPL-2.0-only
  license_file: COPYING

extra:
  recipe-maintainers:
    - black-desk
