{% set version = "0.0.66" %}

package:
  name: nwchemex-simde
  version: {{ version }}

source:
  url: https://github.com/NWChemEx/SimDE/archive/refs/tags/v{{ version }}.tar.gz
  sha256: 262c31f7587b58b19111f88f3632f5642ebb5b99a4cf8b6c420c37d336607005

build:
  number: 0
  skip: true  # [not linux]

  string: {{ mpi_prefix }}_py{{ CONDA_PY }}h{{ PKG_HASH }}_{{ PKG_BUILDNUM }}

  run_exports:
    - {{ pin_subpackage('nwchemex-simde', max_pin='x.x') }} {{ mpi_prefix }}_*
  ignore_run_exports:
    - catch2

requirements:
  build:
    - {{ compiler('cxx') }}
    - {{ stdlib('c') }}
    - cmake >=3.18
    - ninja
  host:
    - {{ mpi }}
    - nwchemex-chemist * {{ mpi_prefix }}_*
    - nwchemex-pluginplay * {{ mpi_prefix }}_*
    - catch2
    - python
    - pybind11
  run:
    - python
    - {{ mpi }}

test:
  commands:
    - test -f ${PREFIX}/lib/simde/libsimde$SHLIB_EXT
    - pip check
  imports:
    - simde
  requires:
    - pip

about:
  home: https://nwchemex.github.io/SimDE
  license: Apache-2.0
  license_file:
    - LICENSE
  summary: Software development kit for the NWChemEx Community
  description: |
     The Simulation Development Environment (SimDE) includes software designed to facilitate
     the creation of modular computational chemistry software. The name "Development Environment"
     is an unfortunate misnomer, as SimDE is really a software development kit.
  dev_url: https://github.com/NWChemEx/SimDE

extra:
  recipe-maintainers:
    - awvwgk
