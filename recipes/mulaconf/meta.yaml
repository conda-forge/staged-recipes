{% set version = "0.1.0" %}

package:
  name: mulaconf
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/M/MuLaConf/mulaconf-{{ version }}.tar.gz
  sha256: 6fd190d6b4071870a98e7919fc4493c99980ba82dabc816215fd03002e03e7c3

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python >=3.10
    - setuptools >=61.0
    - pip
  run:
    - python >=3.10
    - numpy >=1.20.0
    - scikit-learn >=1.0.0
    - pytorch >=2.0.0
    - pandas >=2.0.0
    - tqdm >=4.10.0

test:
  imports:
    - mulaconf
  commands:
    - pip check
  requires:
    - pip
    - python

about:
  home: https://github.com/k-kostas/MuLaConf
  summary: Conformal Prediction for Multi-label classification.
  doc_url: https://mulaconf.readthedocs.io/
  license: BSD-3-Clause
  license_file: LICENSE

extra:
  recipe-maintainers:
    - k-kostas
