{% set version = "3.8.1" %}

package:
  name: nemosis
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/n/nemosis/nemosis-{{ version }}.tar.gz
  sha256: 97eeeb46be38f82d4e2bc9375c60fc86e0d708a3fb7e26d9d3aa7517d9c0a397

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python >=3.10
    - hatchling
    - pip
  run:
    - python >=3.10
    - requests >=2.32.3
    - pyarrow >=22.0.0
    - feather-format >=0.4.1
    - pandas >=2.2.3
    - xlrd >=2.0.1
    - beautifulsoup4 >=4.12.3
    - openpyxl>=3.1.5
    - cachetools>=5.5.0

test:
  imports:
    - nemosis
  commands:
    - pip check
  requires:
    - pip
    - python

about:
  home: https://github.com/UNSW-CEEM/NEMOSIS/
  summary: A tool for accessing AEMO data.
  description: >
    A Python package for downloading historical data 
    published by the Australian Energy Market Operator (AEMO)
  license: GPL-3.0-only
  license_file: LICENSE

extra:
  recipe-maintainers:
    - mdavis-xyz
