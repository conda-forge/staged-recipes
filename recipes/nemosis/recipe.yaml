context:
  version: 3.8.1
  build_number: '0'
  python_min: "3.10"

package:
  name: nemosis
  version: ${{ version }}

source:
- url: https://pypi.org/packages/source/n/nemosis/nemosis-${{ version }}.tar.gz
  sha256: 97eeeb46be38f82d4e2bc9375c60fc86e0d708a3fb7e26d9d3aa7517d9c0a397

build:
  number: ${{ build_number }}
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  noarch: python

requirements:
  host:
  - python ${{ python_min }}.*
  - hatchling
  - pip
  run:
  - python >=${{ python_min }}
  - requests >=2.32.3
  - pyarrow >=22.0.0
  - feather-format >=0.4.1
  - pandas >=2.2.3
  - xlrd >=2.0.1
  - beautifulsoup4 >=4.12.3
  - openpyxl >=3.1.5
  - cachetools >=5.5.0

tests:
- python:
    imports:
    - nemosis
    python_version:
      - ${{ python_min }}.*
      - "*"
    pip_check: true


about:
  homepage: https://github.com/UNSW-CEEM/NEMOSIS/
  license: GPL-3.0-only
  license_file: LICENSE
  summary: A tool for accessing AEMO data.
  description: |
    A Python package for downloading historical data 
    published by the Australian Energy Market Operator (AEMO)
  repository: https://github.com/UNSW-CEEM/NEMOSIS/

extra:
  recipe-maintainers:
    - mdavis-xyz
