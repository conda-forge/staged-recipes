schema_version: 1

context:
  version: "0.1.0"
  python_min: "3.10"

package:
  name: booz-xform-jax
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/b/booz-xform-jax/booz_xform_jax-${{ version }}.tar.gz
  sha256: 2008b5b8c035733e65075384d0fb1d6fd938c69f61afb08926cb167f7b8f3060

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  python:
    entry_points:
      - booz_xform_jax = booz_xform_jax.cli:main
      - xbooz_xform = booz_xform_jax.cli:main
      - xbooz_xform_jax = booz_xform_jax.cli:main

requirements:
  host:
    - python ${{ python_min }}.*
    - setuptools
    - pip
  run:
    - python >=${{ python_min }}
    - numpy
    - jax
    - netcdf4
    - scipy
    - matplotlib-base
    - plotly

tests:
  - python:
      imports:
        - booz_xform_jax
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"
  - script:
      - booz_xform_jax --help
      - xbooz_xform --help
      - xbooz_xform_jax --help

about:
  summary: JAX-native implementation of the Boozer coordinate transformation for VMEC equilibria
  license: MIT
  license_file: LICENSE
  homepage: https://booz-xform-jax.readthedocs.io/
  repository: https://github.com/uwplasma/booz_xform_jax
  documentation: https://booz-xform-jax.readthedocs.io/

extra:
  recipe-maintainers:
    - matthewfeickert
