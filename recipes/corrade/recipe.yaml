schema_version: 1

context:
  name: corrade
  # Habitat-Sim v0.3.3 vendors this post-v2020.06 snapshot.
  version: "2024.12.19"
  commit: 9f09b71b15ee91cce454f827ba9e7a58e19a7bdf

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  - url: https://github.com/mosra/corrade/archive/${{ commit }}.tar.gz
    sha256: f47dd8db8822e8a47528b68987cd6ac995dec639b0a91d8b2e14c7acd707f93c
  - url: https://github.com/mosra/toolchains/archive/b0ea02e52c4b0b0622a7c6656b250a167ee4afbd.tar.gz
    sha256: 224126e558bd223b60594b06006e91104966618bdbeda1006e9c37c39d177d05
    target_directory: toolchains

build:
  number: 0
  skip:
    - win
    - osx
  script: bash "${RECIPE_DIR}/build.sh"

requirements:
  build:
    - ${{ compiler("cxx") }}
    - ${{ compiler("c") }}
    - ${{ stdlib("c") }}
    - ninja
    - catch2
    - cmake <4
    - pkg-config
  host:
    - xorg-libx11
    - xorg-libxext
    - xorg-libxfixes
  run_exports:
    - ${{ pin_subpackage("corrade", upper_bound="x.x") }}

tests:
  - files:
      recipe:
        - test-cmake
    requirements:
      run:
        - ${{ compiler("cxx") }}
        - ${{ stdlib("c") }}
        - cmake <4
        - ninja
    script:
      - corrade-rc --help > /dev/null
      - test -f $PREFIX/share/cmake/Corrade/CorradeConfig.cmake
      - cmake -S test-cmake -B test-cmake-build -G Ninja -DCMAKE_BUILD_TYPE=Release
      - cmake --build test-cmake-build --verbose
      - ./test-cmake-build/corrade_consumer

about:
  homepage: https://magnum.graphics/corrade/
  license: MIT
  license_family: MIT
  license_file: COPYING
  summary: C++11 multiplatform utility library

extra:
  recipe-maintainers:
    - jeongseok-meta
