schema_version: 1

context:
  version: "0.0.2"
  python_min: '3.11'

package:
  name: elaston
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/e/elaston/elaston-${{ version }}.tar.gz
  sha256: ec4c48afaf15a54a40e220a3507321a9f1467786154750818413507f2a5b343b

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - hatchling ==1.31.0
    - hatch-vcs ==0.5.0
    - pip
  run:
    - python >=${{ python_min }},<3.14
    - numpy >=2.4.6,<2.5.0
    - semantikon >=1.3.2,<1.4.0

tests:
  - python:
      imports:
        - elaston
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  summary: Elaston - linear elasticity toolbox
  license: BSD-3-Clause
  license_file: LICENSE
  homepage: https://github.com/pyiron/elaston
  documentation: https://elaston.readthedocs.io

extra:
  recipe-maintainers:
    - niklassiemer
