{% set version = "0.10.3" %}

package:
  name: bblean
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/b/bblean/bblean-{{ version }}.tar.gz
  sha256: d98b955491ad496b0b6bfeac0b5e6276672b0ad5d6787be070ff46bc9b5196bd

build:
  entry_points:
    - bb = bblean.cli:app
  script: BITBIRCH_BUILD_CPP=1 {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  build:
    - {{ compiler('c') }}
    - {{ compiler('cxx') }}
    - {{ stdlib("c") }}
  host:
    - python
    - setuptools >=75.6
    - setuptools-scm >=9
    - pybind11
    - wheel
    - tomli
    - pip
  run:
    - python
    - scipy
    - rdkit
    - numpy
    - pandas
    - psutil
    - matplotlib-base
    - colorcet
    - seaborn
    - scikit-learn
    - rich
    - typer
    - typing_extensions
    - opentsne
    - umap-learn
    - pynndescent

test:
  imports:
    - bblean
  commands:
    - pip check
    - bb --help
  requires:
    - pip
    - python

about:
  home: https://pypi.org/project/bblean/
  summary: BitBirch-Lean Python package
  license: GPL-3.0-only
  license_file: LICENSE

extra:
  recipe-maintainers:
    - timpalpant
