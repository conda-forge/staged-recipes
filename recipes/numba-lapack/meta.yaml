{% set name = "numba-lapack" %}
{% set version = "0.1.2" %}
{% set python_min = "3.9" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/numba_lapack-{{ version }}.tar.gz
  sha256: 4126c6ec0db91c405e625af79021a8c2c7497a68f7d337d8c4dc8b8265221b03

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - setuptools >=64,<77
    - wheel
    - pip
  run:
    - python >={{ python_min }}
    - numpy >=1.24
    - scipy >=1.10
    - numba >=0.59
    - llvmlite >=0.42

test:
  source_files:
    - test
  imports:
    - numba_lapack
  commands:
    - pip check
    - pytest -q test/test_numba_blas.py
  requires:
    - pip
    - pytest
    - python {{ python_min }}

about:
  home: https://github.com/MTZ-dev/numba-lapack
  summary: UNSAFE Numba intrinsics for BLAS/LAPACK via SciPy C-API
  license: BSD-3-Clause
  license_file: LICENSE
  description: |
    numba-lapack exposes BLAS/LAPACK routines to Numba nopython mode by
    discovering SciPy's exported Cython C-API symbols at import time.

extra:
  recipe-maintainers:
    - jfeist
