{% set name = "gfnff" %}
{% set version = "0.2.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://github.com/pprcht/gfnff/archive/refs/tags/v{{ version }}.tar.gz
  sha256: a3a91a066578bf5c8e545df94cb587f62613ca44b9284b1dfe81982145f45f75

build:
  number: 0
  # Force the Ninja generator: conda-build defaults CMAKE_GENERATOR to
  # "Unix Makefiles", which makes scikit-build-core skip Ninja detection and
  # never set CMAKE_MAKE_PROGRAM (there is no `make` in the build image).
  script: CMAKE_GENERATOR=Ninja {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  skip: true  # [win]

requirements:
  build:
    - {{ compiler('c') }}
    - {{ compiler('cxx') }}
    - {{ compiler('fortran') }}
    - {{ stdlib('c') }}
    - cmake
    - ninja
    - libgomp      # [linux]
    - llvm-openmp  # [osx]
  host:
    - python
    - pip
    - scikit-build-core >=0.9
    - numpy
    - libblas
    - liblapack
  run:
    - python
    - numpy

test:
  imports:
    - gfnff
  commands:
    - gfnff --help

about:
  home: https://github.com/pprcht/gfnff
  license: LGPL-3.0-or-later
  license_file: LICENSE
  summary: Python bindings for the GFN-FF force-field library
  dev_url: https://github.com/pprcht/gfnff

extra:
  recipe-maintainers:
    - pprcht
