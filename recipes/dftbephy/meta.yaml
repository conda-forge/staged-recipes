{% set version = "0.2.2" %}

package:
  name: dftbephy
  version: {{ version }}

source:
  url: https://github.com/CoMeT4MatSci/dftbephy/archive/refs/tags/v{{ version }}.tar.gz
  sha256: 338502076e91f7347787e847c25598a1dd7da90af1d0a5d0665e186e072dd109

build:
  number: 0
  skip: true  # [win]

requirements:
  build:
    - {{ stdlib("c") }}
    - {{ compiler('c') }}
    - {{ compiler('cxx') }}

  host:
    - python >=3.10,<=3.12
    - pip
    - wheel
    - setuptools
    - cython
    - numpy

  run:
    - python >=3.10,<=3.12
    - numpy
    - scipy
    - phonopy >=3.0.0,<=3.5.1
    - spglib <2.7
    - h5py
    - hsd-python
    - mpi4py
    - openmpi

test:
  imports:
    - dftbephy
    - dftbephy.extensions

  commands:
    - dftbephy --help

about:
  home: https://github.com/CoMeT4MatSci/dftbephy
  dev_url: https://github.com/CoMeT4MatSci/dftbephy
  doc_url: https://comet4matsci.github.io/dftbephy/main/about.html
  license: MIT
  license_file: LICENSE.txt
  summary: Calculating electron-phonon couplings with DFTB
  description: |
    DFTBephy is a Python package for calculating electron-phonon
    couplings based on the density-functional tight-binding (DFTB)
    method. It also supports the calculations of electronic and phonon
    band structures, electron-phonon scattering rates, and electronic
    conductivity.

    Reference:

    Croy, A., Unsal, E., Biele, R., and Pecchia, A.
    Journal of Computational Electronics 22, 1231 (2023).
    DOI: 10.1007/s10825-023-02033-9

extra:
  recipe-maintainers:
    - acroy
    - efunsal
