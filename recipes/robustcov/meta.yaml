{% set name = "robustcov" %}
{% set version = "0.0.1" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/r/{{ name }}/{{ name }}-{{ version }}.tar.gz
  sha256: ee1200f60e8109e03c34dd0be0e3a6461e13ce76f85a57c60c0823f11d0fac12

build:
  number: 0
  skip: true  # [py<312]
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  build:
    - {{ compiler('cxx') }}
    - cmake
    - ninja

  host:
    - python
    - pip
    - scikit-build-core
    - pybind11 >=3.0.0
    - numpy >=2.3.4

  run:
    - python
    - numpy >=2.3.4
    - scipy >=1.16.1
    - matplotlib-base >=3.10.5

test:
  imports:
    - robustcov

  requires:
    - pip

  commands:
    - pip check
    - python -c "import robustcov; print('robustcov import ok')"

about:
  home: https://github.com/smiryusupov/robustcov
  summary: Robust covariance estimation and anomaly diagnostics
  license: Apache-2.0
  license_file: LICENSE
  doc_url: https://robustcov.readthedocs.io/
  dev_url: https://github.com/smiryusupov/robustcov

extra:
  recipe-maintainers:
    - smiryusupov
