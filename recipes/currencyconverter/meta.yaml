{% set name = "currencyconverter" %}
{% set version = "0.18.18" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz
  sha256: 571ebd14f737af36992b1592ab20860b872b1d99377b82b133fee3a044058ec4

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv
  entry_points:
    - currency_converter = currency_converter.__main__:main
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - pip
    - setuptools
    - setuptools_scm
  run:
    - python >={{ python_min }}

test:
  imports:
    - currency_converter
  requires:
    - python {{ python_min }}
    - pip
  commands:
    - pip check
    - currency_converter 100 USD --to EUR

about:
  home: https://alexprengere.github.io/currencyconverter/
  summary: 'A simple currency converter'
  description: |
    This is a currency converter that uses historical rates against a reference currency (Euro).
  license: Apache-2.0
  license_family: Apache
  license_file: LICENSE
  dev_url: https://github.com/alexprengere/currencyconverter

extra:
  recipe-maintainers:
    - davide-f
    - alexprengere
