schema_version: 1

context:
  python_min: "3.10"
  version: "1.0.4"

package:
  name: checkpoint-schedules
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/c/checkpoint-schedules/checkpoint_schedules-${{ version }}.tar.gz
  sha256: aaa9191a6da910fd1b1e0526df2ca7ecea04823fe5106360e3e23d2413dcfeeb

build:
  number: 0
  noarch: python
  script:
    content: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
    env:
      SYSTEMROOT: ${{ env.get("SYSTEMROOT", default="") }}

requirements:
  host:
    - python ${{ python_min }}.*
    - setuptools >=61.0
    - pip
  run:
    - python >=${{ python_min }}
    - numpy

tests:
  - python:
      imports:
        - checkpoint_schedules
      pip_check: true
      python_version: ${{ python_min }}.*

about:
  summary: Schedules for incremental checkpointing of adjoint simulations.
  license: LGPL-3.0-only
  license_file: LICENSE
  homepage: https://www.firedrakeproject.org/checkpoint_schedules/

extra:
  recipe-maintainers:
    - finsberg
    - jorgensd
    - dham
