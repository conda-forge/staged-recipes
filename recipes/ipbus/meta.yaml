{% set version = "2.8.12" %}

package:
  name: ipbus
  version: "{{ version }}"

source:
  - url: https://github.com/ipbus/ipbus-software/archive/v{{ version }}.tar.gz
    sha256: 94e2657760a6dd7fa6d66355a4571629dc55cfd2868600653190aa0bfba41490
    patches:
      - patches/use-sysconfig-instead-of-python-config.patch

build:
  number: 0
  skip: true  # [not linux]
  run_exports:
    - {{ pin_subpackage('ipbus', max_pin='x.x.x') }}

requirements:
  build:
    - {{ compiler('cxx') }}
    - {{ stdlib('c') }}
    - make
  host:
    - libboost-devel
    - python
    - setuptools
    - pugixml
    - pybind11
  run:
    - libxcrypt  # [linux]
    - python

test:
  imports:
    - uhal
  commands:
    - test -f "${PREFIX}"/lib/libcactus_uhal_log.so
    - test -f "${PREFIX}"/lib/libcactus_uhal_grammars.so
    - test -f "${PREFIX}"/lib/libcactus_uhal_uhal.so
    - test -f "${PREFIX}"/include/uhal/uhal.hpp
    - test -f "${PREFIX}"/include/uhal/log/log.hpp
    - gen_ipbus_addr_decode --help
    - uhal_inspect_registers.py --help

about:
  home: https://ipbus.web.cern.ch/
  dev_url: https://github.com/ipbus/ipbus-software
  doc_url: https://ipbus.web.cern.ch/doc/user/html/
  license: GPL-3.0-only
  license_file: LICENCE
  summary: IPbus software suite — uHAL C++/Python library and ControlHub for FPGA hardware control over Ethernet

extra:
  recipe-maintainers:
    - anderslindho
    - gabrielfedel
