context:
  name: mapcat
  version: "0.2.1"
  python_min: "3.10"

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/${{ name[0] }}/${{ name }}/${{ name }}-${{ version }}.tar.gz
  sha256: b7d69f71934621b5e55d3b15bfb3bdf1d91a95597fcf104de6766b6669816714

build:
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0
  entry_points:
    - actingest = mapcat.toolkit.act:main
    - mapcatmigrate = mapcat.helper:migrate
    - mapcatreset = mapcat.toolkit.reset:main

requirements:
  host:
    - python ${{ python_min }}
    - setuptools
    - pip
  run:
    - python >=${{ python_min }}
    - sqlmodel
    - sqlalchemy
    - aiosqlite
    - alembic
    - pydantic-settings
    - pixell
    - h5py

tests:
  - python:
      imports:
        - mapcat
      pip_check: true
      python_version: ${{ python_min }}.*
  - script:
      - actingest --help
      - mapcatmigrate --help
      - mapcatreset --help

about:
  homepage: https://pypi.org/project/mapcat/
  summary: The Depth-1 and Atomic MAP CATalog for the Simons Observatory.
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - iparask
    - JBorrow
