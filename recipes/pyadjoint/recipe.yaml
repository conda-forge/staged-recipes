schema_version: 1

context:
  python_min: "3.10"
  version: 2026.4.1

package:
  name: pyadjoint
  version: ${{ version }}

source:
  url: "https://pypi.org/packages/source/p/pyadjoint-ad/pyadjoint-ad-{{ version }}.tar.gz"
  sha256: 63c88d65b2d1ad573ffa56dee22056ee0692501961c8dd0b7c5b47622d8afc27  

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  

requirements:
  host:
    - python ${{ python_min }}.*
    - setuptools >=61.2
    - pip
  run:
    - python >=${{ python_min }}
    - scipy >=1.0
    - sympy
    - checkpoint-schedules
    
tests:
  - python:
      imports:
        - pyadjoint
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  summary: Algorithmic differentiation framework for DOLFINx.
  license: LGPL-3.0-only
  license_file: LICENSE
  homepage: https://github.com/dolfin-adjoint/pyadjoint

extra:
  recipe-maintainers:
    - finsberg
    - jorgensd
    - dham
