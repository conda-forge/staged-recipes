{% set version = "0.3.0" %}
{% set name = "sedona-db" %}

package:
  name: {{ name }}
  version: {{ version }}

source:
  url: https://github.com/apache/sedona-db/archive/apache-sedona-db-{{ version }}.tar.gz
  sha256: 808a38f955dc1dc1c68793a2a6c707abf6299d5f2371ff7dd7b4a3c267e67333

build:
  number: 0
  script:
    - cd python/sedonadb
    - set "GEOS_NO_PKG_CONFIG=1"         # [win]
    - set "GEOS_LIB_DIR=%LIBRARY_LIB%"   # [win]
    - set "GEOS_STATIC=0"                # [win]
    - set "RUSTFLAGS=-C link-arg=/NODEFAULTLIB:stdc++.lib"  # [win]
    - export PYO3_PYTHON="{{ PYTHON }}"  # [not win]
    - set PYO3_PYTHON="{{ PYTHON }}"  # [win]
    - cargo-bundle-licenses --format yaml --output THIRDPARTY.yml
    - mv THIRDPARTY.yml ../../  # [not win]
    - move THIRDPARTY.yml ..\..  # [win]
    - maturin build --release --skip-auditwheel --out dist --interpreter={{ PYTHON }}
    - {{ PYTHON }} -m pip install dist/*.whl --no-deps -vv

requirements:
  build:
    - {{ stdlib("c") }}
    - {{ compiler("c") }}
    - {{ compiler("cxx") }}
    - {{ compiler("rust") }}
    - cargo-bundle-licenses
    - pkg-config
    - python                              # [build_platform != target_platform]
    - cross-python_{{ target_platform }}  # [build_platform != target_platform]
  host:
    - python
    - maturin >=1.12,<2.0
    - pip
    - geos
  run:
    - python
    - apache-sedona
    - geos

test:
  requires:
    - pip
  imports:
    - sedonadb

about:
  home: https://github.com/apache/sedona-db
  summary: A single-node analytical database engine with geospatial as a first-class citizen
  license: Apache-2.0
  license_file:
    - LICENSE
    - NOTICE
    - THIRDPARTY.yml

extra:
  recipe-maintainers:
    - p-vdp
