{% set version = "5.2.0" %}

package:
  name: datascketches-cpp
  version: {{ version }}

source:
  url: https://github.com/apache/datasketches-cpp/archive/refs/tags/{{ version }}.tar.gz
  sha256: 63e6bda660ee9730cc39746de87fd983118c28149e32ff9389fac98b27010a53

build:
  # this is a header only library
  noarch: generic
  number: 0

requirements:
  build:
    - {{ compiler('cxx') }}
    - {{ stdlib('c') }}
    - cmake
    - ninja
  host:
  run:
    - __unix   # [unix]
    - __win    # [win]

test:
  commands:
    - test -f $PREFIX/include/DataSketches/version.hpp                # [unix]
    - if not exist %LIBRARY_INC%\\DataSketches\\version.hpp exit 1    # [win]

about:
  home: https://datasketches.apache.org
  summary: 'A software library of stochastic streaming algorithms'
  license: Apache-2.0
  license_file: LICENSE
  doc_url: https://datasketches.apache.org/docs/Background/TheChallenge.html
  dev_url: https://github.com/apache/datasketches-cpp

extra:
  recipe-maintainers:
    - isuruf
