{% set name = "itkwasm-downsample-wasi" %}
{% set version = "1.8.1" %}
{% set python_min = "3.8" %}

package:
  name: {{ name }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/i/itkwasm-downsample-wasi/itkwasm_downsample_wasi-{{ version }}.tar.gz
  sha256: 3b290a9194654460f0f92b0aebdcfa76a87a2d8ede525c8719d6709a42ac30a4

build:
  number: 0
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python {{ python_min }}
    - hatchling
    - hatch-vcs
    - pip
  run:
    - python >={{ python_min }}
    - itkwasm
    - importlib-resources

test:
  imports:
    - itkwasm_downsample_wasi
  requires:
    - python {{ python_min }}

about:
  home: https://pypi.org/project/itkwasm-downsample-wasi/
  summary: Pipelines for downsampling images.
  dev_url: https://github.com/InsightSoftwareConsortium/ITK-Wasm
  license: Apache-2.0
  license_file: LICENSE.txt

extra:
  recipe-maintainers:
    - khaled196
    - thewtex
