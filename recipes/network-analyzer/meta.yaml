{% set name = "network-analyzer" %}
{% set version = "0.1.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: "https://github.com/ahillodessa/conda_network_analyzer/archive/refs/tags/v0.1.0.tar.gz"
  sha256: a77da0ecb40526302b9ffacd9e0b8d83b9c2cd26ee8076b8e2ac87f8a1ff5bdc
build:
  number: 0

requirements:
  build:
    - {{ compiler('c') }}
    - {{ compiler('cxx') }}
    - {{ stdlib("c") }}
    - cmake
    - ninja

  host:
    - libpcap
    - fmt
    - cli11

  run:
    - libpcap
    - fmt

test:
  commands:
    - network-analyzer -h

about:
  home: https://github.com/ahillodessa/conda_network_analyzer
  summary: Small network analyzer to show network packages
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - ahillodessa
