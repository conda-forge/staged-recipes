{% set version = "0.0.20" %}

package:
  name: nwchemex-weaklytypedfloat
  version: {{ version }}

source:
  url: https://github.com/NWChemEx/WeaklyTypedFloat/archive/refs/tags/v{{ version }}.tar.gz
  sha256: daeba04c27976d1c3e73fd29ad55d56a7a9b85bf18f6ffc1ee81badfb4ee66c8

build:
  number: 0
  skip: true  # [not linux]

  run_exports:
    - {{ pin_subpackage('nwchemex-weaklytypedfloat', max_pin='x.x.x') }}
  ignore_run_exports:
    - catch2

requirements:
  build:
    - {{ compiler('cxx') }}
    - {{ stdlib('c') }}
    - cmake >=3.18
    - ninja
  host:
    - catch2

test:
  commands:
    - test -f ${PREFIX}/lib/libwtf$SHLIB_EXT

about:
  home: https://nwchemex.github.io/WeaklyTypedFloat
  license: Apache-2.0
  license_file:
    - LICENSE
  summary: Type-erasure for floating point types
  description: |
     Type-erasure for floating point types. Facilitates writing general
     floating-point code without needing to worry about the exact
     floating-point type being used.
  dev_url: https://github.com/NWChemEx/WeaklyTypedFloat

extra:
  recipe-maintainers:
    - awvwgk
