context:
  gem_name: "bcrypt_pbkdf"
  version: "1.1.2"

package:
  name: rb-${{ gem_name }}
  version: ${{ version }}

source:
  url: https://rubygems.org/downloads/${{ gem_name }}-${{ version }}.gem
  sha256: c2414c23ce66869b3eb9f643d6a3374d8322dfb5078125c82792304c10b94cf6

build:
  number: 0
  script: build

requirements:
  build:
    - ${{ compiler('c') }}
    - ${{ stdlib('c') }}
    - make
  host:
    - ruby
  run:
    - ruby

tests:
  - script:
      - ruby -r bcrypt_pbkdf -e "exit 0"

about:
  homepage: https://rubygems.org/gems/${{ gem_name }}
  summary: Implements bcrypt_pbkdf, a password-based key derivation function.
  license: MIT
  license_file: ${{ gem_name }}-${{ version }}/COPYING
  repository: https://github.com/net-ssh/bcrypt_pbkdf-ruby

extra:
  recipe-maintainers:
    - aktech
