context:
  gem_name: "ostruct"
  version: "0.6.3"

package:
  name: rb-${{ gem_name }}
  version: ${{ version }}

source:
  url: https://rubygems.org/downloads/${{ gem_name }}-${{ version }}.gem
  sha256: 95a2ed4a4bd1d190784e666b47b2d3f078e4a9efda2fccf18f84ddc6538ed912

build:
  noarch: generic
  number: 0
  script: build

requirements:
  host:
    - ruby
  run:
    - ruby

tests:
  - script:
      - ruby -r ostruct -e "exit 0"

about:
  homepage: https://rubygems.org/gems/${{ gem_name }}
  summary: Class to build custom data structures, similar to a Hash.
  license: Ruby AND BSD-2-Clause
  license_file: ${{ gem_name }}-${{ version }}/BSDL
  repository: https://github.com/ruby/ostruct

extra:
  recipe-maintainers:
    - aktech
