context:
  version: "27.1.0"

package:
  name: cargo-mutants
  version: ${{ version }}

source:
  url: https://github.com/sourcefrog/cargo-mutants/archive/refs/tags/v${{ version }}.tar.gz
  sha256: e57d8c31a8edee7d9265949aef896768729c824626897938e98a5d162a82bda0

build:
  number: 0
  script:
    env:
      CARGO_PROFILE_RELEASE_STRIP: symbols
      CARGO_PROFILE_RELEASE_LTO: fat
    content:
      - if: unix
        then:
          - cargo auditable install --locked --no-track --bins --root ${{ PREFIX }} --path .
          - mkdir -p $PREFIX/share/zsh/site-functions $PREFIX/share/bash-completion/completions $PREFIX/share/fish/vendor_completions.d
          - $PREFIX/bin/cargo-mutants mutants --completions zsh > $PREFIX/share/zsh/site-functions/_cargo-mutants
          - $PREFIX/bin/cargo-mutants mutants --completions bash > $PREFIX/share/bash-completion/completions/cargo-mutants
          - $PREFIX/bin/cargo-mutants mutants --completions fish > $PREFIX/share/fish/vendor_completions.d/cargo-mutants.fish
        else:
          - cargo auditable install --locked --no-track --bins --root %LIBRARY_PREFIX% --path .
      - cargo-bundle-licenses --format yaml --output ./THIRDPARTY.yml

requirements:
  build:
    - ${{ stdlib('c') }}
    - ${{ compiler('c') }}
    - ${{ compiler('rust') }}
    - cargo-bundle-licenses
    - cargo-auditable

tests:
  - script:
      - cargo-mutants mutants --version
  - package_contents:
      bin:
        - cargo-mutants
      files:
        - if: unix
          then:
            - share/bash-completion/completions/cargo-mutants
            - share/fish/vendor_completions.d/cargo-mutants.fish
            - share/zsh/site-functions/_cargo-mutants
      strict: true

about:
  homepage: https://mutants.rs/
  summary: Inject bugs and see if your tests catch them
  description: |
    cargo-mutants is a mutation testing tool for Rust. It modifies your source
    code to check that test failures are detected, helping you find gaps in test
    coverage that traditional line coverage tools miss.
  license: MIT
  license_file:
    - LICENSE
    - THIRDPARTY.yml
  documentation: https://mutants.rs/
  repository: https://github.com/sourcefrog/cargo-mutants

extra:
  recipe-maintainers:
    - ytausch
