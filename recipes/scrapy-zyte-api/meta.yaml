{% set version = "0.33.1" %}

package:
  name: scrapy-zyte-api
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/s/scrapy-zyte-api/scrapy_zyte_api-{{ version }}.tar.gz
  sha256: a9dc69274eefbc2ccba119ac7b8d128dd4f19c0433d4acd27d016df2ed8634b9

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python >=3.10
    - hatchling
    - pip
  run:
    - python >=3.10
    - packaging >=20.0
    - scrapy >=2.0.1
    - typing_extensions >=4.1.0
    - zyte-api >=0.6.0

test:
  imports:
    - scrapy_zyte_api
  commands:
    - pip check
  requires:
    - pip
    - python

about:
  home: https://pypi.org/project/scrapy-zyte-api/
  summary: Client library to process URLs through Zyte API
  license: BSD-3-Clause
  license_file: LICENSE.txt

extra:
  recipe-maintainers:
    - AdrianAtZyte
    - wRAR
