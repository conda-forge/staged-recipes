schema_version: 1

context:
  python_min: "3.9"
  version: "0.1.0"

package:
  name: survrm2py
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/s/survRM2py/survrm2py-${{ version }}.tar.gz
  sha256: e72c82d62b64f93e6ec814e84d2f84d3a1d2f2241617561d7172d9c3b424aac2

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - hatchling
    - pip
  run:
    - python >=${{ python_min }}
    - numpy >=1.20
    - pandas >=1.3
    - statsmodels >=0.13
    - patsy >=0.5
    - scipy >=1.7
    - lifelines >=0.27

tests:
  - python:
      imports:
        - survRM2py
      pip_check: true
      python_version: ${{ python_min }}.*

about:
  summary: Python translation of survRM2 for Restricted Mean Survival Time (RMST) analysis
  license: GPL-3.0-only
  license_file: LICENSE
  homepage: https://pypi.org/project/survrm2py/

extra:
  recipe-maintainers:
    - j-bac
