schema_version: 1

context:
  version: "0.1.1"

package:
  name: survrm2py
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/s/survRM2py/survrm2py-${{ version }}.tar.gz
  sha256: b07a8aac240269a3109b4404d70997d9fb8c7d134aa31280bc8a7bec12ea07d1

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - hatchling
    - pip
  run:
    - python >=${{ python_min }}
    - numpy >=1.20
    - pandas >=1.3
    - statsmodels >=0.13
    - patsy >=0.5
    - scipy >=1.7
    - lifelines >=0.27

tests:
  - python:
      imports:
        - survrm2py
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  summary: Python translation of survRM2 for Restricted Mean Survival Time (RMST) analysis
  license: GPL-3.0-only
  license_file: LICENSE
  homepage: https://pypi.org/project/survrm2py/

extra:
  recipe-maintainers:
    - j-bac
