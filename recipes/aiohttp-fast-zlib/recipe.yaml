context:
  build_number: 0
  name: aiohttp-fast-zlib
  version: "0.3.0"

package:
  name: ${{ name }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/a/${{ name }}/${{ name | replace('-', '_') }}-${{ version }}.tar.gz
  sha256: 963a09de571b67fa0ef9cb44c5a32ede5cb1a51bc79fc21181b1cddd56b58b28

build:
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps
  number: ${{ build_number }}

requirements:
  host:
    - python >=3.9
    - pip
    - poetry-core >=2.0.0
  run:
    - python >=3.9
    - aiohttp >=3.13.5
    - python-isal >=1.8.0
    - python-zlib-ng >=0.4.3

tests:
  - python:
      imports:
        - aiohttp_fast_zlib
      pip_check: true
  - script:
      - pytest -v tests -o addopts=""
    requirements:
      run:
        - pytest
        - python
    files:
      recipe:
        - tests/

about:
  homepage: https://github.com/Bluetooth-Devices/aiohttp-fast-zlib
  summary: 'Use the fastest installed zlib compatible library with aiohttp'
  description: |
    zlib can be a bottleneck for aiohttp, especially for websocket connections.
    aiohttp-fast-zlib replaces usage of zlib in aiohttp with isal or zlib-ng which
    is a drop-in faster replacement in most cases. Be sure to read the isal
    documentation and the zlib-ng documentation.
  license: Apache-2.0
  license_file: LICENSE
  repository: https://github.com/Bluetooth-Devices/aiohttp-fast-zlib

extra:
  recipe-maintainers:
    - MementoRC
