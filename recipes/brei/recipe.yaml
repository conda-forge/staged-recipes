context:
  version: "0.2.4"
  python_min: "3.11"

package:
  name: brei
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/b/brei/brei-${{ version }}.tar.gz
  sha256: fb8a1f191a1c70a81a9df366c530e01938b8082e7198e898d4ea8eb53066fa92

build:
  number: 0
  noarch: python
  python:
    entry_points:
      - brei = brei.cli:cli
  script: uv pip install --python ${{ PYTHON }} . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - uv
    - poetry-core
  run:
    - python >=${{ python_min }}
    - argh >=0.30.2,<0.31
    - rich >=13.6.0,<14
    - rich-argparse >=1.3.0,<2

tests:
  - python:
      imports:
        - brei
      python_version: ${{ python_min }}.*
  - requirements:
      run:
        - python ${{ python_min }}.*
        - pip
    script:
      - pip check
      - brei --help

about:
  homepage: https://entangled.github.io/brei
  summary: A minimal build system
  license: Apache-2.0
  license_file: LICENSE
  repository: https://github.com/entangled/brei

extra:
  recipe-maintainers:
    - tdejager
