{% set name = "liquipydia" %}
{% set version = "0.1.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz
  sha256: da504d579d148e7e431b0f2fa2b25f8009e774a4fbf1792d61c814aad123eb82

build:
  number: 0
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python >=3.12
    - hatchling
    - pip
  run:
    - python >=3.12
    - httpx >=0.28,<1
    - pydantic >=2.13,<3

test:
  imports:
    - liquipydia
  commands:
    - pip check
  requires:
    - pip

about:
  home: https://github.com/Dyl-M/liquipydia
  summary: Python client library for the Liquipedia API (LPDB v3).
  description: |
    liquipydia is a Python client for the Liquipedia API (LPDB v3), covering
    all 16 data types. It is the spiritual successor to the abandoned
    liquipediapy, targeting the modern REST API instead of the old MediaWiki
    one. Features include a typed httpx-based client with rate limiting and
    pagination, Pydantic v2 response models, a resource-per-endpoint
    architecture, and keyword filters that auto-convert to LPDB conditions.
  license: MIT
  license_family: MIT
  license_file: LICENSE
  doc_url: https://dyl-m.github.io/liquipydia/
  dev_url: https://github.com/Dyl-M/liquipydia

extra:
  recipe-maintainers:
    - Dyl-M