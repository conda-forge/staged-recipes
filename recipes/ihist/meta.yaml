{% set name = "ihist" %}
{% set version = "0.1.3" %}

package:
  name: {{ name }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz
  sha256: 5be2d5f02ce8f0771272deed7fa5a47c40b9dc5d0fa673f02a1f07218766169c

build:
  number: 0
  skip: True  # [py<310]
  script:
    - {{ PYTHON }} -m pip install . -vv --no-build-isolation --no-deps  # [build_platform == target_platform]
    - {{ PYTHON }} -m pip install . -vv --no-build-isolation --no-deps --config-settings=setup-args=--cross-file={{ BUILD_PREFIX }}/meson_cross_file.txt  # [build_platform != target_platform]

requirements:
  build:
    - {{ compiler('cxx') }}
    - {{ stdlib('c') }}
    - pkg-config
    - python                                # [build_platform != target_platform]
    - cross-python_{{ target_platform }}    # [build_platform != target_platform]
    - numpy                                 # [build_platform != target_platform]
    - nanobind                              # [build_platform != target_platform]
    - meson-python                          # [build_platform != target_platform]
  host:
    - python
    - pip
    - meson-python >=0.16
    - ninja
    - nanobind
    - numpy >=2.0
    - tbb-devel
  run:
    - python
    - numpy >=2.0

test:
  source_files:
    - python/tests
  imports:
    - ihist
  requires:
    - pip
    - pytest
  commands:
    - pip check
    - pytest -v python/tests

about:
  home: https://github.com/marktsuchida/ihist
  summary: Fast integer image histograms
  description: |
    Python bindings for ihist, which computes histograms of 8-bit and
    16-bit integer image data using cache-conscious algorithms with
    optional multi-threading via oneTBB. Only 64-bit platforms are
    supported.
  license: MIT AND BSD-3-Clause
  # ihist itself is MIT; the extension also embeds nanobind (BSD-3-Clause),
  # whose license is shipped as nanobind-LICENSE.
  license_file:
    - LICENSE.txt
    - nanobind-LICENSE
  dev_url: https://github.com/marktsuchida/ihist

extra:
  recipe-maintainers:
    - marktsuchida
