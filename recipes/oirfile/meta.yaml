{% set name = "oirfile" %}
{% set version = "2026.4.18" %}
{% set python_min = "3.12" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz
  sha256: 39ff8e62b6faed55c116adef821925f9d5bc898d938a9fe216ad6a34a326f87a

build:
  number: 0
  script: {{ PYTHON }} -m pip install . --no-deps --ignore-installed --no-cache-dir -vvv
  noarch: python
  entry_points:
    - oirfile = oirfile.oirfile:main

requirements:
  host:
    - pip
    - python {{ python_min }}
    - setuptools
  run:
    - matplotlib-base
    - numpy
    - python >={{ python_min }}
    - tifffile
    - xarray

test:
  imports:
    - oirfile
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://www.cgohlke.com/
  summary: Read Olympus/Evident OIR and POIR files
  license: BSD-3-Clause
  license_file: LICENSE
  description: |
    Oirfile is a Python library to read images and metadata from OIR (Olympus Image Format Raw) files and POIR archives (ZIP collections of OIR files) produced by Olympus/Evident FluoView fluorescence microscopy software.
  dev_url: https://github.com/cgohlke/oirfile/

extra:
  recipe-maintainers:
    - cgohlke
