{% set version = "0.3.0" %}

package:
  name: cmakefmt
  version: {{ version }}

source:
  url: https://github.com/cmakefmt/cmakefmt/archive/refs/tags/v{{ version }}.tar.gz
  sha256: fa1adc65debdb479ce914a491d4c8a65d8ffd6b76ad8919e4caaf46b9d025dc1

build:
  number: 0

requirements:
  build:
    - {{ compiler('c') }}
    - {{ stdlib('c') }}
    - cargo-bundle-licenses
    - rust

test:
  commands:
    - cmakefmt --help
    - cmakefmt --version

about:
  home: https://cmakefmt.dev
  license: MIT OR Apache-2.0
  license_file:
    - LICENSE
    - THIRDPARTY.yml
  summary: A fast, correct CMake formatter
  description: |
    cmakefmt is a fast, correct, configurable CMake formatter written in Rust.
    It is a native-binary drop-in replacement for cmake-format with full
    legacy config conversion support.
  dev_url: https://github.com/cmakefmt/cmakefmt
  doc_url: https://cmakefmt.dev

extra:
  recipe-maintainers:
    - puneetmatharu
