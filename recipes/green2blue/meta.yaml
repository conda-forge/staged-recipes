{% set name = "green2blue" %}
{% set version = "0.1.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://github.com/discordwell/green2blue/archive/refs/tags/v{{ version }}.tar.gz
  sha256: 2f495bb4098acf81073c686d3f5232746f1c1dd513634c58ec5814b87d144e96

build:
  noarch: python
  number: 0
  entry_points:
    - green2blue = green2blue.cli:main
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python >=3.10
    - pip
    - setuptools >=68.0
  run:
    - python >=3.10
    - cryptography >=41.0

test:
  imports:
    - green2blue
    - green2blue.cli
    - green2blue.pipeline
  commands:
    - green2blue --help

about:
  home: https://github.com/discordwell/green2blue
  summary: Transfer SMS/MMS/RCS messages from Android to iPhone
  license: MIT
  license_family: MIT
  license_file: LICENSE
  dev_url: https://github.com/discordwell/green2blue

extra:
  recipe-maintainers:
    - discordwell
