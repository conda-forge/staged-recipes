schema_version: 1

context:
  python_min: "3.12"
  version: "0.0.2"

package:
  name: mpl_measurements
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/m/mpl_measurements/mpl_measurements-${{ version }}.tar.gz
  sha256: a846b1a4ec46074c713b7586b22f05cef46898073e84e96c9e072620aaa74547

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - setuptools >=68
    - wheel
    - pip
  run:
    - python >=${{ python_min }}
    - matplotlib-base
    - numpy

tests:
  - python:
      imports:
        - mpl_measurements
      pip_check: true
      python_version: ${{ python_min }}.*

about:
  summary: mpl_measurements add measurements to your matplotlib plots
  license: BSD-3-Clause
  license_file: LICENSE
  homepage: https://github.com/ubaldot/mpl_measurements

extra:
  recipe-maintainers:
    - ubaldot
