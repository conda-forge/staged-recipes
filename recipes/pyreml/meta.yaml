{% set name = "pyreml" %}
{% set version = "0.1.5" %}
{% set python_min = "3.10" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz
  sha256: 2089ea3e280e51965ff4b485a35d9e5e079d05495b115c0ac6c6d53d5dfc06aa

build:
  noarch: python
  number: 0
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python {{ python_min }}
    - pip
    - setuptools >=61.0
    - wheel
  run:
    - python >={{ python_min }}
    - pytorch
    - numpy
    - scipy
    - pandas
    - patsy

test:
  imports:
    - pyreml
  commands:
    - pip check
  requires:
    - python {{ python_min }}
    - pip

about:
  home: https://github.com/ai-for-genome-interpretation-lab/pyreml
  license: GPL-3.0-or-later
  license_file: LICENSE
  summary: "General-purpose linear mixed model solver."
  description: |
    pyreml is a general-purpose linear mixed model solver. It fits linear
    mixed models for a wide range of applications: quantitative genetics,
    spatial statistics, health sciences, among others. Models are fitted by
    direct differentiation of the Restricted Maximum Likelihood (REML),
    using PyTorch for variance parameter estimation. It benefits from PyTorch
    parallelization and GPU acceleration.
  doc_url: https://ai-for-genome-interpretation-lab.github.io/pyreml/
  dev_url: https://github.com/ai-for-genome-interpretation-lab/pyreml

extra:
  recipe-maintainers:
    - almarch
    - eddiewrc
