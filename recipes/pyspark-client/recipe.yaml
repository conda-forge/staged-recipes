context:
  version: "4.1.1"
  python_min: "3.10"

package:
  name: pyspark-client
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/p/pyspark_client/pyspark_client-${{ version }}.tar.gz
  sha256: 23bd428d1f96c7196ae8ba29facca7eb56f66b3c380294385101ec8f1872a44a

build:
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
  run:
    - python >=${{ python_min }}
    - pandas >=2.2.0
    - pyarrow >=15.0.0
    - grpcio >=1.76.0
    - grpcio-status >=1.76.0
    - googleapis-common-protos >=1.71.0
    - zstandard >=0.25.0
    - numpy >=1.21
    - pyyaml >=3.11

tests:
  - python:
      imports:
        - pyspark
        - pyspark.sql.connect
      pip_check: true
      python_version: ${{ python_min }}.*

about:
  homepage: https://spark.apache.org/
  repository: https://github.com/apache/spark
  summary: Python Spark Connect client for Apache Spark
  license: Apache-2.0
  license_file: LICENSE.txt

extra:
  recipe-maintainers:
    - xylar
