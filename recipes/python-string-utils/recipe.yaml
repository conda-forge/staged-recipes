schema_version: 1

context:
  version: "1.0.0"

package:
  name: python-string-utils
  version: ${{ version }}

source:
  url: https://github.com/daveoncode/python-string-utils/archive/refs/tags/v${{ version }}.tar.gz
  sha256: 0f0ec393ec2ac0f936e766be7fad605980a474de7d0421ed56fd79e8c1a2e2c7

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
  run:
    - python >=${{ python_min }}

tests:
  - python:
      imports:
        - string_utils
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  homepage: https://github.com/daveoncode/python-string-utils
  summary: Utility functions for strings validation and manipulation
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - pb01ka
