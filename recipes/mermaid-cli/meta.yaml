{% raw %}{% set name = "@mermaid-js/mermaid-cli" %}
{% set version = "11.15.0" %}

package:
  name: mermaid-cli
  version: {{ version }}

source:
  url: https://registry.npmjs.org/{{ name }}/-/mermaid-cli-{{ version }}.tgz
  sha256: f6fd0879dbf500e453784bbd9db92ae951097e0e9e8a90ec613f2bd3ca8fa06c

build:
  noarch: nodejs
  number: 0
  script:
    - npm install -g --prefix={{ RECIPE_ROOT }}/dist {{ name }}=={{ version }}
    - npm_config_prefix={{ RECIPE_ROOT }}/dist node-prune

requirements:
  host:
    - nodejs
  run:
    - nodejs

test:
  commands:
    - mmdc --version
    - mmdc --help

about:
  home: https://github.com/mermaid-js/mermaid-cli
  license: MIT
  license_file: LICENSE
  summary: 'Command-line interface for Mermaid'

extra:
  recipe-maintainers:
    - ajaypnair09
{% endraw %}
