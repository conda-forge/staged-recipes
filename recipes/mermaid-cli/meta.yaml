{% set version = "11.15.0" %}

package:
  name: mermaid-cli
  version: {{ version }}

source:
  url: https://registry.npmjs.org/@mermaid-js/mermaid-cli/-/mermaid-cli-{{ version }}.tgz
  sha256: f6fd0879dbf500e453784bbd9db92ae951097e0e9e8a90ec613f2bd3ca8fa06c

build:
  noarch: generic
  number: 0
  script_env:
    # prevent puppeteer from downloading chromium
    - PUPPETEER_SKIP_DOWNLOAD=1
  script:
    - npm install -g --prefix={{ PREFIX }} @mermaid-js/mermaid-cli@{{ version }}
    - find {{ PREFIX }} -name "*.bare" -delete
    - find {{ PREFIX }} -name "prebuilds" -type d -exec rm -rf {} +
    # remove native napi canvas binary
    - rm -rf {{ PREFIX }}/lib/node_modules/@mermaid-js/mermaid-cli/node_modules/@napi-rs
requirements:
  host:
    - nodejs
  run:
    - nodejs

test:
  commands:
    - mmdc --version
    - mmdc --help

about:
  home: https://github.com/mermaid-js/mermaid-cli
  license: MIT
  license_file: LICENSE
  summary: 'Command-line interface for Mermaid'

extra:
  recipe-maintainers:
    - ajaypnair09
