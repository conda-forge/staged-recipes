# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "0.2.13"

package:
  name: langchain-pinecone
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/l/langchain-pinecone/langchain_pinecone-${{ version }}.tar.gz
  sha256: 294a6da7e1a81d5805060e37639d3e4fb72cb239d651a34a4d1f81ba096f473a

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - pdm-backend
    - pip
  run:
    - python >=${{ python_min }}
    - langchain-core <2.0.0,>=0.3.34
    - pinecone >=6.0.0,<8.0.0
    - numpy >=1.26.4,!=2.0.2
    - langchain-openai >=0.3.11
    - httpx >=0.28.0
    - simsimd >=5.9.11,<7
    - pydantic >=2.11.1

tests:
  - python:
      imports:
        - langchain_pinecone
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  homepage: https://pypi.org/project/langchain-pinecone/
  license: MIT
  license_file: LICENSE
  summary: An integration package connecting Pinecone and LangChain
  repository: https://github.com/langchain-ai/langchain-pinecone
  documentation: https://python.langchain.com/docs/integrations/providers/pinecone/
  description: |
    langchain-pinecone is the LangChain partner package that connects
    Pinecone vector databases to the LangChain ecosystem. It provides
    PineconeVectorStore, PineconeSparseVectorStore, PineconeEmbeddings,
    PineconeSparseEmbeddings, and PineconeRerank for building
    retrieval-augmented generation (RAG) and semantic-search applications.

extra:
  recipe-maintainers:
    - rxm7706
