schema_version: 1

context:
  version: 1.0.2

package:
  name: cgsmiles
  version: ${{ version }}

source:
  - url: https://files.pythonhosted.org/packages/source/c/cgsmiles/cgsmiles-${{ version }}.tar.gz
  sha256: d74a21b5c54139d980ff457946b99a56364294cad46bf6147c0d166a67dfafca

build:
  number: 0
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  noarch: python

requirements:
  host:
  - python ${{ python_min }}.*
  - pip
  - setuptools >=46.4.0
  - pbr

  run:
  - python >=${{ python_min }}
  - pbr
  - numpy
  - networkx >=2.0
  - pysmiles

tests:
- python:
    imports:
    - cgsmiles
    python_version:
      - ${{ python_min }}.*
      - "*"
    pip_check: true

about:
  homepage: https://github.com/gruenewald-lab/CGsmiles
  repository: https://github.com/gruenewald-lab/CGsmiles
  documentation: https://cgsmiles.readthedocs.io/en/latest/
  summary: A versatile line notation for molecular representations across multiple resolutions
  description: |
    The CGSmiles line notation encodes arbitrary resolutions of molecules and
    defines the conversion between these resolutions unambiguously. For example,
    in coarse-grained (CG) simulations multiple atoms are represented as one large
    pseudo-atom often called bead. The conversion from the atomic resolution to
    the CG resolution can be described using the CGSmiles notation.

    The CGSmiles Python package is created around this notation to read, write, and
    further process the resulting graphs. Reading and resolving provides the all the
    molecule information in form of `NetworkX graphs <https://networkx.org>`__,
    providing an easy way to interface with other python libraries.

  license: Apache-2.0
  license_file: LICENSE

extra:
  recipe-maintainers:
    - fgrunewald 
    - pckroon
    - chrisjonesBSU
